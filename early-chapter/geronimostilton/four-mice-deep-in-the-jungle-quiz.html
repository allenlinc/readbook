<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Four Mice Deep in the Jungle — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#5 · Four Mice Deep in the Jungle</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: Four Mice Deep in the Jungle</em> (Scholastic, 2001) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What newspaper does Geronimo Stilton run in New Mouse City?", "zh": "杰罗尼摩·斯蒂顿在老鼠岛首府新鼠城经营的是哪份报纸？"}, "options": [{"en": "The Mouse Times", "zh": "《老鼠时报》"}, {"en": "The Rodent's Gazette", "zh": "《啮齿动物公报》"}, {"en": "The Cheese Daily", "zh": "《奶酪日报》"}, {"en": "The Whisker Weekly", "zh": "《胡须周刊》"}], "answer": 1, "explain": {"en": "Geronimo runs The Rodent's Gazette, the most popular paper on Mouse Island, where his sister Thea works as a special correspondent.", "zh": "杰罗尼摩经营着《啮齿动物公报》，这是老鼠岛上最受欢迎的报纸，他的妹妹蒂奥是这家报纸的特约记者。"}}, {"q": {"en": "Why did Geronimo go to see Dr. Shrinkfur the psychiatrist?", "zh": "杰罗尼摩为什么要去看心理医生收缩毛医生？"}, "options": [{"en": "He wanted to learn how to fly", "zh": "他想学习飞行"}, {"en": "He had a bad toothache", "zh": "他牙痛得厉害"}, {"en": "He wanted to publish a book", "zh": "他想出版一本书"}, {"en": "He was afraid of many things and needed to face his fears", "zh": "他害怕很多东西，需要学会面对恐惧"}], "answer": 3, "explain": {"en": "Geronimo was a 'fraidy mouse' afraid of elevators, flying, spiders, the dark and more; Dr. Shrinkfur told him he must face his fears to get well.", "zh": "杰罗尼摩是个“胆小鬼老鼠”，害怕电梯、飞行、蜘蛛、黑暗等许多东西；收缩毛医生告诉他，要好转就必须去面对自己的恐惧。"}}, {"q": {"en": "Which three family members tricked Geronimo into a car and flew him to the jungle?", "zh": "是哪三位家人把杰罗尼摩骗上车、又带他坐飞机去了丛林？"}, "options": [{"en": "His parents", "zh": "他的父母"}, {"en": "His sister Thea, cousin Trap, and nephew Benjamin", "zh": "他的妹妹蒂奥、表哥特拉普和侄子本杰明"}, {"en": "His brother and two friends", "zh": "他的哥哥和两位朋友"}, {"en": "His aunt and uncle", "zh": "他的姑姑和叔叔"}], "answer": 1, "explain": {"en": "Thea, Trap and Benjamin lured him with a box of Cheesy Chews, grabbed him, and drove him to the airport to fly to Rattytrap Jungle.", "zh": "蒂奥、特拉普和本杰明用一盒“芝士啃啃”引他开门，把他抱上车，开车送他去机场，飞往捕鼠陷阱丛林。"}}, {"q": {"en": "On the plane, a fan named Penelope Poisonfur got Geronimo to sign a form. What did it sign him up for?", "zh": "在飞机上，一位叫佩内洛普·毒毛的粉丝让杰罗尼摩签了一份表格。这份表格让他报名参加了什么？"}, "options": [{"en": "A writing class for young authors", "zh": "面向年轻作家的写作课"}, {"en": "A relaxing resort vacation", "zh": "轻松的度假村休假"}, {"en": "A seven-day jungle survival course", "zh": "为期七天的丛林生存训练营"}, {"en": "A free cheese-tasting tour", "zh": "免费的奶酪品尝之旅"}], "answer": 2, "explain": {"en": "Penelope tricked him into signing up for the 'To the Last Whisker Survival School,' a tough seven-day course in Rattytrap Jungle.", "zh": "佩内洛普骗他报名了“坚持到最后一根胡须生存学校”，那是捕鼠陷阱丛林里一个为期七天、十分艰苦的训练营。"}}, {"q": {"en": "The form said that if Geronimo refused to obey Ms. Poisonfur, what would happen?", "zh": "表格上写道，如果杰罗尼摩拒绝服从毒毛小姐，会发生什么事？"}, "options": [{"en": "He would be fed to the snakes", "zh": "他会成为蛇的食物"}, {"en": "He would be sent straight home", "zh": "他会立刻被送回家"}, {"en": "He would lose his newspaper", "zh": "他会失去自己的报纸"}, {"en": "He would have to pay a fine of one million dollars", "zh": "他必须支付一百万美元的罚款"}], "answer": 3, "explain": {"en": "The small print said that refusing to take part or obey would cost a fine of one million dollars, which Geronimo could not pay.", "zh": "表格的小字写明，拒绝参加或不服从都要缴纳一百万美元罚款，而杰罗尼摩根本付不起这笔钱。"}}, {"q": {"en": "On Day 3 (Wednesday), Geronimo had to climb a very tall tree to build a tree house. Who helped him?", "zh": "在第三天（星期三），杰罗尼摩必须爬上一棵很高的树去搭建树屋。是谁帮了他？"}, "options": [{"en": "His cousin Trap", "zh": "他的表哥特拉普"}, {"en": "His nephew Benjamin", "zh": "他的侄子本杰明"}, {"en": "Suzie Squeakers, a friend of Pinky Pick", "zh": "苏西·吱吱，粉粉·皮克的伙伴"}, {"en": "Sandy Silverfur", "zh": "桑迪·银毛"}], "answer": 2, "explain": {"en": "Suzie Squeakers, a Gerbil Scout and friend of Pinky Pick, followed him up the tree and told him 'don't look down' so he could build the shelter.", "zh": "苏西·吱吱是沙鼠童子军、也是粉粉·皮克的朋友，她跟着杰罗尼摩爬上树，并教他“别往下看”，帮他搭好了树屋。"}}, {"q": {"en": "On Day 2 (Tuesday), while crossing the Rio Mosquito on a rope, what happened?", "zh": "在第二天（星期二），大家抓着绳子渡过蚊子河时，发生了什么？"}, "options": [{"en": "Tubby fell in and Geronimo saved him with mouse-to-mouse resuscitation", "zh": "塔比掉了下去，杰罗尼摩用老鼠对老鼠人工呼吸救了他"}, {"en": "Geronimo fell and Trap saved him", "zh": "杰罗尼摩掉了下去，特拉普救了他"}, {"en": "They crossed safely with no trouble", "zh": "他们平安渡过，毫无麻烦"}, {"en": "A snake bit Benjamin", "zh": "一条蛇咬了本杰明"}], "answer": 0, "explain": {"en": "Tubby lost his grip and splashed into the river; Geronimo dove in, dragged him out by the tail, and gave him mouse-to-mouse resuscitation.", "zh": "塔比没抓稳绳子掉进了河里；杰罗尼摩跳下水，抓住他的尾巴把他拖上岸，并给他做了老鼠对老鼠的人工呼吸。"}}, {"q": {"en": "On Day 4 (Thursday), Geronimo got lost in the forest with Burt Burlyrat. What did he learn about B.B.?", "zh": "在第四天（星期四），杰罗尼摩和伯特·壮毛在森林里迷了路。他发现了伯特的什么秘密？"}, "options": [{"en": "B.B. was really Ms. Poisonfur in disguise", "zh": "伯特其实是伪装起来的毒毛小姐"}, {"en": "B.B. was Geronimo's long-lost brother", "zh": "伯特是杰罗尼摩失散多年的兄弟"}, {"en": "B.B. was not a real forest ranger but worked at Mouseyworld park", "zh": "伯特并不是真正的森林管理员，而是在鼠鼠世界游乐园工作"}, {"en": "B.B. could not read at all", "zh": "伯特根本不会认字"}], "answer": 2, "explain": {"en": "B.B. got lost too and admitted he was only a pretend forest ranger at Mouseyworld, the popular rodents' amusement park, which is why he couldn't read the compass.", "zh": "伯特自己也迷了路，并承认自己只是在热门的鼠鼠世界游乐园里扮演森林管理员，所以才看不懂指南针。"}}, {"q": {"en": "On Day 6 (Saturday), Geronimo faced his fear of spiders. What was the surprise?", "zh": "在第六天（星期六），杰罗尼摩面对了自己对蜘蛛的恐惧。最后的惊喜是什么？"}, "options": [{"en": "It was a real tiny spider", "zh": "那是一只真正的微型蜘蛛"}, {"en": "It was just a leaf", "zh": "那只是一片树叶"}, {"en": "The spider placed on his snout was actually made of plastic", "zh": "放在他鼻子上的那只蜘蛛其实是塑料做的"}, {"en": "It was a toy mouse", "zh": "那是一只玩具老鼠"}], "answer": 2, "explain": {"en": "Penelope counted down while a 'spider' sat on his snout, then revealed it was plastic and Geronimo had bravely stayed still the whole time.", "zh": "毒毛小姐让一只“蜘蛛”趴在杰罗尼摩鼻子上并倒数计时，最后揭晓那是塑料做的，而杰罗尼摩全程勇敢地一动不动。"}}, {"q": {"en": "At the end of the story, what showed that Geronimo had truly become brave?", "zh": "在故事结尾，哪件事说明杰罗尼摩真的变得勇敢了？"}, "options": [{"en": "He calmly picked up and whirled the poisonous snake instead of the harmless one", "zh": "他镇定地抓起那条有毒的蛇转圈挥舞，而不是那条无害的蛇"}, {"en": "He cried for his mother", "zh": "他哭着找妈妈"}, {"en": "He ran away from the jungle", "zh": "他逃出了丛林"}, {"en": "He refused to climb any tree", "zh": "他拒绝爬任何树"}], "answer": 0, "explain": {"en": "When Geronimo grabbed the wrong snake — the poisonous one — and stayed calm, Penelope saw he was no longer the 'fraidy mouse he used to be.", "zh": "当杰罗尼摩抓错了蛇——抓起了那条有毒的蛇——却依然镇定时，毒毛小姐看出他再也不是从前那个“胆小鬼老鼠”了。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
