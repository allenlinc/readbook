<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geronimo and the Gold Medal — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#33 · Geronimo and the Gold Medal</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: Geronimo and the Gold Medal</em> (Scholastic, 2005) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who ordered Geronimo to travel to Athens and report on the Olympics?", "zh": "是谁命令杰罗尼摩去雅典报道奥运会的？"}, "options": [{"en": "His grandfather William Shortpaws", "zh": "他的爷爷威廉·肖特波"}, {"en": "His sister Thea", "zh": "他的妹妹西奥"}, {"en": "His friend Hercule Poirat", "zh": "他的朋友赫拉克·波瓦"}, {"en": "Professor Paws von Volt", "zh": "波兹·冯·沃尔特教授"}], "answer": 0, "explain": {"en": "Grandfather William Shortpaws barked orders at Geronimo by phone, telling him to pack, fly to Athens, and cover the Olympics for The Rodent's Gazette.", "zh": "威廉·肖特波爷爷在电话里对杰罗尼摩下了命令，让他收拾行李飞往雅典，为《老鼠公报》报道奥运会。"}}, {"q": {"en": "The flight attendant on Geronimo's plane was really someone in disguise. Who was it?", "zh": "杰罗尼摩飞机上的空乘人员其实是伪装起来的某个人。那是谁？"}, "options": [{"en": "Hercule Poirat, a private detective", "zh": "赫拉克·波瓦，一位私家侦探"}, {"en": "Thea Stilton, his sister", "zh": "他的妹妹西奥·斯提尔顿"}, {"en": "Count Cyrus von Snootrat", "zh": "赛勒斯·冯·斯努特拉特伯爵"}, {"en": "Professor Paws von Volt", "zh": "波兹·冯·沃尔特教授"}], "answer": 0, "explain": {"en": "Geronimo noticed a banana peel in the attendant's pocket; it was his old friend Hercule Poirat, a master of disguise and detective, who had fooled even him.", "zh": "杰罗尼摩注意到那位空乘口袋里露出一根香蕉皮，原来是他的老朋友赫拉克·波瓦——一位伪装高手兼侦探，连他都骗过了。"}}, {"q": {"en": "Which fake country kept winning Olympic events but does not really exist?", "zh": "哪个假国家一直赢得奥运比赛，但实际上根本不存在？"}, "options": [{"en": "Mousylvania", "zh": "鼠伐尼亚"}, {"en": "Greece", "zh": "希腊"}, {"en": "Mouse Island", "zh": "老鼠岛"}, {"en": "Sparta", "zh": "斯巴达"}], "answer": 0, "explain": {"en": "Hercule pointed out that one country on the list did not exist: Mousylvania. Its athletes all looked alike and only entered individual events.", "zh": "赫拉克指出参赛国家名单里有一个根本不存在的国家：鼠伐尼亚。它的选手长得一模一样，而且只参加个人项目。"}}, {"q": {"en": "How did Geronimo and Hercule get inside the guarded Olympic Village?", "zh": "杰罗尼摩和赫拉克是怎样进入守卫森严的奥运村的？"}, "options": [{"en": "By showing Geronimo's press pass", "zh": "出示杰罗尼摩的记者证"}, {"en": "By digging a tunnel", "zh": "挖了一条地道"}, {"en": "By parachuting in", "zh": "跳伞进入"}, {"en": "By dressing as mail carriers", "zh": "伪装成邮差"}], "answer": 0, "explain": {"en": "After Hercule suggested silly plans, Geronimo laughed and said they could just use his press pass; the guard let them in.", "zh": "在赫拉克提出一堆滑稽计划后，杰罗尼摩笑着说他们可以用自己的记者证，卫兵就放他们进去了。"}}, {"q": {"en": "Inside the secret lab, what old friend of Geronimo was chained to the machine?", "zh": "在秘密实验室里，被锁在机器上的是杰罗尼摩的哪位老朋友？"}, "options": [{"en": "Professor Paws von Volt", "zh": "波兹·冯·沃尔特教授"}, {"en": "Count Cyrus von Snootrat", "zh": "赛勒斯·冯·斯努特拉特伯爵"}, {"en": "Grandfather William", "zh": "威廉爷爷"}, {"en": "Hercule Poirat", "zh": "赫拉克·波瓦"}], "answer": 0, "explain": {"en": "The chained old rodent was Professor Paws von Volt, Geronimo's friend who had mysteriously disappeared about a year earlier while doing secret genetics work.", "zh": "被锁在机器上的是波兹·冯·沃尔特教授，他是杰罗尼摩的朋友，大约一年前在从事秘密基因研究时神秘失踪了。"}}, {"q": {"en": "What is the name of the cheating athlete who wanted to be the world's greatest?", "zh": "那个想成为全世界最伟大运动员的作弊选手叫什么名字？"}, "options": [{"en": "Count Cyrus von Snootrat", "zh": "赛勒斯·冯·斯努特拉特伯爵"}, {"en": "Count von Doright", "zh": "冯·多赖特伯爵"}, {"en": "Sally Ratmousen", "zh": "萨莉·拉特穆森"}, {"en": "Trap Stilton", "zh": "特拉普·斯提尔顿"}], "answer": 0, "explain": {"en": "The elegant, cold-eyed count was Cyrus von Snootrat, whose family crest read 'The end justifies the means!' He forced the professor to help him cheat.", "zh": "那位优雅、眼神冰冷的伯爵就是赛勒斯·冯·斯努特拉特，他的家族徽章上写着“目的证明手段正当”。他逼教授帮他作弊。"}}, {"q": {"en": "What machine transferred animal powers like a jaguar's speed into the count?", "zh": "是什么机器把美洲豹的速度等动物能力转移到伯爵身上的？"}, "options": [{"en": "The Voltometer", "zh": "沃尔特仪"}, {"en": "The Cheese-o-matic", "zh": "奶酪机"}, {"en": "The Chronometer", "zh": "计时器"}, {"en": "The Shadow's hammer", "zh": "影子的锤子"}], "answer": 0, "explain": {"en": "Professor von Volt invented the Voltometer, a machine that could transfer characteristics from one subject to another, which the count abused to win.", "zh": "沃尔特教授发明了沃尔特仪，这台机器能把一种生物的特征转移到另一种生物身上，伯爵滥用它来赢得比赛。"}}, {"q": {"en": "To stop the count, what animal did Professor von Volt secretly swap in for the rabbit?", "zh": "为了阻止伯爵，沃尔特教授偷偷把兔子换成了什么动物？"}, "options": [{"en": "A snail", "zh": "一只蜗牛"}, {"en": "A frog", "zh": "一只青蛙"}, {"en": "A cat", "zh": "一只猫"}, {"en": "A jaguar", "zh": "一只美洲豹"}], "answer": 0, "explain": {"en": "While the count was distracted, the professor swapped the rabbit with a snail, so the machine gave him a snail's slowness instead of a rabbit's speed.", "zh": "趁伯爵分神时，教授把兔子换成了一只蜗牛，于是机器给了他蜗牛的缓慢，而不是兔子的速度。"}}, {"q": {"en": "What did Count von Snootrat do that destroyed the Voltometer for good?", "zh": "赛勒斯伯爵做了什么，把沃尔特仪永远毁掉了？"}, "options": [{"en": "He pushed the red self-destruct button", "zh": "他按下了红色的自毁按钮"}, {"en": "He dropped a banana", "zh": "他掉了一根香蕉"}, {"en": "He called the police", "zh": "他报了警"}, {"en": "He ate the cheese", "zh": "他吃了奶酪"}], "answer": 0, "explain": {"en": "When the others were chatting, the count leapt to the machine and pushed the red self-destruct button; the Voltometer smoked and melted.", "zh": "趁大家聊天时，伯爵冲向机器按下了红色自毁按钮，沃尔特仪冒烟熔化成了一堆废铁。"}}, {"q": {"en": "Hercule offered Geronimo a banana that did not taste like a banana. What did it taste like?", "zh": "赫拉克给杰罗尼摩一根吃起来不像香蕉的香蕉。它到底是什么味道？"}, "options": [{"en": "Cheese, because Hercule soaked it in melted cheese", "zh": "奶酪，因为赫拉克把它泡在融化的奶酪里"}, {"en": "A normal banana", "zh": "普通香蕉"}, {"en": "Chocolate", "zh": "巧克力"}, {"en": "Fish", "zh": "鱼"}], "answer": 0, "explain": {"en": "Hercule explained he had soaked the banana in melted cheese all night, so it tasted like delicious cheese, not banana.", "zh": "赫拉克解释说他把香蕉在融化的奶酪里泡了一整夜，所以吃起来是美味的奶酪味，而不是香蕉味。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
