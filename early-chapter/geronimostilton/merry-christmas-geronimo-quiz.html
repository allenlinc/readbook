<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merry Christmas, Geronimo! — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#12 · Merry Christmas, Geronimo!</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: Merry Christmas, Geronimo!</em> (Scholastic, 2001) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Which holiday is this story about?", "zh": "这个故事讲的是哪个节日？"}, "options": [{"en": "Christmas", "zh": "圣诞节"}, {"en": "Halloween", "zh": "万圣节"}, {"en": "Easter", "zh": "复活节"}, {"en": "New Year's Day", "zh": "元旦"}], "answer": 0, "explain": {"en": "The book is set on Christmas Eve, the day before Christmas, with snow, gifts, and a tree.", "zh": "这本书发生在圣诞前夜，也就是圣诞节的前一天，书里有雪、礼物和圣诞树。"}}, {"q": {"en": "What is Geronimo's home address?", "zh": "杰罗尼摩住在什么地方？"}, "options": [{"en": "8 Mouseford Lane", "zh": "鼠福德巷8号"}, {"en": "17 Swiss Cheese Center", "zh": "瑞士奶酪中心17号"}, {"en": "33 Dark Grave Drive", "zh": "暗坟道33号"}, {"en": "The Rodent's Gazette office", "zh": "《老鼠日报》办公室"}], "answer": 0, "explain": {"en": "Geronimo has the cheese baskets delivered to 8 Mouseford Lane, and that is the house that burns down.", "zh": "杰罗尼摩把奶酪篮送到鼠福德巷8号，而且着火被烧毁的正是那座房子。"}}, {"q": {"en": "What spills all over the road when a delivery truck slides on the ice?", "zh": "一辆送货卡车在冰上打滑时，是什么撒得满街都是？"}, "options": [{"en": "Ten thousand Ratbury Ratballs", "zh": "一万个鼠堡巧克力球"}, {"en": "Bags of mail", "zh": "一袋袋邮件"}, {"en": "Boxes of books", "zh": "一箱箱书"}, {"en": "Pumpkins", "zh": "南瓜"}], "answer": 0, "explain": {"en": "The truck was carrying ten thousand Ratbury Ratballs meant for the mayor's Christmas banquet.", "zh": "那辆卡车装的是准备送给市长圣诞宴会用的一万个鼠堡巧克力球。"}}, {"q": {"en": "What started the fire in Geronimo's house?", "zh": "杰罗尼摩家里的大火是怎么烧起来的？"}, "options": [{"en": "A candle flame blown by wind onto the curtains", "zh": "一阵风把蜡烛的火苗吹到了窗帘上"}, {"en": "A pan left on the stove", "zh": "一只平底锅忘在炉子上"}, {"en": "Lightning outside", "zh": "外面的闪电"}, {"en": "A fireplace spark", "zh": "壁炉里蹦出的火星"}], "answer": 0, "explain": {"en": "A gust of wind blew the flame from Great-grandma Tanglefur's ornament candle onto the curtains.", "zh": "一阵风把高祖母缠毛奶奶那件装饰品上的蜡烛火苗吹到了窗帘上。"}}, {"q": {"en": "Who pumps the floodwater out of Geronimo's house?", "zh": "是谁把杰罗尼摩家里的水抽干的？"}, "options": [{"en": "Fishyfur, also called 'The Fish'", "zh": "菲舍弗，外号“鱼先生”"}, {"en": "Cheddar E. Gadget", "zh": "切达·盖杰"}, {"en": "Professor Preciousfur", "zh": "普雷舍斯弗教授"}, {"en": "The Paws Brothers", "zh": "爪子兄弟"}], "answer": 0, "explain": {"en": "Fishyfur is Trap's fishermouse friend who uses a generator and a rubber tube to pump the water out the window.", "zh": "菲舍弗是特拉普那位渔鼠朋友，他用发电机和一根橡胶管把水从窗口抽了出去。"}}, {"q": {"en": "Which famous chef cooks the Christmas Eve dinner?", "zh": "是哪一位名厨做了圣诞前夜的大餐？"}, "options": [{"en": "Saucy Le Paws", "zh": "索西·勒波"}, {"en": "Tina Spicytail", "zh": "蒂娜·辣尾"}, {"en": "Paws Prankster", "zh": "爪子·恶作剧"}, {"en": "Sugarfurs", "zh": "糖鼠"}], "answer": 0, "explain": {"en": "Trap is friends with Saucy Le Paws, a famous chef with the TV show 'Slice and Dice for Mice!', who agrees to cook.", "zh": "特拉普和名厨索西·勒波是朋友，那位厨师有自己的电视节目《老鼠快刀切！》，他答应来掌勺。"}}, {"q": {"en": "What gift does Benjamin give to Geronimo?", "zh": "本杰明送给了杰罗尼摩什么礼物？"}, "options": [{"en": "A red clay heart paperweight", "zh": "一个红色黏土爱心镇纸"}, {"en": "A stuffed cat", "zh": "一只毛绒猫"}, {"en": "A new camera", "zh": "一台新相机"}, {"en": "A cookbook", "zh": "一本烹饪书"}], "answer": 0, "explain": {"en": "Inside the wrapping is a small red clay heart painted with Benjamin's initials, B.S., meant as a desk paperweight.", "zh": "包装里是一个涂成红色的黏土小爱心，刻着本杰明的姓名首字母，是给他当镇纸用的。"}}, {"q": {"en": "Who is the young mouse that Benjamin befriends at the park?", "zh": "本杰明在公园里交的朋友是哪只小老鼠？"}, "options": [{"en": "Nibblette", "zh": "妮布蕾特"}, {"en": "Pinky Pick", "zh": "平基·皮克"}, {"en": "Merenguita Gingermouse", "zh": "梅伦吉塔·姜鼠"}, {"en": "Cheesita de la Pampa", "zh": "潘帕的芝士塔"}], "answer": 0, "explain": {"en": "Benjamin stands up to a bully and then walks home with the shy young mouse named Nibblette.", "zh": "本杰明挺身对付小恶霸，之后和那只害羞的小老鼠妮布蕾特一起走回家。"}}, {"q": {"en": "What does Geronimo slip on and faint after the chocolate cleanup?", "zh": "收拾完巧克力后，杰罗尼摩踩到什么摔了一跤还晕了过去？"}, "options": [{"en": "A Ratbury Ratball", "zh": "一个鼠堡巧克力球"}, {"en": "A banana peel", "zh": "一根香蕉皮"}, {"en": "A toy sled", "zh": "一辆玩具雪橇"}, {"en": "A block of ice", "zh": "一块冰"}], "answer": 0, "explain": {"en": "He thinks it was the last Ratball, but slips on one more, mutters 'It wasn't the last one,' and faints.", "zh": "他以为那是最后一个巧克力球，却踩到另一个滑倒，嘟囔着“还不是最后一个”，然后就晕了。"}}, {"q": {"en": "Who takes charge and saves Geronimo's Christmas Eve party?", "zh": "是谁挑起大梁，救下了杰罗尼摩的圣诞前夜派对？"}, "options": [{"en": "His sister Thea", "zh": "他的妹妹茜亚"}, {"en": "The night watchmouse", "zh": "守夜老鼠"}, {"en": "The mayor", "zh": "市长"}, {"en": "His aunt Sweetfur", "zh": "他的姑姑甜毛"}], "answer": 0, "explain": {"en": "Thea jumps on the TV stand, barks out orders, and organizes Trap's friends to fix the house before guests arrive.", "zh": "茜亚跳上电视机柜大声发号施令，组织特拉普的朋友们在客人到来前把房子收拾好。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
