<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Way of the Samurai — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#49 · The Way of the Samurai</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: The Way of the Samurai</em> (Scholastic, 2006) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who calls Geronimo on a Saturday night and drags him into a new adventure?", "zh": "是谁在周六晚上打电话给杰罗尼摩，把他拉进一场新冒险的？"}, "options": [{"en": "Wild Willie, a treasure-hunting friend", "zh": "他的寻宝朋友野威利"}, {"en": "His sister Thea", "zh": "他的妹妹蒂娅"}, {"en": "His cousin Trap", "zh": "他的表哥特拉普"}, {"en": "His nephew Benjamin", "zh": "他的侄子本杰明"}], "answer": 0, "explain": {"en": "Wild Willie phones Geronimo at home and orders him to meet at South Paw Square for an adventure.", "zh": "野威利在家里打电话给杰罗尼摩，命令他到爪爪广场见面，开始一场冒险。"}}, {"q": {"en": "Where does Wild Willie tell Geronimo to meet him that night?", "zh": "野威利让杰罗尼摩当晚去哪里和他碰面？"}, "options": [{"en": "18 South Paw Square", "zh": "爪爪广场18号"}, {"en": "The Rodent's Gazette office", "zh": "《鼠民公报》报社"}, {"en": "New Mouse City airport", "zh": "新老鼠城机场"}, {"en": "The Slice Rat pizzeria", "zh": "奶酪鼠披萨店"}], "answer": 0, "explain": {"en": "Willie says, 'meet me tonight at eight thirty at 18 South Paw Square.'", "zh": "野威利说：“今晚八点半到爪爪广场18号来见我。”"}}, {"q": {"en": "What is Wild Willie's secret karate name, shown by his tattoo?", "zh": "野威利在空手道中的秘密名字是什么？他的纹身也显示了这一点。"}, "options": [{"en": "Red Dragon", "zh": "红龙"}, {"en": "Black Panther", "zh": "黑豹"}, {"en": "White Tiger", "zh": "白虎"}, {"en": "Blue Falcon", "zh": "蓝隼"}], "answer": 0, "explain": {"en": "Wild Willie rolls up his sleeve to reveal a red dragon tattoo and tells his teacher, 'I am RED DRAGON.'", "zh": "野威利卷起袖子，露出一条红龙的纹身，并对师傅说：“我就是红龙。”"}}, {"q": {"en": "Who are Chop Chop and Lotus Snout in the story?", "zh": "故事里的乔普·乔普和莲花鼻是谁？"}, "options": [{"en": "The owners of the karate dojo", "zh": "那间空手道场的主人"}, {"en": "Geronimo's cousins", "zh": "杰罗尼摩的表兄弟"}, {"en": "Spies working for the ninja", "zh": "为忍者工作的间谍"}, {"en": "The shogun of the castle", "zh": "城堡里的将军"}], "answer": 0, "explain": {"en": "Willie warns Geronimo not to embarrass himself in front of his friends Chop Chop and Lotus Snout, adding, 'It's their dojo.'", "zh": "野威利提醒杰罗尼摩别在朋友乔普·乔普和莲花鼻面前丢脸，并说：“这是他们的道场。”"}}, {"q": {"en": "What is wasabi, the green paste Geronimo eats by mistake?", "zh": "杰罗尼摩误吃的那团绿色酱料“山葵”到底是什么？"}, "options": [{"en": "A very spicy Japanese paste like horseradish", "zh": "一种像辣根一样非常辛辣的日式酱料"}, {"en": "A sweet fruit jam", "zh": "一种甜甜的水果酱"}, {"en": "A kind of cheese", "zh": "一种奶酪"}, {"en": "A vanilla milkshake", "zh": "一种香草奶昔"}], "answer": 0, "explain": {"en": "The book explains wasabi is a very spicy Japanese paste made from a greenish root, similar in flavor to horseradish.", "zh": "书中说明，山葵是一种用绿色根茎制成的非常辛辣的日式酱料，味道类似辣根。"}}, {"q": {"en": "What happens after Geronimo swallows the wasabi?", "zh": "杰罗尼摩吞下山葵后发生了什么？"}, "options": [{"en": "Flames shoot from his mouth and burn Shrewdpaws's toupee", "zh": "火苗从他嘴里喷出来，烧着了精明爪的假发"}, {"en": "He falls fast asleep", "zh": "他立刻睡着了"}, {"en": "He turns bright green", "zh": "他变成了鲜绿色"}, {"en": "He wins a karate match", "zh": "他赢了一场空手道比赛"}], "answer": 0, "explain": {"en": "The wasabi is so spicy that flames shoot out of Geronimo's mouth and set Shrewdpaws's toupee on fire; Willie pours tea on his head.", "zh": "山葵太辣了，火苗从杰罗尼摩嘴里喷出，烧着了精明爪的假发；野威利用茶浇在他的头上灭火。"}}, {"q": {"en": "What is the capital of Japan, where the friends first arrive?", "zh": "朋友们首先到达的日本首都是哪里？"}, "options": [{"en": "Tokyo", "zh": "东京"}, {"en": "Okinawa", "zh": "冲绳"}, {"en": "Nagoya", "zh": "名古屋"}, {"en": "Naha", "zh": "那霸"}], "answer": 0, "explain": {"en": "They fly to Tokyo, the capital of Japan, and admire its skyscrapers before heading south to Okinawa.", "zh": "他们飞到日本的首都东京，欣赏完摩天大楼后，再往南前往冲绳。"}}, {"q": {"en": "How fast can the Japanese bullet train, the Shinkansen, travel?", "zh": "日本的子弹头列车“新干线”能跑多快？"}, "options": [{"en": "About 186 miles per hour", "zh": "大约每小时186英里"}, {"en": "About 30 miles per hour", "zh": "大约每小时30英里"}, {"en": "About 500 miles per hour", "zh": "大约每小时500英里"}, {"en": "About 10 miles per hour", "zh": "大约每小时10英里"}], "answer": 0, "explain": {"en": "Chop Chop tells Geronimo the Shinkansen, or bullet train, travels as fast as 186 miles an hour.", "zh": "乔普·乔普告诉杰罗尼摩，新干线这种子弹头列车时速可达186英里。"}}, {"q": {"en": "In Geronimo's dream, who makes him a real samurai?", "zh": "在杰罗尼摩的梦里，是谁封他为真正的武士的？"}, "options": [{"en": "Shogun Hanshi", "zh": "汉希将军"}, {"en": "Noblemouse", "zh": "高贵鼠"}, {"en": "Shrewdpaws", "zh": "精明爪"}, {"en": "Wild Willie", "zh": "野威利"}], "answer": 0, "explain": {"en": "In the dream, the shogun Hanshi declares, 'You are now a samurai!' after Geronimo promises to follow the way of the samurai.", "zh": "在梦里，汉希将军在杰罗尼摩发誓遵循武士之道后，宣布：“你现在是一名武士了！”"}}, {"q": {"en": "What ancient karate technique does the secret parchment teach?", "zh": "那张秘密羊皮卷传授的古老空手道技巧是什么？"}, "options": [{"en": "Tuite, a pressure-point self-defense art", "zh": "一种按压穴位防身的点穴术"}, {"en": "Swimming", "zh": "游泳"}, {"en": "Cooking", "zh": "烹饪"}, {"en": "Painting", "zh": "绘画"}], "answer": 0, "explain": {"en": "Willie translates the parchment and names the technique 'Tuite,' which uses pressure points so the weak can overcome the strong.", "zh": "野威利翻译羊皮卷，把这种技巧叫作“点穴术”，靠按压穴位让弱小者也能制服强者。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
