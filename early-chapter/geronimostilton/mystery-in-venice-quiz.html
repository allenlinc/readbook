<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Mystery in Venice — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#48 · The Mystery in Venice</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: The Mystery in Venice</em> (Scholastic, 2005) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "In which Italian city does most of this mystery take place?", "zh": "这个故事的大部分谜团发生在意大利的哪座城市？"}, "options": [{"en": "Venice", "zh": "威尼斯"}, {"en": "Rome", "zh": "罗马"}, {"en": "New Mouse City", "zh": "新老鼠城"}, {"en": "Mouseport", "zh": "老鼠港"}], "answer": 0, "explain": {"en": "Geronimo flies to Venice, Italy, and visits the islands of Murano and the canals of the city to solve the mystery.", "zh": "杰罗尼摩飞到意大利的威尼斯，并前往穆拉诺岛和城里的运河去解开谜团。"}}, {"q": {"en": "What did Geronimo find hidden inside the broken crystal gondola?", "zh": "杰罗尼摩在那只破掉的水晶贡多拉里发现了什么？"}, "options": [{"en": "A rolled-up note that said 'HELP! SAVE ME!'", "zh": "一张卷起来的纸条，上面写着“救命！救救我！”"}, {"en": "A golden diamond ring", "zh": "一枚黄金钻石戒指"}, {"en": "A map of Mouse Island", "zh": "一张老鼠岛地图"}, {"en": "A photograph of Petunia", "zh": "一张佩图妮娅的照片"}], "answer": 0, "explain": {"en": "After Trap breaks the gondola, Geronimo finds a piece of rolled-up paper inside with a dramatic call for help.", "zh": "特拉普打碎贡多拉后，杰罗尼摩在里头发现了一张卷起来的纸，上面是一封紧急求救信。"}}, {"q": {"en": "Who wrote the hidden note and was locked in the attic?", "zh": "是谁写了那张隐藏的纸条，并被锁在阁楼上？"}, "options": [{"en": "Hope, Stuart Sharpwhisker's niece", "zh": "霍普，斯图尔特·尖须的侄女"}, {"en": "Petunia Pretty Paws", "zh": "佩图妮娅·美爪"}, {"en": "Thea Stilton", "zh": "茜薇娅·斯蒂顿"}, {"en": "Mildred the busybody", "zh": "爱管闲事的米尔德丽德"}], "answer": 0, "explain": {"en": "Geronimo finds Hope in the attic; she admits she wrote the note because she was desperate for help about marrying Arnold.", "zh": "杰罗尼摩在阁楼里找到霍普，她承认纸条是自己写的，因为她迫切 needing help 才能和阿诺德结婚。"}}, {"q": {"en": "On which island, famous for glass, was the crystal gondola made?", "zh": "那只水晶贡多拉是在以玻璃闻名的哪座岛上制作的？"}, "options": [{"en": "Sicily", "zh": "西西里岛"}, {"en": "Murano, near Venice", "zh": "威尼斯附近的穆拉诺岛"}, {"en": "Swiss Alps", "zh": "瑞士阿尔卑斯山"}, {"en": "New Mouse City", "zh": "新老鼠城"}], "answer": 1, "explain": {"en": "The certificate of authenticity said 'Authentic Murano Crystal,' meaning it was made on the island of Murano in Venice.", "zh": "真品证书上写着“正宗穆拉诺水晶”，说明它是在威尼斯穆拉诺岛上制作的。"}}, {"q": {"en": "Who is the clingy 'rodent of my nightmares' that chases Geronimo in Venice?", "zh": "在威尼斯追着杰罗尼摩跑、被他称为“噩梦老鼠”的缠人老鼠是谁？"}, "options": [{"en": "A strange lady mouse wearing a pink polka-dot hat", "zh": "一只戴着粉色圆点帽的陌生鼠小姐"}, {"en": "His cousin Trap", "zh": "他的表哥特拉普"}, {"en": "The hotel manager", "zh": "旅馆经理"}, {"en": "Dr. Tina Louise Cuddlefur", "zh": "蒂娜·路易丝·抱抱毛医生"}], "answer": 0, "explain": {"en": "A lady mouse with big fake eyelashes and a pink polka-dot hat keeps calling Geronimo 'my darling' and chasing him through Venice.", "zh": "一位长着假睫毛、戴着粉色圆点帽的鼠小姐一直叫杰罗尼摩“亲爱的”，在威尼斯到处追着他跑。"}}, {"q": {"en": "What does Geronimo promise Stuart Sharpwhisker he will do in exchange for Hope's marriage?", "zh": "为了换取霍普能结婚，杰罗尼摩向斯图尔特·尖须承诺会做什么？"}, "options": [{"en": "Buy him a new hotel", "zh": "给他买一座新旅馆"}, {"en": "Write a book about him", "zh": "为他写一本书"}, {"en": "Win the gondola race for him", "zh": "替他赢下贡多拉比赛"}, {"en": "Fix the broken crystal gondola", "zh": "把破掉的水晶贡多拉修好"}], "answer": 2, "explain": {"en": "Geronimo makes a deal: if he wins the next gondola race for Sharpwhisker, the uncle must let Hope marry Arnold.", "zh": "杰罗尼摩和尖须达成交易：如果他替尖须赢下下一场贡多拉比赛，这位叔叔就必须让霍普嫁给阿诺德。"}}, {"q": {"en": "What is the name of Stuart Sharpwhisker's glass shop?", "zh": "斯图尔特·尖须的玻璃店叫什么名字？"}, "options": [{"en": "Whales and Tails by the Sea", "zh": "海边鲸鱼与尾巴旅馆"}, {"en": "The Rodent's Gazette", "zh": "鼠民公报"}, {"en": "Sharpwhisker's House of Glass", "zh": "尖须玻璃屋"}, {"en": "The Flea Market", "zh": "跳蚤市场"}], "answer": 2, "explain": {"en": "The shop where Geronimo is hired as an apprentice is called 'Sharpwhisker's House of Glass' on the island of Murano.", "zh": "杰罗尼摩被雇为学徒的那家店，在穆拉诺岛上叫做“尖须玻璃屋”。"}}, {"q": {"en": "Which very light and slim boat is used in the champions' race at the Venetian regatta?", "zh": "在威尼斯赛船节的冠军赛中，使用的是哪种又轻又窄的船？"}, "options": [{"en": "The Bucintoro luxury boat", "zh": "布辛托罗豪华船"}, {"en": "The gondolini boats", "zh": "贡多里尼船"}, {"en": "A large transport barge", "zh": "大型运输驳船"}, {"en": "A mask-shaped boat", "zh": "面具形状的船"}], "answer": 1, "explain": {"en": "The book explains the champions' race uses two-oared gondolini boats, which are very light and slim.", "zh": "书中说明，冠军赛使用的是双桨贡多里尼船，这种船非常轻巧又窄长。"}}, {"q": {"en": "Under which famous Venice bridge does Geronimo hide after being tossed in the canal?", "zh": "杰罗尼摩被扔进运河后，躲在威尼斯哪座著名桥下？"}, "options": [{"en": "The Rialto Bridge", "zh": "里亚托桥"}, {"en": "The Bridge of Sighs", "zh": "叹息桥"}, {"en": "The Golden Bridge", "zh": "黄金桥"}, {"en": "The Mouse Bridge", "zh": "老鼠桥"}], "answer": 1, "explain": {"en": "After the taxi driver throws him in the water, Geronimo hides under the Bridge of Sighs until evening.", "zh": "出租车司机把他扔进水里后，杰罗尼摩一直躲在叹息桥下，直到天黑。"}}, {"q": {"en": "Who gives Geronimo and his friends the beautiful racing gondola?", "zh": "是谁把那艘漂亮的比赛用贡多拉送给了杰罗尼摩和朋友们？"}, "options": [{"en": "Stuart Sharpwhisker", "zh": "斯图尔特·尖须"}, {"en": "Hope, and it was made by Arnold", "zh": "霍普，而且它是由阿诺德制作的"}, {"en": "Petunia Pretty Paws", "zh": "佩图妮娅·美爪"}, {"en": "Bugsy Wugsy", "zh": "巴格西·武格西"}], "answer": 1, "explain": {"en": "Hope rows up in a sleek yellow gondola made by her beloved Arnold, the amazing carpenter, and offers it to Geronimo's team.", "zh": "霍普划着一艘由她心爱的阿诺德（了不起的木匠）制作的亮黄色贡多拉过来，把它送给了杰罗尼摩的队伍。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
