<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>It's Halloween, You 'Fraidy Mouse! — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#11 · It's Halloween, You 'Fraidy Mouse!</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: It's Halloween, You 'Fraidy Mouse!</em> (Scholastic, 2001) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who is the mouse telling this story?", "zh": "这个故事是由哪只老鼠讲述的？"}, "options": [{"en": "Geronimo Stilton", "zh": "杰罗尼摩·斯蒂顿"}, {"en": "His cousin Trap", "zh": "他的表哥特拉普"}, {"en": "His sister Thea", "zh": "他的妹妹茜亚"}, {"en": "His nephew Benjamin", "zh": "他的侄子本杰明"}], "answer": 0, "explain": {"en": "The book begins with 'My name is Stilton, Geronimo Stilton,' and he is the narrator throughout.", "zh": "书一开头就写道“我的名字是斯蒂顿，杰罗尼摩·斯蒂顿”，而且整本书都由他来讲述。"}}, {"q": {"en": "What is The Rodent's Gazette?", "zh": "《老鼠日报》是什么？"}, "options": [{"en": "A newspaper Geronimo publishes", "zh": "杰罗尼摩出版的一份报纸"}, {"en": "A shop that sells cheese", "zh": "一家卖奶酪的商店"}, {"en": "A Halloween costume store", "zh": "一家万圣节服装店"}, {"en": "A school for young mice", "zh": "一所小老鼠上的学校"}], "answer": 0, "explain": {"en": "Geronimo says he is a writer and the publisher of The Rodent's Gazette, the best newspaper on Mouse Island.", "zh": "杰罗尼摩说自己是作家，也是《老鼠日报》的出版人，那是老鼠岛上最好的报纸。"}}, {"q": {"en": "Who scares Geronimo in his office with a skull, fake blood, and a skeleton costume?", "zh": "是谁在办公室里用骷髅、假血和骷髅骨架服装吓唬杰罗尼摩？"}, "options": [{"en": "His cousin Trap", "zh": "他的表哥特拉普"}, {"en": "His sister Thea", "zh": "他的妹妹茜亚"}, {"en": "The night watchmouse Fuzzy", "zh": "守夜老鼠弗吉"}, {"en": "His nephew Benjamin", "zh": "他的侄子本杰明"}], "answer": 0, "explain": {"en": "Trap admits it was him in a skeleton costume saying 'Trick or treat?' and rates his own scary tricks.", "zh": "特拉普承认是自己穿着骷髅骨架服装说“不给糖就捣蛋？”，还给自己设计的吓人把戏打分。"}}, {"q": {"en": "Who tells Geronimo he must write a Halloween book in just twenty-four hours?", "zh": "是谁要求杰罗尼摩必须在二十四小时内写出一本万圣节的书？"}, "options": [{"en": "His sister Thea", "zh": "他的妹妹茜亚"}, {"en": "His cousin Trap", "zh": "他的表哥特拉普"}, {"en": "His assistant Pinky Pick", "zh": "他的助手平基·皮克"}, {"en": "Creepella von Cacklefur", "zh": "克里普拉·冯·卡克佛"}], "answer": 0, "explain": {"en": "Thea comes to his mouse hole and declares that, as a writer, he must write the Halloween book fast.", "zh": "茜亚来到他的老鼠洞，说身为作家的他必须赶快把这本万圣节的书写出来。"}}, {"q": {"en": "Where does Cousin Trap work while testing Halloween tricks?", "zh": "表哥特拉普在哪儿一边测试万圣节把戏一边工作？"}, "options": [{"en": "At a store called Tricks for Tails", "zh": "一家名叫“尾巴魔术”的商店"}, {"en": "At The Rodent's Gazette", "zh": "在《老鼠日报》社"}, {"en": "At Fabumouse Funerals", "zh": "在“妙鼠殡仪馆”"}, {"en": "At a cheese bakery", "zh": "在一家奶酪面包店"}], "answer": 0, "explain": {"en": "Trap works with his friend Paws Prankster at Tricks for Tails, a store full of gag gifts and practical jokes.", "zh": "特拉普和朋友爪子·恶作剧在“尾巴魔术”店工作，那是一家满是搞笑礼物和恶作剧道具的商店。"}}, {"q": {"en": "Who is Creepella von Cacklefur?", "zh": "克里普拉·冯·卡克佛是谁？"}, "options": [{"en": "A mouse who lives in a tomb and has a crush on Geronimo", "zh": "一只住在墓穴里、还喜欢杰罗尼摩的老鼠"}, {"en": "Geronimo's sister", "zh": "杰罗尼摩的妹妹"}, {"en": "A famous chef in New Mouse City", "zh": "新鼠城一位有名的厨师"}, {"en": "The night watchmouse at the office", "zh": "办公室里的守夜老鼠"}], "answer": 0, "explain": {"en": "Creepella lives at 33 Dark Grave Drive in a tomb and Benjamin says she has a crush on Geronimo.", "zh": "克里普拉住在暗坟道33号的一座墓穴里，本杰明还说她喜欢上了杰罗尼摩。"}}, {"q": {"en": "Who cooks the scary-looking Halloween meal for the party?", "zh": "是谁为派对做了那些看起来很吓人的万圣节大餐？"}, "options": [{"en": "Tina Spicytail, Grandfather's cook", "zh": "爷爷的厨师蒂娜·辣尾"}, {"en": "Chef Saucy Le Paws", "zh": "厨师索西·勒波"}, {"en": "Pinky Pick", "zh": "平基·皮克"}, {"en": "Benjamin", "zh": "本杰明"}], "answer": 0, "explain": {"en": "Geronimo calls Tina Spicytail, his grandfather William Shortpaws's cook, and she makes the whole menu.", "zh": "杰罗尼摩打电话给爷爷威廉·短爪的厨师蒂娜·辣尾，整桌菜都是她做的。"}}, {"q": {"en": "In the Halloween book, what are 'Slippery Sewer Slugs' really made of?", "zh": "在万圣节的书里，“滑溜溜的下水道蛞蝓”其实是用什么做的？"}, "options": [{"en": "Penne pasta", "zh": "笔管面"}, {"en": "Real slugs", "zh": "真正的蛞蝓"}, {"en": "Wiggly worms", "zh": "扭动的蚯蚓"}, {"en": "Moldy cheese", "zh": "发霉的奶酪"}], "answer": 0, "explain": {"en": "Geronimo explains to Tina that sewer slugs are really just penne pasta, and bats' eyes are cherry tomatoes.", "zh": "杰罗尼摩向蒂娜解释，下水道蛞蝓其实就是笔管面，蝙蝠眼睛则是樱桃番茄。"}}, {"q": {"en": "Where does Creepella hold the Halloween party on October 31?", "zh": "十月三十一日，克里普拉把万圣节派对办在哪里？"}, "options": [{"en": "In her crypt (tomb)", "zh": "在她的墓穴里"}, {"en": "At The Rodent's Gazette office", "zh": "在《老鼠日报》办公室"}, {"en": "In Tina's kitchen", "zh": "在蒂娜的厨房"}, {"en": "At Tricks for Tails", "zh": "在“尾巴魔术”商店"}], "answer": 0, "explain": {"en": "Creepella says 'We'll have a Halloween party here at my crypt!' and the guests arrive there on Halloween night.", "zh": "克里普拉说“我们就在我的墓穴里办万圣节派对吧！”，宾客们果然在万圣节夜晚来到那里。"}}, {"q": {"en": "How does Geronimo finally escape from Creepella at the end?", "zh": "最后杰罗尼摩是如何从克里普拉身边脱身的？"}, "options": [{"en": "He pretends he has an emergency dentist appointment", "zh": "他假装自己有紧急的牙医预约"}, {"en": "He runs away with Trap", "zh": "他跟着特拉普一起跑掉"}, {"en": "He hides inside a coffin", "zh": "他躲进一口棺材里"}, {"en": "He calls the police", "zh": "他报了警"}], "answer": 0, "explain": {"en": "To avoid going to Transratania with her, Geronimo says he must leave for an emergency dentist appointment.", "zh": "为了不被她拉去特兰鼠尼亚，杰罗尼摩说自己得马上去赴一个紧急的牙医预约。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
