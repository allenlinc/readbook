<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surf's Up, Geronimo! — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#20 · Surf's Up, Geronimo!</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: Surf's Up, Geronimo!</em> (Scholastic, 2002) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who is Geronimo Stilton?", "zh": "杰罗尼摩·斯蒂顿是谁？"}, "options": [{"en": "The publisher of The Rodent's Gazette", "zh": "《老鼠公报》的出版人"}, {"en": "A travel agent in New Mouse City", "zh": "新鼠城的一名旅行代理人"}, {"en": "Geronimo's obnoxious cousin", "zh": "杰罗尼摩那个讨厌的表哥"}, {"en": "The lifeguard at Rathole Hotel Beach", "zh": "鼠洞酒店海滩的救生员"}], "answer": 0, "explain": {"en": "He introduces himself as the publisher of The Rodent's Gazette, the most popular paper on Mouse Island.", "zh": "书中他自我介绍是《老鼠公报》的出版人，那是鼠岛上最受欢迎的报纸。"}}, {"q": {"en": "Which cousin tricks Geronimo into taking a bad vacation?", "zh": "是哪个表哥把杰罗尼摩骗去度一个糟糕的假？"}, "options": [{"en": "Trap", "zh": "特拉普"}, {"en": "Benjamin", "zh": "本杰明"}, {"en": "Slowpoke", "zh": "斯洛波克"}, {"en": "Wimpy Whiskers", "zh": "温皮·胡须"}], "answer": 0, "explain": {"en": "Trap pulls Geronimo's tail and takes him to Smoothie Slickpaws's shabby travel agency in a dark alley.", "zh": "特拉普拽住杰罗尼摩的尾巴，把他带到了斯莫基·斯利克保斯那家开在漆黑小巷里的破旧旅行社。"}}, {"q": {"en": "What is the name of Smoothie Slickpaws's travel agency?", "zh": "斯莫基·斯利克保斯的旅行社叫什么名字？"}, "options": [{"en": "Trust Me, You'll Like It!", "zh": "相信我，你会喜欢的！"}, {"en": "Kick Up Your Paws", "zh": "翘起你的爪子"}, {"en": "The Rodent's Gazette", "zh": "老鼠公报"}, {"en": "Rathole Hotel", "zh": "鼠洞酒店"}], "answer": 0, "explain": {"en": "It's a shabby agency in a dark alley, far from the main streets of New Mouse City.", "zh": "那是新鼠城主街远处一条漆黑小巷里一家破旧的旅行社。"}}, {"q": {"en": "What airline does Geronimo fly to the island?", "zh": "杰罗尼摩乘坐哪家航空公司的飞机去岛上？"}, "options": [{"en": "Last Gasp Airways", "zh": "最后一口气航空"}, {"en": "Kick Up Your Paws Air", "zh": "翘爪航空"}, {"en": "Rathole Airlines", "zh": "鼠洞航空"}, {"en": "Mouse Island Express", "zh": "鼠岛快线"}], "answer": 0, "explain": {"en": "He had never flown Last Gasp Airways before; the seats were old and worn with dust balls in the aisle.", "zh": "他以前从没坐过最后一口气航空，飞机座椅又旧又破，过道里还有灰尘团。"}}, {"q": {"en": "What is the name of the island Geronimo visits?", "zh": "杰罗尼摩去度假的岛叫什么名字？"}, "options": [{"en": "San Shabby Fur Island", "zh": "邋遢毛岛"}, {"en": "Mouse Island", "zh": "鼠岛"}, {"en": "Quack Islands", "zh": "嘎嘎岛"}, {"en": "Tomcat Island", "zh": "猫岛"}], "answer": 0, "explain": {"en": "His flight arrives at San Shabby Fur Island, where the weather is either pouring rain or extremely hot.", "zh": "他的航班抵达邋遢毛岛，那里天气要么下大雨，要么热得能烤熟皮毛。"}}, {"q": {"en": "What room number is Geronimo given at the Rathole Hotel?", "zh": "杰罗尼摩在鼠洞酒店被分到几号房间？"}, "options": [{"en": "313", "zh": "313"}, {"en": "101", "zh": "101"}, {"en": "202", "zh": "202"}, {"en": "404", "zh": "404"}], "answer": 0, "explain": {"en": "He stays in room 313 and is a little superstitious about the unlucky number thirteen.", "zh": "他住313房间，对不吉利的数字13有点迷信。"}}, {"q": {"en": "What is Geronimo's 'personalized transfer' from the airport?", "zh": "杰罗尼摩从机场得到的“专属接送”是什么？"}, "options": [{"en": "A bicycle he must pedal twenty miles in the rain", "zh": "一辆要他在雨中蹬二十英里的自行车"}, {"en": "A free taxi ride", "zh": "一次免费出租车"}, {"en": "A private helicopter", "zh": "一架私人直升机"}, {"en": "A luxury bus", "zh": "一辆豪华巴士"}], "answer": 0, "explain": {"en": "The note says the personalized transfer means he must pedal the bike himself to the hotel, twenty miles away in the pouring rain.", "zh": "纸条上写着专属接送就是他自己蹬自行车去二十英里外的酒店，当时还下着大雨。"}}, {"q": {"en": "Who is the noisy young mouselet that bothers Geronimo on the plane?", "zh": "在飞机上一直吵闹烦扰杰罗尼摩的小老鼠是谁？"}, "options": [{"en": "Bratfur", "zh": "布拉特弗"}, {"en": "Benjamin", "zh": "本杰明"}, {"en": "Smoothie", "zh": "斯莫基"}, {"en": "Crusher", "zh": "克拉舍"}], "answer": 0, "explain": {"en": "Bratfur sits next to Geronimo, asks endless questions, and even steals his cream cheese candy.", "zh": "布拉特弗坐在杰罗尼摩旁边，不停地问问题，还偷走了他的奶油奶酪糖。"}}, {"q": {"en": "Who saves Geronimo when a shark appears while he is swimming?", "zh": "杰罗尼摩游泳时遇到鲨鱼，是谁救了他？"}, "options": [{"en": "Crusher the lifeguard", "zh": "救生员克拉舍"}, {"en": "Trap", "zh": "特拉普"}, {"en": "Smoothie Slickpaws", "zh": "斯莫基·斯利克保斯"}, {"en": "Bratfur", "zh": "布拉特弗"}], "answer": 0, "explain": {"en": "Crusher, the muscle-bound lifeguard, reaches out and pulls Geronimo onto the boat just in time.", "zh": "肌肉发达的救生员克拉舍伸出爪子，及时把杰罗尼摩拉上了船。"}}, {"q": {"en": "Who really signed Geronimo up for the extreme sports like bungee jumping?", "zh": "到底是谁把杰罗尼摩报名去蹦极等极限运动的？"}, "options": [{"en": "Bratfur, writing Geronimo's name on the board", "zh": "布拉特弗，他在板上写下了杰罗尼摩的名字"}, {"en": "The hotel manager", "zh": "酒店经理"}, {"en": "Crusher the lifeguard", "zh": "救生员克拉舍"}, {"en": "His sister Thea", "zh": "他的妹妹西娅"}], "answer": 0, "explain": {"en": "Geronimo sneaks up and sees Bratfur scribbling his name after every activity on the Extreme Sports board.", "zh": "杰罗尼摩悄悄走上前，发现布拉特弗在“极限运动板”上每项活动后面都写上了他的名字。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
