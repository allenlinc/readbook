<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Mona Mousa Code — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#15 · The Mona Mousa Code</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: The Mona Mousa Code</em> (Scholastic, 2004) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who painted the famous Mona Mousa portrait?", "zh": "那幅著名的《蒙娜·穆萨》画像是谁画的？"}, "options": [{"en": "Mousardo da Munchie", "zh": "穆萨尔多·达·蒙奇"}, {"en": "Botticheddar", "zh": "波提切达"}, {"en": "Jan van Edam", "zh": "扬·范·伊丹"}, {"en": "Ratty Mousehol", "zh": "鼠毛·拉蒂"}], "answer": 0, "explain": {"en": "Geronimo tells Benjamin the portrait was painted in 1504 by the great painter and scientist Mousardo da Munchie.", "zh": "杰罗尼摩告诉本杰明，这幅画像是在1504年由伟大的画家兼科学家穆萨尔多·达·蒙奇画的。"}}, {"q": {"en": "How does Thea read the hidden backwards writing on the CD?", "zh": "茜亚是用什么办法读出光盘上那段反着写的文字的？"}, "options": [{"en": "By holding a mirror in front of it", "zh": "把一面镜子放在文字前面"}, {"en": "By turning the screen upside down", "zh": "把屏幕倒过来"}, {"en": "By reading it backwards aloud", "zh": "倒着念出来"}, {"en": "By using a magnifying glass", "zh": "用放大镜看"}], "answer": 0, "explain": {"en": "Thea takes a mirror from her purse and places it in front of the writing, and the words become clear.", "zh": "茜亚从包里拿出一面镜子放在文字前，那些字一下子就变清楚了。"}}, {"q": {"en": "What is hidden underneath the Mona Mousa painting?", "zh": "《蒙娜·穆萨》画像的下面还藏着什么？"}, "options": [{"en": "Another painting showing eleven objects", "zh": "另一幅画，画着十一个物件"}, {"en": "A pile of gold coins", "zh": "一堆金币"}, {"en": "A map of Mouse Island", "zh": "一张老鼠岛地图"}, {"en": "A secret letter", "zh": "一封秘密信"}], "answer": 0, "explain": {"en": "Frick discovers another painting underneath, and the X-ray shows eleven mysterious objects on it.", "zh": "弗里克发现画像下面还有一幅画，透视片显示上面有十一个神秘的物件。"}}, {"q": {"en": "How many places and letters are in the secret code?", "zh": "这个秘密密码里一共有多少个地点和字母？"}, "options": [{"en": "Eleven", "zh": "十一个"}, {"en": "Three", "zh": "三个"}, {"en": "Seven", "zh": "七个"}, {"en": "Twenty", "zh": "二十个"}], "answer": 0, "explain": {"en": "The rhyme says 'ELEVEN PLACES ARE YOURS TO FIND, ELEVEN LETTERS YOU MUST COMBINE.'", "zh": "那首诗写道：“十一个地点等你寻找，十一个字母你要组合。”"}}, {"q": {"en": "What single word do the eleven letters spell?", "zh": "那十一个字母拼出的那个词是什么？"}, "options": [{"en": "Labyrinthus", "zh": "迷宫图书馆"}, {"en": "Mouse Island", "zh": "老鼠岛"}, {"en": "Cheese Cake", "zh": "芝士蛋糕"}, {"en": "Geronimo", "zh": "杰罗尼摩"}], "answer": 0, "explain": {"en": "The letters Y I H T B R L A S N U rearrange to spell LABYRINTHUS, an ancient hidden library.", "zh": "这十一个字母重新排列后拼出“迷宫图书馆”，那是一座被藏起来的古代图书馆。"}}, {"q": {"en": "Where is the Labyrinthus hidden?", "zh": "迷宫图书馆被藏在哪里？"}, "options": [{"en": "Under Singing Stone Plaza", "zh": "在鸣石广场的地下"}, {"en": "Inside the mouseum", "zh": "在博物馆里面"}, {"en": "On top of a mountain", "zh": "在山顶上"}, {"en": "Under the ocean", "zh": "在海底"}], "answer": 0, "explain": {"en": "The obelisk at Singing Stone Plaza flips over and reveals a building etched with the word LABYRINTHUS.", "zh": "鸣石广场上的方尖碑翻转过来，露出一座刻着“迷宫图书馆”字样的建筑。"}}, {"q": {"en": "Who is Thea's boyfriend who works as the mouseum's art expert?", "zh": "茜亚那位在博物馆当艺术专家的男朋友是谁？"}, "options": [{"en": "Frick Tapioca", "zh": "弗里克·木薯"}, {"en": "Simeon Starchfur", "zh": "西蒙·淀粉毛"}, {"en": "Arty Fartsyfur", "zh": "阿蒂·附庸风雅毛"}, {"en": "Steven Spielmouse", "zh": "史蒂文·斯皮尔鼠"}], "answer": 0, "explain": {"en": "Frick Tapioca is Thea's current boyfriend and the mouseum's art expert who examines the X-ray.", "zh": "弗里克·木薯是茜亚现在的男朋友，也是博物馆里研究那张透视片的艺术专家。"}}, {"q": {"en": "Which letter is found at the Fountain of Cheddar in the cheese factory?", "zh": "在奶酪厂的切达喷泉边找到的是哪个字母？"}, "options": [{"en": "The letter B", "zh": "字母B"}, {"en": "The letter X", "zh": "字母X"}, {"en": "The letter M", "zh": "字母M"}, {"en": "The letter Z", "zh": "字母Z"}], "answer": 0, "explain": {"en": "Benjamin points out that the decoration around the rim of the fountain looks like lots of B's in a row.", "zh": "本杰明发现喷泉边沿的装饰看起来像一连串的字母B。"}}, {"q": {"en": "What letter is engraved on the Cat's Rock at the amusement park?", "zh": "游乐园里那块“猫之石”上刻着哪个字母？"}, "options": [{"en": "The letter R", "zh": "字母R"}, {"en": "The letter C", "zh": "字母C"}, {"en": "The letter K", "zh": "字母K"}, {"en": "The letter O", "zh": "字母O"}], "answer": 0, "explain": {"en": "Geronimo faints onto the cat-shaped rock and sees the letter R engraved in the stone.", "zh": "杰罗尼摩晕倒在那块猫形的石头上，看到石头上刻着字母R。"}}, {"q": {"en": "Who climbs the obelisk at Singing Stone Plaza to check for the Labyrinthus?", "zh": "是谁爬上鸣石广场的方尖碑去查看迷宫图书馆的？"}, "options": [{"en": "Trap", "zh": "特拉普"}, {"en": "Benjamin", "zh": "本杰明"}, {"en": "The curator Starchfur", "zh": "馆长淀粉毛"}, {"en": "Frick Tapioca", "zh": "弗里克·木薯"}], "answer": 0, "explain": {"en": "Trap shimmies up the tall obelisk like a cat up a tree and shouts down from the very top.", "zh": "特拉普像猫爬树一样爬上那根高高的方尖碑，从最顶上冲下面大喊。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
