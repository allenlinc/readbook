<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Crasher — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#28 · Wedding Crasher</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: Wedding Crasher</em> (Scholastic, 2007) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who sent Geronimo the wedding invitation?", "zh": "是谁给杰罗尼摩寄来了婚礼请柬？"}, "options": [{"en": "Uncle Samuel S. Stingysnout", "zh": "塞缪尔·吝啬鼻叔叔"}, {"en": "Cousin Trap", "zh": "表哥特拉普"}, {"en": "Stevie Stingysnout", "zh": "史蒂维·吝啬鼻"}, {"en": "Patience Plainpaws", "zh": "帕兴斯·平淡爪"}], "answer": 0, "explain": {"en": "The invitation was from Uncle Samuel S. Stingysnout, inviting Geronimo to his son Stevie's wedding.", "zh": "请柬是塞缪尔·吝啬鼻叔叔寄来的，邀请杰罗尼摩参加儿子史蒂维的婚礼。"}}, {"q": {"en": "What was the name of Uncle Samuel's castle?", "zh": "塞缪尔叔叔的城堡叫什么名字？"}, "options": [{"en": "Penny Pincher Castle", "zh": "小气鬼城堡"}, {"en": "Cheap Change Hill", "zh": "廉价零钱丘"}, {"en": "Mouseford Lane", "zh": "鼠福德巷"}, {"en": "New Mouse City", "zh": "新老鼠城"}], "answer": 0, "explain": {"en": "The ceremony was held at Penny Pincher Castle, which sat on a hill called Cheap Change Hill.", "zh": "婚礼在小气鬼城堡举行，那座城堡坐落在一座叫作廉价零钱丘的山上。"}}, {"q": {"en": "What did Benjamin make as his wedding gift?", "zh": "本杰明亲手做了什么当作结婚礼物？"}, "options": [{"en": "Two small red cardboard hearts", "zh": "两颗红色的小纸板心"}, {"en": "A solid gold cheese dish", "zh": "一只纯金奶酪碟"}, {"en": "A leopard-spotted nightgown", "zh": "一件豹纹睡袍"}, {"en": "A music box", "zh": "一个音乐盒"}], "answer": 0, "explain": {"en": "Benjamin showed Geronimo two small red cardboard hearts with the names of the bride and groom on them.", "zh": "本杰明给杰罗尼摩看两颗红色的小纸板心，上面写着新娘和新郎的名字。"}}, {"q": {"en": "What trick did Cousin Trap play that made Geronimo itch?", "zh": "表哥特拉普用了什么恶作剧让杰罗尼摩浑身发痒？"}, "options": [{"en": "Itching powder", "zh": "痒痒粉"}, {"en": "Trick chocolates", "zh": "整人巧克力"}, {"en": "A red balloon", "zh": "一只红气球"}, {"en": "A whoopee cushion", "zh": "一个放屁坐垫"}], "answer": 0, "explain": {"en": "Trap sprinkled itching powder on Geronimo, making him scratch so badly he took off his pants in public.", "zh": "特拉普在杰罗尼摩身上撒了痒痒粉，害得他拼命抓痒，还在大庭广众下脱掉了裤子。"}}, {"q": {"en": "Who was the plain bride-to-be?", "zh": "那位相貌平平的新娘是谁？"}, "options": [{"en": "Patience Plainpaws", "zh": "帕兴斯·平淡爪"}, {"en": "Thea Stilton", "zh": "蒂娜·斯蒂顿"}, {"en": "Aunt Sugarfur", "zh": "糖毛姑妈"}, {"en": "Squeakette", "zh": "吱吱特"}], "answer": 0, "explain": {"en": "Patience Plainpaws was the shy, plain bride-to-be with thick glasses, plain brown fur, and a gray dress.", "zh": "帕兴斯·平淡爪是那位害羞又普通的新娘，戴着厚眼镜，长着朴素的棕色毛，穿着灰色连衣裙。"}}, {"q": {"en": "What did Stevie Stingysnout want Geronimo to publish?", "zh": "史蒂维·吝啬鼻想让杰罗尼摩出版什么？"}, "options": [{"en": "His book 'Memoirs of a Perfect Rodent'", "zh": "他写的《完美老鼠回忆录》"}, {"en": "The Rodent's Art of Saving", "zh": "《老鼠省钱术》"}, {"en": "A book about cheese perfume", "zh": "一本关于奶酪香水的书"}, {"en": "A newspaper article", "zh": "一篇报纸文章"}], "answer": 0, "explain": {"en": "Stevie asked Geronimo to publish his book called Memoirs of a Perfect Rodent, which was all about himself.", "zh": "史蒂维请杰罗尼摩出版他写的《完美老鼠回忆录》，那本书全是在讲他自己。"}}, {"q": {"en": "What tiny meal did Uncle Samuel serve for the light dinner?", "zh": "吝啬鼻叔叔那顿简便晚餐端出了怎样少得可怜的食物？"}, "options": [{"en": "One stuffed pea, one brussels sprout, and one raspberry", "zh": "一颗填馅豌豆、一颗煮抱子甘蓝和一颗覆盆子"}, {"en": "A big bowl of mussel soup", "zh": "一大碗贻贝汤"}, {"en": "Cheese sandwiches", "zh": "奶酪三明治"}, {"en": "A full feast with cake", "zh": "带蛋糕的丰盛大餐"}], "answer": 0, "explain": {"en": "Uncle Samuel served just one stuffed pea, then one boiled brussels sprout, and one raspberry for dessert.", "zh": "吝啬鼻叔叔只上了一颗填馅豌豆，接着是一颗煮抱子甘蓝，甜点则是一颗覆盆子。"}}, {"q": {"en": "What did Geronimo discover Uncle Samuel doing in the tower at night?", "zh": "夜里杰罗尼摩发现塞缪尔叔叔在塔楼里做什么？"}, "options": [{"en": "Counting a huge pile of gold coins", "zh": "清点一大堆金币"}, {"en": "Cleaning the silverware", "zh": "擦洗银餐具"}, {"en": "Writing a book", "zh": "写一本书"}, {"en": "Practicing golf", "zh": "练习打高尔夫"}], "answer": 0, "explain": {"en": "Through the keyhole, Geronimo saw Uncle Samuel surrounded by gold coins, counting them one by one — he was rich all along.", "zh": "杰罗尼摩透过锁孔看见塞缪尔叔叔被金币包围，正一枚枚地数着——原来他一直很有钱。"}}, {"q": {"en": "What did Patience's father invent that made the family rich?", "zh": "帕兴斯的父亲发明了什么，让全家变得富有？"}, "options": [{"en": "A cheese-scented perfume called Scent of Swiss", "zh": "一种叫瑞士之香的奶酪味香水"}, {"en": "A marble cheese", "zh": "大理石做的奶酪"}, {"en": "A solid gold cheese dish", "zh": "一只纯金奶酪碟"}, {"en": "A hot-air balloon", "zh": "一只热气球"}], "answer": 0, "explain": {"en": "Patience's father created a cheese-scented perfume called Scent of Swiss, which became a huge hit and made the family rich.", "zh": "帕兴斯的父亲发明了一种叫瑞士之香的奶酪味香水，大受欢迎，让全家发了财。"}}, {"q": {"en": "What did Thea do to help Patience feel better?", "zh": "蒂娜为了帮帕兴斯振作起来做了什么？"}, "options": [{"en": "Gave her a makeover with new clothes and contacts", "zh": "给她换了新衣服、戴了隐形眼镜，做了大改造"}, {"en": "Bought her a wedding cake", "zh": "给她买了一个结婚蛋糕"}, {"en": "Took her to the dentist", "zh": "带她去看牙医"}, {"en": "Taught her to play golf", "zh": "教她打高尔夫"}], "answer": 0, "explain": {"en": "Thea gave Patience an extreme makeover: contacts to show her emerald green eyes, bright new clothes, and she threw out the gray dresses.", "zh": "蒂娜给帕兴斯来了一次彻底大改造：戴隐形眼镜露出祖母绿色的眼睛，换上鲜艳的新衣，还把灰色连衣裙全扔了。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
