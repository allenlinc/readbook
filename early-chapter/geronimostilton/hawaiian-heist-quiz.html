<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Hawaiian Heist — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#72 · The Hawaiian Heist</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: The Hawaiian Heist</em> (Scholastic, 2014) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who is the narrator and editor-in-chief of The Rodent's Gazette?", "zh": "谁是本书的讲述者，也是《 rodents 公报》的主编？"}, "options": [{"en": "Geronimo Stilton", "zh": "Geronimo Stilton"}, {"en": "Hercule Poirat", "zh": "Hercule Poirat"}, {"en": "Trap Stilton", "zh": "Trap Stilton"}, {"en": "Benjamin Stilton", "zh": "Benjamin Stilton"}], "answer": 0, "explain": {"en": "Geronimo introduces himself as the editor in chief of The Rodent's Gazette, the most famous newspaper on Mouse Island.", "zh": "Geronimo 在开头自我介绍为《 rodents 公报》的主编，那是老鼠岛上最有名的报纸。"}}, {"q": {"en": "What is Hercule Poirat's job?", "zh": "Hercule Poirat 的职业是什么？"}, "options": [{"en": "A private detective", "zh": "一名私家侦探"}, {"en": "A jewelry designer", "zh": "一名珠宝设计师"}, {"en": "A newspaper editor", "zh": "一名报纸编辑"}, {"en": "A tour guide", "zh": "一名导游"}], "answer": 0, "explain": {"en": "The book says Hercule is a private detective who runs a well-known detective agency in New Mouse City.", "zh": "书中说明 Hercule 是一名私家侦探，在新老鼠城经营一家知名的侦探事务所。"}}, {"q": {"en": "Why did Hercule need Geronimo's help in Hawaii?", "zh": "Hercule 为什么需要 Geronimo 在夏威夷帮忙？"}, "options": [{"en": "A thief had tried to steal Kealoha's necklace three times", "zh": "有小偷三次试图偷走 Kealoha 的项链"}, {"en": "He wanted Geronimo to be his birthday guest", "zh": "他想让 Geronimo 当他的生日宾客"}, {"en": "He needed help writing a newspaper", "zh": "他需要帮忙写一份报纸"}, {"en": "He was lost on the beach", "zh": "他在海滩上迷路了"}], "answer": 0, "explain": {"en": "Hercule explains a rascally rodent tried to steal Kealoha's necklace three times, so he needed Geronimo's help to keep it safe.", "zh": "Hercule 解释说有个无赖老鼠曾三次试图偷走 Kealoha 的项链，因此需要 Geronimo 帮忙保护它。"}}, {"q": {"en": "What is the code to unlock Kealoha's jewelry display case?", "zh": "打开 Kealoha 珠宝展示柜的密码是什么？"}, "options": [{"en": "ALOHA", "zh": "ALOHA"}, {"en": "HAWAII", "zh": "HAWAII"}, {"en": "GEORNIMO", "zh": "GEORNIMO"}, {"en": "LEI", "zh": "LEI"}], "answer": 0, "explain": {"en": "Kai accidentally blurts out that the code is 'ALOHA', and Geronimo later types A-L-O-H-A to open the case.", "zh": "Kai 不小心脱口说出密码是“ALOHA”，后来 Geronimo 输入 A-L-O-H-A 打开了柜子。"}}, {"q": {"en": "Who designed the special lei necklace for the wedding of Violet Brie and Roderick van Ratten?", "zh": "谁为 Violet Brie 和 Roderick van Ratten 的婚礼设计了特别的花环项链？"}, "options": [{"en": "Kealoha", "zh": "Kealoha"}, {"en": "Madame No", "zh": "Madame No"}, {"en": "Grace Cheesington", "zh": "Grace Cheesington"}, {"en": "Thea Stilton", "zh": "Thea Stilton"}], "answer": 0, "explain": {"en": "Kealoha is the talented jewelry designer who created the lei-inspired necklace for the celebrity couple's wedding.", "zh": "Kealoha 是才华横溢的珠宝设计师，为这对名人夫妇的婚礼创作了以花环为灵感的项链。"}}, {"q": {"en": "Where does the 'Super Surfer' race take place?", "zh": "“超级冲浪者”比赛在哪里举行？"}, "options": [{"en": "On Oahu, near Honolulu", "zh": "在瓦胡岛，檀香山附近"}, {"en": "On the Big Island, in Hilo", "zh": "在大岛，希洛"}, {"en": "In New Mouse City", "zh": "在新老鼠城"}, {"en": "On Maui", "zh": "在毛伊岛"}], "answer": 0, "explain": {"en": "Kai flies them to Oahu for the race, and the starting line is right by Kealoha's store in Honolulu.", "zh": "Kai 开飞机送他们到瓦胡岛比赛，起点就在 Kealoha 位于檀香山的店铺旁。"}}, {"q": {"en": "Who was the mouse calling herself 'Grace Cheesington' really?", "zh": "自称“Grace Cheesington”的老鼠其实是谁？"}, "options": [{"en": "Shadow, Madame No's spy", "zh": "Shadow，Madame No 的间谍"}, {"en": "Kealoha in disguise", "zh": "伪装后的 Kealoha"}, {"en": "Thea Stilton", "zh": "Thea Stilton"}, {"en": "A tourist from Mouse Island", "zh": "一位来自老鼠岛的游客"}], "answer": 0, "explain": {"en": "Grace pulls off her red wig, contacts, and mask to reveal she is Shadow, a spy Geronimo had met before.", "zh": "Grace 摘下红假发、隐形眼镜和面具，露出她其实是 Shadow，一个 Geronimo 以前见过的间谍。"}}, {"q": {"en": "Who is the mega director of EGO (the Enormously Gigantic Organization)?", "zh": "EGO（超大组织）的总裁是谁？"}, "options": [{"en": "Madame No", "zh": "Madame No"}, {"en": "Kai", "zh": "Kai"}, {"en": "Hercule Poirat", "zh": "Hercule Poirat"}, {"en": "Roderick van Ratten", "zh": "Roderick van Ratten"}], "answer": 0, "explain": {"en": "Madame No appears from her leopard-print submarine and is described as the Mega Director of EGO.", "zh": "Madame No 从她的豹纹潜艇里现身，被描述为 EGO 的总裁。"}}, {"q": {"en": "What was the necklace in the store display case actually?", "zh": "店铺展示柜里的项链其实是什么？"}, "options": [{"en": "A fake decoy", "zh": "一个假的诱饵"}, {"en": "The real wedding necklace", "zh": "真正的婚礼项链"}, {"en": "A banana peel", "zh": "一个香蕉皮"}, {"en": "A surfboard", "zh": "一块冲浪板"}], "answer": 0, "explain": {"en": "Kealoha reveals the display necklace was a fake she made to show Roderick; she secretly swapped the real one.", "zh": "Kealoha 透露展示柜里的项链是她做给 Roderick 看的仿制品，她偷偷把真项链换了。"}}, {"q": {"en": "How was the real necklace kept safe until the wedding?", "zh": "真正的项链是如何一直保存到婚礼的？"}, "options": [{"en": "Kealoha hid it in a secret drawer at her house", "zh": "Kealoha 把它藏在家中一个秘密抽屉里"}, {"en": "Geronimo wore it on the plane", "zh": "Geronimo 在飞机上戴着它"}, {"en": "Madame No locked it in her submarine", "zh": "Madame No 把它锁在潜艇里"}, {"en": "It was mailed to New Mouse City", "zh": "它被寄到了新老鼠城"}], "answer": 0, "explain": {"en": "Kealoha pulled the real necklace from a hidden compartment in her dresser drawer at home, then delivered it to the wedding.", "zh": "Kealoha 从家中梳妆台的一个隐藏隔层里拿出真项链，然后把它送到了婚礼现场。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
