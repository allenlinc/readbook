<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geronimo Stilton, Secret Agent — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#34 · Geronimo Stilton, Secret Agent</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: Geronimo Stilton, Secret Agent</em> (Scholastic, 2006) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "The rodent in dark sunglasses following Geronimo turned out to be someone from his past. Who was it?", "zh": "那个戴着墨镜跟踪杰罗尼摩的老鼠，原来是他的旧相识。那是谁？"}, "options": [{"en": "Kornelius von Kickpaw, his old elementary school friend", "zh": "科尼利厄斯·冯·基克波，他小学时的老朋友"}, {"en": "Hercule Poirat, the detective", "zh": "侦探赫拉克·波瓦"}, {"en": "Trap Stilton, his cousin", "zh": "他的表哥特拉普·斯提尔顿"}, {"en": "Sally Ratmousen, his enemy", "zh": "他的敌人萨莉·拉特穆森"}], "answer": 0, "explain": {"en": "The follower took off his sunglasses and revealed himself as Kornelius von Kickpaw, Geronimo's friend from elementary school whom he had not seen in years.", "zh": "那个跟踪者摘下墨镜，原来是他小学时的朋友科尼利厄斯·冯·基克波，杰罗尼摩已经多年没见过他了。"}}, {"q": {"en": "What was Kornelius von Kickpaw's secret job and code name?", "zh": "科尼利厄斯·冯·基克波的秘密工作和代号分别是什么？"}, "options": [{"en": "A secret agent with the code name OOK", "zh": "一名代号为OOK的秘密特工"}, {"en": "An editor at The Rodent's Gazette", "zh": "《老鼠公报》的编辑"}, {"en": "The owner of a cheese factory", "zh": "一家奶酪厂的老板"}, {"en": "A professional athlete", "zh": "一名职业运动员"}], "answer": 0, "explain": {"en": "Kornelius whispered that his code name was OOK and that he worked on secret missions for the government of Mouse Island.", "zh": "科尼利厄斯小声说他的代号是OOK，并且为老鼠岛政府执行秘密任务。"}}, {"q": {"en": "In elementary school, how did Kornelius help Geronimo?", "zh": "在小学时，科尼利厄斯是怎样帮助杰罗尼摩的？"}, "options": [{"en": "He rescued Geronimo from bullies who stuffed him in a gym locker", "zh": "他把被恶霸塞进更衣室储物柜的杰罗尼摩救了出来"}, {"en": "He taught Geronimo to tie his shoes", "zh": "他教杰罗尼摩系鞋带"}, {"en": "He gave Geronimo a cheese sandwich", "zh": "他给了杰罗尼摩一个奶酪三明治"}, {"en": "He helped Geronimo with math homework", "zh": "他帮杰罗尼摩做数学作业"}], "answer": 0, "explain": {"en": "When Wendell Wild Whiskers and his gang stuffed Geronimo into a locker, Kornelius ripped it open and made Wendell apologize, so the bullies never picked on him again.", "zh": "当温德尔·威尔德胡须和他的同伙把杰罗尼摩塞进储物柜时，科尼利厄斯把它撬开，还逼温德尔道歉，从此那些恶霸再也不敢欺负他了。"}}, {"q": {"en": "What important document was inside the envelope with the red seal that Geronimo lost?", "zh": "杰罗尼摩弄丢的那个红色封印信封里，装着的究竟是什么重要文件？"}, "options": [{"en": "The deed to the land where The Rodent's Gazette stands", "zh": "《老鼠公报》所在土地的契约"}, {"en": "A winning lottery ticket", "zh": "一张中奖的彩票"}, {"en": "A secret agent badge", "zh": "一枚秘密特工的徽章"}, {"en": "A letter from Sally Ratmousen", "zh": "一封萨莉·拉特穆森写的信"}], "answer": 0, "explain": {"en": "Grandfather William revealed the envelope held the deed to the land — the only proof they owned the property where The Rodent's Gazette is built.", "zh": "威廉爷爷说信封里装的是那块土地的契约，也是他们拥有《老鼠公报》所在地财产的唯一证明。"}}, {"q": {"en": "How did the red-sealed envelope leave Geronimo's office?", "zh": "那个红封印信封是怎么离开杰罗尼摩的办公室的？"}, "options": [{"en": "A gust of wind blew it out the open window", "zh": "一阵风把它从开着的窗户吹了出去"}, {"en": "Sally Ratmousen secretly stole it", "zh": "萨莉·拉特穆森偷偷偷走了它"}, {"en": "A seagull carried it away", "zh": "一只海鸥把它叼走了"}, {"en": "Kornelius took it with him", "zh": "科尼利厄斯把它带走了"}], "answer": 0, "explain": {"en": "Geronimo had left his window wide open, and a fierce wind lifted the envelope off his desk and blew it straight out the window.", "zh": "杰罗尼摩前一晚忘了关窗，一阵狂风把信封从桌上卷起，直接吹出了窗外。"}}, {"q": {"en": "Kornelius's sister Veronica is also a secret agent. What is her code name?", "zh": "科尼利厄斯的妹妹维罗妮卡也是一名秘密特工。她的代号是什么？"}, "options": [{"en": "00V", "zh": "00V"}, {"en": "OOK", "zh": "OOK"}, {"en": "007", "zh": "007"}, {"en": "OOS", "zh": "OOS"}], "answer": 0, "explain": {"en": "Kornelius pointed to a painting of his sister Veronica above the fireplace and said her code name was 00V; she was a secret agent too.", "zh": "科尼利厄斯指着壁炉上方妹妹维罗妮卡的画像说，她的代号是00V，她同样是一名秘密特工。"}}, {"q": {"en": "After a wild chase, where did the lost envelope finally land?", "zh": "经过一番疯狂追逐，那个丢失的信封最后落在了哪里？"}, "options": [{"en": "In the office of Sally Ratmousen, his enemy", "zh": "落在了他的敌人萨莉·拉特穆森的办公室里"}, {"en": "At the town garbage dump", "zh": "在城镇垃圾场"}, {"en": "Deep in the sewer", "zh": "在下水道深处"}, {"en": "Inside Kornelius's mansion", "zh": "在科尼利厄斯的豪宅里"}], "answer": 0, "explain": {"en": "The wind carried the envelope higher and higher until it slipped through an open window — the window of Sally Ratmousen, owner of The Daily Rat and Geronimo's rival.", "zh": "风把信封越吹越高，最后从一扇开着的窗户飘了进去——那正是萨莉·拉特穆森的窗户，她是《老鼠日报》的老板，也是杰罗尼摩的对手。"}}, {"q": {"en": "Down in the sewer, what creature was holding the red-sealed envelope in its jaws?", "zh": "在下水道里，是什么生物用嘴巴叼着那个红封印信封？"}, "options": [{"en": "A crocodile with glowing yellow eyes", "zh": "一只长着发光黄眼睛的鳄鱼"}, {"en": "A cat", "zh": "一只猫"}, {"en": "A rat", "zh": "一只老鼠"}, {"en": "A shark", "zh": "一条鲨鱼"}], "answer": 0, "explain": {"en": "In the dark sewer, a pair of glittering yellow eyes turned out to belong to an enormous crocodile that was holding the envelope in its ferocious jaws.", "zh": "在黑暗的下水道里，那双闪着光的黄眼睛属于一只巨大的鳄鱼，它正用凶猛的嘴巴叼着那个信封。"}}, {"q": {"en": "What trick did Geronimo use to snatch the envelope away from Sally Ratmousen?", "zh": "杰罗尼摩用了什么花招，从萨莉·拉特穆森手里抢走了信封？"}, "options": [{"en": "He pretended she had broken a paw-nail, making her panic", "zh": "他假装她弄断了指甲，让她慌了神"}, {"en": "He yelled 'Fire!'", "zh": "他大喊“着火了”"}, {"en": "He offered her some cheese", "zh": "他给了她一些奶酪"}, {"en": "He called Kornelius for help", "zh": "他叫科尼利厄斯来帮忙"}], "answer": 0, "explain": {"en": "Geronimo whispered that Sally had broken a paw-nail; she flew into a frenzy looking for it, and in that moment he grabbed the envelope.", "zh": "杰罗尼摩小声说萨莉弄断了指甲，她顿时慌乱地四处查看，就在这时他一把抓过了信封。"}}, {"q": {"en": "A mysterious figure with a delicate perfume kept rescuing Geronimo. Who was it?", "zh": "一个带着淡淡香水味的神秘身影一次次救了杰罗尼摩。那是谁？"}, "options": [{"en": "Veronica, the secret agent code-named 00V", "zh": "秘密特工维罗妮卡，代号00V"}, {"en": "Kornelius, code-named OOK", "zh": "代号为OOK的科尼利厄斯"}, {"en": "Thea Stilton, his sister", "zh": "他的妹妹西奥·斯提尔顿"}, {"en": "Sally Ratmousen", "zh": "萨莉·拉特穆森"}], "answer": 0, "explain": {"en": "Each time the rescuer said 'I'm here to help' and left a delicate perfume — the same scent left behind when 00V (Veronica, Kornelius's sister) vanished earlier.", "zh": "每次救他的人都说着“我是来帮忙的”，并留下一股淡淡的香水味——这股香味正是之前00V（科尼利厄斯的妹妹维罗妮卡）消失时留下的。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
