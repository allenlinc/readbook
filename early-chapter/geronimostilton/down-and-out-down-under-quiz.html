<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Down And Out Down Under — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#29 · Down And Out Down Under</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: Down And Out Down Under</em> (Scholastic, 2002) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who makes a surprising phone call to Geronimo at the beginning of the story?", "zh": "在故事开头，谁给杰罗尼摩打来了一通令人意外的电话？"}, "options": [{"en": "Petunia Pretty Paws, a famous TV reporter", "zh": "著名的电视记者佩图尼娅·漂亮爪"}, {"en": "His sister Thea", "zh": "他的妹妹西娅"}, {"en": "His cousin Trap", "zh": "他的表哥特拉普"}, {"en": "His nephew Benjamin", "zh": "他的侄子本杰明"}], "answer": 0, "explain": {"en": "Petunia Pretty Paws, a TV reporter Geronimo has a crush on, calls him to invite him on an adventure.", "zh": "杰罗尼摩暗恋的电视记者佩图尼娅·漂亮爪给他打电话，邀请他一起去冒险。"}}, {"q": {"en": "What is the name of Petunia's twin brother who parachutes into Geronimo's office?", "zh": "降落伞空降到杰罗尼摩办公室的、佩图尼娅的双胞胎兄弟叫什么名字？"}, "options": [{"en": "Hercule Poirat, the detective", "zh": "侦探赫拉克·波拉"}, {"en": "Trap Stilton, the cousin", "zh": "表哥特拉普·斯蒂顿"}, {"en": "Wolfgang 'Wolfie' Wild Paws, a TV producer", "zh": "电视制作人沃尔夫冈“沃菲”·野爪"}, {"en": "Benjamin Stilton, the nephew", "zh": "侄子本杰明·斯蒂顿"}], "answer": 2, "explain": {"en": "Wolfgang 'Wolfie' Wild Paws is Petunia's twin brother and a TV producer who dedicates his life to protecting nature.", "zh": "沃尔夫冈“沃菲”·野爪是佩图尼娅的双胞胎兄弟，也是一位致力保护自然的电视制作人。"}}, {"q": {"en": "Where do Petunia and Wolfie invite Geronimo to travel to report on wildlife?", "zh": "佩图尼娅和沃菲邀请杰罗尼摩去哪里报道野生动物保护？"}, "options": [{"en": "Japan, to learn about samurai", "zh": "日本，了解武士"}, {"en": "Australia, to help save its wildlife", "zh": "澳大利亚，帮忙保护当地野生动物"}, {"en": "Brazil, to visit the jungle", "zh": "巴西，探访丛林"}, {"en": "Antarctica, to see penguins", "zh": "南极洲，看企鹅"}], "answer": 1, "explain": {"en": "They invite Geronimo to Australia to report on their efforts to save Australian wildlife and protect the land.", "zh": "他们邀请杰罗尼摩去澳大利亚，报道他们保护当地野生动物和土地的努力。"}}, {"q": {"en": "Why is Australia sometimes called the 'Land Down Under'?", "zh": "澳大利亚为什么有时被称为“下方的陆地”（Land Down Under）？"}, "options": [{"en": "It is the smallest country in the world", "zh": "它是世界上最小的国家"}, {"en": "It is covered in snow all year", "zh": "它终年被冰雪覆盖"}, {"en": "It has no people living there", "zh": "那里没有人居住"}, {"en": "It lies entirely in the Southern Hemisphere", "zh": "它完全位于南半球"}], "answer": 3, "explain": {"en": "Australia lies entirely in the Southern Hemisphere, so people call it the 'Land Down Under'.", "zh": "澳大利亚完全位于南半球，因此人们称它为“下方的陆地”。"}}, {"q": {"en": "In Sydney, what famous building with a sail-shaped roof does Geronimo see?", "zh": "在悉尼，杰罗尼摩看到了哪座屋顶形状像船帆的著名建筑？"}, "options": [{"en": "The Opera House", "zh": "歌剧院（悉尼歌剧院）"}, {"en": "The Rodent's Gazette office", "zh": "《鼠民公报》报社"}, {"en": "A giant chocolate factory", "zh": "一座巨大的巧克力工厂"}, {"en": "The Great Barrier Reef", "zh": "大堡礁"}], "answer": 0, "explain": {"en": "In Sydney Geronimo sees the Opera House, a spectacular building with a roof shaped like the sails of a boat.", "zh": "在悉尼，杰罗尼摩看到了歌剧院，那是一座屋顶像船帆一样奇妙的建筑。"}}, {"q": {"en": "At Bondi Beach, what sport does Wolfie make Geronimo try for the first time?", "zh": "在邦迪海滩，沃菲逼杰罗尼摩第一次尝试什么运动？"}, "options": [{"en": "Skydiving", "zh": "跳伞"}, {"en": "Surfing", "zh": "冲浪"}, {"en": "Tennis", "zh": "网球"}, {"en": "Chess", "zh": "国际象棋"}], "answer": 1, "explain": {"en": "Wolfie makes Geronimo paddle out and ride a huge wave at Bondi Beach, and he becomes a 'surfing sensation'.", "zh": "沃菲让杰罗尼摩划水出去、乘着巨浪冲浪，结果他成了“冲浪明星”。"}}, {"q": {"en": "At Shark Bay, what animal actually approaches Geronimo instead of a shark?", "zh": "在鲨鱼湾，靠近杰罗尼摩的其实是什么动物，而不是鲨鱼？"}, "options": [{"en": "A crocodile", "zh": "鳄鱼"}, {"en": "A penguin", "zh": "企鹅"}, {"en": "A dolphin", "zh": "海豚"}, {"en": "A seal", "zh": "海豹"}], "answer": 2, "explain": {"en": "Geronimo shouts 'SHARK!' but it turns out to be a friendly dolphin that lets the mice ride on its back.", "zh": "杰罗尼摩大喊“鲨鱼！”，结果那是一只用背驮着老鼠们游泳的友善海豚。"}}, {"q": {"en": "At Uluru (Ayers Rock), what do Geronimo and his friends refuse to do out of respect for the Anangu people?", "zh": "在乌卢鲁（艾尔斯岩），杰罗尼摩和朋友们出于对阿南古人（Anangu）的尊重，拒绝做什么？"}, "options": [{"en": "Take photographs of the rock", "zh": "给岩石拍照"}, {"en": "Take a boat tour around it", "zh": "乘船绕它游览"}, {"en": "Eat the local wild fruit", "zh": "吃当地野果"}, {"en": "Climb to the top of the rock", "zh": "爬到岩石顶端"}], "answer": 3, "explain": {"en": "The Anangu consider Uluru sacred, so Geronimo, Petunia and Wolfie refuse to climb it and respect their wishes.", "zh": "阿南古人把乌卢鲁视为圣地，所以杰罗尼摩、佩图尼娅和沃菲拒绝攀爬，尊重他们的意愿。"}}, {"q": {"en": "In the Australian bush, which of these dangerous animals does Geronimo encounter?", "zh": "在澳大利亚丛林里，杰罗尼摩遇到了以下哪种危险的动物？"}, "options": [{"en": "A taipan, one of the world's most poisonous snakes", "zh": "太攀蛇，世界上最毒的蛇之一"}, {"en": "A polar bear", "zh": "北极熊"}, {"en": "A penguin", "zh": "企鹅"}, {"en": "A giraffe", "zh": "长颈鹿"}], "answer": 0, "explain": {"en": "In the bush Geronimo meets an echidna, a kangaroo, an emu, and a taipan — one of the world's most poisonous snakes.", "zh": "在丛林里，杰罗尼摩遇到了针鼹、袋鼠、鸸鹋，还有太攀蛇——世界上最毒的蛇之一。"}}, {"q": {"en": "What gift does the Aboriginal chief Wangara give Geronimo?", "zh": "原住民首领万加拉（Wangara）送给了杰罗尼摩什么礼物？"}, "options": [{"en": "A fountain pen", "zh": "一支钢笔"}, {"en": "A didgeridoo made from eucalyptus", "zh": "用桉树枝做的迪吉里杜管"}, {"en": "A surfboard", "zh": "一块冲浪板"}, {"en": "A baby kangaroo", "zh": "一只小袋鼠"}], "answer": 1, "explain": {"en": "Chief Wangara gives Geronimo a didgeridoo that his own grandfather had given him — a gift from the heart. Geronimo gives Wangara his grandfather's fountain pen in return.", "zh": "万加拉首领把自己祖父传给他的迪吉里杜管送给杰罗尼摩——一份发自内心的礼物。杰罗尼摩则回赠了祖父给他的钢笔。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
