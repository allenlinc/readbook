<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>On the Reef — Quiz</title>
<style>
  :root{
    --lab:#0e7490;
    --lab-dark:#155e75;
    --amber:#f59e0b;
    --cream:#f7fbff;
    --ink:#1f2937;
    --robot:#94a3b8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--lab),var(--lab-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:linear-gradient(135deg,var(--lab),var(--lab-dark));
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--lab-dark);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .logo{
    width:54px;height:54px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff, #cffafe);
    margin:0 auto 10px;display:flex;align-items:center;justify-content:center;
    font-size:1.7rem;box-shadow:0 0 0 3px rgba(255,255,255,.55) inset;
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #d6e6ef;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--lab);background:#eef9fc;}
  .q.wrong{border-color:#dc2626;background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--lab);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#eef4f8;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#e2edf4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--amber);}
  label.right{background:#d7f0df;border-color:var(--lab);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:#dc2626;}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f7ff;
    border-left:4px solid var(--lab);
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--lab-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--lab);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(14,116,144,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(14,116,144,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--lab-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9aa6ad;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#7 · On the Reef</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by J.C. Greenburg</p>
    <div class="logo">⚛️</div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Andrew Lost: On the Reef</em> (Random House, 2004) — by J.C. Greenburg</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by J.C. Greenburg",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really know your microscopic world.",
    great: "Great job — you understood the science adventure well.",
    ok: "Not bad — but a few tiny clues slipped past you.",
    low: "Time for a re-read! The answers are in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：J.C. Greenburg",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你完全读懂了这个微观世界冒险。",
    great: "很棒——你已经读懂了这个科学冒险故事。",
    ok: "不错——不过有几条小线索被你漏掉了。",
    low: "该重读一遍啦！答案都藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "When the Water Bug is trapped in the net, what animal do Andrew and Judy cut free from it?", "zh": "水虫号被网困住时，安德鲁和朱迪从网里救出的是什么动物？"}, "options": [{"en": "A manatee (sea cow)", "zh": "一头海牛（sea cow）"}, {"en": "A dolphin", "zh": "一只海豚"}, {"en": "A giant squid", "zh": "一只大王乌贼"}, {"en": "A shark", "zh": "一条鲨鱼"}], "answer": 0, "explain": {"en": "They free a manatee — Thudd calls it a sea cow that eats grass; long-ago sailors thought manatees were mermaids. Its tail looked like a big gray Ping-Pong paddle.", "zh": "他们救出一头海牛——撒德叫它“海牛/海奶牛”，吃水草；古时水手以为海牛是美人鱼。它的尾巴像一只灰色大乒乓球拍。"}}, {"q": {"en": "Uncle Al yells for them to move away from a 'baseball' with glowing blue rings. What is it?", "zh": "阿尔叔叔大喊让他们躲开一只带发光蓝环、像棒球似的小生物。那是什么？"}, "options": [{"en": "A blue-ringed octopus — its poison can kill a person in minutes", "zh": "蓝环章鱼——它的毒几分钟内就能毒死人"}, {"en": "A baby clownfish", "zh": "一条小丑鱼宝宝"}, {"en": "A glowing jellyfish", "zh": "一只会发光的水母"}, {"en": "A friendly sea snail", "zh": "一只友好的海螺"}], "answer": 0, "explain": {"en": "Uncle Al says the blue-ringed octopus is deadly — as small as a Ping-Pong ball, it shows blue rings when mad, and its saliva poison can kill a person in minutes. It lives around the Great Barrier Reef.", "zh": "阿尔叔叔说蓝环章鱼致命——只有乒乓球大小，生气时才显出蓝环，唾液毒能在几分钟内毒死人，生活在大堡礁一带。"}}, {"q": {"en": "To stop Burpp's Egg-Mobile from hunting them in the reef, what do they use?", "zh": "为了阻止伯普的蛋形战车在礁石里追他们，他们用了什么？"}, "options": [{"en": "Mussel glue — they pile mussels on rocks so the Egg-Mobile sticks when it bumps them", "zh": "贻贝的胶——他们把贻贝堆在石头上，蛋形战车撞上就被粘住"}, {"en": "A fishing net", "zh": "一张渔网"}, {"en": "A giant clam", "zh": "一只大砗磲"}, {"en": "Super-Sniffer spray", "zh": "超级嗅探器喷雾"}], "answer": 0, "explain": {"en": "Thudd finds mussels whose glue works underwater; they place mussels on a rock pile, and when the Egg-Mobile hits the rocks, the mussel glue sticks it (Burpp cries 'Mayday!').", "zh": "撒德找到贻贝，其胶能在水下起作用；他们把贻贝堆在石头上，蛋形战车撞上就被贻贝胶粘住（伯普大喊“Mayday!”）。"}}, {"q": {"en": "Judy's leg is caught between the shells of a giant clam. How do they make it open?", "zh": "朱迪的腿被夹在大砗磲的两片壳之间。他们怎么让它张开？"}, "options": [{"en": "They shine the flashlight on it — the clam opens when it gets lots of light", "zh": "他们用手电筒照它——砗磲见到很多光就会张开"}, {"en": "They tickle it with a feather", "zh": "他们用羽毛挠它痒"}, {"en": "They pour salt on it", "zh": "他们往上面撒盐"}, {"en": "They wait for low tide", "zh": "他们等退潮"}], "answer": 0, "explain": {"en": "Thudd says the giant clam has little eyes that see light and dark; it closes when it sees a shadow. Judy shines the flashlight on it and it opens, letting her pull her leg free.", "zh": "撒德说大砗磲有小眼睛能分辨明暗，看到影子就合上。朱迪用手电筒照它，它就张开了，朱迪得以抽出腿。"}}, {"q": {"en": "Soggy Bob fires something from the Crab-Mobile that sticks to the Water Bug's hood and tows it. What is it?", "zh": "撒吉·鲍勃从蟹形战车里射出某样东西，粘住水虫号的车头并拖着它走。那是什么？"}, "options": [{"en": "The No-Go Yo-Yo — a big black suction cup on a thick cord", "zh": "“不放你走悠悠球”（No-Go Yo-Yo）——粗绳上一只黑色大吸盘"}, {"en": "A fishing rod", "zh": "一根钓鱼竿"}, {"en": "A sticky tongue", "zh": "一条黏舌头"}, {"en": "A giant magnet", "zh": "一块大磁铁"}], "answer": 0, "explain": {"en": "Soggy Bob says 'Hope ya like mah No-Go Yo-Yo!' — a big black suction cup on a thick black cord shoots out, sticks to the hood, and tows the Water Bug to the Crab-Mobile.", "zh": "撒吉·鲍勃说“希望你喜欢我的不放你走悠悠球！”——粗绳上一只黑色大吸盘射出，粘住车头把水虫号拖向蟹形战车。"}}, {"q": {"en": "In Soggy Bob's Sea Wasp Ranch, Andrew's foot is exposed to deadly sea wasps. How is it protected?", "zh": "在撒吉·鲍勃的“海黄蜂养殖场”，安德鲁的脚露出、会碰到致命的海黄蜂。他们怎么保护他的皮肤？"}, "options": [{"en": "Judy rubs clownfish mucus goo onto his foot — it keeps the sting away", "zh": "朱迪把小丑鱼的黏液涂在他脚上——能挡住毒刺"}, {"en": "They wrap it in seaweed", "zh": "他们用海草包住脚"}, {"en": "They paint it with onion juice", "zh": "他们用洋葱汁涂脚"}, {"en": "They put a shell over it", "zh": "他们盖上一只贝壳"}], "answer": 0, "explain": {"en": "Judy remembers clownfish are covered with mucus that keeps anemone stings away; she rubs goo from a clownfish onto Andrew's foot, and the sea wasp tentacles only give a tickle.", "zh": "朱迪想起小丑鱼身上有能防海葵蜇刺的黏液；她把小丑鱼的黏液涂在安德鲁脚上，海黄蜂的触手只让他觉得有点痒。"}}, {"q": {"en": "The old compass Andrew found always points the same way. Why does its needle point north?", "zh": "安德鲁找到的旧指南针总是指向同一个方向。指针为什么指北？"}, "options": [{"en": "The needle is a little magnet, and the earth is a giant magnet that pulls it north", "zh": "指针是小磁铁，而地球是个巨大的磁铁，把它往北拉"}, {"en": "The needle follows the ocean current", "zh": "指针顺着海流"}, {"en": "A fairy inside the compass guides it", "zh": "指南针里有个小仙女指引它"}, {"en": "It points toward the sun", "zh": "它指向太阳"}], "answer": 0, "explain": {"en": "Thudd explains the compass arrow is a little magnet; the earth is a giant magnet because of a big spinning iron lump in its middle, and the earth magnet pulls the little compass magnet toward north.", "zh": "撒德解释说指南针指针是小磁铁；地球因中心有巨大的旋转铁块而成为大磁铁，把小磁铁指针拉向北。"}}, {"q": {"en": "At Soggy Bob's Pearl Farm, octopuses put beads inside oysters. How does a pearl form?", "zh": "在撒吉·鲍勃的珍珠养殖场，章鱼把珠子放进牡蛎里。珍珠是怎么形成的？"}, "options": [{"en": "The oyster is annoyed by the bead and covers it with pearly stuff, the same stuff that lines its shell", "zh": "牡蛎被珠子惹烦了，就用珍珠质把它包起来，那物质和贝壳内壁一样"}, {"en": "The bead dissolves and turns into a stone", "zh": "珠子溶化变成石头"}, {"en": "A tiny fish builds it", "zh": "一条小鱼造出它"}, {"en": "Sand glues onto the shell", "zh": "沙子粘在贝壳上"}], "answer": 0, "explain": {"en": "Thudd says the bead annoys the oyster animal like a pebble in your shoe; the oyster covers the bead with pearly stuff — the same stuff it uses to line the inside of its shell — making a pearl.", "zh": "撒德说珠子像鞋里的石子一样惹烦牡蛎，牡蛎就用珍珠质把它包起来（和贝壳内壁的材质一样），形成珍珠。"}}, {"q": {"en": "Judy notices little orange clownfish swimming in anemones without being stung. How do they avoid the sting?", "zh": "朱迪发现橙色小丑鱼在会蜇人的海葵里游却不被蜇。它们怎么避开毒刺？"}, "options": [{"en": "They have a coat of mucus goo that keeps the anemone's sting away", "zh": "它们有一层黏液，能挡住海葵的毒刺"}, {"en": "They are too fast to be stung", "zh": "它们游得太快不会被蜇"}, {"en": "The anemone is their friend", "zh": "海葵是它们的朋友"}, {"en": "They wear tiny helmets", "zh": "它们戴着小头盔"}], "answer": 0, "explain": {"en": "Thudd says clownfish have a coat of mucus goo that keeps the anemone sting away, so they can live among the stinging anemones safely. (A real skin cream is even made from clownfish mucus!)", "zh": "撒德说小丑鱼有一层能防海葵蜇刺的黏液，因此能安全地住在蜇人的海葵中。（现实中甚至有用小丑鱼黏液做的护肤霜！）"}}, {"q": {"en": "When the Egg-Mobile is stuck, Burpp squawks 'Mayday! Mayday!' True Stuff says this is an emergency signal. Where does the word come from?", "zh": "蛋形战车卡住时，伯普大叫“Mayday! Mayday!”。“真相小课堂”说这是求救信号。这个词来自哪里？"}, "options": [{"en": "The French words m'aider, meaning 'help me'", "zh": "法语 m'aider，意思是“救救我”"}, {"en": "The name of a sea captain", "zh": "一位船长的名字"}, {"en": "The sound a stuck motor makes", "zh": "卡住的马达发出的声音"}, {"en": "A type of seaweed", "zh": "一种海草"}], "answer": 0, "explain": {"en": "True Stuff says 'Mayday' is an emergency signal that comes from the French word m'aider, which means 'help me.'", "zh": "“真相小课堂”说“Mayday”是求救信号，来自法语 m'aider，意思是“救救我”。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
