<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The X'ed-Out X-Ray — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.6rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .baseball{
    width:50px;height:50px;border-radius:50%;
    background:#fff;margin:0 auto 12px;
    border:2px solid #e7e7e7;
    position:relative;
  }
  .baseball::before,.baseball::after{
    content:"";position:absolute;top:50%;width:2px;height:38px;
    background:#c0392b;transform:translateY(-50%) rotate(18deg);
    border-radius:2px;
  }
  .baseball::before{left:16px;}
  .baseball::after{right:16px;transform:translateY(-50%) rotate(-18deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>The X'ed-Out X-Ray</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Ron Roy</p>
    <div class="baseball"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>A to Z Mysteries: The X'ed-Out X-Ray</em> (Random House, 2004)</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Ron Roy",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the mystery well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The mystery is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Ron Roy",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个谜案。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！谜底藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Penelope Gwinn performs under the stage name PENGUIN. What instrument does she play while she sings?", "zh": "佩内洛普·格温以艺名「PENGUIN」（企鹅）登台演出。她唱歌时会演奏什么乐器？"}, "options": [{"en": "The violin", "zh": "小提琴"}, {"en": "The guitar according to some versions of the story", "zh": "吉他（按书中另一种说法）"}, {"en": "The flute", "zh": "长笛"}, {"en": "The piano", "zh": "钢琴"}], "answer": 0, "explain": {"en": "Ruth Rose tells her father that PENGUIN plays rock and roll but plays a violin while she sings. The diamond penguin pendant hangs around her neck during the show.", "zh": "露丝·罗丝告诉父亲，PENGUIN 唱的是摇滚乐，但她一边唱歌一边拉小提琴。演出时，那枚钻石企鹅吊坠就挂在她脖子上。"}}, {"q": {"en": "How does Dink get hurt during the trip to the concert?", "zh": "丁克在去听演唱会的途中是怎么受伤的？"}, "options": [{"en": "He trips over a dropped penguin mask", "zh": "被掉在地上的企鹅面具绊倒"}, {"en": "The thief hits him with the pendant", "zh": "小偷用吊坠打了他"}, {"en": "He falls off the carousel while kneeling on his dragon to see what was happening by the stage", "zh": "他跪在旋转木马的龙上想看清舞台那边发生了什么，结果摔了下来"}, {"en": "He is pushed by the crowd during the theft according to some versions of the story in an early draft of the book", "zh": "在失窃发生时被人群推倒（按书中另一种说法）（在书的早期草稿中）"}], "answer": 2, "explain": {"en": "Dink kneels on his green dragon to get a better look at the commotion by the stage, slips off, and lands on the platform, scraping his arm and bumping his head.", "zh": "丁克跪在绿色飞龙上，想看清舞台那边的骚动，结果滑落摔到台面上，擦伤了手臂还撞到了头。"}}, {"q": {"en": "What is stolen from Penelope Gwinn during the intermission?", "zh": "中场休息时，佩内洛普·格温的什么东西被偷走了？"}, "options": [{"en": "Her signed autograph book according to some versions of the story", "zh": "她签了名的签名簿（按书中另一种说法）"}, {"en": "Her diamond penguin pendant", "zh": "她的钻石企鹅吊坠"}, {"en": "Her violin", "zh": "她的小提琴"}, {"en": "Her ticket envelope", "zh": "她的门票信封"}], "answer": 1, "explain": {"en": "Someone wearing a penguin mask snatches the diamond penguin pendant right off her neck while she signs autographs. The thief leaves the autograph book behind, still in Penelope's hands.", "zh": "有人戴着企鹅面具，在佩内洛普签名时把钻石企鹅吊坠从她脖子上扯走。小偷把签名簿留在了原地，还握在佩内洛普手里。"}}, {"q": {"en": "Who is the man calling himself 'Dr. Fleming' in the first-aid tent really?", "zh": "在急救帐篷里自称「弗莱明医生」的人，其实是谁？"}, "options": [{"en": "George Shill, who stole Dr. Fleming's white jacket and name tag", "zh": "乔治·希尔，他偷走了弗莱明医生白大褂和姓名牌"}, {"en": "Dr. Richard Fleming, the real hospital doctor according to some versions of the story", "zh": "真正的医院医生理查德·弗莱明（按书中另一种说法）"}, {"en": "Frank, the hot-dog seller", "zh": "卖热狗的弗兰克"}, {"en": "Hans, Penelope's manager", "zh": "佩内洛普的经纪人汉斯"}], "answer": 0, "explain": {"en": "The real Dr. Richard Fleming was home sick with a cold; someone had stolen his jacket and name tag. The 'doctor' was George Shill, the thief, using the stolen identity.", "zh": "真正的理查德·弗莱明医生当天在家感冒休养，有人偷走了他的白大褂和姓名牌。那个「医生」其实是小偷乔治·希尔，冒用了偷来的身份。"}}, {"q": {"en": "How does the thief use Dink to sneak the pendant past the police?", "zh": "小偷是怎么利用丁克把吊坠带出警察的封锁的？"}, "options": [{"en": "The thief hides it inside the bandage wrapped around Dink's arm", "zh": "小偷把它藏进缠在丁克手臂上的绷带里"}, {"en": "Dink carries it in his pants pocket", "zh": "丁克把它装进裤兜"}, {"en": "The thief gives it to Josh to hold", "zh": "小偷交给乔什拿着"}, {"en": "Dink puts it in Ruth Rose's backpack according to some versions of the story", "zh": "丁克把它放进露丝·罗丝的书包（按书中另一种说法）"}], "answer": 0, "explain": {"en": "The thief wraps the pendant inside Dink's arm bandage and keeps Dink reading a sign so he won't notice. He then walks Dink out the exit gate, past the police, using his fake doctor status.", "zh": "小偷把吊坠缠进丁克手臂的绷带里，并一直让丁克读墙上的告示，使他没察觉。随后他假借医生身份，带着丁克从出口关卡走过警察的封锁。"}}, {"q": {"en": "What does Josh reveal when he rubs the red marker off Dink's blurry X-ray?", "zh": "乔什把丁克那张模糊X光片上的红色记号擦掉后，发现了什么？"}, "options": [{"en": "A map of Bushnell Park", "zh": "一张布什内尔公园的地图"}, {"en": "Dr. Fleming's real home address", "zh": "弗莱明医生的真实住址"}, {"en": "A written confession from the thief according to some versions of the story", "zh": "小偷写下的认罪书（按书中另一种说法）"}, {"en": "A hidden penguin shape that matches the stolen pendant", "zh": "一个隐藏的企鹅形状，与失窃的吊坠相符"}], "answer": 3, "explain": {"en": "The 'doctor' had drawn a big red X over the X-ray to hide the pendant's silhouette. When Josh wipes the red marker away, the kids see a fuzzy penguin shape matching Penelope's pendant.", "zh": "那个「医生」在X光片上画了一个大红叉，用来遮住吊坠的轮廓。乔什擦掉红墨水后，孩子们看到一个模糊的企鹅形状，与佩内洛普的吊坠一致。"}}, {"q": {"en": "What clue inside the abandoned autograph book reveals the thief's identity?", "zh": "在那本被遗弃的签名簿里，什么线索暴露了小偷的身份？"}, "options": [{"en": "The words 'Property of Penelope Gwinn'", "zh": "「佩内洛普·格温所有」几个字"}, {"en": "An inscription reading 'To Georgie from Aunt Alva Horst, Christmas, 1980'", "zh": "一段题词：「致乔治，来自阿尔瓦·霍斯特姨妈，1980年圣诞节」"}, {"en": "A receipt from the jewelry shop", "zh": "珠宝店的收据"}, {"en": "A note saying 'To Frank from his daughter' according to some versions of the story", "zh": "一张写着「致弗兰克，来自他女儿」的便条（按书中另一种说法）"}], "answer": 1, "explain": {"en": "Ruth Rose finds the inscription 'To Georgie from Aunt Alva Horst' on the inside back cover. This tells the kids the thief's nickname is Georgie and points them to his aunt.", "zh": "露丝·罗丝在签名簿封底内页发现题词「致乔治，来自阿尔瓦·霍斯特姨妈」。这让孩子们知道小偷昵称是乔治，并指向了他的姨妈。"}}, {"q": {"en": "How do the kids learn the thief's real name and where he lives?", "zh": "孩子们是怎么查到小偷的真实姓名和住址的？"}, "options": [{"en": "They find him in the hospital staff directory according to some versions of the story", "zh": "他们在医院员工名录里找到他（按书中另一种说法）"}, {"en": "Josh calls Information and asks Alva Horst, the aunt named in the book", "zh": "乔什查号台打电话，询问签名簿里提到的姨妈阿尔瓦·霍斯特"}, {"en": "Officer Fallon already had it on file", "zh": "法伦警官档案里本来就有"}, {"en": "Penelope gives them his address", "zh": "佩内洛普给了他们地址"}], "answer": 1, "explain": {"en": "Josh dials Information, gets A. Horst's number, and calls the aunt. She gives him Georgie's real name — George Shill — and his address on Laurel Street in Hartford.", "zh": "乔什通过查号台找到A.霍斯特的电话，打给那位姨妈。姨妈告诉他乔治的真名——乔治·希尔，以及他在哈特福德劳雷尔街的住址。"}}, {"q": {"en": "Why does Penelope's manager Hans go into a jewelry store, making the kids suspect him?", "zh": "佩内洛普的经纪人汉斯为什么走进一家珠宝店，让孩子们怀疑他？"}, "options": [{"en": "He is robbing the store", "zh": "他在抢劫那家店"}, {"en": "He works there as a clerk", "zh": "他在那里当店员"}, {"en": "He is trying to sell the stolen pendant according to some versions of the story", "zh": "他想把失窃的吊坠卖掉（按书中另一种说法）"}, {"en": "He is buying a replacement penguin pendant for Penelope", "zh": "他在为佩内洛普另买一枚企鹅吊坠"}], "answer": 3, "explain": {"en": "Hans is innocent. When Penelope asks, he admits he went into the jewelry shop to buy her a new penguin pendant because the original meant so much to her.", "zh": "汉斯是无辜的。佩内洛普问他时，他承认走进珠宝店是想给她另买一枚企鹅吊坠，因为原来那枚对她意义重大。"}}, {"q": {"en": "What is George Shill's background that lets him convincingly pretend to be a doctor?", "zh": "乔治·希尔有什么背景，让他能逼真地冒充医生？"}, "options": [{"en": "He is a police officer", "zh": "他是一名警察"}, {"en": "He is Penelope's personal trainer", "zh": "他是佩内洛普的私人教练"}, {"en": "He was a medical student but was expelled for cheating on exams", "zh": "他曾是医学院学生，却因考试作弊被开除"}, {"en": "He is a licensed, practicing physician according to some versions of the story", "zh": "他是一名持证执业医生（按书中另一种说法）"}], "answer": 2, "explain": {"en": "Officer Fallon reports that George Shill was thrown out of medical school for cheating. He knew enough doctoring to x-ray Dink and wore Dr. Fleming's stolen jacket to look the part.", "zh": "法伦警官说，乔治·希尔因考试作弊被医学院开除。他懂足够的医术，能给丁克拍X光，又穿上偷来的弗莱明医生白大褂，装得像真医生。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  // re-bind radio events
  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
