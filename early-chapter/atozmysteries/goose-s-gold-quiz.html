<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Goose's Gold — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.6rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .baseball{
    width:50px;height:50px;border-radius:50%;
    background:#fff;margin:0 auto 12px;
    border:2px solid #e7e7e7;
    position:relative;
  }
  .baseball::before,.baseball::after{
    content:"";position:absolute;top:50%;width:2px;height:38px;
    background:#c0392b;transform:translateY(-50%) rotate(18deg);
    border-radius:2px;
  }
  .baseball::before{left:16px;}
  .baseball::after{right:16px;transform:translateY(-50%) rotate(-18deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>The Goose's Gold</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Ron Roy</p>
    <div class="baseball"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>A to Z Mysteries: The Goose's Gold</em> (Random House, 1999)</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Ron Roy",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the mystery well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The mystery is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Ron Roy",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个谜案。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！谜底藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Where do Dink, Josh, and Ruth Rose go on winter vacation?", "zh": "丁克、乔什和露丝·罗丝寒假去了哪里度假？"}, "options": [{"en": "Key West, Florida, to visit Ruth Rose's grandmother", "zh": "佛罗里达州的基韦斯特，去拜访露丝·罗丝的奶奶"}, {"en": "New York City", "zh": "纽约市"}, {"en": "Green Lawn, Connecticut", "zh": "康涅狄格州的格林劳恩"}, {"en": "A mountain cabin", "zh": "山间小屋"}], "answer": 0, "explain": {"en": "The kids visit Ruth Rose's grandmother, Gram Hathaway, on the island of Key West in Florida.", "zh": "孩子们去佛罗里达州的基韦斯特岛，拜访露丝·罗丝的奶奶哈撒韦奶奶。"}}, {"q": {"en": "At the airport, what does Dink overhear a whispering man plan to do?", "zh": "在机场，丁克偷听到那个低声说话的男人在计划做什么？"}, "options": [{"en": "Take the money and 'drown the goose'", "zh": "拿走钱并‘把鹅淹掉’"}, {"en": "Bake cookies for a party", "zh": "为派对烤饼干"}, {"en": "Buy a plane ticket", "zh": "买一张飞机票"}, {"en": "Find a lost dog", "zh": "找一只走丢的狗"}], "answer": 0, "explain": {"en": "Dink hears a man say 'take the dough and split' and 'drown the goose and disappear' — a plan to steal and run away.", "zh": "丁克听到一个男人说‘把钱分了’以及‘把鹅淹掉然后消失’——一个偷钱逃跑的计划。"}}, {"q": {"en": "What is the name painted on Spike and Chip's treasure boat?", "zh": "斯派克和奇普的寻宝船上涂着什么名字？"}, "options": [{"en": "The Golden Goose", "zh": "金鹅号（The Golden Goose）"}, {"en": "The Silver Dolphin", "zh": "银海豚号"}, {"en": "The Red Crab", "zh": "红蟹号"}, {"en": "The Blue Whale", "zh": "蓝鲸号"}], "answer": 0, "explain": {"en": "The kids see the letters being painted and learn the boat is called the Golden Goose.", "zh": "孩子们看到船上正在涂字母，得知这艘船叫‘金鹅号’。"}}, {"q": {"en": "What clue makes Dink think the man at the airport was Spike?", "zh": "是什么线索让丁克认为机场那个男人就是斯派克？"}, "options": [{"en": "An eagle-head tattoo on his ankle", "zh": "他脚踝上有一个鹰头的纹身"}, {"en": "A scar on his face", "zh": "他脸上的疤痕"}, {"en": "A gold ring", "zh": "一枚金戒指"}, {"en": "A red hat", "zh": "一顶红帽子"}], "answer": 0, "explain": {"en": "Dink had seen a man at the airport with an eagle-head ankle tattoo, and later spots the same tattoo on Spike.", "zh": "丁克在机场见过一个脚踝上有鹰头纹身的男人，后来在斯派克脚上也看到了同样的纹身。"}}, {"q": {"en": "How does Josh realize Spike's treasure is fake?", "zh": "乔什是怎么发现斯派克的‘宝藏’是假的？"}, "options": [{"en": "Spike said they cleaned silver with vinegar, but real silver needs a chemical bath for days", "zh": "斯派克说他们用醋清洗银器，但真正的银器需要化学溶液浸泡好几天"}, {"en": "The coins were made of plastic", "zh": "硬币是塑料做的"}, {"en": "The gold was painted yellow", "zh": "金子是涂成黄色的"}, {"en": "The boat had no motor", "zh": "船上没有马达"}], "answer": 0, "explain": {"en": "Josh reads that silver needs a special chemical solution for days to shine, but Spike claimed they used vinegar. The empty oxygen tank also shows they never really dove.", "zh": "乔什读到银器需要特殊化学溶液浸泡多日才能发亮，而斯派克却说他们用醋。氧气罐也是空的，说明他们从没真正去潜水。"}}, {"q": {"en": "What do Spike and Chip plan to do to their own boat?", "zh": "斯派克和奇普打算对自己的船做什么？"}, "options": [{"en": "Sink it with cinder blocks and run off with the money", "zh": "用水泥砖把船沉掉，然后带着钱逃跑"}, {"en": "Sell it to Gram Hathaway", "zh": "把它卖给哈撒韦奶奶"}, {"en": "Paint it a new color", "zh": "把它重新刷漆"}, {"en": "Give it to the kids", "zh": "把船送给孩子们"}], "answer": 0, "explain": {"en": "The kids hear the men plan to sink the Golden Goose with cinder blocks after collecting the investors' money.", "zh": "孩子们偷听到这两个人计划在拿到投资人的钱后，用水泥砖把‘金鹅号’沉掉。"}}, {"q": {"en": "How do the kids escape when the boat starts to sink?", "zh": "船开始下沉时，孩子们是怎么逃生的？"}, "options": [{"en": "They put on life vests and jump into the water, then the Coast Guard rescues them", "zh": "他们穿上救生衣跳进海里，随后被海岸警卫队救起"}, {"en": "They swim to the dock", "zh": "他们游回码头"}, {"en": "They hide in the cabin", "zh": "他们藏在船舱里"}, {"en": "Spike saves them", "zh": "斯派克救了他们"}], "answer": 0, "explain": {"en": "The kids scramble out, put on life vests, jump overboard, and are pulled from the water by the Coast Guard.", "zh": "孩子们爬出来穿上救生衣跳海，随后被海岸警卫队的船从水里救起。"}}, {"q": {"en": "Where had the gold and silver Spike showed actually been stolen from?", "zh": "斯派克展示的那些金银其实是从哪里偷来的？"}, "options": [{"en": "A museum in Miami", "zh": "迈阿密的一家博物馆"}, {"en": "Gram Hathaway's house", "zh": "哈撒韦奶奶家"}, {"en": "A sunken ship", "zh": "一艘沉船"}, {"en": "A bank", "zh": "一家银行"}], "answer": 0, "explain": {"en": "The treasure was stolen from a Miami museum, which had offered a reward for its return.", "zh": "这些宝物是从迈阿密的一家博物馆偷来的，博物馆还悬赏找回。"}}, {"q": {"en": "What did the whispered words 'old cookies are loaded' really mean?", "zh": "那句低声说的‘老饼干很有料（loaded）’实际上是什么意思？"}, "options": [{"en": "Gram's friends had lots of money to invest", "zh": "奶奶的朋友们很有钱，可以投资"}, {"en": "The cookies were full of chocolate chips", "zh": "饼干里全是巧克力豆"}, {"en": "Someone was baking a lot", "zh": "有人在大量烤饼干"}, {"en": "The hotel was serving snacks", "zh": "旅馆在供应点心"}], "answer": 0, "explain": {"en": "'Loaded' meant rich — the crooks were after the money of Gram Hathaway and her wealthy friends.", "zh": "‘loaded’意思是‘很有钱’——骗子盯上的是哈撒韦奶奶和她那些有钱朋友的钱。"}}, {"q": {"en": "What reward do the kids receive for catching the thieves?", "zh": "孩子们因为抓住小偷得到了什么奖励？"}, "options": [{"en": "Plane tickets to Florida, Disney World passes, and money", "zh": "去佛罗里达的机票、迪士尼世界的门票，还有一笔钱"}, {"en": "A new boat", "zh": "一艘新船"}, {"en": "A box of gold coins", "zh": "一盒金币"}, {"en": "A pet parrot", "zh": "一只宠物鹦鹉"}], "answer": 0, "explain": {"en": "Because the museum treasure was recovered, the kids get plane tickets, Disney passes, and cash as a reward.", "zh": "因为博物馆的宝物被找回，孩子们得到了机票、迪士尼门票和现金作为奖励。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  // re-bind radio events
  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
