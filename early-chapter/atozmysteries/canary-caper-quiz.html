<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Canary Caper — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.6rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .baseball{
    width:50px;height:50px;border-radius:50%;
    background:#fff;margin:0 auto 12px;
    border:2px solid #e7e7e7;
    position:relative;
  }
  .baseball::before,.baseball::after{
    content:"";position:absolute;top:50%;width:2px;height:38px;
    background:#c0392b;transform:translateY(-50%) rotate(18deg);
    border-radius:2px;
  }
  .baseball::before{left:16px;}
  .baseball::after{right:16px;transform:translateY(-50%) rotate(-18deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>The Canary Caper</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Ron Roy</p>
    <div class="baseball"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>A to Z Mysteries: The Canary Caper</em> (Random House, 1997)</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Ron Roy",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the mystery well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The mystery is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Ron Roy",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个谜案。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！谜底藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "How many pets disappeared in Green Lawn on the same day?", "zh": "在同一天里，绿草坪镇一共丢了几只宠物？"}, "options": [{"en": "Four", "zh": "四只"}, {"en": "Three", "zh": "三只"}, {"en": "One", "zh": "一只"}, {"en": "Two", "zh": "两只"}], "answer": 0, "explain": {"en": "Officer Fallon said four pets were missing: Mrs. Davis's canary Mozart, Ruth Rose's cat Tiger, Dr. Pardue's rabbit Violet, and Mrs. Gwynn's parrot Archie.", "zh": "法伦警官说有四只宠物失踪：戴维斯太太的金丝雀莫扎特、露丝的猫老虎、帕杜医生的兔子维奥莱特、格温太太的鹦鹉阿奇。"}}, {"q": {"en": "Who brought Mrs. Davis's canary Mozart back home?", "zh": "是谁把戴维斯太太的金丝雀莫扎特送回来的？"}, "options": [{"en": "Fred Little", "zh": "弗雷德·利特尔"}, {"en": "Howard the barber", "zh": "理发师霍华德"}, {"en": "Officer Fallon", "zh": "法伦警官"}, {"en": "Mrs. Wong", "zh": "黄太太"}], "answer": 0, "explain": {"en": "A thin young man named Fred Little returned Mozart in a small box with holes poked in the sides and refused any reward.", "zh": "一个叫弗雷德·利特尔的瘦年轻人把莫扎特装在有孔的盒子里送了回来，还谢绝了任何酬谢。"}}, {"q": {"en": "What trick did the thieves use to get inside people's houses?", "zh": "小偷用了什么诡计进到别人家里？"}, "options": [{"en": "They returned the stolen pets to get a peek inside the house, then came back to rob it", "zh": "他们先还回宠物混进屋里踩点，再回来偷东西"}, {"en": "They called the police to open the door according to some versions of the story in an early draft of the book", "zh": "他们叫警察来开门（按书中另一种说法）（在书的早期草稿中）"}, {"en": "They broke in immediately", "zh": "他们立刻破门而入"}, {"en": "They sent a ransom note first", "zh": "他们先寄了勒索信"}], "answer": 0, "explain": {"en": "The crooks stole a pet, returned it so the owners would invite them in (and show them around), then later burglarized the same house.", "zh": "坏蛋先偷宠物，再送回来，让主人请他们进屋参观，摸清情况后回头再来抢劫同一户人家。"}}, {"q": {"en": "What special tool did Fred Little use to reach Mrs. Davis's second-floor window?", "zh": "弗雷德·利特尔用了什么特别工具爬上戴维斯太太家二楼的窗户？"}, "options": [{"en": "A trampoline", "zh": "蹦床"}, {"en": "Stilts", "zh": "高跷"}, {"en": "A rope from the tree", "zh": "树上垂下的绳子"}, {"en": "A borrowed ladder", "zh": "借来的梯子"}], "answer": 1, "explain": {"en": "He pulled a pair of long stilts from his gym bag and stilt-walked up to the small second-floor window.", "zh": "他从运动包里拿出一副长高跷，踩着高跷走到二楼的小窗户前。"}}, {"q": {"en": "What was Fred Little's other job that helped him pull off the crimes?", "zh": "弗雷德·利特尔的另一份工作是什么，让他能顺利作案？"}, "options": [{"en": "A barber", "zh": "理发师"}, {"en": "A pet shop owner according to some versions of the story", "zh": "宠物店老板（按书中另一种说法）"}, {"en": "A clown in the traveling circus", "zh": "流动马戏团的小丑"}, {"en": "A police officer", "zh": "一名警察"}], "answer": 2, "explain": {"en": "He was a clown with the Tinker Town Traveling Circus — the Superman clown on stilts — which is why Josh recognized him.", "zh": "他是丁克镇流动马戏团的小丑——踩高跷的超人小丑，所以乔什后来认出了他。"}}, {"q": {"en": "Why couldn't Officer Fallon arrest Fred Little right after he returned the canary?", "zh": "为什么弗雷德送回金丝雀后，法伦警官不能马上逮捕他？"}, "options": [{"en": "Fred Little had a permit", "zh": "弗雷德有许可证"}, {"en": "He liked Fred Little", "zh": "他喜欢弗雷德"}, {"en": "Mrs. Davis refused to press charges according to some versions of the story", "zh": "戴维斯太太不肯追究（按书中另一种说法）"}, {"en": "There was no evidence he had committed a crime yet", "zh": "当时还没有他犯罪的证据"}], "answer": 3, "explain": {"en": "Returning a lost canary and being inside the house was the same pattern as the other burglaries, but without proof of a planned crime, he couldn't be arrested.", "zh": "送回走失的金丝雀并进入屋内，虽然和另外两起盗窃模式一样，但没有犯罪证据，就不能抓人。"}}, {"q": {"en": "What surprise did Ruth Rose find at the very end of the story?", "zh": "故事最后，露丝·罗丝发现了什么惊喜？"}, "options": [{"en": "Tiger was stolen by Fred Little", "zh": "老虎被弗雷德偷走了"}, {"en": "Tiger was performing at the circus according to some versions of the story", "zh": "老虎在马戏团表演（按书中另一种说法）"}, {"en": "Tiger ran away forever", "zh": "老虎永远跑掉了"}, {"en": "Tiger came home with three kittens", "zh": "老虎带着三只小猫回家了"}], "answer": 3, "explain": {"en": "Tiger returned on her own and had hidden three newborn kittens under Ruth Rose's bed, making her a 'grandmother.'", "zh": "老虎自己回来了，还在露丝的床下藏了三只刚出生的小猫，让露丝成了“外婆”。"}}, {"q": {"en": "How did the kids recognize Fred Little during the nighttime stakeout?", "zh": "夜里守候时，孩子们是怎么认出弗雷德·利特尔的？"}, "options": [{"en": "By his dog", "zh": "凭他的狗"}, {"en": "By his loud voice according to some versions of the story", "zh": "凭他的大嗓门（按书中另一种说法）"}, {"en": "By his yellow suspenders from the circus clown", "zh": "凭他在马戏团小丑那身黄吊带"}, {"en": "By his red hair", "zh": "凭他的红头发"}], "answer": 2, "explain": {"en": "Josh noticed Fred's yellow suspenders — the same ones worn by the Superman clown he'd seen snapping suspenders at the circus.", "zh": "乔什注意到弗雷德的黄吊带——和他在马戏团看到的、弹着吊带的超人小丑身上那根一模一样。"}}, {"q": {"en": "Where did Mrs. Davis's long sword come from?", "zh": "戴维斯太太那把长剑是从哪里来的？"}, "options": [{"en": "Fred Little left it behind", "zh": "弗雷德落下的"}, {"en": "Her husband brought it back from one of their trips", "zh": "她丈夫旅行时带回来的"}, {"en": "She bought it at the circus", "zh": "她在马戏团买的"}, {"en": "Officer Fallon gave it to her according to some versions of the story", "zh": "法伦警官给她的（按书中另一种说法）"}], "answer": 1, "explain": {"en": "Mrs. Davis said her late husband had brought the sword back from one of their trips, and it had been under her bed for years.", "zh": "戴维斯太太说，这把剑是她已故的丈夫某次旅行带回来的，在床底下放了多年。"}}, {"q": {"en": "What is the name of Ruth Rose's orange cat?", "zh": "露丝·罗丝那只橘色猫叫什么名字？"}, "options": [{"en": "Nate", "zh": "内特"}, {"en": "Tiger", "zh": "老虎"}, {"en": "Loretta", "zh": "洛蕾塔"}, {"en": "Mozart", "zh": "莫扎特"}], "answer": 1, "explain": {"en": "Ruth Rose's plump orange cat is named Tiger; Loretta is Dink's guinea pig, Mozart is the canary, and Nate is Ruth Rose's little brother.", "zh": "露丝那只胖橘猫叫老虎；洛蕾塔是丁克的豚鼠，莫扎特是金丝雀，内特是露丝的小弟弟。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  // re-bind radio events
  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
