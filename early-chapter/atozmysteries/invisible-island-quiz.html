<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Invisible Island — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.6rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .baseball{
    width:50px;height:50px;border-radius:50%;
    background:#fff;margin:0 auto 12px;
    border:2px solid #e7e7e7;
    position:relative;
  }
  .baseball::before,.baseball::after{
    content:"";position:absolute;top:50%;width:2px;height:38px;
    background:#c0392b;transform:translateY(-50%) rotate(18deg);
    border-radius:2px;
  }
  .baseball::before{left:16px;}
  .baseball::after{right:16px;transform:translateY(-50%) rotate(-18deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>The Invisible Island</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Ron Roy</p>
    <div class="baseball"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>A to Z Mysteries: The Invisible Island</em> (Random House, 1999)</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Ron Roy",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the mystery well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The mystery is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Ron Roy",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个谜案。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！谜底藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who found the first hundred-dollar bill buried in the sand on Squaw Island?", "zh": "是谁在斯夸岛的沙子里发现了第一张一百美元钞票？"}, "options": [{"en": "Dink", "zh": "丁克"}, {"en": "Ruth Rose", "zh": "露丝·罗丝"}, {"en": "Officer Fallon", "zh": "法伦警官"}, {"en": "Josh", "zh": "乔什"}], "answer": 1, "explain": {"en": "Ruth Rose spotted something green poking out of the sand and pulled out a hundred-dollar bill.", "zh": "露丝·罗丝发现沙子里露出一点绿色，抽出了一张一百美元钞票。"}}, {"q": {"en": "What was hidden behind the fake plastic poison ivy on the boulder?", "zh": "石头上假塑料毒藤的后面藏着什么？"}, "options": [{"en": "A cement vault full of money", "zh": "装满钱的混凝土保险库"}, {"en": "A buried chest of gold according to some versions of the story", "zh": "埋着黄金的箱子（按书中另一种说法）"}, {"en": "A pirate skeleton", "zh": "海盗的骷髅"}, {"en": "A sleeping dog", "zh": "一只熟睡的狗"}], "answer": 0, "explain": {"en": "Josh pried off the plastic vines to reveal a large cement box that opened into a vault stacked with money.", "zh": "乔什撬开塑料藤蔓，露出一个大混凝土箱子，打开后是一间堆满钞票的保险库。"}}, {"q": {"en": "What kind of money was inside the hidden cement vault?", "zh": "隐藏的混凝土保险库里装的是什么钱？"}, "options": [{"en": "Toy money", "zh": "玩具钱"}, {"en": "Real US dollars", "zh": "真正的美元"}, {"en": "Counterfeit (fake) money", "zh": "伪造的（假）钱"}, {"en": "Pirate gold coins according to some versions of the story", "zh": "海盗金币（按书中另一种说法）"}], "answer": 2, "explain": {"en": "Officer Fallon examined the bill and told the kids the money was counterfeit, not real.", "zh": "法伦警官检查了钞票，告诉孩子们这些钱是伪造的假币，不是真钱。"}}, {"q": {"en": "Who really made the giant footprints on the island?", "zh": "岛上巨大的脚印到底是谁留下的？"}, "options": [{"en": "Dink", "zh": "丁克"}, {"en": "A pirate named Blackbeard according to some versions of the story", "zh": "名叫黑胡子的海盗（按书中另一种说法）"}, {"en": "Mr. Bent wearing long green wading boots", "zh": "穿着绿色高筒涉水靴的本特先生"}, {"en": "Mr. Pinkowski", "zh": "平科夫斯基先生"}], "answer": 2, "explain": {"en": "In the Bents' garage the kids found long green wading boots with sand in the treads — they made the big prints.", "zh": "孩子们在班特家的车库里发现了鞋底带沙子的绿色高筒涉水靴——正是它们留下了大脚印。"}}, {"q": {"en": "What were the 'Happy Heart Dog Food' boxes really used for?", "zh": "“开心狗粮”纸箱实际上是用来做什么的？"}, "options": [{"en": "To pack sandwiches", "zh": "装三明治"}, {"en": "To feed the Bents' dog", "zh": "喂班特家的狗"}, {"en": "To store paint", "zh": "装油漆"}, {"en": "To carry the fake money", "zh": "搬运假钱"}], "answer": 3, "explain": {"en": "The counterfeiters used empty dog food boxes to move the fake money to and from the island.", "zh": "造假币的人用空狗粮箱把假钱运进运出小岛。"}}, {"q": {"en": "Why did Mr. Pinkowski buy three bottles of calamine lotion?", "zh": "平科夫斯基先生为什么买了三瓶炉甘石洗剂？"}, "options": [{"en": "As a favor for Mr. Bent, who was itching", "zh": "帮本特先生买的，本特先生身上很痒"}, {"en": "He had poison ivy himself according to some versions of the story", "zh": "他自己得了毒藤疹（按书中另一种说法）"}, {"en": "For the kids' rash", "zh": "给孩子们止痒"}, {"en": "To sell in his shop", "zh": "放在自己店里卖"}], "answer": 0, "explain": {"en": "Mr. P was innocent; he noticed Mr. Bent was itching and bought him the lotion as a kindness.", "zh": "平科夫斯基先生是无辜的；他看到本特先生身上发痒，好心帮他买了洗剂。"}}, {"q": {"en": "How did the kids escape from the Bents' garage?", "zh": "孩子们是怎么从班特家的车库逃出来的？"}, "options": [{"en": "By calling Officer Fallon according to some versions of the story", "zh": "打电话给法伦警官（按书中另一种说法）"}, {"en": "By making loud noise to lure the Bents inside", "zh": "制造巨大噪音把班特夫妇引进车库"}, {"en": "By ringing the doorbell", "zh": "按门铃"}, {"en": "By feeding the dog", "zh": "喂狗"}], "answer": 1, "explain": {"en": "Josh banged a pail with a hammer; the Bents ran in to check, and the kids slipped out the window.", "zh": "乔什用锤子敲打水桶制造巨响；班特夫妇跑进来看，孩子们趁机从窗户溜走。"}}, {"q": {"en": "What did Ruth Rose write in chalk on the garage floor?", "zh": "露丝·罗丝用粉笔在车库地板上写了什么？"}, "options": [{"en": "A thank-you note according to some versions of the story in an early draft of the book", "zh": "一封感谢信（按书中另一种说法）（在书的早期草稿中）"}, {"en": "A grocery list", "zh": "一份购物清单"}, {"en": "A treasure map", "zh": "一张藏宝图"}, {"en": "A note saying she knew about the counterfeit money and to meet on Squaw Island", "zh": "一张字条，说她知道假币的事，约对方去斯夸岛见面"}], "answer": 3, "explain": {"en": "She wrote that she knew about the fake money and would meet them on Squaw Island so police could catch them.", "zh": "她写道自己知道假币的事，并约他们到斯夸岛见面——这样警察就能抓到他们。"}}, {"q": {"en": "Who were the real counterfeiters in the story?", "zh": "故事里真正的造假币者是谁？"}, "options": [{"en": "Mr. Pinkowski according to some versions of the story", "zh": "平科夫斯基先生（按书中另一种说法）"}, {"en": "Mr. and Mrs. Warden Bent", "zh": "沃登·本特夫妇"}, {"en": "The three kids", "zh": "三个孩子"}, {"en": "Officer Fallon", "zh": "法伦警官"}], "answer": 1, "explain": {"en": "Officer Fallon and Officer Keene caught Mr. and Mrs. Bent on Squaw Island with the boat full of fake money.", "zh": "法伦警官和基恩警官在斯夸岛上抓到了本特夫妇，他们的船上装满了假钱。"}}, {"q": {"en": "What does Josh get at the end of the story?", "zh": "故事结尾乔什得到了什么？"}, "options": [{"en": "A basset hound dog named Shorty", "zh": "一只名叫肖蒂的巴吉度猎犬"}, {"en": "A pirate map", "zh": "一张海盗地图"}, {"en": "A hundred dollars according to some versions of the story", "zh": "一百美元（按书中另一种说法）"}, {"en": "A new boat", "zh": "一条新船"}], "answer": 0, "explain": {"en": "Officer Fallon gave Josh the Bents' basset hound, Shorty, who needed a new home.", "zh": "法伦警官把班特家的巴吉度猎犬肖蒂送给了乔什，它需要一个新的家。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  // re-bind radio events
  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
