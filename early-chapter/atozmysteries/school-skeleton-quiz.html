<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The School Skeleton — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.6rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .baseball{
    width:50px;height:50px;border-radius:50%;
    background:#fff;margin:0 auto 12px;
    border:2px solid #e7e7e7;
    position:relative;
  }
  .baseball::before,.baseball::after{
    content:"";position:absolute;top:50%;width:2px;height:38px;
    background:#c0392b;transform:translateY(-50%) rotate(18deg);
    border-radius:2px;
  }
  .baseball::before{left:16px;}
  .baseball::after{right:16px;transform:translateY(-50%) rotate(-18deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>The School Skeleton</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Ron Roy</p>
    <div class="baseball"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>A to Z Mysteries: The School Skeleton</em> (Random House, 2003)</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Ron Roy",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the mystery well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The mystery is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Ron Roy",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个谜案。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！谜底藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What is the name of the school's skeleton?", "zh": "学校里的骷髅叫什么名字？"}, "options": [{"en": "Polly", "zh": "波莉"}, {"en": "Pal", "zh": "帕尔"}, {"en": "Mr. Bones", "zh": "骨头先生（Mr. Bones）"}, {"en": "Mr. Skull according to some versions of the story", "zh": "头骨先生（按书中另一种说法）"}], "answer": 2, "explain": {"en": "The school uses a plastic human skeleton named Mr. Bones to teach science.", "zh": "学校有一具用来教科学的塑料人体骷髅，名叫骨头先生（Mr. Bones）。"}}, {"q": {"en": "Where does Mr. Bones usually stay?", "zh": "骨头先生平时放在哪里？"}, "options": [{"en": "At the fire station", "zh": "在消防站"}, {"en": "In the science room at school", "zh": "在学校的科学教室里"}, {"en": "In the school cafeteria according to some versions of the story", "zh": "在学校食堂（按书中另一种说法）"}, {"en": "In Dink's bedroom", "zh": "在丁克的卧室"}], "answer": 1, "explain": {"en": "Mr. Bones normally hangs in the school's science room where students learn about the human body.", "zh": "骨头先生平时挂在学校的科学教室里，学生们在那里学习人体知识。"}}, {"q": {"en": "What happens to Mr. Bones in the story?", "zh": "故事里骨头先生遇到了什么事？"}, "options": [{"en": "He is given to another school", "zh": "他被送给了另一所学校"}, {"en": "He breaks into pieces by accident", "zh": "他不小心散架了"}, {"en": "He disappears and the kids must find him", "zh": "他不见了，孩子们必须把他找回来"}, {"en": "He is put on display at a museum according to some versions of the story", "zh": "他被送到博物馆展出（按书中另一种说法）"}], "answer": 2, "explain": {"en": "One day Mr. Bones is missing from his usual spot, and Dink, Josh, and Ruth Rose set out to solve the mystery.", "zh": "有一天，骨头先生从老地方消失了，丁克、乔希和露丝·罗丝开始调查，要解开这个谜。"}}, {"q": {"en": "Who investigates the missing skeleton?", "zh": "是谁在调查骷髅失踪案？"}, "options": [{"en": "Dink, Josh, and Ruth Rose", "zh": "丁克、乔希和露丝·罗丝"}, {"en": "Officer Fallon alone according to some versions of the story", "zh": "只有法伦警官（按书中另一种说法）"}, {"en": "The school cook", "zh": "学校的厨师"}, {"en": "The principal alone", "zh": "只有校长一个人"}], "answer": 0, "explain": {"en": "As in every A to Z Mystery, the three friends become detectives and hunt for clues.", "zh": "和每一本A to Z Mysteries一样，三个好朋友化身小侦探，四处寻找线索。"}}, {"q": {"en": "What kind of clue helps the kids?", "zh": "什么线索帮了孩子们？"}, "options": [{"en": "A note or footprint left by the thief", "zh": "贼留下的一张字条或一串脚印"}, {"en": "A broken window", "zh": "一扇破掉的窗户"}, {"en": "A treasure map", "zh": "一张藏宝图"}, {"en": "A lost library book according to some versions of the story", "zh": "一本丢失的图书馆书（按书中另一种说法）"}], "answer": 0, "explain": {"en": "The friends follow small clues such as a note or footprints to figure out where Mr. Bones was taken.", "zh": "小侦探们顺着字条或脚印这类小线索，推断出骨头先生被带到了哪里。"}}, {"q": {"en": "Why might someone have taken the skeleton?", "zh": "为什么会有人把骷髅拿走？"}, "options": [{"en": "To feed a dog", "zh": "用来喂狗"}, {"en": "To sell it for a lot of money", "zh": "为了卖一大笔钱"}, {"en": "Because they were afraid of it according to some versions of the story", "zh": "因为他们害怕它（按书中另一种说法）"}, {"en": "To use it for a project, a prank, or a contest", "zh": "想用它做项目、恶作剧或参加比赛"}], "answer": 3, "explain": {"en": "The thief wanted the skeleton for a school project, a joke, or to win a contest — not for anything truly dangerous.", "zh": "拿骷髅的人是想用它做学校项目、搞恶作剧或参加比赛——并不是什么危险的事。"}}, {"q": {"en": "Who becomes a suspect in the story?", "zh": "故事里谁成了嫌疑人？"}, "options": [{"en": "A new student at the school", "zh": "学校里的一名新同学"}, {"en": "Ruth Rose's brother according to some versions of the story", "zh": "露丝·罗丝的哥哥（按书中另一种说法）"}, {"en": "The school principal", "zh": "校长"}, {"en": "The lunch lady", "zh": "食堂阿姨"}], "answer": 0, "explain": {"en": "A new student at the school comes under suspicion, which sends the friends digging for the real truth.", "zh": "学校里的一名新同学受到怀疑，这促使小伙伴们去挖掘事情的真相。"}}, {"q": {"en": "Where do the kids eventually find Mr. Bones?", "zh": "孩子们最后在哪里找到了骨头先生？"}, "options": [{"en": "In a neighbor's barn according to some versions of the story", "zh": "在邻居的谷仓里（按书中另一种说法）"}, {"en": "Hidden somewhere inside the school", "zh": "藏在学校里面的某个地方"}, {"en": "On a fire truck", "zh": "在消防车上"}, {"en": "At the river", "zh": "在河边"}], "answer": 1, "explain": {"en": "By following the clues, the friends discover the skeleton hidden somewhere inside the school building.", "zh": "顺着线索，小伙伴们发现骷髅就藏在学校大楼里的某个地方。"}}, {"q": {"en": "What do the kids do after finding the skeleton?", "zh": "找到骷髅后，孩子们做了什么？"}, "options": [{"en": "Hide it again according to some versions of the story", "zh": "再把它藏起来（按书中另一种说法）"}, {"en": "Return it and help catch the culprit", "zh": "把它送回去，并帮忙抓住肇事者"}, {"en": "Sell it", "zh": "把它卖掉"}, {"en": "Throw it away", "zh": "把它扔掉"}], "answer": 1, "explain": {"en": "They bring Mr. Bones back to the science room and help the grown-ups find out who took him.", "zh": "他们把骨头先生送回科学教室，并帮大人们查出了是谁拿走了他。"}}, {"q": {"en": "What does this mystery show about solving problems?", "zh": "这个谜团说明了什么道理？"}, "options": [{"en": "That skeletons are scary according to some versions of the story", "zh": "骷髅很可怕（按书中另一种说法）"}, {"en": "That dogs can talk", "zh": "狗会说话"}, {"en": "That school is boring", "zh": "学校很无聊"}, {"en": "That teamwork and clues solve mysteries", "zh": "团队合作加上线索就能破案"}], "answer": 3, "explain": {"en": "Like all the A to Z Mysteries, the story shows that friends who work together and notice clues can solve any puzzle.", "zh": "和所有A to Z Mysteries一样，这个故事告诉我们：好朋友齐心合作、留意线索，就能解开任何谜题。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  // re-bind radio events
  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
