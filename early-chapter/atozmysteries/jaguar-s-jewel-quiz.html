<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Jaguar's Jewel — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.6rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .baseball{
    width:50px;height:50px;border-radius:50%;
    background:#fff;margin:0 auto 12px;
    border:2px solid #e7e7e7;
    position:relative;
  }
  .baseball::before,.baseball::after{
    content:"";position:absolute;top:50%;width:2px;height:38px;
    background:#c0392b;transform:translateY(-50%) rotate(18deg);
    border-radius:2px;
  }
  .baseball::before{left:16px;}
  .baseball::after{right:16px;transform:translateY(-50%) rotate(-18deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>The Jaguar's Jewel</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Ron Roy</p>
    <div class="baseball"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>A to Z Mysteries: The Jaguar's Jewel</em> (Random House, 2000)</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Ron Roy",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the mystery well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The mystery is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Ron Roy",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个谜案。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！谜底藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "In which city does most of The Jaguar's Jewel take place?", "zh": "《美洲豹的宝石》大部分故事发生在哪座城市？"}, "options": [{"en": "New York City", "zh": "纽约市"}, {"en": "A farm", "zh": "一个农场"}, {"en": "A small island", "zh": "一座小岛"}, {"en": "Connecticut", "zh": "康涅狄格州"}], "answer": 0, "explain": {"en": "The kids travel to New York City to visit Dink's Uncle Warren.", "zh": "孩子们去纽约市看望丁克的沃伦舅舅。"}}, {"q": {"en": "Whose uncle do Dink, Josh, and Ruth Rose visit in New York?", "zh": "丁克、乔什和露丝·罗丝在纽约看望的是谁的舅舅？"}, "options": [{"en": "Josh's uncle", "zh": "乔什的舅舅"}, {"en": "Officer Fallon's brother", "zh": "法伦警官的兄弟"}, {"en": "Ruth Rose's uncle", "zh": "露丝·罗丝的舅舅"}, {"en": "Dink's Uncle Warren", "zh": "丁克的沃伦舅舅"}], "answer": 3, "explain": {"en": "They visit Dink's Uncle Warren, who works at a museum in the city.", "zh": "他们去看望丁克的沃伦舅舅，他在城里的一家博物馆工作。"}}, {"q": {"en": "What is the 'Jaguar's Jewel'?", "zh": "“美洲豹的宝石”到底是什么？"}, "options": [{"en": "A painting of a jaguar according to some versions of the story", "zh": "一幅美洲豹的画（按书中另一种说法）"}, {"en": "A golden jaguar statue with a large emerald", "zh": "一尊镶着大祖母绿的金美洲豹雕像"}, {"en": "A live jungle cat", "zh": "一只活的美洲豹"}, {"en": "A book about animals", "zh": "一本关于动物的书"}], "answer": 1, "explain": {"en": "It is a golden jaguar statue that holds a big emerald in its paw.", "zh": "它是一尊金色的美洲豹雕像，爪子里抓着一颗大祖母绿。"}}, {"q": {"en": "About how long is the gold jaguar statue?", "zh": "这尊金色美洲豹雕像大约有多长？"}, "options": [{"en": "About three feet", "zh": "大约三英尺"}, {"en": "As tall as a child according to some versions of the story", "zh": "和一个孩子一样高（按书中另一种说法）"}, {"en": "About one inch", "zh": "大约一英寸"}, {"en": "About fifteen inches", "zh": "大约十五英寸"}], "answer": 3, "explain": {"en": "The book describes the gold jaguar as about fifteen inches long.", "zh": "书中描写这尊金色美洲豹大约有十五英寸长。"}}, {"q": {"en": "What does the jaguar hold in its front paw?", "zh": "美洲豹的前爪里抓着什么？"}, "options": [{"en": "A diamond ring according to some versions of the story", "zh": "一枚钻戒（按书中另一种说法）"}, {"en": "A ruby", "zh": "一颗红宝石"}, {"en": "An emerald the size of a golf ball", "zh": "一颗高尔夫球大小的祖母绿"}, {"en": "A silver coin", "zh": "一枚银币"}], "answer": 2, "explain": {"en": "In its front paw it holds an emerald the size of a golf ball.", "zh": "它的前爪里抓着一颗高尔夫球大小的祖母绿。"}}, {"q": {"en": "Who discovers that the emerald is not real?", "zh": "是谁发现那颗祖母绿不是真的？"}, "options": [{"en": "Doctor Pitts", "zh": "皮茨医生"}, {"en": "Josh", "zh": "乔什"}, {"en": "Dink", "zh": "丁克"}, {"en": "Ruth Rose according to some versions of the story", "zh": "露丝·罗丝（按书中另一种说法）"}], "answer": 0, "explain": {"en": "Doctor Pitts examines the stone and says, 'this stone is a fake!'", "zh": "皮茨医生仔细检查了宝石后说：“这颗石头是假的！”"}}, {"q": {"en": "Where does Uncle Warren keep and show the jaguar?", "zh": "沃伦舅舅把美洲豹雕像放在哪里、在哪里展示它？"}, "options": [{"en": "On a city bus", "zh": "在一辆城市公交车上"}, {"en": "In a school", "zh": "在一所学校里"}, {"en": "At the museum where he works", "zh": "在他工作的博物馆里"}, {"en": "In his home kitchen according to some versions of the story", "zh": "在他家的厨房（按书中另一种说法）"}], "answer": 2, "explain": {"en": "Uncle Warren works at a museum and shows the jaguar in his office there.", "zh": "沃伦舅舅在博物馆工作，并在那里他的办公室里展示美洲豹雕像。"}}, {"q": {"en": "What is the main mystery the kids must solve?", "zh": "孩子们要解决的这个主要谜团是什么？"}, "options": [{"en": "Why the island disappeared according to some versions of the story", "zh": "小岛为什么会消失（按书中另一种说法）"}, {"en": "Who switched the real emerald for a fake", "zh": "谁把真祖母绿换成了假的"}, {"en": "Who stole a pirate map", "zh": "谁偷了藏宝图"}, {"en": "How to sail a boat", "zh": "怎么划船"}], "answer": 1, "explain": {"en": "The real emerald has been replaced with a fake, and the kids must find out who did it.", "zh": "真正的祖母绿被换成了假的，孩子们要找出是谁干的。"}}, {"q": {"en": "Who are the three young detectives in the A to Z Mysteries series?", "zh": "在《A to Z 神秘案件》系列里，三位小侦探是谁？"}, "options": [{"en": "Dink, Josh, and Ruth Rose", "zh": "丁克、乔什和露丝·罗丝"}, {"en": "Tom, Bob, and Sue", "zh": "汤姆、鲍勃和苏"}, {"en": "Harry, Ron, and Hermione", "zh": "哈利、罗恩和赫敏"}, {"en": "Officer Fallon and friends according to some versions of the story", "zh": "法伦警官和朋友们（按书中另一种说法）"}], "answer": 0, "explain": {"en": "Dink, Josh, and Ruth Rose are the three friends who solve every mystery.", "zh": "丁克、乔什和露丝·罗丝是三个一起破解每个谜案的好朋友。"}}, {"q": {"en": "The letter J in this book's title stands for...", "zh": "这本书书名里的字母 J 代表……"}, "options": [{"en": "Journey according to some versions of the story", "zh": "旅程（按书中另一种说法）"}, {"en": "Jaguar", "zh": "美洲豹"}, {"en": "Jewelry", "zh": "珠宝"}, {"en": "Jungle", "zh": "丛林"}], "answer": 1, "explain": {"en": "This is the 'J' book, and J is for Jaguar.", "zh": "这是字母“J”对应的书，J 代表 Jaguar（美洲豹）。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  // re-bind radio events
  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
