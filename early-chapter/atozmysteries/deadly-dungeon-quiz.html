<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Deadly Dungeon — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.6rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .baseball{
    width:50px;height:50px;border-radius:50%;
    background:#fff;margin:0 auto 12px;
    border:2px solid #e7e7e7;
    position:relative;
  }
  .baseball::before,.baseball::after{
    content:"";position:absolute;top:50%;width:2px;height:38px;
    background:#c0392b;transform:translateY(-50%) rotate(18deg);
    border-radius:2px;
  }
  .baseball::before{left:16px;}
  .baseball::after{right:16px;transform:translateY(-50%) rotate(-18deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>The Deadly Dungeon</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Ron Roy</p>
    <div class="baseball"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>A to Z Mysteries: The Deadly Dungeon</em> (Random House, 1998)</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Ron Roy",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the mystery well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The mystery is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Ron Roy",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个谜案。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！谜底藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Where does Wallis Wallace live, and what is her home called?", "zh": "华莱士住在哪里？她的家叫什么名字？"}, "options": [{"en": "Moose Manor, a castle in Belfast, Maine", "zh": "驼鹿庄园，缅因州贝尔法斯特的一座城堡"}, {"en": "A cottage in Connecticut", "zh": "康涅狄格州的一间小屋"}, {"en": "A house in Green Lawn", "zh": "绿草坪镇的一栋房子"}, {"en": "A tent at the circus", "zh": "马戏团的帐篷"}], "answer": 0, "explain": {"en": "Wallis Wallace lives in Moose Manor, a huge stone castle with a moat and drawbridge in Belfast, Maine, on the Atlantic coast.", "zh": "华莱士住在驼鹿庄园，那是缅因州贝尔法斯特大西洋岸边一座带护城河和吊桥的巨大石城堡。"}}, {"q": {"en": "Who built Moose Manor, and what happened to him?", "zh": "驼鹿庄园是谁建造的？他后来怎样了？"}, "options": [{"en": "A movie star named Emory Scott, who died suddenly", "zh": "电影明星埃默里·斯科特，他突然去世了"}, {"en": "Wallis Wallace herself", "zh": "华莱士自己"}, {"en": "Walker Wallace", "zh": "沃克·华莱士"}, {"en": "A king named Emory", "zh": "一位名叫埃默里的国王"}], "answer": 0, "explain": {"en": "The castle was built in the 1930s by a movie star named Emory Scott, who supposedly died suddenly right inside the castle.", "zh": "这座城堡是1930年代由电影明星埃默里·斯科特建造的，据说他就在城堡里突然去世了。"}}, {"q": {"en": "What was really making the spooky 'ghost' screams in the castle?", "zh": "城堡里那恐怖的“鬼叫”声到底是谁发出的？"}, "options": [{"en": "Caged green parrots screeching", "zh": "被关在笼子里的绿鹦鹉在尖叫"}, {"en": "A real ghost", "zh": "真正的鬼魂"}, {"en": "Bats", "zh": "蝙蝠"}, {"en": "The wind", "zh": "风声"}], "answer": 0, "explain": {"en": "The 'ghost' was actually rare green parrots trapped in cages in a secret tunnel; their screeches echoed through the castle.", "zh": "“鬼”其实是秘密地道里被关在笼子里的稀有绿鹦鹉，它们的尖叫声在城堡里回荡。"}}, {"q": {"en": "How did the kids escape when the trapdoor locked shut and the tide rose?", "zh": "活板门被锁上、潮水上涨时，孩子们是怎么逃出去的？"}, "options": [{"en": "They swam out through the cave, using their knotted jeans as floats", "zh": "他们游过洞穴，用打了结的牛仔裤当浮具"}, {"en": "They called Walker on the phone", "zh": "他们打电话叫沃克"}, {"en": "They dug a hole in the wall", "zh": "他们在墙上挖了个洞"}, {"en": "They waited for the ghost to help", "zh": "他们等鬼来帮忙"}], "answer": 0, "explain": {"en": "Ruth Rose remembered a Girl Scout trick: tie knots in the jeans' legs to make water wings, then float the cages out through the tunnel.", "zh": "露丝想起女童子军杂志的招数：在牛仔裤腿上打结做成“水翼”，再把鸟笼浮着游出地道。"}}, {"q": {"en": "Who was the real poacher hiding the parrots in the cave?", "zh": "真正把鹦鹉藏在地道里的偷猎者是谁？"}, "options": [{"en": "Ripley Pearce (Rip)", "zh": "里普利·皮尔斯（里普）"}, {"en": "Walker Wallace", "zh": "沃克·华莱士"}, {"en": "Wallis Wallace", "zh": "华莱士"}, {"en": "Howard the barber", "zh": "理发师霍华德"}], "answer": 0, "explain": {"en": "Although Dink first suspected Walker, it was Ripley Pearce — caught red-handed opening the trapdoor at night.", "zh": "虽然丁克一开始怀疑沃克，但真正作案的是里普利·皮尔斯——孩子们半夜亲眼看到他打开活板门。"}}, {"q": {"en": "What did Ripley Pearce use to bring the parrots to the cave?", "zh": "里普利·皮尔斯是用什么把鹦鹉运到洞穴的？"}, "options": [{"en": "His clean lobster boat", "zh": "他那艘很干净的捕龙虾船"}, {"en": "Walker's Jeep", "zh": "沃克的吉普车"}, {"en": "A small airplane", "zh": "一架小飞机"}, {"en": "The school bus", "zh": "校车"}], "answer": 0, "explain": {"en": "Rip used his own lobster boat (the one that always looked so clean) to smuggle the rare parrots into the cave by sea.", "zh": "里普用他自己的捕龙虾船（那艘总是一尘不染的船）把稀有鹦鹉从海上运进洞穴。"}}, {"q": {"en": "What is 'Operation Game Thief'?", "zh": "“猎物神偷行动”是什么？"}, "options": [{"en": "An 800 number in Maine to report poachers", "zh": "缅因州举报偷猎者的800热线"}, {"en": "A TV game show", "zh": "一个电视游戏节目"}, {"en": "A kind of thief", "zh": "一种小偷"}, {"en": "A police officer's name", "zh": "一位警察的名字"}], "answer": 0, "explain": {"en": "After Rip was caught, the police gave Wallis the Operation Game Thief number — an 800 line in Maine for reporting poachers.", "zh": "里普被捕后，警察给了华莱士“猎物神偷行动”的号码——缅因州举报偷猎者的800热线。"}}, {"q": {"en": "Why did the kids first suspect Walker Wallace of being the poacher?", "zh": "孩子们一开始为什么怀疑沃克·华莱士是偷猎者？"}, "options": [{"en": "They found green parrot feathers in his Jeep and on his boat", "zh": "他们在沃克的吉普车和船上发现了绿鹦鹉羽毛"}, {"en": "He looked suspicious in the dark", "zh": "他在黑暗中看起来很可疑"}, {"en": "He was mean to animals", "zh": "他对动物很凶"}, {"en": "He owned the castle", "zh": "他拥有城堡"}], "answer": 0, "explain": {"en": "Dink found green feathers in Walker's Jeep and on his boat, and the big footprints matched — but the feathers actually came from Rip's shoes.", "zh": "丁克在沃克的吉普车和船上找到绿羽毛，脚印也吻合——但那些羽毛其实是里普鞋上带来的。"}}, {"q": {"en": "How did Josh help catch Ripley Pearce?", "zh": "乔什是如何帮忙抓住里普利·皮尔斯的？"}, "options": [{"en": "He slammed the trapdoor shut, trapping Rip inside the tunnel", "zh": "他猛地关上活板门，把里普关在地道里"}, {"en": "He called the police", "zh": "他报了警"}, {"en": "He fought Rip hand-to-hand", "zh": "他和里普徒手搏斗"}, {"en": "He fed the parrots", "zh": "他喂了鹦鹉"}], "answer": 0, "explain": {"en": "When Rip climbed down into the tunnel, Josh slammed the spring-lock trapdoor shut, locking him in until the police arrived.", "zh": "里普爬下地道后，乔什猛地关上弹簧锁活板门，把他锁在里面，直到警察赶到。"}}, {"q": {"en": "What did the kids find hidden under the tarp in the tunnel?", "zh": "孩子们在地道里的防水布下发现了什么？"}, "options": [{"en": "Two cages holding eight green parrots", "zh": "两个笼子，里面关着八只绿鹦鹉"}, {"en": "Pirate gold coins", "zh": "海盗的金币"}, {"en": "Human skeletons", "zh": "人的骷髅"}, {"en": "A nest of bats", "zh": "一窝蝙蝠"}], "answer": 0, "explain": {"en": "Under the tarp were two stacked cages, each with four large green parrots — eight endangered birds in total.", "zh": "防水布下是两个叠放的笼子，每个关着四只大绿鹦鹉——一共八只濒危鸟类。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  // re-bind radio events
  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
