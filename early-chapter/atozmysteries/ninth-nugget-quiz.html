<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Ninth Nugget — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.6rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .baseball{
    width:50px;height:50px;border-radius:50%;
    background:#fff;margin:0 auto 12px;
    border:2px solid #e7e7e7;
    position:relative;
  }
  .baseball::before,.baseball::after{
    content:"";position:absolute;top:50%;width:2px;height:38px;
    background:#c0392b;transform:translateY(-50%) rotate(18deg);
    border-radius:2px;
  }
  .baseball::before{left:16px;}
  .baseball::after{right:16px;transform:translateY(-50%) rotate(-18deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>The Ninth Nugget</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Ron Roy</p>
    <div class="baseball"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>A to Z Mysteries: The Ninth Nugget</em> (Random House, 2001)</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Ron Roy",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the mystery well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The mystery is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Ron Roy",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个谜案。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！谜底藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Where do Dink, Josh, and Ruth Rose go for their vacation?", "zh": "Dink、Josh 和 Ruth Rose 去哪里度假？"}, "options": [{"en": "A dude ranch in Bozeman, Montana", "zh": "蒙大拿州博兹曼的一个度假牧场"}, {"en": "An art museum", "zh": "一家艺术博物馆"}, {"en": "A summer camp in Connecticut according to some versions of the story", "zh": "康涅狄格州的夏令营（按书中另一种说法）"}, {"en": "A zoo in California", "zh": "加州的一家动物园"}], "answer": 0, "explain": {"en": "A friend gives them a trip to the Western Wheat dude ranch in Bozeman, Montana.", "zh": "一位朋友送他们去蒙大拿州博兹曼的 Western Wheat 度假牧场玩。"}}, {"q": {"en": "Who picks the kids up at the airport?", "zh": "是谁去机场接孩子们的？"}, "options": [{"en": "Ed Getz", "zh": "Ed Getz"}, {"en": "Thumbs", "zh": "Thumbs"}, {"en": "Pa Wheat according to some versions of the story", "zh": "Pa Wheat（按书中另一种说法）"}, {"en": "Jud Wheat", "zh": "Jud Wheat"}], "answer": 3, "explain": {"en": "Jud Wheat, the son of the ranch owners, drives a station wagon to pick them up and is late.", "zh": "牧场主的儿子 Jud Wheat 开着旅行车去接他们，还迟到了。"}}, {"q": {"en": "What does Josh find in the stream that is about the size of a potato?", "zh": "Josh 在溪水里发现了什么，大小差不多像一颗土豆？"}, "options": [{"en": "A gold nugget", "zh": "一块金块"}, {"en": "A silver coin according to some versions of the story", "zh": "一枚银币（按书中另一种说法）"}, {"en": "A fish", "zh": "一条鱼"}, {"en": "A diamond", "zh": "一颗钻石"}], "answer": 0, "explain": {"en": "Josh falls into the stream and comes up holding a huge gold nugget as big as his hand.", "zh": "Josh 掉进溪里，爬起来时手里握着一块和他手掌一样大的金块。"}}, {"q": {"en": "Why does Ed Getz pretend to hurt his ankle?", "zh": "Ed Getz 为什么要假装脚踝受伤？"}, "options": [{"en": "Because he was afraid of bears", "zh": "因为他怕熊"}, {"en": "To stay behind at the ranch so he can rob the safe", "zh": "为了留在牧场，好去撬保险箱"}, {"en": "He really fell off his horse", "zh": "他真的从马上摔下来了"}, {"en": "To get attention from Fiona according to some versions of the story", "zh": "为了引起 Fiona 的注意（按书中另一种说法）"}], "answer": 1, "explain": {"en": "Once he knew the gold was in the safe, Ed faked an injury so he could stay behind and steal it.", "zh": "Ed 一知道金块放进保险箱，就假装受伤留在牧场，好去偷它。"}}, {"q": {"en": "What is the robber wearing when he ties people up and opens the safe?", "zh": "小偷把人绑起来、撬开保险箱时穿着什么？"}, "options": [{"en": "A cowboy hat", "zh": "牛仔帽"}, {"en": "A bear costume according to some versions of the story", "zh": "熊的服装（按书中另一种说法）"}, {"en": "A black hood and black clothing", "zh": "黑色头套和黑色衣服"}, {"en": "A clown costume", "zh": "小丑装"}], "answer": 2, "explain": {"en": "Lulu describes the robber as dressed all in black with a black hood over his face and gloves on his hands.", "zh": "Lulu 说小偷全身黑衣、脸上罩着黑色头套，手上还戴着手套。"}}, {"q": {"en": "Who actually steals Josh's gold nugget?", "zh": "到底是谁偷走了 Josh 的金块？"}, "options": [{"en": "Thumbs", "zh": "Thumbs"}, {"en": "Jud Wheat", "zh": "Jud Wheat"}, {"en": "Ed Getz", "zh": "Ed Getz"}, {"en": "Lulu", "zh": "Lulu"}], "answer": 2, "explain": {"en": "Ed Getz is the thief; he faked his injury, tied up the others, and cracked the safe himself.", "zh": "Ed Getz 才是小偷；他假装受伤，把其他人绑起来，自己撬开了保险箱。"}}, {"q": {"en": "What tool does the thief use to figure out the safe's combination?", "zh": "小偷用什么工具破解了保险箱的密码？"}, "options": [{"en": "A screwdriver", "zh": "螺丝刀"}, {"en": "A stethoscope", "zh": "听诊器"}, {"en": "A magnet", "zh": "磁铁"}, {"en": "A magnifying glass", "zh": "放大镜"}], "answer": 1, "explain": {"en": "Dink spots a stethoscope in Ed's cabin; he likely used it to listen to the safe's lock and learn the combination.", "zh": "Dink 在 Ed 的 cabin 里看到听诊器；他很可能用它听保险箱锁的声音来破解密码。"}}, {"q": {"en": "How do the kids discover that Ed is the thief?", "zh": "孩子们是怎么发现 Ed 就是小偷的？"}, "options": [{"en": "They watch him unwrap his fake bandage and the nugget falls out of his sock", "zh": "他们看见他拆掉假绷带，金块从袜子里掉了出来"}, {"en": "Thumbs tells them according to some versions of the story in an early draft of the book", "zh": "Thumbs 告诉他们的（按书中另一种说法）（在书的早期草稿中）"}, {"en": "They see him on TV", "zh": "他们在电视上看到他"}, {"en": "The sheriff calls", "zh": "警察打来电话"}], "answer": 0, "explain": {"en": "Through Ed's window, the kids see him remove the bandage and shake his sock, and the gold nugget tumbles out.", "zh": "孩子们透过 Ed 的窗户，看见他拆掉绷带、倒空袜子，金块从里面掉了出来。"}}, {"q": {"en": "How is Ed finally caught?", "zh": "Ed 最终是怎么被抓住的？"}, "options": [{"en": "A bear catches him", "zh": "一只熊抓住了他"}, {"en": "Josh lassoes him from the cabin roof with his rope", "zh": "Josh 在屋顶用套索把他套住"}, {"en": "He trips and falls into the pond according to some versions of the story", "zh": "他绊倒掉进池塘（按书中另一种说法）"}, {"en": "He is arrested at the airport", "zh": "他在机场被捕"}], "answer": 1, "explain": {"en": "As Ed tries to leave, Josh drops a rope loop from the roof onto Ed's shoulders and ties him up until the adults arrive.", "zh": "Ed 想溜走时，Josh 从屋顶抛下绳套套住他的肩膀，把他绑住，直到大人们赶来。"}}, {"q": {"en": "What does Josh decide to do with the gold nugget at the end?", "zh": "最后 Josh 决定怎么处理这块金块？"}, "options": [{"en": "Hide it in the safe again", "zh": "再次把它藏在保险箱里"}, {"en": "Sell it and keep the money for a new car according to some versions of the story", "zh": "卖掉它，把钱留着买新车（按书中另一种说法）"}, {"en": "Give it to Thumbs", "zh": "把它送给 Thumbs"}, {"en": "Leave it at the ranch so the money can help save the ranch", "zh": "把它留在牧场，用这笔钱拯救牧场"}], "answer": 3, "explain": {"en": "Josh gives the gold to Jud to sell, asking that the money be used to save the struggling Wheat Ranch.", "zh": "Josh 把金块交给 Jud 去卖，请他用这笔钱来拯救经营困难的 Wheat 牧场。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  // re-bind radio events
  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
