<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Talking T. Rex — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.6rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .baseball{
    width:50px;height:50px;border-radius:50%;
    background:#fff;margin:0 auto 12px;
    border:2px solid #e7e7e7;
    position:relative;
  }
  .baseball::before,.baseball::after{
    content:"";position:absolute;top:50%;width:2px;height:38px;
    background:#c0392b;transform:translateY(-50%) rotate(18deg);
    border-radius:2px;
  }
  .baseball::before{left:16px;}
  .baseball::after{right:16px;transform:translateY(-50%) rotate(-18deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>The Talking T. Rex</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Ron Roy</p>
    <div class="baseball"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>A to Z Mysteries: The Talking T. Rex</em> (Random House, 2003)</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Ron Roy",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the mystery well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The mystery is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Ron Roy",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个谜案。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！谜底藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What kind of dinosaur is in the story's title?", "zh": "书名里说的是哪种恐龙？"}, "options": [{"en": "A Tyrannosaurus Rex (T. Rex)", "zh": "霸王龙（T. Rex）"}, {"en": "A Stegosaurus", "zh": "剑龙"}, {"en": "A Triceratops", "zh": "三角龙"}, {"en": "A Velociraptor", "zh": "伶盗龙"}], "answer": 0, "explain": {"en": "The 'T. Rex' in the title is a Tyrannosaurus Rex, the famous big meat-eating dinosaur.", "zh": "书名里的“T. Rex”是霸王龙（Tyrannosaurus Rex），就是那种著名的大型肉食恐龙。"}}, {"q": {"en": "What is special about the T. Rex in the story?", "zh": "故事里的霸王龙有什么特别之处？"}, "options": [{"en": "It is a real living dinosaur", "zh": "它是一只在世的真恐龙"}, {"en": "It is a talking, moving robot dinosaur", "zh": "它是一只会说话、会动的机器恐龙"}, {"en": "It is a small toy", "zh": "它是一个小玩具"}, {"en": "It is a drawing on paper", "zh": "它是一张纸上的画"}], "answer": 1, "explain": {"en": "The T. Rex is an animatronic robot that can move and 'talk' to greet visitors.", "zh": "这只霸王龙是一具电子动画机器人，会动、会“说话”来迎接游客。"}}, {"q": {"en": "Where is the T. Rex shown?", "zh": "霸王龙在哪里展出？"}, "options": [{"en": "At the fire station", "zh": "在消防站"}, {"en": "In Dink's backyard", "zh": "在丁克家的后院"}, {"en": "At a museum or dinosaur exhibit", "zh": "在博物馆或恐龙展览上"}, {"en": "On a farm", "zh": "在农场里"}], "answer": 2, "explain": {"en": "The talking T. Rex is a new attraction at a museum or dinosaur exhibit the kids visit.", "zh": "会说话的霸王龙是孩子们参观的博物馆或恐龙展览里的新展品。"}}, {"q": {"en": "What valuable thing is hidden inside the T. Rex?", "zh": "什么东西被藏在霸王龙体内？"}, "options": [{"en": "A rare silver dollar (coin)", "zh": "一枚罕见的银元（硬币）"}, {"en": "A gold ring", "zh": "一枚金戒指"}, {"en": "A diamond necklace", "zh": "一条钻石项链"}, {"en": "A chocolate bar", "zh": "一块巧克力"}], "answer": 0, "explain": {"en": "A collector has hidden a valuable rare silver dollar inside the T. Rex as part of a contest.", "zh": "一位收藏家把一枚珍贵的罕见银元藏在霸王龙体内，作为比赛的一部分。"}}, {"q": {"en": "Why is the coin hidden inside the T. Rex?", "zh": "为什么要把硬币藏在霸王龙体内？"}, "options": [{"en": "Because it was lost by accident", "zh": "因为不小心弄丢了"}, {"en": "To pay for the museum", "zh": "用来支付博物馆费用"}, {"en": "As a gift for the mayor", "zh": "作为送给市长的礼物"}, {"en": "As a contest prize for whoever finds it", "zh": "作为谁找到就归谁的比赛奖品"}], "answer": 3, "explain": {"en": "The coin is a contest prize — whoever finds it inside the T. Rex gets to keep the rare dollar.", "zh": "这枚硬币是比赛奖品——谁在霸王龙体内找到它，这枚罕见的银元就归谁。"}}, {"q": {"en": "What problem happens in the story?", "zh": "故事里发生了什么麻烦事？"}, "options": [{"en": "The T. Rex comes alive", "zh": "霸王龙活了过来"}, {"en": "The coin disappears and the T. Rex is tampered with", "zh": "硬币不见了，霸王龙还被人动了手脚"}, {"en": "The museum burns down", "zh": "博物馆烧掉了"}, {"en": "The kids get lost", "zh": "孩子们迷路了"}], "answer": 1, "explain": {"en": "The rare coin goes missing and the T. Rex is messed with, so the friends must find out why.", "zh": "那枚罕见的硬币不见了，霸王龙还被人动了手脚，小伙伴们必须查清原因。"}}, {"q": {"en": "Who investigates the missing coin?", "zh": "是谁在调查硬币失踪案？"}, "options": [{"en": "Dink, Josh, and Ruth Rose", "zh": "丁克、乔希和露丝·罗丝"}, {"en": "The museum guard alone", "zh": "只有博物馆保安"}, {"en": "A scientist from another city", "zh": "一位外地的科学家"}, {"en": "The school principal", "zh": "校长"}], "answer": 0, "explain": {"en": "As always in the series, the three friends become detectives to solve the case.", "zh": "和这个系列里一样，三个好朋友化身小侦探来破案。"}}, {"q": {"en": "What do the kids use to solve the case?", "zh": "孩子们靠什么破了案？"}, "options": [{"en": "Magic", "zh": "魔法"}, {"en": "Luck alone", "zh": "全靠运气"}, {"en": "Clues they notice and teamwork", "zh": "他们留意到的线索和团队合作"}, {"en": "A computer game", "zh": "一个电脑游戏"}], "answer": 2, "explain": {"en": "They watch carefully, gather clues, and work together — just like real detectives.", "zh": "他们仔细观察、搜集线索并齐心协力——就像真正的侦探一样。"}}, {"q": {"en": "How does the mystery end?", "zh": "这个谜团最后是怎么解开的？"}, "options": [{"en": "The coin is never found", "zh": "硬币始终没找到"}, {"en": "The T. Rex is thrown away", "zh": "霸王龙被扔掉了"}, {"en": "The museum closes", "zh": "博物馆关门了"}, {"en": "The coin is found and the culprit is caught", "zh": "硬币被找到，肇事者也被抓住了"}], "answer": 3, "explain": {"en": "The friends recover the rare silver dollar and figure out who tried to steal it.", "zh": "小伙伴们找回了那枚罕见的银元，并查出了想偷它的人。"}}, {"q": {"en": "What kind of book is 'The Talking T. Rex'?", "zh": "《会说话的霸王龙》是一本什么样的书？"}, "options": [{"en": "A dinosaur science textbook", "zh": "一本科普教材"}, {"en": "An A to Z Mystery the friends solve", "zh": "一本三个好朋友破案的A to Z Mysteries"}, {"en": "A fairy tale", "zh": "一篇童话"}, {"en": "A comic book only", "zh": "一本纯漫画书"}], "answer": 1, "explain": {"en": "It is one of the A to Z Mysteries, where Dink, Josh, and Ruth Rose solve a puzzling crime.", "zh": "它是A to Z Mysteries系列之一，丁克、乔希和露丝·罗丝一起破解一桩离奇案件。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  // re-bind radio events
  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
