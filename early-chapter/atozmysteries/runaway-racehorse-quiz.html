<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Runaway Racehorse — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.6rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .baseball{
    width:50px;height:50px;border-radius:50%;
    background:#fff;margin:0 auto 12px;
    border:2px solid #e7e7e7;
    position:relative;
  }
  .baseball::before,.baseball::after{
    content:"";position:absolute;top:50%;width:2px;height:38px;
    background:#c0392b;transform:translateY(-50%) rotate(18deg);
    border-radius:2px;
  }
  .baseball::before{left:16px;}
  .baseball::after{right:16px;transform:translateY(-50%) rotate(-18deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>The Runaway Racehorse</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Ron Roy</p>
    <div class="baseball"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>A to Z Mysteries: The Runaway Racehorse</em> (Random House, 2002)</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Ron Roy",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the mystery well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The mystery is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Ron Roy",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个谜案。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！谜底藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What is the name of the racehorse in the story?", "zh": "故事里那匹赛马叫什么名字？"}, "options": [{"en": "Whirlaway", "zh": "旋风（Whirlaway）"}, {"en": "Pal", "zh": "帕尔"}, {"en": "Polly", "zh": "波莉"}, {"en": "Waddles", "zh": "摇摇摆摆"}], "answer": 0, "explain": {"en": "The famous racehorse the kids come to watch is named Whirlaway, and he is set to race the next day.", "zh": "孩子们前来观看的著名赛马名叫旋风（Whirlaway），它本来要在第二天参加比赛。"}}, {"q": {"en": "Who is Sunny in the story?", "zh": "故事里的桑尼（Sunny）是谁？"}, "options": [{"en": "The horse's groom", "zh": "马的饲养员"}, {"en": "The jockey who rides Whirlaway", "zh": "骑着旋风参赛的骑师"}, {"en": "Dink's sister", "zh": "丁克的妹妹"}, {"en": "The town mayor", "zh": "镇长"}], "answer": 1, "explain": {"en": "Sunny is the blond jockey in riding boots who is supposed to ride Whirlaway in the big race.", "zh": "桑尼是金发、穿着马靴的骑师，本来要在大赛里骑旋风出战。"}}, {"q": {"en": "What happens to Whirlaway the night before the big race?", "zh": "大赛前一晚，旋风发生了什么事？"}, "options": [{"en": "He wins the race early", "zh": "他提前赢了比赛"}, {"en": "He gets sick at the vet", "zh": "他在兽医那里病倒了"}, {"en": "He runs away and disappears", "zh": "他跑掉了，不见了"}, {"en": "He is sold to another farm", "zh": "他被卖给了另一个农场"}], "answer": 2, "explain": {"en": "The night before the race, Whirlaway's stall is found open and the horse is gone — he has run away.", "zh": "比赛前一晚，旋风的马厩门开着，马不见了——他跑掉了。"}}, {"q": {"en": "Why would someone want Whirlaway to LOSE the race?", "zh": "为什么会有人想让旋风输掉比赛？"}, "options": [{"en": "So the culprit could bet on another horse and win money", "zh": "这样坏人就可以押别的马赢，从而赚钱"}, {"en": "Because they didn't like Sunny", "zh": "因为他们不喜欢桑尼"}, {"en": "Because the horse was too old", "zh": "因为马太老了"}, {"en": "Because the farm was closing", "zh": "因为农场要关门了"}], "answer": 0, "explain": {"en": "If Whirlaway lost, the person who bet on a different horse would win a lot of money — that is the motive behind the crime.", "zh": "如果旋风输了，押别的马赢的人就能赚一大笔钱——这就是作案的动机。"}}, {"q": {"en": "What clue helps the kids follow Whirlaway?", "zh": "孩子们靠什么线索追踪旋风？"}, "options": [{"en": "A lost saddle", "zh": "一副丢失的马鞍"}, {"en": "A torn race number", "zh": "一个撕破的比赛号码布"}, {"en": "A note left by the thief", "zh": "贼留下的一张字条"}, {"en": "Hoofprints and bits of hay leading away", "zh": "朝远处去的蹄印和零碎的干草"}], "answer": 3, "explain": {"en": "The kids track the missing horse by following hoofprints and a trail of hay left as he was led away.", "zh": "孩子们顺着蹄印和一路留下的干草，追踪被带走的马。"}}, {"q": {"en": "What had someone been giving Whirlaway to make him slow?", "zh": "有人给旋风吃了什么，让它变慢？"}, "options": [{"en": "A sleeping pill or sedative", "zh": "安眠药或镇静剂"}, {"en": "Extra carrots", "zh": "额外的胡萝卜"}, {"en": "More exercise", "zh": "更多锻炼"}, {"en": "A new saddle", "zh": "一副新马鞍"}], "answer": 0, "explain": {"en": "Someone had been slipping the horse something to make him sleepy and slow, so he would lose the race on purpose.", "zh": "有人偷偷给马下药，让它昏昏欲睡、跑不快，好让它在比赛里故意输掉。"}}, {"q": {"en": "Who is Forest in the story?", "zh": "故事里的福雷斯特（Forest）是谁？"}, "options": [{"en": "The race announcer", "zh": "比赛解说员"}, {"en": "The villain", "zh": "坏人"}, {"en": "Whirlaway's trainer who welcomes the kids", "zh": "旋风的训练师，他迎接孩子们到来"}, {"en": "A police officer", "zh": "一名警察"}], "answer": 2, "explain": {"en": "Forest is the horse's trainer (or owner) who greets Dink, Josh, and Ruth Rose and invites them to watch the race.", "zh": "福雷斯特是马的训练师（或主人），他迎接丁克、乔希和露丝·罗丝，并邀请他们来看比赛。"}}, {"q": {"en": "What do Dink, Josh, and Ruth Rose do when Whirlaway disappears?", "zh": "旋风失踪后，丁克、乔希和露丝·罗丝做了什么？"}, "options": [{"en": "They go straight home", "zh": "他们直接回家了"}, {"en": "They search for clues to find the horse and the thief", "zh": "他们寻找线索，要找出马和贼"}, {"en": "They call a newspaper", "zh": "他们打电话给报社"}, {"en": "They buy another horse", "zh": "他们买了另一匹马"}], "answer": 1, "explain": {"en": "Like in every A to Z Mystery, the three friends become detectives and gather clues to solve the case.", "zh": "和每一本A to Z Mysteries一样，三个好朋友化身小侦探，搜集线索来破案。"}}, {"q": {"en": "What kind of book is 'The Runaway Racehorse'?", "zh": "《逃跑的赛马》是一本什么样的书？"}, "options": [{"en": "A fantasy about flying horses", "zh": "一本关于会飞的马奇幻书"}, {"en": "A mystery the three friends solve", "zh": "一本三个好朋友破案的推理书"}, {"en": "A science textbook", "zh": "一本科普教材"}, {"en": "A cookbook", "zh": "一本烹饪书"}], "answer": 1, "explain": {"en": "It is one of the A to Z Mysteries, where Dink, Josh, and Ruth Rose solve a puzzling crime.", "zh": "它是A to Z Mysteries系列之一，丁克、乔希和露丝·罗丝一起破解一桩离奇的案件。"}}, {"q": {"en": "How does the mystery end?", "zh": "这个谜团最后是怎么解开的？"}, "options": [{"en": "The horse wins the race by himself", "zh": "马自己赢了比赛"}, {"en": "The race is cancelled", "zh": "比赛被取消了"}, {"en": "Sunny buys the horse", "zh": "桑尼买下了这匹马"}, {"en": "The kids find Whirlaway and the culprit who tried to make him lose is caught", "zh": "孩子们找到了旋风，那个想让他输掉比赛的人也被抓住了"}], "answer": 3, "explain": {"en": "The friends track down Whirlaway and expose the person who tried to sabotage the horse, solving the mystery.", "zh": "小伙伴们找到了旋风，并揭穿了那个想破坏这匹马的人，谜团就此解开。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  // re-bind radio events
  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
