<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Kidnapped King — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.6rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .baseball{
    width:50px;height:50px;border-radius:50%;
    background:#fff;margin:0 auto 12px;
    border:2px solid #e7e7e7;
    position:relative;
  }
  .baseball::before,.baseball::after{
    content:"";position:absolute;top:50%;width:2px;height:38px;
    background:#c0392b;transform:translateY(-50%) rotate(18deg);
    border-radius:2px;
  }
  .baseball::before{left:16px;}
  .baseball::after{right:16px;transform:translateY(-50%) rotate(-18deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>The Kidnapped King</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Ron Roy</p>
    <div class="baseball"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>A to Z Mysteries: The Kidnapped King</em> (Random House, 2000)</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Ron Roy",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the mystery well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The mystery is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Ron Roy",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个谜案。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！谜底藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Where is Prince Sammi (Samir Bin Oz) from?", "zh": "萨米王子（萨米尔·本·奥兹）来自哪里？"}, "options": [{"en": "Costra, a small island country in the Indian Ocean", "zh": "科斯特拉，印度洋上的一个小岛国"}, {"en": "England", "zh": "英格兰"}, {"en": "New York", "zh": "纽约"}, {"en": "Connecticut according to some versions of the story", "zh": "康涅狄格州（按书中另一种说法）"}], "answer": 0, "explain": {"en": "Sammi is the prince of Costra, a small island country in the Indian Ocean.", "zh": "萨米是科斯特拉的王子，那是一个位于印度洋上的小岛国。"}}, {"q": {"en": "Why does Sammi come to stay with Dink's family?", "zh": "萨米为什么会来和丁克一家住在一起？"}, "options": [{"en": "To be a zoo keeper", "zh": "去当动物园管理员"}, {"en": "To learn English and stay safe from kidnappers", "zh": "为了学英语并躲避绑架者"}, {"en": "To visit an amusement park according to some versions of the story", "zh": "去游乐园玩（按书中另一种说法）"}, {"en": "To go to summer camp", "zh": "去夏令营"}], "answer": 1, "explain": {"en": "He was sent to the U.S. to learn English and American customs, and to be safe after his parents were kidnapped.", "zh": "他在父母被绑架后被送到美国，一边学英语和美国习俗，一边保证安全。"}}, {"q": {"en": "What does Sammi leave behind to help his friends find him?", "zh": "萨米留下了什么线索，帮助朋友们找到他？"}, "options": [{"en": "A map", "zh": "一张地图"}, {"en": "A footprint according to some versions of the story", "zh": "一个脚印（按书中另一种说法）"}, {"en": "A trail of yellow glass from his kaleidoscope", "zh": "一串从万花筒掉出来的黄色玻璃"}, {"en": "A note", "zh": "一张字条"}], "answer": 2, "explain": {"en": "He dropped pieces of yellow glass from his kaleidoscope as a trail.", "zh": "他故意从万花筒里漏出黄色玻璃碎片，留下了一串线索。"}}, {"q": {"en": "Why did Sammi choose YELLOW glass for his trail?", "zh": "萨米为什么选择用“黄色”玻璃做线索？"}, "options": [{"en": "Because yellow was his favorite color according to some versions of the story in an early draft of the book", "zh": "因为黄色是他最喜欢的颜色（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Because it was the only color left", "zh": "因为只剩下黄色了"}, {"en": "Because the red glass was lost", "zh": "因为红色玻璃弄丢了"}, {"en": "Because 'jaune' (French for yellow) sounds like 'Joan,' his tutor's name", "zh": "因为法语里“黄色”jaune 发音像他家教老师 Joan 的名字"}], "answer": 3, "explain": {"en": "In a French lesson, Joan taught Dink that yellow is 'jaune,' which sounds like her name — Sammi was pointing to Joan.", "zh": "在一次法语课上，Joan 教丁克“黄色”在法语里是 jaune，发音很像她的名字——萨米是在指认 Joan。"}}, {"q": {"en": "Who are the real kidnappers?", "zh": "真正的绑架者是谁？"}, "options": [{"en": "Joan Klinker and her husband Nick", "zh": "家教老师 Joan Klinker 和她的丈夫 Nick"}, {"en": "Officer Fallon and Officer Keene according to some versions of the story", "zh": "法伦警官和基恩警官（按书中另一种说法）"}, {"en": "Ron Pinkowski", "zh": "罗恩·平科夫斯基"}, {"en": "Dink's mother", "zh": "丁克的妈妈"}], "answer": 0, "explain": {"en": "Sammi's tutor Joan and her husband Nick planned and carried out the kidnapping.", "zh": "萨米的家教老师 Joan 和她的丈夫 Nick 策划并实施了绑架。"}}, {"q": {"en": "Where was Sammi hidden by the kidnappers?", "zh": "绑架者把萨米藏在哪里？"}, "options": [{"en": "In a boat on the river according to some versions of the story", "zh": "在河里的一条船上（按书中另一种说法）"}, {"en": "Inside a linen/laundry cart at the hotel", "zh": "藏在旅馆的布草/洗衣推车里"}, {"en": "At the bait shop", "zh": "在饵料店"}, {"en": "In Dink's basement", "zh": "在丁克家的地下室"}], "answer": 1, "explain": {"en": "The kids found Sammi tied up inside a linen cart pushed by Nick, disguised as a laundry worker.", "zh": "孩子们发现萨米被绑在布草推车里，推车的是伪装成洗衣工的 Nick。"}}, {"q": {"en": "What clue proved Sammi had been at the hotel?", "zh": "什么线索证明萨米曾到过那家旅馆？"}, "options": [{"en": "A piece of yellow glass stuck to gum on Mr. Linkletter's shoe", "zh": "林克特先生鞋底粘着口香糖上的一小块黄色玻璃"}, {"en": "A Nerf ball", "zh": "一个海绵球"}, {"en": "A gold tassel", "zh": "一个金色流苏"}, {"en": "A purple football according to some versions of the story in an early draft of the book", "zh": "一个紫色的橄榄球（按书中另一种说法）（在书的早期草稿中）"}], "answer": 0, "explain": {"en": "Pal sniffed a bit of yellow glass stuck to Mr. Linkletter's shoe, proving Sammi had been there.", "zh": "帕尔嗅到了林克特先生鞋底粘着的一小块黄色玻璃，证明萨米曾到过那里。"}}, {"q": {"en": "What trick did the kidnappers use to send the police in the wrong direction?", "zh": "绑架者用了什么诡计把警察引向错误的方向？"}, "options": [{"en": "They set fire to the house", "zh": "他们放火烧了房子"}, {"en": "They planted Sammi's slipper tassel by the river to suggest a boat escape", "zh": "他们把萨米拖鞋上的金流苏丢在河边，假装他乘船逃走"}, {"en": "They left a fake ransom note according to some versions of the story in an early draft of the book", "zh": "他们留下一张假勒索信（按书中另一种说法）（在书的早期草稿中）"}, {"en": "They painted a fake trail", "zh": "他们画了一条假线索"}], "answer": 1, "explain": {"en": "They dropped a gold slipper tassel near the river so police thought Sammi was taken by boat.", "zh": "他们在河边丢下金色拖鞋流苏，让警察以为萨米是被船带走的。"}}, {"q": {"en": "How does the story end for Sammi's parents?", "zh": "故事结尾，萨米的父母怎么样了？"}, "options": [{"en": "They move to Green Lawn according to some versions of the story", "zh": "他们搬到了格林劳恩（按书中另一种说法）"}, {"en": "They are never found", "zh": "一直没有被找到"}, {"en": "The King and Queen of Costra are found safe and well", "zh": "科斯特拉的国王和王后被找到，平安无事"}, {"en": "They become teachers", "zh": "他们当了老师"}], "answer": 2, "explain": {"en": "Thanks to the kidnappers' information, the King and Queen of Costra were found alive and well.", "zh": "多亏绑架者供出的信息，科斯特拉的国王和王后被找到，平安无事。"}}, {"q": {"en": "What is the name of Josh's basset hound?", "zh": "乔什的那只巴吉度猎犬叫什么名字？"}, "options": [{"en": "Loretta", "zh": "洛丽塔"}, {"en": "Tiger", "zh": "泰格"}, {"en": "Shorty", "zh": "肖蒂"}, {"en": "Pal", "zh": "帕尔"}], "answer": 3, "explain": {"en": "Josh's dog is Pal, a basset hound who first appeared in The Invisible Island.", "zh": "乔什的狗叫帕尔（Pal），是一只巴吉度猎犬，最早出现在《隐形岛》里。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  // re-bind radio events
  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
