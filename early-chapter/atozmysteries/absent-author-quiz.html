<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Absent Author — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.6rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .baseball{
    width:50px;height:50px;border-radius:50%;
    background:#fff;margin:0 auto 12px;
    border:2px solid #e7e7e7;
    position:relative;
  }
  .baseball::before,.baseball::after{
    content:"";position:absolute;top:50%;width:2px;height:38px;
    background:#c0392b;transform:translateY(-50%) rotate(18deg);
    border-radius:2px;
  }
  .baseball::before{left:16px;}
  .baseball::after{right:16px;transform:translateY(-50%) rotate(-18deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>The Absent Author</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Ron Roy</p>
    <div class="baseball"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>A to Z Mysteries: The Absent Author</em> (Random House, 1997)</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Ron Roy",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the mystery well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The mystery is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Ron Roy",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个谜案。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！谜底藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who is the famous mystery writer that Dink invites to Green Lawn?", "zh": "丁克邀请到绿草坪镇来的著名推理作家是谁？"}, "options": [{"en": "Wallis Wallace", "zh": "沃利斯·华莱士"}, {"en": "Mavis Green", "zh": "梅维斯·格林"}, {"en": "Josh Pinto", "zh": "乔什·平托"}, {"en": "Mr. Paskey", "zh": "帕斯基先生"}], "answer": 0, "explain": {"en": "Dink invites Wallis Wallace, the most famous mystery writer in the world, to sign books at the Book Nook.", "zh": "丁克邀请了世界上最著名的推理作家沃利斯·华莱士，到书店为读者签书。"}}, {"q": {"en": "What is Dink's full real name?", "zh": "丁克真正的全名是什么？"}, "options": [{"en": "Donald David Duncan", "zh": "唐纳德·大卫·邓肯"}, {"en": "David Donald Duncan", "zh": "大卫·唐纳德·邓肯"}, {"en": "Dink Duncan Jr.", "zh": "小丁克·邓肯"}, {"en": "Daniel David Duncan", "zh": "丹尼尔·大卫·邓肯"}], "answer": 0, "explain": {"en": "Dink's full name is Donald David Duncan, but everyone just calls him Dink.", "zh": "丁克的全名是唐纳德·大卫·邓肯，但大家都只叫他丁克。"}}, {"q": {"en": "What is unusual about how Ruth Rose dresses?", "zh": "露丝·罗丝的穿着有什么特别之处？"}, "options": [{"en": "She wears all one color every day", "zh": "她每天都穿同一种颜色"}, {"en": "She wears a hat with feathers", "zh": "她戴一顶有羽毛的帽子"}, {"en": "She only wears green", "zh": "她只穿绿色"}, {"en": "She wears pajamas outside", "zh": "她穿睡衣出门"}], "answer": 0, "explain": {"en": "Ruth Rose is always dressed all in one color — on the day of the signing, it was purple.", "zh": "露丝·罗丝总是全身上下穿同一种颜色——签书会那天她穿了一身紫色。"}}, {"q": {"en": "What line in Wallis Wallace's letter made Dink think he'd been kidnapped?", "zh": "华莱士信里的哪句话让丁克以为他被人绑架了？"}, "options": [{"en": "Short of being kidnapped, nothing will stop me", "zh": "“除非被人绑架，否则什么也拦不住我”"}, {"en": "I will send you my picture", "zh": "“我会把我的照片寄给你”"}, {"en": "I live in a castle in Maine", "zh": "“我住在缅因州的一座城堡里”"}, {"en": "I am writing a new book", "zh": "“我正在写一本新书”"}], "answer": 0, "explain": {"en": "The letter said 'Short of being kidnapped, nothing will stop me from coming,' which made Dink worry when he didn't show up.", "zh": "信里说“除非被人绑架，否则什么也拦不住我前来”，所以当华莱士没出现时，丁克担心他真的被绑架了。"}}, {"q": {"en": "Who drove Wallis Wallace from the airport to the hotel in a taxi?", "zh": "是谁开出租车把华莱士从机场送到了酒店？"}, "options": [{"en": "Maureen Higgins", "zh": "莫琳·希金斯"}, {"en": "Olivia Nugent", "zh": "奥利维亚·纽金特"}, {"en": "Mr. Linkletter", "zh": "林克莱特先生"}, {"en": "Mr. Paskey", "zh": "帕斯基先生"}], "answer": 0, "explain": {"en": "Maureen Higgins, a taxi driver, picked Wallis Wallace up at the airport and dropped him at the Shangri-La Hotel.", "zh": "出租车司机莫琳·希金斯在机场接上华莱士，把他送到了香格里拉酒店。"}}, {"q": {"en": "At which hotel did Wallis Wallace check in?", "zh": "华莱士入住的是哪家酒店？"}, "options": [{"en": "The Shangri-La Hotel", "zh": "香格里拉酒店"}, {"en": "The Book Nook", "zh": "小书角书店"}, {"en": "Ellie's Diner", "zh": "埃莉餐厅"}, {"en": "The Acorn Apartments", "zh": "橡果公寓"}], "answer": 0, "explain": {"en": "Wallis Wallace's itinerary shows he checked into the Shangri-La Hotel after the taxi ride.", "zh": "华莱士的行程单显示，他坐出租车之后入住的是香格里拉酒店。"}}, {"q": {"en": "Which room had a 'Do Not Disturb' sign and was never cleaned by the maid?", "zh": "哪个房间挂着“请勿打扰”的牌子，连女佣都没进去打扫过？"}, "options": [{"en": "Room 302", "zh": "302房间"}, {"en": "Room 303", "zh": "303房间"}, {"en": "Room 24", "zh": "24房间"}, {"en": "Room 404", "zh": "404房间"}], "answer": 0, "explain": {"en": "The maid Livvy said Room 302 had a Do Not Disturb sign, so she never went inside it.", "zh": "女佣利维说302房间挂着“请勿打扰”的牌子，所以她从没进去打扫过。"}}, {"q": {"en": "Who was the man tied up in Room 302 saying 'HELP'?", "zh": "被绑在302房间里喊“救命”的男人是谁？"}, "options": [{"en": "Walker Wallace, Wallis's brother", "zh": "沃克·华莱士，华莱士的哥哥"}, {"en": "Mr. Paskey", "zh": "帕斯基先生"}, {"en": "Mr. Linkletter", "zh": "林克莱特先生"}, {"en": "Officer Fallon", "zh": "法伦警官"}], "answer": 0, "explain": {"en": "The tied-up man was Walker Wallace, Wallis Wallace's brother, helping with her fake kidnapping.", "zh": "那个被绑的男人是沃克·华莱士，也就是华莱士的哥哥，在配合她假绑架的计划。"}}, {"q": {"en": "What did Ruth Rose notice about Mavis Green's red scarf that gave her away?", "zh": "露丝·罗丝注意到梅维斯·格林的红围巾上有什么破绽？"}, "options": [{"en": "The tiny letters were W's for Wallis Wallace, not M's", "zh": "小字母其实是华莱士的W，不是M"}, {"en": "It was made of silk", "zh": "它是丝绸做的"}, {"en": "It had pictures of moose", "zh": "上面有驼鹿图案"}, {"en": "It was actually blue", "zh": "它其实是蓝色的"}], "answer": 0, "explain": {"en": "Ruth Rose turned the scarf upside down and the tiny letters became W's — for Wallis Wallace, not M for Mavis.", "zh": "露丝把围巾倒过来，发现那些小字母变成了W——代表华莱士，而不是M代表梅维斯。"}}, {"q": {"en": "Why did Wallis Wallace fake her own kidnapping?", "zh": "华莱士为什么要假装自己被绑架？"}, "options": [{"en": "To research her new book about a kidnapped children's writer", "zh": "为了给写“儿童作家被绑架”的新书收集素材"}, {"en": "She wanted to rob a bank", "zh": "她想去抢银行"}, {"en": "She was angry at Dink", "zh": "她在生丁克的气"}, {"en": "She wanted to move to Green Lawn", "zh": "她想搬到绿草坪镇住"}], "answer": 0, "explain": {"en": "She faked it to see how real kids would solve a kidnapping mystery for her new book's research.", "zh": "她假绑架是为了观察真实的孩子会怎样破解绑架谜案，为自己的新书做研究。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  // re-bind radio events
  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
