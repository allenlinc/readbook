<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Orange Outlaw — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.6rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .baseball{
    width:50px;height:50px;border-radius:50%;
    background:#fff;margin:0 auto 12px;
    border:2px solid #e7e7e7;
    position:relative;
  }
  .baseball::before,.baseball::after{
    content:"";position:absolute;top:50%;width:2px;height:38px;
    background:#c0392b;transform:translateY(-50%) rotate(18deg);
    border-radius:2px;
  }
  .baseball::before{left:16px;}
  .baseball::after{right:16px;transform:translateY(-50%) rotate(-18deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>The Orange Outlaw</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Ron Roy</p>
    <div class="baseball"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>A to Z Mysteries: The Orange Outlaw</em> (Random House, 2001)</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Ron Roy",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the mystery well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The mystery is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Ron Roy",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个谜案。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！谜底藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What is the valuable painting that gets stolen?", "zh": "被盗的那幅名画是什么？"}, "options": [{"en": "A Monet painting of a rowboat on a pond with lily pads", "zh": "一幅莫奈画的、池塘里有小舟和睡莲的画"}, {"en": "A map of New York City", "zh": "一张纽约市地图"}, {"en": "A picture of a panda", "zh": "一幅熊猫的画"}, {"en": "A portrait of Uncle Warren according to some versions of the story", "zh": "Uncle Warren 的肖像画（按书中另一种说法）"}], "answer": 0, "explain": {"en": "Uncle Warren is safekeeping a valuable Monet showing a rowboat floating on a pond for his friend Forest Evans.", "zh": "Uncle Warren 替朋友 Forest Evans 保管一幅珍贵的莫奈画作，画的是池塘里的一叶小舟。"}}, {"q": {"en": "Who is the painting being kept safe for?", "zh": "这幅画是替谁保管的？"}, "options": [{"en": "Mrs. Cornelius", "zh": "Cornelius 太太"}, {"en": "Uncle Warren himself according to some versions of the story", "zh": "Uncle Warren 自己（按书中另一种说法）"}, {"en": "The doorman Roger", "zh": "门房 Roger"}, {"en": "Forest Evans, a friend vacationing in France", "zh": "正在法国度假的朋友 Forest Evans"}], "answer": 3, "explain": {"en": "Forest Evans bought the painting in France and shipped it to Uncle Warren for safekeeping until he returns to New York.", "zh": "Forest Evans 在法国买了这幅画，寄给 Uncle Warren 保管，等他回纽约时再取。"}}, {"q": {"en": "What clue does the thief leave all over the kitchen and balcony?", "zh": "小偷在厨房和阳台上留下了什么线索？"}, "options": [{"en": "Cookie crumbs according to some versions of the story", "zh": "饼干屑（按书中另一种说法）"}, {"en": "Orange peels and juice", "zh": "橘子皮和橘子汁"}, {"en": "Footprints", "zh": "脚印"}, {"en": "Apple cores", "zh": "苹果核"}], "answer": 1, "explain": {"en": "The fruit bowl is overturned and the kitchen and balcony are covered with orange peels and sticky juice.", "zh": "果盘被打翻，厨房和阳台上到处都是橘子皮和黏糊糊的橘子汁。"}}, {"q": {"en": "Who lives in the apartment below Uncle Warren and saw the prowler?", "zh": "谁住在 Uncle Warren 楼下，并看到了那个鬼鬼祟祟的人？"}, "options": [{"en": "Miss Booker, the building manager according to some versions of the story", "zh": "楼管 Booker 小姐（按书中另一种说法）"}, {"en": "Roger the doorman", "zh": "门房 Roger"}, {"en": "Mrs. Cornelius, a former Broadway actress", "zh": "前百老汇女演员 Cornelius 太太"}, {"en": "Detective Costello", "zh": "Costello 警探"}], "answer": 2, "explain": {"en": "Mrs. Cornelius lives right below Uncle Warren; she called the doorman after seeing someone on her balcony.", "zh": "Cornelius 太太就住在 Uncle Warren 楼下；她看到阳台上有人后给门房打了电话。"}}, {"q": {"en": "What did the eyewitness say the prowler looked like?", "zh": "目击者说那个鬼祟的人长什么样？"}, "options": [{"en": "A baggy coat, poor posture, wrinkled face, and orange hair", "zh": "宽松外套、姿势佝偻、满脸皱纹、橙色头发"}, {"en": "Tall with black hair according to some versions of the story in an early draft of the book", "zh": "高个子，黑头发（按书中另一种说法）（在书的早期草稿中）"}, {"en": "A clown costume", "zh": "小丑装"}, {"en": "A police uniform", "zh": "警服"}], "answer": 0, "explain": {"en": "Through her magnifying glass, Mrs. Cornelius described a baggy coat, poor posture, wrinkled face, and orange hair.", "zh": "Cornelius 太太通过放大镜看到：宽松外套、姿势佝偻、满脸皱纹，还有一头橙色的头发。"}}, {"q": {"en": "What does the street sweeper say ate a lot of oranges at the block party?", "zh": "扫街工人说街区派对上什么东西吃了很多橘子？"}, "options": [{"en": "Josh", "zh": "Josh"}, {"en": "The orangutan (Ollie)", "zh": "猩猩（Ollie）"}, {"en": "A monkey according to some versions of the story", "zh": "猴子（按书中另一种说法）"}, {"en": "The pony", "zh": "小马"}], "answer": 1, "explain": {"en": "The sweeper says the man's trailer had an orangutan and a pony; the orangutan ate lots of oranges at the party.", "zh": "扫街工人说那个人的拖车里有一只猩猩和一头小马；猩猩在派对上吃了好多橘子。"}}, {"q": {"en": "Who actually steals the painting?", "zh": "到底是谁偷走了这幅画？"}, "options": [{"en": "Ollie the orangutan, trained by the Fowlers", "zh": "Fowler 家训练过的猩猩 Ollie"}, {"en": "Miss Booker", "zh": "Booker 小姐"}, {"en": "Mrs. Cornelius according to some versions of the story", "zh": "Cornelius 太太（按书中另一种说法）"}, {"en": "Roger the doorman", "zh": "门房 Roger"}], "answer": 0, "explain": {"en": "The Fowlers trained Ollie to climb the balconies and grab the painting; they were the real thieves.", "zh": "Fowler 夫妇训练 Ollie 爬阳台去偷画；他们才是真正的小偷。"}}, {"q": {"en": "How do the kids get the Fowlers to come to Forest Evans's house?", "zh": "孩子们是怎么把 Fowler 夫妇引到 Forest Evans 家的？"}, "options": [{"en": "They send a letter", "zh": "他们寄了一封信"}, {"en": "Ruth Rose pretends to be a rich kid hiring Ollie for a birthday party", "zh": "Ruth Rose 假扮富家女孩，要雇 Ollie 办生日派对"}, {"en": "They arrest them", "zh": "他们逮捕了 Fowler 夫妇"}, {"en": "Uncle Warren invites them according to some versions of the story in an early draft of the book", "zh": "Uncle Warren 邀请他们（按书中另一种说法）（在书的早期草稿中）"}], "answer": 1, "explain": {"en": "Ruth Rose calls posing as Forest Evans's daughter to book Ollie and Polly for a birthday, luring the Fowlers into the trap.", "zh": "Ruth Rose 打电话假扮 Forest Evans 的女儿，预订 Ollie 和 Polly 办生日会，把 Fowler 夫妇引进了圈套。"}}, {"q": {"en": "What proves the Fowlers are guilty?", "zh": "是什么证明了 Fowler 夫妇有罪？"}, "options": [{"en": "A footprint", "zh": "一个脚印"}, {"en": "A video tape", "zh": "录像带"}, {"en": "A confession on the phone according to some versions of the story", "zh": "电话里的供认（按书中另一种说法）"}, {"en": "Ollie's hair matches the hair found in the kitchen", "zh": "Ollie 的毛和厨房里发现的毛一致"}], "answer": 3, "explain": {"en": "Dr. Parker snips hairs from Ollie and confirms they match the orange hair found in Uncle Warren's kitchen.", "zh": "Parker 博士剪下 Ollie 的毛，确认和 Uncle Warren 厨房里发现的橙色毛一致。"}}, {"q": {"en": "Where was the stolen painting hidden?", "zh": "被盗的画藏在哪里？"}, "options": [{"en": "In Miss Booker's basement apartment according to some versions of the story", "zh": "在 Booker 小姐的地下室公寓里（按书中另一种说法）"}, {"en": "At the police station", "zh": "在警察局"}, {"en": "In a false bottom of Ollie's cage in the trailer", "zh": "在拖车里 Ollie 笼子的假底板下"}, {"en": "In a safe", "zh": "在保险箱里"}], "answer": 2, "explain": {"en": "Ginny Fowler reveals the painting is hidden under a false bottom in Ollie's cage; Josh lifts the handle to find it.", "zh": "Ginny Fowler 交代画藏在 Ollie 笼子的假底板下；Josh 拉起把手找到了它。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  // re-bind radio events
  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
