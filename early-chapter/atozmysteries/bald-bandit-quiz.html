<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Bald Bandit — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.6rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .baseball{
    width:50px;height:50px;border-radius:50%;
    background:#fff;margin:0 auto 12px;
    border:2px solid #e7e7e7;
    position:relative;
  }
  .baseball::before,.baseball::after{
    content:"";position:absolute;top:50%;width:2px;height:38px;
    background:#c0392b;transform:translateY(-50%) rotate(18deg);
    border-radius:2px;
  }
  .baseball::before{left:16px;}
  .baseball::after{right:16px;transform:translateY(-50%) rotate(-18deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>The Bald Bandit</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Ron Roy</p>
    <div class="baseball"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>A to Z Mysteries: The Bald Bandit</em> (Random House, 1997)</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Ron Roy",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the mystery well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The mystery is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Ron Roy",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个谜案。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！谜底藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who is the man who calls himself 'Detective Reddy' and asks the kids to find the video?", "zh": "那个自称“雷迪侦探”、让孩子们去找录像带的人到底是谁？"}, "options": [{"en": "The bank robber in disguise", "zh": "伪装起来的银行劫匪"}, {"en": "A real police detective", "zh": "一名真正的警探"}, {"en": "Howard the barber", "zh": "理发师霍华德"}, {"en": "Officer Fallon", "zh": "法伦警官"}], "answer": 0, "explain": {"en": "He was actually the bank robber, pretending to be a detective so he could find and destroy the video that showed his face.", "zh": "他其实是银行劫匪，假扮成侦探，想找到并销毁那盘拍到他脸的录像带。"}}, {"q": {"en": "What did Ruth Rose dress up as for Halloween?", "zh": "万圣节时露丝·罗丝扮成了什么？"}, "options": [{"en": "Elvis (the singer)", "zh": "猫王（歌星）"}, {"en": "A vampire", "zh": "吸血鬼"}, {"en": "A swamp monster", "zh": "沼泽怪物"}, {"en": "A gorilla", "zh": "大猩猩"}], "answer": 0, "explain": {"en": "Ruth Rose wore a shiny black wig, fake eyebrows, a white sequin suit, and carried a little guitar to look like Elvis.", "zh": "露丝戴了亮黑假发、假眉毛，穿白色亮片西装，还拿着一把小吉他，扮成了猫王。"}}, {"q": {"en": "Why did the redheaded teenager shave his head at Howard's barbershop?", "zh": "那个红发少年为什么去理发店把头剃光了？"}, "options": [{"en": "So the robber wouldn't recognize him", "zh": "为了不让劫匪认出他"}, {"en": "He wanted a new hairstyle", "zh": "他想换个新发型"}, {"en": "He had lice", "zh": "他长了虱子"}, {"en": "Howard forced him to", "zh": "是霍华德逼他的"}], "answer": 0, "explain": {"en": "The robber looked right at him when running out of the bank, so he shaved his head to avoid being recognized.", "zh": "劫匪跑出银行时正好盯着他看，所以他剃光头以免被认出来。"}}, {"q": {"en": "What is the real name of the redheaded kid who filmed the robber?", "zh": "拍下劫匪的那个红发少年叫什么？"}, "options": [{"en": "Lucky O'Leary (real name Paul)", "zh": "拉基·奥利里（真名保罗）"}, {"en": "Josephine", "zh": "约瑟芬"}, {"en": "Josh Pinto", "zh": "乔什·平托"}, {"en": "Howard", "zh": "霍华德"}], "answer": 0, "explain": {"en": "His nickname was Lucky, but his real name was Paul O'Leary, and he lived on Robin Road with his big redheaded family.", "zh": "他的外号叫“拉基”，真名是保罗·奥利里，和一大群红发家人住在知更鸟路。"}}, {"q": {"en": "What did the kids notice on the video that helped them identify the fake detective?", "zh": "孩子们从录像里发现了什么，从而认出了假侦探？"}, "options": [{"en": "The robber was bald and looked just like Detective Reddy", "zh": "劫匪是光头，长得和雷迪侦探一模一样"}, {"en": "The robber was wearing a clown suit", "zh": "劫匪穿了一身小丑服"}, {"en": "The robber was a woman", "zh": "劫匪是个女人"}, {"en": "The robber had blue hair", "zh": "劫匪有一头蓝发"}], "answer": 0, "explain": {"en": "The tape showed a completely bald man with a dimple on his chin; Ruth Rose put her wig and eyebrow on the screen and he looked exactly like Detective Reddy.", "zh": "录像里是一个光头、下巴有酒窝的男人；露丝把假发和假眉毛贴在屏幕上，发现他和雷迪侦探一模一样。"}}, {"q": {"en": "Where did Josh hide the real video when the fake detective arrived?", "zh": "假侦探上门时，乔什把真正的录像带藏在了哪里？"}, "options": [{"en": "In Loretta the guinea pig's cage", "zh": "藏在豚鼠洛蕾塔的笼子里"}, {"en": "Upstairs in a drawer", "zh": "楼上抽屉里"}, {"en": "In the refrigerator", "zh": "冰箱里"}, {"en": "At Howard's barbershop", "zh": "霍华德的理发店"}], "answer": 0, "explain": {"en": "Josh slipped the tape into Loretta's cage and covered it with shavings so the fake detective wouldn't find it.", "zh": "乔什把录像带塞进洛蕾塔的笼子，用木屑盖住，假侦探就找不到了。"}}, {"q": {"en": "How did Ruth Rose help catch the robber?", "zh": "露丝·罗丝是如何帮忙抓住劫匪的？"}, "options": [{"en": "She sneaked out and called the police", "zh": "她偷偷跑出去报了警"}, {"en": "She fought him hand-to-hand", "zh": "她和他徒手搏斗"}, {"en": "She bit his leg", "zh": "她咬了他的腿"}, {"en": "She hid the video at home", "zh": "她把录像带藏在家里"}], "answer": 0, "explain": {"en": "Ruth Rose slipped out, went to her house, and called Officer Fallon and Officer Keene, who came and arrested the man.", "zh": "露丝偷偷溜出去，跑回家给法伦警官和基恩警官打了电话，两位警察赶来逮捕了劫匪。"}}, {"q": {"en": "What was the total reward the bank gave for the video?", "zh": "银行为这盘录像带总共发了多少奖金？"}, "options": [{"en": "$5,000", "zh": "5000美元"}, {"en": "$300", "zh": "300美元"}, {"en": "$100", "zh": "100美元"}, {"en": "$2,500", "zh": "2500美元"}], "answer": 0, "explain": {"en": "The bank's real reward was $5,000; the kids had only been promised $100 each by the fake detective.", "zh": "银行给的真实奖金是5000美元，而假侦探当时只答应给每个孩子100美元。"}}, {"q": {"en": "After giving Lucky his half, how much did each of the three kids get?", "zh": "分给拉基一半之后，三个孩子每人拿到多少钱？"}, "options": [{"en": "$833.33", "zh": "833.33美元"}, {"en": "$100", "zh": "100美元"}, {"en": "$1,500", "zh": "1500美元"}, {"en": "$2,500", "zh": "2500美元"}], "answer": 0, "explain": {"en": "They gave Lucky $2,500 (half of $5,000), leaving $2,500 to split three ways — about $833.33 each.", "zh": "他们给了拉基2500美元（5000的一半），剩下2500美元三人平分，每人约833.33美元。"}}, {"q": {"en": "What was the fake detective really trying to get from the kids?", "zh": "那个假侦探真正想从孩子们手里得到什么？"}, "options": [{"en": "The video, so he could destroy the proof of his crime", "zh": "那盘录像带，好销毁自己犯罪的证据"}, {"en": "Candy from trick-or-treating", "zh": "万圣节讨来的糖果"}, {"en": "A free haircut", "zh": "一次免费理发"}, {"en": "Money to buy a bike", "zh": "买自行车的钱"}], "answer": 0, "explain": {"en": "He was the robber; if he got the tape, no one could prove he was in the bank, so he'd go free.", "zh": "他就是劫匪——只要拿到录像带，就没人能证明他进过银行，他就可以逍遥法外。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  // re-bind radio events
  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
