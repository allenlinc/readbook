<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Falcon's Feathers — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.6rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .baseball{
    width:50px;height:50px;border-radius:50%;
    background:#fff;margin:0 auto 12px;
    border:2px solid #e7e7e7;
    position:relative;
  }
  .baseball::before,.baseball::after{
    content:"";position:absolute;top:50%;width:2px;height:38px;
    background:#c0392b;transform:translateY(-50%) rotate(18deg);
    border-radius:2px;
  }
  .baseball::before{left:16px;}
  .baseball::after{right:16px;transform:translateY(-50%) rotate(-18deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>The Falcon's Feathers</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Ron Roy</p>
    <div class="baseball"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>A to Z Mysteries: The Falcon's Feathers</em> (Random House, 1998)</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Ron Roy",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the mystery well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The mystery is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Ron Roy",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个谜案。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！谜底藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "In The Falcon's Feathers, who is the first to notice that the falcon nest is empty?", "zh": "在《隼的羽毛》里，是谁最先发现隼巢空了的？"}, "options": [{"en": "Josh, looking through his binoculars", "zh": "乔什，他正用双筒望远镜观察"}, {"en": "Dink", "zh": "丁克"}, {"en": "Ruth Rose", "zh": "露丝·罗丝"}, {"en": "Mr. Linkletter", "zh": "林肯莱特先生"}], "answer": 0, "explain": {"en": "Josh is watching the nest through binoculars and says, 'The nest is empty.'", "zh": "乔什正用双筒望远镜看着鸟巢，说道：‘巢空了。’"}}, {"q": {"en": "What tool does Josh use to watch the falcon nest from far away?", "zh": "乔什用什么工具从远处观察隼巢？"}, "options": [{"en": "Binoculars", "zh": "双筒望远镜"}, {"en": "A telescope", "zh": "天文望远镜"}, {"en": "A magnifying glass", "zh": "放大镜"}, {"en": "A camera", "zh": "照相机"}], "answer": 0, "explain": {"en": "Josh looks 'through his binoculars at the other tree' to watch the falcons.", "zh": "乔什‘用双筒望远镜望着另一棵树’来观察隼。"}}, {"q": {"en": "What kind of baby birds have disappeared from the nest?", "zh": "从巢里消失的是哪种雏鸟？"}, "options": [{"en": "Baby falcons", "zh": "小隼（隼的幼鸟）"}, {"en": "Baby robins", "zh": "小知更鸟"}, {"en": "Baby ducks", "zh": "小鸭子"}, {"en": "Baby owls", "zh": "小猫头鹰"}], "answer": 0, "explain": {"en": "Josh tells the others, 'The baby falcons are gone.'", "zh": "乔什对大家说：‘小隼不见了。’"}}, {"q": {"en": "When Dink looks into the empty nest, what does he still see inside it?", "zh": "当丁克朝空巢里看时，里面还能看到什么？"}, "options": [{"en": "A few feathers (and twigs and pine needles)", "zh": "几根羽毛（还有细枝和松针）"}, {"en": "Three eggs", "zh": "三个蛋"}, {"en": "A baby bird", "zh": "一只雏鸟"}, {"en": "Nothing at all", "zh": "什么都没有"}], "answer": 0, "explain": {"en": "Dink sees the nest is 'woven of twigs, pine needles, and bits of dead leaves' and spots 'a few feathers' but no falcons.", "zh": "丁克看到巢‘用细枝、松针和枯叶编成’，并发现‘几根羽毛’，却看不到隼。"}}, {"q": {"en": "Which two friends help Josh investigate the missing falcons?", "zh": "哪两位朋友帮乔什调查隼失踪的事？"}, "options": [{"en": "Dink and Ruth Rose", "zh": "丁克和露丝·罗丝"}, {"en": "Josh works alone", "zh": "乔什独自调查"}, {"en": "Mr. Linkletter and Livvy", "zh": "林肯莱特先生和丽薇"}, {"en": "Officer Fallon", "zh": "法伦警官"}], "answer": 0, "explain": {"en": "Dink and Ruth Rose join Josh to solve the mystery of the missing baby falcons.", "zh": "丁克和露丝·罗丝和乔什一起，调查小隼失踪之谜。"}}, {"q": {"en": "Where do Dink, Josh, and Ruth Rose live?", "zh": "丁克、乔什和露丝·罗丝住在哪里？"}, "options": [{"en": "Green Lawn, Connecticut", "zh": "康涅狄格州的格林劳恩"}, {"en": "Key West, Florida", "zh": "佛罗里达州的基韦斯特"}, {"en": "New York City", "zh": "纽约市"}, {"en": "London, England", "zh": "英国伦敦"}], "answer": 0, "explain": {"en": "The three friends live in the town of Green Lawn, Connecticut, the setting of the whole series.", "zh": "这三个好朋友住在康涅狄格州的格林劳恩镇，那是整个系列的故事背景地。"}}, {"q": {"en": "What is the important clue named in the book's title?", "zh": "书名里提到的关键线索是什么？"}, "options": [{"en": "Feathers left behind by the falcons", "zh": "隼留下来的羽毛"}, {"en": "A golden egg", "zh": "一个金蛋"}, {"en": "A red feather", "zh": "一根红色羽毛"}, {"en": "A stolen ring", "zh": "一枚被盗的戒指"}], "answer": 0, "explain": {"en": "The title points to the feathers the kids find, which help them follow the trail of the missing falcons.", "zh": "书名指的是孩子们找到的羽毛，这些羽毛帮他们追踪小隼的去向。"}}, {"q": {"en": "Falcons are a kind of what?", "zh": "隼属于哪一类动物？"}, "options": [{"en": "Bird of prey (raptor)", "zh": "猛禽"}, {"en": "Fish", "zh": "鱼类"}, {"en": "Mammal", "zh": "哺乳动物"}, {"en": "Reptile", "zh": "爬行动物"}], "answer": 0, "explain": {"en": "Falcons are fast hunting birds — birds of prey that catch other animals for food.", "zh": "隼是敏捷的猎食性鸟类——以捕捉其他动物为食的猛禽。"}}, {"q": {"en": "The Falcon's Feathers is the __ letter's mystery in the A to Z series.", "zh": "《隼的羽毛》是 A to Z 谜案系列里第几个字母（字母__）的故事？"}, "options": [{"en": "F (the sixth book)", "zh": "F（第六本）"}, {"en": "E (the fifth book)", "zh": "E（第五本）"}, {"en": "G (the seventh book)", "zh": "G（第七本）"}, {"en": "H (the eighth book)", "zh": "H（第八本）"}], "answer": 0, "explain": {"en": "It follows The Empty Envelope (E) and comes before The Goose's Gold (G), so it is the 'F' book.", "zh": "它排在《空信封》（E）之后、《鹅的黄金》（G）之前，所以是字母 F 的故事。"}}, {"q": {"en": "Why are the missing baby falcons important to protect?", "zh": "为什么失踪的小隼需要被保护？"}, "options": [{"en": "They are rare, wild, protected birds", "zh": "它们是稀有、野生、受保护的鸟类"}, {"en": "They are someone's pets", "zh": "它们是别人的宠物"}, {"en": "They are made of gold", "zh": "它们是金子做的"}, {"en": "They can talk", "zh": "它们会说话"}], "answer": 0, "explain": {"en": "Peregrine falcons are wild raptors that need protecting, which is why their disappearance matters.", "zh": "游隼是野生的猛禽，需要被保护，所以它们失踪才是一件要紧的事。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  // re-bind radio events
  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
