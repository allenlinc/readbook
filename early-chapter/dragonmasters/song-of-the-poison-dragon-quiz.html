<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Song of the Poison Dragon — Quiz</title>
<style>
  :root{
    --grass:#27ae60;
    --grass-dark:#1e8449;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --dragon:#6c5ce7;
    --dragon-dark:#4834a0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--dragon);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--dragon);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .dragon{
    width:62px;height:62px;border-radius:50%;
    background:#fff;margin:0 auto 12px;position:relative;
    display:flex;align-items:center;justify-content:center;
    font-size:2rem;box-shadow:0 4px 14px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--dragon-dark);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(108,92,231,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(108,92,231,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#05 · Song of the Poison Dragon</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Tracey West</p>
    <div class="dragon">🐉</div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Dragon Masters: Song of the Poison Dragon</em> (Scholastic Branches, 2016) — by Tracey West</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Tracey West",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Tracey West",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who is the newest Dragon Master to arrive at the castle?", "zh": "来到城堡的最新一位驯龙师是谁？"}, "options": [{"en": "Heru according to some versions of the story", "zh": "赫鲁（按书中另一种说法）"}, {"en": "Ana", "zh": "阿娜"}, {"en": "Petra", "zh": "佩特拉"}, {"en": "Rori", "zh": "罗瑞"}], "answer": 2, "explain": {"en": "Petra is an eight-year-old girl from the southern lands, chosen by the Dragon Stone to care for the hydra.", "zh": "佩特拉是一个来自南方之地、八岁的女孩，被龙石块选中去照料海德拉龙。"}}, {"q": {"en": "What is Petra afraid of at the beginning of the story?", "zh": "在故事开头，佩特拉害怕什么？"}, "options": [{"en": "Flying", "zh": "飞行"}, {"en": "Reading books according to some versions of the story", "zh": "读书（按书中另一种说法）"}, {"en": "King Roland", "zh": "罗兰国王"}, {"en": "Her four-headed, poison-shooting hydra", "zh": "她那条四头、会喷毒的海德拉龙"}], "answer": 3, "explain": {"en": "Petra is terrified of her dragon because it has four heads and shoots poison, and she admits her fear to Drake.", "zh": "佩特拉很怕她的龙，因为它有四个头还会喷毒，她还把恐惧告诉了德雷克。"}}, {"q": {"en": "What happens to King Roland in the courtyard?", "zh": "在庭院里，罗兰国王发生了什么事？"}, "options": [{"en": "He laughs at the dragons according to some versions of the story", "zh": "他被龙逗笑了（按书中另一种说法）"}, {"en": "The hydra's poison mist makes him sick and he falls down", "zh": "海德拉龙的毒雾让他中毒倒下"}, {"en": "He names the hydra", "zh": "他给海德拉龙取了名字"}, {"en": "He rides the hydra", "zh": "他骑了海德拉龙"}], "answer": 1, "explain": {"en": "When the hydra gets nervous and sprays a light mist, King Roland breathes it in, his skin turns green, and he collapses.", "zh": "海德拉龙受惊喷出薄雾，国王吸入后皮肤变绿、倒地不起。"}}, {"q": {"en": "Why do the villagers turn against the dragons?", "zh": "村民们为什么会反对那些龙？"}, "options": [{"en": "They are afraid after the king is poisoned and want the dragons sent away", "zh": "国王中毒后他们很害怕，想把龙送走"}, {"en": "They are jealous", "zh": "他们嫉妒"}, {"en": "They want the dragons as pets according to some versions of the story in an early draft of the book", "zh": "他们想把龙当宠物（按书中另一种说法）（在书的早期草稿中）"}, {"en": "They dislike the wizards", "zh": "他们不喜欢巫师"}], "answer": 0, "explain": {"en": "Believing the dragons are dangerous, the villagers chant 'Send the dragons away!' and demand they be locked up far off.", "zh": "村民们认为龙很危险，高喊“把龙送走！”，要求把它们关到远方。"}}, {"q": {"en": "How is Petra's ancestor Cosmo connected to dragons?", "zh": "佩特拉的祖先科斯莫和龙有什么关系？"}, "options": [{"en": "He tamed a four-headed dragon", "zh": "他曾驯服过一条四头龙"}, {"en": "He wrote the dragon books according to some versions of the story", "zh": "他写了关于龙的书（按书中另一种说法）"}, {"en": "He was a king", "zh": "他是一位国王"}, {"en": "He built the castle", "zh": "他建造了城堡"}], "answer": 0, "explain": {"en": "Petra says a family member named Cosmo was a dragon expert who even tamed a four-headed dragon and kept it as a pet.", "zh": "佩特拉说祖先科斯莫是个龙专家，曾驯服过一条四头龙并把它当宠物养。"}}, {"q": {"en": "How does the hydra heal Drake after he is poisoned by the green mist?", "zh": "德雷克被绿色毒雾毒倒后，海德拉龙怎样治好了他？"}, "options": [{"en": "Bites him", "zh": "咬了他一口"}, {"en": "Gives him a potion according to some versions of the story", "zh": "给他药水（按书中另一种说法）"}, {"en": "Uses a magic spell", "zh": "用了咒语"}, {"en": "Sings a beautiful song", "zh": "唱了一首美妙动听的歌"}], "answer": 3, "explain": {"en": "All four of the hydra's heads raise up and sing different tones that blend together, and the green color leaves Drake's skin.", "zh": "海德拉龙四个头一起仰起，唱出不同却交融的音调，德雷克皮肤上的绿色便褪去了。"}}, {"q": {"en": "What makes Petra finally connect with the hydra?", "zh": "是什么让佩特拉终于和海德拉龙建立了连接？"}, "options": [{"en": "Eating a snack", "zh": "吃了一顿点心"}, {"en": "A dream", "zh": "一个梦"}, {"en": "Her Dragon Stone glows and she hears the hydra's four voices", "zh": "她的龙石块发光，她听见了海德拉龙的四个声音"}, {"en": "A magic spell from Griffith according to some versions of the story", "zh": "格里菲斯施的咒语（按书中另一种说法）"}], "answer": 2, "explain": {"en": "After Drake is poisoned and Petra cries, her Dragon Stone glows bright green and she hears four voices telling her the hydra can help.", "zh": "德雷克中毒、佩特拉落泪后，她的龙石块亮起深绿光，她听见四个声音说海德拉龙能帮忙。"}}, {"q": {"en": "What name does Petra give her hydra?", "zh": "佩特拉给她的海德拉龙取了什么名字？"}, "options": [{"en": "Wati", "zh": "瓦蒂"}, {"en": "Zera", "zh": "泽拉"}, {"en": "Cosmo", "zh": "科斯莫"}, {"en": "Kepri", "zh": "凯普里"}], "answer": 1, "explain": {"en": "Petra names the hydra Zera, after her kitten back home, because the dragon also purrs when it is happy.", "zh": "佩特拉以家乡小猫的名字给海德拉龙取名泽拉，因为龙开心时也会像猫一样发出呼噜声。"}}, {"q": {"en": "How do the Dragon Masters travel to the king's bedroom to heal him?", "zh": "驯龙师们是怎样去国王卧室为他治病的？"}, "options": [{"en": "Worm teleports them with his green light", "zh": "沃姆用绿光把他们传送过去"}, {"en": "They fly on Kepri according to some versions of the story", "zh": "他们骑凯普里飞过去（按书中另一种说法）"}, {"en": "They ride horses", "zh": "他们骑马"}, {"en": "They walk there", "zh": "他们走过去的"}], "answer": 0, "explain": {"en": "Drake, Petra, and the hydra all touch Worm, whose body glows green and flashes them straight to King Roland's bedroom.", "zh": "德雷克、佩特拉和海德拉龙都触碰沃姆，沃姆身体发绿光，一闪就把他们送到了国王卧室。"}}, {"q": {"en": "Who returns at the end with news that the prime Dragon Stone is dying?", "zh": "故事结尾是谁回来报信说主龙石块正在衰亡？"}, "options": [{"en": "Maldred", "zh": "马尔德雷"}, {"en": "Heru and his Moon Dragon Wati", "zh": "赫鲁和他的月亮龙瓦蒂"}, {"en": "Diego", "zh": "迪亚哥"}, {"en": "Emperor Song according to some versions of the story", "zh": "宋皇帝（按书中另一种说法）"}], "answer": 1, "explain": {"en": "Heru lands on Wati and tells Griffith that the prime Dragon Stone, from which all others come, is dying and they must help.", "zh": "赫鲁骑着瓦蒂降落，告诉格里菲斯：所有龙石块都来自的主龙石块正在衰亡，必须去帮忙。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
