<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heat of the Lava Dragon — Quiz</title>
<style>
  :root{
    --grass:#27ae60;
    --grass-dark:#1e8449;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --dragon:#6c5ce7;
    --dragon-dark:#4834a0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--dragon);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--dragon);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .dragon{
    width:62px;height:62px;border-radius:50%;
    background:#fff;margin:0 auto 12px;position:relative;
    display:flex;align-items:center;justify-content:center;
    font-size:2rem;box-shadow:0 4px 14px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--dragon-dark);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(108,92,231,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(108,92,231,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#18 · Heat of the Lava Dragon</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Tracey West</p>
    <div class="dragon">🐉</div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Dragon Masters: Heat of the Lava Dragon</em> (Scholastic Branches, 2018) — by Tracey West</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Tracey West",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Tracey West",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who rescued Drake just before he could be turned to stone?", "zh": "在德雷克即将变成石头之前，是谁救了他？"}, "options": [{"en": "Astrid, the evil wizard", "zh": "邪恶巫师阿斯特丽德"}, {"en": "Hulda, Astrid's sister", "zh": "阿斯特丽德的姐姐胡尔达"}, {"en": "King Roland", "zh": "罗兰国王"}, {"en": "Griffith the wizard", "zh": "巫师格里菲斯"}], "answer": 1, "explain": {"en": "Hulda, Astrid's sister, used magic to bring Drake to the Castle of the Wizards in Belerion just in time.", "zh": "阿斯特丽德的姐姐胡尔达用魔法及时把德雷克带到了贝勒里昂的巫师城堡。"}}, {"q": {"en": "Why was Drake able to free Worm from the stone?", "zh": "德雷克为什么能把虫虫从石头中解救出来？"}, "options": [{"en": "He found a magic sword", "zh": "他找到了一把魔法剑"}, {"en": "He and Worm share a very strong connection", "zh": "他和虫虫之间有着非常强的连接"}, {"en": "Astrid let Worm go", "zh": "阿斯特丽德放走了虫虫"}, {"en": "The Dragon Stone broke", "zh": "龙石碎裂了"}], "answer": 1, "explain": {"en": "Drake and Worm have such a strong connection that their combined energy let Worm break through the Stone Dragon's power.", "zh": "德雷克和虫虫之间的连接如此之强，两人的能量合在一起让虫虫突破了石龙的力量。"}}, {"q": {"en": "What three dragons are needed to reverse Astrid's False Life spell?", "zh": "要逆转阿斯特丽德的“假生命咒语”，需要哪三种龙？"}, "options": [{"en": "Earth, Sun, and Rainbow dragons", "zh": "土龙、太阳龙和彩虹龙"}, {"en": "Fire, Ice, and Thunder dragons", "zh": "火龙、冰龙和雷龙"}, {"en": "Lava, Sea, and Wind dragons", "zh": "熔岩龙、海龙和风龙"}, {"en": "Stone, Poison, and Moon dragons", "zh": "石龙、毒龙和月龙"}], "answer": 2, "explain": {"en": "Ana's scroll said a Lava Dragon melts the Tenebrex stone, a Sea Dragon cools it, and a Wind Dragon transforms it into a box holding the reversing magic.", "zh": "安娜发现的卷轴说：熔岩龙熔化特内布雷克斯石，海龙使其冷却，风龙把它变成装有逆转魔法的盒子。"}}, {"q": {"en": "What is the Tenebrex stone used for?", "zh": "特内布雷克斯石是用来做什么的？"}, "options": [{"en": "To heal sick dragons", "zh": "治疗生病的龙"}, {"en": "To reverse the False Life spell when combined with three dragons", "zh": "与三种龙的力量结合来逆转假生命咒语"}, {"en": "To travel between islands", "zh": "在岛屿之间旅行"}, {"en": "To freeze enemies in place", "zh": "把敌人定在原地"}], "answer": 1, "explain": {"en": "The scroll said the Tenebrex stone can reverse the False Life spell if combined with the powers of three special dragons.", "zh": "卷轴说，特内布雷克斯石与三种特殊龙的力量结合后，可以逆转假生命咒语。"}}, {"q": {"en": "On which island do Drake and Ana meet the girl Opeli?", "zh": "德雷克和安娜是在哪个岛上遇见女孩奥佩利的？"}, "options": [{"en": "Gallia", "zh": "加利亚"}, {"en": "Manu, one of the islands of Noa", "zh": "诺阿群岛中的马努岛"}, {"en": "Belerion", "zh": "贝勒里昂"}, {"en": "Navid", "zh": "纳维德"}], "answer": 1, "explain": {"en": "Worm transported them to the island of Manu in the islands of Noa, where they met Opeli.", "zh": "虫虫把他们传送到了诺阿群岛中的马努岛，在那里他们遇见了奥佩利。"}}, {"q": {"en": "What did the healers of Noa do to the Lava Dragons long ago?", "zh": "诺阿岛的治愈者很久以前对熔岩龙做了什么？"}, "options": [{"en": "They sent them far away across the sea", "zh": "把它们送去了远方的海上"}, {"en": "They turned them into part of the land (stone)", "zh": "把它们变成了大地的一部分（石头）"}, {"en": "They gave them to the Dragon Masters", "zh": "把它们交给了驯龙师"}, {"en": "They taught them to fly", "zh": "教它们飞翔"}], "answer": 1, "explain": {"en": "The healers used magic to make the Lava Dragons 'part of the land', turning them into stone so they could keep them safe.", "zh": "治愈者用魔法让熔岩龙“成为大地的一部分”，把它们变成石头，以此保护它们。"}}, {"q": {"en": "How does the Lava Dragon named Ka finally break free of the rock?", "zh": "名叫卡的熔岩龙最终是如何挣脱石头的？"}, "options": [{"en": "A wizard chants a spell", "zh": "巫师念咒语"}, {"en": "Kepri the Sun Dragon blasts the rock with sunlight", "zh": "太阳龙凯普里用阳光照射石头"}, {"en": "Rori uses her sword", "zh": "罗瑞用剑"}, {"en": "It rains for three days", "zh": "下了三天雨"}], "answer": 1, "explain": {"en": "The Lava Dragon needed heat; Kepri aimed a beam of sunlight at the rock, and the heat let Ka break the healers' spell.", "zh": "熔岩龙需要热量；凯普里用一束阳光照向石头，热量让卡挣脱了治愈者的咒语。"}}, {"q": {"en": "What special stone lets Opeli connect with Ka like a Dragon Stone?", "zh": "什么特殊的石头让奥佩利能像龙石一样与卡建立连接？"}, "options": [{"en": "A Prime Stone", "zh": "原始石"}, {"en": "An Ahi Stone from the heart of a volcano", "zh": "来自火山中心的阿希石"}, {"en": "A Tenebrex Stone", "zh": "特内布雷克斯石"}, {"en": "A Moon Stone", "zh": "月亮石"}], "answer": 1, "explain": {"en": "Kalama wears an Ahi Stone from the heart of a volcano; when Opeli wears it and sings, it glows as she connects with Ka.", "zh": "卡拉玛戴着一块来自火山中心的阿希石；奥佩利戴上它并唱歌时，石头发光，她与卡建立了连接。"}}, {"q": {"en": "Who got the Tenebrex Stone from the wizard Sylvie in Gallia?", "zh": "是谁从加利亚的巫师西尔维那里拿到了特内布雷克斯石？"}, "options": [{"en": "Drake and Ana", "zh": "德雷克和安娜"}, {"en": "Rori and her dragon Vulcan", "zh": "罗瑞和她的火龙瓦尔坎"}, {"en": "Bo and Shu", "zh": "博和舒"}, {"en": "Opeli and Ka", "zh": "奥佩利和卡"}], "answer": 1, "explain": {"en": "Griffith sent Rori and Vulcan to King Leon's castle in Gallia, and they got the Tenebrex Stone from his wizard friend Sylvie.", "zh": "格里菲斯派罗瑞和瓦尔坎去加利亚的莱昂国王城堡，他们从巫师朋友西尔维那里拿到了特内布雷克斯石。"}}, {"q": {"en": "At the end of the book, what does Drake decide to do about Astrid?", "zh": "在书的结尾，德雷克决定对阿斯特丽德采取什么行动？"}, "options": [{"en": "Wait safely at the castle", "zh": "安全地待在城堡里等待"}, {"en": "Ask Worm to take him inside the Fortress of the Stone Dragon", "zh": "让虫虫把他带进石龙堡垒"}, {"en": "Send Opeli alone", "zh": "只派奥佩利前去"}, {"en": "Give up and go home", "zh": "放弃并回家"}], "answer": 1, "explain": {"en": "Jayana said dragons might get through Astrid's defenses, so Drake secretly asks Worm to transport him into the fortress.", "zh": "佳雅娜说龙可能穿过阿斯特丽德的防御，于是德雷克悄悄让虫虫把他传送进堡垒。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
