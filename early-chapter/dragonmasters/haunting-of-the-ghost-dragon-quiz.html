<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haunting of the Ghost Dragon — Quiz</title>
<style>
  :root{
    --grass:#27ae60;
    --grass-dark:#1e8449;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --dragon:#6c5ce7;
    --dragon-dark:#4834a0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--dragon);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--dragon);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .dragon{
    width:62px;height:62px;border-radius:50%;
    background:#fff;margin:0 auto 12px;position:relative;
    display:flex;align-items:center;justify-content:center;
    font-size:2rem;box-shadow:0 4px 14px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--dragon-dark);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(108,92,231,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(108,92,231,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#27 · Haunting of the Ghost Dragon</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Tracey West</p>
    <div class="dragon">🐉</div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Dragon Masters: Haunting of the Ghost Dragon</em> (Scholastic Branches, 2024) — by Tracey West</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Tracey West",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Tracey West",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Why does Head Wizard Jayana send Drake and Bo to the land of Gothica?", "zh": "巫师首领 Jayana 为什么要派 Drake 和 Bo 去哥西亚（Gothica）？"}, "options": [{"en": "To visit the Castle of the Wizards", "zh": "去参观巫师城堡"}, {"en": "To retrieve the stolen Dream Orb from the evil wizard Zoltan", "zh": "去从邪恶巫师 Zoltan 手中取回被偷走的梦境宝珠"}, {"en": "To meet the Dragon Master Sandor", "zh": "去见训龙师 Sandor"}, {"en": "To fight the ghosts that haunt Belerion", "zh": "去对抗困扰 Belerion 的幽灵"}], "answer": 1, "explain": {"en": "Zoltan stole the Dream Orb from the Castle of the Wizards, and Jayana needs Drake and Bo to bring it back before he can use it.", "zh": "Zoltan 从巫师城堡偷走了梦境宝珠，Jayana 需要 Drake 和 Bo 在他使用前把它取回来。"}}, {"q": {"en": "What special power does Bo's Water Dragon, Shu, have that helps the team?", "zh": "Bo 的水龙 Shu 拥有什么特殊能力，对团队很有帮助？"}, "options": [{"en": "She can breathe fire", "zh": "她能喷火"}, {"en": "She can freeze enemies solid", "zh": "她能把敌人冻住"}, {"en": "She can break spells with her healing mist", "zh": "她能用治愈之雾解除咒语"}, {"en": "She can fly faster than any other dragon", "zh": "她比任何龙都飞得快"}], "answer": 2, "explain": {"en": "Shu's blue healing mist breaks the binding spell that Zoltan used to trap Sandor and Phantom at the castle.", "zh": "Shu 蓝色的治愈之雾解除了 Zoltan 用来把 Sandor 和 Phantom 困在城堡的束缚咒。"}}, {"q": {"en": "Who are Sandor and Phantom when Drake and Bo first meet them?", "zh": "Drake 和 Bo 初次遇见时，Sandor 和 Phantom 是什么人？"}, "options": [{"en": "A Dragon Master and his Ghost Dragon trapped by Zoltan", "zh": "一位被 Zoltan 困住的训龙师和他的幽灵龙"}, {"en": "Two of Zoltan's friendly wizards", "zh": "Zoltan 手下两位友善的巫师"}, {"en": "Villagers from the land of Gothica", "zh": "哥西亚村的村民"}, {"en": "Guards from the Castle of the Wizards", "zh": "巫师城堡的守卫"}], "answer": 0, "explain": {"en": "Sandor is a young Dragon Master and Phantom is his Ghost Dragon; Zoltan keeps them prisoner with a binding spell and makes them guard the castle.", "zh": "Sandor 是年轻的训龙师，Phantom 是他的幽灵龙；Zoltan 用束缚咒把他们囚禁，还逼他们看守城堡。"}}, {"q": {"en": "What makes Phantom a 'Ghost Dragon'?", "zh": "是什么让 Phantom 成为一条'幽灵龙'？"}, "options": [{"en": "He breathes blue fire", "zh": "他喷出蓝色火焰"}, {"en": "He is very large and heavy", "zh": "他体型巨大、很重"}, {"en": "He has bright red scales", "zh": "他长着鲜红的鳞片"}, {"en": "He can float through walls and doors and vanish in an instant", "zh": "他能穿过墙壁和门飘浮，并能瞬间消失"}], "answer": 3, "explain": {"en": "Phantom's ghostlike powers let him float through solid objects and disappear, which is why he can spy and escape so easily.", "zh": "Phantom 的幽灵般能力让他能穿墙飘浮并瞬间消失，这也是他能轻易侦察和逃脱的原因。"}}, {"q": {"en": "What is the answer to the riddle on the pillar in the belfry: 'Where you go, I will pursue. I will always copy you. But hugging me is something you can't do.'?", "zh": "城堡钟楼石柱上的谜语答案是什么？'你走到哪里，我就跟到哪里。我总是模仿你。但你却无法拥抱我。'"}, "options": [{"en": "A reflection in a mirror", "zh": "镜子里的倒影"}, {"en": "A shadow", "zh": "影子"}, {"en": "The wind", "zh": "风"}, {"en": "An echo", "zh": "回声"}], "answer": 1, "explain": {"en": "Drake solves it — a shadow follows and copies you everywhere but can never be hugged, which releases the glass dome over the spell book.", "zh": "Drake 解开了谜底——影子处处跟随并模仿你，却无法被拥抱，于是罩着咒语书的玻璃罩被打开了。"}}, {"q": {"en": "Who are Creak and Sneak?", "zh": "Creak 和 Sneak 是谁？"}, "options": [{"en": "Sandor's pet cats", "zh": "Sandor 的宠物猫"}, {"en": "Two friendly dragons", "zh": "两条友善的龙"}, {"en": "Zoltan's ghost minions kept in a magical box", "zh": "Zoltan 养在魔法盒子里的一对幽灵随从"}, {"en": "The guards of the Castle of the Wizards", "zh": "巫师城堡的守卫"}], "answer": 2, "explain": {"en": "Creak and Sneak are two not-too-bright ghosts who work for Zoltan and live inside his magical box until he needs them.", "zh": "Creak 和 Sneak 是 Zoltan 手下不太聪明的两个幽灵，平时就住在他的魔法盒子里，等他召唤。"}}, {"q": {"en": "How do the Dragon Masters open the gear-covered door to Zoltan's workshop?", "zh": "训龙师们是如何打开 Zoltan 工作室那扇布满齿轮的大门？"}, "options": [{"en": "Shu blasts water to turn the gears of the water lock", "zh": "Shu 喷水流转动水锁的齿轮"}, {"en": "Worm freezes the door shut", "zh": "Worm 把门冻住"}, {"en": "They find a hidden key", "zh": "他们找到了一把藏起来的钥匙"}, {"en": "Phantom floats through the wall", "zh": "Phantom 穿墙而过"}], "answer": 0, "explain": {"en": "Bo realizes it is a water lock, and Shu streams water at the top gear; as the gears turn one by one, the lock clicks open.", "zh": "Bo 发现这是水锁，Shu 朝最上面的齿轮喷水；齿轮逐个转动，锁便咔哒一声打开了。"}}, {"q": {"en": "How does Drake trick Creak and Sneak so the others can trap them in their box?", "zh": "Drake 怎样骗过 Creak 和 Sneak，好让同伴把它们关回盒子里？"}, "options": [{"en": "He freezes them with Worm's power", "zh": "他用 Worm 的力量把她们冻住"}, {"en": "He throws the real Dream Orb at them", "zh": "他把真正的梦境宝珠扔向她们"}, {"en": "Shu washes them away with a wave", "zh": "Shu 用浪花把她们冲走"}, {"en": "He fakes the orb with Worm's green energy bubble and lures them into the box", "zh": "他用 Worm 的绿色能量球伪装成宝珠，把她们诱进盒子里"}], "answer": 3, "explain": {"en": "Drake holds up Worm's glowing green energy bubble to look like the orb; the ghosts dive after it, and Bo and Sandor slam the lid shut.", "zh": "Drake 举起 Worm 发光的绿色能量球，假装是宝珠；幽灵扑上去追，Bo 和 Sandor 立刻把盒盖合上。"}}, {"q": {"en": "Why can Zoltan never trap Worm inside the Dream World?", "zh": "为什么 Zoltan 永远无法把 Worm 困在梦境世界？"}, "options": [{"en": "Worm is too small to be trapped", "zh": "Worm 太小了，困不住"}, {"en": "An Earth Dragon's connection to the earth is too strong", "zh": "地龙与大地之间的联系太过强大"}, {"en": "Zoltan actually likes Worm", "zh": "Zoltan 其实很喜欢 Worm"}, {"en": "The Dream World is already closed", "zh": "梦境世界已经关闭了"}], "answer": 1, "explain": {"en": "Jayana explains that Earth Dragons can never be trapped in the Dream World because their bond with the earth is too strong.", "zh": "Jayana 解释说，地龙与大地相连，这种联系太过强大，所以永远无法被梦境世界困住。"}}, {"q": {"en": "What does Drake do to stop Zoltan from escaping through the pathway to the Dream World?", "zh": "为了阻止 Zoltan 从通往梦境世界的通道逃走，Drake 做了什么？"}, "options": [{"en": "He freezes Zoltan in place", "zh": "他把 Zoltan 冻在原地"}, {"en": "He hands the orb to Sandor", "zh": "他把宝珠交给了 Sandor"}, {"en": "He pushes Zoltan into the light pathway and grabs the orb to close it", "zh": "他把 Zoltan 推进光之通道，并抓住宝珠关闭了通道"}, {"en": "He asks Jayana for help", "zh": "他向 Jayana 求助"}], "answer": 2, "explain": {"en": "Drake shoves Zoltan into the pathway, then grabs the Dream Orb, which stops spinning and closes the doorway behind the wizard.", "zh": "Drake 把 Zoltan 推进通道，然后抓住梦境宝珠，宝珠停止旋转，通道在巫师身后关闭了。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
