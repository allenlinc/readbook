<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret of the Water Dragon — Quiz</title>
<style>
  :root{
    --grass:#27ae60;
    --grass-dark:#1e8449;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --dragon:#6c5ce7;
    --dragon-dark:#4834a0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--dragon);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--dragon);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .dragon{
    width:62px;height:62px;border-radius:50%;
    background:#fff;margin:0 auto 12px;position:relative;
    display:flex;align-items:center;justify-content:center;
    font-size:2rem;box-shadow:0 4px 14px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--dragon-dark);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(108,92,231,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(108,92,231,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#03 · Secret of the Water Dragon</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Tracey West</p>
    <div class="dragon">🐉</div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Dragon Masters: Secret of the Water Dragon</em> (Scholastic Branches, 2015) — by Tracey West</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Tracey West",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Tracey West",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What does Bo find on his pillow that makes him worried?", "zh": "博在枕头上发现了什么，让他忧心忡忡？"}, "options": [{"en": "A black feather", "zh": "一根黑色羽毛"}, {"en": "A red stone", "zh": "一块红石头"}, {"en": "A dragon scale", "zh": "一片龙鳞"}, {"en": "A letter from the king", "zh": "国王的信"}], "answer": 0, "explain": {"en": "A black feather lies on Bo's pillow; it is the symbol of the Raven Guard and comes with a threatening note.", "zh": "博的枕头上有一根黑色羽毛，那是乌鸦卫队的标志，还附带着一张威胁的字条。"}}, {"q": {"en": "Why does Bo try to steal the Dragon Stone?", "zh": "博为什么要去偷龙石块？"}, "options": [{"en": "He wants to be king", "zh": "他想当国王"}, {"en": "His family is imprisoned and he must free them", "zh": "他的家人被关押，他必须救他们"}, {"en": "He dislikes Griffith", "zh": "他不喜欢格里菲斯"}, {"en": "He wants a pet dragon", "zh": "他想要一条宠物龙"}], "answer": 1, "explain": {"en": "A note with the feather says Emperor Song has put Bo's family in prison and will free them only if Bo steals the Dragon Stone.", "zh": "羽毛旁的纸条说宋皇帝把博的家人关进了监狱，只有博偷来龙石块才会放人。"}}, {"q": {"en": "What is Shu's secret power as a Water Dragon?", "zh": "水龙舒的秘密能力是什么？"}, "options": [{"en": "She can shoot fire", "zh": "她能喷火"}, {"en": "She can fly without wings", "zh": "她能无翅飞行"}, {"en": "She can wash away magic spells", "zh": "她能洗去魔法咒语"}, {"en": "She can turn invisible", "zh": "她能隐身"}], "answer": 2, "explain": {"en": "Shu can send out a misty blue cloud that washes away dark-magic spells, curing Emperor Song and later Diego.", "zh": "舒能吐出蓝色的薄雾，洗去黑魔法咒语，治好了宋皇帝，后来又治好了迪亚哥。"}}, {"q": {"en": "Who are the Raven Guards?", "zh": "乌鸦卫队是什么人？"}, "options": [{"en": "King Roland's chefs", "zh": "罗兰国王的厨师"}, {"en": "Black-clad fighters who serve Emperor Song and move silently", "zh": "侍奉宋皇帝、行动无声的黑衣战士"}, {"en": "A type of dragon", "zh": "一种龙"}, {"en": "Wizards at the castle", "zh": "城堡里的巫师"}], "answer": 1, "explain": {"en": "The Raven Guard are skilled, silent spies dressed all in black who serve Emperor Song and steal the Dragon Stone.", "zh": "乌鸦卫队是身穿黑衣、行动无声的精锐间谍，侍奉宋皇帝，并偷走了龙石块。"}}, {"q": {"en": "How do the Dragon Masters track down the stolen Dragon Stone?", "zh": "驯龙师们是怎样找到被偷走的龙石块的？"}, "options": [{"en": "With a map", "zh": "用地图"}, {"en": "With a magic Finding Charm feather", "zh": "用魔法寻物羽毛咒符"}, {"en": "With a spy", "zh": "用间谍"}, {"en": "With a dream", "zh": "用梦境"}], "answer": 1, "explain": {"en": "Griffith placed a magic Finding Charm on the stone; a green feather floats in the air and leads them to it.", "zh": "格里菲斯在龙石块上施了寻物咒，一根绿色羽毛浮在空中，把他们引向它。"}}, {"q": {"en": "Whose dark magic is controlling Emperor Song?", "zh": "是谁的黑魔法控制了宋皇帝？"}, "options": [{"en": "King Roland", "zh": "罗兰国王"}, {"en": "Griffith", "zh": "格里菲斯"}, {"en": "Maldred", "zh": "马尔德雷"}, {"en": "Diego", "zh": "迪亚哥"}], "answer": 2, "explain": {"en": "Griffith and Bo realize Maldred placed a dark spell on the emperor, forcing him to demand the Dragon Stone.", "zh": "格里菲斯和博意识到马尔德雷对皇帝下了黑咒，逼他索要龙石块。"}}, {"q": {"en": "How does Shu break the spell on Emperor Song?", "zh": "舒是怎样解除宋皇帝身上的咒语的？"}, "options": [{"en": "A blue mist from her mouth rains down on him", "zh": "她口中吐出的蓝色薄雾落在他身上"}, {"en": "A blast of fire", "zh": "喷出一团火"}, {"en": "A loud song", "zh": "唱一首响亮的歌"}, {"en": "A magic potion", "zh": "一瓶魔法药水"}], "answer": 0, "explain": {"en": "Shu floats up to the emperor and breathes a misty blue cloud that rains down and washes the dark spell away.", "zh": "舒飞到皇帝面前，吐出蓝色薄雾飘落下来，洗去了黑咒。"}}, {"q": {"en": "Which dragon destroys Maldred's red orbs in Emperor Song's throne room?", "zh": "在宋皇帝的宫殿里，是哪条龙摧毁了马尔德雷的红色光球？"}, "options": [{"en": "Shu", "zh": "舒"}, {"en": "Kepri", "zh": "凯普里"}, {"en": "Vulcan", "zh": "瓦尔坎"}, {"en": "Worm", "zh": "沃姆"}], "answer": 3, "explain": {"en": "Worm uses the power of his mind to blast the glowing red orbs with green light, destroying them one by one.", "zh": "沃姆用意念射出绿光，把发光的红色光球一个接一个地炸毁。"}}, {"q": {"en": "Who is Emperor Song?", "zh": "宋皇帝是谁？"}, "options": [{"en": "King Roland's brother", "zh": "罗兰国王的兄弟"}, {"en": "The ruler of Bo's home kingdom", "zh": "博的家乡王国的统治者"}, {"en": "A dark wizard", "zh": "一个黑巫师"}, {"en": "The castle guard", "zh": "城堡卫兵"}], "answer": 1, "explain": {"en": "Emperor Song rules the kingdom Bo comes from; King Roland's soldiers first took Bo from there to be a Dragon Master.", "zh": "宋皇帝统治着博的故乡王国；罗兰国王的士兵最初就是从那里把博带去当驯龙师的。"}}, {"q": {"en": "What does Shu do for the wizard Diego near the end of the book?", "zh": "在故事结尾，舒为巫师迪亚哥做了什么？"}, "options": [{"en": "Feeds him dinner", "zh": "喂他吃饭"}, {"en": "Washes away a sleep spell so he wakes up", "zh": "洗去沉睡咒语让他醒来"}, {"en": "Carries him home", "zh": "把他送回家"}, {"en": "Teaches him to ride", "zh": "教他骑马"}], "answer": 1, "explain": {"en": "Diego fell into a deep sleep from a spell; Shu's blue mist washes it away and he opens his eyes.", "zh": "迪亚哥因咒语陷入沉睡，舒的蓝色薄雾洗去咒语，他睁开了眼睛。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
