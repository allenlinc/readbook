<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Future of the Time Dragon — Quiz</title>
<style>
  :root{
    --grass:#27ae60;
    --grass-dark:#1e8449;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --dragon:#6c5ce7;
    --dragon-dark:#4834a0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--dragon);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--dragon);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .dragon{
    width:62px;height:62px;border-radius:50%;
    background:#fff;margin:0 auto 12px;position:relative;
    display:flex;align-items:center;justify-content:center;
    font-size:2rem;box-shadow:0 4px 14px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--dragon-dark);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(108,92,231,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(108,92,231,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#15 · Future of the Time Dragon</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Tracey West</p>
    <div class="dragon">🐉</div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Dragon Masters: Future of the Time Dragon</em> (Scholastic Branches, 2020) — by Tracey West</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Tracey West",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Tracey West",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Why do Drake and Rori travel to see the Time Dragon?", "zh": "德雷克和罗瑞为什么要去见时光龙？"}, "options": [{"en": "To repair the damage in Bracken", "zh": "去修复布拉克恩的损毁"}, {"en": "To defeat Maldred one more time", "zh": "再去打败一次马尔德雷德"}, {"en": "To free Eko and other wizards trapped in time", "zh": "去解救被时间困住的艾柯和其他巫师"}, {"en": "To find a lost Earth Dragon", "zh": "去寻找一条失踪的土龙"}], "answer": 2, "explain": {"en": "Maldred trapped Eko and many wizards inside a wall, frozen in time, and only the Time Dragon can break the spell.", "zh": "马尔德雷德把艾柯和许多巫师困在墙里、封印在时间里，只有时光龙能解除这个咒语。"}}, {"q": {"en": "Who is the Dragon Master of the Time Dragon?", "zh": "时光龙的驯龙师是谁？"}, "options": [{"en": "Lukas", "zh": "卢卡斯（Lukas）"}, {"en": "Griffith", "zh": "格里菲斯（Griffith）"}, {"en": "Bo", "zh": "博（Bo）"}, {"en": "Berg", "zh": "伯格（Berg）"}], "answer": 0, "explain": {"en": "Lukas, a blond-haired boy in a black vest, is Maj the Time Dragon's Dragon Master and is training to be a clockmaker.", "zh": "卢卡斯是个穿黑马甲的金发男孩，是时光龙玛杰（Maj）的驯龙师，正在学习做钟表匠。"}}, {"q": {"en": "What is the Time Dragon's name?", "zh": "时光龙叫什么名字？"}, "options": [{"en": "Neru", "zh": "内鲁（Neru）"}, {"en": "Worm", "zh": "沃姆（Worm）"}, {"en": "Vulcan", "zh": "火神（Vulcan）"}, {"en": "Maj", "zh": "玛杰（Maj）"}], "answer": 3, "explain": {"en": "Maj is the dark-blue Time Dragon with red spikes who perches on a special three-faced clock.", "zh": "玛杰是一条深蓝色、带红色尖刺的时光龙，停在一座三面时钟上。"}}, {"q": {"en": "Why does Drake suddenly land alone in the past instead of at Maldred's hideout?", "zh": "为什么德雷克没有到达马尔德里德的据点，反而独自落到了过去？"}, "options": [{"en": "Maj made a mistake with the clock", "zh": "玛杰弄错了时钟"}, {"en": "Beezel the Imp changed the clock and blasted his friends off", "zh": "小恶魔毕泽尔动了时钟，把他的朋友们炸飞了"}, {"en": "Worm ran out of energy", "zh": "沃姆耗尽了能量"}, {"en": "Lukas played a trick on him", "zh": "卢卡斯捉弄了他"}], "answer": 1, "explain": {"en": "Beezel, an imp raised by Maldred, secretly rode on Drake's back, changed the clock, and sent only Drake and herself back in time.", "zh": "被马尔德里德养大的小恶魔毕泽尔偷偷趴在德雷克背上，改动了时钟，只把德雷克和它自己送回了过去。"}}, {"q": {"en": "What kind of creature is Beezel?", "zh": "毕泽尔（Beezel）是什么生物？"}, "options": [{"en": "A fairy from the meadow", "zh": "草地里的精灵"}, {"en": "A wizard from Belerion", "zh": "来自贝勒里昂的巫师"}, {"en": "An imp from the Isle of Imps", "zh": "来自恶魔岛的小恶魔"}, {"en": "A small dragon", "zh": "一条小龙"}], "answer": 2, "explain": {"en": "Beezel is a tiny red-furred imp with horns and pointy ears who grew up in Maldred's hideout and has magical powers.", "zh": "毕泽尔是只红毛、有角、尖耳朵的小恶魔，在马尔德里德的据点长大，拥有魔法能力。"}}, {"q": {"en": "How does Drake get his Dragon Stone back from Beezel?", "zh": "德雷克是如何从毕泽尔手里拿回自己的龙石的？"}, "options": [{"en": "He shakes her out of a tree and snatches it", "zh": "他把她从树上摇下来，一把抢回龙石"}, {"en": "He trades an apple for it", "zh": "他用苹果和它交换"}, {"en": "Worm flies in and takes it", "zh": "沃姆飞进来夺回"}, {"en": "Griffith retrieves it", "zh": "格里菲斯取回"}], "answer": 0, "explain": {"en": "Drake tricks Beezel into climbing a branch, shakes her off, grabs the stone, and traps her under a bucket.", "zh": "德雷克骗毕泽尔爬上树枝，把她摇下来，抢回龙石，再用木桶把她扣住。"}}, {"q": {"en": "In the past, why doesn't Drake's mother believe his story about dragons?", "zh": "在过去，为什么德雷克的妈妈不相信他关于龙的说法？"}, "options": [{"en": "She is under a wizard's spell", "zh": "她中了巫师的咒语"}, {"en": "She is too busy to listen", "zh": "她太忙了没空听"}, {"en": "She cannot hear him", "zh": "她听不见他说话"}, {"en": "She says dragons aren't real", "zh": "她说龙根本不存在"}], "answer": 3, "explain": {"en": "In this earlier time Drake has not yet met Worm, so his mother thinks dragons are just made-up stories.", "zh": "在这个更早的时间点，德雷克还没遇见沃姆，所以他妈妈以为龙只是编出来的故事。"}}, {"q": {"en": "What power does Maj have that Drake's Earth Dragon Worm does not?", "zh": "玛杰拥有哪种沃姆（土龙）所没有的能力？"}, "options": [{"en": "Mind powers over stone", "zh": "控制石头的意念力"}, {"en": "The ability to travel back and forth through time", "zh": "能够来回穿越时间"}, {"en": "Breathing fire", "zh": "喷火"}, {"en": "Making plants grow", "zh": "让植物生长"}], "answer": 1, "explain": {"en": "Lukas explains that a Time Dragon can transport to any place AND travel through time, while Worm can only go to places.", "zh": "卢卡斯解释说，时光龙能去任何地方，也能穿越时间，而沃姆只能瞬间移动到各地。"}}, {"q": {"en": "How does the past Griffith finally believe Drake is telling the truth?", "zh": "过去的格里菲斯最终是如何相信德雷克说了真话的？"}, "options": [{"en": "Drake shows him a book", "zh": "德雷克给他看了一本书"}, {"en": "Beezel confesses everything", "zh": "毕泽尔全招了"}, {"en": "Drake connects with Worm through the Dragon Stone", "zh": "德雷克通过龙石与沃姆建立了连接"}, {"en": "Rori arrives to help", "zh": "罗瑞赶来帮忙"}], "answer": 2, "explain": {"en": "Drake's Dragon Stone glows and Worm recognizes him in his mind, proving the boy truly is his Dragon Master from the future.", "zh": "德雷克的龙石发光，沃姆在脑海中认出了他，证明这男孩确实是来自未来的驯龙师。"}}, {"q": {"en": "After Eko and the wizards are freed, what danger still remains?", "zh": "艾柯和巫师们被解救后，仍然留下了什么危险？"}, "options": [{"en": "Maldred has escaped his bottle", "zh": "马尔德雷德从瓶子里逃出来了"}, {"en": "Bracken is still in ruins", "zh": "布拉克恩依旧是一片废墟"}, {"en": "The Time Dragon has vanished", "zh": "时光龙不见了"}, {"en": "Some evil wizards are now on the loose", "zh": "一些邪恶的巫师已经逍遥法外"}], "answer": 3, "explain": {"en": "Griffith's journal shows that some of the freed wizards were even worse than Maldred, and now they are free to cause trouble.", "zh": "格里菲斯的笔记显示，被解救的巫师里有比马尔德雷德更坏的，现在他们已自由，可能制造麻烦。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
