<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call of the Sound Dragon — Quiz</title>
<style>
  :root{
    --grass:#27ae60;
    --grass-dark:#1e8449;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --dragon:#6c5ce7;
    --dragon-dark:#4834a0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--dragon);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--dragon);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .dragon{
    width:62px;height:62px;border-radius:50%;
    background:#fff;margin:0 auto 12px;position:relative;
    display:flex;align-items:center;justify-content:center;
    font-size:2rem;box-shadow:0 4px 14px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--dragon-dark);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(108,92,231,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(108,92,231,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#16 · Call of the Sound Dragon</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Tracey West</p>
    <div class="dragon">🐉</div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Dragon Masters: Call of the Sound Dragon</em> (Scholastic Branches, 2020) — by Tracey West</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Tracey West",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Tracey West",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What special ability does Eko have as a Dragon Mage?", "zh": "作为“龙法师”，艾柯拥有什么特殊能力？"}, "options": [{"en": "She can fly without a dragon", "zh": "她能在没有龙的情况下飞行"}, {"en": "She can read other people's minds according to some versions of the story", "zh": "她能读别人的心思（按书中另一种说法）"}, {"en": "She can use Neru's energy to make force fields and blasts", "zh": "她能借用内鲁的能量制造力场和能量冲击"}, {"en": "She can control the weather", "zh": "她能控制天气"}], "answer": 2, "explain": {"en": "Because her bond with Neru is so strong, Eko can tap into the Thunder Dragon's energy and shape it herself.", "zh": "因为她和内鲁的羁绊极强，艾柯能借用雷龙的能量并自行塑造成力场等形态。"}}, {"q": {"en": "What causes the strange red-and-yellow mist over the arena in Remus?", "zh": "雷默斯竞技场上空那团红黄相间的怪雾是由什么引起的？"}, "options": [{"en": "A coming storm", "zh": "一场即将来临的暴风雨"}, {"en": "A sleeping dragon", "zh": "一条沉睡的龙"}, {"en": "A fire in the city", "zh": "城里的一场大火"}, {"en": "A forbidden wizard duel", "zh": "一场被禁的巫师决斗"}], "answer": 0, "explain": {"en": "The mist is the sign of a wizard battle — Marco challenged Felix, and their runaway magic built up into the cloud.", "zh": "那团雾是巫师对决的标志——马尔科向菲利克斯发起挑战，两人失控的魔法聚成了云。"}}, {"q": {"en": "Who is Tessa?", "zh": "泰莎（Tessa）是谁？"}, "options": [{"en": "A blind Dragon Master whose dragon is Sono", "zh": "一位失明、龙是索诺的驯龙师"}, {"en": "A guard at the castle gate", "zh": "城堡大门的守卫"}, {"en": "Marco's sister", "zh": "马尔科的妹妹"}, {"en": "The Head Wizard of Belerion according to some versions of the story", "zh": "贝勒里昂的巫师首领（按书中另一种说法）"}], "answer": 0, "explain": {"en": "Tessa is blind and relies on her Sound Dragon Sono to guide and describe the world to her.", "zh": "泰莎双目失明，依靠她的音龙索诺为她引路、描述周围的世界。"}}, {"q": {"en": "What does Sono the Sound Dragon look like?", "zh": "音龙索诺长什么样子？"}, "options": [{"en": "A small red dragon with one head according to some versions of the story", "zh": "一只红色、单头的小龙（按书中另一种说法）"}, {"en": "A dragon with rainbow wavy scales, four legs, and no wings", "zh": "一条有彩虹波纹鳞片、四条腿、没有翅膀的龙"}, {"en": "A blue dragon with large wings", "zh": "一条带大翅膀的蓝龙"}, {"en": "A green dragon with tiny wings", "zh": "一条带小翅膀的绿龙"}], "answer": 1, "explain": {"en": "Sono has a wavy pattern of rainbow colors across her scales, four legs, and no wings.", "zh": "索诺的鳞片上有彩虹色的波纹，有四条腿，没有翅膀。"}}, {"q": {"en": "How does Griffith end up turned into a duck?", "zh": "格里菲斯是怎么变成一只鸭子的？"}, "options": [{"en": "He drank a magic potion", "zh": "他喝了一瓶魔法药水"}, {"en": "Marco hits him with a sizzling red-energy blast", "zh": "马尔科用一道滋滋作响的红能量击中了他"}, {"en": "He volunteered to be transformed according to some versions of the story", "zh": "他自愿被变形（按书中另一种说法）"}, {"en": "Tessa cast a spell on him", "zh": "泰莎对他施了咒"}], "answer": 1, "explain": {"en": "When Griffith tells the dueling wizards to stop, Marco blasts him with red magic that turns the wizard into a white duck.", "zh": "格里菲斯劝两位决斗的巫师停手时，马尔科用红魔法击中他，把他变成了一只白鸭。"}}, {"q": {"en": "What object can soak up the out-of-control wizard magic?", "zh": "什么东西能吸收那股失控的巫师魔法？"}, "options": [{"en": "A wizard's wand according to some versions of the story", "zh": "巫师的魔杖（按书中另一种说法）"}, {"en": "The gazing ball", "zh": "窥镜球"}, {"en": "A dragon's scale", "zh": "一片龙鳞"}, {"en": "The Power Crystal", "zh": "能量水晶（Power Crystal）"}], "answer": 3, "explain": {"en": "The Head Wizard Jayana says only a Power Crystal can absorb the swirling cloud of uncontrolled magic.", "zh": "巫师首领贾亚娜说，只有能量水晶才能吸收那团失控的魔法云。"}}, {"q": {"en": "Why can't a wizard simply grab the Power Crystal?", "zh": "为什么巫师不能自己去拿能量水晶？"}, "options": [{"en": "It is invisible to wizards according to some versions of the story", "zh": "巫师看不见它（按书中另一种说法）"}, {"en": "It explodes on contact", "zh": "一碰就会爆炸"}, {"en": "Touching it would make them lose all their magic forever", "zh": "碰到它就会永远失去自己全部的法力"}, {"en": "It is too hot to touch", "zh": "它太烫，碰不了"}], "answer": 2, "explain": {"en": "The crystal absorbs the magic of whoever touches it, so a wizard who grabs it loses their powers forever — which is why the Dragon Masters must use it.", "zh": "水晶会吸收触碰者的魔法，所以巫师一碰就会永远失去法力，因此必须由驯龙师来使用。"}}, {"q": {"en": "How do Tessa and Sono get the crystal out of the unbreakable rock?", "zh": "泰莎和索诺是如何从那块“不可破坏的岩石”里取出水晶的？"}, "options": [{"en": "Jayana opens the rock with a spell", "zh": "贾亚娜用咒语打开岩石"}, {"en": "They smash the rock with Worm's powers", "zh": "他们用沃姆的力量砸碎岩石"}, {"en": "They pass through it as sound waves", "zh": "她们化作声波穿过了岩石"}, {"en": "Worm digs it out", "zh": "沃姆把它挖了出来"}], "answer": 0, "explain": {"en": "Sono can turn into sound waves, so Tessa and her dragon melt right through the rock and carry the crystal back out.", "zh": "索诺能变成声波，于是泰莎和她的龙直接“融化”穿过岩石，把水晶带了回来。"}}, {"q": {"en": "How do the Dragon Masters finally stop Marco and Felix from fighting?", "zh": "驯龙师们最终是如何让马尔科和菲利克斯停止打斗的？"}, "options": [{"en": "Griffith scolds them loudly according to some versions of the story", "zh": "格里菲斯大声训斥他们（按书中另一种说法）"}, {"en": "They freeze them with ice", "zh": "他们用冰把他们冻住"}, {"en": "They battle both wizards", "zh": "他们和两位巫师交战"}, {"en": "Zera sings a lullaby and Sono makes it loud to put them to sleep", "zh": "泽拉唱摇篮曲，索诺把声音放大，让他们睡着"}], "answer": 3, "explain": {"en": "Petra's hydra Zera sings a soft song while Sono aims and amplifies the sound waves, lulling both wizards to sleep.", "zh": "佩特拉的四头蛇龙泽拉唱起轻柔的歌，索诺把声波对准并放大，哄得两位巫师沉沉睡去。"}}, {"q": {"en": "What decision does Petra make at the end of the book?", "zh": "在书的结尾，佩特拉做出了什么决定？"}, "options": [{"en": "She becomes the Head Wizard", "zh": "她当上了巫师首领"}, {"en": "She stays in Remus to learn from Tessa", "zh": "她留在雷默斯向泰莎学习"}, {"en": "She returns to Bracken with Drake according to some versions of the story", "zh": "她随德雷克回到布拉克恩（按书中另一种说法）"}, {"en": "She leaves with Eko", "zh": "她跟着艾柯离开"}], "answer": 1, "explain": {"en": "Petra misses her home region and wants to explore what Zera and Sono can do together, so she stays in Remus.", "zh": "佩特拉想念家乡一带，也想探索泽拉和索诺联手能做什么，于是她留在了雷默斯。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
