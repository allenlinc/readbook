<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Howl of the Wind Dragon — Quiz</title>
<style>
  :root{
    --grass:#27ae60;
    --grass-dark:#1e8449;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --dragon:#6c5ce7;
    --dragon-dark:#4834a0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--dragon);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--dragon);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .dragon{
    width:62px;height:62px;border-radius:50%;
    background:#fff;margin:0 auto 12px;position:relative;
    display:flex;align-items:center;justify-content:center;
    font-size:2rem;box-shadow:0 4px 14px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--dragon-dark);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(108,92,231,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(108,92,231,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#20 · Howl of the Wind Dragon</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Tracey West</p>
    <div class="dragon">🐉</div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Dragon Masters: Howl of the Wind Dragon</em> (Scholastic Branches, 2018) — by Tracey West</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Tracey West",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Tracey West",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Where do Drake and Rori find the Wind Dragon Wayra?", "zh": "德雷克和罗瑞在哪里找到了风龙瓦伊拉？"}, "options": [{"en": "On the islands of Noa", "zh": "在诺阿群岛"}, {"en": "In the mountains of Ichu Mocco", "zh": "在伊楚莫科的山区"}, {"en": "In the Land of the Far North", "zh": "在极北之地"}, {"en": "In Bracken castle", "zh": "在布雷肯城堡"}], "answer": 1, "explain": {"en": "Ana and Rori found a book saying Wind Dragons live in Ichu Mocco, a mountain place. Queen Amaru had captured Wayra there.", "zh": "安娜和罗瑞查到书上说风龙住在伊楚莫科的山区。阿玛鲁女王在那里俘获了瓦伊拉。"}}, {"q": {"en": "Why is Wayra chained up by Queen Amaru?", "zh": "为什么瓦伊拉被阿玛鲁女王用铁链锁住？"}, "options": [{"en": "She is sick", "zh": "她生病了"}, {"en": "The queen wants to force her to use wind to destroy a village", "zh": "女王想逼她用风力摧毁一个村庄"}, {"en": "To keep her warm", "zh": "为了给她保暖"}, {"en": "She asked to be chained", "zh": "她自己要求被锁"}], "answer": 1, "explain": {"en": "Only a Dragon Master can command a dragon, so the queen's wizard found Quilla. The queen wants Wayra to use her winds to destroy a village she is angry with.", "zh": "只有驯龙师能指挥龙，所以女王的巫师找到了奎拉。女王想让瓦伊拉用风力摧毁一个她生气的村庄。"}}, {"q": {"en": "How do Drake and his friends free Wayra from the chains?", "zh": "德雷克和朋友们是如何把瓦伊拉从锁链中解救出来的？"}, "options": [{"en": "They cut the chains with a sword", "zh": "他们用剑砍断锁链"}, {"en": "Worm uses his green magic to break the magical chains", "zh": "虫虫用绿色魔法击碎了魔法锁链"}, {"en": "The queen lets her go", "zh": "女王放她走"}, {"en": "Quilla unlocks them", "zh": "奎拉打开锁"}], "answer": 1, "explain": {"en": "Drake tells Worm to break the chains; Worm glows green and the silver chains tremble, then break into tiny pieces.", "zh": "德雷克让虫虫击碎锁链；虫虫发出绿光，银链颤抖后碎成小块。"}}, {"q": {"en": "What are the three steps to transform the Tenebrex Stone?", "zh": "转化特内布雷克斯石需要哪三个步骤？"}, "options": [{"en": "Melt, cool, then blow on it", "zh": "熔化、冷却、再吹气"}, {"en": "Wash, dry, then paint", "zh": "清洗、晾干、再上色"}, {"en": "Freeze, heat, then bury", "zh": "冷冻、加热、再埋起来"}, {"en": "Sing, dance, then sleep", "zh": "唱歌、跳舞、再睡觉"}], "answer": 0, "explain": {"en": "Ka the Lava Dragon melts the stone, Tani the Sea Dragon cools it with seawater, and Wayra the Wind Dragon blows on it to turn it into a magic box.", "zh": "熔岩龙卡熔化石头，海龙塔尼用海水冷却，风龙瓦伊拉吹气把它变成一个魔法盒子。"}}, {"q": {"en": "What does Astrid wear on her belt that holds stolen dragon powers?", "zh": "阿斯特丽德腰带上戴的、装着被偷龙之力量的是什么？"}, "options": [{"en": "Tiny glowing bottles of colored liquid", "zh": "装着彩色液体的小发光瓶子"}, {"en": "Dragon Stones", "zh": "龙石"}, {"en": "Feathers", "zh": "羽毛"}, {"en": "Keys", "zh": "钥匙"}], "answer": 0, "explain": {"en": "Astrid's belt has tiny glowing bottles, each holding a different color liquid — a dragon power she had stolen and could drink to use.", "zh": "阿斯特丽德的腰带上挂着小发光瓶子，每个装着不同颜色的液体——是被她偷来、喝下就能使用的龙之力。"}}, {"q": {"en": "Where does Astrid take the bone beasts through a portal?", "zh": "阿斯特丽德通过传送门把骨兽带到了哪里？"}, "options": [{"en": "The Land of the Far North (King Albin's kingdom)", "zh": "极北之地（阿尔宾国王的王国）"}, {"en": "The islands of Noa", "zh": "诺阿群岛"}, {"en": "Belerion", "zh": "贝勒里昂"}, {"en": "Ichu Mocco", "zh": "伊楚莫科"}], "answer": 0, "explain": {"en": "Astrid wants revenge on King Albin, who banished her, so she attacks the Land of the Far North where Hulda (her sister and Mina's wizard) lives.", "zh": "阿斯特丽德想报复放逐她的阿尔宾国王，于是进攻极北之地，那里住着她的姐姐胡尔达（也是米娜的巫师）。"}}, {"q": {"en": "How does Frost the Ice Dragon help defeat a bone beast?", "zh": "冰龙弗罗斯特是如何帮助击败骨兽的？"}, "options": [{"en": "He freezes its long neck so the bones shatter", "zh": "他冻住骨兽的长脖子，使骨头碎裂"}, {"en": "He sets it on fire", "zh": "他把骨兽烧着"}, {"en": "He buries it in sand", "zh": "他把骨兽埋进沙里"}, {"en": "He flies it away", "zh": "他把骨兽带走了"}], "answer": 0, "explain": {"en": "Frost shoots icy breath at a giant long-necked beast; the ice freezes its neck and the bones shatter, crashing to the ground.", "zh": "弗罗斯特朝巨大的长颈骨兽喷出寒气，冰封住脖子，骨头碎裂坠地。"}}, {"q": {"en": "What happens when Drake opens the Tenebrex Box among the beasts?", "zh": "当德雷克在骨兽中间打开特内布雷克斯盒子时，发生了什么？"}, "options": [{"en": "The beasts grow bigger", "zh": "骨兽变得更大"}, {"en": "Magic light wraps the beasts and the bones fall apart", "zh": "魔法光芒缠绕骨兽，骨头散落一地"}, {"en": "It starts to rain", "zh": "开始下雨"}, {"en": "Astrid disappears", "zh": "阿斯特丽德消失了"}], "answer": 1, "explain": {"en": "Opening the box shoots purple, orange, and turquoise magic that wraps the beasts; they stop, the bones clatter down, and the False Life spell is broken.", "zh": "打开盒子射出紫、橙、蓝绿三色魔法缠绕骨兽，它们停下，骨头散落，假生命咒语被打破。"}}, {"q": {"en": "How is Astrid finally stopped at the end of the book?", "zh": "在书的结尾，阿斯特丽德最终是如何被制服的？"}, "options": [{"en": "She is turned to stone by Shaka the Stone Dragon", "zh": "她被石龙沙卡变成了石头"}, {"en": "She flies away", "zh": "她飞走了"}, {"en": "She becomes a shadow", "zh": "她变成了影子"}, {"en": "She is eaten by a beast", "zh": "她被骨兽吃掉"}], "answer": 0, "explain": {"en": "Caspar commands Shaka to use his secret power; gray beams from Shaka's eyes turn Astrid into a stone statue, which is taken to the Wizard's Council prison.", "zh": "卡斯帕命令沙卡使用秘密力量，沙卡眼中射出灰光把阿斯特丽德变成石像，被送往巫师议会监狱。"}}, {"q": {"en": "What small creature visits Drake at the very end of the book?", "zh": "在书的最后，有什么小生物来拜访德雷克？"}, "options": [{"en": "A tiny dragon with flower-petal wings", "zh": "一只长着花瓣翅膀的小龙"}, {"en": "A baby bird", "zh": "一只小鸟"}, {"en": "A field snake", "zh": "一条草蛇"}, {"en": "A toad", "zh": "一只蟾蜍"}], "answer": 0, "explain": {"en": "After the battle, a tiny green dragon with white flower petals on its head and petal-like wings crawls onto Drake — hinting at the next adventure.", "zh": "战斗结束后，一只绿色的小龙爬到德雷克身上，头上长着白色花瓣、翅膀像花瓣——暗示了下一段冒险。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
