<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shine of the Silver Dragon — Quiz</title>
<style>
  :root{
    --grass:#27ae60;
    --grass-dark:#1e8449;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --dragon:#6c5ce7;
    --dragon-dark:#4834a0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--dragon);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--dragon);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .dragon{
    width:62px;height:62px;border-radius:50%;
    background:#fff;margin:0 auto 12px;position:relative;
    display:flex;align-items:center;justify-content:center;
    font-size:2rem;box-shadow:0 4px 14px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--dragon-dark);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(108,92,231,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(108,92,231,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#11 · Shine of the Silver Dragon</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Tracey West</p>
    <div class="dragon">🐉</div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Dragon Masters: Shine of the Silver Dragon</em> (Scholastic Branches, 2018) — by Tracey West</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Tracey West",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Tracey West",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What is the Naga?", "zh": "那迦是什么？"}, "options": [{"en": "A small fire lizard", "zh": "一只小火蜥蜴"}, {"en": "An enormous earthquake dragon deep in the earth", "zh": "深埋地底、能引发地震的巨龙"}, {"en": "A type of wizard", "zh": "一种巫师"}, {"en": "A golden key", "zh": "一把金钥匙"}], "answer": 1, "explain": {"en": "The Naga is a giant dragon with the power of earthquakes who lives deep within the earth.", "zh": "那迦是一条拥有地震之力的巨龙，居住在地球深处。"}}, {"q": {"en": "Why did the wizards make the Silver Key and the Gold Key?", "zh": "巫师们为什么要打造银钥匙和金钥匙？"}, "options": [{"en": "To lock away the Naga", "zh": "为了封印那迦"}, {"en": "To open a treasure chest", "zh": "为了打开宝箱"}, {"en": "To summon rain", "zh": "为了召唤雨水"}, {"en": "To cure dark spells", "zh": "为了解除黑魔法"}], "answer": 0, "explain": {"en": "Wizards of the north and south made the two keys to control the Naga and return him to his home in the earth.", "zh": "北方和南方的巫师打造了这两把钥匙，用来控制那迦并把它送回地底的家。"}}, {"q": {"en": "Which Dragon Masters travel to Gallia to stop Diego?", "zh": "哪些驯龙师前往加利亚去阻止迭戈？"}, "options": [{"en": "Drake, Bo, and Carlos", "zh": "德雷克、波和卡洛斯"}, {"en": "Rori, Ana, and Petra", "zh": "罗莉、安娜和佩特拉"}, {"en": "Drake, Rori, and Jean", "zh": "德雷克、罗莉和珍"}, {"en": "Carlos, Diego, and Griffith", "zh": "卡洛斯、迭戈和格里菲斯"}], "answer": 0, "explain": {"en": "Griffith sends Drake, Bo, and Carlos because Bo's Water Dragon can cure dark spells and Carlos knows Diego best.", "zh": "格里菲斯派德雷克、波和卡洛斯前往，因为波的水龙能解除黑魔法，而卡洛斯最了解迭戈。"}}, {"q": {"en": "What is special about Bo's dragon Shu?", "zh": "波的龙舒有什么特别之处？"}, "options": [{"en": "She can fly faster than any dragon", "zh": "她飞得比任何龙都快"}, {"en": "Her water can wash away dark spells", "zh": "她的水能洗去黑魔法"}, {"en": "She breathes fire", "zh": "她喷火"}, {"en": "She controls lightning", "zh": "她控制闪电"}], "answer": 1, "explain": {"en": "Shu is a Water Dragon whose healing mist can cure a dragon or person of Maldred's dark spell.", "zh": "舒是一条水龙，她治愈性的水雾能治好人或龙身上的马尔德雷德黑魔法。"}}, {"q": {"en": "Who guards the Silver Key in Gallia?", "zh": "在加利亚，是谁守护着银钥匙？"}, "options": [{"en": "Diego", "zh": "迭戈"}, {"en": "Jean and her dragon Argent", "zh": "珍和她的龙阿真特"}, {"en": "Carlos", "zh": "卡洛斯"}, {"en": "The king of Bracken", "zh": "布拉肯的国王"}], "answer": 1, "explain": {"en": "Jean is the Silver Dragon's Dragon Master and, with Argent, has guarded the Silver Key for a very long time.", "zh": "珍是银龙的驯龙师，她和阿真特长久以来一直守护着银钥匙。"}}, {"q": {"en": "What can Argent the Silver Dragon do with his wings?", "zh": "银龙阿真特能用翅膀做什么？"}, "options": [{"en": "He uses them to fly to the moon", "zh": "他用它们飞到月亮上"}, {"en": "He reflects an opponent's attack back at them", "zh": "他把敌人的攻击反弹回去"}, {"en": "He hides the key inside them", "zh": "他把钥匙藏在翅膀里"}, {"en": "He turns invisible", "zh": "他让自己隐形"}], "answer": 1, "explain": {"en": "When an enemy attacks, Argent's shining wings bounce the attack right back at the attacker.", "zh": "当敌人攻击时，阿真特发光的翅膀会把攻击原样反弹回攻击者身上。"}}, {"q": {"en": "How does Jean keep the castle safe with so few soldiers?", "zh": "珍人手这么少，是怎么守住城堡的？"}, "options": [{"en": "She uses magic to make an army appear", "zh": "她用魔法变出一支军队"}, {"en": "She improved catapults to shoot many rocks and look like an army", "zh": "她改良了投石机，一次射出很多石头，看起来像一支军队"}, {"en": "She asks the villagers to fight", "zh": "她叫村民来作战"}, {"en": "She hides behind a wall", "zh": "她躲在墙后面"}], "answer": 1, "explain": {"en": "Jean's redesigned catapults launch several rocks at once, fooling enemies into thinking many soldiers guard the castle.", "zh": "珍重新设计的投石机能一次发射多块石头，让敌人以为城堡里有许多士兵守卫。"}}, {"q": {"en": "What happens to the Silver Key after Diego is cured?", "zh": "迭戈被治好之后，银钥匙怎么样了？"}, "options": [{"en": "Jean keeps it safely", "zh": "珍好好地保存着它"}, {"en": "Maldred's red orb steals it away", "zh": "马尔德雷德的红色法球把它夺走了"}, {"en": "Drake takes it home", "zh": "德雷克把它带回了家"}, {"en": "It melts into dust", "zh": "它化成了灰尘"}], "answer": 1, "explain": {"en": "Just as Diego is healed, a red orb belonging to Maldred appears and carries the Silver Key off with it.", "zh": "就在迭戈被治愈时，马尔德雷德的一个红色法球出现，把银钥匙一起带走了。"}}, {"q": {"en": "Where is the Gold Key hidden, according to Diego?", "zh": "据迭戈所说，金钥匙藏在哪里？"}, "options": [{"en": "In the Kingdom of Bracken", "zh": "在布拉肯王国"}, {"en": "On the Island of Suvarna", "zh": "在苏瓦纳岛上"}, {"en": "Inside Kwaku's web", "zh": "在夸库的网里"}, {"en": "Under the sea", "zh": "在海底"}], "answer": 1, "explain": {"en": "While under Maldred's spell, Diego connected to the wizard's thoughts and learned the Gold Key is on the Island of Suvarna.", "zh": "在马尔德雷德的魔咒控制下，迭戈连接到了巫师的思绪，得知金钥匙在苏瓦纳岛上。"}}, {"q": {"en": "What real historical figure inspired the new Dragon Master Jean?", "zh": "新驯龙师珍的原型是哪位真实历史人物？"}, "options": [{"en": "A famous queen of England", "zh": "英格兰一位著名的女王"}, {"en": "Joan of Arc, who led an army at age sixteen", "zh": "圣女贞德，她十六岁时就率领了一支军队"}, {"en": "A well-known sailor", "zh": "一位著名的航海家"}, {"en": "The king of Gallia", "zh": "加利亚的国王"}], "answer": 1, "explain": {"en": "The author says Jean was inspired by a real girl who led a French army in 1429 when she was sixteen — Joan of Arc.", "zh": "作者说珍的灵感来自一位真实女孩：1429年十六岁时率领法国军队的圣女贞德。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
