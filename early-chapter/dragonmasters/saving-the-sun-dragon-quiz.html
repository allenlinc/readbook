<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saving the Sun Dragon — Quiz</title>
<style>
  :root{
    --grass:#27ae60;
    --grass-dark:#1e8449;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --dragon:#6c5ce7;
    --dragon-dark:#4834a0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--dragon);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--dragon);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .dragon{
    width:62px;height:62px;border-radius:50%;
    background:#fff;margin:0 auto 12px;position:relative;
    display:flex;align-items:center;justify-content:center;
    font-size:2rem;box-shadow:0 4px 14px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--dragon-dark);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(108,92,231,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(108,92,231,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#02 · Saving the Sun Dragon</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Tracey West</p>
    <div class="dragon">🐉</div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Dragon Masters: Saving the Sun Dragon</em> (Scholastic Branches, 2014) — by Tracey West</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Tracey West",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Tracey West",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What makes Ana's Sun Dragon, Kepri, sick?", "zh": "阿娜的太阳龙凯普里为什么会生病？"}, "options": [{"en": "She ate too much food", "zh": "她吃太多了"}, {"en": "Dark magic from a red orb sent by Maldred", "zh": "马尔德雷用红色光球施展的黑魔法"}, {"en": "She flew too high in the sky", "zh": "她飞得太高了"}, {"en": "The heat of the sun burned her", "zh": "被太阳晒伤了"}], "answer": 1, "explain": {"en": "A glowing red orb made by the dark wizard Maldred entered the tunnel and its dark magic made the Sun Dragon sick.", "zh": "黑巫师马尔德雷制造的红色光球飞进隧道，里面的黑魔法让太阳龙生病了。"}}, {"q": {"en": "Which dragon uses the power of its mind to teleport everyone to the Land of Pyramids?", "zh": "哪条龙用意念的力量把大家传送到了金字塔之地？"}, "options": [{"en": "Kepri the Sun Dragon", "zh": "太阳龙凯普里"}, {"en": "Vulcan the Fire Dragon", "zh": "火龙瓦尔坎"}, {"en": "Worm the Earth Dragon", "zh": "地龙沃姆"}, {"en": "Shu the Water Dragon", "zh": "水龙舒"}], "answer": 2, "explain": {"en": "Worm is an Earth Dragon who can move things and even teleport people using his mind, which is how they reached Kepri's twin.", "zh": "沃姆是地龙，能用意念移动物体甚至传送人，正是这样他们才找到了凯普里的双胞胎。"}}, {"q": {"en": "Who is Heru?", "zh": "赫鲁是谁？"}, "options": [{"en": "King Roland's son", "zh": "罗兰国王的儿子"}, {"en": "A boy in the pyramids who serves dragons and wears a Dragon Stone", "zh": "金字塔之地一个侍奉龙、戴着龙石块的男孩"}, {"en": "The dark wizard Maldred", "zh": "黑巫师马尔德雷"}, {"en": "A castle guard", "zh": "一名城堡卫兵"}], "answer": 1, "explain": {"en": "Heru lives in the Land of Pyramids, serves dragons like his family has for ages, and wears a green Dragon Stone given by his father.", "zh": "赫鲁住在金字塔之地，世代侍奉龙，脖子上戴着父亲给他的绿色龙石块。"}}, {"q": {"en": "What kind of dragon is Wati?", "zh": "瓦蒂是一条什么龙？"}, "options": [{"en": "A Fire Dragon", "zh": "火龙"}, {"en": "A Water Dragon", "zh": "水龙"}, {"en": "Kepri's Moon Dragon twin", "zh": "凯普里的月亮龙双胞胎"}, {"en": "An Earth Dragon", "zh": "地龙"}], "answer": 2, "explain": {"en": "Wati is a black Moon Dragon and Kepri's twin; every Sun Dragon is born with a Moon Dragon twin that can heal it.", "zh": "瓦蒂是一条黑色的月亮龙，也是凯普里的双胞胎；每条太阳龙都生来有一条能治愈它的月亮龙双胞胎。"}}, {"q": {"en": "How does Wati heal Kepri?", "zh": "瓦蒂是怎样治愈凯普里的？"}, "options": [{"en": "With a magic potion", "zh": "用魔法药水"}, {"en": "With a ribbon of dark-colored rainbow light from his mouth", "zh": "用他从口中吐出的暗色彩虹光带"}, {"en": "By singing a song", "zh": "用唱歌"}, {"en": "With a jar of moonbeams", "zh": "用一罐月光"}], "answer": 1, "explain": {"en": "Wati opens his mouth and a ribbon of blue, black, and purple light swirls around Kepri, healing her.", "zh": "瓦蒂张开嘴，吐出蓝、黑、紫相间的光带环绕凯普里，把她治好了。"}}, {"q": {"en": "Why does Ana decide Kepri should return home with her instead of staying with Wati?", "zh": "阿娜为什么决定让凯普里跟她回家，而不是留在瓦蒂身边？"}, "options": [{"en": "Kepri likes Bracken better", "zh": "凯普里更喜欢布拉克恩"}, {"en": "Ana's Dragon Stone glows and she finally connects with Kepri", "zh": "阿娜的龙石块发光，她终于和凯普里建立了连接"}, {"en": "Wati asks her to leave", "zh": "瓦蒂让她离开"}, {"en": "King Roland orders it", "zh": "罗兰国王下令如此"}], "answer": 1, "explain": {"en": "Right before leaving, Ana's Dragon Stone glows green and she hears Kepri's voice in her head, proving their connection.", "zh": "临走前，阿娜的龙石块发出绿光，她能在脑海中听见凯普里的声音，说明她们建立了连接。"}}, {"q": {"en": "Which dark wizard sent the red orb that made Kepri sick?", "zh": "是哪个黑巫师放出让凯普里生病的红色光球？"}, "options": [{"en": "Griffith", "zh": "格里菲斯"}, {"en": "Diego", "zh": "迪亚哥"}, {"en": "Maldred", "zh": "马尔德雷"}, {"en": "Heru", "zh": "赫鲁"}], "answer": 2, "explain": {"en": "The wizard Diego identifies Maldred as the only wizard evil enough to send that orb of dark magic.", "zh": "巫师迪亚哥认定，只有坏到极点的马尔德雷才会放出那个黑魔法光球。"}}, {"q": {"en": "What does Drake tell King Roland about how Kepri was cured?", "zh": "德雷克对罗兰国王说了什么关于凯普里被治愈的事？"}, "options": [{"en": "That Kepri is still sick", "zh": "凯普里仍然病着"}, {"en": "That Griffith made a potion that cured her", "zh": "是格里菲斯配了药水治好她的"}, {"en": "That the dragons escaped", "zh": "龙逃走了"}, {"en": "That he is not a Dragon Master", "zh": "他不是驯龙师"}], "answer": 1, "explain": {"en": "Drake lies and says Griffith's potion worked, so the king won't learn that Worm teleported them far away.", "zh": "德雷克撒谎说是格里菲斯的药水有用，这样国王就不会知道沃姆把他们传送到了远方。"}}, {"q": {"en": "What glowing ingredient did Drake fetch from Griffith's workshop for the healing potion?", "zh": "德雷克从格里菲斯的工作室取来了哪种发光材料做治愈药水？"}, "options": [{"en": "Moonbeams", "zh": "月光"}, {"en": "Dragon scales", "zh": "龙鳞"}, {"en": "Sunflower petals", "zh": "向日葵花瓣"}, {"en": "Pyramid sand", "zh": "金字塔的沙子"}], "answer": 0, "explain": {"en": "Drake grabbed a jar of glowing moonbeams from the top shelf while Bo fetched the sunflower seeds.", "zh": "德雷克从最高一层拿了一罐发光的月光，而博取来了葵花籽。"}}, {"q": {"en": "What kind of dragon is Vulcan, Rori's dragon?", "zh": "罗瑞的龙瓦尔坎是什么龙？"}, "options": [{"en": "A Sun Dragon", "zh": "太阳龙"}, {"en": "A Water Dragon", "zh": "水龙"}, {"en": "A Fire Dragon", "zh": "火龙"}, {"en": "A Moon Dragon", "zh": "月亮龙"}], "answer": 2, "explain": {"en": "Vulcan is a big red Fire Dragon who shoots bursts of flame from his mouth.", "zh": "瓦尔坎是一条红色的大火龙，会从嘴里喷出火焰。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
