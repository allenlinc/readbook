<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eye of the Earthquake Dragon — Quiz</title>
<style>
  :root{
    --grass:#27ae60;
    --grass-dark:#1e8449;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --dragon:#6c5ce7;
    --dragon-dark:#4834a0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--dragon);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--dragon);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .dragon{
    width:62px;height:62px;border-radius:50%;
    background:#fff;margin:0 auto 12px;position:relative;
    display:flex;align-items:center;justify-content:center;
    font-size:2rem;box-shadow:0 4px 14px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--dragon-dark);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(108,92,231,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(108,92,231,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#13 · Eye of the Earthquake Dragon</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Tracey West</p>
    <div class="dragon">🐉</div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Dragon Masters: Eye of the Earthquake Dragon</em> (Scholastic Branches, 2019) — by Tracey West</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Tracey West",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Tracey West",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "How do the wizards first stop Maldred at the start of the book?", "zh": "本书开头，巫师们是如何先一步阻止马尔德雷德的？"}, "options": [{"en": "They lock him in a castle according to some versions of the story", "zh": "他们把他锁进城堡（按书中另一种说法）"}, {"en": "They take his keys", "zh": "他们夺走他的钥匙"}, {"en": "They turn him into a frog", "zh": "他们把他变成青蛙"}, {"en": "They trap him in a magical dimension where he cannot move", "zh": "他们把他困在一个无法动弹的魔法空间里"}], "answer": 3, "explain": {"en": "Wizards like Hulda cast a spell that freezes Maldred in a magical dimension, though only for a short time.", "zh": "像赫尔达这样的巫师施法把马尔德雷德冻在一个魔法空间里，不过只能困住他很短一段时间。"}}, {"q": {"en": "What do the markings on the two keys reveal when stamped together?", "zh": "两把钥匙上的纹路一起印下来后，揭示了什么？"}, "options": [{"en": "A map of the Dragon Islands", "zh": "龙之群岛的地图"}, {"en": "The Naga's name", "zh": "那迦的名字"}, {"en": "A picture of a dragon according to some versions of the story", "zh": "一幅龙的图画（按书中另一种说法）"}, {"en": "A secret spell", "zh": "一道秘密魔咒"}], "answer": 0, "explain": {"en": "Maldred (and later Darma) stamps the keys' raised markings onto paper, forming a map of the Dragon Islands.", "zh": "马尔德雷德（后来是达尔马）把钥匙凸起的纹路印在纸上，拼出了一幅龙之群岛的地图。"}}, {"q": {"en": "Where is the Naga's temple located, according to the rhyme?", "zh": "根据那首诗，那迦的神庙位于何处？"}, "options": [{"en": "On the highest mountain", "zh": "在最高的山上"}, {"en": "Under the wizard's castle according to some versions of the story", "zh": "在巫师城堡的地底下（按书中另一种说法）"}, {"en": "On the Island of Suvarna", "zh": "在苏瓦纳岛上"}, {"en": "In the dragon's eye of the islands", "zh": "在群岛所构成的龙的眼睛里"}], "answer": 3, "explain": {"en": "The rhyme says 'The Naga's temple is in the dragon's eye,' and the map's islands form a dragon shape with the eye marked.", "zh": "诗里说「那迦的神庙在龙的眼睛里」，而地图上的群岛恰好组成一条龙，龙眼处被标了出来。"}}, {"q": {"en": "Who are the Naga's Dragon Masters?", "zh": "那迦的驯龙师是谁？"}, "options": [{"en": "Uri and Zelda, twins", "zh": "双胞胎乌里和泽尔达"}, {"en": "Bo and Ana", "zh": "波和安娜"}, {"en": "Jean and Darma", "zh": "珍和达尔马"}, {"en": "Drake and Rori according to some versions of the story", "zh": "德雷克和罗莉（按书中另一种说法）"}], "answer": 0, "explain": {"en": "Inside the temple, Drake meets Uri and Zelda, twin Dragon Masters who watch over the Naga.", "zh": "在神庙里，德雷克遇到了双胞胎乌里和泽尔达，他们是看守那迦的驯龙师。"}}, {"q": {"en": "What object does Griffith give Drake to stay in touch?", "zh": "格里菲斯给了德雷克什么用来保持联络？"}, "options": [{"en": "A Dragon Stone according to some versions of the story", "zh": "一块龙石（按书中另一种说法）"}, {"en": "A map", "zh": "一张地图"}, {"en": "A magic mirror", "zh": "一面魔法镜"}, {"en": "A silver sword", "zh": "一把银剑"}], "answer": 2, "explain": {"en": "Griffith gives Drake a small magic mirror so they can contact each other from far away.", "zh": "格里菲斯给了德雷克一面小魔法镜，这样他们即使相隔很远也能互相联系。"}}, {"q": {"en": "How does Maldred take away the dragons' powers?", "zh": "马尔德雷德是怎么夺走龙们的能力的？"}, "options": [{"en": "He steals the keys", "zh": "他偷走了钥匙"}, {"en": "He traps their powers in a red bottle", "zh": "他把它们的力量封进一个红色瓶子里"}, {"en": "He casts a sleeping spell", "zh": "他施了一个沉睡咒"}, {"en": "He breaks their Dragon Stones according to some versions of the story", "zh": "他打碎了它们的龙石（按书中另一种说法）"}], "answer": 1, "explain": {"en": "Maldred tosses a glowing red bottle that pulls Worm, Argent, and Hema's powers into it, leaving the dragons powerless.", "zh": "马尔德雷德抛出一只发光的红瓶，把虫虫、阿真特和赫玛的力量吸了进去，使龙们失去力量。"}}, {"q": {"en": "Where does Maldred place the two keys to open the Naga's door?", "zh": "马尔德雷德把两把钥匙插在哪里来打开那迦之门？"}, "options": [{"en": "On the temple floor", "zh": "在神庙的地板上"}, {"en": "In the dragon's eyes carved on the door", "zh": "门上雕刻的龙的眼睛里"}, {"en": "In a treasure chest", "zh": "在一个宝箱里"}, {"en": "Under the Naga's tail according to some versions of the story", "zh": "在那迦的尾巴下面（按书中另一种说法）"}], "answer": 1, "explain": {"en": "The Silver Key slides into the dragon's left eye and the Gold Key into the right eye, and the door opens.", "zh": "银钥匙滑进龙的左眼，金钥匙滑进右眼，门就打开了。"}}, {"q": {"en": "What does Drake do to break Maldred's control over Uri and Zelda?", "zh": "德雷克做了什么来打破马尔德雷德对乌里和泽尔达的控制？"}, "options": [{"en": "He defeats Maldred in a fight according to some versions of the story", "zh": "他在战斗中打败了马尔德雷德（按书中另一种说法）"}, {"en": "He calls the Naga's name", "zh": "他呼唤那迦的名字"}, {"en": "He removes the keys from the dragon's eyes", "zh": "他把钥匙从龙的眼睛里取了出来"}, {"en": "He uses the magic mirror", "zh": "他用了魔法镜"}], "answer": 2, "explain": {"en": "Drake climbs up and pries the Gold Key out; removing even one key breaks the twins' obedience to Maldred.", "zh": "德雷克爬上去撬出金钥匙；哪怕只取走一把钥匙，也能解除双胞胎对马尔德雷德的服从。"}}, {"q": {"en": "What does Griffith's glittering powder do to Maldred?", "zh": "格里菲斯那闪亮的粉末对马尔德雷德做了什么？"}, "options": [{"en": "It erases his memory", "zh": "抹去他的记忆"}, {"en": "It turns him into a swarm of red flies", "zh": "把他变成一大群红色苍蝇"}, {"en": "It shrinks him", "zh": "让他缩小"}, {"en": "It makes him fall asleep according to some versions of the story", "zh": "让他睡着（按书中另一种说法）"}], "answer": 1, "explain": {"en": "The new spell's powder transforms Maldred into hundreds of red flies, which Darma seals inside the bottle.", "zh": "新魔咒的粉末把马尔德雷德变成数百只红苍蝇，达尔马把它们封进了瓶子里。"}}, {"q": {"en": "What does Petra discover that could help rebuild Bracken?", "zh": "佩特拉发现了什么，可能帮助重建布拉肯？"}, "options": [{"en": "A book about the Spring Dragon that heals land", "zh": "一本关于能治愈大地的春之龙的书"}, {"en": "A magic sword", "zh": "一把魔法剑"}, {"en": "A bag of gold", "zh": "一袋金子"}, {"en": "A map to the Naga according to some versions of the story", "zh": "一张通往那迦的地图（按书中另一种说法）"}], "answer": 0, "explain": {"en": "Petra finds a book in her family's library about the Spring Dragon, a dragon with the power to heal the ruined land.", "zh": "佩特拉在家族藏书里找到一本关于春之龙的书，那是一条有能力治愈荒芜大地的龙。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
