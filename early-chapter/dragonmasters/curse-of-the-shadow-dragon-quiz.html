<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curse of the Shadow Dragon — Quiz</title>
<style>
  :root{
    --grass:#27ae60;
    --grass-dark:#1e8449;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --dragon:#6c5ce7;
    --dragon-dark:#4834a0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--dragon);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--dragon);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .dragon{
    width:62px;height:62px;border-radius:50%;
    background:#fff;margin:0 auto 12px;position:relative;
    display:flex;align-items:center;justify-content:center;
    font-size:2rem;box-shadow:0 4px 14px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--dragon-dark);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(108,92,231,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(108,92,231,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#23 · Curse of the Shadow Dragon</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Tracey West</p>
    <div class="dragon">🐉</div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Dragon Masters: Curse of the Shadow Dragon</em> (Scholastic Branches, 2023) — by Tracey West</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Tracey West",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Tracey West",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What strange thing is creeping across the sky at the start of the book?", "zh": "故事开头，有什么奇怪的东西在天空中蔓延？"}, "options": [{"en": "Normal storm clouds", "zh": "普通的暴风雨云"}, {"en": "A flock of birds", "zh": "一群鸟"}, {"en": "Falling snow", "zh": "飘落的雪花"}, {"en": "A black shadow", "zh": "一片黑色的影子"}], "answer": 3, "explain": {"en": "A strange black shadow is creeping across the bright blue sky, and Worm says something bad is coming.", "zh": "一片奇怪的黑影正在湛蓝的天空中蔓延，沃姆说有坏事要发生了。"}}, {"q": {"en": "Who arrives from the Land of Gallia to ask King Roland for help?", "zh": "谁从伽利亚王国赶来向罗兰国王求助？"}, "options": [{"en": "Jean", "zh": "吉恩"}, {"en": "Darpan", "zh": "达尔潘"}, {"en": "Darma", "zh": "达尔马"}, {"en": "Petra", "zh": "佩特拉"}], "answer": 0, "explain": {"en": "Jean, Dragon Master of the Silver Dragon Argent, flies in and asks for help because the shadow is covering her kingdom too.", "zh": "银龙阿尔真特的驯龙师吉恩飞来求救，因为黑影也笼罩了她的王国。"}}, {"q": {"en": "Why does Griffith's gazing ball keep failing (showing yarn, a bubble, a wooden ball)?", "zh": "为什么格里菲斯的窥镜一直失灵（变出毛线、肥皂泡、木球）？"}, "options": [{"en": "The king took it away", "zh": "国王把它拿走了"}, {"en": "The Shadow Dragon is draining wizard magic all over the world", "zh": "暗影龙正在吸走全世界的巫师魔法"}, {"en": "Worm broke it", "zh": "沃姆弄坏了它"}, {"en": "He simply forgot the spell according to some versions of the story", "zh": "他只是忘了咒语（按书中另一种说法）"}], "answer": 1, "explain": {"en": "Griffith realizes his magic is not working and that the Shadow Dragon is somehow affecting all wizard magic.", "zh": "格里菲斯意识到自己的魔法失灵了，而暗影龙正在影响全世界巫师的魔法。"}}, {"q": {"en": "What are the names of the Shadow Dragon and his Dragon Master?", "zh": "暗影龙和它的驯龙师分别叫什么名字？"}, "options": [{"en": "Nova and Stella", "zh": "诺娃和斯特拉"}, {"en": "Maldred and Worm", "zh": "马尔德里德和沃姆"}, {"en": "Chaya and Aruna", "zh": "查亚和阿鲁娜"}, {"en": "Tana and Yeray", "zh": "塔娜和耶拉伊"}], "answer": 2, "explain": {"en": "In his gazing ball Griffith sees Chaya the Shadow Dragon and his eight-year-old Dragon Master, Aruna, whose eyes glow red.", "zh": "格里菲斯在窥镜里看到暗影龙查亚和它八岁的驯龙师阿鲁娜，两人的眼睛都闪着红光。"}}, {"q": {"en": "Why did Aruna feed the Balam seed to Chaya?", "zh": "阿鲁娜为什么把巴拉姆种子喂给查亚？"}, "options": [{"en": "Because Chaya was hungry", "zh": "因为查亚饿了"}, {"en": "To summon a Star Dragon", "zh": "为了召唤星龙"}, {"en": "She wanted to make him strong on purpose according to some versions of the story", "zh": "她故意想让它变强（按书中另一种说法）"}, {"en": "To stop her wizard Vanad from eating it and turning evil", "zh": "为了阻止她的巫师瓦纳德吃下种子而变坏"}], "answer": 3, "explain": {"en": "Aruna grabbed the seed first so Vanad could not eat it, believing the seed's power would not work on dragons.", "zh": "阿鲁娜抢先抓走了种子，不让瓦纳德吃下，她以为种子的力量对龙不起作用。"}}, {"q": {"en": "How often does the Balam flower produce one seed?", "zh": "巴拉姆花每隔多久才会结出一粒种子？"}, "options": [{"en": "Every month", "zh": "每个月"}, {"en": "Every 100 years according to some versions of the story", "zh": "每100年（按书中另一种说法）"}, {"en": "Every 1000 years", "zh": "每1000年"}, {"en": "Every year", "zh": "每年"}], "answer": 2, "explain": {"en": "Vanad explains that every thousand years the special flower produces exactly one seed.", "zh": "瓦纳德解释说，这种特别的花每过一千年才会结出一粒种子。"}}, {"q": {"en": "How do Drake and Jean escape from the Shadow Realm?", "zh": "德雷克和吉恩是如何逃出暗影界的？"}, "options": [{"en": "Vanad leads them out", "zh": "瓦纳德带他们出去"}, {"en": "Drake uses his silver sword to make a portal", "zh": "德雷克用银剑制造了一道传送门"}, {"en": "Worm transports them out according to some versions of the story", "zh": "沃姆把他们传送出去（按书中另一种说法）"}, {"en": "They fly out on Argent", "zh": "他们骑着阿尔真特飞出去"}], "answer": 1, "explain": {"en": "Worm cannot transport out of the magical space, so Drake uses the magic silver sword Jean gave him to create a portal.", "zh": "沃姆无法把这个魔法空间传送出去，于是德雷克用吉恩送他的魔法银剑制造了一道传送门。"}}, {"q": {"en": "What happens to Jean's hand after a shadow phantom touches it?", "zh": "暗影幽灵碰到吉恩的手后，发生了什么？"}, "options": [{"en": "It turns into a shadow", "zh": "它变成了影子"}, {"en": "It begins to glow", "zh": "它开始发光"}, {"en": "It becomes invisible", "zh": "它变得看不见了"}, {"en": "It disappears completely", "zh": "它彻底消失了"}], "answer": 0, "explain": {"en": "Griffith examines Jean's right hand and finds the phantom's touch has turned it into a shadow.", "zh": "格里菲斯检查吉恩的右手，发现被幽灵碰过的地方已经变成了影子。"}}, {"q": {"en": "Who heals Jean's shadow hand, and how?", "zh": "是谁、用什么方法治好了吉恩的影子手？"}, "options": [{"en": "The Star Stone", "zh": "星石"}, {"en": "Bo's Water Dragon Shu with healing mist", "zh": "博的水龙舒用治愈薄雾"}, {"en": "Worm with green light according to some versions of the story", "zh": "沃姆用绿光（按书中另一种说法）"}, {"en": "Griffith's wand", "zh": "格里菲斯的魔杖"}], "answer": 1, "explain": {"en": "Bo's Water Dragon Shu breathes a blue healing mist that washes away the shadow phantom's spell.", "zh": "博的水龙舒吐出蓝色的治愈薄雾，洗去了暗影幽灵的咒语。"}}, {"q": {"en": "What do Rori and Ana learn is needed to summon a Star Dragon?", "zh": "罗瑞和安娜得知，召唤星龙需要什么？"}, "options": [{"en": "A Light Dragon", "zh": "一条光龙"}, {"en": "The Balam seed", "zh": "巴拉姆种子"}, {"en": "A silver sword", "zh": "一把银剑"}, {"en": "A Shadow Dragon", "zh": "一条暗影龙"}], "answer": 0, "explain": {"en": "They read in a book that a Light Dragon is needed to summon a Star Dragon from the sky, and one can be found on the Picland Islands.", "zh": "她们从书里读到，召唤天上的星龙需要一条光龙，而皮克兰群岛上就有一条。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
