<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roar of the Thunder Dragon — Quiz</title>
<style>
  :root{
    --grass:#27ae60;
    --grass-dark:#1e8449;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --dragon:#6c5ce7;
    --dragon-dark:#4834a0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--dragon);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--dragon);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .dragon{
    width:62px;height:62px;border-radius:50%;
    background:#fff;margin:0 auto 12px;position:relative;
    display:flex;align-items:center;justify-content:center;
    font-size:2rem;box-shadow:0 4px 14px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--dragon-dark);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(108,92,231,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(108,92,231,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#08 · Roar of the Thunder Dragon</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Tracey West</p>
    <div class="dragon">🐉</div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Dragon Masters: Roar of the Thunder Dragon</em> (Scholastic Branches, 2017) — by Tracey West</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Tracey West",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Tracey West",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who is Eko, and why does she want to take the dragons?", "zh": "埃科是谁？她为什么想把龙都带走？"}, "options": [{"en": "A rogue Dragon Master who believes dragons should be free from greedy rulers", "zh": "一名叛逃的驯龙师，她认为龙应当从贪婪的统治者手中获得自由"}, {"en": "King Roland's sister", "zh": "国王罗兰的姐姐"}, {"en": "A baker who wants pet dragons", "zh": "一个想要龙当宠物的面包师"}, {"en": "The keeper of the Dragon Stone", "zh": "龙石的保管人"}], "answer": 0, "explain": {"en": "Eko was Griffith's first student who left Bracken years ago with her Thunder Dragon Neru. She believes dragons were wrongly taken from their homes and wants to free them from rulers like King Roland.", "zh": "埃科是格里菲斯最早的学生，多年前带着雷龙内鲁离开布雷肯。她认为龙是被错误地从家园夺走的，想把她们从罗兰这样的统治者手中解放出来。"}}, {"q": {"en": "What big news does King Roland announce at the start of the book?", "zh": "本书开头，国王罗兰宣布了什么大新闻？"}, "options": [{"en": "He is marrying Queen Rose of Arkwood and wants a dragon parade", "zh": "他要娶阿科伍德的玫瑰王后，并想办一场龙游行"}, {"en": "He is moving to a new castle", "zh": "他要搬去新城堡"}, {"en": "He is banning all dragons", "zh": "他要禁止所有龙"}, {"en": "He has found a lost treasure", "zh": "他找到了失落的宝藏"}], "answer": 0, "explain": {"en": "King Roland tells everyone he will marry Queen Rose of Arkwood the very next day, with a big celebration beginning with a parade of dragons.", "zh": "国王罗兰告诉大家，他明天就要娶阿科伍德的玫瑰王后，盛大庆典将以一场龙游行开场。"}}, {"q": {"en": "How does Griffith make the fancy white carriage for the parade?", "zh": "格里菲斯是怎样做出游行用的精美白色马车的？"}, "options": [{"en": "He uses a transformation spell on a white onion", "zh": "他对一颗白洋葱施了变形咒"}, {"en": "He buys it from a shop", "zh": "他从商店买的"}, {"en": "The Dragon Masters build it from wood", "zh": "驯龙师们用木头造的"}, {"en": "Worm digs it out of the ground", "zh": "虫虫从地里挖出来的"}], "answer": 0, "explain": {"en": "Griffith needs something round and white to transform. Drake fetches a big white onion from the kitchens, and Griffith's spell turns it into a carved, flower-decorated carriage.", "zh": "格里菲斯需要又圆又白的东西来变形。德雷克从厨房拿来一颗大白洋葱，格里菲斯的咒语把它变成了一辆雕花、带花朵装饰的马车。"}}, {"q": {"en": "How do the wizards finally trap Eko and her Thunder Dragon Neru?", "zh": "巫师们最终是怎样困住埃科和她的雷龙内鲁的？"}, "options": [{"en": "With a magic bubble plus a freezing spell ('Frozen in space, frozen in time')", "zh": "用魔法泡加上冰冻咒（“凝固于空间，凝固于时间”）"}, {"en": "With a net made of rope", "zh": "用绳子编的网"}, {"en": "By locking them in the kitchen", "zh": "把他们锁在厨房里"}, {"en": "By feeding them sleepytime tea", "zh": "给他们喝安眠茶"}], "answer": 0, "explain": {"en": "Griffith and Diego combine their magic into a bubble, then chant the freezing spell. Inside the bubble, Eko and Neru freeze as still as statues and float safely to the ground.", "zh": "格里菲斯和迪亚哥把魔法合进一个泡泡，再念出冰冻咒。泡泡里的埃科和内鲁像雕像一样凝固，安然落到地面。"}}, {"q": {"en": "What does Eko use to control the baby Lightning Dragon Lalo?", "zh": "埃科用什么来控制小闪电龙拉洛？"}, "options": [{"en": "A purple light whip made with Neru's powers", "zh": "用内鲁的力量制造的紫色光鞭"}, {"en": "A piece of cheese", "zh": "一块奶酪"}, {"en": "A loud whistle", "zh": "一个响亮的哨子"}, {"en": "A golden cage", "zh": "一个金笼子"}], "answer": 0, "explain": {"en": "Drake sees a dark whip of purple light connecting Lalo to Eko. She is using Neru's powers to control him so the baby dragon cannot get away.", "zh": "德雷克看到一条紫色光鞭把拉洛和埃科连在一起。她借内鲁的力量控制拉洛，让小龙无法挣脱。"}}, {"q": {"en": "Why does Rori help Eko escape with Vulcan and Neru at the end?", "zh": "结尾时罗瑞为什么帮埃科带着火神和内鲁逃走？"}, "options": [{"en": "She thinks Eko is right that dragons should be free, and she is angry the others sided with Griffith", "zh": "她觉得埃科说得对、龙该自由，也气大家站队格里菲斯"}, {"en": "She wants to become queen", "zh": "她想当王后"}, {"en": "Eko paid her with gold", "zh": "埃科用金子收买了她"}, {"en": "She is scared of the Thunder Dragon", "zh": "她害怕雷龙"}], "answer": 0, "explain": {"en": "Rori hears Eko's story, feels Griffith was unfair, and is hurt that her friends took Griffith's side. She leaves a note saying Eko called her brave and they will free dragons together.", "zh": "罗瑞听了埃科的故事，觉得格里菲斯不公平，也因朋友们站队格里菲斯而伤心。她留信说埃科夸她勇敢，他们要一起解放龙。"}}, {"q": {"en": "What does Eko reveal about Neru's past?", "zh": "埃科透露了内鲁的什么往事？"}, "options": [{"en": "Neru was taken from his dragon family by King Roland's soldiers", "zh": "内鲁是被国王罗兰的士兵从龙族家人身边夺走的"}, {"en": "Neru hatched from a golden egg", "zh": "内鲁是从金蛋里孵出来的"}, {"en": "Neru was raised by Griffith as a pet", "zh": "内鲁是格里菲斯当宠物养大的"}, {"en": "Neru used to live in the Land of Pyramids", "zh": "内鲁以前住在金字塔之国"}], "answer": 0, "explain": {"en": "Eko tells Griffith that Neru was taken from his family. She says she gave him a choice and he chose to stay with her, which is why she believes dragons should be free.", "zh": "埃科对格里菲斯说，内鲁是被从家人身边夺走的。她说自己给了他选择、而他选择留下，所以她认为龙应当自由。"}}, {"q": {"en": "How do Rori and Eko get away with Vulcan and Neru?", "zh": "罗瑞和埃科是怎样带着火神和内鲁逃走的？"}, "options": [{"en": "Rori takes Eko's Dragon Stone and has keys; Neru's powers freeze Worm so he can't stop them", "zh": "罗瑞拿走埃科的龙石并拿着钥匙，内鲁的力量冻住虫虫使他无法阻止"}, {"en": "They fly out the window on brooms", "zh": "她们骑扫帚从窗户飞走"}, {"en": "They walk out the front gate", "zh": "她们从大门走出去"}, {"en": "Griffith helps them escape", "zh": "格里菲斯帮她们逃走"}], "answer": 0, "explain": {"en": "Worm shows Drake what happened: Rori had keys and returned Eko's Dragon Stone, and Neru's powers froze Worm inside a purple force field so he could not stop their escape through a portal.", "zh": "虫虫把经过展示给德雷克：罗瑞拿着钥匙、归还了埃科的龙石，内鲁的力量把虫虫冻在紫色力场里，使他们得以从传送门逃走。"}}, {"q": {"en": "What is the name of Eko's Thunder Dragon?", "zh": "埃科的雷龙叫什么名字？"}, "options": [{"en": "Neru", "zh": "内鲁"}, {"en": "Vulcan", "zh": "火神"}, {"en": "Worm", "zh": "虫虫"}, {"en": "Lalo", "zh": "拉洛"}], "answer": 0, "explain": {"en": "Eko's dragon is a long-bodied Thunder Dragon with four legs and whiskers named Neru, who can create portals of purple swirling energy.", "zh": "埃科的龙是一条长身、四腿、长须的雷龙，名叫内鲁，能制造紫色旋涡能量的传送门。"}}, {"q": {"en": "Who appears at the very end of the book asking for help?", "zh": "本书最末出现、求助的人是谁？"}, "options": [{"en": "Mina, a Dragon Master from the Far North", "zh": "来自极北之地的驯龙师米娜"}, {"en": "Carlos, the Lightning Dragon's master", "zh": "闪电龙的主人卡洛斯"}, {"en": "King Lars of the Far North", "zh": "极北之地的拉尔斯王"}, {"en": "A talking gull named Bob", "zh": "一只叫波波的海鸥"}], "answer": 0, "explain": {"en": "After Rori and the dragons vanish, a girl with a Dragon Stone around her neck steps forward and says, 'My name is Mina, and I need your help!' — setting up the next adventure.", "zh": "罗瑞和龙消失后，一个脖子上挂着龙石的女孩走上前说：“我叫米娜，我需要你们的帮助！”——引出下一段冒险。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
