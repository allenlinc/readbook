<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waking the Rainbow Dragon — Quiz</title>
<style>
  :root{
    --grass:#27ae60;
    --grass-dark:#1e8449;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --dragon:#6c5ce7;
    --dragon-dark:#4834a0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--dragon);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--dragon);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .dragon{
    width:62px;height:62px;border-radius:50%;
    background:#fff;margin:0 auto 12px;position:relative;
    display:flex;align-items:center;justify-content:center;
    font-size:2rem;box-shadow:0 4px 14px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--dragon-dark);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(108,92,231,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(108,92,231,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#10 · Waking the Rainbow Dragon</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Tracey West</p>
    <div class="dragon">🐉</div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Dragon Masters: Waking the Rainbow Dragon</em> (Scholastic Branches, 2018) — by Tracey West</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Tracey West",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Tracey West",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who sends Drake the dream about the Rainbow Dragon at the start of the book?", "zh": "在故事开头，是谁给德雷克发了关于彩虹龙的梦？"}, "options": [{"en": "Ana the Dragon Master according to some versions of the story", "zh": "驯龙师安娜（按书中另一种说法）"}, {"en": "Worm, his Earth Dragon", "zh": "虫虫，他的地之龙"}, {"en": "Griffith the wizard", "zh": "巫师格里菲斯"}, {"en": "Obi the boy", "zh": "男孩奥比"}], "answer": 1, "explain": {"en": "Worm connects with Drake through his glowing Dragon Stone and sends the dream to ask for help.", "zh": "虫虫通过发光的龙石与德雷克沟通，用梦向他求救。"}}, {"q": {"en": "What is the name of the Rainbow Dragon?", "zh": "彩虹龙叫什么名字？"}, "options": [{"en": "Worm", "zh": "虫虫"}, {"en": "Kwaku", "zh": "夸库"}, {"en": "Dayo", "zh": "达尤"}, {"en": "Kepri", "zh": "凯普里"}], "answer": 2, "explain": {"en": "After the rescue, Obi shares the Rainbow Dragon's story. Her name is Dayo, the only one of her kind.", "zh": "获救后奥比讲述了彩虹龙的故事，她的名字叫达尤，是同类中唯一的一条。"}}, {"q": {"en": "Which dragon's power helps break Kwaku's sticky web?", "zh": "哪条龙的能力帮助破开了夸库黏糊糊的网？"}, "options": [{"en": "Shu's water", "zh": "舒的水"}, {"en": "Worm's earth power", "zh": "虫虫的地之力量"}, {"en": "Vulcan's fire", "zh": "火神龙的火焰"}, {"en": "Kepri's sunbeam", "zh": "凯普里的阳光光束"}], "answer": 3, "explain": {"en": "Ana commands Kepri the Sun Dragon to shoot a sunbeam, which makes the web shimmer and disappear.", "zh": "安娜指挥太阳龙凯普里发射阳光光束，让蜘蛛网闪烁并消失。"}}, {"q": {"en": "Why did Kwaku the giant spider trap the Rainbow Dragon?", "zh": "巨型蜘蛛夸库为什么要困住彩虹龙？"}, "options": [{"en": "He was friends with Maldred", "zh": "他和马尔德雷德是朋友"}, {"en": "He was mad because her rain flooded his den", "zh": "他生气因为她的雨水淹了他的巢穴"}, {"en": "He wanted to become a Dragon Master according to some versions of the story", "zh": "他想成为驯龙师（按书中另一种说法）"}, {"en": "He wanted her scales for his web", "zh": "他想用她的鳞片做网"}], "answer": 1, "explain": {"en": "The last time the rains came, water flooded Kwaku's den, so he trapped Dayo to stop the rain forever.", "zh": "上次下雨时，洪水淹了夸库的巢穴，所以他困住达尤以永远阻止降雨。"}}, {"q": {"en": "How did Kwaku trick Dayo into falling asleep?", "zh": "夸库是怎么骗达尤睡着了的？"}, "options": [{"en": "He told her a song that was really a sleep spell", "zh": "他给她唱了一首其实是昏睡魔咒的歌"}, {"en": "He offered her food", "zh": "他给了她食物"}, {"en": "He used dark magic from Maldred", "zh": "他用了马尔德雷德的黑魔法"}, {"en": "He spun a web around her while she slept according to some versions of the story", "zh": "她睡着时他织网裹住她（按书中另一种说法）"}], "answer": 0, "explain": {"en": "Kwaku said he knew the most beautiful song in the world; it was actually a spell that put Dayo to sleep.", "zh": "夸库说他会唱世界上最动听的歌，那其实是一道让达尤沉睡的魔咒。"}}, {"q": {"en": "Who is the Dragon Master chosen by the Dragon Stone to help the Rainbow Dragon?", "zh": "龙石选中的、帮助彩虹龙的驯龙师是谁？"}, "options": [{"en": "Obi", "zh": "奥比"}, {"en": "Griffith", "zh": "格里菲斯"}, {"en": "Bo", "zh": "波"}, {"en": "Drake", "zh": "德雷克"}], "answer": 0, "explain": {"en": "The Dragon Stone shows a boy at a dry well. That boy is Obi, the true Dragon Master of the Rainbow Dragon.", "zh": "龙石显示出一个在枯井边的男孩，那就是奥比，彩虹龙真正的驯龙师。"}}, {"q": {"en": "What special power does the Rainbow Dragon have for the Kingdom of Ifri?", "zh": "彩虹龙为伊夫里王国带来什么特殊力量？"}, "options": [{"en": "She shoots fire", "zh": "她喷火"}, {"en": "She makes the sun shine", "zh": "她让太阳发光"}, {"en": "She controls lightning", "zh": "她控制闪电"}, {"en": "She brings rain", "zh": "她带来雨水"}], "answer": 3, "explain": {"en": "Every year the Rainbow Dragon leaves her cave and brings rain to the land of Ifri.", "zh": "每年彩虹龙都会离开洞穴，为伊夫里大地带来降雨。"}}, {"q": {"en": "What happens when Obi's Dragon Stone glows very brightly?", "zh": "当奥比的龙石变得非常明亮时发生了什么？"}, "options": [{"en": "It summons Worm", "zh": "它召唤来虫虫"}, {"en": "It makes it rain instantly according to some versions of the story", "zh": "它立刻下起雨来（按书中另一种说法）"}, {"en": "The bright light scares Kwaku away", "zh": "耀眼的光芒把夸库吓跑了"}, {"en": "It opens the cave door", "zh": "它打开了洞穴的门"}], "answer": 2, "explain": {"en": "Obi's glowing Dragon Stone fills the cave with light so bright that Kwaku the spider flees deep into the cave.", "zh": "奥比发光的龙石把洞穴照得通亮，蜘蛛夸库吓得逃进了洞穴深处。"}}, {"q": {"en": "Which wild animals do Drake and Ana see in the Kingdom of Ifri?", "zh": "德雷克和安娜在伊夫里王国看到了哪些野生动物？"}, "options": [{"en": "Elephants and a warthog", "zh": "大象和一头疣猪"}, {"en": "Penguins and seals according to some versions of the story", "zh": "企鹅和海豹（按书中另一种说法）"}, {"en": "Lions and tigers", "zh": "狮子和老虎"}, {"en": "Monkeys and snakes", "zh": "猴子和蛇"}], "answer": 0, "explain": {"en": "They meet friendly elephants and later spot a warthog, which Obi scares away by pretending to be a lion.", "zh": "他们遇到了友好的大象，后来又看到一头疣猪，奥比装成狮子把它吓跑了。"}}, {"q": {"en": "At the end of the book, what is wrong with the wizard Diego?", "zh": "在书的结尾，巫师迭戈出了什么问题？"}, "options": [{"en": "He is sick with a fever", "zh": "他发烧生病了"}, {"en": "He is under Maldred's dark spell", "zh": "他中了马尔德雷德的黑魔法"}, {"en": "He lost his Dragon Stone according to some versions of the story", "zh": "他弄丢了龙石（按书中另一种说法）"}, {"en": "He forgot how to read", "zh": "他忘记怎么读书了"}], "answer": 1, "explain": {"en": "Diego's eyes are red — the color of Maldred's dark magic — and he steals Griffith's book about the Naga.", "zh": "迭戈的眼睛变成了红色——那是马尔德雷德黑魔法的颜色——他还偷走了格里菲斯关于那迦的书。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
