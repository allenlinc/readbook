<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rise of the Earth Dragon — Quiz</title>
<style>
  :root{
    --grass:#27ae60;
    --grass-dark:#1e8449;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --dragon:#6c5ce7;
    --dragon-dark:#4834a0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--dragon);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--dragon);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .dragon{
    width:62px;height:62px;border-radius:50%;
    background:#fff;margin:0 auto 12px;position:relative;
    display:flex;align-items:center;justify-content:center;
    font-size:2rem;box-shadow:0 4px 14px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--dragon-dark);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(108,92,231,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(108,92,231,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#1 · Rise of the Earth Dragon</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Tracey West</p>
    <div class="dragon">🐉</div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Dragon Masters: Rise of the Earth Dragon</em> (Scholastic Branches, 2014) — by Tracey West</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Tracey West",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Tracey West",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "How does Griffith the wizard know that Drake should become a Dragon Master?", "zh": "巫师格里菲斯是怎么知道德雷克应该成为驯龙师的？"}, "options": [{"en": "The king sent a letter about it", "zh": "国王寄了一封信说明这件事"}, {"en": "The Dragon Stone told him Drake had the heart of a dragon", "zh": "龙石告诉他德雷克拥有龙之心"}, {"en": "Drake's mother asked him to", "zh": "德雷克的母亲请求他"}, {"en": "Rori recommended Drake", "zh": "罗瑞推荐了德雷克"}], "answer": 1, "explain": {"en": "Griffith shows Drake the giant green Dragon Stone and says it told him Drake has 'the heart of a dragon,' which is what makes someone a Dragon Master.", "zh": "格里菲斯给德雷克看巨大的绿色龙石，并说龙石告诉他德雷克拥有“龙之心”，而这正是成为驯龙师的条件。"}}, {"q": {"en": "What is Drake doing when the king's soldier first finds him?", "zh": "国王的士兵第一次找到德雷克时，他正在做什么？"}, "options": [{"en": "Sleeping in his bed", "zh": "在床上睡觉"}, {"en": "Digging onions in the field", "zh": "在田里挖洋葱"}, {"en": "Riding a black horse", "zh": "骑着一匹黑马"}, {"en": "Eating supper in the castle", "zh": "在城堡里吃晚饭"}], "answer": 1, "explain": {"en": "Drake was 'busy digging in the onion patch' on his family's farm when the soldier with the yellow beard rode up on a black horse.", "zh": "当那个黄胡子士兵骑着黑马出现时，德雷克正“忙着在洋葱地里挖洋葱”，那是他家的农场。"}}, {"q": {"en": "What kind of dragon is Worm, the dragon Drake names?", "zh": "德雷克命名的龙“蠕虫”属于哪一种龙？"}, "options": [{"en": "A Fire Dragon", "zh": "火之龙"}, {"en": "A Water Dragon", "zh": "水之龙"}, {"en": "An Earth Dragon", "zh": "土之龙"}, {"en": "A Sun Dragon", "zh": "太阳之龙"}], "answer": 2, "explain": {"en": "When Drake names him Worm, Griffith says, 'That is a good name for an Earth Dragon.' Earth Dragons have great hidden power.", "zh": "当德雷克把它命名为“蠕虫”时，格里菲斯说：“这个名字很适合一条土之龙。”土之龙拥有强大的隐藏力量。"}}, {"q": {"en": "Which dragon can shoot water from its mouth during target practice?", "zh": "在靶子练习中，哪条龙能从嘴里喷出水流？"}, "options": [{"en": "Vulcan, Rori's red dragon", "zh": "罗瑞的红龙火神"}, {"en": "Kepri, Ana's white dragon", "zh": "安娜的白龙凯普里"}, {"en": "Shu, Bo's blue dragon", "zh": "波的蓝龙舒"}, {"en": "Worm, Drake's brown dragon", "zh": "德雷克的棕龙蠕虫"}], "answer": 2, "explain": {"en": "Bo simply says 'Shu' and a stream of water sprays from the blue dragon Shu's mouth to put out Vulcan's fire.", "zh": "波只是简单地说了声“舒”，蓝龙舒的嘴里便喷出一股水流，浇灭了火神喷出的火。"}}, {"q": {"en": "Why does Drake NOT know how to write?", "zh": "德雷克为什么不会写字？"}, "options": [{"en": "He is too lazy to learn", "zh": "他太懒了，不肯学"}, {"en": "He never went to school and worked in the fields", "zh": "他从未上过学，一直在田里干活"}, {"en": "He broke his writing hand", "zh": "他写字的手受伤了"}, {"en": "The wizard forbade it", "zh": "巫师禁止他写字"}], "answer": 1, "explain": {"en": "Drake tells the others, 'I worked in the fields at home... I never went to school. I know how to read. But we never had paper. Or quills. So I don't know how to write.' Bo writes the letter for him.", "zh": "德雷克说：“我在家里的田里干活……从没上过学。我会认字，可我们从来没有纸，也没有羽毛笔，所以我不会写字。”于是波替他写了信。"}}, {"q": {"en": "When Drake brushes Worm's scales and his hand gets stuck and tingles, what does he see?", "zh": "当德雷克给蠕虫刷鳞片、手被粘住并感到发麻时，他看到了什么？"}, "options": [{"en": "He falls into a deep sleep", "zh": "他沉沉地睡着了"}, {"en": "Pictures of Worm being captured by the king's soldiers in chains", "zh": "蠕虫被国王士兵用锁链抓走的画面"}, {"en": "Worm breathing a huge fireball", "zh": "蠕虫喷出巨大的火球"}, {"en": "The castle collapsing", "zh": "城堡正在倒塌"}], "answer": 1, "explain": {"en": "Drake's hand tingles and pictures pop into his head: soldiers with gold dragons on their shirts wrap Worm in chains and drag him from a cave. Worm nods to show it really happened.", "zh": "德雷克的手发麻，脑海里浮现出画面：衣服上绣着金龙的士兵用锁链把蠕虫缠住，从洞穴里拖走。蠕虫点了点头，表示这真的发生过。"}}, {"q": {"en": "In Drake's strange dream, what shakes the cave and makes the dragons panic?", "zh": "在德雷克那个奇怪的梦里，是什么震动了洞穴、让龙们惊慌失措？"}, "options": [{"en": "A loud explosion", "zh": "一声巨大的爆炸"}, {"en": "Griffith's magic sparks", "zh": "格里菲斯的魔法火花"}, {"en": "The king's feast", "zh": "国王的宴会"}, {"en": "A rainbow from Kepri", "zh": "凯普里制造的彩虹"}], "answer": 0, "explain": {"en": "Drake dreams he is in a warm, dirt-smelling cave with Worm and other brown dragons when 'Boom! A loud explosion shook the cave' and smoke filled the air.", "zh": "德雷克梦见自己在一个温暖、散发着泥土气味、蠕虫和其他棕龙所在的洞穴里，突然“轰！一声巨大的爆炸震动了洞穴”，烟雾弥漫。"}}, {"q": {"en": "How does Worm save the Dragon Masters when they are trapped in the collapsed tunnel?", "zh": "当驯龙师们被困在塌方的隧道里时，蠕虫是如何救了他们的？"}, "options": [{"en": "He breathes fire to burn the rocks", "zh": "他喷火烧掉石头"}, {"en": "He uses the power of his mind to turn the rocks to dust", "zh": "他用心念之力把石头化为尘土"}, {"en": "He flies them all out of the tunnel", "zh": "他把大家全部飞出隧道"}, {"en": "He asks King Roland for help", "zh": "他向国王罗兰求救"}], "answer": 1, "explain": {"en": "Worm's green eyes and body glow, and Drake realizes he is 'using the power of his mind.' The rocks shake, then go 'Poof!' and break into tiny pieces of dust, clearing the tunnel.", "zh": "蠕虫的绿眼和身体发出光芒，德雷克意识到他在“运用心念之力”。石头震动后“噗！”地碎成细小的尘土，隧道顿时通畅。"}}, {"q": {"en": "What warning does Drake hear inside his head from Worm before they enter the tunnel?", "zh": "在进入隧道前，德雷克在脑海里听到蠕虫发出的警告是什么？"}, "options": [{"en": "Run to the king!", "zh": "快去见国王！"}, {"en": "Do not go into the tunnel!", "zh": "不要进隧道！"}, {"en": "Wake up Griffith!", "zh": "叫醒格里菲斯！"}, {"en": "Shoot the fire!", "zh": "喷出火来！"}], "answer": 1, "explain": {"en": "As Worm stares at Drake, words appear in Drake's head: 'Do not go into the tunnel!' Drake realizes Worm is speaking to him through his thoughts.", "zh": "当蠕虫盯着德雷克时，德雷克的脑海里出现了几个字：“不要进隧道！”德雷克意识到蠕虫是用意念在对他说话。"}}, {"q": {"en": "Where do the Dragon Masters secretly go to practice flying their dragons outside?", "zh": "驯龙师们偷偷外出练习让龙飞行的地方是哪里？"}, "options": [{"en": "On the castle roof", "zh": "在城堡的屋顶上"}, {"en": "Inside the Training Room", "zh": "在训练室里"}, {"en": "In the Valley of Clouds", "zh": "在云之谷"}, {"en": "In the king's throne room", "zh": "在国王的宝座厅"}], "answer": 2, "explain": {"en": "Ana tells Drake they will be hidden in the 'Valley of Clouds' when they go outside, where Kepri, Vulcan, and Shu show Drake how they fly.", "zh": "安娜告诉德雷克，他们外出时会藏在“云之谷”，凯普里、火神和舒就在那里向德雷克展示它们如何飞行。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
