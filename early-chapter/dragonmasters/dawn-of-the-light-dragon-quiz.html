<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dawn of the Light Dragon — Quiz</title>
<style>
  :root{
    --grass:#27ae60;
    --grass-dark:#1e8449;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --dragon:#6c5ce7;
    --dragon-dark:#4834a0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--dragon);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--dragon);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .dragon{
    width:62px;height:62px;border-radius:50%;
    background:#fff;margin:0 auto 12px;position:relative;
    display:flex;align-items:center;justify-content:center;
    font-size:2rem;box-shadow:0 4px 14px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--dragon-dark);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(108,92,231,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(108,92,231,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#24 · Dawn of the Light Dragon</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Tracey West</p>
    <div class="dragon">🐉</div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Dragon Masters: Dawn of the Light Dragon</em> (Scholastic Branches, 2023) — by Tracey West</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Tracey West",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Tracey West",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who is the Dragon Master of the Light Dragon?", "zh": "光龙的驯龙师是谁？"}, "options": [{"en": "Drake", "zh": "德雷克"}, {"en": "Rune", "zh": "鲁恩"}, {"en": "Darpan", "zh": "达尔潘"}, {"en": "Carlos", "zh": "卡洛斯"}], "answer": 1, "explain": {"en": "Rune is the Dragon Master of Lysa the Light Dragon, and he helps Drake on the quest to stop the sky-shadow.", "zh": "鲁恩是光龙莱莎的驯龙师，他协助德雷克执行阻止天幕阴影的任务。"}}, {"q": {"en": "What is special about Rune?", "zh": "鲁恩有什么特别之处？"}, "options": [{"en": "He is the king of Bracken", "zh": "他是布拉克恩的国王"}, {"en": "He is Deaf and uses sign language", "zh": "他听障，使用手语交流"}, {"en": "He is a royal wizard", "zh": "他是一位宫廷巫师"}, {"en": "He can fly without a dragon", "zh": "他不用龙也能飞"}], "answer": 1, "explain": {"en": "Rune is Deaf. He communicates with sign language and through his bond with his dragon Lysa.", "zh": "鲁恩是听障人士，他用手语以及与光龙莱莎之间的羁绊来交流。"}}, {"q": {"en": "What is the name of the Light Dragon?", "zh": "光龙叫什么名字？"}, "options": [{"en": "Lalo", "zh": "拉洛"}, {"en": "Lysa", "zh": "莱莎"}, {"en": "Nova", "zh": "诺娃"}, {"en": "Zera", "zh": "泽拉"}], "answer": 1, "explain": {"en": "Lysa is the white Light Dragon whose power is needed to help summon a Star Dragon.", "zh": "莱莎是一条白色的光龙，它的力量是召唤星龙所必需的。"}}, {"q": {"en": "Where does Lysa the Light Dragon live?", "zh": "光龙莱莎住在哪里？"}, "options": [{"en": "Bracken Castle", "zh": "布拉克恩城堡"}, {"en": "A crystal castle", "zh": "一座水晶城堡"}, {"en": "Diego's cottage by the sea", "zh": "迭戈的海边小屋"}, {"en": "The Valley of Clouds", "zh": "云之谷"}], "answer": 1, "explain": {"en": "Rune and Lysa live at a shimmering crystal castle where Drake returns the Star Flute at the end of the adventure.", "zh": "鲁恩和莱莎住在一座闪闪发亮的水晶城堡，冒险结尾德雷克把星笛还到了那里。"}}, {"q": {"en": "Why do the Dragon Masters need a Light Dragon?", "zh": "驯龙师们为什么需要一条光龙？"}, "options": [{"en": "To light up the castle halls", "zh": "为了照亮城堡的大厅"}, {"en": "To summon the Star Dragon that can stop the sky-shadow", "zh": "为了召唤能驱散天幕阴影的星龙"}, {"en": "To fight the Naga", "zh": "为了对抗那迦"}, {"en": "To find the Balam seed", "zh": "为了找到巴拉姆种子"}], "answer": 1, "explain": {"en": "A Light Dragon is required to summon a Star Dragon, the only dragon powerful enough to break the Shadow Dragon's sky-shadow.", "zh": "召唤星龙需要先有光龙，而星龙是唯一能破除暗影龙天幕阴影的龙。"}}, {"q": {"en": "What big problem are the Dragon Masters trying to solve in this book?", "zh": "这本书里驯龙师们想解决的大麻烦是什么？"}, "options": [{"en": "Finding lost gold", "zh": "寻找丢失的黄金"}, {"en": "Stopping Chaya's sky-shadow from covering the world", "zh": "阻止查亚的天幕阴影笼罩全世界"}, {"en": "Building a new castle", "zh": "建造一座新城堡"}, {"en": "Training baby Fire Dragons", "zh": "训练小火龙宝宝"}], "answer": 1, "explain": {"en": "The cursed Shadow Dragon Chaya is blanketing the sky with shadow, and only a Star Dragon can stop him.", "zh": "被诅咒的暗影龙查亚正用阴影遮蔽天空，只有星龙才能阻止它。"}}, {"q": {"en": "Who travels with Drake to find the Light Dragon?", "zh": "谁和德雷克一起去找光龙？"}, "options": [{"en": "Darma", "zh": "达尔马"}, {"en": "Jean", "zh": "吉恩"}, {"en": "Petra", "zh": "佩特拉"}, {"en": "Rori", "zh": "罗瑞"}], "answer": 0, "explain": {"en": "Griffith sends Drake and Darma (Dragon Master of the Gold Dragon Hema) to find the Light Dragon at dawn.", "zh": "格里菲斯派德雷克和达尔马（金龙赫玛的驯龙师）在黎明时出发去寻找光龙。"}}, {"q": {"en": "What magical object is connected to summoning the Star Dragon?", "zh": "与召唤星龙相关的魔法物品是什么？"}, "options": [{"en": "The Star Flute", "zh": "星笛"}, {"en": "A silver sword", "zh": "一把银剑"}, {"en": "A gazing ball", "zh": "窥镜"}, {"en": "A Dragon Stone", "zh": "龙石"}], "answer": 0, "explain": {"en": "Rune and Lysa help Drake and Darma find the Star Flute, which is played to summon the Star Dragon.", "zh": "鲁恩和莱莎帮德雷克与达尔马找到了星笛，吹奏它便能召唤星龙。"}}, {"q": {"en": "What color is Lysa the Light Dragon?", "zh": "光龙莱莎是什么颜色的？"}, "options": [{"en": "Green", "zh": "绿色"}, {"en": "White", "zh": "白色"}, {"en": "Purple", "zh": "紫色"}, {"en": "Red", "zh": "红色"}], "answer": 1, "explain": {"en": "Lysa is described as a white Light Dragon who waits at the crystal castle with Rune.", "zh": "莱莎被描述成一条白色的光龙，和鲁恩一起守在水晶城堡。"}}, {"q": {"en": "How do Rune and Drake 'talk' when Drake does not yet know sign language?", "zh": "当德雷克还不懂手语时，他和鲁恩是怎么“对话”的？"}, "options": [{"en": "With a magic mirror", "zh": "用魔法镜子"}, {"en": "Through their dragons", "zh": "通过他们的龙"}, {"en": "By writing notes", "zh": "靠写纸条"}, {"en": "Griffith translates for them", "zh": "格里菲斯为他们翻译"}], "answer": 1, "explain": {"en": "Because Rune is Deaf and Drake does not know enough sign language, the boys use their dragons to communicate.", "zh": "因为鲁恩听障而德雷克还不懂手语，两个男孩就借助各自的龙来沟通。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
