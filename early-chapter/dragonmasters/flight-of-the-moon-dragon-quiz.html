<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight of the Moon Dragon — Quiz</title>
<style>
  :root{
    --grass:#27ae60;
    --grass-dark:#1e8449;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --dragon:#6c5ce7;
    --dragon-dark:#4834a0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--dragon);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--dragon);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .dragon{
    width:62px;height:62px;border-radius:50%;
    background:#fff;margin:0 auto 12px;position:relative;
    display:flex;align-items:center;justify-content:center;
    font-size:2rem;box-shadow:0 4px 14px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--dragon-dark);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(108,92,231,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(108,92,231,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#06 · Flight of the Moon Dragon</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Tracey West</p>
    <div class="dragon">🐉</div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Dragon Masters: Flight of the Moon Dragon</em> (Scholastic Branches, 2016) — by Tracey West</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Tracey West",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Tracey West",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What is the prime Dragon Stone, and why does it matter to the Dragon Masters?", "zh": "“远古巨龙石”是什么？它对驯龙师们为什么重要？"}, "options": [{"en": "A toy that Heru brought from the Land of Pyramids according to some versions of the story", "zh": "赫鲁从金字塔之国带来的一件玩具（按书中另一种说法）"}, {"en": "The source of every Dragon Master's smaller stone; it links them to their dragons", "zh": "每位驯龙师小块龙石的来源，它把驯龙师和龙连接起来"}, {"en": "A map that shows where the pyramids are hidden", "zh": "一张标出金字塔隐藏位置的地图"}, {"en": "A scroll written by King Roland", "zh": "国王罗兰写的一卷羊皮纸"}], "answer": 1, "explain": {"en": "All the Dragon Masters wear small pieces of the Dragon Stone, and every one of those pieces comes from the prime (original) stone. When the prime stone weakens, their connection to their dragons fades.", "zh": "每位驯龙师都戴着一小块龙石，而这些小块全部来自“远古巨龙石”。当远古龙石变弱时，他们与龙的连结也会变弱。"}}, {"q": {"en": "Why is Wati the ONLY dragon who can search for the pyramid at night?", "zh": "为什么只有瓦蒂能在夜里寻找金字塔？"}, "options": [{"en": "He is a dark Moon Dragon who can fly unseen in the night sky", "zh": "他是一条深色月光龙，能在夜空中不被发现地飞行"}, {"en": "He is the only dragon who can read maps according to some versions of the story", "zh": "他是唯一会看地图的龙（按书中另一种说法）"}, {"en": "He is the fastest dragon in the castle", "zh": "他是城堡里飞得最快的龙"}, {"en": "He can breathe underwater", "zh": "他能在水下呼吸"}], "answer": 0, "explain": {"en": "Wati is a black Moon Dragon. Tarek explains that a dark dragon like Wati can fly at night without being seen, so he is the only one who can look for the secret pyramid from the sky.", "zh": "瓦蒂是一条黑色的月光龙。塔里克说，像瓦蒂这样深色的龙能在夜里飞行而不被看见，所以只有他能从空中寻找那座秘密金字塔。"}}, {"q": {"en": "What clue on the pyramid told Drake and Heru they had found the right one?", "zh": "金字塔上的什么线索让德雷克和赫鲁确认找对了？"}, "options": [{"en": "Three gold caps that glittered in the moonlight according to some versions of the story", "zh": "在月光下闪光的三个金色塔尖（按书中另一种说法）"}, {"en": "Heru's name written above the entrance", "zh": "入口上方写着赫鲁的名字"}, {"en": "A big red door with a lock", "zh": "一扇带锁的红色大门"}, {"en": "Squiggly lines carved in the stone that formed the dragon symbol from the scroll", "zh": "石头上刻着的波浪线，拼成了羊皮卷上的龙形符号"}], "answer": 3, "explain": {"en": "When they circled the pyramid, the carved squiggly lines lined up to form the same dragon symbol shown on the ancient scroll, proving it was the Pyramid of the Seven Dragons.", "zh": "当他们绕着金字塔飞行时，那些刻上去的波浪线拼成了古卷上相同的龙形符号，证明这就是“七龙金字塔”。"}}, {"q": {"en": "How did the Dragon Masters open the first door of the pyramid?", "zh": "驯龙师们是怎样打开金字塔第一道门的？"}, "options": [{"en": "They each touched the symbol that matched their own dragon's power", "zh": "他们各自触摸与自己龙的力量相符的符号"}, {"en": "Griffith unlocked it with a magic key according to some versions of the story", "zh": "格里菲斯用魔法钥匙打开它（按书中另一种说法）"}, {"en": "Wati melted it with moonlight", "zh": "瓦蒂用月光把它融化"}, {"en": "They kicked it until it broke", "zh": "他们一直踢直到把门踢破"}], "answer": 0, "explain": {"en": "The door had six carved symbols (moon, fire, sun, water, rock, skull). Each Dragon Master pressed the symbol for their dragon's power — Bo touched water, Ana the sun, Heru the moon, Drake the rock, Rori the flame, Petra the skull — and the door slid up.", "zh": "门上刻着六个符号（月、火、日、水、岩、骷髅）。每位驯龙师按下对应自己龙之力量的符号——博按水、安娜按日、赫鲁按月、德雷克按岩、罗瑞按火、佩特拉按骷髅——门就升起来了。"}}, {"q": {"en": "In the first puzzle room, which dragon opened the door, and how?", "zh": "在第一个谜题房间里，是哪条龙、用什么方法打开门的？"}, "options": [{"en": "Shu, by shooting water into a pipe in the wall", "zh": "舒，通过向墙上的管子喷水"}, {"en": "Worm, by pushing the door with his body according to some versions of the story", "zh": "虫虫，用身体顶门（按书中另一种说法）"}, {"en": "Vulcan, by breathing fire on the door", "zh": "火神，向门喷火"}, {"en": "Kepri, by shining sunlight on it", "zh": "凯普里，用阳光照它"}], "answer": 0, "explain": {"en": "Bo noticed a stone pipe in the wall. He asked Shu, his Water Dragon, to shoot a stream of water into the pipe, and the smooth part of the wall rose to reveal the doorway. Bo and Shu then stayed behind.", "zh": "博注意到墙上有根石管。他让水龙舒往管子里喷水，墙上的平滑部分便升起露出门洞。随后博和舒留了下来。"}}, {"q": {"en": "In the vines room, what made the plants grow and push the heavy rock aside?", "zh": "在藤蔓房间里，是什么让植物长大并把大石头推开的？"}, "options": [{"en": "A strong wind blew the rock over", "zh": "一阵强风把石头吹倒了"}, {"en": "Worm lifted the rock with his mind", "zh": "虫虫用意念举起石头"}, {"en": "Kepri's sunlight plus the water dripping from the ceiling", "zh": "凯普里的阳光加上从天花板滴下的水"}, {"en": "Vulcan's fire burned the vines away according to some versions of the story", "zh": "火神的火把藤蔓烧掉了（按书中另一种说法）"}], "answer": 2, "explain": {"en": "Ana realized plants need water and sunlight. A pipe dripped water into the pot, and Kepri shone her sunlight on the dirt, making a vine grow and push the rock open. Ana and Kepri stayed behind.", "zh": "安娜想到植物需要水和阳光。管子往花盆里滴水，凯普里用阳光照着泥土，藤蔓便长出来把石头推开。随后安娜和凯普里留了下来。"}}, {"q": {"en": "How did the Dragon Masters get past the fast-growing vines in the third room?", "zh": "驯龙师们是怎样穿过第三间房里疯长的藤蔓的？"}, "options": [{"en": "They flew over them on Wati", "zh": "他们骑着瓦蒂飞了过去"}, {"en": "They cut them with swords", "zh": "他们用剑把藤蔓砍断"}, {"en": "Zera's poison sprayed the vines and made them wither", "zh": "泽拉的毒液喷向藤蔓，使它们枯萎"}, {"en": "The vines fell asleep at night according to some versions of the story", "zh": "藤蔓在夜里睡着了（按书中另一种说法）"}], "answer": 2, "explain": {"en": "Petra remembered that Zera's poison can melt rocks, so she had her four-headed Poison Dragon spray the vines. The vines withered and fell, freeing the door. Petra and Zera stayed behind.", "zh": "佩特拉记得泽拉的毒液能融化石头，于是让这只四头毒龙喷出毒液。藤蔓枯萎掉落，门露了出来。随后佩特拉和泽拉留了下来。"}}, {"q": {"en": "In the 'Fire' room, what did Vulcan have to do to open the door?", "zh": "在“火”房间里，火神必须做什么才能打开门？"}, "options": [{"en": "Melt a block of ice", "zh": "融化一块冰"}, {"en": "Cook the Dragon Masters' dinner according to some versions of the story", "zh": "做驯龙师们的晚饭（按书中另一种说法）"}, {"en": "Light a torch on the wall", "zh": "点亮墙上的火把"}, {"en": "Burn through the rope that connected the cube to the metal loop", "zh": "烧断把立方石和金属环连在一起的绳子"}], "answer": 3, "explain": {"en": "A rope linked a hanging stone cube to a metal loop. When Vulcan burned through that one rope, the cube dropped and the stone door lifted. (He first burned the wrong ropes, but Wati smothered the flames.)", "zh": "一条绳子把悬着的立方石和金属环连在一起。火神烧断那一根绳子后，立方石落下，石门便升了起来。（他先烧错了绳子，但瓦蒂扑灭了火焰。）"}}, {"q": {"en": "What hatched from the golden egg in the room with the prime Dragon Stone?", "zh": "在远古龙石所在的房间里，那只金色蛋孵出了什么？"}, "options": [{"en": "A giant spider", "zh": "一只巨大的蜘蛛"}, {"en": "A baby Lightning Dragon", "zh": "一条小小的闪电龙"}, {"en": "A baby Ice Dragon", "zh": "一条小小的冰龙"}, {"en": "A baby Moon Dragon according to some versions of the story", "zh": "一条小小的月光龙（按书中另一种说法）"}], "answer": 1, "explain": {"en": "The golden egg had been taking energy from the prime Dragon Stone. It cracked open and hatched into a baby Lightning Dragon, which flew wildly out of the pyramid wall.", "zh": "那只金蛋一直在吸取远古龙石的能量。它裂开，孵出一条小小的闪电龙，随后从金字塔墙壁里乱飞了出去。"}}, {"q": {"en": "Why is the pyramid called the Pyramid of the SEVEN Dragons?", "zh": "金字塔为什么叫“七龙金字塔”？"}, "options": [{"en": "Because seven kings built it long ago", "zh": "因为很久以前有七位国王建造了它"}, {"en": "Because the Lightning Dragon is the seventh dragon (six masters' dragons plus him)", "zh": "因为闪电龙就是第七条龙（六位驯龙师的龙加上他）"}, {"en": "Because there are seven stars carved on top according to some versions of the story in an early draft of the book", "zh": "因为顶部刻着七颗星星（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Because it has seven floors", "zh": "因为它有七层"}], "answer": 1, "explain": {"en": "The six Dragon Masters each brought one dragon, and the baby Lightning Dragon that hatched is the seventh — so the pyramid honors all seven dragons.", "zh": "六位驯龙师各带了一条龙，而孵化出来的小闪电龙是第七条——所以这座金字塔纪念全部七条龙。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
