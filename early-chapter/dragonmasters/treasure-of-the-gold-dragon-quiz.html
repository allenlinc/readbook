<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treasure of the Gold Dragon — Quiz</title>
<style>
  :root{
    --grass:#27ae60;
    --grass-dark:#1e8449;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --dragon:#6c5ce7;
    --dragon-dark:#4834a0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--dragon);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--dragon);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .dragon{
    width:62px;height:62px;border-radius:50%;
    background:#fff;margin:0 auto 12px;position:relative;
    display:flex;align-items:center;justify-content:center;
    font-size:2rem;box-shadow:0 4px 14px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--dragon-dark);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(108,92,231,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(108,92,231,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#12 · Treasure of the Gold Dragon</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Tracey West</p>
    <div class="dragon">🐉</div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Dragon Masters: Treasure of the Gold Dragon</em> (Scholastic Branches, 2019) — by Tracey West</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Tracey West",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Tracey West",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who already has the Silver Key when this book begins?", "zh": "本书开始时，谁已经拿到了银钥匙？"}, "options": [{"en": "Darma", "zh": "达尔马"}, {"en": "Maldred", "zh": "马尔德雷德"}, {"en": "Jean", "zh": "珍"}, {"en": "Griffith", "zh": "格里菲斯"}], "answer": 1, "explain": {"en": "At the end of the last book, Maldred's red orb carried the Silver Key away, so he now has it.", "zh": "上一册结尾，马尔德雷德的红色法球把银钥匙带走了，所以现在银钥匙在他手里。"}}, {"q": {"en": "Which dragon does Rori bring on the mission to Suvarna?", "zh": "罗莉执行苏瓦纳岛任务时带了哪条龙？"}, "options": [{"en": "Worm", "zh": "虫虫"}, {"en": "Vulcan, her Fire Dragon", "zh": "火神龙，她的火龙"}, {"en": "Shu", "zh": "舒"}, {"en": "Lalo", "zh": "拉洛"}], "answer": 1, "explain": {"en": "Rori puts one hand on Vulcan, her red Fire Dragon, before Worm transports them to the island.", "zh": "在虫虫把他们传送去岛上之前，罗莉把手放在她红色的火龙火神龙身上。"}}, {"q": {"en": "Who steals the Gold Key at the start of the story?", "zh": "故事开头，是谁偷走了金钥匙？"}, "options": [{"en": "Darma", "zh": "达尔马"}, {"en": "Eko, riding the Thunder Dragon Neru", "zh": "艾柯，骑着雷电龙内鲁"}, {"en": "Maldred", "zh": "马尔德雷德"}, {"en": "Ana", "zh": "安娜"}], "answer": 1, "explain": {"en": "Eko and her Thunder Dragon Neru chase the Gold Dragon, grab the key, and escape through a portal.", "zh": "艾柯和她的雷电龙内鲁追赶黄金龙，抢走钥匙后从传送门逃走了。"}}, {"q": {"en": "Is Eko under Maldred's spell like Diego was?", "zh": "艾柯是否像迭戈那样中了马尔德雷德的魔咒？"}, "options": [{"en": "Yes, her eyes were red", "zh": "是的，她的眼睛是红色的"}, {"en": "No — her eyes were not red; she helps him by choice", "zh": "不是——她眼睛没变红，是自愿帮助他"}, {"en": "Yes, she was frozen", "zh": "是的，她被冻住了"}, {"en": "No one knows", "zh": "没人知道"}], "answer": 1, "explain": {"en": "Darma checks and says Eko's eyes were not glazed red, so she helps Maldred because she wants to, not by a spell.", "zh": "达尔马查看后说艾柯的眼睛没有泛红，所以她是出于自愿帮助马尔德雷德，而非被魔咒控制。"}}, {"q": {"en": "What gift does Darma give to Drake?", "zh": "达尔马送给了德雷克什么礼物？"}, "options": [{"en": "A red jewel", "zh": "一枚红色宝石"}, {"en": "A gold chain-mail vest", "zh": "一件金色锁子甲背心"}, {"en": "A silver sword", "zh": "一把银剑"}, {"en": "A magic mirror", "zh": "一面魔法镜"}], "answer": 1, "explain": {"en": "Darma gives Drake a light gold chain-mail vest, which later protects him from Maldred's red orbs.", "zh": "达尔马送给德雷克一件很轻的金色锁子甲背心，后来它挡住了马尔德雷德的红色法球。"}}, {"q": {"en": "What special power does Hema the Gold Dragon have?", "zh": "黄金龙赫玛有什么特殊能力？"}, "options": [{"en": "She breathes ice", "zh": "她吐冰"}, {"en": "She can transform into other animals", "zh": "她能变成其他动物"}, {"en": "She controls the weather", "zh": "她控制天气"}, {"en": "She can read minds", "zh": "她能读心"}], "answer": 1, "explain": {"en": "Hema can change shape into anything from a tiny bee to a large elephant, which is how she helps as a mouse and an eagle.", "zh": "赫玛能变成从蜜蜂到大象的任何动物，因此她曾化身老鼠和老鹰来帮忙。"}}, {"q": {"en": "How do Drake and Rori get into Maldred's hidden tower?", "zh": "德雷克和罗莉是怎么进入马尔德雷德秘密高塔的？"}, "options": [{"en": "They fly on their dragons", "zh": "他们骑着自己的龙飞进去"}, {"en": "They travel through Neru's leftover portal", "zh": "他们穿过内鲁残留的传送门"}, {"en": "They dig a tunnel", "zh": "他们挖了一条地道"}, {"en": "Maldred invites them", "zh": "马尔德雷德邀请他们"}], "answer": 1, "explain": {"en": "Darma finds the faint energy of Neru's portal in the wall and leads them through it into the tower.", "zh": "达尔马在墙上找到了内鲁传送门残留的能量，带着他们穿过去进入了高塔。"}}, {"q": {"en": "What protects Rori from Maldred's control spell?", "zh": "是什么保护了罗莉，使她没被马尔德雷德的控制魔咒影响？"}, "options": [{"en": "The red jewel Darma gave her", "zh": "达尔马送给她的红色宝石"}, {"en": "Her Fire Dragon", "zh": "她的火龙"}, {"en": "A sword", "zh": "一把剑"}, {"en": "The Gold Key", "zh": "金钥匙"}], "answer": 0, "explain": {"en": "The red jewel around Rori's neck glows during the spell and shields her from Maldred's mind control.", "zh": "罗莉脖子上的红宝石在魔咒发作时发光，替她挡住了马尔德雷德的精神控制。"}}, {"q": {"en": "How does Drake open a portal to escape Maldred's hideout?", "zh": "德雷克是怎么打开传送门逃出马尔德雷德巢穴的？"}, "options": [{"en": "He uses a magic word", "zh": "他说了一个魔法词"}, {"en": "He makes circles in the air with the silver sword", "zh": "他用银剑在空中画圈"}, {"en": "He calls Worm aloud", "zh": "他大声召唤虫虫"}, {"en": "He breaks a window", "zh": "他砸破一扇窗户"}], "answer": 1, "explain": {"en": "Darma tells Drake to swing the silver sword in circles, and a portal opens, leading them to the Silver Lair.", "zh": "达尔马让德雷克用银剑在空中不停画圈，于是一个传送门打开，把他们送到了银龙巢穴。"}}, {"q": {"en": "Where do Jean and Argent meet the others after tracking the sword?", "zh": "珍和阿真特追踪银剑后，是在哪里与其他人汇合的？"}, "options": [{"en": "In the Gold Lair", "zh": "在黄金龙巢穴里"}, {"en": "In Bracken castle", "zh": "在布拉肯城堡里"}, {"en": "On the Island of Suvarna beach", "zh": "在苏瓦纳岛的海滩上"}, {"en": "Inside Maldred's tower", "zh": "在马尔德雷德的高塔里"}], "answer": 0, "explain": {"en": "Argent tracks the silver sword's magic and finds the others in the Gold Lair, where Worm and Vulcan were waiting.", "zh": "阿真特循着银剑的魔法找到了其他人，当时虫虫和火神龙正在黄金龙巢穴中等候。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
