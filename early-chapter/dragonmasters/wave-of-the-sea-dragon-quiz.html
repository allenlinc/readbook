<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wave of the Sea Dragon — Quiz</title>
<style>
  :root{
    --grass:#27ae60;
    --grass-dark:#1e8449;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --dragon:#6c5ce7;
    --dragon-dark:#4834a0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--dragon);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--dragon);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .dragon{
    width:62px;height:62px;border-radius:50%;
    background:#fff;margin:0 auto 12px;position:relative;
    display:flex;align-items:center;justify-content:center;
    font-size:2rem;box-shadow:0 4px 14px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--dragon-dark);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(108,92,231,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(108,92,231,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#19 · Wave of the Sea Dragon</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Tracey West</p>
    <div class="dragon">🐉</div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Dragon Masters: Wave of the Sea Dragon</em> (Scholastic Branches, 2018) — by Tracey West</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Tracey West",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Tracey West",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Why did Drake sneak into the Fortress of the Stone Dragon?", "zh": "德雷克为什么要偷偷溜进石龙堡垒？"}, "options": [{"en": "To find treasure", "zh": "去寻找宝藏"}, {"en": "To steal Astrid's spell ingredients and stop her spell", "zh": "去偷走阿斯特丽德的咒语材料，阻止她的咒语"}, {"en": "To rescue the king", "zh": "去营救国王"}, {"en": "To meet the Stone Dragon according to some versions of the story", "zh": "去见石龙（按书中另一种说法）"}], "answer": 1, "explain": {"en": "Drake wanted to stop Astrid from casting the False Life spell, so he tried to steal the spell ingredients. He got away with the branch from the shadow bush.", "zh": "德雷克想阻止阿斯特丽德施放假生命咒语，于是去偷咒语材料，最终只抢到了影灌木的枝条。"}}, {"q": {"en": "What happens if you prick yourself with a shadow bush thorn?", "zh": "如果你被影灌木的刺扎到，会发生什么？"}, "options": [{"en": "You fall asleep", "zh": "你会睡着"}, {"en": "You become a shadow", "zh": "你会变成影子"}, {"en": "You turn to stone according to some versions of the story", "zh": "你会变成石头（按书中另一种说法）"}, {"en": "You can fly", "zh": "你会飞"}], "answer": 1, "explain": {"en": "Jayana warned that pricking yourself with a shadow bush thorn turns you into a shadow, and you stay that way unless you prick yourself a second time within the hour.", "zh": "佳雅娜警告说，被影灌木的刺扎到会变成影子，除非在一小时内再扎一次，否则会永远是影子。"}}, {"q": {"en": "Why can't Astrid simply get a new shadow bush branch?", "zh": "为什么阿斯特丽德不能简单地再取一根影灌木枝条？"}, "options": [{"en": "They grow only in Bracken according to some versions of the story", "zh": "它们只长在布雷肯（按书中另一种说法）"}, {"en": "Only Drake can pick them", "zh": "只有德雷克能采摘"}, {"en": "The branch must be taken on the night of a full moon", "zh": "枝条必须在满月之夜才能取到"}, {"en": "They are extinct", "zh": "它们已经灭绝了"}], "answer": 2, "explain": {"en": "Jayana said the branch must be taken on the night of a full moon, which was more than two weeks away, buying the Dragon Masters time.", "zh": "佳雅娜说枝条必须在满月之夜才能取到，而那时还有两个多星期，为驯龙师们争取了时间。"}}, {"q": {"en": "On which island do the Dragon Masters find the Sea Dragon Tani?", "zh": "驯龙师们是在哪个岛上找到海龙塔尼的？"}, "options": [{"en": "Manu", "zh": "马努岛"}, {"en": "Belerion", "zh": "贝勒里昂"}, {"en": "Kapua", "zh": "卡普阿岛"}, {"en": "Gallia", "zh": "加利亚"}], "answer": 2, "explain": {"en": "Bo had found a Sea Dragon on the island of Kapua, so Griffith sent Drake, Bo, and Opeli there to bring back the branch where Astrid wouldn't look.", "zh": "博在卡普阿岛找到了海龙，于是格里菲斯派德雷克、博和奥佩利去那里，顺便把枝条带离阿斯特丽德能找的地方。"}}, {"q": {"en": "What is Manawa's title for his connection with Tani?", "zh": "马纳瓦与塔尼之间的连接被称为什么身份？"}, "options": [{"en": "Dragon Stone", "zh": "龙石"}, {"en": "Dragon Master", "zh": "驯龙师"}, {"en": "Dragon Keeper", "zh": "龙饲养员"}, {"en": "Dragon Friend", "zh": "龙之友"}], "answer": 3, "explain": {"en": "On Kapua, Manawa is chosen to connect with Tani but is called a 'Dragon Friend' rather than a Dragon Master.", "zh": "在卡普阿岛，马纳瓦被选中与塔尼连接，但他被称为“龙之友”而非驯龙师。"}}, {"q": {"en": "Why do Ka the Lava Dragon and Tani the Sea Dragon start to fight?", "zh": "为什么熔岩龙卡和海龙塔尼一开始打了起来？"}, "options": [{"en": "They were hungry", "zh": "它们饿了"}, {"en": "They wanted the same food according to some versions of the story in an early draft of the book", "zh": "它们抢同一种食物（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Astrid told them to", "zh": "阿斯特丽德命令它们打"}, {"en": "Long ago Lava and Sea Dragons fought and Sea Dragons never forgave them", "zh": "很久以前熔岩龙和海龙打过仗，海龙一直没原谅它们"}], "answer": 3, "explain": {"en": "Ka remembers stories of a big ancient fight between Lava and Sea Dragons on Noa; the Sea Dragons left and never forgave the Lava Dragons, so they clash.", "zh": "卡记得诺阿岛上熔岩龙与海龙远古大战的故事，海龙离开后始终没有原谅熔岩龙，所以双方起了冲突。"}}, {"q": {"en": "How does Drake hide from Astrid on the beach?", "zh": "德雷克在海滩上是如何躲开阿斯特丽德的？"}, "options": [{"en": "He pricked his finger on a thorn and became a shadow", "zh": "他用刺扎破手指变成了影子"}, {"en": "He climbed a tree", "zh": "他爬上了树"}, {"en": "He used a magic mirror according to some versions of the story", "zh": "他用了魔法镜（按书中另一种说法）"}, {"en": "He swam underwater", "zh": "他游到了水下"}], "answer": 0, "explain": {"en": "Drake pressed his finger on a thorn from the branch, turning himself into a shadow so Astrid could not see him.", "zh": "德雷克用枝条上的刺扎破手指，把自己变成了影子，这样阿斯特丽德就看不见他了。"}}, {"q": {"en": "How does Astrid finally leave the island?", "zh": "阿斯特丽德最终是怎样离开小岛的？"}, "options": [{"en": "She walked into the sea", "zh": "她走进海里"}, {"en": "Manawa pushed her into her own portal", "zh": "马纳瓦把她推进了她自己的传送门"}, {"en": "Drake sent her away", "zh": "德雷克把她送走了"}, {"en": "She flew away on a dragon according to some versions of the story", "zh": "她骑龙飞走了（按书中另一种说法）"}], "answer": 1, "explain": {"en": "After Astrid zapped the Dragon Masters' stones black, Manawa sprang forward and pushed her backward into the swirling portal, which then closed.", "zh": "阿斯特丽德把驯龙师们的石头击黑后，马纳瓦冲上前把她推回了旋转的传送门，传送门随即关闭。"}}, {"q": {"en": "How do the Dragon Masters repair their blackened Dragon Stones?", "zh": "驯龙师们是如何修复变黑了的龙石的？"}, "options": [{"en": "With Shu the Water Dragon's blue healing mist", "zh": "用水龙舒的蓝色治愈之雾"}, {"en": "With Ka's lava", "zh": "用卡的熔岩"}, {"en": "By washing them in the ocean", "zh": "在海里冲洗"}, {"en": "With a new Tenebrex Stone according to some versions of the story", "zh": "用新的特内布雷克斯石（按书中另一种说法）"}], "answer": 0, "explain": {"en": "Bo realized Shu's blue mist can heal dark magic; Shu's pale blue cloud rained on the black stones and returned them to green.", "zh": "博想到水龙舒的蓝雾能治愈黑魔法，舒的淡蓝雾落在黑石上，使它们恢复了绿色。"}}, {"q": {"en": "At the end of the book, what new dragon do the Dragon Masters still need?", "zh": "在书的结尾，驯龙师们还需要哪一种新龙？"}, "options": [{"en": "A Wind Dragon", "zh": "风龙"}, {"en": "A Rainbow Dragon", "zh": "彩虹龙"}, {"en": "A Moon Dragon", "zh": "月龙"}, {"en": "An Earth Dragon", "zh": "土龙"}], "answer": 0, "explain": {"en": "Griffith tells Drake that Rori and Ana learned where to find a Wind Dragon — the third dragon needed for the counterspell.", "zh": "格里菲斯告诉德雷克，罗瑞和安娜找到了风龙的线索——这是逆转咒语所需的第三只龙。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
