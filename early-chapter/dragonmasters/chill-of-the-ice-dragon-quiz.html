<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chill of the Ice Dragon — Quiz</title>
<style>
  :root{
    --grass:#27ae60;
    --grass-dark:#1e8449;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --dragon:#6c5ce7;
    --dragon-dark:#4834a0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--dragon);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--dragon);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .dragon{
    width:62px;height:62px;border-radius:50%;
    background:#fff;margin:0 auto 12px;position:relative;
    display:flex;align-items:center;justify-content:center;
    font-size:2rem;box-shadow:0 4px 14px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--dragon-dark);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(108,92,231,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(108,92,231,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#09 · Chill of the Ice Dragon</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Tracey West</p>
    <div class="dragon">🐉</div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Dragon Masters: Chill of the Ice Dragon</em> (Scholastic Branches, 2018) — by Tracey West</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Tracey West",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Tracey West",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who is Mina, and why does she travel all the way to Bracken?", "zh": "米娜是谁？她为什么大老远跑到布雷肯？"}, "options": [{"en": "A cook looking for the best onions", "zh": "来找最好洋葱的厨师"}, {"en": "A Dragon Master from the Far North whose kingdom was frozen; she needs a Fire Dragon to defeat the Ice Giant", "zh": "来自极北之地的驯龙师，她的王国被冰封，需要火龙来击败冰巨人"}, {"en": "A princess who wants to marry King Roland according to some versions of the story in an early draft of the book", "zh": "想嫁给罗兰王的公主（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Griffith's old teacher", "zh": "格里菲斯从前的老师"}], "answer": 1, "explain": {"en": "Mina trains under wizard Hulda in the Far North. The Ice Giant Vasty froze her fortress and everyone inside, and legend says only a Fire Dragon can defeat an Ice Giant — so she needs Rori and Vulcan.", "zh": "米娜在极北之地师从巫师赫尔达。冰巨人瓦斯蒂把她的堡垒和里面所有人都冻住了，传说只有火龙能打败冰巨人——所以她需要罗瑞和火神。"}}, {"q": {"en": "What is Vasty's backstory?", "zh": "瓦斯蒂有着怎样的过去？"}, "options": [{"en": "An Ice Giant who was trapped in a tomb of ice long ago and now wants revenge", "zh": "一名冰巨人，很久以前被封进冰墓，如今想要复仇"}, {"en": "King Roland's lost brother", "zh": "罗兰王走失的兄弟"}, {"en": "A wizard who turned into ice by accident according to some versions of the story", "zh": "一个不小心变成冰的巫师（按书中另一种说法）"}, {"en": "A dragon from the Land of Pyramids", "zh": "来自金字塔之国的龙"}], "answer": 0, "explain": {"en": "Long ago Vasty attacked the kingdom and a king's wizard trapped him in a tomb of ice. Now he has woken up, angry, and wants to take back the land he believes is his.", "zh": "很久以前瓦斯蒂进攻王国，被一位国王的巫师封进冰墓。如今他苏醒、满腔怒火，想夺回他认为属于自己的土地。"}}, {"q": {"en": "What new power does Worm show when they reach the island?", "zh": "到达岛上时，虫虫展示了什么新能力？"}, "options": [{"en": "He can breathe fire", "zh": "他能喷火"}, {"en": "He can turn invisible", "zh": "他能隐身"}, {"en": "He can swim like a fish according to some versions of the story", "zh": "他能像鱼一样游泳（按书中另一种说法）"}, {"en": "He shoots green energy beams from his eyes", "zh": "他从眼睛射出绿色能量光束"}], "answer": 3, "explain": {"en": "On the island, green beams of light shoot from Worm's eyes and zap Neru, knocking the Thunder Dragon backward. Drake has never seen Worm do this before.", "zh": "在岛上，绿色光束从虫虫眼中射出，击中内鲁，把雷龙击退。德雷克从没见过虫虫这样做。"}}, {"q": {"en": "How do the Dragon Masters safely free the frozen people in the fortress?", "zh": "驯龙师们是怎样安全解救堡垒里被冻住的人的？"}, "options": [{"en": "Worm digs them out", "zh": "虫虫把他们挖出来"}, {"en": "They chop the ice with axes", "zh": "他们用斧头砍冰"}, {"en": "Kepri's sunlight melts the ice without burning them", "zh": "凯普里的阳光融化冰，而不会灼伤他们"}, {"en": "Vulcan's fire melts the ice quickly according to some versions of the story", "zh": "火神的火快速融冰（按书中另一种说法）"}], "answer": 2, "explain": {"en": "Mina warns that fire could burn the people, just as it burned the door. Kepri aims a beam of sunlight at the ice, which slowly and safely melts it, starting with the wizard Hulda.", "zh": "米娜提醒说火会像烧门一样灼伤人。凯普里用阳光束照冰，冰慢慢安全地融化，从巫师赫尔达开始。"}}, {"q": {"en": "What was controlling Mina's Ice Dragon, Frost?", "zh": "是什么在控制米娜的冰龙弗罗斯特？"}, "options": [{"en": "A blue crystal filled with Vasty's magic, hung around his neck", "zh": "挂在他脖子上、充满瓦斯蒂魔法的蓝色水晶"}, {"en": "A spell cast by Griffith according to some versions of the story in an early draft of the book", "zh": "格里菲斯下的咒（按书中另一种说法）（在书的早期草稿中）"}, {"en": "A golden whistle", "zh": "一支金色哨子"}, {"en": "Carlos's Dragon Stone", "zh": "卡洛斯的龙石"}], "answer": 0, "explain": {"en": "Frost wears a crystal that gleams with an eerie blue light. Mina says it is filled with Vasty's magic, and the giant is using it to control her dragon.", "zh": "弗罗斯特戴着一颗泛着诡异蓝光的水晶。米娜说里面充满瓦斯蒂的魔法，巨人用它来控制自己的龙。"}}, {"q": {"en": "How do the Dragon Masters finally defeat the Ice Giant Vasty?", "zh": "驯龙师们最终是怎样打败冰巨人瓦斯蒂的？"}, "options": [{"en": "They sing him to sleep", "zh": "他们把他唱睡着了"}, {"en": "King Roland arrests him", "zh": "罗兰王逮捕了他"}, {"en": "Worm freezes Vasty in place, then Vulcan's huge fireball shrinks/melts him; Frost's ice tunnel removes him", "zh": "虫虫把瓦斯蒂定住，火神的大火球把他缩小融化，弗罗斯特的冰隧道把他送走"}, {"en": "They bury him under snow according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "他们用雪把他埋起来（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}], "answer": 2, "explain": {"en": "Drake silently asks Worm to freeze Vasty with green energy. Held still, Vasty is hit by Vulcan's enormous fireball and shrinks to tiny size; Frost then breathes a swirling ice tunnel that sucks the giant away.", "zh": "德雷克默默请虫虫用绿色能量定住瓦斯蒂。被定身后，火神发射巨型火球把他缩小；弗罗斯特喷出旋涡冰隧道，把小巨人吸走。"}}, {"q": {"en": "Why couldn't Frost's ice powers stop Vasty?", "zh": "为什么弗罗斯特的冰之力制不住瓦斯蒂？"}, "options": [{"en": "Frost was afraid of the giant according to some versions of the story", "zh": "弗罗斯特害怕巨人（按书中另一种说法）"}, {"en": "Ice had no effect on the Ice Giant (ice vs. ice didn't work)", "zh": "冰对冰巨人不起作用（冰碰冰没用）"}, {"en": "Frost had no ice left", "zh": "弗罗斯特没有冰了"}, {"en": "Frost was too small", "zh": "弗罗斯特太小了"}], "answer": 1, "explain": {"en": "Mina says Frost's ice powers had no effect on the Ice Giant. That is why only a Fire Dragon like Vulcan can defeat Vasty.", "zh": "米娜说弗罗斯特的冰之力对冰巨人无效。所以只有像火神这样的火龙才能打败瓦斯蒂。"}}, {"q": {"en": "What polite lie does Rori tell King Lars, and why?", "zh": "罗瑞对拉尔斯王说了什么善意的谎言？为什么？"}, "options": [{"en": "She says King Roland happily sent them to help, though he did not even know they were there", "zh": "她说罗兰王很高兴派他们来帮忙，其实国王根本不知道他们在"}, {"en": "She says Mina is a princess", "zh": "她说米娜是公主"}, {"en": "She says Vulcan can do magic", "zh": "她说火神会魔法"}, {"en": "She says the Ice Giant was friendly according to some versions of the story in an early draft of the book", "zh": "她说冰巨人很友好（按书中另一种说法）（在书的早期草稿中）"}], "answer": 0, "explain": {"en": "To keep peace and thank the king nicely, Rori bows and says, 'King Roland is happy to help you.' Drake thinks it is a lie, but a smart one, since Roland knew nothing of the trip.", "zh": "为了维持和气、好好答谢国王，罗瑞鞠躬说“罗兰王很高兴帮你”。德雷克觉得这是谎话，但是聪明的谎话，因为罗兰对这趟行程一无所知。"}}, {"q": {"en": "How does King Roland end up NOT punishing Griffith?", "zh": "国王罗兰最后为什么没有惩罚格里菲斯？"}, "options": [{"en": "Rori fights the king", "zh": "罗瑞和国王打了一架"}, {"en": "A scroll from King Lars praises the Dragon Masters and Griffith, so the king spares him", "zh": "拉尔斯王的一封羊皮卷称赞了驯龙师和格里菲斯，国王便饶了他"}, {"en": "Griffith hides in the dragon caves according to some versions of the story in an early draft of the book", "zh": "格里菲斯藏在龙穴里（按书中另一种说法）（在书的早期草稿中）"}, {"en": "The Ice Giant returns", "zh": "冰巨人回来了"}], "answer": 1, "explain": {"en": "Just as Roland is furious about the missing Thunder Dragon, a scroll sealed with King Lars's mark falls from the sky. It praises Griffith and the Dragon Masters, so Roland lets the wizard stay.", "zh": "就在罗兰因雷龙失踪而大怒时，一封盖有拉尔斯王印玺的羊皮卷从天而降。它称赞格里菲斯和驯龙师，于是国王让巫师留了下来。"}}, {"q": {"en": "What makes Rori decide to stay with the Dragon Masters at the end?", "zh": "是什么让罗瑞最终决定留在驯龙师们身边？"}, "options": [{"en": "She is made queen", "zh": "她被立为王后"}, {"en": "She loses her Dragon Stone", "zh": "她弄丢了龙石"}, {"en": "The king orders her to stay according to some versions of the story in an early draft of the book", "zh": "国王命令她留下（按书中另一种说法）（在书的早期草稿中）"}, {"en": "She didn't like Eko's island (too hot, yucky fish) and her friends asked her to stay", "zh": "她不喜欢埃科的岛（太热、鱼难吃），而且朋友们都请她留下"}], "answer": 3, "explain": {"en": "After the adventure, Rori says she didn't really like the island — too hot and too many yucky fish — and agrees to stay when her friends say, 'We're not a team without you.'", "zh": "冒险结束后，罗瑞说她其实不喜欢那座岛——太热、鱼又难吃——当朋友们说“没有你就不成队伍”时，她答应留下。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
