 "Integration of Knowledge and Ideas", "explain": {"en": "Bats use echolocation and doctors use ultrasound; both rely on reflected sound waves returning at changed frequencies to form an image.", "zh": "蝙蝠用回声定位，医生用超声波；两者都依靠反射回来、频率改变的声波来成像。"}}, {"q": {"en": "Why does the author include the group Stomp, which makes music from brooms and garbage cans?", "zh": "作者为什么要提到用扫帚和垃圾桶创作音乐的 Stomp 乐队？"}, "options": [{"en": "To show that sound can be creative and stirring, enriching our emotions and everyday life", "zh": "为了说明声音可以充满创意与感染力，丰富我们的情感和日常生活"}, {"en": "To prove that music must use expensive instruments", "zh": "为了证明音乐必须用昂贵的乐器"}, {"en": "To explain how to clean a school bus", "zh": "为了讲解如何打扫校车"}, {"en": "To warn readers that all sound is annoying", "zh": "为了警告读者所有声音都令人厌烦"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The Stomp example shows sound's playful, emotional side, highlighting how sound enriches human experience.", "zh": "Stomp 的例子展现了声音有趣、感性的一面，强调声音如何丰富人类体验。"}}], "extended": {"prompt": {"en": "The book explains echolocation helps bats and dolphins 'see' with sound, and ultrasound lets doctors see a baby before birth. Can you think of another way sound (or echoes) is used in the world, or an everyday sound that gives you important information? Describe it.", "zh": "书中说回声定位帮助蝙蝠和海豚“用声音看世界”，超声波让医生在婴儿出生前就能看到他。你还能想到声音（或回声）在世界上的另一种用途吗？或者某个每天都在给你重要信息的声音？请描述一下。"}, "guidance": {"en": ["Think about echo, sonar, music, alarms, or nature sounds around you.", "Explain what information the sound gives you and why it matters."], "zh": ["想想回声、声呐、音乐、警报声，或你身边的自然声响。", "解释这个声音提供了什么信息，以及它为何重要。"]}}};</script>
