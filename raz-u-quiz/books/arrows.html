<script>window.BOOK = {"slug": "arrows", "title": "Arrows", "titleZh": "箭头", "level": "U", "genre": "Narrative", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Who discovers the first arrow, and where?", "zh": "是谁、在哪里发现了第一枚箭头？"}, "options": [{"en": "Poloma, carved in a boulder in the forest while she fetched her bouncing ball", "zh": "波洛玛，在树林里一块巨石上发现，当时她正去捡弹跳的球"}, {"en": "Papa, in the attic", "zh": "爸爸，在阁楼里"}, {"en": "A Civil War soldier, in a cave", "zh": "一名内战士兵，在山洞里"}, {"en": "A stranger, in the city", "zh": "一个陌生人，在城市里"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The story says Poloma was digging her ball out from undergrowth when she noticed the arrow carved into the lower part of a massive rock in the forest.", "zh": "故事中说，波洛玛在灌木丛里找球时，注意到森林里一块巨石下方刻着一枚箭头。"}}, {"q": {"en": "What was Poloma's grandfather's role in history?", "zh": "波洛玛的祖父在历史上扮演过什么角色？"}, "options": [{"en": "A Union general in the Civil War", "zh": "内战中联邦军的将军"}, {"en": "A Choctaw Code Talker who won a medal for his code work in World War II", "zh": "一名乔克托族“密码通话员”，因二战中的密码工作获过勋章"}, {"en": "A scientist who invented carbon dating", "zh": "发明碳测年的科学家"}, {"en": "A slave who escaped on the Underground Railroad", "zh": "沿地下铁路逃亡的奴隶"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says Papa had won a medal for his code work during World War II and was one of the Mississippi Choctaw Code Talkers.", "zh": "书中说，爸爸因二战期间的密码工作获得过勋章，是密西西比乔克托族“密码通话员”之一。"}}, {"q": {"en": "How did the Code Talkers send secret messages?", "zh": "“密码通话员”是如何传递秘密信息的？"}, "options": [{"en": "By writing letters in invisible ink", "zh": "用隐形墨水写信"}, {"en": "By using Morse code on telegraphs", "zh": "用电报发摩斯密码"}, {"en": "By speaking Choctaw into walkie-talkies so only other Code Talkers could interpret them", "zh": "对着步话机说乔克托语，只有其他密码通话员才能翻译"}, {"en": "By drawing maps in the sand", "zh": "在沙地上画地图"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "Papa explains they spoke into walkie-talkie radios using Choctaw words no one else could understand; a Code Talker on the other end translated into English, so enemies listening couldn't understand.", "zh": "爸爸解释说，他们对着步话机用别人听不懂的乔克托语说话；另一端的密码通话员再翻译成英文，窃听的敌人无法理解。"}}, {"q": {"en": "How many arrows did Poloma and Papa find in all?", "zh": "波洛玛和爸爸一共发现了多少枚箭头？"}, "options": [{"en": "Two", "zh": "两枚"}, {"en": "Four", "zh": "四枚"}, {"en": "Ten", "zh": "十枚"}, {"en": "Six", "zh": "六枚"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The book says each arrow pointed to another boulder with another arrow, and 'There were six arrows in all.'", "zh": "书中说，每枚箭头都指向另一块刻着箭头的巨石，“总共有六枚箭头”。"}}, {"q": {"en": "What letters were carved on the final boulder?", "zh": "最后那块巨石上刻了什么字母？"}, "options": [{"en": "\"gpmmpx uif esjoljoh hpvse\"", "zh": "“gpmmpx uif esjoljoh hpvse”"}, {"en": "\"follow the north star\"", "zh": "“follow the north star”"}, {"en": "\"go south to freedom\"", "zh": "“go south to freedom”"}, {"en": "\"the Drinking Gourd\"", "zh": "“the Drinking Gourd”"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Poloma scraped off moss and read the tiny letters carved into the boulder: 'gpmmpx uif esjoljoh hpvse.'", "zh": "波洛玛刮去苔藓，读出刻在巨石上的细小字母：“gpmmpx uif esjoljoh hpvse”。"}}, {"q": {"en": "What kind of code was the message, and what did it say?", "zh": "这条信息用的是哪种密码？它说了什么？"}, "options": [{"en": "A picture code showing animals", "zh": "一种画动物的图案密码"}, {"en": "An advance cipher where each letter is moved one place; it read 'Follow the Drinking Gourd'", "zh": "一种“前移密码”，每个字母后移一位；意思是“顺着饮水瓢走”"}, {"en": "A number code for a safe", "zh": "一个开保险箱的密码"}, {"en": "A backwards writing of ordinary English", "zh": "把普通英文反着写"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "Papa explains Northern spies in the Civil War used an 'advance cipher' that advanced each letter one place; decoded, 'gpmmpx uif esjoljoh hpvse' becomes 'follow the drinking gourd.'", "zh": "爸爸解释说，内战中北方的间谍使用“前移密码”，把每个字母向前移一位；解码后，“gpmmpx uif esjoljoh hpvse”就是“follow the drinking gourd”（顺着饮水瓢走）。"}}, {"q": {"en": "What is the 'Drinking Gourd'?", "zh": "“饮水瓢”（Drinking Gourd）指的是什么？"}, "options": [{"en": "A real cup used by soldiers", "zh": "士兵用的真杯子"}, {"en": "A type of boat", "zh": "一种船"}, {"en": "The Big Dipper, a group of seven stars in the northern sky", "zh": "北斗七星，北方天空中的七颗星组成的星群"}, {"en": "A watering hole for animals", "zh": "动物的饮水坑"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Papa says the Drinking Gourd is the group of seven stars now called the Big Dipper, always found in the northern sky of the United States.", "zh": "爸爸说，“饮水瓢”就是如今称为北斗七星的星群，在美国总是出现在北方的天空。"}}, {"q": {"en": "What was the Underground Railroad?", "zh": "“地下铁路”是什么？"}, "options": [{"en": "A real railroad with trains", "zh": "有火车的真正铁路"}, {"en": "A mail service", "zh": "一种邮政服务"}, {"en": "A river route", "zh": "一条水路"}, {"en": "A series of routes and safe houses that led enslaved people north to freedom", "zh": "一系列路线和安全的落脚点，把受奴役的人引向北方、获得自由"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The book says the Underground Railroad wasn't a real railroad but a series of routes, directions, and safe houses that led slaves northward to freedom.", "zh": "书中说，地下铁路并非真正的铁路，而是一系列路线、指引和安全的落脚点，把奴隶引向北方、获得自由。"}}, {"q": {"en": "Why does Papa think the arrows and cipher may have been carved?", "zh": "爸爸为什么认为这些箭头和密码可能是被刻下的？"}, "options": [{"en": "As a warning about bears", "zh": "作为对熊的警告"}, {"en": "By a government survey team", "zh": "由政府测量队刻的"}, {"en": "By children playing a harmless game only", "zh": "纯粹是小孩玩的 harmless 游戏"}, {"en": "Possibly by a Northern spy or returning slave during the Civil War to guide escaping slaves north", "zh": "可能是内战时期北方的间谍或返回者所刻，为引导逃亡的奴隶向北"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Papa wonders if the arrows and cipher were carved during the Civil War, perhaps by a Northern spy or a returning slave who had learned the cipher, to help others escape.", "zh": "爸爸猜想，这些箭头和密码可能刻于内战时期，也许是北方的间谍或学会密码的归乡奴隶所刻，用以帮助他人逃亡。"}}, {"q": {"en": "At the end of the story, which way does Poloma decide to go?", "zh": "故事结尾，波洛玛决定往哪个方向走？"}, "options": [{"en": "North, following the Drinking Gourd", "zh": "向北，顺着“饮水瓢”"}, {"en": "South, back home, away from the North Star", "zh": "向南，回家，远离北极星"}, {"en": "East, toward the ocean", "zh": "向东，朝大海"}, {"en": "She stays at the boulder", "zh": "她留在巨石旁"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Although the Drinking Gourd would lead them north, Poloma decides 'We need to go south, Papa' and they turn away from the North Star and head home.", "zh": "虽然“饮水瓢”会引他们向北，波洛玛却决定“我们得往南走，爸爸”，于是他们背向北极星，转身回家。"}}], "extended": {"prompt": {"en": "Imagine YOU found a short coded message like Poloma did. Write down what the message might say and what clue (an arrow, a star, or a symbol) would lead someone to it. Then explain how you would begin to break the code.", "zh": "想象你也像波洛玛一样发现了一段简短的密码信息。写下这段信息可能说什么，以及会有什么线索（箭头、星星或某个符号）把人引向它。再说明你会怎样开始破解这密码。"}, "guidance": {"en": ["Think about the advance cipher in the story: each letter was moved one place in the alphabet.", "Consider that a common short word (like 'the') can help you spot the pattern."], "zh": ["想想故事里的“前移密码”：每个字母在字母表里移动了一位。", "考虑用一个常见的短词（比如“the”）来帮你发现规律。"]}}};</script>
