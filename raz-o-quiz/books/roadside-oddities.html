<script>window.BOOK = {"slug": "roadside-oddities", "title": "Roadside Oddities", "titleZh": "路边奇景", "level": "O", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Where is the World's Largest Baseball Bat located?", "zh": "“世界最大的棒球棒”位于哪里？"}, "options": [{"en": "Louisville, Kentucky.", "zh": "肯塔基州的路易斯维尔。"}, {"en": "Mitchell, South Dakota.", "zh": "南达科他州的米切尔。"}, {"en": "Alliance, Nebraska.", "zh": "内布拉斯加州的联盟镇。"}, {"en": "Lake Havasu City, Arizona.", "zh": "亚利桑那州的哈瓦苏湖城。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book states the bat 'towers over a five-story building in Louisville, Kentucky.'", "zh": "书中说这根球棒“高耸于肯塔基州路易斯维尔一座五层楼之上”。"}}, {"q": {"en": "What is special about the London Bridge in Arizona?", "zh": "亚利桑那州的伦敦桥有什么特别之处？"}, "options": [{"en": "It is the real London Bridge, not a replica.", "zh": "它是真正的伦敦桥，不是复制品。"}, {"en": "It is built out of thirty-eight old cars.", "zh": "它是用三十八辆旧汽车建造的。"}, {"en": "It is the world's largest of its kind.", "zh": "它是同类中世界上最大的。"}, {"en": "It is made entirely of corn.", "zh": "它完全是用玉米做的。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book notes, 'While a number of roadside attractions are replicas, this one is the real deal,' and that McCulloch bought and rebuilt the actual bridge.", "zh": "书中指出：“虽然许多路边景点都是复制品，但这个却是货真价实的”，麦卡洛克购买并重建了真正的桥。"}}, {"q": {"en": "Why does the author include a map titled 'A Map to Amazement'?", "zh": "作者为什么包含一张名为“惊奇地图”的地图？"}, "options": [{"en": "To show where the different roadside attractions are located.", "zh": "为了展示各个路边景点所在的位置。"}, {"en": "To list the book's authors.", "zh": "为了列出书的作者。"}, {"en": "To explain how to build the attractions.", "zh": "为了解释如何建造这些景点。"}, {"en": "To compare the sizes of the attractions.", "zh": "为了比较景点的大小。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The map marks each oddity (The Thing, Boll Weevil Monument, Lucy the Elephant, etc.) across the US and Canada, helping readers see their locations.", "zh": "这张地图标出了美国与加拿大的各个奇景（如“那东西”、棉铃象甲纪念碑、大象露西等），帮助读者看清它们的位置。"}}, {"q": {"en": "Who built Lucy the Elephant, and why?", "zh": "是谁建造了“大象露西”，原因是什么？"}, "options": [{"en": "James V. Lafferty built her in 1881 to attract people to the land he was selling.", "zh": "詹姆斯·V·拉弗蒂于1881年建造它，用来吸引人们购买他出售的土地。"}, {"en": "Barney Smith made it as a work of art.", "zh": "巴尼·史密斯把它作为一件艺术品制作。"}, {"en": "Robert P. McCulloch bought and moved it there.", "zh": "罗伯特·P·麦卡洛克买下并把它搬到了那里。"}, {"en": "Carl K. Lindley built it as a signpost.", "zh": "卡尔·K·林德利把它作为路标建造。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The text says, 'In 1881, James V. Lafferty built the world's largest elephant to attract people to the land he was selling.'", "zh": "文中说：“1881年，詹姆斯·V·拉弗蒂建造了世界上最大的大象，用来吸引人们购买他出售的土地。”"}}, {"q": {"en": "The book uses 'insets' (extra boxes, like the note about Stonehenge). What is the author's purpose for these insets?", "zh": "书中使用了“插图框”（额外的方框，比如关于巨石阵的说明）。作者用这些插图框的目的是什么？"}, "options": [{"en": "To give extra background about the real things the attractions copy or relate to.", "zh": "提供与景点所模仿或相关的真实事物有关的背景信息。"}, {"en": "To advertise the places to visitors.", "zh": "向游客宣传这些地方。"}, {"en": "To show photos taken by the author.", "zh": "展示作者自己拍的照片。"}, {"en": "To list the glossary words.", "zh": "列出词汇表单词。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Insets give context, e.g. explaining Stonehenge is 'a mysterious ring of stones erected 4,000 to 5,000 years ago' that Carhenge copies.", "zh": "插图框提供背景，例如说明巨石阵是“建于4000到5000年前的神秘石环”，而卡亨奇正是模仿它。"}}, {"q": {"en": "Which statement connects Carhenge and the World's Largest Baseball Bat?", "zh": "以下哪一项把“卡亨奇”和“世界最大的棒球棒”联系了起来？"}, "options": [{"en": "Both are replicas — copies of something else (Stonehenge and Babe Ruth's bat).", "zh": "两者都是复制品——模仿别的东西（巨石阵和贝比·鲁斯的球棒）。"}, {"en": "Both are located in the state of Nebraska.", "zh": "两者都位于内布拉斯加州。"}, {"en": "Both are made entirely of metal.", "zh": "两者都完全由金属制成。"}, {"en": "Both are the oldest attractions in the book.", "zh": "两者都是书中最古老的景点。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Carhenge is 'a replica of England's Stonehenge' and the bat is 'a huge replica of the bat used by... Babe Ruth' — both are copies of something else.", "zh": "卡亨奇是“英格兰巨石阵的复制品”，而球棒是“贝比·鲁斯所用球棒的巨型复制品”——两者都是别的事物的仿制品。"}}, {"q": {"en": "What is the author's main purpose in writing 'Roadside Oddities'?", "zh": "作者写《路边奇景》的主要目的是什么？"}, "options": [{"en": "To entertain and inform readers about unusual roadside attractions.", "zh": "为了娱乐读者并向读者介绍奇特的路边景点。"}, {"en": "To sell travel tickets to these places.", "zh": "为了向这些地方出售旅行票。"}, {"en": "To teach the full history of the United States.", "zh": "为了讲授美国的完整历史。"}, {"en": "To explain how to build an attraction.", "zh": "为了解释如何建造一个景点。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book describes weird and wonderful attractions 'around the world' to spark interest and make readers want to stop and look.", "zh": "这本书描述世界各地“奇特而精彩”的景点，以激发兴趣，让读者想停下来看看。"}}, {"q": {"en": "What is the Boll Weevil Monument, and why was it built?", "zh": "“棉铃象甲纪念碑”是什么，为什么要建它？"}, "options": [{"en": "A statue in Enterprise, Alabama honoring a pest whose crop damage helped the town by forcing farmers to grow other plants.", "zh": "阿拉巴马州恩特普赖斯的一座雕像，纪念一种害虫——它毁了庄稼，却迫使农民改种其他作物，从而帮助了小镇。"}, {"en": "A statue of a famous president.", "zh": "一座著名总统的雕像。"}, {"en": "A museum full of bugs.", "zh": "一座装满虫子的博物馆。"}, {"en": "A monument built to honor the local farmers.", "zh": "为纪念当地农民而建的纪念碑。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "It is 'one of the only statues in the world dedicated to a pest' because after the 1915 bug destroyed cotton, growing other crops 'helped the people of Enterprise.'", "zh": "它是“世界上仅有的献给害虫的雕像之一”，因为1915年这种虫毁了棉花后，改种其他作物“帮助了恩特普赖斯的人们”。"}}, {"q": {"en": "The book says not all roadside attractions are made by people. Which natural example does it give?", "zh": "书中说并非所有路边景点都是人造的。它举了哪个自然的例子？"}, "options": [{"en": "The General Sherman Tree in Sequoia National Park, the world's largest tree by volume.", "zh": "红杉国家公园里的舍曼将军树，按体积算世界上最大的树。"}, {"en": "Lucy the Elephant.", "zh": "大象露西。"}, {"en": "Carhenge.", "zh": "卡亨奇。"}, {"en": "Sign Post Forest.", "zh": "路标森林。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "In 'Do You Know?', the book notes the General Sherman Tree is 'the world's largest tree by volume' and is 2,300 to 2,700 years old.", "zh": "在“你知道吗？”中，书中提到舍曼将军树是“按体积算世界上最大的树”，树龄在2300到2700年之间。"}}, {"q": {"en": "The 'Stop and Look' section encourages readers to do what?", "zh": "“停下来看一看”这一节鼓励读者做什么？"}, "options": [{"en": "Notice that oddities spark interest and make people stop, and go see The Thing.", "zh": "注意到这些奇景能激发兴趣并让人驻足，并去亲眼看看“那东西”。"}, {"en": "Avoid stopping at roadside attractions.", "zh": "避免在任何路边景点停车。"}, {"en": "Only visit large museums.", "zh": "只去大型博物馆。"}, {"en": "Ignore the roadside billboards.", "zh": "无视路边的广告牌。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "It says the attractions 'all spark people's interest and cause them to stop,' and invites readers to 'pull off the road' to find The Thing.", "zh": "它说这些景点“都能激发人们的兴趣，让人停下来”，并邀请读者“把车开下公路”去找出“那东西”。"}}], "extended": {"prompt": {"en": "Roadside attractions all spark people's interest and make them stop. If you could build your own roadside oddity, what would it be and why would people stop to see it?", "zh": "路边奇景都能激发人们的兴趣，让人停下来。如果你能建造一个属于自己的路边奇景，它会是什么，人们为什么会停下来看它？"}, "guidance": {"en": ["Note that attractions are unusual, surprising, or bigger/smaller than expected (world's largest, replicas).", "A good oddity has a clear 'hook' — something weird, funny, or curious that makes people pull over.", "Encourage describing the location and what visitors would see or do."], "zh": ["注意景点通常奇特、出人意料，或比寻常更大/更小（如世界最大、复制品）。", "好的奇景要有吸引点——怪异、有趣或令人好奇，让人想停车。", "鼓励孩子描述地点以及游客会看到或做什么。"]}}};</script>
