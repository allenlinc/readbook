<script>window.BOOK = {"slug": "off-to-join-the-circus", "title": "Off to Join the Circus", "titleZh": "去加入马戏团", "level": "O", "genre": "Fiction", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "At the start of the book, where is Birdie actually going?", "zh": "在书的开头，Birdie 实际上要去哪里？"}, "options": [{"en": "To circus camp, not a real traveling circus.", "zh": "去马戏团夏令营，而不是真正的流动马戏团。"}, {"en": "To join a real traveling circus as a performer.", "zh": "去加入一个真正的流动马戏团当演员。"}, {"en": "To a regular school for third grade.", "zh": "去上三年级的普通学校。"}, {"en": "To a music school to learn the piano.", "zh": "去音乐学校学钢琴。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Birdie says 'I'm really off to circus camp' and explains she went last summer for ten days and came back this year; she is not joining a real circus.", "zh": "Birdie 说'我其实是去马戏团夏令营'，并解释她去年夏天去了十天，今年又回来了；她并不是加入真正的马戏团。"}}, {"q": {"en": "During taiko class, what happens when the teacher gives the command 'Hai!'?", "zh": "在太鼓（taiko）课上，当老师喊出'Hai!'这个口令时，会发生什么？"}, "options": [{"en": "The thirty drummers beat the thirteen drums in unison.", "zh": "三十名鼓手齐声敲击十三面鼓。"}, {"en": "The kids put away the drums and go home.", "zh": "孩子们收起鼓回家。"}, {"en": "The teacher hands out the bachi sticks.", "zh": "老师发下 bachi 鼓棒。"}, {"en": "Everyone takes off their shoes.", "zh": "每个人都脱掉鞋子。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says when the teacher gives the command 'Hai!' they beat their drums in unison; thirteen big drums with thirty drummers make a mighty sound.", "zh": "书中说，当老师喊出'Hai!'的口令时，他们齐声击鼓；十三面大鼓由三十名鼓手敲打出雄壮的声音。"}}, {"q": {"en": "What is important to know about staying safe on the aerial silks?", "zh": "关于在空中丝带（aerial silks）上保持安全，什么是重要的？"}, "options": [{"en": "Once the silk is locked around a part of your body, it will hold you safely whether you are twenty feet or two feet up.", "zh": "一旦丝带绕在身体的某个部位锁住，无论你在二十英尺高还是两英尺高，它都能安全地托住你。"}, {"en": "You must always have a teacher holding you the whole time.", "zh": "你必须始终由老师全程扶着你。"}, {"en": "The silks are made of soft cotton that breaks easily.", "zh": "丝带是用容易断裂的软棉布做的。"}, {"en": "Only teachers are allowed to climb the silks.", "zh": "只有老师才被允许爬上丝带。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book explains there are many ways to hang—by feet or arms—but they all involve locking the silk around some part of the body, and once locked it holds you safely at any height.", "zh": "书中解释说，悬挂的方式有很多——用脚或用手臂——但都要把丝带绕在身体某个部位锁住，一旦锁住，无论多高都能安全托住你。"}}, {"q": {"en": "Why does Birdie wear her friend's old stilt shoes this year?", "zh": "为什么 Birdie 今年穿的是朋友旧的高跷鞋？"}, "options": [{"en": "She outgrew the stilt shoes she bought at a thrift store last year, so she uses her friend's outgrown ones.", "zh": "她穿不下去年在旧货店买的高跷鞋了，所以用了朋友穿不下的那双。"}, {"en": "Her friend bought her a brand-new pair as a gift.", "zh": "她的朋友给她买了一双全新的作为礼物。"}, {"en": "The camp requires everyone to wear the same new shoes.", "zh": "夏令营要求每个人都穿同样的新鞋。"}, {"en": "She lost her old shoes on the tightrope.", "zh": "她把旧鞋丢在高空绳索上了。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says last year Birdie bought stilt shoes at a thrift store, but this year she'd outgrown them, so they put her friend's old (outgrown) stilt shoes on her stilts.", "zh": "书中说 Birdie 去年在旧货店买了高跷鞋，但今年她穿不下了，于是他们把她朋友穿不下的旧高跷鞋装到了她的高跷上。"}}, {"q": {"en": "The book says 'Aerial means \"in the air.\"' Where do the kids spend their time during silks class?", "zh": "书中说'aerial 意思是\"在空中\"'。在丝带课上，孩子们把时间花在哪里？"}, "options": [{"en": "Up in the air, on pieces of strong black fabric hanging about twenty feet from the gym ceiling.", "zh": "在空中，在从体育馆天花板垂下约二十英尺的结实黑色布条上。"}, {"en": "Underwater in a swimming pool.", "zh": "在游泳池的水下。"}, {"en": "On the ground learning to play the drums.", "zh": "在地面上学习打鼓。"}, {"en": "Inside a tent sewing costumes.", "zh": "在帐篷里缝制服装。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The book defines 'aerial' as 'in the air' and says the silks are strong black fabric hanging from the ceiling about twenty feet high down to the marley, where they spend their time.", "zh": "书中把'aerial'定义为'在空中'，并说丝带是从天花板垂下约二十英尺高、落到地板（marley）的结实黑色布条，孩子们的时间就花在那里。"}}, {"q": {"en": "In the glossary, 'unison' means doing something at the same time. Which event in the book shows this?", "zh": "词汇表中，'unison（齐声/一致）'表示在同一时间做某件事。书中哪个事件体现了这一点？"}, "options": [{"en": "All thirty drummers beat their drums together when the teacher says 'Hai!'", "zh": "老师喊'Hai!'时，三十名鼓手一起击鼓。"}, {"en": "Each kid climbs the silks at a different speed.", "zh": "每个孩子以不同速度爬上丝带。"}, {"en": "The dog Tannikin runs across by herself.", "zh": "小狗 Tannikin 独自跑过去。"}, {"en": "Kids eat lunch one at a time.", "zh": "孩子们一次一个人吃午饭。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'unison' as happening at the same time, and the book says when the teacher commands 'Hai!' they beat their drums in unison.", "zh": "词汇表把'unison'定义为在同一时间发生，而书中说老师喊'Hai!'时，他们齐声击鼓。"}}, {"q": {"en": "Based on the Big Show chapter, what happens for the grand finale?", "zh": "根据'盛大演出（The Big Show）'一章，盛大尾声（grand finale）发生了什么？"}, "options": [{"en": "The acrobats make a bridge of fifteen backs, and the camp dog Tannikin runs across it.", "zh": "杂技演员用十五个人的后背搭成一座桥，营狗 Tannikin 从上面跑过去。"}, {"en": "Birdie rides a horse around the gym.", "zh": "Birdie 骑着马绕体育馆一圈。"}, {"en": "The teachers set off fireworks outside.", "zh": "老师们在室外放烟花。"}, {"en": "All the kids sing a song together.", "zh": "所有孩子一起唱一首歌。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says when the acrobats finish their tricks they make a bridge of fifteen backs and Tannikin runs across for the grand finale.", "zh": "书中说，当杂技演员完成特技后，他们用十五个人的后背搭成一座桥，Tannikin 跑过去，作为盛大尾声。"}}, {"q": {"en": "Which statement about circus camp is supported by the whole book?", "zh": "关于马戏团夏令营，以下哪个说法得到了全书内容的支持？"}, "options": [{"en": "Campers of different ages take part, learn many skills (taiko, silks, stilts, clowning, tightrope, poi), and finish with a public show.", "zh": "不同年龄的营员参加，学习多种技能（太鼓、丝带、高跷、小丑、高空绳索、poi），并以一场公开演出收尾。"}, {"en": "Only professional adult performers are allowed at the camp.", "zh": "夏令营只接收专业的成年演员。"}, {"en": "The camp lasts all school year with no final show.", "zh": "夏令营持续整个学年，没有最终演出。"}, {"en": "Kids learn to tame wild lions and tigers.", "zh": "孩子们学习驯服野生狮子和老虎。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book shows kids from age seven (Birdie) and eight (Nola) up to teenagers (Ruby, Ceci) learning taiko, silks, stilts, clowning, tightrope, and poi, then performing a big show on Saturday night.", "zh": "书中展现了从七岁（Birdie）、八岁（Nola）到青少年（Ruby、Ceci）的孩子们学习太鼓、丝带、高跷、小丑、高空绳索和 poi，然后在周六晚上进行盛大演出。"}}, {"q": {"en": "Why does the author include so many small details about each class (taiko, silks, stilts, clowning, tightrope, poi)?", "zh": "作者为什么要包含关于每节课（太鼓、丝带、高跷、小丑、高空绳索、poi）的大量细节？"}, "options": [{"en": "To give readers a lively, real sense of what a day at circus camp is like and share Birdie's excitement.", "zh": "为了让读者生动地、真实地感受马戏团夏令营一天的生活，并分享 Birdie 的兴奋之情。"}, {"en": "To teach readers how to become professional athletes.", "zh": "为了教读者如何成为职业运动员。"}, {"en": "To complain that the camp is too hard.", "zh": "为了抱怨夏令营太难。"}, {"en": "To list the rules of a real traveling circus.", "zh": "为了列出真正流动马戏团的规矩。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book is a first-person recount of Birdie's camp experience; the many sensory details (sounds, costumes, mishaps) help the reader picture camp life and feel her enthusiasm.", "zh": "本书是 Birdie 夏令营经历的第一人称叙述；大量感官细节（声音、服装、小意外）帮助读者想象营地生活并感受她的热情。"}}, {"q": {"en": "How does the ending ('the circus is over ... until next year') show the author's perspective?", "zh": "结尾'马戏团结束了……直到明年'如何体现作者的态度？"}, "options": [{"en": "It shows Birdie loved the experience so much that she is already looking forward to returning.", "zh": "这说明 Birdie 非常喜爱这段经历，已经期待明年再来。"}, {"en": "It shows she was happy the camp was finally over.", "zh": "这说明她很高兴夏令营终于结束了。"}, {"en": "It shows she plans to quit circus camp forever.", "zh": "这说明她打算永远退出马戏团夏令营。"}, {"en": "It shows the camp was a disappointing failure.", "zh": "这说明夏令营是一场令人失望的失败。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Birdie says 'It has all gone too fast' and 'until next year,' showing she enjoyed camp and wants to come back, reflecting a positive, enthusiastic perspective.", "zh": "Birdie 说'一切都过得太快了'，以及'直到明年'，说明她很喜欢夏令营并想再来，反映出积极、热情的态度。"}}], "extended": {"prompt": {"en": "Birdie tried many circus skills at camp. If you could design your own circus camp class, what would it be called and what would campers learn to do? (Inspired by the book's classes like taiko, silks, and stilts.)", "zh": "Birdie 在夏令营尝试了许多马戏团技能。如果你能设计自己的一节马戏团夏令营课，你会叫它什么名字，营员们会学习做什么？（灵感来自书中的太鼓、丝带、高跷等课程。）"}, "guidance": {"en": ["Name a skill or activity (real or imagined) and the equipment it would use.", "Describe one thing campers would practice, like climbing, balancing, or performing for an audience.", "Explain why your class would be fun or useful.", "Connect it to a class in the book if you can."], "zh": ["给一项技能或活动（真实或想象均可）起名，并说明它用什么器材。", "描述营员会练习的一件事，比如攀爬、平衡或为观众表演。", "解释你的课为什么有趣或有用。", "如果可以，把它和书中的某一节课联系起来。"]}}};</script>
