swer": 0, "skill": "Craft and Structure", "explain": {"en": "The 'Math Minute' invites readers to use the dates given (left August 10, landed October 29, 1630) to calculate the voyage's length, linking math to the historical story.", "zh": "“数学一刻钟”让读者利用给出的日期（8月10日启程，10月29日上岸，1630年）算出航程长度，把数学和这个历史故事联系起来。"}}, {"q": {"en": "Sarah's Plymouth house had windows of waxed paper (not glass) and was built of tree trunks and bark (not stone like in England). What does comparing the two houses show?", "zh": "萨拉的普利茅斯房子窗户是蜡纸（不是玻璃），由树干和树皮建成（不像英国用石头）。比较两座房子说明了什么？"}, "options": [{"en": "Life in Plymouth was simpler and harder than life in England", "zh": "普利茅斯的生活比英国更简单也更艰苦"}, {"en": "The England house was smaller", "zh": "英国的房子更小"}, {"en": "Both houses were exactly the same", "zh": "两座房子完全一样"}, {"en": "Plymouth had better glass", "zh": "普利茅斯有更好的玻璃"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The comparison shows that the family's new home in Plymouth was much smaller and made of rougher materials, revealing the harder pioneer life compared with England.", "zh": "比较表明，这家人普利茅斯的新家小得多，用料也更粗糙，反映出与英国相比更为艰苦的拓荒生活。"}}, {"q": {"en": "When Sarah asks when they will go to school as in England, Father says they must first make sure everyone has a home and food. What does this tell us about Plymouth at that time?", "zh": "当萨拉问什么时候能像在英国那样去上学时，父亲说必须先确保每个人都有房子和食物。这告诉我们当时普利茅斯的什么情况？"}, "options": [{"en": "Survival came first; the colony was still being built", "zh": "生存优先，殖民地仍在建设之中"}, {"en": "School was more important than food", "zh": "上学比食物更重要"}, {"en": "There were already many schools", "zh": "已经有许多学校"}, {"en": "Children did not need to learn", "zh": "孩子们不需要学习"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Father's answer shows that the settlers' first need was shelter and food; school would come only after the basic survival needs of the colony were met.", "zh": "父亲的回答说明，定居者最迫切的需求是住房和食物；只有殖民地的生存基本需求得到满足后，才会考虑上学。"}}, {"q": {"en": "What is the author's main purpose in writing Meeting Father in Plymouth?", "zh": "作者写《在普利茅斯与父亲相会》的主要目的是什么？"}, "options": [{"en": "To tell a historical story of a Puritan girl reuniting with her father and show early colonial life", "zh": "为了讲述一个清教徒女孩与父亲团聚的历史故事，并展现早期殖民地生活"}, {"en": "To teach readers how to sail a ship", "zh": "为了教读者如何驾驶船"}, {"en": "To argue that children should not go to school", "zh": "为了论证孩子不应上学"}, {"en": "To explain how to cook English food", "zh": "为了解释如何烹饪英国食物"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book blends a fictional girl's journey with real history (Plymouth Colony, Puritans) to help readers experience and understand early colonial life and a family reunion.", "zh": "本书把虚构女孩的旅程与真实历史（普利茅斯殖民地、清教徒）结合，帮助读者体验和了解早期殖民地生活以及一次家庭团聚。"}}, {"q": {"en": "The book ends with Sarah thinking that 'even though things were more different than alike between Plymouth and England, she was going to like living here.' What is the author's purpose in ending this way?", "zh": "书的结尾，萨拉想“尽管普利茅斯和英国的差异多于相同，她会喜欢住在这里”。作者这样结尾的目的是什么？"}, "options": [{"en": "To show Sarah's hopeful, accepting attitude toward her new life", "zh": "为了表现萨拉对新生活充满希望、乐于接受的态度"}, {"en": "To say she wanted to return to England", "zh": "为了说明她想回英国"}, {"en": "To show she disliked her father", "zh": "为了表现她不喜欢父亲"}, {"en": "To end the story sadly", "zh": "为了悲伤地结束故事"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Ending with Sarah's hopeful thought shows her resilience and acceptance of pioneer life, leaving readers with a positive sense of her new beginning.", "zh": "以萨拉充满希望的思绪结尾，表现了她的韧性和对拓荒生活的接纳，给读者留下她新生活积极开端的印象。"}}], "extended": {"prompt": {"en": "Sarah traveled across the ocean as a child to reunite with her father and start a new life in Plymouth. Imagine you had to move far away to a new place. What would you miss most, and what would you be excited to see or do?", "zh": "萨拉还是个孩子就漂洋过海，与父亲团聚并在普利茅斯开始新生活。想象你不得不搬去很远的新地方。你最会想念什么，又会对看到或做什么感到兴奋？"}, "guidance": {"en": ["Sarah missed her friends Jane and Anne and the life she knew in England.", "She was excited but also worried, and found comfort in small things (her blanket).", "Her family worked together to build homes and grow food.", "Think about both what you would miss and what new experiences you hope for."], "zh": ["萨拉想念朋友简和安妮，以及她在英国熟悉的生活。", "她既兴奋又担忧，并从小物件（她的毯子）中找到安慰。", "她的家人一起劳作，建造房屋、种植食物。", "想一想你既会想念什么，又期待哪些新的经历。"]}}};</script>
