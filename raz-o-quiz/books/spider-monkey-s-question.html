<script>window.BOOK = {"slug": "spider-monkey-s-question", "title": "Spider Monkey's Question", "titleZh": "蜘蛛猴的问题", "level": "O", "genre": "Fiction", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Why did Tari's parents NOT answer his question 'Why are we called spider monkeys?'", "zh": "塔里问'我们为什么叫蜘蛛猴？'他的父母为什么不回答这个问题？"}, "options": [{"en": "They did not know the answer at all.", "zh": "他们完全不知道答案。"}, {"en": "They felt it was time for Tari to figure things out on his own.", "zh": "他们觉得是时候让塔里自己去弄明白这件事了。"}, {"en": "They thought the question was silly.", "zh": "他们认为这个问题很傻。"}, {"en": "They were too busy eating breakfast.", "zh": "他们正忙着吃早餐。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says Tari's parents could have guessed the answer, but 'they felt it was time for Tari to figure some things out on his own.'", "zh": "书中写道，塔里的父母本可以猜到答案，但'他们觉得是时候让塔里自己去弄明白一些事情了'。"}}, {"q": {"en": "Who is the Namer of Animals in the story?", "zh": "故事里的'动物命名者'是谁？"}, "options": [{"en": "Tari's mother.", "zh": "塔里的妈妈。"}, {"en": "A giant monkey with no fur except on her head who lives in the other world.", "zh": "一只除了头上没有毛、住在外面的世界里的巨型猴子。"}, {"en": "Balam the iguana.", "zh": "鬣蜥巴拉姆。"}, {"en": "The wisest spider monkey in the forest.", "zh": "森林里最聪明的蜘蛛猴。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Tari and Balam travel to the other world and meet the Namer, described as a giant monkey with no fur except on her head.", "zh": "塔里和巴拉姆去到外面的世界，遇见了'命名者'，她被描述为一只有着无毛的巨型猴子，除了头上。"}}, {"q": {"en": "Why is Tari called a 'spider monkey'?", "zh": "塔里为什么被称为'蜘蛛猴'？"}, "options": [{"en": "Because he has eight legs.", "zh": "因为他有八条腿。"}, {"en": "Because the way he climbs reminds the Namer of a spider.", "zh": "因为他攀爬的样子让命名者想到了蜘蛛。"}, {"en": "Because he eats spiders.", "zh": "因为他吃蜘蛛。"}, {"en": "Because he builds webs.", "zh": "因为他织网。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The Namer tells Tari, 'you are called spider monkey because the way you climb reminds me of a spider.'", "zh": "命名者告诉塔里：'你被称为蜘蛛猴，是因为你攀爬的样子让我想到了蜘蛛。'"}}, {"q": {"en": "How did Tari and Balam travel to the other world beyond the forest?", "zh": "塔里和巴拉姆是怎么去到森林外面的世界的？"}, "options": [{"en": "They swam across the ocean.", "zh": "他们游过了大海。"}, {"en": "Tari swung through the trees carrying Balam on his back.", "zh": "塔里在树间荡来荡去，把巴拉姆背在背上。"}, {"en": "They flew through the sky.", "zh": "他们飞过了天空。"}, {"en": "They walked the whole way on the ground.", "zh": "他们全程在地面上步行。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says 'Tari swung himself through the trees, carrying Balam on his back' since iguanas are not fast on their feet.", "zh": "书中说'塔里在树间荡来荡去，把巴拉姆背在背上'，因为鬣蜥的脚并不快。"}}, {"q": {"en": "What did the 'other world' beyond the forest look like when Tari and Balam arrived?", "zh": "当塔里和巴拉姆到达时，森林外面的'另一个世界'是什么样子的？"}, "options": [{"en": "A place full of tall, leafy trees.", "zh": "一个长满高大树木的地方。"}, {"en": "A place with open space, no trees, a huge sky, and little green spikes on the ground.", "zh": "一个开阔、没有树、天空巨大、地面上有绿色小尖刺的地方。"}, {"en": "An underwater world.", "zh": "一个水下的世界。"}, {"en": "A dark cave underground.", "zh": "一个地下的黑暗洞穴。"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The text describes 'space here where no trees grew! The sky was huge... Little green spikes covered the earth.'", "zh": "文中描写道：'这里是没有树木生长的空间！天空巨大……绿色的小尖刺覆盖着大地。'"}}, {"q": {"en": "How does the author show that Tari is a very curious monkey?", "zh": "作者是如何表现塔里是一只充满好奇心的猴子的？"}, "options": [{"en": "He sleeps all day long.", "zh": "他整天都在睡觉。"}, {"en": "He asks endless questions about everything around him.", "zh": "他对周围的一切问个不停。"}, {"en": "He never leaves his tree.", "zh": "他从不离开自己的树。"}, {"en": "He ignores the other animals.", "zh": "他不理睬其他动物。"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The book says Tari asked about the sky, hills, other animals, foods, and more: 'Tari's curiosity was truly endless.'", "zh": "书中说塔里问天空、山丘、其他动物、食物等等：'塔里的好奇心真的无穷无尽。'"}}, {"q": {"en": "The Namer says she named the sloth with a sneeze because she was allergic to him. What does this show about how she chooses names?", "zh": "命名者说她打了一个喷嚏才给树懒起了名字，因为她对树懒过敏。这说明她是怎么取名字的？"}, "options": [{"en": "She names animals after careful scientific study.", "zh": "她经过仔细的科学研究才给动物命名。"}, {"en": "She sometimes names animals for silly or sound-based reasons.", "zh": "她有时会出于可笑或基于声音的原因给动物命名。"}, {"en": "She lets the animals choose their own names.", "zh": "她让动物自己选择名字。"}, {"en": "Tari's parents choose the names.", "zh": "名字是由塔里的父母取的。"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The Namer explains she named the sloth with a sneeze, the cuckoo named herself, and sometimes she 'try to think of words that sound fun or make me laugh.'", "zh": "命名者解释说她打了一个喷嚏给树懒命名，布谷鸟自己给自己取名，而她有时'只是想一些听起来有趣或让我发笑的词'。"}}, {"q": {"en": "What did Tari finally understand about names at the end of the story?", "zh": "在故事结尾，塔里终于明白了关于名字的什么道理？"}, "options": [{"en": "Names are meaningless and random.", "zh": "名字是没有意义、随机的。"}, {"en": "Names are meant to set apart each special creature.", "zh": "名字是为了区分每一种独特的生物。"}, {"en": "Only humans have real names.", "zh": "只有人类才有真正的名字。"}, {"en": "All monkeys share the same name.", "zh": "所有的猴子都叫同一个名字。"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book concludes: 'Names were meant to set apart each special creature. They were just like the names that Tari and Balam were given specially by their parents.'", "zh": "书中总结道：'名字是为了区分每一种独特的生物。它们就像塔里和巴拉姆由父母特别取的名字一样。'"}}, {"q": {"en": "Why do you think the author tells us that Tari's first word was 'why'?", "zh": "你认为作者为什么要告诉我们塔里的第一个词是'为什么'？"}, "options": [{"en": "To show that Tari was lazy.", "zh": "为了说明塔里很懒。"}, {"en": "To show Tari's deep curiosity and love of asking questions.", "zh": "为了表现塔里强烈的好奇心和爱提问的天性。"}, {"en": "To show he could not speak well.", "zh": "为了说明他说话不好。"}, {"en": "To show his parents were angry.", "zh": "为了说明他的父母很生气。"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "Tari's mother 'thought it was wonderful that his first word was why,' which introduces his curious personality that drives the whole story.", "zh": "塔里的妈妈'觉得他的第一个词是为什么真是太好了'，这引出了推动整个故事的好奇性格。"}}, {"q": {"en": "What is the main message or lesson of this story?", "zh": "这个故事的主要寓意或道理是什么？"}, "options": [{"en": "Monkeys should never ask questions.", "zh": "猴子永远不该提问。"}, {"en": "Names help show what makes each creature special.", "zh": "名字有助于展现每种生物独特之处。"}, {"en": "The forest is a dangerous place.", "zh": "森林是个危险的地方。"}, {"en": "Iguanas are faster than monkeys.", "zh": "鬣蜥比猴子快。"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The Namer explains she uses names 'to separate one creature from another' and to 'stay true to each creature,' showing names honor what is special.", "zh": "命名者解释说她用名字'把一种生物和另一种区分开'，并'忠实于每一种生物'，说明名字是用来彰显独特之处的。"}}], "extended": {"prompt": {"en": "Tari's endless questions helped him learn about his world. What is one question you have been curious about, and how could you find the answer—like Tari did—by exploring or asking someone wise?", "zh": "塔里无穷无尽的问题帮助他认识了自己的世界。你曾经对什么问题感到好奇？你可以像塔里那样，通过探索或向有智慧的人请教来找到答案吗？"}, "guidance": {"en": "- Encourage the child to name a real question they have wondered about.\n- Suggest ways to find answers: books, asking an expert, or observing nature.\n- Connect to Tari learning that some answers take effort and a journey to discover.", "zh": "- 鼓励孩子说出自己曾经好奇的真实问题。\n- 建议寻找答案的方法：读书、请教专家或观察自然。\n- 联系塔里明白的道理：有些答案需要付出努力、甚至一段旅程才能找到。"}}};</script>
