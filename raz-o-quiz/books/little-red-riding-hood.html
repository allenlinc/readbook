<script>window.BOOK = {"slug": "little-red-riding-hood", "title": "Little Red Riding Hood", "titleZh": "小红帽", "level": "O", "genre": "Folk Tale", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "What instructions does Red's mom give her before she leaves?", "zh": "Red 的妈妈在她出发前给了她什么嘱咐？"}, "options": [{"en": "Go quickly through the woods, do not leave the path, and do not talk to strangers.", "zh": "快点穿过树林，不要离开小路，也不要和陌生人说话。"}, {"en": "Take your time and pick as many flowers as you like.", "zh": "慢慢走，想采多少花就采多少。"}, {"en": "Ride your bike straight to the city.", "zh": "骑自行车直接去城市。"}, {"en": "Give the cake to the first animal you meet.", "zh": "把蛋糕给你遇到的第一个动物。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Mom says 'Go quickly through the woods, do not leave the path, and do not talk to strangers!' and Red promises to take great care.", "zh": "妈妈说'快点穿过树林，不要离开小路，也不要和陌生人说话！'，Red 答应会十分小心。"}}, {"q": {"en": "Where does Grandma live?", "zh": "外婆（Grandma）住在哪里？"}, "options": [{"en": "Farther on in the woods, under the three large oak trees.", "zh": "在树林更深处，三棵大橡树的下面。"}, {"en": "In a house in the middle of the city.", "zh": "在市中心的一所房子里。"}, {"en": "Across the river on a farm.", "zh": "在河对岸的一个农场里。"}, {"en": "Inside the wolf's den.", "zh": "在狼的洞穴里。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Red tells Wolf that Grandma lives 'Farther on in the woods, under the three large oak trees,' which is where Wolf then sprints to.", "zh": "Red 告诉狼，外婆住在'树林更深处，三棵大橡树的下面'，狼随后正是冲向那里。"}}, {"q": {"en": "How does the Wolf trick Red into leaving the path?", "zh": "狼是如何骗 Red 离开小路的？"}, "options": [{"en": "He says the birds are singing and Grandmas love wildflowers, so she should pick a bunch.", "zh": "他说鸟儿在歌唱，外婆们喜爱野花，所以她应该采一束。"}, {"en": "He offers to carry her basket for her.", "zh": "他主动提出替她拿篮子。"}, {"en": "He threatens to eat her if she does not follow him.", "zh": "他威胁说如果她不跟着走就吃了她。"}, {"en": "He tells her the cake is ruined and she must go back home.", "zh": "他告诉她蛋糕坏了，必须回家。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Wolf says 'How sweetly the little birds sing! ... Grandmas love wildflowers. If I were you, I'd pick a bunch for yours,' so Red bends down to pick one and wanders off the path.", "zh": "狼说'小鸟儿唱得多甜美！……外婆们喜爱野花。如果我是你，就采一束给她。'于是 Red 弯下腰采花，渐渐走离了小路。"}}, {"q": {"en": "How do Red and Grandma escape from inside the Wolf?", "zh": "Red 和外婆是如何从狼的肚子里逃出来的？"}, "options": [{"en": "Red tickles the Wolf's throat with her bouquet until he coughs them both up.", "zh": "Red 用花束挠狼的喉咙，直到他把她们两个都咳出来。"}, {"en": "A woodcutter breaks the door down and saves them.", "zh": "一个樵夫撞破门救了她们。"}, {"en": "They shout until the Wolf spits them out.", "zh": "她们大喊大叫，直到狼把她们吐出来。"}, {"en": "The Wolf falls asleep and they climb out his ear.", "zh": "狼睡着了，她们从他耳朵里爬出来。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Inside the Wolf, Red lifts her bouquet and tickles his throat; he coughs once, twice, thrice until he coughs Red up, and she pulls Grandma out too.", "zh": "在狼肚子里，Red 举起花束挠他的喉咙；他咳了又咳，终于把 Red 咳出来，Red 又拉出外婆。"}}, {"q": {"en": "When Red steps into Grandma's open cottage, 'a feeling of dread flooded her.' What does 'dread' mean?", "zh": "当 Red 走进敞开着门的外婆小屋时，'一种恐惧（dread）之感淹没了她'。'dread'是什么意思？"}, "options": [{"en": "A feeling of great fear.", "zh": "一种巨大的恐惧感。"}, {"en": "A feeling of great joy.", "zh": "一种巨大的喜悦感。"}, {"en": "A feeling of sleepiness.", "zh": "一种困倦感。"}, {"en": "A feeling of hunger.", "zh": "一种饥饿感。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'dread' as a feeling of great fear, which fits Red's worried feeling when she finds the door open and no one answers.", "zh": "词汇表把'dread'定义为一种巨大的恐惧感，正符合 Red 发现门开着、无人应答时的担忧心情。"}}, {"q": {"en": "The glossary says 'discern' means to detect something not obvious. How does Red use it in the story?", "zh": "词汇表说'discern（察觉）'指察觉不明显的事物。在故事中 Red 是如何用到这个词的？"}, "options": [{"en": "She detects a weak light leaking down the Wolf's throat and understands he is snoring with his mouth open.", "zh": "她察觉到一缕微弱的光从狼的喉咙漏下，明白他正张着嘴打鼾。"}, {"en": "She detects the smell of fresh-baked cake.", "zh": "她闻到了刚烤好的蛋糕香味。"}, {"en": "She detects that the flowers are poisonous.", "zh": "她察觉到那些花有毒。"}, {"en": "She detects a stranger hiding behind a tree.", "zh": "她察觉到一个陌生人藏在树后。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The book says Red 'could discern a weak light leaking down Wolf's throat' and then understood he was snoring with his mouth open.", "zh": "书中说 Red'能察觉到一缕微弱的光从狼的喉咙漏下'，于是明白他正张着嘴打鼾。"}}, {"q": {"en": "Inside the Wolf, the only sound 'resembled rolling thunder.' What is that sound really?", "zh": "在狼肚子里，唯一的声音'像滚滚雷声'。那声音究竟是什么？"}, "options": [{"en": "The Wolf snoring with his mouth open.", "zh": "狼张着嘴打鼾的声音。"}, {"en": "A real thunderstorm outside.", "zh": "外面真正的雷暴。"}, {"en": "Grandma snoring in the bed.", "zh": "外婆在床上打鼾。"}, {"en": "The wind blowing through the trees.", "zh": "风吹过树林的声音。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Red discerns a weak light leaking down Wolf's throat and understands 'Wolf was snoring with his mouth open' — the thunder-like sound comes from his snoring.", "zh": "Red 察觉到微弱的光从狼的喉咙漏下，明白'狼正张着嘴打鼾'——那像雷声的声音来自他的鼾声。"}}, {"q": {"en": "The book's Writing activity asks how the story would change if Red didn't stop to pick flowers. What is the likely result?", "zh": "本书的'写作'活动问：如果 Red 没有停下来采花，故事会有什么不同？最可能的结果是什么？"}, "options": [{"en": "Wolf would not have had time to reach Grandma first, so Red might have arrived before him.", "zh": "狼就不会有先赶到外婆家的时间，Red 可能比他先到。"}, {"en": "The Wolf would have eaten Red on the path instead.", "zh": "狼会在小路上把 Red 吃掉。"}, {"en": "Grandma would have come to meet Red in the woods.", "zh": "外婆会到树林里来接 Red。"}, {"en": "The story would end happily with no Wolf at all.", "zh": "故事会以没有狼的圆满方式结束。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Because Red leaves the path to pick flowers, Wolf 'sprinted straight to Grandma's house' and swallowed her first; without that delay, Red could have arrived before the Wolf.", "zh": "正因为 Red 离开小路去采花，狼才'直冲向外婆家'并先吞下了外婆；若没有这个耽搁，Red 本可以比狼先到。"}}, {"q": {"en": "Why does the author repeat the 'big ears / big eyes / big terrible mouth' conversation between Red and the Wolf?", "zh": "作者为什么要重复 Red 和狼之间'大耳朵 / 大眼睛 / 大可怕的嘴'的对话？"}, "options": [{"en": "To build suspense and use a classic fairy-tale pattern before the Wolf reveals himself.", "zh": "为了制造悬念，并在狼露出真面目之前使用经典的童话套路。"}, {"en": "To teach readers about animal body parts.", "zh": "为了教读者认识动物的身体部位。"}, {"en": "To show that Grandma really did have big features.", "zh": "为了说明外婆真的长着大五官。"}, {"en": "To make the story shorter and faster.", "zh": "为了让故事更短更快。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "This call-and-response pattern is a classic fairy-tale device that builds tension and hints something is wrong before the Wolf finally roars 'All the better to eat you with!'", "zh": "这种一问一答的套路是经典童话手法，用来制造紧张感，并在狼最终吼出'正好把你吃掉！'之前暗示事情不对劲。"}}, {"q": {"en": "What lesson does the story teach about Red's choices?", "zh": "关于 Red 的选择，这个故事想传达什么道理？"}, "options": [{"en": "Leaving the path and talking to a stranger led to danger, showing why her mother's warnings mattered.", "zh": "离开小路、与陌生人说话带来了危险，说明妈妈的警告为何重要。"}, {"en": "It is always safe to talk to strangers in the woods.", "zh": "在树林里和陌生人说话总是安全的。"}, {"en": "Picking flowers is more important than helping family.", "zh": "采花比帮助家人更重要。"}, {"en": "Wolves are friendly animals that love cake.", "zh": "狼是喜爱蛋糕的友善动物。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Red ignores Mom's warnings (stay on the path, don't talk to strangers) and her choice to pick flowers lets the Wolf reach Grandma first—showing her choices directly caused the danger.", "zh": "Red 无视了妈妈的警告（留在路上、别和陌生人说话），而她采花的选择让狼先到了外婆家——说明她的选择直接导致了危险。"}}], "extended": {"prompt": {"en": "How might the story be different if Red had not stopped to pick the flowers? Write a paragraph describing how the story would change. (Based on the book's Writing activity.)", "zh": "如果 Red 没有停下来采花，故事会有什么不同？写一段话，描述故事会如何改变。（基于本书的'写作'活动。）"}, "guidance": {"en": ["Think about what Red did right after meeting Wolf (she left the path to pick flowers).", "Notice that Wolf used that time to sprint to Grandma's house and swallow her first.", "Imagine Red arriving at Grandma's before the Wolf and warning her.", "Describe how the ending might be safer or different."], "zh": ["想想 Red 遇到狼之后做了什么（她离开小路去采花）。", "注意狼正是利用这段时间直冲向外婆家，先吞下了外婆。", "想象 Red 比狼先到外婆家并提醒外婆。", "描述结局可能会怎样变得更安全或不同。"]}}};</script>
