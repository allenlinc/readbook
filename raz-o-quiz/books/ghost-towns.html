ons they were left.", "zh": "这是一本科普书，旨在向读者介绍真实的废弃城镇及其被遗弃的各种原因。"}}], "extended": {"prompt": {"en": "The focus question asks: What is a ghost town, and how does a town become a ghost town? Imagine and describe one reason a town you know might become a ghost town in the future.", "zh": "焦点问题是：什么是鬼镇？一个城镇如何变成鬼镇？想象并描述你熟悉的某个城镇将来可能变成鬼镇的一个原因。"}, "guidance": {"en": "• A ghost town is a place where people no longer live, often because of a threat or loss of work.\n• Reasons in the book include resources running out (gold, diamonds), natural disasters (volcanoes, landslides), deadly land (fire, radiation), and remote location.\n• Use the Writing and Art activity to create your own imaginary ghost town with a name and cause.", "zh": "• 鬼镇是人们不再居住的地方，通常因为某种威胁或失去工作。\n• 书中原因包括资源枯竭（金、钻石）、自然灾害（火山、山体滑坡）、危险土地（火灾、辐射）和偏远位置。\n• 可用写作与美术活动创作你自己的想象鬼镇，并命名及说明成因。"}}};</script>
