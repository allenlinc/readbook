"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "These side boxes name each plant or animal with its scientific name and a fact (e.g., sugar pine cones are 15 inches tall; quartz is one of the most plentiful minerals), adding real-world information to the story.", "zh": "这些侧边方框用学名标出每种植物或动物，并给出事实（例如糖松的松果有15英寸高；石英是地球上最丰富的矿物之一），为故事补充真实世界的科学知识。"}}, {"q": {"en": "Why does Katie's father say the pinecone and acorns should be left in the forest?", "zh": "为什么凯蒂的爸爸说松果和橡子应该留在森林里？"}, "options": [{"en": "They are food for birds and small animals", "zh": "它们是鸟类和小型动物的食物"}, {"en": "They are too heavy to carry", "zh": "它们太重了，不好带"}, {"en": "They belong to the campground", "zh": "它们属于露营地"}, {"en": "They would attract grizzly bears", "zh": "它们会把灰熊引过来"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Katie's father explains the pinecone and acorns are 'food for birds and small animals like the chipmunk you saw,' helping her connect taking them to stealing an animal's lunch.", "zh": "凯蒂的爸爸解释说，松果和橡子是“给你看到的那只花栗鼠之类的小型动物吃的食物”，让她明白拿走它们等于偷走动物的午餐。"}}, {"q": {"en": "What kind of stone with a white streak does Katie find at the stream?", "zh": "凯蒂在溪流边发现的、中间有一道白色条纹的石头是什么？"}, "options": [{"en": "Quartz", "zh": "石英"}, {"en": "Granite", "zh": "花岗岩"}, {"en": "Gold", "zh": "黄金"}, {"en": "Marble", "zh": "大理石"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Katie spots a stone with a glittery white streak and her father tells her it is quartz, one of the most plentiful minerals on Earth, usually clear or white.", "zh": "凯蒂发现一块中间有一道闪亮白色条纹的石头，爸爸告诉她那是石英——地球上最丰富的矿物之一，最常见的颜色是透明或白色。"}}, {"q": {"en": "At the end, what does Katie decide to do with her 'collection'?", "zh": "在结尾，凯蒂决定怎么处理她的“收藏”？"}, "options": [{"en": "Bring every item home in her backpack", "zh": "把每件东西都装进背包带回家"}, {"en": "Keep the whole forest as her collection since it is too big to carry", "zh": "把整片森林当作她的收藏，因为它太大带不回家"}, {"en": "Give it all to the chipmunk", "zh": "把全部送给那只花栗鼠"}, {"en": "Throw it all in the trash", "zh": "把全部扔进垃圾桶"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "After emptying her pack, Katie says the rest of her collection is 'too big to bring home in my backpack,' so she will 'keep it all right here' in the forest.", "zh": "把背包清空后，凯蒂说她的收藏“太大了，装不进背包带回家”，所以她要“把全部都留在这里”——也就是整片森林。"}}, {"q": {"en": "What is the main lesson the author wants readers to learn?", "zh": "作者最想让读者明白的道理是什么？"}, "options": [{"en": "Always try to catch chipmunks", "zh": "一定要去抓花栗鼠"}, {"en": "Respect nature and leave natural things where you find them", "zh": "尊重自然，把自然里的东西留在原地"}, {"en": "Bring home as many souvenirs as possible", "zh": "尽可能多带纪念品回家"}, {"en": "Be afraid of bears in the woods", "zh": "要害怕森林里的熊"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "Through the father's words, the book teaches readers to be visitors who respect the woods ('treat the woods with respect') and to leave plants, animals, and stones where they belong.", "zh": "通过爸爸的话，这本书教读者要做一名尊重森林的访客（“以你希望别人对待你家的方式尊重树林”），并把植物、动物和石头留在它们本来的地方。"}}], "extended": {"prompt": {"en": "Katie's father taught her to leave natural objects where she found them. If you were hiking and found something beautiful in the forest, what would you do and why?", "zh": "凯蒂的爸爸教她把自然里的东西留在发现它们的地方。如果你去徒步时，在森林里发现了漂亮的东西，你会怎么做？为什么？"}, "guidance": {"en": "- Leaving plants, rocks, and animals in place protects the forest's balance.\n- Taking things can hurt the animals that depend on them for food.\n- Being a respectful visitor means enjoying nature without removing it.", "zh": "- 把植物、石头和动物留在原地，能保护森林的生态平衡。\n- 拿走东西会伤害依赖它们为食的动物。\n- 做一名有礼节的访客，意味着欣赏自然而不带走它。"}}};</script>
