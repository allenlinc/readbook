dge made to help animals cross safely over the road.", "zh": "它是一座动物桥，用来帮助动物安全穿越马路。"}, {"en": "It is a new highway for human cars only.", "zh": "它是一条仅供人类汽车使用的新高速公路。"}, {"en": "It is a dam built to hold back the forest river.", "zh": "它是一座用来拦住森林河流的水坝。"}, {"en": "It is a tall fence built to keep animals out.", "zh": "它是一道高高的围栏，用来把动物挡在外面。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Bear sees a picture of himself on a sign and realizes 'this bridge was made for us'; Moose says the humans made their bridge into an animal bridge.", "zh": "熊看到牌子上画着自己的画像，意识到'这座桥是为我们造的'；驼鹿说人类把桥变成了动物桥。"}}, {"q": {"en": "How do the animals realize the bridge was actually built for them?", "zh": "动物们是如何意识到这座桥其实是专为它们而建的？"}, "options": [{"en": "They see a picture of Bear on a sign by the road beneath the bridge.", "zh": "它们看到桥下路边一块牌子上画着熊（Bear）的画像。"}, {"en": "A human comes and tells them in person.", "zh": "一个人类当面告诉了它们。"}, {"en": "They read about it in a newspaper.", "zh": "它们在报纸上读到了这件事。"}, {"en": "Blue Jay flies over and reads them a letter.", "zh": "蓝松鸦飞过去读了一封信给它们听。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Bear says 'That's a picture of me! I think this bridge was made for us' when he sees the sign the workers placed by the road beneath the bridge.", "zh": "熊看到工人在桥下路边立的牌子时说：'那张画的是我！我想这座桥是为我们造的。'"}}, {"q": {"en": "Why does the author include the animals' failed attempts (Rabbit's cracked tooth, Moose getting dizzy, Skunk's spray not working)?", "zh": "作者为什么要写动物们失败的尝试（兔子牙齿裂了、驼鹿头晕、臭鼬的喷雾没用）？"}, "options": [{"en": "To show the animals misunderstood the humans and build up the surprise that the humans were actually helping them.", "zh": "为了说明动物们误解了人类，并为'人类其实在帮助他们'这个惊喜做铺垫。"}, {"en": "To prove that the animals were too lazy to finish their plans.", "zh": "为了证明动物们太懒，没把计划完成。"}, {"en": "To suggest the humans were evil and had to be stopped.", "zh": "为了表明人类是邪恶的，必须被阻止。"}, {"en": "To explain how animals build their own tools.", " re one of the animals in the story. Write a friendly letter to the humans telling them how you felt about the bridge before you understood it, and how you feel now that you know it was built to help you. (Based on the book's Writing activity.)", "zh": "假设你是故事里的某只动物。写一封给人类的友好信件，告诉他们你在理解这座桥之前对它的感受，以及现在知道它是为帮助你们而建之后的感受。（基于本书的'写作'活动。）"}, "guidance": {"en": ["Describe the animals' first feelings: worried, angry, and defeated because they thought the humans were destroying their homes.", "Explain the turning point: seeing the signs and the picture of Bear beneath the bridge.", "End with how the animals feel now: happy, safe, and thankful for the animal bridge.", "Use 'before' and 'after' to organize the letter."], "zh": ["描述动物最初的感受：担心、愤怒、挫败，因为它们以为人类在毁掉家园。", "说明转折点：看到桥下的牌子和熊的画像。", "以动物现在的感受结尾：开心、安全、感谢这座动物桥。", "用'之前'和'之后'来组织这封信。"]}}};</script>
