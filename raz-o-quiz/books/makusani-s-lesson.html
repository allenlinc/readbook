<script>window.BOOK = {"slug": "makusani-s-lesson", "title": "Makusani's Lesson", "titleZh": "马库萨尼的教训", "level": "O", "genre": "Folk Tale", "mainSkill": "Author's Purpose and Perspective", "questions": [{"q": {"en": "Where does this folktale come from?", "zh": "这个民间故事来自哪里？"}, "options": [{"en": "The Yekuana people of Venezuela", "zh": "委内瑞拉的耶库阿纳人"}, {"en": "A town in modern Canada", "zh": "现代加拿大的一座城镇"}, {"en": "A city in Japan", "zh": "日本的一座城市"}, {"en": "The deserts of Egypt", "zh": "埃及的沙漠"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says it is 'A Folktale of the Yekuana of Venezuela' and is based on their creation myths along the Upper Orinoco River.", "zh": "书上说这是“委内瑞拉耶库阿纳人的民间故事”，取材于他们生活在奥里诺科河上游一带的创世神话。"}}, {"q": {"en": "What does Makusani's mother tell him before he leaves to hunt?", "zh": "马库萨尼出发去打猎前，妈妈叮嘱了他什么？"}, "options": [{"en": "To bring home a frog", "zh": "带一只青蛙回家"}, {"en": "To be careful and stay on the trails", "zh": "要小心，并走在小路上"}, {"en": "To never speak to anyone", "zh": "绝对不要和任何人说话"}, {"en": "To paddle a canoe down the river", "zh": "划着独木舟顺流而下"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Makusani's mother tells him 'to be careful and to stay on the trails' as he leaves the village to hunt in the mountains.", "zh": "马库萨尼离开村子去山里打猎时，妈妈嘱咐他“要小心，并走在小路上”。"}}, {"q": {"en": "What happens when Makusani first meets the girl in the canoe?", "zh": "马库萨尼第一次遇到独木舟里的女孩时，发生了什么？"}, "options": [{"en": "She invites him to dinner", "zh": "她邀请他吃晚饭"}, {"en": "She turns into a frog and hops away", "zh": "她变成一只青蛙，跳着逃走了"}, {"en": "She gives him her blowgun", "zh": "她把自己的吹箭筒递给他"}, {"en": "She paddles him home", "zh": "她划船送他回家"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "When Makusani chases the girl, she turns into a frog, hops away, and he cannot catch her.", "zh": "马库萨尼追赶那个女孩时，她变成一只青蛙，一跳一跳地逃走了，他怎么也抓不到。"}}, {"q": {"en": "What does the story's use of characters who turn into animals (frog, bird, otter, snake) show about its kind?", "zh": "故事中人物会变成动物（青蛙、鸟、水獭、蛇），这说明了它属于什么类型的故事？"}, "options": [{"en": "It is a scientific report", "zh": "它是一份科学报告"}, {"en": "It is a folktale with magical transformations", "zh": "它是一个带有神奇变形的民间故事"}, {"en": "It is a history textbook", "zh": "它是一本历史教科书"}, {"en": "It is a book of real photographs", "zh": "它是一本真实照片集"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The repeated magical change of people into animals (the girl into a frog, Huenna into a tinamou, Nanudi into an otter, the Sun Girl into a boa) marks the story as a folktale full of magic.", "zh": "书中人物一次次神奇地变成动物（女孩变青蛙、维纳变鹤鸵、纳努迪变水獭、太阳姑娘变蟒蛇），这标志着它是一个充满魔法的民间故事。"}}, {"q": {"en": "Who is Huenna, and what does she turn into?", "zh": "维纳（Huenna）是谁，她变成了什么？"}, "options": [{"en": "A younger boy who becomes a frog", "zh": "一个年纪更小的男孩，变成了青蛙"}, {"en": "An older girl who becomes a tinamou bird", "zh": "一个年纪稍大的女孩，变成了一只鹤鸵鸟"}, {"en": "Makusani's mother as a deer", "zh": "马库萨尼的妈妈，变成了一只鹿"}, {"en": "The Sun, appearing as an otter", "zh": "太阳，化作水獭出现"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Huenna is a girl a few years older than Makusani who offers to help him. When he plays a trick by putting a beetle on her arm, she becomes angry and turns into a tinamou bird and flies away.", "zh": "维纳是一个比马库萨尼稍大几岁的女孩，主动提出帮他。当马库萨尼恶作剧把一只甲虫放在她手臂上时，她很生气，变成一只鹤鸵鸟飞走了。"}}, {"q": {"en": "How is the boa constrictor that climbs the tree connected to an earlier part of the story?", "zh": "爬上树的蟒蛇，和故事前面哪一段有关系？"}, "options": [{"en": "It is the same snake Makusani released from Nanudi's bag", "zh": "它就是马库萨尼从纳努迪的袋子里放出来的那条蛇"}, {"en": "It is a different snake that ate the frog", "zh": "是另一条吃掉了青蛙的蛇"}, {"en": "It is Makusani's lost blowgun", "zh": "它是马库萨尼丢失的吹箭筒"}, {"en": "It is the deer from the river", "zh": "它是溪流边的那只鹿"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The snake is the boa constrictor that came out of Nanudi's bag when Makusani opened it. It later turns into the Sun Girl and says 'Because you released me, I will assist you in getting home.'", "zh": "这条蛇就是马库萨尼打开纳努迪的袋子时钻出来的那条蟒蛇。后来它变成太阳姑娘，说“因为你放了我，我会帮你回家”。"}}, {"q": {"en": "Why does the Sun Girl agree to help Makusani get home?", "zh": "太阳姑娘为什么答应帮马库萨尼回家？"}, "options": [{"en": "Because he caught the frog for her", "zh": "因为他替她抓住了青蛙"}, {"en": "Because he released her from the bag", "zh": "因为他把她从袋子里放了出来"}, {"en": "Because he gave her his blowgun", "zh": "因为他把吹箭筒给了她"}, {"en": "Because his mother invited her to dinner", "zh": "因为他妈妈请她吃晚饭"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The Sun Girl says, 'Because you released me, I will assist you in getting home,' referring to Makusani opening Nanudi's bag and letting the boa (her) out.", "zh": "太阳姑娘说：“因为你放了我，我会帮你回家。”指的就是马库萨尼打开纳努迪的袋子，把她（蟒蛇）放了出来。"}}, {"q": {"en": "What condition does the Sun Girl give Makusani for helping him?", "zh": "太阳姑娘帮马库萨尼提了什么条件？"}, "options": [{"en": "He must never return to the village", "zh": "他永远不能回村子"}, {"en": "He must always think about how his actions affect others", "zh": "他必须一直想着自己的行为会怎样影响别人"}, {"en": "He must give her the beetle", "zh": "他必须把甲虫交给她"}, {"en": "He must learn to paddle a canoe", "zh": "他必须学会划独木舟"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The Sun Girl sets one condition: 'You must always think about how your actions will affect others,' which is the heart of the story's lesson.", "zh": "太阳姑娘提了一个条件：“你必须一直想着自己的行为会怎样影响别人。”这正是这个故事想要传达的核心教训。"}}, {"q": {"en": "What is the main lesson, or moral, of Makusani's story?", "zh": "马库萨尼这个故事主要的教训或寓意是什么？"}, "options": [{"en": "Always stay lost in the forest", "zh": "永远在森林里迷路"}, {"en": "Think before you act and consider how you affect others", "zh": "做事前先想一想，考虑自己会怎样影响别人"}, {"en": "Catch as many frogs as possible", "zh": "尽可能多地抓青蛙"}, {"en": "Never talk to girls", "zh": "永远不要和女孩说话"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "Makusani keeps getting lost because of careless tricks (chasing the frog, the beetle, opening the bag). The Sun Girl's condition teaches him to think about how his actions affect others.", "zh": "马库萨尼因为一次次冒失的恶作剧（追青蛙、放甲虫、打开袋子）不断迷路。太阳姑娘的条件教他要思考自己的行为会怎样影响别人。"}}, {"q": {"en": "How does the story end for the Sun Girl?", "zh": "故事的结尾，太阳姑娘怎么样了？"}, "options": [{"en": "She stays for dinner and becomes a sister", "zh": "她留下吃晚饭，成了妹妹"}, {"en": "She turns back into a boa constrictor and slides into the forest", "zh": "她变回蟒蛇，溜进了森林"}, {"en": "She marries Makusani", "zh": "她嫁给了马库萨尼"}, {"en": "She paddles the canoe home", "zh": "她划着独木舟回家了"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "After walking Makusani home and being thanked, just as his mother is about to invite her to stay for dinner, the Sun Girl turns back into a boa constrictor and slithers into the forest.", "zh": "太阳姑娘把马库萨尼送回家、接受道谢后，就在他妈妈正要请她留下吃晚饭时，变回一条蟒蛇，溜进了森林。"}}], "extended": {"prompt": {"en": "Makusani's lesson was to think about how his actions affect others. Tell about a time you acted without thinking, or describe one way you could show you care about how others feel.", "zh": "马库萨尼学到的教训是：要想到自己的行为会怎样影响别人。讲讲你曾经没经过思考就行动的一次经历，或者说说你可以用什么方式来表达你关心别人的感受。"}, "guidance": {"en": "- Our actions can cause problems for other people, even by accident.\n- Thinking first helps us avoid hurting others.\n- Small kind choices show respect for those around us.", "zh": "- 我们的行为哪怕是无意的，也可能给别人带来麻烦。\n- 先想一想，能帮我们避免伤害别人。\n- 小小的善意选择，就是对身边人的尊重。"}}};</script>
