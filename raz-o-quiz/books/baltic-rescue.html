e main feeling or message the author wants readers to take from Baltic's story?", "zh": "作者想让读者从 Baltic 的故事中体会到的主要情感或主旨是什么？"}, "options": [{"en": "That kindness and teamwork can turn a lonely, dangerous situation into safety and friendship", "zh": "善意与团队合作能把孤独危险的处境变成安全与友谊"}, {"en": "That dogs should never go near rivers", "zh": "狗绝不该靠近河流"}, {"en": "That the Baltic Sea is too cold for ships", "zh": "波罗的海对船只来说太冷"}, {"en": "That firefighters are not helpful", "zh": "消防员没有用"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The story contrasts Baltic's start (cold, wet, alone) with his end (warm, dry, with new friends), showing rescue through care and teamwork.", "zh": "故事把 Baltic 的开始（寒冷、湿透、孤独）和结局（温暖、干爽、有了新朋友）作对比，展现了关爱与团队合作带来的救援。"}}, {"q": {"en": "What happened to Baltic after he was rescued and brought to port?", "zh": "Baltic 被救并带回港口后，发生了什么？"}, "options": [{"en": "A vet checked him, his owners were never found, Adam adopted him, and he became the ship's mascot", "zh": "兽医检查了他，始终没找到主人，Adam 领养了他，他成了船上的吉祥物"}, {"en": "He was returned to the wild immediately", "zh": "他立刻被放回野外"}, {"en": "He was sent to the president of Poland", "zh": "他被送给了波兰总统"}, {"en": "He swam back to the ice", "zh": "他游回了冰上"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The vet found no serious injuries; after weeks of searching, owners weren't found, so Adam adopted Baltic, who became the ship's mascot.", "zh": "兽医检查后确认没有严重伤势；找了几个星期也没找到主人，于是 Adam 领养了 Baltic，他成了船上的吉祥物。"}}], "extended": {"prompt": {"en": "Baltic was saved because strangers worked together. Think of a time you or someone you know helped an animal or a person in trouble. What did teamwork make possible?", "zh": "Baltic 之所以得救，是因为陌生人通力合作。想一想你或你认识的人帮助动物或他人的一次经历。团队合作让什么成为可能？"}, "guidance": {"en": "• Describe the problem and who was in danger (like Baltic on the melting ice).\n• Tell what each helper did (firefighters, the Baltica crew, Adam).\n• Explain how working together achieved what one
