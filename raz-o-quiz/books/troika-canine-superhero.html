ions.", "zh": "故事表明，一只只有三条腿却忠诚勇敢的狗，用行动证明了自己是真正的超级英雄。"}}], "extended": {"prompt": {"en": "The boy says his three-legged dog became a superhero by saving his life three times. Think about a time when you, a pet, or a friend showed bravery. What made that act heroic?", "zh": "男孩说他的三条腿狗狗通过三次救他的命成为了超级英雄。想一想你、你的宠物或朋友表现出勇敢的时刻。是什么让那个行为堪称英雄之举？"}, "guidance": {"en": "• The dog showed bravery by facing a bear, pulling the sled from icy water, and standing up to a moose.\n• A hero can be someone who helps others even when it is dangerous or hard.\n• Courage is not about being perfect or un-hurt, but about not giving up (like Dog on three legs).", "zh": "• 狗狗的勇敢体现在面对熊、把雪橇从冰水中拉出、以及挺身对抗驼鹿。\n• 英雄可以是即使在危险或困难时仍帮助他人的人。\n• 勇气不在于完美或无伤，而在于永不放弃（就像三条腿的狗狗）。"}}};</script>
