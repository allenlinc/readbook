者。"}}, {"q": {"en": "The book gives first-aid steps for jellyfish stings: rinse with seawater (NOT fresh water) and apply white vinegar. What can you conclude from these steps?", "zh": "书中给出了水母蜇伤的急救步骤：用海水冲洗（不是淡水）并涂抹白醋。从这些步骤可以得出什么结论？"}, "options": [{"en": "Fresh water and the right treatment matter; vinegar helps and should be used, not ice or rubbing", "zh": "淡水和正确治疗很重要；白醋有帮助，应使用白醋而非冰敷或揉搓"}, {"en": "Fresh water is the best thing to use", "zh": "淡水是最好的处理方式"}, {"en": "You should rub the wound hard", "zh": "你应该用力揉搓伤口"}, {"en": "Ice should be applied right away", "zh": "应该立刻敷冰"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book warns against fresh water, rubbing, and ice, and tells readers to rinse with seawater and apply white vinegar, showing careful, specific first-aid guidance.", "zh": "书中提醒不要用淡水、不要揉搓、不要敷冰，并告诉读者用海水冲洗、涂抹白醋，体现出细致、具体的急救指导。"}}, {"q": {"en": "The book says jellyfish have survived for 650 million years, since before dinosaurs, and that 'even without brains, your cousins must be pretty smart to have survived for millions of years.' What point is the author making?", "zh": "书中说水母已经存活了6.5亿年——比恐龙还早——并且“即使没有大脑，你的亲戚们能存活数百万年，一定相当聪明”。作者想表达什么？"}, "options": [{"en": "Jellyfish are very successful survivors, even though they lack a brain", "zh": "水母尽管没有大脑，却是极其成功的幸存者"}, {"en": "Jellyfish are actually mammals", "zh": "水母其实是哺乳动物"}, {"en": "Jellyfish are going extinct very soon", "zh": "水母很快就要灭绝了"}, {"en": "Only fish can survive that long", "zh": "只有鱼才能存活那么久"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The author notes jellyfish have lived for hundreds of millions of years without brains, highlighting how well-adapted and successful they are as survivors.", "zh": "作者指出水母没有大脑却存活了数亿年，强调它们适应环境的能力之强，是极其成功的幸存者。"}}, {"q": {"en": "What is the author's main purpose in writing You're a Jellyfish!?", "zh": "作者写《你是一只水母！》的主要目的是什么？"}, "options": [{"en": "To teach readers about jellyfish in a fun, imaginative way", "zh": "为了以有趣、富有想象力的方式向读者介绍水母"}, {"en": "To sell jellyfish as pets", "zh": "为了把水母当宠物卖"}, {"en": "To prove jellyfish are dangerous to everyone", "zh": "为了证明水母对所有人都有危险"}, {"en": "To explain how to build an aquarium", "zh": "为了解释如何建造水族馆"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book uses a playful second-person voice and clear facts to inform readers about jellyfish bodies, life cycle, and habits in an engaging way.", "zh": "本书用俏皮的第二人称口吻和清晰的事实，吸引人地向读者介绍水母的身体、生命周期和习性。"}}, {"q": {"en": "The book warns that even a dead jellyfish can still sting and gives detailed treatment steps. What is the author's purpose for including this safety information?", "zh": "书中警告即使死去的水母仍可能蜇人，并给出详细的治疗步骤。作者加入这些安全信息的目的是什么？"}, "options": [{"en": "To help keep readers safe around jellyfish", "zh": "为了帮助读者在水母周围保持安全"}, {"en": "To scare readers away from the ocean", "zh": "为了让读者不敢去海边"}, {"en": "To sell medicine", "zh": "为了卖药"}, {"en": "To end the book quickly", "zh": "为了快速结束全书"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "By warning that dead jellies can sting and listing first-aid steps, the author shows care for readers' safety, not just sharing facts.", "zh": "作者警告死水母也会蜇人并列出急救步骤，表现出对读者安全的关怀，而不仅仅是分享事实。"}}], "extended": {"prompt": {"en": "Jellyfish have survived for 650 million years without a brain, heart, or bones. What can we learn from animals like jellyfish about surviving and adapting in the world?", "zh": "水母没有大脑、心脏或骨头，却存活了6.5亿年。从水母这样的动物身上，我们能学到关于在世界中生存和适应的什么？"}, "guidance": {"en": ["Jellyfish survive by drifting with ocean currents and using simple body parts (water, muscles, nerves).", "They have few needs and adapt to many ocean environments (warm, cold, deep, surface).", "Some use stinging cells or glowing to catch food or protect themselves.", "Think about how 'simple' designs can still be very successful over time."], "zh": ["水母靠随海流漂浮生存，只用简单的身体部位（水、肌肉、神经）。", "它们需求很少，能适应多种海洋环境（温暖、寒冷、深海、表层）。", "有些用水母的刺细胞或发光来捕食或保护自己。", "想一想“简单”的结构为何能在漫长岁月中依然非常成功。"]}}};</script>
