<script>window.BOOK = {"slug": "looking-for-bigfoot", "title": "Looking for Bigfoot", "titleZh": "寻找大脚怪", "level": "O", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Where does the name 'Bigfoot' come from?", "zh": "“大脚怪（Bigfoot）”这个名字是怎么来的？"}, "options": [{"en": "the big ears it has", "zh": "它有一对大耳朵"}, {"en": "the huge footprints it leaves behind", "zh": "它留下的巨大脚印"}, {"en": "its loud roar", "zh": "它响亮的吼声"}, {"en": "the town where it was first seen", "zh": "它首次被看到的那个小镇"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says Bigfoot gets its name from the huge footprints it leaves behind.", "zh": "书中说，大脚怪因其留下的巨大脚印而得名。"}}, {"q": {"en": "According to the book, about how tall and heavy is Bigfoot said to be?", "zh": "根据本书，大脚怪据称大约有多高、多重？"}, "options": [{"en": "3 to 4 feet tall and 100 pounds", "zh": "3到4英尺高，100磅重"}, {"en": "6 to 9 feet tall and over 500 pounds", "zh": "6到9英尺高，超过500磅重"}, {"en": "2 feet tall and 10 pounds", "zh": "2英尺高，10磅重"}, {"en": "12 feet tall and 1,000 pounds", "zh": "12英尺高，1000磅重"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The 'What Is Bigfoot?' section says Bigfoot is said to be between six and nine feet tall and weigh more than five hundred pounds.", "zh": "“什么是大脚怪？”一节说，大脚怪据称身高在6到9英尺之间，体重超过500磅。"}}, {"q": {"en": "Who made the first recorded Bigfoot sighting in AD 986?", "zh": "公元986年，是谁记录了首次大脚怪目击事件？"}, "options": [{"en": "Roger Patterson", "zh": "罗杰·帕特森"}, {"en": "Jeffery Meldrum", "zh": "杰弗里·梅尔德鲁姆"}, {"en": "Leif Ericson", "zh": "莱夫·埃里克松"}, {"en": "a scientist in Congo", "zh": "刚果的一位科学家"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "The book says the first recorded sighting was in AD 986 by Leif Ericson, the early Viking explorer.", "zh": "书中说，首次有记录的目击发生在公元986年，由早期维京探险家莱夫·埃里克松记载。"}}, {"q": {"en": "What is the most famous film of Bigfoot, and when and where was it taken?", "zh": "最著名的大脚怪影片是在何时何地拍摄的？"}, "options": [{"en": "1950 in England", "zh": "1950年，英格兰"}, {"en": "1967 in Bluff Creek, California", "zh": "1967年，加利福尼亚州的布拉夫溪"}, {"en": "2006 in the Congo", "zh": "2006年，刚果"}, {"en": "2012 in Japan", "zh": "2012年，日本"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says the most famous footage was taken in 1967 in Bluff Creek, California, by Roger Patterson.", "zh": "书中说，最著名的影片是1967年由罗杰·帕特森在加利福尼亚州的布拉夫溪拍摄的。"}}, {"q": {"en": "The author includes the lesula monkey (found in 2012) and the giant squid (no photos until 2006) to show what?", "zh": "作者提到莱斯乌拉猴（2012年发现）和巨型乌贼（直到2006年才有照片）是为了说明什么？"}, "options": [{"en": "that monkeys are bigger than Bigfoot", "zh": "猴子比大脚怪更大"}, {"en": "that new or hard-to-find animals are still being discovered, so Bigfoot could be real", "zh": "新物种或难以发现的动物仍在不断被发现，所以大脚怪可能是真实的"}, {"en": "that the giant squid is a hoax", "zh": "巨型乌贼是个骗局"}, {"en": "that Africa has the most animals", "zh": "非洲的动物最多"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The book uses these examples to argue that new species are still being discovered, which keeps open the possibility that Bigfoot is real.", "zh": "书中用这些例子来论证新物种仍在不断被发现，从而使大脚怪真实存在的可能性保持开放。"}}, {"q": {"en": "The book says 'cryptozoology' comes from two word parts. What do they mean?", "zh": "书中说“cryptozoology（神秘动物学）”由两个词根组成。它们是什么意思？"}, "options": [{"en": "'crypto' = hidden, 'zoology' = study of animals", "zh": "“crypto”=隐藏的，“zoology”=动物研究"}, {"en": "'crypto' = big, 'zoology' = study of plants", "zh": "“crypto”=大的，“zoology”=植物研究"}, {"en": "'crypto' = fake, 'zoology' = study of rocks", "zh": "“crypto”=假的，“zoology”=岩石研究"}, {"en": "'crypto' = forest, 'zoology' = study of water", "zh": "“crypto”=森林，“zoology”=水的研究"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The book explains the term comes from 'crypto,' meaning 'hidden,' and 'zoology,' the study of animals.", "zh": "书中解释该词来自“crypto”（意为“隐藏的”）和“zoology”（动物学，即动物的研究）。"}}, {"q": {"en": "The book describes two popular theories about what Bigfoot might be. What are they?", "zh": "书中描述了关于大脚怪可能是何物的两种流行理论。它们是什么？"}, "options": [{"en": "a dinosaur and a dragon", "zh": "恐龙和龙"}, {"en": "Gigantopithecus (a giant ape) and Neanderthals", "zh": "巨猿（一种巨型猿类）和尼安德特人"}, {"en": "a bear and a wolf", "zh": "熊和狼"}, {"en": "an alien and a ghost", "zh": "外星人和鬼魂"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The 'Bigfoot Theories' section presents Gigantopithecus, a giant ape, and Neanderthals as the two popular theories.", "zh": "“大脚怪理论”一节提出了两种流行理论：巨猿（一种巨型猿类）和尼安德特人。"}}, {"q": {"en": "Plaster casts of Bigfoot footprints show skin patterns like fingerprints found on humans and other primates. What does this suggest?", "zh": "大脚怪脚印的石膏模型显示出类似指纹的皮肤纹路，存在于人类和其他灵长类动物身上。这说明了什么？"}, "options": [{"en": "The prints were made by a machine.", "zh": "这些脚印是机器留下的。"}, {"en": "The prints come from a real creature, though its pattern matches no known primate.", "zh": "这些脚印来自一种真实生物，但其纹路与任何已知的灵长类都不相同。"}, {"en": "They were made by a human wearing shoes.", "zh": "它们是一个穿鞋的人留下的。"}, {"en": "Bigfoot has no skin patterns.", "zh": "大脚怪没有皮肤纹路。"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says the casts show skin patterns like those of humans and primates, 'but the patterns found on the Bigfoot prints are like no other primate's we know of,' suggesting a real unknown creature.", "zh": "书中说石膏模型显示出与人类和灵长类相似的皮肤纹路，“但大脚怪脚印上的纹路与我们已知的任何灵长类都不同”，暗示这是一种未知的真实性生物。"}}, {"q": {"en": "The book is written in a fun, first-person style (a kid setting a trap). What is the author's main purpose?", "zh": "本书采用了有趣的第一人称风格（一个孩子设下陷阱）。作者的主要目的是什么？"}, "options": [{"en": "to scare readers with a horror story", "zh": "用一个恐怖故事吓唬读者"}, {"en": "to explore the mystery of Bigfoot and present evidence and theories about whether it is real", "zh": "探索大脚怪之谜，并呈现关于它是否真实存在的证据与理论"}, {"en": "to teach how to build traps", "zh": "教读者如何制作陷阱"}, {"en": "to prove Bigfoot definitely exists", "zh": "证明大脚怪一定存在"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book mixes a playful story with facts, evidence, and theories, inviting readers to explore whether Bigfoot might be real.", "zh": "本书将有趣的故事与事实、证据和理论结合在一起，引导读者探索大脚怪是否可能真实存在。"}}, {"q": {"en": "How does the book treat the question 'Is Bigfoot real?'", "zh": "对于“大脚怪是真的吗？”这个问题，本书持什么态度？"}, "options": [{"en": "It gives a definite yes.", "zh": "它给出了肯定的答案。"}, {"en": "It gives a definite no.", "zh": "它给出了否定的答案。"}, {"en": "It presents evidence and theories but leaves the question open.", "zh": "它呈现了证据和理论，但让问题保持开放。"}, {"en": "It says only children believe in it.", "zh": "它说只有儿童才相信它。"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book shares sightings, film, footprint evidence, and two theories, but notes no bones have been found, leaving whether Bigfoot is real unanswered.", "zh": "本书展示了目击、影片、脚印证据和两种理论，但也指出从未发现骨骼，从而让大脚怪是否真实存在的问题悬而未决。"}}], "extended": {"prompt": {"en": "The book presents evidence (footprints, film) and theories about Bigfoot. Do you think Bigfoot is real? Use evidence from the book to explain your opinion.", "zh": "书中提供了关于大脚怪的证据（脚印、影片）和各种理论。你认为大脚怪是真实存在的吗？请结合书中的证据来解释你的看法。"}, "guidance": {"en": "- Evidence FOR: sightings for hundreds of years worldwide, huge footprints with unique skin patterns, a famous 1967 film no one proved fake, new animals still being discovered.\n- Theories: Gigantopithecus or Neanderthals surviving today.\n- Evidence AGAINST: no bones ever found; some think it is a hoax (gorilla suits).\n- Encourage the child to form an opinion backed by book details, not just a guess.", "zh": "- 支持的证据：数百年来世界各地的目击、带独特皮肤纹路的巨大脚印、1967年未被证伪的著名影片、新物种仍不断被发现。\n- 理论：大脚怪可能是幸存的大型猿类（巨猿）或尼安德特人。\n- 反对的证据：从未发现骨骼；有人认为这是骗局（穿猩猩装）。\n- 鼓励孩子结合书中细节而非凭空形成观点。"}}};</script>
