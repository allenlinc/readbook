en": "Bees boil the nectar in the sun", "zh": "蜜蜂在阳光下把花蜜煮开"}, {"en": "Bees mix nectar with wax from their bellies", "zh": "蜜蜂把花蜜和肚子上的蜡混合"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Buzz says bees make honey from nectar: the bee eats nectar into her honey stomach, spits it out at the hive, and bees fan their wings to thicken it by evaporation.", "zh": "Buzz 说蜜蜂用花蜜酿蜜：蜜蜂把花蜜吃进蜜胃，回巢后吐出来，其他蜜蜂扇动翅膀让水分蒸发，使蜜变浓。"}}, {"q": {"en": "How is this book organized to help readers find information?", "zh": "这本书是如何组织编排，以帮助读者查找信息的？"}, "options": [{"en": "It uses a Table of Contents and section headings like 'The Work of a Beekeeper' and 'Making Honey'", "zh": "它用目录和各小节标题，如'养蜂人的工作'和'酿造蜂蜜'"}, {"en": "It is one long unbroken story with no headings", "zh": "它是一个没有标题的连续长篇故事"}, {"en": "It is written as a poem", "zh": "它是以诗歌形式写的"}, {"en": "It jumps between unrelated countries with no order", "zh": "它无顺序地在无关国家间跳跃"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The Table of Contents lists clear sections - The Work of a Beekeeper, Life in the Hive, Types of Bees, and Making Honey - so readers can locate topics.", "zh": "目录列出了清晰的小节——养蜂人的工作、蜂巢里的生活、蜜蜂的种类、酿造蜂蜜——方便读者查找主题。"}}, {"q": {"en": "The book includes 'Do You Know?' boxes and a glossary. What is their purpose?", "zh": "书中包含'你知道吗？'小栏和词汇表。它们的作用是什么？"}, "options": [{"en": "To share extra fun facts and explain difficult words, helping readers understand", "zh": "用来补充有趣的冷知识并解释难词，帮助读者理解"}, {"en": "To advertise honey products for sale", "zh": "为了推销蜂蜜产品"}, {"en": "To list the page numbers only", "zh": "仅仅为了列出页码"}, {"en": "To replace the interview questions", "zh": "用来取代采访中的问题"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "'Do You Know?' boxes add interesting facts (like honey never spoiling), and the glossary defines hard words such as anther and pistil, supporting the reader.", "zh": "'你知道吗？'小栏补充了有趣的事实（如蜂蜜永不腐坏），词汇表解释了雄蕊、雌蕊等难词，帮助读者理解。"}}, {"q": {"en": "Buzz says the 'biggest purpose of bees' is not making honey but pollinating crops. Which crops does he name?", "zh": "Buzz 说蜜蜂'最大的作用'不是酿蜜，而是为作物授粉。他提到了哪些作物？"}, "options": [{"en": "Alfalfa (animal feed), melons, and almonds", "zh": "苜蓿（牲畜饲料）、甜瓜和杏仁"}, {"en": "Wheat, rice, and corn", "zh": "小麦、稻米和玉米"}, {"en": "Only apples", "zh": "只有苹果"}, {"en": "Potatoes and tomatoes", "zh": "土豆和西红柿"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Buzz states that bees pollinate crops like alfalfa, melons, and almonds, which is more important than the honey they make.", "zh": "Buzz 说蜜蜂为苜蓿、甜瓜、杏仁等作物授粉，这比它们酿的蜜更重要。"}}, {"q": {"en": "The book says honey never spoils. What scientific reason does it give?", "zh": "书中说蜂蜜永远不会变质。它给出的科学原因是什么？"}, "options": [{"en": "Honey has too much acid, which is antibacterial, so bacteria cannot grow in it", "zh": "蜂蜜酸性太强，具有抗菌性，所以细菌无法在其中生长"}, {"en": "Honey is kept in the freezer", "zh": "蜂蜜被存放在冰箱里"}, {"en": "Honey is made of wax", "zh": "蜂蜜是由蜡构成的"}, {"en": "Honey contains no sugar", "zh": "蜂蜜不含糖"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book explains that bacteria don't grow in honey because it has too much acid; the acid is antibacterial, so honey never spoils.", "zh": "书中解释说，细菌无法在蜂蜜中生长，因为蜂蜜酸性太强；这种酸具有抗菌性，所以蜂蜜永不腐坏。"}}, {"q": {"en": "Why does the author present this book as an interview with a real beekeeper?", "zh": "作者为什么把这本书写成对一位真实养蜂人的采访？"}, "options": [{"en": "To teach real facts about bees in a friendly, conversational way through an expert", "zh": "通过一个专家，以亲切、对话的方式传授关于蜜蜂的真实知识"}, {"en": "To tell a made-up fairy tale", "zh": "为了讲一个虚构的童话"}, {"en": "To sell beekeeping suits", "zh": "为了卖养蜂服"}, {"en": "To argue that bees are dangerous", "zh": "为了论证蜜蜂很危险"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Presenting the information as an interview with expert Buzz lets readers learn true, detailed facts about bees in an easy, friendly style.", "zh": "把内容写成对专家 Buzz 的采访，让读者以轻松亲切的方式学到关于蜜蜂的真实、详尽的知识。"}}, {"q": {"en": "What point does Buzz make about Africanized ('killer') bees compared to regular honeybees?", "zh": "关于非洲化（'杀人蜂'）蜜蜂与普通蜜蜂，Buzz 想表达什么观点？"}, "options": [{"en": "They are the same kind of bee that does the same job; the only real difference is where they come from and that they are easily angered", "zh": "它们是同一种蜜蜂、做同样的工作；真正的区别只在于产地以及它们容易发怒"}, {"en": "They make a different, poisonous honey", "zh": "它们酿出不同且有毒的蜂蜜"}, {"en": "They cannot pollinate flowers", "zh": "它们无法为花朵授粉"}, {"en": "They live only in Europe", "zh": "它们只生活在欧洲"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Buzz explains there is no difference other than where they come from; Africanized bees do the same job as honeybees but are easily riled up.", "zh": "Buzz 解释说，除了产地不同，二者并无区别；非洲化蜜蜂和普通蜜蜂做同样的工作，只是更容易被激怒。"}}, {"q": {"en": "How does Buzz remove honey from the honeycomb?", "zh": "Buzz 是如何把蜂蜜从蜂巢里取出来的？"}, "options": [{"en": "He cuts off the wax cap, spins the frame in a machine so honey flies out, then heats and filters it into jars", "zh": "他割下蜡盖，把巢框放进机器旋转让蜂蜜甩出，再加热过滤装瓶"}, {"en": "He melts the whole comb in the oven", "zh": "他把整个蜂巢放进烤箱熔化"}, {"en": "He asks the bees to carry it out one drop at a time", "zh": "他让蜜蜂一滴一滴把蜜搬出来"}, {"en": "He washes the comb with water", "zh": "他用水冲洗蜂巢"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Buzz cuts off the wax capping, puts the frame in a spinning machine so honey flies out, gives the comb back to the bees, then heats, filters, and jars the honey.", "zh": "Buzz 割下蜡盖，把巢框放进旋转机器让蜂蜜甩出，把巢框还给蜜蜂，然后加热、过滤并把蜂蜜装瓶。"}}], "extended": {"prompt": {"en": "Buzz says bees pollinate crops like apples and almonds. Choose one food you eat and find out whether bees help make it possible. Why are bees important to your meal?", "zh": "Buzz 说蜜蜂为苹果、杏仁等作物授粉。选一种你吃的食物，查一查蜜蜂是否帮助它长出来。蜜蜂对你的饭菜为什么重要？"}, "guidance": {"en": "• Think about foods that come from flowers or fruit (apples, almonds, melons, berries).\n• Remember pollination happens when a bee carries pollen from one flower's anther to another's pistil.\n• Not all foods need bees (grains like wheat do not), so check whether the plant flowers.\n• Connect your chosen food back to Buzz's point that bees' biggest job is pollination.", "zh": "• 想想那些来自花朵或果实的食物（苹果、杏仁、甜瓜、浆果）。\n• 记住：当蜜蜂把花粉从一朵花的雄蕊带到另一朵花的雌蕊时，就完成了授粉。\n• 并非所有食物都需要蜜蜂（如小麦等谷物不需要），所以要看看这种植物是否开花。\n• 把你选的食物联系回 Buzz 的观点——蜜蜂最大的工作是授粉。"}}};</script>
