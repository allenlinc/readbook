<script>window.BOOK = {"slug": "the-shadow-people", "title": "The Shadow People", "titleZh": "影子人", "level": "O", "genre": "Fiction", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Where is Lila's class on a field trip?", "zh": "莉拉的班级去哪里进行实地考察？"}, "options": [{"en": "A museum.", "zh": "一家博物馆。"}, {"en": "The zoo.", "zh": "动物园。"}, {"en": "A library.", "zh": "图书馆。"}, {"en": "The rainforest.", "zh": "热带雨林。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says 'Lila's class was on a field trip at the zoo' and they were doing a report on penguins.", "zh": "书中说'莉拉的班级在动物园实地考察'，并且他们正在做关于企鹅的报告。"}}, {"q": {"en": "What did Lila notice that was strange about the other school group?", "zh": "莉拉注意到另一个学校的学生群体有什么奇怪的地方？"}, "options": [{"en": "They were very loud.", "zh": "他们非常吵闹。"}, {"en": "The children did not have shadows.", "zh": "那些孩子没有影子。"}, {"en": "They were eating penguins.", "zh": "他们在吃企鹅。"}, {"en": "They were completely invisible.", "zh": "他们完全隐身了。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Lila 'noticed another school group pass by. To her surprise, these children did not have shadows!'", "zh": "莉拉'注意到另一群学生走过。令她惊讶的是，这些孩子没有影子！'"}}, {"q": {"en": "What shiny object did Lila pick up from the ground?", "zh": "莉拉从地上捡起了什么发亮的东西？"}, "options": [{"en": "A penguin feather.", "zh": "一根企鹅羽毛。"}, {"en": "A pendant shaped like a hypercube.", "zh": "一个形状像超立方体的吊坠。"}, {"en": "A photograph.", "zh": "一张照片。"}, {"en": "A library book.", "zh": "一本图书馆的书。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Lila 'picked up the shiny object. It was a pendant on a chain... a peculiar shape' that Emma calls a hypercube.", "zh": "莉拉'捡起那个发亮的东西。那是一条链子上的吊坠……形状很奇特'，艾玛称它为超立方体。"}}, {"q": {"en": "Who is Chad?", "zh": "查德是谁？"}, "options": [{"en": "Lila's teacher.", "zh": "莉拉的老师。"}, {"en": "A boy from the strange school group who is a four-dimensional being.", "zh": "那个奇怪学校群体里的一个男孩，他是四维生物。"}, {"en": "A penguin at the zoo.", "zh": "动物园里的一只企鹅。"}, {"en": "Lila's brother.", "zh": "莉拉的弟弟。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "After the pendant is taken, Lila chases a boy whose nametag says 'Chad,' and he explains he and his group are four-dimensional beings.", "zh": "吊坠被拿走后，莉拉追上一个名牌写着'查德'的男孩，他解释说自己和同伴都是四维生物。"}}, {"q": {"en": "According to Emma, what is a 'hypercube'?", "zh": "根据艾玛的说法，'超立方体'是什么？"}, "options": [{"en": "A three-dimensional box.", "zh": "一个三维的盒子。"}, {"en": "A four-dimensional object.", "zh": "一个四维的物体。"}, {"en": "A type of shadow.", "zh": "一种影子。"}, {"en": "A kind of metal for pendants.", "zh": "做吊坠的一种金属。"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "Emma tells Lila, 'A hypercube is a four-dimensional object' that should normally be invisible to us.", "zh": "艾玛告诉莉拉：'超立方体是一个四维的物体'，通常应该是对我们不可见的。"}}, {"q": {"en": "How does the author create a mysterious feeling inside the reptile house?", "zh": "作者是如何在爬行动物馆里营造神秘氛围的？"}, "options": [{"en": "By describing it as dark and creepy, with voices but no visible people.", "zh": "把它描写得又黑又可怕，能听到声音却看不到人。"}, {"en": "By making it bright and sunny.", "zh": "把它写得明亮又充满阳光。"}, {"en": "By filling it with penguins.", "zh": "让它里面满是企鹅。"}, {"en": "By describing loud music.", "zh": "描写喧闹的音乐。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The book says the reptile house 'was dark and creepy inside' and Lila 'heard the voices of children but could not see anyone.'", "zh": "书中说爬行动物馆'里面又黑又可怕'，莉拉'听到了孩子们的声音却看不到任何人'。"}}, {"q": {"en": "Based on the science Lila learned, why do people and trees normally cast shadows?", "zh": "根据莉拉学到的科学知识，人和树为什么通常会投下影子？"}, "options": [{"en": "Because they are colorful.", "zh": "因为它们是有颜色的。"}, {"en": "Because they block sunlight.", "zh": "因为它们挡住了阳光。"}, {"en": "Because they are cold.", "zh": "因为它们是冷的。"}, {"en": "Because they move around.", "zh": "因为它们会移动。"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Lila had studied light and the book states 'A shadow happens when something blocks sunlight.'", "zh": "莉拉学过光的知识，书中写道：'当某物挡住阳光时，就会出现影子。'"}}, {"q": {"en": "According to Chad, why could Lila see the four-dimensional children as if they were solid and real?", "zh": "根据查德的说法，莉拉为什么能像看到真实实体一样看到那些四维的孩子？"}, "options": [{"en": "They were wearing special suits.", "zh": "他们穿着特殊的衣服。"}, {"en": "Under the right conditions, 4-D people cast a 3-D shadow that looks solid.", "zh": "在合适的条件下，四维的人会投下看起来像实体的三维影子。"}, {"en": "They were actually penguins.", "zh": "他们其实是企鹅。"}, {"en": "Lila was only imagining them.", "zh": "莉拉只是在想象他们。"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Chad says 'Four-dimensional beings are invisible in three-dimensional space. But if the conditions are right... 4-D people cast a 3-D shadow' that looks as solid as Lila.", "zh": "查德说'四维生物在三维空间里是不可见的。但在条件合适时……四维的人会投下三维的影子'，看起来和莉拉一样实体。"}}, {"q": {"en": "Why do you think the author ends with Lila holding the hypercube up to the sunlight?", "zh": "你认为作者为什么以莉拉把超立方体举向阳光作为结尾？"}, "options": [{"en": "To show that the field trip is completely over.", "zh": "为了表明实地考察已经完全结束。"}, {"en": "To leave the reader wondering if the 4-D object has special properties in her world.", "zh": "为了让读者思考这个四维物体在她的世界里是否拥有特殊的性质。"}, {"en": "To show that she lost the pendant.", "zh": "为了表明她弄丢了吊坠。"}, {"en": "To finish the penguin report.", "zh": "为了结束企鹅报告。"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The last line says Lila held it 'wondering whether the 4-D object had special properties in her 3-D world,' leaving the story open-ended.", "zh": "最后一句说莉拉举着它，'想着这个四维物体在她的三维世界里是否具有特殊的性质'，让故事留有悬念。"}}, {"q": {"en": "What does the pendant Lila finds in her pocket at the end show?", "zh": "结尾莉拉在口袋里发现的吊坠说明了什么？"}, "options": [{"en": "Chad forgot it by accident.", "zh": "查德不小心把它忘了。"}, {"en": "Chad slipped it in there as a reminder of their meeting.", "zh": "查德把它悄悄放进去，作为他们相遇的纪念。"}, {"en": "Lila stole it.", "zh": "莉拉偷了它。"}, {"en": "It belonged to Emma.", "zh": "它属于艾玛。"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book says 'She never did get to ask the questions she had. Then she realized she had Chad's pendant in her pocket. Chad must have slipped it in there as a reminder of him.'", "zh": "书中说'她终究没能问出那些问题。然后她发现口袋里有查德的吊坠。查德一定是悄悄放进去，作为对他的纪念。'"}}], "extended": {"prompt": {"en": "This story blends real science (shadows, dimensions) with imagination. If you discovered a 'four-dimensional' visitor in your school, what would you want to ask them, and would you keep it a secret like Lila did?", "zh": "这个故事把真实的科学（影子、维度）与想象结合在一起。如果你在学校里发现了一位'四维'访客，你最想问他什么？你会像莉拉那样替他保守秘密吗？"}, "guidance": {"en": "- Link the book's science idea (a shadow forms when light is blocked) to the story's mystery.\n- Suggest questions a child might ask a 4-D visitor about their world.\n- Discuss why Lila chose to keep Chad's secret and what that says about friendship.", "zh": "- 把书中的科学概念（挡住光就会形成影子）与故事的悬念联系起来。\n- 建议孩子可以就四维访客的世界提出一些问题。\n- 讨论莉拉为什么选择替查德保守秘密，以及这说明了什么关于友谊的道理。"}}};</script>
