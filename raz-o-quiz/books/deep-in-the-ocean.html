scientists learn where sea animals travel?", "zh": "卫星如何帮助科学家了解海洋动物的迁徙路线？"}, "options": [{"en": "They take photos of the animals from space", "zh": "它们从太空给动物拍照"}, {"en": "They change the animals' direction", "zh": "它们改变动物的方向"}, {"en": "They track a signal from sensors tagged on the animals", "zh": "它们追踪动物身上传感器标签发出的信号"}, {"en": "They feed the animals", "zh": "它们喂养动物"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book explains that scientists tag animals with electronic sensors, and a satellite tracks the signal from the tag on the animal's fin or back to show where it goes.", "zh": "书中说明，科学家给动物装上电子传感器标签，卫星追踪动物鳍或背部标签发出的信号，从而显示它的去向。"}}, {"q": {"en": "The Antarctic ice fish makes its own antifreeze so it can survive icy water. What does this show about deep-sea life?", "zh": "南极冰鱼能制造自身的防冻液以在冰水中生存。这说明了深海生物的什么特点？"}, "options": [{"en": "Fish cannot live in cold water", "zh": "鱼无法在冷水里生存"}, {"en": "All ocean animals need sunlight", "zh": "所有海洋动物都需要阳光"}, {"en": "The deep ocean has no interesting animals", "zh": "深海里没有有趣的动物"}, {"en": "Deep-sea animals have special ways to survive harsh places", "zh": "深海动物有特殊的办法在恶劣环境中生存"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The ice fish, with no red blood cells and a natural antifreeze, is one example the book gives of how adaptable and specially built deep-sea life is.", "zh": "冰鱼没有红细胞、自带防冻液，是书中举出的一个例子，说明深海生物多么能适应、构造多么特别。"}}, {"q": {"en": "What is the author's main reason for writing Deep in the Ocean?", "zh": "作者写《深海之中》的主要目的是什么？"}, "options": [{"en": "To tell a made-up adventure story", "zh": "讲一个虚构的冒险故事"}, {"en": "To sell submarine tickets", "zh": "推销潜艇票"}, {"en": "To describe how to cook seafood", "zh": "介绍如何烹饪海鲜"}, {"en": "To inform readers about the deep ocean and the surprising life in it", "zh": "向读者介绍深海及其令人惊讶的生物"}], "answer": 3, "skill": "Author's Purpose and Perspective", "explain": {"en": "As an informational book, its purpose is to teach readers about the deep ocean zones, the animals that live there, and what scientists have learned.", "zh": "作为一本知识类图书，其目的是让读者了解深海的各个区域、生活在那里的动物，以及科学家的发现。"}}, {"q": {"en": "At the end, the author says 'only one-fourth of all marine life has been counted' and 'many more surprises to come.' What view of the ocean does this show?", "zh": "结尾处作者说“只统计到了全部海洋生物的四分之一”，并且“还会有更多惊喜到来”。这表达了作者对海洋的什么看法？"}, "options": [{"en": "The ocean is completely known and finished", "zh": "海洋已被完全了解、没有秘密"}, {"en": "The ocean still holds many mysteries waiting to be discovered", "zh": "海洋仍有许多等待被发现的奥秘"}, {"en": "The ocean is too dangerous to study", "zh": "海洋太危险，无法研究"}, {"en": "All ocean animals are now identified", "zh": "所有海洋动物都已被确认"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "By saying only a fourth of marine life is counted and more surprises are coming, the author shows the ocean is still largely unknown and full of discoveries.", "zh": "作者说只统计到四分之一的海洋生物、还会有更多惊喜，表明海洋在很大程度上仍未被认识，充满待发现的奥秘。"}}], "extended": {"prompt": {"en": "The book says scientists have counted only about one-fourth of all marine life. If you could send a submersible to explore one part of the deep ocean, what would you hope to discover and why?", "zh": "书中说科学家只统计到了约四分之一的海洋生物。如果你能派一艘潜水器去探索深海的某个区域，你最希望发现什么，为什么？"}, "guidance": {"en": "• Mention that most marine life is still unknown, so new discoveries are very likely.\n• Name a real deep-ocean animal from the book (such as viperfish, tube worms, or the ice fish) and one adaptation it has.\n• Explain why exploring the deep ocean matters for science and for protecting life on Earth.", "zh": "• 提到大部分海洋生物仍不为人知，所以很可能会有新发现。\n• 说出书中一种真实的深海动物（如毒蛇鱼、管虫或冰鱼）以及它的一种适应能力。\n• 解释探索深海对科学和保护地球生命有何意义。"}}};</script>
