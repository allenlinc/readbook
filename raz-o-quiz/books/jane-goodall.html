ossary defines a field study as a scientific research project conducted outside the laboratory in a natural setting, where scientists live near the animal they study.", "zh": "词汇表将“野外研究”定义为在实验室外自然环境中进行的科研项目，科学家生活在所研究动物附近。"}}, {"q": {"en": "In the sentence about David Greybeard, what does \"stripped the leaves off the stick\" mean?", "zh": "在描写大卫·灰胡子的句子中，“stripped the leaves off the stick”是什么意思？"}, "options": [{"en": "Painted the leaves", "zh": "给叶子涂色"}, {"en": "Removed the leaves", "zh": "把叶子去掉"}, {"en": "Measured the leaves", "zh": "测量叶子"}, {"en": "Watered the leaves", "zh": "给叶子浇水"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The book says David first stripped the leaves off the stick so it would fit in the small termite hole, meaning he removed the leaves.", "zh": "书中说大卫先把树枝上的叶子去掉，以便它能伸进白蚁洞的小孔里，意思是他去掉了叶子。"}}, {"q": {"en": "What important discovery did Jane make by watching David Greybeard eat termites?", "zh": "通过观察大卫·灰胡子吃白蚁，珍得出了什么重要发现？"}, "options": [{"en": "Chimps eat only plants", "zh": "黑猩猩只吃植物"}, {"en": "Chimps can make and use tools", "zh": "黑猩猩能够制造并使用工具"}, {"en": "Chimps cannot learn", "zh": "黑猩猩无法学习"}, {"en": "Chimps sleep all day", "zh": "黑猩猩整天睡觉"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book explains that David poked a stick into a termite mound and had stripped the leaves off it first, so he both used and made a tool—changing scientific beliefs.", "zh": "书中解释大卫把树枝戳进白蚁堆，并事先去掉了叶子，说明他既使用了工具也制造了工具——改变了科学界的看法。"}}, {"q": {"en": "According to the book, which statement about chimpanzees is supported?", "zh": "根据本书，以下关于黑猩猩的哪一项说法是正确的？"}, "options": [{"en": "They have no feelings or intelligence", "zh": "它们没有感情也没有智慧"}, {"en": "They show a range of emotions like humans", "zh": "它们像人类一样表现出多种情绪"}, {"en": "They live only in zoos", "zh": "它们只生活在动物园里"}, {"en": "They cannot form families", "zh": "它们无法组成家庭"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Goodall stated each chimp had its own personality and showed emotions such as happy, sad, angry, loving, and jealous, and was seen holding hands, laughing, and throwing tantrums.", "zh": "古道尔指出每只黑猩猩都有自己的个性，表现出开心、悲伤、愤怒、慈爱、嫉妒等情绪，还能握手、大笑、发脾气。"}}, {"q": {"en": "Why does the author include the section \"Trouble in the Forest\"?", "zh": "作者为什么加入“森林里的麻烦”这一节？"}, "options": [{"en": "To describe Jane's favorite chimpanzee", "zh": "为了描写珍最喜欢的黑猩猩"}, {"en": "To explain the dangers chimps faced and why Jane began conservation work", "zh": "为了说明黑猩猩面临的危险以及珍为何开始保护工作"}, {"en": "To list the glossary words", "zh": "为了列出词汇表"}, {"en": "To show how to cook termites", "zh": "为了展示如何烹饪白蚁"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "This section describes forests being cut down and chimps being hunted, which led Jane to leave Gombe and travel the world to ask for help saving them.", "zh": "这一节描写森林被砍伐、黑猩猩被猎杀，促使珍离开贡贝、走遍世界寻求保护它们的帮助。"}}, {"q": {"en": "What is the author's main purpose in writing this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"en": "To entertain with a fictional story", "zh": "用一个虚构故事来娱乐读者"}, {"en": "To inform readers about Jane Goodall's life and work", "zh": "向读者介绍珍·古道尔的生平和事迹"}, {"en": "To teach how to be a secretary", "zh": "教读者如何当秘书"}, {"en": "To argue against all zoos", "zh": "反对所有动物园"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book is a biography that tells the true story of Jane Goodall's life, discoveries, and conservation efforts to inform readers.", "zh": "这是一本传记，讲述珍·古道尔的真实生平、发现和保育努力，目的是向读者传递信息。"}}, {"q": {"en": "How did Jane first begin to gain the trust of the chimps?", "zh": "珍最初是如何赢得黑猩猩信任的？"}, "options": [{"en": "By sitting quietly and letting David Greybeard find a banana she hid", "zh": "通过安静地坐着，让大卫·灰胡子找到她藏起来的香蕉"}, {"en": "By building a zoo", "zh": "通过建立动物园"}, {"en": "By playing loud music", "zh": "通过播放响亮的音乐"}, {"en": "By capturing them", "zh": "通过捕捉它们"}], "answer": 0, "skill": "Key Ideas and Details",
