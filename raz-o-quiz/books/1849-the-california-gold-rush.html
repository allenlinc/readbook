<script>window.BOOK = {"slug": "1849-the-california-gold-rush", "title": "1849: The California Gold Rush", "titleZh": "1849：加州淘金热", "level": "O", "genre": "Nonfiction", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "In January 1848, what did the man discover in the water of the mill he was building?", "zh": "1848年1月，那名男子在磨坊的水中发现了什么？"}, "options": [{"en": "silver", "zh": "银"}, {"en": "gold", "zh": "金"}, {"en": "diamonds", "zh": "钻石"}, {"en": "copper", "zh": "铜"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "In January 1848, a man building Sutter's Mill spotted shiny pieces in the mill's water; testing showed it was gold.", "zh": "1848年1月，一位在萨特磨坊施工的男子在磨坊的水中发现闪亮的小片；经检验证实是金子。"}}, {"q": {"en": "How did the gold get from deep in the mountains into the rivers where people could pan for it?", "zh": "金子是如何从深山里进入河流、使人们得以淘金的？"}, "options": [{"en": "Miners dug long tunnels from the mountains to the rivers", "zh": "矿工从山里挖了长长的隧道通向河流"}, {"en": "Erosion had washed the metal down the mountains into the rivers", "zh": "侵蚀作用将金属从山上冲入河流"}, {"en": "John Sutter had it carried there by wagon", "zh": "约翰·萨特用马车把它运到了那里"}, {"en": "Volcanoes melted it and poured it into the rivers", "zh": "火山将其熔化并倒入河流"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says erosion had long ago washed the gold down the mountains into the rivers, which is why people could pan for it in the water.", "zh": "书中说，很久以前侵蚀作用把金子从山上冲入河流，所以人们才能在水里用淘盆淘金。"}}, {"q": {"en": "Who were the \"forty-niners\"?", "zh": "谁是『四九淘金者』（forty-niners）？"}, "options": [{"en": "People who mined gold back in 1848", "zh": "早在1848年就开采金子的人"}, {"en": "The ninety thousand people who joined the gold rush in 1849", "zh": "1849年加入淘金热的九万人"}, {"en": "Forty-nine prospectors who first discovered gold", "zh": "最先发现金子的四十九名探矿者"}, {"en": "The miners who worked for John Sutter", "zh": "为约翰·萨特工作的矿工"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "People in the eastern states did not come west until 1849; that year ninety thousand people joined the gold rush, and they became known as the forty-niners.", "zh": "东部各州的人直到1849年才西行；那一年有九万人加入淘金热，被称为『四九淘金者』。"}}, {"q": {"en": "About how many miles was the overland wagon trip to California?", "zh": "乘坐马车前往加利福尼亚的陆路行程大约有多少英里？"}, "options": [{"en": "about 500 miles", "zh": "约500英里"}, {"en": "about 1,000 miles", "zh": "约1,000英里"}, {"en": "about 2,100 miles", "zh": "约2,100英里"}, {"en": "about 3,800 miles", "zh": "约3,800英里"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "The book states the forty-niners drove their wagons 2,100 miles (3,380 km) to California.", "zh": "书中说四九淘金者赶着马车走了2,100英里（3,380公里）才到达加利福尼亚。"}}, {"q": {"en": "In the book, what does the word \"prospector\" mean?", "zh": "在书中，『prospector』（探矿者）一词是什么意思？"}, "options": [{"en": "A person who owns a gold mine", "zh": "拥有金矿的人"}, {"en": "Someone who moves to a spot with the prospect, or possibility, of finding gold", "zh": "搬到某个地方、有可能找到金子的人"}, {"en": "A worker who builds railroads", "zh": "修建铁路的工人"}, {"en": "A shopkeeper who sells shovels", "zh": "卖铲子的店主"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The 'Word Wise' box defines a prospector as someone who moves to a spot with the prospect, or possibility, of finding gold.", "zh": "『Word Wise』框将探矿者定义为搬到某个有可能找到金子的地方的人。"}}, {"q": {"en": "How does the author help readers understand difficult words like \"prospector\" and \"erosion\"?", "zh": "作者通过什么方式帮助读者理解『prospector』『erosion』等较难词汇？"}, "options": [{"en": "By listing the books in a bibliography", "zh": "列出参考书目"}, {"en": "By giving definitions in a glossary and special boxes like 'Words to Know' and 'Word Wise'", "zh": "在词汇表以及『Words to Know』『Word Wise』等特别板块中给出释义"}, {"en": "By translating words into Spanish", "zh": "把单词翻译成西班牙语"}, {"en": "By drawing pictures only", "zh": "只靠画图"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The book includes a 'Words to Know' list at the front, a 'Word Wise' box in the text, and a glossary at the end to explain difficult words.", "zh": "书的前面有『Words to Know』词表，正文中有『Word Wise』框，结尾还有词汇表，用来解释难词。"}}, {"q": {"en": "Using the 'Prices Gone Wild' chart, how much did one breakfast cost in 1849 dollars?", "zh": "根据『Prices Gone Wild』图表，1849年一顿早餐售价多少（以当年的美元计）？"}, "options": [{"en": "$1", "zh": "1美元"}, {"en": "$43", "zh": "43美元"}, {"en": "$103", "zh": "103美元"}, {"en": "$360", "zh": "360美元"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The chart lists one breakfast at $43 in 1849, equal to about $1,294 in 2016 dollars.", "zh": "图表列出1849年一顿早餐为43美元，相当于2016年的约1,294美元。"}}, {"q": {"en": "On the map of the routes the forty-niners took, which route went around the southern tip of South America?", "zh": "在四九淘金者路线的地图上，哪条路线是绕行南美洲南端（合恩角）的？"}, "options": [{"en": "the Overland route", "zh": "陆路路线"}, {"en": "the Panama route", "zh": "巴拿马路线"}, {"en": "the Cape Horn route", "zh": "合恩角路线"}, {"en": "the Railroad route", "zh": "铁路路线"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The map shows three routes—Overland, Panama, and Cape Horn; the Cape Horn route went around the southern tip of South America.", "zh": "地图显示三条路线——陆路、巴拿马和合恩角；合恩角路线是绕行南美洲南端的。"}}, {"q": {"en": "The author includes both sad facts (like Native Americans dying and miners' deaths) and success stories (like California becoming a state). What is the author's purpose?", "zh": "作者既写到令人难过的事实（如印第安人死亡、矿工丧生），又写到成功故事（如加州建州），其目的是什么？"}, "options": [{"en": "To encourage readers to move to California", "zh": "鼓励读者迁往加利福尼亚"}, {"en": "To show the gold rush had both good and bad effects on people and the country", "zh": "说明淘金热对人民和国家既有好影响也有坏影响"}, {"en": "To prove that gold mining was easy", "zh": "证明开采金子很容易"}, {"en": "To compare California with China", "zh": "将加利福尼亚与中国作比较"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "By including both the hardships and the successes, the author gives a balanced picture of the gold rush's effects on people and the country.", "zh": "作者同时写出苦难与成功，是为了全面呈现淘金热对人民和国家的正反两方面影响。"}}, {"q": {"en": "What is the author's main purpose in writing this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"en": "To entertain readers with a fictional adventure", "zh": "用一个虚构的冒险故事娱乐读者"}, {"en": "To persuade readers to become prospectors", "zh": "说服读者去当探矿者"}, {"en": "To inform readers about what happened during the California Gold Rush and its effects", "zh": "向读者介绍加州淘金热的发生及其影响"}, {"en": "To teach readers how to pan for gold to get rich", "zh": "教读者如何淘金致富"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book is a nonfiction account whose purpose is to inform readers about the history of the California Gold Rush and its effects, such as westward expansion.", "zh": "这是一本非虚构读物，目的是向读者介绍加州淘金热的历史及其影响，例如对向西扩张的作用。"}}], "extended": {"prompt": {"en": "The book's focus question asks: What was the effect of the gold rush on westward expansion? Using the book, explain how the gold rush changed California and the United States.", "zh": "本书的焦点问题是：淘金热对向西扩张有什么影响？根据书中内容，说明淘金热如何改变了加利福尼亚和美国。"}, "guidance": {"en": "• The gold rush brought about 300,000 people to California in a few years, leading to statehood in 1850.\n• It led to the start of the transcontinental railroad in 1863, linking East and West.\n• It opened gateways to the West but caused great harm to Native Americans.", "zh": "• 淘金热在几年内为加州带来了约30万人，使其在1850年建州。\n• 它促使1863年开始修建连接东西部的横贯大陆铁路。\n• 它打开了通往西部的通道，但也给印第安人带来了巨大伤害。"}}};</script>
