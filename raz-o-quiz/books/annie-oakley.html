st the names of all the characters", "zh": "为了列出所有角色的名字"}, {"en": "To give the page numbers of the pictures", "zh": "为了给出图片的页码"}, {"en": "To show the book's table of contents", "zh": "为了展示书的目录"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The glossary defines key words from the story (such as rifle, sharpshooter, quintuple, and feats) to help readers understand the book's vocabulary.", "zh": "词汇表解释了故事中的关键词（如 rifle、sharpshooter、quintuple、feats），帮助读者理解书中的词汇。"}}, {"q": {"en": "What is the author's main purpose in writing this book about Annie Oakley?", "zh": "作者写这本关于安妮·奥克利的书，主要目的是什么？"}, "options": [{"en": "To tell the true, amazing story of a famous sharpshooter and inspire readers", "zh": "为了讲述一位著名神枪手真实而惊人的故事，并激励读者"}, {"en": "To teach readers how to shoot a rifle", "zh": "为了教读者如何射击步枪"}, {"en": "To explain how to run a Wild West Show", "zh": "为了解释如何经营狂野西部演出"}, {"en": "To argue that hunting is wrong", "zh": "为了论证打猎是错误的"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The biography shares Annie's real life, from helping her family to becoming a world-famous sharpshooter, to inform and inspire readers about her remarkable skill and determination.", "zh": "这本传记讲述了安妮真实的一生——从帮助家人到成为世界闻名的神枪手——是为了向读者介绍她非凡的技艺与毅力，并给人以启发。"}}], "extended": {"prompt": {"en": "Annie Oakley used her shooting skill both to help her family (by hunting food) and to entertain people around the world. What is a skill or talent you would like to develop, and how could you use it to help others?", "zh": "安妮·奥克利既用她的射击技术帮助家人（打猎获取食物），又用它为世界各地的人们带去娱乐。你希望培养的一项技能或才能是什么，你又可以用它怎样帮助他人？"}, "guidance": {"en": ["Annie first learned to shoot to feed her family when her mother struggled.", "She shared food with people who could not afford it, not just her own family.", "She practiced for years and turned her talent into something that amazed others.", "Think about a skill you have or want, and a way it could help people."], "zh": ["安妮最初学射击是为了在母亲艰难时养家糊口。",
