d safe.", "zh": "这份工作轻松又安全。"}, {"en": "saving people can be dangerous.", "zh": "救人可能是危险的。"}, {"en": "rangers never work outdoors.", "zh": "护林员从不在户外工作。"}, {"en": "parks are always closed.", "zh": "公园总是关闭的。"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "Right after this, the book lists the dangers rangers face—flash floods, crumbling cliffs, wild animals—when saving visitors.", "zh": "在此之后，书中列举了护林员在救人时面临的危险——暴洪、崩塌的悬崖、野生动物。"}}, {"q": {"en": "How is this book mainly organized?", "zh": "这本书主要是如何组织的？"}, "options": [{"en": "As a fairy tale.", "zh": "以一个童话故事的形式。"}, {"en": "With a table of contents and headings like 'What Do Rangers Do?'", "zh": "用目录和‘护林员做什么？’这样的小标题。"}, {"en": "As a comic strip.", "zh": "以连环画的形式。"}, {"en": "As a recipe.", "zh": "以食谱的形式。"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The book has a table of contents and clear section headings ('What's It Like to Be a Park Ranger?', 'What Do Rangers Do?', etc.).", "zh": "这本书有目录和清晰的小标题（‘做护林员是什么感觉？’‘护林员做什么？’等）。"}}, {"q": {"en": "At Cape Hatteras, why do rangers keep people from stepping on bird nests?", "zh": "在哈特拉斯角，护林员为什么不让人们踩到鸟巢？"}, "options": [{"en": "The beach is too hot.", "zh": "海滩太热了。"}, {"en": "Endangered birds lay their eggs on the beach.", "zh": "濒危鸟类把蛋产在海滩上。"}, {"en": "The nests are made of lava.", "zh": "鸟巢是用熔岩做的。"}, {"en": "To grow more trees.", "zh": "为了种更多树。"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says 'rangers keep people from stepping on bird nests. Endangered birds lay their eggs on the beach.'", "zh": "书中说‘护林员不让人们踩到鸟巢。濒危鸟类把蛋产在海滩上’。"}}, {"q": {"en": "According to biologist Doug Smith, what is the difference between a biologist and a ranger?", "zh": "根据生物学家道格·史密斯的说法，生物学家和护林员有什么区别？"}, "options": [{"en": "Biologists study animals; rangers now focus more on taking care of people.", "zh": "生物学家研究动物；护林员如今更多专注于照顾人。"}, {"en": "They are exactly the same job.", "zh": "它们是完全相同的工作。"}, {"en": "Rangers only study wolves.", "zh": "护林员只研究狼。"}, {"en": "Biologists work only at night.", "zh": "生物学家只在夜间工作。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Smith says 'Everyone confuses biologists with rangers' but notes rangers 'are really involved with taking care of people,' while he studies wolves.", "zh": "史密斯说‘大家都把生物学家和护林员搞混’，但指出护林员‘真正忙于照顾人’，而他研究狼。"}}, {"q": {"en": "In Yellowstone, Doug Smith came in 1994 to help do what with wolves?", "zh": "在黄石公园，道格·史密斯于1994年来此是为了在狼群方面做什么？"}, "options": [{"en": "Teach them to fly.", "zh": "教它们飞。"}, {"en": "Restore wolves to the park.", "zh": "把狼重新引入公园。"}, {"en": "Move them to a zoo.", "zh": "把它们迁到动物园。"}, {"en": "Train them as rangers.", "zh": "把它们训练成护林员。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says Smith 'came to Yellowstone in 1994 to help restore wolves to the park,' and today there are 11 packs and 85–90 wolves.", "zh": "书中说史密斯‘1994年来到黄石公园，帮助把狼重新引入公园’，如今已有 11 个狼群、85–90 只狼。"}}, {"q": {"en": "What does the book say you can do to start becoming a park ranger?", "zh": "书中说你可以做些什么来开始成为一名公园护林员？"}, "options": [{"en": "Buy a radio and rope.", "zh": "买一台对讲机和一根绳子。"}, {"en": "Become a park volunteer.", "zh": "成为一名公园志愿者。"}, {"en": "Move to the moon.", "zh": "搬到月球上。"}, {"en": "Catch a Florida panther.", "zh": "抓一只佛罗里达黑豹。"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "Under 'Can I Be a Park Ranger?' the book says 'You can start by becoming a park volunteer' who does many of the same jobs as rangers.", "zh": "在‘我能当护林员吗？’一节中，书中说‘你可以从成为一名公园志愿者开始’，志愿者做许多和护林员一样的工作。"}}, {"q": {"en": "What is the author's main purpose in writing this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"en": "To entertain with a fictional story.", "zh": "用一个虚构故事来娱乐。"}, {"en": "To inform readers about what rangers do and how to become one.", "zh": "向读者介绍护林员的工作以及如何成为护林员。"}, {"en": "To sell hiking boots.", "zh": "推销登山靴。"}, {"en": "To describe one single animal.", "zh": "描述某一种动物。"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "It is an informational book that explains ranger duties, the parks they work in, what they know, and how to become one.", "zh": "这是一本科普书，讲解了护林员的职责、工作的公园、所需知识以及成为护林员的途径。"}}], "extended": {"prompt": {"en": "The book says rangers help protect parks 'for the future.' What is one way you could help protect a park or nature near you?", "zh": "书中说护林员帮助保护公园‘为了未来’。你能想出一种方式来保护你附近的公园或自然吗？"}, "guidance": {"en": "- Recall that rangers teach visitors and protect animals, ruins, and beaches.\n- Think of small actions: pick up trash, stay on trails, respect wildlife.\n- Connect to the volunteer idea in the book.", "zh": "- 回顾护林员如何教导游客并保护动物、遗迹与海滩。\n- 想想小行动：捡垃圾、走指定步道、尊重野生动物。\n- 联系书中‘志愿者’的设想。"}}};</script>
