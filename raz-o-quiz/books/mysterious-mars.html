 "The glossary defines microbial as a microscopic organism, such as a bacteria.", "zh": "词汇表将“微生物的”定义为微小的生物体，例如细菌。"}}, {"q": {"en": "According to the book, what are 'canals'?", "zh": "根据书中内容，“运河”（canals）是什么？"}, "options": [{"en": "Waterways dug across land", "zh": "在陆地上开凿的水道"}, {"en": "Natural ridges and canyons", "zh": "天然的脊岭和峡谷"}, {"en": "Polar ice caps", "zh": "极地冰盖"}, {"en": "Robot geologists", "zh": "机器地质学家"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines canals as waterways dug across land; the book notes people wrongly thought Martians built them.", "zh": "词汇表将运河定义为在陆地上开凿的水道；书中指出人们曾错误地认为火星人开凿了它们。"}}, {"q": {"en": "What did the Mariner 4 mission prove in 1965?", "zh": "1965年的水手4号（Mariner 4）任务证明了什么？"}, "options": [{"en": "That Mars had oceans of liquid water", "zh": "火星曾有液态水海洋"}, {"en": "That the 'canals' were just natural landscape, not built by intelligent beings", "zh": "那些“运河”只是自然地貌，并非智慧生物所建"}, {"en": "That life existed on Mars", "zh": "火星上存在生命"}, {"en": "That Mars has one moon", "zh": "火星只有一颗卫星"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Mariner 4 took clear pictures proving the 'canals' were just the natural landscape of ridges, gullies, and canyons.", "zh": "水手4号拍下清晰的照片，证明那些“运河”只是由脊岭、沟壑和峡谷组成的自然地貌。"}}, {"q": {"en": "Which Mars rover landed in 2012 and was designed to help solve Mars's mysteries?", "zh": "哪个火星探测器于2012年着陆，并旨在帮助解开火星的谜团？"}, "options": [{"en": "Spirit", "zh": "勇气号"}, {"en": "Opportunity", "zh": "机遇号"}, {"en": "Curiosity", "zh": "好奇号"}, {"en": "Viking", "zh": "维京号"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Curiosity launched in November 2011 and landed on Mars in August 2012 to help solve its greatest mysteries.", "zh": "好奇号于2011年11月发射，2012年8月在火星着陆，以助解开火星最大的谜团。"}}, {"q": {"en": "Why does the author call Mars 'mysterious'?", "zh": "作者为什么称火星“神秘”？"}, "options": [{"en": "Because it is the closest planet to Earth", "zh": "因为它是离地球最近的 ": ["Satellite pictures show long canyons and deep gullies that could have been carved by flowing water.", "Rovers found water in soil (Spirit, 2008) and pebbles worn down by liquid water (Pathfinder).", "All known life needs liquid water, so signs of past water raise the question of past life."], "zh": ["卫星照片显示长长的峡谷和深深的沟壑，可能由流动的水冲刷而成。", "探测器在土壤中发现水（勇气号，2008年），并找到被液态水磨损的鹅卵石（探路者号）。", "所有已知的生命都需要液态水，因此过去有水的迹象引出了过去是否存在生命的问题。"]}}};</script>
