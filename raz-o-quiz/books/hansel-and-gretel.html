<script>window.BOOK = {"slug": "hansel-and-gretel", "title": "Hansel and Gretel", "titleZh": "汉塞尔和格蕾特", "level": "O", "genre": "Folk Tale", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Why did Hansel drop breadcrumbs as he walked into the forest?", "zh": "汉塞尔在走进森林时为什么一路撒下面包屑？"}, "options": [{"en": "To feed the birds he saw", "zh": "为了喂他看到的鸟儿"}, {"en": "To make a path home after his father left them", "zh": "为了在父亲把他们丢下后标记回家的路"}, {"en": "Because he was too hungry to keep them", "zh": "因为他太饿了留不住面包"}, {"en": "To share with his stepmother", "zh": "为了分给他的继母"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Hansel decided not to eat the bread and 'dropped the crumbs as he walked to make a path home.'", "zh": "汉塞尔决定不吃那块面包，并“一边走一边撒下面包屑，用来标记回家的路”。"}}, {"q": {"en": "What happened to Hansel's trail of breadcrumbs?", "zh": "汉塞尔撒下的面包屑发生了什么？"}, "options": [{"en": "Their father came back and ate it", "zh": "他们的父亲回来吃掉了"}, {"en": "Birds flew down and ate the path", "zh": "鸟儿飞下来把这条路吃掉了"}, {"en": "It rained and washed the crumbs away", "zh": "下大雨把面包屑冲走了"}, {"en": "Gretel swept them up to keep tidy", "zh": "格蕾特把它们扫起来保持整洁"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Gretel cried, 'Birds ate your path,' after a bird flew down and stole a crumb, leaving them lost.", "zh": "一只鸟飞下来叼走了一块面包屑后，格蕾特喊道：“鸟儿把你的路吃掉了”，让他们迷了路。"}}, {"q": {"en": "What was the little house in the clearing made of?", "zh": "林中空地上的小房子是用什么做的？"}, "options": [{"en": "Wood and stone", "zh": "木头和石头"}, {"en": "Candy", "zh": "糖果"}, {"en": "Plain bread", "zh": "普通的面包"}, {"en": "Leaves and mud", "zh": "树叶和泥巴"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says, 'In a clearing was a little house made entirely of candy!'", "zh": "书里写道：“林中空地上有一座完全用糖果做成的小房子！”"}}, {"q": {"en": "How did Gretel help Hansel avoid being found fat by the old woman?", "zh": "格蕾特如何帮助汉塞尔避免被老妇人发现长胖了？"}, "options": [{"en": "She hid him under the bed", "zh": "她把他藏在床底下"}, {"en": "She tossed a chicken bone into his cage for the woman to grab instead", "zh": "她往他的笼子里扔了一根鸡骨头，让老妇人去抓那根骨头"}, {"en": "She gave him extra cake every day", "zh": "她每天给他额外的蛋糕"}, {"en": "She told the woman a made-up story", "zh": "她给老妇人编了一个故事"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Gretel whispered, 'Make her grab this instead of your arm,' and the woman pinched the bone and frowned that he wasn't getting fat.", "zh": "格蕾特低声说：“让她去抓这根骨头，而不是你的胳膊。”结果老妇人捏到骨头，皱眉说他怎么没长胖。"}}, {"q": {"en": "The author describes the old woman as having 'cloudy eyes' and feeling her way 'blindly.' What do these details tell the reader?", "zh": "作者把老妇人描写成“浑浊的眼睛”并且“摸索着”走路。这些细节告诉读者什么？"}, "options": [{"en": "She is very old and cannot see well", "zh": "她很老了，视力不好"}, {"en": "She is fast asleep", "zh": "她睡得很熟"}, {"en": "She is angry at the children", "zh": "她在生孩子们的气"}, {"en": "She is a small child", "zh": "她是个小孩子"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The text says she 'blindly felt her way' and later says 'My eyesight isn't very good,' showing she cannot see.", "zh": "文中说她“摸索着”走路，后来又说“我的视力不太好”，说明她看不见。"}}, {"q": {"en": "The witch tells Hansel he will 'soon be nice and fat' and later has Gretel 'fill that big pot with water and build a fire.' What does this show about her plan?", "zh": "女巫告诉汉塞尔他“很快就会被养得胖胖的”，后来又让格蕾特“把大锅装满水并生起火”。这说明她的计划是什么？"}, "options": [{"en": "To make him healthy for a party", "zh": "为了派对把他养健康"}, {"en": "To cook and eat him", "zh": "要煮了他并吃掉他"}, {"en": "To send him back home", "zh": "要把他送回家"}, {"en": "To sell him at a market", "zh": "要把他在市场上卖掉"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "She pinches his arm to check if he is fat enough and then orders a pot of water and a fire built, showing she plans to cook him.", "zh": "她捏他的胳膊看是否够胖，然后下令装满水、生起火，说明她打算把他煮了。"}}, {"q": {"en": "The story says the children's 'laughter echoed through the forest.' Using the glossary, what does 'echoed' mean?", "zh": "故事说孩子们的“笑声在森林里echoed（回荡）”。根据词汇表，“echoed”是什么意思？"}, "options": [{"en": "Disappeared completely", "zh": "完全消失"}, {"en": "Repeated a sound", "zh": "重复了一个声音"}, {"en": "Suddenly stopped", "zh": "突然停止"}, {"en": "Was whispered quietly", "zh": "被轻声低语"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The glossary defines 'echoed' as 'repeated a sound,' so their laughter repeated through the forest.", "zh": "词汇表把“echoed”解释为“重复一个声音”，所以他们的笑声在森林里回荡重复。"}}, {"q": {"en": "The book says Gretel 'shuddered' when the witch talked about fattening Hansel up. Using the glossary, what does this tell us about Gretel?", "zh": "书里说当女巫谈论要把汉塞尔养胖时，格蕾特“shuddered（发抖）”。根据词汇表，这告诉我们格蕾特怎样了？"}, "options": [{"en": "She was excited and happy", "zh": "她又兴奋又开心"}, {"en": "She suddenly shook from fear", "zh": "她因为害怕而突然发抖"}, {"en": "She was laughing out loud", "zh": "她在大声笑"}, {"en": "She was falling asleep", "zh": "她快要睡着了"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The glossary says 'shuddered' means 'suddenly shook or trembled, usually from cold or fear,' showing Gretel was afraid.", "zh": "词汇表说“shuddered”意为“突然发抖或战栗，通常因为寒冷或恐惧”，说明格蕾特很害怕。"}}, {"q": {"en": "Why does the author include that Father's 'eyes were red from crying' and he had 'sent your stepmother away'?", "zh": "作者为什么要写到父亲的“眼睛哭红了”并且“把继母赶走了”？"}, "options": [{"en": "To show the father was sorry and had changed", "zh": "为了表现父亲感到抱歉并且已经改变"}, {"en": "To show the father was still angry at them", "zh": "为了表现父亲仍然对他们生气"}, {"en": "To show the father was hungry", "zh": "为了表现父亲饿了"}, {"en": "To show the father moved far away", "zh": "为了表现父亲搬到了很远的地方"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Father weeps, 'I'm so sorry,' says he sent the stepmother away, and says he searched for days, showing regret and change.", "zh": "父亲哭着说“我很抱歉”，表示已把继母赶走，并说自己找了他们好几天，表现出悔意和改变。"}}, {"q": {"en": "What lesson does the story teach through Hansel and Gretel's actions?", "zh": "通过汉塞尔和格蕾特的行为，这个故事想传达什么道理？"}, "options": [{"en": "Always trust strangers you meet", "zh": "永远要相信你遇到的陌生人"}, {"en": "Cleverness and bravery help you overcome danger", "zh": "聪明和勇敢能帮助你战胜危险"}, {"en": "Stay home and never explore", "zh": "要待在家里永远不要去探索"}, {"en": "Candy houses are always safe", "zh": "糖果房子总是安全的"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "Hansel made the breadcrumb trail and Gretel's broom trick freed them, showing cleverness and bravery defeat the witch.", "zh": "汉塞尔留下面包屑做路标，格蕾特用扫帚的妙计救出弟弟，说明聪明和勇敢战胜了女巫。"}}], "extended": {"prompt": {"en": "How might the story have been different if the birds had not eaten Hansel's trail of breadcrumbs? Write a paragraph describing how the story would change.", "zh": "如果鸟儿没有吃掉汉塞尔撒下的面包屑，故事会有什么不同？写一段话描述故事会如何改变。"}, "guidance": {"en": "- Hansel used the breadcrumbs to make a path home after Father left them in the forest.\n- A bird stole a crumb, and soon the birds ate the whole trail, leaving the children lost.\n- Without the lost trail, the children might have found their way home and never met the witch or found the treasure.\n- Think about which events (the candy house, being trapped, the treasure) would or would not have happened.", "zh": "- 父亲把他们丢在森林后，汉塞尔用面包屑标记了回家的路。\n- 一只鸟叼走面包屑，很快鸟儿把整条路都吃光，让孩子们迷了路。\n- 如果没有迷路，孩子们也许能自己回家，就不会遇到女巫或找到宝藏。\n- 想一想哪些情节（糖果屋、被关起来、宝藏）还会不会发生。"}}};</script>
