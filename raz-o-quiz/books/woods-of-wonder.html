k, what does the word \"canopy\" mean?", "zh": "在本书中，“canopy（林冠层）”一词是什么意思？"}, "options": [{"en": "The roots of a tree", "zh": "树的根"}, {"en": "The part where tree tops form a dense layer of leaves", "zh": "树顶形成茂密叶层的那部分"}, {"en": "A kind of animal", "zh": "一种动物"}, {"en": "The forest floor", "zh": "森林地面"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The glossary defines canopy as the part of a forest where the tops of trees form a dense layer of leaves.", "zh": "词汇表把canopy定义为森林中树顶形成茂密叶层的部分。"}}, {"q": {"en": "The author explains that \"Krummholz\" is a German word meaning \"crooked wood.\" Why is this word used for some trees?", "zh": "作者说明“Krummholz”是德语“弯曲的木头”的意思。为什么用这个词称呼某些树？"}, "options": [{"en": "Because they are short and twisted by harsh winds", "zh": "因为它们在恶劣大风中长得又矮又扭曲"}, {"en": "Because they are the tallest trees", "zh": "因为它们是最高的树"}, {"en": "Because they grow only in Japan", "zh": "因为它们只生长在日本"}, {"en": "Because they are a kind of flower", "zh": "因为它们是一种花"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The book says pines and spruces in harsh, windy places grow short and twisted and are called Krummholz, meaning 'crooked wood,' even though some are a thousand years old.", "zh": "书中说在严酷多风的地方，松树和云杉长得又矮又扭曲，被称为Krummholz（弯曲的木头），尽管其中一些已有千年树龄。"}}, {"q": {"en": "According to the book, what do standing dead trees (snags) and fallen trees provide?", "zh": "根据本书，站立的枯树（snags）和倒下的树提供了什么？"}, "options": [{"en": "Food and shelter for animals, plants, and fungi", "zh": "为动物、植物和真菌提供食物和庇护所"}, {"en": "Nothing useful at all", "zh": "没有任何用处"}, {"en": "Only a place for people to build", "zh": "只供人类建造房屋"}, {"en": "A new kind of rock", "zh": "一种新的岩石"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book explains that snags and fallen trees provide food and shelter for different animals, plants, and fungi, and fallen trees make holes in the canopy for young trees.", "zh": "书中解释枯立木和倒木为不同的动物、植物和真菌提供食物与庇护，倒木还在林冠层留 、日本和俄罗斯的原始森林并解释其价值，目的是传递信息并引发读者的珍视。"}}, {"q": {"en": "How does the Carolina northern flying squirrel move through the air?", "zh": "卡罗莱纳北部飞鼠是如何在空中移动的？"}, "options": [{"en": "It glides using skin on its paws", "zh": "它用爪子上的皮膜滑翔"}, {"en": "It truly flies like a bird", "zh": "它像鸟一样真正飞行"}, {"en": "It swims", "zh": "它游泳"}, {"en": "It digs underground", "zh": "它在地下挖洞"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says these small mammals don't really fly; they use skin attached to their front and back paws to glide.", "zh": "书中说这种小型哺乳动物并不会真正飞行，而是利用前爪和后爪之间相连的皮膜来滑翔。"}}], "extended": {"prompt": {"en": "The book says laws prevent logging in some old-growth forests but not others, and people debate how much protection is enough. If your town were near an old-growth forest, what would you want leaders to decide about protecting it?", "zh": "书中说法律禁止在某些原始森林砍伐，但在另一些森林却没有，人们也在争论保护到什么程度才足够。如果你住的地方附近有一片原始森林，你希望领导者对保护它做出怎样的决定？"}, "guidance": {"en": "- Recall that old-growth forests support life for hundreds or thousands of years.\n- Note that fallen and dead trees help new life grow.\n- Think about how human actions can damage these places.\n- Weigh the debate between logging and protection mentioned in the conclusion.", "zh": "- 回想原始森林支撑生命可达数百年甚至数千年。\n- 注意枯立木和倒木有助于新生命的生长。\n- 想想人类活动会如何破坏这些地方。\n- 权衡结论中提到的砍伐与保护之间的争论。"}}};</script>
