球规则"}, {"en": "To advertise a computer game", "zh": "为一款电脑游戏打广告"}, {"en": "To report real news about a game", "zh": "报道一场真实的比赛新闻"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The story entertains with a boy's spring-training adventure while quietly showing that encouragement from Gramps and Tony and lots of practice can change how someone feels.", "zh": "故事以男孩的春训经历娱乐读者，同时悄悄传达：爷爷和托尼的鼓励加上大量练习，能改变一个人的心态。"}}, {"q": {"en": "Tony tells Scotty, 'You're not hopeless, you just need to work harder.' What message does the author share through these words?", "zh": "托尼对斯科蒂说：“你不是没希望，只是需要更努力。”作者通过这句话传达了什么信息？"}, "options": [{"en": "That only natural talent matters", "zh": "只有天赋才重要"}, {"en": "That baseball is too hard for kids", "zh": "棒球对孩子来说太难"}, {"en": "That effort and practice can help anyone improve", "zh": "努力和练习能帮助任何人进步"}, {"en": "That Scotty should give up", "zh": "斯科蒂应该放弃"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "Tony's line reflects the book's message that skill grows with hard work and practice, not just natural ability — Scotty improves once he tries.", "zh": "托尼的话体现了全书主旨：技术靠努力和练习增长，而非只靠天赋——斯科蒂一试就进步了。"}}], "extended": {"prompt": {"en": "Scotty started out thinking he was 'hopeless' at baseball, but after watching the pros and getting tips from Tony Gwynn, he wanted to practice. Tell about a time you thought something was too hard, and what helped you keep trying.", "zh": "斯科蒂一开始觉得自己打棒球“没希望”，但看了职业球员、得到托尼·格温的指点后，他就想练习了。讲讲你曾觉得某件事太难，是什么帮你坚持下来的。"}, "guidance": {"en": "• Describe the skill or activity you found difficult at first.\n• Explain who or what encouraged or taught you, the way Gramps and Tony helped Scotty.\n• Show how practice or a helpful tip changed your attitude, just as Scotty's did.", "zh": "• 描述你一开始觉得困难的那项技能或活动。\n• 说明是谁或是什么鼓励、教会了你，就像爷爷和托尼帮助斯科蒂那样。\n• 展现练习或一句有用的提示如何改变了你的态度，正如斯科蒂那样。"}}};</script>
