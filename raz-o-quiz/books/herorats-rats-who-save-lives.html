r to train than dogs, even though people first thought his idea was crazy.", "zh": "书中说，巴特认为老鼠比狗更便宜、更容易训练，尽管一开始大家都觉得他的想法很疯狂。"}}, {"q": {"en": "How much training do HeroRATs need before they can take the final tests?", "zh": "英雄鼠在参加最终测试前需要接受多长时间的训练？"}, "options": [{"en": "A few days", "zh": "几天"}, {"en": "Two weeks", "zh": "两周"}, {"en": "One year", "zh": "一年"}, {"en": "Nine months", "zh": "九个月"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "After a total of nine months of training, the rats have to pass several tests before they are ready to find real land mines.", "zh": "经过总共九个月的训练后，大鼠必须通过几场测试，才能去搜寻真正的地雷。"}}, {"q": {"en": "What is the training method called when a rat hears a click and gets food after smelling an explosive?", "zh": "当大鼠闻到炸药气味后听到咔哒声并得到食物，这种训练方法叫什么？"}, "options": [{"en": "Clicker training", "zh": "响片训练"}, {"en": "Leash walking", "zh": "牵绳行走"}, {"en": "Freezing in place", "zh": "原地不动"}, {"en": "Long-pole guiding", "zh": "长杆引导"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The book names this method 'clicker training': rats hear a click and get a food reward when they smell an explosive, which teaches them the signal.", "zh": "书中称这种方法为“响片训练”：大鼠闻到炸药气味时会听到咔哒声并得到食物奖励，从而学会发出信号。"}}, {"q": {"en": "How do HeroRATs signal that they have found a land mine?", "zh": "英雄鼠找到地雷时，会怎样发出信号？"}, "options": [{"en": "They bark loudly", "zh": "它们大声吠叫"}, {"en": "They freeze in place or scratch the ground", "zh": "它们原地不动几秒钟，或抓挠地面"}, {"en": "They dig a deep hole", "zh": "它们挖一个深洞"}, {"en": "They blow a whistle", "zh": "它们吹口哨"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The book explains that rats are taught to signal by freezing in place for several seconds or by scratching the ground when they detect a land mine.", "zh": "书中说明，大鼠被训练成在发现地雷时通过原地不动几秒钟或抓挠地面来发出信号。"}}, {"q": {"en": "The book compares tuberculosis testing. How fast can HeroRATs check forty samples?", "zh": "书中对比了肺结核检测。英雄鼠检查四十份样本需要多长时间？"}, "options": [{"
