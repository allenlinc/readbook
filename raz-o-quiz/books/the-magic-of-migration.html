e sun.", "zh": "太阳。"}, {"en": "Their sense of smell.", "zh": "它们的嗅觉。"}, {"en": "Ocean currents.", "zh": "洋流。"}, {"en": "Magnetite.", "zh": "磁铁矿。"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says 'some animals, such as salmon, use their sense of smell to find the stream where they were first born.'", "zh": "书中说‘有些动物，比如鲑鱼，用嗅觉找到它们最初出生的溪流’。"}}, {"q": {"en": "What helps some birds sense Earth's magnetic north and south poles to navigate?", "zh": "是什么帮助一些鸟感知地球磁极来导航？"}, "options": [{"en": "Tiny magnetite particles in their brains.", "zh": "它们脑中的微小磁铁矿颗粒。"}, {"en": "Their brightly colored wings.", "zh": "它们色彩鲜艳的翅膀。"}, {"en": "The stars only.", "zh": "只有星星。"}, {"en": "Their sense of taste.", "zh": "它们的味觉。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book explains scientists found 'tiny particles of a magnetic substance, magnetite, in some birds' brains' that are pulled by Earth's poles to guide them.", "zh": "书中解释，科学家在一些鸟脑中发现了‘微小的磁性物质颗粒——磁铁矿’，它们受地球磁极吸引，从而指引鸟类。"}}, {"q": {"en": "What is special about the monarch butterflies' migration?", "zh": "帝王蝶的迁徙有什么特别之处？"}, "options": [{"en": "They fly only at night.", "zh": "它们只在夜间飞行。"}, {"en": "The adults die after laying eggs, and their young complete the journey.", "zh": "成虫产卵后死去，由它们的后代完成旅程。"}, {"en": "They travel only in Africa.", "zh": "它们只在非洲迁徙。"}, {"en": "They never return north.", "zh": "它们从不返回北方。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says monarchs fly south for winter, then 'the adults die after the females lay eggs. The eggs develop into young butterflies that complete the journey back home.'", "zh": "书中说帝王蝶南飞过冬，然后‘雌蝶产卵后成虫死去。卵发育成幼蝶，由它们完成返乡的旅程’。"}}, {"q": {"en": "What is the author's main purpose in writing this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"en": "To tell a made-up story about talking animals.", "zh": "讲述一个关于会说话的动物的虚构故事。"}, {"en": "To inform readers about why and how animals migrate.
