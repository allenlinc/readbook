nd and that finding them helps us save their homes, showing the author's hopeful, caring purpose.", "zh": "“接下来会怎样？”一节说还有更多物种有待发现，而发现它们有助于我们保护它们的家园，体现了作者充满希望与关怀的目的。"}}, {"q": {"en": "What is the author's main purpose in writing Animal Discoveries?", "zh": "作者写《动物大发现》的主要目的是什么？"}, "options": [{"en": "To inform readers about recently discovered animal species around the world", "zh": "为了向读者介绍世界各地最近被发现的动物物种"}, {"en": "To teach readers how to become a scientist", "zh": "为了教读者如何成为科学家"}, {"en": "To argue that all animals should be pets", "zh": "为了论证所有动物都该当宠物"}, {"en": "To tell a fictional adventure story", "zh": "为了讲述一个虚构的冒险故事"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book presents real new species (monkeys, frogs, bats, sharks, and more) with facts and photos to teach readers about recent animal discoveries.", "zh": "本书用事实和照片介绍了真实的新物种（猴、蛙、蝙蝠、鲨鱼等），目的是让读者了解近年的动物发现。"}}], "extended": {"prompt": {"en": "The book says many newly found species are in danger of dying out, and finding them helps us protect their homes. If you were a scientist who just discovered a new animal, what would you do to help protect it?", "zh": "书中说许多新发现的物种正面临灭绝的危险，而发现它们有助于我们保护它们的家园。如果你是一位刚发现新动物的科学家，你会做些什么来帮助保护它？"}, "guidance": {"en": ["Finding a species lets people learn about its habitat and needs.", "Protecting its home can save both known and unknown animals there.", "Some new species are already endangered, like the Caquetá titi monkey.", "Think about what the animal needs to survive (food, shelter, safety)."], "zh": ["发现一个物种，人们才能了解它的栖息地和需求。", "保护它的家园，可以拯救那里已知和未知的动物。", "有些新物种已经濒临灭绝，比如卡克塔卷尾猴。", "想一想这种动物生存需要什么（食物、庇护所、安全）。"]}}};</script>
