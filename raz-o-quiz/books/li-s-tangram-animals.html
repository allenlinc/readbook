<script>window.BOOK = {"slug": "li-s-tangram-animals", "title": "Li's Tangram Animals", "titleZh": "李的七巧板动物", "level": "O", "genre": "Fiction", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Why does Li feel lonely and miss his home at the beginning of the story?", "zh": "故事开头，Li 为什么感到孤独并想念家乡？"}, "options": [{"en": "He is new to the school and missing his home in China", "zh": "他刚到这所学校，并且想念在中国的家"}, {"en": "He does not like his teacher Miss Hess", "zh": "他不喜欢 Hess 老师"}, {"en": "He forgot his tangram puzzle at home", "zh": "他把七巧板忘在家里了"}, {"en": "The other children are unkind to him", "zh": "其他孩子对他不友好"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "On the first day of school, Li stands alone missing his home in China, and everyone around him is speaking a language he is working hard to understand.", "zh": "开学第一天，Li 独自站着想念他在中国的家，周围的人说着他正努力去理解的语言。"}}, {"q": {"en": "What gift does Li place on Miss Hess's desk?", "zh": "Li 放在 Hess 老师桌上的礼物是什么？"}, "options": [{"en": "A tangram puzzle and tangram puzzle cards that his father sent", "zh": "他父亲寄来的七巧板拼图和七巧板卡片"}, {"en": "A book about animals from China", "zh": "一本来自中国的动物书"}, {"en": "A drawing of a bald eagle", "zh": "一幅秃鹰的画"}, {"en": "A box of chocolates", "zh": "一盒巧克力"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Li hangs up his backpack and places the gift his father had sent on his teacher's desk—a tangram puzzle along with tangram puzzle cards.", "zh": "Li 挂好书包，把父亲寄来的礼物放在老师的桌上——一套七巧板拼图，以及配套的七巧板卡片。"}}, {"q": {"en": "According to Josh, how many triangles are in a tangram puzzle?", "zh": "根据 Josh 的说法，七巧板里有多少个三角形？"}, "options": [{"en": "Five (two small, one medium, two large)", "zh": "五个（两个小的、一个中等的、两个大的）"}, {"en": "Seven", "zh": "七个"}, {"en": "Three", "zh": "三个"}, {"en": "Four", "zh": "四个"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Josh picks up the five triangles and says there are two small, one medium, and two large triangles in the puzzle.", "zh": "Josh 拿起五个三角形，说拼图里有二个小的、一个中等的和二个大的三角形。"}}, {"q": {"en": "What does the word 'parallel' mean in the story?", "zh": "故事里 'parallel'（平行）这个词是什么意思？"}, "options": [{"en": "Two lines that run side by side and stay the same distance apart", "zh": "两条线并肩延伸，始终保持相同的距离"}, {"en": "Two lines that cross and form a corner", "zh": "两条线交叉形成一个角"}, {"en": "Two lines that are different lengths", "zh": "两条长度不同的线"}, {"en": "Two lines that curve around a circle", "zh": "两条绕着圆弯曲的线"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Miss Hess explains that parallel means two lines that run side by side and are an equal distance apart; Sam compares them to railroad tracks.", "zh": "Hess 老师解释说，parallel 指两条线并肩延伸、始终保持相等的距离；Sam 把它们比作铁轨。"}}, {"q": {"en": "Which statement about how the tangram pieces fit together is true?", "zh": "关于七巧板拼块的拼合方式，哪一句是正确的？"}, "options": [{"en": "Two small triangles cover the square exactly, and two small triangles plus a square cover the parallelogram", "zh": "两个小三角形正好盖住正方形，两个小三角形加一个正方形盖住平行四边形"}, {"en": "The square is bigger than two large triangles put together", "zh": "正方形比两个大三角形拼起来还大"}, {"en": "The parallelogram is made of five triangles", "zh": "平行四边形由五个三角形组成"}, {"en": "The medium triangle covers the square exactly", "zh": "中等三角形正好盖住正方形"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "During free time, the children see that two small triangles cover the square exactly, and two small triangles and a square cover the parallelogram.", "zh": "自由活动时，孩子们看到两个小三角形正好盖住正方形，两个小三角形加一个正方形盖住平行四边形。"}}, {"q": {"en": "Miss Hess's first riddle describes an animal that is a symbol of the United States, a large bird of prey with excellent eyesight. What animal does Li make?", "zh": "Hess 老师的第一个谜语描述了一种美国的象征、视力极佳的大型猛禽。Li 拼出了什么动物？"}, "options": [{"en": "A bald eagle", "zh": "秃鹰"}, {"en": "A shark", "zh": "鲨鱼"}, {"en": "A kangaroo", "zh": "袋鼠"}, {"en": "A lion", "zh": "狮子"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The clues—symbol of the United States, large bird of prey, excellent eyesight—point to the bald eagle, which Li arranges from the tangram.", "zh": "这些线索——美国的象征、大型猛禽、极佳的视力——指向秃鹰，Li 用七巧板拼出了它。"}}, {"q": {"en": "Which animal is described as having a skeleton made of cartilage, four rows of teeth, living in the ocean, with babies called 'pups'?", "zh": "哪种动物被描述为骨骼由软骨而非骨头构成、有四排牙齿、生活在海洋中、幼崽被称为 'pups'？"}, "options": [{"en": "A shark", "zh": "鲨鱼"}, {"en": "A walrus", "zh": "海象"}, {"en": "A kangaroo", "zh": "袋鼠"}, {"en": "A camel", "zh": "骆驼"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Miss Hess's second riddle lists those traits; Sam guesses a walrus, but Li correctly makes a shark.", "zh": "Hess 老师的第二个谜语列出了这些特征；Sam 猜是海象，但 Li 正确地拼出了鲨鱼。"}}, {"q": {"en": "Why does Miss Hess ask Li to give the class one more clue about the third animal?", "zh": "Hess 老师为什么让 Li 给全班再提供一个关于第三种动物的线索？"}, "options": [{"en": "So the other children can guess the animal too, and Li can join in", "zh": "好让其他孩子也能猜出这种动物，并让 Li 参与进来"}, {"en": "Because Li got the answer wrong", "zh": "因为 Li 答错了"}, {"en": "Because Miss Hess does not know the answer", "zh": "因为 Hess 老师自己也不知道答案"}, {"en": "To test whether Josh is paying attention", "zh": "为了测试 Josh 有没有在听"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Miss Hess asks Li for one more clue 'so they can get it, too,' helping the shy Li participate and letting classmates solve the riddle.", "zh": "Hess 老师请 Li 再给一条线索，好让大家也能猜出来，这让害羞的 Li 参与其中，也让同学们一起解开谜语。"}}, {"q": {"en": "How does Li change from the beginning to the end of the story?", "zh": "从故事开头到结尾，Li 发生了怎样的变化？"}, "options": [{"en": "He goes from shy and lonely to confident and happy to share with others", "zh": "他从害羞孤独变得自信，并乐于与他人分享"}, {"en": "He learns to speak Chinese better", "zh": "他学会了更好的中文"}, {"en": "He decides he does not like tangrams", "zh": "他决定不再喜欢七巧板"}, {"en": "He moves back to China", "zh": "他搬回了中国"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "At first Li is too shy to raise his hand, but by the end he proudly shares riddles and gives tangram puzzles to the whole class.", "zh": "一开始 Li 害羞得不敢举手，但到结尾时，他自豪地分享谜语，并把七巧板送给全班同学。"}}, {"q": {"en": "A few weeks later, what surprise does Li bring for the class?", "zh": "几周后，Li 给全班带来了什么惊喜？"}, "options": [{"en": "Boxes of tangram puzzles from China, seven pieces each, enough for everyone", "zh": "来自中国的一盒盒七巧板，每个有七块，足够每人一份"}, {"en": "A pet kangaroo", "zh": "一只宠物袋鼠"}, {"en": "A real bald eagle feather", "zh": "一根真正的秃鹰羽毛"}, {"en": "A book written by Miss Hess", "zh": "一本由 Hess 老师写的书"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Li brings a surprise box of tangram puzzles that came from China, each with seven pieces, and there are enough for everyone.", "zh": "Li 带来一盒惊喜——来自中国的七巧板，每个有七块，数量足够每人一份。"}}], "extended": {"prompt": {"en": "Miss Hess used riddles to introduce animals. Write your own tangram riddle for an animal you know, and describe how you would arrange the seven pieces to make it.", "zh": "Hess 老师用谜语来介绍动物。为你熟悉的一种动物写一个七巧板谜语，并描述你会如何用那七块拼块把它摆出来。"}, "guidance": {"en": "• Think about the animal's most recognizable features (where it lives, what it looks like, a special trait).\n• Give clues like the book does—size, body parts, habitat—without naming the animal.\n• Remember a tangram has 7 pieces: 2 large, 1 medium, and 2 small triangles, a square, and a parallelogram.\n• Try arranging pieces to form the animal's shape before writing the riddle.", "zh": "• 想一想动物最易辨认的特征（栖息地、外形、特殊习性）。\n• 像书里那样给出线索——大小、身体部位、栖息地——但先别说名字。\n• 记住七巧板有 7 块：2 大、1 中、2 小三角形，1 个正方形，1 个平行四边形。\n• 写谜语前，先试着用拼块摆出动物的形状。"}}};</script>
