<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Mouse Island Marathon — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#30 · The Mouse Island Marathon</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: The Mouse Island Marathon</em> (Scholastic, 2002) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who is Champ Strongpaws in the story?", "zh": "故事里的尚普·斯特朗波是谁？"}, "options": [{"en": "A wild cat that escaped from the museum", "zh": "从博物馆逃跑的野猫"}, {"en": "Geronimo's brother who owns a cheese shop", "zh": "杰罗尼摩开奶酪店的哥哥"}, {"en": "The editor in chief of The Rodent's Gazette according to some versions of the story", "zh": "《啮齿动物公报》的主编（按书中另一种说法）"}, {"en": "Geronimo's friend and trainer who entered him in the marathon", "zh": "杰罗尼摩的朋友兼教练，是他帮杰罗尼摩报名参赛的"}], "answer": 3, "explain": {"en": "Champ Strongpaws is a star athlete and Geronimo's friend who signed him up for the Mouse Island Marathon and trained him.", "zh": "尚普·斯特朗波是一名运动明星，也是杰罗尼摩的朋友，是他帮杰罗尼摩报名参加老鼠岛马拉松并训练他的。"}}, {"q": {"en": "Where does the Mouse Island Marathon take place?", "zh": "老鼠岛马拉松在哪里举行？"}, "options": [{"en": "Stray Cat Harbor", "zh": "流浪猫港"}, {"en": "The Rattytrap Jungle according to some versions of the story", "zh": "陷阱鼠丛林（按书中另一种说法）"}, {"en": "The city of Nibbles on Mouse Island", "zh": "老鼠岛上的尼布尔斯市"}, {"en": "New Mouse City", "zh": "新鼠城"}], "answer": 2, "explain": {"en": "The race is held in the city of Nibbles, on the opposite side of Mouse Island, overlooking Stray Cat Harbor.", "zh": "比赛在尼布尔斯市举行，那里位于老鼠岛的另一侧，俯瞰着流浪猫港。"}}, {"q": {"en": "How long is the Mouse Island Marathon?", "zh": "老鼠岛马拉松有多长？"}, "options": [{"en": "Ten miles", "zh": "十英里"}, {"en": "One hundred miles according to some versions of the story", "zh": "一百英里（按书中另一种说法）"}, {"en": "Thirteen miles", "zh": "十三英里"}, {"en": "Twenty-six point two miles", "zh": "二十六点二英里"}], "answer": 3, "explain": {"en": "Champ tells Geronimo the marathon is 'just a mere twenty-six point two miles,' the standard marathon length.", "zh": "尚普告诉杰罗尼摩，马拉松“只有短短的二十六点二英里”，也就是标准的马拉松长度。"}}, {"q": {"en": "What did Geronimo eat on the plane to Nibbles?", "zh": "杰罗尼摩在飞往尼布尔斯的飞机上吃了什么？"}, "options": [{"en": "A piece of chocolate cake", "zh": "一块巧克力蛋糕"}, {"en": "A slice of cheese pizza", "zh": "一块奶酪披萨"}, {"en": "Three lettuce leaves, two carrots, and a boiled turnip", "zh": "三片生菜叶、两根胡萝卜和一个煮萝卜"}, {"en": "A big slab of cheddar lasagna according to some versions of the story", "zh": "一大块切达干酪千层面（按书中另一种说法）"}], "answer": 2, "explain": {"en": "The flight attendant served Geronimo three lettuce leaves, two raw carrots, and a boiled turnip because he was on a strict diet.", "zh": "空乘人员给杰罗尼摩端上了三片生菜叶、两根生胡萝卜和一个煮萝卜，因为他正在严格控制饮食。"}}, {"q": {"en": "What escaped animal chases Geronimo near the finish line?", "zh": "终点线附近追着杰罗尼摩跑的逃跑动物是什么？"}, "options": [{"en": "A poisonous snake", "zh": "一条毒蛇"}, {"en": "Fifi the cat, also called Felinius ferociousmus", "zh": "名叫菲菲的猫，也叫凶猛猫"}, {"en": "A giant mouse", "zh": "一只巨大的老鼠"}, {"en": "A friendly pet dog according to some versions of the story", "zh": "一只友好的宠物狗（按书中另一种说法）"}], "answer": 1, "explain": {"en": "Fifi the cat (Felinius ferociousmus) had escaped from the Natural Science Mouseum of Nibbles and chased Geronimo, making him run faster.", "zh": "菲菲猫（凶猛猫）从尼布尔斯自然科学鼠物馆逃了出来，追着杰罗尼摩跑，反而让他跑得更快了。"}}, {"q": {"en": "Who is Gloomy Gus von Cacklefur?", "zh": "忧郁的古斯·冯·卡克福尔是谁？"}, "options": [{"en": "Geronimo's cousin according to some versions of the story in an early draft of the book", "zh": "杰罗尼摩的表哥（按书中另一种说法）（在书的早期草稿中）"}, {"en": "The uncle of Geronimo's friend Creepella von Cacklefur", "zh": "杰罗尼摩的朋友克里佩拉·冯·卡克福尔的叔叔"}, {"en": "Champ's brother", "zh": "尚普的哥哥"}, {"en": "Benjamin's teacher", "zh": "本杰明的老师"}], "answer": 1, "explain": {"en": "Gloomy Gus von Cacklefur is the uncle of Creepella von Cacklefur and complains about the terrible weather in Nibbles.", "zh": "忧郁的古斯·冯·卡克福尔是克里佩拉·冯·卡克福尔的叔叔，他一直在抱怨尼布尔斯糟糕的天气。"}}, {"q": {"en": "At mile 13, who gave Geronimo a thick piece of cheddar?", "zh": "在第13英里处，是谁给了杰罗尼摩一厚块切达干酪？"}, "options": [{"en": "His nephew Benjamin", "zh": "他的侄子本杰明"}, {"en": "His cousin Trap", "zh": "他的表哥特拉普"}, {"en": "His sister Thea", "zh": "他的妹妹西娅"}, {"en": "His trainer Champ", "zh": "他的教练尚普"}], "answer": 1, "explain": {"en": "At mile 13, Trap shoved a thick piece of cheddar into Geronimo's mouth to help him keep going.", "zh": "在第13英里处，特拉普把一厚块切达干酪塞进杰罗尼摩嘴里，帮他坚持下去。"}}, {"q": {"en": "What place did Geronimo finish in?", "zh": "杰罗尼摩最终获得了第几名？"}, "options": [{"en": "First place", "zh": "第一名"}, {"en": "Fiftieth place", "zh": "第五十名"}, {"en": "Last place", "zh": "最后一名"}, {"en": "Tenth place", "zh": "第十名"}], "answer": 0, "explain": {"en": "Chased by Fifi, Geronimo ran right through the tape and won first place in the Mouse Island Marathon.", "zh": "被菲菲追赶的杰罗尼摩冲过终点线，赢得了老鼠岛马拉松的第一名。"}}, {"q": {"en": "During the earthquake, how did Geronimo help a runner in danger?", "zh": "地震发生时，杰罗尼摩是如何帮助遇险的赛跑者的？"}, "options": [{"en": "He tied everyone's jackets together to make a rope", "zh": "他把大家的夹克系在一起做成了一根绳子"}, {"en": "He dug a deep hole", "zh": "他挖了一个深坑"}, {"en": "He called a helicopter", "zh": "他叫了一架直升机"}, {"en": "He built a wooden bridge according to some versions of the story", "zh": "他搭了一座木桥（按书中另一种说法）"}], "answer": 0, "explain": {"en": "When a chasm opened, Geronimo gathered running jackets, tied them into a rope, and pulled the falling runner to safety.", "zh": "当路面裂开一道大缝时，杰罗尼摩收集大家的夹克，把它们系成绳子，把快要掉下去的赛跑者拉到安全的地方。"}}, {"q": {"en": "What marathon did Champ sign Geronimo up for next?", "zh": "尚普又给杰罗尼摩报名了哪个马拉松？"}, "options": [{"en": "The Rattytrap Jungle Marathon on the Rio Mosquito", "zh": "蚊子河上的陷阱鼠丛林马拉松"}, {"en": "The New Mouse City Marathon", "zh": "新鼠城马拉松"}, {"en": "The Boston Marathon", "zh": "波士顿马拉松"}, {"en": "The Nibbles Marathon again according to some versions of the story", "zh": "再次参加尼布尔斯马拉松（按书中另一种说法）"}], "answer": 0, "explain": {"en": "Right after the race, Champ tells Geronimo he signed him up for the Rattytrap Jungle Marathon on the Rio Mosquito.", "zh": "比赛刚结束，尚普就告诉杰罗尼摩，他已经帮他报名了蚊子河上的陷阱鼠丛林马拉松。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
