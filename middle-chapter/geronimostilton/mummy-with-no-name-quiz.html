<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Mummy With No Name — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#26 · The Mummy With No Name</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: The Mummy With No Name</em> (Scholastic, 2005) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who is Professor Cyril B. Sandsnout?", "zh": "西里尔·桑兹诺特教授是谁？"}, "options": [{"en": "The owner of The Daily Rat newspaper according to some versions of the story", "zh": "《每日鼠报》的老板（按书中另一种说法）"}, {"en": "Geronimo's nephew", "zh": "杰罗尼摩的侄子"}, {"en": "The director of the Egyptian Mouseum in New Mouse City", "zh": "新老鼠城埃及老鼠博物馆的馆长"}, {"en": "A famous TV nature reporter", "zh": "一位著名的电视自然记者"}], "answer": 2, "explain": {"en": "Professor Sandsnout is the director of the Egyptian Mouseum in New Mouse City and an expert on everything about Egypt.", "zh": "桑兹诺特教授是新老鼠城埃及老鼠博物馆的馆长，也是一位精通埃及知识的专家。"}}, {"q": {"en": "Who is Bugsy Wugsy?", "zh": "巴基·乌格西是谁？"}, "options": [{"en": "Geronimo's little sister", "zh": "杰罗尼摩的妹妹"}, {"en": "Petunia Pretty Paws' niece", "zh": "佩图尼亚·漂亮爪的侄女"}, {"en": "Professor Sandsnout's daughter", "zh": "桑兹诺特教授的女儿"}, {"en": "The cleaning lady at the museum", "zh": "博物馆的清洁工"}], "answer": 1, "explain": {"en": "Bugsy Wugsy is the niece of Petunia Pretty Paws, Geronimo's friend, and she secretly has a crush on Benjamin.", "zh": "巴基·乌格西是杰罗尼摩的朋友佩图尼亚·漂亮爪的侄女，而且她偷偷喜欢本杰明。"}}, {"q": {"en": "Who was really pretending to be the Mummy With No Name?", "zh": "到底是谁假扮成了无名木乃伊？"}, "options": [{"en": "A thief named The Shadow", "zh": "一个名叫影子的盗贼"}, {"en": "Benjamin in a costume", "zh": "穿上戏服的本杰明"}, {"en": "Professor Sandsnout", "zh": "桑兹诺特教授"}, {"en": "A real ancient Egyptian ghost", "zh": "一个真正的古埃及幽灵"}], "answer": 0, "explain": {"en": "The Shadow, a master of disguises and Sally Ratmousen's cousin, dressed up as the mummy to scare visitors and steal the treasure.", "zh": "影子是伪装高手，也是莎莉·拉特莫森的表妹，她扮成木乃伊吓走游客，想偷走宝物。"}}, {"q": {"en": "According to the papyrus, what was Pharaoh Akhenraten's most precious treasure?", "zh": "根据莎草纸的记载，法老阿肯那顿最珍贵的宝物是什么？"}, "options": [{"en": "A pile of shining jewels according to some versions of the story", "zh": "一堆闪亮的珠宝（按书中另一种说法）"}, {"en": "His beloved bride, Neferati", "zh": "他深爱的妻子涅斐拉蒂"}, {"en": "A chest full of gold", "zh": "一箱满满的黄金"}, {"en": "A golden sarcophagus", "zh": "一座黄金棺椁"}], "answer": 1, "explain": {"en": "The papyrus said his most precious treasure was his beloved bride Neferati, whose love was worth more than gold.", "zh": "莎草纸上写道，他最珍贵的宝物是深爱的妻子涅斐拉蒂，这份爱比黄金更宝贵。"}}, {"q": {"en": "How many children did Pharaoh Akhenraten and Queen Neferati have?", "zh": "法老阿肯那顿和王后涅斐拉蒂有多少个孩子？"}, "options": [{"en": "Twelve", "zh": "十二个"}, {"en": "Seven according to some versions of the story", "zh": "七个（按书中另一种说法）"}, {"en": "Two", "zh": "两个"}, {"en": "None", "zh": "没有"}], "answer": 0, "explain": {"en": "The computer search said Pharaoh Akhenraten and the beautiful Neferati had twelve children and a long, happy rule.", "zh": "查电脑资料说，法老阿肯那顿和美丽的涅斐拉蒂育有十二个孩子，统治长久而幸福。"}}, {"q": {"en": "Where did Benjamin and Bugsy find the missing piece of the papyrus?", "zh": "本杰明和巴基是在哪里找到莎草纸缺失的那一块的？"}, "options": [{"en": "On top of the Bastet statue according to some versions of the story", "zh": "在巴斯特女神像顶上（按书中另一种说法）"}, {"en": "Inside the professor's wallet", "zh": "在教授的钱包里"}, {"en": "In the Hall of Scarabs", "zh": "在圣甲虫大厅里"}, {"en": "Under a big wooden chest underground", "zh": "在地下一只大木箱的底下"}], "answer": 3, "explain": {"en": "While trapped underground, Benjamin and Bugsy found the missing end piece of the papyrus under a big wooden chest.", "zh": "被关在地下时，本杰明和巴基在一只大木箱的底下找到了莎草纸缺失的结尾。"}}, {"q": {"en": "What is Geronimo allergic to?", "zh": "杰罗尼摩对什么过敏？"}, "options": [{"en": "Dust, mold, and even rubber flip-flops", "zh": "灰尘、霉菌，甚至橡胶人字拖"}, {"en": "Sunlight according to some versions of the story", "zh": "阳光（按书中另一种说法）"}, {"en": "Cats", "zh": "猫"}, {"en": "Cheese", "zh": "奶酪"}], "answer": 0, "explain": {"en": "Geronimo mentions he is allergic to dust and mold and even rubber flip-flops, which makes the dusty museum hard for him.", "zh": "杰罗尼摩说自己会对灰尘、霉菌，甚至橡胶人字拖过敏，所以满是灰尘的博物馆让他很难受。"}}, {"q": {"en": "How did Geronimo, the professor, Benjamin, and Bugsy escape the dark underground chamber?", "zh": "杰罗尼摩、教授、本杰明和巴基是怎样逃出黑暗的地下密室的？"}, "options": [{"en": "They waited for rescue to arrive", "zh": "他们等待救援到来"}, {"en": "The Shadow opened the door for them according to some versions of the story", "zh": "影子为他们打开了门（按书中另一种说法）"}, {"en": "They formed a rodent ladder to reach the trapdoor", "zh": "他们叠成老鼠人梯去够暗门"}, {"en": "They dug a tunnel with their paws", "zh": "他们用爪子挖了一条地道"}], "answer": 2, "explain": {"en": "They stacked on each other's shoulders to form a rodent ladder so Bugsy could push the trapdoor open and pull them out.", "zh": "他们一个踩一个叠成老鼠人梯，让巴基推开暗门，再用绳子把他们一个个拉出去。"}}, {"q": {"en": "Who is The Shadow related to?", "zh": "影子是谁的亲戚？"}, "options": [{"en": "Petunia Pretty Paws according to some versions of the story", "zh": "佩图尼亚·漂亮爪（按书中另一种说法）"}, {"en": "Sally Ratmousen, her cousin", "zh": "她的表姐莎莉·拉特莫森"}, {"en": "Aunt Sweetfur", "zh": "甜毛阿姨"}, {"en": "Professor Sandsnout", "zh": "桑兹诺特教授"}], "answer": 1, "explain": {"en": "The Shadow is the mysterious cousin of Sally Ratmousen, who owns The Daily Rat and is Geronimo's number-one rival.", "zh": "影子是莎莉·拉特莫森神秘的表妹，莎莉是《每日鼠报》的老板，也是杰罗尼摩的头号对手。"}}, {"q": {"en": "How did Geronimo end up in the hospital at the end of the story?", "zh": "故事结尾杰罗尼摩为什么会进医院？"}, "options": [{"en": "He ate too much cheese", "zh": "他奶酪吃太多了"}, {"en": "He got lost on the plane", "zh": "他在飞机上迷了路"}, {"en": "The mummy scared him badly according to some versions of the story", "zh": "木乃伊把他吓得够呛（按书中另一种说法）"}, {"en": "He tripped on Bugsy's pink skateboard and fell down stairs", "zh": "他被巴基的粉色滑板绊倒，从楼梯摔了下去"}], "answer": 3, "explain": {"en": "After landing in New Mouse City, Geronimo tripped on Bugsy's pink skateboard and tumbled down the stairs, ending up in the hospital wrapped in bandages.", "zh": "回到新老鼠城下飞机后，杰罗尼摩被巴基的粉色滑板绊倒，从楼梯滚落，浑身缠着绷带住进了医院。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
