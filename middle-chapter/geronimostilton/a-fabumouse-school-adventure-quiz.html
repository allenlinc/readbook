<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Fabumouse School Adventure — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#38 · A Fabumouse School Adventure</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: A Fabumouse School Adventure</em> (Scholastic, 2003) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What is Geronimo Stilton's job?", "zh": "杰罗尼摩·斯蒂顿的工作是什么？"}, "options": [{"en": "He writes, edits, and publishes a newspaper", "zh": "他写稿、当编辑并出版报纸"}, {"en": "He is a chef who makes cheese", "zh": "他是一位做奶酪的厨师"}, {"en": "He is a famous movie actor", "zh": "他是一位著名的电影演员"}, {"en": "He studies volcanoes for a living", "zh": "他以研究火山为职业"}], "answer": 0, "explain": {"en": "Geronimo says he is a writer, editor, and publisher of The Rodent's Gazette, the most famous newspaper on Mouse Island.", "zh": "杰罗尼摩说自己是一位作家、编辑，也是老鼠岛上最著名的报纸《鼠民公报》的出版人。"}}, {"q": {"en": "Whose school Career Day did Geronimo attend as a guest speaker?", "zh": "杰罗尼摩作为嘉宾参加了谁学校的职业日？"}, "options": [{"en": "His nephew Benjamin's school", "zh": "他侄子本杰明的学校"}, {"en": "His sister Thea's school", "zh": "他妹妹蒂娅的学校"}, {"en": "His cousin Trap's school", "zh": "他表哥特拉普的学校"}, {"en": "His own old school's reunion", "zh": "他自己母校的同学聚会"}], "answer": 0, "explain": {"en": "Benjamin invited his uncle to speak on Career Day at Little Tails Academy, his school.", "zh": "本杰明邀请叔叔到他所在的小尾巴学院，在职业日上演讲。"}}, {"q": {"en": "What time did Geronimo's alarm clock ring that morning?", "zh": "那天早上杰罗尼摩的闹钟几点响的？"}, "options": [{"en": "6:30 A.M.", "zh": "早上六点半"}, {"en": "7:30 A.M.", "zh": "早上七点半"}, {"en": "8:00 A.M.", "zh": "早上八点"}, {"en": "9:00 A.M.", "zh": "早上九点"}], "answer": 0, "explain": {"en": "The alarm rang at 6:30 A.M., a whole hour before Geronimo usually got up.", "zh": "闹钟在早上六点半响起，比杰罗尼摩平时起床的时间整整早了一个小时。"}}, {"q": {"en": "What kind of animal is Spike, the class pet?", "zh": "班级宠物斯派克是什么动物？"}, "options": [{"en": "A scaly green gecko", "zh": "一只长着鳞片的绿色壁虎"}, {"en": "A fluffy white cat", "zh": "一只毛茸茸的白猫"}, {"en": "A playful brown dog", "zh": "一只爱玩的棕色小狗"}, {"en": "A little gray mouse", "zh": "一只灰色的小老鼠"}], "answer": 0, "explain": {"en": "When Spike escaped, Geronimo gasped and saw that Spike was a scaly green gecko.", "zh": "斯派克逃出来时，杰罗尼摩惊讶地发现它是一只长着绿色鳞片的壁虎。"}}, {"q": {"en": "Who is the kind custodian that keeps rescuing Geronimo?", "zh": "一直帮助解救杰罗尼摩的那位善良的校工是谁？"}, "options": [{"en": "Henry Handipaws", "zh": "亨利·汉迪波"}, {"en": "Punk Rat", "zh": "朋克鼠"}, {"en": "Modest Mouse", "zh": "谦逊鼠"}, {"en": "Robert Rodentford", "zh": "罗伯特·罗登福德"}], "answer": 0, "explain": {"en": "Henry Handipaws, the school custodian, pulled Geronimo down from the flagpole and rescued him from the slide.", "zh": "学校的校工亨利·汉迪波把杰罗尼摩从旗杆上拉下来，又把他从滑梯里救出来。"}}, {"q": {"en": "Who was Geronimo's greatest school rival, now the principal?", "zh": "谁是杰罗尼摩学生时代最大的对手，如今成了校长？"}, "options": [{"en": "Veronica Stiffwhiskers", "zh": "维罗妮卡·斯蒂夫惠斯克"}, {"en": "Sally Ratmousen", "zh": "萨莉·鼠摩森"}, {"en": "Thea Stilton", "zh": "蒂娅·斯蒂顿"}, {"en": "Miss Angel Paws", "zh": "安杰尔·波老师"}], "answer": 0, "explain": {"en": "Geronimo ran into Veronica Stiffwhiskers in the hallway and learned she is now the school's principal.", "zh": "杰罗尼摩在走廊里撞见维罗妮卡·斯蒂夫惠斯克，才知道她现在是这所学校的校长。"}}, {"q": {"en": "What two ingredients mix to make Professor Magmamouse's volcano erupt?", "zh": "岩浆鼠教授做火山喷发实验时，是哪两种材料混合在一起？"}, "options": [{"en": "Baking soda and vinegar", "zh": "小苏打和醋"}, {"en": "Cheese and mold", "zh": "奶酪和霉菌"}, {"en": "Water and flour", "zh": "水和面粉"}, {"en": "Salt and sugar", "zh": "盐和糖"}], "answer": 0, "explain": {"en": "The book's experiment says when baking soda mixes with vinegar, it forms a foam like lava.", "zh": "书中的实验说明，小苏打和醋混合时会产生像熔岩一样的泡沫。"}}, {"q": {"en": "How many triple-decker cheese sandwiches did Geronimo help make?", "zh": "杰罗尼摩帮忙做了多少个三层奶酪三明治？"}, "options": [{"en": "757", "zh": "757个"}, {"en": "359", "zh": "359个"}, {"en": "27", "zh": "27个"}, {"en": "100", "zh": "100个"}], "answer": 0, "explain": {"en": "Geronimo helped Lulu make 757 triple-decker sandwiches for the class lunch.", "zh": "杰罗尼摩帮露露为全班午餐做了757个三层奶酪三明治。"}}, {"q": {"en": "What prize did Geronimo win for his reporting?", "zh": "杰罗尼摩因为新闻报道获得了什么奖？"}, "options": [{"en": "The Ratitzer Prize", "zh": "老鼠普利策奖"}, {"en": "A Nobel Prize", "zh": "诺贝尔奖"}, {"en": "An Olympic medal", "zh": "奥运奖牌"}, {"en": "A spelling bee trophy", "zh": "拼写比赛奖杯"}], "answer": 0, "explain": {"en": "The principal said Geronimo won a Ratitzer Prize for his scoop on The Curse of the Cheese Pyramid.", "zh": "校长说杰罗尼摩凭借《奶酪金字塔的诅咒》的独家报道获得了老鼠普利策奖。"}}, {"q": {"en": "What did the principal give Geronimo to honor him?", "zh": "校长为了表彰杰罗尼摩，送了他什么？"}, "options": [{"en": "A plaque with his name", "zh": "一块刻着他名字的纪念牌"}, {"en": "A gold trophy", "zh": "一座金奖杯"}, {"en": "A wheel of cheese", "zh": "一块圆形奶酪"}, {"en": "A school flag", "zh": "一面校旗"}], "answer": 0, "explain": {"en": "Veronica presented Geronimo with a plaque engraved with his name to display in the school trophy case.", "zh": "维罗妮卡送给杰罗尼摩一块刻着他名字的纪念牌，放在学校的荣誉陈列柜里展示。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
