<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Stinky Cheese Vacation — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#57 · The Stinky Cheese Vacation</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: The Stinky Cheese Vacation</em> (Scholastic, 2009) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who sent Geronimo the gloomy letter tied with a black ribbon?", "zh": "是谁给杰罗尼摩寄来了用黑丝带系着的阴沉信件？"}, "options": [{"en": "His sister, Thea", "zh": "他的妹妹西奥"}, {"en": "His friend, Hercule Poirat according to some versions of the story", "zh": "他的朋友赫拉克·波拉（按书中另一种说法）"}, {"en": "The Red Bandit", "zh": "红盗贼"}, {"en": "His uncle, Samuel S. Stingysnout", "zh": "他的叔叔萨缪尔·斯丁斯诺特"}], "answer": 3, "explain": {"en": "Geronimo finds the signature at the bottom of the letter: 'Samuel S. Stingysnout,' who is described as the stingiest rodent on Mouse Island and Geronimo's uncle.", "zh": "杰罗尼摩在信底部看到了署名“萨缪尔·斯丁斯诺特”，书里说他是老鼠岛上最小气的老鼠，也是杰罗尼摩的叔叔。"}}, {"q": {"en": "Where does Uncle Stingysnout live, and on what hill does his castle sit?", "zh": "斯丁斯诺特叔叔住在哪里，他的城堡又坐落在哪座山上？"}, "options": [{"en": "Penny Pincher Castle, on Cheap Change Hill", "zh": "佩妮·平彻城堡，坐落在廉价零钱山"}, {"en": "A cabin in the Grand Canyon according to some versions of the story", "zh": "大峡谷里的一间小木屋（按书中另一种说法）"}, {"en": "The Rodent's Gazette office", "zh": "《鼠民公报》的办公室"}, {"en": "A hotel in New Mouse City", "zh": "老鼠新城里的一家旅馆"}], "answer": 0, "explain": {"en": "The letter says Uncle is waiting 'at Penny Pincher Castle, the Stingysnout family home,' and on the trip Geronimo sees 'Cheap Change Hill, the craggy peak where Penny Pincher Castle sits.'", "zh": "信里说叔叔在“佩妮·平彻城堡，斯丁斯诺特家族的宅邸”等他；旅途中杰罗尼摩看到了“廉价零钱山，也就是佩妮·平彻城堡所在的崎岖山峰”。"}}, {"q": {"en": "What did Uncle Stingysnout claim in his letter to make Geronimo rush over?", "zh": "斯丁斯诺特叔叔在信里声称了什么，让杰罗尼摩急匆匆赶过去？"}, "options": [{"en": "That he was getting married", "zh": "他要结婚了"}, {"en": "That he had won the lottery", "zh": "他中了彩票"}, {"en": "That he was about to die (his death was coming soon)", "zh": "他快要死了（死期将近）"}, {"en": "That he had opened a new hotel according to some versions of the story", "zh": "他新开了一家旅馆（按书中另一种说法）"}], "answer": 2, "explain": {"en": "The letter reads: 'I am informing you of my impending departure from this world (and by this I mean my death, which is coming very, very soon!).'", "zh": "信中写道：“我要通知你，我即将离开这个世界（也就是说我很快、很快就要死了）。”"}}, {"q": {"en": "After the first garden request, how many more 'teeny, tiny last requests' did Uncle say he had?", "zh": "在第一个花园请求之后，叔叔说他还有多少个“小小的最后请求”？"}, "options": [{"en": "One", "zh": "一个"}, {"en": "Ten", "zh": "十个"}, {"en": "Three according to some versions of the story", "zh": "三个（按书中另一种说法）"}, {"en": "Seven", "zh": "七个"}], "answer": 3, "explain": {"en": "Uncle first says he has just one request, then quickly adds: 'Actually, it's seven little things!' — polishing his coffin, fixing his car, finding his will, sewing his suit, cooking dinner, and getting the castle ready, plus the garden.", "zh": "叔叔起初说只有一个请求，紧接着又飞快地说：“其实，是七件小事情！”——包括擦亮棺材、修车、找遗嘱、缝寿衣、做丧宴、布置城堡，再加上花园。"}}, {"q": {"en": "Which detective friend helped renovate the castle and installed the alarm system?", "zh": "哪位侦探朋友帮忙翻修城堡，并负责安装了警报系统？"}, "options": [{"en": "Trap Stilton according to some versions of the story", "zh": "特拉普·斯提尔顿（按书中另一种说法）"}, {"en": "Wild Willie", "zh": "野人威利"}, {"en": "Hercule Poirat", "zh": "赫拉克·波拉"}, {"en": "Bruce Hyena", "zh": "布鲁斯·鬣狗"}], "answer": 2, "explain": {"en": "The text says: 'Hercule Poirat is a detective, so he worked on installing the ALARM system.'", "zh": "书里说：“赫拉克·波拉是名侦探，所以他负责安装警报系统。”"}}, {"q": {"en": "Which adventurous mouse fixed the shingles on the castle roof?", "zh": "是哪只爱冒险的老鼠修好了城堡屋顶上的木瓦？"}, "options": [{"en": "Bruce Hyena", "zh": "布鲁斯·鬣狗"}, {"en": "Hercule Poirat", "zh": "赫拉克·波拉"}, {"en": "Grandfather William Shortpaws", "zh": "威廉·肖特波兹爷爷"}, {"en": "Samuel Stingysnout", "zh": "萨缪尔·斯丁斯诺特"}], "answer": 0, "explain": {"en": "The book says Bruce Hyena 'isn't afraid of heights... So he fixed the SHINGLES on the roof.'", "zh": "书中说布鲁斯·鬣狗“不怕高处……所以他修好了屋顶上的木瓦”。"}}, {"q": {"en": "Who arrived at the castle thinking it was a fancy hotel, and was the most famous singer on Mouse Island?", "zh": "谁来到城堡，把它当成了一家高级旅馆，而且还是老鼠岛上最有名的歌手？"}, "options": [{"en": "Thea Stilton", "zh": "西奥·斯提尔顿"}, {"en": "Faith Fancyfur", "zh": "费丝·花毛"}, {"en": "Petunia Pretty Paws", "zh": "佩图尼亚·漂亮爪"}, {"en": "Aunt Sweetfur", "zh": "甜毛阿姨"}], "answer": 1, "explain": {"en": "A blonde rodent in the latest style enters and Geronimo recognizes her: 'It was Faith Fancyfur, the most famouse singer on Mouse Island!'", "zh": "一位穿着时髦的金色毛发女鼠走进来，杰罗尼摩马上认出了她：“那是费丝·花毛，老鼠岛上最有名的歌手！”"}}, {"q": {"en": "In the library, how did Geronimo discover the scroll that turned out to be a treasure map?", "zh": "在藏书室里，杰罗尼摩是怎样发现那卷后来被证明是藏宝图的卷轴的？"}, "options": [{"en": "Uncle handed it to him directly", "zh": "叔叔直接把它交给了他"}, {"en": "He fell, hit a desk, and triggered a hidden drawer", "zh": "他摔了一跤，撞到书桌，触发了一个隐藏的抽屉"}, {"en": "He found it inside the freezer", "zh": "他在冰柜里找到了它"}, {"en": "It was mailed to him the next day according to some versions of the story", "zh": "第二天有人把它寄给了他（按书中另一种说法）"}], "answer": 1, "explain": {"en": "While climbing a broken ladder, Geronimo fell onto a desk, which 'activated a HIDDEN mechanism... a SECRET drawer. The drawer had opened, and inside was a rolled-up SCROLL!'", "zh": "杰罗尼摩爬坏梯子时摔到书桌上，“触发了一个隐藏的机关……一个秘密抽屉弹开了，里面是一卷卷起来的卷轴！”"}}, {"q": {"en": "Where was the treasure actually hidden, at the 'bottom of the bottom'?", "zh": "宝藏真正藏在哪里，也就是“最底层的底部”？"}, "options": [{"en": "In Uncle's safe", "zh": "在叔叔的保险箱里"}, {"en": "Beneath the stone floor of the cellar", "zh": "地窖石板地面的下方"}, {"en": "Behind the library bookshelf according to some versions of the story", "zh": "藏书室书架的后面（按书中另一种说法）"}, {"en": "Inside the attic", "zh": "在阁楼里"}], "answer": 1, "explain": {"en": "The cheese-wedge symbol was carved into the cellar floor and only visible from the stairs above; they dug up a wooden chest 'at the very bottom of the bottom' beneath the stones.", "zh": "奶酪楔子的符号刻在地窖的石板地上，只有站在上方的楼梯上才看得见；他们在石头底下“最底层的底部”挖出了一只木箱。"}}, {"q": {"en": "What was the stinky treasure inside the chest?", "zh": "木箱里的臭臭宝藏究竟是什么？"}, "options": [{"en": "Ten wheels of vintage Truffled cheddar cheese dated 1313", "zh": "十个标有1313年的陈年松露切达奶酪轮"}, {"en": "A collection of antique hats according to some versions of the story", "zh": "一批古董帽子（按书中另一种说法）"}, {"en": "A pile of gold coins", "zh": "一堆金币"}, {"en": "A diamond necklace", "zh": "一条钻石项链"}], "answer": 0, "explain": {"en": "Inside the chest were 'ten perfectly identical wheels of vintage cheese. Each wheel had the date 1313 stamped on it... Truffled cheddar (Extra-stinky).'", "zh": "箱子里有“十个一模一样的陈年奶酪轮，每个都印着1313年的字样……松露切达（格外刺鼻）”。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
