<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Karate Mouse — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#40 · The Karate Mouse</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: The Karate Mouse</em> (Scholastic, 2010) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who is Bruce Hyena?", "zh": "布鲁斯·鬣狗是谁？"}, "options": [{"en": "A strict karate sensei", "zh": "一位严厉的空手道师傅"}, {"en": "A friend of Geronimo who loves extreme sports", "zh": "杰罗尼摩一位热爱极限运动的朋友"}, {"en": "A mouse who gives massages according to some versions of the story", "zh": "一位给老鼠做按摩的鼠（按书中另一种说法）"}, {"en": "The editor of a newspaper", "zh": "一家报社的编辑"}], "answer": 1, "explain": {"en": "Bruce Hyena is a devoted sportsmouse who loves all athletic activity, especially extreme sports, and he calls Geronimo Cheesehead.", "zh": "布鲁斯·鬣狗是一位热衷运动的老鼠，特别喜欢极限运动，他还给杰罗尼摩起了“奶酪脑袋”的外号。"}}, {"q": {"en": "What is Shorty Tao's job at the newspaper?", "zh": "肖蒂·陶在报社担任什么职务？"}, "options": [{"en": "A sports reporter according to some versions of the story", "zh": "体育记者（按书中另一种说法）"}, {"en": "The managing editor", "zh": "执行主编"}, {"en": "A photographer", "zh": "摄影师"}, {"en": "The publisher", "zh": "出版人"}], "answer": 1, "explain": {"en": "By day, Shorty Tao is the managing editor of The Rodent's Gazette, and she is also a karate world champion.", "zh": "白天，肖蒂·陶是《鼠民公报》的执行主编，同时她也是空手道世界冠军。"}}, {"q": {"en": "Where did Bruce and Shorty take Geronimo for the tournament?", "zh": "布鲁斯和肖蒂把杰罗尼摩带到了哪里参加比赛？"}, "options": [{"en": "Cat Island", "zh": "猫岛"}, {"en": "Borneo", "zh": "婆罗洲"}, {"en": "New Mouse City according to some versions of the story", "zh": "新鼠城（按书中另一种说法）"}, {"en": "San Mouscisco", "zh": "圣鼠西斯科"}], "answer": 3, "explain": {"en": "They flew Geronimo to San Mouscisco on the western coast of Mouse Island for the karate world championship.", "zh": "他们把杰罗尼摩带到了老鼠岛西海岸的圣鼠西斯科，参加空手道世界锦标赛。"}}, {"q": {"en": "What is a 'dojo'?", "zh": "“道场”是什么？"}, "options": [{"en": "A school for learning karate", "zh": "学习空手道的场所"}, {"en": "A type of pizza", "zh": "一种披萨"}, {"en": "A Japanese bath according to some versions of the story", "zh": "日本的浴室（按书中另一种说法）"}, {"en": "A kind of belt", "zh": "一种腰带"}], "answer": 0, "explain": {"en": "The book explains that a dojo is a school for learning karate, a word that comes from Japan.", "zh": "书中说明，道场是学习空手道的场所，这个词来自日本。"}}, {"q": {"en": "What color belt did Geronimo earn after training?", "zh": "杰罗尼摩训练后获得了什么颜色的腰带？"}, "options": [{"en": "A white belt according to some versions of the story", "zh": "白带（按书中另一种说法）"}, {"en": "A red belt", "zh": "红带"}, {"en": "A green belt", "zh": "绿带"}, {"en": "A black belt", "zh": "黑带"}], "answer": 2, "explain": {"en": "After a week of training, Geronimo had learned enough to advance to a green belt.", "zh": "经过一周训练，杰罗尼摩学到了足够多的内容，升到了绿带。"}}, {"q": {"en": "What secret move did Geronimo use to win his match?", "zh": "杰罗尼摩用了什么秘密招式赢得了比赛？"}, "options": [{"en": "A backflip", "zh": "一个后空翻"}, {"en": "A headlock", "zh": "一个抱头锁"}, {"en": "A powerful jumping flying kick", "zh": "一记有力的腾空飞踢"}, {"en": "A somersault throw according to some versions of the story", "zh": "一个翻滚摔（按书中另一种说法）"}], "answer": 2, "explain": {"en": "Geronimo used a jumping-front-reverse-roundhouse kick taught by Sensei Yamamouse and yelled 'HIII YAAA' to win.", "zh": "杰罗尼摩使出了山鼠师傅教的腾空前旋回踢，大喊“嗨呀”，从而获胜。"}}, {"q": {"en": "Who was Geronimo's opponent in the final match?", "zh": "杰罗尼摩在决赛中的对手是谁？"}, "options": [{"en": "Bruce Hyena", "zh": "布鲁斯·鬣狗"}, {"en": "Mousoshi Champrat", "zh": "鼠士·尚普拉特"}, {"en": "Ferdinand Mouscos", "zh": "费迪南德·鼠斯科斯"}, {"en": "Butch Strongmouse", "zh": "布奇·壮鼠"}], "answer": 1, "explain": {"en": "On the tatami, Geronimo's opponent was the tough-looking Mousoshi Champrat from Japan.", "zh": "在比赛垫上，杰罗尼摩的对手是来自日本、看起来很强壮的鼠士·尚普拉特。"}}, {"q": {"en": "What did the clinic test check to make sure of?", "zh": "体检处的检测是为了确认什么？"}, "options": [{"en": "That Geronimo did not cheat with drugs", "zh": "杰罗尼摩没有靠药物作弊"}, {"en": "Geronimo's age", "zh": "杰罗尼摩的年龄"}, {"en": "Geronimo's eyesight according to some versions of the story", "zh": "杰罗尼摩的视力（按书中另一种说法）"}, {"en": "Geronimo's strength", "zh": "杰罗尼摩的力气"}], "answer": 0, "explain": {"en": "Officials took Geronimo to the clinic to test that he had not cheated using illegal substances.", "zh": "官员把杰罗尼摩带到体检处，检测他是否用违禁药物作弊。"}}, {"q": {"en": "Which athlete was disqualified for cheating?", "zh": "哪位运动员因为作弊被取消了资格？"}, "options": [{"en": "Butch Strongmouse", "zh": "布奇·壮鼠"}, {"en": "Ferdinand Mouscos", "zh": "费迪南德·鼠斯科斯"}, {"en": "Mousoshi Champrat", "zh": "鼠士·尚普拉特"}, {"en": "Shorty Tao", "zh": "肖蒂·陶"}], "answer": 0, "explain": {"en": "Butch Strongmouse's test came back positive because his trainer gave him illegal strength drugs, so he was disqualified.", "zh": "布奇·壮鼠的检测呈阳性，因为他的教练给了他违禁的增力药物，所以他被取消了资格。"}}, {"q": {"en": "Where did Shorty invite Geronimo to travel next?", "zh": "肖蒂邀请杰罗尼摩接下来去哪里旅行？"}, "options": [{"en": "Borneo", "zh": "婆罗洲"}, {"en": "Cat Island", "zh": "猫岛"}, {"en": "The North Pole according to some versions of the story", "zh": "北极（按书中另一种说法）"}, {"en": "Okinawa, Japan", "zh": "日本冲绳"}], "answer": 3, "explain": {"en": "After the tournament, Shorty invited Geronimo to Okinawa, Japan, the island where karate was born.", "zh": "比赛结束后，肖蒂邀请杰罗尼摩去日本冲绳，那是空手道的发源地。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
