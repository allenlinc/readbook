<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operation Secret Recipe — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#66 · Operation Secret Recipe</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: Operation Secret Recipe</em> (Scholastic, 2011) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What time was it when someone woke Geronimo by throwing rocks at his window?", "zh": "有人往窗外扔石头把杰罗尼摩吵醒时，是几点钟？"}, "options": [{"en": "Noon", "zh": "中午"}, {"en": "Eight in the evening according to some versions of the story", "zh": "晚上八点（按书中另一种说法）"}, {"en": "Midnight", "zh": "午夜"}, {"en": "Five o'clock in the morning", "zh": "清晨五点"}], "answer": 3, "explain": {"en": "Geronimo checked the time and saw it was five o'clock in the morning when the rocks started hitting his window.", "zh": "杰罗尼摩看了看时间，发现石头砸到他窗户时正是清晨五点。"}}, {"q": {"en": "What city in Italy did the Stilton family take Geronimo to?", "zh": "斯蒂顿一家把杰罗尼摩带到了意大利的哪座城市？"}, "options": [{"en": "Milan", "zh": "米兰"}, {"en": "Naples", "zh": "那不勒斯"}, {"en": "Venice", "zh": "威尼斯"}, {"en": "Rome", "zh": "罗马"}], "answer": 0, "explain": {"en": "Thea told Geronimo to bring clothes because they were going to Milan, Italy.", "zh": "蒂娅让杰罗尼摩带上衣服，因为他们要去意大利的米兰。"}}, {"q": {"en": "Who is Scooter Bookworm, the mouse who explains why they came to Milan?", "zh": "向他们解释此行原因的斯库特·书虫是谁？"}, "options": [{"en": "The chef who invented panettone according to some versions of the story", "zh": "发明潘妮朵尼的厨师（按书中另一种说法）"}, {"en": "A young history professor and friend of Thea", "zh": "一位年轻的历史教授，也是蒂娅的朋友"}, {"en": "Geronimo's grandfather", "zh": "杰罗尼摩的爷爷"}, {"en": "A pirate cat in disguise", "zh": "伪装成老鼠的海盗猫"}], "answer": 1, "explain": {"en": "Scooter Bookworm is a young history professor who specializes in the history of Milan and is a friend of Thea's.", "zh": "斯库特·书虫是一位年轻的历史教授，专攻米兰历史，也是蒂娅的朋友。"}}, {"q": {"en": "What precious treasure was stolen from the Royal Palace?", "zh": "从王宫里被偷走的珍贵宝物是什么？"}, "options": [{"en": "The ancient scroll with the secret panettone recipe", "zh": "写着潘妮朵尼秘方的古老卷轴"}, {"en": "Geronimo's newspaper", "zh": "杰罗尼摩的报纸"}, {"en": "A golden statue of a cat according to some versions of the story", "zh": "一座金色猫雕像（按书中另一种说法）"}, {"en": "A ruby ring", "zh": "一枚红宝石戒指"}], "answer": 0, "explain": {"en": "Scooter cried that someone stole the scroll showing the original secret recipe for panettone.", "zh": "斯库特惊呼有人偷走了记载潘妮朵尼原始秘方的卷轴。"}}, {"q": {"en": "How did the thief disguise himself to look exactly like Geronimo?", "zh": "小偷如何伪装得和杰罗尼摩一模一样？"}, "options": [{"en": "A pirate hat and wooden leg", "zh": "海盗帽和木腿"}, {"en": "A purple shawl and sailor's cap according to some versions of the story", "zh": "紫色披肩和水手帽（按书中另一种说法）"}, {"en": "A green suit, red tie, and round glasses", "zh": "绿色西装、红领带和圆框眼镜"}, {"en": "A panettone costume", "zh": "一套潘妮朵尼造型服"}], "answer": 2, "explain": {"en": "Under his janitor disguise the thief wore a green suit, the same red tie, and round glasses just like Geronimo.", "zh": "小偷在清洁工伪装下面穿着绿色西装、同样的红领带，还戴着和杰罗尼摩一样的圆框眼镜。"}}, {"q": {"en": "What clue did the thief throw in the garbage after the heist?", "zh": "偷走卷轴后，小偷把什么线索扔进了垃圾桶？"}, "options": [{"en": "The stolen ruby ring", "zh": "偷来的红宝石戒指"}, {"en": "A dented can of tuna according to some versions of the story", "zh": "一个凹掉的金枪鱼罐头（按书中另一种说法）"}, {"en": "A fish bone", "zh": "一根鱼骨"}, {"en": "His blue janitor uniform, which held a map", "zh": "他的蓝色清洁工制服，里面藏着一张地图"}], "answer": 3, "explain": {"en": "Benjamin and Bugsy noticed the thief threw his blue uniform in the garbage, and a folded map was in its pocket.", "zh": "本杰明和巴格西注意到小偷把蓝色制服扔进垃圾桶，而折叠起来的地图就藏在口袋里。"}}, {"q": {"en": "At the La Scala Theater, what did the thief steal while pretending to be Geronimo?", "zh": "在斯卡拉剧院，假扮杰罗尼摩的小偷偷走了什么？"}, "options": [{"en": "The panettone scroll according to some versions of the story", "zh": "潘妮朵尼卷轴（按书中另一种说法）"}, {"en": "A precious crystal flute", "zh": "一支珍贵的水晶长笛"}, {"en": "An ice cream cone", "zh": "一个冰淇淋甜筒"}, {"en": "A statue of Bastet", "zh": "巴斯特女神雕像"}], "answer": 1, "explain": {"en": "From an upper window the thief shouted that he, Geronimo, was stealing a precious crystal flute.", "zh": "小偷从剧院楼上的窗户大喊，他杰罗尼摩正在偷走一支珍贵的 Crystal 长笛。"}}, {"q": {"en": "At Sforza Castle, what statue did the thief steal from the Egyptian Museum?", "zh": "在斯福尔扎城堡，小偷从埃及博物馆偷走了哪座雕像？"}, "options": [{"en": "A golden mouse", "zh": "一只金色老鼠"}, {"en": "The Rodent's Gazette sign", "zh": "《鼠民公报》的招牌"}, {"en": "The goddess Bastet, a cat goddess", "zh": "巴斯特女神，也就是猫女神"}, {"en": "Leonardo's helicopter model according to some versions of the story", "zh": "达·芬奇的直升机模型（按书中另一种说法）"}], "answer": 2, "explain": {"en": "Guards said the thief stole the statue of Bastet, the ancient Egyptian cat goddess.", "zh": "守卫说小偷偷走了古埃及猫女神巴斯特的雕像。"}}, {"q": {"en": "How did Benjamin prove which Geronimo was the real one?", "zh": "本杰明是怎么证明哪个才是真正的杰罗尼摩的？"}, "options": [{"en": "The real Geronimo ripped three buttons off his pajamas", "zh": "真正的杰罗尼摩是睡衣上被扯掉三颗扣子的那个"}, {"en": "The real one was wearing a panettone costume according to some versions of the story", "zh": "穿着潘妮朵尼造型服的是真的（按书中另一种说法）"}, {"en": "The real one knew how to fly the Super RV", "zh": "真正会开超级房车的是真的"}, {"en": "The real one had a fishy smell", "zh": "身上有鱼腥味的是真的"}], "answer": 0, "explain": {"en": "Benjamin asked how many buttons were ripped off that morning; the fake said two from a jacket, but the real Geronimo ripped three off his pajamas.", "zh": "本杰明问当天早上扯掉了几颗扣子，假的小偷说是外套上两颗，但真正的杰罗尼摩是睡衣上被扯掉三颗。"}}, {"q": {"en": "What was the thief really, and why did he frame Geronimo?", "zh": "小偷到底是什么，他又为何要陷害杰罗尼摩？"}, "options": [{"en": "A robot built by Professor Cheesepuff according to some versions of the story", "zh": "奶酪泡芙教授制造的机器人（按书中另一种说法）"}, {"en": "A pirate cat trying to sink The Rodent's Gazette and invade Mouse Island", "zh": "一只想搞垮《鼠民公报》并入侵老鼠岛的海盗猫"}, {"en": "A chef who wanted the recipe", "zh": "一位想要秘方的厨师"}, {"en": "Geronimo's lost twin brother", "zh": "杰罗尼摩失散的双胞胎兄弟"}], "answer": 1, "explain": {"en": "The thief confessed he was a pirate cat; the cats wanted to jail Geronimo, sink his newspaper, and invade Mouse Island undetected.", "zh": "小偷承认自己是一只海盗猫，猫群想让杰罗尼摩坐牢、搞垮他的报纸，从而神不知鬼不觉地入侵老鼠岛。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
