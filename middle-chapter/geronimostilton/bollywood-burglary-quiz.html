<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bollywood Burglary — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#65 · Bollywood Burglary</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: Bollywood Burglary</em> (Scholastic, 2012) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who tricks Geronimo into traveling to India?", "zh": "是谁耍花招把杰罗尼摩骗去印度的？"}, "options": [{"en": "His friend Hercule Poirat, disguised as a waiter", "zh": "他的朋友赫库勒·波瓦，伪装成侍者"}, {"en": "His cousin Trap", "zh": "他的表哥特拉普"}, {"en": "His sister Thea", "zh": "他的妹妹蒂奥"}, {"en": "Professor Brainymouse according to some versions of the story", "zh": "布莱鼠教授（按书中另一种说法）"}], "answer": 0, "explain": {"en": "Hercule Poirat dresses as a waiter at the Taj Mahal restaurant on 17 Spice Street and tricks Geronimo into signing a paper before revealing himself.", "zh": "赫库勒·波瓦在香料街17号的泰姬陵餐厅扮成侍者，骗杰罗尼摩在文件上签了字，随后才露出真面目。"}}, {"q": {"en": "What paper does Geronimo accidentally sign at the restaurant?", "zh": "杰罗尼摩在餐厅里不小心签下的是什么文件？"}, "options": [{"en": "A restaurant bill", "zh": "一张餐厅账单"}, {"en": "An acting contract to star in the film Restless Hearts", "zh": "出演电影《不安的心》的演员合同"}, {"en": "A passport application", "zh": "一本护照申请表"}, {"en": "A cheese delivery order according to some versions of the story", "zh": "一份奶酪订货单（按书中另一种说法）"}], "answer": 1, "explain": {"en": "The paper Geronimo thought was the bill was actually a contract starring him opposite Ratna Prem in Restless Hearts.", "zh": "杰罗尼摩以为是账单的那张纸，其实是他和拉特娜·普雷姆共同主演《不安的心》的演员合同。"}}, {"q": {"en": "What precious jewel must Geronimo and Hercule protect?", "zh": "杰罗尼摩和赫库勒必须保护哪件价值连城的珍宝？"}, "options": [{"en": "A diamond necklace according to some versions of the story", "zh": "一条钻石项链（按书中另一种说法）"}, {"en": "The Queen's crown", "zh": "女王的王冠"}, {"en": "The Heart of Fire, a heart-shaped ruby", "zh": "“火焰之心”，一颗心形红宝石"}, {"en": "A golden trophy", "zh": "一座黄金奖杯"}], "answer": 2, "explain": {"en": "Ratna's fiancé gave her the Heart of Fire, a famous heart-shaped ruby, and she asks her old friends to protect it during the film shoot.", "zh": "拉特娜的未婚夫送给她“火焰之心”——一颗著名的心形红宝石，她请老朋友们在拍戏期间保护好它。"}}, {"q": {"en": "Who is Ratna Prem?", "zh": "拉特娜·普雷姆是谁？"}, "options": [{"en": "The mayor of New Mouse City", "zh": "新鼠城市的市长"}, {"en": "A famous Bollywood actress and Geronimo's old childhood friend", "zh": "一位著名的宝莱坞女星，也是杰罗尼摩小时候的老朋友"}, {"en": "Geronimo's nurse", "zh": "杰罗尼摩的保姆"}, {"en": "A chef at the Taj Mahal restaurant according to some versions of the story", "zh": "泰姬陵餐厅的厨师（按书中另一种说法）"}], "answer": 1, "explain": {"en": "Ratna is the most famous actress in Bollywood and attended Little Tails Academy with Geronimo and Hercule in their mouselinghood.", "zh": "拉特娜是宝莱坞最著名的女演员，小时候和杰罗尼摩、赫库勒一起在“小尾巴学院”同过学。"}}, {"q": {"en": "What role does Geronimo play in the movie Restless Hearts?", "zh": "在电影《不安的心》里，杰罗尼摩扮演的是什么角色？"}, "options": [{"en": "A restaurant cook", "zh": "餐厅厨师"}, {"en": "The king of England according to some versions of the story", "zh": "英国国王（按书中另一种说法）"}, {"en": "A hungry tiger", "zh": "一只饥饿的老虎"}, {"en": "The prince of Mysore", "zh": "迈索尔王子"}], "answer": 3, "explain": {"en": "The poster reads 'Restless Hearts, starring Ratna Prem and Geronimo Stilton'; Geronimo plays the prince of Mysore opposite Ratna's princess of Rajasthan.", "zh": "海报上写着“主演拉特娜·普雷姆与杰罗尼摩·斯蒂顿”，杰罗尼摩饰演迈索尔王子，对手戏是拉特娜的拉贾斯坦公主。"}}, {"q": {"en": "Which places in India does the film crew visit to shoot the movie?", "zh": "摄制组为了拍这部电影，去了印度的哪些地方？"}, "options": [{"en": "Paris, Rome, and Athens", "zh": "巴黎、罗马和雅典"}, {"en": "Sundarbans, Varanasi, Jaipur, and Agra (Taj Mahal)", "zh": "孙德尔本斯、瓦拉纳西、斋浦尔和阿格拉（泰姬陵）"}, {"en": "Only the studio in New Mouse City according to some versions of the story", "zh": "只在新鼠城的摄影棚里（按书中另一种说法）"}, {"en": "The North Pole", "zh": "北极"}], "answer": 1, "explain": {"en": "The director's map shows Day 1 Sundarbans National Park, Day 2 Varanasi, Day 3 Jaipur, and Day 4 Agra at the Taj Mahal for the final scene.", "zh": "导演的地图显示：第一天孙德尔本斯国家公园，第二天瓦拉纳西，第三天斋浦尔，第四天在阿格拉的泰姬陵拍摄最后一场戏。"}}, {"q": {"en": "Who finally teaches Geronimo how to dance?", "zh": "最终是谁教会了杰罗尼摩跳舞？"}, "options": [{"en": "Hercule Poirat", "zh": "赫库勒·波瓦"}, {"en": "The dance teacher Mrs. Ratel, after many hours according to some versions of the story", "zh": "舞蹈老师拉特尔夫人，在教了很久之后（按书中另一种说法）"}, {"en": "The film director Dev", "zh": "电影导演德夫"}, {"en": "Ratna, his old friend, after Mrs. Ratel gave up", "zh": "他的老朋友拉特娜，在拉特尔夫人放弃之后"}], "answer": 3, "explain": {"en": "Mrs. Ratel gives up, saying Geronimo is a lost cause, but Ratna gently leads him through the steps and he learns to dance.", "zh": "拉特尔夫人放弃说他没救了，但拉特娜温柔地带他一步步学，杰罗尼摩终于学会了跳舞。"}}, {"q": {"en": "What does the word 'Bollywood' come from?", "zh": "“宝莱坞”这个词是怎么来的？"}, "options": [{"en": "Hollywood plus Bombay, the old name for Mumbai", "zh": "“好莱坞”加上孟买（Mumbai旧称Bombay）"}, {"en": "A mouse's nickname", "zh": "一只老鼠的绰号"}, {"en": "A type of Indian bread", "zh": "一种印度面包"}, {"en": "The name of a famous ruby according to some versions of the story", "zh": "一颗著名红宝石的名字（按书中另一种说法）"}], "answer": 0, "explain": {"en": "The book explains Bollywood comes from 'Hollywood' plus 'Bombay', the old name for Mumbai, India's film capital.", "zh": "书里解释，“宝莱坞”来自“好莱坞”加上“孟买”（Bombay，孟买Mumbai的旧称），即印度电影之都。"}}, {"q": {"en": "Who actually steals the Heart of Fire at the wedding?", "zh": "在婚礼上真正偷走“火焰之心”的到底是谁？"}, "options": [{"en": "A clever monkey", "zh": "一只机灵的猴子"}, {"en": "The hotel manager", "zh": "酒店经理"}, {"en": "A stray cat", "zh": "一只流浪猫"}, {"en": "Geronimo's cousin Trap", "zh": "杰罗尼摩的表哥特拉普"}], "answer": 0, "explain": {"en": "Geronimo realizes the thief is a primate: the pawprints, the tuft of fur in the lock, the banana peel, and the monkey that bonked him with a banana in the jungle all point to a monkey.", "zh": "杰罗尼摩推断出小偷是只灵长类动物：爪印、锁里夹住的毛、窗台上的香蕉皮，还有在丛林里用香蕉砸他脑袋的那只猴子，都指向猴子。"}}, {"q": {"en": "Where is the Heart of Fire stolen from?", "zh": "“火焰之心”是在什么地方被偷走的？"}, "options": [{"en": "From Geronimo's hotel room", "zh": "从杰罗尼摩的酒店房间"}, {"en": "From the film set in the jungle according to some versions of the story", "zh": "从丛林里的拍摄现场（按书中另一种说法）"}, {"en": "From Ratna's wedding reception on the 30th floor in Mumbai", "zh": "从拉特娜在孟买30楼举行的婚宴上"}, {"en": "From the Taj Mahal", "zh": "从泰姬陵"}], "answer": 2, "explain": {"en": "At the wedding reception on the thirtieth floor in Mumbai, Ratna notices the ruby necklace is gone; pawprints lead out the open window to the ledge and gutter.", "zh": "在孟买30楼的婚宴上，拉特娜发现红宝石项链不见了；爪印从敞开的窗户通向窗台和排水槽。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
