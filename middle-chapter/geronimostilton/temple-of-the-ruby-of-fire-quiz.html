<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Temple of the Ruby of Fire — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#14 · The Temple of the Ruby of Fire</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: The Temple of the Ruby of Fire</em> (Scholastic, 2004) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Where does Professor von Volt send Geronimo's family on four plane tickets?", "zh": "冯·沃尔特教授用四张机票把杰罗尼摩一家送去了哪里？"}, "options": [{"en": "A ski resort in the mountains according to some versions of the story", "zh": "山里的一家滑雪场（按书中另一种说法）"}, {"en": "Club Mouse in Crocodilia, on the Amazon River in Brazil", "zh": "巴西亚马逊河上的鼠乐部度假村"}, {"en": "The mouse island beach", "zh": "老鼠岛的海滩"}, {"en": "A big city museum", "zh": "一座大城市里的博物馆"}], "answer": 1, "explain": {"en": "The yellow envelope holds four tickets to Club Mouse in Crocodilia, which is on the Amazon River in Brazil.", "zh": "那只黄色信封里装着四张去鼠乐部度假村的机票，鼠乐部位于巴西的亚马逊河上。"}}, {"q": {"en": "What is the name of the professor's solar-powered submarine?", "zh": "教授那艘靠太阳能驱动的深水潜艇叫什么名字？"}, "options": [{"en": "The Vonderwater", "zh": "汪德沃特号"}, {"en": "The Rodent's Gazette", "zh": "《老鼠日报》"}, {"en": "Club Mouse", "zh": "鼠乐部"}, {"en": "The Roaring Bat", "zh": "咆哮蝙蝠号"}], "answer": 0, "explain": {"en": "Geronimo is invited inside the professor's submarine, which is called the Vonderwater and runs on solar energy.", "zh": "杰罗尼摩被请进教授的潜艇，那艘潜艇名叫汪德沃特号，靠太阳能运行。"}}, {"q": {"en": "What are the 'Biters' that Monkeyfur warns Geronimo about in the river?", "zh": "猴毛提醒杰罗尼摩河里有“咬人怪”，那其实是什么？"}, "options": [{"en": "Friendly goldfish", "zh": "友好的金鱼"}, {"en": "Dolphins", "zh": "海豚"}, {"en": "Tiny crabs", "zh": "小螃蟹"}, {"en": "Piranhas", "zh": "食人鱼"}], "answer": 3, "explain": {"en": "Geronimo sees the fish open two rows of sharp teeth and realizes the Biters are piranhas.", "zh": "杰罗尼摩看到那些鱼张开两排尖牙，这才明白“咬人怪”就是食人鱼。"}}, {"q": {"en": "Who is the boss of the evil rodents cutting down the forest?", "zh": "在那伙滥砍森林的坏老鼠里，谁是头目？"}, "options": [{"en": "Nastytail", "zh": "坏尾巴"}, {"en": "Rowdyrat Bigtime", "zh": "闹翻天·大时代"}, {"en": "Bones", "zh": "骨头"}, {"en": "Mike Miceson", "zh": "迈克·大老鼠森"}], "answer": 0, "explain": {"en": "The chubby mouse with a gold medal reading 'I'M NASTY — AND PROUD OF IT!' is called Nastytail and is the boss.", "zh": "那只胖老鼠脖子上挂着写有“我很坏——我骄傲！”的金奖章，大家都叫他坏尾巴，他就是头目。"}}, {"q": {"en": "What are the scary 'Howling Spirits' in the temple really?", "zh": "神庙里那群吓人的“嚎叫幽灵”其实是什么？"}, "options": [{"en": "Bats", "zh": "蝙蝠"}, {"en": "Ghosts according to some versions of the story", "zh": "鬼魂（按书中另一种说法）"}, {"en": "Monkeys", "zh": "猴子"}, {"en": "Owls", "zh": "猫头鹰"}], "answer": 2, "explain": {"en": "Black monkeys swing from the beams howling; Monkeyfur says they are her friends, the guardians of the ruby.", "zh": "黑色的猴子在房梁上荡来荡去地嚎叫，猴毛说它们是自己的朋友，也是红宝石的守护者。"}}, {"q": {"en": "What does the ruby covering the well in the temple actually do?", "zh": "神庙水井上盖着的那块“红宝石”实际上是干什么用的？"}, "options": [{"en": "It is a glowing night-light according to some versions of the story", "zh": "它是一盏会发光的夜灯（按书中另一种说法）"}, {"en": "It works like a faucet that releases precious oil", "zh": "它像个水龙头，能流出珍贵的油"}, {"en": "It is a doorbell", "zh": "它是一个门铃"}, {"en": "It is a mirror", "zh": "它是一面镜子"}], "answer": 1, "explain": {"en": "The stone works like a faucet; when turned, drops of the precious Oil of Fire come out to light the villagers' lamps.", "zh": "那块石头像个水龙头，拧动它就会滴出珍贵的“火油”，用来点亮村民们的灯。"}}, {"q": {"en": "Who guards the REAL ruby at the bottom of the tunnel?", "zh": "在隧道尽头守护真正红宝石的是谁？"}, "options": [{"en": "A crocodile", "zh": "一只鳄鱼"}, {"en": "A scary ghost", "zh": "一个吓人的鬼"}, {"en": "A boa constrictor", "zh": "一条巨蟒"}, {"en": "A pack of monkeys according to some versions of the story", "zh": "一群猴子（按书中另一种说法）"}], "answer": 2, "explain": {"en": "Two yellow eyes belong to an enormous boa constrictor that guards the sparkling real ruby day and night.", "zh": "那双黄眼睛属于一条巨大的蟒蛇，它日夜守护着那颗闪闪发光的真红宝石。"}}, {"q": {"en": "What is the name of the head of the Club Mouse resort?", "zh": "鼠乐部度假村的负责人叫什么名字？"}, "options": [{"en": "Strongfur", "zh": "壮毛"}, {"en": "Dr. Wacky Whiskers according to some versions of the story", "zh": "怪须医生（按书中另一种说法）"}, {"en": "Nastytail", "zh": "坏尾巴"}, {"en": "Rowdyrat Bigtime", "zh": "闹翻天·大时代"}], "answer": 3, "explain": {"en": "The lanky mouse with a purple ponytail introduces himself as Rowdyrat Bigtime, head of Club Mouse.", "zh": "那只扎着紫色马尾、瘦高的老鼠自我介绍说是鼠乐部的负责人闹翻天·大时代。"}}, {"q": {"en": "Who are Strongfur and the people of his village descendants of?", "zh": "壮毛和村里的人是哪个古老民族的后代？"}, "options": [{"en": "The Incas", "zh": "印加人"}, {"en": "The Greeks", "zh": "希腊人"}, {"en": "The Romans", "zh": "罗马人"}, {"en": "The Egyptians", "zh": "埃及人"}], "answer": 0, "explain": {"en": "Strongfur explains they are the last descendants of the Incas, living by the House of the Howling Spirits.", "zh": "壮毛说他们是印加人最后的传人，住在“嚎叫幽灵之屋”旁边。"}}, {"q": {"en": "How does Monkeyfur capture the three evil rodents at the end?", "zh": "最后猴毛是用什么办法抓住那三个坏老鼠的？"}, "options": [{"en": "By calling the police directly according to some versions of the story", "zh": "直接打电话叫警察（按书中另一种说法）"}, {"en": "With clever traps she set in the forest", "zh": "用她在森林里设下的巧妙陷阱"}, {"en": "With a magic wand", "zh": "用一根魔法棒"}, {"en": "With a big fishing net", "zh": "用一张大鱼网"}], "answer": 1, "explain": {"en": "She sets traps: a pit hidden with twigs (Nastytail), a vine (Miceson), and a wooden cage (Bones), catching all three.", "zh": "她设下陷阱：用树枝盖住的坑（困住坏尾巴）、藤蔓（吊住大老鼠森）和木笼（关住骨头），把三个坏蛋全抓住了。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
