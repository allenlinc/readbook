<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Peculiar Pumpkin Thief — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#42 · The Peculiar Pumpkin Thief</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: The Peculiar Pumpkin Thief</em> (Scholastic, 2009) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who is Geronimo's detective friend who helps solve the Halloween mystery?", "zh": "帮助杰罗尼摩破解万圣节谜案的那位侦探朋友是谁？"}, "options": [{"en": "His nephew Benjamin", "zh": "他的侄子本杰明"}, {"en": "His sister Thea", "zh": "他的妹妹茜亚"}, {"en": "His cousin Trap", "zh": "他的表哥特拉普"}, {"en": "Hercule Poirat", "zh": "赫丘勒·波瓦"}], "answer": 3, "explain": {"en": "Hercule Poirat, the famous detective, hides in a pumpkin at the party store and later flies a helicopter to rescue Geronimo.", "zh": "名侦探赫丘勒·波瓦先是躲在派对商店的南瓜里，后来又开直升机把杰罗尼摩救了出来。"}}, {"q": {"en": "What was missing from the farmers' market just before Halloween?", "zh": "万圣节前夕，农贸市场上什么东西不见了？"}, "options": [{"en": "All the candy", "zh": "所有的糖果"}, {"en": "All the costumes according to some versions of the story", "zh": "所有的服装（按书中另一种说法）"}, {"en": "All the cheese", "zh": "所有的奶酪"}, {"en": "All the pumpkins", "zh": "所有的南瓜"}], "answer": 3, "explain": {"en": "Every pumpkin in New Mouse City had been stolen, so the farmer showed pictures of his missing produce and asked people to call the police.", "zh": "鼠城所有的南瓜都被偷光了，农夫只好举起失踪蔬菜的照片，请大家报警。"}}, {"q": {"en": "Who sent the orange 'Open... if you dare!' invitations to Mystery Park?", "zh": "那封橙色‘敢就拆开……’的神秘公园邀请函是谁发出的？"}, "options": [{"en": "Paws Frankster according to some versions of the story", "zh": "波兹·弗兰克斯特（按书中另一种说法）"}, {"en": "Thea", "zh": "茜亚"}, {"en": "Chuckles the clown", "zh": "小丑查克尔斯"}, {"en": "Hercule Poirat", "zh": "赫丘勒·波瓦"}], "answer": 2, "explain": {"en": "The evil clown Chuckles built Mystery Park and invited the whole city, then locked the gates to rob their houses.", "zh": "邪恶的小丑查克尔斯建造了神秘公园，邀请全城居民，随后锁上大门去洗劫大家的家。"}}, {"q": {"en": "What covered the mysterious tower that rose in the center of town?", "zh": "在镇中心突然冒出来的神秘高塔外面包着什么？"}, "options": [{"en": "An orange tarp", "zh": "一块橙色的防水布"}, {"en": "A giant pumpkin according to some versions of the story", "zh": "一个巨大的南瓜（按书中另一种说法）"}, {"en": "A clown mask", "zh": "一个小丑面具"}, {"en": "Snow", "zh": "白雪"}], "answer": 0, "explain": {"en": "A gigantic tower covered by an orange tarp appeared in the middle of town; it was later revealed to be Chuckles's Clown Tower headquarters.", "zh": "镇中央出现了一座裹着橙色防水布的巨大高塔，后来才发现那是查克尔斯的小丑塔总部。"}}, {"q": {"en": "How did Geronimo manage to get out of the locked Mystery Park?", "zh": "杰罗尼摩是怎样逃出被锁住的神秘公园的？"}, "options": [{"en": "He climbed the chocolate wall according to some versions of the story", "zh": "他爬上了巧克力墙（按书中另一种说法）"}, {"en": "Hercule pulled him up with a helicopter hook", "zh": "赫丘勒用直升机上的钩子把他吊了上去"}, {"en": "He dug a tunnel", "zh": "他挖了一条地道"}, {"en": "He found a hidden door", "zh": "他找到了一扇暗门"}], "answer": 1, "explain": {"en": "Hercule flew a clown-faced helicopter overhead and dropped a steel hook; Geronimo grabbed it and was reeled up.", "zh": "赫丘勒驾驶一架小丑脸直升机飞到上空，放下一根钢钩，杰罗尼摩抓住后被吊了上去。"}}, {"q": {"en": "What caused the stolen helicopter to crash into the sea?", "zh": "被偷来的直升机为什么会坠入海中？"}, "options": [{"en": "A terrible storm", "zh": "一场可怕的风暴"}, {"en": "Running out of fuel", "zh": "燃油耗尽"}, {"en": "A banana peel stuck under the control panel", "zh": "一块香蕉皮卡在了操纵面板下面"}, {"en": "A bird hit the window according to some versions of the story", "zh": "一只鸟撞上了窗户（按书中另一种说法）"}], "answer": 2, "explain": {"en": "Hercule tossed a banana peel over his shoulder and it got stuck under the control panel, making the helicopter sputter and fall into the water.", "zh": "赫丘勒把香蕉皮往肩后一甩，皮卡在了操纵面板下面，导致直升机熄火并坠入水中。"}}, {"q": {"en": "What is Chuckles's weak point?", "zh": "查克尔斯的弱点是什么？"}, "options": [{"en": "He hates cheese", "zh": "他讨厌奶酪"}, {"en": "He is very sentimental and cries at sad stories", "zh": "他极易伤感，听悲伤的故事会哭"}, {"en": "He cannot swim", "zh": "他不会游泳"}, {"en": "He is afraid of the dark according to some versions of the story", "zh": "他怕黑（按书中另一种说法）"}], "answer": 1, "explain": {"en": "The book says Chuckles's weak point is that he is very sentimental and sobs like a newborn at sad stories.", "zh": "书里说查克尔斯的弱点是他非常感性，听到悲伤的故事会像新生儿一样大哭。"}}, {"q": {"en": "How did Hercule force Chuckles to give up the password?", "zh": "赫丘勒是如何逼查克尔斯说出密码的？"}, "options": [{"en": "He told a sad story that made Chuckles cry", "zh": "他讲了一个悲伤的故事，把查克尔斯讲哭了"}, {"en": "He fought him", "zh": "他跟查克尔斯打了一架"}, {"en": "He paid him money", "zh": "他付了钱"}, {"en": "He threatened to call the police according to some versions of the story", "zh": "他威胁要报警（按书中另一种说法）"}], "answer": 0, "explain": {"en": "Hercule told a tale of a tiny mouse and a strawberry eaten by a wolf; Chuckles wept, and Hercule made him reveal the password.", "zh": "赫丘勒讲了小老鼠和一颗被狼吃掉的草莓的故事，查克尔斯听了落泪，只好说出密码。"}}, {"q": {"en": "What saved Geronimo and Hercule when they fell from the flying tower?", "zh": "当两人从会飞的高塔上掉下去时，是什么救了他们？"}, "options": [{"en": "A yellow parachute", "zh": "一顶黄色的降落伞"}, {"en": "A second helicopter according to some versions of the story", "zh": "第二架直升机（按书中另一种说法）"}, {"en": "A big balloon", "zh": "一个大气球"}, {"en": "A safety net", "zh": "一张安全网"}], "answer": 0, "explain": {"en": "Hercule had listened to Granny Ironwhiskers and brought his chute; a yellow parachute opened and they landed safely.", "zh": "赫丘勒听了铁胡须奶奶的话随身带了降落伞，一顶黄色降落伞打开，两人平安落地。"}}, {"q": {"en": "Which famous painting did the clown army steal from the National Mouseum?", "zh": "小丑大军从国家老鼠博物馆偷走了哪幅名画？"}, "options": [{"en": "The Cheese Mona", "zh": "《奶酪蒙娜》"}, {"en": "The Mona Mousa", "zh": "《莫娜·莫莎》"}, {"en": "A ghost portrait", "zh": "一幅幽灵画像"}, {"en": "A bat statue", "zh": "一座蝙蝠雕像"}], "answer": 1, "explain": {"en": "Geronimo watched the thieves carry the priceless 'Mona Mousa' out of the National Mouseum.", "zh": "杰罗尼摩亲眼看着小偷把价值连城的《莫娜·莫莎》从国家老鼠博物馆搬走。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
