<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valley of the Giant Skeleton — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#32 · Valley of the Giant Skeleton</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: Valley of the Giant Skeleton</em> (Scholastic, 2004) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What present did Trap bring Geronimo to cure his writer's block?", "zh": "特拉普给杰罗尼摩带来了什么礼物，想治好他的写作瓶颈？"}, "options": [{"en": "An old map wrapped around a giant bone", "zh": "一张裹在一根巨大骨头上的古老地图"}, {"en": "A noisy cat clock", "zh": "一个会叫的猫形时钟"}, {"en": "A bag of cheese popcorn", "zh": "一袋奶酪爆米花"}, {"en": "A brand-new magnifying glass according to some versions of the story", "zh": "一个崭新的放大镜（按书中另一种说法）"}], "answer": 0, "explain": {"en": "Trap placed an old yellowed map wrapped around a gigantic bone on Geronimo's desk; he had found it inside Great-Great-Great-Uncle Wally's trunk.", "zh": "特拉普在杰罗尼摩的桌上放了一张发黄的古老地图，地图裹在一根巨大的骨头上。那是他在高高祖沃利叔叔的箱子里找到的。"}}, {"q": {"en": "Where does Geronimo's cousin Trap live?", "zh": "杰罗尼摩的表哥特拉普住在哪里？"}, "options": [{"en": "In a cheese-colored camper", "zh": "在一辆奶酪色的房车里"}, {"en": "In a house made of cheese", "zh": "在一座用奶酪盖的房子里"}, {"en": "In an old train car called the Orient Express", "zh": "在一节叫做东方快车的旧火车车厢里"}, {"en": "In a Mongolian tent in the desert according to some versions of the story", "zh": "在沙漠里的一顶蒙古包中（按书中另一种说法）"}], "answer": 2, "explain": {"en": "Trap lives in an old train car called the Orient Express, which once belonged to their explorer ancestor Wandering Wally.", "zh": "特拉普住在一节叫做东方快车的旧火车车厢里，那原本属于他们那位探险家祖先流浪的沃利。"}}, {"q": {"en": "Who was Great-Great-Great-Uncle Wally, and what happened to his fur?", "zh": "高高祖沃利叔叔是谁？他的毛发生了什么事？"}, "options": [{"en": "An explorer whose fur was chewed off by a crocodile in the Amazon River", "zh": "一位探险家，他在亚马逊河被鳄鱼咬掉了全身的毛"}, {"en": "A Mongolian tribal chief", "zh": "一位蒙古部落首领"}, {"en": "A famous paleontologist at the Mouseum of Natural History according to some versions of the story", "zh": "自然历史老鼠博物馆的著名古生物学家（按书中另一种说法）"}, {"en": "A lawyer for the Stilton Cheesemakers' Association", "zh": "斯提尔顿奶酪制造商协会的律师"}], "answer": 0, "explain": {"en": "Uncle Wally was a 1800s explorer who roamed the world searching for treasure; Trap said a crocodile in the Amazon River chewed his fur to bits.", "zh": "沃利叔叔是十九世纪的探险家，周游世界寻找宝藏。特拉普说他在亚马逊河被鳄鱼把全身的毛都咬光了。"}}, {"q": {"en": "What is the capital city of Mongolia that the family flew to?", "zh": "这家人乘飞机抵达的蒙古首都是哪座城市？"}, "options": [{"en": "Ulaanbaatar", "zh": "乌兰巴托"}, {"en": "New Mouse City", "zh": "老鼠新城"}, {"en": "Istanbul", "zh": "伊斯坦布尔"}, {"en": "Venice", "zh": "威尼斯"}], "answer": 0, "explain": {"en": "The family flew to Ulaanbaatar, the capital of Mongolia, before continuing on smaller planes, a bus, and camels.", "zh": "这家人先是飞到了蒙古的首都乌兰巴托，之后又换乘小飞机、公共汽车和骆驼继续前进。"}}, {"q": {"en": "The blonde rodent Geronimo met on the journey called herself Dr. von Fossilsnout. Who was she really?", "zh": "旅途中杰罗尼摩遇到的那位金发老鼠自称是化石鼻博士。她究竟是谁？"}, "options": [{"en": "Petunia Pretty Paws in a disguise", "zh": "伪装起来的佩图尼亚·漂亮爪子"}, {"en": "The Shadow, a famous thief in disguise", "zh": "影子，一个善于伪装的著名盗贼"}, {"en": "The real Dr. Karina von Fossilsnout, a paleontologist", "zh": "真正的卡琳娜·冯·化石鼻博士，一位古生物学家"}, {"en": "Sally Ratmousen herself", "zh": "萨莉·拉特穆森本人"}], "answer": 1, "explain": {"en": "The 'doctor' was actually the Shadow, Sally Ratmousen's cousin; she took off her tinted glasses and blonde wig to reveal her black jumpsuit.", "zh": "那位“博士”其实是影子，也就是萨莉·拉特穆森的表姐。她摘下有色眼镜、散开金发，露出了里面的黑色连身衣。"}}, {"q": {"en": "Who warned Geronimo that the guide Bondi Bobirat seemed suspicious?", "zh": "是谁提醒杰罗尼摩，向导邦迪·波比拉特看起来很可疑？"}, "options": [{"en": "Trap, his cousin", "zh": "他的表哥特拉普"}, {"en": "Benjamin, his nephew", "zh": "他的侄子本杰明"}, {"en": "Thea, his sister", "zh": "他的妹妹西奥"}, {"en": "Petunia Pretty Paws", "zh": "佩图尼亚·漂亮爪子"}], "answer": 1, "explain": {"en": "When Bobirat offered his jeep, Benjamin tugged Geronimo's sleeve and whispered that something seemed funny about that rat.", "zh": "当波比拉特主动提供吉普车时，本杰明拽了拽杰罗尼摩的袖子，悄悄说那只老鼠有点不对劲。"}}, {"q": {"en": "What kind of dinosaur skeleton did they find in the Valley of the Giant Skeletons?", "zh": "他们在巨人骨架谷发现的恐龙骨架属于哪种恐龙？"}, "options": [{"en": "A Velociraptor", "zh": "伶盗龙"}, {"en": "A Stegosaurus", "zh": "剑龙"}, {"en": "A Tyrannosaurus rex according to some versions of the story", "zh": "霸王龙（按书中另一种说法）"}, {"en": "A Tarbosaurus, a cousin of the Tyrannosaurus rex", "zh": "特暴龙，一种和霸王龙相近的恐龙"}], "answer": 3, "explain": {"en": "Geronimo called Petunia, who said the skeleton sounded like a Tarbosaurus, a dinosaur similar to a Tyrannosaurus rex found in the Gobi Desert.", "zh": "杰罗尼摩打电话给佩图尼亚，佩图尼亚说这副骨架听起来像是特暴龙——一种和霸王龙相似、生活在戈壁沙漠的恐龙。"}}, {"q": {"en": "What Mongolian legend did Helela tell the family by the stove?", "zh": "赫莱拉在炉边给这家人讲了哪个蒙古传说？"}, "options": [{"en": "A story about the Tarbosaurus according to some versions of the story", "zh": "一个关于特暴龙的故事（按书中另一种说法）"}, {"en": "A story about Genghis Khan", "zh": "一个关于成吉思汗的故事"}, {"en": "A story about two horses and a wolf hidden in a sack", "zh": "一个关于两匹马和一只藏在袋子里的狼的故事"}, {"en": "A story about the Gobi bear", "zh": "一个关于戈壁熊的故事"}], "answer": 2, "explain": {"en": "Helela told 'The Two Horses': a young horse opens a sack, a hungry wolf jumps out, and a clever rabbit tricks the wolf back inside.", "zh": "赫莱拉讲了“两匹马”的故事：小马打开一个袋子，一只饿狼跳出来，聪明的兔子把狼重新骗回袋子里。"}}, {"q": {"en": "How did the family finally find the way to the Valley of the Giant Skeletons after Bobirat abandoned them?", "zh": "在波比拉特把他们抛弃后，这家人究竟是怎样找到巨人骨架谷的？"}, "options": [{"en": "They followed the camels on their own", "zh": "他们自己跟着骆驼走"}, {"en": "Bondi Bobirat returned and drove them there according to some versions of the story", "zh": "邦迪·波比拉特回来开车送他们（按书中另一种说法）"}, {"en": "The Shadow gave the map back to them", "zh": "影子把地图还给了他们"}, {"en": "Benjamin drew the map from memory and their Mongolian friends guided them", "zh": "本杰明凭记忆画出了地图，蒙古朋友为他们带路"}], "answer": 3, "explain": {"en": "Benjamin had drawn the route from memory; when Tagik and Helela saw his drawing they said they could take the family there.", "zh": "本杰明凭记忆画出了路线。塔吉克和赫莱拉看到他的画后，说他们可以带这家人去那里。"}}, {"q": {"en": "What gift did the Mongolian tribal chief give Geronimo's family at the end?", "zh": "故事结尾，蒙古部落首领送给杰罗尼摩一家什么礼物？"}, "options": [{"en": "A piece of the Tarbosaurus skeleton according to some versions of the story", "zh": "一块特暴龙的骨架（按书中另一种说法）"}, {"en": "Stone pendants of blue amber with a fossilized insect inside", "zh": "内含化石昆虫的蓝色琥珀石吊坠"}, {"en": "Bags of gold coins", "zh": "一袋袋金币"}, {"en": "A live Przewalski's horse", "zh": "一匹活的普氏野马"}], "answer": 1, "explain": {"en": "The chief gave each of them a stone pendant that was actually a fragment of precious blue amber containing a fossilized insect.", "zh": "首领送给每人一枚石吊坠，那其实是一块珍贵的蓝色琥珀碎片，里面封着一只化石昆虫。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
