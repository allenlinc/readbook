<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Missing Movie — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#73 · The Missing Movie</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: The Missing Movie</em> (Scholastic, 2014) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What event is Geronimo asked to give the opening speech for?", "zh": "Geronimo 被邀请为哪个活动致开幕词？"}, "options": [{"en": "The New Mouse City Film Festival", "zh": "新老鼠城电影节"}, {"en": "A surfing race in Hawaii", "zh": "夏威夷的冲浪比赛"}, {"en": "A cheese-baking contest", "zh": "一场奶酪烘焙比赛"}, {"en": "A birthday party for Madame No", "zh": "Madame No 的生日派对"}], "answer": 0, "explain": {"en": "Mousella reminds Geronimo he agreed to give the opening speech for the first New Mouse City Film Festival.", "zh": "Mousella 提醒 Geronimo，他答应担任首届新老鼠城电影节的开幕致辞嘉宾。"}}, {"q": {"en": "What role does Creepella von Cacklefur have at the festival?", "zh": "Creepella von Cacklefur 在电影节担任什么角色？"}, "options": [{"en": "A judge who is an expert on scary movies", "zh": "一位恐怖片专家评委"}, {"en": "The festival director", "zh": "电影节总监"}, {"en": "The thief", "zh": "那个小偷"}, {"en": "A news reporter", "zh": "一名新闻记者"}], "answer": 0, "explain": {"en": "Creepella says she will be one of the judges as the expert on scary movies.", "zh": "Creepella 说她将作为恐怖片专家担任评委之一。"}}, {"q": {"en": "Whose secret movie was stolen from the safe?", "zh": "谁的那部秘密电影被从保险柜里偷走了？"}, "options": [{"en": "Mousen Scorsese", "zh": "Mousen Scorsese"}, {"en": "Trap Stilton", "zh": "Trap Stilton"}, {"en": "Jack Monterey", "zh": "Jack Monterey"}, {"en": "Benjamin Stilton", "zh": "Benjamin Stilton"}], "answer": 0, "explain": {"en": "Director Mousen Scorsese's top-secret movie was deleted from the projector and its only backup drive was taken from the safe.", "zh": "导演 Mousen Scorsese 那部绝密电影被从放映机删除，唯一的备份硬盘也被人从保险柜取走。"}}, {"q": {"en": "At what time were the security cameras disabled, marking the theft?", "zh": "安保摄像头在几点被关闭，标志着盗窃发生？"}, "options": [{"en": "8:00 p.m. on the first day", "zh": "第一天晚上 8 点"}, {"en": "Midnight", "zh": "午夜"}, {"en": "6:00 a.m.", "zh": "早上 6 点"}, {"en": "Noon", "zh": "中午"}], "answer": 0, "explain": {"en": "Creepella discovers the security cameras were disabled at 8:00 p.m. the day before, the time of the robbery.", "zh": "Creepella 发现安保摄像头在前一天晚上 8 点被关闭，正是盗窃发生的时间。"}}, {"q": {"en": "How many copies of Mousen Scorsese's stolen movie existed?", "zh": "Mousen Scorsese 那部被盗电影原本有几份拷贝？"}, "options": [{"en": "Only one, saved on the backup drive", "zh": "只有一份，保存在备份硬盘里"}, {"en": "Five copies", "zh": "五份"}, {"en": "A hundred copies", "zh": "一百份"}, {"en": "None, it was never finished", "zh": "一份都没有，电影没拍完"}], "answer": 0, "explain": {"en": "Mousen admits it was the only copy; he wanted only one to make it seem extra top secret.", "zh": "Mousen 承认那是唯一的拷贝，他想只留一份以显得格外绝密。"}}, {"q": {"en": "Which three rodents were on Hercule's list of suspects?", "zh": "Hercule 的嫌疑人名单上有哪三只老鼠？"}, "options": [{"en": "Toasty Fontina, Ronaldo Crostini, and Albus Mackintosh", "zh": "Toasty Fontina、Ronaldo Crostini 和 Albus Mackintosh"}, {"en": "Hercule, Trap, and Benjamin", "zh": "Hercule、Trap 和 Benjamin"}, {"en": "Kealoha, Kai, and Shadow", "zh": "Kealoha、Kai 和 Shadow"}, {"en": "Creepella, Mousella, and Jack", "zh": "Creepella、Mousella 和 Jack"}], "answer": 0, "explain": {"en": "An article names three enemies of Mousen: Toasty Fontina, Ronaldo Crostini, and Albus Mackintosh, all at the festival.", "zh": "一篇文章列出了 Mousen 的三个仇人：Toasty Fontina、Ronaldo Crostini 和 Albus Mackintosh，三人都在电影节现场。"}}, {"q": {"en": "Who was the mysterious mouselet fan that actually stole the movie?", "zh": "那位实际上偷走电影、假装成影迷的神秘小母鼠是谁？"}, "options": [{"en": "Shadow, Madame No's thief", "zh": "Shadow，Madame No 的手下窃贼"}, {"en": "Mousella", "zh": "Mousella"}, {"en": "Thea Stilton", "zh": "Thea Stilton"}, {"en": "A tourist from Hawaii", "zh": "一位来自夏威夷的游客"}], "answer": 0, "explain": {"en": "The thief removes her wig, sunglasses, and dress to reveal she is Shadow, the most famous thief on Mouse Island.", "zh": "小偷摘下假发、墨镜和裙子，露出她其实是 Shadow，老鼠岛上最有名的窃贼。"}}, {"q": {"en": "How did the detectives get footage of the thief committing the crime?", "zh": "侦探们是如何拍到小偷作案画面的？"}, "options": [{"en": "Trap's camera was left running by the changing room", "zh": "Trap 的摄影机落在更衣室旁一直开着"}, {"en": "A security camera caught her", "zh": "安保摄像头拍到了她"}, {"en": "Geronimo took a photo", "zh": "Geronimo 拍了照片"}, {"en": "Madame No recorded it", "zh": "Madame No 录了下来"}], "answer": 0, "explain": {"en": "Trap had forgotten his camera and left it running; it recorded the mouselet tampering with the camera and taking the keys.", "zh": "Trap 忘了拿摄影机，机器一直开着，录下了小母鼠动摄像头和拿走钥匙的过程。"}}, {"q": {"en": "Whom was the thief planning to meet at the cafe?", "zh": "小偷打算在咖啡馆和谁见面？"}, "options": [{"en": "Madame No", "zh": "Madame No"}, {"en": "Mousen Scorsese", "zh": "Mousen Scorsese"}, {"en": "Geronimo's grandfather", "zh": "Geronimo 的爷爷"}, {"en": "The festival director Jack", "zh": "电影节总监 Jack"}], "answer": 0, "explain": {"en": "A leopard-print car arrives and Madame No steps out to meet the thief, who had the stolen movie in her bag.", "zh": "一辆豹纹汽车驶来，Madame No 下车与小偷见面，小偷的包里正放着被盗电影。"}}, {"q": {"en": "What was Mousen Scorsese's secret movie really about?", "zh": "Mousen Scorsese 那部秘密电影究竟讲的是什么？"}, "options": [{"en": "Exposing Madame No's EGO Industries pollution", "zh": "揭露 Madame No 的 EGO 工业污染行为"}, {"en": "A romance on the beach", "zh": "海滩上的爱情故事"}, {"en": "How to surf", "zh": "如何冲浪"}, {"en": "A cheese-baking recipe", "zh": "奶酪烘焙食谱"}], "answer": 0, "explain": {"en": "The film is 'Just Say No to Madame No: A Pollution Story,' showing EGO factories dumping waste, clearing forests, and polluting the air.", "zh": "这部电影名为《对 Madame No 说不：一个污染故事》，展示了 EGO 工厂倾倒废水、砍伐森林、污染空气。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
