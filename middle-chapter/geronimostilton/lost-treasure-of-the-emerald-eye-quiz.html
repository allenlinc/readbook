<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lost Treasure of the Emerald Eye — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#1 · Lost Treasure of the Emerald Eye</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: Lost Treasure of the Emerald Eye</em> (Scholastic, 2000) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What newspaper does Geronimo Stilton run in New Mouse City?", "zh": "杰罗尼摩·斯蒂顿在老鼠岛首府新鼠城经营的是哪份报纸？"}, "options": [{"en": "The Mouse Times", "zh": "《老鼠时报》"}, {"en": "The Whisker Weekly according to some versions of the story", "zh": "《胡须周刊》（按书中另一种说法）"}, {"en": "The Rodent's Gazette", "zh": "《啮齿动物公报》"}, {"en": "Cheese Daily", "zh": "《奶酪日报》"}], "answer": 2, "explain": {"en": "Geronimo runs The Rodent's Gazette, the newspaper where his sister Thea also works as a special correspondent.", "zh": "杰罗尼摩经营着《啮齿动物公报》，他的妹妹蒂奥也是这家报纸的特约记者。"}}, {"q": {"en": "Where did Thea say she found the treasure map for the Emerald Eye?", "zh": "蒂奥说她是在哪里找到绿宝石之眼藏宝图的？"}, "options": [{"en": "At the flea market", "zh": "在跳蚤市场"}, {"en": "From a pirate according to some versions of the story", "zh": "从一个海盗手里（按书中另一种说法）"}, {"en": "In the mail", "zh": "在邮件里"}, {"en": "In a library", "zh": "在图书馆"}], "answer": 0, "explain": {"en": "Thea pulled a yellowed map from under the table and said she found it at the flea market.", "zh": "蒂奥从桌子底下拿出一张泛黄的地图，说她是在跳蚤市场找到的。"}}, {"q": {"en": "What is the name of Trap's thrift shop?", "zh": "特拉普的二手商店叫什么名字？"}, "options": [{"en": "Sailor Supplies", "zh": "水手用品"}, {"en": "Cheap Junk for Less", "zh": "便宜破烂大甩卖"}, {"en": "The Mouse Mall", "zh": "老鼠商场"}, {"en": "Trap's Treasures according to some versions of the story", "zh": "特拉普的宝藏（按书中另一种说法）"}], "answer": 1, "explain": {"en": "Trap runs a dusty thrift shop called Cheap Junk for Less, full of odd old items.", "zh": "特拉普经营着一家布满灰尘的二手商店，名叫“便宜破烂大甩卖”，里面全是稀奇古怪的旧东西。"}}, {"q": {"en": "What is the name of the ship the mice sail on to find the treasure?", "zh": "老鼠们出海寻宝乘坐的船叫什么名字？"}, "options": [{"en": "The Emerald Eye", "zh": "绿宝石之眼号"}, {"en": "The Cheese Express", "zh": "奶酪特快号"}, {"en": "The Rodent Queen", "zh": "啮齿女王号"}, {"en": "The Lucky Lady", "zh": "幸运女士号"}], "answer": 3, "explain": {"en": "Thea showed Geronimo a cheddar-colored boat owned by a retired sea captain, named the Lucky Lady.", "zh": "蒂奥给杰罗尼摩看了一艘退休老船长拥有的、切达奶酪色的船，名叫“幸运女士号”。"}}, {"q": {"en": "Who secretly stows away on the ship and is later found eating a Cheesy Chew in the kitchen?", "zh": "谁偷偷溜上了船，后来被发现在厨房里吃“芝士啃啃”零食？"}, "options": [{"en": "Thea, the sister", "zh": "妹妹蒂奥"}, {"en": "Benjamin, Geronimo's nephew", "zh": "本杰明，杰罗尼摩的侄子"}, {"en": "Mousella, the secretary according to some versions of the story", "zh": "秘书莫塞拉（按书中另一种说法）"}, {"en": "Trap, the cousin", "zh": "表哥特拉普"}], "answer": 1, "explain": {"en": "Geronimo's young nephew Benjamin hid on board; he was caught munching a Cheesy Chew late at night.", "zh": "杰罗尼摩的小侄子本杰明偷偷上了船，深夜被抓到时正啃着“芝士啃啃”零食。"}}, {"q": {"en": "Trap claims to be an expert sailor, but what does Geronimo discover he really was?", "zh": "特拉普自称是经验丰富的水手，但杰罗尼摩发现他其实是什么？"}, "options": [{"en": "A map maker", "zh": "制图师"}, {"en": "A professional baseball player", "zh": "职业棒球运动员"}, {"en": "A famous writer", "zh": "著名作家"}, {"en": "A cook, not a captain", "zh": "是厨师，不是船长"}], "answer": 3, "explain": {"en": "During the storm Trap admits he was never a captain — he was a cook — and a book titled 'Learn How to Sail in Eight Hundred Easy Lessons' falls out, bookmarked at page 11.", "zh": "在暴风雨中特拉普承认自己从不是船长——他只是个厨师——这时一本叫《八百堂轻松学航海》的书掉出来，书签还夹在第11页。"}}, {"q": {"en": "Who rescues Geronimo when he is knocked overboard into the sea?", "zh": "当杰罗尼摩被撞下海时，是谁救了他？"}, "options": [{"en": "Trap, who grabs him by the ears", "zh": "特拉普，抓住他的耳朵把他拉上来"}, {"en": "Thea, on a life raft", "zh": "蒂奥，乘救生筏"}, {"en": "A passing dolphin", "zh": "一只路过的海豚"}, {"en": "Benjamin, with a rope according to some versions of the story", "zh": "本杰明，用绳子（按书中另一种说法）"}], "answer": 0, "explain": {"en": "Thea shouts 'Mouse overboard!' and Trap jumps in, grabs Geronimo by the ears and drags him back to the Lucky Lady.", "zh": "蒂奥大喊“老鼠落水啦！”，特拉普跳下去抓住杰罗尼摩的耳朵，把他拖回了“幸运女士号”。"}}, {"q": {"en": "At the THREE SKULLS, what word must they spell by jumping on the lettered stones to escape the trap?", "zh": "在“三颗骷髅”处，他们必须踩着刻字的石头拼出哪个单词才能逃出陷阱？"}, "options": [{"en": "CHEESE", "zh": "CHEESE（奶酪）"}, {"en": "MOUSE", "zh": "MOUSE（老鼠）"}, {"en": "EMERALD", "zh": "EMERALD（绿宝石）"}, {"en": "PIRATE", "zh": "PIRATE（海盗）"}], "answer": 0, "explain": {"en": "Geronimo solves the riddle ('white or yellow, sharp or mellow, lots of holes') — the answer is CHEESE, so they must hop on the stones spelling C-H-E-E-S-E.", "zh": "杰罗尼摩解开了谜语（“白色或黄色、浓烈或温和、有很多孔”），答案是CHEESE，所以他们必须踩着拼出C-H-E-E-S-E的石头。"}}, {"q": {"en": "At the ONE SKULL, what natural danger does Geronimo fall into?", "zh": "在“一颗骷髅”处，杰罗尼摩掉进了什么自然危险里？"}, "options": [{"en": "A beehive", "zh": "一个蜂巢"}, {"en": "Quicksand", "zh": "流沙"}, {"en": "A pit of bones", "zh": "一个骷髅坑"}, {"en": "A deep lake", "zh": "一个深湖"}], "answer": 1, "explain": {"en": "Thea warns him the cheddar-colored rock marks quicksand; Geronimo sinks up to his ears until Trap pulls him out with a vine.", "zh": "蒂奥警告他那块切达奶酪色的石头标记着流沙；杰罗尼摩一直陷到耳朵，直到特拉普用藤蔓把他拉出来。"}}, {"q": {"en": "At the spot marked X, what do they actually find instead of the Emerald Eye?", "zh": "在地图标记X的地方，他们实际找到的并不是绿宝石之眼，而是什么？"}, "options": [{"en": "An empty cave", "zh": "一个空洞穴"}, {"en": "A pile of gold doubloons according to some versions of the story", "zh": "一堆金币（按书中另一种说法）"}, {"en": "A mouse resort with vacationing mice", "zh": "一个老鼠度假村，里面都是度假的老鼠"}, {"en": "A sleeping pirate", "zh": "一个睡着的海盗"}], "answer": 2, "explain": {"en": "Instead of treasure, they meet a group of mice in bathing suits with cameras — it is a resort, and the X marks a lake/resort area.", "zh": "他们没找到宝藏，而是遇到了一群穿着泳衣、拿着相机的老鼠——那是个度假村，标记X的位置其实是一个湖／度假区。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
