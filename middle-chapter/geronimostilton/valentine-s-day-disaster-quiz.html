<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valentine's Day Disaster — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#23 · Valentine's Day Disaster</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: Valentine's Day Disaster</em> (Scholastic, 2004) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Which holiday is this story all about?", "zh": "这个故事讲的是哪个节日？"}, "options": [{"en": "Christmas", "zh": "圣诞节"}, {"en": "New Year's Day according to some versions of the story", "zh": "元旦（按书中另一种说法）"}, {"en": "Halloween", "zh": "万圣节"}, {"en": "Valentine's Day", "zh": "情人节"}], "answer": 3, "explain": {"en": "Geronimo says this tale is all about one of his favorite holidays, Valentine's Day, and he throws a big party each year.", "zh": "杰罗尼摩说这个故事讲的是他最喜爱的节日之一——情人节，而且他每年都会办一场盛大的派对。"}}, {"q": {"en": "In the bathroom rush, what part of Geronimo got sucked into the drain?", "zh": "在浴室里手忙脚乱时，杰罗尼摩身体的哪个部位被吸进了下水道？"}, "options": [{"en": "His tail", "zh": "他的尾巴"}, {"en": "His ear", "zh": "他的耳朵"}, {"en": "His whiskers", "zh": "他的胡须"}, {"en": "His paw", "zh": "他的爪子"}], "answer": 0, "explain": {"en": "After slipping on soap and landing in the tub, Geronimo's tail got sucked into the drain and he had to wrap it in a bandage.", "zh": "杰罗尼摩踩到肥皂滑倒、栽进浴缸后，尾巴被下水道吸住，他只好用绷带把尾巴包了起来。"}}, {"q": {"en": "Who is Geronimo's number-one enemy who bought the NewsExpress to stop his paper?", "zh": "谁是杰罗尼摩的头号死敌，她买下新闻快递公司来封杀他的报纸？"}, "options": [{"en": "Tina Spicytail", "zh": "蒂娜·香尾"}, {"en": "Sally Ratmousen", "zh": "莎莉·鼠莫森"}, {"en": "Thea, his sister", "zh": "他的妹妹蒂奥"}, {"en": "Creepella von Cacklefur", "zh": "克里普拉·冯·卡克福尔"}], "answer": 1, "explain": {"en": "Sally Ratmousen runs The Daily Rat and brags that she bought the NewsExpress, telling them to stop delivering The Rodent's Gazette.", "zh": "莎莉·鼠莫森经营着《老鼠日报》，她得意地说自己买下了新闻快递公司，命令他们停止配送《啮齿动物公报》。"}}, {"q": {"en": "Which cowmouse from Texas helps Geronimo save his party?", "zh": "是哪一位来自德克萨斯州的牛仔鼠帮助杰罗尼摩挽救了派对？"}, "options": [{"en": "Madame Latomb according to some versions of the story", "zh": "拉通布夫人（按书中另一种说法）"}, {"en": "Shivereen", "zh": "希薇琳"}, {"en": "Cheesy Lou Sweetsnout", "zh": "甜嘴露·甜鼻"}, {"en": "Aunt Sweetfur", "zh": "甜毛阿姨"}], "answer": 2, "explain": {"en": "Cheesy Lou Sweetsnout is a country-singing cowmouse from Texas who tells Geronimo 'Every problem has a solution' and sends 100 horses and cowmice to deliver his paper.", "zh": "甜嘴露·甜鼻是一位来自德克萨斯州、唱乡村歌曲的牛仔鼠，她对杰罗尼摩说“每个问题都有解决办法”，还派了一百匹马和一百名牛仔鼠去送报纸。"}}, {"q": {"en": "At three o'clock, what disaster hit Geronimo at his house?", "zh": "下午三点，杰罗尼摩在家里遭遇了什么灾难？"}, "options": [{"en": "A tornado hit", "zh": "龙卷风袭来"}, {"en": "The roof fell in according to some versions of the story", "zh": "屋顶塌了（按书中另一种说法）"}, {"en": "A fire broke out", "zh": "着火了"}, {"en": "The sewer pipe burst", "zh": "污水管爆裂了"}], "answer": 3, "explain": {"en": "A wave of foul-smelling water hit Geronimo; the sewer pipe had burst and soaked his whole house.", "zh": "一股臭水朝杰罗尼摩扑来——原来是污水管爆裂，把他的整间屋子都泡湿了。"}}, {"q": {"en": "Who surprised Geronimo dressed as Cupid in a white sheet with a bow and arrow?", "zh": "谁披着白床单、拿着弓箭，扮成丘比特吓了杰罗尼摩一跳？"}, "options": [{"en": "The baker", "zh": "面包师"}, {"en": "Hercule Poirat, his friend", "zh": "他的朋友赫拉克·波瓦"}, {"en": "Trap, his cousin", "zh": "他的表哥特拉普"}, {"en": "Benjamin, his nephew", "zh": "他的侄子本杰明"}], "answer": 2, "explain": {"en": "Cousin Trap leaped out in a white sheet holding a bow and arrow, calling it his Cupid costume.", "zh": "表哥特拉普披着白床单、举着弓箭跳出来，说这是他的丘比特 costume（装扮）。"}}, {"q": {"en": "At seven p.m., who jumped up from behind the sofa to surprise Geronimo?", "zh": "晚上七点，是谁从沙发背后跳出来给杰罗尼摩惊喜？"}, "options": [{"en": "Grandfather William", "zh": "威廉爷爷"}, {"en": "Hercule Poirat", "zh": "赫拉克·波瓦"}, {"en": "Sally Ratmousen", "zh": "莎莉·鼠莫森"}, {"en": "Cheesy Lou", "zh": "甜嘴露"}], "answer": 1, "explain": {"en": "Hercule Poirat jumped up from behind the sofa saying they were organizing a little surprise for Geronimo.", "zh": "赫拉克·波瓦从沙发背后跳起来，说大家正在给杰罗尼摩准备一个小惊喜。"}}, {"q": {"en": "What heart-shaped food did Cousin Trap make for the party dinner?", "zh": "表哥特拉普为派对晚餐做了什么心形食物？"}, "options": [{"en": "A giant heart-shaped pizza", "zh": "一个巨大的心形披萨"}, {"en": "A cheesecake", "zh": "一块芝士蛋糕"}, {"en": "A bowl of stew", "zh": "一碗炖菜"}, {"en": "A chocolate cake according to some versions of the story", "zh": "一个巧克力蛋糕（按书中另一种说法）"}], "answer": 0, "explain": {"en": "When Grandfather William complained about pizza, Trap revealed a super-mega-huge pizza shaped like a heart.", "zh": "威廉爷爷抱怨怎么没有披萨，特拉普就端出了一个超级巨大的心形披萨。"}}, {"q": {"en": "At ten p.m., who rode a white horse into the living room as Cheesy Lou's fiancé?", "zh": "晚上十点，是谁骑着一匹白马冲进客厅，自称是甜嘴露的未婚夫？"}, "options": [{"en": "Professor Frankenstein", "zh": "弗兰肯斯坦教授"}, {"en": "Toughrat McBeefy", "zh": "壮鼠·麦克比菲"}, {"en": "Buzzy Sweetsnout", "zh": "巴兹·甜鼻"}, {"en": "Boris von Cacklefur", "zh": "鲍里斯·冯·卡克福尔"}], "answer": 1, "explain": {"en": "Toughrat McBeefy, Cheesy Lou's muscular fiancé (also called Little Bull), arrived on a white horse and lassoed himself cake and juice.", "zh": "壮鼠·麦克比菲是甜嘴露肌肉发达的未婚夫（也叫“小公牛”），他骑着白马出现，还用套索给自己套了块蛋糕和一杯橙汁。"}}, {"q": {"en": "At midnight, what did Cousin Trap wish for on his balloon?", "zh": "午夜时分，表哥特拉普在气球上许了什么愿望？"}, "options": [{"en": "An endless supply of cheese", "zh": "吃不完的奶酪"}, {"en": "A new motorcycle", "zh": "一辆新摩托车"}, {"en": "To be a movie star according to some versions of the story", "zh": "成为电影明星（按书中另一种说法）"}, {"en": "World peace", "zh": "世界和平"}], "answer": 0, "explain": {"en": "Following Pinky Pick's balloon idea, Trap wrote 'I wish for an endless supply of cheese' before sending it skyward.", "zh": "按照平基·皮克的气球点子，特拉普写下“我希望有吃不完的奶酪”，然后让气球飞上了天。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
