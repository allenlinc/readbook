<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Singing Sensation — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#39 · Singing Sensation</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: Singing Sensation</em> (Scholastic, 2004) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What TV show did Champ sign Geronimo up for?", "zh": "钱普帮杰罗尼摩报名参加了什么电视比赛？"}, "options": [{"en": "Mouse Island Idol", "zh": "老鼠岛偶像大赛"}, {"en": "The Rodent's Gazette", "zh": "《鼠民公报》"}, {"en": "The Cruelcat Express", "zh": "残暴猫快线"}, {"en": "A Mozart concert", "zh": "一场莫扎特音乐会"}], "answer": 0, "explain": {"en": "After hearing Geronimo sing in the shower, Champ signed him up for Mouse Island Idol, a show to find the best squeaker.", "zh": "钱普听到杰罗尼摩在洗澡时唱歌，就帮他报名了老鼠岛偶像大赛，那是选出最佳歌喉的节目。"}}, {"q": {"en": "Who is Champ Strongpaws?", "zh": "钱普·壮爪是谁？"}, "options": [{"en": "Geronimo's super-fit athletic friend", "zh": "杰罗尼摩那位超级健壮、爱运动的朋友"}, {"en": "The owner of a music store", "zh": "一家音乐店的店主"}, {"en": "A famous mouse detective", "zh": "一位著名的老鼠侦探"}, {"en": "A chef who makes cheese", "zh": "一位做奶酪的厨师"}], "answer": 0, "explain": {"en": "Champ is Geronimo's super-fit, energetic friend who loves endurance sports like cycling and marathons.", "zh": "钱普是杰罗尼摩那位超级健壮、精力充沛的朋友，他热爱骑车和马拉松等耐力运动。"}}, {"q": {"en": "What was the name of the song Geronimo sang on the show?", "zh": "杰罗尼摩在比赛上唱的那首歌叫什么名字？"}, "options": [{"en": "Welcome to New Mouse City", "zh": "《欢迎来到新鼠城》"}, {"en": "The Fabumouse Mozart", "zh": "《了不起的莫扎特》"}, {"en": "The Curse of the Cheese Pyramid", "zh": "《奶酪金字塔的诅咒》"}, {"en": "A Cat's Lullaby", "zh": "《猫咪摇篮曲》"}], "answer": 0, "explain": {"en": "A songwriter at Mousey Records wrote 'Welcome to New Mouse City' especially for Geronimo to perform.", "zh": "鼠城唱片公司的一位词曲作者专门为杰罗尼摩写了《欢迎来到新鼠城》让他演唱。"}}, {"q": {"en": "Who helped Geronimo when he froze with a 'tongue cramp' on stage?", "zh": "当杰罗尼摩在台上因为“舌头抽筋”僵住时，是谁帮了他？"}, "options": [{"en": "His nephew Benjamin", "zh": "他的侄子本杰明"}, {"en": "Champ Strongpaws", "zh": "钱普·壮爪"}, {"en": "Hercule Poirat", "zh": "赫库勒·波拉"}, {"en": "Pinky Pick", "zh": "平基·皮克"}], "answer": 0, "explain": {"en": "Benjamin came to Geronimo's side and began singing, and Geronimo joined in loud and clear with him.", "zh": "本杰明来到杰罗尼摩身边开始唱歌，杰罗尼摩也跟着他大声清楚地唱了起来。"}}, {"q": {"en": "What is the name of the cat pirate who stole Geronimo's CD?", "zh": "偷走杰罗尼摩唱片的猫海盗叫什么名字？"}, "options": [{"en": "Pussycat Pulverizer", "zh": "猫咪粉碎者"}, {"en": "Sleezer", "zh": "斯利泽"}, {"en": "Puny", "zh": "普尼"}, {"en": "Cleveland", "zh": "克利夫兰"}], "answer": 0, "explain": {"en": "The Musical Pirate was Pussycat Pulverizer, a cat who copied stolen CDs in his black camper.", "zh": "那位音乐海盗就是猫咪粉碎者，他在一辆黑色房车里复制偷来的唱片。"}}, {"q": {"en": "What unusual feature does Pussycat Pulverizer have?", "zh": "猫咪粉碎者有什么特别的特征？"}, "options": [{"en": "His right paw is made of steel", "zh": "他的右爪是钢做的"}, {"en": "He has a wooden tail", "zh": "他有一条木尾巴"}, {"en": "He has three eyes", "zh": "他有三只眼睛"}, {"en": "He has a gold tooth", "zh": "他有一颗金牙"}], "answer": 0, "explain": {"en": "The book's profile of P.P. says his right paw is made out of steel, and Geronimo saw the steel paw.", "zh": "书中对猫咪粉碎者的介绍说他右爪是钢做的，杰罗尼摩也亲眼见到了那只钢爪。"}}, {"q": {"en": "What is Pussycat Pulverizer's weakness?", "zh": "猫咪粉碎者的弱点在哪？"}, "options": [{"en": "Black licorice chewing gum", "zh": "黑色甘草口香糖"}, {"en": "Fish oil", "zh": "鱼油"}, {"en": "Honey", "zh": "蜂蜜"}, {"en": "Ketchup", "zh": "番茄酱"}], "answer": 0, "explain": {"en": "The book lists P.P.'s weakness as black licorice chewing gum.", "zh": "书中把黑色甘草口香糖列为猫咪粉碎者的弱点。"}}, {"q": {"en": "What vehicle did the cats use to escape at the end?", "zh": "最后那些猫是用什么交通工具逃走的？"}, "options": [{"en": "A black submarine", "zh": "一艘黑色潜水艇"}, {"en": "A bicycle", "zh": "一辆自行车"}, {"en": "A hot-air balloon", "zh": "一个热气球"}, {"en": "A train", "zh": "一列火车"}], "answer": 0, "explain": {"en": "The cats escaped in a black submarine marked Cruelcat Express as it sank into the waves.", "zh": "那些猫乘坐一艘标有“残暴猫快线”的黑色潜水艇沉入海浪中逃走了。"}}, {"q": {"en": "Who is Geronimo's editorial assistant who helped with his look?", "zh": "谁是为杰罗尼摩打理造型的编辑助理？"}, "options": [{"en": "Pinky Pick", "zh": "平基·皮克"}, {"en": "Mousella MacMouser", "zh": "莫塞拉·麦克莫泽"}, {"en": "Thea Stilton", "zh": "蒂娅·斯蒂顿"}, {"en": "Aunt Sweetfur", "zh": "甜毛阿姨"}], "answer": 0, "explain": {"en": "Champ assigned Pinky Pick, Geronimo's brainy editorial assistant, to help him try out new looks.", "zh": "钱普让杰罗尼摩聪明的编辑助理平基·皮克帮他尝试各种新造型。"}}, {"q": {"en": "What did Geronimo publish about his pirate adventure?", "zh": "杰罗尼摩把自己的冒险经历写成什么发表了？"}, "options": [{"en": "A special edition of The Rodent's Gazette", "zh": "《鼠民公报》的一期特刊"}, {"en": "A music CD", "zh": "一张音乐唱片"}, {"en": "A cookbook", "zh": "一本烹饪书"}, {"en": "A dictionary", "zh": "一本词典"}], "answer": 0, "explain": {"en": "Geronimo rushed to the office and printed a special edition of The Rodent's Gazette about the pirate plot.", "zh": "杰罗尼摩冲进报社，赶印了一期《鼠民公报》特刊，报道猫海盗的阴谋。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
