<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attack of the Bandit Cats — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#8 · Attack of the Bandit Cats</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: Attack of the Bandit Cats</em> (Scholastic, 2001) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Why were angry mice crowding outside Geronimo's office chanting 'We want Stilton!'?", "zh": "为什么愤怒的老鼠们挤在杰罗尼摩的办公室外，高喊着“我们要斯蒂尔顿”？"}, "options": [{"en": "The new Yellow Pages listed all the wrong phone numbers", "zh": "新出版的黄页电话簿里所有电话号码都印错了"}, {"en": "He lost the office keys", "zh": "他把办公室的钥匙弄丢了"}, {"en": "His books were completely sold out according to some versions of the story", "zh": "他写的书全部卖光了（按书中另一种说法）"}, {"en": "The newspaper was printed too late", "zh": "报纸印得太晚了"}], "answer": 0, "explain": {"en": "Geronimo's company printed the Yellow Pages with every phone number wrong, so a furious crowd gathered outside and even burned the directories.", "zh": "杰罗尼摩的公司印出的黄页电话簿里每一个号码都是错的，愤怒的人群聚集在门外，甚至把电话簿堆起来烧掉了。"}}, {"q": {"en": "What did Cousin Trap buy at the flea market to carry the family across the ocean?", "zh": "表哥特拉普在跳蚤市场买了什么，用来载着一家人漂洋过海？"}, "options": [{"en": "A small sailboat", "zh": "一艘小帆船"}, {"en": "A folding hang glider according to some versions of the story", "zh": "一架折叠滑翔机（按书中另一种说法）"}, {"en": "A hot-air balloon with purple and yellow dots", "zh": "一个紫色带黄色圆点的热气球"}, {"en": "A tiny submarine", "zh": "一艘小潜水艇"}], "answer": 2, "explain": {"en": "Trap bought a cheap hot-air balloon at the flea market; Geronimo complained it looked like a giant prune with freckles.", "zh": "特拉普在跳蚤市场买了一只便宜的热气球；杰罗尼摩抱怨它看起来像个长了雀斑的大李子干。"}}, {"q": {"en": "How many days did the mice float in the balloon before they reached the Claw Islands?", "zh": "老鼠们坐着气球飞行了多少天，才抵达猫爪群岛？"}, "options": [{"en": "Seven days", "zh": "七天"}, {"en": "Eleven days", "zh": "十一天"}, {"en": "Three days", "zh": "三天"}, {"en": "Twenty days according to some versions of the story", "zh": "二十天（按书中另一种说法）"}], "answer": 1, "explain": {"en": "They left at dawn and on the eleventh day at noon they finally caught sight of the Claw Islands.", "zh": "他们黎明出发，到了第十一天的中午才终于远远望见了猫爪群岛。"}}, {"q": {"en": "What was the name of the pirate cats' silver ship?", "zh": "海盗猫那艘银光闪闪的大船叫什么名字？"}, "options": [{"en": "The Silver Claw", "zh": "银爪号"}, {"en": "The Golden Hook according to some versions of the story", "zh": "金钩号（按书中另一种说法）"}, {"en": "The Black Sail", "zh": "黑帆号"}, {"en": "The Cat's Ear", "zh": "猫耳号"}], "answer": 0, "explain": {"en": "The pirate ship was called The Silver Claw; except for its black sails, the whole ship was covered in polished silver that shone in the sun.", "zh": "那艘海盗船名叫银爪号；除了黑色的帆，整艘船都裹着擦得发亮的银子，在阳光下闪闪发光。"}}, {"q": {"en": "What made the pirate leader, the Black Bandit, easy to recognize?", "zh": "海盗首领“黑盗贼”有什么让人一眼就能认出的特征？"}, "options": [{"en": "His right paw was a silver hook", "zh": "他的右爪是一只银钩"}, {"en": "He had three tails", "zh": "他长了三条尾巴"}, {"en": "He was covered in orange fur", "zh": "他浑身是橙色的毛"}, {"en": "He wore a heavy gold crown according to some versions of the story", "zh": "他戴着一顶沉甸甸的金王冠（按书中另一种说法）"}], "answer": 0, "explain": {"en": "The Black Bandit was a black cat whose right paw was a horrifying silver hook, and one eye was yellow while the other was green.", "zh": "黑盗贼是一只黑猫，他的右爪是一只吓人的银钩，而且一只眼睛是黄色、另一只是绿色。"}}, {"q": {"en": "Why did the bandit cats eat only snails instead of fish?", "zh": "为什么强盗猫只吃蜗牛，而不吃鱼？"}, "options": [{"en": "They did not know how to cook fish according to some versions of the story", "zh": "他们不会做鱼（按书中另一种说法）"}, {"en": "Fish were too expensive", "zh": "鱼太贵了"}, {"en": "Fish always made them sleepy", "zh": "鱼总是让他们犯困"}, {"en": "The Black Bandit was allergic to fish", "zh": "黑盗贼对鱼过敏"}], "answer": 3, "explain": {"en": "The Black Bandit was allergic to fish, so he forbade the crew from eating any; they survived on snails, snails, and more snails.", "zh": "黑盗贼对鱼过敏，所以禁止船员吃鱼；他们只能靠蜗牛、蜗牛，还是蜗牛过日子。"}}, {"q": {"en": "Who thought of the clever plan to file through the prison bars and escape?", "zh": "是谁想出了锯断牢栏、逃出监狱的妙计？"}, "options": [{"en": "Thea, the sister", "zh": "妹妹西娅"}, {"en": "Benjamin, the nephew", "zh": "侄子本杰明"}, {"en": "Geronimo, the uncle according to some versions of the story", "zh": "叔叔杰罗尼摩（按书中另一种说法）"}, {"en": "Trap, the cousin", "zh": "表哥特拉普"}], "answer": 1, "explain": {"en": "Young Benjamin got the idea from a book about Fearless Frank the Adventure Mouse, then used the Swiss army knife Geronimo gave him to file the bars.", "zh": "小本杰明是从一本写“冒险鼠无畏弗兰克”的书里得到灵感的，然后用杰罗尼摩送给他的瑞士军刀锯开了铁栏。"}}, {"q": {"en": "What did Benjamin use to trick the ship's compass and steer toward Ho-hum Island?", "zh": "本杰明用了什么去骗过船上的罗盘，让船驶向呼呼岛？"}, "options": [{"en": "The Black Bandit's silver hook", "zh": "黑盗贼的银钩"}, {"en": "A long piece of string", "zh": "一根长长的绳子"}, {"en": "His cheese-shaped refrigerator magnet", "zh": "他那块奶酪形状的冰箱贴磁铁"}, {"en": "A gold coin from the treasure according to some versions of the story", "zh": "宝藏里的一枚金币（按书中另一种说法）"}], "answer": 2, "explain": {"en": "Benjamin's lucky charm was a refrigerator magnet shaped like cheese; Thea stuck it to the compass so the needle pointed to Ho-hum Island.", "zh": "本杰明的幸运符是一块奶酪形状的冰箱贴磁铁；西娅把它贴在罗盘上，让指针指向了呼呼岛。"}}, {"q": {"en": "What secret hobby did the scary Black Bandit enjoy in his free time?", "zh": "令人害怕的黑盗贼在空闲时，有什么秘密爱好？"}, "options": [{"en": "Playing the violin", "zh": "拉小提琴"}, {"en": "Needlepoint with flowery pillows", "zh": "十字绣，缝制花团锦簇的枕头"}, {"en": "Cooking fancy snail dinners according to some versions of the story", "zh": "烹饪精致的蜗牛大餐（按书中另一种说法）"}, {"en": "Steering the ship", "zh": "驾驶大船"}], "answer": 1, "explain": {"en": "Geronimo found dozens of flowery homemade pillows in the Bandit's room, revealing his secret hobby was needlepoint.", "zh": "杰罗尼摩在黑盗贼的房间里发现了好几十个手工缝制的花枕头，从而揭开了他爱做十字绣的秘密爱好。"}}, {"q": {"en": "What famous treasure did the mice find hidden under the Black Bandit's bed?", "zh": "老鼠们在黑盗贼的床下发现了什么有名的宝物？"}, "options": [{"en": "A golden king's crown according to some versions of the story", "zh": "一顶国王的金王冠（按书中另一种说法）"}, {"en": "A giant single pearl", "zh": "一颗巨大的珍珠"}, {"en": "A map of Mouse Island", "zh": "一张老鼠岛的地图"}, {"en": "The legendary silver quarter of Mouse Island", "zh": "老鼠岛传说中的银质二角五分硬币"}], "answer": 3, "explain": {"en": "Under a locked trapdoor they found the legendary silver quarter, the first coin ever minted on Mouse Island, dated 1458, with the motto 'Rodents Be Smart, Follow Your Heart!'", "zh": "在带锁的暗门下，他们找到了传说中的银质二角五分硬币——那是1458年老鼠岛上铸造的第一枚硬币，背面刻着“聪明老鼠，跟随内心”的格言。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
