<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Too Fond of My Fur! — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#4 · I'm Too Fond of My Fur!</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: I'm Too Fond of My Fur!</em> (Scholastic, 2001) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Why did Geronimo order the Miracle Lotion Helmet from a TV commercial?", "zh": "杰罗尼摩为什么会按照电视广告订购那款神奇生发头盔？"}, "options": [{"en": "A TV ad made him worry his fur was thinning, so he wanted thicker fur.", "zh": "电视广告让他担心自己的毛在变少，所以他想让毛更浓密。"}, {"en": "He wanted to become a professional bowler rat. according to some versions of the story", "zh": "他想成为一名专业的保龄球鼠。（按书中另一种说法）"}, {"en": "Thea told him he had to buy it.", "zh": "蒂奥让他必须买下它。"}, {"en": "He needed it for his climb up Mouse Everest.", "zh": "他攀登老鼠珠峰时需要它。"}], "answer": 0, "explain": {"en": "A blonde-furred mouse on TV scared Geronimo into thinking he had a bald spot, so he ordered the helmet and lotion to grow thicker fur.", "zh": "电视里一只金毛母鼠吓唬杰罗尼摩，让他以为自己长了秃斑，于是他订购头盔和药水，想让毛长得更浓密。"}}, {"q": {"en": "Who called Geronimo on the phone asking for his help?", "zh": "是谁打电话给杰罗尼摩向他求助的？"}, "options": [{"en": "His cousin Trap", "zh": "他的表哥特拉普"}, {"en": "His sister Thea", "zh": "他的妹妹蒂奥"}, {"en": "Professor Paws von Volt, a brilliant scientist and old friend.", "zh": "波兹·冯·沃尔特教授，一位聪明的科学家，也是他的老朋友。"}, {"en": "The curly-furred delivery mouse according to some versions of the story in an early draft of the book", "zh": "那只卷毛的送货鼠（按书中另一种说法）（在书的早期草稿中）"}], "answer": 2, "explain": {"en": "Professor von Volt, a brilliant scientist and dear old friend, called from his secret lab and said his life was in danger.", "zh": "沃尔特教授是一位聪明的科学家，也是杰罗尼摩亲爱的老朋友，他从秘密实验室打来电话，说自己的生命有危险。"}}, {"q": {"en": "Where did Professor von Volt say he was calling from?", "zh": "沃尔特教授说他自己是从哪里打来电话的？"}, "options": [{"en": "His secret laboratory in the Himalayas", "zh": "他在喜马拉雅山脉的秘密实验室"}, {"en": "A desert island in the Ratlantic Ocean according to some versions of the story", "zh": "鼠西洋上的一座荒岛（按书中另一种说法）"}, {"en": "Geronimo's house on Mouseford Lane", "zh": "杰罗尼摩在老鼠福德巷的家"}, {"en": "The office of The Rodent's Gazette", "zh": "《啮齿动物公报》的办公室"}], "answer": 0, "explain": {"en": "The professor said, 'I'm calling from my secret lab in the Himalayas,' and asked Geronimo to fetch his diary.", "zh": "教授说：我是从喜马拉雅山脉的秘密实验室打来的电话，并请杰罗尼摩去取他的日记。"}}, {"q": {"en": "Who was Ratfur?", "zh": "拉特弗是谁？"}, "options": [{"en": "A delivery mouse with thick curly fur according to some versions of the story", "zh": "一只长着浓密卷毛的送货鼠（按书中另一种说法）"}, {"en": "The editor of The Daily Rat", "zh": "《老鼠日报》的主编"}, {"en": "A taxi driver in New Mouse City", "zh": "新鼠城的一名出租车司机"}, {"en": "Their Sherpa guide who helped them climb the mountain", "zh": "他们的夏尔巴向导，帮助他们登山"}], "answer": 3, "explain": {"en": "A rodent with honey-colored fur and a black ponytail met them in Kathmandu and introduced himself as Ratfur, their Sherpa guide.", "zh": "一只蜜色皮毛、扎着黑色马尾的鼠在加德满都迎接他们，自我介绍说是他们的夏尔巴向导拉特弗。"}}, {"q": {"en": "What tall mountain did the family have to climb to find the professor?", "zh": "为了找到教授，这一家人不得不攀登哪座高山？"}, "options": [{"en": "Cheese Mart hill", "zh": "奶酪超市小山"}, {"en": "Purrfect Park", "zh": "完美公园"}, {"en": "Mouse Everest, also called Chomolungma", "zh": "老鼠珠峰，也叫珠穆朗玛"}, {"en": "The Twisted Tail Gate Bridge according to some versions of the story", "zh": "扭尾门大桥（按书中另一种说法）"}], "answer": 2, "explain": {"en": "Ratfur said the professor had gone to Chomolungma, the 'Mother of the World' — which Geronimo knew as Mouse Everest, the highest mountain.", "zh": "拉特弗说教授去了珠穆朗玛，也就是众山圣母，而杰罗尼摩知道那就是世界上最高的老鼠珠峰。"}}, {"q": {"en": "What did Geronimo find in the snow when he was alone on the mountain?", "zh": "当杰罗尼摩独自在山上时，他在雪地里发现了什么？"}, "options": [{"en": "A lost wallet full of money", "zh": "一个装满钱的钱包"}, {"en": "A gigantic pawprint that he believed belonged to a yeti", "zh": "一个巨大的脚印，他相信那是雪人留下的"}, {"en": "Professor von Volt's missing glasses according to some versions of the story", "zh": "沃尔特教授丢失的眼镜（按书中另一种说法）"}, {"en": "An unidentified flying cheese slice", "zh": "一片不明飞行奶酪"}], "answer": 1, "explain": {"en": "After dropping behind the group, Geronimo spotted a gigantic pawprint in the snow and was sure it was the yeti's.", "zh": "落在队伍后面后，杰罗尼摩在雪地里看到一个巨大的脚印，并确信那是雪人留下的。"}}, {"q": {"en": "Who picked Geronimo up by his tail and carried him into a dark cave?", "zh": "是谁揪住杰罗尼摩的尾巴把他拎起来，带进了一个黑暗的洞穴？"}, "options": [{"en": "His cousin Trap", "zh": "他的表哥特拉普"}, {"en": "The big father yeti", "zh": "体型高大的雪人爸爸"}, {"en": "The Sherpa guide Ratfur", "zh": "夏尔巴向导拉特弗"}, {"en": "His nephew Benjamin", "zh": "他的侄子本杰明"}], "answer": 1, "explain": {"en": "The huge father yeti lifted Geronimo by his tail and carried him into the cave, where Geronimo then found the professor.", "zh": "高大的雪人爸爸揪住杰罗尼摩的尾巴把他拎进洞穴，杰罗尼摩随后在洞里找到了教授。"}}, {"q": {"en": "What was wrong with the baby yeti?", "zh": "小雪人怎么了？"}, "options": [{"en": "He was lost in the snowstorm according to some versions of the story", "zh": "他在暴风雪中迷路了（按书中另一种说法）"}, {"en": "He was very ill and needed special herbal medicine", "zh": "他病得很重，需要特殊的草药医治"}, {"en": "He wanted to read a book", "zh": "他想读一本书"}, {"en": "He was going bald", "zh": "他开始秃毛了"}], "answer": 1, "explain": {"en": "The cub was covered in red dots and very sick; the professor was feeding him herbal medicine to try to cure him.", "zh": "小雪人身上布满红点，病得很重，教授正用草药喂他，想办法治好他。"}}, {"q": {"en": "What did Professor von Volt need Geronimo to bring him?", "zh": "沃尔特教授需要杰罗尼摩给他带来什么？"}, "options": [{"en": "His secret diary containing a special healing formula", "zh": "他的秘密日记，里面写着一种特殊的治病配方"}, {"en": "A digital camera", "zh": "一台数码相机"}, {"en": "A bottle of Miracle Lotion according to some versions of the story", "zh": "一瓶神奇生发药水（按书中另一种说法）"}, {"en": "The massaging helmet", "zh": "那顶按摩头盔"}], "answer": 0, "explain": {"en": "The professor told Geronimo to find his secret diary, which held a special formula strong enough to cure the sick cub.", "zh": "教授让杰罗尼摩去找他的秘密日记，里面有一种特殊配方，足够强大到能治好生病的小雪人。"}}, {"q": {"en": "Why did Geronimo promise not to tell anyone about the yetis?", "zh": "杰罗尼摩为什么答应不把雪人的事告诉任何人？"}, "options": [{"en": "Because Thea wanted the scoop for her paper", "zh": "因为蒂奥想抢先报道这个独家新闻"}, {"en": "Because the yetis were dangerous meat-eating beasts according to some versions of the story", "zh": "因为雪人是危险的食肉猛兽（按书中另一种说法）"}, {"en": "Because Trap dared him to stay quiet", "zh": "因为特拉普激他将这事憋在心里"}, {"en": "Because yetis are shy creatures and the professor asked him to keep it a secret", "zh": "因为雪人是害羞的动物，而且教授请求他保守秘密"}], "answer": 3, "explain": {"en": "The professor explained yetis are extremely shy and would be upset by nosy journalists, so Geronimo gave his word of honor to stay silent.", "zh": "教授解释雪人非常害羞，会被爱窥探的记者吓坏，于是杰罗尼摩以鼠的名誉起誓，保守这个秘密。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
