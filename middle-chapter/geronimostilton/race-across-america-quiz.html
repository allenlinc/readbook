<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Race Across America — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#37 · The Race Across America</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: The Race Across America</em> (Scholastic, 2007) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What was the first mysterious anonymous package that arrived on Geronimo's doorstep?", "zh": "送到杰罗尼摩家门口的第一个神秘匿名包裹里装的是什么？"}, "options": [{"en": "Bicycle handlebars", "zh": "自行车车把"}, {"en": "A pair of running shoes", "zh": "一双跑鞋"}, {"en": "A cheese sampler", "zh": "一份奶酪拼盘"}, {"en": "A book about racing", "zh": "一本关于比赛的书"}], "answer": 0, "explain": {"en": "Geronimo found a package on his stoop addressed to him; inside were bicycle handlebars, followed later by pedals and a helmet.", "zh": "杰罗尼摩在门前台阶上发现一个寄给他的包裹，里面是自行车车把，之后又陆续收到了脚踏板和头盔。"}}, {"q": {"en": "Which sporty friend signed Geronimo up for the Race Across America without really asking?", "zh": "是哪只爱运动的小伙伴没怎么问杰罗尼摩，就替他报名参加了横穿美国的比赛？"}, "options": [{"en": "Bruce Hyena", "zh": "布鲁斯·鬣狗"}, {"en": "Trap Stilton", "zh": "特拉普·斯提尔顿"}, {"en": "Benjamin Stilton", "zh": "本杰明·斯提尔顿"}, {"en": "Hercule Poirat", "zh": "赫拉克·波拉特"}], "answer": 0, "explain": {"en": "Bruce Hyena burst in and announced he had already signed Geronimo up for the Race Across America, saying they'd bike across the whole country.", "zh": "布鲁斯·鬣狗冲进门宣布，他已经替杰罗尼摩报名参加了横穿美国的比赛，说他们要骑车穿越整个国家。"}}, {"q": {"en": "Where does the Race Across America begin and end?", "zh": "横穿美国的比赛起点和终点分别在哪里？"}, "options": [{"en": "It starts in Texas and ends in Alaska", "zh": "从得克萨斯出发，到阿拉斯加结束"}, {"en": "It starts in New York and ends in Los Angeles according to some versions of the story", "zh": "从纽约出发，到洛杉矶结束（按书中另一种说法）"}, {"en": "It starts near San Diego, California, and ends in Annapolis, Maryland", "zh": "从加利福尼亚州的圣迭戈附近出发，到马里兰州的安纳波利斯结束"}, {"en": "It starts in Chicago and ends in Miami", "zh": "从芝加哥出发，到迈阿密结束"}], "answer": 2, "explain": {"en": "The race is more than 3,000 miles long, starting on the West Coast near San Diego, California, and finishing on the East Coast in Annapolis, Maryland.", "zh": "这场比赛全长三千多英里，从西海岸加利福尼亚州的圣迭戈附近出发，在东海岸马里兰州的安纳波利斯冲线。"}}, {"q": {"en": "For what good cause did Bruce decide to dedicate the race?", "zh": "布鲁斯决定把这场比赛献给什么善举？"}, "options": [{"en": "Feeding hungry cats", "zh": "喂养饥饿的猫"}, {"en": "A cheese museum", "zh": "一座奶酪博物馆"}, {"en": "Building a new library according to some versions of the story", "zh": "建一座新图书馆（按书中另一种说法）"}, {"en": "Sick mouselets with leukemia at Hope Hospital", "zh": "希望医院里患白血病的老鼠小朋友们"}], "answer": 3, "explain": {"en": "Bruce volunteers at Hope Hospital's wing for children with leukemia and dedicates the race to those 'little heroes' to raise money for them.", "zh": "布鲁斯在希望医院收治白血病儿童的病区做志愿者，他把比赛献给那些“小英雄”，为他们筹集善款。"}}, {"q": {"en": "On the N.M.C. team, who is the mechanic crazy about bikes who fixes Geronimo's flat tire?", "zh": "在N.M.C.车队里，谁是那个痴迷自行车、帮杰罗尼摩补好漏气的轮胎的修车师？"}, "options": [{"en": "Ironmouse the driver", "zh": "司机铁鼠"}, {"en": "Tex the general manager", "zh": "经理特克斯"}, {"en": "V-Doc the trainer", "zh": "教练V医生"}, {"en": "Buzz", "zh": "巴斯"}], "answer": 3, "explain": {"en": "Buzz is Team N.M.C.'s mechanic, crazy about bikes since age nine; in the Colorado mountains he fixed Geronimo's flat tire in a flash.", "zh": "巴斯是N.M.C.车队的修车师，从九岁起就痴迷自行车；在科罗拉多山区，他一眨眼就把杰罗尼摩漏气的轮胎修好了。"}}, {"q": {"en": "In the hot Arizona desert at night, why did Geronimo faint while riding?", "zh": "在炎热的亚利桑那沙漠的夜晚，杰罗尼摩骑车时为什么会晕倒？"}, "options": [{"en": "He was stung by a scorpion according to some versions of the story", "zh": "他被蝎子蛰了（按书中另一种说法）"}, {"en": "He fell off a cliff", "zh": "他跌下了悬崖"}, {"en": "He forgot to drink enough water and became dehydrated", "zh": "他忘了喝足够的水，脱水了"}, {"en": "He ate bad cheese", "zh": "他吃了变质的奶酪"}], "answer": 2, "explain": {"en": "It was 105 degrees and Geronimo ignored V-Doc's advice to drink plenty of fluids; he got dehydrated, had a fever, and fainted. Bruce then pedalped eight hours for him.", "zh": "当时气温高达105华氏度，杰罗尼摩没听V医生多喝水的话，脱水发烧晕了过去。布鲁斯随后替他骑了八个小时。"}}, {"q": {"en": "After nearly 130 miles, what famous American highway did Geronimo turn onto?", "zh": "骑了将近130英里后，杰罗尼摩拐上了哪条著名的美国公路？"}, "options": [{"en": "The Golden Gate Bridge road", "zh": "金门大桥的路"}, {"en": "Route 66, the 'Mother Road'", "zh": "66号公路，又称“母亲之路”"}, {"en": "The Appalachian Trail", "zh": "阿巴拉契亚小道"}, {"en": "The interstate to Texas according to some versions of the story", "zh": "通往得克萨斯的高速公路（按书中另一种说法）"}], "answer": 1, "explain": {"en": "After a few hours Geronimo turned onto Route 66, the most famous highway in the United States, established in 1926 and nicknamed the 'Mother Road.'", "zh": "骑了几小时后，杰罗尼摩拐上了66号公路——美国最著名的公路，建于1926年，绰号“母亲之路”。"}}, {"q": {"en": "Which giant natural wonder carved by the Colorado River did the racers pass through?", "zh": "选手们途经的、由科罗拉多河冲刷而成的巨大自然奇观是什么？"}, "options": [{"en": "The Grand Canyon", "zh": "大峡谷"}, {"en": "Niagara Falls", "zh": "尼亚加拉瀑布"}, {"en": "The Everglades", "zh": "大沼泽地"}, {"en": "Yellowstone geysers", "zh": "黄石公园的间歇泉"}], "answer": 0, "explain": {"en": "They reached the Grand Canyon in Arizona, a mile-deep crack in the rock formed over millions of years by the path of the Colorado River.", "zh": "他们抵达了亚利桑那州的大峡谷——一道深达一英里的裂谷，是科罗拉多河历经数百万年冲刷而成的。"}}, {"q": {"en": "In the Colorado mountains, how did the temperature change from the desert below?", "zh": "到了科罗拉多山区，气温相比山下的沙漠发生了怎样的变化？"}, "options": [{"en": "It stayed a steady 105°F", "zh": "一直稳定在105华氏度"}, {"en": "It dropped from 120°F in the desert to 40°F in the mountains", "zh": "从沙漠里的120华氏度降到了山里的40华氏度"}, {"en": "It rose from 40°F to 120°F", "zh": "从40华氏度升到了120华氏度"}, {"en": "It dropped below freezing to -20°F according to some versions of the story", "zh": "跌破冰点降到零下20华氏度（按书中另一种说法）"}], "answer": 1, "explain": {"en": "Geronimo was used to 120°F in the desert, but in the Colorado mountains the temperature dropped to 40°F, making the climbing twice as hard.", "zh": "杰罗尼摩已经习惯了沙漠里120华氏度的高温，可到了科罗拉多山区气温骤降到40华氏度，让爬坡难上加难。"}}, {"q": {"en": "Near the finish in Annapolis, what mistake almost got the N.M.C. team disqualified?", "zh": "在安纳波利斯临近终点时，什么失误差点让N.M.C.车队被取消资格？"}, "options": [{"en": "Bruce rode the wrong bike", "zh": "布鲁斯骑错了车"}, {"en": "The team car (Tex and Buzz) took the wrong road and left Geronimo without his escort", "zh": "工作车（特克斯和巴斯）拐错了路，把杰罗尼摩甩在后面没了护送"}, {"en": "Geronimo forgot his helmet according to some versions of the story in an early draft of the book", "zh": "杰罗尼摩忘了戴头盔（按书中另一种说法）（在书的早期草稿中）"}, {"en": "They arrived a day early", "zh": "他们提前一天到达"}], "answer": 1, "explain": {"en": "Race rules say the team car must escort its cyclist to the finish; Tex and Buzz turned onto the wrong road, so Geronimo spun around and sprinted back to catch the car before the line.", "zh": "比赛规定工作车必须护送车手到终点；特克斯和巴斯拐错了路，于是杰罗尼摩掉头拼命骑回去追上工作车，才赶在终点前归队。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
