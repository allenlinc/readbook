<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Phantom of the Subway — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#13 · The Phantom of the Subway</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: The Phantom of the Subway</em> (Scholastic, 2002) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What mysterious creature is said to haunt the New Mouse City subway?", "zh": "据说在新鼠城地铁里出没的神秘生物是什么？"}, "options": [{"en": "A ghost mouse", "zh": "一只幽灵老鼠"}, {"en": "A scary bat", "zh": "一只吓人的蝙蝠"}, {"en": "A giant rat", "zh": "一只巨型老鼠"}, {"en": "A phantom cat", "zh": "一只幽灵猫"}], "answer": 3, "explain": {"en": "Riders report a humongous cat in the subway, with some saying it may even be a ghost cat.", "zh": "乘客们说地铁里有一只巨大的猫，还有人说是幽灵猫。"}}, {"q": {"en": "Who is Geronimo's archrival who owns the newspaper The Daily Rat?", "zh": "谁是杰罗尼摩的死对头，也就是《老鼠日报》的竞争对手《每日鼠报》的老板？"}, "options": [{"en": "Sally Ratmousen", "zh": "萨莉·鼠莫森"}, {"en": "Pinky Pick", "zh": "平基·皮克"}, {"en": "Thea Stilton", "zh": "茜亚·斯蒂顿"}, {"en": "Tina Spicytail according to some versions of the story", "zh": "蒂娜·辣尾（按书中另一种说法）"}], "answer": 0, "explain": {"en": "Sally Ratmousen is Geronimo's number-one enemy and the owner of The Daily Rat, his paper's biggest competition.", "zh": "萨莉·鼠莫森是杰罗尼摩的头号死敌，也是《每日鼠报》的老板，那是他报纸最大的竞争对手。"}}, {"q": {"en": "How do Geronimo and his friends get into the closed subway?", "zh": "杰罗尼摩和朋友们是怎么进入已经封闭的地铁的？"}, "options": [{"en": "Through the front station entrance", "zh": "从车站正门进去"}, {"en": "By riding the subway train", "zh": "坐地铁列车进去"}, {"en": "By climbing down the elevator shaft according to some versions of the story", "zh": "顺着电梯井爬下去（按书中另一种说法）"}, {"en": "Through a sewer drain behind the fish market", "zh": "从鱼市后面的一处下水道井盖钻进去"}], "answer": 3, "explain": {"en": "Pinky shows them a drain in a narrow alley behind the fish market and they follow a sewer pipe to the number 7 line.", "zh": "平基带他们到鱼市后面小巷里的一处井盖，他们沿着下水道管道走到了七号线。"}}, {"q": {"en": "Who built the giant robot cat in the subway?", "zh": "地铁里那只巨大的机器猫是谁造的？"}, "options": [{"en": "Professor Paws von Volt", "zh": "爪子·冯·沃尔特教授"}, {"en": "Birdie Whiskers", "zh": "胡须鸟"}, {"en": "Sally Ratmousen", "zh": "萨莉·鼠莫森"}, {"en": "Inspector Clue Rat according to some versions of the story", "zh": "线索鼠探长（按书中另一种说法）"}], "answer": 0, "explain": {"en": "A mouse slides out of the robot cat's body and it is Geronimo's friend, Professor Paws von Volt, a brilliant inventor.", "zh": "一只老鼠从机器猫的身体里钻出来，那正是杰罗尼摩的朋友、天才发明家爪子·冯·沃尔特教授。"}}, {"q": {"en": "What is the professor's amazing remote-control invention called?", "zh": "教授那个神奇的遥控发明叫什么名字？"}, "options": [{"en": "The Cheddar Ray", "zh": "切达射线"}, {"en": "The Kitty Krunchies Box", "zh": "猫咪脆片盒"}, {"en": "The Voltinator", "zh": "沃尔特教授发明的遥控装置"}, {"en": "The Ratball 5000", "zh": "鼠球5000"}], "answer": 2, "explain": {"en": "The professor calls his device the Voltinator; it can move any object through the air without touching it.", "zh": "教授把这个装置叫做沃尔特教授发明的遥控装置，它能不碰任何东西就让它飘起来移动。"}}, {"q": {"en": "What do the initials P.V. carved on the silver ring and the big oak door stand for?", "zh": "刻在银戒指和那扇大橡木门上的字母缩写代表什么？"}, "options": [{"en": "Phantom Vision according to some versions of the story", "zh": "幽灵幻象（按书中另一种说法）"}, {"en": "Paws von Volt", "zh": "爪子·冯·沃尔特"}, {"en": "Pinky's Vault", "zh": "平基的宝库"}, {"en": "Police Vehicle", "zh": "警用车辆"}], "answer": 1, "explain": {"en": "Both the ring found on the floor and the hidden lab door are marked P.V., the initials of Professor Paws von Volt.", "zh": "地板上捡到的戒指和密室大门上都刻着相同的字母缩写，正是爪子·冯·沃尔特教授的姓名首字母。"}}, {"q": {"en": "What were the secret rooms under the city used for long ago?", "zh": "城里地下的那些秘密房间很久以前是用来做什么的？"}, "options": [{"en": "A subway station according to some versions of the story", "zh": "一座地铁站（按书中另一种说法）"}, {"en": "Communication during the Great Cat War", "zh": "在猫之大战期间用来通信"}, {"en": "A mouse school", "zh": "一所老鼠学校"}, {"en": "Storing cheese", "zh": "储存奶酪"}], "answer": 1, "explain": {"en": "The professor says the rooms date back to the Great Cat War and were used for communication when the town was under attack.", "zh": "教授说这些房间可以追溯到猫之大战时期，当时城里被围攻，它们被用来对外通信。"}}, {"q": {"en": "Who is the championship golfer that also heads the whole subway system?", "zh": "哪位高尔夫球冠军同时也是整个地铁系统的负责人？"}, "options": [{"en": "Trap Stilton", "zh": "特拉普·斯蒂顿"}, {"en": "Goofsnout P. Goofus", "zh": "古弗斯诺特·古弗斯"}, {"en": "Birdie Whiskers", "zh": "胡须鸟"}, {"en": "Hercule Poirat", "zh": "赫拉克·波拉"}], "answer": 2, "explain": {"en": "Geronimo mentions meeting Birdie Whiskers at the golf club; he is a championship golfer and head of the entire subway system.", "zh": "杰罗尼摩提到在高尔夫俱乐部见过胡须鸟，他既是高尔夫球冠军，也是整个地铁系统的负责人。"}}, {"q": {"en": "How does the group cross the smelly sewage canal underground?", "zh": "大家是怎么穿过地下那条臭烘烘的下水道水沟的？"}, "options": [{"en": "They fly over it", "zh": "他们飞过去"}, {"en": "They swing across on a rope with a hooked end", "zh": "他们抓着末端带钩的绳子荡过去"}, {"en": "They take a boat", "zh": "他们坐船过去"}, {"en": "They swim through it according to some versions of the story", "zh": "他们游过去（按书中另一种说法）"}], "answer": 1, "explain": {"en": "Thea throws a rope across the canal; its metal hook grabs the ladder on the far side and they cross hanging from it.", "zh": "茜亚把绳子甩过水沟，末端的金属钩勾住对面的梯子，大家抓着绳子荡了过去。"}}, {"q": {"en": "Which famous detective does Thea try to call for help with the subway case?", "zh": "茜亚想打电话向哪位名侦探求助来破地铁案？"}, "options": [{"en": "Hercule Poirat", "zh": "赫拉克·波拉"}, {"en": "Simpleton Smallpaw", "zh": "傻瓜·小爪"}, {"en": "Inspector Clue Rat", "zh": "线索鼠探长"}, {"en": "Professor von Volt", "zh": "冯·沃尔特教授"}], "answer": 0, "explain": {"en": "Thea calls her big-shot friends including the world's most famous detective, Hercule Poirat, though no one will share info.", "zh": "茜亚给她那些大人物朋友打电话，其中就有世界上最著名的侦探赫拉克·波拉，不过没人愿意透露消息。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
