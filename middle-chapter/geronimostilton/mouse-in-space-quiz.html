<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mouse in Space! — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#52 · Mouse in Space!</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: Mouse in Space!</em> (Scholastic, 2006) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who is the editor and publisher of The Rodent's Gazette?", "zh": "谁是《 鼠民公报》的编辑兼出版人？"}, "options": [{"en": "Hercule Poirat", "zh": "赫拉克勒·波瓦"}, {"en": "Geronimo Stilton", "zh": "杰罗尼摩·斯蒂顿"}, {"en": "Trap Stilton", "zh": "特拉普·斯蒂顿"}, {"en": "Benjamin Stilton according to some versions of the story", "zh": "本杰明·斯蒂顿（按书中另一种说法）"}], "answer": 1, "explain": {"en": "Geronimo says, 'I'm the editor of The Rodent's Gazette, the most famouse newspaper on Mouse Island.'", "zh": "杰罗尼摩说：“我是老鼠岛上最有名的报纸《 鼠民公报》的编辑。”"}}, {"q": {"en": "What did Geronimo grab to protect himself from the two intruders?", "zh": "杰罗尼摩抓起了什么东西来保护自己，对付那两个闯入者？"}, "options": [{"en": "A baseball bat", "zh": "一根棒球棍"}, {"en": "His slipper", "zh": "他的拖鞋"}, {"en": "His favorite tie", "zh": "他最喜欢的领带"}, {"en": "An antique cheese rind", "zh": "一块古老的奶酪皮"}], "answer": 1, "explain": {"en": "He writes, 'Unfortunately, it wasn't a BASEBALL BAT. It was my slipper.'", "zh": "他写道：“可惜那不是棒球棍，而是我的拖鞋。”"}}, {"q": {"en": "What is Geronimo's secret agent code name?", "zh": "杰罗尼摩的特工代号是什么？"}, "options": [{"en": "OOV according to some versions of the story", "zh": "OOV（按书中另一种说法）"}, {"en": "OOG", "zh": "OOG"}, {"en": "OOK", "zh": "OOK"}, {"en": "OOM", "zh": "OOM"}], "answer": 1, "explain": {"en": "After reading the note he realizes, 'OOG was my code name.'", "zh": "读完字条后他意识到：“OOG 是我的代号。”"}}, {"q": {"en": "Who is Geronimo's secret agent friend with the code name OOK?", "zh": "杰罗尼摩那位代号为 OOK 的特工朋友是谁？"}, "options": [{"en": "Kornelius von Kickpaw", "zh": "科尼利厄斯·冯·基克爪"}, {"en": "William Shortpaws", "zh": "威廉·短爪"}, {"en": "Hercule Poirat", "zh": "赫拉克勒·波瓦"}, {"en": "Professor Astrofur according to some versions of the story", "zh": "阿斯特罗福教授（按书中另一种说法）"}], "answer": 0, "explain": {"en": "The book states: 'NAME: Kornelius von Kickpaw / CODE NAME: OOK.'", "zh": "书中写道：“姓名：科尼利厄斯·冯·基克爪 / 代号：OOK。”"}}, {"q": {"en": "What surprise was hidden inside Geronimo's cream cheese breakfast cookie?", "zh": "杰罗尼摩的奶油奶酪早餐饼干里藏着什么惊喜？"}, "options": [{"en": "A diamond ring", "zh": "一枚钻石戒指"}, {"en": "A gold coin", "zh": "一枚金币"}, {"en": "A tiny toy mouse according to some versions of the story", "zh": "一只迷你玩具老鼠（按书中另一种说法）"}, {"en": "A strange metallic capsule with a note", "zh": "一颗藏有字条的奇怪金属胶囊"}], "answer": 3, "explain": {"en": "'Hidden in the middle of the cookie was a STRANGE metallic capsule, which held a STRANGE note inside.'", "zh": "“饼干中间藏着一颗奇怪的金属胶囊，里面有一张奇怪的字条。”"}}, {"q": {"en": "Who sold Geronimo the SAFE SQUEAK antitheft devices?", "zh": "是谁卖给杰罗尼摩“安全吱吱”防盗设备的？"}, "options": [{"en": "Belinda Fuzzypaws", "zh": "贝琳达·绒毛爪"}, {"en": "Sally Ratmousen", "zh": "莎莉·鼠默森"}, {"en": "Suzy Slyrat", "zh": "苏西·斯莱鼠"}, {"en": "Thea Stilton", "zh": "蒂拉·斯蒂顿"}], "answer": 2, "explain": {"en": "He notices 'a SAFE SQUEAK pin on her jacket, and below it, in small print, the name Suzy Slyrat.'", "zh": "他注意到“她夹克上别着安全吱吱的徽章，下面小字印着：苏西·斯莱鼠”。"}}, {"q": {"en": "What does the secret organization M.I.S.S.O. stand for?", "zh": "秘密组织 M.I.S.S.O. 的全称是什么？"}, "options": [{"en": "Metropolitan Investigation Space Operation", "zh": "都市太空调查行动"}, {"en": "Mouse Island Space Security Office", "zh": "老鼠岛太空安全办公室"}, {"en": "Mouse Island Secret Service Organization", "zh": "老鼠岛特工组织"}, {"en": "Mouse Intruder Safety System Office", "zh": "老鼠岛入侵安全系统办公室"}], "answer": 2, "explain": {"en": "The book explains: 'M.I.S.S.O., as in Mouse Island Secret Service Organization.'", "zh": "书中解释道：“M.I.S.S.O.，即老鼠岛特工组织。”"}}, {"q": {"en": "What is the name of the spaceship Geronimo and his friends launch on?", "zh": "杰罗尼摩和朋友们乘坐发射的太空船叫什么名字？"}, "options": [{"en": "The Rodent's Gazette", "zh": "《 鼠民公报》号"}, {"en": "MEGAVORTEX", "zh": "超级漩涡号"}, {"en": "SAFE SQUEAK", "zh": "安全吱吱号"}, {"en": "RATOLLO 16", "zh": "RATOLLO 16 号"}], "answer": 3, "explain": {"en": "After boarding, Geronimo says, 'I boarded RATOLLO 16, took my seat, and buckled my seat belt.'", "zh": "登船时杰罗尼摩说：“我上了 RATOLLO 16 号，坐好并系上了安全带。”"}}, {"q": {"en": "Who is the evil masked rodent terrorizing New Mouse City?", "zh": "那个恐吓老鼠岛的邪恶蒙面老鼠是谁？"}, "options": [{"en": "Dr. Wicked Whiskers", "zh": "坏胡子博士"}, {"en": "Professor Astrofur", "zh": "阿斯特罗福教授"}, {"en": "Kornelius von Kickpaw", "zh": "科尼利厄斯·冯·基克爪"}, {"en": "Hercule Poirat", "zh": "赫拉克勒·波瓦"}], "answer": 0, "explain": {"en": "The villain announces, 'The name's Dr. Wicked Whiskers. But everyone just calls me Dr. Wicked.'", "zh": "反派宣称：“我叫坏胡子博士，不过大家都叫我坏胡子。”"}}, {"q": {"en": "How did Geronimo signal for help when trapped on the fake asteroid?", "zh": "被困在假小行星上时，杰罗尼摩是怎样发出求救信号的？"}, "options": [{"en": "By pounding SOS in Morse code on the metal walls", "zh": "用摩斯密码在金属墙上敲出 SOS"}, {"en": "By shouting as loud as he could according to some versions of the story", "zh": "用尽全力大声喊叫（按书中另一种说法）"}, {"en": "By calling on his phone", "zh": "用手机打电话"}, {"en": "By sending a paper boat", "zh": "通过放一只纸船"}], "answer": 0, "explain": {"en": "'Three short sounds, then three long, then three short. It was the SOS message in Morse code.'", "zh": "“三声短、三声长、再三声短，那是摩斯密码的 SOS 求救信号。”"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
