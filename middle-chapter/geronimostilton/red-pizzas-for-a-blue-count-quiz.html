<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red Pizzas for a Blue Count — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#7 · Red Pizzas for a Blue Count</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: Red Pizzas for a Blue Count</em> (Scholastic, 2001) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who is the narrator of this story, and what is his job?", "zh": "这个故事是谁在讲述？他的工作是什么？"}, "options": [{"en": "Geronimo Stilton, who runs a newspaper called The Rodent's Gazette", "zh": "杰罗尼摩·斯蒂顿，他经营着一份名叫《老鼠公报》的报纸"}, {"en": "Benjamin, who is the cook at the ball", "zh": "本杰明，他是舞会上的厨师"}, {"en": "Trap, who is the king of Transratania according to some versions of the story", "zh": "特拉普，他是特拉特兰尼亚的国王（按书中另一种说法）"}, {"en": "Thea, who owns the Ratoff Castle", "zh": "蒂奥拉，她拥有拉托夫城堡"}], "answer": 0, "explain": {"en": "Geronimo is the narrator and he runs The Rodent's Gazette newspaper.", "zh": "杰罗尼摩是故事的讲述者，他经营着《老鼠公报》这份报纸。"}}, {"q": {"en": "At the beginning of the story, who calls Geronimo late at night and says he is in Transratania?", "zh": "故事一开始，是谁在深夜给杰罗尼摩打电话，说自己身在特拉特兰尼亚？"}, "options": [{"en": "His sister Thea", "zh": "他的妹妹蒂奥拉"}, {"en": "His nephew Benjamin", "zh": "他的侄子本杰明"}, {"en": "Count von Ratoff", "zh": "拉托夫伯爵"}, {"en": "His cousin Trap", "zh": "他的表哥特拉普"}], "answer": 3, "explain": {"en": "Trap phones Geronimo in the middle of the night, pretending to be in trouble in Transratania.", "zh": "特拉普在午夜给杰罗尼摩打电话，假装自己在特拉特兰尼亚遇到了麻烦。"}}, {"q": {"en": "How do Geronimo, Thea, and Benjamin travel to Transratania?", "zh": "杰罗尼摩、蒂奥拉和本杰明是怎样前往特拉特兰尼亚的？"}, "options": [{"en": "By car", "zh": "坐汽车"}, {"en": "By train", "zh": "乘火车"}, {"en": "By boat", "zh": "乘船"}, {"en": "By flying bat", "zh": "骑着蝙蝠飞行"}], "answer": 1, "explain": {"en": "They take a train that leaves at half-past six in the morning and arrives at Ratoff station.", "zh": "他们乘坐早上六点半出发的火车，抵达拉托夫车站。"}}, {"q": {"en": "Why do the mice in the village of Ratoff wear garlic necklaces and bracelets?", "zh": "拉托夫村的老鼠们为什么戴着大蒜项链和手链？"}, "options": [{"en": "To keep vampires away", "zh": "为了驱赶吸血鬼"}, {"en": "Because garlic is their favorite food", "zh": "因为大蒜是他们最喜欢的食物"}, {"en": "To celebrate a holiday", "zh": "为了庆祝某个节日"}, {"en": "As a fashion trend from the city", "zh": "作为城里流行的一种时尚"}], "answer": 0, "explain": {"en": "Geronimo realizes the rodents keep so much garlic because some say garlic keeps vampires away.", "zh": "杰罗尼摩意识到，这些老鼠储存大量大蒜是因为传说大蒜可以驱赶吸血鬼。"}}, {"q": {"en": "What is the name of the hunchback servant at the castle?", "zh": "城堡里那个驼背仆人的名字叫什么？"}, "options": [{"en": "Trip von Trappen", "zh": "特里普·冯·特拉彭"}, {"en": "Benjamin", "zh": "本杰明"}, {"en": "Schnoz von der Nose", "zh": "施诺兹·冯·德·诺斯"}, {"en": "Don't Bother Me", "zh": "别来烦我"}], "answer": 3, "explain": {"en": "When asked his name, the hunchback shrieks 'DON'T BOTHER ME!', so Benjamin calls him Mr. Don't-Bother-Me.", "zh": "当被问到名字时，驼背仆人大喊'别来烦我！'，于是本杰明便叫他'别来烦我先生'。"}}, {"q": {"en": "Who is the young Countess Snobella engaged to marry?", "zh": "年轻的斯诺贝拉伯爵小姐的未婚夫是谁？"}, "options": [{"en": "Count Schnoz von der Nose", "zh": "施诺兹·冯·德·诺斯伯爵"}, {"en": "Geronimo", "zh": "杰罗尼摩"}, {"en": "Trap", "zh": "特拉普"}, {"en": "The hunchback Don't Bother Me", "zh": "驼背仆人'别来烦我'"}], "answer": 0, "explain": {"en": "Snobella shows Thea fifty dozen red roses from her fiancé, Count Schnoz von der Nose.", "zh": "斯诺贝拉向蒂奥拉展示了未婚夫施诺兹·冯·德·诺斯伯爵送的五六十打红玫瑰。"}}, {"q": {"en": "What does Trap discover about his family background?", "zh": "特拉普发现了自己家族的什么秘密？"}, "options": [{"en": "He is related to Geronimo's newspaper rival according to some versions of the story", "zh": "他与杰罗尼摩的报纸对手有亲戚关系（按书中另一种说法）"}, {"en": "He may be a descendant of the noble Von Trappen family", "zh": "他可能是高贵的冯·特拉彭家族的后代"}, {"en": "He is Count von Ratoff's long-lost son", "zh": "他是拉托夫伯爵失散多年的儿子"}, {"en": "He is the king of Transratania", "zh": "他是特拉特兰尼亚的国王"}], "answer": 1, "explain": {"en": "Trap used a family research agency and found he may be a descendant of Trip von Trappen of Transratania.", "zh": "特拉普通过一家家族调查机构，发现自己可能是特拉特兰尼亚特里普·冯·特拉彭的后代。"}}, {"q": {"en": "How many guests come to the ball at the castle?", "zh": "城堡舞会上一共有多少位客人？"}, "options": [{"en": "Two", "zh": "两位"}, {"en": "Fifty dozen according to some versions of the story", "zh": "五六十打（按书中另一种说法）"}, {"en": "Three hundred and forty-seven", "zh": "三百四十七位"}, {"en": "Twelve", "zh": "十二位"}], "answer": 2, "explain": {"en": "Trap complains he cannot tell 347 guests they can chew their nails for dinner.", "zh": "特拉普抱怨说，他不能告诉三百四十七位客人晚餐只能啃指甲。"}}, {"q": {"en": "When Trap's fancy insect dinner is ruined, what does he serve the guests instead?", "zh": "当特拉普精心准备的昆虫大餐烧焦后，他改请客人们吃什么？"}, "options": [{"en": "Cheese sandwiches according to some versions of the story", "zh": "奶酪三明治（按书中另一种说法）"}, {"en": "Blood pudding", "zh": "血布丁"}, {"en": "Pizzas with bug toppings", "zh": "加了虫子配料的比萨"}, {"en": "Garlic soup", "zh": "大蒜汤"}], "answer": 2, "explain": {"en": "Trap makes pizzas topped with puréed ants, spicy earthworms, and broiled bumblebees, and the guests love them.", "zh": "特拉普做了配料是蚂蚁泥、辣蚯蚓和烤大黄蜂的比萨，客人们都很喜欢。"}}, {"q": {"en": "What is the surprising secret about Count von Ratoff and his niece Snobella?", "zh": "关于拉托夫伯爵和侄女斯诺贝拉，令人吃惊的秘密是什么？"}, "options": [{"en": "They are Geronimo's long-lost relatives", "zh": "他们是杰罗尼摩失散多年的亲戚"}, {"en": "They are actually bats, not mice", "zh": "他们其实是蝙蝠，而不是老鼠"}, {"en": "They are famous movie stars", "zh": "他们是著名的电影明星"}, {"en": "They are vampires who drink blood", "zh": "他们是喝血的吸血鬼"}], "answer": 1, "explain": {"en": "Snobella opens her cape to reveal giant wings; the count and niece are a family of bats who eat bugs and sleep upside down.", "zh": "斯诺贝拉张开斗篷露出巨大的翅膀；伯爵和侄女其实是一族蝙蝠，它们吃虫子并且倒挂着睡觉。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
