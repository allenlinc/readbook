<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Cheese-Colored Camper — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#16 · A Cheese-Colored Camper</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: A Cheese-Colored Camper</em> (Scholastic, 2001) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What newspaper does Geronimo Stilton publish in New Mouse City?", "zh": "杰罗尼摩·斯蒂顿在新鼠城经营的是哪份报纸？"}, "options": [{"en": "Cheese Daily", "zh": "《奶酪日报》"}, {"en": "The Mouse Times", "zh": "《老鼠时报》"}, {"en": "The Rodent's Gazette", "zh": "《啮齿动物公报》"}, {"en": "The Whisker Weekly according to some versions of the story", "zh": "《胡须周刊》（按书中另一种说法）"}], "answer": 2, "explain": {"en": "Geronimo runs The Rodent's Gazette, the most popular newspaper in New Mouse City, founded by his grandfather.", "zh": "杰罗尼摩经营着《啮齿动物公报》，这是新鼠城最受欢迎的报纸，由他的祖父创办。"}}, {"q": {"en": "Why is Grandfather William called 'Cheap Mouse Willy'?", "zh": "威廉爷爷为什么被人叫做“小气老鼠威利”？"}, "options": [{"en": "He once shaved off all his fur to save money on shampoo", "zh": "他曾为省下洗发水钱把全身毛都剃光"}, {"en": "He eats only free samples", "zh": "他只吃免费试吃品"}, {"en": "He reuses tea bags", "zh": "他会重复使用茶包"}, {"en": "He never buys anyone a gift according to some versions of the story", "zh": "他从不给任何人买礼物（按书中另一种说法）"}], "answer": 0, "explain": {"en": "Grandfather loves money more than cheese; he once shaved off all his fur just to save money on shampoo and conditioner.", "zh": "爷爷爱钱胜过爱奶酪，他曾经为了省下洗发水和护发素的钱，把全身的毛都剃光了。"}}, {"q": {"en": "How many guidebooks to Ratzikistan does Grandfather William want to print?", "zh": "威廉爷爷想印刷多少本关于拉齐基斯坦的旅游指南？"}, "options": [{"en": "Three million", "zh": "三百万本"}, {"en": "Thirty million", "zh": "三千万本"}, {"en": "Three thousand", "zh": "三千本"}, {"en": "Three hundred", "zh": "三百本"}], "answer": 0, "explain": {"en": "Grandfather shouts 'THREE!' into the phone — he wants three million guidebooks to Ratzikistan printed right away.", "zh": "爷爷对着电话大喊“三！”，他要求立刻印刷三百万本拉齐基斯坦旅游指南。"}}, {"q": {"en": "Who catches rodent pox and has to stay home, leaving only four travelers?", "zh": "谁得了“老鼠痘”只能留在家里，最后只剩四名旅客上路？"}, "options": [{"en": "Thea and Tina", "zh": "蒂奥和蒂娜"}, {"en": "Benjamin and Trap", "zh": "本杰明和特拉普"}, {"en": "Tina and Trap", "zh": "蒂娜和特拉普"}, {"en": "Geronimo and Benjamin", "zh": "杰罗尼摩和本杰明"}], "answer": 1, "explain": {"en": "Benjamin and Trap come down with red-bump-covered rodent pox, so they are dropped off at home before the trip.", "zh": "本杰明和特拉普浑身长满红疙瘩的“老鼠痘”，所以出发前被送回家留在了家里。"}}, {"q": {"en": "What color is Grandfather William's supercamper?", "zh": "威廉爷爷的超级房车是什么颜色的？"}, "options": [{"en": "Shiny silver according to some versions of the story", "zh": "闪亮银色（按书中另一种说法）"}, {"en": "Deep cheddar yellow", "zh": "深切达黄（奶酪色）"}, {"en": "Bright red", "zh": "鲜红色"}, {"en": "Forest green", "zh": "森林绿"}], "answer": 1, "explain": {"en": "The supercamper is painted a deep cheddar yellow and is longer than fifty mice standing tail to tail.", "zh": "这辆超级房车被漆成深切达黄，长度超过五十只老鼠首尾相连那么长。"}}, {"q": {"en": "What does Tina Spicytail keep within paw's reach at night for protection?", "zh": "蒂娜·斯派斯塔尔晚上会把什么放在手边用来防身？"}, "options": [{"en": "A baseball bat", "zh": "一根棒球棍"}, {"en": "A large cookbook according to some versions of the story", "zh": "一本厚重的烹饪书（按书中另一种说法）"}, {"en": "A whistle", "zh": "一只哨子"}, {"en": "A silver extendable rolling pin", "zh": "一根可伸缩的银色擀面杖"}], "answer": 3, "explain": {"en": "Tina never leaves home without her silver extendable rolling pin, given to her by Grandfather, and sleeps with it within paw's reach.", "zh": "蒂娜从不离身地带那根爷爷送她的可伸缩银色擀面杖，睡觉时也会把它放在手边。"}}, {"q": {"en": "In the Fossil Forest, whom does Geronimo meet — a fan with a square head?", "zh": "在化石森林里，杰罗尼摩遇见了一位脑袋方方的粉丝，他是谁？"}, "options": [{"en": "Grandfather William according to some versions of the story", "zh": "威廉爷爷（按书中另一种说法）"}, {"en": "Trap Stilton", "zh": "特拉普·斯蒂顿"}, {"en": "Sylvester Squaretail", "zh": "西尔维斯特·斯夸尔泰尔"}, {"en": "Hercule Poirat", "zh": "赫拉克·波瓦"}], "answer": 2, "explain": {"en": "Geronimo meets Sylvester Squaretail, a fan with a square head, snout, and shoulders, who asks for his autograph on a leaf.", "zh": "杰罗尼摩遇到了西尔维斯特·斯夸尔泰尔，一个脑袋、鼻尖和肩膀都方方方的粉丝，对方还请他在树叶上签名。"}}, {"q": {"en": "What smell leads Geronimo back to the camper after he gets lost in the woods?", "zh": "杰罗尼摩在树林里迷路后，是什么气味指引他回到了房车？"}, "options": [{"en": "Tina's double-cheese lasagna", "zh": "蒂娜做的双层奶酪千层面"}, {"en": "Freshly baked bread according to some versions of the story", "zh": "刚烤好的面包（按书中另一种说法）"}, {"en": "Flowers in bloom", "zh": "盛开的鲜花"}, {"en": "Burning firewood", "zh": "燃烧的柴火"}], "answer": 0, "explain": {"en": "Geronimo follows the heavenly scent of Tina's double-cheese lasagna to find his way back to the camper.", "zh": "杰罗尼摩循着蒂娜做的双层奶酪千层面那股诱人香味，才找回了房车。"}}, {"q": {"en": "Why is it dark in Ratzikistan even at ten in the morning?", "zh": "为什么在拉齐基斯坦，哪怕是上午十点也还是黑漆漆的？"}, "options": [{"en": "The camper's windows were painted black according to some versions of the story", "zh": "房车的窗户被涂成了黑色（按书中另一种说法）"}, {"en": "An eclipse was happening", "zh": "当时正在发生日食"}, {"en": "A storm covered the sun", "zh": "一场风暴遮住了太阳"}, {"en": "It is so far north there are only a few hours of daylight", "zh": "它太靠北了，每天只有短短几小时白昼"}], "answer": 3, "explain": {"en": "Thea checks her globe and atlas and explains Ratzikistan is so far north that it gets only a few hours of daylight.", "zh": "蒂奥查看地球仪和地图册后解释，拉齐基斯坦地处极北，每天只有短短几小时白昼。"}}, {"q": {"en": "What golden-yellow cheese does Geronimo taste at a village and love?", "zh": "杰罗尼摩在一个村庄里尝到并爱上的那种金黄色奶酪叫什么？"}, "options": [{"en": "Swiss Cheese according to some versions of the story", "zh": "瑞士奶酪（按书中另一种说法）"}, {"en": "Cheddarella", "zh": "切达瑞拉奶酪"}, {"en": "Blue Cheese", "zh": "蓝纹奶酪"}, {"en": "Cream Cheese", "zh": "奶油奶酪"}], "answer": 1, "explain": {"en": "At a Ratzikistani family's dinner, Geronimo tastes Cheddarella, a golden-yellow cheese he calls the best he has ever eaten.", "zh": "在拉齐基斯坦一户人家的晚餐上，杰罗尼摩尝到了金黄色的“切达瑞拉”奶酪，称它是自己吃过最好吃的奶酪。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
