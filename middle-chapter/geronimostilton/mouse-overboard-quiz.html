<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mouse Overboard! — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#62 · Mouse Overboard!</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: Mouse Overboard!</em> (Scholastic, 2015) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Why did Grandfather send Geronimo to Portugal?", "zh": "爷爷为什么把杰罗尼摩派去葡萄牙？"}, "options": [{"en": "To retrace Vasco da Gama's voyage and unmask a saboteur", "zh": "去重走瓦斯科·达·伽马的航线，并揪出破坏者"}, {"en": "For a relaxing beach vacation", "zh": "去海滩度假放松"}, {"en": "To buy rare cheese", "zh": "去购买稀有奶酪"}, {"en": "To visit distant relatives", "zh": "去探望远房亲戚"}], "answer": 0, "explain": {"en": "Grandfather said a friend (Secretary Rattio) needed a favor; Geronimo was to play Vasco da Gama in the reenactment and expose a potential saboteur.", "zh": "爷爷说有位朋友（拉蒂奥国务秘书）需要帮忙；杰罗尼摩要在重演中扮演达·伽马，并揭穿可能的破坏者。"}}, {"q": {"en": "Which famous Portuguese explorer is Geronimo first told he is descended from?", "zh": "杰罗尼摩一开始被告知自己是哪位著名葡萄牙探险家的后代？"}, "options": [{"en": "Vasco da Gama", "zh": "瓦斯科·达·伽马"}, {"en": "Luís de Camões", "zh": "路易斯·德·卡蒙斯"}, {"en": "Henry the Navigator", "zh": "航海家亨利"}, {"en": "Bartolomeu Dias", "zh": "巴托洛梅乌·迪亚士"}], "answer": 0, "explain": {"en": "Thea tells Geronimo their ancestor is the great explorer Vasco da Gama, and he must take on his role in the reenactment.", "zh": "蒂娜告诉杰罗尼摩，他们的祖先是伟大的探险家瓦斯科·达·伽马，他必须在重演中扮演这位祖先。"}}, {"q": {"en": "What is the name of the ship they sail on?", "zh": "他们乘坐的船叫什么名字？"}, "options": [{"en": "São Gabriel", "zh": "“圣加布里埃尔号”"}, {"en": "The Daily Rat", "zh": "《老鼠日报》号"}, {"en": "Phantom of the Night", "zh": "“夜之幽灵号”"}, {"en": "The Rodent's Gazette", "zh": "《老鼠公报》号"}], "answer": 0, "explain": {"en": "They board the São Gabriel, an exact replica of Vasco da Gama's famous flagship.", "zh": "他们登上了“圣加布里埃尔号”，那是瓦斯科·达·伽马旗舰的精确复制品。"}}, {"q": {"en": "Who is Bernardo Almouse?", "zh": "贝尔纳多·阿尔莫斯是谁？"}, "options": [{"en": "A chauffeur, guide, bodyguard, and sailor who loves fado", "zh": "一名司机、向导、保镖和水手，热爱法多音乐"}, {"en": "The ship's onboard doctor", "zh": "船上的随船医生"}, {"en": "A famous basketball player", "zh": "一位著名的篮球运动员"}, {"en": "The editor of a newspaper", "zh": "一家报纸的主编"}], "answer": 0, "explain": {"en": "Bernardo is a chauffeur, tour guide, bodyguard, and talented sailor who loves fado and is secretly in love with fado singer Maria do Sol.", "zh": "贝尔纳多既是司机、向导、保镖，又是才华横溢的水手，他热爱法多音乐，还暗恋法多歌手玛丽亚·多·索尔。"}}, {"q": {"en": "What happens to Geronimo soon after reaching the open sea?", "zh": "到达公海后不久，杰罗尼摩发生了什么事？"}, "options": [{"en": "He gets seasick and is shoved overboard ('Mouse Overboard!')", "zh": "他晕船被人推下了水（“老鼠落水了！”）"}, {"en": "He captains the ship perfectly", "zh": "他把船开得非常完美"}, {"en": "He wins a basketball game", "zh": "他赢了一场篮球比赛"}, {"en": "He finds a buried treasure", "zh": "他找到了埋藏的宝藏"}], "answer": 0, "explain": {"en": "Geronimo's seasickness worsened, someone shoved him overboard, and Benjamin raised the 'MOUSE OVERBOARD!' alarm.", "zh": "杰罗尼摩晕船加剧，有人把他推下水，本杰明立刻拉响“老鼠落水了！”的警报。"}}, {"q": {"en": "How does Dr. Matthew Mayo treat Geronimo's head injury?", "zh": "马修·梅奥医生如何治疗杰罗尼摩头上的伤？"}, "options": [{"en": "With a compress made of frozen cod", "zh": "用冻鳕鱼做成的敷布"}, {"en": "With a simple bandage", "zh": "用普通的绷带"}, {"en": "With a piece of cheese", "zh": "用一块奶酪"}, {"en": "With a magic potion", "zh": "用一瓶神奇药水"}], "answer": 0, "explain": {"en": "Dr. Matthew Mayo treated the enormous lump on Geronimo's head with a compress made of frozen cod.", "zh": "马修·梅奥医生用冻鳕鱼做成的敷布，来治疗杰罗尼摩头上那个大包。"}}, {"q": {"en": "Who is the helpful 'ghost' aboard known as Paulo Sailmouse?", "zh": "船上那位乐于助人的“幽灵”——化名保罗·赛尔莫斯的老鼠，真实身份是谁？"}, "options": [{"en": "Paulina Pecorina, an aspiring chef descended from da Gama's cook", "zh": "宝琳娜·佩科丽娜，立志成为厨师的达·伽马御厨之后"}, {"en": "Sally Ratmousen", "zh": "莎莉·拉特莫森"}, {"en": "Benjamin Stilton", "zh": "本杰明·斯蒂顿"}, {"en": "Trap Stilton", "zh": "特拉普·斯蒂顿"}], "answer": 0, "explain": {"en": "Paulo Sailmouse was actually Paulina Pecorina, who secretly boarded because her great-great-great-grandfather was Vasco da Gama's personal chef.", "zh": "保罗·赛尔莫斯其实是宝琳娜·佩科丽娜，她偷偷上船，是因为她的曾曾曾祖父是达·伽马的专属厨师。"}}, {"q": {"en": "Who is the real saboteur who shoved Geronimo overboard?", "zh": "把杰罗尼摩推下水的真正破坏者是谁？"}, "options": [{"en": "Sally Ratmousen, disguised as George Gorgonzola", "zh": "化名乔治·戈尔贡佐拉的莎莉·拉特莫森"}, {"en": "Bernardo Almouse", "zh": "贝尔纳多·阿尔莫斯"}, {"en": "Paulina Pecorina", "zh": "宝琳娜·佩科丽娜"}, {"en": "Victor da Gamouse", "zh": "维克多·达·加莫斯"}], "answer": 0, "explain": {"en": "'George Gorgonzola' removed his mask to reveal Sally Ratmousen, who had sneaked aboard to embarrass Geronimo.", "zh": "“乔治·戈尔贡佐拉”摘下面具，露出了莎莉·拉特莫森，她偷偷上船就是为了让杰罗尼摩出丑。"}}, {"q": {"en": "How is Sally stopped from publishing her embarrassing photos of Geronimo?", "zh": "莎莉是如何被阻止刊登那些让杰罗尼摩出丑的照片的？"}, "options": [{"en": "Bernardo stole her camera", "zh": "贝尔纳多偷走了她的相机"}, {"en": "Thea deleted the files", "zh": "蒂娜删除了文件"}, {"en": "Geronimo paid her money", "zh": "杰罗尼摩付钱给她"}, {"en": "The ship sank", "zh": "船沉没了"}], "answer": 0, "explain": {"en": "Bernardo took Sally's camera out of her bag while she was talking, so she could not print the embarrassing photos.", "zh": "贝尔纳多在莎莉说话时把她的相机从包里拿走了，所以她没法印出那些出丑的照片。"}}, {"q": {"en": "What is Geronimo actually revealed to be a descendant of at the end?", "zh": "故事最后揭晓，杰罗尼摩其实是哪位人物的后代？"}, "options": [{"en": "Luís de Camões, writer of the epic poem The Lusiads", "zh": "史诗《卢济塔尼亚人之歌》的作者路易斯·德·卡蒙斯"}, {"en": "Vasco da Gama", "zh": "瓦斯科·达·伽马"}, {"en": "Henry the Navigator", "zh": "航海家亨利"}, {"en": "A famous royal chef", "zh": "一位著名的御用厨师"}], "answer": 0, "explain": {"en": "Secretary Rattio reveals Geronimo is really a descendant of Luís de Camões, who wrote The Lusiads about da Gama's journey.", "zh": "拉蒂奥国务秘书揭晓，杰罗尼摩其实是路易斯·德·卡蒙斯的后代，他写下了讲述达·伽马航行的史诗《卢济塔尼亚人之歌》。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
