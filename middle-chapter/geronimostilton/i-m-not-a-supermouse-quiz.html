<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Not a Supermouse! — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#43 · I'm Not a Supermouse!</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: I'm Not a Supermouse!</em> (Scholastic, 2010) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "At the start of the story, where did Geronimo get stuck?", "zh": "故事开头，杰罗尼摩被困在了什么地方？"}, "options": [{"en": "In the elevator of the public library", "zh": "公共图书馆的电梯里"}, {"en": "Inside a dark cave", "zh": "一个黑暗的洞穴里"}, {"en": "In his office at the newspaper according to some versions of the story", "zh": "报社办公室里（按书中另一种说法）"}, {"en": "On a helicopter", "zh": "一架直升机上"}], "answer": 0, "explain": {"en": "The elevator in the New Mouse City Public Library stopped between floors on a Saturday, trapping Geronimo in the dark.", "zh": "周六那天，鼠城公共图书馆的电梯在楼层间停住，把杰罗尼摩困在了黑暗里。"}}, {"q": {"en": "Who rescued Geronimo from the stuck elevator?", "zh": "是谁把杰罗尼摩从卡住的电梯里救出来的？"}, "options": [{"en": "His cousin Trap", "zh": "他的表哥特拉普"}, {"en": "Bruce Hyena", "zh": "布鲁斯·海纳"}, {"en": "His sister Thea", "zh": "他的妹妹茜亚"}, {"en": "His nephew Benjamin", "zh": "他的侄子本杰明"}], "answer": 1, "explain": {"en": "Bruce Hyena answered Geronimo's phone call and arrived to pry the elevator doors open.", "zh": "布鲁斯·海纳接到了杰罗尼摩的电话，赶来把电梯门撬开救了他。"}}, {"q": {"en": "What is Bruce's golden Rule No. 1 for survival?", "zh": "布鲁斯的黄金生存法则第一条是什么？"}, "options": [{"en": "Be quick on your paws", "zh": "手脚要快"}, {"en": "Always keep calm", "zh": "始终保持冷静"}, {"en": "Learn to adapt", "zh": "学会适应"}, {"en": "Be aware of your surroundings", "zh": "留意周围的环境"}], "answer": 1, "explain": {"en": "Bruce's four rules begin with 'Rule No. 1: ALWAYS KEEP CALM!' which he teaches through the desert tests.", "zh": "布鲁斯的四条法则以‘第一条：始终保持冷静！’开头，他通过沙漠测验向杰罗尼摩传授这些道理。"}}, {"q": {"en": "Which desert did Bruce take Geronimo to first for training?", "zh": "布鲁斯先把杰罗尼摩带到了哪片沙漠训练？"}, "options": [{"en": "The Arctic", "zh": "北极地区"}, {"en": "The Gobi", "zh": "戈壁沙漠"}, {"en": "The Sahara Desert", "zh": "撒哈拉沙漠"}, {"en": "The Antarctic according to some versions of the story", "zh": "南极洲（按书中另一种说法）"}], "answer": 2, "explain": {"en": "Bruce flew Geronimo to the Sahara, describing it as a huge, hot, dry place with lots of camels.", "zh": "布鲁斯把杰罗尼摩空运到撒哈拉，说那里又大又热又干，还有很多骆驼。"}}, {"q": {"en": "In Real Mouse Test No. 1, what did Bruce use to scare Geronimo?", "zh": "在‘真老鼠测验第一关’里，布鲁斯拿什么吓唬杰罗尼摩？"}, "options": [{"en": "A bee", "zh": "一只蜜蜂"}, {"en": "A rubber scorpion", "zh": "一只橡胶蝎子"}, {"en": "A rubber snake according to some versions of the story", "zh": "一条橡胶蛇（按书中另一种说法）"}, {"en": "A real spider", "zh": "一只真蜘蛛"}], "answer": 1, "explain": {"en": "Bruce dangled a 'scorpion' in Geronimo's face, then revealed it was made of rubber to teach Rule No. 1: keep calm.", "zh": "布鲁斯把一只‘蝎子’在杰罗尼摩面前晃，随后说明那是橡胶做的，以此教第一条法则：保持冷静。"}}, {"q": {"en": "In Test No. 5, what did Geronimo dive into to escape the angry bees?", "zh": "在第五关测验里，杰罗尼摩跳进什么里面躲开愤怒的蜜蜂？"}, "options": [{"en": "A fast river", "zh": "一条湍急的河"}, {"en": "A mountain lake according to some versions of the story", "zh": "一座山间湖泊（按书中另一种说法）"}, {"en": "The open sea", "zh": "开阔的大海"}, {"en": "A pond in the oasis", "zh": "绿洲里的水塘"}], "answer": 3, "explain": {"en": "After Bruce shook the bees' nest onto his head, Geronimo ran to the pond in the middle of the oasis and dove in.", "zh": "布鲁斯把蜂巢摇到他头上后，杰罗尼摩跑到绿洲中央的水塘，一头扎了进去。"}}, {"q": {"en": "How many miles did they pull the sled to reach the North Pole?", "zh": "他们拉雪橇走了多少英里才到达北极？"}, "options": [{"en": "About 1,000 miles", "zh": "大约一千英里"}, {"en": "About 200 miles", "zh": "大约两百英里"}, {"en": "About 50 miles", "zh": "大约五十英里"}, {"en": "About 100 miles", "zh": "大约一百英里"}], "answer": 3, "explain": {"en": "Bruce said they would pull sleds for a good hundred miles until the GPS told them they had hit the North Pole.", "zh": "布鲁斯说他们要拉雪橇走足足一百英里，直到导航显示抵达北极为止。"}}, {"q": {"en": "In the jungle, who mistook Geronimo for her own baby?", "zh": "在丛林里，谁把杰罗尼摩当成了自己的宝宝？"}, "options": [{"en": "A crocodile", "zh": "一条鳄鱼"}, {"en": "Bruce Hyena", "zh": "布鲁斯·海纳"}, {"en": "An orangutan mother", "zh": "一只猩猩妈妈"}, {"en": "A hungry tiger according to some versions of the story", "zh": "一只饥饿的老虎（按书中另一种说法）"}], "answer": 2, "explain": {"en": "An orangutan mother plucked Geronimo from the tree and rocked him, thinking he was one of her babies.", "zh": "一只猩猩妈妈把杰罗尼摩从树上抱下来轻轻摇晃，以为他是自己的宝宝。"}}, {"q": {"en": "In the dark cave, how did Bruce finally find Geronimo?", "zh": "在漆黑的洞穴里，布鲁斯最后是怎么找到杰罗尼摩的？"}, "options": [{"en": "By hearing him sing", "zh": "听到他在唱歌"}, {"en": "By shouting his name", "zh": "大声喊他的名字"}, {"en": "By a flashlight beam", "zh": "借助手电筒的光"}, {"en": "By smelling his cheese", "zh": "闻到他身上的奶酪味"}], "answer": 0, "explain": {"en": "Geronimo sang his 'I'm a Calm Mouse' song; Bruce heard him singing and found him in the dark.", "zh": "杰罗尼摩唱起了那首《我是只冷静鼠》的歌，布鲁斯循着歌声在黑暗中找到了他。"}}, {"q": {"en": "What disaster back home made Geronimo organize volunteer relief?", "zh": "回到家乡后，是什么灾害让杰罗尼摩组织志愿者去救援？"}, "options": [{"en": "A storm near Blue Dolphin Bay", "zh": "蓝海豚湾附近的一场风暴"}, {"en": "A fire at the newspaper according to some versions of the story", "zh": "报社的一场火灾（按书中另一种说法）"}, {"en": "A terrible flood", "zh": "一场可怕的洪水"}, {"en": "A big earthquake", "zh": "一场大地震"}], "answer": 0, "explain": {"en": "A major storm hit the northern part of Mouse Island near Blue Dolphin Bay, and Mayor Ratmouse asked Geronimo for help.", "zh": "一场大风暴袭击了鼠岛北部蓝海豚湾附近的区域，老鼠市长向杰罗尼摩求助。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
