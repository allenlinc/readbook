<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Mysterious Cheese Thief — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#31 · The Mysterious Cheese Thief</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: The Mysterious Cheese Thief</em> (Scholastic, 2003) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who sent Geronimo the letter saying he could no longer use the name Stilton?", "zh": "是谁给杰罗尼摩寄信，说他不能再使用斯提尔顿这个姓氏？"}, "options": [{"en": "Ratly Von Doright III, a lawyer for the Stilton Cheesemakers' Association", "zh": "拉特利·冯·多赖特三世，斯提尔顿奶酪制造商协会的律师"}, {"en": "Grandfather William Shortpaws", "zh": "威廉·肖特波叔叔"}, {"en": "Sally Ratmousen, owner of The Daily Rat according to some versions of the story", "zh": "萨莉·拉特穆森，《老鼠日报》的老板（按书中另一种说法）"}, {"en": "The Shadow, a notorious thief", "zh": "影子，一个臭名昭著的盗贼"}], "answer": 0, "explain": {"en": "The letter came from Ratly Von Doright III, a lawyer for the Stilton Cheesemakers' Association, who said Stilton was a trademarked cheese name.", "zh": "这封信来自拉特利·冯·多赖特三世，他是斯提尔顿奶酪制造商协会的律师，信中说斯提尔顿是一个受保护的奶酪商标名称。"}}, {"q": {"en": "What did Grandfather William use to drive the family all the way to England?", "zh": "威廉叔叔用的是什么交通工具，载着全家一路开到英格兰？"}, "options": [{"en": "A train through the Chunnel according to some versions of the story", "zh": "穿过海峡隧道的火车（按书中另一种说法）"}, {"en": "A fast airplane", "zh": "一架快速的飞机"}, {"en": "His enormous cheese-colored camper", "zh": "他那辆巨大的奶酪色房车"}, {"en": "A sailboat across the sea", "zh": "一艘横渡大海的帆船"}], "answer": 2, "explain": {"en": "Grandfather William arrived in his huge yellow cheese-colored camper and gave Geronimo sixty seconds to pack before driving to England.", "zh": "威廉叔叔开着那辆巨大的黄色奶酪色房车到来，只给了杰罗尼摩六十秒收拾行李，然后就开车去了英格兰。"}}, {"q": {"en": "What is the name of Geronimo's sweet little nephew?", "zh": "杰罗尼摩可爱的小侄子叫什么名字？"}, "options": [{"en": "Hercule Poirat", "zh": "赫拉克·波瓦"}, {"en": "Benjamin", "zh": "本杰明"}, {"en": "Thea", "zh": "西奥"}, {"en": "Trap", "zh": "特拉普"}], "answer": 1, "explain": {"en": "Benjamin is Geronimo's dear little nephew who hugged him and later praised the cheese trail Geronimo left behind.", "zh": "本杰明是杰罗尼摩亲爱的小侄子，他拥抱了叔叔，后来还夸赞杰罗尼摩留下的奶酪线索很聪明。"}}, {"q": {"en": "Who is the clever thief known for her disguises that stole all the Stilton cheese?", "zh": "那个以善于伪装而闻名、偷走了所有斯提尔顿奶酪的聪明盗贼是谁？"}, "options": [{"en": "Tina Spicytail", "zh": "蒂娜·斯派斯塔尔"}, {"en": "The Shadow", "zh": "影子"}, {"en": "Sally Ratmousen", "zh": "萨莉·拉特穆森"}, {"en": "Thea Stilton", "zh": "西奥·斯提尔顿"}], "answer": 1, "explain": {"en": "The Shadow is the notorious thief known for clever disguises; Thea found her mark at every crime scene and Geronimo had met her before at the Egyptian Mouseum.", "zh": "影子是一个以巧妙伪装而闻名的臭名昭著的盗贼。西奥在每个作案现场都发现了她的标记，而杰罗尼摩之前在埃及老鼠博物馆见过她。"}}, {"q": {"en": "How did Geronimo's family manage to find him at the Shadow's hidden cheese house?", "zh": "杰罗尼摩的家人是如何在影子隐藏的奶酪屋找到他的？"}, "options": [{"en": "He rolled cheese off a truck to leave a trail behind him", "zh": "他从卡车上滚下奶酪，在身后留下了一条线索"}, {"en": "Thea followed the Shadow's pawprints in the snow according to some versions of the story", "zh": "西奥沿着雪地里影子的爪印追踪（按书中另一种说法）"}, {"en": "The camper followed the main road by itself", "zh": "房车自己沿着大路开过去了"}, {"en": "He called them on his cell phone", "zh": "他用手机给他们打电话"}], "answer": 0, "explain": {"en": "Geronimo left a trail of cheese behind the truck like Hansel and Gretelmouse; Benjamin said he was smart to leave that trail so the family could follow it.", "zh": "杰罗尼摩像童话里的韩塞尔和葛蕾特那样，在卡车后面留下了一路奶酪。本杰明说叔叔留下奶酪线索的主意非常聪明，家人正是循着它找到他的。"}}, {"q": {"en": "What was the Shadow's secret hideout house built out of?", "zh": "影子秘密藏身的小屋是用什么建造的？"}, "options": [{"en": "Wood and stone", "zh": "木头和石头"}, {"en": "Chocolate and candy", "zh": "巧克力和糖果"}, {"en": "Snow and blocks of ice according to some versions of the story", "zh": "雪和冰块（按书中另一种说法）"}, {"en": "Stilton cheese, with cheese-brick walls and a rind roof", "zh": "斯提尔顿奶酪，墙壁是奶酪砖，屋顶是奶酪皮"}], "answer": 3, "explain": {"en": "The Shadow's house was made entirely of Stilton cheese, with walls of cheese bricks and a roof covered in cheese rinds, even a swimming pool of melted cheese.", "zh": "影子的屋子全部用斯提尔顿奶酪建成，墙壁是奶酪砖，屋顶盖着奶酪皮，甚至还有一个装满融化奶酪的游泳池。"}}, {"q": {"en": "On the phone, the Shadow revealed she was working with her cousin. Who was it?", "zh": "在电话里，影子透露她正和自己的表姐合作。那个人是谁？"}, "options": [{"en": "Thea Stilton, Geronimo's sister according to some versions of the story", "zh": "西奥·斯提尔顿，杰罗尼摩的妹妹（按书中另一种说法）"}, {"en": "Tina Spicytail, the housekeeper", "zh": "蒂娜·斯派斯塔尔，管家"}, {"en": "Sally Ratmousen, who owns The Daily Rat", "zh": "萨莉·拉特穆森，《老鼠日报》的老板"}, {"en": "Grandfather William Shortpaws", "zh": "威廉·肖特波叔叔"}], "answer": 2, "explain": {"en": "The Shadow called her 'cherished cousin Sally Ratmousen,' the owner of The Daily Rat and Geronimo's number one enemy.", "zh": "影子打电话给她“心爱的表姐萨莉·拉特穆森”，也就是《老鼠日报》的老板，也是杰罗尼摩的头号敌人。"}}, {"q": {"en": "Where does the name Stilton come from?", "zh": "斯提尔顿这个名字来源于哪里？"}, "options": [{"en": "Geronimo's grandfather", "zh": "杰罗尼摩的爷爷"}, {"en": "A village in England", "zh": "英格兰的一个村庄"}, {"en": "The cheese factory owner", "zh": "奶酪厂的老板"}, {"en": "A famous type of mouse", "zh": "一种著名的老鼠"}], "answer": 1, "explain": {"en": "Grandfather William explained the family name comes from a village in England called Stilton, which is also where Stilton cheese got its name.", "zh": "威廉叔叔解释说，他们家族的姓氏来自英格兰一个叫斯提尔顿的村庄，斯提尔顿奶酪的名字也正是来源于这个村庄。"}}, {"q": {"en": "What did the Shadow use to knock Geronimo unconscious?", "zh": "影子用什么把杰罗尼摩打晕了？"}, "options": [{"en": "A rolling pin", "zh": "一根擀面杖"}, {"en": "A pail of icy water according to some versions of the story", "zh": "一桶冰水（按书中另一种说法）"}, {"en": "A cheese drill", "zh": "一个奶酪钻"}, {"en": "A giant hammer hidden under the couch cushion", "zh": "藏在沙发垫下面的一把大锤子"}], "answer": 3, "explain": {"en": "The Shadow had hidden a gigundo hammer under the couch cushion and clocked Geronimo over the snout with it after he fell asleep.", "zh": "影子把一把巨大的锤子藏在沙发垫下面，趁杰罗尼摩睡着时，用锤子狠狠敲在他的鼻子上把他打晕了。"}}, {"q": {"en": "At the very end, how did Geronimo travel back home to Mouse Island?", "zh": "故事最后，杰罗尼摩是坐什么交通工具回到老鼠岛的？"}, "options": [{"en": "He took a plane", "zh": "他坐了飞机"}, {"en": "He sailed on a boat", "zh": "他坐船航行"}, {"en": "He rode a train", "zh": "他坐火车"}, {"en": "He drove the camper", "zh": "他开着房车"}], "answer": 0, "explain": {"en": "After their big fight, Geronimo took a plane back to Mouse Island right away, while Trap went by boat and the rest of the family rode the ferry in the camper.", "zh": "大吵一架之后，杰罗尼摩立刻坐飞机回到了老鼠岛，而特拉普坐船回去，其余的家人则开着房车乘渡轮回家。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
