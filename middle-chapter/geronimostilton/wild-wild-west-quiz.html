<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Wild, Wild West — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#21 · The Wild, Wild West</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: The Wild, Wild West</em> (Scholastic, 2002) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What is Geronimo Stilton's job in New Mouse City?", "zh": "杰罗尼摩·斯蒂顿在新鼠城的工作是什么？"}, "options": [{"en": "Editor of The Rodent's Gazette", "zh": "《啮齿动物公报》的主编"}, {"en": "A schoolteacher", "zh": "一名学校老师"}, {"en": "A train conductor", "zh": "一名列车员"}, {"en": "A blacksmith", "zh": "一名铁匠"}], "answer": 0, "explain": {"en": "Geronimo says he is the editor of The Rodent's Gazette, the most popular paper in New Mouse City.", "zh": "杰罗尼摩说自己是新鼠城最受欢迎的报纸《啮齿动物公报》的主编。"}}, {"q": {"en": "Who traveled with Geronimo into the Wild West?", "zh": "谁是和杰罗尼摩一起前往狂野西部的同伴？"}, "options": [{"en": "Only his sister Thea", "zh": "只有他的妹妹蒂奥"}, {"en": "Only his cousin Trap", "zh": "只有他的表哥特拉普"}, {"en": "His sister Thea, cousin Trap, and nephew Benjamin", "zh": "他的妹妹蒂奥、表哥特拉普和侄子本杰明"}, {"en": "His friend Hercule Poirat", "zh": "他的朋友赫拉克·波瓦"}], "answer": 2, "explain": {"en": "Geronimo says his sister Thea, cousin Trap, and little nephew Benjamin crossed the scorching desert with him.", "zh": "杰罗尼摩说他的妹妹蒂奥、表哥特拉普和小侄子本杰明和他一起穿过了酷热的沙漠。"}}, {"q": {"en": "In which desert did the Stilton family first find themselves?", "zh": "斯蒂顿一家最初发现自己身处哪片沙漠？"}, "options": [{"en": "The Sahara Desert", "zh": "撒哈拉沙漠"}, {"en": "The Arizona desert", "zh": "亚利桑那沙漠"}, {"en": "The Gobi Desert", "zh": "戈壁沙漠"}, {"en": "The Antarctic ice", "zh": "南极冰原"}], "answer": 1, "explain": {"en": "Geronimo complains that he was in the Arizona desert, hot, dry, and dying of thirst.", "zh": "杰罗尼摩抱怨说自己身处亚利桑那沙漠，又热又干，渴得要命。"}}, {"q": {"en": "How did the mice pay Blunt Rat Bob for their cowboy supplies?", "zh": "老鼠们是如何付钱给杂货店老板钝鼠鲍勃买牛仔装备的？"}, "options": [{"en": "With a credit card", "zh": "用信用卡"}, {"en": "With paper money from New Mouse City", "zh": "用新鼠城的纸币"}, {"en": "With a big wheel of cheese", "zh": "用一大块奶酪"}, {"en": "With gold and Benjamin's electronic game", "zh": "用黄金和本杰明的电子游戏机"}], "answer": 3, "explain": {"en": "Bob wanted gold, not bills; Geronimo, Thea and Trap gave gold items, and Benjamin traded his Cheese Blaster game to seal the deal.", "zh": "鲍勃只收黄金不收纸币；杰罗尼摩、蒂奥和特拉普拿出了金子，本杰明则用自己的奶酪爆破游戏机换来了装备。"}}, {"q": {"en": "What drink did Geronimo order in the saloon that made everyone laugh?", "zh": "杰罗尼摩在酒馆里点了什么饮料，惹得大家都哈哈大笑？"}, "options": [{"en": "Squeakytime Tea", "zh": "吱吱茶"}, {"en": "A cup of rat poison", "zh": "一杯老鼠药"}, {"en": "A bottle of soda", "zh": "一瓶汽水"}, {"en": "A glass of milk", "zh": "一杯牛奶"}], "answer": 0, "explain": {"en": "Geronimo asked the bartender for a hot cup of Squeakytime Tea, and the whole saloon roared with laughter.", "zh": "杰罗尼摩向酒保要了一杯热乎乎的吱吱茶，整个酒馆的老鼠都放声大笑。"}}, {"q": {"en": "Why did the tough rat Mick Muscle Mouse want to fight Geronimo?", "zh": "强壮的米克·肌肉鼠为什么要和杰罗尼摩打架？"}, "options": [{"en": "Geronimo won his money at cards", "zh": "杰罗尼摩在牌桌上赢了他的钱"}, {"en": "Geronimo accidentally stepped on his paw", "zh": "杰罗尼摩不小心踩到了他的爪子"}, {"en": "Geronimo broke his guitar", "zh": "杰罗尼摩弄坏了他吉他的"}, {"en": "Geronimo stole his hat", "zh": "杰罗尼摩偷了他的帽子"}], "answer": 1, "explain": {"en": "Geronimo hopped around screaming 'OUCH' and accidentally stepped on Mick's paw, so Mick challenged him to a fight.", "zh": "杰罗尼摩痛得乱跳、大喊“哎哟”，不小心踩到了米克的爪子，于是米克向他发出了决斗挑战。"}}, {"q": {"en": "Who accidentally saved Geronimo from the fight with Mick?", "zh": "是谁阴差阳错地把杰罗尼摩从与米克的打斗中救了出来？"}, "options": [{"en": "Miss Dolly Dandywhiskers", "zh": "多莉·丹迪胡须小姐"}, {"en": "The undertaker", "zh": "殡仪馆老板"}, {"en": "The town sheriff", "zh": "镇上的警长"}, {"en": "Cousin Trap", "zh": "表哥特拉普"}], "answer": 0, "explain": {"en": "When pretty Miss Dolly arrived, Mick turned lovesick, let go of Geronimo's ear, and forgot all about the fight.", "zh": "当漂亮的多莉小姐出现时，米克害了相思病，松开杰罗尼摩的耳朵，把决斗的事忘得一干二净。"}}, {"q": {"en": "How did the evil Wicked Whiskers control Cactus City?", "zh": "邪恶的恶胡须是用什么手段控制仙人掌城的？"}, "options": [{"en": "He burned down the newspaper", "zh": "他烧掉了报社"}, {"en": "He locked the sheriff in jail", "zh": "他把警长关进了监狱"}, {"en": "He built a dam to stop the river water", "zh": "他修建水坝截断河水"}, {"en": "He stole all the town's gold", "zh": "他偷走了全镇的黄金"}], "answer": 2, "explain": {"en": "Wicked Whiskers built a dam on the Twisting Tail River so water no longer reached Cactus City, and made the town pay him in gold for water.", "zh": "恶胡须在扭尾河上修了一座水坝，让河水再也流不到仙人掌城，还逼镇上的老鼠用黄金向他买水。"}}, {"q": {"en": "What kind of animal was Bessie, the beast Geronimo had to tame?", "zh": "贝西是杰罗尼摩必须驯服的什么动物？"}, "options": [{"en": "A wild horse", "zh": "一匹野马"}, {"en": "A rattlesnake", "zh": "一条响尾蛇"}, {"en": "A coyote", "zh": "一只土狼"}, {"en": "A huge bull", "zh": "一头巨大的公牛"}], "answer": 3, "explain": {"en": "Trap tells Geronimo that Bessie is a bull — an immense black beast with long horns and terrifying red eyes.", "zh": "特拉普告诉杰罗尼摩，贝西是一头公牛——一头长着长角和可怕红眼睛的黑色巨兽。"}}, {"q": {"en": "What was really making the bull Bessie so angry?", "zh": "到底是什么让公牛贝西如此愤怒？"}, "options": [{"en": "He was starving hungry", "zh": "他饿坏了"}, {"en": "A cactus thorn was stuck in his ear", "zh": "一根仙人掌刺扎进了他的耳朵"}, {"en": "A bee had stung him", "zh": "一只蜜蜂蜇了他"}, {"en": "The hot desert sun", "zh": "酷热的沙漠烈日"}], "answer": 1, "explain": {"en": "Benjamin waved and pointed at his own ear; Geronimo found a huge cactus thorn in Bessie's ear, pulled it out, and the bull calmed down.", "zh": "本杰明又挥爪子又指自己的耳朵；杰罗尼摩发现贝西耳朵上扎着一根大仙人掌刺，拔掉后公牛就安静了下来。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
