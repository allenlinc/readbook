<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to Moldy Manor — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#59 · Welcome to Moldy Manor</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: Welcome to Moldy Manor</em> (Scholastic, 2008) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Why did Geronimo's bank account go down to zero dollars?", "zh": "杰罗尼摩的银行账户为什么变成了零元？"}, "options": [{"en": "He donated it all to charity according to some versions of the story", "zh": "他把钱全都捐给了慈善机构（按书中另一种说法）"}, {"en": "Trap tricked him into buying lots of presents using his money and cards", "zh": "特拉普骗他用自己钱和卡买了一大堆礼物"}, {"en": "The bank made a mistake", "zh": "银行弄错了"}, {"en": "A thief broke into his safe", "zh": "有小偷闯进他的保险箱"}], "answer": 1, "explain": {"en": "On his birthday, Trap pretended it was also Trap's birthday and made Geronimo pay for mountains of presents with his cash, checks, and credit cards.", "zh": "生日那天，特拉普谎称那天也是自己的生日，逼杰罗尼摩用现金、支票和信用卡给自己买了一大堆礼物。"}}, {"q": {"en": "Who is Geronimo's grandfather, also known as 'Cheap Mouse Willy'?", "zh": "杰罗尼摩的祖父是谁？他外号叫“小气鼠威利”。"}, "options": [{"en": "Samuel S. Stingysnout", "zh": "塞缪尔·S·吝啬鼻"}, {"en": "William Shortpaws", "zh": "威廉·肖特波"}, {"en": "Miserly Parsimouse", "zh": "吝啬·省钱鼠"}, {"en": "Trap Stilton", "zh": "特拉普·斯蒂顿"}], "answer": 1, "explain": {"en": "Grandfather William Shortpaws, nicknamed Cheap Mouse Willy, scolds Geronimo and sends him to learn about saving.", "zh": "祖父威廉·肖特波外号“小气鼠威利”，他训斥杰罗尼摩，并安排他去学习省钱。"}}, {"q": {"en": "Where does Uncle Samuel S. Stingysnout live now?", "zh": "塞缪尔·S·吝啬鼻叔叔现在住在哪里？"}, "options": [{"en": "Moldy Manor in the Valley of Thrift", "zh": "节俭谷里的发霉庄园"}, {"en": "Cat Island", "zh": "猫岛"}, {"en": "New Mouse City", "zh": "新老鼠城"}, {"en": "Penny Pincher Castle according to some versions of the story", "zh": "吝啬者城堡（按书中另一种说法）"}], "answer": 0, "explain": {"en": "The Stingysnout family moved from Penny Pincher Castle to Moldy Manor in the Valley of Thrift.", "zh": "吝啬鼻一家从吝啬者城堡搬到了节俭谷里的发霉庄园。"}}, {"q": {"en": "Who teaches Geronimo the crash course in saving money?", "zh": "是谁教杰罗尼摩省钱速成课的？"}, "options": [{"en": "Gordon Ratsey", "zh": "戈登·拉特西"}, {"en": "Saucy Le Paws", "zh": "酱汁·勒波"}, {"en": "Miserly Parsimouse, the Wallet Watchrat", "zh": "“钱包看守鼠”吝啬·省钱鼠"}, {"en": "Nutty Chocorat according to some versions of the story", "zh": "坚果·巧克力鼠（按书中另一种说法）"}], "answer": 2, "explain": {"en": "Miserly Parsimouse, nicknamed the Wallet Watchrat, is the greatest saving expert in the Valley of Thrift and Geronimo's instructor.", "zh": "“钱包看守鼠”吝啬·省钱鼠是节俭谷里最厉害的省钱专家，也是杰罗尼摩的老师。"}}, {"q": {"en": "How did Geronimo travel to Moldy Manor?", "zh": "杰罗尼摩是怎么去发霉庄园的？"}, "options": [{"en": "His own sports car", "zh": "他自己的跑车"}, {"en": "A direct half-hour flight according to some versions of the story", "zh": "半小时直达航班（按书中另一种说法）"}, {"en": "Third-class train, bus, bike with a manure cart, then on paw", "zh": "三等火车、公交车、自行车加粪车，最后步行"}, {"en": "A luxury cruise ship", "zh": "豪华游轮"}], "answer": 2, "explain": {"en": "Grandfather booked a deep-discount trip: three hours by third-class train, six by bus, thirty miles by bike (then a manure cart), and the last mile on paw.", "zh": "祖父订了超便宜的行程：三等火车三小时、公交六小时、自行车三十英里（后来改坐粪车），最后一英里靠步行。"}}, {"q": {"en": "What did Geronimo give Uncle Samuel to pay for his room at Moldy Manor?", "zh": "杰罗尼摩把什么给了塞缪尔叔叔，用来付发霉庄园的房费？"}, "options": [{"en": "His gold watch, a gift from his sister Thea", "zh": "他妹妹茜拉送的黄金手表"}, {"en": "A ticket to a concert according to some versions of the story", "zh": "一张演唱会门票（按书中另一种说法）"}, {"en": "His laptop computer", "zh": "他的笔记本电脑"}, {"en": "A bag of cheese", "zh": "一袋奶酪"}], "answer": 0, "explain": {"en": "Because the room was 'for paying guests only,' Geronimo had to barter his gold watch, a gift from Thea, to stay.", "zh": "因为房间写着“只招待付费客人”，杰罗尼摩只好用妹妹茜拉送的黄金手表抵住宿费。"}}, {"q": {"en": "Who gave Geronimo a red notebook to write down what he earns and spends?", "zh": "谁给了杰罗尼摩一本红笔记本，让他记下收支？"}, "options": [{"en": "His sister Thea", "zh": "他的妹妹茜拉"}, {"en": "Uncle Samuel", "zh": "塞缪尔叔叔"}, {"en": "His cousin Trap", "zh": "他的表哥特拉普"}, {"en": "Miserly Parsimouse", "zh": "吝啬·省钱鼠"}], "answer": 0, "explain": {"en": "Thea brought Geronimo a red notebook and told him to track every coin he earns and spends — a good habit to control money.", "zh": "茜拉给杰罗尼摩一本红笔记本，让他记下每一笔收入和支出，这是控制财务状况的好习惯。"}}, {"q": {"en": "What was the name of the saving crash course?", "zh": "那门省钱速成课叫什么名字？"}, "options": [{"en": "Cooking with Cheese", "zh": "《奶酪烹饪法》"}, {"en": "How to Catch a Cat", "zh": "《如何抓猫》"}, {"en": "The Super Chef Handbook according to some versions of the story", "zh": "《超级大厨手册》（按书中另一种说法）"}, {"en": "Become a Saver in Three Simple Stingy Steps", "zh": "《用三个简单小气步骤成为省钱鼠》"}], "answer": 3, "explain": {"en": "Miserly Parsimouse's course was 'Become a Saver in Three Simple Stingy Steps,' with days on the thrifty house, Thrifty City, and a final exam.", "zh": "吝啬·省钱鼠的课程叫《用三个简单小气步骤成为省钱鼠》，分节俭之家、节俭城和期末考试三天。"}}, {"q": {"en": "Why could Geronimo not pass the Misermouse final exam?", "zh": "为什么杰罗尼摩没通过“小气鼠”期末考试？"}, "options": [{"en": "He lost his pencil", "zh": "他把铅笔弄丢了"}, {"en": "He could not pretend to be stingy because he likes to share with friends", "zh": "他没法装小气，因为他喜欢和朋友分享"}, {"en": "The questions were in a foreign language according to some versions of the story", "zh": "题目是外语写的（按书中另一种说法）"}, {"en": "He fell asleep during the test", "zh": "他考试时睡着了"}], "answer": 1, "explain": {"en": "Geronimo admitted he is not and will never be a penny-pincher; he prefers sharing, so he couldn't honestly pass the stingy test.", "zh": "杰罗尼摩承认自己现在和将来都不是小气鬼，他更喜欢分享，所以没法诚实地通过小气测试。"}}, {"q": {"en": "What did Miserly Parsimouse want as payment for the course?", "zh": "吝啬·省钱鼠想要什么来抵课程费？"}, "options": [{"en": "The Rodent's Gazette", "zh": "《鼠民公报》"}, {"en": "A golden statue", "zh": "一座黄金雕像"}, {"en": "A year's supply of cheese according to some versions of the story", "zh": "一年的奶酪存货（按书中另一种说法）"}, {"en": "Geronimo's boots, which were stuck on his paws", "zh": "杰罗尼摩脚上那双脱不下来的靴子"}], "answer": 3, "explain": {"en": "Miserly never gives credit, so he pointed at Geronimo's boots; Geronimo agreed they were Miserly's if he could get them off his paws.", "zh": "省钱鼠从不赊账，他指了指杰罗尼摩的靴子；杰罗尼摩说只要你能把它从脚上脱下来，就归你。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
