<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Secret Of Cacklefur Castle — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#22 · The Secret Of Cacklefur Castle</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: The Secret Of Cacklefur Castle</em> (Scholastic, 2003) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who takes Geronimo to Cacklefur Castle against his will?", "zh": "是谁违背杰罗尼摩的意愿，把他带去了卡克福尔城堡？"}, "options": [{"en": "His cousin Trap", "zh": "他的表哥特拉普"}, {"en": "Creepella von Cacklefur", "zh": "克里普拉·冯·卡克福尔"}, {"en": "Boris von Cacklefur according to some versions of the story", "zh": "鲍里斯·冯·卡克福尔（按书中另一种说法）"}, {"en": "His sister Thea", "zh": "他的妹妹蒂奥"}], "answer": 1, "explain": {"en": "Creepella shows up in her hearse, catches Geronimo trying to escape in disguise, and drives him to the castle, calling it a mousenapping.", "zh": "克里普拉开着灵车出现，抓到正乔装逃跑的杰罗尼摩，把他塞进车里带去了城堡，自己说是“老鼠绑架”。"}}, {"q": {"en": "In which valley does Cacklefur Castle sit?", "zh": "卡克福尔城堡坐落在哪个山谷？"}, "options": [{"en": "The Cheese Canyon", "zh": "奶酪峡谷"}, {"en": "The Valley of the Happy Hamsters according to some versions of the story", "zh": "快乐仓鼠谷（按书中另一种说法）"}, {"en": "The Valley of the Vain Vampires", "zh": "虚荣吸血鬼谷"}, {"en": "The Sunny Meadow Valley", "zh": "阳光草甸谷"}], "answer": 2, "explain": {"en": "Creepella tells Geronimo the castle is in the Valley of the Vain Vampires, on a mountain shaped like a giant skull.", "zh": "克里普拉告诉杰罗尼摩，城堡在虚荣吸血鬼谷，坐落在一座像巨型骷髅的山上。"}}, {"q": {"en": "What is the name of the sharp-toothed plant that guards the castle door?", "zh": "看守城堡大门、长着尖牙的植物叫什么名字？"}, "options": [{"en": "Moldy", "zh": "霉霉"}, {"en": "Chompers", "zh": "咬咬"}, {"en": "Bitewing according to some versions of the story", "zh": "咬翼（按书中另一种说法）"}, {"en": "Kafka", "zh": "卡夫卡"}], "answer": 1, "explain": {"en": "The watch plant's nickname is Chompers; it bites off one of Geronimo's buttons and even gulps down his cell phone.", "zh": "那株看门植物的外号叫“咬咬”；它咬掉了杰罗尼摩的一颗纽扣，还一口吞下了他的手机。"}}, {"q": {"en": "What does the butler Boneham say when asked to take care of Geronimo?", "zh": "管家邦纳姆被吩咐照顾杰罗尼摩时，说了什么？"}, "options": [{"en": "I will do my best", "zh": "我会尽力而为"}, {"en": "I will call the police", "zh": "我会报警"}, {"en": "I will run away", "zh": "我会逃跑"}, {"en": "I will do my worst", "zh": "我会尽力使坏"}], "answer": 3, "explain": {"en": "When Creepella asks Boneham to take care of Geronimo, the butler replies, 'I will do my worst, Miss Creepella.'", "zh": "当克里普拉让邦纳姆照顾杰罗尼摩时，管家回答：“我会尽力使坏，克里普拉小姐。”"}}, {"q": {"en": "What does Chef Stewrat throw into his stew 'for a little bit of flavor'?", "zh": "炖鼠大厨为了“提一点味”，把什么扔进了他的炖菜里？"}, "options": [{"en": "A bar of cheese", "zh": "一块奶酪"}, {"en": "His smelly sock", "zh": "他那只发臭的袜子"}, {"en": "A fresh tomato according to some versions of the story", "zh": "一个新鲜番茄（按书中另一种说法）"}, {"en": "A flower", "zh": "一朵花"}], "answer": 1, "explain": {"en": "Chef Stewrat removes one of his smelly socks and tosses it into the pot, saying 'Just a little bit of flavor,' then pulls it out.", "zh": "炖鼠大厨脱下自己一只发臭的袜子丢进锅里，说“就提一点味”，然后又把袜子捞了出来。"}}, {"q": {"en": "What scary little creature is hidden in Madame Latomb's hairdo?", "zh": "拉通布夫人的头发里藏着什么可怕的的小东西？"}, "options": [{"en": "A were-canary", "zh": "一只狼金丝雀"}, {"en": "A spider", "zh": "一只蜘蛛"}, {"en": "A baby bat according to some versions of the story", "zh": "一只小蝙蝠（按书中另一种说法）"}, {"en": "A mouselet", "zh": "一只小老鼠"}], "answer": 0, "explain": {"en": "Madame Latomb's hairstyle hides her ferocious were-canary; a little yellow bird pops out and growls at Geronimo.", "zh": "拉通布夫人的发型里藏着她那只凶猛的狼金丝雀；一只小黄鸟从她头发里钻出来，对着杰罗尼摩怒吼。"}}, {"q": {"en": "What kind of pet is Kafka, the beloved Cacklefur family animal?", "zh": "卡克福尔一家心爱的宠物卡夫卡是什么动物？"}, "options": [{"en": "A cockroach that barks like a dog", "zh": "一只会像狗一样叫的蟑螂"}, {"en": "A cat", "zh": "一只猫"}, {"en": "A bat", "zh": "一只蝙蝠"}, {"en": "A chameleon according to some versions of the story", "zh": "一只变色龙（按书中另一种说法）"}], "answer": 0, "explain": {"en": "Kafka is the family's faithful pet cockroach; he sits on his hind legs and barks 'ARF! ARF!' like a dog.", "zh": "卡夫卡是这家人忠实的宠物蟑螂；他后腿站立，像狗一样“汪！汪！”地叫。"}}, {"q": {"en": "What is 'The Thing' that lives in the castle moat?", "zh": "住在城堡护城河里的“那个东西”到底是什么？"}, "options": [{"en": "A mysterious creature that eats anything", "zh": "一只会吃掉一切神秘生物"}, {"en": "A friendly fish according to some versions of the story", "zh": "一条友好的鱼（按书中另一种说法）"}, {"en": "A small boat", "zh": "一条小船"}, {"en": "A rubber duck", "zh": "一只橡皮鸭"}], "answer": 0, "explain": {"en": "The Thing lives in the muddy moat, is enormous and very shy, and eats whatever crosses its path; its burp shakes the castle.", "zh": "“那个东西”住在泥泞的护城河里，体型巨大又非常害羞，会吃掉任何经过的东西；它的打嗝声震得城堡直晃。"}}, {"q": {"en": "At the will reading, which family member surprises everyone by being alive?", "zh": "在宣读遗嘱时，哪位家人活着出现、让所有人都大吃一惊？"}, "options": [{"en": "The lawyer Byron Badnews according to some versions of the story", "zh": "律师拜伦·坏消息（按书中另一种说法）"}, {"en": "Chef Stewrat", "zh": "炖鼠大厨"}, {"en": "Boris von Cacklefur", "zh": "鲍里斯·冯·卡克福尔"}, {"en": "Professor Frankenstein, Creepella's grandfather", "zh": "克里普拉的祖父弗兰肯斯坦教授"}], "answer": 3, "explain": {"en": "Everyone thought Professor Frankenstein had died, but he appears alive, saying he fell asleep in Nightmare Wood and a bat's pee woke him.", "zh": "大家都以为弗兰肯斯坦教授死了，可他活着出现了，说自己是在噩梦森林里睡着了，被一只蝙蝠撒尿在鼻子上才醒来。"}}, {"q": {"en": "What do the Cacklefurs do when they find a crying orphan baby at the drawbridge?", "zh": "当卡克福尔一家在吊桥边发现一个哭泣的孤儿宝宝时，他们做了什么？"}, "options": [{"en": "Feed him to The Thing", "zh": "把他喂给“那个东西”"}, {"en": "Give him to Geronimo as a pet according to some versions of the story", "zh": "把他送给杰罗尼摩当宠物（按书中另一种说法）"}, {"en": "Adopt him and name him Baby", "zh": "收养了他，并给他起名叫“宝宝”"}, {"en": "Send him far away", "zh": "把他远远地送走"}], "answer": 2, "explain": {"en": "Every Cacklefur raises a paw to adopt the orphan; they vote and name him Baby, saying their family secret is love.", "zh": "每个卡克福尔都举起爪子同意收养这个孤儿；他们投票决定收养他，并起名叫“宝宝”，说家族的秘密就是爱。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
