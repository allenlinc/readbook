<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magical Mission — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#64 · Magical Mission</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: Magical Mission</em> (Scholastic, 2011) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Where does the strange mystery in this book take place?", "zh": "这本书里的离奇谜案发生在哪里？"}, "options": [{"en": "A small village in Switzerland", "zh": "瑞士的一个小村庄"}, {"en": "New Mouse City's town square", "zh": "新鼠城的城市广场"}, {"en": "London's Trafalgar Square", "zh": "伦敦的特拉法尔加广场"}, {"en": "The beaches of Mouse Island", "zh": "老鼠岛的海滩"}], "answer": 2, "explain": {"en": "A news flash reports a mystery at London's Trafalgar Square, where a bronze lion statue has begun roaring insults at passersby.", "zh": "新闻快讯报道伦敦特拉法尔加广场出了一件怪事：一只青铜狮子雕像开始对路人咆哮辱骂。"}}, {"q": {"en": "What is actually making the insulting noises at the square?", "zh": "广场上那些骂人的声音到底是从什么发出来的？"}, "options": [{"en": "The Queen of England", "zh": "英国女王"}, {"en": "One of the four bronze lion statues by Nelson's Column", "zh": "纳尔逊纪念柱旁四只青铜狮子雕像中的一只"}, {"en": "A talking pigeon", "zh": "一只会说话的鸽子"}, {"en": "A real live lion that escaped the zoo according to some versions of the story", "zh": "一只从动物园逃出来的真狮子（按书中另一种说法）"}], "answer": 1, "explain": {"en": "Four bronze lion statues guard Nelson's Column; one of them roars 'Get out of the way, Cheesebrain!' at visitors.", "zh": "纳尔逊纪念柱旁立着四只青铜狮子雕像，其中一只会对游客咆哮：“让开，奶酪脑！”"}}, {"q": {"en": "Who sends Geronimo the supersecret paper-airplane message?", "zh": "是谁用纸飞机给杰罗尼摩送来那封绝密情报的？"}, "options": [{"en": "Professor Brainymouse according to some versions of the story", "zh": "布莱鼠教授（按书中另一种说法）"}, {"en": "His sister Thea", "zh": "他的妹妹蒂奥"}, {"en": "His cousin Trap", "zh": "他的表哥特拉普"}, {"en": "His friend Kornelius von Kickpaw, Secret Agent 00K", "zh": "他的朋友科尼利厄斯·冯·基克波，代号特工00K"}], "answer": 3, "explain": {"en": "The only mouse who sends Geronimo supersecret messages is his old friend Kornelius von Kickpaw, Secret Agent 00K, who needs help on a mission.", "zh": "唯一会给杰罗尼摩送绝密情报的是他的老朋友科尼利厄斯·冯·基克波，特工00K，他需要杰罗尼摩协助执行任务。"}}, {"q": {"en": "What contest does cousin Trap enter while they are in London?", "zh": "表哥特拉普在伦敦期间参加了什么比赛？"}, "options": [{"en": "The Ultimate Trick, to be crowned the world's greatest magician", "zh": "“终极魔法”大赛，争夺世界上最伟大魔术师的称号"}, {"en": "A swimming race on the Thames according to some versions of the story in an early draft of the book", "zh": "泰晤士河游泳赛（按书中另一种说法）（在书的早期草稿中）"}, {"en": "A cheese-eating contest", "zh": "吃奶酪大赛"}, {"en": "A news-reporting competition", "zh": "新闻报道大赛"}], "answer": 0, "explain": {"en": "Trap says he is going to London to compete in — and win — the Ultimate Trick, the world's greatest competition of illusionists.", "zh": "特拉普说自己去伦敦是为了参加并赢下“终极魔法”大赛——全球最伟大的幻术师竞赛。"}}, {"q": {"en": "What does the mystery crook demand be delivered by midnight?", "zh": "那个神秘坏蛋要求午夜前交出什么？"}, "options": [{"en": "The Crown Jewels, left in a big suitcase by the talking lion", "zh": "皇冠珠宝，装在大箱子里放在会说话的狮子前"}, {"en": "A golden trophy", "zh": "一座黄金奖杯"}, {"en": "Geronimo's newspaper", "zh": "杰罗尼摩的报纸"}, {"en": "A suitcase full of cheese according to some versions of the story in an early draft of the book", "zh": "一箱子奶酪（按书中另一种说法）（在书的早期草稿中）"}], "answer": 0, "explain": {"en": "The threatening note says: hand over the Crown Jewels by midnight inside a big suitcase, left in front of the talking lion.", "zh": "那封恐吓信写道：午夜前把皇冠珠宝装进一只大箱子，放在会说话的狮子前面交出来。"}}, {"q": {"en": "How does Geronimo discover the lion is made to 'talk'?", "zh": "杰罗尼摩是怎么发现狮子“说话”的窍门的？"}, "options": [{"en": "Magic spells from a wizard", "zh": "巫师念的魔法咒语"}, {"en": "A tiny speaker in the lion's mouth plus a hidden projector on a fountain dolphin", "zh": "狮子嘴里藏了小喇叭，喷泉的海豚上藏了投影仪"}, {"en": "A real mouse hiding inside the statue according to some versions of the story in an early draft of the book", "zh": "一只真老鼠藏在雕像里面（按书中另一种说法）（在书的早期草稿中）"}, {"en": "A radio left by the Queen", "zh": "女王落下的收音机"}], "answer": 1, "explain": {"en": "Geronimo finds a tiny speaker inside the lion's mouth and a tiny projector fastened to a dolphin in the fountain, projecting a moving-mouth image.", "zh": "杰罗尼摩在狮子嘴里找到一只小喇叭，又在喷泉的海豚身上发现一台投影仪，正把会动的嘴部影像投射到雕像上。"}}, {"q": {"en": "Who is the mysterious crook behind the talking lion?", "zh": "会说话的狮子背后的神秘坏蛋是谁？"}, "options": [{"en": "Mystery Mouse, the magician in the cheddar-colored cape", "zh": "“神秘鼠”，穿切达色斗篷的魔术师"}, {"en": "The policemouse", "zh": "警察鼠"}, {"en": "Trap Stilton", "zh": "特拉普·斯蒂顿"}, {"en": "Professor Ratting according to some versions of the story in an early draft of the book", "zh": "拉廷教授（按书中另一种说法）（在书的早期草稿中）"}], "answer": 0, "explain": {"en": "The crook caught at the suitcase is Mystery Mouse — he is scratching and stinky from the itching powder and skunk stink Geronimo set as traps.", "zh": "在箱子旁被抓的坏蛋就是“神秘鼠”——他因为杰罗尼摩下的痒粉和臭鼬臭液，正又抓又臭。"}}, {"q": {"en": "What does Geronimo paint on the suitcase handle to catch the crook?", "zh": "为了抓坏蛋，杰罗尼摩在箱子把手上涂了什么？"}, "options": [{"en": "Sticky honey", "zh": "黏糊糊的蜂蜜"}, {"en": "Blue ink", "zh": "蓝色墨水"}, {"en": "Special glow-in-the-dark paint", "zh": "特殊的夜光漆"}, {"en": "Red nail polish according to some versions of the story", "zh": "红色指甲油（按书中另一种说法）"}], "answer": 2, "explain": {"en": "Geronimo paints the suitcase handle with a special glow paint (used in Trap's act) so he can see and identify whoever grabs it.", "zh": "杰罗尼摩在箱子把手上涂了特殊的夜光漆（特拉普表演用的道具），好看清并认出谁去抓它。"}}, {"q": {"en": "Which family members fly to London to help with the Big Ben trick?", "zh": "哪些家人飞到伦敦来帮忙完成“让大本钟消失”的魔术？"}, "options": [{"en": "Grandfather William and Trap", "zh": "威廉爷爷和特拉普"}, {"en": "Thea, Benjamin, and Bugsy Wugsy", "zh": "蒂奥、本杰明和巴格西·瓦格西"}, {"en": "Professor Brainymouse and Hercule according to some versions of the story", "zh": "布莱鼠教授和赫库勒（按书中另一种说法）"}, {"en": "Just Geronimo's secretary", "zh": "只有杰罗尼摩的秘书"}], "answer": 1, "explain": {"en": "Thea takes the next flight out and arrives with Benjamin and his friend Bugsy Wugsy to set up the stage for the Big Ben act.", "zh": "蒂奥立刻搭下一班飞机赶来，还带着本杰明和他的朋友巴格西·瓦格西，一起搭好了大本钟表演的舞台。"}}, {"q": {"en": "How does Geronimo make Big Ben 'disappear' during the show?", "zh": "演出中杰罗尼摩是如何让大本钟“消失”的？"}, "options": [{"en": "He paints it invisible", "zh": "他把钟楼涂成了隐形"}, {"en": "Thea flies it away in a plane", "zh": "蒂奥用飞机把它吊走了"}, {"en": "He uses real magic to shrink the tower according to some versions of the story", "zh": "他用真魔法把钟楼缩小了（按书中另一种说法）"}, {"en": "He pulls a rope three times so curtains hide it behind a sky-colored screen", "zh": "他拉了三次绳子，让幕布把它遮在仿天空色的屏风后"}], "answer": 3, "explain": {"en": "Thea tells Geronimo to just pull the rope three times; the curtains open and close, and on the third pull a screen hides Big Ben, framing empty sky.", "zh": "蒂奥让杰罗尼摩只管拉三次绳子，幕布随之开合；第三次拉开时，一道屏风遮住大本钟，框出一片空旷蓝天，仿佛钟楼消失了。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
