<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight of the Red Bandit — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#56 · Flight of the Red Bandit</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: Flight of the Red Bandit</em> (Scholastic, 2011) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who is the narrator of this story, and what is his job?", "zh": "这个故事的讲述者是谁，他的职业是什么？"}, "options": [{"en": "Geronimo Stilton, editor of The Rodent's Gazette", "zh": "杰罗尼摩·斯提尔顿，是《鼠民公报》的编辑"}, {"en": "Trap Stilton, a taxi driver", "zh": "特拉普·斯提尔顿，是一名出租车司机"}, {"en": "Hercule Poirat, a detective", "zh": "赫拉克·波拉，是一名侦探"}, {"en": "Bruce Hyena, a mule guide", "zh": "布鲁斯·鬣狗，是一名骡子向导"}], "answer": 0, "explain": {"en": "Geronimo says, 'My name is Stilton, Geronimo Stilton. I'm the editor of The Rodent's Gazette, the most famous newspaper on Mouse Island.'", "zh": "杰罗尼摩说：“我叫斯提尔顿，杰罗尼摩·斯提尔顿。我是老鼠岛上最著名的报纸《鼠民公报》的编辑。”"}}, {"q": {"en": "What is Grandfather William Shortpaws also known as?", "zh": "威廉·肖特波兹爷爷还有一个什么外号？"}, "options": [{"en": "Cheap Mouse Willie", "zh": "小气鼠威利"}, {"en": "Wild Willie", "zh": "野人威利"}, {"en": "The Red Bandit", "zh": "红盗贼"}, {"en": "Silver Cactus", "zh": "银仙人掌"}], "answer": 0, "explain": {"en": "When the mouse bursts into Geronimo's office, the text says: 'That rodent was none other than my grandfather William Shortpaws, also known as Cheap Mouse Willie.'", "zh": "当那只老鼠冲进杰罗尼摩的办公室时，书里写道：“那只老鼠不是别人，正是我的爷爷威廉·肖特波兹，外号小气鼠威利。”"}}, {"q": {"en": "What 'tiny gift' does Grandfather ask Geronimo to deliver to the Red Bandit?", "zh": "爷爷让杰罗尼摩带给红盗贼的“小礼物”到底是什么？"}, "options": [{"en": "An enormous jar of Chocolate Cheese Delight", "zh": "一大罐“巧克力奶酪乐享”"}, {"en": "A small red envelope", "zh": "一个小红信封"}, {"en": "A brand-new cowboy hat", "zh": "一顶崭新的牛仔帽"}, {"en": "A book about Mouse Island", "zh": "一本关于老鼠岛的书"}], "answer": 0, "explain": {"en": "Trap reveals the 'tiny gift' is 'an enormousouse jar of chocolate cheese spread' as high as a mouse, called Chocolate Cheese Delight, with thirteen swirled flavors.", "zh": "特拉普说那“小礼物”是一大罐巧克力奶酪酱，高得像一只老鼠，名叫“巧克力奶酪乐享”，里面有十三种混合口味。"}}, {"q": {"en": "In which town did Grandfather buy his cowboy hat at the Silver Cactus shop?", "zh": "爷爷是在哪座小镇的“银仙人掌”店里买到的牛仔帽？"}, "options": [{"en": "Sedona, Arizona", "zh": "亚利桑那州的塞多纳"}, {"en": "New Mouse City", "zh": "老鼠新城"}, {"en": "Phoenix, Arizona", "zh": "亚利桑那州的凤凰城"}, {"en": "The Grand Canyon", "zh": "大峡谷"}], "answer": 0, "explain": {"en": "Grandfather says, 'I bought my hat years ago in a little shop in Sedona, Arizona. It was called the Silver Cactus.'", "zh": "爷爷说：“我多年前在亚利桑那州塞多纳的一家小店里买到了这顶帽子，那家店叫银仙人掌。”"}}, {"q": {"en": "Who runs the Silver Cactus shop and gives Geronimo a new hat for Grandfather?", "zh": "是谁经营着银仙人掌店，并送给杰罗尼摩一顶给爷爷的新帽子？"}, "options": [{"en": "Tom Ratthide", "zh": "汤姆·拉特海德"}, {"en": "Poppy Spritely", "zh": "波比·斯普莱特利"}, {"en": "Wild Willie", "zh": "野人威利"}, {"en": "Trap Stilton", "zh": "特拉普·斯提尔顿"}], "answer": 0, "explain": {"en": "A big gray rodent says, 'My name's Tom. Tom Ratthide,' and later finds the very same Silver Cactus Deluxe hat and gives it to Geronimo for his grandfather.", "zh": "一只灰色大老鼠说：“我叫汤姆，汤姆·拉特海德。”后来他找出了同款银仙人掌豪华帽，把它送给了杰罗尼摩带给爷爷。"}}, {"q": {"en": "How does Poppy Spritely keep mispronouncing Geronimo's last name?", "zh": "波比·斯普莱特利一直把杰罗尼摩的姓氏念错成什么？"}, "options": [{"en": "Spilton", "zh": "斯皮尔顿"}, {"en": "Stilton (she says it perfectly)", "zh": "斯提尔顿（她念得完全正确）"}, {"en": "Sherman", "zh": "谢尔曼"}, {"en": "Snifferton", "zh": "斯尼弗顿"}], "answer": 0, "explain": {"en": "Again and again Poppy calls him 'Mr. Spilton' (and other twists like Smilton or Skilton) even after Geronimo corrects her: 'The name is Stilton. S-T-I-L-T-O-N.'", "zh": "波比一次又一次地叫他“斯皮尔顿先生”（也念错过斯米尔顿、斯基尔顿等），即使杰罗尼摩一再纠正自己的姓氏念法。"}}, {"q": {"en": "At which landmark did Tom Ratthide say he last saw the Red Bandit?", "zh": "汤姆·拉特海德说，他最后一次见到红盗贼是在哪座地标？"}, "options": [{"en": "Cathedral Rock", "zh": "大教堂岩"}, {"en": "The Grand Canyon", "zh": "大峡谷"}, {"en": "The Silver Cactus shop", "zh": "银仙人掌店"}, {"en": "New Mouse City", "zh": "老鼠新城"}], "answer": 0, "explain": {"en": "Tom tells Geronimo: 'As for the Red Bandit, start your search at Cathedral Rock. That's where I saw him last.'", "zh": "汤姆对杰罗尼摩说：“至于红盗贼，你从大教堂岩开始找吧。我最后一次见到他就是在那里。”"}}, {"q": {"en": "Who is the 'most daring mouse on Mouse Island' who helps Geronimo with a horse named Lightning?", "zh": "被称为“老鼠岛上最大胆的老鼠”、并让一匹叫闪电的马帮助杰罗尼摩的是谁？"}, "options": [{"en": "Wild Willie", "zh": "野人威利"}, {"en": "Bruce Hyena", "zh": "布鲁斯·鬣狗"}, {"en": "Tom Ratthide", "zh": "汤姆·拉特海德"}, {"en": "Hercule Poirat", "zh": "赫拉克·波拉"}], "answer": 0, "explain": {"en": "The caption reads 'Wild Willie — The most daring mouse on Mouse Island!' and he tells Geronimo to hop on his wild horse named Lightning.", "zh": "书中标注：“野人威利——老鼠岛上最大胆的老鼠！”他让杰罗尼摩骑上他那匹名叫闪电的野马。"}}, {"q": {"en": "Who is the 'most adventurous mouse on Mouse Island' that guides Geronimo down the Grand Canyon on a mule?", "zh": "被称为“老鼠岛上最爱冒险的老鼠”、骑着骡子带杰罗尼摩下大峡谷的是谁？"}, "options": [{"en": "Bruce Hyena", "zh": "布鲁斯·鬣狗"}, {"en": "Wild Willie", "zh": "野人威利"}, {"en": "Poppy Spritely", "zh": "波比·斯普莱特利"}, {"en": "The Red Bandit", "zh": "红盗贼"}], "answer": 0, "explain": {"en": "The caption reads 'Bruce Hyena — The most adventurous mouse on Mouse Island!' and he has a summer job taking tourists down the canyon on mules.", "zh": "书中标注：“布鲁斯·鬣狗——老鼠岛上最爱冒险的老鼠！”他暑假的工作就是骑骡子带游客下大峡谷。"}}, {"q": {"en": "What two special items does the Red Bandit give Geronimo to bring back to Grandfather?", "zh": "红盗贼让杰罗尼摩带回给爷爷的两样特别的东西是什么？"}, "options": [{"en": "The red bandanna and the falcon's feather", "zh": "红头巾和一根猎鹰羽毛"}, {"en": "A gold coin and a map", "zh": "一枚金币和一张地图"}, {"en": "The Silver Cactus hat and a jar", "zh": "银仙人掌帽和一个罐子"}, {"en": "A photograph and a telephone", "zh": "一张照片和一部电话"}], "answer": 0, "explain": {"en": "The Red Bandit hands Geronimo his red bandanna and pulls the falcon's feather from his hat, saying both are for his friend William as signs of their friendship.", "zh": "红盗贼把他的红头巾递给杰罗尼摩，又从帽子上拔下一根猎鹰羽毛，说这两样都是送给朋友威廉的友谊信物。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
