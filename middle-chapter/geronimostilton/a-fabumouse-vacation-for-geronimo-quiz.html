<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Fabumouse Vacation for Geronimo — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#9 · A Fabumouse Vacation for Geronimo</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: A Fabumouse Vacation for Geronimo</em> (Scholastic, 2002) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who is Geronimo Stilton?", "zh": "杰罗尼摩·斯蒂顿是谁？"}, "options": [{"en": "A chef who owns a cheese restaurant.", "zh": "一家奶酪餐厅的老板兼厨师。"}, {"en": "The author and publisher of The Rodent's Gazette newspaper.", "zh": "《鼠民公报》的作家兼出版人。"}, {"en": "Geronimo's noisy young assistant.", "zh": "杰罗尼摩那个吵闹的年轻助手。"}, {"en": "The president of the Central Snob Academy. according to some versions of the story", "zh": "势利中央学院的主席。（按书中另一种说法）"}], "answer": 1, "explain": {"en": "Geronimo says he is an author and publisher who runs The Rodent's Gazette, the most popular newspaper on Mouse Island.", "zh": "杰罗尼摩在书中说自己是一名作家兼出版人，经营着老鼠岛上最受欢迎的报纸《鼠民公报》。"}}, {"q": {"en": "Why does Geronimo desperately want a vacation at the beginning of the book?", "zh": "故事开头，杰罗尼摩为什么迫切想要去度假？"}, "options": [{"en": "A terrible heat wave makes New Mouse City unbearably hot.", "zh": "一场可怕的热浪让新老鼠城热得让人受不了。"}, {"en": "He wins a free trip to Egypt.", "zh": "他赢了一张去埃及的免费机票。"}, {"en": "His newspaper goes out of business.", "zh": "他办的报纸停刊了。"}, {"en": "A big snowstorm traps him inside his office. according to some versions of the story", "zh": "一场大暴雪把他困在了办公室里。（按书中另一种说法）"}], "answer": 0, "explain": {"en": "The book opens with a scorching August in New Mouse City; the air is so heavy and hot that Geronimo can barely breathe and longs for vacation.", "zh": "故事一开始，新老鼠城正值酷热的八月，空气又沉又烫，杰罗尼摩几乎喘不过气，因此万分渴望去度假。"}}, {"q": {"en": "What is Pinky Pick's job at the newspaper, and what did she create?", "zh": "平基·皮克在报社担任什么职务，她又创办了什么？"}, "options": [{"en": "She is the head chef at the newspaper café.", "zh": "她是报社咖啡馆的主厨。"}, {"en": "She is the travel agent who books Geronimo's trips. according to some versions of the story", "zh": "她是帮杰罗尼摩订行程的旅行代理人。（按书中另一种说法）"}, {"en": "She is Geronimo's sister and runs the sports page.", "zh": "她是杰罗尼摩的妹妹，负责体育版。"}, {"en": "She is the assistant editor and created Fur Kids Only magazine.", "zh": "她是助理编辑，并创办了《皮毛儿童》杂志。"}], "answer": 3, "explain": {"en": "Pinky is Geronimo's very young assistant editor, and last year she invented a hit magazine for young mice called Fur Kids Only.", "zh": "平基是杰罗尼摩非常年轻的助理编辑，去年她创办了一本深受小老鼠欢迎的杂志，名叫《皮毛儿童》。"}}, {"q": {"en": "What award does Sir Ratley von Snotfur III take away from Geronimo?", "zh": "冯·斯诺特弗爵士从杰罗尼摩手中收回了什么奖项？"}, "options": [{"en": "A gold medal for the biggest cheese collection.", "zh": "收藏奶酪最多金奖章。"}, {"en": "The Best Cook on Mouse Island trophy.", "zh": "老鼠岛最佳厨师奖杯。"}, {"en": "The Most Polished Mouse of the Year medal.", "zh": "年度最优雅老鼠奖章。"}, {"en": "The Funniest Singer of the Year award.", "zh": "年度最搞笑歌手奖。"}], "answer": 2, "explain": {"en": "Sir Ratley arrives to name Geronimo 'Most Polished Mouse of the Year' but, after catching him in a silly outfit, rips the medal away in disgust.", "zh": "拉特利爵士本要授予杰罗尼摩“年度最优雅老鼠”称号，但看到他滑稽的打扮后，厌恶地收回了奖章。"}}, {"q": {"en": "What is the name and nickname of Geronimo's grandfather, who founded the newspaper?", "zh": "创办报社的杰罗尼摩的祖父叫什么名字，外号是什么？"}, "options": [{"en": "William Shortpaws, also known as Cheap Mouse Willy.", "zh": "威廉·短爪，外号“小气鬼威利”。"}, {"en": "Trap Stilton, also known as the Master Chef.", "zh": "特拉普·斯蒂顿，外号“大厨”。"}, {"en": "Benjamin Talltail, also known as Big Cheese Ben. according to some versions of the story", "zh": "本杰明·长尾，外号“大奶酪本”。（按书中另一种说法）"}, {"en": "Sir Ratley, also known as the Snob King.", "zh": "拉特利爵士，外号“势利国王”。"}], "answer": 0, "explain": {"en": "Geronimo's grandfather is William Shortpaws, founder of The Rodent's Gazette, nicknamed Cheap Mouse Willy because he was the cheapest mouse around.", "zh": "杰罗尼摩的祖父是威廉·短爪，《鼠民公报》的创办人，因为出了名的小气而被叫做“小气鬼威利”。"}}, {"q": {"en": "Who fixes the broken printing press, and what is his secret trick?", "zh": "是谁修好了坏掉的印刷机，他的秘密方法又是什么？"}, "options": [{"en": "Terry Techrat, who replaces it with a new machine. according to some versions of the story", "zh": "特里·泰克拉特，他换了一台新机器。（按书中另一种说法）"}, {"en": "Trap, who cooks a meal for it.", "zh": "特拉普，它给它做了一顿饭。"}, {"en": "Furdrick Fixit, who fixes it by giving it a good kick.", "zh": "弗德里克·菲克西特，他的办法就是用力踢它一脚。"}, {"en": "Pinky Pick, who sings a song to it.", "zh": "平基·皮克，她对它唱了一首歌。"}], "answer": 2, "explain": {"en": "Retired technician Furdrick Fixit fixes the old RAT-PRINT 500 by giving it a swift kick, and the press starts printing again.", "zh": "退休技师弗德里克·菲克西特对着老旧的“鼠印500”号印刷机用力踢了一脚，机器便重新印出了报纸。"}}, {"q": {"en": "Before ending up at the Ratty Tatty Hotel, how many vacation trips does Geronimo miss?", "zh": "在最后来到破旧旅馆之前，杰罗尼摩一共错过了几次度假行程？"}, "options": [{"en": "Two trips to his grandfather's house.", "zh": "两次去祖父家的行程。"}, {"en": "Four trips (Happy Tail Island, Coldcreeps Peak, Fossil Forest, and Egypt).", "zh": "四次（快乐尾巴岛、寒颤峰、化石森林和埃及）。"}, {"en": "One trip to the Swiss Cheese Islands.", "zh": "一次去瑞士奶酪岛的行程。"}, {"en": "None — the Ratty Tatty was his first choice. according to some versions of the story", "zh": "一次都没有——破旧旅馆本来就是他的第一选择。（按书中另一种说法）"}], "answer": 1, "explain": {"en": "Geronimo misses four planned trips (Happy Tail Island, Coldcreeps Peak, Fossil Forest, and Egypt) before the travel agent books him into the Ratty Tatty; she even scolds him for canceling 4 trips.", "zh": "在旅行社把他安排进破旧旅馆前，杰罗尼摩先后错过了四次行程（快乐尾巴岛、寒颤峰、化石森林和埃及）；代理人还数落他已经取消了四趟旅行。"}}, {"q": {"en": "Why does Geronimo miss his trip to Egypt?", "zh": "杰罗尼摩为什么会错过去埃及的旅行？"}, "options": [{"en": "Cousin Trap's fried mussels and spicy food make him very sick.", "zh": "表哥特拉普做的炸贻贝和辛辣料理让他病得很重。"}, {"en": "He loses his plane ticket at the bus station.", "zh": "他在汽车站弄丢了机票。"}, {"en": "The travel agency cancels all flights to Egypt. according to some versions of the story", "zh": "旅行社取消了所有飞往埃及的航班。（按书中另一种说法）"}, {"en": "A fire breaks out in his office.", "zh": "他的办公室起了火。"}], "answer": 0, "explain": {"en": "Cousin Trap serves fried mussels, clam soup, and an extra-hot chili oyster pie; Geronimo wakes up with a terrible stomachache and the doctor orders him to bed for days.", "zh": "表哥特拉普端出了炸贻贝、蛤蜊汤和特辣牡蛎派，结果杰罗尼摩半夜肚子剧痛，医生让他卧床好几天，埃及之行因此泡汤。"}}, {"q": {"en": "Where is the Ratty Tatty Hotel, and how is it rated?", "zh": "破旧旅馆位于哪里，评级又如何？"}, "options": [{"en": "In New Mouse City downtown, rated four cheese triangles.", "zh": "在新老鼠城市中心，评级是四块奶酪三角。"}, {"en": "In Catstinko, Furball City, rated half a cheese triangle (a reeking rat's nest).", "zh": "在毛球城的猫臭镇，评级是半块奶酪三角（臭气熏天的鼠窝）。"}, {"en": "On the sunny Happy Tail Island, rated five cheese triangles. according to some versions of the story", "zh": "在阳光明媚的快乐尾巴岛，评级是五块奶酪三角。（按书中另一种说法）"}, {"en": "At the top of Coldcreeps Peak, rated three cheese triangles.", "zh": "在寒颤峰山顶，评级是三块奶酪三角。"}], "answer": 1, "explain": {"en": "The travel ad lists the Ratty Tatty Hotel in Catstinko, Furball City, as a 'Half a cheese triangle' — described as a reeking rat's nest.", "zh": "旅行社的广告写明，破旧旅馆位于毛球城的猫臭镇，评级只有“半块奶酪三角”，被形容为臭气熏天的鼠窝。"}}, {"q": {"en": "What disgusting food is served to Geronimo at the Ratty Tatty Hotel?", "zh": "在破旧旅馆里，端给杰罗尼摩的恶心食物是什么？"}, "options": [{"en": "Fresh fried mussels with extra-hot chili. according to some versions of the story", "zh": "新鲜的炸贻贝配特辣辣椒。（按书中另一种说法）"}, {"en": "A vitamin-packed mozzarella milk shake.", "zh": "营养丰富的莫扎里拉奶酪奶昔。"}, {"en": "Cheddar biscuits and Swiss cheese.", "zh": "切达饼干和瑞士奶酪。"}, {"en": "Peanut butter and June bugs with moldy mozzarella.", "zh": "花生酱和六月虫拌发霉的莫扎里拉奶酪。"}], "answer": 3, "explain": {"en": "The hotel's owner Freddy Fleafur serves Geronimo a sandwich of peanut butter and June bugs with moldy mozzarella, which makes Geronimo want to go home.", "zh": "旅馆老板弗雷迪·弗利弗给杰罗尼摩端上“花生酱和六月虫拌发霉莫扎里拉奶酪”的三明治，把他恶心得只想回家。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
