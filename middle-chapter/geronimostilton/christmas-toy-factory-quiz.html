<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Christmas Toy Factory — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#27 · The Christmas Toy Factory</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: The Christmas Toy Factory</em> (Scholastic, 2004) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Why did Santa Claus ask Geronimo to deliver the Christmas toys?", "zh": "圣诞老人为什么请杰罗尼摩去送圣诞玩具？"}, "options": [{"en": "Santa was on vacation", "zh": "圣诞老人去度假了"}, {"en": "Santa had come down with the measles", "zh": "圣诞老人染上了麻疹"}, {"en": "The elves went on strike according to some versions of the story", "zh": "小精灵罢工了（按书中另一种说法）"}, {"en": "The reindeer ran away", "zh": "驯鹿跑掉了"}], "answer": 1, "explain": {"en": "Santa told Geronimo he had come down with the measles on his busiest night, so he could not deliver the toys himself.", "zh": "圣诞老人告诉杰罗尼摩，他在最忙碌的晚上染上了麻疹，所以没法亲自去送玩具。"}}, {"q": {"en": "Who is Ding-Dong?", "zh": "丁咚是谁？"}, "options": [{"en": "The mayor of New Mouse City according to some versions of the story", "zh": "新老鼠市的市长（按书中另一种说法）"}, {"en": "A reindeer with a red nose", "zh": "一只红鼻子驯鹿"}, {"en": "An elf sent by Santa to fetch Geronimo", "zh": "圣诞老人派来接杰罗尼摩的小精灵"}, {"en": "Geronimo's cousin", "zh": "杰罗尼摩的表哥"}], "answer": 2, "explain": {"en": "Ding-Dong is a chubby elf with a tiny beard who tumbles in through the fireplace; Santa sent him to bring Geronimo to the North Pole.", "zh": "丁咚是一个留着小胡子的胖精灵，从壁炉里滚了进来；是圣诞老人派他去把杰罗尼摩接到北极的。"}}, {"q": {"en": "What did Benjamin ask Santa for in his letter?", "zh": "本杰明在给圣诞老人的信里要了什么？"}, "options": [{"en": "A teddy bear", "zh": "一只泰迪熊"}, {"en": "A box of chocolates according to some versions of the story", "zh": "一盒巧克力（按书中另一种说法）"}, {"en": "A new race car", "zh": "一辆新赛车"}, {"en": "More time with his uncle Geronimo", "zh": "更多和叔叔杰罗尼摩相处的时间"}], "answer": 3, "explain": {"en": "Benjamin's letter said he did not want presents; he most wanted his uncle Geronimo to spend more time with him.", "zh": "本杰明的信里说他不要礼物，他最想要的是叔叔杰罗尼摩能多陪陪他。"}}, {"q": {"en": "What is Grandfather William Shortpaws's favorite saying?", "zh": "威廉·短爪爷爷最爱说的一句话是什么？"}, "options": [{"en": "Sharing is caring", "zh": "分享就是关爱"}, {"en": "Early to bed, early to rise", "zh": "早睡早起身体好"}, {"en": "All work and no play makes a mouse rich, rich, rich!", "zh": "只工作不玩耍，老鼠发财发到家！"}, {"en": "A friend in need is a friend indeed according to some versions of the story", "zh": "患难见真情（按书中另一种说法）"}], "answer": 2, "explain": {"en": "Grandfather William, also called Cheap Mouse Willy, always says 'All work and no play makes a mouse rich, rich, rich!'", "zh": "大家又叫他‘吝啬鼠威利’的威廉爷爷，总把‘只工作不玩耍，老鼠发财发到家！’挂在嘴边。"}}, {"q": {"en": "According to the book, where does Santa Claus live?", "zh": "根据书里的说法，圣诞老人住在哪里？"}, "options": [{"en": "The South Pole", "zh": "南极"}, {"en": "Rovaniemi, Finland", "zh": "芬兰的罗瓦涅米"}, {"en": "New Mouse City", "zh": "新老鼠市"}, {"en": "On top of Kilimanjaro", "zh": "乞力马扎罗山顶"}], "answer": 1, "explain": {"en": "The book's Santa legend says Santa lives in Rovaniemi, Finland, and his secret house is at Korvatunturi, the 'Ear Mountain'.", "zh": "书里的圣诞传说写道，圣诞老人住在芬兰的罗瓦涅米，他隐秘的房子在科瓦通图里，也就是‘耳朵山’。"}}, {"q": {"en": "Which of Geronimo's friends loves bananas?", "zh": "杰罗尼摩的哪位朋友最爱香蕉？"}, "options": [{"en": "Hercule Poirat", "zh": "赫拉克·波拉"}, {"en": "Trap", "zh": "特拉普"}, {"en": "Burt Burlyrat according to some versions of the story", "zh": "伯特·壮鼠（按书中另一种说法）"}, {"en": "Squeaky Star", "zh": "吱吱星"}], "answer": 0, "explain": {"en": "When Hercule Poirat sprang out of the package he shouted 'I love bananas! B-a-n-a-n-a-s!'", "zh": "赫拉克·波拉从包裹里蹦出来时大喊‘我爱香蕉！B-a-n-a-n-a-s！’"}}, {"q": {"en": "How many reindeer pull Santa's famous sled?", "zh": "圣诞老人那架著名的雪橇由多少只驯鹿牵引？"}, "options": [{"en": "Twelve", "zh": "十二只"}, {"en": "Nine", "zh": "九只"}, {"en": "Two", "zh": "两只"}, {"en": "Six", "zh": "六只"}], "answer": 1, "explain": {"en": "The book shows Santa's sled is pulled by his faithful reindeer team, and Geronimo rides in a sleigh pulled by nine prancing reindeer.", "zh": "书里描写圣诞老人的雪橇由忠实的驯鹿队牵引，杰罗尼摩坐的雪橇正是由九只欢蹦乱跳的驯鹿拉着的。"}}, {"q": {"en": "Who fell through the ice on the frozen lake and was saved by Geronimo?", "zh": "谁掉进冰湖里被杰罗尼摩救了上来？"}, "options": [{"en": "Ding-Dong the elf", "zh": "小精灵丁咚"}, {"en": "Benjamin", "zh": "本杰明"}, {"en": "The mayor", "zh": "市长"}, {"en": "Santa Claus according to some versions of the story", "zh": "圣诞老人（按书中另一种说法）"}], "answer": 0, "explain": {"en": "Ding-Dong was twirling on the frozen lake when the ice cracked; Geronimo slid out and pulled him out with his belt.", "zh": "丁咚在冰湖上转圈时冰面裂开，杰罗尼摩爬过去用皮带把他从冰水里救了上来。"}}, {"q": {"en": "Which famous chef made the cheesy lasagna at Geronimo's Christmas party?", "zh": "在杰罗尼摩的圣诞派对上，是哪位名厨做了芝士千层面？"}, "options": [{"en": "Saucy Le Paws", "zh": "索西·勒波"}, {"en": "Mrs. Claus", "zh": "圣诞老婆婆"}, {"en": "Grandfather William", "zh": "威廉爷爷"}, {"en": "Aunt Sweetfur", "zh": "甜毛阿姨"}], "answer": 0, "explain": {"en": "Geronimo's good friend Saucy Le Paws, one of the most famous chefs on Mouse Island, whipped up a super fabumouse cheesy lasagna.", "zh": "杰罗尼摩的好友索西·勒波是老鼠岛上最有名的厨师之一，他在派对上做了一大盘超级美味的芝士千层面。"}}, {"q": {"en": "What big problem did New Mouse City face at the end of the story?", "zh": "故事结尾新老鼠市遇到了什么大麻烦？"}, "options": [{"en": "A fire at the newspaper", "zh": "报社着火了"}, {"en": "A mouse escaped from the zoo according to some versions of the story", "zh": "动物园跑出一只老鼠（按书中另一种说法）"}, {"en": "The toys ran out", "zh": "玩具不够了"}, {"en": "A big snowstorm buried the city in snow", "zh": "一场大暴雪把整座城市埋进了雪里"}], "answer": 3, "explain": {"en": "After the party, a huge blizzard left five feet of snow and paralyzed the city, so the mayor asked every mouse to grab a shovel.", "zh": "派对之后一场大暴雪积了五英尺厚的雪，整座城市瘫痪，于是市长号召每只老鼠都拿起铲子去铲雪。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
