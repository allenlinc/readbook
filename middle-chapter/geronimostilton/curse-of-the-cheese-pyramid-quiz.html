<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Curse of the Cheese Pyramid — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#2 · The Curse of the Cheese Pyramid</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: The Curse of the Cheese Pyramid</em> (Scholastic, 2000) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What is the name of the newspaper that Geronimo Stilton runs?", "zh": "杰罗尼摩·斯蒂顿经营的报纸叫什么名字？"}, "options": [{"en": "Mouse Island Times", "zh": "《鼠岛时报》"}, {"en": "The Pyramid Post", "zh": "《金字塔邮报》"}, {"en": "The Rodent's Gazette", "zh": "《鼠民公报》"}, {"en": "The Daily Cheese", "zh": "《每日奶酪》"}], "answer": 2, "explain": {"en": "Geronimo says he runs a newspaper called The Rodent's Gazette, the most popular paper on Mouse Island.", "zh": "杰罗尼摩说他自己经营一家报纸，名叫《鼠民公报》，是鼠岛上最受欢迎的报纸。"}}, {"q": {"en": "What is Geronimo's grandfather William Shortpaws also known as?", "zh": "杰罗尼摩的爷爷威廉·肖特波斯的绰号是什么？"}, "options": [{"en": "Brave Mouse Billy", "zh": "勇敢鼠比利"}, {"en": "Cheesy Mouse Charlie", "zh": "奶酪鼠查理"}, {"en": "Chief Mouse Wilbur", "zh": "酋长鼠威尔伯"}, {"en": "Cheap Mouse Willy", "zh": "小气鼠威利"}], "answer": 3, "explain": {"en": "The book calls him 'also known as Cheap Mouse Willy' because he is always trying to save money.", "zh": "书中称他为“绰号小气鼠威利”，因为他总是想方设法省钱。"}}, {"q": {"en": "Why did Grandfather send Geronimo far away to Egypt?", "zh": "爷爷为什么把杰罗尼摩派到遥远的埃及去？"}, "options": [{"en": "To learn how to fly a plane", "zh": "去学习开飞机"}, {"en": "To buy him a new carpet", "zh": "去给他买一张新地毯"}, {"en": "To visit his cousin Trap", "zh": "去探望他的表哥特拉普"}, {"en": "To do a special report on the pyramids", "zh": "去写一份关于金字塔的特别报道"}], "answer": 3, "explain": {"en": "Grandfather gave Geronimo a plane ticket and said, 'You're going to Egypt to do a special report on the pyramids!'", "zh": "爷爷把飞机票塞到他鼻子底下说：“你要去埃及写一份关于金字塔的特别报道！”"}}, {"q": {"en": "What cheap airline did Geronimo fly to Egypt on?", "zh": "杰罗尼摩坐的是哪家便宜的航空公司去埃及？"}, "options": [{"en": "Pyramid Flyers", "zh": "金字塔飞行公司"}, {"en": "Royal Rodent Airways", "zh": "皇家老鼠航空"}, {"en": "Mouse Island Express", "zh": "鼠岛快运"}, {"en": "Dirt Cheap Airlines (DCA)", "zh": "超便宜航空公司（DCA）"}], "answer": 3, "explain": {"en": "At the airport the agent says 'DCA Airlines? You mean Dirt Cheap Airlines?' — that is the airline Geronimo flew.", "zh": "在机场，工作人员说“DCA航空？你是说超便宜航空吧？”——杰罗尼摩坐的就是这家航空公司。"}}, {"q": {"en": "Who was the strange undertaker Geronimo met on the plane?", "zh": "杰罗尼摩在飞机上遇到的那个奇怪的殡葬员是谁？"}, "options": [{"en": "Trap Stilton", "zh": "特拉普·斯蒂顿"}, {"en": "Sammy Slickpaw", "zh": "山米·滑爪"}, {"en": "Daniel E. Deadfur", "zh": "丹尼尔·E·死毛"}, {"en": "Shif T. Paws", "zh": "希夫·T·爪"}], "answer": 2, "explain": {"en": "The odd mouse dressed in purple with a black wig introduces himself as Daniel E. Deadfur, an undertaker.", "zh": "那个穿紫色衣服、戴黑色假发的古怪老鼠自我介绍说是丹尼尔·E·死毛，一名殡葬员。"}}, {"q": {"en": "What raw material did Professor Spitfur use to make energy?", "zh": "斯皮特福教授用来制造能量的主要原料是什么？"}, "options": [{"en": "Cheese crumbs", "zh": "奶酪碎屑"}, {"en": "Camel dung", "zh": "骆驼粪"}, {"en": "Sunflower oil", "zh": "葵花油"}, {"en": "Pyramid stones", "zh": "金字塔石头"}], "answer": 1, "explain": {"en": "The professor whispers that the raw material he uses to produce energy is camel dung, fermented with a secret ingredient.", "zh": "教授小声说，他用来制造能量的原料是骆驼粪，再配上一种秘密配料发酵而成。"}}, {"q": {"en": "Where did Professor Spitfur get the idea for his secret ingredient?", "zh": "斯皮特福教授是从哪里得到秘密配料的灵感的？"}, "options": [{"en": "From a cookbook Trap gave him", "zh": "来自特拉普给他的烹饪书"}, {"en": "From the ancient writing inside Cheops's pyramid", "zh": "来自胡夫金字塔内部的古代文字"}, {"en": "From a dream about a cat", "zh": "来自一个关于猫的梦"}, {"en": "From Geronimo's newspaper", "zh": "来自杰罗尼摩的报纸"}], "answer": 1, "explain": {"en": "The professor says he got the idea from the ancient hieroglyphs (the eye of Ra) inside Cheops's pyramid.", "zh": "教授说他是从胡夫金字塔内部的古代象形文字（拉神的眼睛）中获得灵感的。"}}, {"q": {"en": "How did Geronimo return home from Egypt?", "zh": "杰罗尼摩是怎么从埃及回家的？"}, "options": [{"en": "On a cargo ship called the Dynamiter", "zh": "坐一艘叫“炸药号”的货船"}, {"en": "By riding a camel all the way", "zh": "一路骑骆驼回去"}, {"en": "On Dirt Cheap Airlines again", "zh": "又坐了超便宜航空"}, {"en": "On a magic carpet", "zh": "坐魔法地毯"}], "answer": 0, "explain": {"en": "Grandfather made him come back by boat, and he sailed home on a cargo ship packed with explosives called the Dynamiter.", "zh": "爷爷让他坐船回来，于是他乘坐一艘装满炸药的货船“炸药号”回到了家。"}}, {"q": {"en": "Who was the captain of the cargo ship the Dynamiter?", "zh": "货船“炸药号”的船长是谁？"}, "options": [{"en": "Crash Ratjack", "zh": "坠机·拉特杰克"}, {"en": "Professor Spitfur", "zh": "斯皮特福教授"}, {"en": "Captain Ted Simplesnout", "zh": "泰德·简单鼻船长"}, {"en": "Squeaky Kaboom (Boom)", "zh": "吱吱·卡彭（人称“轰”）"}], "answer": 3, "explain": {"en": "The ship's captain was a rodent named Squeaky Kaboom, but everyone called him Boom for short.", "zh": "船长是只叫吱吱·卡彭的老鼠，大家都简称他为“轰”。"}}, {"q": {"en": "What did Geronimo and his family say to seal their plan against Grandfather?", "zh": "杰罗尼摩和家人为了定下对付爷爷的计划，说了哪句口号？"}, "options": [{"en": "Fly high! Pyramids away!", "zh": "高飞！金字塔再见！"}, {"en": "Friends together! Mice forever!", "zh": "朋友同心！老鼠一家亲！"}, {"en": "Cheese forever! Rats never!", "zh": "奶酪万岁！老鼠滚蛋！"}, {"en": "Save money! Cut costs!", "zh": "省钱！削减开支！"}], "answer": 1, "explain": {"en": "To seal Operation Rodent Freedom, they twisted their tails together and squeaked, 'Friends together! Mice forever!'", "zh": "为了启动“老鼠自由行动”，他们把尾巴缠在一起喊道：“朋友同心！老鼠一家亲！”"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
