<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday, Geronimo — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#74 · Happy Birthday, Geronimo</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: Happy Birthday, Geronimo</em> (Scholastic, 2014) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What special day is it for Geronimo at the start of the story?", "zh": "故事开头对 Geronimo 来说是什么特别的日子？"}, "options": [{"en": "His birthday", "zh": "他的生日"}, {"en": "A holiday in Hawaii", "zh": "夏威夷的一个节日"}, {"en": "The first day of school", "zh": "开学第一天"}, {"en": "New Year's Day", "zh": "新年"}], "answer": 0, "explain": {"en": "Geronimo wakes up singing that today is the day he was born — it is his birthday.", "zh": "Geronimo 醒来时唱着歌，说今天是他的出生日——也就是他的生日。"}}, {"q": {"en": "What is the name of the gross green drink the Bamboozles give Geronimo?", "zh": "Bamboozle 一家给 Geronimo 喝的那瓶难闻的绿色饮料叫什么？"}, "options": [{"en": "Hot chocolate", "zh": "热巧克力"}, {"en": "Pineapple juice according to some versions of the story", "zh": "菠萝汁（按书中另一种说法）"}, {"en": "Chamomile tea", "zh": "洋甘菊茶"}, {"en": "Bamboozle Bubbly Beverage (BBB)", "zh": "Bamboozle Bubbly Beverage（BBB）"}], "answer": 3, "explain": {"en": "Balencio offers Geronimo a free taste of their 'BBB' — Bamboozle Bubbly Beverage, a thick green liquid.", "zh": "Balencio 让 Geronimo 免费尝了他们的“BBB”——Bamboozle Bubbly Beverage，一种浓稠的绿色液体。"}}, {"q": {"en": "Where does Geronimo's family take him for his birthday dinner?", "zh": "Geronimo 的家人带他去哪家餐厅吃生日晚餐？"}, "options": [{"en": "Kealoha's house", "zh": "Kealoha 的家"}, {"en": "The Golden Cheese", "zh": "The Golden Cheese（金奶酪餐厅）"}, {"en": "The Movie Palace according to some versions of the story", "zh": "The Movie Palace（按书中另一种说法）"}, {"en": "A beach luau", "zh": "一场海滩宴会"}], "answer": 1, "explain": {"en": "Geronimo made plans to be with his family at the swankiest restaurant in the city, the Golden Cheese.", "zh": "Geronimo 计划和家人在全城最豪华的餐厅 The Golden Cheese 聚会。"}}, {"q": {"en": "What fake identity does Geronimo's switched wallet show?", "zh": "被调包的 wallet 里显示的假身份是谁？"}, "options": [{"en": "Dr. Cheese", "zh": "Dr. Cheese"}, {"en": "Hercule Poirat according to some versions of the story", "zh": "Hercule Poirat（按书中另一种说法）"}, {"en": "Madame No", "zh": "Madame No"}, {"en": "Dr. Falsefur", "zh": "Dr. Falsefur（福尔谢夫博士）"}], "answer": 3, "explain": {"en": "When Geronimo opens his wallet, his ID reads 'Dr. Falsefur' with a picture of cheese instead of his photo.", "zh": "Geronimo 打开钱包时，身份证上写的是“Dr. Falsefur”，照片是一块奶酪而不是他本人。"}}, {"q": {"en": "Who pays Geronimo's restaurant bill and helps solve the mystery?", "zh": "谁替 Geronimo 付了餐厅账单，并帮忙破案？"}, "options": [{"en": "Trap Stilton", "zh": "Trap Stilton"}, {"en": "Madame No", "zh": "Madame No"}, {"en": "Hercule Poirat", "zh": "Hercule Poirat"}, {"en": "Bettina Bamboozle", "zh": "Bettina Bamboozle"}], "answer": 2, "explain": {"en": "Hercule arrives, vouches for Geronimo as an honest mouse, and pays the bill with his own credit card.", "zh": "Hercule 赶到，为 Geronimo 担保他是诚实的老鼠，并用自己的信用卡付了账。"}}, {"q": {"en": "What banana-themed vehicle does Hercule drive?", "zh": "Hercule 开的、以香蕉为主题的车叫什么？"}, "options": [{"en": "The Bananamobile", "zh": "Bananamobile（香蕉车）"}, {"en": "A leopard-print submarine", "zh": "一辆豹纹潜艇"}, {"en": "The Rodent's Gazette van", "zh": "《rodents 公报》的厢式车"}, {"en": "A blue speedboat", "zh": "一艘蓝色快艇"}], "answer": 0, "explain": {"en": "Hercule cries 'To the Bananamobile!' — a yellow car filled with bananas and banana-themed gadgets.", "zh": "Hercule 大喊“上 Bananamobile！”，那是一辆装满香蕉、布满香蕉元素的黄色汽车。"}}, {"q": {"en": "How many Bamboozle family members are behind the fake money?", "zh": "制造假钞的 Bamboozle 家族成员共有几人？"}, "options": [{"en": "Two: the watch shop owners according to some versions of the story", "zh": "两人：手表店老板（按书中另一种说法）"}, {"en": "Ten rodents", "zh": "十只老鼠"}, {"en": "Four: Bettina and her three nephews", "zh": "四人：Bettina 和她的三个侄子"}, {"en": "One: only Bettina", "zh": "一人：只有 Bettina"}], "answer": 2, "explain": {"en": "Geronimo concludes Dr. Falsefur is a team of four rodents — his new neighbors the Bamboozles (aunt plus three nephews).", "zh": "Geronimo 推断 Dr. Falsefur 是一个四人团伙——他的新邻居 Bamboozle 一家（阿姨加三个侄子）。"}}, {"q": {"en": "At the supermarket, what ingredients did the thieves buy that connect them to the BBB drink?", "zh": "在超市里，小偷买了哪些把她们和 BBB 饮料联系起来的配料？"}, "options": [{"en": "Fish and rice", "zh": "鱼和米饭"}, {"en": "Garlic, onions, broccoli, cabbage, and molasses", "zh": "大蒜、洋葱、西兰花、卷心菜和糖蜜"}, {"en": "Chocolate and strawberries according to some versions of the story", "zh": "巧克力和草莓（按书中另一种说法）"}, {"en": "Bananas and milk", "zh": "香蕉和牛奶"}], "answer": 1, "explain": {"en": "The supermarket cashier says the four rodents spent fake money on garlic, onions, broccoli, cabbage, and molasses — all BBB ingredients.", "zh": "超市收银员说那四只老鼠用假钱买了大蒜、洋葱、西兰花、卷心菜和糖蜜——全都是 BBB 饮料的配料。"}}, {"q": {"en": "Who is the real 'Dr. Falsefur,' the brains behind the operation?", "zh": "真正的“Dr. Falsefur”、幕后主使是谁？"}, "options": [{"en": "Bettina Bamboozle", "zh": "Bettina Bamboozle"}, {"en": "Balencio Bamboozle", "zh": "Balencio Bamboozle"}, {"en": "Geronimo Stilton", "zh": "Geronimo Stilton"}, {"en": "Jack Monterey", "zh": "Jack Monterey"}], "answer": 0, "explain": {"en": "Bettina boasts she is the genius who designs the bills and plans distribution, declaring 'I, Bettina Bamboozle, am the one true genius, Dr. Falsefur!'", "zh": "Bettina 夸口说自己是设计假钞、策划分发的大脑，并宣称“我，Bettina Bamboozle，才是真正的天才 Dr. Falsefur！”"}}, {"q": {"en": "Who was secretly working with the Bamboozles to collect the fake bills?", "zh": "谁暗中勾结 Bamboozle 一家，想要取走那些假钞？"}, "options": [{"en": "Thea Stilton", "zh": "Thea Stilton"}, {"en": "Madame No", "zh": "Madame No"}, {"en": "Kealoha", "zh": "Kealoha"}, {"en": "Creepella von Cacklefur", "zh": "Creepella von Cacklefur"}], "answer": 1, "explain": {"en": "Madame No arrives in a leopard-print limo to pick up three suitcases of fake bills, but flees when the Bamboozles are caught.", "zh": "Madame No 坐着豹纹豪华轿车来取三箱假钞，但在 Bamboozle 一家被抓后仓皇逃走。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
