<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Chocolate Chase — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#67 · The Chocolate Chase</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: The Chocolate Chase</em> (Scholastic, 2011) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What festival is New Mouse City celebrating in this story?", "zh": "故事里老鼠岛新城正在庆祝什么节日？"}, "options": [{"en": "The annual Spring Festival", "zh": "一年一度的春节庆典"}, {"en": "A winter carnival", "zh": "冬季嘉年华"}, {"en": "A cheese-tasting fair", "zh": "奶酪品尝会"}, {"en": "A summer boat race", "zh": "夏季划船比赛"}], "answer": 0, "explain": {"en": "The book opens with New Mouse City's annual Spring Festival, when rodents give one another chocolate eggs.", "zh": "故事开头正是老鼠岛新城一年一度的春节庆典，大家互相赠送巧克力蛋。"}}, {"q": {"en": "What accident happened to Geronimo on the office roof?", "zh": "杰罗尼摩在报社楼顶上发生了什么意外？"}, "options": [{"en": "He stepped on a rake, hit his snout, and fell into fertilizer", "zh": "他踩到耙子，撞到鼻子，还掉进了肥料里"}, {"en": "He was chased by a cat", "zh": "他被一只猫追赶"}, {"en": "He won a baking prize", "zh": "他赢得了烘焙奖"}, {"en": "He flew a kite", "zh": "他放了风筝"}], "answer": 0, "explain": {"en": "Geronimo stepped on the end of a rake, the handle hit his snout, and he fell tail-first into smelly fertilizer.", "zh": "杰罗尼摩踩到耙子的一端，耙柄撞中他的鼻子，他屁股朝天掉进了臭烘烘的肥料里。"}}, {"q": {"en": "What is the famous Mousebergé Egg made of?", "zh": "著名的鼠伯格彩蛋是用什么做成的？"}, "options": [{"en": "Solid gold decorated with rubies, sapphires, and emeralds", "zh": "实心黄金，并镶嵌红宝石、蓝宝石和绿宝石"}, {"en": "Plain milk chocolate", "zh": "普通牛奶巧克力"}, {"en": "Carved wood", "zh": "雕刻的木头"}, {"en": "A hollow plastic shell", "zh": "空心的塑料壳"}], "answer": 0, "explain": {"en": "Mousebergé crafted the egg from solid gold and decorated it with rubies, sapphires, and emeralds.", "zh": "鼠伯格用实心黄金打造了彩蛋，并镶嵌了红宝石、蓝宝石和绿宝石。"}}, {"q": {"en": "How did the thief cut a hole through the unbreakable display case?", "zh": "小偷是如何在打不破的展示柜上切出洞的？"}, "options": [{"en": "With a very pure diamond", "zh": "用一颗极纯的钻石"}, {"en": "With a magic spell", "zh": "用魔法咒语"}, {"en": "With a hammer", "zh": "用锤子"}, {"en": "With a key", "zh": "用钥匙"}], "answer": 0, "explain": {"en": "The director said only a very pure diamond could even scratch the special unbreakable material.", "zh": "馆长说只有极纯的钻石才能划伤那种特殊的防碎材料。"}}, {"q": {"en": "What clue did Geronimo find caught at the base of the stand?", "zh": "杰罗尼摩在展台底座发现了什么线索？"}, "options": [{"en": "A long blond hair", "zh": "一根长长的金发"}, {"en": "A red rubber ball", "zh": "一个红色橡皮球"}, {"en": "A lost car key", "zh": "一把丢失的车钥匙"}, {"en": "A torn map", "zh": "一张撕破的地图"}], "answer": 0, "explain": {"en": "After bumping the case, Geronimo held up a long blond hair caught at the base of the stand.", "zh": "撞到展柜后，杰罗尼摩举起了卡在展台底座的一根长长金发。"}}, {"q": {"en": "At the jewelry store, what did the dark-haired mouselet do?", "zh": "在珠宝店里，那个深色头发的女鼠做了什么？"}, "options": [{"en": "Swapped the real diamond ring for ordinary glass", "zh": "把真正的钻石戒指换成了普通的玻璃"}, {"en": "Bought a birthday cake", "zh": "买了一个生日蛋糕"}, {"en": "Returned a lost wallet", "zh": "归还了一个丢失的钱包"}, {"en": "Won a free necklace", "zh": "赢了一条免费项链"}], "answer": 0, "explain": {"en": "Mousieur von Gold found the box held ordinary glass; the mouselet had swapped the real diamond.", "zh": "冯金先生发现盒子里只剩普通玻璃，那位女鼠把真钻石调了包。"}}, {"q": {"en": "How did the thieves make the museum guard sleep through the heist?", "zh": "盗贼是如何让博物馆守卫在案发时睡着的？"}, "options": [{"en": "A red-haired mouselet gave him a cheesy milkshake with a sleeping pill", "zh": "一位红发女鼠给了他一杯掺了安眠药的奶酪奶昔"}, {"en": "They turned off the lights", "zh": "他们关掉了灯"}, {"en": "They played loud music", "zh": "他们播放了吵闹的音乐"}, {"en": "They locked him outside", "zh": "他们把他锁在了门外"}], "answer": 0, "explain": {"en": "The guard remembered a red-haired mouselet from the food stand gave him a cheesy milkshake that made him pass out.", "zh": "守卫记得对面小吃摊一位红发女鼠给了他一杯奶酪奶昔，让他昏睡过去。"}}, {"q": {"en": "Who was the thief behind all the different disguises?", "zh": "所有不同伪装背后的小偷到底是谁？"}, "options": [{"en": "Shadow, the smartest thief in all of Mouse Island", "zh": "影子，全老鼠岛最聪明的盗贼"}, {"en": "Geronimo's cousin Trap", "zh": "杰罗尼摩的表哥特拉普"}, {"en": "A pirate cat", "zh": "一只海盗猫"}, {"en": "The museum director", "zh": "博物馆馆长"}], "answer": 0, "explain": {"en": "Geronimo recognized the thief in the blue container as Shadow; the blond, dark-haired, red-haired, and ratlet disguises were all her.", "zh": "杰罗尼摩认出蓝色集装箱里的盗贼正是影子；金发、深发、红发和提公文包的老鼠全是她的伪装。"}}, {"q": {"en": "Why did Shadow want to ruin the Spring Festival?", "zh": "影子为什么要毁掉春节庆典？"}, "options": [{"en": "No one ever gave her a chocolate egg, so she thought it was unfair", "zh": "从没有人送过她巧克力蛋，她觉得很不公平"}, {"en": "She did not like the color yellow", "zh": "她不喜欢黄色"}, {"en": "She wanted to win the baking contest", "zh": "她想赢得烘焙比赛"}, {"en": "She was allergic to chocolate", "zh": "她对巧克力过敏"}], "answer": 0, "explain": {"en": "Shadow said the Spring Festival was a silly tradition because no one ever gave her a chocolate egg, so she wanted no one to enjoy it.", "zh": "影子说春节是个傻乎乎的传统，因为从没人送她巧克力蛋，所以她想让大家也过不成。"}}, {"q": {"en": "How did Geronimo get the Mousebergé Egg back?", "zh": "杰罗尼摩是如何把鼠伯格彩蛋找回来的？"}, "options": [{"en": "He gave Shadow Trap's chocolate egg and she returned the golden egg", "zh": "他把自己给影子特拉普做的巧克力蛋，影子便归还了金蛋"}, {"en": "He fought her with a sword", "zh": "他用剑和她打了一架"}, {"en": "The police arrested her", "zh": "警察逮捕了她"}, {"en": "Hercule found it in a trash can", "zh": "赫拉克在垃圾桶里找到了它"}], "answer": 0, "explain": {"en": "Geronimo handed Shadow Trap's chocolate egg and convinced her to return the Mousebergé Egg, which she left on the dock.", "zh": "杰罗尼摩把特拉普做的巧克力蛋送给影子，说服她归还鼠伯格彩蛋，她把金蛋留在了码头上。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
