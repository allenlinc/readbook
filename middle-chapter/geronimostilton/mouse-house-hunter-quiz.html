<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mouse House Hunter — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#61 · Mouse House Hunter</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: Mouse House Hunter</em> (Scholastic, 2015) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who broke the news that The Rodent's Gazette was going bankrupt?", "zh": "是谁爆出《老鼠公报》即将破产的消息？"}, "options": [{"en": "Thea Stilton, Geronimo's sister according to some versions of the story", "zh": "杰罗尼摩的妹妹蒂娜·斯蒂顿（按书中另一种说法）"}, {"en": "Sally Ratmousen, editor of The Daily Rat", "zh": "《老鼠日报》的主编莎莉·拉特莫森"}, {"en": "Benjamin, Geronimo's nephew", "zh": "杰罗尼摩的侄子本杰明"}, {"en": "Trap, Geronimo's cousin", "zh": "杰罗尼摩的表哥特拉普"}], "answer": 1, "explain": {"en": "Sally Ratmousen, editor of The Rodent's Gazette's biggest competitor The Daily Rat, appeared on the news claiming the paper was closing.", "zh": "《老鼠公报》最大竞争对手《老鼠日报》的主编莎莉·拉特莫森在新闻中声称报社即将倒闭。"}}, {"q": {"en": "Which relative told Geronimo he must sell his house to save the newspaper?", "zh": "是哪位亲戚告诉杰罗尼摩，必须卖掉房子来拯救报社？"}, "options": [{"en": "His grandfather William Shortpaws (Cheap Mouse Willy)", "zh": "他的爷爷威廉·肖特波（小气鬼威利）"}, {"en": "His nephew Benjamin according to some versions of the story", "zh": "他的侄子本杰明（按书中另一种说法）"}, {"en": "His cousin Trap", "zh": "他的表哥特拉普"}, {"en": "His sister Thea", "zh": "他的妹妹蒂娜"}], "answer": 0, "explain": {"en": "Grandfather William Shortpaws, also called Cheap Mouse Willy, told Geronimo the account was in the red and he must sell his house.", "zh": "外号“小气鬼威利”的爷爷威廉·肖特波告诉杰罗尼摩，账户出现赤字，他必须卖掉房子。"}}, {"q": {"en": "What is the name of Geronimo's pet fish?", "zh": "杰罗尼摩的宠物鱼叫什么名字？"}, "options": [{"en": "Charlotte", "zh": "夏洛特"}, {"en": "Hannibal", "zh": "汉尼拔"}, {"en": "Hercule", "zh": "赫库勒"}, {"en": "Benjamin", "zh": "本杰明"}], "answer": 1, "explain": {"en": "Geronimo says good-bye to his pet fish Hannibal and later keeps him safe in a fishbowl.", "zh": "杰罗尼摩向他的宠物鱼汉尼拔道别，后来一直把它养在鱼缸里。"}}, {"q": {"en": "How quickly did Cousin Trap claim to sell Geronimo's house?", "zh": "表哥特拉普声称用了多长时间卖掉杰罗尼摩的房子？"}, "options": [{"en": "Three hours, eight minutes, and twenty seconds", "zh": "三小时八分二十秒"}, {"en": "One whole week", "zh": "整整一个星期"}, {"en": "Exactly one hour according to some versions of the story", "zh": "正好一个小时（按书中另一种说法）"}, {"en": "One full day", "zh": "整整一天"}], "answer": 0, "explain": {"en": "Trap bragged, 'I sold your house in exactly THREE hours, EIGHT minutes, and twenty seconds.'", "zh": "特拉普炫耀道：“我卖掉你的房子，正好用了三小时八分二十秒。”"}}, {"q": {"en": "Who secretly bought Geronimo's house?", "zh": "是谁偷偷买下了杰罗尼摩的房子？"}, "options": [{"en": "Professor Von Dustyfur", "zh": "冯·达斯提弗教授"}, {"en": "Sally Ratmousen", "zh": "莎莉·拉特莫森"}, {"en": "Ledger Moneymouse", "zh": "莱杰·莫尼莫斯"}, {"en": "Bounce Ballmouse", "zh": "邦斯·鲍尔莫斯"}], "answer": 1, "explain": {"en": "The folder on Trap's desk read: Buyer: Sally Ratmousen, Seller: Geronimo Stilton, Address: 8 Mouseford Lane.", "zh": "特拉普桌上的文件夹上写着：买家：莎莉·拉特莫森，卖家：杰罗尼摩·斯蒂顿，地址：鼠福德巷8号。"}}, {"q": {"en": "Where did Geronimo temporarily live after losing his house?", "zh": "失去房子后，杰罗尼摩暂时住在哪里？"}, "options": [{"en": "A little wooden house in Parmesan Park", "zh": "帕尔马森公园里的一座小木屋"}, {"en": "Trap's office", "zh": "特拉普的办公室"}, {"en": "A luxury hotel", "zh": "一家豪华酒店"}, {"en": "Bounce Ballmouse's villa according to some versions of the story", "zh": "邦斯·鲍尔莫斯的别墅（按书中另一种说法）"}], "answer": 0, "explain": {"en": "Geronimo slept in a tiny wooden playhouse in Parmesan Park, where he once played with his sister Thea as a young mouse.", "zh": "杰罗尼摩睡在帕尔马森公园里的小木屋游乐室，他小时候曾和妹妹蒂娜在那里玩耍。"}}, {"q": {"en": "What challenge did Sally set for Geronimo to get his house back?", "zh": "为了要回房子，莎莉给杰罗尼摩设下了什么挑战？"}, "options": [{"en": "Beat her in a basketball game according to some versions of the story", "zh": "在篮球比赛里打败她（按书中另一种说法）"}, {"en": "Pay her double the money", "zh": "付给她双倍的钱"}, {"en": "Get an interview with Bounce Ballmouse within twelve hours", "zh": "在十二小时内采访到邦斯·鲍尔莫斯"}, {"en": "Write one hundred articles", "zh": "写一百篇文章"}], "answer": 2, "explain": {"en": "Sally said she'd return the house only if Geronimo got an interview with Bounce Ballmouse, who never gives interviews, within twelve hours.", "zh": "莎莉说，只有杰罗尼摩在十二小时内采访到从不接受采访的邦斯·鲍尔莫斯，她才归还房子。"}}, {"q": {"en": "How did Geronimo win Bounce Ballmouse's trust?", "zh": "杰罗尼摩是如何赢得邦斯·鲍尔莫斯信任的？"}, "options": [{"en": "He wrote a story about him according to some versions of the story", "zh": "他写了一篇关于他的报道（按书中另一种说法）"}, {"en": "He beat him at basketball", "zh": "他在篮球上打败了他"}, {"en": "He gave him a lot of money", "zh": "他给了他很多钱"}, {"en": "He saved Bounce's mother from being hit by a truck", "zh": "他把邦斯的妈妈从卡车前救了下来"}], "answer": 3, "explain": {"en": "Geronimo shouted to stop an old lady from stepping in front of a truck; she turned out to be Bounce's mom, and Bounce thanked him with an interview.", "zh": "杰罗尼摩大喊，阻止一位老太太走到卡车前；她正是邦斯的妈妈，邦斯为报答他答应接受采访。"}}, {"q": {"en": "What was the real reason for the newspaper 'crisis'?", "zh": "报社“危机”的真正原因是什么？"}, "options": [{"en": "Grandfather closed the paper according to some versions of the story in an early draft of the book", "zh": "爷爷关闭了报社（按书中另一种说法）（在书的早期草稿中）"}, {"en": "The bank truly went bankrupt", "zh": "银行真的破产了"}, {"en": "Sally made it up as a hoax to sell more copies of The Daily Rat", "zh": "莎莉编造了这个骗局，好让《老鼠日报》多卖些份数"}, {"en": "Geronimo wasted the money", "zh": "杰罗尼摩把钱挥霍光了"}], "answer": 2, "explain": {"en": "The news confirmed the crisis was a hoax; Sally invented the story to sell more copies of her own newspaper.", "zh": "新闻证实这场危机是个骗局；莎莉编造故事，是为了让自己的报纸多卖些份数。"}}, {"q": {"en": "Who had impersonated Ledger Moneymouse at the bank?", "zh": "在银行里假扮莱杰·莫尼莫斯的是谁？"}, "options": [{"en": "Bounce Ballmouse according to some versions of the story", "zh": "邦斯·鲍尔莫斯（按书中另一种说法）"}, {"en": "William Shortpaws", "zh": "威廉·肖特波"}, {"en": "Trap", "zh": "特拉普"}, {"en": "Sally Ratmousen, wearing a rubber mask", "zh": "戴着橡胶面具的莎莉·拉特莫森"}], "answer": 3, "explain": {"en": "Moneymouse revealed someone locked him in a broom closet and took his place; the picture shows Sally Ratmousen dressed as him with a rubber mask.", "zh": "莫尼莫斯说有人把他锁在杂物间并顶替了他；图片显示莎莉·拉特莫森戴着橡胶面具假扮他。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
