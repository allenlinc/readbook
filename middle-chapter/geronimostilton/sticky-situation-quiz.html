<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Sticky Situation — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#75 · The Sticky Situation</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: The Sticky Situation</em> (Scholastic, 2014) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Where does Geronimo go for his spring vacation?", "zh": "Geronimo 去哪里度春假？"}, "options": [{"en": "The Stilton family farm", "zh": "Stilton 家族农场"}, {"en": "Madame No's mansion", "zh": "Madame No 的豪宅"}, {"en": "The New Mouse City Film Festival", "zh": "新老鼠城电影节"}, {"en": "A hotel in Hawaii", "zh": "夏威夷的一家酒店"}], "answer": 0, "explain": {"en": "Geronimo bikes to Stilton Farm, the most mouserific place in the world, for his weekend vacation.", "zh": "Geronimo 骑自行车来到 Stilton 农场——世界上最美妙的地方，度他的周末假期。"}}, {"q": {"en": "Who surprises Geronimo with a beekeeping plan to make honey?", "zh": "谁给了 Geronimo 一个养蜂产蜜的惊喜计划？"}, "options": [{"en": "Benjamin", "zh": "Benjamin"}, {"en": "His cousin Trap", "zh": "他的表哥 Trap"}, {"en": "Madame No", "zh": "Madame No"}, {"en": "His sister Thea according to some versions of the story", "zh": "他的妹妹 Thea（按书中另一种说法）"}], "answer": 1, "explain": {"en": "Trap reveals a surprise: beekeeper suits and a plan to make 'Stilton Farm's Famouse Honey' with the farm's bees.", "zh": "Trap 亮出惊喜：养蜂服，以及用农场蜜蜂制作“Stilton 农场名牌蜂蜜”的计划。"}}, {"q": {"en": "Who are Melanie and Alpine Goldendrop, and what do they give Geronimo?", "zh": "Melanie 和 Alpine Goldendrop 是谁，他们给了 Geronimo 什么？"}, "options": [{"en": "The owners of the Bee Mine factory according to some versions of the story", "zh": "Bee Mine 工厂的老板（按书中另一种说法）"}, {"en": "Geronimo's cousins", "zh": "Geronimo 的表兄弟"}, {"en": "Bee experts who gift their hives and manuka plants", "zh": "养蜂专家，把他们的蜂箱和麦卢卡花送给他"}, {"en": "Two police officers", "zh": "两名警察"}], "answer": 2, "explain": {"en": "The Goldendrops are bee experts who, ready for a break, give Geronimo their hives and manuka plants to keep the tradition going.", "zh": "Goldendrop 夫妇是养蜂专家，准备歇息，于是把他们的蜂箱和麦卢卡花送给 Geronimo，让传统延续下去。"}}, {"q": {"en": "What is the name of the mysterious new honey factory next to the farm?", "zh": "农场旁边那家神秘的新蜂蜜工厂叫什么名字？"}, "options": [{"en": "GoldenDrop Lodge", "zh": "GoldenDrop Lodge"}, {"en": "Stilton Farm Honey", "zh": "Stilton Farm Honey"}, {"en": "TummyFix", "zh": "TummyFix"}, {"en": "Bee Mine", "zh": "Bee Mine"}], "answer": 3, "explain": {"en": "A huge new building appears with a sign reading 'BEE MINE — All-Natural Honey,' becoming big competition.", "zh": "一座巨大的新建筑立起，招牌写着“Bee Mine——纯天然蜂蜜”，成了强大的竞争对手。"}}, {"q": {"en": "What new medicine appears for the stomachaches affecting rodents?", "zh": "针对老鼠们胃痛而出现的那种新药叫什么？"}, "options": [{"en": "TummyFix", "zh": "TummyFix"}, {"en": "Bamboozle Bubbly Beverage", "zh": "Bamboozle Bubbly Beverage"}, {"en": "Honey Machine 5000", "zh": "Honey Machine 5000"}, {"en": "Chamomile tea", "zh": "洋甘菊茶"}], "answer": 0, "explain": {"en": "As rodents complain of stomachaches, a new 'SUPER-EFFECTIVE' medicine called TummyFix appears everywhere.", "zh": "当老鼠们抱怨胃痛时，一种名为 TummyFix 的“超级有效”新药到处出现。"}}, {"q": {"en": "Which honey wins the 'Sweet Taste of Mouse Island' competition?", "zh": "哪一种蜂蜜赢得了“鼠岛甜美滋味”大赛？"}, "options": [{"en": "Bee Mine's honey", "zh": "Bee Mine 的蜂蜜"}, {"en": "Stilton Farm's manuka honey", "zh": "Stilton 农场的麦卢卡蜂蜜"}, {"en": "GoldenDrop honey according to some versions of the story", "zh": "GoldenDrop 蜂蜜（按书中另一种说法）"}, {"en": "TummyFix honey", "zh": "TummyFix 蜂蜜"}], "answer": 1, "explain": {"en": "The judges declare the winner is 'Stilton Farm' — their special manuka honey, made with love and care.", "zh": "评委宣布获胜者是“Stilton 农场”——他们用爱心和细心制作的特别麦卢卡蜂蜜。"}}, {"q": {"en": "Who wants to buy Stilton Farm from Geronimo?", "zh": "谁想从 Geronimo 手里买下 Stilton 农场？"}, "options": [{"en": "Madame No", "zh": "Madame No"}, {"en": "Alpine Goldendrop", "zh": "Alpine Goldendrop"}, {"en": "Trap Stilton", "zh": "Trap Stilton"}, {"en": "Professor No", "zh": "Professor No"}], "answer": 0, "explain": {"en": "Madame No arrives in her leopard-print car and offers to buy the whole farm, including the beehives.", "zh": "Madame No 坐着豹纹汽车出现，提出买下整座农场，包括那些蜂箱。"}}, {"q": {"en": "What are the metallic 'bees' that chase Geronimo actually?", "zh": "追着 Geronimo 的那些金属“蜜蜂”其实是什么？"}, "options": [{"en": "Real honey bees", "zh": "真正的蜜蜂"}, {"en": "Robots called BeeBots", "zh": "名叫 BeeBot 的机器人"}, {"en": "Tiny drones with cameras according to some versions of the story", "zh": "带摄像头的小型无人机（按书中另一种说法）"}, {"en": "Toy balloons", "zh": "玩具气球"}], "answer": 1, "explain": {"en": "Hercule finds a box labeled 'Beetronics Synthetic Wings' and a manual: the metallic bees are robots, not real bees.", "zh": "Hercule 找到一个标着“Beetronics 合成翅膀”的盒子和说明书：那些金属蜜蜂是机器人，不是真蜜蜂。"}}, {"q": {"en": "How does Hercule arrive to help Geronimo with the bee problem?", "zh": "Hercule 是如何赶来帮 Geronimo 解决蜜蜂危机的？"}, "options": [{"en": "In the Bananamobile according to some versions of the story in an early draft of the book", "zh": "开着 Bananamobile（按书中另一种说法）（在书的早期草稿中）"}, {"en": "On a surfboard", "zh": "踩着冲浪板"}, {"en": "In a beecopter (bee-shaped helicopter) wearing a bee costume", "zh": "开着蜜蜂造型的直升机（beecopter），穿着蜜蜂装"}, {"en": "By submarine", "zh": "乘潜艇"}], "answer": 2, "explain": {"en": "A striped bee-painted helicopter called the beecopter lands; Hercule jumps out wearing a black-and-yellow bee disguise.", "zh": "一架漆着条纹、像蜜蜂的直升机 beecopter 降落，Hercule 穿着黑白黄相间的蜜蜂伪装服跳了下来。"}}, {"q": {"en": "Who is Professor No, and what machine makes the fake honey?", "zh": "Professor No 是谁，又是哪台机器制造了假蜂蜜？"}, "options": [{"en": "A Bee Mine manager; a blender", "zh": "Bee Mine 的经理；一台搅拌机"}, {"en": "Trap; a cooking pot", "zh": "Trap；一口煮锅"}, {"en": "Geronimo's grandfather; a beehive according to some versions of the story", "zh": "Geronimo 的爷爷；一个蜂箱（按书中另一种说法）"}, {"en": "Madame No's cousin; the Honey Machine 5000", "zh": "Madame No 的表兄弟；Honey Machine 5000"}], "answer": 3, "explain": {"en": "Professor No, Madame No's ruthless inventor cousin, runs the Honey Machine 5000 that mixes fragrance, color, thickener, and flavoring into fake honey.", "zh": "Professor No 是 Madame No 那位冷酷的发明家表兄弟，他操控 Honey Machine 5000，把香精、色素、增稠剂和调味料混合成假蜂蜜。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
