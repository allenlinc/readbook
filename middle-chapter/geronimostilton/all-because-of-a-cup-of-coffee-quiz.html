<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Because of a Cup of Coffee — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#10 · All Because of a Cup of Coffee</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: All Because of a Cup of Coffee</em> (Scholastic, 2002) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Where was Geronimo eating breakfast when a mouse spilled coffee on him?", "zh": "杰罗尼摩正在哪里吃早餐时，被一只老鼠把咖啡洒在了身上？"}, "options": [{"en": "The Grand Cheddar Hotel", "zh": "切达大饭店"}, {"en": "Sweet Rose Island", "zh": "甜玫瑰岛"}, {"en": "His newspaper office", "zh": "他的报社办公室"}, {"en": "The Tail Trap Diner", "zh": "尾巴陷阱餐厅"}], "answer": 3, "explain": {"en": "Geronimo says he was having breakfast at the Tail Trap Diner, famous for its hot cheese buns, when coffee was spilled on his jacket.", "zh": "杰罗尼摩说，他当时正在以热奶酪面包闻名的尾巴陷阱餐厅吃早餐，咖啡被洒在了他的外套上。"}}, {"q": {"en": "What is the name of the beautiful countess who spilled the coffee?", "zh": "把咖啡洒出来的那位美丽女伯爵叫什么名字？"}, "options": [{"en": "Kreamy O'Cheddar", "zh": "克里米·奥切达"}, {"en": "Stephanie von Sugarfur", "zh": "斯蒂芬妮·冯·糖毛郡主"}, {"en": "Thea Stilton", "zh": "茜亚·斯蒂顿"}, {"en": "Mousella MacMouser", "zh": "莫塞拉·麦克莫瑟"}], "answer": 1, "explain": {"en": "The newspaper caption names her as the young countess Stephanie von Sugarfur, daughter of Count Chester Cheesenip.", "zh": "报纸上的说明文字写明她是年轻的斯蒂芬妮·冯·糖毛郡主，切斯特·奶酪鼻伯爵的女儿。"}}, {"q": {"en": "What newspaper does Geronimo publish?", "zh": "杰罗尼摩经营的是哪份报纸？"}, "options": [{"en": "The Mouse Daily", "zh": "老鼠日报"}, {"en": "The Cheddar Times", "zh": "切达时报"}, {"en": "The Rodent's Gazette", "zh": "《啮齿动物公报》"}, {"en": "The Butterfly Post", "zh": "蝴蝶邮报"}], "answer": 2, "explain": {"en": "Geronimo tells readers, 'I run a daily newspaper. It's called The Rodent's Gazette.'", "zh": "杰罗尼摩告诉读者：“我经营一份日报，名叫《啮齿动物公报》。”"}}, {"q": {"en": "How many red roses did Geronimo send to the countess?", "zh": "杰罗尼摩给女伯爵送了多少朵红玫瑰？"}, "options": [{"en": "Five dozen (sixty)", "zh": "五打（六十朵）"}, {"en": "Two dozen", "zh": "两打"}, {"en": "One dozen", "zh": "一打"}, {"en": "Ten pounds worth", "zh": "价值十磅的"}], "answer": 0, "explain": {"en": "He settled on 'five dozen long-stemmed red roses' for the countess at the florist.", "zh": "他在花店为女伯爵选定了“五打长茎红玫瑰”。"}}, {"q": {"en": "Who is Geronimo's loud cousin who ate half the chocolates and said 'play it cool'?", "zh": "谁是杰罗尼摩那位大嗓门的表哥，他吃掉了半盒巧克力，还说要“保持冷静”？"}, "options": [{"en": "Richard Ratingbone", "zh": "理查德·雷丁本"}, {"en": "Burt Bruiser Mouse", "zh": "猛汉·布鲁瑟"}, {"en": "Benjamin", "zh": "本杰明"}, {"en": "Trap", "zh": "特拉普"}], "answer": 3, "explain": {"en": "Cousin Trap scarfed down half the box of Cheesy Chews and advised Geronimo to 'play it cool' with lady mice.", "zh": "表哥特拉普抢吃了半盒奶酪软糖，还劝杰罗尼摩对女老鼠要“保持冷静”。"}}, {"q": {"en": "Who is Geronimo's nine-year-old nephew who found the Valley of the Cheesettes?", "zh": "谁是杰罗尼摩九岁的侄子，他找到了奶酪小妞谷？"}, "options": [{"en": "Thea's son", "zh": "茜亚的儿子"}, {"en": "Benjamin", "zh": "本杰明"}, {"en": "Trap's son", "zh": "特拉普的儿子"}, {"en": "Chester Cheesenip", "zh": "切斯特·奶酪鼻"}], "answer": 1, "explain": {"en": "Benjamin, Geronimo's favorite nephew who is 'only nine years old', squeezed through the tiny hole and saw the valley.", "zh": "本杰明是杰罗尼摩最疼爱的侄子，书中说他“只有九岁”，他钻过那个小洞看见了山谷。"}}, {"q": {"en": "What legendary place did the family search for, called the Eighth Wonder of the World?", "zh": "这一家人寻找的那处被称为世界第八大奇迹的传奇之地叫什么？"}, "options": [{"en": "Butterfly Valley", "zh": "蝴蝶谷"}, {"en": "The Valley of Roses", "zh": "玫瑰谷"}, {"en": "The Valley of Chocolate", "zh": "巧克力谷"}, {"en": "The Valley of the Cheesettes", "zh": "奶酪小妞谷"}], "answer": 3, "explain": {"en": "The magazine article says the Valley of the Cheesettes is said to be the Eighth Wonder of the World, on Butterfly Island.", "zh": "杂志上的文章说，位于蝴蝶岛上的奶酪小妞谷被称为世界第八大奇迹。"}}, {"q": {"en": "How did the family travel to Butterfly Island?", "zh": "这家人是坐什么交通工具去蝴蝶岛的？"}, "options": [{"en": "By train", "zh": "坐火车"}, {"en": "By hot-air balloon", "zh": "坐热气球"}, {"en": "By a jeep and a speedboat", "zh": "坐吉普车和快艇"}, {"en": "By submarine", "zh": "坐潜水艇"}], "answer": 2, "explain": {"en": "They rode the 'Risky Rodent Travels' jeep to the harbor and then a thin speedboat to Butterfly Island.", "zh": "他们先坐着“冒险鼠旅行社”的吉普车到港口，再换乘细长的快艇前往蝴蝶岛。"}}, {"q": {"en": "What tiny creature did Benjamin hide under his red hat to prove they found the valley?", "zh": "本杰明把什么小生物藏在自己的红帽子下面，以此证明他们找到了山谷？"}, "options": [{"en": "A small cheese mouse", "zh": "一只小奶酪鼠"}, {"en": "A yellow butterfly named Cheesette", "zh": "一只名叫奶酪小妞的黄色蝴蝶"}, {"en": "A small bird", "zh": "一只小鸟"}, {"en": "A ladybug", "zh": "一只瓢虫"}], "answer": 1, "explain": {"en": "A small yellow butterfly flew out of Benjamin's red hat; he named her Cheesette and she proved their discovery.", "zh": "一只黄色小蝴蝶从本杰明的红帽子里飞了出来，他叫她奶酪小妞，正是她证明了他们的发现。"}}, {"q": {"en": "What did the fortune-teller 'Madame Love Doctor' charge Geronimo for her advice?", "zh": "算命的“爱情医生夫人”为她的指点向杰罗尼摩收了多少钱？"}, "options": [{"en": "Five dozen roses", "zh": "五打玫瑰"}, {"en": "One dollar", "zh": "一美元"}, {"en": "Two hundred dollars", "zh": "两百美元"}, {"en": "A box of chocolates", "zh": "一盒巧克力"}], "answer": 2, "explain": {"en": "As Geronimo left, Madame Love Doctor held out her paw and said, 'that will be two hundred dollars.'", "zh": "杰罗尼摩离开时，爱情医生夫人伸出爪子说：“这就两百美元。”"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
