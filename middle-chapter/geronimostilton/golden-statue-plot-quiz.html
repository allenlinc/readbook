<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Golden Statue Plot — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#55 · The Golden Statue Plot</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: The Golden Statue Plot</em> (Scholastic, 2007) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who is the narrator of this story?", "zh": "这本书的故事是谁来讲的？"}, "options": [{"en": "Hercule Poirat", "zh": "赫拉克·波利拉特"}, {"en": "Benjamin Stilton according to some versions of the story", "zh": "本杰明·斯蒂顿（按书中另一种说法）"}, {"en": "Geronimo Stilton", "zh": "杰罗尼摩·斯蒂顿"}, {"en": "Trap Stilton", "zh": "特拉普·斯蒂顿"}], "answer": 2, "explain": {"en": "Geronimo introduces himself as the narrator who runs The Rodent's Gazette, the famous newspaper on Mouse Island.", "zh": "杰罗尼摩在书中自我介绍，他是老鼠岛著名报纸《鼠民公报》的社长，也是故事的叙述者。"}}, {"q": {"en": "Why did Geronimo wear sunglasses everywhere he went?", "zh": "杰罗尼摩为什么走到哪儿都戴着墨镜？"}, "options": [{"en": "He fell asleep in the sun with them on, leaving white marks around his eyes", "zh": "他戴着墨镜在太阳下睡着了，眼睛周围留下了一圈白印"}, {"en": "He was a famous movie star on vacation according to some versions of the story", "zh": "他是个正在度假的著名电影明星（按书中另一种说法）"}, {"en": "He had lost his regular glasses", "zh": "他弄丢了自己的普通眼镜"}, {"en": "He was going to a costume party", "zh": "他要去参加化妆舞会"}], "answer": 0, "explain": {"en": "He fell asleep on the beach with his sunglasses on, so he woke up with silly white marks around his eyes, like a reverse panda.", "zh": "他在海滩上戴着墨镜睡着了，醒来时眼睛周围留下了一圈可笑的白印，活像一只反过来的熊猫。"}}, {"q": {"en": "What caused the total blackout in New Mouse City?", "zh": "新老鼠城为什么会彻底停电？"}, "options": [{"en": "Mice kept all the lights on because of the sunglasses trend", "zh": "因为墨镜风潮，大家整天整夜都开着灯"}, {"en": "A big storm hit the island", "zh": "岛上刮了一场大风暴"}, {"en": "A power plant exploded", "zh": "发电厂爆炸了"}, {"en": "The pirate cats attacked the city according to some versions of the story", "zh": "海盗猫袭击了城市（按书中另一种说法）"}], "answer": 0, "explain": {"en": "Geronimo's sunglasses trend spread, and mice kept the lights blazing day and night, using so much electricity that the city had a total blackout.", "zh": "杰罗尼摩的墨镜风潮传开了，老鼠们白天黑夜都开着灯，耗电太多，整座城市彻底停电了。"}}, {"q": {"en": "Who is the king of the pirate cats?", "zh": "海盗猫的国王是谁？"}, "options": [{"en": "Oscar Wildwhiskers according to some versions of the story", "zh": "奥斯卡·怀斯惠斯克（按书中另一种说法）"}, {"en": "Catardone III of Catatonia", "zh": "卡塔托尼亚的卡塔尔多内三世"}, {"en": "Bonzo Felix", "zh": "邦佐·费力克斯"}, {"en": "Dr. Regina Redfur", "zh": "雷吉娜·红毛博士"}], "answer": 1, "explain": {"en": "Catardone III of Catatonia is described as the king of the pirate cats who lives at Fort Feline on Cat Island.", "zh": "卡塔托尼亚的卡塔尔多内三世被描写为海盗猫的国王，住在猫岛上的猫咪堡垒。"}}, {"q": {"en": "What did Dr. Redfur claim the Mousey Liberty statue was made of?", "zh": "红毛博士说自由鼠小姐雕像是用什么做的？"}, "options": [{"en": "Gold, because it is yellow", "zh": "黄金，因为它是黄色的"}, {"en": "Cheese according to some versions of the story", "zh": "奶酪（按书中另一种说法）"}, {"en": "Bronze", "zh": "青铜"}, {"en": "Copper", "zh": "铜"}], "answer": 0, "explain": {"en": "Dr. Redfur insisted the statue was made of gold simply because it was yellow, which is her 'scientific proof'.", "zh": "红毛博士坚称雕像是黄金做的，理由仅仅是它是黄色的，这就是她所谓的“科学证据”。"}}, {"q": {"en": "Who is Geronimo's secret feline fan that loves reading his books?", "zh": "谁是偷偷爱读杰罗尼摩书、崇拜他的猫粉丝？"}, "options": [{"en": "Princess Tersilla according to some versions of the story", "zh": "特尔西拉公主（按书中另一种说法）"}, {"en": "Kitty", "zh": "小猫咪"}, {"en": "Dr. Redfur", "zh": "红毛博士"}, {"en": "Samantha Wildwhiskers", "zh": "萨曼莎·怀斯惠斯克"}], "answer": 3, "explain": {"en": "Samantha Wildwhiskers, Oscar's eldest daughter, secretly reads Geronimo's books and sends him messages by carrier pigeon.", "zh": "萨曼莎是奥斯卡的大女儿，她偷偷读杰罗尼摩的书，还用信鸽给他送信。"}}, {"q": {"en": "What clever idea did Benjamin have to stop the pirate cats?", "zh": "本杰明想出了什么妙计来阻止海盗猫？"}, "options": [{"en": "Call the mouse police according to some versions of the story", "zh": "打电话叫老鼠警察（按书中另一种说法）"}, {"en": "Attack them with an army of fleas", "zh": "用一支跳蚤大军去攻击它们"}, {"en": "Build a tall wall", "zh": "建一堵高墙"}, {"en": "Set off loud fireworks", "zh": "放响亮的烟花"}], "answer": 1, "explain": {"en": "Benjamin realized that cats fear fleas the most, so they used a flea army to drive the cats away from the statue.", "zh": "本杰明想到猫最怕跳蚤，于是他们用一支跳蚤大军把猫从雕像边赶跑了。"}}, {"q": {"en": "Where was Geronimo standing when he said, 'Sorry to disturb you ...'?", "zh": "杰罗尼摩说“抱歉打扰一下……”时，他站在哪里？"}, "options": [{"en": "In his office at The Rodent's Gazette according to some versions of the story", "zh": "在《鼠民公报》的办公室里（按书中另一种说法）"}, {"en": "On the deck of The Black Hurricane", "zh": "在“黑色飓风号”的甲板上"}, {"en": "On a balcony behind the crown of Mousey Liberty", "zh": "在自由鼠小姐王冠后面的一个小阳台上"}, {"en": "On Cat Island", "zh": "在猫岛上"}], "answer": 2, "explain": {"en": "Geronimo spoke from a small balcony behind the crown on top of the Mousey Liberty statue.", "zh": "杰罗尼摩站在自由鼠小姐雕像顶端、王冠后面的一个小阳台上说话。"}}, {"q": {"en": "Who helped throw the cannonballs into the sea so the cats could not fire them?", "zh": "是谁把炮弹丢进海里，让猫没法开炮的？"}, "options": [{"en": "Tersilla, Thugsy, and Killer", "zh": "特尔西拉、瑟格西和基勒"}, {"en": "Catardone and Bonzo", "zh": "卡塔尔多内和邦佐"}, {"en": "Dr. Redfur and Boots", "zh": "红毛博士和布茨"}, {"en": "Kitty, Scout, and Oscar", "zh": "小猫咪、小侦察和奥斯卡"}], "answer": 3, "explain": {"en": "Oscar helped the twins Kitty and Scout throw the cannonballs into the sea to stop the cats from knocking down the statue.", "zh": "奥斯卡帮双胞胎小猫咪和小侦察把炮弹丢进海里，阻止猫炸倒雕像。"}}, {"q": {"en": "Why was the statue NOT actually made of gold?", "zh": "为什么雕像其实根本不是黄金做的？"}, "options": [{"en": "It was made of bronze", "zh": "它是青铜做的"}, {"en": "It was just yellow, like cheese", "zh": "它只是黄色的，像奶酪一样"}, {"en": "It was made of plastic according to some versions of the story", "zh": "它是塑料做的（按书中另一种说法）"}, {"en": "It was painted silver", "zh": "它被涂成了银色"}], "answer": 1, "explain": {"en": "Geronimo yelled that the statue was just yellow like cheese, the mice's favorite food, not real gold.", "zh": "杰罗尼摩大喊，雕像只是黄色的，像老鼠最爱吃的奶酪，并不是真的黄金。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
