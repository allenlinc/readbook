<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Into Gear, Stilton! — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#54 · Get Into Gear, Stilton!</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: Get Into Gear, Stilton!</em> (Scholastic, 2009) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What yellow vehicle hit Geronimo as he crossed the street?", "zh": "杰罗尼摩过马路时被一辆什么黄色交通工具撞到了？"}, "options": [{"en": "Hercule Poirat's banana-shaped car", "zh": "赫拉克勒·波瓦那辆香蕉形状的汽车"}, {"en": "The mayor's limousine according to some versions of the story", "zh": "市长的豪华轿车（按书中另一种说法）"}, {"en": "A red fire truck", "zh": "一辆红色消防车"}, {"en": "Solar the robot car", "zh": "机器人汽车索拉"}], "answer": 0, "explain": {"en": "Hercule says, 'I was driving the Bananamobile... It's an enormouse yellow car shaped like a banana.'", "zh": "赫拉克勒说：“我当时开着香蕉车……那是一辆香蕉形状的巨型黄色汽车。”"}}, {"q": {"en": "What precious item was stolen at the start of the story?", "zh": "故事开头，哪件贵重物品被盗了？"}, "options": [{"en": "Geronimo's antique cheese rinds according to some versions of the story", "zh": "杰罗尼摩的古老奶酪皮（按书中另一种说法）"}, {"en": "Duchess Catherine Rodenton's 73-carat diamond necklace", "zh": "凯瑟琳·罗登顿公爵夫人的七十三克拉钻石项链"}, {"en": "The Heart of Light", "zh": "光明之心"}, {"en": "A golden statue", "zh": "一座黄金雕像"}], "answer": 1, "explain": {"en": "The newspaper headlines read that someone had 'STOLEN Duchess Catherine Rodenton's seventy-three-carat diamond necklace!'", "zh": "报纸头条报道：有人“偷走了凯瑟琳·罗登顿公爵夫人的七十三克拉钻石项链！”"}}, {"q": {"en": "Who is the owner of the driving school that teaches Geronimo?", "zh": "谁是为杰罗尼摩授课的驾驶学校的老板？"}, "options": [{"en": "Rusty Carr", "zh": "拉斯提·卡尔"}, {"en": "Flip Hotpaws", "zh": "菲利浦·热爪"}, {"en": "Professor von Volt", "zh": "冯·沃尔特教授"}, {"en": "Mayor Frederick Fuzzypaws", "zh": "市长弗雷德里克·弗兹爪"}], "answer": 0, "explain": {"en": "It was 'Rusty Carr... the owner of the driving school' who gave Geronimo his lessons.", "zh": "驾驶学校的老板“拉斯提·卡尔”给杰罗尼摩上课。"}}, {"q": {"en": "What is the name of the first talking robot car in the world?", "zh": "世界上第一辆会说话的机器人汽车叫什么名字？"}, "options": [{"en": "Lunar", "zh": "露娜"}, {"en": "Solar (also called Sol)", "zh": "索拉（也叫索尔）"}, {"en": "Bananamobile according to some versions of the story", "zh": "香蕉车（按书中另一种说法）"}, {"en": "Rob-8", "zh": "机器鼠8号"}], "answer": 1, "explain": {"en": "The car says, 'I AM SOLAR, A ROBOT CAR. YOU CAN CALL ME SOL.'", "zh": "那辆车说：“我是索拉，一辆机器人汽车。你可以叫我索尔。”"}}, {"q": {"en": "Who invented and built the robot car Solar?", "zh": "是谁发明并制造了机器人汽车索拉？"}, "options": [{"en": "Carlotta Carr", "zh": "卡洛塔·卡尔"}, {"en": "Professor Paws von Volt", "zh": "波·冯·沃尔特教授"}, {"en": "Rusty Carr", "zh": "拉斯提·卡尔"}, {"en": "Margo Bitmouse according to some versions of the story", "zh": "玛戈·比特鼠（按书中另一种说法）"}], "answer": 1, "explain": {"en": "Geronimo recognizes 'PROFESSOR Paws von volt' and the professor says Solar is 'my latest INVENTION.'", "zh": "杰罗尼摩认出了“波·冯·沃尔特教授”，教授说索拉是他“最新的发明”。"}}, {"q": {"en": "What special power lets Solar become invisible?", "zh": "索拉靠什么特殊能力让自己隐形？"}, "options": [{"en": "A magic spell", "zh": "一个魔法咒语"}, {"en": "A coat of invisible paint according to some versions of the story", "zh": "一层隐形油漆（按书中另一种说法）"}, {"en": "A powerful electromagnetic screen", "zh": "一层强大的电磁屏蔽屏"}, {"en": "A pair of golden glasses", "zh": "一副金色眼镜"}], "answer": 2, "explain": {"en": "The book states, 'Thanks to a very powerful electromagnetic screen, it can become invisible.'", "zh": "书中写道：“多亏一层非常强大的电磁屏蔽屏，它才能隐形。”"}}, {"q": {"en": "Who built the silver rival car named Lunar?", "zh": "谁制造了那辆名叫露娜的银色对手汽车？"}, "options": [{"en": "Professor von Volt according to some versions of the story", "zh": "冯·沃尔特教授（按书中另一种说法）"}, {"en": "The mayor", "zh": "市长"}, {"en": "Bruce Hyena", "zh": "布鲁斯·鬣狗"}, {"en": "Carlotta Carr, Rusty's sister", "zh": "卡洛塔·卡尔，拉斯提的妹妹"}], "answer": 3, "explain": {"en": "Rusty says, 'The silver car cannot disappear. That car is named Lunar. My sister, CARLOTTA, created it.'", "zh": "拉斯提说：“银色车不会消失，它叫露娜。我的妹妹卡洛塔制造了它。”"}}, {"q": {"en": "Whose brain was Solar's electronic brain modeled after?", "zh": "索拉的电子大脑是以谁的大脑为原型制造的？"}, "options": [{"en": "Thea's brain", "zh": "蒂拉的大脑"}, {"en": "Geronimo's brain", "zh": "杰罗尼摩的大脑"}, {"en": "The mayor's brain", "zh": "市长的大脑"}, {"en": "Benjamin's brain", "zh": "本杰明的大脑"}], "answer": 0, "explain": {"en": "Professor von Volt says, 'I tried to RECONSTRUCT the brain of the smartest and toughest rodent... your SISTER, Thea!'", "zh": "冯·沃尔特教授说：“我试图重现老鼠岛上最聪明、最厉害的老鼠——你的妹妹蒂拉——的大脑！”"}}, {"q": {"en": "What was Geronimo's secret mission with Solar?", "zh": "杰罗尼摩和索拉的秘密任务是什么？"}, "options": [{"en": "Deliver the road safety booklet according to some versions of the story", "zh": "派发道路安全手册（按书中另一种说法）"}, {"en": "Win a driving championship", "zh": "赢得驾驶锦标赛"}, {"en": "Catch the cheesebrains in masks", "zh": "抓住蒙面的奶酪脑"}, {"en": "Find Lunar and return the stolen diamond necklace to the Mouseum", "zh": "找到露娜，把被盗的钻石项链送回鼠物馆"}], "answer": 3, "explain": {"en": "Margo tells him, 'Find Lunar, retrieve Duchess Catherine Rodenton's seventy-three-carat diamond necklace, and return it to New Mouse City's Mouseum.'", "zh": "玛戈告诉他：“找到露娜，取回凯瑟琳·罗登顿公爵夫人的七十三克拉钻石项链，送回老鼠岛的鼠物馆。”"}}, {"q": {"en": "How did Solar recover the diamond necklace from the sea?", "zh": "索拉是怎样从海里取回钻石项链的？"}, "options": [{"en": "By using its magnet", "zh": "用自己的磁铁吸上来"}, {"en": "By asking a fish to fetch it according to some versions of the story", "zh": "请一条鱼帮忙叼回来（按书中另一种说法）"}, {"en": "With a long net extended from its door", "zh": "用从车门伸出的长网兜捞起"}, {"en": "By diving in with Geronimo", "zh": "和杰罗尼摩一起潜水去捡"}], "answer": 2, "explain": {"en": "'A long arm holding a net extended from the passenger-side door and scooped up the necklace before the sea could swallow it.'", "zh": "“一条长臂从副驾驶门伸出，举着一个网兜，在大海吞掉项链之前把它捞了起来。”"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
