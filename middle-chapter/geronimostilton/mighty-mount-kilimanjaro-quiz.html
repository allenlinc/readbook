<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mighty Mount Kilimanjaro — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#41 · Mighty Mount Kilimanjaro</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: Mighty Mount Kilimanjaro</em> (Scholastic, 2009) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who actually dragged Geronimo off to climb Mount Kilimanjaro?", "zh": "到底是谁硬拉着杰罗尼摩去爬乞力马扎罗山的？"}, "options": [{"en": "His friend Bruce Hyena", "zh": "他的朋友布鲁斯·海纳"}, {"en": "His cousin Trap", "zh": "他的表哥特拉普"}, {"en": "His sister Thea", "zh": "他的妹妹茜亚"}, {"en": "His nephew Benjamin according to some versions of the story", "zh": "他的侄子本杰明（按书中另一种说法）"}], "answer": 0, "explain": {"en": "Bruce Hyena, Geronimo's super-fit friend, leaped into his mouse hole and forced him to prepare for the climb.", "zh": "布鲁斯·海纳是杰罗尼摩那位体格超棒的朋友，他跳进杰罗尼摩的鼠洞，逼着他为登山做准备。"}}, {"q": {"en": "In which country is Mount Kilimanjaro located?", "zh": "乞力马扎罗山位于哪个国家？"}, "options": [{"en": "Madagascar", "zh": "马达加斯加"}, {"en": "Tanzania", "zh": "坦桑尼亚"}, {"en": "Egypt", "zh": "埃及"}, {"en": "Kenya", "zh": "肯尼亚"}], "answer": 1, "explain": {"en": "The book states Mount Kilimanjaro is located in Tanzania, near the equator.", "zh": "书里写明了乞力马扎罗山位于坦桑尼亚，靠近赤道。"}}, {"q": {"en": "How tall is Mount Kilimanjaro?", "zh": "乞力马扎罗山有多高？"}, "options": [{"en": "19,340 feet", "zh": "一万九千三百四十英尺"}, {"en": "9,000 feet", "zh": "九千英尺"}, {"en": "15,450 feet according to some versions of the story", "zh": "一万五千四百五十英尺（按书中另一种说法）"}, {"en": "12,200 feet", "zh": "一万二千二百英尺"}], "answer": 0, "explain": {"en": "The text gives the height of Mount Kilimanjaro as 19,340 feet, the tallest walkable mountain in the world.", "zh": "书里给出乞力马扎罗山的高度是一万九千三百四十英尺，是世界上最高的可步行攀登的山。"}}, {"q": {"en": "What kind of mountain is Kilimanjaro?", "zh": "乞力马扎罗山属于什么类型的山？"}, "options": [{"en": "A sandy desert", "zh": "一片沙漠"}, {"en": "The world's longest river", "zh": "世界上最长的河流"}, {"en": "A dormant volcano", "zh": "一座休眠火山"}, {"en": "An active volcano", "zh": "一座活火山"}], "answer": 2, "explain": {"en": "The book explains that Mount Kilimanjaro is actually a dormant volcano.", "zh": "书中解释说乞力马扎罗山其实是一座休眠火山。"}}, {"q": {"en": "Who was Geronimo's guide on the mountain?", "zh": "在山上，谁是杰罗尼摩的向导？"}, "options": [{"en": "Baraka", "zh": "巴拉卡"}, {"en": "Ratty Chops", "zh": "拉蒂·乔普斯"}, {"en": "Benjamin", "zh": "本杰明"}, {"en": "Bruce Hyena", "zh": "布鲁斯·海纳"}], "answer": 0, "explain": {"en": "Their guide was Baraka, a dignified-looking rodent who met them at the airport and led the climb.", "zh": "他们的向导是巴拉卡，一位神情庄重的老鼠，在机场迎接他们并带领登山。"}}, {"q": {"en": "What does the Swahili word 'Karibu' mean?", "zh": "斯瓦希里语单词‘Karibu’的意思是什么？"}, "options": [{"en": "Thank you", "zh": "谢谢"}, {"en": "Good-bye", "zh": "再见"}, {"en": "Food", "zh": "食物"}, {"en": "Welcome", "zh": "欢迎"}], "answer": 3, "explain": {"en": "When Baraka greeted them he said 'Karibu', which the book's mini-dictionary shows means 'Welcome'.", "zh": "巴拉卡迎接他们时说了‘Karibu’，书中的小词典注明这个词的意思是‘欢迎’。"}}, {"q": {"en": "What does Baraka's climbing advice 'Polepole' mean?", "zh": "向导巴拉卡的登山建议‘Polepole’是什么意思？"}, "options": [{"en": "Take a long rest", "zh": "好好休息"}, {"en": "Slow and steady", "zh": "慢而稳"}, {"en": "Turn back now", "zh": "立刻回头"}, {"en": "Very fast", "zh": "非常快"}], "answer": 1, "explain": {"en": "Baraka repeated 'Polepole' and explained it means 'slow and steady' — the only way to reach the top.", "zh": "巴拉卡反复说‘Polepole’，并解释它的意思是‘慢而稳’，这是登顶的唯一办法。"}}, {"q": {"en": "What did Bruce use to trick Geronimo in the rain forest?", "zh": "在雨林里，布鲁斯用什么捉弄了杰罗尼摩？"}, "options": [{"en": "A real leopard", "zh": "一只真豹子"}, {"en": "A chameleon", "zh": "一只变色龙"}, {"en": "Giant mosquitoes", "zh": "巨大的蚊子"}, {"en": "A rubber snake", "zh": "一条橡胶蛇"}], "answer": 3, "explain": {"en": "A rubber snake wrapped around Geronimo's neck; Bruce admitted it was made of rubber to teach him a lesson.", "zh": "一条橡胶蛇缠住了杰罗尼摩的脖子，布鲁斯承认那是橡胶做的，只是为了教训他一下。"}}, {"q": {"en": "At 9,000 feet on the first day, which huts did they reach?", "zh": "登山第一天，他们在海拔九千英尺处到达了哪座小屋？"}, "options": [{"en": "The Kibo Huts", "zh": "基博小屋"}, {"en": "The Mandara Huts", "zh": "曼达拉小屋"}, {"en": "The Horombo Huts according to some versions of the story", "zh": "霍伦博小屋（按书中另一种说法）"}, {"en": "The summit", "zh": "山顶"}], "answer": 1, "explain": {"en": "After chasing Bruce through the forest, they reached the Mandara Huts at 9,000 feet.", "zh": "在雨林里追着布鲁斯跑了一阵后，他们到达了海拔九千英尺的曼达拉小屋。"}}, {"q": {"en": "What is the name of the summit of Mount Kilimanjaro?", "zh": "乞力马扎罗山的山顶叫什么名字？"}, "options": [{"en": "Horombo Point", "zh": "霍伦博角"}, {"en": "Mandara Peak", "zh": "曼达拉峰"}, {"en": "Uhuru Peak", "zh": "乌胡鲁峰"}, {"en": "Gillman's Point", "zh": "吉尔曼角"}], "answer": 2, "explain": {"en": "Baraka pointed to 'Uhuru Peak! The summit of Mount Kilimanjaro!' at 19,340 feet. Gillman's Point is lower, at 18,638 feet.", "zh": "巴拉卡指着‘乌胡鲁峰，乞力马扎罗山的山顶！’海拔一万九千三百四十英尺。吉尔曼角更低，只有一万八千六百三十八英尺。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
