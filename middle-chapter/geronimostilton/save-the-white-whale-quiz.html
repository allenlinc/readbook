<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Save the White Whale! — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#45 · Save the White Whale!</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: Save the White Whale!</em> (Scholastic, 2005) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who is Petunia Pretty Paws in the story?", "zh": "故事里的佩图妮娅·美爪是谁？"}, "options": [{"en": "Geronimo's grandfather", "zh": "杰罗尼摩的爷爷"}, {"en": "A TV reporter who loves animals and nature", "zh": "一位热爱动物和自然的电视记者"}, {"en": "The manager of the beach hotel according to some versions of the story", "zh": "海滩旅馆的经理（按书中另一种说法）"}, {"en": "A famous whale doctor", "zh": "一位著名的鲸鱼医生"}], "answer": 1, "explain": {"en": "Petunia Pretty Paws is a TV reporter who always defends the environment, nature, and animals, and she has a crush on Geronimo.", "zh": "佩图妮娅·美爪是一位电视记者，总是保护自然环境与动物，而且她暗恋杰罗尼摩。"}}, {"q": {"en": "What name do the children give to the beached white whale?", "zh": "孩子们给那头搁浅的白鲸起了什么名字？"}, "options": [{"en": "TLC", "zh": "抱抱"}, {"en": "Sweetcakes", "zh": "甜糕"}, {"en": "Moby Dick", "zh": "莫比·迪克"}, {"en": "Hope", "zh": "希望"}], "answer": 3, "explain": {"en": "Benjamin suggests they name the whale Hope, and Petunia whispers that she hopes Hope makes it.", "zh": "本杰明建议大家给鲸鱼起名叫希望，佩图妮娅也轻声说希望它能活下来。"}}, {"q": {"en": "What kind of whale is Hope?", "zh": "希望是一头什么样的鲸鱼？"}, "options": [{"en": "An orca", "zh": "一头虎鲸"}, {"en": "An albino humpback whale", "zh": "一头白化座头鲸"}, {"en": "A sperm whale according to some versions of the story", "zh": "一头抹香鲸（按书中另一种说法）"}, {"en": "A blue whale", "zh": "一头蓝鲸"}], "answer": 1, "explain": {"en": "Petunia explains Hope is an extremely rare white humpback whale; it is white because it is an albino with no melanin.", "zh": "佩图妮娅解释说希望是一头极为罕见的白色座头鲸，它因为白化、体内没有黑色素才全身雪白。"}}, {"q": {"en": "Who took over the Whales and Tails hotel from Miss Sweetcakes?", "zh": "是谁从甜糕小姐手里接管了“海边鲸鱼与尾巴旅馆”？"}, "options": [{"en": "Bugsy Wugsy", "zh": "巴格西·武格西"}, {"en": "Phineas Filthyfur, the rude manager", "zh": "粗鲁的经理菲尼亚斯·脏毛"}, {"en": "Dr. Tina Louise Cuddlefur according to some versions of the story", "zh": "蒂娜·路易丝·抱抱毛医生（按书中另一种说法）"}, {"en": "The three old busybodies", "zh": "三位爱管闲事的老太太"}], "answer": 1, "explain": {"en": "A surly gray rat named Phineas Filthyfur is behind the desk as manager and says Miss Sweetcakes no longer runs the place.", "zh": "一只名叫菲尼亚斯·脏毛、态度粗暴的灰老鼠坐在前台当经理，并说甜糕小姐不再管理旅馆了。"}}, {"q": {"en": "What project does Geronimo start to protect the bay?", "zh": "杰罗尼摩为了保护海湾发起了什么计划？"}, "options": [{"en": "Project Save the White Whale", "zh": "拯救白鲸计划"}, {"en": "Project Catch More Fish", "zh": "多捕鱼计划"}, {"en": "Project Build a New Hotel according to some versions of the story", "zh": "建造新旅馆计划（按书中另一种说法）"}, {"en": "Project Open a Museum", "zh": "开博物馆计划"}], "answer": 0, "explain": {"en": "Geronimo publishes a special edition and launches 'Project Save the White Whale' to collect signatures making the bay a protected park.", "zh": "杰罗尼摩出版了特刊，并发起“拯救白鲸计划”，收集签名，让海湾成为受保护的公园。"}}, {"q": {"en": "Who leads the rescue team that saves the beached whale?", "zh": "是谁带领救援队救了搁浅的鲸鱼？"}, "options": [{"en": "Dr. Tina Louise Cuddlefur (Dr. TLC)", "zh": "蒂娜·路易丝·抱抱毛医生"}, {"en": "Herman Melville", "zh": "赫尔曼·梅尔维尔"}, {"en": "Miss Sweetcakes", "zh": "甜糕小姐"}, {"en": "Phineas Filthyfur according to some versions of the story", "zh": "菲尼亚斯·脏毛（按书中另一种说法）"}], "answer": 0, "explain": {"en": "Petunia's friend Dr. Tina Louise Cuddlefur, nicknamed Dr. TLC, is in charge of the rescue team and examines Hope.", "zh": "佩图妮娅的朋友蒂娜·路易丝·抱抱毛医生（绰号抱抱毛医生）负责救援队，并检查了希望的情况。"}}, {"q": {"en": "Where do Geronimo and his friends go on vacation?", "zh": "杰罗尼摩和朋友们去哪里度假？"}, "options": [{"en": "Antarctica", "zh": "南极洲"}, {"en": "Mouseport", "zh": "老鼠港"}, {"en": "The Bay of Whales", "zh": "鲸鱼湾"}, {"en": "New Mouse City according to some versions of the story", "zh": "新老鼠城（按书中另一种说法）"}], "answer": 2, "explain": {"en": "Geronimo invites Petunia to the Bay of Whales, a childhood vacation spot he used to visit with his cousins and sister.", "zh": "杰罗尼摩邀请佩图妮娅去鲸鱼湾，那是他小时候和表兄弟姐妹、妹妹一起度假的地方。"}}, {"q": {"en": "What instrument do they use to listen to the whales underwater?", "zh": "他们用什么仪器在水下听鲸鱼的声音？"}, "options": [{"en": "A megaphone", "zh": "扩音器"}, {"en": "A microscope according to some versions of the story", "zh": "显微镜（按书中另一种说法）"}, {"en": "A telescope", "zh": "望远镜"}, {"en": "A hydrophone", "zh": "水听器"}], "answer": 3, "explain": {"en": "The book explains a hydrophone, made from a microphone, battery, and recording headphones, is used to hear whales' sounds underwater.", "zh": "书中介绍说，水听器由麦克风、电池和带录音功能的耳机组成，用来听水下鲸鱼的叫声。"}}, {"q": {"en": "What does the Environmental Protection Agency finally declare the Bay of Whales to be?", "zh": "环境保护局最后把鲸鱼湾宣布成了什么？"}, "options": [{"en": "A golf course according to some versions of the story", "zh": "一座高尔夫球场（按书中另一种说法）"}, {"en": "A parking lot", "zh": "一个停车场"}, {"en": "A Protected Marine Park", "zh": "一座海洋保护公园"}, {"en": "A factory zone", "zh": "一片工厂区"}], "answer": 2, "explain": {"en": "After checking the claims, the agency declares the Bay of Whales a precious treasure and a Protected Marine Park.", "zh": "在核实情况后，环境保护局认定鲸鱼湾是珍贵的宝藏，并把它宣布为海洋保护公园。"}}, {"q": {"en": "Why is an albino animal like Hope white instead of its normal color?", "zh": "为什么像希望这样的白化动物是白色的，而不是普通颜色？"}, "options": [{"en": "Its body does not produce melanin", "zh": "因为它的身体不产生黑色素"}, {"en": "It was born in the winter according to some versions of the story", "zh": "因为它出生在冬天（按书中另一种说法）"}, {"en": "It ate too much cheese", "zh": "因为它吃了太多奶酪"}, {"en": "It swam in soapy water", "zh": "因为它在肥皂水里游过"}], "answer": 0, "explain": {"en": "Petunia explains albinos have no color in their skin because their bodies do not produce melanin.", "zh": "佩图妮娅解释说，白化动物皮肤没有颜色，是因为身体无法产生黑色素。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
