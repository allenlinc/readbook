<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Enormouse Pearl Heist — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#51 · The Enormouse Pearl Heist</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: The Enormouse Pearl Heist</em> (Scholastic, 2009) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who is the narrator telling this story?", "zh": "这本书是谁来讲故事的？"}, "options": [{"en": "Geronimo Stilton", "zh": "杰罗尼摩·斯蒂顿"}, {"en": "Thea Stilton", "zh": "蒂娅·斯蒂顿"}, {"en": "Trap Stilton", "zh": "特拉普·斯蒂顿"}, {"en": "Benjamin Stilton according to some versions of the story", "zh": "本杰明·斯蒂顿（按书中另一种说法）"}], "answer": 0, "explain": {"en": "Geronimo says, 'My name is Stilton, Geronimo Stilton. I am the editor of The Rodent's Gazette.'", "zh": "杰罗尼摩在书中自我介绍，他是《鼠民公报》的主编。"}}, {"q": {"en": "What gift does Petunia Pretty Paws bring for Geronimo?", "zh": "佩图妮娅·美爪给杰罗尼摩带来了什么礼物？"}, "options": [{"en": "A brand-new air conditioner according to some versions of the story", "zh": "一台新空调（按书中另一种说法）"}, {"en": "A scuba-diving lesson on Shell Island", "zh": "贝壳岛的潜水课程"}, {"en": "A movie ticket", "zh": "一张电影票"}, {"en": "A box of cheesecake", "zh": "一盒芝士蛋糕"}], "answer": 1, "explain": {"en": "Petunia hands Geronimo a certificate good for scuba-diving lessons on Shell Island.", "zh": "佩图妮娅递给杰罗尼摩一张贝壳岛潜水课程的证书。"}}, {"q": {"en": "Where is Shell Island located?", "zh": "贝壳岛位于哪里？"}, "options": [{"en": "In New Mouse City", "zh": "在新老鼠城"}, {"en": "In the South Mousific Ocean", "zh": "在南鼠洋"}, {"en": "In the Swiss Alps", "zh": "在瑞士阿尔卑斯山"}, {"en": "On Mouse Island itself according to some versions of the story", "zh": "在老鼠岛本岛（按书中另一种说法）"}], "answer": 1, "explain": {"en": "Petunia points to 'a tiny emerald-green spot ... in the middle of the dark-blue South Mousific Ocean.'", "zh": "佩图妮娅指着南鼠洋中那座翠绿色的小岛。"}}, {"q": {"en": "Who is the loud pilot who flies them to the island?", "zh": "是谁大声嚷嚷地驾驶飞机把他们送到岛上的？"}, "options": [{"en": "Pinch Provolone", "zh": "品奇·普罗沃洛内"}, {"en": "Captain B. Crooked Paw", "zh": "弯曲爪船长"}, {"en": "Professor Gil Fishywhiskers", "zh": "吉尔·鱼须教授"}, {"en": "Flash Pirouette", "zh": "闪电·皮鲁埃特"}], "answer": 3, "explain": {"en": "The pilot introduces himself as Flash Pirouette, who won the Mouse Island Stunt Flying Championship twice.", "zh": "飞行员自我介绍叫闪电·皮鲁埃特，曾两度赢得老鼠岛特技飞行冠军。"}}, {"q": {"en": "What do all three Provolone children wear that is the same?", "zh": "普罗沃洛内家的三个孩子都戴着什么相同的东西？"}, "options": [{"en": "Gold earrings", "zh": "金耳环"}, {"en": "Blue gloves", "zh": "蓝手套"}, {"en": "Green scarves according to some versions of the story", "zh": "绿围巾（按书中另一种说法）"}, {"en": "Red hats", "zh": "红帽子"}], "answer": 0, "explain": {"en": "Geronimo finds a gold earring in his room and remembers the Provolone children all wear gold earrings.", "zh": "杰罗尼摩在房间发现金耳环，想起普罗沃洛内家的孩子都戴金耳环。"}}, {"q": {"en": "What does Geronimo think is a 'giant blue fish' but is really something else?", "zh": "杰罗尼摩以为的“巨大的蓝鱼”，其实是什么？"}, "options": [{"en": "A friendly dolphin according to some versions of the story", "zh": "一只友好的海豚（按书中另一种说法）"}, {"en": "A small submarine", "zh": "一艘小潜艇"}, {"en": "A giant oyster called The Eye of the Ocean", "zh": "一只叫“海洋之眼”的巨型牡蛎"}, {"en": "A hungry shark", "zh": "一条饥饿的鲨鱼"}], "answer": 2, "explain": {"en": "Uncle Grayfur explains it is a huge oyster, The Eye of the Ocean, with a glowing pearl inside.", "zh": "格雷弗叔叔说那是巨型牡蛎“海洋之眼”，里面有一颗发光的珍珠。"}}, {"q": {"en": "Who comes from the New Mouse City Aquarium to help move the oyster?", "zh": "谁从新老鼠城水族馆赶来帮忙搬运牡蛎？"}, "options": [{"en": "Hercule Poirat", "zh": "赫拉克勒·波瓦"}, {"en": "Professor Gil Fishywhiskers", "zh": "吉尔·鱼须教授"}, {"en": "Grandfather William Shortpaws", "zh": "威廉·短爪爷爷"}, {"en": "Mayor Frederick Fuzzypaws", "zh": "弗雷德里克·毛毛爪市长"}], "answer": 1, "explain": {"en": "Petunia calls Professor Fishywhiskers, director of the New Mouse City Aquarium, who arrives with the proper gear.", "zh": "佩图妮娅联系了新老鼠城水族馆馆长鱼须教授，他带着装备赶来。"}}, {"q": {"en": "Which captain is secretly helping the Provolone family steal the oyster?", "zh": "哪位船长暗中勾结普罗沃洛内家企图偷走牡蛎？"}, "options": [{"en": "Uncle Grayfur", "zh": "格雷弗叔叔"}, {"en": "Flash Pirouette", "zh": "闪电·皮鲁埃特"}, {"en": "Captain B. Crooked Paw", "zh": "弯曲爪船长"}, {"en": "Simon Provolone according to some versions of the story", "zh": "西蒙·普罗沃洛内（按书中另一种说法）"}], "answer": 2, "explain": {"en": "Captain B. Crooked Paw (Old Crook) whispers with Simon and helps send a fake crate away by helicopter.", "zh": "弯曲爪船长（老骗子）和西蒙密谋，把装满假牡蛎的箱子用直升机运走。"}}, {"q": {"en": "How can you tell the real oyster from the fake one?", "zh": "怎么区分真的牡蛎和假的？"}, "options": [{"en": "The real shell has five ribs; the fake has four", "zh": "真壳有五条棱，假的有四条"}, {"en": "The real one is blue; the fake is green", "zh": "真的蓝色，假的绿色"}, {"en": "The real one glows; the fake stays dark according to some versions of the story", "zh": "真的发光，假的不发光（按书中另一种说法）"}, {"en": "The real one is small; the fake is huge", "zh": "真的很小，假的巨大"}], "answer": 0, "explain": {"en": "Benjamin says the real oyster's shell has five ribs and the fake one has only four.", "zh": "本杰明说真牡蛎壳有五条棱，假牡蛎壳只有四条。"}}, {"q": {"en": "Where do Geronimo and his family finally find the real oyster and the professor?", "zh": "杰罗尼摩一家最终在哪里找到了真牡蛎和教授？"}, "options": [{"en": "On the laboratory ship", "zh": "在实验船上"}, {"en": "Back in New Mouse City according to some versions of the story", "zh": "在新老鼠城里（按书中另一种说法）"}, {"en": "In the hotel lobby", "zh": "在酒店大堂"}, {"en": "In a cave on the west side of the beach", "zh": "海滩西侧的一个山洞里"}], "answer": 3, "explain": {"en": "Petunia's note leads them to a cave on the west side of the beach, where the crooks hold the professor and the real oyster.", "zh": "佩图妮娅的纸条指引他们到海滩西侧的山洞，坏蛋们在那里扣留了教授和真牡蛎。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
