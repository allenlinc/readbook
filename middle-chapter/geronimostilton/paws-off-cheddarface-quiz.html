<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paws Off, Cheddarface! — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#6 · Paws Off, Cheddarface!</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: Paws Off, Cheddarface!</em> (Scholastic, 2001) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who is Geronimo Stilton?", "zh": "杰罗尼摩·斯蒂顿是谁？"}, "options": [{"en": "A radio host named Simon Squealer", "zh": "名叫西蒙·叽喳的电台主持人"}, {"en": "A professional dancer at the Pawprint Theater", "zh": "爪印剧院的职业舞蹈演员"}, {"en": "The owner of a chocolate shop", "zh": "一家巧克力店的老板"}, {"en": "A best-selling author who runs The Rodent's Gazette", "zh": "一位畅销书作家，经营《啮齿动物公报》报社"}], "answer": 3, "explain": {"en": "Geronimo tells the reader he is a best-selling author and publisher of the newspaper called The Rodent's Gazette.", "zh": "杰罗尼摩在书中自我介绍为畅销书作家，也是《啮齿动物公报》的出版人。"}}, {"q": {"en": "What is the name of the mouse pretending to be Geronimo?", "zh": "假冒杰罗尼摩的那只老鼠叫什么名字？"}, "options": [{"en": "Trap, Geronimo's cousin", "zh": "赖皮，杰罗尼摩的表哥"}, {"en": "Sydney Starfur, a professional actor", "zh": "西德尼·斯塔弗，一名职业演员"}, {"en": "Benjamin, Geronimo's nephew", "zh": "本杰明，杰罗尼摩的侄子"}, {"en": "Sally Ratmousen, a newspaper rival", "zh": "莎莉·拉特莫森，报社对手"}], "answer": 1, "explain": {"en": "After the show, Geronimo and Thea find the impostor's dropped wallet with a business card reading 'Sydney Starfur, professional actor.'", "zh": "演出结束后，杰罗尼摩和蒂奥娜捡到冒名者掉落的钱包，里面的名片写着'西德尼·斯塔弗，职业演员'。"}}, {"q": {"en": "Who hired the fake Geronimo to trick everyone?", "zh": "是谁雇来假杰罗尼摩去欺骗大家的？"}, "options": [{"en": "The radio host Simon Squealer", "zh": "电台主持人西蒙·叽喳"}, {"en": "His cousin Trap", "zh": "他的表哥赖皮"}, {"en": "Sally Ratmousen, his newspaper rival", "zh": "莎莉·拉特莫森，他的报社对手"}, {"en": "His sister Thea", "zh": "他的妹妹蒂奥娜"}], "answer": 2, "explain": {"en": "Letters in the wallet show Sally Ratmousen hired Sydney Starfur to pretend to be Geronimo and steal his newspaper.", "zh": "钱包里的信件显示，莎莉·拉特莫森雇了西德尼·斯塔弗冒充杰罗尼摩，目的是抢走他的报社。"}}, {"q": {"en": "Where did the fake Geronimo put on his show?", "zh": "假杰罗尼摩在哪里登台演出？"}, "options": [{"en": "At the Fur 4 Life salon", "zh": "在毛皮永生美容院"}, {"en": "At the Pawprint Theater", "zh": "在爪印剧院"}, {"en": "At the Sleazy Fur Dance Factory", "zh": "在廉价皮毛舞厅"}, {"en": "At The Nibbler diner", "zh": "在啃咬者小餐馆"}], "answer": 1, "explain": {"en": "The poster reads 'Geronimo Stilton Live Onstage! at the Pawprint Theater 7:30 p.m.'", "zh": "海报上写着'杰罗尼摩·斯蒂顿现场登台！晚上七点半，爪印剧院'。"}}, {"q": {"en": "How old is Geronimo's favorite nephew Benjamin?", "zh": "杰罗尼摩最喜爱的侄子本杰明几岁？"}, "options": [{"en": "Nine years old", "zh": "九岁"}, {"en": "Seven years old", "zh": "七岁"}, {"en": "Five years old", "zh": "五岁"}, {"en": "Twelve years old", "zh": "十二岁"}], "answer": 0, "explain": {"en": "The book says Benjamin is only nine years old when Geronimo tries to call him at school.", "zh": "书中写到，杰罗尼摩试图打电话到学校找本杰明时，提到他只有九岁。"}}, {"q": {"en": "What did Aunt Stitchy give Geronimo on his fifth birthday?", "zh": "斯蒂奇阿姨在杰罗尼摩五岁生日时送了他什么？"}, "options": [{"en": "A solid-gold cheese holder", "zh": "一个纯金奶酪架"}, {"en": "A hideous yellow hat with cat-like ears", "zh": "一顶长着猫耳朵的难看黄帽子"}, {"en": "Cheese-scented bath salts", "zh": "奶酪香味的浴盐"}, {"en": "Chocolate cheese bites", "zh": "巧克力奶酪球"}], "answer": 1, "explain": {"en": "Thea tests Geronimo by asking this; he answers that Aunt Stitchy knit him a hideous yellow hat with cat ears.", "zh": "蒂奥娜用这个问题考验杰罗尼摩，他答出斯蒂奇阿姨曾织了一顶长猫耳朵的难看黄帽子。"}}, {"q": {"en": "What was the fake Geronimo driving when Geronimo caught up to him?", "zh": "当杰罗尼摩追上假杰罗尼摩时，他正开着什么？"}, "options": [{"en": "A SWEET SELECTS delivery truck", "zh": "一家甜点店的送货卡车"}, {"en": "A motorcycle on Blue Cheese Avenue", "zh": "蓝纹奶酪大道上的摩托车"}, {"en": "A taxi to the Pawprint Theater", "zh": "前往爪印剧院的出租车"}, {"en": "Geronimo's yellow car", "zh": "杰罗尼摩的黄色汽车"}], "answer": 3, "explain": {"en": "Geronimo hides by his hole and sees the fake arrive in a yellow car — the book says 'That rotten mouse was driving MY car!'", "zh": "杰罗尼摩躲在自家门口，看到冒名者开着一辆黄色汽车出现——书中写道'那只坏老鼠开着我的车！'"}}, {"q": {"en": "What is the name of the psychiatrist Geronimo visits?", "zh": "杰罗尼摩去看的精神科医生叫什么名字？"}, "options": [{"en": "Dr. Furry Feelgood", "zh": "毛茸茸·感觉好医生"}, {"en": "Dr. Edward S. Smugrat III", "zh": "爱德华·斯·傲慢鼠三世医生"}, {"en": "Dr. Smugrat", "zh": "傲慢鼠医生"}, {"en": "Dr. Feelgood from the Press Club", "zh": "来自新闻俱乐部的感觉好医生"}], "answer": 0, "explain": {"en": "Thea makes an appointment with Dr. Furry Feelgood, whose wall sign reads 'DON'T WORRY, KEEP SQUEAKING!'", "zh": "蒂奥娜为杰罗尼摩预约了毛茸茸·感觉好医生，他墙上的标语写着'别担心，继续吱吱叫！'"}}, {"q": {"en": "Who dresses up to look like Sally Ratmousen to get the paper back?", "zh": "为了夺回报社，谁扮成了莎莉·拉特莫森的样子？"}, "options": [{"en": "Thea, Geronimo's sister", "zh": "蒂奥娜，杰罗尼摩的妹妹"}, {"en": "Trap, Geronimo's cousin", "zh": "赖皮，杰罗尼摩的表哥"}, {"en": "Benjamin, Geronimo's nephew", "zh": "本杰明，杰罗尼摩的侄子"}, {"en": "Sydney Starfur, the actor", "zh": "西德尼·斯塔弗，那名演员"}], "answer": 1, "explain": {"en": "Benjamin's plan leads the family to disguise Trap as Sally using a makeover at the Fur 4 Life salon.", "zh": "本杰明想出主意，家人在毛皮永生美容院把赖皮化妆成莎莉的样子。"}}, {"q": {"en": "What product was Geronimo's picture used to advertise in the magazine?", "zh": "杂志里用杰罗尼摩的照片为哪种产品做了广告？"}, "options": [{"en": "A cheese measurer", "zh": "奶酪测量器"}, {"en": "A toilet called the Flusher Rat", "zh": "一种叫冲水鼠的马桶"}, {"en": "Chocolate cheese bites", "zh": "巧克力奶酪球"}, {"en": "Cheddar-scented bath salts", "zh": "切达奶酪香味的浴盐"}], "answer": 1, "explain": {"en": "Geronimo sees his picture beside an ad for the Flusher Rat toilet, with the quote 'You'll feel like a king on a throne.'", "zh": "杰罗尼摩在杂志上看到自己的照片出现在一则'冲水鼠'马桶广告旁，广告语是'你会觉得自己像坐在王座上的国王'。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
