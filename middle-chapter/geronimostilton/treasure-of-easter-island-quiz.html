<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Treasure of Easter Island — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#60 · The Treasure of Easter Island</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: The Treasure of Easter Island</em> (Scholastic, 2009) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who is the narrator and publisher of The Rodent's Gazette in this story?", "zh": "这个故事的叙述者兼《老鼠公报》的出版商是谁？"}, "options": [{"en": "Geronimo Stilton", "zh": "杰罗尼摩·斯蒂顿"}, {"en": "Trap, his cousin", "zh": "他的表哥特拉普"}, {"en": "Thea, his sister", "zh": "他的妹妹蒂娜"}, {"en": "Benjamin, his nephew", "zh": "他的侄子本杰明"}], "answer": 0, "explain": {"en": "The book opens with 'My name is Stilton, Geronimo Stilton, and I'm the publisher of The Rodent's Gazette.'", "zh": "书一开头就写道：“我叫斯蒂顿，杰罗尼摩·斯蒂顿，是《老鼠公报》的出版商。”"}}, {"q": {"en": "Who sent the strange, stinky letter to Geronimo from Easter Island?", "zh": "是谁从复活节岛给杰罗尼摩寄来那封奇怪又臭烘烘的信？"}, "options": [{"en": "His sister Thea", "zh": "他的妹妹蒂娜"}, {"en": "Susie Shuttermouse", "zh": "苏西·快门鼠"}, {"en": "Wild Willie", "zh": "野 Willie"}, {"en": "His grandfather William Shortpaws", "zh": "他的爷爷威廉·矮爪"}], "answer": 0, "explain": {"en": "Inside the stinky envelope was a letter from his sister THEA asking him to come find her.", "zh": "在那封臭信封里，是妹妹蒂娜写来的信，请他去救自己。"}}, {"q": {"en": "Why did Thea's letter smell so terrible?", "zh": "蒂娜的信为什么那么臭？"}, "options": [{"en": "She dipped it in guano (bird poop) to keep others from opening it", "zh": "她把信泡在鸟粪里，好让别人不想拆开"}, {"en": "It was written using smelly cheese", "zh": "她用臭奶酪写的"}, {"en": "It came from a garbage dump", "zh": "信来自垃圾场"}, {"en": "It was sprayed with strong perfume", "zh": "信被喷了浓香水"}], "answer": 0, "explain": {"en": "Thea wrote that she dipped the letter in guano (bird poop) so sneaky rodents would never want to open it.", "zh": "蒂娜写道，她把信泡在鸟粪里，这样爱偷看的老鼠就不想拆信了。"}}, {"q": {"en": "On Easter Island, what is an 'ahu'?", "zh": "在复活节岛上，“ahu”指的是什么？"}, "options": [{"en": "A stone platform used as a burial site", "zh": "用作墓地的石头平台"}, {"en": "A type of reed boat", "zh": "一种芦苇船"}, {"en": "A wooden tablet with carved writing", "zh": "刻有文字的木制石板"}, {"en": "A traditional dance", "zh": "一种传统舞蹈"}], "answer": 0, "explain": {"en": "Geronimo's guidebook says ahu are stone platforms used as burial sites by the ancient inhabitants.", "zh": "杰罗尼摩的旅游指南说，ahu 是古代居民用作墓地的石头平台。"}}, {"q": {"en": "Which site has the biggest ahu with its fifteen protectors?", "zh": "哪个地方有最大的 ahu 和守护它的十五尊雕像？"}, "options": [{"en": "Ahu Tongariki", "zh": "汤加里基石台"}, {"en": "Ahu Akivi", "zh": "阿卡维石台"}, {"en": "Rano Kau crater", "zh": "拉诺·考火山口"}, {"en": "Orongo", "zh": "奥龙戈"}], "answer": 0, "explain": {"en": "Vaitea says Ahu Tongariki is the biggest ahu, and Geronimo counts fifteen moai standing there.", "zh": "瓦伊蒂亚说汤加里基石台是最大的 ahu，杰罗尼摩数出那里立着十五尊摩艾雕像。"}}, {"q": {"en": "Where are the 'Seven Young Explorers' — the seven moai that face the sea?", "zh": "“七位年轻探险家”（面朝大海的七尊摩艾）在哪里？"}, "options": [{"en": "Ahu Akivi", "zh": "阿卡维石台"}, {"en": "Ahu Tongariki", "zh": "汤加里基石台"}, {"en": "Hanga Roa harbor", "zh": "杭加罗阿港"}, {"en": "Mataveri airport", "zh": "马塔韦里机场"}], "answer": 0, "explain": {"en": "Vaitea explains the seven moai facing the sea are at Ahu Akivi, representing seven young explorers from Polynesia.", "zh": "瓦伊蒂亚说面朝大海的七尊摩艾在阿卡维石台，代表来自波利尼西亚的七位年轻探险家。"}}, {"q": {"en": "Who piloted the airplane that carried the group to Easter Island?", "zh": "是谁驾驶飞机把大家送到复活节岛的？"}, "options": [{"en": "Wild Willie, an archaeologist and adventure mouse", "zh": "野 Willie，考古学家兼冒险鼠"}, {"en": "Susie Shuttermouse, the photographer", "zh": "摄影师苏西·快门鼠"}, {"en": "Vaitea, the island guide", "zh": "岛上向导瓦伊蒂亚"}, {"en": "Professor Von Dustyfur", "zh": "冯·达斯提弗教授"}], "answer": 0, "explain": {"en": "Wild Willie was flying the midnight-blue plane; he is described as an archaeologist and a true adventure mouse.", "zh": "野 Willie 驾驶着深蓝色的飞机，他被描述成考古学家和真正的冒险鼠。"}}, {"q": {"en": "What was the real 'Treasure of Rapa Nui' that Thea found?", "zh": "蒂娜找到的真正“拉帕努伊宝藏”是什么？"}, "options": [{"en": "Seven ancient reed canoes used by the young explorers", "zh": "年轻探险家用的七艘古代芦苇船"}, {"en": "A solid gold moai", "zh": "一尊纯金摩艾"}, {"en": "A chest full of gold coins", "zh": "装满金币的箱子"}, {"en": "A heap of precious pearls", "zh": "一大堆珍贵珍珠"}], "answer": 0, "explain": {"en": "Thea pointed to seven canoes woven from reeds — the ancient boats the seven explorers used to reach Easter Island.", "zh": "蒂娜指着七艘芦苇编成的船——那是七位探险家用来抵达复活节岛的古代小船。"}}, {"q": {"en": "What happened to the pirates' black ship, the Phantom of the Night?", "zh": "海盗的黑船“夜之幽灵号”最后怎么了？"}, "options": [{"en": "It sank under the heavy weight of the gold moai", "zh": "它被纯金摩艾的重量压沉了"}, {"en": "It flew up into the sky", "zh": "它飞上了天空"}, {"en": "It was captured by a helicopter", "zh": "它被直升机俘获"}, {"en": "It crashed into the volcano", "zh": "它撞进了火山"}], "answer": 0, "explain": {"en": "The gold moai was so heavy that the overloaded pirate ship sank in the bay before it could fire on the heroes.", "zh": "纯金摩艾太重，海盗船超载后还没开炮就在海湾里沉没了。"}}, {"q": {"en": "What was the name written on the side of the pirates' ship?", "zh": "海盗船侧面上写的名字是什么？"}, "options": [{"en": "Phantom of the Night", "zh": "夜之幽灵号"}, {"en": "The Rodent's Gazette", "zh": "《老鼠公报》号"}, {"en": "Wild Willie's Plane", "zh": "野 Willie 的飞机"}, {"en": "The Seven Canoes", "zh": "七艘小船号"}], "answer": 0, "explain": {"en": "The group saw the ship's name on its side: PHANTOM OF THE NIGHT, all in black including the sails.", "zh": "大家看到船侧写着的名字：夜之幽灵号，连船帆都是黑色的。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
