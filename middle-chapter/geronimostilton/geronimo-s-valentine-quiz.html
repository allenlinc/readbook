<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geronimo's Valentine — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#36 · Geronimo's Valentine</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: Geronimo's Valentine</em> (Scholastic, 2006) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who is the mouse Geronimo has a huge crush on and hopes to ask to be his valentine?", "zh": "杰罗尼摩深深暗恋、想邀请做他情人节对象的是哪只老鼠？"}, "options": [{"en": "Bugsy Wugsy, his little friend", "zh": "小虫虫，他的小朋友"}, {"en": "Petunia Pretty Paws, a TV reporter who saves the environment", "zh": "佩图尼亚·美丽爪，一位致力于环保的电视记者"}, {"en": "Sally Ratmousen, a newspaper rival according to some versions of the story", "zh": "萨莉·拉特穆森，报社对手（按书中另一种说法）"}, {"en": "Thea Stilton, his sister", "zh": "西奥·斯提尔顿，他的妹妹"}], "answer": 1, "explain": {"en": "Geronimo has a terrible crush on Petunia Pretty Paws, a TV reporter dedicated to saving the environment, and plans to ask her to be his valentine.", "zh": "杰罗尼摩痴迷地暗恋着佩图尼亚·美丽爪——一位致力于环保的电视记者，并打算在情人节邀请她做自己的对象。"}}, {"q": {"en": "What kind of mystery does Hercule Poirat phone Geronimo about on Valentine's morning?", "zh": "情人节那天早晨，赫拉克·波拉特打电话给杰罗尼摩，是为了什么谜案？"}, "options": [{"en": "A missing kitten according to some versions of the story", "zh": "一只失踪的小猫（按书中另一种说法）"}, {"en": "A bank robbery", "zh": "一起银行抢劫案"}, {"en": "A lost newspaper", "zh": "一份丢失的报纸"}, {"en": "The Cheesecake Mystery (a stolen painting)", "zh": "奶酪蛋糕谜案（一幅名画被盗）"}], "answer": 3, "explain": {"en": "Hercule calls saying he needs Geronimo's help to solve the 'CHEESECAKE MYSTERY', which turns out to be about a stolen museum painting.", "zh": "赫拉克打电话说自己需要杰罗尼摩帮忙侦破“奶酪蛋糕谜案”，后来发现其实与博物馆失窃的名画有关。"}}, {"q": {"en": "What special vehicle did Geronimo rent to impress Petunia for their date?", "zh": "为了让佩图尼亚刮目相看，杰罗尼摩租了一辆什么特别的车？"}, "options": [{"en": "A yellow banana-shaped car according to some versions of the story", "zh": "一辆黄色的香蕉形汽车（按书中另一种说法）"}, {"en": "A fresh cheese-colored convertible", "zh": "一辆崭新的奶酪色敞篷车"}, {"en": "A red taxi", "zh": "一辆红色出租车"}, {"en": "A big dump truck", "zh": "一辆大翻斗卡车"}], "answer": 1, "explain": {"en": "Besides renting a tuxedo, Geronimo also rented a fresh new cheese-colored convertible hoping Petunia would be impressed.", "zh": "除了租一套礼服，杰罗尼摩还租了一辆崭新的奶酪色敞篷车，指望能让佩图尼亚眼前一亮。"}}, {"q": {"en": "Whose prank dumped a load of mud on Geronimo from a passing dump truck?", "zh": "是谁恶作剧，让一辆路过的翻斗卡车把烂泥泼了杰罗尼摩一身？"}, "options": [{"en": "Hercule Poirat", "zh": "赫拉克·波拉特"}, {"en": "Thea Stilton", "zh": "西奥·斯提尔顿"}, {"en": "Trap Stilton", "zh": "特拉普·斯提尔顿"}, {"en": "Benjamin Stilton", "zh": "本杰明·斯提尔顿"}], "answer": 0, "explain": {"en": "A familiar face emerged from the dump truck — it was Hercule Poirat, who chuckled that he was 'so good at pulling pranks.'", "zh": "从翻斗卡车里探出一张熟悉的面孔——正是赫拉克·波拉特，他咯咯笑着说自己“最擅长搞恶作剧了”。"}}, {"q": {"en": "With the cabs and buses on strike, how did Geronimo finally get to Le Squeakery restaurant?", "zh": "出租车和公交车都在罢工，杰罗尼摩最后是怎么赶到吱吱餐厅的？"}, "options": [{"en": "He ran all the way there according to some versions of the story", "zh": "他一路跑过去的（按书中另一种说法）"}, {"en": "He hired a taxi", "zh": "他雇了一辆出租车"}, {"en": "He flew in a balloon", "zh": "他乘热气球飞过去的"}, {"en": "He pedaled his nephew Benjamin's bicycle", "zh": "他骑了侄子本杰明的自行车"}], "answer": 3, "explain": {"en": "Remembering the transit strike, Geronimo spotted Benjamin's bicycle and jumped on it, pedaling furiously to Le Squeakery.", "zh": "想到交通罢工，杰罗尼摩看到本杰明的自行车，立刻跳上去拼命蹬着赶到了吱吱餐厅。"}}, {"q": {"en": "Which famous painting was stolen from the New Mouse City Mouseum of Art?", "zh": "老鼠新城艺术博物馆里被盗的是哪幅名画？"}, "options": [{"en": "The Mona Lisa", "zh": "《蒙娜丽莎》"}, {"en": "A picture of a giant banana", "zh": "一幅巨大香蕉的画"}, {"en": "The Celebration of Chocolate Cheesecake", "zh": "《巧克力奶酪蛋糕庆典》"}, {"en": "A portrait of Squeaks Sugarhog according to some versions of the story", "zh": "一幅斯奎克斯·糖猪的肖像（按书中另一种说法）"}], "answer": 2, "explain": {"en": "Kristina Colorsnout reports that someone stole The Celebration of Chocolate Cheesecake, a famous work by Pierre Passionpaw.", "zh": "克里斯蒂娜·卡勒斯诺特说，有人偷走了皮埃尔·帕西恩波的名作《巧克力奶酪蛋糕庆典》。"}}, {"q": {"en": "In the stolen painting, what is the founder of New Mouse City offering his new bride?", "zh": "在那幅失窃的画里，老鼠新城的创始人正递给新娘什么？"}, "options": [{"en": "A bouquet of red roses according to some versions of the story", "zh": "一束红玫瑰（按书中另一种说法）"}, {"en": "A golden crown", "zh": "一顶金色王冠"}, {"en": "A sample of a brand-new dessert: chocolate cheesecake", "zh": "一份全新甜点：巧克力奶酪蛋糕"}, {"en": "A shiny diamond ring", "zh": "一枚闪亮的钻戒"}], "answer": 2, "explain": {"en": "The painting shows founder Grant Gentlemouse offering his bride Glitterfur a sample of a brand-new dessert: chocolate cheesecake.", "zh": "画中描绘创始人格兰特·绅士鼠正把一份全新甜点——巧克力奶酪蛋糕——递给新娘亮毛鼠。"}}, {"q": {"en": "What password opened the museum's secret back door to let Geronimo and Hercule inside?", "zh": "打开博物馆秘密后门、让杰罗尼摩和赫拉克进去的暗语是什么？"}, "options": [{"en": "\"Chocolate Cheesy Chews\"", "zh": "“巧克力奶酪糖”"}, {"en": "\"Banana Peels\"", "zh": "“香蕉皮”"}, {"en": "\"Happy Valentine\"", "zh": "“情人节快乐”"}, {"en": "\"Geronimo Stilton\" according to some versions of the story", "zh": "“杰罗尼摩·斯提尔顿”（按书中另一种说法）"}], "answer": 0, "explain": {"en": "When a voice asked for the password, Hercule whispered, 'Chocolate Cheesy Chews,' and the back door popped open.", "zh": "当门后传来“暗语？”的询问时，赫拉克低声说了句“巧克力奶酪糖”，后门便弹开了。"}}, {"q": {"en": "Who was really behind the theft of the painting and the mousenapping of Perky Le Mouse?", "zh": "名画失窃以及佩基·鼠小姐被绑架，真正的幕后主使是谁？"}, "options": [{"en": "Squeaks Sugarhog, the rich cheesecake factory owner", "zh": "斯奎克斯·糖猪，富有的奶酪蛋糕工厂老板"}, {"en": "Hercule Poirat the detective", "zh": "侦探赫拉克·波拉特"}, {"en": "Benjamin, Geronimo's nephew", "zh": "杰罗尼摩的侄子本杰明"}, {"en": "Kristina Colorsnout, the assistant director according to some versions of the story", "zh": "助理馆长克里斯蒂娜·卡勒斯诺特（按书中另一种说法）"}], "answer": 0, "explain": {"en": "Inside the factory's secret room, the butler admits he 'stole that painting for you,' and Squeaks Sugarhog is the mysterious, extremely rich owner who ordered it.", "zh": "在工厂的密室里，管家承认“我是为你偷了那幅画”，而斯奎克斯·糖猪就是那个下令、神秘又极其富有的工厂老板。"}}, {"q": {"en": "What secret did restorer Perky Le Mouse discover hidden under layers of paint on a rock in the corner of the painting?", "zh": "修复师佩基·鼠小姐在画角石头上的层层颜料底下，发现了什么秘密？"}, "options": [{"en": "A map to buried treasure", "zh": "一张藏宝图"}, {"en": "A recipe for the perfect chocolate cheesecake", "zh": "一份完美巧克力奶酪蛋糕的配方"}, {"en": "A love letter from the artist according to some versions of the story", "zh": "画家写的一封情书（按书中另一种说法）"}, {"en": "A tiny portrait of a mouse", "zh": "一只小老鼠的微型画像"}], "answer": 1, "explain": {"en": "Dipping a rag in turpentine, Perky removed the top paint layer and found the artist had written a recipe for the perfect chocolate cheesecake.", "zh": "佩基把布浸进松节油，擦去表层颜料，发现画家当年在画上写下了一份完美巧克力奶酪蛋糕的配方。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
