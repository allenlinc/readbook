<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Very Merry Christmas — Quiz</title>
<style>
  :root{
    --grass:#2e8b57;
    --grass-dark:#1f6b41;
    --red:#c0392b;
    --cream:#fffdf5;
    --ink:#222;
    --gold:#f1c40f;
    --mouse:#9b6a4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--grass),var(--grass-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--red);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--red);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .mouse{
    width:52px;height:44px;border-radius:50% 50% 45% 45%;
    background:#fff;margin:0 auto 12px;position:relative;
    box-shadow:0 0 0 3px #e7e7e7 inset;
  }
  .mouse::before,.mouse::after{
    content:"";position:absolute;top:-12px;width:14px;height:22px;
    background:#fff;border-radius:50% 50% 0 0;
  }
  .mouse::before{left:8px;transform:rotate(-12deg);}
  .mouse::after{right:8px;transform:rotate(12deg);}
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--grass);background:#f3fbf6;}
  .q.wrong{border-color:var(--red);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--grass);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--red);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--grass-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(192,57,43,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,57,43,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--grass-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#35 · A Very Merry Christmas</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Elisabetta Dami</p>
    <div class="mouse"></div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Geronimo Stilton: A Very Merry Christmas</em> (Scholastic, 2007) — by Elisabetta Dami</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Elisabetta Dami",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The treasure is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Elisabetta Dami",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几条线索被你漏掉了。",
    low: "该重读一遍啦！宝藏藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Where did Grandfather William decide the whole Stilton family would spend Christmas?", "zh": "威廉爷爷决定斯提尔顿全家去哪里过圣诞节？"}, "options": [{"en": "In New York City, at his friend Klondyke MacMouse's home", "zh": "在纽约，他朋友克隆戴克·麦克鼠的家里"}, {"en": "In London, England", "zh": "在英格兰的伦敦"}, {"en": "At Geronimo's mouse hole in New Mouse City according to some versions of the story", "zh": "在杰罗尼摩位于老鼠新城的鼠洞里（按书中另一种说法）"}, {"en": "At a ski resort in the mountains", "zh": "在山里的滑雪度假村"}], "answer": 0, "explain": {"en": "Grandfather announced the family would spend Christmas in New York at his best friend Klondyke MacMouse's apartment overlooking Central Park.", "zh": "爷爷宣布全家人要去纽约，在他最好的朋友克隆戴克·麦克鼠位于中央公园畔的公寓里过圣诞节。"}}, {"q": {"en": "What went wrong with Geronimo's luggage at the New York airport?", "zh": "杰罗尼摩在纽约机场的行李出了什么岔子？"}, "options": [{"en": "The airline completely lost his bag according to some versions of the story", "zh": "航空公司把他的包彻底弄丢了（按书中另一种说法）"}, {"en": "A thief stole it from the carousel", "zh": "一个小偷从行李转盘上偷走了它"}, {"en": "He left it sitting on the plane", "zh": "他把它落在了飞机上"}, {"en": "He grabbed the wrong yellow bag that looked just like his", "zh": "他拿错了一个和他的一模一样的黄色包"}], "answer": 3, "explain": {"en": "At baggage claim Geronimo grabbed a yellow bag with a bright blue tag, but it turned out to belong to Mrs. A. Smith — not his own suitcase.", "zh": "在行李领取处，杰罗尼摩抓了一个带亮蓝色标签的黄色包，可它其实属于史密斯太太，并不是他自己的行李箱。"}}, {"q": {"en": "When Geronimo had no money for the taxi, what did the driver demand as payment?", "zh": "当杰罗尼摩没钱付出租车费时，司机要求拿什么当作车费？"}, "options": [{"en": "His gold fountain pen", "zh": "他的金色钢笔"}, {"en": "His suitcase according to some versions of the story", "zh": "他的行李箱（按书中另一种说法）"}, {"en": "His wallet", "zh": "他的钱包"}, {"en": "His newspaper", "zh": "他的报纸"}], "answer": 0, "explain": {"en": "Since Geronimo had no cash, the huge cabdriver snatched his beloved gold fountain pen as payment and zoomed away.", "zh": "因为杰罗尼摩身上没有现金，那个魁梧的司机一把夺走了他心爱的金色钢笔当作车费，然后开车跑了。"}}, {"q": {"en": "By the things inside her bag, what was Mrs. A. Smith's job?", "zh": "从包里的东西来看，史密斯太太是做什么工作的？"}, "options": [{"en": "A taxi driver", "zh": "一名出租车司机"}, {"en": "A cheese maker", "zh": "一个做奶酪的人"}, {"en": "An Egyptologist who studies ancient Egypt", "zh": "研究古埃及的埃及学家"}, {"en": "A newspaper editor according to some versions of the story", "zh": "一名报纸编辑（按书中另一种说法）"}], "answer": 2, "explain": {"en": "Her bag held notebooks on ancient Egypt and an X-ray of a mummy, so Geronimo realized she was an Egyptologist.", "zh": "她的包里有关于古埃及的笔记和一具木乃伊的X光片，所以杰罗尼摩判断她是一位埃及学家。"}}, {"q": {"en": "How did Geronimo travel quickly from Columbia University to the Empire State Building?", "zh": "杰罗尼摩是怎样从哥伦比亚大学快速赶到帝国大厦的？"}, "options": [{"en": "He rented a taxi", "zh": "他租了一辆出租车"}, {"en": "He rode a skateboard he found in a garbage can", "zh": "他踩着从垃圾桶里找到的滑板"}, {"en": "He took the subway", "zh": "他坐了地铁"}, {"en": "He flew in a helicopter according to some versions of the story", "zh": "他乘直升机飞过去（按书中另一种说法）"}], "answer": 1, "explain": {"en": "Geronimo found a skateboard peeking out of a garbage can and rode it down Broadway all the way to the Empire State Building.", "zh": "杰罗尼摩从垃圾桶里发现一块滑板，踩着它沿着百老汇一路滑到了帝国大厦。"}}, {"q": {"en": "At Times Square, a famous star stepped onto the red carpet and gave Geronimo something. Who and what?", "zh": "在时代广场，一位大明星走上红毯，还送了杰罗尼摩一样东西。那是谁，送了什么？"}, "options": [{"en": "Thea gave him a book", "zh": "西奥送了他一本书"}, {"en": "Sally Ratmousen gave him cheese according to some versions of the story", "zh": "萨莉·拉特穆森送了他奶酪（按书中另一种说法）"}, {"en": "Mrs. Smith gave him a phone", "zh": "史密斯太太送了他一部手机"}, {"en": "Mouselina gave him a red rose", "zh": "大明星鼠塞莉娜送了他一朵红玫瑰"}], "answer": 3, "explain": {"en": "The movie star Mouselina stepped from a limousine, kissed Geronimo's cheek, and gave him the red rose she was holding.", "zh": "电影明星鼠塞莉娜从豪华轿车里走出来，亲了杰罗尼摩的脸颊，还把捧着的红玫瑰送给了他。"}}, {"q": {"en": "At the American Museum of Natural History, what scared Geronimo so much that he fainted?", "zh": "在美国自然历史博物馆里，是什么把杰罗尼摩吓得晕了过去？"}, "options": [{"en": "A cat", "zh": "一只猫"}, {"en": "A giant dinosaur skeleton and a model whale", "zh": "一具巨大的恐龙骨架和一个鲸鱼模型"}, {"en": "A ghost", "zh": "一个幽灵"}, {"en": "A live crocodile according to some versions of the story", "zh": "一只活鳄鱼（按书中另一种说法）"}], "answer": 1, "explain": {"en": "Hiding in a garbage can, Geronimo popped out and saw a huge dinosaur skeleton and a whale model; thinking they were real, he fainted from fright.", "zh": "杰罗尼摩躲在垃圾桶里，探出头却看见一具巨大的恐龙骨架和一个鲸鱼模型，他以为它们是真的，吓得晕了过去。"}}, {"q": {"en": "How did Geronimo earn his ferry ride out to the Statue of Liberty?", "zh": "杰罗尼摩是靠什么赚到去自由女神像的渡轮船票的？"}, "options": [{"en": "He showed his newspaper badge according to some versions of the story", "zh": "他出示了报社徽章（按书中另一种说法）"}, {"en": "He paid with his gold watch", "zh": "他用金表付了钱"}, {"en": "He scrubbed the ferry deck with a mop", "zh": "他用拖把把渡轮甲板擦得干干净净"}, {"en": "He sang a Christmas carol", "zh": "他唱了一首圣诞颂歌"}], "answer": 2, "explain": {"en": "With no money, Geronimo promised the ferry captain he would mop the deck until it shone, and the captain paid his entrance ticket in return.", "zh": "因为身无分文，杰罗尼摩向渡轮船长保证把甲板拖得锃亮，作为交换，船长替他付了入场船票。"}}, {"q": {"en": "What did 'Columb...' in Mrs. Smith's last appointment actually turn out to mean?", "zh": "史密斯太太日程表上最后一项“哥伦……”实际上指的是什么？"}, "options": [{"en": "Columbia University", "zh": "哥伦比亚大学"}, {"en": "Columbus Circle, where the MacMouses lived", "zh": "哥伦布圆环，麦克鼠一家住的地方"}, {"en": "A columbine flower shop according to some versions of the story", "zh": "一家耧斗菜花店（按书中另一种说法）"}, {"en": "Columbus, Ohio", "zh": "俄亥俄州的哥伦布市"}], "answer": 1, "explain": {"en": "Geronimo realized 'Columb' could mean Columbus Circle, one corner of Central Park — and that is exactly where the MacMouse family lived.", "zh": "杰罗尼摩恍然大悟，“哥伦”可能指哥伦布圆环——中央公园的一角，而麦克鼠一家正好住在那里。"}}, {"q": {"en": "Who was Mrs. A. Smith really?", "zh": "史密斯太太究竟是谁？"}, "options": [{"en": "Annabelle MacMouse Smith, Klondyke's daughter", "zh": "安娜贝拉·麦克鼠·史密斯，克隆戴克的女儿"}, {"en": "Thea Stilton", "zh": "西奥·斯提尔顿"}, {"en": "A stranger from the airport", "zh": "一个在机场遇到的陌生人"}, {"en": "Sally Ratmousen in disguise according to some versions of the story", "zh": "伪装起来的萨莉·拉特穆森（按书中另一种说法）"}], "answer": 0, "explain": {"en": "Mrs. A. Smith was Annabelle MacMouse Smith, Klondyke MacMouse's daughter, who had married Coconut Smith; she had Geronimo's real suitcase with the gifts.", "zh": "史密斯太太其实是安娜贝拉·麦克鼠·史密斯，克隆戴克·麦克鼠的女儿，她嫁给了椰子史密斯，而且正拿着装有礼物的杰罗尼摩的真正行李箱。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
