<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Warrior's Spirit · 猫武士 Warriors Quiz</title>
<style>
  :root{
    --forest:#2f5d3a;
    --forest-dark:#1e3f27;
    --ember:#d35400;
    --cream:#fbf7ee;
    --ink:#2a2118;
    --gold:#e0a82e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--forest),var(--forest-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--ember);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.55rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--ember);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.94;
  }
  .bookzh{margin:2px 0 0 !important;font-weight:bold;letter-spacing:1px;}
  .mark{
    width:54px;height:54px;border-radius:50%;
    background:#fff;margin:12px auto 0;
    display:flex;align-items:center;justify-content:center;
    font-size:1.8rem;
    box-shadow:0 3px 10px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--forest);background:#f3fbf6;}
  .q.wrong{border-color:var(--ember);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--ember);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--forest);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--ember);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--forest-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--ember);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(211,84,0,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(211,84,0,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--forest-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9486;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>A Warrior's Spirit</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Erin Hunter</p>
    <p class="bookzh">武士之魂</p>
    <div class="mark">✨</div>
  </header>
  <main>
    <p style="text-align:center;color:#555;font-size:.9rem;margin:-2px 0 16px;line-height:1.5">Three devoted cats' stories: Pebbleshine's Kits, Tree's Roots, and Mothwing's Secret.<br><span style="color:#a06a1f">三个忠于内心的故事：卵石光的幼崽、阿树的根源、蛾翅的秘密。</span></p>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Warriors: Novellas — A Warrior's Spirit</em> (HarperCollins)</footer>
</div>
<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Erin Hunter",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the story well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The prophecy is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Erin Hunter",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这本书。",
    ok: "不错——不过有几处细节被你漏掉了。",
    low: "该重读一遍啦！真相藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "In Pebbleshine's Kits, which Clan does Pebbleshine belong to?", "zh": "在《卵石光的幼崽》中，卵石光（Pebbleshine）属于哪个族群？"}, "options": [{"en": "RiverClan", "zh": "河族（RiverClan）"}, {"en": "SkyClan", "zh": "天族（SkyClan）"}, {"en": "ThunderClan", "zh": "雷族（ThunderClan）"}, {"en": "ShadowClan", "zh": "影族（ShadowClan）"}], "answer": 1, "explain": {"en": "Pebbleshine is a SkyClan warrior traveling with her Clan to find the lake territories.", "zh": "卵石光是天族的武士，随族群一同踏上寻找湖区的旅程。"}}, {"q": {"en": "In Pebbleshine's Kits, what happens to Pebbleshine during SkyClan's journey?", "zh": "在《卵石光的幼崽》中，天族旅途中卵石光遭遇了什么？"}, "options": [{"en": "She becomes leader", "zh": "她成了族长"}, {"en": "She is separated from her Clan", "zh": "她和族群失散了"}, {"en": "She becomes a medicine cat", "zh": "她成了巫医"}, {"en": "She leaves to become a kittypet", "zh": "她离开去当宠物猫"}], "answer": 1, "explain": {"en": "Pebbleshine is carried far away by a monster and becomes separated from SkyClan while pregnant.", "zh": "卵石光被怪兽（怪物车）带到了很远的地方，怀着孕与天族失散了。"}}, {"q": {"en": "In Pebbleshine's Kits, what danger does the pregnant Pebbleshine face that she escapes by luring it away?", "zh": "在《卵石光的幼崽》中，怀孕的卵石光遇到了什么危险，她用引开它的方式逃过一劫？"}, "options": [{"en": "A fox", "zh": "一只狐狸"}, {"en": "A badger", "zh": "一只獾"}, {"en": "A dog", "zh": "一只狗"}, {"en": "A Twoleg", "zh": "一个两脚兽"}], "answer": 1, "explain": {"en": "A badger invades her kits' den; Pebbleshine lures it away as a decoy and races to the Thunderpath to save her newborns.", "zh": "一只獾闯进小猫的窝，卵石光把自己当诱饵引开它，狂奔到雷路上保住了刚出生的孩子们。"}}, {"q": {"en": "Pebbleshine gives birth to two daughters who grow up to be known as which two cats?", "zh": "卵石光生下两只小母猫，她们长大后是哪两只著名的猫？"}, "options": [{"en": "Ivypool and Dovewing", "zh": "常春藤池（Ivypool）和鸽翅（Dovewing）"}, {"en": "Twigbranch and Violetshine", "zh": "枝毛（Twigbranch）和紫罗兰光（Violetshine）"}, {"en": "Hollyleaf and Cinderheart", "zh": "冬青叶（Hollyleaf）和炭心（Cinderheart）"}, {"en": "Ferncloud and Daisy", "zh": "蕨云（Ferncloud）和黛西（Daisy）"}], "answer": 1, "explain": {"en": "Pebbleshine is the mother of Twigbranch and Violetshine, the two sisters central to later arcs.", "zh": "卵石光是枝毛和紫罗兰光的母亲，这两姐妹在后来的故事里十分重要。"}}, {"q": {"en": "In Tree's Roots, what special ability does Tree have?", "zh": "在《阿树的根源》中，阿树（Tree）拥有什么特殊能力？"}, "options": [{"en": "He can fly", "zh": "他会飞"}, {"en": "He can see and speak with the spirits of dead cats", "zh": "他能看见并与死猫的魂魄交谈"}, {"en": "He can read other cats' thoughts", "zh": "他能读其他猫的心思"}, {"en": "He can become invisible", "zh": "他能隐身"}], "answer": 1, "explain": {"en": "Tree can see and talk to the spirits of the dead, a gift he inherits from his father's side.", "zh": "阿树能看见并和死者的魂魄说话，这份天赋继承自他的父亲一系。"}}, {"q": {"en": "In Tree's Roots, who is Tree's mother?", "zh": "在《阿树的根源》中，阿树的母亲是谁？"}, "options": [{"en": "Moonlight", "zh": "月光（Moonlight）"}, {"en": "Sasha", "zh": "莎莎（Sasha）"}, {"en": "Leafpool", "zh": "叶池（Leafpool）"}, {"en": "Millie", "zh": "米莉（Millie）"}], "answer": 0, "explain": {"en": "Tree is the son of Moonlight, a member of a roving group of cats, and he sets out to find where he belongs.", "zh": "阿树是月光（Moonlight）的儿子，属于一个四处游走的猫群，他外出寻找自己真正的归属。"}}, {"q": {"en": "In Tree's Roots, following the tradition of his group, at about what age does Tree leave his mother?", "zh": "在《阿树的根源》中，按照那个群体的传统，阿树大约几个月大时离开母亲？"}, "options": [{"en": "Three moons", "zh": "三个月"}, {"en": "Six moons", "zh": "六个月"}, {"en": "Twelve moons", "zh": "十二个月"}, {"en": "One moon", "zh": "一个月"}], "answer": 1, "explain": {"en": "Like others of his kind, Tree leaves his mother at about six moons old to strike out and find his own path.", "zh": "和同族一样，阿树在约六个月大时离开母亲，独自去闯出自己的路。"}}, {"q": {"en": "In Mothwing's Secret, which Clan is Mothwing the medicine cat of?", "zh": "在《蛾翅的秘密》中，蛾翅（Mothwing）是哪个族群的巫医？"}, "options": [{"en": "ThunderClan", "zh": "雷族（ThunderClan）"}, {"en": "RiverClan", "zh": "河族（RiverClan）"}, {"en": "ShadowClan", "zh": "影族（ShadowClan）"}, {"en": "WindClan", "zh": "风族（WindClan）"}], "answer": 1, "explain": {"en": "Mothwing serves as the medicine cat of RiverClan through several story arcs.", "zh": "蛾翅在多个故事线里都担任河族的巫医。"}}, {"q": {"en": "In Mothwing's Secret, what is unusual about Mothwing's belief?", "zh": "在《蛾翅的秘密》中，蛾翅的信仰有什么特别之处？"}, "options": [{"en": "She does not believe in StarClan", "zh": "她并不相信星族"}, {"en": "She believes in two StarClans", "zh": "她相信有两个星族"}, {"en": "She worships the moon", "zh": "她崇拜月亮"}, {"en": "She believes only in herself", "zh": "她只相信自己"}], "answer": 0, "explain": {"en": "Mothwing becomes a medicine cat though she does not believe in StarClan, keeping this secret while still helping her Clan.", "zh": "蛾翅成了巫医，却并不相信星族；她把这个秘密藏在心里，依旧尽心帮助族群。"}}, {"q": {"en": "In Mothwing's Secret, who is Mothwing's brother, a fierce RiverClan warrior who disapproved of her becoming a medicine cat?", "zh": "在《蛾翅的秘密》中，蛾翅的兄弟是谁——一位凶猛的河族武士，曾反对她当巫医？"}, "options": [{"en": "Hawkfrost", "zh": "鹰霜（Hawkfrost）"}, {"en": "Brambleclaw", "zh": "黑莓爪（Brambleclaw）"}, {"en": "Tigerstar", "zh": "虎星（Tigerstar）"}, {"en": "Crowfeather", "zh": "鸦羽（Crowfeather）"}], "answer": 0, "explain": {"en": "Hawkfrost, Mothwing's brother, was a bold new warrior and was unhappy that she chose the medicine cat path.", "zh": "鹰霜是蛾翅的兄弟，作为新晋武士十分勇猛，对妹妹选择当巫医颇为不满。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
