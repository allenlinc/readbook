<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cats of the Clans · 猫武士 Warriors Quiz</title>
<style>
  :root{
    --forest:#2f5d3a;
    --forest-dark:#1e3f27;
    --ember:#d35400;
    --cream:#fbf7ee;
    --ink:#2a2118;
    --gold:#e0a82e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--forest),var(--forest-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--ember);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.55rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--ember);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.94;
  }
  .bookzh{margin:2px 0 0 !important;font-weight:bold;letter-spacing:1px;}
  .mark{
    width:54px;height:54px;border-radius:50%;
    background:#fff;margin:12px auto 0;
    display:flex;align-items:center;justify-content:center;
    font-size:1.8rem;
    box-shadow:0 3px 10px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--forest);background:#f3fbf6;}
  .q.wrong{border-color:var(--ember);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--ember);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--forest);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--ember);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--forest-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--ember);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(211,84,0,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(211,84,0,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--forest-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9486;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>Cats of the Clans</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Erin Hunter</p>
    <p class="bookzh">族群猫</p>
    <div class="mark">🐱</div>
  </header>
  <main>
    <p style="text-align:center;color:#555;font-size:.9rem;margin:-2px 0 16px;line-height:1.5">A field guide in which a wise elder introduces the most important cats of each of the four Clans.<br><span style="color:#a06a1f">一本设定指南，由一位睿智的长老介绍四大族群中最重要的一只只猫。</span></p>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Warriors: Field Guides — Cats of the Clans</em> (HarperCollins)</footer>
</div>
<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Erin Hunter",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the story well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The prophecy is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Erin Hunter",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这本书。",
    ok: "不错——不过有几处细节被你漏掉了。",
    low: "该重读一遍啦！真相藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Cats of the Clans is narrated by a mysterious elder who knows every Clan cat. What is his name?", "zh": "《族群猫》由一位认识每一只族群猫的神秘长老讲述，他的名字是什么？"}, "options": [{"en": "Rock", "zh": "岩石（Rock）"}, {"en": "Firestar", "zh": "火心（Firestar）"}, {"en": "Yellowfang", "zh": "黄牙（Yellowfang）"}, {"en": "Bluestar", "zh": "蓝星（Bluestar）"}], "answer": 0, "explain": {"en": "The book is told from the point of view of Rock, a solitary elder who observes all the Clans.", "zh": "这本书以岩石（Rock）的视角讲述，他是一只独来独往、观察着所有族群的长老。"}}, {"q": {"en": "Which ThunderClan leader was once a kittypet named Rusty before joining the Clan?", "zh": "哪位雷族族长曾经是名叫锈斑（Rusty）的宠物猫，后来才加入族群？"}, "options": [{"en": "Firestar", "zh": "火心（Firestar）"}, {"en": "Bramblestar", "zh": "棘星（Bramblestar）"}, {"en": "Graystripe", "zh": "灰条（Graystripe）"}, {"en": "Cloudtail", "zh": "云尾（Cloudtail）"}], "answer": 0, "explain": {"en": "Firestar began life as a kittypet called Rusty before Bluestar invited him into ThunderClan.", "zh": "火心（Firestar）最初是名为锈斑的宠物猫，后来由蓝星带入雷族。"}}, {"q": {"en": "Who is Firestar's loyal best friend and fellow ThunderClan warrior?", "zh": "谁是火心最忠诚的挚友，也是雷族的同伴武士？"}, "options": [{"en": "Graystripe", "zh": "灰条（Graystripe）"}, {"en": "Brambleclaw", "zh": "荆棘爪（Brambleclaw）"}, {"en": "Thornclaw", "zh": "刺爪（Thornclaw）"}, {"en": "Brackenfur", "zh": "蕨毛（Brackenfur）"}], "answer": 0, "explain": {"en": "Graystripe has been Firestar's closest friend since they trained as apprentices together.", "zh": "灰条（Graystripe）自与火心一同作为学徒受训起，便是最亲密的朋友。"}}, {"q": {"en": "Which ThunderClan leader gave her life to lead a dog pack into the gorge, saving her Clan?", "zh": "哪位雷族族长牺牲自己的生命，把一群狗引进峡谷，从而拯救了族群？"}, "options": [{"en": "Bluestar", "zh": "蓝星（Bluestar）"}, {"en": "Firestar", "zh": "火心（Firestar）"}, {"en": "Sandstorm", "zh": "沙暴（Sandstorm）"}, {"en": "Cinderpelt", "zh": "炭毛（Cinderpelt）"}], "answer": 0, "explain": {"en": "Bluestar lured the pack of dogs over the cliff into the gorge, dying to protect ThunderClan.", "zh": "蓝星（Bluestar）把狗群引下悬崖跌入峡谷，为保护雷族而牺牲。"}}, {"q": {"en": "Which evil cat was a ThunderClan deputy who later led ShadowClan and was killed by Scourge?", "zh": "哪只恶猫曾是雷族副族长，后来成为影族族长，并被血族族长（Scourge）杀死？"}, "options": [{"en": "Tigerstar", "zh": "虎星（Tigerstar）"}, {"en": "Brokenstar", "zh": "断星（Brokenstar）"}, {"en": "Hawkfrost", "zh": "鹰霜（Hawkfrost）"}, {"en": "Scourge", "zh": "血族族长（Scourge）"}], "answer": 0, "explain": {"en": "Tigerstar betrayed ThunderClan, took over ShadowClan, and was slain by Scourge at a Gathering.", "zh": "虎星（Tigerstar）背叛雷族、夺取影族，并在一次集会上被血族族长（Scourge）杀死。"}}, {"q": {"en": "Who was the fierce leader of BloodClan who killed Tigerstar with a single blow?", "zh": "谁是血族（BloodClan）凶猛的族长，一击便杀死了虎星？"}, "options": [{"en": "Scourge", "zh": "血族族长（Scourge）"}, {"en": "Bone", "zh": "骨（Bone）"}, {"en": "Tigerstar", "zh": "虎星（Tigerstar）"}, {"en": "Firestar", "zh": "火心（Firestar）"}], "answer": 0, "explain": {"en": "Scourge, the small but deadly leader of BloodClan, ended Tigerstar's life in one strike.", "zh": "血族族长（Scourge）体型虽小却极其致命，一击就结束了虎星的性命。"}}, {"q": {"en": "Which ShadowClan medicine cat was cast out by her Clan and later served ThunderClan?", "zh": "哪位影族巫医被本族驱逐，后来为雷族效力？"}, "options": [{"en": "Yellowfang", "zh": "黄牙（Yellowfang）"}, {"en": "Cinderpelt", "zh": "炭毛（Cinderpelt）"}, {"en": "Spottedleaf", "zh": "斑叶（Spottedleaf）"}, {"en": "Leafpool", "zh": "叶池（Leafpool）"}], "answer": 0, "explain": {"en": "Yellowfang was exiled from ShadowClan and became ThunderClan's medicine cat under Bluestar.", "zh": "黄牙（Yellowfang）被影族流放，后来在蓝星手下成为雷族的巫医。"}}, {"q": {"en": "Which long-serving WindClan leader is known for guiding his Clan through many hard seasons?", "zh": "哪位风族族长任期长久，以带领族群度过许多艰难季节而闻名？"}, "options": [{"en": "Tallstar", "zh": "高星（Tallstar）"}, {"en": "Onestar", "zh": "一星（Onestar）"}, {"en": "Crowfeather", "zh": "鸦羽（Crowfeather）"}, {"en": "Heathertail", "zh": "石楠尾（Heathertail）"}], "answer": 0, "explain": {"en": "Tallstar led WindClan for many seasons and is remembered as a wise and steady leader.", "zh": "高星（Tallstar）领导风族长达许多个季节，被人们记住为一位睿智稳健的族长。"}}, {"q": {"en": "Which RiverClan leader broke his jaw as a young cat and was later named Crookedstar?", "zh": "哪位河族族长年轻时摔裂了下巴，后来被命名为裂星（Crookedstar）？"}, "options": [{"en": "Crookedstar", "zh": "裂星（Crookedstar）"}, {"en": "Oakheart", "zh": "橡心（Oakheart）"}, {"en": "Leopardstar", "zh": "豹星（Leopardstar）"}, {"en": "Mistyfoot", "zh": "雾脚（Mistyfoot）"}], "answer": 0, "explain": {"en": "As a kit, Crookedstar fell and broke his jaw, earning the name Crookedjaw before becoming leader.", "zh": "裂星（Crookedstar）还是幼猫时摔裂了下巴，在成为族长前被称为裂颚（Crookedjaw）。"}}, {"q": {"en": "Which ThunderClan medicine cat is Firestar's daughter and the sister of Squirrelflight?", "zh": "哪位雷族巫医是火心的女儿，也是松鼠飞（Squirrelflight）的姐妹？"}, "options": [{"en": "Leafpool", "zh": "叶池（Leafpool）"}, {"en": "Cinderpelt", "zh": "炭毛（Cinderpelt）"}, {"en": "Spottedleaf", "zh": "斑叶（Spottedleaf）"}, {"en": "Yellowfang", "zh": "黄牙（Yellowfang）"}], "answer": 0, "explain": {"en": "Leafpool is Firestar's daughter and Squirrelflight's sister, serving as ThunderClan's medicine cat.", "zh": "叶池（Leafpool）是火心的女儿、松鼠飞的姐妹，担任雷族的巫医。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
