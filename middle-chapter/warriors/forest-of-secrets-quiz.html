<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forest of Secrets · 猫武士 Quiz</title>
<style>
  :root{
    --forest:#2f5d3a;
    --forest-dark:#1e3f27;
    --ember:#d35400;
    --cream:#fbf7ee;
    --ink:#2a2118;
    --gold:#e0a82e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--forest),var(--forest-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--ember);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.55rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--ember);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.94;
  }
  .bookzh{margin:2px 0 0 !important;font-weight:bold;letter-spacing:1px;}
  .mark{
    width:54px;height:54px;border-radius:50%;
    background:#fff;margin:12px auto 0;
    display:flex;align-items:center;justify-content:center;
    font-size:1.8rem;
    box-shadow:0 3px 10px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--forest);background:#f3fbf6;}
  .q.wrong{border-color:var(--ember);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--ember);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--forest);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--ember);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--forest-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--ember);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(211,84,0,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(211,84,0,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--forest-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9486;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>Forest of Secrets</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Erin Hunter</p>
    <p class="bookzh">秘密森林</p>
    <div class="mark">🌲</div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Warriors: The Prophecy Begins — Forest of Secrets</em> (HarperCollins, 2003)</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Erin Hunter",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the story well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The prophecy is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Erin Hunter",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这本书。",
    ok: "不错——不过有几处细节被你漏掉了。",
    low: "该重读一遍啦！真相藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What happens to Silverstream, and what kits are born?", "zh": "银溪遭遇了什么？哪两只幼猫出生了？"}, "options": [{"en": "She dies giving birth to Featherkit and Stormkit", "zh": "她在生产羽崽和暴崽时死去"}, {"en": "She leaves with Graystripe", "zh": "她和灰条一起离开了"}, {"en": "She becomes a medicine cat", "zh": "她成了巫医"}, {"en": "She is exiled", "zh": "她被流放"}], "answer": 0, "explain": {"en": "Silverstream dies while giving birth; Graystripe brings their two half-Clan kits, Featherkit and Stormkit, to ThunderClan.", "zh": "银溪在生产时死去；灰条把两只混族幼猫羽崽和暴崽带回了雷族。"}}, {"q": {"en": "What terrible injury does Cinderpaw suffer that ends her warrior path?", "zh": "Cinderpaw 受了什么伤，断送了她的武士之路？"}, "options": [{"en": "Hit by a monster (car) on the Thunderpath", "zh": "在雷道上被怪兽（汽车）撞伤"}, {"en": "Caught in a fox trap", "zh": "被狐狸陷阱夹住"}, {"en": "Poisoned by a rival", "zh": "被对手下毒"}, {"en": "Bitten by a dog", "zh": "被狗咬伤"}], "answer": 0, "explain": {"en": "Cinderpaw is struck by a monster on the Thunderpath; her leg is ruined and she trains as medicine cat Cinderpelt.", "zh": "Cinderpaw 在雷道上被怪兽撞伤，腿废了，于是转而作巫医炭毛。"}}, {"q": {"en": "Whose kits does Bluestar reveal she secretly gave birth to?", "zh": "蓝星透露自己暗中生下的幼猫是谁？"}, "options": [{"en": "Mistyfoot and Stonefur (with Oakheart of RiverClan)", "zh": "雾脚和石毛（与河族橡心所生）"}, {"en": "Featherkit and Stormkit", "zh": "羽崽和暴崽"}, {"en": "Brightheart and Cloudtail", "zh": "亮心和云尾"}, {"en": "Swiftpaw and Longtail", "zh": "捷爪和长尾"}], "answer": 0, "explain": {"en": "Bluestar reveals her kits were fathered by Oakheart of RiverClan and grew up as Mistyfoot and Stonefur of RiverClan.", "zh": "蓝星透露她的幼猫是和河族橡心所生，后来作为雾脚和石毛在河族长大。"}}, {"q": {"en": "Who is Fireheart's kittypet sister whose kit became Cloudtail?", "zh": "火星那只家猫姐姐是谁，她的孩子成了云尾？"}, "options": [{"en": "Princess", "zh": "Princess（公主）"}, {"en": "Smudge", "zh": "Smudge（污点）"}, {"en": "Nutmeg", "zh": "Nutmeg（肉豆蔻）"}, {"en": "Cody", "zh": "Cody（科迪）"}], "answer": 0, "explain": {"en": "Princess is Fireheart's sister; she gave one of her kits to Fireheart, who brought Cloudtail into ThunderClan.", "zh": "公主是火星的姐姐，她把一只幼猫交给火星，也就是后来被带进雷族的云尾。"}}, {"q": {"en": "What shocking secret does Yellowfang reveal about Brokenstar?", "zh": "黄牙关于碎星，透露了什么惊人的秘密？"}, "options": [{"en": "She is his mother and killed him to stop his cruelty", "zh": "她是碎星的母亲，并杀了他以制止其暴行"}, {"en": "He is Bluestar's son", "zh": "他是蓝星之子"}, {"en": "He was a kittypet", "zh": "他曾是宠物猫"}, {"en": "He saved the Clan", "zh": "他拯救了族群"}], "answer": 0, "explain": {"en": "Yellowfang confesses she is Brokenstar's mother and killed him to end his evil reign over ShadowClan.", "zh": "黄牙坦白自己是碎星的母亲，并为了结束他对影族的暴政而杀了他。"}}, {"q": {"en": "Which Clan does the traitor Tigerclaw (now Tigerstar) lead by this book?", "zh": "叛徒虎掌（现为虎星）在本书中统领哪个族群？"}, "options": [{"en": "ShadowClan", "zh": "ShadowClan（影族）"}, {"en": "ThunderClan", "zh": "ThunderClan（雷族）"}, {"en": "RiverClan", "zh": "RiverClan（河族）"}, {"en": "WindClan", "zh": "WindClan（风族）"}], "answer": 0, "explain": {"en": "After being exiled from ThunderClan, Tigerclaw becomes Tigerstar, the leader of ShadowClan.", "zh": "被雷族流放后，虎掌成为虎星，当上了影族的族长。"}}, {"q": {"en": "Who kills Brokenstar, the imprisoned evil former leader?", "zh": "谁杀死了被囚禁的邪恶前任族长碎星？"}, "options": [{"en": "Yellowfang", "zh": "Yellowfang（黄牙）"}, {"en": "Fireheart", "zh": "Fireheart（火星）"}, {"en": "Tigerstar", "zh": "Tigerstar（虎星）"}, {"en": "Graystripe", "zh": "Graystripe（灰条）"}], "answer": 0, "explain": {"en": "Yellowfang kills Brokenstar in his prison to stop his plots against the Clans.", "zh": "黄牙在囚室里杀死了碎星，以阻止他继续危害各族。"}}, {"q": {"en": "What does Cinderpaw become after her injury?", "zh": "Cinderpaw 受伤后成了什么？"}, "options": [{"en": "Medicine cat apprentice (Cinderpelt)", "zh": "巫医学徒（炭毛）"}, {"en": "A warrior", "zh": "一名武士"}, {"en": "A queen", "zh": "一位猫后"}, {"en": "An elder", "zh": "一位长老"}], "answer": 0, "explain": {"en": "Unable to be a warrior, Cinderpaw trains under Yellowfang and becomes Cinderpelt, ThunderClan's medicine cat.", "zh": "无法成为武士的 Cinderpaw 跟随黄牙学习，成为了雷族巫医炭毛。"}}, {"q": {"en": "Why is this book called 'Forest of Secrets'?", "zh": "为什么这本书叫《秘密森林》？"}, "options": [{"en": "Because many hidden truths come to light (Bluestar's kits, Yellowfang's past, Tigerstar's betrayal)", "zh": "因为许多隐藏的真相被揭开（蓝星的幼猫、黄牙的过去、虎星的背叛）"}, {"en": "Because it is set in a secret part of the forest", "zh": "因为它发生在森林中隐秘的一处"}, {"en": "Because the cats hide from Twolegs", "zh": "因为猫们在躲避两脚兽"}, {"en": "Because of a hidden treasure", "zh": "因为有一笔隐藏的宝藏"}], "answer": 0, "explain": {"en": "The book uncovers several long-buried secrets that change the fate of all four Clans.", "zh": "本书揭开了几桩埋藏已久的秘密，改变了四大猫族共同的命运。"}}, {"q": {"en": "What name does Tigerclaw take after leaving ThunderClan and joining ShadowClan?", "zh": "虎掌离开雷族、加入影族后，采用了什么名号？"}, "options": [{"en": "Tigerstar", "zh": "Tigerstar（虎星）"}, {"en": "Tigerclaw (unchanged)", "zh": "仍是 Tigerclaw（虎掌）"}, {"en": "Shadowstar", "zh": "Shadowstar（影星）"}, {"en": "Brokenstar", "zh": "Brokenstar（碎星）"}], "answer": 0, "explain": {"en": "He renames himself Tigerstar and becomes the leader of ShadowClan, sharpening his plan against the other Clans.", "zh": "他改名虎星，成为影族族长，并加紧策划对付其他族群。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
