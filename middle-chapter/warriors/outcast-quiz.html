<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outcast · 猫武士 Warriors Quiz</title>
<style>
  :root{
    --forest:#2f5d3a;
    --forest-dark:#1e3f27;
    --ember:#d35400;
    --cream:#fbf7ee;
    --ink:#2a2118;
    --gold:#e0a82e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--forest),var(--forest-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--ember);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.55rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--ember);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.94;
  }
  .bookzh{margin:2px 0 0 !important;font-weight:bold;letter-spacing:1px;}
  .mark{
    width:54px;height:54px;border-radius:50%;
    background:#fff;margin:12px auto 0;
    display:flex;align-items:center;justify-content:center;
    font-size:1.8rem;
    box-shadow:0 3px 10px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--forest);background:#f3fbf6;}
  .q.wrong{border-color:var(--ember);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--ember);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--forest);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--ember);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--forest-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--ember);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(211,84,0,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(211,84,0,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--forest-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9486;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>Outcast</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Erin Hunter</p>
    <p class="bookzh">放逐之星</p>
    <div class="mark">🚫</div>
  </header>
  <main>
    <p style="text-align:center;color:#555;font-size:.9rem;margin:-2px 0 16px;line-height:1.5">The Three journey to the mountains to save the Tribe of Rushing Water from a band of outcast rogues.<br><span style="color:#a06a1f">三力量远赴山地，从一群流放者手中拯救激流部落。</span></p>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Warriors: Power of Three — Outcast</em> (HarperCollins)</footer>
</div>
<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Erin Hunter",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the story well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The prophecy is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Erin Hunter",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这本书。",
    ok: "不错——不过有几处细节被你漏掉了。",
    low: "该重读一遍啦！真相藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "In Outcast, why do the Three travel to the mountains?", "zh": "在《放逐之星》中，三力量为何要前往山地？"}, "options": [{"en": "To help the Tribe of Rushing Water in danger", "zh": "去帮助陷入危险的激流部落"}, {"en": "To find a new home", "zh": "去寻找新家园"}, {"en": "To escape ThunderClan", "zh": "为了逃离雷族"}, {"en": "To meet Sol", "zh": "去见索尔（Sol）"}], "answer": 0, "explain": {"en": "The Three journey to the mountains to aid the Tribe of Rushing Water, who are under attack.", "zh": "三力量远赴山地，是为了援助正遭袭击的激流部落。"}}, {"q": {"en": "What group of cats threatens the Tribe in Outcast?", "zh": "在《放逐之星》中，是哪群猫威胁着激流部落？"}, "options": [{"en": "A band of outcast rogues driven from the Tribe", "zh": "一群被部落驱逐的流放者（流浪猫）"}, {"en": "The four forest Clans", "zh": "森林里的四大猫族"}, {"en": "Twolegs (humans)", "zh": "两脚兽（人类）"}, {"en": "A pack of dogs", "zh": "一群狗"}], "answer": 0, "explain": {"en": "Outcasts—cats banished from the Tribe—return to attack their former home.", "zh": "一群被部落放逐的流放者杀了回来，袭击自己昔日的家园。"}}, {"q": {"en": "How does Lionblaze help the Tribe fight the outcasts?", "zh": "狮焰是怎样帮助部落对抗流放者的？"}, "options": [{"en": "He uses his unbeatable battle power", "zh": "他运用自己无法被击败的战斗力量"}, {"en": "He learns to fly", "zh": "他学会了飞"}, {"en": "He hides the Tribe's kits", "zh": "他把部落的幼崽藏起来"}, {"en": "He asks StarClan for rain", "zh": "他祈求星族降下大雨"}], "answer": 0, "explain": {"en": "Lionblaze fights without taking injury, turning the battle in the Tribe's favor.", "zh": "狮焰在战斗中毫发无伤，从而使战局倒向部落一方。"}}, {"q": {"en": "Who leads and heals the Tribe of Rushing Water?", "zh": "是谁领导并医治着激流部落？"}, "options": [{"en": "Stoneteller", "zh": "石语者（Stoneteller）"}, {"en": "The Three", "zh": "三力量（the Three）"}, {"en": "Sol", "zh": "索尔（Sol）"}, {"en": "Firestar", "zh": "火星（Firestar）"}], "answer": 0, "explain": {"en": "Stoneteller is the Tribe's leader and healer, who receives the Tribe's prophecies.", "zh": "石语者是部落的领袖兼医治者，负责接收部落的预言。"}}, {"q": {"en": "What does Jayfeather learn about the Three during the mountain visit?", "zh": "在山地之行中，松鸦羽（Jayfeather）了解到关于三力量的什么？"}, "options": [{"en": "Their powers come from the ancient cats", "zh": "他们的力量源自远古猫"}, {"en": "They are not special at all", "zh": "他们其实一点也不特殊"}, {"en": "They will become kittypets", "zh": "他们将来会变成宠物猫"}, {"en": "They must leave the Clans", "zh": "他们必须离开猫族"}], "answer": 0, "explain": {"en": "Jayfeather confirms that the Three's gift traces back to the ancient cats of the mountains.", "zh": "松鸦羽确认，三力量的天赋可以上溯到山中的远古猫。"}}, {"q": {"en": "How are the attacking outcasts finally driven off?", "zh": "来犯的流放者最终是怎样被击退的？"}, "options": [{"en": "The Three and the Tribe fight them off together", "zh": "三力量与部落并肩作战，将他们击退"}, {"en": "They drown in a river", "zh": "他们淹死在河里"}, {"en": "StarClan sends a flood", "zh": "星族降下洪水"}, {"en": "They join ThunderClan", "zh": "他们加入了雷族"}], "answer": 0, "explain": {"en": "With the Three's help, the Tribe drives the outcasts away and protects their home.", "zh": "在三力量的帮助下，部落将流放者赶走，守住了自己的家园。"}}, {"q": {"en": "What special gift helps Hollyleaf during the journey?", "zh": "在旅途中，冬青叶（Hollyleaf）凭借什么特殊天赋？"}, "options": [{"en": "She can understand plants and the forest", "zh": "她能听懂植物与森林"}, {"en": "She can fly", "zh": "她会飞"}, {"en": "She can become invisible", "zh": "她能隐身"}, {"en": "She can breathe fire", "zh": "她能喷火"}], "answer": 0, "explain": {"en": "Hollyleaf's power is to understand the living world around her—the plants, the wind, and the earth.", "zh": "冬青叶的天赋是能理解身边的生灵世界——植物、风与大地。"}}, {"q": {"en": "After helping the Tribe, what do the Three do?", "zh": "帮助部落之后，三力量做了什么？"}, "options": [{"en": "They return to the lake and their Clans", "zh": "他们返回湖边，回到各自的猫族"}, {"en": "They stay in the mountains forever", "zh": "他们永远留在山里"}, {"en": "They become Tribe cats", "zh": "他们成了部落猫"}, {"en": "They travel to the sea", "zh": "他们去了海边"}], "answer": 0, "explain": {"en": "Having aided the Tribe, the Three go back home to the lake territories.", "zh": "帮完部落后，三力量启程回到湖边领地上的家。"}}, {"q": {"en": "What secret relationship causes trouble for Lionblaze in this arc?", "zh": "在这一故事线中，狮焰的哪段隐秘关系惹来了麻烦？"}, "options": [{"en": "His secret friendship with the WindClan cat Heathertail", "zh": "他与风族猫希瑟尾（Heathertail）的秘密情谊"}, {"en": "His friendship with a kittypet", "zh": "他和一只宠物猫的友谊"}, {"en": "His bond with Firestar", "zh": "他与火星（Firestar）的情谊"}, {"en": "His training with Leafpool", "zh": "他随叶池（Leafpool）受训"}], "answer": 0, "explain": {"en": "Lionblaze's hidden meetings with Heathertail across Clan lines create conflict and guilt.", "zh": "狮焰跨越族界与希瑟尾的秘密相会，带来了冲突与愧疚。"}}, {"q": {"en": "The 'Three' in the prophecy refers to which three cats?", "zh": "预言中的「三力量」指的是哪三只猫？"}, "options": [{"en": "Lionblaze, Jayfeather, and Hollyleaf", "zh": "狮焰（Lionblaze）、松鸦羽（Jayfeather）和冬青叶（Hollyleaf）"}, {"en": "Firestar, Brambleclaw, and Squirrelflight", "zh": "火星、荆棘爪和松鼠飞"}, {"en": "Leafpool, Crowfeather, and Sol", "zh": "叶池、乌掌和索尔"}, {"en": "The three Clan leaders", "zh": "三位族长"}], "answer": 0, "explain": {"en": "The Three are the siblings Lionblaze, Jayfeather, and Hollyleaf, born with star-given powers.", "zh": "三力量是狮焰、松鸦羽和冬青叶这三只同窝手足，天生拥有星族赐予的力量。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
