<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legends of the Clans · 猫武士 Warriors Quiz</title>
<style>
  :root{
    --forest:#2f5d3a;
    --forest-dark:#1e3f27;
    --ember:#d35400;
    --cream:#fbf7ee;
    --ink:#2a2118;
    --gold:#e0a82e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--forest),var(--forest-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--ember);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.55rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--ember);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.94;
  }
  .bookzh{margin:2px 0 0 !important;font-weight:bold;letter-spacing:1px;}
  .mark{
    width:54px;height:54px;border-radius:50%;
    background:#fff;margin:12px auto 0;
    display:flex;align-items:center;justify-content:center;
    font-size:1.8rem;
    box-shadow:0 3px 10px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--forest);background:#f3fbf6;}
  .q.wrong{border-color:var(--ember);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--ember);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--forest);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--ember);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--forest-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--ember);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(211,84,0,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(211,84,0,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--forest-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9486;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>Legends of the Clans</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Erin Hunter</p>
    <p class="bookzh">族群的传说</p>
    <div class="mark">📜</div>
  </header>
  <main>
    <p style="text-align:center;color:#555;font-size:.9rem;margin:-2px 0 16px;line-height:1.5">Three stand-alone adventures: Spottedleaf's Heart, Pinestar's Choice, and Thunderstar's Echo.<br><span style="color:#a06a1f">三个独立冒险故事：斑叶的衷肠、松星的抉择、雷星的怀想。</span></p>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Warriors: Novellas — Legends of the Clans</em> (HarperCollins)</footer>
</div>
<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Erin Hunter",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the story well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The prophecy is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Erin Hunter",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这本书。",
    ok: "不错——不过有几处细节被你漏掉了。",
    low: "该重读一遍啦！真相藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "In Spottedleaf's Heart, as a young apprentice what does Spottedpaw first want to become?", "zh": "在《斑叶的衷肠》中，小时候的斑爪（Spottedpaw）最初想成为什么？"}, "options": [{"en": "A medicine cat", "zh": "巫医"}, {"en": "A warrior", "zh": "武士"}, {"en": "A queen", "zh": "猫后"}, {"en": "An elder", "zh": "长老"}], "answer": 1, "explain": {"en": "Young Spottedpaw is determined to become a warrior before duty changes her path.", "zh": "小时候的斑爪一心想当武士，后来职责改变了她的道路。"}}, {"q": {"en": "What does Spottedleaf realize she must become to save her Clan?", "zh": "斑叶最终意识到，为了拯救族群，自己必须成为什么？"}, "options": [{"en": "The next leader", "zh": "下一任族长"}, {"en": "The next medicine cat", "zh": "下一任巫医"}, {"en": "A kittypet", "zh": "一只宠物猫"}, {"en": "A loner", "zh": "一只泼皮猫"}], "answer": 1, "explain": {"en": "Spottedleaf understands that to save her Clan she must give up warrior dreams and train as the next medicine cat.", "zh": "斑叶明白，要救族群就必须放下武士梦，去受训成为下一任巫医。"}}, {"q": {"en": "Which Clan does Spottedleaf belong to?", "zh": "斑叶属于哪个族群？"}, "options": [{"en": "ThunderClan", "zh": "雷族（ThunderClan）"}, {"en": "RiverClan", "zh": "河族（RiverClan）"}, {"en": "ShadowClan", "zh": "影族（ShadowClan）"}, {"en": "WindClan", "zh": "风族（WindClan）"}], "answer": 0, "explain": {"en": "Spottedleaf is a ThunderClan medicine cat, serving her Clan loyally.", "zh": "斑叶是雷族的巫医，忠心为族群服务。"}}, {"q": {"en": "In Pinestar's Choice, what position did Pinestar hold before he left?", "zh": "在《松星的抉择》中，松星（Pinestar）离开前担任什么职务？"}, "options": [{"en": "ThunderClan leader", "zh": "雷族族长"}, {"en": "ShadowClan deputy", "zh": "影族副族长"}, {"en": "RiverClan medicine cat", "zh": "河族巫医"}, {"en": "A kittypet from birth", "zh": "出身边是宠物猫"}], "answer": 0, "explain": {"en": "Pinestar was the leader of ThunderClan before he gave up his Clan life.", "zh": "松星在放弃族群生活之前，是雷族的族长。"}}, {"q": {"en": "What did Pinestar choose to become, abandoning the warrior code?", "zh": "松星抛弃武士守则，选择成了什么？"}, "options": [{"en": "A loner in the woods", "zh": "树林里的泼皮猫"}, {"en": "A kittypet (house cat) living with Twolegs", "zh": "和两脚兽一起生活的宠物猫"}, {"en": "The leader of a new Clan", "zh": "一个新族群的族长"}, {"en": "A medicine cat", "zh": "巫医"}], "answer": 1, "explain": {"en": "Pinestar left ThunderClan to live as a kittypet, betraying the warrior code he once led.", "zh": "松星离开雷族，去当了一只宠物猫，背叛了他曾领导的武士守则。"}}, {"q": {"en": "Which ThunderClan medicine cat (from another novella) had a vision that Pinestar would one day leave to become a kittypet?", "zh": "（另一部短篇里的）哪位雷族巫医曾预见松星终将离开、去当宠物猫？"}, "options": [{"en": "Spottedleaf", "zh": "斑叶（Spottedleaf）"}, {"en": "Goosefeather", "zh": "鹅羽（Goosefeather）"}, {"en": "Yellowfang", "zh": "黄牙（Yellowfang）"}, {"en": "Cinderpelt", "zh": "炭皮（Cinderpelt）"}], "answer": 1, "explain": {"en": "At the end of Goosefeather's Curse, Goosefeather foresees that Pinestar will one day betray his Clan and become a kittypet.", "zh": "在《鹅羽的诅咒》结尾，鹅羽预见松星终将背叛族群、去当宠物猫。"}}, {"q": {"en": "In Thunderstar's Echo, who was Thunderstar?", "zh": "在《雷星的怀想》中，雷星（Thunderstar）是谁？"}, "options": [{"en": "The first leader of ThunderClan", "zh": "雷族的第一任族长"}, {"en": "The first leader of SkyClan", "zh": "天族的第一任族长"}, {"en": "A RiverClan warrior", "zh": "河族的一名武士"}, {"en": "A kittypet", "zh": "一只宠物猫"}], "answer": 0, "explain": {"en": "Thunderstar was the founder and first leader of ThunderClan in the earliest days of the Clans.", "zh": "雷星是族群黎明时期雷族的创立者，也是第一任族长。"}}, {"q": {"en": "In Thunderstar's Echo, what new threat does Thunderstar face down in the earliest days?", "zh": "在《雷星的怀想》中，雷星在族群初期面对并击退了什么新威胁？"}, "options": [{"en": "A flood", "zh": "一场洪水"}, {"en": "A new danger threatening the young Clan", "zh": "威胁新生族群的新危险"}, {"en": "A lack of prey", "zh": "猎物短缺"}, {"en": "A fire", "zh": "一场火灾"}], "answer": 1, "explain": {"en": "Thunderstar faces down a new threat to his young Clan and proves himself as its leader.", "zh": "雷星面对并击退了威胁新生族群的新危险，证明了自己作为族长的能力。"}}, {"q": {"en": "What does Thunderstar's story help create for all the warrior Clans?", "zh": "雷星的故事为所有武士族群奠定了什么？"}, "options": [{"en": "A new hunting technique", "zh": "一种新的狩猎技巧"}, {"en": "A new tradition", "zh": "一项新的传统"}, {"en": "A new territory", "zh": "一片新的领地"}, {"en": "A new code of laws", "zh": "一部新的法典"}], "answer": 1, "explain": {"en": "By facing the threat, Thunderstar forges a new tradition that all the warrior Clans come to share.", "zh": "通过直面威胁，雷星开创了一项新传统，后来被所有武士族群共同遵循。"}}, {"q": {"en": "Legends of the Clans contains three novellas. Which of these is one of them?", "zh": "《族群的传说》包含三个短篇，以下哪一个是其中之一？"}, "options": [{"en": "Mapleshade's Vengeance", "zh": "《枫荫的报复》（Mapleshade's Vengeance）"}, {"en": "Spottedleaf's Heart", "zh": "《斑叶的衷肠》（Spottedleaf's Heart）"}, {"en": "Hollyleaf's Story", "zh": "《冬青叶的故事》（Hollyleaf's Story）"}, {"en": "Cloudstar's Journey", "zh": "《云星的旅程》（Cloudstar's Journey）"}], "answer": 1, "explain": {"en": "Legends of the Clans collects Spottedleaf's Heart, Pinestar's Choice, and Thunderstar's Echo.", "zh": "《族群的传说》收录了《斑叶的衷肠》《松星的抉择》和《雷星的怀想》三个短篇。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
