<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Into the Wild · 猫武士 Warriors Quiz</title>
<style>
  :root{
    --forest:#2f5d3a;
    --forest-dark:#1e3f27;
    --ember:#d35400;
    --cream:#fbf7ee;
    --ink:#2a2118;
    --gold:#e0a82e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--forest),var(--forest-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--ember);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.55rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--ember);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.94;
  }
  .bookzh{margin:2px 0 0 !important;font-weight:bold;letter-spacing:1px;}
  .mark{
    width:54px;height:54px;border-radius:50%;
    background:#fff;margin:12px auto 0;
    display:flex;align-items:center;justify-content:center;
    font-size:1.8rem;
    box-shadow:0 3px 10px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--forest);background:#f3fbf6;}
  .q.wrong{border-color:var(--ember);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--ember);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--forest);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--ember);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--forest-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--ember);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(211,84,0,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(211,84,0,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--forest-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9486;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>Into the Wild</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Erin Hunter</p>
    <p class="bookzh">呼唤野性</p>
    <div class="mark">🔥</div>
  </header>
  <main>
    <p style="text-align:center;color:#555;font-size:.9rem;margin:-2px 0 16px;line-height:1.5">A housecat named Rusty joins ThunderClan as Firepaw — and a prophecy says fire will save the Clan. 🔥<br><span style="color:#a06a1f">家猫 Rusty 以 Firepaw 之名加入雷族——预言说，火将拯救族群。</span></p>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Warriors: The Prophecy Begins — Into the Wild</em> (HarperCollins)</footer>
</div>
<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Erin Hunter",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the story well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The prophecy is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Erin Hunter",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这本书。",
    ok: "不错——不过有几处细节被你漏掉了。",
    low: "该重读一遍啦！真相藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What is the housecat Rusty's name BEFORE he joins ThunderClan?", "zh": "家猫 Rusty 在加入雷族之前叫什么名字？"}, "options": [{"en": "Rusty", "zh": "Rusty（小锈）"}, {"en": "Firepaw", "zh": "Firepaw（火爪）"}, {"en": "Cloudtail", "zh": "Cloudtail（云尾）"}, {"en": "Scourge", "zh": "Scourge（长鞭）"}], "answer": 0, "explain": {"en": "Rusty is a kittypet (housecat) who is invited to join ThunderClan and is renamed Firepaw.", "zh": "Rusty 是一只家猫，被邀请加入雷族后改名为 Firepaw（火爪）。"}}, {"q": {"en": "Which of the four forest Clans does Rusty join?", "zh": "Rusty 加入的是森林四大猫族中的哪一个？"}, "options": [{"en": "ThunderClan", "zh": "ThunderClan（雷族）"}, {"en": "RiverClan", "zh": "RiverClan（河族）"}, {"en": "ShadowClan", "zh": "ShadowClan（影族）"}, {"en": "WindClan", "zh": "WindClan（风族）"}], "answer": 0, "explain": {"en": "He joins ThunderClan, one of the four Clans (Thunder, River, Shadow, Wind) that share the forest.", "zh": "他加入了雷族——与河族、影族、风族共享森林的四大猫族之一。"}}, {"q": {"en": "Who is Firepaw's first mentor in ThunderClan?", "zh": "Firepaw 在雷族的第一位导师是谁？"}, "options": [{"en": "Lionheart", "zh": "Lionheart（狮心）"}, {"en": "Tigerclaw", "zh": "Tigerclaw（虎掌）"}, {"en": "Bluestar", "zh": "Bluestar（蓝星）"}, {"en": "Graystripe", "zh": "Graystripe（灰条）"}], "answer": 0, "explain": {"en": "Bluestar assigns Lionheart (and Tigerclaw) to mentor Firepaw; Lionheart is his primary mentor until he dies.", "zh": "蓝星安排狮心（与虎掌）教导 Firepaw；狮心是他主要的导师，直到牺牲。"}}, {"q": {"en": "What prophecy does Spottedleaf share that points to Firepaw?", "zh": "Spottedleaf 分享的、指向 Firepaw 的预言是什么？"}, "options": [{"en": "Fire alone can save our Clan", "zh": "唯有火能拯救我们的族群"}, {"en": "Water will drown the forest", "zh": "水将淹没森林"}, {"en": "The wind will carry us home", "zh": "风将带我们回家"}, {"en": "Ice shall rule the Clan", "zh": "冰将统治族群"}], "answer": 0, "explain": {"en": "Spottedleaf's prophecy — 'Fire alone can save our Clan' — refers to the flame-colored newcomer, Firepaw.", "zh": "Spottedleaf 的预言“唯有火能拯救我们的族群”，指的就是这只火色的新成员 Firepaw。"}}, {"q": {"en": "Which ShadowClan cat kills Spottedleaf and steals the ThunderClan kits?", "zh": "哪个影族猫杀死了 Spottedleaf 并偷走了雷族的幼猫？"}, "options": [{"en": "Clawface", "zh": "Clawface（利爪）"}, {"en": "Blackfoot", "zh": "Blackfoot（黑脚）"}, {"en": "Brokenstar", "zh": "Brokenstar（碎星）"}, {"en": "Tigerclaw", "zh": "Tigerclaw（虎掌）"}], "answer": 0, "explain": {"en": "Clawface raids the camp, kills Spottedleaf the medicine cat, and carries off the four ThunderClan kits.", "zh": "利爪突袭营地，杀死了巫医斑叶，并叼走了雷族的四只幼猫。"}}, {"q": {"en": "Who is Tigerclaw's apprentice that secretly witnesses Redtail's murder?", "zh": "谁是虎掌的学徒，暗中目睹了红尾被杀？"}, "options": [{"en": "Ravenpaw", "zh": "Ravenpaw（鸦爪）"}, {"en": "Graypaw", "zh": "Graypaw（灰爪）"}, {"en": "Dustpaw", "zh": "Dustpaw（尘爪）"}, {"en": "Sandpaw", "zh": "Sandpaw（沙爪）"}], "answer": 0, "explain": {"en": "Ravenpaw sees Tigerclaw kill Redtail and is terrified into silence; he later flees to live as a kittypet.", "zh": "鸦爪亲眼看见虎掌杀死红尾，吓得不敢声张，后来逃去做了宠物猫。"}}, {"q": {"en": "Who actually killed Redtail, the ShadowClan deputy?", "zh": "真正杀死影族副族长红尾的是谁？"}, "options": [{"en": "Tigerclaw", "zh": "Tigerclaw（虎掌）"}, {"en": "Oakheart", "zh": "Oakheart（橡心）"}, {"en": "Lionheart", "zh": "Lionheart（狮心）"}, {"en": "A monster (car)", "zh": "怪兽（汽车）"}], "answer": 0, "explain": {"en": "Tigerclaw killed Redtail at the gorge and blamed Oakheart; Ravenpaw saw the truth.", "zh": "虎掌在峡谷边杀死了红尾，并嫁祸给橡心；鸦爪目睹了真相。"}}, {"q": {"en": "What is the name of the old ShadowClan medicine cat prisoner who becomes ThunderClan's medicine cat?", "zh": "那位后来成为雷族巫医的、被囚禁的老影族猫叫什么？"}, "options": [{"en": "Yellowfang", "zh": "Yellowfang（黄牙）"}, {"en": "Spottedleaf", "zh": "Spottedleaf（斑叶）"}, {"en": "Cinderpelt", "zh": "Cinderpelt（炭毛）"}, {"en": "Leopardfoot", "zh": "Leopardfoot（豹足）"}], "answer": 0, "explain": {"en": "Yellowfang, a captured ShadowClan medicine cat, stays with ThunderClan and becomes its new medicine cat.", "zh": "黄牙是被俘的影族巫医，留在雷族后成为了新的巫医。"}}, {"q": {"en": "Whose kit does Firepaw rescue and bring into ThunderClan — his own nephew?", "zh": "Firepaw 救下并带进雷族的幼猫（他的亲外甥）是谁？"}, "options": [{"en": "Cloudkit, his sister Princess's kit", "zh": "云崽，他姐姐 Princess 的孩子"}, {"en": "Brackenkit", "zh": "Brackenkit（蕨崽）"}, {"en": "Swiftkit", "zh": "Swiftkit（捷崽）"}, {"en": "Tiny", "zh": "Tiny（小不点）"}], "answer": 0, "explain": {"en": "Firepaw's kittypet sister Princess gives him one of her kits; he brings the kit (Cloudkit, later Cloudtail) to ThunderClan.", "zh": "Firepaw 的家猫姐姐 Princess 送给他一只幼猫，他把云崽（后来的云尾）带进了雷族。"}}, {"q": {"en": "What warrior name does Firepaw receive at the end of the book?", "zh": "在书末，Firepaw 获得了什么武士名？"}, "options": [{"en": "Fireheart", "zh": "Fireheart（火星）"}, {"en": "Firestorm", "zh": "Firestorm（火暴）"}, {"en": "Emberpaw", "zh": "Emberpaw（余烬爪）"}, {"en": "Flamefur", "zh": "Flamefur（焰毛）"}], "answer": 0, "explain": {"en": "Firepaw becomes the warrior Fireheart; his friend Graypaw becomes Graystripe. (Ravenpaw leaves to live as a kittypet with Barley.)", "zh": "Firepaw 成为武士火星，好友灰爪成为灰条。（鸦爪则离开，与大麦一起做了宠物猫。）"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
