<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rising Storm · 猫武士 Warriors Quiz</title>
<style>
  :root{
    --forest:#2f5d3a;
    --forest-dark:#1e3f27;
    --ember:#d35400;
    --cream:#fbf7ee;
    --ink:#2a2118;
    --gold:#e0a82e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--forest),var(--forest-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--ember);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.55rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--ember);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.94;
  }
  .bookzh{margin:2px 0 0 !important;font-weight:bold;letter-spacing:1px;}
  .mark{
    width:54px;height:54px;border-radius:50%;
    background:#fff;margin:12px auto 0;
    display:flex;align-items:center;justify-content:center;
    font-size:1.8rem;
    box-shadow:0 3px 10px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--forest);background:#f3fbf6;}
  .q.wrong{border-color:var(--ember);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--ember);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--forest);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--ember);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--forest-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--ember);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(211,84,0,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(211,84,0,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--forest-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9486;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>Rising Storm</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Erin Hunter</p>
    <p class="bookzh">风暴将临</p>
    <div class="mark">🌩️</div>
  </header>
  <main>
    <p style="text-align:center;color:#555;font-size:.9rem;margin:-2px 0 16px;line-height:1.5">A lightning fire sweeps the forest, and Bluestar's trust in her Clan begins to crack. 🌩️<br><span style="color:#a06a1f">一道闪电击燃森林大火，蓝星对族群的信任也开始崩塌。</span></p>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Warriors: The Prophecy Begins — Rising Storm</em> (HarperCollins)</footer>
</div>
<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Erin Hunter",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the story well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The prophecy is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Erin Hunter",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这本书。",
    ok: "不错——不过有几处细节被你漏掉了。",
    low: "该重读一遍啦！真相藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What natural disaster strikes the forest in this book?", "zh": "本书中森林遭遇了什么自然灾害？"}, "options": [{"en": "A forest fire (and later a flood)", "zh": "一场森林大火（以及之后的洪水）"}, {"en": "An earthquake", "zh": "地震"}, {"en": "A hurricane", "zh": "飓风"}, {"en": "Only a long drought", "zh": "仅仅是一场久旱"}], "answer": 0, "explain": {"en": "A lightning-sparked forest fire forces ThunderClan to flee; a flood follows the fire.", "zh": "闪电引发的森林大火逼雷族撤离，大火之后又来了洪水。"}}, {"q": {"en": "How does Bluestar's behavior change after the dangers her Clan faces?", "zh": "在族群历经危难后，蓝星的行为发生了什么变化？"}, "options": [{"en": "She becomes paranoid and distrustful of her Clan", "zh": "她变得多疑、不信任自己的族群"}, {"en": "She becomes kinder", "zh": "她变得更仁慈"}, {"en": "She leaves the Clan", "zh": "她离开了族群"}, {"en": "She retires as an elder", "zh": "她退为长老"}], "answer": 0, "explain": {"en": "Bluestar loses faith in her Clan and grows suspicious even of her loyal deputy, Fireheart.", "zh": "蓝星对族群失去信心，甚至开始怀疑忠诚的副族长火星。"}}, {"q": {"en": "Who is ThunderClan's medicine cat by this book?", "zh": "本书中雷族的巫医是谁？"}, "options": [{"en": "Cinderpelt", "zh": "Cinderpelt（炭毛）"}, {"en": "Spottedleaf", "zh": "Spottedleaf（斑叶）"}, {"en": "Yellowfang", "zh": "Yellowfang（黄牙）"}, {"en": "Leafpool", "zh": "Leafpool（叶池）"}], "answer": 0, "explain": {"en": "After Spottedleaf's death and Yellowfang's passing, Cinderpelt serves as ThunderClan's medicine cat.", "zh": "斑叶死后、黄牙也离去，炭毛接任雷族的巫医。"}}, {"q": {"en": "What rank does Fireheart hold during this book?", "zh": "本书中火星担任什么职位？"}, "options": [{"en": "Deputy", "zh": "Deputy（副族长）"}, {"en": "Leader", "zh": "Leader（族长）"}, {"en": "Warrior", "zh": "Warrior（武士）"}, {"en": "Medicine cat", "zh": "Medicine cat（巫医）"}], "answer": 0, "explain": {"en": "Fireheart serves as Bluestar's deputy throughout the crisis.", "zh": "在整个危机中，火星一直担任蓝星的副族长。"}}, {"q": {"en": "Which she-cat grows close to Fireheart and later becomes his mate?", "zh": "哪只母猫逐渐与火星亲近，后来成为他的伴侣？"}, "options": [{"en": "Sandstorm", "zh": "Sandstorm（沙暴）"}, {"en": "Spottedleaf", "zh": "Spottedleaf（斑叶）"}, {"en": "Cinderpelt", "zh": "Cinderpelt（炭毛）"}, {"en": "Frostfur", "zh": "Frostfur（霜毛）"}], "answer": 0, "explain": {"en": "Sandstorm and Fireheart's bond deepens across these books; she becomes his mate and close partner.", "zh": "沙暴与火星的感情在几本书中逐渐加深，后来成了他的伴侣。"}}, {"q": {"en": "What caused the great fire that threatened the Clans?", "zh": "威胁族群的这场大火是由什么引起的？"}, "options": [{"en": "A lightning strike during a storm", "zh": "风暴中的一道闪电击中"}, {"en": "Twolegs on purpose", "zh": "两脚兽故意纵火"}, {"en": "Tigerstar's trap", "zh": "虎星的陷阱"}, {"en": "A volcano", "zh": "火山"}], "answer": 0, "explain": {"en": "Lightning from the rising storm ignites the forest, giving the book its name.", "zh": "风暴中的闪电点燃了森林，这也正是书名《风暴将临》的由来。"}}, {"q": {"en": "After the fire, what second disaster hits the forest?", "zh": "大火之后，森林又遭遇了什么二次灾难？"}, "options": [{"en": "A flood", "zh": "一场洪水"}, {"en": "A blizzard", "zh": "一场暴风雪"}, {"en": "Another fire", "zh": "又一场大火"}, {"en": "A drought", "zh": "一场旱灾"}], "answer": 0, "explain": {"en": "Heavy rain after the fire swells the river and floods the low parts of the forest.", "zh": "大火过后暴雨倾盆，河水上涨，淹没了森林低洼处。"}}, {"q": {"en": "Which Clan does Tigerstar now lead and threaten the others with?", "zh": "虎星此时统领并用来威胁其他族群的，是哪个族群？"}, "options": [{"en": "ShadowClan", "zh": "ShadowClan（影族）"}, {"en": "ThunderClan", "zh": "ThunderClan（雷族）"}, {"en": "RiverClan", "zh": "RiverClan（河族）"}, {"en": "WindClan", "zh": "WindClan（风族）"}], "answer": 0, "explain": {"en": "Tigerstar rules ShadowClan and begins plotting to dominate the other three Clans.", "zh": "虎星统治着影族，并开始图谋吞并其他三个族群。"}}, {"q": {"en": "What threat begins to appear at the edges of the territory by the end of the book?", "zh": "到本书结尾，领地边缘开始出现什么威胁？"}, "options": [{"en": "A pack of dogs", "zh": "一群狗"}, {"en": "A fox", "zh": "一只狐狸"}, {"en": "BloodClan", "zh": "BloodClan（血族）"}, {"en": "Twolegs", "zh": "两脚兽"}], "answer": 0, "explain": {"en": "Tigerstar begins gathering a pack of dogs to use against ThunderClan — the danger fully erupts in the next book.", "zh": "虎星开始纠集一群狗来对付雷族——危机在下一本书中全面爆发。"}}, {"q": {"en": "How does Bluestar treat Fireheart, her loyal deputy, as her paranoia grows?", "zh": "随着蓝星愈发多疑，她如何对待忠诚的副族长火星？"}, "options": [{"en": "She distrusts him and questions his loyalty", "zh": "她不信任他，质疑他的忠诚"}, {"en": "She promotes him", "zh": "她提拔了他"}, {"en": "She makes him leader", "zh": "她让他当族长"}, {"en": "She ignores him", "zh": "她无视他"}], "answer": 0, "explain": {"en": "Convinced the Clan has betrayed her, Bluestar turns on even Fireheart, the cat most loyal to her.", "zh": "蓝星认定族群背叛了自己，连最忠诚的火星也遭到了她的猜忌。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
