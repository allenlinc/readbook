<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eclipse · 猫武士 Warriors Quiz</title>
<style>
  :root{
    --forest:#2f5d3a;
    --forest-dark:#1e3f27;
    --ember:#d35400;
    --cream:#fbf7ee;
    --ink:#2a2118;
    --gold:#e0a82e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--forest),var(--forest-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--ember);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.55rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--ember);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.94;
  }
  .bookzh{margin:2px 0 0 !important;font-weight:bold;letter-spacing:1px;}
  .mark{
    width:54px;height:54px;border-radius:50%;
    background:#fff;margin:12px auto 0;
    display:flex;align-items:center;justify-content:center;
    font-size:1.8rem;
    box-shadow:0 3px 10px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--forest);background:#f3fbf6;}
  .q.wrong{border-color:var(--ember);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--ember);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--forest);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--ember);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--forest-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--ember);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(211,84,0,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(211,84,0,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--forest-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9486;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>Eclipse</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Erin Hunter</p>
    <p class="bookzh">日蚀遮蔽</p>
    <div class="mark">🌘</div>
  </header>
  <main>
    <p style="text-align:center;color:#555;font-size:.9rem;margin:-2px 0 16px;line-height:1.5">A strange loner named Sol predicts the sun will vanish, shaking the Clans' faith in StarClan as the eclipse arrives.<br><span style="color:#a06a1f">奇怪的独行猫索尔预言太阳将消失，当日蚀降临，猫族对星族的信念开始动摇。</span></p>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Warriors: Power of Three — Eclipse</em> (HarperCollins)</footer>
</div>
<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Erin Hunter",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the story well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The prophecy is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Erin Hunter",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这本书。",
    ok: "不错——不过有几处细节被你漏掉了。",
    low: "该重读一遍啦！真相藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "In Eclipse, what does the strange loner Sol predict?", "zh": "在《日蚀遮蔽》中，奇怪的独行猫索尔（Sol）预言了什么？"}, "options": [{"en": "That the sun will go dark (an eclipse)", "zh": "太阳将会变黑（发生日蚀）"}, {"en": "That it will rain forever", "zh": "会一直下雨"}, {"en": "That the lake will dry up", "zh": "湖泊将会干涸"}, {"en": "That StarClan will send a flood", "zh": "星族会降下洪水"}], "answer": 0, "explain": {"en": "Sol foretells a solar eclipse—the sun vanishing—and blames StarClan for abandoning the Clans.", "zh": "索尔预言了一次日蚀——太阳消失——并把这归咎于星族抛弃了猫族。"}}, {"q": {"en": "What does Sol claim about StarClan during the eclipse?", "zh": "日蚀期间，索尔对星族（StarClan）作出了什么宣称？"}, "options": [{"en": "That StarClan has abandoned the Clans", "zh": "星族已经抛弃了猫族"}, {"en": "That StarClan will send more prey", "zh": "星族会带来更多猎物"}, {"en": "That StarClan wants a new leader", "zh": "星族想要一位新族长"}, {"en": "That StarClan is pleased", "zh": "星族很满意"}], "answer": 0, "explain": {"en": "Sol says the darkened sun proves StarClan has left them, shaking the cats' faith.", "zh": "索尔说变暗的太阳证明星族已经离他们而去，动摇了猫族的信念。"}}, {"q": {"en": "What actually happens to the sun in Eclipse?", "zh": "在《日蚀遮蔽》中，太阳究竟发生了什么？"}, "options": [{"en": "It goes dark for a while and then returns", "zh": "它暗了一阵，随后又恢复"}, {"en": "It never comes back", "zh": "它再没有回来"}, {"en": "It turns red forever", "zh": "它永远变成了红色"}, {"en": "It splits in two", "zh": "它一分为二"}], "answer": 0, "explain": {"en": "A real solar eclipse darkens the sky, then the sun returns—matching Sol's prediction.", "zh": "真正的日蚀让天空变暗，随后太阳回归——正应了索尔的预言。"}}, {"q": {"en": "How do many cats react to the eclipse?", "zh": "面对日蚀，许多猫作何反应？"}, "options": [{"en": "With fear and doubt about StarClan", "zh": "感到恐惧，并开始质疑星族"}, {"en": "With joy and celebration", "zh": "欢喜地庆祝"}, {"en": "With indifference", "zh": "漠不关心"}, {"en": "With a sudden desire to sleep", "zh": "突然很想睡觉"}], "answer": 0, "explain": {"en": "The sudden darkness terrifies the Clans and makes some cats doubt their ancestors.", "zh": "突如其来的黑暗吓坏了各大猫族，也让一些猫开始怀疑自己的祖先。"}}, {"q": {"en": "In dreams, who begins training Lionblaze in the Place of No Stars?", "zh": "在梦境中，是谁开始在「无星之地」（Place of No Stars）训练狮焰？"}, "options": [{"en": "Tigerstar", "zh": "虎星（Tigerstar）"}, {"en": "Firestar", "zh": "火星（Firestar）"}, {"en": "Bluestar", "zh": "蓝星（Bluestar）"}, {"en": "Sol", "zh": "索尔（Sol）"}], "answer": 0, "explain": {"en": "In the Dark Forest (Place of No Stars), the dead Tigerstar trains Lionblaze to fight.", "zh": "在黑森林（即无星之地），已故的虎星训练狮焰作战。"}}, {"q": {"en": "What is another name for the Place of No Stars where Dark Forest cats gather?", "zh": "黑森林猫聚集的「无星之地」，还有什么别的称呼？"}, "options": [{"en": "The Dark Forest", "zh": "黑森林（Dark Forest）"}, {"en": "The Moonpool", "zh": "月池（Moonpool）"}, {"en": "StarClan", "zh": "星族（StarClan）"}, {"en": "The Tribe's cave", "zh": "部落的山洞"}], "answer": 0, "explain": {"en": "The Place of No Stars is the Dark Forest, home to evil dead cats who plot against the Clans.", "zh": "无星之地就是黑森林，是心怀恶意的亡猫聚集、密谋对抗猫族之处。"}}, {"q": {"en": "What position does Jayfeather hold among the Three's powers?", "zh": "在三力量之中，松鸦羽（Jayfeather）担任什么职责？"}, "options": [{"en": "The blind medicine cat who walks in dreams", "zh": "能在梦中行走的盲眼巫医"}, {"en": "The unbeatable fighter", "zh": "无法被击败的战士"}, {"en": "The Clan leader", "zh": "猫族的族长"}, {"en": "A kittypet", "zh": "一只宠物猫"}], "answer": 0, "explain": {"en": "Jayfeather, though blind, serves as ThunderClan's medicine cat and can enter others' dreams.", "zh": "松鸦羽虽然失明，却是雷族的巫医，并能进入别的猫的梦境。"}}, {"q": {"en": "During Eclipse, what is happening between Brambleclaw and Squirrelflight?", "zh": "在《日蚀遮蔽》中，荆棘爪（Brambleclaw）和松鼠飞（Squirrelflight）之间发生了什么？"}, "options": [{"en": "Their bond is strained by secrets", "zh": "他们的关系因种种秘密而紧张"}, {"en": "They happily become mates again", "zh": "他们幸福地重新成为伴侣"}, {"en": "They join another Clan", "zh": "他们加入了别的族"}, {"en": "They become leaders", "zh": "他们成了族长"}], "answer": 0, "explain": {"en": "Secrets and Ashfur's presence strain Brambleclaw and Squirrelflight's marriage.", "zh": "秘密与灰毛的存在，让荆棘爪和松鼠飞的婚姻备受煎熬。"}}, {"q": {"en": "Where does Sol come from before arriving at the lake?", "zh": "抵达湖区之前，索尔（Sol）来自哪里？"}, "options": [{"en": "He is a loner with no Clan", "zh": "他是一只对任何猫族都毫无归属的独行猫"}, {"en": "He is a former ThunderClan leader", "zh": "他是雷族前任族长"}, {"en": "He is a Tribe cat", "zh": "他是一只部落猫"}, {"en": "He is a kittypet", "zh": "他是一只宠物猫"}], "answer": 0, "explain": {"en": "Sol is a wandering loner whose strange predictions stir up the lake's cats.", "zh": "索尔是个四处游荡的独行猫，他怪异的预言搅动了湖边众猫。"}}, {"q": {"en": "At this point in the series, what big secret about the Three is still hidden?", "zh": "在系列的这个阶段，关于三力量的哪个重大秘密仍被隐瞒？"}, "options": [{"en": "Their true parents are Leafpool and Crowfeather", "zh": "他们真正的父母是叶池（Leafpool）与乌掌（Crowfeather）"}, {"en": "They are from the mountains", "zh": "他们来自山里"}, {"en": "They are kittypets", "zh": "他们是宠物猫"}, {"en": "They have no powers", "zh": "他们根本没有任何力量"}], "answer": 0, "explain": {"en": "The Clans still believe Brambleclaw and Squirrelflight are the parents; the truth is hidden.", "zh": "猫族仍以为父母是荆棘爪和松鼠飞，真相被掩盖着。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
