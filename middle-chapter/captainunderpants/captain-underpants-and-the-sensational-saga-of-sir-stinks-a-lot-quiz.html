<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Captain Underpants and the Sensational Saga of Sir Stinks-A-Lot — Quiz</title>
<style>
  :root{
    --cu-red:#e11d48;
    --cu-blue:#2563eb;
    --cu-dark:#7f1d1d;
    --cream:#fffdf7;
    --ink:#1f2937;
    --gold:#f59e0b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Comic Sans MS","Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--cu-red),#9f1239);
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:linear-gradient(135deg,var(--cu-red),var(--cu-blue));
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:#b91c1c;
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .logo{
    width:54px;height:54px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff, #fee2e2);
    margin:0 auto 10px;display:flex;align-items:center;justify-content:center;
    font-size:1.7rem;box-shadow:0 0 0 3px rgba(255,255,255,.55) inset;
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #f3c9c9;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--cu-blue);background:#eef5ff;}
  .q.wrong{border-color:#dc2626;background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--cu-red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#fef2f2;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#fee2e2;}
  input[type=radio]{margin-right:10px;width:18px;height:18px;vertical-align:middle;accent-color:var(--cu-red);cursor:pointer;}
  label.picked{background:#fff7cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--cu-blue);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:#dc2626;}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#fff7ed;
    border-left:4px solid var(--cu-red);
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--cu-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--cu-red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(225,29,72,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(225,29,72,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--cu-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#b08a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#12 · Captain Underpants and the Sensational Saga of Sir Stinks-A-Lot</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Dav Pilkey</p>
    <div class="logo">🦸</div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Captain Underpants: Captain Underpants and the Sensational Saga of Sir Stinks-A-Lot</em> (Scholastic, 2015) — by Dav Pilkey</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Dav Pilkey",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really know your Captain Underpants trivia.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few sneaky details slipped past you.",
    low: "Time for a re-read! The answers are in the comic.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Dav Pilkey",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你完全读懂了内裤队长的搞笑冒险。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几个小细节被你漏掉了。",
    low: "该重读一遍啦！答案都藏在漫画里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "At the start of the book, who are 'Yesterday George' and 'Yesterday Harold'?", "zh": "在本书开头，“昨天的乔治”和“昨天的哈罗德”是谁？"}, "options": [{"en": "Duplicate versions they accidentally created in the last adventure", "zh": "他们在上一次冒险中意外造出的复制版自己"}, {"en": "Robots built by Melvin Sneedly", "zh": "梅尔文·斯尼德利造的机器人"}, {"en": "George and Harold's younger brothers", "zh": "乔治和哈罗德的弟弟"}, {"en": "Characters from one of their comic books", "zh": "他们某本漫画里的角色（这个系列的一些小粉丝可能会选这个。）"}], "answer": 0, "explain": {"en": "In the previous book the boys accidentally created duplicate versions of themselves, so now 'Yesterday George' and 'Yesterday Harold' take turns going to school and doing homework.", "zh": "在上本书里，两个男孩意外造出了自己的复制版，于是“昨天的乔治”和“昨天的哈罗德”轮流去上学、写作业。"}}, {"q": {"en": "How did the gym teacher Mr. Meaner suddenly become a genius?", "zh": "体育老师米纳先生是怎么突然变成天才的？"}, "options": [{"en": "He got bitten by Sulu the Bionic Hamster", "zh": "他被机器仓鼠苏鲁咬了一口（这个系列的一些小粉丝可能会选这个。）"}, {"en": "He ate a chunk of Zygo-Gogozizzle 24 from a fallen meteorite", "zh": "他吃了一块从陨石里掉出来的“齐戈-果果齐仄24”"}, {"en": "He drank the alien super-power juice", "zh": "他喝了外星超能力果汁"}, {"en": "He found a magic 3-D Hypno-Ring", "zh": "他找到了神奇的3D催眠戒指"}], "answer": 1, "explain": {"en": "A tiny piece of Zygo-Gogozizzle 24 crashed into the Piqua Valley Home for the Reality-Challenged. Mr. Meaner picked it up, chewed it ('Tastes like chicken!'), and the element rewired his brain, making him super smart.", "zh": "一小块“齐戈-果果齐仄24”砸进了“皮夸谷现实障碍疗养院”。米纳先生把它捡起来嚼了（“尝起来像鸡肉！”），这种元素重塑了他的大脑，让他变成了超级天才。"}}, {"q": {"en": "Where did the element Zygo-Gogozizzle 24 originally come from?", "zh": "“齐戈-果果齐仄24”这种元素最初来自哪里？"}, "options": [{"en": "The Moon", "zh": "月球（这个系列的一些小粉丝可能会选这个。）（你能在书里找到关于这个的线索。）"}, {"en": "Mars", "zh": "火星"}, {"en": "Smart Earth, a planet where everyone is a genius (orbits Orion's Belt)", "zh": "聪明地球——一颗人人都是天才的星球（绕着猎户座的腰带转）"}, {"en": "Uranus", "zh": "天王星"}], "answer": 2, "explain": {"en": "Smart Earth is almost identical to our Earth except everyone there is a genius because the whole planet is made of Zygo-Gogozizzle 24. A lab explosion there flung chunks of it across the galaxy.", "zh": "聪明地球跟我们的地球几乎一样，只是那里人人都是天才，因为整颗星球都由“齐戈-果果齐仄24”构成。那里的一次实验室爆炸把这东西的碎片抛向了整个星系。"}}, {"q": {"en": "What is the name of Mr. Meaner's mind-control spray?", "zh": "米纳先生的精神控制喷雾叫什么名字？"}, "options": [{"en": "Super-Secret Spray", "zh": "超级机密喷雾"}, {"en": "Wedgie Power 3000", "zh": "内裤 wedgie 力量3000"}, {"en": "Rid-O-Kid 2000™", "zh": "除娃剂2000™"}, {"en": "Zygo-Gogozizzle 24", "zh": "齐戈-果果齐仄24"}], "answer": 2, "explain": {"en": "Mr. Meaner sprayed the children with Rid-O-Kid 2000™, a formula that turned even the most unruly kid into a brainlessly obedient, model student.", "zh": "米纳先生用“除娃剂2000™”喷孩子们，这种配方能把最不听话的小孩变成毫无主见、唯命是从的模范学生。"}}, {"q": {"en": "Besides a base of sodium thiopental, what did Mr. Meaner put in his stinky formula?", "zh": "除了以硫喷妥钠为底料，米纳先生还在他那臭烘烘的配方里加了什么？"}, "options": [{"en": "Butyric acid, tryptophan, Clamato juice, filtered through stinky gym socks", "zh": "丁酸、色氨酸、蛤蜊番茄汁，还用臭运动袜过滤"}, {"en": "Milk and cookies", "zh": "牛奶和饼干"}, {"en": "Hot sauce", "zh": "辣椒酱"}, {"en": "Orange juice and water", "zh": "橙汁和水（这个系列的一些小粉丝可能会选这个。）（你能在书里找到关于这个的线索。）"}], "answer": 0, "explain": {"en": "Mr. Meaner mixed sodium thiopental with butyric acid, tryptophan, and Clamato juice, then filtered the solution through an old, dirty pile of stinky gym socks to make his mind-control potion.", "zh": "米纳先生把硫喷妥钠和丁酸、色氨酸、蛤蜊番茄汁混在一起，再用一堆又旧又脏的臭运动袜过滤，制成了他的精神控制药。"}}, {"q": {"en": "What condition do the sprayed children develop instead of their usual ADHD?", "zh": "被喷过的孩子得了什么“症状”，取代了他们原本的多动症？"}, "options": [{"en": "Common Cold Syndrome", "zh": "普通感冒综合症"}, {"en": "Obedience Disorder X", "zh": "服从障碍X"}, {"en": "ADHD (what they had before)", "zh": "多动症（他们原本就有的）（这个系列的一些小粉丝可能会选这个。）"}, {"en": "Attention Superfluous Lethargy Syndrome", "zh": "多余嗜睡注意力综合症"}], "answer": 3, "explain": {"en": "The spray reversed the boys' ADHD, giving them 'Attention Superfluous Lethargy Syndrome' — they became calm, focused, and robotically obedient model students.", "zh": "喷雾把男孩们的“多动症”反转成了“多余嗜睡注意力综合症”——他们变得安静、专注，成了机械般听话的模范学生。"}}, {"q": {"en": "Why were the ORIGINAL George and Harold NOT affected by the spray?", "zh": "为什么“原本的”乔治和哈罗德没有被喷雾影响？"}, "options": [{"en": "They wore gas masks", "zh": "他们戴了防毒面具"}, {"en": "They had colds with clogged-up noses, so they couldn't smell it", "zh": "他们感冒鼻塞，闻不到气味，所以免疫"}, {"en": "Mr. Meaner liked them too much", "zh": "米纳先生太喜欢他们了（这个系列的一些小粉丝可能会选这个。）"}, {"en": "They were actually adults", "zh": "他们其实是大人"}], "answer": 1, "explain": {"en": "George and Harold were sick with colds, so their noses were clogged and they couldn't smell the stinky spray — which made them immune to its effects.", "zh": "乔治和哈罗德感冒了，鼻子堵住闻不到那股臭味，而这恰恰让他们对喷雾免疫。"}}, {"q": {"en": "How did George and Harold sneak into the school without being recognized?", "zh": "乔治和哈罗德是怎么溜进学校而不被认出来的？"}, "options": [{"en": "They used the time-traveling Robo-Squid suit", "zh": "他们用了时光旅行机器鱿鱼服（这个系列的一些小粉丝可能会选这个。）"}, {"en": "George climbed onto Harold's shoulders and dressed as one adult", "zh": "乔治爬到哈罗德肩膀上，扮成了一个大人"}, {"en": "They wore invisibility cloaks", "zh": "他们穿了隐形斗篷"}, {"en": "They hypnotized the school guard", "zh": "他们催眠了门卫"}], "answer": 1, "explain": {"en": "After being pranked once before, they needed a disguise: George changed behind the bushes and climbed onto Harold's shoulders so the two of them looked like a single grown-up entering the building.", "zh": "有了上次的教训，他们必须伪装：乔治在灌木丛后换装，爬到哈罗德肩膀上，两个人看起来就像一个大人走进了学校。"}}, {"q": {"en": "As a prank, what did the obedient kids pour into the teachers' cars?", "zh": "作为一个恶作剧，那些听话的孩子往老师们的汽车里灌了什么？"}, "options": [{"en": "Low-fat cottage cheese", "zh": "低脂白干酪"}, {"en": "Soda", "zh": "汽水"}, {"en": "Water", "zh": "水"}, {"en": "Gasoline", "zh": "汽油（这个系列的一些小粉丝可能会选这个。）"}], "answer": 0, "explain": {"en": "Because the sprayed kids followed ANY adult's order, George's whispered commands led them to fill the teachers' cars with low-fat cottage cheese as a joke.", "zh": "因为被喷过的孩子会听从任何“大人”的命令，乔治悄悄下的指令让他们把老师们的汽车灌满了低脂白干酪来搞笑。"}}, {"q": {"en": "Unlike a typical villain, what was Mr. Meaner's real goal with Rid-O-Kid 2000™?", "zh": "和一般反派不同，米纳先生搞“除娃剂2000™”的真正目的是什么？"}, "options": [{"en": "To take over the entire planet", "zh": "统治整个地球"}, {"en": "To become the new Captain Underpants", "zh": "成为新一任内裤队长"}, {"en": "To destroy Jerome Horwitz Elementary School", "zh": "炸掉杰罗姆·霍维茨小学（这个系列的一些小粉丝可能会选这个。）"}, {"en": "To get rich selling it as a pharmaceutical product", "zh": "把它当药品卖钱、赚大钱"}], "answer": 3, "explain": {"en": "Mr. Meaner wasn't interested in world domination; he knew the real money and power was in pharmaceuticals, so he planned to mass-market his spray to parents who'd 'pay through the nose' for obedient kids.", "zh": "米纳先生对统治世界没兴趣——他明白真正的金钱和权力在制药业，所以打算把喷雾大量卖给那些愿意“花大价钱”换乖孩子的家长。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}>
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

// Delegated listener survives re-renders: any radio selection (mouse or keyboard) updates state.
qEl.addEventListener("change", e => {
  if (submitted) return;
  const inp = e.target;
  if (!inp || inp.type !== "radio") return;
  const label = inp.closest("label[data-q]");
  if (!label) return;
  const qi = +label.dataset.q;
  const oi = +label.dataset.o;
  picked[qi] = oi;
  qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l => l.classList.remove("picked"));
  label.classList.add("picked");
});

render();
</script>
</body>
</html>
