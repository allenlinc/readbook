<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Captain Underpants and the Terrifying Return of Tippy Tinkletrousers — Quiz</title>
<style>
  :root{
    --cu-red:#e11d48;
    --cu-blue:#2563eb;
    --cu-dark:#7f1d1d;
    --cream:#fffdf7;
    --ink:#1f2937;
    --gold:#f59e0b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Comic Sans MS","Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--cu-red),#9f1239);
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:linear-gradient(135deg,var(--cu-red),var(--cu-blue));
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:#b91c1c;
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .logo{
    width:54px;height:54px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff, #fee2e2);
    margin:0 auto 10px;display:flex;align-items:center;justify-content:center;
    font-size:1.7rem;box-shadow:0 0 0 3px rgba(255,255,255,.55) inset;
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #f3c9c9;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--cu-blue);background:#eef5ff;}
  .q.wrong{border-color:#dc2626;background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--cu-red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#fef2f2;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#fee2e2;}
  input[type=radio]{margin-right:10px;width:18px;height:18px;vertical-align:middle;accent-color:var(--cu-red);cursor:pointer;}
  label.picked{background:#fff7cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--cu-blue);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:#dc2626;}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#fff7ed;
    border-left:4px solid var(--cu-red);
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--cu-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--cu-red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(225,29,72,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(225,29,72,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--cu-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#b08a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#9 · Captain Underpants and the Terrifying Return of Tippy Tinkletrousers</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Dav Pilkey</p>
    <div class="logo">🦸</div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Captain Underpants: Captain Underpants and the Terrifying Return of Tippy Tinkletrousers</em> (Scholastic, 2012) — by Dav Pilkey</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Dav Pilkey",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really know your Captain Underpants trivia.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few sneaky details slipped past you.",
    low: "Time for a re-read! The answers are in the comic.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Dav Pilkey",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你完全读懂了内裤队长的搞笑冒险。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几个小细节被你漏掉了。",
    low: "该重读一遍啦！答案都藏在漫画里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "At the start of the book, why are George and Harold being taken to jail?", "zh": "故事开头，乔治和哈罗德为什么会被带去坐牢？"}, "options": [{"en": "They stole the Purple Potty", "zh": "他们偷走了紫色马桶（这个系列的一些小粉丝可能会选这个。）"}, {"en": "Police think they robbed a bank with Captain Underpants", "zh": "警察以为他们和内裤队长一起抢了银行"}, {"en": "They hypnotized Mr. Krupp", "zh": "他们催眠了克拉普先生"}, {"en": "They blew up the school", "zh": "他们炸了学校"}], "answer": 1, "explain": {"en": "Surveillance photos showed the boys 'robbing a bank with Captain Underpants,' but it was really their evil twins from another dimension who did it.", "zh": "监控照片显示两个男孩“和内裤队长一起抢银行”，但其实干这事的是另一个维度的邪恶双胞胎。"}}, {"q": {"en": "What is the name of the time-travel danger explained with a banana cream pie?", "zh": "书中用香蕉奶油派解释的那种时光旅行危险叫什么？"}, "options": [{"en": "The Banana Cream Pie Paradox", "zh": "香蕉奶油派悖论"}, {"en": "The Hypno-Ring Paradox", "zh": "催眠戒指悖论"}, {"en": "The Purple Potty Paradox", "zh": "紫色马桶悖论（这个系列的一些小粉丝可能会选这个。）"}, {"en": "The Freezy-Beam Paradox", "zh": "冰冻射线悖论"}], "answer": 0, "explain": {"en": "The 'Banana Cream Pie Paradox' shows how one small change in the past (a pie in a face) can snowball and change the future, even destroying the planet.", "zh": "“香蕉奶油派悖论”说明过去一个小小的改变（脸上被砸了一派）会像滚雪球一样改变未来，甚至毁掉整个地球。"}}, {"q": {"en": "Before calling himself Tippy Tinkletrousers, what was this villain's earlier name?", "zh": "在自称“蒂皮·叮当裤”之前，这个反派原本叫什么？"}, "options": [{"en": "Dr. Diaper", "zh": "尿布博士"}, {"en": "Mr. Krupp", "zh": "克拉普先生"}, {"en": "Melvin Sneedly", "zh": "梅尔文·斯尼德利（这个系列的一些小粉丝可能会选这个。）"}, {"en": "Professor Poopypants", "zh": "poopypants 教授"}], "answer": 3, "explain": {"en": "Mr. Krupp recognizes him: 'You're that Professor Poopypants guy.' Tippy replies that was a ridiculous name, so he changed it to Tippy Tinkletrousers.", "zh": "克拉普先生认出了他：“你就是那个 poopypants 教授。”蒂皮说那名字太傻了，所以改成了“蒂皮·叮当裤”。"}}, {"q": {"en": "What is the name of Tippy's freezing weapon?", "zh": "蒂皮那件能让人冻住的武器叫什么？"}, "options": [{"en": "The Hypno-Blaster", "zh": "催眠冲击波"}, {"en": "The Wedgie Ray", "zh": "内裤 wedgie 射线"}, {"en": "The Freezy-Beam 4000", "zh": "冰冻射线4000"}, {"en": "The Laser-Matic 2000", "zh": "激光机2000（这个系列的一些小粉丝可能会选这个。）"}], "answer": 2, "explain": {"en": "Tippy's Robo-Suit fires the Freezy-Beam 4000, which temporarily freezes whatever it zaps for as long as he chooses.", "zh": "蒂皮的机器人战衣发射“冰冻射线4000”，能把他照到的人或物按他设定的时长冻住。"}}, {"q": {"en": "At the Juvenile Detention Center, how does Mr. Krupp turn into Captain Underpants?", "zh": "在少年管教所，克拉普先生是怎么变回内裤队长的？"}, "options": [{"en": "He drinks Super Power Juice", "zh": "他喝了超能力果汁"}, {"en": "Tippy zaps him", "zh": "蒂皮用射线照他"}, {"en": "George and Harold snap their fingers", "zh": "乔治和哈罗德打了个响指"}, {"en": "Water splashes on him", "zh": "有水泼到他身上"}], "answer": 0, "explain": {"en": "Almost without thinking, George and Harold reached out and snapped their fingers, and Mr. Krupp transformed into Captain Underpants.", "zh": "乔治和哈罗德几乎不假思索地伸手打了个响指，克拉普先生当场变成了内裤队长。"}}, {"q": {"en": "Where does Captain Underpants go to get a cape?", "zh": "内裤队长去哪里弄到了他的披风？"}, "options": [{"en": "The police station", "zh": "警察局"}, {"en": "The prison", "zh": "监狱"}, {"en": "A shopping center having a cape sale", "zh": "一家正在卖披风的购物中心"}, {"en": "The school library", "zh": "学校图书馆（这个系列的一些小粉丝可能会选这个。）"}], "answer": 2, "explain": {"en": "Captain Underpants flew to a nearby shopping center (having its Semiannual Lazy Storytelling Sale) and found a cape in aisle thirty-nine.", "zh": "内裤队长飞到附近一家购物中心（正在搞“半年一度懒人讲故事大减价”），在第39排货架找到了披风。"}}, {"q": {"en": "In the flashback, who is the biggest bully at Jerome Horwitz Elementary who steals Harold's lunch money?", "zh": "在回忆里，杰罗姆·霍维茨小学里抢走哈罗德午餐钱的头号恶霸是谁？"}, "options": [{"en": "Bugg", "zh": "巴格"}, {"en": "Kipper Krupp", "zh": "基珀·克拉普"}, {"en": "Finkstein", "zh": "芬克斯坦（这个系列的一些小粉丝可能会选这个。）"}, {"en": "Loogie", "zh": "卢吉"}], "answer": 1, "explain": {"en": "Kipper Krupp was the biggest, meanest kid and nephew of the principal; every day he and his friends stole lunch money from the kindergartners.", "zh": "基珀·克拉普是最凶的大孩子，也是校长的侄子；他天天带着跟班抢幼儿园小孩的午餐钱。"}}, {"q": {"en": "What does George change the gas station sign to say, causing an uproar?", "zh": "乔治把加油站的牌子改成了什么，从而引发了一场骚动？"}, "options": [{"en": "FREE BRA INSPECTION", "zh": "免费胸罩检查"}, {"en": "FREE PIE INSPECTION", "zh": "免费派检查"}, {"en": "FREE BIKE INSPECTION", "zh": "免费自行车检查"}, {"en": "FREE BRAKE INSPECTION", "zh": "免费刹车检查"}], "answer": 0, "explain": {"en": "George removed the letters 'k' and 'e' from 'BRAKE,' turning 'FREE BRAKE INSPECTION' into 'FREE BRA INSPECTION,' which made angry women protest.", "zh": "乔治把“刹车(brake)”里的 k 和 e 拿掉，招牌变成“免费胸罩(bra)检查”，气得一群女士当场抗议。"}}, {"q": {"en": "In the 'real' ending of the last adventure, how long were George, Harold, and Mr. Krupp sentenced to prison?", "zh": "在“真正”的结局里，乔治、哈罗德和克拉普先生各被判了多少年监禁？"}, "options": [{"en": "Five years", "zh": "五年"}, {"en": "Ten years", "zh": "十年"}, {"en": "One year", "zh": "一年"}, {"en": "Life", "zh": "终身"}], "answer": 1, "explain": {"en": "Without Tippy's interruption, the three were found guilty and each sentenced to ten years in the Piqua State Penitentiary.", "zh": "如果没有蒂皮插手，三人会被判有罪，各被判十年，关进皮夸州立监狱。"}}, {"q": {"en": "After Captain Underpants splits his Robo-Suit in two, what does Tippy escape in?", "zh": "内裤队长把机器人战衣扯成两半后，蒂皮逃进了哪一半？"}, "options": [{"en": "The Freezy-Beam", "zh": "冰冻射线"}, {"en": "A stolen car", "zh": "一辆偷来的车"}, {"en": "The Purple Potty", "zh": "紫色马桶（这个系列的一些小粉丝可能会选这个。）"}, {"en": "The Robo-Pants (the lower half)", "zh": "机器人裤（下半身，也是时光机）"}], "answer": 3, "explain": {"en": "Tippy ducked into the lower half — the Robo-Pants, which is also a time machine — and set the Tinkle-Time Travelometer to 'Five Years Ago.'", "zh": "蒂皮钻进下半身——也就是机器人裤（本身也是时光机），把“叮当时光旅行仪”设成了“五年前”。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}>
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

// Delegated listener survives re-renders: any radio selection (mouse or keyboard) updates state.
qEl.addEventListener("change", e => {
  if (submitted) return;
  const inp = e.target;
  if (!inp || inp.type !== "radio") return;
  const label = inp.closest("label[data-q]");
  if (!label) return;
  const qi = +label.dataset.q;
  const oi = +label.dataset.o;
  picked[qi] = oi;
  qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l => l.classList.remove("picked"));
  label.classList.add("picked");
});

render();
</script>
</body>
</html>
