<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Captain Underpants and the Perilous Plot of Professor Poopypants — Quiz</title>
<style>
  :root{
    --cu-red:#e11d48;
    --cu-blue:#2563eb;
    --cu-dark:#7f1d1d;
    --cream:#fffdf7;
    --ink:#1f2937;
    --gold:#f59e0b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Comic Sans MS","Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--cu-red),#9f1239);
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:linear-gradient(135deg,var(--cu-red),var(--cu-blue));
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:#b91c1c;
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .logo{
    width:54px;height:54px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff, #fee2e2);
    margin:0 auto 10px;display:flex;align-items:center;justify-content:center;
    font-size:1.7rem;box-shadow:0 0 0 3px rgba(255,255,255,.55) inset;
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #f3c9c9;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--cu-blue);background:#eef5ff;}
  .q.wrong{border-color:#dc2626;background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--cu-red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#fef2f2;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#fee2e2;}
  input[type=radio]{margin-right:10px;width:18px;height:18px;vertical-align:middle;accent-color:var(--cu-red);cursor:pointer;}
  label.picked{background:#fff7cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--cu-blue);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:#dc2626;}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#fff7ed;
    border-left:4px solid var(--cu-red);
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--cu-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--cu-red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(225,29,72,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(225,29,72,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--cu-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#b08a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#4 · Captain Underpants and the Perilous Plot of Professor Poopypants</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Dav Pilkey</p>
    <div class="logo">🦸</div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Captain Underpants: Captain Underpants and the Perilous Plot of Professor Poopypants</em> (Scholastic, 2000) — by Dav Pilkey</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Dav Pilkey",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really know your Captain Underpants trivia.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few sneaky details slipped past you.",
    low: "Time for a re-read! The answers are in the comic.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Dav Pilkey",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你完全读懂了内裤队长的搞笑冒险。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几个小细节被你漏掉了。",
    low: "该重读一遍啦！答案都藏在漫画里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who is the mad-scientist villain trying to take over the planet?", "zh": "这个企图统治地球的疯狂科学家反派是谁？"}, "options": [{"en": "Professor Pippy P. Poopypants (middle name Pee-Pee)", "zh": "皮皮·P· poopypants 教授（中间名是 Pee-Pee）"}, {"en": "Dr. Diaper", "zh": "尿布博士"}, {"en": "Mr. Krupp", "zh": "克拉普先生"}, {"en": "Melvin Sneedly", "zh": "梅尔文·斯尼德利（这个系列的一些小粉丝可能会选这个。）"}], "answer": 0, "explain": {"en": "Professor Pippy P. Poopypants (whose middle name is Pee-Pee) is the genius inventor from New Swissland who snaps and decides to take over the world with his giant robot suit.", "zh": "皮皮·P·poopypants 教授（中间名是 Pee-Pee）是来自“新瑞士兰”的天才发明家，他精神崩溃后决定用巨型机器人套装统治世界。"}}, {"q": {"en": "What are the two amazing inventions Professor Poopypants brings to America?", "zh": "poopypants 教授带到美国的两项神奇发明是什么？"}, "options": [{"en": "A time machine and a jet pack", "zh": "时光机和喷气背包"}, {"en": "A robot dog and a laser cannon", "zh": "机器狗和激光炮"}, {"en": "The Shrinky-Pig 2000 (shrinks things) and the Goosy-Grow 4000 (makes things grow)", "zh": "收缩猪2000（让东西变小）和生长鹅4000（让东西变大）"}, {"en": "The PATSY 2000 and a photocopier", "zh": "PATSY 2000 和一台复印机（这个系列的一些小粉丝可能会选这个。）"}], "answer": 2, "explain": {"en": "He shows off the Shrinky-Pig 2000 (which shrank a trash heap to the size of a gumball) and the Goosy-Grow 4000 (which grew a hot dog until it crashed through the lab wall).", "zh": "他展示了“收缩猪2000”（把一堆垃圾缩小到口香糖球大小）和“生长鹅4000”（让一个热狗不断变大、撞穿实验室墙壁）。"}}, {"q": {"en": "Why were George and Harold banned from the school field trip to Piqua Pizza Palace?", "zh": "乔治和哈罗德为什么被禁止参加去 Piqua 披萨宫殿的校外旅行？"}, "options": [{"en": "Mr. Krupp caught them changing the letters on the school sign, so he banned them and made them clean the teachers' lounge", "zh": "克拉普先生抓到他们篡改学校招牌上的字母，于是禁止他们去，并让他们打扫教师休息室"}, {"en": "They refused to get on the bus", "zh": "他们拒绝上校车"}, {"en": "They hypnotized Mr. Krupp", "zh": "他们催眠了克拉普先生"}, {"en": "They threw food in the cafeteria", "zh": "他们在食堂扔食物（这个系列的一些小粉丝可能会选这个。）（你能在书里找到关于这个的线索。）"}], "answer": 0, "explain": {"en": "While waiting for the bus, George and Harold changed the letters on the school sign. Mr. Krupp caught them red-handed and punished them by banning the field trip and making them clean the teachers' lounge instead.", "zh": "等校车时，乔治和哈罗德把学校招牌上的字母换了个位置。克拉普先生当场抓到他们，于是不让他们去旅行，罚他们去打扫教师休息室。"}}, {"q": {"en": "What prank did George and Harold set up in the teachers' lounge?", "zh": "乔治和哈罗德在教师休息室里布置了什么恶作剧？"}, "options": [{"en": "They glued the teachers to their chairs", "zh": "他们把老师粘在椅子上（这个系列的一些小粉丝可能会选这个。）（你能在书里找到关于这个的线索。）（这是比较有迷惑性的一个选项。）"}, {"en": "They replaced the coffee with ink", "zh": "他们把咖啡换成了墨水"}, {"en": "They filled the room with balloons", "zh": "他们把房间装满气球"}, {"en": "They taped the sink sprayer on, sprinkled powdered paste on the ceiling fan, and hid Styrofoam worms in the fridge so teachers looked like snowmen", "zh": "他们把水龙头喷头用胶带固定成一直喷、在吊扇上撒粉末浆糊、在冰箱里藏泡沫塑料虫，让老师看起来像雪人"}], "answer": 3, "explain": {"en": "When the teachers turned on the lights and faucet, cold water sprayed them, the fan flung paste everywhere, and Styrofoam pellets from the fridge stuck to the goo — making them look like 'giant evil snowmen.'", "zh": "老师一开灯开水龙头，冷水就喷他们一身；吊扇把浆糊甩得到处都是；冰箱里的泡沫塑料虫粘在黏糊糊的身上——让他们看起来像“巨型邪恶雪人”。"}}, {"q": {"en": "How did Professor Poopypants end up working as a science teacher at the school?", "zh": "poopypants 教授是怎么当上学校科学老师的？"}, "options": [{"en": "He was sent there by the government", "zh": "他是政府派去的（这个系列的一些小粉丝可能会选这个。）（你能在书里找到关于这个的线索。）（这是比较有迷惑性的一个选项。）"}, {"en": "He won a teaching award", "zh": "他赢了一个教学奖"}, {"en": "He was laughed out of every major U.S. science institution, so he became an elementary-school teacher thinking kids wouldn't laugh at his name", "zh": "他被美国各大科研机构嘲笑赶走，于是去当小学老师，以为孩子们不会笑他的名字"}, {"en": "Mr. Krupp hired him as a favor", "zh": "克拉普先生出于好心雇了他"}], "answer": 2, "explain": {"en": "After being giggled out of Georgetown, Harvard, Yale, Stanford, and more, he decided to become an elementary-school science teacher, sure that 'kids are so accepting and loving' and wouldn't laugh at his name. He was wrong.", "zh": "在被乔治城、哈佛、耶鲁、斯坦福等一所所大学嘲笑赶走后，他决定去当小学科学老师，以为“孩子都很包容、有爱心”不会笑他的名字。结果他错了。"}}, {"q": {"en": "What was the Gerbil Jogger 2000 that the professor showed the class?", "zh": "教授给全班展示的“沙鼠慢跑者2000”是什么？"}, "options": [{"en": "A giant robot dinosaur", "zh": "一只巨型机器恐龙"}, {"en": "A robot suit that lets a pet gerbil jog alongside its owner", "zh": "一个让宠物沙鼠跟着主人一起慢跑的机器人套装"}, {"en": "A talking toilet", "zh": "一个会说话的马桶"}, {"en": "A tiny bicycle for mice", "zh": "给老鼠用的迷你自行车（这个系列的一些小粉丝可能会选这个。）"}], "answer": 1, "explain": {"en": "The Gerbil Jogger 2000 is a mini robot you put a pet gerbil inside so it can jog along beside you. The kids loved it — Connor Mancini even said 'Science is COOL!'", "zh": "“沙鼠慢跑者2000”是一个迷你机器人，把宠物沙鼠放进去它就能跟着主人一起慢跑。孩子们很喜欢——康纳·曼奇尼甚至说“科学真酷！”"}}, {"q": {"en": "With his Name Change-O-Chart 2000, what did Professor Poopypants force everyone to do?", "zh": "借助“改名图表2000”，poopypants 教授强迫所有人做什么？"}, "options": [{"en": "Wear superhero capes", "zh": "披上超级英雄披风"}, {"en": "Change their real names into silly names or get SHRUNK", "zh": "把真名改成搞笑名字，否则就会被缩小"}, {"en": "Eat only cafeteria food", "zh": "只吃食堂食物（这个系列的一些小粉丝可能会选这个。）"}, {"en": "Speak only in rhyme", "zh": "只用押韵说话"}], "answer": 1, "explain": {"en": "He made everyone on the planet rename themselves using three code charts — turning normal names into silly ones — and threatened to shrink anyone who refused.", "zh": "他强迫地球上所有人用三张密码图表改名——把正常名字变成搞笑名字——并威胁谁拒绝就把谁缩小。"}}, {"q": {"en": "After the Name Change-O-Chart, what became Mr. Krupp's silly new name?", "zh": "经过改名图表，克拉普先生的搞笑新名字变成了什么？"}, "options": [{"en": "Benny Doofus", "zh": "本尼·杜夫斯"}, {"en": "Lumpy Pottybiscuits", "zh": "大块头·马桶饼干"}, {"en": "Captain Pottyface", "zh": "马桶脸船长（这个系列的一些小粉丝可能会选这个。）"}, {"en": "Loopy Pizapants", "zh": "鲁比·皮扎裤子"}], "answer": 1, "explain": {"en": "Mr. Krupp admitted his first name was Benny (B = Lumpy) and his last name Krupp starts with K (K = Potty) and ends with P (P = biscuits), so his new name was 'Lumpy Pottybiscuits.'", "zh": "克拉普先生承认自己名叫本尼（B=Lumpy 大块头），姓 Krupp，首字母 K（K=Potty 马桶）、尾字母 P（P=biscuits 饼干），所以新名字是“大块头·马桶饼干”。"}}, {"q": {"en": "In the comic George and Harold wrote ('The Pied Pooper of Piqua'), what did Professor Poopypants use to attack?", "zh": "在乔治和哈罗德写的漫画（《Piqua 的便便笛手》）里，poopypants 教授用什么来发动攻击？"}, "options": [{"en": "An army of Gerbil Jogger 2000s", "zh": "一支沙鼠慢跑者2000大军"}, {"en": "The Shrinky-Pig 2000 alone", "zh": "单靠收缩猪2000"}, {"en": "A giant robot toilet", "zh": "一个巨型机器马桶"}, {"en": "A spaceship full of aliens", "zh": "一艘装满外星人的飞船（这个系列的一些小粉丝可能会选这个。）"}], "answer": 0, "explain": {"en": "In their comic, Professor Poopypants builds thousands of evil Gerbil Jogger 2000s, rounds up all the children, and battles Captain Underpants — which is exactly the kind of thing the real professor later does.", "zh": "在他们的漫画里，poopypants 教授造了几千个邪恶的“沙鼠慢跑者2000”，把孩子们全部抓起来，还和内裤队长开战——后来真教授干的事几乎一模一样。"}}, {"q": {"en": "After the world was renamed, what silly names did George and Harold get?", "zh": "全世界改名之后，乔治和哈罗德得到了什么搞笑名字？"}, "options": [{"en": "Super Dude and Sidekick", "zh": "超级老兄和跟班"}, {"en": "Tiny and Tall", "zh": "小不点和高个子"}, {"en": "George and Harold (unchanged)", "zh": "乔治和哈罗德（没变）（这个系列的一些小粉丝可能会选这个。）"}, {"en": "Fluffy Toiletnose and Cheeseball Wafflepants", "zh": "软绵绵·马桶鼻和奶酪球·华夫裤"}], "answer": 3, "explain": {"en": "Once the Name Change-O-Chart took effect, the book calls the two friends 'Fluffy Toiletnose' (the one with the tie and flat-top) and 'Cheeseball Wafflepants' (the one with the T-shirt and bad haircut).", "zh": "改名图表生效后，书里把这两个朋友叫做“软绵绵·马桶鼻”（打领带、平头那位）和“奶酪球·华夫裤”（穿T恤、发型糟糕那位）。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}>
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

// Delegated listener survives re-renders: any radio selection (mouse or keyboard) updates state.
qEl.addEventListener("change", e => {
  if (submitted) return;
  const inp = e.target;
  if (!inp || inp.type !== "radio") return;
  const label = inp.closest("label[data-q]");
  if (!label) return;
  const qi = +label.dataset.q;
  const oi = +label.dataset.o;
  picked[qi] = oi;
  qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l => l.classList.remove("picked"));
  label.classList.add("picked");
});

render();
</script>
</body>
</html>
