<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Captain Underpants and the Attack of the Talking Toilets — Quiz</title>
<style>
  :root{
    --cu-red:#e11d48;
    --cu-blue:#2563eb;
    --cu-dark:#7f1d1d;
    --cream:#fffdf7;
    --ink:#1f2937;
    --gold:#f59e0b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Comic Sans MS","Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--cu-red),#9f1239);
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:linear-gradient(135deg,var(--cu-red),var(--cu-blue));
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:#b91c1c;
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .logo{
    width:54px;height:54px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff, #fee2e2);
    margin:0 auto 10px;display:flex;align-items:center;justify-content:center;
    font-size:1.7rem;box-shadow:0 0 0 3px rgba(255,255,255,.55) inset;
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #f3c9c9;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--cu-blue);background:#eef5ff;}
  .q.wrong{border-color:#dc2626;background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--cu-red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#fef2f2;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#fee2e2;}
  input[type=radio]{margin-right:10px;width:18px;height:18px;vertical-align:middle;accent-color:var(--cu-red);cursor:pointer;}
  label.picked{background:#fff7cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--cu-blue);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:#dc2626;}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#fff7ed;
    border-left:4px solid var(--cu-red);
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--cu-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--cu-red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(225,29,72,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(225,29,72,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--cu-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#b08a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#2 · Captain Underpants and the Attack of the Talking Toilets</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Dav Pilkey</p>
    <div class="logo">🦸</div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Captain Underpants: Captain Underpants and the Attack of the Talking Toilets</em> (Scholastic, 1999) — by Dav Pilkey</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Dav Pilkey",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really know your Captain Underpants trivia.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few sneaky details slipped past you.",
    low: "Time for a re-read! The answers are in the comic.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Dav Pilkey",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你完全读懂了内裤队长的搞笑冒险。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几个小细节被你漏掉了。",
    low: "该重读一遍啦！答案都藏在漫画里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who are the two best friends at the center of this story?", "zh": "这个故事的主角是哪两个好朋友？"}, "options": [{"en": "Ms. Ribble and Mr. Meaner", "zh": "里布尔女士和米纳先生"}, {"en": "George Beard and Harold Hutchins", "zh": "乔治·比尔德和哈罗德·哈钦斯"}, {"en": "Melvin Sneedly and Mr. Krupp", "zh": "梅尔文·斯尼德利和克拉普先生"}, {"en": "Tom and Jerry", "zh": "汤姆和杰瑞"}], "answer": 1, "explain": {"en": "George Beard (the kid on the left with the tie and flat-top) and Harold Hutchins (the one on the right with the T-shirt and bad haircut) are the two fourth-grade friends who cause all the trouble.", "zh": "乔治·比尔德（左边打领带、留平头的男孩）和哈罗德·哈钦斯（右边穿T恤、发型糟糕的男孩）是两个四年级的好朋友，所有麻烦都是他们惹出来的。"}}, {"q": {"en": "What caused the previous year's 'Sticky Chair Incident' at the Invention Convention?", "zh": "上一年发明大会上“粘椅事件”是怎么造成的？"}, "options": [{"en": "They sprayed the seats with super glue from a can", "zh": "他们用罐装强力胶喷了座位"}, {"en": "They mixed rubber cement with concentrated orange juice mix into a body-heat-activated glue", "zh": "他们把橡胶胶水和浓缩橙汁粉混成一种遇体温就干的胶水"}, {"en": "They spilled soda on every seat", "zh": "他们在每个座位上泼了汽水"}, {"en": "They painted the chairs with honey", "zh": "他们用蜂蜜涂了椅子"}], "answer": 1, "explain": {"en": "By mixing rubber cement with concentrated orange juice mix, George and Harold made a quick-drying, body-heat-activated glue and applied it to every gym seat (except theirs), gluing the whole school to their chairs.", "zh": "乔治和哈罗德把橡胶胶水和浓缩橙汁粉混合，做成一种速干、遇体温激活的胶水，涂在了体育馆每个座位上（除了他们自己的），结果全校师生都被粘在椅子上。"}}, {"q": {"en": "What did the school brainiac Melvin Sneedly invent?", "zh": "学霸梅尔文·斯尼德利发明了什么？"}, "options": [{"en": "A robotic dog-washer", "zh": "一台机器狗洗澡机"}, {"en": "A Volcano Detector", "zh": "一台火山探测器"}, {"en": "An Electric Ping-Pong Ball Server", "zh": "一台电动乒乓球发射器"}, {"en": "The PATSY 2000, a machine that makes living 3-D copies of pictures", "zh": "PATSY 2000，一台能把图片变成活生生的3D复制品的机器"}], "answer": 3, "explain": {"en": "Melvin's PATSY 2000 (Photo-Atomic Trans-Somgobulating Yectofartriplutonic-zaniptomiser) could take any one-dimensional image and create a living, breathing, three-dimensional copy of it.", "zh": "梅尔文的 PATSY 2000（光原子透……增压器，名字超长）能把任何一张平面图片变成活生生的三维复制品。"}}, {"q": {"en": "What did George and Harold do to Madison's Automatic Dog-Washer at the convention?", "zh": "在发明大会上，乔治和哈罗德对麦迪逊的“自动洗狗机”做了什么？"}, "options": [{"en": "They turned the spray nozzles around and filled the soap tank with India ink", "zh": "他们把喷头转了方向，并在皂液箱里灌了印度墨水"}, {"en": "They unplugged it", "zh": "他们拔掉了插头"}, {"en": "They filled it with bubble bath", "zh": "他们往里装了沐浴泡泡液"}, {"en": "They painted it pink", "zh": "他们把它漆成了粉色"}], "answer": 0, "explain": {"en": "George turned all the spray nozzles on the Automatic Dog-Washer around while Harold filled the soap tank with India ink, so it sprayed inky black water over the crowd instead of washing a dog.", "zh": "乔治把自动洗狗机的所有喷头转了方向，哈罗德在皂液箱里灌了印度墨水，于是机器朝人群喷出黑乎乎的墨汁，而不是洗狗。"}}, {"q": {"en": "How did Mr. Krupp end up turning into Captain Underpants during the toilet attack?", "zh": "马桶来袭时，克拉普先生是怎么变成内裤队长的？"}, "options": [{"en": "George poured water on his head", "zh": "乔治往他头上泼了水"}, {"en": "He ate the creamed chipped beef", "zh": "他吃了奶油碎牛肉"}, {"en": "Ms. Ribble snapped her fingers, which triggered his hypnotic change", "zh": "里布尔女士打了个响指，触发了他被催眠后的变身"}, {"en": "The Turbo Toilet zapped him", "zh": "涡轮马桶用电击了他"}], "answer": 2, "explain": {"en": "Ms. Ribble pointed at the toilets and snapped her fingers. Because of George and Harold's 3-D Hypno-Ring, any finger snap turns Mr. Krupp into Captain Underpants — and this time George was too late to stop it with water.", "zh": "里布尔女士指着马桶打了个响指。因为乔治和哈罗德用过3D催眠戒指，任何响指都会让克拉普先生变成内裤队长——而这次乔治来不及用水阻止了。"}}, {"q": {"en": "What did the three heroes use to defeat the army of Talking Toilets?", "zh": "三个小英雄用什么打败了会说话的马桶大军？"}, "options": [{"en": "A bucket of water", "zh": "一桶水"}, {"en": "Their slingshots and rocks", "zh": "他们的弹弓和石头"}, {"en": "Wedgie Power alone", "zh": "单靠内裤 wedgie 力量"}, {"en": "Creamed chipped beef (cafeteria food), which made the toilets sick", "zh": "奶油碎牛肉（食堂饭菜），让马桶们吃吐了"}], "answer": 3, "explain": {"en": "Captain Underpants used underwear like a slingshot to fire globs of creamed chipped beef into the toilets' mouths. The vile cafeteria food made them throw up everything (and the teachers) and die.", "zh": "内裤队长把内裤当弹弓，把一团团奶油碎牛肉射进马桶嘴里。这种恶心的食堂饭菜让马桶们把吃下的东西（包括老师们）全吐了出来，然后就完蛋了。"}}, {"q": {"en": "What special power does the PATSY 2000 really have?", "zh": "PATSY 2000 真正有什么特殊本领？"}, "options": [{"en": "It cleans the gym floor", "zh": "它打扫体育馆地板"}, {"en": "It prints comic books automatically", "zh": "它能自动印刷漫画书"}, {"en": "It brings drawn and photographed images to life as 3-D copies", "zh": "它能把画出来或拍出来的图像变成活生生的3D复制品"}, {"en": "It makes ordinary photocopies of papers", "zh": "它只是普通地复印文件"}], "answer": 2, "explain": {"en": "George and Harold thought Melvin had faked it with a hidden mouse, but when they copied their comic's cover, real talking toilets crawled out — proving the PATSY 2000 really creates living 3-D copies.", "zh": "乔治和哈罗德原以为梅尔文是用藏起来的老鼠糊弄人，但当他们复印漫画封面时，真的会说话的马桶爬了出来——证明 PATSY 2000 确实能造出活生生的3D复制品。"}}, {"q": {"en": "How did George and Harold finish writing their detention sentences so fast?", "zh": "乔治和哈罗德是怎么这么快写完罚抄句子的？"}, "options": [{"en": "They used homemade wooden rods with chalk that wrote twelve lines at once", "zh": "他们用自制的带粉笔木杆，一次写出十二行"}, {"en": "They typed them on a computer", "zh": "他们用电脑打字"}, {"en": "They used invisible ink", "zh": "他们用了隐形墨水"}, {"en": "They asked Melvin to write for them", "zh": "他们让梅尔文代写"}], "answer": 0, "explain": {"en": "They drilled holes in wooden rods (in George's dad's woodshop) and inserted pieces of chalk, so each time they wrote one sentence the rods made twelve. Every chalkboard was filled in about three and a half minutes.", "zh": "他们在木杆上钻孔（在乔治爸爸的木工房里），插进粉笔，所以每写一行，木杆就能写出十二行。大约三分半钟就把每块黑板都写满了。"}}, {"q": {"en": "What power does Captain Underpants use to fight the giant Turbo Toilet 2000?", "zh": "内裤队长用什么力量对付巨大的“涡轮马桶2000”？"}, "options": [{"en": "Laser vision", "zh": "激光眼"}, {"en": "Wedgie Power", "zh": "内裤 wedgie 力量"}, {"en": "Invisibility", "zh": "隐身"}, {"en": "Freeze breath", "zh": "冰冻吐息"}], "answer": 1, "explain": {"en": "Captain Underpants boldly declares he will stop the Turbo Toilet 2000 'With Wedgie Power!' — the same silly superhero trick first joked about in the very first book.", "zh": "内裤队长勇敢地宣称要用“wedgie 力量”阻止涡轮马桶2000——这正是第一本书里就开玩笑说过的那个搞笑超级英雄绝招。"}}, {"q": {"en": "What toilet-fighting character did Harold suggest inventing, and what happened to the idea?", "zh": "哈罗德建议发明哪个打马桶的角色？这个主意后来怎样了？"}, "options": [{"en": "A giant robot urinal called The Urinator", "zh": "一个叫“尿尿侠”的巨型机器人小便池"}, {"en": "A superhero sponge called Sponge Guy", "zh": "一个叫“海绵哥”的超级英雄海绵"}, {"en": "A giant robot plunger called The Sucker", "zh": "一个叫“吸盘”的巨型机器人马桶塞"}, {"en": "A talking mop named Moppy", "zh": "一个叫“拖拖”的会说话拖把"}], "answer": 0, "explain": {"en": "Harold suggested a giant robot urinal called 'The Urinator,' but George said they'd never get away with that in a children's book — they were 'skating on thin ice as it is!'", "zh": "哈罗德提议做一个叫“尿尿侠”的巨型机器人小便池，但乔治说在童书里绝对过不了关——他们“现在已经在走钢丝了！”"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

// Delegated listener survives re-renders: any radio selection (mouse or keyboard) updates state.
qEl.addEventListener("change", e => {
  if (submitted) return;
  const inp = e.target;
  if (!inp || inp.type !== "radio") return;
  const label = inp.closest("label[data-q]");
  if (!label) return;
  const qi = +label.dataset.q;
  const oi = +label.dataset.o;
  picked[qi] = oi;
  qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l => l.classList.remove("picked"));
  label.classList.add("picked");
});

render();
</script>
</body>
</html>
