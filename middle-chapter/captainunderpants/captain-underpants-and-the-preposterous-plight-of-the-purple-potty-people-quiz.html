<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Captain Underpants and the Preposterous Plight of the Purple Potty People — Quiz</title>
<style>
  :root{
    --cu-red:#e11d48;
    --cu-blue:#2563eb;
    --cu-dark:#7f1d1d;
    --cream:#fffdf7;
    --ink:#1f2937;
    --gold:#f59e0b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Comic Sans MS","Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--cu-red),#9f1239);
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:linear-gradient(135deg,var(--cu-red),var(--cu-blue));
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:#b91c1c;
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .logo{
    width:54px;height:54px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff, #fee2e2);
    margin:0 auto 10px;display:flex;align-items:center;justify-content:center;
    font-size:1.7rem;box-shadow:0 0 0 3px rgba(255,255,255,.55) inset;
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #f3c9c9;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--cu-blue);background:#eef5ff;}
  .q.wrong{border-color:#dc2626;background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--cu-red);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#fef2f2;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#fee2e2;}
  input[type=radio]{margin-right:10px;width:18px;height:18px;vertical-align:middle;accent-color:var(--cu-red);cursor:pointer;}
  label.picked{background:#fff7cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--cu-blue);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:#dc2626;}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#fff7ed;
    border-left:4px solid var(--cu-red);
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--cu-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--cu-red);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(225,29,72,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(225,29,72,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--cu-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#b08a8a;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#8 · Captain Underpants and the Preposterous Plight of the Purple Potty People</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Dav Pilkey</p>
    <div class="logo">🦸</div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Captain Underpants: Captain Underpants and the Preposterous Plight of the Purple Potty People</em> (Scholastic, 2006) — by Dav Pilkey</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Dav Pilkey",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really know your Captain Underpants trivia.",
    great: "Great job — you understood the adventure well.",
    ok: "Not bad — but a few sneaky details slipped past you.",
    low: "Time for a re-read! The answers are in the comic.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Dav Pilkey",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你完全读懂了内裤队长的搞笑冒险。",
    great: "很棒——你已经读懂了这个冒险故事。",
    ok: "不错——不过有几个小细节被你漏掉了。",
    low: "该重读一遍啦！答案都藏在漫画里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What machine do George and Harold use to travel to another dimension?", "zh": "乔治和哈罗德用什么机器穿越到了另一个维度？"}, "options": [{"en": "The Purple Potty (a time machine)", "zh": "紫色马桶（一台时光机）"}, {"en": "A talking toilet", "zh": "一个会说话的马桶（这个系列的一些小粉丝可能会选这个。）"}, {"en": "A washing machine", "zh": "一台洗衣机"}, {"en": "A school bus", "zh": "一辆校车"}], "answer": 0, "explain": {"en": "Melvin built a time machine out of a Purple Potty. When George and Harold used it two days in a row, it sent them into a backwards alternate universe.", "zh": "梅尔文用一只紫色马桶改造成时光机。乔治和哈罗德连续两天使用它，结果被送进了一个颠倒的平行宇宙。"}}, {"q": {"en": "What rule about the Purple Potty did Melvin warn them never to break?", "zh": "关于紫色马桶，梅尔文警告他们绝不能违反哪条规则？"}, "options": [{"en": "Never travel at night", "zh": "绝不能在夜里旅行"}, {"en": "Never let it get wet", "zh": "绝不能让它沾水"}, {"en": "Never use it two days in a row", "zh": "绝不能连续两天使用它"}, {"en": "Always travel with a pet", "zh": "每次旅行都必须带上宠物（这个系列的一些小粉丝可能会选这个。）"}], "answer": 2, "explain": {"en": "Melvin's rule was 'Don't use it 2 days in a Row.' George and Harold ignored it, and something very bad happened.", "zh": "梅尔文的规则是“绝不能连续两天使用”。乔治和哈罗德没听，结果闯下了大祸。"}}, {"q": {"en": "In the backwards universe, how is Mr. Krupp different from the real one?", "zh": "在颠倒的宇宙里，克拉普先生和现实中的他有什么不同？"}, "options": [{"en": "He is a robot", "zh": "他是个机器人"}, {"en": "He is kind and friendly", "zh": "他变得和善又友好"}, {"en": "He is missing", "zh": "他不见了"}, {"en": "He is the gym teacher", "zh": "他成了体育老师（这个系列的一些小粉丝可能会选这个。）"}], "answer": 1, "explain": {"en": "In the alternate world everything is reversed, so the normally mean Principal Krupp is actually nice and pleasant to the boys.", "zh": "在那个平行世界里一切都反了过来，所以平时刻薄的克拉普校长变得对孩子们和善又亲切。"}}, {"q": {"en": "What are the names and kinds of George and Harold's two pets?", "zh": "乔治和哈罗德的两只宠物分别叫什么、是什么？"}, "options": [{"en": "Crackers the pterodactyl and Sulu the robotic hamster", "zh": "翼龙“脆脆”和机器仓鼠“苏鲁”"}, {"en": "Fluffy the cat and Rex the dog", "zh": "猫咪“毛毛”和狗狗“雷克斯”"}, {"en": "Tweetie the bird and Spike the lizard", "zh": "小鸟“啾啾”和蜥蜴“尖刺”"}, {"en": "Sulu the pterodactyl and Crackers the hamster", "zh": "翼龙“苏鲁”和仓鼠“脆脆”（这个系列的一些小粉丝可能会选这个。）"}], "answer": 0, "explain": {"en": "In their last adventure George and Harold got a pterodactyl named Crackers and a bionic (robotic) hamster named Sulu.", "zh": "在上一个故事里，乔治和哈罗德得到了一只叫“脆脆”的翼龙，还有一只叫“苏鲁”的生物（机器）仓鼠。"}}, {"q": {"en": "In the comic the evil twins create, what evil hero do they make Mr. Krupp become?", "zh": "在邪恶双胞胎创作的漫画里，他们让克拉普先生变成了哪个邪恶英雄？"}, "options": [{"en": "Captain Giggles", "zh": "咯咯笑队长"}, {"en": "Captain Potty", "zh": "马桶队长"}, {"en": "Captain Blunderpants", "zh": "笨裤队长"}, {"en": "Captain Underpants", "zh": "内裤队长"}], "answer": 0, "explain": {"en": "The evil twins' comic is 'The Preposterous Plight of Captain Blunderpants,' where the boys hypnotize a nice Mr. Krupp into the villain Captain Blunderpants.", "zh": "邪恶双胞胎的漫画名叫《笨裤队长的离奇困境》，里面两个男孩把和善的克拉普先生催眠成了反派“笨裤队长”。"}}, {"q": {"en": "In the comic, how does Captain Blunderpants gain his amazing super powers?", "zh": "在漫画里，笨裤队长是怎么获得惊人超能力的？"}, "options": [{"en": "Being struck by lightning", "zh": "被闪电击中"}, {"en": "Drinking Super Power Juice", "zh": "喝了“超能力果汁”（这个系列的一些小粉丝可能会选这个。）"}, {"en": "A magic ring", "zh": "靠一枚魔法戒指"}, {"en": "A chemical reaction of chocolate, peanut butter, and extra cheese", "zh": "巧克力、花生酱和额外芝士发生了化学反应"}], "answer": 3, "explain": {"en": "The strange mix of chocolate, peanut butter, and extra cheese created a super-powerful chemical reaction that gave Captain Blunderpants amazing powers.", "zh": "巧克力、花生酱和额外芝士混在一起，产生了一场超级厉害的化学反应，让笨裤队长获得了惊人力量。"}}, {"q": {"en": "Which pet swoops in to rescue George and Harold from their hypnotized pets?", "zh": "哪只宠物俯冲下来，把乔治和哈罗德从被催眠的宠物手中救走？"}, "options": [{"en": "The librarian", "zh": "图书管理员"}, {"en": "Crackers the pterodactyl", "zh": "翼龙脆脆"}, {"en": "Sulu the hamster", "zh": "仓鼠苏鲁（这个系列的一些小粉丝可能会选这个。）"}, {"en": "Mr. Krupp", "zh": "克拉普先生"}], "answer": 1, "explain": {"en": "The evil twins hypnotized Sulu to attack, but Crackers the pterodactyl grabbed George and Harold and flew them to safety.", "zh": "邪恶双胞胎催眠了苏鲁让它发动攻击，但翼龙脆脆一把抓住乔治和哈罗德，把他们救到了安全的地方。"}}, {"q": {"en": "In Chapter 15 'Super Supper,' what special day is being celebrated?", "zh": "在第15章《超级晚餐》里，大家在庆祝什么特别的日子？"}, "options": [{"en": "The last day of school", "zh": "学期最后一天"}, {"en": "Halloween", "zh": "万圣节"}, {"en": "Grandparents Day", "zh": "祖父母日"}, {"en": "Banned Books Week", "zh": "禁书周"}], "answer": 2, "explain": {"en": "It is Grandparents Day, and the families gather for a big dinner where George and Harold's grandparents read the comic the boys made them.", "zh": "那天是祖父母日，全家一起吃大餐，乔治和哈罗德的祖父母读起了两个男孩为他们画的漫画。"}}, {"q": {"en": "What comic do George and Harold make for their grandparents?", "zh": "乔治和哈罗德为祖父母画了哪本漫画？"}, "options": [{"en": "The Adventures of Captain Underpants", "zh": "《内裤队长历险记》"}, {"en": "The Adventures of Boxer Boy and Great-Granny Girdle", "zh": "《拳击男孩与紧身裤老奶奶的冒险》"}, {"en": "The Purple Potty Chronicles", "zh": "《紫色马桶编年史》"}, {"en": "FrankenFart vs. the Bionic Barf Burnies", "zh": "《 Frankenstein 屁 vs. 生物呕吐怪》（这个系列的一些小粉丝可能会选这个。）"}], "answer": 1, "explain": {"en": "They made 'The Adventures of Boxer Boy and Great-Granny Girdle,' a story where their grandparents become superheroes who fight Robo-Geezers.", "zh": "他们画了《拳击男孩与紧身裤老奶奶的冒险》，讲的是祖父母变成超级英雄，对抗机器老人的故事。"}}, {"q": {"en": "In the real world, what happens when water is splashed on Nice Mr. Krupp's face?", "zh": "在现实世界里，往和善的克拉普先生脸上泼水会发生什么？"}, "options": [{"en": "He turns back into Principal Krupp", "zh": "他变回克拉普校长（这个系列的一些小粉丝可能会选这个。）"}, {"en": "He shrinks to tiny size", "zh": "他缩小成了迷你尺寸"}, {"en": "He becomes Captain Underpants", "zh": "他变成了内裤队长"}, {"en": "He turns into the evil Captain Blunderpants", "zh": "他变成了邪恶的笨裤队长"}], "answer": 3, "explain": {"en": "The evil George splashed water on Nice Mr. Krupp, and he ripped off his clothes and declared, 'I AM CAPTAIN BLUNDERPANTS!'", "zh": "邪恶的乔治往和善的克拉普先生脸上泼了水，他扯掉衣服大喊：“我就是笨裤队长！”"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}>
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

// Delegated listener survives re-renders: any radio selection (mouse or keyboard) updates state.
qEl.addEventListener("change", e => {
  if (submitted) return;
  const inp = e.target;
  if (!inp || inp.type !== "radio") return;
  const label = inp.closest("label[data-q]");
  if (!label) return;
  const qi = +label.dataset.q;
  const oi = +label.dataset.o;
  picked[qi] = oi;
  qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l => l.classList.remove("picked"));
  label.classList.add("picked");
});

render();
</script>
</body>
</html>
