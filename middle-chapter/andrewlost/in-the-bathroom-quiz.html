<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>In the Bathroom — Quiz</title>
<style>
  :root{
    --lab:#0e7490;
    --lab-dark:#155e75;
    --amber:#f59e0b;
    --cream:#f7fbff;
    --ink:#1f2937;
    --robot:#94a3b8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--lab),var(--lab-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:linear-gradient(135deg,var(--lab),var(--lab-dark));
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--lab-dark);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .logo{
    width:54px;height:54px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff, #cffafe);
    margin:0 auto 10px;display:flex;align-items:center;justify-content:center;
    font-size:1.7rem;box-shadow:0 0 0 3px rgba(255,255,255,.55) inset;
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #d6e6ef;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--lab);background:#eef9fc;}
  .q.wrong{border-color:#dc2626;background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--lab);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#eef4f8;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#e2edf4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--amber);}
  label.right{background:#d7f0df;border-color:var(--lab);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:#dc2626;}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f7ff;
    border-left:4px solid var(--lab);
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--lab-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--lab);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(14,116,144,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(14,116,144,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--lab-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9aa6ad;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#2 · In the Bathroom</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by J.C. Greenburg</p>
    <div class="logo">⚛️</div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Andrew Lost: In the Bathroom</em> (Random House, 2002) — by J.C. Greenburg</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by J.C. Greenburg",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really know your microscopic world.",
    great: "Great job — you understood the science adventure well.",
    ok: "Not bad — but a few tiny clues slipped past you.",
    low: "Time for a re-read! The answers are in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：J.C. Greenburg",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你完全读懂了这个微观世界冒险。",
    great: "很棒——你已经读懂了这个科学冒险故事。",
    ok: "不错——不过有几条小线索被你漏掉了。",
    low: "该重读一遍啦！答案都藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What is Andrew's invention, the Atom Sucker, able to do?", "zh": "安德鲁的发明“原子吸缩器”（Atom Sucker）能做什么？"}, "options": [{"en": "Shrink things by sucking the space out of their atoms", "zh": "通过吸走原子间的空隙把东西缩小"}, {"en": "Vacuum up dirt like an ordinary cleaning machine", "zh": "像普通吸尘器一样吸走灰尘"}, {"en": "Grow plants twice as fast", "zh": "让植物生长速度加倍"}, {"en": "Make a robot that can walk and talk", "zh": "造出一个会走路、会说话的机器人"}], "answer": 0, "explain": {"en": "Andrew invented the Atom Sucker, which shrinks things by sucking the space out of their atoms. That accident is what made him, Judy, and Thudd microscopic.", "zh": "安德鲁发明了原子吸缩器，它能吸走物体原子之间的空隙从而把东西缩小。正是一场意外让安德鲁、朱迪和撒德变得只有微观般大小。"}}, {"q": {"en": "Who (or what) is Thudd?", "zh": "撒德（Thudd）是谁（或什么）？"}, "options": [{"en": "A little silver robot, The Handy Ultra-Digital Detective, and Andrew's best friend", "zh": "一只银色小机器人，全称“万能数字侦探”，也是安德鲁最好的朋友"}, {"en": "Andrew's pet basset hound", "zh": "安德鲁养的巴吉度猎犬"}, {"en": "Andrew's younger brother", "zh": "安德鲁的弟弟"}, {"en": "A talking ant that lives in the bathroom", "zh": "住在浴室里一只会说话的蚂蚁"}], "answer": 0, "explain": {"en": "Thudd is a little silver robot whose name stands for The Handy Ultra-Digital Detective. He has a super-computer brain and is Andrew's best friend. Uncle Al built him.", "zh": "撒德是一只银色小机器人，名字代表“万能数字侦探”。他装着超级电脑大脑，是安德鲁最好的朋友，由阿尔叔叔制造。"}}, {"q": {"en": "Why do Andrew, Judy, and Thudd have to get back to the Atom Sucker by 8:01?", "zh": "为什么安德鲁、朱迪和撒德必须在 8:01 之前回到原子吸缩器那里？"}, "options": [{"en": "Because if they don't set it to UNSHRINK, it will explode and they'll stay tiny forever", "zh": "因为如果不把它设回“还原”，它就会爆炸，而他们将永远保持微小"}, {"en": "Because Mrs. Scuttle is giving Harley a bath at that time", "zh": "因为斯卡特尔太太会在那时给哈雷洗澡"}, {"en": "Because Uncle Al is throwing a birthday party", "zh": "因为阿尔叔叔要办生日派对"}, {"en": "Because the library closes at 8:01", "zh": "因为图书馆 8:01 关门"}], "answer": 0, "explain": {"en": "Judy explains they must reach the Atom Sucker in her backyard and set it to UNSHRINK before 8:01, or it will get hot enough to blow up and leave them microscopic forever.", "zh": "朱迪解释说，他们必须在 8:01 前赶到后院的原子吸缩器并把它设回“还原”，否则它会热到爆炸，让他们永远维持微小体型。"}}, {"q": {"en": "What does Andrew use the Um-bubble for?", "zh": "安德鲁用“泡泡护盾”（Um-bubble）来做什么？"}, "options": [{"en": "To make a clear bubble that wraps around them and keeps the water out", "zh": "做一个透明的泡泡把他们包起来，挡住外面的水"}, {"en": "To blow giant bubbles just for fun", "zh": "纯粹为了好玩吹巨大的泡泡"}, {"en": "To shrink himself even smaller", "zh": "把自己缩得更小"}, {"en": "To send a message to Uncle Al", "zh": "给阿尔叔叔发消息"}], "answer": 0, "explain": {"en": "The Um-bubble is a gum-like invention. Andrew blows a clear blue bubble that stretches tightly around him and keeps the bathwater out, so he can float safely in the tub.", "zh": "泡泡护盾是一种口香糖状的发明。安德鲁吹出一个透明的蓝色泡泡，紧紧裹住自己、挡住洗澡水，让他能在浴缸里安全漂浮。"}}, {"q": {"en": "What happens to Thudd after he gets wet?", "zh": "撒德弄湿之后会发生什么？"}, "options": [{"en": "His buttons turn red, he tells silly jokes, and he falls asleep", "zh": "他的按钮变成红色，开始讲傻笑话，还会睡着"}, {"en": "He grows to the size of a real mouse", "zh": "他长大到真老鼠那么大"}, {"en": "He turns into a talking ant", "zh": "他变成一只会说话的蚂蚁"}, {"en": "He stops working forever", "zh": "他永远停止运转"}], "answer": 0, "explain": {"en": "After Thudd gets wet, his chest buttons turn from green to red, he starts telling jokes (he never did before), and he falls asleep — his 'thought chips' are soggy. Uncle Al warns he must never get wet.", "zh": "撒德弄湿后，胸前的按钮由绿变红，开始讲笑话（以前从不会），还睡着了——他的“思维芯片”进水了。阿尔叔叔提醒过他绝不能沾水。"}}, {"q": {"en": "In the book, what is a REAL sponge?", "zh": "书里说，真正的“海绵”是什么？"}, "options": [{"en": "The skeleton of a sea animal that lived in the ocean", "zh": "一种生活在海洋里的动物的骨架"}, {"en": "A cleaning tool made in a factory", "zh": "工厂生产的清洁工具"}, {"en": "A kind of tiny plant", "zh": "一种微型植物"}, {"en": "A soft type of rock", "zh": "一种柔软的石头"}], "answer": 0, "explain": {"en": "Thudd explains that fake sponges are made in factories, but a REAL sponge is the skeleton of a sea animal. It sucks water through its holes to eat tiny floating stuff.", "zh": "撒德解释说，人造海绵是工厂做的，但真正的海绵是海洋动物的骨架。它靠身上的小孔吸水，吃掉水中漂浮的微小食物。"}}, {"q": {"en": "How can water bugs walk on top of the water without sinking?", "zh": "水黾（水生小虫）为什么能在水面行走而不下沉？"}, "options": [{"en": "Water molecules hug tightly together, making a thin 'skin' small things can stand on", "zh": "水分子紧紧相拥，形成一层薄薄的“水皮”，小东西可以站在上面"}, {"en": "They have special sticky feet that glue them to the surface", "zh": "它们有特殊黏脚，能粘在水面上"}, {"en": "They are lighter than air", "zh": "它们比空气还轻"}, {"en": "They swim just under the surface", "zh": "它们在水面下一点游泳"}], "answer": 0, "explain": {"en": "Thudd says water molecules hug tight, tight, tight, so the top of the water is like a thin skin that small things can walk on. (Soap breaks that skin, so bugs sink in soapy water.)", "zh": "撒德说水分子“紧紧相拥”，所以水面像一层薄皮，小东西能站在上面。（肥皂会破坏这层皮，所以虫子会在肥皂水里下沉。）"}}, {"q": {"en": "After Thudd gets wet, what does Uncle Al say to do to keep him from rusting?", "zh": "撒德弄湿后，阿尔叔叔说该怎么做才能防止他生锈？"}, "options": [{"en": "Rub him with something greasy, like butter", "zh": "用油腻的东西（比如黄油）擦他"}, {"en": "Put him in the washing machine", "zh": "把他放进洗衣机"}, {"en": "Leave him out in the hot sun", "zh": "把他放在烈日下晒干"}, {"en": "Spray him with more water to rinse him", "zh": "再喷些水把他冲干净"}], "answer": 0, "explain": {"en": "Uncle Al tells them to keep Thudd from rusting by rubbing him with something greasy — something like butter. Judy points out they're tiny and stuck to a sponge, so it won't be easy!", "zh": "阿尔叔叔让他们用油腻的东西（比如黄油）擦撒德以防生锈。朱迪说他们现在这么小、还粘在海绵上，这可不容易做到！"}}, {"q": {"en": "Since spiders have no teeth, how do they eat their prey?", "zh": "蜘蛛没有牙齿，它们怎么吃猎物？"}, "options": [{"en": "They squirt juices into the prey that turn its insides to goo, then suck the goo out", "zh": "它们把消化液注入猎物体内，把内脏变成糊糊，再吸出来吃"}, {"en": "They chew with their hard fangs", "zh": "它们用坚硬的毒牙咀嚼"}, {"en": "They swallow the prey whole in one bite", "zh": "它们一口把猎物整个吞下"}, {"en": "They only drink water that is already in puddles", "zh": "它们只喝水洼里现成的水"}], "answer": 0, "explain": {"en": "The 'True Stuff' section says spiders don't have teeth, so they can't chew. Instead they squirt juices into their prey that turn its insides into goo, then eat by sucking out the goo.", "zh": "“真相小课堂”里说蜘蛛没有牙齿，无法咀嚼。它们把消化液注入猎物，把内脏化成糊糊，再吸出来吃。"}}, {"q": {"en": "In 'True Stuff', about how many bacteria would you have after 24 hours if you start with ONE that splits in two every hour?", "zh": "在“真相小课堂”里，如果从一个细菌开始、每小时分裂成两个，24 小时后大约会有多少个？"}, "options": [{"en": "About 16 million", "zh": "约 1600 万个"}, {"en": "About 24", "zh": "约 24 个"}, {"en": "About 100", "zh": "约 100 个"}, {"en": "About one thousand", "zh": "约 1000 个"}], "answer": 0, "explain": {"en": "The book says bacteria reproduce by splitting in two every hour. Starting from one, after 24 hours you'd have about 16 million — though most of them die. (Use a calculator to prove it!)", "zh": "书中说细菌每小时分裂一次。从一个开始，24 小时后大约会有 1600 万个——不过其中大部分会死掉。（可以用计算器验证！）"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
