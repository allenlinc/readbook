<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>In the Garbage — Quiz</title>
<style>
  :root{
    --lab:#0e7490;
    --lab-dark:#155e75;
    --amber:#f59e0b;
    --cream:#f7fbff;
    --ink:#1f2937;
    --robot:#94a3b8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--lab),var(--lab-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:linear-gradient(135deg,var(--lab),var(--lab-dark));
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--lab-dark);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .logo{
    width:54px;height:54px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff, #cffafe);
    margin:0 auto 10px;display:flex;align-items:center;justify-content:center;
    font-size:1.7rem;box-shadow:0 0 0 3px rgba(255,255,255,.55) inset;
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #d6e6ef;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--lab);background:#eef9fc;}
  .q.wrong{border-color:#dc2626;background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--lab);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#eef4f8;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#e2edf4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--amber);}
  label.right{background:#d7f0df;border-color:var(--lab);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:#dc2626;}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f7ff;
    border-left:4px solid var(--lab);
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--lab-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--lab);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(14,116,144,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(14,116,144,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--lab-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9aa6ad;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#13 · In the Garbage</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by J.C. Greenburg</p>
    <div class="logo">⚛️</div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Andrew Lost: In the Garbage</em> (Random House, 2006) — by J.C. Greenburg</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by J.C. Greenburg",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really know your microscopic world.",
    great: "Great job — you understood the science adventure well.",
    ok: "Not bad — but a few tiny clues slipped past you.",
    low: "Time for a re-read! The answers are in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：J.C. Greenburg",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你完全读懂了这个微观世界冒险。",
    great: "很棒——你已经读懂了这个科学冒险故事。",
    ok: "不错——不过有几条小线索被你漏掉了。",
    low: "该重读一遍啦！答案都藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What is the Goa Constrictor in Andrew's classroom?", "zh": "在安德鲁的教室里，Goa 巨蛇（Goa Constrictor）到底是什么？"}, "options": [{"en": "Andrew's giant garbage-shrinking machine shaped like a snake", "zh": "安德鲁发明的、像蛇一样的巨型垃圾缩小机器"}, {"en": "A real pet snake Andrew keeps in his desk", "zh": "安德鲁养在课桌里的真宠物蛇"}, {"en": "The class guinea pig named Howard", "zh": "名叫霍华德的班级豚鼠"}, {"en": "Judy's new microscope", "zh": "朱迪的新显微镜"}], "answer": 0, "explain": {"en": "The Goa Constrictor is Andrew's invention. 'Goa' stands for Garbage Goes Away — it swallows garbage and squeezes the empty space out of atoms to make it super-small.", "zh": "Goa 巨蛇是安德鲁的发明。Goa 代表“垃圾消失”(Garbage Goes Away)——它吞下垃圾，把原子间的空隙挤掉，让垃圾变得超级小。"}}, {"q": {"en": "After the Goa Constrictor shrinks them, about how big are Andrew and Judy?", "zh": "被 Goa 巨蛇缩水后，安德鲁和朱迪大约变得多大？"}, "options": [{"en": "About the size of a cockroach", "zh": "大约有一只蟑螂那么大"}, {"en": "About the size of a dog", "zh": "大约有一只狗那么大"}, {"en": "About the size of a basketball", "zh": "大约有一个篮球那么大"}, {"en": "Exactly their normal size", "zh": "和正常体型一模一样"}], "answer": 0, "explain": {"en": "When Andrew wakes up on the tiny garbage, he says, 'I must be about as big as a cockroach,' and Thudd adds, 'Small cockroach.'", "zh": "当安德鲁在微小的垃圾上醒来时，他说：“我大概只有一只蟑螂那么大了。” 撒得（Thudd）补充道：“很小的蟑螂。”"}}, {"q": {"en": "Who is the tall boy with black hair that Andrew calls 'Germy'?", "zh": "那个黑头发的高个子男生、被安德鲁叫做“脏鬼”(Germy) 的是谁？"}, "options": [{"en": "Jeremy Bogart, a classmate", "zh": "杰里米·博加特，一名同学"}, {"en": "Hugo Wilson, the dump manager", "zh": "雨果·威尔逊，垃圾场经理"}, {"en": "Frank, the garbage collector", "zh": "弗兰克，垃圾清理工"}, {"en": "Cody, the garbologist", "zh": "科迪，垃圾研究员"}], "answer": 0, "explain": {"en": "Jeremy Bogart is the tall boy with black hair who delivers garbage bags and teases Andrew. The other kids call him 'Germy Booger.'", "zh": "杰里米·博加特是个黑头发的高个子男生，他送来垃圾袋并捉弄安德鲁。其他孩子叫他“脏鬼鼻涕虫”(Germy Booger)。"}}, {"q": {"en": "What does Jeremy's invention, the Excuse-O-Matic, do?", "zh": "杰里米的发明“借口制造机”(Excuse-O-Matic) 有什么用？"}, "options": [{"en": "It makes up excuses for any situation", "zh": "它能为任何情况编出借口"}, {"en": "It shrinks garbage into tiny specks", "zh": "它能把垃圾缩小成小颗粒"}, {"en": "It helps worms eat paper", "zh": "它能帮虫子吃纸"}, {"en": "It is a telescope and microscope", "zh": "它是一台望远镜兼显微镜"}], "answer": 0, "explain": {"en": "Jeremy clicks the button and the ball whirs out excuses like 'My little brother ate my homework.' Judy calls them lies.", "zh": "杰里米按下按钮，球就呼呼地转出各种借口，比如“我弟弟把我的作业吃了”。朱迪说那都是谎言。"}}, {"q": {"en": "According to Andrew, how much garbage does every person make each day?", "zh": "根据安德鲁说的，每个人每天制造多少垃圾？"}, "options": [{"en": "Five pounds", "zh": "五磅"}, {"en": "One pound", "zh": "一磅"}, {"en": "Ten pounds", "zh": "十磅"}, {"en": "Thirty-five pounds", "zh": "三十五磅"}], "answer": 0, "explain": {"en": "Andrew says each person makes five pounds of garbage every day — that's thirty-five pounds a week and over 1,800 pounds a year.", "zh": "安德鲁说每个人每天制造五磅垃圾——也就是每周三十五磅、每年超过一千八百磅。"}}, {"q": {"en": "What is the name of Hugo Wilson's one-legged seagull?", "zh": "雨果·威尔逊那只只有一条腿的海鸥叫什么名字？"}, "options": [{"en": "Matilda", "zh": "玛蒂尔达 (Matilda)"}, {"en": "Howard", "zh": "霍华德 (Howard)"}, {"en": "Thudd", "zh": "撒得 (Thudd)"}, {"en": "Judy", "zh": "朱迪 (Judy)"}], "answer": 0, "explain": {"en": "Hugo feeds peanuts to his one-legged seagull named Matilda, who carries peanuts to a nest across the road at the dump.", "zh": "雨果把花生喂给那只只有一条腿、名叫玛蒂尔达的海鸥，它会把花生带到路对面垃圾场里的巢里。"}}, {"q": {"en": "What do red wriggler worms make after they eat garbage and paper?", "zh": "红蚯蚓（red wriggler）吃掉垃圾和纸以后，会制造出什么？"}, "options": [{"en": "Castings — super food for plants", "zh": "虫粪 (castings)——植物的超级养料"}, {"en": "Plastic that lasts forever", "zh": "永远不坏的塑料"}, {"en": "Stinky gas", "zh": "臭气"}, {"en": "Recycled tires", "zh": "回收的轮胎"}], "answer": 0, "explain": {"en": "Hugo uses red wriggler worms in bins to turn stinky garbage into plant food. The worms poop out 'castings,' which are super food for plants.", "zh": "雨果用箱子里的红蚯蚓把臭烘烘的垃圾变成植物的食物。蚯蚓排出的“虫粪”是植物的超级养料。"}}, {"q": {"en": "According to the True Stuff section, what makes garbage slimy, stinky, and weird-colored?", "zh": "根据“真实知识”(True Stuff) 部分，是什么让垃圾变得黏糊、发臭、还变色？"}, "options": [{"en": "Bacteria, funguses, and molds", "zh": "细菌、真菌和霉菌"}, {"en": "Worms digging through it", "zh": "蚯蚓在里面钻来钻去"}, {"en": "Sunlight on the dump", "zh": "垃圾场上的阳光"}, {"en": "The Goa Constrictor", "zh": "Goa 巨蛇"}], "answer": 0, "explain": {"en": "Thudd explains that bacteria, funguses, and molds break garbage down. Without them, Earth would be piled hundreds of miles high with garbage.", "zh": "撒得解释说，是细菌、真菌和霉菌把垃圾分解掉的。如果没有它们，地球会被垃圾堆成几百英里高。"}}, {"q": {"en": "The word 'centipede' means 'hundred feet,' but how many feet do real centipedes have?", "zh": "“centipede”(蜈蚣) 这个词意思是“百足”，但真正的蜈蚣其实有多少只脚？"}, "options": [{"en": "From 30 to over 300 feet", "zh": "从 30 只到 300 多只"}, {"en": "Exactly 100 feet", "zh": "正好 100 只"}, {"en": "Exactly 1,000 feet", "zh": "正好 1000 只"}, {"en": "750 feet (the most of any bug)", "zh": "750 只（所有虫子里最多的）"}], "answer": 0, "explain": {"en": "True Stuff says centi means 'hundred' and pede means 'feet,' but centipedes have from 30 to over 300 feet. (750 feet belongs to the millipede with the most legs.)", "zh": "“True Stuff”说 centi 是“百”、pede 是“足”，但蜈蚣只有 30 到 300 多只脚。（750 只是脚最多的千足虫。）"}}, {"q": {"en": "Why don't you notice a bad smell after staying in a stinky place for a few minutes?", "zh": "为什么在臭的地方待几分钟后，你就闻不到臭味了？"}, "options": [{"en": "Your brain stops paying attention to signals from your nose", "zh": "你的大脑不再理会鼻子传来的信号"}, {"en": "The smell completely disappears", "zh": "臭味完全消失了"}, {"en": "Worms eat the smell", "zh": "虫子把臭味吃掉了"}, {"en": "You are holding your breath", "zh": "你在屏住呼吸"}], "answer": 0, "explain": {"en": "True Stuff explains the smell hasn't gone away — your brain just stops paying attention to the signals from your nose.", "zh": "“True Stuff”解释说，臭味并没有消失——只是你的大脑不再理会鼻子传来的信号了。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
