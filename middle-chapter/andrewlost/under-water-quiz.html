<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Water — Quiz</title>
<style>
  :root{
    --lab:#0e7490;
    --lab-dark:#155e75;
    --amber:#f59e0b;
    --cream:#f7fbff;
    --ink:#1f2937;
    --robot:#94a3b8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--lab),var(--lab-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:linear-gradient(135deg,var(--lab),var(--lab-dark));
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--lab-dark);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .logo{
    width:54px;height:54px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff, #cffafe);
    margin:0 auto 10px;display:flex;align-items:center;justify-content:center;
    font-size:1.7rem;box-shadow:0 0 0 3px rgba(255,255,255,.55) inset;
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #d6e6ef;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--lab);background:#eef9fc;}
  .q.wrong{border-color:#dc2626;background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--lab);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#eef4f8;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#e2edf4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--amber);}
  label.right{background:#d7f0df;border-color:var(--lab);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:#dc2626;}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f7ff;
    border-left:4px solid var(--lab);
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--lab-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--lab);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(14,116,144,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(14,116,144,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--lab-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9aa6ad;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#5 · Under Water</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by J.C. Greenburg</p>
    <div class="logo">⚛️</div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Andrew Lost: Under Water</em> (Random House, 2003) — by J.C. Greenburg</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by J.C. Greenburg",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really know your microscopic world.",
    great: "Great job — you understood the science adventure well.",
    ok: "Not bad — but a few tiny clues slipped past you.",
    low: "Time for a re-read! The answers are in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：J.C. Greenburg",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你完全读懂了这个微观世界冒险。",
    great: "很棒——你已经读懂了这个科学冒险故事。",
    ok: "不错——不过有几条小线索被你漏掉了。",
    low: "该重读一遍啦！答案都藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Before Uncle Al turned it into an underwater vehicle, what was the Water Bug?", "zh": "在阿尔叔叔把它改造成潜水器之前，水虫号（Water Bug）原本是什么？"}, "options": [{"en": "An old Volkswagen Beetle car", "zh": "一辆老旧的大众甲壳虫汽车"}, {"en": "A real giant water-bug insect", "zh": "一只真正的水生大臭虫"}, {"en": "A fishing boat", "zh": "一艘渔船"}, {"en": "A helicopter", "zh": "一架直升机"}], "answer": 0, "explain": {"en": "Andrew shows Judy the Water Bug: a Volkswagen Beetle parked on a ramp above the water that Uncle Al converted into a submarine, with paddle wheels instead of tires and a glass floor.", "zh": "安德鲁给朱迪看的水虫号是一辆停在斜坡上的大众甲壳虫汽车，被阿尔叔叔改装成潜水器，用桨轮代替轮胎，还装了玻璃地板。"}}, {"q": {"en": "How does the Water Bug end up steering itself to the deepest ocean?", "zh": "水虫号怎么会自己驶向最深的海底？"}, "options": [{"en": "Andrew broke the destination dial off the dashboard, leaving it stuck on autopilot", "zh": "安德鲁把目的地旋钮从仪表盘上弄断了，使它卡在自动驾驶上"}, {"en": "Judy pressed the wrong button on purpose", "zh": "朱迪故意按错了按钮"}, {"en": "Uncle Al remote-controlled it there", "zh": "阿尔叔叔远程操控它去的"}, {"en": "A shark pulled it down", "zh": "一只鲨鱼把它拽下去的"}], "answer": 0, "explain": {"en": "Andrew tried to turn the biggest black dial and it fell off (KRACK!). Judy points out he broke it off, so the Water Bug got stuck on autopilot heading to the deepest ocean to search for giant squids.", "zh": "安德鲁拧最大的黑色旋钮时它掉了下来（KRACK!），朱迪说他是把旋钮弄断了，于是水虫号卡在自动驾驶，驶向最深的海底去寻找大王乌贼。"}}, {"q": {"en": "What is Soggy Bob Sloggins building, and why does it worry Uncle Al?", "zh": "撒吉·鲍勃·斯洛金斯（Soggy Bob Sloggins）在建造什么，为什么让阿尔叔叔担心？"}, "options": [{"en": "Animal Universe, the biggest theme park ever — he steals animals and doesn't care about them", "zh": "“动物宇宙”——史上最大的主题公园；他偷动物而且根本不关心它们"}, {"en": "A giant aquarium to protect giant squids", "zh": "一个保护大王乌贼的巨大水族馆"}, {"en": "A new submarine factory", "zh": "一家新的潜艇工厂"}, {"en": "A hotel in Hawaii", "zh": "夏威夷的一家酒店"}], "answer": 0, "explain": {"en": "Uncle Al says Soggy Bob steals animals worldwide to build Animal Universe, the biggest theme park ever. He doesn't care about the animals and would 'stuff' them if too costly — and he wants to catch giant squids for 'Squidwiches.'", "zh": "阿尔叔叔说撒吉·鲍勃偷遍全世界的动物来建造“动物宇宙”这座最大的主题公园。他不关心动物，养不起就把它们做成标本，还想抓大王乌贼做“乌贼三明治”。"}}, {"q": {"en": "When a hammerhead shark attacks the Water Bug, what is strange about its head?", "zh": "锤头鲨攻击水虫号时，它的头有什么奇特之处？"}, "options": [{"en": "It is as wide as the windshield and shaped like the top of the letter T, with an eye at each end", "zh": "和挡风玻璃一样宽，形状像字母 T 的顶部，两端各有一只眼睛"}, {"en": "It is round like a ball", "zh": "圆得像个球"}, {"en": "It has no eyes at all", "zh": "根本没有眼睛"}, {"en": "It is covered in brightly colored feathers", "zh": "长满了鲜艳的羽毛"}], "answer": 0, "explain": {"en": "Judy sees the shark's head is as wide as the windshield and shaped like the top of a T, with a big dark eye at each end of the T — Thudd identifies it as a hammerhead shark.", "zh": "朱迪看到鲨鱼头和挡风玻璃一样宽、形状像字母 T 的顶部，T 的两端各有一只大黑眼睛——撒德认出这是锤头鲨。"}}, {"q": {"en": "After the destination dial breaks off, how does Judy restore steering control?", "zh": "目的地旋钮掉落后，朱迪是怎么恢复转向控制的？"}, "options": [{"en": "She uses a hairpin from her hair to reconnect the dial to the dashboard", "zh": "她用头发上的发卡把旋钮重新连到仪表盘上"}, {"en": "She calls Uncle Al on the phone", "zh": "她打电话给阿尔叔叔"}, {"en": "She kicks the dashboard", "zh": "她踢了仪表盘一脚"}, {"en": "She asks the shark for help", "zh": "她向鲨鱼求助"}], "answer": 0, "explain": {"en": "Judy pulls a hairpin from her frizzy hair, straightens it, pokes one end through the bottom of the dial and the other into the hole in the dashboard, gives it a twist — and the steering wheel works again.", "zh": "朱迪从卷发里取出发卡弄直，一端穿过旋钮底部、另一端插进仪表盘上的孔再一拧——转向盘就又能用了。"}}, {"q": {"en": "What does the Bug-a-Boo do when Andrew presses its red button?", "zh": "安德鲁按下红色按钮时，布加布（Bug-a-Boo）有什么作用？"}, "options": [{"en": "It pops out and makes the Water Bug look big and scary to frighten the shark away", "zh": "它会弹出来，让水虫号看起来又大又可怕，把鲨鱼吓走"}, {"en": "It squirts water to fill the tires", "zh": "它喷水来给轮胎充气"}, {"en": "It cooks dinner in the kitchen", "zh": "它在厨房里做饭"}, {"en": "It plays music", "zh": "它播放音乐"}], "answer": 0, "explain": {"en": "Thudd tells Andrew to press the red Bug-a-Boo button. A clown-collar-like thing with red-and-orange stripes and black spots pops out and makes the Water Bug look big and scary, so the shark shakes its head and leaves.", "zh": "撒德让安德鲁按红色的布加布按钮，一个像小丑领圈、带红橙条纹和黑点的东西弹出来，让水虫号显得又大又吓人，鲨鱼于是摇头游走了。"}}, {"q": {"en": "Thudd says the open-ocean water looks green because of what floating in it?", "zh": "撒德说外海的海水呈绿色，是因为里面漂浮着什么？"}, "options": [{"en": "Lots of tiny green plants and animals called plankton", "zh": "大量叫浮游生物（plankton）的微小绿色植物和动物"}, {"en": "Green paint spilled from a ship", "zh": "从船上洒出的绿色颜料"}, {"en": "Sunlight shining through green glass", "zh": "透过绿色玻璃照射的阳光"}, {"en": "A single giant green fish", "zh": "一条巨大的绿鱼"}], "answer": 0, "explain": {"en": "Thudd explains the water is green because lots of tiny green plants (and tiny animals) float there — called plankton — and green water means lots of food for fish.", "zh": "撒德解释说海水呈绿色是因为那里漂浮着大量微小的绿色植物（和微小动物），叫浮游生物；绿色海水意味着鱼有很多食物。"}}, {"q": {"en": "The book says dolphins breathe voluntarily and can never be fully asleep. How do they keep breathing?", "zh": "书里说海豚是“自主呼吸”、永远无法完全睡着。它们怎么做到一直呼吸？"}, "options": [{"en": "Half of a dolphin's brain sleeps while the other half stays awake", "zh": "海豚一半大脑睡觉，另一半保持清醒"}, {"en": "They hold their breath all night", "zh": "它们整晚屏住呼吸"}, {"en": "They sleep on the surface with their mouths open", "zh": "它们张着嘴浮在水面睡觉"}, {"en": "They do not need to breathe at all", "zh": "它们根本不需要呼吸"}], "answer": 0, "explain": {"en": "True Stuff says humans breathe automatically, but dolphins breathe voluntarily and must choose to breathe. To keep breathing, half of a dolphin's brain sleeps while the other half stays awake.", "zh": "“真相小课堂”说人类会自动呼吸，而海豚必须自主呼吸、主动选择呼吸。为了持续呼吸，海豚一半大脑睡觉、另一半保持清醒。"}}, {"q": {"en": "Flame scallops flash light inside their shells. Thudd calls this 'bioluminescence.' What does it mean?", "zh": "火焰扇贝在壳内闪着光。撒德称之为“生物发光”（bioluminescence）。这是什么意思？"}, "options": [{"en": "Light made by a living thing", "zh": "由生物制造的光"}, {"en": "Light from the sun reflected in water", "zh": "阳光在水中的反射"}, {"en": "Light from Uncle Al's flashlight", "zh": "阿尔叔叔手电筒的光"}, {"en": "Lightning in a storm", "zh": "暴风雨中的闪电"}], "answer": 0, "explain": {"en": "Thudd explains many sea creatures make their own light, and 'bioluminescence' means 'light made by a living thing' — like the flame scallops glowing inside their shells.", "zh": "撒德解释说许多海洋生物会自己制造光，“生物发光”意思就是“由生物制造的光”，比如火焰扇贝在壳里发光。"}}, {"q": {"en": "According to True Stuff, if all the salt in the oceans were piled on land, how deep would it bury the earth?", "zh": "根据“真相小课堂”，如果把海洋里所有的盐堆在陆地上，会覆盖地球多深？"}, "options": [{"en": "About 500 feet, as tall as a fifty-story office building", "zh": "约 500 英尺，相当于一栋 50 层的办公大楼"}, {"en": "About one inch", "zh": "约 1 英寸"}, {"en": "About a mile", "zh": "约 1 英里"}, {"en": "It would not pile up at all", "zh": "根本堆不起来"}], "answer": 0, "explain": {"en": "True Stuff says the salt would bury every inch of the earth under 500 feet of salt — about as tall as a fifty-story office building. Rivers constantly wash salt out of the soil into the oceans.", "zh": "“真相小课堂”说这些盐会把地球每寸地表埋在 500 英尺下，约 50 层楼那么高；河流不断把土壤里的盐冲进海洋。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
