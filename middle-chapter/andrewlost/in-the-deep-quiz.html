<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>In the Deep — Quiz</title>
<style>
  :root{
    --lab:#0e7490;
    --lab-dark:#155e75;
    --amber:#f59e0b;
    --cream:#f7fbff;
    --ink:#1f2937;
    --robot:#94a3b8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--lab),var(--lab-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:linear-gradient(135deg,var(--lab),var(--lab-dark));
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--lab-dark);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.92;
  }
  .logo{
    width:54px;height:54px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff, #cffafe);
    margin:0 auto 10px;display:flex;align-items:center;justify-content:center;
    font-size:1.7rem;box-shadow:0 0 0 3px rgba(255,255,255,.55) inset;
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #d6e6ef;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--lab);background:#eef9fc;}
  .q.wrong{border-color:#dc2626;background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--lab);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#eef4f8;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#e2edf4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--amber);}
  label.right{background:#d7f0df;border-color:var(--lab);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:#dc2626;}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f7ff;
    border-left:4px solid var(--lab);
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--lab-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--lab);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(14,116,144,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(14,116,144,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--lab-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9aa6ad;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>#8 · In the Deep</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by J.C. Greenburg</p>
    <div class="logo">⚛️</div>
  </header>
  <main>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Andrew Lost: In the Deep</em> (Random House, 2004) — by J.C. Greenburg</footer>
</div>

<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by J.C. Greenburg",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really know your microscopic world.",
    great: "Great job — you understood the science adventure well.",
    ok: "Not bad — but a few tiny clues slipped past you.",
    low: "Time for a re-read! The answers are in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：J.C. Greenburg",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你完全读懂了这个微观世界冒险。",
    great: "很棒——你已经读懂了这个科学冒险故事。",
    ok: "不错——不过有几条小线索被你漏掉了。",
    low: "该重读一遍啦！答案都藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Why are Andrew, Judy, and Thudd racing deep into the ocean?", "zh": "安德鲁、朱迪和沙德为什么要往深海深处赶？"}, "options": [{"en": "To save the giant squid from Soggy Bob, who wants to turn it into squidwiches", "zh": "去把巨乌贼从湿答答鲍勃手里救出来，他想把乌贼做成乌贼三明治"}, {"en": "To find buried treasure on the ocean floor", "zh": "去海底寻找埋藏的宝藏"}, {"en": "To visit their Uncle Al on a vacation cruise", "zh": "去坐游轮度假看望他们的阿尔叔叔"}, {"en": "To race Soggy Bob to the surface of the water", "zh": "和湿答答鲍勃比谁先浮到水面"}], "answer": 0, "explain": {"en": "Soggy Bob Sloggins wants the giant squid for his Animal Universe theme park squidwiches, so the kids rush to the deepest ocean to stop him.", "zh": "湿答答鲍勃想抓巨乌贼给他的动物宇宙主题公园做乌贼三明治，所以孩子们赶往深海最深处去阻止他。"}}, {"q": {"en": "What is the Water Bug?", "zh": "「水虫号」(Water Bug) 是什么？"}, "options": [{"en": "Uncle Al's submarine made from an old Volkswagen Beetle", "zh": "阿尔叔叔用一辆旧的大众甲壳虫汽车改造的潜水艇"}, {"en": "A real insect that lives in the bathtub", "zh": "一只住在浴缸里的真虫子"}, {"en": "A small boat that Andrew built from wood", "zh": "安德鲁用木头造的小船"}, {"en": "A flying saucer borrowed from aliens", "zh": "从外星人那里借来的飞碟"}], "answer": 0, "explain": {"en": "The Water Bug used to be an old Volkswagen Beetle until Uncle Al turned it into a submarine with a glass floor and a sharky fin.", "zh": "水虫号本来是一辆旧的大众甲壳虫，后来阿尔叔叔把它改成了潜水艇，有玻璃地板和鲨鱼鳍。"}}, {"q": {"en": "What is 'bioluminescence,' the living light Andrew and Thudd see in the dark ocean?", "zh": "安德鲁和沙德在黑暗海洋里看到的「生物发光」(bioluminescence) 是什么？"}, "options": [{"en": "Light made by bacteria living inside many ocean animals", "zh": "由生活在许多海洋动物体内的细菌制造出来的光"}, {"en": "Sunlight reflecting off the surface of the water", "zh": "阳光从海面反射下来的光"}, {"en": "Electricity from Soggy Bob's machines", "zh": "湿答答鲍勃机器发出的电"}, {"en": "Glow-in-the-dark paint Uncle Al applied", "zh": "阿尔叔叔涂的夜光漆"}], "answer": 0, "explain": {"en": "Thudd explains that the living light of most creatures comes from bacteria inside their cells — a kind of teamwork called mutualism.", "zh": "沙德解释说，大多数动物的生物发光来自它们细胞里的细菌——这是一种叫作互利共生的合作关系。"}}, {"q": {"en": "How do Andrew and Judy realize the flashing sawfish signal means 'Help'?", "zh": "安德鲁和朱迪怎么知道那条锯鱼闪的光信号是「求救」？"}, "options": [{"en": "It is Morse code SOS: three short, three long, three short flashes", "zh": "那是摩斯电码的 SOS：三短、三长、再三短 的闪光"}, {"en": "The sawfish is shouting the word 'Help' out loud", "zh": "锯鱼大声喊出了「救命」这个词"}, {"en": "Thudd translates the fish's bubbles", "zh": "沙德翻译了鱼吐的泡泡"}, {"en": "Uncle Al sends them a text message", "zh": "阿尔叔叔给他们发了短信"}], "answer": 0, "explain": {"en": "Judy learned Morse code from her parents before her first African safari; SOS (three short, three long, three short) is the code word for 'Help.'", "zh": "朱迪在第一次去非洲 Safari 前跟父母学了摩斯电码；SOS（三短、三长、三短）就是「救命」的代号。"}}, {"q": {"en": "What is the Challenger Deep?", "zh": "「挑战者深渊」(Challenger Deep) 是什么？"}, "options": [{"en": "The deepest place in the ocean, about seven miles deep", "zh": "海洋中最深的地方，大约七英里（十一公里）深"}, {"en": "A shallow swimming pool for dolphins", "zh": "给海豚用的浅水游泳池"}, {"en": "A tall mountain above the clouds", "zh": "云朵上方的一座高山"}, {"en": "Soggy Bob's theme park name", "zh": "湿答答鲍勃主题公园的名字"}], "answer": 0, "explain": {"en": "Uncle Al says the Challenger Deep is the deepest place in the ocean — seven miles deep, deep enough to bury the tallest mountain. Only two people have ever been to the bottom.", "zh": "阿尔叔叔说挑战者深渊是海洋最深处——七英里深，深得能埋下最高的山。只有两个人曾经到过海底。"}}, {"q": {"en": "What are 'black smokers' on the ocean floor?", "zh": "海底的「黑烟囱」(black smokers) 是什么？"}, "options": [{"en": "Chimneys where 2000-degree water boils up carrying black minerals from inside the earth", "zh": "海底裂缝处约2000度热水带着地球内部的黑色矿物质翻涌出来，堆成的烟囱状喷口"}, {"en": "People smoking pipes on a submarine", "zh": "在潜水艇上抽烟斗的人"}, {"en": "Burning campfires left by sailors", "zh": "水手留下的篝火"}, {"en": "Black fish that blow smoke", "zh": "会吐烟的黑色鱼"}], "answer": 0, "explain": {"en": "Thudd explains that deep cracks in the ocean floor let super-hot water boil up and drag black minerals from the earth's crust, piling them into chimney shapes.", "zh": "沙德解释说，海底的深裂缝让极热的水翻涌而上，把地壳里的黑色矿物质带出来，堆成烟囱的形状。"}}, {"q": {"en": "Why don't deep-sea fish get crushed by the huge water pressure?", "zh": "为什么深海鱼不会被巨大的水压压扁？"}, "options": [{"en": "Fish are made of water, and water does not crush water — only air spaces get crushed", "zh": "鱼本身就是水做的，水不会压扁水，只有里面的空气空间才会被压扁"}, {"en": "They wear tiny metal suits", "zh": "它们穿着微型金属宇航服"}, {"en": "The water pressure stops below one mile", "zh": "水压在一英里以下就消失了"}, {"en": "Uncle Al makes them special shields", "zh": "阿尔叔叔给它们做了特殊盾牌"}], "answer": 0, "explain": {"en": "Thudd says fish are made of water, so the pressure doesn't crush them; it only crushes spaces filled with air, and deep fish have no air spaces inside.", "zh": "沙德说鱼是水做的，所以水压不会压扁它们；水压只会压扁充满空气的空间，而深海鱼体内没有空气空间。"}}, {"q": {"en": "How do the kids turn the evil Soggy Bob back into a kind person?", "zh": "孩子们怎样把变坏的湿答答鲍勃变回好人？"}, "options": [{"en": "They flash lights at him to hypnotize him and replace Doctor Kron-Tox's bad message", "zh": "他们用闪光灯对他催眠，替换掉克朗毒博士植入的坏指令"}, {"en": "They feed him a giant squid sandwich", "zh": "他们喂他吃了一个巨乌贼三明治"}, {"en": "They tickle him until he laughs", "zh": "他们把他挠痒直到他大笑"}, {"en": "They ask Uncle Al to arrest him", "zh": "他们让阿尔叔叔把他抓起来"}], "answer": 0, "explain": {"en": "Doctor Kron-Tox hypnotized Soggy Bob with flashing lights, so the kids use their own flashing lights to hypnotize him back to his old, kind self.", "zh": "克朗毒博士用闪光灯催眠了湿答答鲍勃，所以孩子们也用闪光灯把他重新催眠，唤回了他原本善良的自己。"}}, {"q": {"en": "What makes the colossal squid different from an ordinary giant squid?", "zh": "「巨型乌贼」(colossal squid) 和普通巨乌贼有什么不同？"}, "options": [{"en": "The colossal squid has swiveling hooks on its suckers; an ordinary giant squid does not", "zh": "巨型乌贼的吸盘上有可转动的钩子，普通巨乌贼没有"}, {"en": "The colossal squid is bright pink and sings songs", "zh": "巨型乌贼是亮粉色还会唱歌"}, {"en": "The ordinary giant squid is bigger than the colossal squid", "zh": "普通巨乌贼比巨型乌贼更大"}, {"en": "The colossal squid lives only in trees", "zh": "巨型乌贼只生活在树上"}], "answer": 0, "explain": {"en": "Uncle Al discovers the trapped squid is a colossal squid because ordinary giant squids do not have hooks on their suckers — only the colossal squid does.", "zh": "阿尔叔叔发现被困的是巨型乌贼，因为普通巨乌贼的吸盘上没有钩子，只有巨型乌贼才有。"}}, {"q": {"en": "According to True Stuff, what strange thing do sea cucumbers do?", "zh": "根据书末「真相时间」(True Stuff)，海参会做什么奇怪的事？"}, "options": [{"en": "They eat sand, digest the bacteria, and poop it out — and some throw their guts at predators", "zh": "它们吃沙子、消化里面的细菌再排出来——有些还会把内脏甩向捕食者"}, {"en": "They build underwater castles from shells", "zh": "它们用贝壳在海底建城堡"}, {"en": "They fly above the ocean like birds", "zh": "它们像鸟一样在海上飞"}, {"en": "They turn into stars at night", "zh": "它们晚上会变成星星"}], "answer": 0, "explain": {"en": "True Stuff says sea cucumbers suck sand off the ocean floor, digest the tiny living bits, and poop the sand back out. Some even throw their guts at predators as a snack and grow new ones!", "zh": "「真相时间」说海参会吸海底的沙子、消化里面的微生物再把沙子排出来。有些海参还会把内脏甩给捕食者当零食，几周后还能长出新的！"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
