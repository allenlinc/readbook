as and Details", "explain": {"en": "The immune system makes antibodies that attack and destroy cells containing the virus.", "zh": "免疫系统制造抗体，攻击并摧毁含病毒的细胞。"}}, {"q": {"en": "What are flu vaccines made from?", "zh": "流感疫苗是用什么制成的？"}, "options": [{"en": "Sugar water", "zh": "糖水"}, {"en": "Weakened or dead flu viruses", "zh": "弱化或死亡的流感病毒"}, {"en": "Plant leaves according to some versions of the story", "zh": "植物叶子（按书中另一种说法）"}, {"en": "Live bacteria", "zh": "活细菌"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Vaccines contain weakened or dead flu viruses that teach the body to make antibodies.", "zh": "疫苗含有弱化或死亡的流感病毒，教会身体制造抗体。"}}, {"q": {"en": "What is a 'strain' of a virus?", "zh": "病毒的“毒株”（strain）是什么？"}, "options": [{"en": "A kind of bird", "zh": "一种鸟"}, {"en": "A weather pattern according to some versions of the story", "zh": "一种天气模式（按书中另一种说法）"}, {"en": "A type of medicine", "zh": "一种药"}, {"en": "A virus that has mutated from another virus", "zh": "由另一种病毒突变而来的病毒"}], "answer": 3, "skill": "Craft and Structure", "explain": {"en": "Each virus that mutates from another is called a strain of that virus.", "zh": "由另一种病毒突变而来的每个病毒都称为该病毒的一个毒株。"}}, {"q": {"en": "Which 1918 flu killed millions of people worldwide?", "zh": "1918年哪一种流感在全球夺走了数百万人的生命？"}, "options": [{"en": "The Hong Kong flu", "zh": "香港流感"}, {"en": "The Spanish flu", "zh": "西班牙流感"}, {"en": "The Asian flu", "zh": "亚洲流感"}, {"en": "The Swine flu", "zh": "猪流感"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The 1918 Spanish flu killed more than 600,000 Americans and 25–40 million worldwide.", "zh": "1918年西班牙流感导致美国60多万人、全球2500万至4000万人死亡。"}}, {"q": {"en": "About how effective are most flu vaccines?", "zh": "大多数流感疫苗的有效率大约是多少？"}, "options": [{"en": "100 percent according to some versions of the story", "zh": "100%（按书中另一种说法）"}, {"en": "Zero percent", "zh": "0%"}, {"en": "About 80 percent", "zh": "约80%"}, {"en": "10 percent", "zh": "10%"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "Vaccines for most viral strains have an 80% prevention rate.", "zh": "多数病毒株的疫苗预防率约为80%。"}}, {"q": {"en": "Who is at greater risk of becoming seriously ill with the flu?", "zh": "哪些人患重症流感的风险更高？"}, "options": [{"en": "People over 65, babies, pregnant women, and those with diabetes or heart disease", "zh": "65岁以上老人、婴儿、孕妇以及患糖尿病或心脏病的人"}, {"en": "Only professional athletes", "zh": "只有职业运动员"}, {"en": "Only teenagers", "zh": "只有青少年"}, {"en": "Only people who live near the ocean according to some versions of the story in an early draft of the book", "zh": "只有住在海边的人（按书中另一种说法）（在书的早期草稿中）"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book lists older adults, young children, pregnant women, and people with certain health conditions as high-risk.", "zh": "书中把老人、幼儿、孕妇以及有特定疾病的人列为高风险群体。"}}, {"q": {"en": "Besides vaccines, how can you treat the flu at home?", "zh": "除了疫苗，在家如何对付流感？"}, "options": [{"en": "Stop eating completely according to some versions of the story", "zh": "完全不吃东西（按书中另一种说法）"}, {"en": "Rest, drink plenty of fluids, and use over-the-counter medicine", "zh": "休息、多喝水、服用非处方药"}, {"en": "Go to school as usual", "zh": "照常去上学"}, {"en": "Run a marathon", "zh": "跑马拉松"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book advises rest, fluids, and over-the-counter medicines to relieve flu symptoms.", "zh": "书中建议休息、补水和服用非处方药来缓解流感症状。"}}], "extended": {"prompt": {"en": "The book says flu viruses mutate into new strains every year, so scientists must guess which strains to put in each year's vaccine. Why might this make fighting the flu difficult, and what can ordinary people do to protect themselves?", "zh": "书中说流感病毒每年都会突变成新毒株，所以科学家必须猜测每年疫苗该放入哪些毒株。为什么这让对抗流感变得困难？普通人又能做些什么来保护自己？"}, "guidance": {"en": ["Explain why mutating viruses make vaccine planning hard (the vaccine may not match new strains).", "List 2–3 personal habits from the book that reduce your chance of catching the flu."], "zh": ["说明病毒突变为何让疫苗规划困难（疫苗可能不匹配新毒株）。", "列出书中提到的2–3个能降低感染风险的个人习惯。"]}}};</script>
