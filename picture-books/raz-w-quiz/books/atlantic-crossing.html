: {"en": "The book says the Donegal was the ship that would take Patrick's family to America.", "zh": "书中说唐尼戈尔号是将帕特里克一家送往美国的船。"}}, {"q": {"en": "Who was Thomas O'Brien?", "zh": "托马斯·奥布莱恩是谁？"}, "options": [{"en": "The First Mate of the Donegal who encouraged Patrick", "zh": "唐尼戈尔号的大副，曾鼓励帕特里克"}, {"en": "Patrick's father", "zh": "帕特里克的父亲"}, {"en": "The king of Ireland", "zh": "爱尔兰国王"}, {"en": "The ship's cook", "zh": "船上的厨师"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says Thomas O'Brien was the First Mate of the Donegal and gave Patrick advice at night.", "zh": "书中说托马斯·奥布莱恩是唐尼戈尔号的大副，夜里曾给帕特里克建议。"}}, {"q": {"en": "Why did Patrick climb the mast during the storm?", "zh": "风暴中帕特里克为什么要爬上桅杆？"}, "options": [{"en": "A sail had wrapped around the yardarm, which was damaged and needed someone smaller", "zh": "一面帆缠住了桁端，桁端已损坏，需要一个身形更小的人上去"}, {"en": "He wanted to steer the ship", "zh": "他想驾驶船只"}, {"en": "He was looking for his dog", "zh": "他在找自己的狗"}, {"en": "He wanted to wave at his mother", "zh": "他想向母亲挥手"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says a sail wrapped the upper yardarm, the yardarm was damaged, and they needed someone smaller to climb up.", "zh": "书中说一面帆缠住了上部桁端，桁端已损坏，需要身形更小的人爬上去处理。"}}, {"q": {"en": "How long did the crossing from Dublin to America take?", "zh": "从都柏林到美洲的横渡历时多久？"}, "options": [{"en": "About three weeks", "zh": "大约三周"}, {"en": "One day", "zh": "一天"}, {"en": "Six months", "zh": "六个月"}, {"en": "Two years", "zh": "两年"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says three weeks later Patrick stood on the deck as New York City came into view.", "zh": "书中说三周后，当纽约市出现在眼前时，帕特里克站在了甲板上。"}}, {"q": {"en": "How does the story show Patrick's feelings change?", "zh": "故事如何展现帕特里克情感的变化？"}, "options": [{"en": "He goes from angry about leaving to proud and hopeful about a future as a sailor", "zh": "他从不愿离开的愤怒，转变为以自己为荣、对水手未来充满希望"}, {"en": "He stays angry the whole trip", "zh": "他全程都在生气"}, {"en": "He becomes afraid of the sea forever", "zh": "他从此永远害怕大海"}, {"en": "He decides to return to Ireland at once", "zh": "他决定立刻返回爱尔兰"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book shows Patrick first angry at leaving, then courageous on the mast, and finally dreaming of a sailor's life in America.", "zh": "书中先写帕特里克因离开而愤怒，后写他在桅杆上表现勇敢，最终憧憬在美国当水手。"}}, {"q": {"en": "What does the book suggest about living conditions on immigrant ships?", "zh": "关于移民船上的生活条件，本书传达了什么？"}, "options": [{"en": "They depended on how much a family could spend on their fare, and were often difficult", "zh": "取决于一家能付多少船费，而且往往非常艰苦"}, {"en": "They were always luxurious", "zh": "总是很奢华"}, {"en": "They were free for everyone", "zh": "对所有人都是免费的"}, {"en": "They had swimming pools", "zh": "船上有游泳池"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Thomas tells Patrick that conditions depend on the fare a family can pay, and the journey is still difficult and uncomfortable.", "zh": "托马斯告诉帕特里克，条件取决于一家能付的船费，而旅程依然艰难不适。"}}, {"q": {"en": "What is a \"mast\" on a ship?", "zh": "船上的“mast（桅杆）”是什么？"}, "options": [{"en": "A tall pole on the deck that supports the sails", "zh": "甲板上支撑船帆的高杆"}, {"en": "The back end of the ship", "zh": "船尾"}, {"en": "A small lifeboat", "zh": "一只小救生艇"}, {"en": "The kitchen below deck", "zh": "甲板下的厨房"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines a mast as a tall pole on the deck that supports the sails.", "zh": "词汇表将 mast 定义为甲板上支撑船帆的高杆。"}}], "extended": {"prompt": {"en": "Patrick was scared but still climbed the mast to help his ship. Tell about a time you did something brave even though you were afraid.", "zh": "帕特里克虽然害怕，仍爬上桅杆帮助了全船。讲讲你曾在害怕时依然鼓起勇气做事的经历。"}, "guidance": {"en": ["Think about what made Patrick brave (his family, the crew's need).", "Describe one real or imagined brave moment and what helped you."], "zh": ["想想是什么让帕特里克变得勇敢（家人、船员的需要）。", "描
