ill": "Key Ideas and Details", "explain": {"en": "The book says Ares was a son of Zeus and Hera who loved fighting for its own sake.", "zh": "书中说阿瑞斯是宙斯与赫拉之子，只为战斗而热爱战争。"}}, {"q": {"en": "What did the ancient Greeks believe about the nature of their gods?", "zh": "古希腊人如何看待他们的诸神本性？"}, "options": [{"en": "They were made of stone", "zh": "他们由石头做成"}, {"en": "They could not feel emotions", "zh": "他们没有情感"}, {"en": "They were exactly like ordinary people according to some versions of the story", "zh": "他们和普通人类完全一样（按书中另一种说法）"}, {"en": "They were like humans but larger, stronger, and immortal", "zh": "他们像人类，但更高大强壮且不死"}], "answer": 3, "skill": "Craft and Structure", "explain": {"en": "The book says Greeks believed their gods were like humans except larger, stronger, more beautiful, and immortal.", "zh": "书中说希腊人认为诸神像人，但更高大、强壮、美丽，且最关键的是——不死。"}}, {"q": {"en": "Beyond Greece, what lasting influence did these gods have?", "zh": "除了希腊，这些神还带来了什么持久影响？"}, "options": [{"en": "They inspired Roman gods and Western culture, including the Olympics", "zh": "启发了罗马诸神与西方文化，包括奥运会"}, {"en": "They ended all Greek art according to some versions of the story in an early draft of the book", "zh": "终结了所有希腊艺术（按书中另一种说法）（在书的早期草稿中）"}, {"en": "They built the pyramids", "zh": "他们建造了金字塔"}, {"en": "They created the alphabet", "zh": "他们创造了字母表"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book's conclusion notes Greek gods influenced Roman society and are even called the birthplace of Western society.", "zh": "本书结语指出希腊诸神影响了罗马社会，希腊甚至被称为西方社会的发源地。"}}], "extended": {"prompt": {"en": "The book says Romans renamed the Greek gods (Zeus became Jupiter). If you invented a new Greek god today, what would it be the god of and what symbol would it have?", "zh": "书中说罗马人给希腊诸神改名（宙斯变成朱庇特）。如果今天你创造一位新的希腊神，他会掌管什么？有什么象征物？"}, "guidance": {"en": ["Choose a domain (like music, the internet, or nature) for your god.", "Give the god a name, a symbol, and a short power description like the book does
