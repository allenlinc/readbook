<script>window.BOOK = {"slug": "the-plague", "title": "The Plague!", "titleZh": "大瘟疫！", "level": "W", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "When did the plague ships sail into the port of Messina, Sicily?", "zh": "载着瘟疫的船只是在什么时候驶入西西里墨西拿港的？"}, "options": [{"en": "October 1347", "zh": "1347年10月"}, {"en": "January 1492", "zh": "1492年1月"}, {"en": "May 1894", "zh": "1894年5月"}, {"en": "August 1914", "zh": "1914年8月"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says that in October 1347 a dozen trading ships sailed into Messina with dead and dying crews, bringing the plague to Europe.", "zh": "书中说，1347年10月，十几艘商船驶入墨西拿，船上的船员大多已死或濒死，从而把瘟疫带到了欧洲。"}}, {"q": {"en": "In the 1300s, how did many people explain why the plague happened?", "zh": "在14世纪，许多人如何解释瘟疫发生的原因？"}, "options": [{"en": "They saw it as a supernatural event, such as the planets lining up", "zh": "他们认为是一种超自然现象，比如行星排成一线"}, {"en": "They knew it was caused by bacteria in fleas", "zh": "他们已经知道是跳蚤身上的细菌造成的"}, {"en": "They blamed a lack of rain", "zh": "他们归咎于缺雨"}, {"en": "They thought it came from the ocean", "zh": "他们认为它来自海洋"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book states that people at the time saw disease as supernatural and some blamed how the planets lined up.", "zh": "书中说，当时的人们把疾病视为超自然事件，有些人把瘟疫归咎于行星的排列方式。"}}, {"q": {"en": "According to the book, what is the word \"bubonic\" based on?", "zh": "根据本书，“bubonic（淋巴腺鼠疫）”这个词源于什么？"}, "options": [{"en": "Buboes, the painful swellings of lymph nodes", "zh": "Buboes，即淋巴结的疼痛肿胀"}, {"en": "Bubbles in the blood", "zh": "血液中的气泡"}, {"en": "A type of flower", "zh": "一种花"}, {"en": "The name of a city", "zh": "一座城市的名字"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The book explains that bubonic comes from 'buboes,' painful swellings of the lymph nodes in the neck, armpits, and groin.", "zh": "书中解释说，bubonic 来自“buboes”，即颈部、腋下和腹股沟处淋巴结的疼痛肿胀。"}}, {"q": {"en": "How did fleas help spread the plague to people?", "zh": "跳蚤是如何把瘟疫传播给人类的？"}, "options": [{"en": "Plague bacteria lived in a flea's gut; when rats died, fleas bit people for blood", "zh": "瘟疫细菌生存在跳蚤的消化道里；老鼠死后，跳蚤转而叮咬人类吸血"}, {"en": "Fleas flew into people's ears while they slept", "zh": "跳蚤在人们睡觉时飞进他们的耳朵"}, {"en": "Fleas drank water from the rivers", "zh": "跳蚤喝河里的水"}, {"en": "Fleas carried the disease on their wings", "zh": "跳蚤用翅膀携带病菌"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book describes how bacteria filled a flea's gut, killed the rats it fed on, and forced the flea to bite people instead.", "zh": "书中描述了细菌充满跳蚤的消化道，杀死它所寄生的老鼠，迫使跳蚤转而叮咬人类。"}}, {"q": {"en": "About what fraction of Europeans died during the Black Death?", "zh": "黑死病期间，大约有多少比例的欧洲人丧生？"}, "options": [{"en": "40 to 60 percent", "zh": "40%到60%"}, {"en": "Less than 1 percent", "zh": "不到1%"}, {"en": "Exactly 100 percent", "zh": "恰好100%"}, {"en": "About 5 percent", "zh": "大约5%"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says experts think that 40 to 60 percent of Europe's people died, though the rate varied by location.", "zh": "书中说，专家估计欧洲有40%至60%的人死亡，不过各地比例有所不同。"}}, {"q": {"en": "What did some cities do to try to control the disease?", "zh": "一些城市采取了什么措施来试图控制瘟疫？"}, "options": [{"en": "Blocked plague ships for a forty-day waiting period", "zh": "对来自疫区的船只实施四十天的隔离等待期"}, {"en": "Invited more travelers in", "zh": "邀请更多旅行者进来"}, {"en": "Closed all the churches", "zh": "关闭所有教堂"}, {"en": "Burned all the food", "zh": "烧掉所有食物"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book notes that port cities blocked ships from infected areas and used a forty-day wait to confirm crews were plague-free.", "zh": "书中提到，港口城市拦截来自疫区的船只，并用四十天的等待期来确认船员未染瘟疫。"}}, {"q": {"en": "Why does the book mention the Renaissance and the Peasants' Revolt?", "zh": "本书为什么要提及文艺复兴和农民起义？"}, "options": [{"en": "To show the long-term changes the plague brought to Europe", "zh": "为了说明瘟疫给欧洲带来的长远变化"}, {"en": "To describe a different disease", "zh": "为了描述另一种疾病"}, {"en": "To explain how to build castles", "zh": "为了解释如何建造城堡"}, {"en": "To list the kings of England", "zh": "为了列举英格兰的国王"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The author links the disaster to later changes, such as the Renaissance (rebirth) and the 1381 Peasants' Revolt caused by worker shortages.", "zh": "作者把这场灾难与后来的变化联系起来，例如文艺复兴（rebirth，重生）以及因劳动力短缺引发的1381年农民起义。"}}, {"q": {"en": "What does the word \"Renaissance\" mean in French?", "zh": "“Renaissance” 在法语中是什么意思？"}, "options": [{"en": "Rebirth", "zh": "重生"}, {"en": "War", "zh": "战争"}, {"en": "Harvest", "zh": "丰收"}, {"en": "Sickness", "zh": "疾病"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The book states that Renaissance means 'rebirth' in French and describes the period of improvement after the plague.", "zh": "书中说明 Renaissance 在法语中是“重生”的意思，指代瘟疫之后那段不断进步的时期。"}}, {"q": {"en": "Who discovered the mold that led to the medicine penicillin?", "zh": "是谁发现了促成青霉素药物的霉菌？"}, "options": [{"en": "Alexander Fleming in the 1920s", "zh": "20世纪20年代的亚历山大·弗莱明"}, {"en": "A doctor in 1348", "zh": "1348年的一位医生"}, {"en": "The king of Sicily", "zh": "西西里国王"}, {"en": "A sailor on the plague ships", "zh": "瘟疫船上的水手"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says Scottish biologist Alexander Fleming accidentally discovered a mold in the 1920s that led to penicillin; he won a Nobel Prize in 1945.", "zh": "书中说，苏格兰生物学家亚历山大·弗莱明在20世纪20年代偶然发现了一种霉菌，由此诞生了青霉素；他于1945年获得诺贝尔奖。"}}, {"q": {"en": "What was one effect of the worker shortage after the plague?", "zh": "瘟疫后的劳动力短缺带来了什么影响之一？"}, "options": [{"en": "Workers could demand better pay and treatment", "zh": "工人能够要求更高的工资和更好的待遇"}, {"en": "Everyone became a farmer", "zh": "所有人都成了农民"}, {"en": "Wages were frozen by law forever", "zh": "工资被法律永远冻结"}, {"en": "No one worked again", "zh": "再没有人工作"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book explains that with so few workers left, laborers were able to demand better pay and treatment, and wages rose sharply.", "zh": "书中解释说，由于劳动力所剩无几，劳动者得以要求更高的工资和更好的待遇，工资大幅上涨。"}}], "extended": {"prompt": {"en": "The Black Death changed Europe forever. If you were a young person living then, what would worry you most and how might you try to stay safe?", "zh": "黑死病永远改变了欧洲。假如你是当时的一名年轻人，你最担心什么？你又会怎样努力保护自己？"}, "guidance": {"en": ["Think about what the book says people did, like fleeing cities or burning incense.", "Explain whether you think those actions would really help and why."], "zh": ["想想书中人们做过的事，比如逃离城市或焚烧香料。", "说说你认为这些做法是否真的有用，并说明原因。"]}}};</script>
