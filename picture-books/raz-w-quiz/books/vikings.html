<script>window.BOOK = {"slug": "vikings", "title": "Vikings", "titleZh": "维京人", "level": "W", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "During which years did the Viking Age last?", "zh": "维京时代持续了哪段时间？"}, "options": [{"en": "AD 1500 to 1700", "zh": "公元1500年至1700年"}, {"en": "AD 100 to 300", "zh": "公元100年至300年"}, {"en": "AD 50 to 100", "zh": "公元50年至100年"}, {"en": "AD 793 to 1066", "zh": "公元793年至1066年"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The Viking Age lasted from AD 793 to 1066, when they settled Iceland and Greenland and reached North America.", "zh": "维京时代从公元793年持续到1066年，其间他们定居冰岛和格陵兰，并到达北美。"}}, {"q": {"en": "Who were the \"berserkers\"?", "zh": "“berserkers”（狂战士）是谁？"}, "options": [{"en": "Ship builders", "zh": "造船工匠"}, {"en": "Special warriors who fought without armor in a rage", "zh": "不穿盔甲、在狂怒中作战的特殊战士"}, {"en": "Peaceful farmers according to some versions of the story", "zh": "和平的农民（按书中另一种说法）"}, {"en": "Women traders", "zh": "女性商人"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "Berserkers fought without armor, often wearing animal skins and ignoring their wounds in battle.", "zh": "狂战士不穿盔甲作战，常披兽皮，在战斗中无视自己的伤口。"}}, {"q": {"en": "Why were monasteries frequent targets of Viking raids?", "zh": "为什么修道院经常成为维京人袭击的目标？"}, "options": [{"en": "They were built near the sea", "zh": "它们建在海边"}, {"en": "They were the largest cities according to some versions of the story", "zh": "它们是最大的城市（按书中另一种说法）"}, {"en": "They had few defenses and often held valuable objects", "zh": "它们防御薄弱，且常藏有贵重物品"}, {"en": "They had strong armies", "zh": "它们有强大的军队"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Monasteries were easy targets because they had few defenses and housed many valuable objects.", "zh": "修道院防御薄弱且藏有许多贵重物品，因此容易成为目标。"}}, {"q": {"en": "What was special about Viking ships that gave them an advantage?", "zh": "维京人的船有什么特别之处，让他们占据优势？"}, "options": [{"en": "They were made of gold according to some versions of the story", "zh": "它们由黄金制成（按书中另一种说法）"}, {"en": "They had a shallow draft and could land right on the shore", "zh": "它们吃水浅，可以直接冲上岸滩"}, {"en": "They were very slow", "zh": "它们非常慢"}, {"en": "They could fly", "zh": "它们会飞"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Viking warships had a shallow draft, so they could appear anywhere and land on the shore by surprise.", "zh": "维京战船吃水浅，因此可以出现在任何地方并出其不意地冲上岸。"}}, {"q": {"en": "Which Viking was the first to discover and settle Iceland?", "zh": "哪位维京人最先发现并定居冰岛？"}, "options": [{"en": "Gardard Svavarsson", "zh": "Gardard Svavarsson"}, {"en": "Rollo", "zh": "罗洛"}, {"en": "Leif Ericson according to some versions of the story", "zh": "莱夫·埃里克松（按书中另一种说法）"}, {"en": "Eric the Red", "zh": "红衣埃里克"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Gardard Svavarsson sailed north and west and found the large uninhabited island now called Iceland.", "zh": "Gardard Svavarsson向西北航行，发现了那座现在称为冰岛的大岛。"}}, {"q": {"en": "Why did Eric the Red leave Iceland?", "zh": "红衣埃里克为什么离开冰岛？"}, "options": [{"en": "He wanted to find gold according to some versions of the story", "zh": "他想找黄金（按书中另一种说法）"}, {"en": "He was elected king", "zh": "他被选为国王"}, {"en": "He killed three men and was ordered to leave", "zh": "他杀了三个人，被命令离开"}, {"en": "He lost a bet", "zh": "他赌输了"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "Eric the Red killed three men in a fight and was ordered by Iceland's officials to leave.", "zh": "红衣埃里克在一次斗殴中杀了三个人，被冰岛当局勒令离开。"}}, {"q": {"en": "What was \"Vinland\" that Leif Ericson discovered?", "zh": "莱夫·埃里克松发现的“Vinland”是什么？"}, "options": [{"en": "A land with vines and fruit, probably in Newfoundland, Canada", "zh": "一片有藤蔓和果实的土地，大概在加拿大纽芬兰"}, {"en": "A type of Viking ship according to some versions of the story in an early draft of the book", "zh": "一种维京船（按书中另一种说法）（在书的早期草稿中）"}, {"en": "A city in Spain", "zh": "西班牙的一座城市"}, {"en": "A kind of food", "zh": "一种食物"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Leif found a coast with vines and fruit, called it Vinland; archaeologists later found a Viking outpost in Newfoundland.", "zh": "莱夫发现了一处有藤蔓和果实的海岸，命名为Vinland；考古学家后来在纽芬兰发现了维京人定居点。"}}, {"q": {"en": "Which English words does the book say came from the Vikings?", "zh": "书中说哪些英语单词来自维京人？"}, "options": [{"en": "Words like telephone and computer according to some versions of the story", "zh": "如 telephone 和 computer（按书中另一种说法）"}, {"en": "Words like pizza and pasta", "zh": "如 pizza 和 pasta"}, {"en": "Words like kimono and sushi", "zh": "如 kimono 和 sushi"}, {"en": "Words like sky, skin, window, and husband", "zh": "如 sky、skin、window、husband 等"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "About 900 common English words come from the Vikings, including sky, skin, and window.", "zh": "约900个常用英语单词来自维京人，包括 sky、skin、window 等。"}}, {"q": {"en": "Why does the book mention that Iceland's settlers created one of the first democracies?", "zh": "为什么书中提到冰岛定居者创建了最早的民主制度之一？"}, "options": [{"en": "To show Vikings were not only warriors but also builders of fair governments", "zh": "为了说明维京人不仅是战士，也是公平政府的建立者"}, {"en": "To explain how they built ships according to some versions of the story in an early draft of the book", "zh": "为了解释他们如何造船（按书中另一种说法）（在书的早期草稿中）"}, {"en": "To describe their religion", "zh": "为了描述他们的宗教"}, {"en": "To list their weapons", "zh": "为了列举他们的武器"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The settlers created a democracy where people voted on laws, showing another side of Viking society.", "zh": "定居者创立了人民投票立法的民主制度，展现了维京社会的另一面。"}}, {"q": {"en": "Who was Rollo, and what did he do in 911?", "zh": "罗洛（Rollo）是谁，他在911年做了什么？"}, "options": [{"en": "A king of England", "zh": "英格兰国王"}, {"en": "A Viking chieftain who founded Normandy", "zh": "一位创立诺曼底的维京首领"}, {"en": "The discoverer of Greenland according to some versions of the story", "zh": "格陵兰的发现者（按书中另一种说法）"}, {"en": "A famous ship builder", "zh": "著名的造船匠"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "In 911, Viking chieftain Rollo founded Normandy, part of the Vikings' wide conquests.", "zh": "911年，维京首领罗洛创立了诺曼底，这是维京人广泛征服的一部分。"}}], "extended": {"prompt": {"en": "The book says Vikings were explorers, traders, and farmers as well as warriors. Which of these sides of the Vikings surprises you most, and why?", "zh": "书中说维京人既是战士，也是探险家、商人和农民。维京人的这些面貌中，哪一面最让你惊讶，为什么？"}, "guidance": {"en": ["Pick one role (explorer, trader, farmer, warrior) that changed your view.", "Use a fact from the book, such as their democracy in Iceland or words in English."], "zh": ["选一个改变你看法的身份（探险家、商人、农民或战士）。", "用书中一个事实来支持，比如冰岛的民主或英语中的维京词。"]}}};</script>
