ng conquests over about 275 years", "zh": "帮助读者了解约275年间维京人征服活动的顺序与跨度"}, {"en": "To prove the Vikings were peaceful", "zh": "为了证明维京人是和平的"}, {"en": "To list Viking kings", "zh": "为了列出维京国王"}, {"en": "To show only trade routes", "zh": "为了只展示贸易路线"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book says for about 275 years the Vikings swept across Europe, and the timeline lists key raid and settlement dates to show that long span.", "zh": "书中说维京人约275年间横扫欧洲，时间线列出关键的袭击与定居日期，以展现这段漫长的历史。"}}], "extended": {"prompt": {"en": "The Vikings were both fierce raiders and skilled explorers who reached North America long before Columbus. Which side of the Viking story do you find more interesting, and why?", "zh": "维京人既是凶猛的掠夺者，也是技艺高超的探险家，早在哥伦布之前就到达了北美。你觉得维京人故事中哪一面更有趣，为什么？"}, "guidance": {"en": ["State whether you find the raiding or the exploring more interesting.", "Give one reason from the book that supports your choice."], "zh": ["说明你觉得掠夺还是探险更有趣。", "从书中举出一个支持你选择的理由。"]}}};</script>
