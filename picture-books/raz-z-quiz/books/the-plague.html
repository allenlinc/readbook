d executed generals", "zh": "国王归咎于军队并处决了将领"}, {"en": "Scientists immediately found a cure in 1347", "zh": "科学家在 1347 年立刻找到了解药"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says some Christians 'wrongly blamed Jews' and 'Pope Clement VI issued a declaration making it clear that Jews were not at fault,' yet 'more than two hundred Jewish villages were destroyed.'", "zh": "书中说一些基督徒“错误地归咎于犹太人”，且“教皇克雷芒六世发表声明，明确犹太人无罪”，然而“仍有 200 多个犹太村庄被毁”。"}}, {"q": {"en": "The book says the period after the plague was the Renaissance, meaning 'rebirth.' Why does the author connect the disaster to the Renaissance?", "zh": "书中说瘟疫之后的时期是“文艺复兴”（Renaissance），意即“重生”。作者为什么把这场灾难与文艺复兴联系起来？"}, "options": [{"en": "To show that, although devastating, the catastrophe led to positive changes in medicine, science, art, and society", "zh": "为了说明这场灾难虽然毁灭性，却带来了医学、科学、艺术和社会方面的积极变化"}, {"en": "To argue the plague was a good thing overall", "zh": "为了主张瘟疫总体而言是好事"}, {"en": "To say the Renaissance happened before the plague", "zh": "为了说文艺复兴发生在瘟疫之前"}, {"en": "To prove nothing changed after the plague", "zh": "为了证明瘟疫后什么都没改变"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book links the disaster to 'many changes for the better' and notes the Renaissance 'inspired great advancements in medicine, science, and art.'", "zh": "书中把灾难与“许多向好的变化”联系起来，并指出文艺复兴“激发了医学、科学和艺术的巨大进步”。"}}, {"q": {"en": "Why does the author mention Alexander Fleming and penicillin near the end of the book?", "zh": "作者为什么在书末提到亚历山大·弗莱明和青霉素？"}, "options": [{"en": "To explain that modern medicine (penicillin, discovered in the 1920s) makes another outbreak of the Black Death almost impossible", "zh": "为了说明现代医学（1920 年代发现的青霉素）让黑死病再次大规模爆发几乎不可能"}, {"en": "To say penicillin was available in the 1300s", "zh": "为了说青霉素在 1300 年代就能用"}, {"en": "To prove the plague was caused by bacteria no one could study", "zh": "为了证明瘟疫由无人能研究的细菌引起"}, {"en": "To suggest people should avoid all doctors",
