<script>window.BOOK = {"slug": "the-black-stones", "title": "The Black Stones", "titleZh": "黑石", "level": "Z", "genre": "Literary", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "What do Tala and Paco discover at the base of Apache Leap Mountain near the riverbank?", "zh": "塔拉和帕科在阿帕奇跳崖山山脚、河岸边发现了什么？"}, "options": [{"en": "Two small black stones (obsidian) smoothed by the river", "zh": "两块被河流磨得光滑的小黑石（黑曜石）"}, {"en": "A hidden treasure chest full of gold according to some versions of the story", "zh": "一个装满金子的藏宝箱（按书中另一种说法）"}, {"en": "An ancient arrowhead from a museum", "zh": "来自博物馆的古老箭头"}, {"en": "A painted portrait of their father", "zh": "他们父亲的画像"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Tala 'snatched up the two small black stones near the riverbank at the base of Apache Leap Mountain.' They were jet-black, glassy stones formed by rapidly cooled lava — obsidian.", "zh": "塔拉在阿帕奇跳崖山山脚、河岸边'抓起两块小黑石'。它们是漆黑、玻璃般光滑的石头，由迅速冷却的熔岩形成——即黑曜石。"}}, {"q": {"en": "How long ago did the twins' father die?", "zh": "这对双胞胎的父亲是在多久前去世的？"}, "options": [{"en": "Five years ago", "zh": "五年前"}, {"en": "One year ago", "zh": "一年前"}, {"en": "He was still alive, just away", "zh": "他还活着，只是外出了"}, {"en": "Three years ago", "zh": "三年前"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "Mrs. Yates thinks about 'how challenging her life had become. The death of her husband three years ago had been difficult.'", "zh": "耶茨夫人想到'生活变得多么艰难。三年前丈夫的去世让人难以承受'。"}}, {"q": {"en": "How does the author contrast Tala's and Paco's worldviews?", "zh": "作者如何对比塔拉和帕科的世界观？"}, "options": [{"en": "Tala sees the world as a scientist; Paco sees it as a magical place filled with poems", "zh": "塔拉以科学家的眼光看世界；帕科则把它看作充满诗意之美的神奇之地"}, {"en": "Tala is poetic; Paco is scientific", "zh": "塔拉富有诗意；帕科讲究科学"}, {"en": "Both see the world only through science according to some versions of the story in an early draft of the book", "zh": "两人都只用科学的眼光看世界（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Both see the world only through magic", "zh": "两人都只用魔法的眼光看世界"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The book states 'Tala looked at the world as a scientist' while Paco 'saw the world as a magical place filled with poems waiting to be written.'", "zh": "书中写道'塔拉以科学家的眼光看世界'，而帕科'把世界看作充满待写诗意的神奇之地'。"}}, {"q": {"en": "What did the twins learn from their computer research about the stones?", "zh": "双胞胎通过电脑查资料，了解到这些石头的什么？"}, "options": [{"en": "They are diamonds formed deep underground", "zh": "它们是地下深处形成的钻石"}, {"en": "They were made by the twins' father", "zh": "它们是双胞胎的父亲制造的"}, {"en": "They are called obsidian (volcanic glass) AND are considered good-luck stones", "zh": "它们叫黑曜石（火山玻璃），同时也被视为幸运石"}, {"en": "They are ordinary river pebbles with no special meaning according to some versions of the story", "zh": "它们是普通的河卵石，没有特殊意义（按书中另一种说法）"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "Tala says the stones 'are called obsidian, and they were ejected from a volcano,' and Paco says 'these stones were good-luck stones.' They conclude, 'It looks as if we were both right.'", "zh": "塔拉说石头'叫作黑曜石，是从火山喷出的'，帕科说'这些石头是幸运石'。他们得出结论：'看来我们俩都对。'"}}, {"q": {"en": "According to the legend of the Apache Tears, why are the black stones said to contain tears?", "zh": "根据'阿帕奇之泪'的传说，为什么说黑石中蕴含着泪水？"}, "options": [{"en": "Apache women's grief was so great that the Great Father embedded their tears into the black stones", "zh": "阿帕奇妇女的悲痛如此深重，以至大父将她们的泪水嵌入黑石之中"}, {"en": "The twins' mother cried onto them", "zh": "双胞胎的母亲对着石头哭泣"}, {"en": "A river spirit cried into the stones", "zh": "河神对着石头哭泣"}, {"en": "The stones weep because they are made entirely of water according to some versions of the story in an early draft of the book", "zh": "石头会哭，因为它们完全由水构成（按书中另一种说法）（在书的早期草稿中）"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The legend says that when the Apache women heard of their warriors' deaths, 'the Great Father embedded their tears into the black stones that rested in the river.'", "zh": "传说中，当阿帕奇妇女得知战士们牺牲时，'大父将她们的泪水嵌入了河中的黑石'。"}}, {"q": {"en": "Why does Mrs. Yates ask the twins to research the stones together 'as a gift to me' without arguing?", "zh": "耶茨夫人为什么要双胞胎'作为送给我的礼物“、不吵架地一起研究石头？"}, "options": [{"en": "To keep them from going outside", "zh": "为了不让他们出门"}, {"en": "To punish them for fighting", "zh": "为了惩罚他们吵架"}, {"en": "Because she wanted the stones for herself according to some versions of the story in an early draft of the book", "zh": "因为她自己想要这些石头（按书中另一种说法）（在书的早期草稿中）"}, {"en": "To help them learn to cooperate and heal their relationship after their father's death", "zh": "为了让他们学会合作，并在父亲去世后修复彼此的关系"}], "answer": 3, "skill": "Author's Purpose and Perspective", "explain": {"en": "She says, 'I would like you both to research your stones without arguing, just this once... Life is much more enjoyable if you cooperate to solve your problems.'", "zh": "她说：'我希望你们俩这次一起研究石头，不要吵架……如果你们合作解决问题，生活会更美好。'"}}, {"q": {"en": "In the glossary, how is 'obsidian' defined?", "zh": "在词汇表中，'obsidian（黑曜石）'是如何定义的？"}, "options": [{"en": "A magical object believed to hold protective spells according to some versions of the story", "zh": "被认为具有保护咒语的魔法物件（按书中另一种说法）"}, {"en": "A smooth, glassy rock formed when volcanic lava cools rapidly", "zh": "一种光滑、玻璃状的岩石，由火山熔岩迅速冷却形成"}, {"en": "A deep rift in the earth", "zh": "地球上的一道深裂谷"}, {"en": "A spiritual journey to a sacred place", "zh": "前往圣地的精神之旅"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The glossary defines obsidian as 'a smooth, glassy rock formed when volcanic lava cools rapidly.'", "zh": "词汇表将obsidian定义为'一种光滑、玻璃状的岩石，由火山熔岩迅速冷却形成'。"}}, {"q": {"en": "What does Mrs. Yates ultimately do with the Apache Tears stones?", "zh": "耶茨夫人最终如何处理这些“阿帕奇之泪“石头？"}, "options": [{"en": "Gives them to the park ranger according to some versions of the story", "zh": "把它们送给公园管理员（按书中另一种说法）"}, {"en": "Has them made into a necklace that she wears always", "zh": "把它们制成项链，并一直佩戴"}, {"en": "Throws them back into the river", "zh": "把它们扔回河里"}, {"en": "Sells them for money", "zh": "把它们卖掉换钱"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "After the twins give her the stones, 'she went to a jeweler and had the stones made into a necklace. When the necklace was ready, she slipped it on and never took it off again.'", "zh": "双胞胎把石头送给她后，'她去找珠宝匠，把石头做成项链。项链做好后，她戴上就再也没摘下来过。'"}}, {"q": {"en": "How do the two black stones function both as science and as symbol in the story?", "zh": "在故事中，这两块黑石如何同时具有科学意义和象征意义？"}, "options": [{"en": "They represent the river's pollution", "zh": "它们代表河流的污染"}, {"en": "They are only a geological curiosity with no meaning according to some versions of the story in an early draft of the book", "zh": "它们只是地质上的奇物，毫无意义（按书中另一种说法）（在书的早期草稿中）"}, {"en": "They are volcanic glass formed by lava, yet also symbols of Apache women's sorrow and the twins' renewed bond", "zh": "它们是由熔岩形成的火山玻璃，同时也是阿帕奇妇女悲恸与双胞胎重新联结的象征"}, {"en": "They are purely decorative jewelry", "zh": "它们只是装饰性的珠宝"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Scientifically they are obsidian (volcanic glass from lava), but through the Apache Tears legend they symbolize the women's grief — and by the end they symbolize the twins' healed family bond.", "zh": "从科学上说它们是黑曜石（熔岩形成的火山玻璃），但通过'阿帕奇之泪'传说，它们象征着妇女的悲恸——到结尾又象征着双胞胎修复的家庭纽带。"}}, {"q": {"en": "What is the central message of 'The Black Stones'?", "zh": "《黑石》的核心主旨是什么？"}, "options": [{"en": "Science is always better than storytelling according to some versions of the story", "zh": "科学总胜过讲故事（按书中另一种说法）"}, {"en": "Cooperation and family love can help heal grief and bring people together", "zh": "合作与亲情能够帮助疗愈悲伤，让人走到一起"}, {"en": "Twins should never share", "zh": "双胞胎永远不该分享"}, {"en": "Stones are more valuable than people", "zh": "石头比人更有价值"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The twins realize 'their quarreling was only adding to their mother's grief over their father's death... they needed to find a way to live in harmony as a family again,' and the stones 'really had brought them all good luck.'", "zh": "双胞胎意识到'他们的争吵只是加重了母亲对父亲去世的悲痛……他们需要找到重新和睦相处的方式'，而石头'真的给他们大家带来了好运'。"}}], "extended": {"prompt": {"en": "Have you ever argued with a sibling or friend over something small, only to realize later it wasn't worth the fight? How might working together on a shared goal have changed things?", "zh": "你有没有因为小事和兄弟姐妹或朋友争吵，事后才觉得不值得？如果当时一起为共同目标合作，结果会有什么不同？"}, "guidance": {"en": ["Think of a time you and someone close competed or fought over an object or idea.", "Consider how looking at the same situation from the other person's perspective could build understanding."], "zh": ["回想一次你与亲近的人为了某样东西或某个想法而竞争或争吵的经历。", "想想如果从对方的角度看待同一件事，是否能增进理解。"]}}};</script>
