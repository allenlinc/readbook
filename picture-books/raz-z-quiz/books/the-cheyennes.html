<script>window.BOOK = {"slug": "the-cheyennes", "title": "The Cheyennes", "titleZh": "夏延人", "level": "Z", "genre": "Historical Fiction", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "What does the name 'Cheyennes' mean, according to the book?", "zh": "根据本书，“夏延人（Cheyennes）“这个名字是什么意思？"}, "options": [{"en": "Black Bird's Tribe", "zh": "黑鸟的部落"}, {"en": "People Who Talk Strangely (given by the Sioux)", "zh": "说话奇怪的人（由苏族人命名）"}, {"en": "Buffalo Hunters", "zh": "水牛猎人"}, {"en": "Our People (what they called themselves) according to some versions of the story", "zh": "我们的人民（他们对自己的称呼）（按书中另一种说法）"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "'It was the Sioux who gave the Cheyennes their name, which means \"People Who Talk Strangely.\" The Cheyennes called themselves \"Our People.\"'", "zh": "'是苏族人给夏延人起了这个名字，意为“说话奇怪的人“。夏延人自称“我们的人民“。'"}}, {"q": {"en": "In his vision, what does Sitting Bull see before the battle?", "zh": "在西廷·布尔（Sitting Bull）的幻象中，开战前他看到了什么？"}, "options": [{"en": "Bluecoat soldiers, as numerous as grasshoppers, falling upside down into the village — a victory", "zh": "数不胜数、如蝗虫般的蓝衣士兵倒栽葱般落入村庄——预示一场胜利"}, {"en": "A great flood destroying the village according to some versions of the story in an early draft of the book", "zh": "一场淹没村庄的大洪水（按书中另一种说法）（在书的早期草稿中）"}, {"en": "The buffalo returning", "zh": "水牛归来"}, {"en": "The sun going dark forever", "zh": "太阳永远黯淡下去"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "After the sun dance, Sitting Bull said he saw 'Bluecoat soldiers, as numerous as grasshoppers, were falling upside down into the village... they would win a great victory over them.'", "zh": "太阳舞之后，西廷·布尔说他看见'数不胜数、如蝗虫般的蓝衣士兵倒栽葱般落入村庄……他们将大获全胜'。"}}, {"q": {"en": "How does the book blend fact and fiction?", "zh": "本书如何将事实与虚构融合在一起？"}, "options": [{"en": "It invents all of the history", "zh": "它全盘虚构了历史"}, {"en": "It frames real history (Little Bighorn) through a fictional boy, Black Bird, with an author's note clarifying this", "zh": "它借助虚构男孩黑鸟来呈现真实历史（小大角战役），并以后记加以说明"}, {"en": "It is a biography of a real boy according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "它是一位真实男孩的传记（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "It contains no fictional elements", "zh": "它不含任何虚构成分"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The Author's Note states: 'This story is not based on the actual experiences of Black Bird as not much is known about him, but this story could have been his.'", "zh": "后记写道：'这个故事并非基于黑鸟的真实经历，因为关于他的记载很少，但本故事可能是他的经历。'"}}, {"q": {"en": "What does the vision quest at the beginning establish for Black Bird?", "zh": "开篇的“幻象 quest（成年寻梦）“为黑鸟确立了什么？"}, "options": [{"en": "That he will become a farmer", "zh": "他将成为一个农夫"}, {"en": "That he rejects Cheyenne traditions according to some versions of the story in an early draft of the book", "zh": "他拒绝夏延人的传统（按书中另一种说法）（在书的早期草稿中）"}, {"en": "A connection to a spirit guardian (the black bird) that will protect him", "zh": "他与一位灵性守护者（黑鸟）的连接，它将保护他"}, {"en": "That he fears the village", "zh": "他害怕自己的村庄"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "The great black bird tells the boy, 'I have been sent by the Great Spirit to be your guide through life... a mighty spirit who will protect you from all danger,' and he is named Black Bird.", "zh": "那只巨大的黑鸟告诉男孩：'我受大神差遣，做你一生的指引……一位强大的精灵，将保护你免受一切危险。'他因此被命名为黑鸟。"}}, {"q": {"en": "What larger historical pattern connects the destruction of the buffalo to the Cheyennes' fate?", "zh": "水牛的毁灭与夏延人的命运之间，存在怎样更宏大的历史关联？"}, "options": [{"en": "White hunters killed millions of bison, removing the Plains people's food/supplies and aiding their defeat", "zh": "白人猎手射杀了数百万头野牛，夺走了平原民族的食物与物资，加速了他们的败亡"}, {"en": "Buffalo multiplied and pushed natives out", "zh": "水牛数量暴增，把原住民挤了出去"}, {"en": "Buffalo were never important", "zh": "水牛从来都不重要"}, {"en": "The Cheyennes ate too many buffalo voluntarily according to some versions of the story in an early draft of the book", "zh": "夏延人自愿吃掉了太多水牛（按书中另一种说法）（在书的早期草稿中）"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "'The Native Americans of the Great Plains needed the buffalo to survive... White hunters killed bison by the millions... By the late 1880s, the great herds were nothing but a memory.'", "zh": "'大平原上的美洲原住民需要水牛才能生存……白人猎手射杀了数百万头野牛……到19世纪80年代末，庞大的兽群只剩回忆。'"}}, {"q": {"en": "Why does the author include the Afterword about Ben Nighthorse Campbell and modern Cheyennes?", "zh": "作者为什么在“后记“中加入本·夜马·坎贝尔（Ben Nighthorse Campbell）和当代夏延人的内容？"}, "options": [{"en": "To prove the Cheyennes no longer exist according to some versions of the story", "zh": "为了证明夏延人已不复存在（按书中另一种说法）"}, {"en": "To promote a political candidate", "zh": "为了宣传某位政治候选人"}, {"en": "To focus only on the 1800s", "zh": "为了只关注19世纪"}, {"en": "To show the Cheyennes' survival and contribution to modern American society", "zh": "为了展现夏延人的存续及其对现代美国社会的贡献"}], "answer": 3, "skill": "Author's Purpose and Perspective", "explain": {"en": "The Afterword notes 1924 citizenship and that 'One of the most famous is Ben Nighthorse Campbell... a U.S. senator from Colorado from 1992 to 2005.'", "zh": "后记提到1924年获得公民身份，并说'最著名的人物之一是本·夜马·坎贝尔……1992至2005年担任科罗拉多州联邦参议员'。"}}, {"q": {"en": "What happened to Custer and his men at the Greasy Grass River?", "zh": "在润滑脂草河（Greasy Grass River，即小大角河）一役中，卡斯特和他的部下遭遇了什么？"}, "options": [{"en": "They retreated safely", "zh": "他们安全撤退了"}, {"en": "Custer and all 210 men under his direct command were killed", "zh": "卡斯特及他直接统率的所有210名部下全部阵亡"}, {"en": "They captured Sitting Bull according to some versions of the story", "zh": "他们俘虏了西廷·布尔（按书中另一种说法）"}, {"en": "They won a great victory", "zh": "他们赢得了一场大胜"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "'Within an hour, the battle was over. Custer and all of the 210 men under his direct command lay dead.'", "zh": "'不到一小时，战斗结束。卡斯特及他直接统率的所有210名部下横尸疆场。'"}}, {"q": {"en": "When did the Cheyennes obtain horses and become Plains buffalo hunters?", "zh": "夏延人是什么时候得到马、并成为平原水牛猎人的？"}, "options": [{"en": "In the 1600s from the British according to some versions of the story", "zh": "17世纪从英国人那里得到（按书中另一种说法）"}, {"en": "After 1900", "zh": "1900年之后"}, {"en": "They always had horses", "zh": "他们一直都有马"}, {"en": "In the 1700s, after horses were brought by Spanish settlers", "zh": "在18世纪，马被西班牙殖民者带入之后"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "'In the 1700s, they obtained their first horses. These immensely useful animals had been brought to the Americas by Spanish settlers... [they] became buffalo hunters on the Great Plains.'", "zh": "'18世纪，他们得到了第一批马。这些极有用的动物是由西班牙殖民者带入美洲的……〔他们〕成为大平原上的水牛猎人。'"}}, {"q": {"en": "How does the book portray the U.S. government's promise of the Black Hills versus its actions?", "zh": "本书如何呈现美国政府对黑山（Black Hills）的承诺与其实际行为之间的反差？"}, "options": [{"en": "The Black Hills were beloved Cheyenne/Sioux land full of miners, and the government stopped keeping miners out, then forced natives onto reservations", "zh": "黑山是夏延人与苏族珍视的土地，却挤满矿工；政府不再驱赶矿工，进而将原住民逼进保留地"}, {"en": "The Cheyennes sold the Black Hills willingly", "zh": "夏延人心甘情愿地卖掉了黑山"}, {"en": "The government protected the Black Hills for the Cheyennes according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "政府为夏延人保护了黑山（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "The Black Hills were always owned by settlers", "zh": "黑山一直归定居者所有"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "'The Black Hills were beloved by the Cheyennes and Sioux, who owned the land. But the hills were already full of gold miners, and the U.S. government had stopped trying to keep them out.'", "zh": "'黑山深受夏延人和苏族珍视，土地本属他们。但山中已挤满淘金者，美国政府也不再设法将他们挡在外面。'"}}, {"q": {"en": "What theme does the book convey through Black Bird's story?", "zh": "通过黑鸟的故事，本书传达了什么主题？"}, "options": [{"en": "That horses are useless", "zh": "马毫无用处"}, {"en": "That natives should abandon tradition according to some versions of the story in an early draft of the book", "zh": "原住民应当抛弃传统（按书中另一种说法）（在书的早期草稿中）"}, {"en": "The courage and tragedy of the Plains peoples facing loss of freedom and way of life", "zh": "平原民族在失去自由与生活方式时所展现的勇气与悲剧"}, {"en": "That victory is always permanent", "zh": "胜利永远是永久的"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book traces the Cheyennes from a vision-filled free life through war and the 'End of Freedom,' closing with survival — framing their struggle as both tragic and enduring.", "zh": "本书从充满幻象的自由生活，写到战争与'自由的终结'，并以存续收尾——将他们的抗争呈现为既悲壮又坚韧。"}}], "extended": {"prompt": {"en": "Black Bird's people valued a vision that guided his life. Do you have a personal 'vision' or guiding belief? How might it shape the choices you make?", "zh": "黑鸟的民族珍视指引生命的“幻象“。你有没有个人的“幻象“或信念指引？它如何影响你的选择？"}, "guidance": {"en": ["Think about a value or dream that helps you decide what to do.", "Consider how loss or pressure can test that guiding belief, as it did for the Cheyennes."], "zh": ["想想一个帮助你做决定的价值观或梦想。", "思考如同夏延人所经历的那样，失去或压力会如何考验这一信念。"]}}};</script>
