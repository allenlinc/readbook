<script>window.BOOK = {"slug": "native-americans-of-the-great-plains", "title": "Native Americans of the Great Plains", "titleZh": "大平原上的美洲原住民", "level": "Z", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "What animal was the mainstay of many Plains tribes' diets and provided them with materials for clothing, shelter, and tools?", "zh": "哪种动物是大平原许多部落饮食的主要来源，并为他们提供衣物、住所和工具的材料？"}, "options": [{"en": "bison (buffalo)", "zh": "野牛（水牛）"}, {"en": "deer", "zh": "鹿"}, {"en": "horses", "zh": "马"}, {"en": "fish", "zh": "鱼"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says 'Bison were the mainstay of many Plains tribes' diets' and that tribes 'found uses for all parts of the bison' for hides, bones, horns, and more.", "zh": "书中写道「野牛是大平原许多部落饮食的主要来源」，且各部落「对野牛的各个部位都有用途」，用于兽皮、骨头、牛角等。"}}, {"q": {"en": "According to the book, what were teepees made from?", "zh": "根据本书，圆锥形帐篷（teepee）是用什么做的？"}, "options": [{"en": "wooden poles and bison hides", "zh": "木杆和野牛皮"}, {"en": "stones and mud", "zh": "石头和泥土"}, {"en": "tree branches only", "zh": "仅用树枝"}, {"en": "animal bones", "zh": "动物骨头"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says: 'Wooden poles gave the tepee its cone shape... Bison hides were stitched together to make the walls.' Two to three people could set one up in under two hours.", "zh": "书中写道：「木杆赋予帐篷圆锥形状……野牛皮缝合在一起做成墙。」两到三个人可以在不到两小时内搭建好。"}}, {"q": {"en": "Who introduced horses to the Great Plains, changing the tribes' way of life?", "zh": "是谁把马引入大平原，改变了各部落的生活方式？"}, "options": [{"en": "Spanish explorers in the 1500s", "zh": "16世纪的西班牙探险家"}, {"en": "the Lakota themselves", "zh": "拉科塔人自己"}, {"en": "French traders", "zh": "法国商人"}, {"en": "British colonists", "zh": "英国殖民者"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book states: 'Before Europeans brought horses to the United States in the 1500s, nomadic tribes moved and hunted on foot. Spanish explorers introduced horses in the southwestern United States.'", "zh": "书中写道：「在欧洲人于16世纪把马带到美国之前，游牧部落徒步迁徙和狩猎。西班牙探险家在美西南引入了马。」"}}, {"q": {"en": "At the Battle of Little Bighorn in 1876, which U.S. leader was killed?", "zh": "在1876年的小大角战役中，哪位美国领导人阵亡？"}, "options": [{"en": "George Armstrong Custer", "zh": "乔治·阿姆斯特朗·卡斯特"}, {"en": "Sitting Bull", "zh": "坐牛"}, {"en": "Red Cloud", "zh": "红云"}, {"en": "Crazy Horse", "zh": "疯马"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says: 'On June 25, 1876, George Armstrong Custer... led his troops into the valley... The bloody battle ended with the death of Custer and his soldiers.' It is called 'Custer's Last Stand.'", "zh": "书中写道：「1876年6月25日，乔治·阿姆斯特朗·卡斯特……率军进入山谷……血战以卡斯特及其士兵的死亡告终。」这被称为「卡斯特的最后一战」。"}}, {"q": {"en": "In the glossary, what does the word 'nomadic' mean?", "zh": "在词汇表中，「nomadic」（游牧的）一词是什么意思？"}, "options": [{"en": "moving from place to place", "zh": "四处迁徙、居无定所"}, {"en": "staying in one village", "zh": "住在一个村庄里"}, {"en": "farming the land", "zh": "耕种土地"}, {"en": "building teepees", "zh": "搭建帐篷"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'nomadic' as 'moving from place to place.' The book describes nomadic tribes as following the bison migration throughout the year.", "zh": "词汇表将「nomadic」定义为「四处迁徙」。书中描述游牧部落全年跟随野牛迁徙。"}}, {"q": {"en": "In this book, what does the word 'reservations' refer to?", "zh": "在本书中，「reservations」（保留地）一词指的是什么？"}, "options": [{"en": "lands set aside for Native Americans", "zh": "划给美洲原住民的土地"}, {"en": "places where battles were fought", "zh": "发生战斗的地方"}, {"en": "areas for hunting only", "zh": "仅供狩猎的区域"}, {"en": "European settlements", "zh": "欧洲人的定居点"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'reservations' as 'lands set aside for Native Americans.' The book says soldiers and settlers forced most tribes onto reservations, often the poorest lands.", "zh": "词汇表将「reservations」定义为「划给美洲原住民的土地」。书中说士兵和定居者将大多数部落赶到保留地，往往是最贫瘠的土地。"}}, {"q": {"en": "According to the book, what was the MAIN reason the Plains tribes eventually lost the Indian Wars?", "zh": "根据本书，大平原部落最终在印第安战争（Indian Wars）中失败的主要原因是什么？"}, "options": [{"en": "diseases such as smallpox killed more than half the people", "zh": "天花等疾病导致超过半数人口死亡"}, {"en": "the soldiers were better horsemen", "zh": "士兵更擅长骑马"}, {"en": "they ran out of arrows", "zh": "他们用光了箭"}, {"en": "a long drought", "zh": "长期干旱"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says: 'the main reason that the Plains tribes eventually lost the wars was probably not the soldiers. By the time the U.S. Army reached many of the tribes, more than half the people had died from diseases, such as smallpox.'", "zh": "书中写道：「大平原部落最终战败的主要原因可能并不是士兵。当美军到达许多部落时，超过半数的人已死于天花等疾病。」"}}, {"q": {"en": "What happened at Wounded Knee on December 29, 1890?", "zh": "1890年12月29日在伤膝河（Wounded Knee）发生了什么？"}, "options": [{"en": "about 200 Lakota were killed in the last battle between the army and tribal people", "zh": "约200名拉科塔人在军队与原住民的最后一场战斗中被杀"}, {"en": "a peace treaty was signed", "zh": "签署了一项和平条约"}, {"en": "Sitting Bull was crowned", "zh": "坐牛被加冕"}, {"en": "the bison returned", "zh": "野牛回来了"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book states: 'During the battle, two hundred Lakota were killed by the army... It was the last battle between the army and tribal people.'", "zh": "书中写道：「战斗中，200名拉科塔人被军队杀害……这是军队与原住民之间的最后一场战斗。」"}}, {"q": {"en": "Why does the author include Cheyenne River Sioux member Fred DuBray's quote that the bison is 'a symbol of our strength and unity'?", "zh": "作者为什么要引用夏延河苏族人弗雷德·杜布雷的话，说野牛是「我们力量和团结的象征」？"}, "options": [{"en": "To show the cultural and spiritual importance of bison to today's tribes", "zh": "为了展示野牛对当今部落的文化和精神重要性"}, {"en": "To explain how to cook bison meat", "zh": "为了解释如何烹饪野牛肉"}, {"en": "To describe a hunting method", "zh": "为了描述一种狩猎方法"}, {"en": "To promote a zoo", "zh": "为了宣传动物园"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book uses DuBray's words to show that bringing bison back 'reminds today's tribes of how their ancestors lived in harmony with nature' and represents the spirit they are trying to preserve.", "zh": "书中引用杜布雷的话，说明恢复野牛「让当今部落想起祖先如何与自然和谐共处」，并代表他们试图保留的精神。"}}, {"q": {"en": "What is the author's overall purpose in writing about both the past and the present of the Plains Native Americans?", "zh": "作者描写大平原原住民的过去与现在，其总体目的是什么？"}, "options": [{"en": "To show how tribes today preserve traditions and work to bring bison back", "zh": "为了展示当今部落如何保留传统并努力恢复野牛种群"}, {"en": "To argue that all tribes should move to cities", "zh": "为了论证所有部落都应迁往城市"}, {"en": "To prove horses were useless", "zh": "为了证明马毫无用处"}, {"en": "To describe only the wars", "zh": "仅仅为了描述战争"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The final section describes powwows, language preservation, and the Inter Tribal Bison Cooperative that reintroduced over 15,000 bison by 2012, showing the book's purpose is to highlight survival and renewal of traditions.", "zh": "最后一节描述了帕瓦仪式、语言保护，以及到2012年重新引入超过15,000头野牛的部落间野牛合作组织，表明本书旨在凸显传统的延续与复兴。"}}], "extended": {"prompt": {"en": "The book says many Native languages like Lakota are disappearing. Why do you think it matters to preserve a language, and what idea from the book could help save one?", "zh": "书中说像拉科塔语这样许多原住民语言正在消失。你认为保护一种语言为什么重要？书中提到的什么办法可能有助于拯救一种语言？"}, "guidance": {"en": ["Mention the Lakota Language Project and using technology to hear pronunciations.", "Reflect on language as a link to heritage and identity."], "zh": ["提及拉科塔语言项目以及用科技听发音。", "思考语言作为文化遗产与身份认同纽带的意义。"]}}};</script>
