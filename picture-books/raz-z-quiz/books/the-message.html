<script>window.BOOK = {"slug": "the-message", "title": "The Message", "titleZh": "密信", "level": "Z", "genre": "Historical Fiction", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Where does Jacques' family farm lie, and what did the Germans build there?", "zh": "雅克家的农场位于何处，德国人在那里建了什么？"}, "options": [{"en": "On a cliff above the English Channel, where Germans built bunkers with four huge guns", "zh": "在英吉利海峡上方的悬崖上，德国人在那里修建了带四门巨炮的碉堡"}, {"en": "In Paris, with a radio station", "zh": "在巴黎，带一个广播电台"}, {"en": "In the mountains, with a factory", "zh": "在山里，带一座工厂"}, {"en": "Near the barn, with a school", "zh": "在谷仓附近，带一所学校"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "'my family's farm is high on a cliff above the English Channel... the Germans built bunkers on our land... hiding four huge guns.'", "zh": "'我家农场高高地坐落在英吉利海峡上方的悬崖上……德国人在我们的土地上修了碉堡……藏着四门巨炮。'"}}, {"q": {"en": "How does Jacques remember the locations of the bunkers without writing them down?", "zh": "雅克没有把碉堡位置写下来，他是怎么记住的？"}, "options": [{"en": "He is blind and memorizes by counting steps everywhere", "zh": "他双目失明，靠数步数来记忆一切位置"}, {"en": "He wrote them in a notebook", "zh": "他记在笔记本里"}, {"en": "Pierre told him", "zh": "皮埃尔告诉他的"}, {"en": "He drew a map", "zh": "他画了一张地图"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "'I count steps every day—how many steps across a room, or to the barn—I can remember any number of steps.' Pierre notes, 'The Germans don't suspect a blind kid of doing anything important.'", "zh": "'我每天都数步数——穿过房间多少步，走到谷仓多少步——我能记住任意步数。'皮埃尔说：'德国人不会怀疑一个瞎眼孩子能做什么要紧事。'"}}, {"q": {"en": "Why must the radio broadcast last under nine minutes?", "zh": "为什么无线电广播必须控制在九分钟以内？"}, "options": [{"en": "Because the Germans need ten minutes to pinpoint a transmission, so under nine keeps the broadcasters safe", "zh": "因为德军需要十分钟才能定位一处发报，所以九分钟内发送能保证发报者安全"}, {"en": "Because the radio battery dies at nine minutes", "zh": "因为电台电池到九分钟就没电了"}, {"en": "Because Jacques gets tired", "zh": "因为雅克累了"}, {"en": "Because the BBC only allows short calls", "zh": "因为BBC只允许简短呼叫"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "'The Germans constantly listen for radio broadcasts, and when they detect one, they need just ten minutes to pinpoint its origin... our broadcast to the Allies must be under nine minutes.'", "zh": "'德国人一直在监听无线电广播，一旦发现，只需十分钟就能锁定发报方位……我们给盟军的广播必须在九分钟以内。'"}}, {"q": {"en": "How does the author use Jacques's blindness as a story element?", "zh": "作者如何把雅克的失明用作一个故事要素？"}, "options": [{"en": "It both endangers and protects him—soldiers dismiss 'the blind kid'—and lets him gather secret info unnoticed", "zh": "它既让他身处险境又保护了他——士兵不把“瞎眼孩子“放在眼里——还让他能在无人察觉下收集机密情报"}, {"en": "It makes him useless", "zh": "这让他毫无用处"}, {"en": "It is never mentioned", "zh": "从未被提及"}, {"en": "It lets him see the future", "zh": "这让他能预见未来"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "His blindness lets him move freely among Germans ('The Germans don't suspect a blind kid') and later saves him: a soldier says 'It's only the blind kid' and moves on.", "zh": "失明让他能在德国人中间自由行动（'德国人不会怀疑一个瞎眼孩子'），后来还救了他：一名士兵说'不过是个瞎眼孩子'，便走开了。"}}, {"q": {"en": "How does the Author's Note connect the fictional story to real history?", "zh": "本书的“作者附记“如何将虚构故事与真实历史联系起来？"}, "options": [{"en": "A real blind boy in 1944 told Resistance worker Andre Heintz about bunkers; the info helped target guns on D-Day", "zh": "1944年，一位真实的失明男孩向抵抗组织成员安德烈·海因茨透露碉堡情报；该情报帮助在D日锁定并摧毁火炮"}, {"en": "The story is entirely invented with no basis", "zh": "故事纯属虚构，毫无根据"}, {"en": "D-Day never happened", "zh": "D日从未发生"}, {"en": "The characters were all famous generals", "zh": "角色全都是著名将领"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The Author's Note: 'an eight- or nine-year-old blind boy made his way to Caen... to tell Andre Heintz... about the bunkers... on D-Day... the guns were targeted and eliminated.'", "zh": "作者附记：'一个八九岁的失明男孩前往卡昂……向安德烈·海因茨……讲述碉堡之事……在D日……那些火炮被锁定并摧毁。'"}}, {"q": {"en": "What does the book suggest about ordinary citizens in wartime?", "zh": "本书对战争中的普通公民表达了什么看法？"}, "options": [{"en": "Even young people (a 15-year-old and a blind boy) can bravely aid the fight for freedom", "zh": "即便是年轻人（一名15岁少女和一名失明男孩）也能勇敢地为自由之战出力"}, {"en": "Only soldiers matter", "zh": "只有士兵才重要"}, {"en": "Civilians should ignore the war", "zh": "平民应当无视战争"}, {"en": "Children cannot help", "zh": "儿童帮不上忙"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Fifteen-year-old Aimee and blind Jacques risk everything to pass vital information; Pierre calls it 'You may have saved many lives tonight.'", "zh": "十五岁的艾梅与失明的雅克冒着一切风险传递关键情报；皮埃尔说：'你们今晚可能救了许多人的命。'"}}, {"q": {"en": "What is the password used to enter the secret barn meeting?", "zh": "进入秘密谷仓会议所用的口令是什么？"}, "options": [{"en": "'Red lanterns burn brightly in Suez' / 'Mostly when it rains'", "zh": "“红灯笼在苏伊士明亮燃烧” / “多半在下雨时”"}, {"en": "'Open sesame'", "zh": "“芝麻开门”"}, {"en": "'Long live the Republic'", "zh": "“共和国万岁”"}, {"en": "'The sky is falling'", "zh": "“天塌下来了”"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Aimee whispers 'Red lanterns burn brightly in Suez.' The stranger replies his portion: 'Mostly when it rains.'", "zh": "艾梅低声说'红灯笼在苏伊士明亮燃烧。'陌生人接出他的那半句：'多半在下雨时。'"}}, {"q": {"en": "How do the three Resistance workers avoid capture when the German patrol approaches?", "zh": "当德国巡逻队逼近时，三名抵抗组织成员如何避免被捕？"}, "options": [{"en": "They hide silently inside a hay cave made of stacked bales", "zh": "他们无声地躲进由草料包堆成的“草洞“里"}, {"en": "They fight the soldiers", "zh": "他们与士兵搏斗"}, {"en": "They run out the door", "zh": "他们冲出门外"}, {"en": "They surrender", "zh": "他们投降了"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Pierre 'bolted from the stall' and pointed to hay bales; Aimee guides Jacques 'through a narrow entrance into the hay cave' and Pierre 'placed another bale over the opening.'", "zh": "皮埃尔'从马厩冲出'，指向草料包；艾梅引导雅克'从一个窄口钻进草洞'，皮埃尔'又放了一块草料包堵住洞口'。"}}, {"q": {"en": "Why is the observation pole's location (2.7 km west of the fishing boat harbor) critical to the message?", "zh": "观察杆的位置（渔港以西2.7公里）为何对这份情报至关重要？"}, "options": [{"en": "It helps the Allies know where to target the German guns before troops land on the beaches", "zh": "它帮助盟军在部队登陆海滩前，明确该轰炸德国火炮的位置"}, {"en": "It marks a picnic spot", "zh": "它标出一个野餐地点"}, {"en": "It is where Jacques lives", "zh": "那是雅克住的地方"}, {"en": "It is the barn's address", "zh": "那是谷仓的地址"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Jacques remembers the pole 'is 2.7 kilometers west of the fishing boat harbor' just in time; Pierre says the info should help 'knock out the Germans' guns' before troops storm the beaches.", "zh": "雅克在最后一刻想起观察杆'位于渔港以西2.7公里'；皮埃尔说这些情报应能帮盟军在部队抢滩前'摧毁德国人的火炮'。"}}, {"q": {"en": "What tone does the book create around the risky broadcast scene?", "zh": "本书在惊险的发报场景中营造了怎样的氛围？"}, "options": [{"en": "Tense suspense, showing the constant danger faced by young Resistance workers", "zh": "紧张的悬念，展现年轻的抵抗组织成员所面临的持续危险"}, {"en": "Comedy", "zh": "喜剧"}, {"en": "Boredom", "zh": "乏味"}, {"en": "Romance", "zh": "爱情"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Aimee tracks minutes on her fingers under nine; 'Forty seconds... Thirty...' — the ticking clock and fear of detection create mounting suspense.", "zh": "艾梅用手指倒数九分钟以内的时间；'四十秒……三十……'——滴答作响的时钟与恐遭暴露的恐惧，营造出不断升级的悬念。"}}], "extended": {"prompt": {"en": "Jacques used a personal strength (his memory for steps) to help others despite a challenge. What ability of yours could help a group, even if others underestimate you?", "zh": "雅克利用自身长处（对步数的记忆力）在重重困难中帮助了他人。你有什么能力可以帮助团队，即便别人低估了你？"}, "guidance": {"en": ["Think about a skill or perspective others might overlook in you.", "Consider how staying calm under pressure (like Aimee and Jacques) changes outcomes."], "zh": ["想想你身上别人可能忽视的技能或视角。", "思考在压力下保持冷静（如艾梅与雅克）如何改变结局。"]}}};</script>
