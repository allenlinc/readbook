飞行的？"}, "options": [{"en": "He was a foot messenger who refused to fly", "zh": "他是传令兵，拒绝飞行"}, {"en": "He was a navy sailor who learned to fly in 1900 according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "他是海军水兵，1900 年学会飞行（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "He was a gunner on the ground only", "zh": "他只是地面上的机枪手"}, {"en": "He was a cavalry officer, then in May 1915 was accepted for pilot training (first as an observer, then a pilot)", "zh": "他是一名骑兵军官，后于 1915 年 5 月获准接受飞行训练（先当观察员，再当飞行员）"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The book says he became 'a cavalry officer in 1911,' and in 'May 1915, Richthofen was accepted for pilot training' (first as an observer, then a pilot).", "zh": "书中说他“1911 年成为骑兵军官”，且“1915 年 5 月，里希特霍芬获准接受飞行训练”（先当观察员，再当飞行员）。"}}, {"q": {"en": "How many confirmed victories did Richthofen have, and when did his last one occur?", "zh": "里希特霍芬有多少个被确认的战果？他的最后一个战果发生在何时？"}, "options": [{"en": "One hundred victories, ending in 1920", "zh": "一百个战果，止于 1920 年"}, {"en": "Fifty victories, ending in 1914", "zh": "五十个战果，止于 1914 年"}, {"en": "Eighty confirmed victories; his last (the 80th) came on April 20, 1918", "zh": "八十个确认战果；最后一个（第 80 个）发生在 1918 年 4 月 20 日"}, {"en": "Twenty-six confirmed victories, all in 1918 according to some versions of the story", "zh": "二十六个确认战果，全在 1918 年（按书中另一种说法）"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "The book says 'With eighty confirmed victories, Richthofen was the greatest ace of World War I' and 'On April 20, 1918, he scored his eightieth victory. It would be his last.'", "zh": "书中说“里希特霍芬有八十个确认战果，是一战中最伟大的王牌”，并说“1918 年 4 月 20 日，他取得第八十个战果。那将是他的最后一个。”"}}, {"q": {"en": "The book includes 'Do You Know?' sidebars, such as why the 'Blue Max' medal got its nickname. What is the author's purpose for these boxes?", "zh": "书中设有“你知道吗？”边栏，例如解释“蓝马克斯”勋章昵称的由来。作者设置这些边栏的目的是什么？"}, "options": [{"en": "To show fictional made-up trivia according to some versions of the story", "zh": "用来展示虚构编造的冷知识（按书中另一种说法）"}, {"en": "To add interesting extra facts that enrich the main story", "zh": "补充有趣的小知识，丰富正文"}, {"en": "To list the book's chapters", "zh": "用来列出书的章节"}, {"en": "To replace the main text", "zh": "用来取代正文"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The 'Do You Know?' box explains the Blue Max was nicknamed for its blue color and Max Immelmann, adding a supporting detail to the story.", "zh": "“你知道吗？”边栏解释了“蓝马克斯”因蓝色和 Max Immelmann 得名，为正文补充了辅助性细节。"}}, {"q": {"en": "In the book's glossary, a pilot who has brought down five or more enemy planes is called an 'ace.' How is this term used in the text?", "zh": "在书的术语表中，击落五架或以上敌机的飞行员被称为“ace”（王牌）。文中是如何使用这个词的？"}, "options": [{"en": "It means a type of airplane", "zh": "它指的是一种飞机"}, {"en": "It is a nickname for the medal", "zh": "它是勋章的昵称"}, {"en": "It refers to the gunner on the ground according to some versions of the story in an early draft of the book", "zh": "它指地面上的机枪手（按书中另一种说法）（在书的早期草稿中）"}, {"en": "It is the label for a successful combat pilot; Richthofen became an ace after his fifth victory", "zh": "它是成功战斗飞行员的称呼；里希特霍芬在第五次战果后成为王牌"}], "answer": 3, "skill": "Craft and Structure", "explain": {"en": "Glossary: 'ace (n.) a fighter pilot who has brought down five or more enemy planes.' With five victories, 'Richthofen was now an ace.'", "zh": "术语表：ace 指“击落五架或以上敌机的战斗机飞行员”。取得五个战果后，“里希特霍芬成了王牌”。"}}, {"q": {"en": "Oswald Boelcke created a list of eight 'dicta' (rules) for aerial combat. What is one example from the book?", "zh": "Oswald Boelcke 为空中格斗制定了八条“训令”（dicta）。书中举了什么例子？"}, "options": [{"en": "Pilots should dive out of the sun at their enemies so the enemy cannot see them coming, and hold fire until close", "zh": "飞行员应从太阳方向俯冲攻击，使敌人看不见来向，并等到接近时才开火"}, {"en": "Attack only at night", "zh": "只在夜间进攻"}, {"en": "Never use a machine gun", "zh": "绝不使用机枪"}, {"en": "Always fly in a straight line at high altitude according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "始终在高空直线飞行（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says Boelcke's dicta instructed pilots to 'dive out of the sun at their adversaries so the enemy would not see them coming' and 'hold their fire until they were close.'", "zh": "书中说 Boelcke 的训令指示飞行员“从太阳方向俯冲扑向敌人，使对方看不见来向”，并“接近时才开火”。"}}, {"q": {"en": "What was 'Bloody April' (1917), as described in the book?", "zh": "书中描述的“血腥四月”（1917 年）是什么？"}, "options": [{"en": "The month Richthofen retired", "zh": "里希特霍芬退役的那个月"}, {"en": "Richthofen's forces shot down 89 British planes that month (he claimed 22), and the RFC lost 245 aircraft", "zh": "那个月里希特霍芬的部队击落 89 架英机（他本人 22 架），英国皇家飞行队损失 245 架飞机"}, {"en": "The end of World War I", "zh": "第一次世界大战结束之时"}, {"en": "A peaceful month with no combat according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "没有战斗的平静之月（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says 'In April 1917, Richthofen's forces shot down 89 planes of Britain's Royal Flying Corps (RFC). Richthofen alone claimed 22 victories. The RFC lost 245 aircraft that month, which is remembered as Bloody April.'", "zh": "书中说“1917 年 4 月，里希特霍芬的部队击落英国皇家飞行队 89 架飞机。里希特霍芬一人取得 22 个战果。该月皇家飞行队损失 245 架飞机，这便是‘血腥四月’。”"}}, {"q": {"en": "After Richthofen died, how did the Allied pilots treat him, and why might the author include this?", "zh": "里希特霍芬死后，协约国飞行员是如何对待他的？作者为何要写这一笔？"}, "options": [{"en": "They buried him in secret with no honors according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "他们秘密埋葬他，没有任何荣誉（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "They gave him a funeral with full military honors and a wreath calling him 'our gallant and worthy foe,' showing respect even for an enemy", "zh": "他们以全军礼为他举行葬礼，花圈称他为“我们勇敢而可敬的敌人”，即便对敌人也予以尊重"}, {"en": "They ignored his death completely", "zh": "他们完全无视他的死"}, {"en": "They celebrated his death cruelly", "zh": "他们残酷地庆祝他的死"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book says 'Allied pilots gave Richthofen a funeral with full military honors' and a wreath read 'To our gallant and worthy foe.'", "zh": "书中说“协约国飞行员以全军礼为里希特霍芬举行葬礼”，花圈上写着“致我们勇敢而可敬的敌人”。"}}, {"q": {"en": "The book mentions other famous aces (Fonck, Bishop, Rickenbacker) but says Richthofen is the first name most people think of. What is the author's point?", "zh": "书中提到其他著名王牌（Fonck、Bishop、Rickenbacker），却说里希特霍芬是大多数人最先想到的名字。作者想表达什么？"}, "options": [{"en": "To show that Richthofen remains the most legendary and remembered ace of World War I", "zh": "为了说明里希特霍芬仍是一战中最具传奇色彩、最被人铭记的王牌"}, {"en": "To prove he was the weakest pilot", "zh": "为了证明他是最弱的飞行员"}, {"en": "To say the others were forgotten", "zh": "为了说其他人已被遗忘"}, {"en": "To argue the war was won by one man according to some versions of the story in an early draft of the book", "zh": "为了主张战争由一人赢得（按书中另一种说法）（在书的早期草稿中）"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The conclusion says 'the first name that comes to most people's minds is Manfred von Richthofen—the legendary Red Baron.'", "zh": "结语说“大多数人脑海中浮现的第一个名字，是曼弗雷德·冯·里希特霍芬——传奇的红男爵”。"}}], "extended": {"prompt": {"en": "Richthofen was a skilled, disciplined pilot admired even by his enemies, yet war took his life at twenty-five. What does his story teach us about bravery and the cost of war?", "zh": "里希特霍芬是一位技艺高超、纪律严明的飞行员，连敌人也敬重他，然而战争让他在二十五岁丧生。他的故事让我们对勇气与战争的代价有何思考？"}, "guidance": {"en": ["Think about what made him respected beyond just winning fights.", "Consider the human cost of war shown in the book."], "zh": ["想想除了取胜之外，他因什么受人敬重。", "思考书中展现的战争对人的代价。"]}}};</script>
