？为什么？"}, "guidance": {"en": ["Think about what clues (objects, writing, remains) might help answer your question.", "Consider how modern technology like DNA testing or CT scanning could help."], "zh": ["想想哪些线索（物品、文字、遗骸）可能帮你解答这个问题。", "思考像 DNA 检测或 CT 扫描这样的现代科技能提供什么帮助。"]}}};</script>
