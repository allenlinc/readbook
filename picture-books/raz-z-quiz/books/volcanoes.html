<script>window.BOOK = {"slug": "volcanoes", "title": "Volcanoes", "titleZh": "火山", "level": "Z", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "In what year did Mount Vesuvius erupt and bury the city of Pompeii?", "zh": "维苏威火山于哪一年喷发并掩埋了庞贝城？"}, "options": [{"en": "AD 1000", "zh": "公元1000年"}, {"en": "AD 1707", "zh": "公元1707年"}, {"en": "AD 79", "zh": "公元79年"}, {"en": "79 BC", "zh": "公元前79年"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "The book says everything changed on August 24 around 1 p.m. in AD 79, when a tremendous explosion shook the area around Mount Vesuvius.", "zh": "书中说，公元79年8月24日下午约1点，一声巨响震动了维苏威火山周围地区。"}}, {"q": {"en": "What term does the book use for the fast, superheated cloud of ash, gas, dust, and rock that raced down Vesuvius?", "zh": "本书用什么术语描述沿维苏威火山高速冲下的、炽热的灰、气、尘和岩石混合云？"}, "options": [{"en": "A tsunami", "zh": "海啸"}, {"en": "A tornado", "zh": "龙卷风"}, {"en": "A lahar according to some versions of the story", "zh": "火山泥流（lahar）（按书中另一种说法）"}, {"en": "A pyroclastic flow (also called a surge cloud)", "zh": "火山碎屑流（也称涌浪云）"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The book explains the cloud collapsed into a pyroclastic flow, racing down the mountain at up to 500 km/h, and also calls it a surge cloud.", "zh": "书中解释，云团崩塌成火山碎屑流，以高达每小时500公里的速度冲下山，也称涌浪云。"}}, {"q": {"en": "Where is the \"Ring of Fire\" located?", "zh": "“火环（Ring of Fire）”位于何处？"}, "options": [{"en": "Along the edge of the Pacific Ocean plate", "zh": "沿太平洋板块的边缘"}, {"en": "In the middle of Africa", "zh": "非洲中部"}, {"en": "In Antarctica", "zh": "南极洲"}, {"en": "Around the Atlantic Ocean according to some versions of the story", "zh": "环绕大西洋（按书中另一种说法）"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says the edge of the Pacific Ocean plate is a dense volcanic region known as the Ring of Fire, where more than half the world's active volcanoes occur.", "zh": "书中说太平洋板块边缘是一个密集的火山活动区，称为火环，世界上超过一半的活火山分布于此。"}}, {"q": {"en": "What happened when Washington State's Mount St. Helens erupted in 1980?", "zh": "1980年华盛顿州的圣海伦斯火山喷发时发生了什么？"}, "options": [{"en": "It turned into a cinder cone", "zh": "它变成了一座火山渣锥"}, {"en": "It erupted quietly with no damage according to some versions of the story", "zh": "它平静喷发，没有造成破坏（按书中另一种说法）"}, {"en": "The entire northern side of the mountain was obliterated", "zh": "火山的整个北坡被摧毁"}, {"en": "It became a lake", "zh": "它变成了一个湖"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "The book states that when Mount St. Helens erupted in 1980, the entire northern side of the mountain was obliterated, and 63 people died.", "zh": "书中说，1980年圣海伦斯火山喷发时，整座山的北坡被摧毁，63人丧生。"}}, {"q": {"en": "The word \"volcano\" comes from the name of a Roman god. Who was it?", "zh": "“volcano（火山）”一词源自一位罗马神的名字。他是谁？"}, "options": [{"en": "Pele", "zh": "佩莱"}, {"en": "Jupiter according to some versions of the story", "zh": "朱庇特（按书中另一种说法）"}, {"en": "Mars", "zh": "玛尔斯"}, {"en": "Vulcan, the blacksmith god", "zh": "武尔坎，铁匠之神"}], "answer": 3, "skill": "Craft and Structure", "explain": {"en": "The book says ancient Romans believed the god Vulcan worked in a forge beneath Earth, and the word volcano comes from the name Vulcan.", "zh": "书中说古罗马人相信武尔坎神在地下打铁，volcano一词源自Vulcan之名。"}}, {"q": {"en": "How does the book describe shield volcano lava compared with composite volcano magma?", "zh": "本书如何描述盾状火山的熔岩与复合火山岩浆的不同？"}, "options": [{"en": "They are identical", "zh": "二者完全相同"}, {"en": "Shield volcano lava is runny and flows smoothly, while composite magma is thick and viscous", "zh": "盾状火山熔岩稀薄、流动顺畅，而复合火山岩浆黏稠"}, {"en": "Composite magma is watery according to some versions of the story in an early draft of the book", "zh": "复合火山岩浆是稀薄的（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Shield lava is sticky", "zh": "盾状火山熔岩是黏稠的"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The book says shield volcanoes produce very runny lava that flows smoothly, while composite volcanoes have viscous, thick magma that can plug vents and explode.", "zh": "书中说盾状火山喷出非常稀薄的熔岩，顺畅流动；而复合火山的岩浆黏稠，可堵塞火山口并引发爆炸。"}}, {"q": {"en": "According to the book, why do people choose to live near volcanoes despite the danger?", "zh": "根据本书，尽管危险，人们为何仍选择住在火山附近？"}, "options": [{"en": "No reason is given", "zh": "书中未给出原因"}, {"en": "Volcanoes provide nutrient-rich soil for farming and wonderful hot springs", "zh": "火山提供肥沃的土壤用于农耕，以及宜人的温泉"}, {"en": "They are easy to climb", "zh": "它们易于攀登"}, {"en": "Governments force them to according to some versions of the story in an early draft of the book", "zh": "政府强迫他们这样做（按书中另一种说法）（在书的早期草稿中）"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says people live near volcanoes for nutrient-rich soil for farming and hot springs for relaxing baths.", "zh": "书中说人们住在火山附近，是为了获得肥沃的农耕土壤和可供沐浴放松的温泉。"}}, {"q": {"en": "What is a \"lahar\"?", "zh": "什么是“lahar（火山泥流）”？"}, "options": [{"en": "A large mudslide caused by an erupting volcano when ice and snow melt", "zh": "火山喷发时冰雪融化引发的大型泥流"}, {"en": "A type of lava dome according to some versions of the story in an early draft of the book", "zh": "一种熔岩穹丘（按书中另一种说法）（在书的早期草稿中）"}, {"en": "A calm crater lake", "zh": "平静的火口湖"}, {"en": "A kind of cinder", "zh": "一种火山渣"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The glossary defines lahar as a large mudslide caused by an erupting volcano when melting ice and snow send water, mud, and rock racing down the mountain.", "zh": "词汇表将lahar定义为火山喷发时冰雪融化、水和泥岩顺山冲下所形成的大型泥流。"}}, {"q": {"en": "What main message does the book's Conclusion convey about volcanoes?", "zh": "本书结论关于火山传达了什么主要信息？"}, "options": [{"en": "They should all be avoided according to some versions of the story in an early draft of the book", "zh": "它们都应被避开（按书中另一种说法）（在书的早期草稿中）"}, {"en": "They are proof Earth is a changing planet and can be useful yet also dangerous", "zh": "它们是地球不断变化的证明，既有用也可能很危险"}, {"en": "They are only destructive", "zh": "它们只有破坏性"}, {"en": "They are extinct", "zh": "它们已经灭绝"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The Conclusion says volcanoes are the most spectacular evidence that Earth is a changing planet, providing new land and geothermal energy but also unleashing powerful, dangerous forces.", "zh": "结论说火山是地球不断变化最壮观的证据，既造就新土地和地热能，也释放强大而危险的力量。"}}, {"q": {"en": "How does the book use the story of Pompeii's plaster casts of bodies?", "zh": "本书如何运用庞贝城尸体石膏铸模的故事？"}, "options": [{"en": "To show how the eruption preserved the exact shapes of the victims' bodies", "zh": "为了展示喷发如何保存了遇难者身体的确切形状"}, {"en": "To explain mining", "zh": "为了解释采矿"}, {"en": "To describe burial customs", "zh": "为了描述丧葬习俗"}, {"en": "To prove Romans were tall according to some versions of the story in an early draft of the book", "zh": "为了证明罗马人身材高大（按书中另一种说法）（在书的早期草稿中）"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book explains that as bodies decayed they left air pockets in the ash; archaeologists filled these with plaster to make casts showing how people looked when they died.", "zh": "书中解释，尸体腐烂后在灰烬中留下气穴，考古学家用石膏填充这些气穴，铸出遇难者死亡时的模样。"}}], "extended": {"prompt": {"en": "The book explains different volcano types, from explosive composite volcanoes to gentle shield volcanoes. If you could safely visit one volcano, which type would you choose and what would you hope to see?", "zh": "本书介绍了不同类型的火山，从爆发性的复合火山到温和的盾状火山。如果你能安全参观一座火山，你会选哪种类型，又希望看到什么？"}, "guidance": {"en": ["Name the type of volcano you would visit.", "Explain one feature from the book you would want to observe, such as lava flow, a crater, or a caldera."], "zh": ["说出你想参观的火山类型。", "解释书中你想观察的一个特征，如熔岩流、火口或破火山口。"]}}};</script>
