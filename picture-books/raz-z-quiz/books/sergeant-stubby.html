<script>window.BOOK = {"slug": "sergeant-stubby", "title": "Sergeant Stubby", "titleZh": "斯图比中士", "level": "Z", "genre": "Biography", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "How did Stubby get from the United States to France with Conroy's regiment?", "zh": "斯图比是如何跟康罗伊的团一起从美国到达法国的？"}, "options": [{"en": "A sailor hid him in the coal bin of the ship's engine room before it sailed.", "zh": "一名水手在船启航前把他藏在引擎室的煤仓里。"}, {"en": "He was shipped in a crate marked 'military supplies.'", "zh": "他被装在一个标有'军用物资'的箱子里运过去。"}, {"en": "He was carried openly aboard the troop ship as an official mascot. according to some versions of the story", "zh": "他作为官方吉祥物被公开带上运兵船。（按书中另一种说法）"}, {"en": "He swam across the English Channel to reach France.", "zh": "他游过英吉利海峡到达法国。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The text states that before the ship Minnesota left for France in September, a seaman hid Stubby in the coal bin of the engine room.", "zh": "文中写道，在'明尼苏达号'于九月驶往法国之前，一名水手把斯图比藏在引擎室的煤仓里。"}}, {"q": {"en": "What did Stubby do in September 1918 that earned him the rank of unofficial sergeant?", "zh": "1918年9月，斯图比做了什么，从而获得了'非官方中士'的军衔？"}, "options": [{"en": "He delivered a message across enemy lines under fire. according to some versions of the story", "zh": "他在炮火下穿越敌线传递了一封情报。（按书中另一种说法）"}, {"en": "He led a charge that captured a French village.", "zh": "他带领冲锋攻占了一个法国村庄。"}, {"en": "He found and rescued a lost Allied pilot.", "zh": "他找到并救出了一名迷路的协约国飞行员。"}, {"en": "He captured a German soldier who was mapping the American trenches.", "zh": "他俘获了一名正在绘制美军战壕地图的德国士兵。"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The book says Stubby confronted a German soldier mapping the trenches, ran him down, bit his leg, and held on until the man was taken prisoner; for this capture he was made an unofficial sergeant.", "zh": "书中写道，斯图比拦住了一名正在绘制战壕地图的德国士兵，将他扑倒、咬住他的腿并死死咬住，直到那人被俘；因这次俘获，他被晋升为非官方中士。"}}, {"q": {"en": "About how many dogs served on the Allied side during World War I?", "zh": "第一次世界大战期间，协约国一方大约有多少条狗服役？"}, "options": [{"en": "About two hundred thousand.", "zh": "约二十万条。"}, {"en": "About two hundred.", "zh": "约两百条。"}, {"en": "About two thousand.", "zh": "约两千条。"}, {"en": "About twenty thousand.", "zh": "约两万条。"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The text states, 'Some twenty thousand dogs served on the Allied side.'", "zh": "文中明确写道：'协约国一方约有两条狗服役。'（原文为 Some twenty thousand dogs served on the Allied side）"}}, {"q": {"en": "What final honor did General John J. Pershing give Stubby on July 6, 1921?", "zh": "1921年7月6日，约翰·J·潘兴将军授予斯图比什么最终荣誉？"}, "options": [{"en": "He awarded Stubby a free lifetime supply of bones. according to some versions of the story", "zh": "他奖励斯图比终身免费的骨头供应。（按书中另一种说法）"}, {"en": "He pinned a solid-gold medal on Stubby and praised his heroism.", "zh": "他为斯图比别上一枚纯金奖章，并赞扬他的英勇。"}, {"en": "He gave Stubby a presidential pardon.", "zh": "他给了斯图比一份总统特赦。"}, {"en": "He made Stubby an official army general.", "zh": "他授予斯图比正式的陆军将军军衔。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "At the 1921 ceremony, General Pershing praised Stubby for 'heroism of the highest caliber' and pinned a solid-gold medal to his uniform.", "zh": "在1921年的典礼上，潘兴将军称赞斯图比'最高级别的英雄气概'，并为他别上一枚纯金奖章。"}}, {"q": {"en": "What text feature at the end of the book helps readers understand difficult words such as 'artillery' and 'stalemate'?", "zh": "书末的哪个板块帮助读者理解'artillery（火炮）'和'stalemate（僵局）'这类难词？"}, "options": [{"en": "A map of the Western Front.", "zh": "一张西线战场地图。"}, {"en": "A list of U.S. presidents.", "zh": "一份美国总统名单。"}, {"en": "A Glossary that defines the words.", "zh": "一个列出单词释义的词汇表（Glossary）。"}, {"en": "A table of World War I battle dates. according to some versions of the story", "zh": "一张一战战役日期表。（按书中另一种说法）"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "The book ends with a Glossary that defines words like 'artillery' (large guns) and 'stalemate' (a deadlock).", "zh": "书末附有词汇表（Glossary），解释了'artillery（重型火炮）'和'stalemate（双方都无法取胜的僵局）'等词。"}}, {"q": {"en": "In the description of Pershing's ceremony, the text says Stubby 'licked his chops and wagged his diminutive tail.' What does 'diminutive' mean?", "zh": "在描写潘兴典礼时，文中说斯图比'舔了舔嘴，摇了摇他 diminutive 的尾巴'。'diminutive'是什么意思？"}, "options": [{"en": "Very small.", "zh": "非常小的。"}, {"en": "Very famous.", "zh": "非常著名的。"}, {"en": "Very aggressive.", "zh": "非常有攻击性的。"}, {"en": "Very long.", "zh": "非常长的。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The Glossary defines 'diminutive' as 'very small,' referring to Stubby's tiny tail.", "zh": "词汇表将'diminutive'定义为'very small（非常小的）'，指斯图比那短小的尾巴。"}}, {"q": {"en": "A caption reads, 'Stubby's ability to salute won him many fans.' Which event in the text best supports this caption?", "zh": "有一句图注写道：'斯图比敬礼的本领为他赢得了许多粉丝。'文中哪个事件最能印证这句图注？"}, "options": [{"en": "When stern officers discovered Stubby, he charmed them by saluting, so his role as mascot was accepted.", "zh": "当严厉的军官发现斯图比时，他用敬礼讨得军官欢心，从而被接纳为吉祥物。"}, {"en": "When Stubby bit a German soldier, the officers praised him. according to some versions of the story in an early draft of the book", "zh": "当斯图比咬住一名德国士兵时，军官们表扬了他。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "When Stubby failed to salute, he was removed from the regiment.", "zh": "当斯图比拒绝敬礼时，他被调离了团。"}, {"en": "When Stubby refused to board the ship, the sailors forced him.", "zh": "当斯图比不肯上船时，水手们强迫他上去。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The text says that when officers finally discovered Stubby, he saved the day by saluting them, charming the officers and confirming his mascot role.", "zh": "文中写道，当军官最终发现斯图比时，他用敬礼讨得了军官们的欢心，化解了危机，并由此确立了吉祥物的身份。"}}, {"q": {"en": "According to the map ('Battlefields where Sergeant Stubby served') and the text, in what country did Stubby serve?", "zh": "根据地图（'斯图比服役的战场'）和正文，斯图比是在哪个国家服役的？"}, "options": [{"en": "The United States, in New England.", "zh": "美国，新英格兰地区。"}, {"en": "England, near London.", "zh": "英国，伦敦附近。"}, {"en": "France, on the Western Front.", "zh": "法国，西线战场。"}, {"en": "Germany, near Berlin.", "zh": "德国，柏林附近。"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The map shows French locations such as Chateau-Thierry and the Marne River, and the text says the 102nd Infantry landed in France in early October.", "zh": "地图标注了法国的地点（如 Chateau-Thierry 和马恩河），文中也写道第102步兵团于十月初在法国登陆。"}}, {"q": {"en": "Why does the author include the detail that Stubby 'died in his sleep in 1926, cradled in Conroy's arms'?", "zh": "作者为什么要写斯图比'于1926年在睡梦中离世，躺在康罗伊的臂弯里'这一细节？"}, "options": [{"en": "To argue that all war dogs should be retired early. according to some versions of the story in an early draft of the book", "zh": "为了主张所有军犬都应提前退役。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "To show the deep, loving bond between Stubby and Conroy and the gentle end of a hero's life.", "zh": "为了展现斯图比与康罗伊之间深厚的情感羁绊，以及一位英雄安详的落幕。"}, {"en": "To explain how Stubby was killed in battle.", "zh": "为了解释斯图比是如何战死的。"}, {"en": "To criticize the military for overworking dogs.", "zh": "为了批评军队过度役使军犬。"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The author emphasizes the closeness of Stubby and Conroy throughout, and this tender ending reinforces their bond and honors the dog's life.", "zh": "作者通篇强调斯图比与康罗伊的亲密关系，这个温柔的结尾进一步凸显了他们的羁绊并致敬了这位狗英雄的一生。"}}, {"q": {"en": "What is the author's overall purpose in writing Sergeant Stubby?", "zh": "作者写《斯图比中士》的总体目的是什么？"}, "options": [{"en": "To persuade readers to adopt bull terriers.", "zh": "劝说读者收养牛头梗犬。"}, {"en": "To tell the true story of a brave war dog and honor his contributions to the soldiers.", "zh": "讲述一只勇敢军犬的真实故事，并致敬他对士兵们的贡献。"}, {"en": "To criticize the U.S. Army's use of animals in war. according to some versions of the story", "zh": "批评美军在战争中使用动物。（按书中另一种说法）"}, {"en": "To teach readers how to train dogs to salute.", "zh": "教读者如何训练狗敬礼。"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The biography recounts Stubby's real wartime service and celebrates his bravery, making clear the author aims to tell and honor his true story.", "zh": "这本传记讲述了斯图比真实的战时经历并颂扬他的英勇，清楚表明作者的目的是讲述并致敬他的真实故事。"}}], "extended": {"prompt": {"en": "Stubby showed loyalty and bravery in unusual circumstances. Think of an animal (or pet) you know. What qualities does it show, and how are they similar to or different from Stubby's?", "zh": "斯图比在特殊环境中展现了忠诚与勇敢。想想你认识的一只动物（或宠物）。它表现出哪些品质？这些品质与斯图比的相似之处或不同之处在哪里？"}, "guidance": {"en": ["Describe the animal and a specific thing it did that impressed you.", "Compare its loyalty or bravery to Stubby's actions in the war."], "zh": ["描述这只动物，以及它做的某件让你印象深刻的的事。", "把它表现出的忠诚或勇敢与斯图比在战争中的行为作比较。"]}}};</script>
