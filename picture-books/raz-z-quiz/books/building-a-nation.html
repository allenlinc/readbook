<script>window.BOOK = {"slug": "building-a-nation", "title": "Building a Nation", "titleZh": "建设一个国家", "level": "Z", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "What was the major weakness of the Articles of Confederation?", "zh": "《邦联条例》的主要弱点是什么？"}, "options": [{"en": "The federal government had no power to tax", "zh": "联邦政府无权征税"}, {"en": "It did away with the states", "zh": "它废除了各州"}, {"en": "It created too strong a federal government", "zh": "它建立了过于强大的联邦政府"}, {"en": "It was too short", "zh": "它太短了"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book calls the lack of power to tax 'a fatal flaw,' since Congress 'could not tax people to raise money to pay off the debts.'", "zh": "书中称无权征税是'致命缺陷'，因为国会'无法向人民征税来筹钱偿还债务'。"}}, {"q": {"en": "What did the Treaty of Paris (1783) accomplish?", "zh": "《巴黎条约》（1783年）达成了什么？"}, "options": [{"en": "It sold the Louisiana Territory according to some versions of the story", "zh": "它出售了路易斯安那领地（按书中另一种说法）"}, {"en": "It recognized the U.S. as independent and set its borders", "zh": "它承认美国独立，并划定了其边界"}, {"en": "It ended the Civil War", "zh": "它结束了内战"}, {"en": "It created the Constitution", "zh": "它制定了宪法"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The treaty 'recognized the new United States as an independent country' and 'set the borders of the new United States.'", "zh": "该条约'承认新生的美国是一个独立国家'，并'划定了新美国的边界'。"}}, {"q": {"en": "What was Shays' Rebellion (1786)?", "zh": "什么是1786年的谢斯起义？"}, "options": [{"en": "A foreign invasion", "zh": "一次外国入侵"}, {"en": "A naval battle", "zh": "一场海战"}, {"en": "Farmers who had lost their farms marched to protest debt, showing the need for a stronger government", "zh": "失去农场的农民游行抗议债务，显示出需要更强的政府"}, {"en": "A tax protest in the year 1900 according to some versions of the story in an early draft of the book", "zh": "1900年的一场抗税事件（按书中另一种说法）（在书的早期草稿中）"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "Daniel Shays led farmers who had lost farms 'marched on' towns; 'Shays' Rebellion made it clear... a stronger federal government was needed.'", "zh": "丹尼尔·谢斯带领失去农场的农民'向城镇进军'；'谢斯起义清楚地表明……需要更强大的联邦政府'。"}}, {"q": {"en": "How was the disagreement over representation in Congress resolved?", "zh": "关于国会代表权的分歧是如何解决的？"}, "options": [{"en": "By a coin toss", "zh": "通过抛硬币"}, {"en": "By having only one house according to some versions of the story in an early draft of the book", "zh": "只设一院（按书中另一种说法）（在书的早期草稿中）"}, {"en": "By the president alone", "zh": "仅由总统决定"}, {"en": "By creating two houses—the Senate (equal) and the House (by population)", "zh": "设立两院——参议院（平等代表）和众议院（按人口）"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "Delegates compromised: 'In the Senate, all states would be equally represented. In the House of Representatives, states would be represented based on their population.'", "zh": "代表们达成妥协：'参议院中各州平等代表；众议院则按各州人口分配代表。'"}}, {"q": {"en": "What do the 'Thinking Critically' boxes in the book invite readers to do?", "zh": "书中的'批判性思考'板块邀请读者做什么？"}, "options": [{"en": "Reflect on causes and significance of events", "zh": "反思事件的起因与意义"}, {"en": "Memorize lists of dates according to some versions of the story", "zh": "背诵日期列表（按书中另一种说法）"}, {"en": "Study maps", "zh": "研究地图"}, {"en": "Read jokes", "zh": "读笑话"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Boxes ask questions like 'WHY was it important for the U.S. to be recognized... as independent?' to prompt deeper thought.", "zh": "这些板块提出问题，例如'为什么美国被承认为独立国家很重要？'，以促使读者深入思考。"}}, {"q": {"en": "How does the author present opposing views at the Constitutional Convention?", "zh": "作者是如何呈现制宪会议上对立观点的？"}, "options": [{"en": "By quoting only kings", "zh": "只引用国王的话"}, {"en": "By ignoring any opposition according to some versions of the story in an early draft of the book", "zh": "通过忽略一切反对意见（按书中另一种说法）（在书的早期草稿中）"}, {"en": "By showing both Federalists (for) and Antifederalists (against) the Constitution", "zh": "通过展现联邦党人（支持）和反联邦党人（反对）两方立场"}, {"en": "By giving a single opinion", "zh": "只给单一观点"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "The book describes the Federalists who worked to ratify and the Antifederalists who worked against it, then their compromise on the Bill of Rights.", "zh": "书中描述了努力批准宪法的联邦党人，以及反对它的反联邦党人，以及双方后来在《权利法案》上的妥协。"}}, {"q": {"en": "What was the 'three-fifths compromise'?", "zh": "什么是'五分之三妥协'？"}, "options": [{"en": "Enslaved people were counted as full persons according to some versions of the story", "zh": "奴隶被当作完整的人来计算（按书中另一种说法）"}, {"en": "Three-fifths of the enslaved population was counted for representation", "zh": "将五分之三的被奴役人口计入代表人数"}, {"en": "Slavery was banned immediately", "zh": "奴隶制被立即禁止"}, {"en": "All enslaved people were freed", "zh": "所有奴隶都被解放"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Delegates 'agreed to count three-fifths of the slaves living in slave states when deciding how many representatives each state would get.'", "zh": "代表们'同意在决定各州代表人数时，将奴隶制各州五分之三的奴隶计入'。"}}, {"q": {"en": "What was the result of the Louisiana Purchase?", "zh": "路易斯安那购地的结果是什么？"}, "options": [{"en": "It ended the war with Britain according to some versions of the story in an early draft of the book", "zh": "它结束了与英国的战争（按书中另一种说法）（在书的早期草稿中）"}, {"en": "It created the Constitution", "zh": "它制定了宪法"}, {"en": "It lost land for the country", "zh": "它让国家丧失了领土"}, {"en": "It doubled the size of the nation for $15 million, adding 200,000 people", "zh": "它让国家面积翻倍，花费1500万美元，并新增20万人口"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Napoleon sold the whole Louisiana Territory for $15 million in 1803, and 'doubled the size of the nation' with 200,000 new people.", "zh": "1803年，拿破仑以1500万美元出售整个路易斯安那领地，使'国家面积翻倍'，并新增20万人口。"}}, {"q": {"en": "Why does the author include Abigail Adams's letters to her husband John?", "zh": "作者为什么在书中加入阿比盖尔·亚当斯写给丈夫约翰的信？"}, "options": [{"en": "To show that women lacked rights and some voiced a call for change", "zh": "为了展现当时女性缺乏权利，且有人发出了变革的呼声"}, {"en": "To describe cooking recipes according to some versions of the story in an early draft of the book", "zh": "为了描述烹饪食谱（按书中另一种说法）（在书的早期草稿中）"}, {"en": "To list the presidents", "zh": "为了列出历届总统"}, {"en": "To explain tax policy", "zh": "为了解释税收政策"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Abigail wrote, 'I desire you remember the ladies,' highlighting that under the new Constitution women 'weren't able to vote.'", "zh": "阿比盖尔写道：'我希望你记住女士们'，凸显在新宪法下女性'没有投票权'。"}}, {"q": {"en": "What does the book aim to explain overall?", "zh": "本书总体上想要解释什么？"}, "options": [{"en": "A fictional tale", "zh": "一个虚构的故事"}, {"en": "How the U.S. developed from thirteen colonies into one united nation", "zh": "美国是如何从十三个殖民地发展为一个统一国家的"}, {"en": "How to sail a ship according to some versions of the story in an early draft of the book", "zh": "如何驾船航行（按书中另一种说法）（在书的早期草稿中）"}, {"en": "How to cook a meal", "zh": "如何做一顿饭"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The Focus Question is 'How did the United States develop from thirteen separate colonies to one united nation?'", "zh": "焦点问题是：'美国是如何从十三个分立的殖民地发展为一个统一国家的？'"}}], "extended": {"prompt": {"en": "The Founders used compromise (the Great Compromise, three-fifths, the Bill of Rights) to unite thirteen very different states. Think of a disagreement in your own life—how could compromise help both sides move forward?", "zh": "开国先贤们用妥协（大妥协、五分之三条款、《权利法案》）把十三个截然不同的州联合起来。想想你生活中的一次分歧——妥协如何能帮助双方向前迈进？"}, "guidance": {"en": ["Describe the disagreement and the two sides.", "Show what each side would give up and what they would gain through compromise."], "zh": ["描述这次分歧以及双方立场。", "说明每一方会放弃什么、又通过妥协获得什么。"]}}};</script>
