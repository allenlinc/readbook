<script>window.BOOK = {"slug": "the-queen-s-loss-part-ii", "title": "The Queen's Loss (Part II)", "titleZh": "女王失去的一切（第二部）", "level": "Z", "genre": "Literary", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "When the stained-glass windows on the dais break, who tumbles out and what happens?", "zh": "当王座平台上的彩绘玻璃窗破碎时，谁掉了出来？发生了什么？"}, "options": [{"en": "The cave collapses on top of everyone according to some versions of the story in an early draft of the book", "zh": "洞穴在所有人头顶崩塌（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Jake and Sarah tumble out in a deluge of sand and reunite with their families", "zh": "Jake 和 Sarah 随着大量沙子掉了出来，并与家人团聚"}, {"en": "The narrator is left completely alone", "zh": "叙述者被独自留下"}, {"en": "The Queen disappears forever", "zh": "女王永远消失了"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says 'the stained-glass windows ... break, and Jake and Sarah tumble out in a deluge of sand,' then Sarah runs to her mom and they embrace.", "zh": "书中说“彩绘玻璃窗……破碎，Jake 和 Sarah 随着大量沙子掉了出来”，随后 Sarah 奔向妈妈并相拥。"}}, {"q": {"en": "What does Qynn do to Thomas that helps break through to the Queen?", "zh": "Qynn 对 Thomas 做了什么，从而打动了女王？"}, "options": [{"en": "She imagines him as a real boy (removing his ghostliness), and the Queen, seeing her son, softens and weeps", "zh": "她把他想象成一个真实的男孩（去掉他的幽灵特质），女王见到儿子后软化并落泪"}, {"en": "She sends him far away", "zh": "她把他送去了远方"}, {"en": "She ignores him completely", "zh": "她完全无视他"}, {"en": "She turns him into a steed according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "她把他变成了一匹骏马（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Qynn 'concentrate[s] on Thomas, imagining him as the boy ... I take away his ghostliness, making him look like a real boy,' and the Queen whispers 'Oh, Thomas ... I'm sorry.'", "zh": "Qynn“集中意念想着 Thomas，把他想象成那个男孩……我去掉他的幽灵特质，让他看起来像个真男孩”，女王低语“哦，Thomas……对不起”。"}}, {"q": {"en": "Who does the Queen reveal herself to be, and why did she build the sand world?", "zh": "女王揭示自己是谁？她又为何建造了沙之世界？"}, "options": [{"en": "A queen born in the sand world with no past according to some versions of the story in an early draft of the book", "zh": "一个在沙之世界出生、毫无过往的女王（按书中另一种说法）（在书的早期草稿中）"}, {"en": "An alien from another planet", "zh": "来自另一个星球的外星人"}, {"en": "Tatiana Porter, a mother who lost her son Thomas and created this world to escape her grief", "zh": "塔蒂亚娜·波特，一位失去儿子 Thomas 的母亲，为逃避悲伤而创造了这个世界"}, {"en": "Sarah's real mother", "zh": "Sarah 真正的母亲"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "She says 'Many years ago, I was Tatiana Porter ... Thomas, my dear child ... fell deathly ill' and she 'became adrift in my sorrow' and built the world to control everything.", "zh": "她说“多年前我是塔蒂亚娜·波特……Thomas，我亲爱的孩子……病重离世”，她“在悲伤中漂泊”，并建造世界以掌控一切。"}}, {"q": {"en": "What happens to the Queen and the children at the very end of Part II?", "zh": "在第二部结尾，女王和孩子们发生了什么？"}, "options": [{"en": "The Queen becomes ancient, says their time has come to an end, and the children dissolve into sand covering her as they say goodbye", "zh": "女王变老，说他们的时日已尽，孩子们化作沙子覆盖着她，与之告别"}, {"en": "The children are sent off to fight", "zh": "孩子们被派去战斗"}, {"en": "The Queen destroys the doorway", "zh": "女王毁掉了那扇门"}, {"en": "They all move into the castle permanently according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "他们都永久搬进了城堡（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Mrs. Porter says 'our time has come to an end. We must move on,' and as Qynn leaves, 'the children dissolve into sand, gently covering their mother.'", "zh": "Porter 太太说“我们的时日已尽，必须继续前行”，Qynn 离开时“孩子们化作沙子，轻轻覆盖着他们的母亲”。"}}, {"q": {"en": "Late in the story, the Queen suddenly becomes ancient—white hair, wrinkled skin. What technique does the author use here?", "zh": "在故事后段，女王突然变老——白发、皱纹皮肤。作者这里用了什么手法？"}, "options": [{"en": "A dream the narrator is having", "zh": "叙述者做的一个梦"}, {"en": "A physical transformation that reveals her true self once she no longer uses the sand's power to seem young", "zh": "用身体变化揭示：一旦不再用沙的力量维持年轻，她真实的自己便显现出来"}, {"en": "A sudden change of setting to a different planet according to some versions of the story in an early draft of the book", "zh": "场景突然切换到另一个星球（按书中另一种说法）（在书的早期草稿中）"}, {"en": "A typing error in the book", "zh": "书里的一个印刷错误"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The book says she 'suddenly become ancient ... must have been using the power of the sand to maintain her youthful appearance,' revealing character through a physical change.", "zh": "书中说她“突然变老……一定是用沙的力量维持着年轻的容貌”，通过身体的变化揭示人物真相。"}}, {"q": {"en": "When Qynn sees 'the melancholy underneath' the Queen's fury, what does melancholy mean?", "zh": "当 Qynn 在女王的暴怒之下看到“melancholy”（忧郁）时，melancholy 是什么意思？"}, "options": [{"en": "A type of food", "zh": "一种食物"}, {"en": "A kind of weapon", "zh": "一种武器"}, {"en": "A state of being sad, thoughtful, and gloomy", "zh": "悲伤、沉思而忧郁的状态"}, {"en": "A feeling of great joy according to some versions of the story", "zh": "极大的喜悦（按书中另一种说法）"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "The glossary defines melancholy as 'the state of being sad, thoughtful, and gloomy.'", "zh": "术语表将 melancholy 定义为“悲伤、沉思而忧郁的状态”。"}}, {"q": {"en": "The Queen recreated her children as perfect replicas, but their perfection began to 'vex' her. What does this show?", "zh": "女王把孩子们重造成“完美的复制品”，但他们的完美开始让她“vex”（困扰）。这说明了什么？"}, "options": [{"en": "The Queen wanted them to be even more perfect", "zh": "女王希望他们更完美"}, {"en": "Even perfect, pain-free creations could not replace real loved ones, because they were not truly human", "zh": "即便完美、无痛苦的造物也无法取代真实的所爱之人，因为他们并非真正的人类"}, {"en": "The replicas were better than real children in every way according to some versions of the story in an early draft of the book", "zh": "这些复制品在各方面都比真实的孩子更好（按书中另一种说法）（在书的早期草稿中）"}, {"en": "The children asked to be remade", "zh": "是孩子们要求被重造的"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "She 'couldn't understand why—until I remembered that they weren't really my children, and they never could be. They were too perfect to be human.'", "zh": "她“想不通为什么——直到我记起他们并非我真正的孩子，也永远不可能成为。他们太完美，不像人类”。"}}, {"q": {"en": "When the palace collapses, brightly colored cephaloids emerge and Seth greets each 'with complicated tentacle gestures.' What does this suggest?", "zh": "宫殿崩塌时，色彩鲜艳的cephaloids（头足怪）出现，Seth 用“复杂的触手动作”一一问候它们。这暗示了什么？"}, "options": [{"en": "The cephaloids are pieces of furniture", "zh": "头足怪是家具"}, {"en": "The cephaloids are enemies attacking Seth according to some versions of the story in an early draft of the book", "zh": "头足怪是攻击 Seth 的敌人（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Seth is afraid of them", "zh": "Seth 害怕它们"}, {"en": "The cephaloids are familiar beings in this world that Seth knows and cares about, not merely monsters", "zh": "头足怪是这个世界中 Seth 认识并在乎的生灵，而不仅仅是怪物"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Seth 'greets each with complicated tentacle gestures that seem to mean they know each other,' showing a bond rather than mere menace.", "zh": "Seth“用复杂的触手动作一一问候，似乎意味着他们彼此相识”，显示出一种羁绊而非单纯的威胁。"}}, {"q": {"en": "Why does the author have the Queen tell her full backstory as Tatiana Porter?", "zh": "作者为什么要让女王讲述自己作为塔蒂亚娜·波特的完整过往？"}, "options": [{"en": "To show she was always purely evil according to some versions of the story in an early draft of the book", "zh": "为了说明她向来纯粹邪恶（按书中另一种说法）（在书的早期草稿中）"}, {"en": "To introduce a brand-new villain", "zh": "为了引出一个全新的反派"}, {"en": "To prove the story is nonfiction", "zh": "为了证明故事是非虚构的"}, {"en": "To explain her motives—grief over losing her son made her hide in a fantasy she couldn't control", "zh": "为了说明她的动机——丧子之痛让她躲进一个自己无法掌控的幻象"}], "answer": 3, "skill": "Author's Purpose and Perspective", "explain": {"en": "She reveals 'I was Tatiana Porter ... Thomas, my dear child ... fell deathly ill ... I became adrift in my sorrow,' explaining why she built the illusion.", "zh": "她揭示“我是塔蒂亚娜·波特……Thomas，我亲爱的孩子……病重离世……我在悲伤中漂泊”，说明了她建造幻象的原因。"}}, {"q": {"en": "The focus question asks how Qynn and Sarah's relationship with the Queen changed. By the end, how do they view her?", "zh": "焦点问题问 Qynn 和 Sarah 与女王的关系如何改变。到结尾时，她们如何看待她？"}, "options": [{"en": "They come to feel pity and forgiveness, seeing her as Mrs. Porter—a grieving mother—rather than a monster", "zh": "她们生出怜悯与宽恕，把她看作波特太太——一位悲伤的母亲——而非怪物"}, {"en": "They forget she ever existed", "zh": "她们忘记了她曾经存在"}, {"en": "They remain terrified and hate her according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "她们仍充满恐惧并憎恨她（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "They decide to rule the sand world", "zh": "她们决定统治沙之世界"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Sarah thanks her 'for giving me my mother back' and Qynn hugs her, thinking 'she's not that person anymore—she's Mrs. Porter,' showing forgiveness.", "zh": "Sarah 感谢她“把我妈妈还给了我”，Qynn 拥抱她，心想“她已不是从前那个人——她是波特太太”，体现出宽恕。"}}], "extended": {"prompt": {"en": "Mrs. Porter created a fake world to avoid her grief, but in the end she chose to let go. Have you ever held onto something (a belief, a place, a habit) to avoid a hard feeling? What helped you move on, or what would help?", "zh": "Porter 太太为了逃避悲伤而创造了一个虚假世界，但最后她选择了放手。你有没有曾为躲避某种难受的感觉而紧抓某样东西（一种信念、一个地方、一种习惯）？是什么帮你走了出来，或能帮你走出来？"}, "guidance": {"en": ["Think about a time you struggled to let go of something.", "Consider what 'moving on' can look like in real life."], "zh": ["想想你曾难以放手的时刻。", "思考在现实生活中“向前走”可以是怎样的。"]}}};</script>
