<script>window.BOOK = {"slug": "influenza", "title": "InFLUenza", "titleZh": "流感", "level": "Z", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "The book explains there are three basic types of influenza. Which type can cause serious illness in humans and other animals and is usually responsible for large outbreaks?", "zh": "书中说流感有三大基本类型。哪一种能在人类和其他动物中引起严重疾病，并通常导致大规模暴发？"}, "options": [{"en": "Influenza A", "zh": "甲型流感（Influenza A）"}, {"en": "Influenza B", "zh": "乙型流感（Influenza B）"}, {"en": "Influenza C", "zh": "丙型流感（Influenza C）"}, {"en": "None of the types", "zh": "以上都不是"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book states: 'Influenza A can cause serious illness in humans and other animals and is usually responsible for large outbreaks.'", "zh": "书中写道：“甲型流感能在人类和其他动物中引起严重疾病，并通常导致大规模暴发。”"}}, {"q": {"en": "According to the book, when does flu season last in the northern hemisphere?", "zh": "根据本书，北半球流感季通常持续哪几个月？"}, "options": [{"en": "From October through May", "zh": "从10月到次年5月"}, {"en": "From January through March", "zh": "从1月到3月"}, {"en": "Only in the summer", "zh": "只在夏季"}, {"en": "All year with no pattern", "zh": "全年无规律"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says: 'Like many other organisms, viruses need a particular type of home... during flu season, which lasts from October through May in the northern hemisphere, viruses are widespread.'", "zh": "书中说：“在流感季，病毒四处蔓延；北半球的流感季从10月持续到次年5月。”"}}, {"q": {"en": "The book describes the 1918 Spanish flu pandemic. About how many people died worldwide?", "zh": "书中描述了1918年的西班牙流感大流行。全球大约有多少人死亡？"}, "options": [{"en": "25 to 40 million people worldwide", "zh": "全球2500万至4000万人"}, {"en": "600,000 people worldwide", "zh": "全球60万人"}, {"en": "70,000 people worldwide", "zh": "全球7万人"}, {"en": "34,000 people worldwide", "zh": "全球3.4万人"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book states the Spanish flu 'killed more than 600,000 Americans and 25 to 40 million people worldwide' and was called a pandemic.", "zh": "书中说西班牙流感“造成超过60万美国人死亡，全球死亡2500万至4000万人”，并被称为大流行。"}}, {"q": {"en": "Who developed the first vaccine in 1796, and what was it made from?", "zh": "谁在1796年研制出第一支疫苗？它是用什么制成的？"}, "options": [{"en": "British physician Edward Jenner, using cowpox virus to protect against smallpox", "zh": "英国医生爱德华·詹纳，用牛痘病毒预防天花"}, {"en": "Louis Pasteur, using the flu virus", "zh": "路易·巴斯德，用流感病毒"}, {"en": "Jonas Salk, using polio virus", "zh": "乔纳斯·索尔克，用脊髓灰质炎病毒"}, {"en": "A Roman doctor, using herbs", "zh": "一位罗马医生，用草药"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "In a 'Do You Know?' note the book says: 'British physician Edward Jenner developed the first vaccine in 1796 when he injected patients with cowpox virus to protect them from the similar but much more dangerous smallpox virus.'", "zh": "书中“你知道吗？”写道：“英国医生爱德华·詹纳于1796年研制出第一支疫苗，他将牛痘病毒注入病人体内，以预防相似但危险得多的天花病毒。”"}}, {"q": {"en": "The book includes a glossary defining words such as antibody, antigen, epidemic, pandemic, and vaccine. What is the purpose of this glossary?", "zh": "书中附有词汇表，解释 antibody（抗体）、antigen（抗原）、epidemic（流行）、pandemic（大流行）、vaccine（疫苗）等词。这个词汇表的作用是什么？"}, "options": [{"en": "To define the specialized science vocabulary used throughout the book", "zh": "为了解释全书使用的专业科学词汇"}, {"en": "To list the photo credits", "zh": "为了列出图片来源"}, {"en": "To give the dates of flu pandemics", "zh": "为了给出流感大流行的日期"}, {"en": "To translate the book into another language", "zh": "为了把本书翻译成另一种语言"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary at the back defines key terms like antibodies, antigens, epidemic, pandemic, and vaccines that appear in the science explanations.", "zh": "书末词汇表定义了出现在科学解释中的关键词，如抗体、抗原、流行、大流行和疫苗。"}}, {"q": {"en": "How is the book organized from beginning to end?", "zh": "本书从开头到结尾是如何组织的？"}, "options": [{"en": "From what the flu is and how it spreads, to how the body fights it, then prevention, treatment, and its history", "zh": "从流感是什么、如何传播，到人体如何抵抗，再到预防、治疗及其历史"}, {"en": "Alphabetically by symptom", "zh": "按症状字母顺序排列"}, {"en": "By country, from China to the United States", "zh": "按国家，从中国到美国"}, {"en": "Only by the year of each pandemic", "zh": "只按每次大流行的年份"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The table of contents shows sections in a logical order: What Is the Flu?, Changing Viruses, The Body Fights Back, Preventing the Virus, Treating the Flu, and History of the Flu.", "zh": "目录显示各节按逻辑顺序排列：什么是流感、变化的病毒、身体反击、阻止病毒、治疗流感、流感的历史。"}}, {"q": {"en": "The book describes a virus chain: wild duck to chicken to pig to human. Why can viruses mix dangerously on farms?", "zh": "书中描述了病毒链条：野鸭→鸡→猪→人。为什么在农场病毒可能危险地混合？"}, "options": [{"en": "Because chickens, pigs, and humans live in close contact, allowing viruses to spread and mix", "zh": "因为鸡、猪和人类密切接触，使病毒得以传播和混合"}, {"en": "Because farms freeze the viruses", "zh": "因为农场把病毒冻住了"}, {"en": "Because pigs eat the viruses", "zh": "因为猪吃掉了病毒"}, {"en": "Because birds cannot infect humans", "zh": "因为鸟类不能感染人类"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book explains: 'Since chickens, pigs, and humans come in close contact on farms, the spreading and mixing of viruses can be deadly,' and a 1997 avian virus even jumped directly from birds to humans.", "zh": "书中解释：“由于鸡、猪和人类在农场密切接触，病毒的传播与混合可能致命”，而1997年的禽流感病毒甚至直接从鸟类跳到了人类。"}}, {"q": {"en": "The book says flu viruses mutate. Why must scientists predict which strains to put into each year's flu shot?", "zh": "书中说流感病毒会变异。为什么科学家必须预测每年流感疫苗中放入哪些毒株？"}, "options": [{"en": "Because viruses mutate into new strains the body may not recognize, so last year's shot may not protect against them", "zh": "因为病毒会变异成身体可能不认识的新毒株，去年的疫苗可能无法防范"}, {"en": "Because vaccines work forever and never change", "zh": "因为疫苗永远有效、从不改变"}, {"en": "Because the flu only affects children", "zh": "因为流感只影响儿童"}, {"en": "Because the virus is large enough to see", "zh": "因为病毒大到肉眼可见"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book notes a mutated strain can evade a body's earlier immunity, so 'Scientists must be good detectives to predict which strains to put into the shot each year.'", "zh": "书中指出变异的毒株能避开身体先前的免疫力，因此“科学家必须像好侦探一样预测每年疫苗中该放入哪些毒株”。"}}, {"q": {"en": "At the end, the book advises readers to drink water, rest, get a vaccine, and 'attack back.' What is the author's purpose for this advice?", "zh": "在结尾，作者建议读者多喝水、休息、接种疫苗并“反击”。作者给出这些建议的意图是什么？"}, "options": [{"en": "To help readers protect themselves from the flu and avoid spreading it to others", "zh": "为了帮助读者保护自己免于感染流感，并避免传染他人"}, {"en": "To scare readers about the disease", "zh": "为了吓唬读者"}, {"en": "To sell a particular medicine", "zh": "为了推销某种药物"}, {"en": "To describe only the history of past pandemics", "zh": "为了只描述过去大流行的历史"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The conclusion tells readers the most important thing is to take care of themselves and prevent others from getting it: drink water, sleep, get a vaccine, and let healthy cells win the battle.", "zh": "结论告诉读者，最重要的是照顾好自己并防止传染他人：多喝水、睡眠、接种疫苗，让健康细胞打赢这场仗。"}}, {"q": {"en": "What is the author's overall purpose in writing InFLUenza?", "zh": "作者写《流感》的整体意图是什么？"}, "options": [{"en": "To explain what the flu is, how it spreads and changes, and how the body and medicine fight it so readers can stay healthy", "zh": "为了解释流感是什么、如何传播和变异，以及人体和药物如何对抗它，让读者保持健康"}, {"en": "To prove that the flu is not a real disease", "zh": "为了证明流感不是真实疾病"}, {"en": "To entertain with a fictional story", "zh": "为了用虚构故事取悦读者"}, {"en": "To teach readers how to cook", "zh": "为了教读者做饭"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The introduction says that by learning about the flu--what it is, what causes it, its symptoms, and how to treat it--'you can fight back against this illness and stay healthy.'", "zh": "引言说，通过了解流感——它是什么、由什么引起、有哪些症状、如何治疗——“你就能反击这种疾病并保持健康”。"}}], "extended": {"prompt": {"en": "The book says vaccines are about 80% effective and that washing hands and staying home when sick help stop the spread. What do you already do to avoid getting or spreading the flu, and what new habit could you start?", "zh": "书中说疫苗约80%有效，而勤洗手、生病时居家有助于阻止传播。你目前已经做了什么来避免感染或传播流感？又可以养成什么新习惯？"}, "guidance": {"en": ["Name a habit from the book's prevention tips, such as hand washing, covering coughs, or staying home when sick.", "Reflect honestly on your own habits and suggest one realistic new habit, like getting a yearly flu vaccine."], "zh": ["说出书中预防提示里的一条习惯，例如勤洗手、咳嗽遮掩或生病时居家。", "如实反思自己的习惯，并提出一个切实可行的新习惯，例如每年接种流感疫苗。"]}}};</script>
