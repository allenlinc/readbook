<script>window.BOOK = {"slug": "hybrid-animals", "title": "Hybrid Animals", "titleZh": "杂交动物", "level": "Z", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "According to the book, if the mother is a donkey and the father is a horse, what is the hybrid offspring called?", "zh": "根据本书，如果母亲是驴、父亲是马，这种杂交后代叫什么？"}, "options": [{"en": "A hinny", "zh": "駃騠（hinny）"}, {"en": "A mule", "zh": "骡子（mule）"}, {"en": "A zebroid", "zh": "斑马杂交体（zebroid）"}, {"en": "A liger", "zh": "狮虎兽（liger）"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book states: 'If the mother is a horse, the baby is called a mule, and if the mother is a donkey, the baby is called a hinny.'", "zh": "书中写道：“如果母亲是马，幼崽叫骡子（mule）；如果母亲是驴，幼崽叫駃騠（hinny）。”"}}, {"q": {"en": "What is a liger, and how large does it grow?", "zh": "什么是狮虎兽？它能长到多大？"}, "options": [{"en": "A hybrid of a male lion and a female tiger that grows about twice as large as either parent, with the largest near 1,200 pounds", "zh": "雄狮与雌虎的杂交后代，体型约为父母任一方的两倍，最大的接近1200磅"}, {"en": "A hybrid of a male tiger and a female lion that stays smaller than both parents", "zh": "雄虎与雌狮的杂交后代，比父母都小"}, {"en": "A cross between a zebra and a donkey", "zh": "斑马与驴的杂交"}, {"en": "A type of wild bear", "zh": "一种野生熊"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says a liger is a hybrid of a male lion and a female tiger, grows about twice as large as either parent, and the largest known healthy male weighs nearly 1,200 pounds (544 kg).", "zh": "书中说狮虎兽是雄狮与雌虎的杂交后代，体型约为父母任一方的两倍，已知最大的健康雄性接近1200磅（544公斤）。"}}, {"q": {"en": "What is a grolar bear, and when was one first identified?", "zh": "什么是灰北极熊（grolar bear）？第一次被发现是在什么时候？"}, "options": [{"en": "A hybrid of a grizzly bear and a polar bear, first spotted in 2006", "zh": "灰熊与北极熊的杂交后代，最早于2006年被发现"}, {"en": "A hybrid of a lion and a tiger", "zh": "狮子与老虎的杂交后代"}, {"en": "A type of salamander in California", "zh": "加州的一种蝾螈"}, {"en": "A camel-llama hybrid made in a test tube", "zh": "试管培育的骆驼与羊驼杂交体"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says one of the first grizzly-polar bear hybrids, called a grolar bear, was spotted in 2006, with thick white fur, brown legs and paws, and a wide, grizzly-like head.", "zh": "书中说最早的一只灰北极熊（灰熊与北极熊杂交）于2006年被发现，长着厚密的白色皮毛、棕色的腿和爪子，以及宽大的灰熊式脑袋。"}}, {"q": {"en": "The book says 'spider goats' are considered transgenic rather than hybrid. Why?", "zh": "书中说“蜘蛛山羊”属于转基因动物而非杂交动物。为什么？"}, "options": [{"en": "Because spider genes were inserted into goat cells in a lab, rather than the two species mating", "zh": "因为是在实验室里把蜘蛛基因植入山羊细胞，而非两个物种交配"}, {"en": "Because goats and spiders are the same species", "zh": "因为山羊和蜘蛛是同一物种"}, {"en": "Because they were born in the wild", "zh": "因为它们出生在野外"}, {"en": "Because they cannot produce milk", "zh": "因为它们不能产奶"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book explains scientists inserted spider silk proteins into goat DNA so goats produce spider silk in their milk; since the genes were inserted in a lab, 'spider goats' are considered transgenic rather than hybrid.", "zh": "书中解释说科学家把蜘蛛丝蛋白植入山羊的DNA，使山羊在奶中产出蜘蛛丝；由于基因是在实验室植入的，“蜘蛛山羊”因此被视为转基因动物而非杂交动物。"}}, {"q": {"en": "At the start of the book, the author provides a 'Words to Know' list (adapt, DNA, hybrid, species, etc.). What is the purpose of this list?", "zh": "在书的开头，作者提供了“需掌握的词汇”列表（adapt、DNA、hybrid、species等）。这个列表的作用是什么？"}, "options": [{"en": "To preview important vocabulary so readers can understand the science in the book", "zh": "为了预习重要词汇，帮助读者理解书中的科学知识"}, {"en": "To list the chapters of the book", "zh": "为了列出本书的章节"}, {"en": "To give the photo credits", "zh": "为了给出图片来源"}, {"en": "To translate the book into Latin", "zh": "为了把本书翻译成拉丁文"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The 'Words to Know' list appears before the chapters and introduces terms like DNA, hybrid, species, and transgenic that are essential to the book's content.", "zh": "“需掌握的词汇”列表出现在各章之前，介绍了DNA、杂交、物种和转基因等理解本书内容所需的关键词。"}}, {"q": {"en": "To explain that appearance alone cannot define a species, what comparison does the author use?", "zh": "为了说明仅凭外表不能定义一个物种，作者用了什么对比？"}, "options": [{"en": "A Great Dane and a Chihuahua look different but are the same species, while two similar fruit flies can be different species", "zh": "大丹犬和吉娃娃外形迥异却是同一物种，而两只相似的果蝇却可能是不同物种"}, {"en": "All dogs are different species from one another", "zh": "所有的狗彼此都是不同物种"}, {"en": "Bigger animals are always a different species", "zh": "体型更大的动物总是不同物种"}, {"en": "Hybrids are always the same species as their parents", "zh": "杂交动物总是与其父母同属一个物种"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "In 'Same or Different Species?' the book shows a Great Dane and a Chihuahua (same species, Canis lupus familiaris) next to two look-alike fruit flies that are actually different species.", "zh": "在“同种还是不同种？”中，书中把大丹犬和吉娃娃（同一物种，家犬）与两只外形相似却实为不同物种的果蝇并列展示。"}}, {"q": {"en": "The book connects climate change to the appearance of hybrids like the grolar bear. How does this happen?", "zh": "本书把气候变化与灰北极熊等杂交动物的出现联系起来。这是如何发生的？"}, "options": [{"en": "Rising temperatures and melting ice bring previously separated species, like grizzlies and polar bears, into contact so they interbreed", "zh": "气温上升与海冰融化使原本分离的物种（如灰熊和北极熊）相遇并杂交"}, {"en": "Farmers deliberately breed them together", "zh": "农民故意让它们交配"}, {"en": "Zoos release them into the wild", "zh": "动物园把它们放归野外"}, {"en": "The animals choose to migrate south on purpose", "zh": "这些动物故意向南迁徙"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says climate change has brought together many previously separated species; in the Arctic, grizzlies and polar bears now overlap and regularly interbreed in the wild.", "zh": "书中说气候变化使许多原本分离的物种相遇；在北极，灰熊和北极熊的活动范围重叠，并在野外经常杂交。"}}, {"q": {"en": "The book presents both 'problem' and 'solution' views of hybrids. What is one concern it raises?", "zh": "本书对杂交动物既呈现“问题”也呈现“解决之道”。它提出的一个担忧是什么？"}, "options": [{"en": "Interbreeding with grizzlies may dilute polar bear genes and threaten their survival as a species", "zh": "与灰熊杂交可能稀释北极熊的基因，威胁该物种的生存"}, {"en": "Hybrids always outcompete and replace their parent species", "zh": "杂交动物总会胜过并取代其亲本物种"}, {"en": "Hybrids are illegal in every country", "zh": "杂交动物在每个国家都是非法的"}, {"en": "Hybrids cause no concern at all", "zh": "杂交动物完全不令人担忧"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book warns that because polar bears are at risk of extinction, every birth matters; interbreeding dilutes their specialized Arctic genes, and grolar bears may not be well adapted to either parent's environment.", "zh": "书中警告，北极熊面临灭绝风险，每一只出生都至关重要；杂交会稀释它们适应北极的特殊基因，而灰北极熊可能并不适应父母任一方的环境。"}}, {"q": {"en": "In the 'Creatures by Design' section about spider goats, what is the author's purpose for including this example?", "zh": "在关于蜘蛛山羊的“量身设计的生物”板块中，作者加入这个例子的意图是什么？"}, "options": [{"en": "To show that genetic engineering can combine traits from very different species that even test-tube mating cannot", "zh": "为了说明基因工程能把差异极大的物种的性状结合起来，连试管授精也做不到"}, {"en": "To explain how to farm spiders for silk", "zh": "为了说明如何饲养蜘蛛取丝"}, {"en": "To describe ordinary goat milk production", "zh": "为了描述普通的山羊产奶"}, {"en": "To argue against all hybrids", "zh": "为了反对一切杂交动物"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book uses spider goats to extend the idea of combining traits: since spiders and goats are too different to mate, scientists used genetic engineering, making the goats transgenic.", "zh": "本书用蜘蛛山羊拓展了“结合性状”的思路：蜘蛛和山羊差异太大无法交配，于是科学家用基因工程，使山羊成为转基因动物。"}}, {"q": {"en": "The book's final section asks 'Animal Hybrids: Problem or Solution?' What is the author's overall purpose?", "zh": "本书最后一节提问“杂交动物：是问题还是解决之道？”作者的整体意图是什么？"}, "options": [{"en": "To explore both the risks and benefits of hybrids and let readers consider whether they are a threat or a natural coping mechanism", "zh": "为了探讨杂交动物的风险与益处，让读者思考它们是威胁还是自然的应对机制"}, {"en": "To prove that hybrids are always harmful", "zh": "为了证明杂交动物总是有害"}, {"en": "To entertain with imaginary creatures", "zh": "为了用虚构的生物取悦读者"}, {"en": "To teach readers how to cook", "zh": "为了教读者做饭"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The conclusion says hybrids 'may be a bit of both--only time will tell,' presenting them as possibly a threat to at-risk species yet also nature's way of coping with rapid change.", "zh": "结论说杂交动物“可能两者兼具——只有时间能给出答案”，既可能威胁濒危物种，也可能是自然界应对快速变化的方式。"}}], "extended": {"prompt": {"en": "The book says hybrids may help species cope with rapid environmental change but can also threaten at-risk species. What is your opinion, and can you think of another example of humans mixing species or traits?", "zh": "书中说杂交动物或许能帮助物种应对快速的环境变化，但也可能威胁濒危物种。你对此怎么看？你能想到人类混合物种或性状的另一个例子吗？"}, "guidance": {"en": ["State whether you see hybrids more as a problem or a solution, using a reason from the book such as polar bear gene dilution or exchanging genetic information.", "Give your own example or idea of combining traits from different species, real or imagined."], "zh": ["结合书中的理由（如北极熊基因被稀释，或交换遗传信息）说出你认为杂交动物更像是问题还是解决之道。", "举出你自己的例子或想法，说明如何把不同物种的性状结合起来（真实或想象均可）。"]}}};</script>
