<script>window.BOOK = {"slug": "telescopes-eyes-on-space", "title": "Telescopes Eyes on Space", "titleZh": "望远镜：太空之眼", "level": "Z", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Who is credited as the first to combine lenses to look at distant objects and who applied for a patent in 1608?", "zh": "谁被公认为第一个将镜片组合用来观察远处物体，并在1608年申请了专利？"}, "options": [{"en": "Hans Lippershey, a Dutch lens maker, who built 'The Looker.'", "zh": "荷兰镜片工匠汉斯·利伯希，他制造了'观察者'（The Looker）。"}, {"en": "Galileo Galilei, who built it in Italy. according to some versions of the story", "zh": "伽利略·伽利雷，他在意大利制造了它。（按书中另一种说法）"}, {"en": "Isaac Newton, who used a mirror.", "zh": "艾萨克·牛顿，他使用了镜子。"}, {"en": "Karl Jansky, who detected radio waves.", "zh": "卡尔·扬斯基，他探测到了无线电波。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says most historians credit the Dutch lens maker Hans Lippershey as the first to combine lenses; in 1608 he built his first crude telescope, 'The Looker,' and was the first to apply for a patent.", "zh": "书中说，多数历史学家把'第一个组合镜片'的功劳归于荷兰镜片工匠汉斯·利伯希；1608年他造出第一台简陋望远镜'观察者'，并率先申请了专利。"}}, {"q": {"en": "Which of Galileo's observations proved that Venus orbits the Sun?", "zh": "伽利略的哪项观测证明了金星绕太阳运行？"}, "options": [{"en": "The color of the Milky Way.", "zh": "银河的颜色。"}, {"en": "Sunspots on the Sun.", "zh": "太阳表面的黑子。"}, {"en": "The phases of Venus.", "zh": "金星的相位（盈亏变化）。"}, {"en": "Craters on the Moon.", "zh": "月球上的环形山。"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "Galileo's list of observations includes 'Phases of Venus—proving that it orbits the Sun.'", "zh": "伽利略的观测清单中包含'金星的相位——证明它绕太阳运行'。"}}, {"q": {"en": "What problem do land-based telescopes have that space telescopes are built to solve?", "zh": "地面望远镜存在什么问题，而太空望远镜正是为解决这个问题而建造？"}, "options": [{"en": "The telescopes are too small to see anything. according to some versions of the story", "zh": "望远镜太小什么都看不见。（按书中另一种说法）"}, {"en": "There are too many stars to count.", "zh": "星星太多数不清。"}, {"en": "Earth's atmosphere distorts and blurs the light passing through it.", "zh": "地球大气会使穿过它的光线发生畸变和模糊。"}, {"en": "The Sun is too bright during the day.", "zh": "白天太阳太亮。"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "The 'Space Telescopes' section explains that light passing through Earth's atmosphere becomes distorted, blurring images; putting telescopes above the atmosphere solves this.", "zh": "'太空望远镜'一节解释说，穿过地球大气的光线会发生畸变、使图像模糊；把望远镜置于大气之上即可解决这一问题。"}}, {"q": {"en": "Who accidentally discovered radio waves coming from space in 1933?", "zh": "谁在1933年偶然发现了来自太空的无线电波？"}, "options": [{"en": "Hans Lippershey.", "zh": "汉斯·利伯希。"}, {"en": "Karl Jansky, an American engineer.", "zh": "美国工程师卡尔·扬斯基。"}, {"en": "Isaac Newton.", "zh": "艾萨克·牛顿。"}, {"en": "Galileo Galilei. according to some versions of the story", "zh": "伽利略·伽利雷。（按书中另一种说法）"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The 'People in Science' section says radio astronomy began in 1933 when American engineer Karl Jansky accidentally discovered radio waves from space.", "zh": "'科学人物'一节写道，射电天文学始于1933年，当时美国工程师卡尔·扬斯基偶然发现了来自太空的无线电波。"}}, {"q": {"en": "In the 'Word Wise' box, the word 'telescope' is explained as coming from Greek. What do 'tele' and 'skopos' mean?", "zh": "在'Word Wise（词汇智多星）'板块中，'telescope'一词被解释为源自希腊语。'tele'和'skopos'分别是什么意思？"}, "options": [{"en": "'tele' means 'far off or distant' and 'skopos' means 'to watch or look at.'", "zh": "'tele'意为'遥远'，'skopos'意为'观看、注视'。"}, {"en": "'tele' means 'small' and 'skopos' means 'to build.' according to some versions of the story", "zh": "'tele'意为'小'，'skopos'意为'建造'。（按书中另一种说法）"}, {"en": "'tele' means 'light' and 'skopos' means 'to hear.'", "zh": "'tele'意为'光'，'skopos'意为'听'。"}, {"en": "'tele' means 'star' and 'skopos' means 'to fly.'", "zh": "'tele'意为'星星'，'skopos'意为'飞行'。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The book's 'Word Wise' feature states the word telescope comes from the Greek 'tele' (far off or distant) and 'skopos' (to watch or look at).", "zh": "书中'Word Wise'板块说明，telescope 源自希腊语 tele（遥远）和 skopos（观看、注视）。"}}, {"q": {"en": "The book uses headings like 'Early Light-Gathering Telescopes,' 'Modern Telescopes,' and 'Space Telescopes.' How is the book organized?", "zh": "本书使用了'早期聚光望远镜''现代望远镜''太空望远镜'等标题。这本书是如何组织的？"}, "options": [{"en": "In the order that telescopes were developed over time.", "zh": "按望远镜随时间发展的先后顺序组织。"}, {"en": "In alphabetical order by scientist. according to some versions of the story", "zh": "按科学家的姓氏字母顺序组织。（按书中另一种说法）"}, {"en": "By the colors of the telescopes.", "zh": "按望远镜的颜色组织。"}, {"en": "As a fictional adventure story.", "zh": "作为一个虚构的冒险故事。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The Table of Contents moves from early telescopes to modern and space telescopes, showing a historical, chronological organization.", "zh": "目录从早期望远镜一直讲到现代与太空望远镜，呈现按历史时间顺序的组织方式。"}}, {"q": {"en": "Galileo observed Neptune but 'failed to realize that it was a planet,' while the Hubble provided 'first firm evidence of black holes.' What does this contrast show?", "zh": "伽利略观测到了海王星，但'没有意识到它是一颗行星'；而哈勃望远镜提供了'黑洞的首个确凿证据'。这种对比说明了什么？"}, "options": [{"en": "Neptune is not a real planet.", "zh": "海王星不是真正的行星。"}, {"en": "Black holes were already known in Galileo's time.", "zh": "黑洞在伽利略时代就已被知晓。"}, {"en": "Galileo was a better astronomer than modern scientists. according to some versions of the story", "zh": "伽利略比现代科学家更优秀。（按书中另一种说法）"}, {"en": "Telescope technology improved our understanding of space over time.", "zh": "望远镜技术随时间推移提升了我们对太空的认知。"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Combining the two facts shows that as telescopes advanced from Galileo's small optics to Hubble's space-based instruments, scientists could confirm things earlier observers could not.", "zh": "将这两点结合可知，随着望远镜从伽利略的小型光学镜发展到哈勃的太空仪器，科学家得以确认早期观测者无法确认的事物。"}}, {"q": {"en": "The 'Math Minute' box asks how many minutes light from the Sun takes to reach Earth (149,000,000 km at 300,000 km/sec). What answer does the book give?", "zh": "书中'Math Minute'板块问：阳光从太阳到达地球需要多少分钟（距离1.49亿公里，光速每秒30万公里）？书中给出的答案是什么？"}, "options": [{"en": "About 30 minutes. according to some versions of the story", "zh": "约30分钟。（按书中另一种说法）"}, {"en": "About 8.3 minutes.", "zh": "约8.3分钟。"}, {"en": "About 1 hour.", "zh": "约1小时。"}, {"en": "About 1 minute.", "zh": "约1分钟。"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The 'Math Minute' sidebar works out the problem and shows the answer '8.3 minutes' for sunlight traveling from the Sun to Earth.", "zh": "'Math Minute'边栏演算了这道题，并给出答案'8.3分钟'，即阳光从太阳抵达地球所需的时间。"}}, {"q": {"en": "What is the author's main purpose in writing Telescopes: Eyes on Space?", "zh": "作者写《望远镜：太空之眼》的主要目的是什么？"}, "options": [{"en": "To persuade readers to buy a telescope.", "zh": "劝说读者购买望远镜。"}, {"en": "To list the names of all the planets.", "zh": "罗列所有行星的名字。"}, {"en": "To tell a fictional story about aliens. according to some versions of the story in an early draft of the book", "zh": "讲述一个关于外星人的虚构故事。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "To explain the history of telescopes, how they work, and how they help us study space.", "zh": "解释望远镜的历史、工作原理，以及它们如何帮助我们研究太空。"}], "answer": 3, "skill": "Author's Purpose and Perspective", "explain": {"en": "The Introduction states the book will cover 'the history of telescopes, how they work, and how scientists and others use them to study distant objects in space.'", "zh": "引言说明，本书将介绍'望远镜的历史、工作原理，以及科学家等人如何用它研究太空中的遥远物体'。"}}, {"q": {"en": "The final paragraph says these 'powerful eyes on space will help us to see it for ourselves.' What tone does this suggest the author wants to leave with readers?", "zh": "最后一段说，这些'太空的有力之眼将帮助我们亲眼看见这一切'。这暗示作者想给读者留下怎样的感受？"}, "options": [{"en": "Certainty that nothing more will be discovered. according to some versions of the story", "zh": "确信不会再有任何新发现。（按书中另一种说法）"}, {"en": "Excitement and hope about future space discoveries.", "zh": "对未来的太空发现感到兴奋与期待。"}, {"en": "Boredom with science.", "zh": "对科学感到无聊。"}, {"en": "Fear that telescopes are dangerous.", "zh": "害怕望远镜很危险。"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The upbeat closing line expresses wonder and optimism, aiming to leave readers excited about what new telescopes will reveal.", "zh": "这段积极向上的结尾表达了惊奇与乐观，意在让读者对未来新望远镜将揭示的事物感到兴奋。"}}], "extended": {"prompt": {"en": "If you could design the next great telescope, where would you put it (on a mountain, in space, or on the Moon) and what would you most want it to help us see?", "zh": "假如你能设计下一代伟大望远镜，你会把它放在哪里（山上、太空，还是月球）？你最希望它帮我们看见什么？"}, "guidance": {"en": ["Choose a location and explain why it helps viewing.", "Name one mystery of space you would target."], "zh": ["选择一个位置，并解释它为何有助于观测。", "说出你想攻克的其中一个太空谜题。"]}}};</script>
