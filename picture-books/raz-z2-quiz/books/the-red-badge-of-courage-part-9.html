y or bravery, especially in battle.", "zh": "prowess 意为“高超的能力或勇气”，尤指战场上的。"}}, {"q": {"en": "In the morning, how has Wilson changed from before?", "zh": "到了早晨，威尔逊相比从前有了什么变化？"}, "options": [{"en": "He is now afraid of every single tiny noise", "zh": "他如今怕极了每一个细微的响动"}, {"en": "He has become the new colonel", "zh": "他当上了新上校"}, {"en": "He is calm and quiet, not loud", "zh": "他沉着安静，不再大嗓门"}, {"en": "He refuses to speak at all", "zh": "他一句话都不肯说"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "Henry notes Wilson no longer shows off; he is calm, confident, no longer loud.", "zh": "亨利注意到威尔逊不再炫耀，而是沉着、自信，不再大嗓门了。"}}, {"q": {"en": "Why does the author show Wilson's change from loud to calm?", "zh": "作者为什么要展现威尔逊从吵闹到沉着的变化？"}, "options": [{"en": "To give a clear lesson in cooking meat on a stick", "zh": "为了清清楚楚地教人如何用树枝烤肉"}, {"en": "To show people can grow wiser with hard times", "zh": "为了表现人能在艰难中变得更明智"}, {"en": "To list the names of all the officers", "zh": "为了列出所有军官的名字"}, {"en": "To teach a lesson about riding horses", "zh": "为了上一堂骑马课"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The change reveals growth: hardship can make a person calmer and sure of himself.", "zh": "这一变化揭示了成长：艰难的处境能让人更沉着、更笃定。"}}, {"q": {"en": "What news does Wilson share about Jim Conklin?", "zh": "威尔逊告诉了亨利关于吉姆·康克林的什么消息？"}, "options": [{"en": "Jim was just made the regiment's new captain", "zh": "吉姆刚被任命为本团新队长"}, {"en": "Jim went home on a train", "zh": "吉姆坐火车回家了"}, {"en": "Jim lost his favorite canteen", "zh": "吉姆弄丢了他最爱的壶"}, {"en": "Jim Conklin is dead", "zh": "吉姆·康克林死了"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "Wilson says Jim Conklin is dead, shot in the side; Henry already knew.", "zh": "威尔逊说吉姆·康克林死了，是侧面中弹；亨利其实早已知情。"}}], "extended": {"prompt": {"en": "Wilson welcomes Henry kindly and has grown calmer. Think of someone you know who acted differently after a hard experience. What changed in them?", "zh": "威尔逊友善地接纳了亨利，而且变得沉稳了。想想你认识
