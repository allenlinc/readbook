}, {"en": "That the death was a happy one", "zh": "那是幸福的死"}, {"en": "That the lonely man's fate could become his own if he does not change", "zh": "那个孤独者的命运若不改变，也可能成为他自己的"}, {"en": "That the stole items were gold", "zh": "被偷的东西是金子"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "Scrooge says the unhappy man's case might be his own, and that his life tends that way now.", "zh": "Scrooge 说那个不幸者的遭遇可能就是他自己的，而且他如今的人生正走向那条路。"}}, {"q": {"en": "The charwoman, laundress, and undertaker's man laugh as they divide the dead man's things. What does their plunder show?", "zh": "清洁工、洗衣妇和殡葬员一边分死者的东西一边笑。他们的瓜分说明了什么？"}, "options": [{"en": "That strangers strip a miser's home because he died alone and unloved", "zh": "陌生人洗劫守财奴的家，因为他孤独离世、无人爱戴"}, {"en": "That the items were gifts", "zh": "那些东西是礼物"}, {"en": "That they were his loving family according to some versions of the story in an early draft of the book", "zh": "他们是爱他的家人（按书中另一种说法）（在书的早期草稿中）"}, {"en": "That the house was on fire", "zh": "房子着火了"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The three strangers loot the dead miser's home, showing that a life without love leaves only greed around.", "zh": "三个陌生人洗劫了死去的守财奴的家，说明没有爱的人生周围只余下贪婪。"}}, {"q": {"en": "The author has the dead man's sheet 'announced itself in awful language' though it was 'dumb.' Why this personification?", "zh": "作者说死者的床单虽'无声'，却'用可怕的语言宣告了自己'。为何用这种拟人？"}, "options": [{"en": "To teach a spelling word", "zh": "教一个拼写词"}, {"en": "To show the bed was warm", "zh": "说明床是暖的"}, {"en": "To make the silent death speak powerfully of loneliness and warning", "zh": "让无声的死亡有力地诉说孤独与警示"}, {"en": "To describe a talking blanket according to some versions of the story", "zh": "描写一条会说话的毯子（按书中另一种说法）"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "Giving the silent sheet a voice makes the lonely death cry out as a warning Scrooge cannot ignore.", "zh": "让无声的床单发出声音，使这场孤独的死亡化作 Scrooge 无法忽视的警示。"}}, {"q": {"en": "Scrooge says he feared this Phantom 'more than any spectre' yet follows it 'with a thankful heart.' What does this mixed feeling show?", "zh": "Scrooge 说他'比害怕任何鬼魂都更怕'这个幽灵，却仍'怀着感恩的心'跟随它。这种矛盾的心情说明了什么？"}, "options": [{"en": "That he plans to grab a heavy sword from the wall and fight the frightening Spirit with all his strength", "zh": "他打算从墙上抓起一把重剑，用全力与那可怕的幽灵搏斗"}, {"en": "That he is afraid but trusts the Spirit means to help him improve", "zh": "他虽害怕，却相信幽灵意在帮他改过"}, {"en": "That he wants to go home", "zh": "他想回家"}, {"en": "That he is hungry", "zh": "他饿了"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "Scrooge is terrified yet hopeful, because he believes the Spirit's hard lesson will help him become a better man.", "zh": "Scrooge 虽恐惧却仍抱有希望，因为他相信幽灵严厉的一课能帮助他成为更好的人。"}}, {"q": {"en": "Who are the three people who meet at old Joe's shop to sell the dead man's things?", "zh": "在老 Joe 的店里碰面、变卖死者物品的是哪三个人？"}, "options": [{"en": "Three school teachers", "zh": "三位教师"}, {"en": "Three sea captains", "zh": "三位船长"}, {"en": "Three rich kings riding in from a far country and bringing many heavy golden gifts", "zh": "三位富有的国王从远国骑马而来，带来许多沉重的黄金礼物"}, {"en": "The charwoman, the laundress, and the undertaker's man", "zh": "清洁工、洗衣妇和殡葬员"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The charwoman, the laundress (Mrs Dilber), and the undertaker's man meet at Joe's to sell the dead man's goods.", "zh": "清洁工、洗衣妇（Dilber 太太）和殡葬员在 Joe 店里碰面，变卖死者的物品。"}}, {"q": {"en": "The Spirit shows Scrooge a rich part of town (merchants) and a poor, foul part (old Joe's). What contrast is drawn?", "zh": "幽灵让 Scrooge 看城镇里富裕的一角（商人们）和贫穷污秽的一角（老 Joe 处）。这形成了怎样的对比？"}, "options": [{"en": "That the story takes place at sea", "zh": "故事发生在海上"}, {"en": "That only the poor and struggling people matter at all in the whole long story", "zh": "在整篇漫长的故事里，只有穷苦和挣扎的人才重要"}, {"en": "That the merchants are ghosts", "zh": "商人们是鬼"}, {"en": "That death comes to all, and a life without love l
