ld no longer support them.", "zh": "书中提出一种流行理论：拉帕努伊人砍伐森林、耗尽资源，直到小岛再也无法供养他们。"}}, {"q": {"en": "What did Thomas Malthus warn about in his 1798 essay on population?", "zh": "托马斯·马尔萨斯在1798年的人口论文中警告了什么？"}, "options": [{"en": "New technology and machines would soon make traditional farming completely unnecessary around the world", "zh": "新技术与机器很快会让世界各地的传统农业彻底变得不必要"}, {"en": "Families should have as many children as possible to help work on farms", "zh": "家庭应尽可能多生孩子，以便在农场帮忙干活"}, {"en": "Human population would grow geometrically while food production grew only arithmetically", "zh": "人口会按几何级数增长，而粮食产量只会按算术级数增长"}, {"en": "Countries should build more ships so they could explore new continents", "zh": "各国应建造更多船只，以便探索新的大陆"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "Malthus argued population grows geometrically (by multiplying) while food grows arithmetically (by adding), so food would eventually fall short.", "zh": "马尔萨斯认为人口按几何级数（成倍）增长，而粮食按算术级数（递增）增长，因此粮食终将不足。"}}, {"q": {"en": "What was a key result of the Green Revolution that began in the 1940s?", "zh": "始于20世纪40年代的绿色革命带来的一项关键成果是什么？"}, "options": [{"en": "It ended the use of all chemical fertilizers on farms everywhere", "zh": "它结束了各地农场对所有化学肥料的使用"}, {"en": "It brought a threefold increase in food production through new seeds, pesticides, and irrigation", "zh": "它通过新种子、杀虫剂和灌溉技术使粮食产量增至三倍"}, {"en": "It proved that world population growth could never be slowed down", "zh": "它证明世界人口增长永远无法放缓"}, {"en": "It convinced every country in the world to stop importing food and live only on local crops according to some versions of the story", "zh": "它说服世界上每个国家停止进口粮食，只依靠本地作物生活（按书中另一种说法）"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The Green Revolution introduced high-yield seeds, pesticides, and irrigation, tripling food production in places like Mexico and India.", "zh": "绿色革命引入了高产种子、杀虫剂和灌溉技术，使墨西哥、印度等地的粮食产量增至三倍。"}}, {"q": {"en": "What is meant by the replacement rate mentioned in the book?", ntries develop", "zh": "大约十个星球，因为作者认为随着更多国家发展，这个数字还会持续上升"}, {"en": "Exactly one planet, which is all that humans have ever needed", "zh": "恰好一个星球，这是人类一直所需的全部"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book estimates we would need three or four more Earth-like planets if everyone consumed resources like the average American.", "zh": "书中估计，如果每个人都像普通美国人那样消耗资源，我们将还需要三到四个地球。"}}, {"q": {"en": "Which of these does the book describe as a nonrenewable resource?", "zh": "以下哪一项被书中描述为不可再生资源？"}, "options": [{"en": "Fresh water, which is renewed by the hydrologic cycle of evaporation and rain", "zh": "淡水，由蒸发和降雨组成的水文循环不断更新"}, {"en": "Trees, which can be replanted and regrown over time", "zh": "树木，可以重新种植并随时间再生"}, {"en": "Sunlight and wind, which the book says could supply Earth's energy needs if we learn to harness them", "zh": "阳光与风，书中说如果我们学会利用它们，就能满足地球的能源需求"}, {"en": "Coal, copper, and oil, which take millions of years to form", "zh": "煤、铜和石油，它们需要数百万年才能形成"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Coal, copper, and oil form over millions of years and cannot be replaced once used, so they are nonrenewable.", "zh": "煤、铜和石油需要数百万年才能形成，一旦使用便无法补充，因此是不可再生资源。"}}, {"q": {"en": "Why does the author begin the book with the story of Easter Island?", "zh": "作者为什么以复活节岛的故事开篇？"}, "options": [{"en": "To explain how the Dutch first discovered the Pacific Ocean", "zh": "为了解释荷兰人是如何首次发现太平洋的"}, {"en": "To use it as a warning that overusing resources can destroy a society", "zh": "把它作为一种警示：过度消耗资源会摧毁一个社会"}, {"en": "To show that the Rapanui were the first people to invent written language", "zh": "为了表明拉帕努伊人是最早发明文字的民族"}, {"en": "To prove that ancient peoples could build giant stone statues without any modern machines or tools", "zh": "为了证明古人可以在没有任何现代机器或工具的情况下建造巨大的石像"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The author uses Easter Island as a cautionary example showing that overuse of
