<script>window.BOOK = {"slug": "the-red-badge-of-courage-part-7", "title": "The Red Badge of Courage (Part 7)", "titleZh": "勇气红勋章（第7部分）", "level": "Z2", "genre": "Classic Novel", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "In Chapter 10, how does Henry react to the tattered man's questions about his wound?", "zh": "在第10章，面对衣衫褴褛士兵关于他伤口的追问，亨利如何反应？"}, "options": [{"en": "He kindly answers every single one of the questions", "zh": "他和气地回答了每一个问题"}, {"en": "He laughs and shares his own food", "zh": "他大笑着分自己食物"}, {"en": "He gets angry and walks away from the man", "zh": "他发了火，转身走开了"}, {"en": "He falls asleep leaning on a tree", "zh": "他靠在树上睡着了"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "Henry cries 'Oh, don't bother me!' and climbs a fence to get away from the man.", "zh": "亨利喊了句“噢，别烦我！”，然后翻过栅栏离开了那人。"}}, {"q": {"en": "After leaving the tattered man, what does Henry wish about himself?", "zh": "离开衣衫褴褛的士兵后，亨利对自己许了什么愿望？"}, "options": [{"en": "He wishes that he himself was dead", "zh": "他希望自己已经死了"}, {"en": "He hopes to become the new regiment captain", "zh": "他希望当上团里的新队长"}, {"en": "He plans to write a long letter home", "zh": "他打算写一封长信回家"}, {"en": "He wants to join the enemy's side", "zh": "他想投奔敌方"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The text says he now thought that he wished he was dead, envying the fallen men.", "zh": "原文说，他这时希望自己已经死了，甚至羡慕那些倒下的人。"}}, {"q": {"en": "The word 'craven' is used for Henry's low opinion of himself. What does it mean?", "zh": "书中用“craven”形容亨利对自己的贬低看法。它是什么意思？"}, "options": [{"en": "Very brave and full of great heroism", "zh": "非常勇敢、充满英雄气概"}, {"en": "Able to run faster than a horse", "zh": "比马跑得还快"}, {"en": "Fond of telling funny jokes", "zh": "喜欢讲滑稽的笑话"}, {"en": "Completely lacking courage; cowardly", "zh": "完全没有勇气；懦弱"}], "answer": 3, "skill": "Craft and Structure", "explain": {"en": "Craven is defined as completely lacking courage; cowardly.", "zh": "craven 的解释是“完全没有勇气；懦弱”。"}}, {"q": {"en": "In Chapter 11, what does Henry see that makes him feel a little comforted?", "zh": "在第11章，亨利看到了什么，让他稍微感到安慰？"}, "options": [{"en": "A line of fresh, happy singers", "zh": "一队精神饱满、快乐唱歌的人"}, {"en": "Retreating wagons, teams, and men", "zh": "正在撤退的马车、马队和人群"}, {"en": "A picnic set near the road", "zh": "路边摆好的野餐"}, {"en": "A herd of quiet grazing cattle", "zh": "一群安静吃草的牛"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Seeing all the men retreating, Henry feels comforted that perhaps he is not so bad.", "zh": "看到所有人都在撤退，亨利感到安慰，觉得自己或许没那么糟。"}}, {"q": {"en": "What does Henry envy about the forward-going column of infantry?", "zh": "对于那支向前开进的步兵纵队，亨利羡慕的是什么？"}, "options": [{"en": "They are lost and looking for home", "zh": "他们迷路了，正在找家"}, {"en": "They carry food to the rear", "zh": "他们把食物送往后方的"}, {"en": "They go bravely to the front while others run away", "zh": "别人逃离时，他们勇敢地奔向前线"}, {"en": "They are only marching in a parade", "zh": "他们只是在参加阅兵游行"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "He envies the chosen men going to the heart of the din while the rest retreat.", "zh": "他羡慕那些被选去冲向喧嚣中心的人，而其余人都在后退。"}}, {"q": {"en": "Why does Henry finally decide NOT to return to the battle?", "zh": "亨利最后为什么决定不返回战场？"}, "options": [{"en": "He has a very high fever and can't stand", "zh": "他发高烧站不起来"}, {"en": "He fears his comrades will mock him for leaving", "zh": "他怕战友会因为他离开而嘲笑他"}, {"en": "He is ordered by a general to stay put", "zh": "将军命令他原地待命"}, {"en": "He lost both of his boots in the mud", "zh": "他的两只靴子都陷进泥里了"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "He imagines his comrades will sneer and ask why he ran, so his courage fails him.", "zh": "他想象战友会冷笑、追问他为什么逃跑，于是他的勇气泄了气。"}}, {"q": {"en": "When Henry imagines a glorious charge, the book says he was 'sublime'. What does sublime mean?", "zh": "当亨利想象一场辉煌的冲锋时，书里说他“sublime”。sublime 是什么意思？"}, "options": [{"en": "Very low and hugging the wet ground", "zh": "很低、贴着潮湿的地面"}, {"en": "Loud and full of angry noise", "zh": "很大声、充满怒气"}, {"en": "Lofty or elevated in thought", "zh": "思想高尚、超然"}, {"en": "Small and rather unimportant", "zh": "渺小且不重要"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "Sublime is defined as elevated or lofty in thinking or expression.", "zh": "sublime 的解释是“思想或表达上高尚、超然”。"}}, {"q": {"en": "What does Henry think a defeat of the army might do for him?", "zh": "亨利认为军队战败，可能会给他带来什么好处？"}, "options": [{"en": "Make him the chief commander of the whole army", "zh": "让他当上全军的统帅"}, {"en": "Win him a shiny medal of honor", "zh": "为他赢得闪亮的荣誉勋章"}, {"en": "Send him home on the very next train", "zh": "让他坐下一班火车回家"}, {"en": "Let him hide among other men who fled", "zh": "让他混进其他逃跑的人里"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "He thinks a defeat would scatter regiments, so he could blend in with others who fled.", "zh": "他想，战败会打散各团，这样他就能混进其他逃兵里不被发现。"}}, {"q": {"en": "Why does Henry keep contradicting and arguing with himself?", "zh": "亨利为什么不断地自相矛盾、跟自己争辩？"}, "options": [{"en": "To carefully plan exactly what he will eat for his supper", "zh": "仔细计划晚饭要吃什么"}, {"en": "To show himself that fleeing was not his blame", "zh": "向自己证明逃跑并不是他的错"}, {"en": "To count how many trees are nearby", "zh": "数附近有多少棵树"}, {"en": "To decide which song he likes best", "zh": "决定自己最喜欢哪首歌"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "He struggles to build a tale that would turn the expected scorn away from himself.", "zh": "他拼命想编出一套说辞，好把旁人预期的嘲讽从自己身上挪开。"}}, {"q": {"en": "What does Henry imagine his comrades will say about him?", "zh": "亨利想象战友们会怎么说他？"}, "options": [{"en": "'Where's Henry? He run, didn't he?'", "zh": "“亨利在哪儿？他跑了，不是吗？”"}, {"en": "'Hurrah, our brave side has won the whole day!'", "zh": "“好哇，我们勇敢的一方赢了一整天！”"}, {"en": "'Pass the bread, we are hungry now'", "zh": "“把面包递过来，我们饿了”"}, {"en": "'Who took my favorite old canteen?'", "zh": "“谁拿了我最爱的旧水壶？”"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "He pictures them saying 'Where's Henry Fleming? He run, didn't 'e?' with derisive grins.", "zh": "他想象他们撇着嘲讽的笑说：“亨利·弗莱明在哪儿？他跑了，不是吗？”"}}], "extended": {"prompt": {"en": "Henry argues with himself to feel better about running away. When you feel unsure, do you ever talk yourself into a different view? What helps you know what is right?", "zh": "亨利跟自己争辩，好让逃跑这件事不那么难受。当你拿不准时，会不会也说服自己换个看法？你靠什么来判断什么是对的？"}, "guidance": {"en": ["Notice that Henry feels both guilty and eager to excuse himself.", "Think of a time you explained away a mistake to feel better.", "Consider outside clues—friends, rules, honest talk—that show what is true."], "zh": ["注意亨利既内疚，又急着替自己开脱。", "想想你曾为让自己好受而解释掉某个错误的时刻。", "考虑一下朋友、规则、坦诚的交流等外在线索如何帮人看清真相。"]}}};</script>
