nt thing about him, showing his callowness.", "zh": "Hal 那条插满子弹的腰带最显眼，也显出他的幼稚无知。"}}, {"q": {"en": "How did Mercedes behave as the men loaded the sled?", "zh": "男人们装橇时，Mercedes 表现得怎样？"}, "options": [{"en": "She worked quietly and packed with care", "zh": "她安静干活，仔细地打包，读者可以在故事里找到"}, {"en": "She drove the sled better than the men", "zh": "她比男人们更会驾橇"}, {"en": "She stayed in the tent and did nothing", "zh": "她待在帐篷里什么也不做"}, {"en": "She fluttered about and gave endless advice", "zh": "她慌慌张张来回转，没完没了地出主意"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "Mercedes fluttered in the way and kept up an unbroken chattering of remonstrance and advice.", "zh": "Mercedes 净在旁边碍事，还不停地唠叨着劝阻和主意。"}}, {"q": {"en": "Why did the first attempt to move the sled fail?", "zh": "第一次试图移动雪橇为什么会失败？"}, "options": [{"en": "The trail was blocked by deep water according to some versions of the story", "zh": "雪道被深积水挡住了（按书中另一种说法）"}, {"en": "The dogs were too wild and bitten", "zh": "狗群太野，又带着伤"}, {"en": "The runners were frozen fast to the snow", "zh": "橇刃被冻死在雪地里"}, {"en": "The men forgot to harness the dogs", "zh": "男人们忘了给狗套挽具"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "The overloaded sled would not move because the runners were frozen fast to the snow.", "zh": "超载的雪橇动不了，是因为橇刃被冻死在雪地里。"}}, {"q": {"en": "What food mistake did the new owners make?", "zh": "这批新主人犯了什么关于食物的错？"}, "options": [{"en": "They gave the dogs far too much rest", "zh": "他们给狗太多的休息"}, {"en": "They fed the men but never the dogs according to some versions of the story", "zh": "他们只喂人，从不喂狗，相关细节在书中有交代（按书中另一种说法）"}, {"en": "They fed the dogs only once a week", "zh": "他们一周只喂狗一次"}, {"en": "They overfed, then ran short and underfed", "zh": "他们先喂太多，随后短缺又喂太少"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "They hastened shortage by overfeeding, then cut the ration and tried to travel farther.", "zh": "他们先喂太多加剧了短缺，随后削减口粮又想跑更远的路。"}}, {"q": {"en": "What happened to the Outside dogs brought from the States?", "zh": "从美国带去的那些“外地狗”结果怎样？"}, "options": [{"en": "They learned fast and led the team", "zh": "它们学得很快，还带了队"}, {"en": "Most died, unable to bear the North", "zh": "大多数死了，熬不住北方"}, {"en": "They were left to rest at Skaguay", "zh": "它们被留在斯卡贵休息"}, {"en": "They were sold back again at a tidy little profit", "zh": "它们又被转卖，小赚了一笔"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The Outside dogs were spirit-broken and untrained; most died on the trail.", "zh": "那些外地狗既丧了胆又没受过训，大多死在了雪道上。"}}, {"q": {"en": "Why was a team of fourteen dogs a poor choice?", "zh": "为什么十四只狗的队伍是个糟糕的选择？"}, "options": [{"en": "The sled could not carry food for so many", "zh": "雪橇载不动供这么多狗吃的粮"}, {"en": "There was no trail wide enough for them", "zh": "没有够宽的雪道容得下它们"}, {"en": "The dogs fought and bit the strange new strangers daily", "zh": "狗群天天打架，还咬那些陌生新人"}, {"en": "The men preferred a team of two", "zh": "男人们只想要两队狗"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "One sled could not carry the food for fourteen dogs, so the outfit was bound to fail.", "zh": "一架雪橇载不动十四只狗的粮，所以这趟行程注定失败。"}}, {"q": {"en": "What does the book say about the owners' know-how?", "zh": "关于主人的本领，书中是怎么说的？"}, "options": [{"en": "A failure to learn the work of dogs", "zh": "始终学不会如何伺候狗的活计"}, {"en": "A clever plan they had worked out neatly with a pencil", "zh": "他们用铅笔工整算出的一个聪明计划"}, {"en": "A wise way to travel light and fast", "zh": "一种轻装快行的高明办法"}, {"en": "A kind method that saved the dogs", "zh": "一种救了狗的仁慈法子"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "They worked the trip out with a pencil, but never learned to work dogs or themselves.", "zh": "他们用铅笔把行程算得头头是道，却始终学不会如何使唤狗和自己。"}}, {"q": {"en": "What finally happened to the dog Dub?", "zh": "狗 Dub 最终遭遇了什么？"}, "options": [{"en": "He ran away into the woods", "zh": "他跑进树林里去了"}, {"en": "He was sold to the mail train again", "zh": "他又被卖给了邮橇队"}, {"en": "Hal shot him with th
