y and freedom", "zh": "他的整个心境已变为喜悦与自由"}], "answer": 3, "skill": "Craft and Structure", "explain": {"en": "The three comparisons show his old gloom is gone and his whole spirit is now light, joyful, and free.", "zh": "这三处比喻说明他往日的阴郁已散，整颗心变得轻盈、喜悦而自由。"}}, {"q": {"en": "Scrooge goes to his nephew Fred's house on Christmas Day after ignoring him for years. What does this action show?", "zh": "Scrooge 多年来一直不理侄子 Fred，如今却在圣诞日上门拜访。这个举动说明了什么？"}, "options": [{"en": "That he forgot where Fred lives according to some versions of the story", "zh": "他忘了 Fred 住哪（按书中另一种说法）"}, {"en": "That he went to borrow money", "zh": "他去借钱的"}, {"en": "That he now accepts love and family he once pushed away", "zh": "他如今接受了曾被自己推开的亲情与家人"}, {"en": "That he dislikes Fred more", "zh": "他更讨厌 Fred 了"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "By going to Fred's party, Scrooge accepts the family warmth and kindness he had long refused.", "zh": "Scrooge 上门参加 Fred 的聚会，表明他接受了曾长期拒绝的亲情温暖与善意。"}}, {"q": {"en": "Why does the author have Scrooge raise Bob Cratchit's salary and help his family?", "zh": "作者为何让 Scrooge 给 Bob Cratchit 加薪并接济他的家人？"}, "options": [{"en": "To show that deep down Scrooge still wants to fire poor Bob and hire a stranger instead", "zh": "为了表明 Scrooge 内心仍想解雇可怜的 Bob，另雇一个陌生人"}, {"en": "To show his change by turning words into kind, real action", "zh": "用化言语为善意实际行动，来展现他的改变"}, {"en": "To teach a math sum", "zh": "教一道算术题"}, {"en": "To describe a snow storm", "zh": "描写暴风雪"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "Scrooge proves his change is real by acting kindly, raising Bob's pay and aiding his family.", "zh": "Scrooge 用善意的行动证明改变是真实的：给 Bob 加薪、接济他的家人。"}}, {"q": {"en": "After the visions, what does Scrooge do for the poor through the gentleman collector?", "zh": "幻象过后，Scrooge 通过那位募捐的绅士为穷人做了什么？"}, "options": [{"en": "He gives a large, generous gift to help the poor", "zh": "他捐出一大笔善款去帮助穷人"}, {"en": "He hides away all of his money inside a secret and hidden cave deep in the woods", "zh": "他把所有的钱都藏进树林深处一个秘密而隐蔽的山洞里"}, {"en": "He buys a new coat", "zh": "他买了件新外套"}, {"en": "He burns the money", "zh": "他把钱烧了"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "He seeks out the portly gentleman who collects for the poor and gives a generous gift, the opposite of his old refusal.", "zh": "他找到那位为穷人募款的体面绅士，捐出一大笔善款，与他昔日拒绝施舍截然相反。"}}, {"q": {"en": "The book says Tiny Tim 'did NOT die' and Scrooge became 'a second father' to him. What does this happy change depend on?", "zh": "书中说 Tiny Tim'没有死'，Scrooge 成了他'第二个父亲'。这份幸福的转变取决于什么？"}, "options": [{"en": "That Tim learned to fly", "zh": "Tim 学会了飞"}, {"en": "That Scrooge changed his life, so the dreadful future was avoided", "zh": "Scrooge 改变了人生，从而避开了那个可怕的将来"}, {"en": "That Tim moved away to live in a far and distant kingdom across the wide sea", "zh": "Tim 搬走，住到广阔大海彼岸一个遥远的王国里"}, {"en": "That the turkey cured him", "zh": "火鸡治好了他"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "Because Scrooge changes his ways, the feared lonely future is avoided and Tim lives and is loved.", "zh": "正因为 Scrooge 改变了做法，那个可怕的孤独未来被避开，Tim 得以活下来并被关爱。"}}, {"q": {"en": "Scrooge becomes 'a second father' to Tiny Tim. How is this different from the future the Spirit showed?", "zh": "Scrooge 成了 Tiny Tim 的'第二个父亲'。这与幽灵所展示的未来有何不同？"}, "options": [{"en": "That instead of a lonely death, Scrooge now loves and supports the boy", "zh": "不再是孤独的死，Scrooge 如今关爱并扶助这个孩子"}, {"en": "That Tim became a king", "zh": "Tim 成了国王"}, {"en": "That poor Tiny Tim was sent away to a very cold and strict boarding school in the snow", "zh": "可怜的 Tiny Tim 被送进雪地里一所非常寒冷严厉的寄宿学校"}, {"en": "That Scrooge forgot Tim", "zh": "Scrooge 忘了 Tim"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Instead of dying unloved, Tim is cared for; Scrooge's new love replaces the lonely death the Spirit showed.", "zh": "Tim 不再无人关爱地死去，而是被悉心照料；Scrooge 新生的爱取代了幽灵所展示的孤独结局。"}}, {"q": {"en": "The author ends with Tiny Tim's words 'God bless Us, Every One!' Why close the whole story on this line?", "zh": "作者以 Tiny Tim 的话'愿上帝保佑我们每一个人！'收尾。为何用这句话结束整个故事？"}, "options": [{"en": "To describe the weather", "zh": "描写天气"}, {"en": "To leave readers with a wish of kindness for all people", "zh": "给读者留下对所有人善意相待的祝愿"}, {"en": "To list the dinner menu", "zh": "列出晚餐菜单"}, {"en": "To teach a spelling list according to some versions of the story", "zh": "教一份拼写表（按书中另一种说法）"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The final line leaves readers with a blessing of goodwill toward every person, the story's heart.", "zh": "这最后一句给读者留下对每一个人的善意祝愿，正是故事的核心。"}}, {"q": {"en": "Some people 'laughed to see the alteration in him, but he let them laugh.' Why does the author include this?", "zh": "有些人'见他变了样便笑，他却由他们笑'。作者为何要写这一笔？"}, "options": [{"en": "To list the months", "zh": "列出月份"}, {"en": "To show that Scrooge is deeply angry and plotting revenge against all the people who laugh at him", "zh": "为了表明 Scrooge 对嘲笑他的人深感愤怒，并正谋划报复"}, {"en": "To describe a river", "zh": "描写一条河"}, {"en": "To show Scrooge cares more about his new goodness than others' mockery", "zh": "说明 Scrooge 在意的是自己新生的善，而非别人的嘲笑"}], "answer": 3, "skill": "Author's Purpose and Perspective", "explain": {"en": "Scrooge no longer cares what mockers think; his own changed heart is enough, showing true reform.", "zh": "Scrooge 不再在乎嘲笑者的想法；他自己改变的心已足够，这显示他真正悔改了。"}}], "extended": {"prompt": {"en": "Scrooge's whole life turns around in a single day: he sends a turkey, visits family, and raises Bob's pay. If you had one day to become kinder, what is the first real thing you would do, and for whom?", "zh": "Scrooge 的人生在一天之内彻底转变：他送去火鸡、拜访家人，还给 Bob 加了薪。若你有一天时间去变得更善良，你会做的第一件真实的事是什么，又是为谁？"}, "guidance": {"en": ["Think about Scrooge's first kind acts after he wakes.", "Choose one real person you could surprise with kindness.", "Picture the small action and how it might feel."], "zh": ["想想 Scrooge 醒来后最初做的善行。
