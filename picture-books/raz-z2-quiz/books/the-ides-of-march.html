<script>window.BOOK = {"slug": "the-ides-of-march", "title": "The Ides of March", "titleZh": "《三月十五日》", "level": "Z2", "genre": "History", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Who warned Julius Caesar months before the Ides of March that a mortal danger would stalk him?", "zh": "在三月十五日之前的几个月，是谁警告尤利乌斯·凯撒将有致命危险一直追踪他？"}, "options": [{"en": "The soothsayer named Spurinna", "zh": "名叫斯普林纳的占卜者"}, {"en": "His wife Calpurnia", "zh": "他的妻子卡尔普尼亚"}, {"en": "The senator Tillius Cimber", "zh": "元老提利乌斯·钦贝尔"}, {"en": "His friend and supporter Mark Antony", "zh": "他的朋友与支持者马克·安东尼"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book states that the soothsayer Spurinna warned Caesar of a mortal danger that would stalk him until the Ides of March.", "zh": "书中写道，占卜者斯普林纳曾警告凯撒，致命危险会一直追踪他直到三月十五日。"}}, {"q": {"en": "Why does the author describe Caesar crossing the Rubicon River as a contentious move?", "zh": "作者为何把凯撒渡过卢比孔河描述为一项有争议的行动？"}, "options": [{"en": "It was a well-known tradition that every Roman general was expected to follow", "zh": "这是每位罗马将军都应遵循的众所周知的传统"}, {"en": "Roman law expressly forbade a general from leading his armies into Roman territory", "zh": "罗马法律明确禁止将军率领军队进入罗马本土"}, {"en": "The river was the recognized border of the Roman Empire at that time", "zh": "那条河在当时是被公认的罗马帝国边界"}, {"en": "Caesar hoped to enjoy a quiet visit to the peaceful city of Gaul with his friends", "zh": "凯撒希望和朋友一起到平静的高卢城安静地游玩"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "Roman law expressly forbade a general from leading his armies into Roman territory, so crossing the Rubicon was considered a declaration of war on Rome.", "zh": "罗马法律明确禁止将军率军进入罗马本土，因此渡过卢比孔河被视为向罗马宣战。"}}, {"q": {"en": "What did Calpurnia dream that made her beg Caesar not to go to the Senate?", "zh": "卡尔普尼亚做了什么梦，使她恳求凯撒不要去元老院？"}, "options": [{"en": "That the people of Rome gathered and crowned him king with great acclamation", "zh": "罗马人民聚集，在热烈欢呼声中为他加冕为王"}, {"en": "That the Roman Republic suddenly fell into total ruin", "zh": "罗马共和国突然彻底覆灭"}, {"en": "That the front of their house crashed down and she held his stabbed, dying body", "zh": "他们家的大门楣坍塌，她怀里抱着被刺、奄奄一息的他"}, {"en": "That his friend Mark Antony betrayed the Senate to his enemies", "zh": "他的朋友马克·安东尼向敌人出卖了元老院"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Calpurnia dreamt that the pediment of the house crashed down and she held Caesar's stabbed, dying body, so she begged him to stay home.", "zh": "卡尔普尼亚梦见门楣坍塌，她抱着被刺、濒死的凯撒，因此恳求他留在家中。"}}, {"q": {"en": "According to the book, what was Caesar's secret and dearest ambition?", "zh": "根据本书，凯撒最隐秘、最渴望的野心是什么？"}, "options": [{"en": "To become a great military commander like his friend Decimus", "zh": "成为像朋友德西穆斯那样伟大的军事统帅"}, {"en": "To lead the Gallic legions to even more glorious victories across the land", "zh": "率领高卢军团在各地取得更加辉煌的胜利"}, {"en": "To free Rome entirely from the corruption of the Senate", "zh": "把罗马从元老院的腐败中彻底解放出来"}, {"en": "To become king of the Romans, though he declined the crown", "zh": "成为罗马人的王，尽管他推辞了王冠"}], "answer": 3, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book says the kingship was Caesar's dearest and most secret ambition, yet he declined the crown offered by Mark Antony because the time was not ripe.", "zh": "书中说王位是凯撒最隐秘、最渴望的野心，但他推辞了马克·安东尼献上的王冠，因为时机尚未成熟。"}}, {"q": {"en": "Who finally persuaded Caesar to leave home and go to the Senate on the Ides of March?", "zh": "在三月十五日那天，最终是谁说服凯撒离开家去元老院的？"}, "options": [{"en": "His friend Decimus, who told him the Senate awaited him", "zh": "他的朋友德西穆斯，告诉他元老院在等他"}, {"en": "His wife Calpurnia, who feared for his life", "zh": "他的妻子卡尔普尼亚，担心他的安危"}, {"en": "The soothsayer Spurinna with a fresh warning", "zh": "占卜者斯普林纳带来了新的警告"}, {"en": "Mark Antony, who arrived with a crown to offer him the kingship", "zh": "马克·安东尼带着王冠来献给他王位"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Decimus went to Caesar's home and chided him, saying the Senate awaited him and had called the session especially for him, persuading Caesar to attend.", "zh": "德西穆斯来到凯撒家中责备他，说元老院在等他、特意为他召开会议，从而说服凯撒前往。"}}, {"q": {"en": "What does the word acclamation mean as used in the book?", "zh": "本书中使用的单词 acclamation 是什么意思？"}, "options": [{"en": "A private and secret meeting held by senators behind closed doors", "zh": "元老们关起门来私下召开的秘密会议"}, {"en": "A loud demonstration of praise, approval, or welcome", "zh": "表示赞美、认可或欢迎的热烈欢呼"}, {"en": "A sense that something bad will happen soon", "zh": "某种坏事即将发生的预感"}, {"en": "A low platform used for seating persons of honor", "zh": "供尊贵者就座的低矮讲台"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The glossary defines acclamation as a loud demonstration of praise, approval, or welcome, as when the Roman people roared for Caesar.", "zh": "术语表将 acclamation 定义为表示赞美、认可或欢迎的热烈欢呼，正如罗马民众为凯撒发出的吼声。"}}, {"q": {"en": "How did Caesar respond when a lone voice shouted 'Hail, Caesar, king of the Romans'?", "zh": "当有人高呼‘凯撒万岁，罗马人的王’时，凯撒如何回应？"}, "options": [{"en": "He accepted the title gladly and placed a crown upon his head", "zh": "他欣然接受称号，并把王冠戴在头上"}, {"en": "He fled from the crowd in great fear for his life", "zh": "他因害怕丧命而逃离人群"}, {"en": "He said he was not their king and that only Jupiter held that honor", "zh": "他说自己不是他们的王，只有朱庇特才配享此尊荣"}, {"en": "He laughed aloud and proudly named himself the first emperor of Rome", "zh": "他放声大笑，骄傲地自封为罗马第一位皇帝"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Caesar stopped and said clearly that he was not their king, and that only Jupiter claimed that honor among the Romans.", "zh": "凯撒立刻停下，清楚地表示自己不是他们的王，在罗马人中唯有朱庇特才配享此尊荣。"}}, {"q": {"en": "What happened after the conspirators assassinated Caesar, according to the book?", "zh": "根据本书，阴谋者刺杀凯撒之后发生了什么？"}, "options": [{"en": "The Roman Republic was peacefully and happily restored to its former glory by the grateful Senate", "zh": "感恩的元老院和平而欣喜地把罗马共和国恢复到了昔日的辉煌"}, {"en": "Mark Antony was immediately crowned the first emperor of Rome", "zh": "马克·安东尼立刻被加冕为罗马第一位皇帝"}, {"en": "The Gallic legions quickly rose in revolt against the conspirators", "zh": "高卢军团迅速起义反抗阴谋者"}, {"en": "Another civil war followed and Octavian became the first emperor, ending the Republic", "zh": "随后爆发另一场内乱，屋大维成为第一位皇帝，共和国就此终结"}], "answer": 3, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book explains that the Gallic legions revolted, a civil war followed, the conspirators were defeated, and Octavian became Rome's first emperor.", "zh": "书中说明高卢军团起义，随后爆发内战，阴谋者战败，屋大维成为罗马第一位皇帝。"}}, {"q": {"en": "How many wounds did Caesar suffer when he died on the Senate floor?", "zh": "凯撒倒在元老院地面上死去时，身受多少处伤口？"}, "options": [{"en": "More than twenty wounds", "zh": "二十多处伤口"}, {"en": "Exactly three wounds", "zh": "正好三处伤口"}, {"en": "A single fatal wound", "zh": "唯一一处致命伤"}, {"en": "About ten wounds from his friends", "zh": "来自朋友的大约十处伤口"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says Caesar died on the Senate floor, bleeding from more than twenty wounds.", "zh": "书中写道，凯撒死在元老院地面上，身负二十多处伤口流血不止。"}}, {"q": {"en": "What literary technique does the author use by having the soothsayer's warning echo in Caesar's mind?", "zh": "作者让占卜者的警告在凯撒脑海中回响，使用了什么文学手法？"}, "options": [{"en": "A glossary definition placed at the very end of the book", "zh": "放在全书末尾的术语表定义"}, {"en": "Foreshadowing, hinting at danger before it actually occurs", "zh": "铺垫手法，在危险真正发生之前有所暗示"}, {"en": "A detailed map showing all the regions of the Roman Republic", "zh": "展示罗马共和国所有地区的详细地图"}, {"en": "A factual timeline listing the Roman emperors", "zh": "列举罗马皇帝的事实年表"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The repeated echo of the soothsayer's warning is foreshadowing, building suspense by hinting that danger still awaited Caesar.", "zh": "占卜者警告一次次在脑海回响是铺垫手法，通过暗示危险仍在等待来增强悬念。"}}], "extended": {"prompt": {"en": "Imagine you are a Roman citizen on the day after the Ides of March. Write a short journal entry describing what you heard happened in the Senate and how you feel about it.", "zh": "想象你是三月十五日之后那天的罗马公民。写一篇简短的日记，描述你听说的元老院内发生的事，以及你的感受。"}, "guidance": {"en": ["Recall that Caesar was surrounded by about twenty senators and stabbed more than twenty times.", "Remember his friends Brutus and Decimus were among the attackers, which made it a betrayal.", "Note that Mark Antony arrived too late and the event later led to another civil war."], "zh": ["回想凯撒被约二十名元老围住，身中二十多处刀伤。", "记住他的朋友布鲁图斯和德西穆斯也在刺杀者之中，这属于背叛。", "注意马克·安东尼赶到时已经太晚，此事后来引发了另一场内乱。"]}}};</script>
