 and money spent against the trade and travel saved.", "Consider how the canal changed global commerce and U.S. power.", "Think about what alternatives, if any, existed at the time.", "Support your opinion with facts from the book."], "zh": ["权衡失去的生命与花费的资金，对比节省的贸易与航程。", "想想运河如何改变了全球商业与美国国力。", "思考当时是否存在其他可行的替代方案。", "用书中的事实来支持你的观点。"]}}};</script>
