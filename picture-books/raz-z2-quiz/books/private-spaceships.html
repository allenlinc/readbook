<script>window.BOOK = {"slug": "private-spaceships", "title": "Private Spaceships", "titleZh": "私人宇宙飞船", "level": "Z2", "genre": "Technology", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "What happened on July 21, 2011, with the space shuttle Atlantis?", "zh": "2011年7月21日，航天飞机亚特兰蒂斯号发生了什么？"}, "options": [{"en": "It began the very first shuttle flight all the way back in 1981", "zh": "它开启了早在1981年的首次航天飞机飞行"}, {"en": "It completed the 135th and final NASA space shuttle mission, ending the shuttle era", "zh": "它完成了NASA第135次也是最后一次航天飞机任务，结束了航天飞机时代"}, {"en": "It exploded during launch and was completely lost", "zh": "它在发射时爆炸并彻底损毁"}, {"en": "It became the very first space shuttle ever to land successfully on the surface of the Moon according to some versions of the story", "zh": "它成为史上首架成功降落于月球表面的航天飞机（按书中另一种说法）"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Atlantis landed on July 21, 2011, completing the 135th and final NASA shuttle mission, after which the shuttle fleet was retired to museums.", "zh": "亚特兰蒂斯号于2011年7月21日着陆，完成NASA第135次也是最后一次航天飞机任务，此后机队退役进博物馆。"}}, {"q": {"en": "Why did NASA turn common space missions over to commercial companies?", "zh": "NASA为何把常规的太空任务转交给商业公司？"}, "options": [{"en": "Because NASA had been strictly banned by international law from flying any more missions, and all its rockets were grounded", "zh": "因为NASA被国际法严厉禁止再进行任何飞行任务，且它所有的火箭都被停飞"}, {"en": "Because the Soviet Union formally demanded that it do so", "zh": "因为苏联正式要求它这样做"}, {"en": "Because private companies flatly refused to offer NASA any help", "zh": "因为私营公司断然拒绝向NASA提供任何帮助"}, {"en": "Because shuttles were costly to run, so NASA refocused on science while companies handled routine flights", "zh": "因为航天飞机运营成本高昂，于是NASA专注科学探索，而由公司承担例行飞行"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "Shuttles were old, expensive, and hard to maintain, so NASA returned to science and exploration while handing routine flights to commercial firms.", "zh": "航天飞机老旧、昂贵且难维护，因此NASA回归科学探索，把例行飞行交给商业公司。"}}, {"q": {"en": "What was the Ansari X-Prize?", "zh": "安萨里X大奖（Ansari X-Prize）是什么？"}, "options": [{"en": "A $10 million prize for the first private craft to reach space with a person and repeat the flight within two weeks", "zh": "一笔1000万美元奖金，奖给首架载一人进入太空并在两周内重复飞行的私人飞行器"}, {"en": "A contest to build the biggest possible government-owned rocket", "zh": "一场建造最大政府火箭的比赛"}, {"en": "A huge prize offered to the very first astronaut who could walk safely on the surface of Mars, collect rock samples, plant a flag, and return home alive", "zh": "一笔巨额奖金，奖给首位安全行走于火星表面、采集岩石样本、插上旗帜并活着返回的宇航员"}, {"en": "A reward for the best television advertisement for space tourism", "zh": "对最佳太空旅游电视广告的奖励"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The Ansari X-Prize was a $10 million award for the first private craft to fly a person to space (above 62.1 miles) and repeat the trip within two weeks; Scaled Composites won it in 2004 with SpaceShipOne.", "zh": "安萨里X大奖是1000万美元奖金，奖给首架载一人进入太空（超过62.1英里）并在两周内重复飞行的私人飞行器；Scaled Composites于2004年以太空船一号赢得该奖。"}}, {"q": {"en": "How did SpaceShipOne reach space in 2004?", "zh": "2004年，‘太空船一号’是如何进入太空的？"}, "options": [{"en": "It was carried into the air by a normal airplane that took off from a regular runway only, with no rocket at all", "zh": "它只由一架从普通跑道起飞的普通飞机带入空中，全程没有用到火箭"}, {"en": "It was carried to 50,000 feet by White Knight, then released and rocketed past 62.1 miles", "zh": "它由‘白骑士’带到5万英尺高空后释放，再以火箭推进越过62.1英里"}, {"en": "It was shot from a giant cannon mounted on a mountain", "zh": "它被安装在山上的巨型火炮发射出去"}, {"en": "It launched straight from the ground on top of a giant rocket", "zh": "它从地面直接由一枚巨型火箭托举升空"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "SpaceShipOne was carried aloft by its mothership White Knight to 50,000 feet, released, then rocketed past 62.1 miles to the edge of space.", "zh": "‘太空船一号’由母机‘白骑士’带到5万英尺高空后释放，再以火箭推进越过62.1英里抵达太空边缘。"}}, {"q": {"en": "Who was Dennis Tito, and what did he do in 2001?", "zh": "丹尼斯·蒂托是谁？他在2001年做了什么？"}, "options": [{"en": "The first space tourist, who paid $20 million to ride a Soyuz rocket to the ISS for eight days", "zh": "首位太空游客，付2000万美元乘联盟号火箭前往国际空间站待了八天"}, {"en": "The winner of the Ansari X-Prize competition", "zh": "安萨里X大奖的获得者"}, {"en": "The brave pilot who flew the very last space shuttle mission all the way into orbit and then back down to Earth", "zh": "驾驶最后一次航天飞机任务一路进入轨道、再返回地球的勇敢飞行员"}, {"en": "The founder of the company SpaceX", "zh": "SpaceX公司的创始人"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "In 2001, American Dennis Tito paid $20 million to Space Adventures to ride a Russian Soyuz rocket to the ISS, becoming the first space tourist.", "zh": "2001年，美国人丹尼斯·蒂托向太空探险公司支付2000万美元，乘俄罗斯联盟号火箭前往国际空间站，成为首位太空游客。"}}, {"q": {"en": "What is special about Virgin Galactic's SpaceShipTwo?", "zh": "维珍银河的‘太空船二号’有何特别之处？"}, "options": [{"en": "It is the only government-owned spaceplane still flying today", "zh": "它是当今唯一仍在飞行的政府所有航天飞机"}, {"en": "It is a robotic rover that lands and explores the surface of Mars", "zh": "它是一台在火星表面着陆探测的机器人巡视器"}, {"en": "It carries two pilots and up to six passengers to the edge of space, with about six minutes of weightlessness", "zh": "它搭载两名飞行员与最多六名乘客抵达太空边缘，约有六分钟失重体验"}, {"en": "It carries trained astronauts to live and work on the surface of the Moon permanently, building a base that grows larger every single year", "zh": "它运送受过训练的宇航员永久在月球表面生活和工作，建造一个逐年不断扩大的基地"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "SpaceShipTwo carries two pilots and up to six passengers to the edge of space, giving about six minutes of weightlessness before gliding home.", "zh": "‘太空船二号’搭载两名飞行员与最多六名乘客抵达太空边缘，在滑翔返回前有约六分钟失重体验。"}}, {"q": {"en": "In the book, what does 'forerunner' mean when describing SpaceShipOne?", "zh": "在本书中，描述‘太空船一号’时所说的‘先驱’（forerunner）指什么？"}, "options": [{"en": "Something that comes before and is followed by others, like the first of a new fleet", "zh": "先行出现并被后来者追随的事物，如同新机队中的第一架"}, {"en": "An official government space agency in charge of launches", "zh": "负责发射的官方政府航天机构"}, {"en": "A special type of powerful rocket fuel that is used only in deep space and cannot burn on Earth", "zh": "一种仅用于深空、无法在地球上燃烧的强力火箭燃料"}, {"en": "The pilot who happened to fly the very first test mission", "zh": "碰巧驾驶首次试飞的飞行员"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The book calls SpaceShipOne the forerunner of a new fleet of tourist spacecraft, meaning it came first and was followed by later vehicles.", "zh": "本书称‘太空船一号’是新型旅游航天器机队的先驱，意即它先行出现，后继者随之而来。"}}, {"q": {"en": "According to the book, what four kinds of missions are commercial companies planning?", "zh": "根据本书，商业公司正在规划哪四类任务？"}, "options": [{"en": "Only short tourist flights to the edge of space and nothing else", "zh": "只有前往太空边缘的短途旅游飞行，别无其他"}, {"en": "Expensive missions to explore the faraway planets Mars, the Moon, Venus, and Jupiter with many robots sent from Earth", "zh": "用从地球送出的许多机器人探索遥远行星火星、月球、金星和木星的昂贵任务"}, {"en": "Building secret military bases in permanent orbit around Earth", "zh": "在地球永久轨道上建造秘密军事基地"}, {"en": "Tourist flights, supply delivery to orbit, ferrying crews to stations, and building private stations", "zh": "旅游飞行、向轨道运送补给、接送空间站人员，以及建造私人空间站"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book lists four commercial mission types: taking tourists up, delivering supplies to crews in orbit, ferrying crews to stations, and building private space stations.", "zh": "本书列出四类商业任务：送游客上天、向轨道人员运送补给、接送空间站人员，以及建造私人空间站。"}}, {"q": {"en": "What is unusual about Bigelow Aerospace's planned space habitat?", "zh": "比奇洛航空航天公司规划的太空栖息地有何独特之处？"}, "options": [{"en": "It is powered entirely by burning coal carried up from Earth", "zh": "它完全依靠从地球带上去的燃煤来提供动力"}, {"en": "It is a wooden station that astronauts assemble by hand in space", "zh": "它是一个由宇航员在太空中手工组装的木制空间站"}, {"en": "It is an inflatable habitat made of strong Mylar fabric that expands in orbit and could house six people", "zh": "它是一个可充气的栖息地，由坚固的Mylar织物制成，在轨展开，可容纳六人"}, {"en": "It is built entirely from solid blocks of pure gold so that it can block all harmful radiation from the sun and deep space", "zh": "它由纯金实心块完全建造，以便阻挡来自太阳和深空的所有有害辐射"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Bigelow's habitat is an inflatable 'balloon' made of tough Mylar fabric that expands in orbit and is designed to house about six people.", "zh": "比奇洛的栖息地是一个可充气的‘气球’，由坚韧的Mylar织物制成，在轨展开，设计容纳约六人。"}}, {"q": {"en": "What main message does the book convey about the future of space travel?", "zh": "关于太空旅行的未来，本书传达了什么主要信息？"}, "options": [{"en": "Government agencies alone will always run and control every single space mission forever, with no private companies allowed", "zh": "只有政府机构将永远运行并掌控每一项太空任务，且不允许任何私营公司参与"}, {"en": "A new commercial space age has begun, with private companies taking over tasks once done only by governments", "zh": "一个新的商业太空时代已经开始，私营公司正在接手曾经只由政府完成的任务"}, {"en": "Space travel will soon be completely abandoned and forgotten", "zh": "太空旅行将很快被彻底放弃并被遗忘"}, {"en": "Only the very richest nations will ever be able to reach orbit again", "zh": "只有最富有的国家才能再次进入轨道"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book's conclusion says the final shuttle flight ended one era and began a commercial space age in which private companies do many tasks once limited to governments.", "zh": "本书结语指出，航天飞机的最后飞行终结了一个时代，开启了商业太空时代，私营公司开始承担曾经专属政府的许多任务。"}}], "extended": {"prompt": {"en": "The book shows how private companies took over jobs once done only by governments, from tourist flights to space stations. If you could design your own private spacecraft or space business, what would it do, and who would it serve?", "zh": "本书展示了私营公司如何接手曾经只由政府完成的任务，从太空旅游到空间站。如果你能设计自己的私人飞船或太空事业，它会做什么？服务于谁？"}, "guidance": {"en": ["List the four kinds of commercial missions the book describes.", "Think about reusable vehicles such as the Dragon capsule and Falcon 9.", "Consider the inflatable Bigelow habitats for long stays.", "Weigh the costs and who could afford such trips."], "zh": ["列出本书描述的四类商业任务。", "思考可重复使用的飞行器，如天龙号舱与猎鹰9号。", "考虑比奇洛可充气栖息地用于长期停留。", "权衡成本以及谁负担得起这样的旅行。"]}}};</script>
