<script>window.BOOK = {"slug": "ramses-ii", "title": "Ramses II", "titleZh": "拉美西斯二世", "level": "Z2", "genre": "Biography", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "How long did Ramses II rule, and during which dynasty?", "zh": "拉美西斯二世统治了多久？属于哪个王朝？"}, "options": [{"en": "About sixty-six years, from 1279 to 1213 BC, as third king of the Nineteenth Dynasty", "zh": "约六十六年，从公元前1279年至前1213年，为第十九王朝第三位国王"}, {"en": "About ten short years on the throne, from 1320 to 1310 BC, before his early and sudden death", "zh": "仅在位约十年，从公元前1320年至前1310年，便早早突然离世"}, {"en": "About thirty years, ending around 1000 BC", "zh": "约三十年，结束于公元前1000年前后"}, {"en": "Only two years, before he was overthrown by his own army", "zh": "仅两年，便被自己的军队推翻"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Ramses II reigned about sixty-six years, from 1279 to 1213 BC, as the third king of Egypt's Nineteenth Dynasty.", "zh": "拉美西斯二世统治约六十六年，从公元前1279年至前1213年，是埃及第十九王朝的第三位国王。"}}, {"q": {"en": "How did Ramses II's family come to the throne if they were not originally royal?", "zh": "如果拉美西斯二世家族原本并非王族，他们是如何登上王位的？"}, "options": [{"en": "His mother was already a high-born princess of the old royal family, which made his claim to the throne automatic", "zh": "他的母亲本就是旧王族出身的高贵公主，使他的王位继承权顺理成章"}, {"en": "His grandfather Paramessu, a general under Horemheb, became pharaoh and founded the Nineteenth Dynasty", "zh": "他的祖父帕拉梅苏是霍伦海布手下的将军，后来成为法老并建立了第十九王朝"}, {"en": "He won the throne by defeating Tutankhamun in a famous battle", "zh": "他在一场著名战役中击败图坦卡蒙，从而赢得王位"}, {"en": "The Hittites appointed him as their governor over Egypt", "zh": "赫梯人任命他为统治埃及的总督"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Ramses's grandfather Paramessu, a general who served with Horemheb, was named heir, became pharaoh, changed his name to Ramses, and founded the Nineteenth Dynasty.", "zh": "拉美西斯的祖父帕拉梅苏曾与霍伦海布共事为将，被立为继承人，后成为法老，改名拉美西斯，开创了第十九王朝。"}}, {"q": {"en": "What was notable about the Battle of Kadesh?", "zh": "卡叠什战役有什么特别之处？"}, "options": [{"en": "It was a small skirmish with no chariots or horses involved at all", "zh": "它只是一场没有战车也没有马匹的小冲突"}, {"en": "It was a great naval battle fought entirely out at sea between the powerful fleets of Egypt and the Greeks near the coast of Athens", "zh": "它是一场完全在海上进行的大海战，交战双方是埃及与希腊的强大舰队，地点在雅典近海"}, {"en": "It was the largest chariot battle ever recorded, with about 4,500 chariots", "zh": "它是史上有记载规模最大的战车之战，约有4500辆战车"}, {"en": "It was won easily by the Hittites with almost no Egyptian losses", "zh": "它被赫梯人轻松取胜，埃及方面几乎零伤亡"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "The Battle of Kadesh involved about 4,500 chariots, the largest chariot battle ever recorded, though it ended more as a draw than a clear Egyptian victory.", "zh": "卡叠什战役约有4500辆战车，是史上有记载规模最大的战车之战，但其结果更像一个平局而非埃及的明确胜利。"}}, {"q": {"en": "What was the result of Ramses's peace treaty with the Hittites?", "zh": "拉美西斯与赫梯人的和平条约带来了什么结果？"}, "options": [{"en": "It started a war that lasted another hundred years", "zh": "它引发了一场又持续百年的战争"}, {"en": "It forced the Hittites to give Egypt all of their land and treasure without condition", "zh": "它迫使赫梯人无条件把全部土地与财宝交给埃及"}, {"en": "It was broken immediately by both sides within a year", "zh": "它在一年内就被双方立即撕毁"}, {"en": "Egypt gave up Kadesh, and a copy of the treaty now hangs in the United Nations", "zh": "埃及放弃了卡叠什，该条约的一份副本现悬挂于联合国"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "In the treaty, Egypt gave up Kadesh and the surrounding land; a copy now hangs in the United Nations General Assembly building.", "zh": "根据条约，埃及放弃了卡叠什及周边土地；该条约的一份副本现悬挂在联合国大会大楼。"}}, {"q": {"en": "What did Ramses II accomplish in building?", "zh": "拉美西斯二世在建筑方面取得了什么成就？"}, "options": [{"en": "He built more temples and monuments than any other pharaoh, including the Ramesseum and Abu Simbel", "zh": "他修建的神庙与纪念碑超过任何其他法老，包括拉美修姆与阿布辛贝"}, {"en": "He personally built the very first pyramids of ancient Egypt during his remarkably long and famous reign as king", "zh": "他在其漫长而著名的国王生涯中亲自修建了古埃及最早的一批金字塔"}, {"en": "He tore down most old temples just to build new roads", "zh": "他拆毁了大部分旧神庙，只为修建新道路"}, {"en": "He built only one small shrine near the Nile River", "zh": "他只在尼罗河附近建了一座小神龛"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Ramses built more temples and monuments than any other pharaoh, including his mortuary temple the Ramesseum and the Abu Simbel temples.", "zh": "拉美西斯修建的神庙与纪念碑超过任何其他法老，包括其祭庙拉美修姆和阿布辛贝神庙。"}}, {"q": {"en": "What does the book say about Nefertari?", "zh": "关于奈费尔塔利，本书怎么说？"}, "options": [{"en": "She was Ramses's greatest sworn enemy in life and was exiled far away to the distant land of Nubia", "zh": "她是拉美西斯一生中最死硬的敌人，被流放到了遥远的努比亚之地"}, {"en": "She was his first and favorite wife, for whom he built a lavish tomb and the Abu Simbel temple", "zh": "她是他的首位也是最宠爱的妻子，他为她修建了华丽的墓室与阿布辛贝神庙"}, {"en": "She was the Hittite princess he married after the peace treaty", "zh": "她是他在和平条约之后迎娶的赫梯公主"}, {"en": "She ruled Egypt herself after Ramses died at age ninety-one", "zh": "她在拉美西斯九十一岁去世后亲自统治了埃及"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Nefertari was Ramses's first and favorite wife; he built a lavish tomb for her and the beautiful Abu Simbel temple in her honor.", "zh": "奈费尔塔利是拉美西斯的首位也是最宠爱的妻子；他为她修建了华丽的墓室，并修建阿布辛贝神庙以纪念她。"}}, {"q": {"en": "Why does the book call Ramses's Kadesh inscriptions history's first known propaganda campaign?", "zh": "本书为何称拉美西斯的卡叠什铭文是史上已知最早的宣传运动？"}, "options": [{"en": "Because they were composed in a strange secret language that no living person could possibly read or understand", "zh": "因为它们是用一种奇怪的秘语写成的，活人根本无法读懂或理解"}, {"en": "Because they were secretly discovered and destroyed by the angry Hittites soon after", "zh": "因为它们很快被愤怒的赫梯人暗中发现并销毁"}, {"en": "Because he portrayed a near-defeat as a great solo victory using exaggerated, heroic inscriptions", "zh": "因为他用夸张而英雄化的铭文，把一场近乎失败描绘成独自取得的伟大胜利"}, {"en": "Because they were painted by poorly paid foreign artists who worked only for money", "zh": "因为它们是由只为钱而工作的低薪外国画师绘制的"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "Ramses had the battle portrayed as a solo heroic victory through inscriptions and poems, though it was nearly a defeat, which experts call the first known propaganda campaign.", "zh": "拉美西斯通过铭文与诗歌把这场战役描绘成独自取得的英雄胜利，尽管它几乎是一场失败，专家称之为已知最早的宣传运动。"}}, {"q": {"en": "What does the book reveal about Ramses's death and succession?", "zh": "关于拉美西斯的逝世与继位，本书揭示了什么？"}, "options": [{"en": "He died young in battle, leaving behind no children at all", "zh": "他年少战死，没有留下任何子嗣"}, {"en": "His oldest and most beloved son Merneptah ruled the entire kingdom right after him from the very beginning of his long reign as pharaoh", "zh": "他最年长、最宠爱的儿子梅伦普塔从其漫长统治的一开始就统治了整个王国"}, {"en": "He was killed by the Hittites during the peace negotiations", "zh": "他在和平谈判期间被赫梯人杀害"}, {"en": "He died at age ninety-one, outliving his first twelve sons, so his thirteenth son Merneptah succeeded him", "zh": "他九十一岁去世，比前十二个儿子都长寿，因此第十三子梅伦普塔继承了他"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Ramses died at ninety-one of natural causes, having outlived his first twelve sons, so his thirteenth son Merneptah became pharaoh.", "zh": "拉美西斯九十一岁时自然死亡，比前十二个儿子都长寿，因此第十三子梅伦普塔成为法老。"}}, {"q": {"en": "How did scholars learn the real story of the Battle of Kadesh?", "zh": "学者们是如何了解卡叠什战役真实情况的？"}, "options": [{"en": "By comparing both Egyptian and Hittite records, since Ramses's official version hid the near-defeat", "zh": "通过对照埃及与赫梯两方面的记录，因为拉美西斯的官方版本掩盖了近乎失败的事实"}, {"en": "By reading only the official Egyptian temple inscriptions that Ramses himself proudly ordered carved across the land", "zh": "仅靠阅读拉美西斯本人骄傲地命人刻遍各地的埃及官方神庙铭文"}, {"en": "By asking modern tourists who happened to visit the battlefield site", "zh": "通过询问碰巧参观过战场的现代游客"}, {"en": "By trusting the artwork that showed Ramses alone defeating the whole enemy army", "zh": "通过相信那些描绘拉美西斯独自击败整支敌军的画作"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "By piecing together both Egyptian and Hittite records, scholars found the real battle was closer to a draw and Ramses was nearly killed.", "zh": "通过拼合埃及与赫梯两方面的记录，学者发现真实的战役更接近平局，而拉美西斯几乎丧命。"}}, {"q": {"en": "According to the book, why is Ramses II known as Ramses the Great?", "zh": "根据本书，拉美西斯二世为何被称为‘大帝’（the Great）？"}, "options": [{"en": "Because he was by far the richest and most extravagant person who had ever lived in all of human history", "zh": "因为他是人类历史上迄今为止最富有、最奢华的人"}, {"en": "Because he left a legacy of monuments, temples, and records that help us understand ancient Egypt", "zh": "因为他留下了 monuments、神庙与记录等遗产，帮助我们了解古埃及"}, {"en": "Because he conquered the entire world, including the distant land of China", "zh": "因为他征服了包括遥远中国在内的整个世界"}, {"en": "Because he was the very first pharaoh ever to use the royal title at all", "zh": "因为他是史上第一位使用王衔的法老"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book says his true greatness lies in the legacy of art, architecture, and historical records he left, which let us understand his people and culture.", "zh": "书中说，他真正的伟大在于留下的艺术、建筑与历史记录等遗产，使我们得以了解他的人民与文化。"}}], "extended": {"prompt": {"en": "Ramses II used monuments, temples, and even a propaganda campaign to shape how people remembered him. How do leaders today try to shape their legacy, and what lasts longer: buildings or truth?", "zh": "拉美西斯二世利用纪念碑、神庙甚至宣传运动来塑造人们对他的记忆。当今的领袖如何塑造自己的legacy？建筑与真相，哪一样更持久？"}, "guidance": {"en": ["List the monuments Ramses built, such as the Ramesseum and Abu Simbel.", "Explain how his Kadesh inscriptions exaggerated a near-defeat as a victory.", "Compare short-term propaganda with the long-term value of historical records.", "Think about how modern leaders use media to shape memory."], "zh": ["列举拉美西斯修建的纪念物，如拉美修姆与阿布辛贝。", "解释他在卡叠什的铭文如何把近乎失败夸大成胜利。", "比较短期宣传与历史记录的长远价值。", "思考当今领袖如何利用媒体塑造记忆。"]}}};</script>
