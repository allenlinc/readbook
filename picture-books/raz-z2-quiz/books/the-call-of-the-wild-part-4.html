ter climes", "zh": "一种只留给更温和、柔软地带的东西"}, {"en": "Something the man in the red sweater had carefully taught him", "zh": "那是红毛衣男人曾细心教给他的东西，这是原文明确写到的"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "Mercy was a thing reserved for gentler climes; in the primordial North it was misunderstood for fear.", "zh": "怜悯是留给更温和地带的东西；在原始的北方，它被误认成了恐惧。"}}, {"q": {"en": "How does Part 4 end for Buck?", "zh": "第四部分里，Buck 的结局是怎样的？"}, "options": [{"en": "He is sold once again to a set of new and strange owners", "zh": "他又一次被卖给一群陌生的新主人，读者可以在故事里找到"}, {"en": "He stands as the winning, dominant primordial beast", "zh": "他作为胜者、原始的主宰之兽屹立"}, {"en": "He is sent back south on a ship", "zh": "他乘船被送回了南方"}, {"en": "He runs away alone into the far woods", "zh": "他独自跑进远方的树林"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Buck stands and looks on as the successful champion, the dominant primordial beast who had made his kill.", "zh": "Buck 伫立着，以胜者的姿态望向远方——那只已然得手、原始的主宰之兽。"}}], "extended": {"prompt": {"en": "Buck and Spitz both wanted to lead the team, and their struggle ends in Part 4. Write a few sentences comparing what each dog wanted, and tell whose desire you think was stronger and why.", "zh": "Buck 和 Spitz 都想带领队伍，它们的争斗在第四部分落下帷幕。写几句话比较两只狗各自想要什么，并说说你认为谁的愿望更强烈，为什么。"}, "guidance": {"en": ["Name what Spitz wanted as leader.", "Name what Buck wanted.", "Tell whose drive seemed stronger and give a reason."], "zh": ["说出 Spitz 作为领头犬想要什么。", "说出 Buck 想要什么。", "说明谁的欲望似乎更强烈，并给出理由。"]}}};</script>
