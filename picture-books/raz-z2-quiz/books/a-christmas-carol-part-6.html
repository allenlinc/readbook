<script>window.BOOK = {"slug": "a-christmas-carol-part-6", "title": "A Christmas Carol (Part 6)", "titleZh": "《圣诞颂歌》（第6部分）", "level": "Z2", "genre": "Classic Literature", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "What is the Cratchit family's Christmas dinner built around?", "zh": "Cratchit 一家的圣诞晚餐是以什么为主的？"}, "options": [{"en": "A giant roasted elephant with a golden crown", "zh": "一头戴着金冠的烤巨象"}, {"en": "A goose and a plum pudding", "zh": "一只鹅和一份李子布丁"}, {"en": "A bowl of plain rice", "zh": "一碗白米饭"}, {"en": "Three loaves of plain bread", "zh": "三条普通面包"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The family feasts on a goose with apple-sauce and mashed potatoes, then a plum pudding blazing with brandy.", "zh": "这家人吃的是配苹果酱和土豆泥的鹅，然后是淋着白兰地燃着火的李子布丁。"}}, {"q": {"en": "How does Tiny Tim get around, and what does he say about being seen in church?", "zh": "Tiny Tim 是怎么行走的，他又说了些什么关于在教堂被人看见的事？"}, "options": [{"en": "He rides a fast horse everywhere", "zh": "他骑快马到处走"}, {"en": "He uses a wooden boat", "zh": "他用一只木船"}, {"en": "He is carried by a bird", "zh": "他被一只鸟叼着"}, {"en": "He walks with a crutch and an iron frame, and hopes people see him as a cripple to remember who heals", "zh": "他靠拐杖和铁架走路，并希望人们看见他这个跛脚孩子，以记住使跛者行走的那位"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "Tim bears a crutch and an iron frame, and hopes being seen as a cripple in church reminds people who made lame beggars walk.", "zh": "Tim 拄着拐杖、靠铁架支撑，并希望人们在教堂看见他这跛脚孩子，能想起使跛者行走的那位。"}}, {"q": {"en": "The author calls the pudding 'like a speckled cannon-ball, so hard and firm, blazing in ignited brandy with Christmas holly stuck into the top.' What does this vivid image show?", "zh": "作者称布丁'像一颗斑驳的炮弹，又硬又实，浸在燃着的白兰地中，顶上插着圣诞冬青'。这个生动的意象说明了什么？"}, "options": [{"en": "That the pudding is a proud, special centerpiece of the meal", "zh": "这份布丁是这顿饭中骄傲而特别的主角"}, {"en": "That the Cratchit family secretly built a real working cannon in the backyard to fire up at the night sky", "zh": "Cratchit 一家偷偷在后院造了一门真正能发射的大炮，朝夜空开火"}, {"en": "That the pudding is a small pebble", "zh": "布丁是一颗小石子"}, {"en": "That they cooked a leather boot", "zh": "他们煮了一只皮靴"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The striking comparison makes the humble pudding feel grand and precious, the proud heart of the feast.", "zh": "这个鲜明的比喻让朴素的布丁显得宏大珍贵，成为这顿饭引以为傲的核心。"}}, {"q": {"en": "When the Ghost says Tiny Tim will die 'if these shadows remain unaltered by the Future,' what warning is this?", "zh": "当幽灵说 Tiny Tim 会死去——'倘若这些影子不被未来改变'——这发出的是怎样的警告？"}, "options": [{"en": "That Tim will surely die no matter what", "zh": "Tim 无论如何都必死无疑"}, {"en": "That the future cannot change", "zh": "未来无法改变"}, {"en": "That Tim's fate can still change depending on what happens next", "zh": "Tim 的命运仍可能改变，取决于之后发生的事"}, {"en": "That the Ghost wants Tim to die", "zh": "幽灵希望 Tim 死"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The Ghost says 'if these shadows remain unaltered,' so Tim's death is a possible future that can still be changed.", "zh": "幽灵说的是'倘若这些影子不被改变'，所以 Tim 的死只是一种仍可被改变的将来。"}}, {"q": {"en": "The author has Mrs Cratchit call Scrooge 'odious, stingy, hard, unfeeling' when toasting him. Why include this?", "zh": "作者让 Cratchit 太太在敬酒时称 Scrooge'可憎、吝啬、冷硬、无情'。为何要写这段？"}, "options": [{"en": "To prove that the whole Cratchit family deeply loves, respects, and greatly admires Mr Scrooge", "zh": "为了证明整个 Cratchit 一家都深深爱戴、敬重并极其钦佩 Scrooge 先生"}, {"en": "To show how Scrooge's meanness hurts even those who barely know him", "zh": "说明 Scrooge 的吝啬伤害了甚至几乎不认识他的人"}, {"en": "To teach a recipe for goose", "zh": "教一道鹅肉的做法"}, {"en": "To describe the weather", "zh": "描写天气"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "Even Scrooge's underpaid clerk's wife curses him, showing how his cruelty reaches people he hardly knows.", "zh": "连被他少付工资的职员妻子都咒骂他，可见他的冷酷波及了几乎不认识他的人。"}}, {"q": {"en": "What does Bob Cratchit say when he toasts, and how does Tiny Tim end it?", "zh": "Bob Cratchit 敬酒时说了什么，Tiny Tim 又是如何收尾的？"}, "options": [{"en": "Bob says 'A Merry Christmas to us all, God bless us,' and Tim adds 'God bless us every one'", "zh": "Bob 说'祝我们所有人圣诞快乐，愿上帝保佑我们'，Tim 添上'愿上帝保佑我们每一个人'"}, {"en": "Bob says 'Down with Christmas,' and Tim agrees", "zh": "Bob 说'打倒圣诞节'，Tim 附和"}, {"en": "They sing a song about the king", "zh": "他们唱一首关于国王的歌"}, {"en": "They read a long list of laws", "zh": "他们读了一长串法律"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Bob toasts 'A Merry Christmas to us all, God bless us,' and Tiny Tim softly adds 'God bless us every one.'", "zh": "Bob 祝酒道'祝我们所有人圣诞快乐，愿上帝保佑我们'，Tiny Tim 轻声补上'愿上帝保佑我们每一个人'。"}}, {"q": {"en": "The Ghost quotes Scrooge's own words back to him: 'if he be like to die, he had better do it, and decrease the surplus population.' Why?", "zh": "幽灵把 Scrooge 自己的话回敬给他：'若他快要死了，不如就死，好减少多余的人口。'为何如此？"}, "options": [{"en": "To prove that the Ghost itself fully agrees the poor boy Tim should quietly die as soon as possible", "zh": "为了证明幽灵本人完全认同这个穷孩子 Tim 应当尽快悄悄死去"}, {"en": "To praise Scrooge's wisdom", "zh": "称赞 Scrooge 的智慧"}, {"en": "To teach a math sum", "zh": "教一道算术题"}, {"en": "To make Scrooge hear his own cruel words and feel regret", "zh": "让 Scrooge 听到自己残酷的话，从而感到悔恨"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The Spirit throws Scrooge's heartless words back at him so he feels penitence for his cruelty.", "zh": "幽灵把 Scrooge 冷酷的话原样奉还，让他为自己的残忍感到悔恨。"}}, {"q": {"en": "The book notes the Cratchits 'were not a handsome family; they were not well dressed... their clothes were scanty,' yet 'they were happy, grateful, pleased with one another.' What contrast is the author drawing?", "zh": "书中说 Cratchit 一家'不是俊俏的一家人；穿得不好……衣衫单薄'，却'快乐、感恩、彼此满意'。作者在此形成怎样的对比？"}, "options": [{"en": "That wearing rich and fashionable clothes will always and without exception make a family truly happy", "zh": "穿上华丽时髦的衣服，总会且毫无例外地让一个家庭真正幸福"}, {"en": "That they disliked each other", "zh": "他们彼此讨厌"}, {"en": "That love and thankfulness matter more than money or fine things", "zh": "爱与感恩比金钱或好东西更重要"}, {"en": "That the food was terrible", "zh": "食物很难吃"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "The contrast shows the family is poor in goods but rich in love, gratitude, and contentment.", "zh": "这一对比说明这家人物质贫穷，却在爱、感恩与满足上很富有。"}}, {"q": {"en": "Scrooge asks the Spirit to tell him if Tiny Tim will live, with 'an interest he had never felt before.' What does this show about Scrooge?", "zh": "Scrooge 问幽灵 Tiny Tim 能否活下去，带着'前所未有的关切'。这说明了 Scrooge 怎样的转变？"}, "options": [{"en": "That he wants the goose recipe", "zh": "他想要鹅肉的做法"}, {"en": "That his hard heart is beginning to care about another person", "zh": "他冷硬的心开始关心起另一个人"}, {"en": "That he is bored and sleepy", "zh": "他无聊又困"}, {"en": "That he dislikes children", "zh": "他讨厌孩子"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "For the first time Scrooge feels real concern for someone else's life, a sign his cold heart is warming.", "zh": "Scrooge 第一次对别人的生死产生真切的关切，这是他冷硬的心开始回暖的迹象。"}}, {"q": {"en": "The author ends the scenes by saying the Cratchits 'faded, and looked happier yet in the bright sprinklings of the Spirit's torch at parting.' Why mention the torch?", "zh": "作者在这些场景结尾写道，Cratchit 一家'渐渐淡去，在幽灵临别洒下的明亮光芒中显得更快乐了'。为何要提到那支火把？"}, "options": [{"en": "To give a long step-by-step lesson in how the poor family built that glowing torch out of ordinary wood", "zh": "详细一步步讲解这穷苦的一家人是如何用普通木头造出那支发光火把的"}, {"en": "To describe a thunder storm", "zh": "描写雷暴"}, {"en": "To list the dinner plates", "zh": "列出餐盘"}, {"en": "To show the Spirit's blessing and good will rest on the poor family", "zh": "说明幽灵的祝福与善意降临在这个穷苦家庭身上"}], "answer": 3, "skill": "Author's Purpose and Perspective", "explain": {"en": "The torch's bright sprinkling is the Spirit's blessing, showing goodwill resting on even the poorest home.", "zh": "火把洒下的明亮光芒是幽灵的祝福，表明善意降临在即便最穷苦的人家身上。"}}], "extended": {"prompt": {"en": "Tiny Tim is poor, small, and weak, yet he says 'God bless us every one' and thinks of others. What makes someone strong in spirit rather than in body, and how do the Cratchits show love without riches?", "zh": "Tiny Tim 贫穷、瘦小又虚弱，却说'愿上帝保佑我们每一个人'，还想着别人。什么能让人精神坚强而非身体强壮？Cratchit 一家没有钱财，又是如何表达爱的？"}, "guidance": {"en": ["Think about Tim's words and how he treats others despite his weakness.", "Notice how the family shares one small goose and pudding happily.", "Consider what 'rich' can mean besides money."], "zh": ["想想 Tim 的话语，以及他虽弱小却如何对待他人。", "注意这一家如何开心地分享一只小鹅和一份布丁。", "思考'富有'除了金钱还能指什么。"]}}};</script>
