<script>window.BOOK = {"slug": "alexander-the-great", "title": "Alexander the Great", "titleZh": "亚历山大大帝", "level": "Z2", "genre": "History", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Who taught Alexander when he was thirteen?", "zh": "亚历山大十三岁时，谁担任他的老师？"}, "options": [{"en": "The Persian king Darius the Third, who was his enemy.", "zh": "波斯国王大流士三世，他的敌人。"}, {"en": "A soldier named Hephaestion.", "zh": "一位叫赫费斯提翁的士兵。"}, {"en": "His father, King Philip II.", "zh": "他的父亲腓力二世国王。"}, {"en": "The Greek philosopher Aristotle.", "zh": "希腊哲学家亚里士多德。"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "Aristotle, a famous Greek philosopher, became Alexander's teacher when Alexander was thirteen.", "zh": "著名的希腊哲学家亚里士多德在亚历山大十三岁时成为他的老师。"}}, {"q": {"en": "How did Alexander show his skill with horses at age twelve?", "zh": "亚历山大十二岁时如何展现他驯马的本事？"}, "options": [{"en": "He calmed a nervous horse by turning its head from its shadow.", "zh": "他把马的头从影子处转开，让受惊的马平静下来。"}, {"en": "He taught his father's army to ride quickly.", "zh": "他教父亲的军队快速骑马。"}, {"en": "He sold a wild and stubborn horse to a faraway farm for a very good price.", "zh": "他把一匹野性难驯的野马卖到远方的农场，卖了个很好的价钱。"}, {"en": "He rode a horse in a big race and won a prize.", "zh": "他骑马参加大赛并获奖。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "At twelve, Alexander noticed the horse feared its shadow and turned its head away to calm it.", "zh": "十二岁时，亚历山大注意到那匹马害怕自己的影子，于是把它的头转开使其平静。"}}, {"q": {"en": "How did Alexander become king of Macedonia?", "zh": "亚历山大是如何成为马其顿国王的？"}, "options": [{"en": "He married the daughter of a king.", "zh": "他娶了一位国王的女儿。"}, {"en": "His father was assassinated, and he took the throne at age twenty.", "zh": "他的父亲被刺杀，他在二十岁时登上王位。"}, {"en": "He was chosen by the army's oldest soldier. according to some versions of the story", "zh": "他被军队中最年长的士兵选中。（按书中另一种说法）"}, {"en": "He won a vote held by the people.", "zh": "他赢得了人民举行的投票。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "After King Philip II was assassinated in 336 BC, Alexander became king at the age of twenty.", "zh": "公元前336年腓力二世被刺杀后，亚历山大在二十岁时成为国王。"}}, {"q": {"en": "What happened at the city of Thebes when it rebelled?", "zh": "底比斯城反叛时发生了什么？"}, "options": [{"en": "Six thousand were killed and thirty thousand sold into slavery.", "zh": "六千人死亡，三万人被卖为奴隶。"}, {"en": "Alexander built the city a grand new library and a large public school.", "zh": "亚历山大为这座城市建了一座宏伟的新图书馆和一所大型公立学校。"}, {"en": "The people were welcomed as close friends of all of Macedonia.", "zh": "那里的人民被当作全马其顿的亲密朋友受到欢迎。"}, {"en": "It was made the new capital of the empire.", "zh": "它成了帝国的新首都。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "To stop the revolt, Alexander's army killed six thousand people in Thebes and sold thirty thousand into slavery.", "zh": "为镇压叛乱，亚历山大的军队在底比斯杀死了六千人，并把三万人卖为奴隶。"}}, {"q": {"en": "What did Alexander do after landing in Asia Minor in 334 BC?", "zh": "公元前334年登上小亚细亚后，亚历山大做了什么？"}, "options": [{"en": "He planted trees to mark the new border with great care. according to some versions of the story", "zh": "他精心种树以标记新的边界。（按书中另一种说法）"}, {"en": "He threw his spear into the ground to claim the land.", "zh": "他把长矛插进地里，宣告占领这片土地。"}, {"en": "He signed a peace treaty with Darius at once.", "zh": "他立刻与大流士签署了和平条约。"}, {"en": "He sailed back home to Macedonia.", "zh": "他乘船返回了马其顿。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "After crossing the Hellespont into Asia Minor, Alexander threw his spear into the ground to claim the land.", "zh": "渡过赫勒斯滂进入小亚细亚后，亚历山大把长矛插进地里以宣告占领。"}}, {"q": {"en": "What was special about the city of Alexandria that Alexander founded?", "zh": "亚历山大建立的亚历山大城有什么特别之处？"}, "options": [{"en": "It was ruled by the Persian king Darius. according to some versions of the story in an early draft of the book", "zh": "它由波斯国王大流士统治。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "It was the first of twenty cities named after him and built by his own plan.", "zh": "那是二十座以他命名的城市中第一座，也是按他自己的规划建造的。"}, {"en": "It was located high in the cold mountains.", "zh": "它位于寒冷的高山上。"}, {"en": "It was the smallest town he ever built.", "zh": "那是他建过最小的城镇。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Alexandria in Egypt was the first of twenty cities named for Alexander and the only one built to his plan.", "zh": "埃及的亚历山大城是二十座以亚历山大命名的城市中第一座，也是唯一按他的规划建造的。"}}, {"q": {"en": "Which text feature helps the reader see the order of Alexander's life?", "zh": "哪个文本特征帮助读者看清亚历山大一生的先后顺序？"}, "options": [{"en": "A recipe for Macedonian food.", "zh": "一份马其顿食物的食谱。"}, {"en": "A long list of every soldier's name in the army.", "zh": "一份军队中每个士兵名字的长名单。"}, {"en": "A map of the stars in the night sky.", "zh": "一张夜空星图。"}, {"en": "A timeline that lists years and key events.", "zh": "列出年份和关键事件的时间线。"}], "answer": 3, "skill": "Craft and Structure", "explain": {"en": "The book uses a timeline with dates and events so readers can follow the order of Alexander's life.", "zh": "书中用带有日期和事件的时间线，帮助读者理清亚历山大一生的先后顺序。"}}, {"q": {"en": "How do we know about Alexander's life so long after he lived?", "zh": "在亚历山大离世很久之后，我们是如何了解他的一生的？"}, "options": [{"en": "From letters he sent to his horse.", "zh": "从他写给马的信。"}, {"en": "From movies made in modern times.", "zh": "从现代拍摄的电影。"}, {"en": "From writings by Callisthenes and later historians who used his account.", "zh": "来自卡利斯提尼的记录，以及后来参考他记载的历史学家的著作。"}, {"en": "From a book he wrote about himself. according to some versions of the story in an early draft of the book", "zh": "从他写的一本关于自己的书。（按书中另一种说法）（在书的早期草稿中）"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Callisthenes wrote about Alexander, and later historians used his account after it was lost.", "zh": "卡利斯提尼记载了亚历山大的事迹，后来历史学家在他失传的记载基础上写成著作。"}}, {"q": {"en": "What is the author's main purpose in writing this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"en": "To explain how Alexander used learning and training to build an empire.", "zh": "解释亚历山大如何运用学识与训练建立帝国。"}, {"en": "To give a full cookbook of healthy food from ancient Greece written just for kids.", "zh": "为孩子们提供一本专门写给小朋友的、完整的古希腊健康食物食谱。"}, {"en": "To teach readers how to win a horse race.", "zh": "教读者如何赢得赛马。"}, {"en": "To describe how to build a city from stone.", "zh": "描述如何用石头建一座城市。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book's focus question asks how Alexander used his education and training to build his empire.", "zh": "本书的核心问题是亚历山大如何运用学识与训练来建立帝国。"}}, {"q": {"en": "What did Alexander do that spread Greek culture to new lands?", "zh": "亚历山大做了什么，把希腊文化传播到了新的土地？"}, "options": [{"en": "He banned all learning and books.", "zh": "他禁止一切学习和书籍。"}, {"en": "He kept his army far from other people. according to some versions of the story", "zh": "他让军队远离其他人。（按书中另一种说法）"}, {"en": "He founded Greek cities and shared Greek ideas through trade and rule.", "zh": "他建立希腊式城市，并通过贸易与统治传播希腊思想。"}, {"en": "He destroyed every city he found.", "zh": "他摧毁了所到的每一座城市。"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "By founding Greek cities and mixing Persian and Greek ways, Alexander spread Greek culture and trade.", "zh": "通过建立希腊式城市并融合波斯与希腊的风俗，亚历山大传播了希腊文化与贸易。"}}], "extended": {"prompt": {"en": "Pretend you are Alexander at age sixteen, serving as regent. Write a short speech telling the army why you are ready to lead.", "zh": "假设你十六岁担任摄政王的亚历山大。写一段简短的演讲，告诉军队你为什么准备好领导他们。"}, "guidance": {"en": ["Mention that Aristotle taught you history, politics, and ethics.", "Remind them you tamed Bucephalus and stopped a revolt.", "Show that you plan to follow your father's dream of conquering Persia."], "zh": ["提到亚里士多德教过你历史、政治与伦理。", "提醒他们你驯服了布塞弗勒斯并平息了一场叛乱。", "表明你打算继承父亲征服波斯的梦想。"]}}};</script>
