<script>window.BOOK = {"slug": "the-labors-of-hercules", "title": "The Labors of Hercules", "titleZh": "《赫拉克勒斯的十二项功绩》", "level": "Z2", "genre": "Mythology", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Why did the goddess Hera cause so much suffering for Hercules?", "zh": "女神赫拉为什么要让赫拉克勒斯遭受那么多苦难？"}, "options": [{"en": "She was the wife of Zeus and tormented Hercules because he was the son of Zeus and a mortal woman named Alcmene.", "zh": "她是宙斯的妻子，因为赫拉克勒斯是宙斯与凡人女子阿尔克墨涅之子而折磨他。"}, {"en": "She was his mortal mother.", "zh": "她是他的凡人母亲。"}, {"en": "She was the goddess of the Moon.", "zh": "她是月亮女神。"}, {"en": "She was queen of the Amazons.", "zh": "她是亚马逊女王。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The text says Hera, wife of Zeus, orchestrated much of Hercules’s suffering because he was the son of Zeus and the mortal Alcmene.", "zh": "文中说，宙斯之妻赫拉策划了赫拉克勒斯的大部分苦难，因为他是宙斯与凡人阿尔克墨涅的孩子。"}}, {"q": {"en": "How does the author mainly organize this book about Hercules?", "zh": "作者主要是如何组织这本关于赫拉克勒斯的书的？"}, "options": [{"en": "By listing the words to know in strict alphabetical order at the very start.", "zh": "在开头严格按字母顺序列出需要掌握的词汇。"}, {"en": "By grouping the labors around his qualities like strength and ingenuity.", "zh": "围绕他的各种品质（如力量与机智）来组织各项功绩。"}, {"en": "By telling events in the exact order they happened.", "zh": "按事件发生的确切先后顺序来叙述。"}, {"en": "By comparing him with Achilles and Theseus.", "zh": "把他和阿喀琉斯、忒修斯进行比较。"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The chapter headings such as “Strength and Resourcefulness,” “Restraint and Prudence,” “Ingenuity,” and “The Immortal Hero” show the book is built around Hercules’s qualities.", "zh": "章节标题如“力量与机智”“克制与审慎”“机智”“不朽的英雄”表明，本书是围绕赫拉克勒斯的品质来构建的。"}}, {"q": {"en": "What happened in the first labor with the Nemean lion?", "zh": "第一项功绩——尼米亚雄狮——中发生了什么？"}, "options": [{"en": "He shot it with poisoned arrows.", "zh": "他用毒箭射它。"}, {"en": "He trapped it in a net after a year.", "zh": "他追踪一年后用网把它困住。"}, {"en": "He choked the lion with his arms and then used one of its own claws to skin the hide.", "zh": "他用双臂掐死了狮子，然后用自己的爪子划开它的皮毛。"}, {"en": "He asked Artemis for permission first.", "zh": "他事先征求了阿尔忒弥斯的同意。"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "Arrows and a spear bounced off, so Hercules blocked the cave, choked the lion, and then used one of its claws to cut the hide.", "zh": "箭和长矛都弹开了，于是赫拉克勒斯堵住洞口掐死狮子，再用狮子的一只爪子划开兽皮。"}}, {"q": {"en": "What is the author’s main purpose in telling Hercules’s story?", "zh": "作者讲述赫拉克勒斯故事的主要目的是什么？"}, "options": [{"en": "To prove the Greek gods were real historical people who lived long ago.", "zh": "为了证明希腊诸神是真实存在过的远古历史人物。"}, {"en": "To teach readers how to clean large stables with a river canal.", "zh": "为了教读者如何用河渠清理大型牛圈。"}, {"en": "To describe defeating monsters with spears and bows.", "zh": "为了描述如何用长矛和弓箭打败怪物。"}, {"en": "To explore what made Hercules a compelling hero.", "zh": "为了探究是什么让赫拉克勒斯成为一个引人入胜的英雄。"}], "answer": 3, "skill": "Author's Purpose and Perspective", "explain": {"en": "The introduction asks what made his story so compelling and then examines his heroic qualities and his suffering.", "zh": "引言提出了“是什么让他的故事如此引人入胜”的问题，随后探讨了他的英雄品质与所受的苦难。"}}, {"q": {"en": "How did the number of labors change from ten to twelve?", "zh": "功绩的数目是如何从十项变成十二项的？"}, "options": [{"en": "Hercules himself requested two more labors to impress the frightened king Eurystheus with his strength.", "zh": "赫拉克勒斯自己要求增加两项，好让害怕他的欧律斯透斯王见识他的力量。"}, {"en": "Hera insisted Eurystheus add two after Hercules was paid for two.", "zh": "赫拉坚持让欧律斯透斯增加两项，因为赫拉克勒斯为其中两项拿了报酬。"}, {"en": "Apollo sentenced twelve labors from the start.", "zh": "阿波罗一开始就判了他十二项功绩。"}, {"en": "The Amazons demanded extra tasks for peace.", "zh": "亚马逊人为了和平要求额外的任务。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Apollo first sentenced ten labors; Hera insisted Eurystheus raise it to twelve after learning Hercules had been paid for two of them.", "zh": "阿波罗最初判了十项；赫拉得知赫拉克勒斯因其中两项拿了报酬后，坚持让欧律斯透斯增至十二项。"}}, {"q": {"en": "Which technique does the author use in boxes such as “Amazing Amazons”?", "zh": "作者在“神奇的亚马逊人”这类边栏中使用了什么手法？"}, "options": [{"en": "A fictional diary written by Hercules about his childhood as a baby.", "zh": "以赫拉克勒斯口吻写的、关于他婴儿时期的虚构日记。"}, {"en": "A poem that retells the death of the Nemean lion in great detail.", "zh": "一首详尽复述尼米亚雄狮之死的诗歌。"}, {"en": "Extra factual notes that expand on the main myth.", "zh": "补充史实性注释，扩展正文神话内容。"}, {"en": "A glossary placed at the end of every chapter.", "zh": "放在每一章末尾的词汇表。"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "Boxes such as “Amazing Amazons” and “Do You Know?” give extra background facts that sit apart from the narrative.", "zh": "“神奇的亚马逊人”和“你知道吗？”等边栏提供了独立于叙事之外的补充背景知识。"}}, {"q": {"en": "In the eleventh labor, how did Hercules get the golden apple from Atlas?", "zh": "在第十一项功绩中，赫拉克勒斯是如何从阿特拉斯那里得到金苹果的？"}, "options": [{"en": "He fought Atlas and stole the apple by force.", "zh": "他与阿特拉斯搏斗，强行抢走苹果。"}, {"en": "He asked Artemis to lend him the apple as a boon.", "zh": "他请求阿尔忒弥斯把苹果作为恩惠借给他。"}, {"en": "He traded the belt of Hippolyte for the golden apple.", "zh": "他用希波吕忒的腰带换来了金苹果。"}, {"en": "He offered to hold the world for Atlas, then tricked him into taking it back and fled with the apple.", "zh": "他主动替阿特拉斯扛住世界，随后骗阿特拉斯把重担接回去，自己带着苹果逃走了。"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Hercules bore the world while Atlas fetched the apple, then laid a trap so Atlas took the weight back before Hercules escaped with it.", "zh": "阿特拉斯去取苹果时，赫拉克勒斯替他扛住世界；随后他设下圈套，趁阿特拉斯重新扛起重担时带着苹果溜走了。"}}, {"q": {"en": "What does the author say was the most important factor in Hercules’s success?", "zh": "作者认为赫拉克勒斯成功最重要的因素是什么？"}, "options": [{"en": "His ingenuity, the ability to think through impossible problems.", "zh": "他的机智，也就是想出办法解决不可能问题的那种能力。"}, {"en": "His ownership of thousands of cattle in the wealthy kingdom of Greece.", "zh": "他在富庶的希腊王国拥有成千上万头牛。"}, {"en": "His marriage to Deianira after the twelve labors ended.", "zh": "十二项功绩结束后他与得伊阿涅拉结婚。"}, {"en": "His great fear of King Eurystheus and the royal messenger.", "zh": "他对欧律斯透斯王和皇家信使的深深恐惧。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The chapter “Hercules’s Ingenuity” states that ingenuity was the most decisive factor in completing the labors.", "zh": "“赫拉克勒斯的机智”一章指出，机智是完成各项功绩最具决定性的因素。"}}, {"q": {"en": "How did Hercules complete the labor of cleaning King Augeas’s stables?", "zh": "赫拉克勒斯是如何完成清理奥革阿斯王牛圈这一功绩的？"}, "options": [{"en": "He used the razor-sharp claw of the Nemean lion to dig one very deep hole in the hard, dry ground near the cave.", "zh": "他用尼米亚雄狮锋利的爪子在洞穴附近坚硬干涸的地上挖了一个很深的坑。"}, {"en": "He smashed holes in the stable walls and diverted a river through them to wash the filth away.", "zh": "他砸穿牛圈墙壁，引河水从圈中穿过，把多年的污物冲走。"}, {"en": "He asked the Amazons to clean the stables for him.", "zh": "他请亚马逊人替他打扫牛圈。"}, {"en": "He burned the filth with a great wooden pyre.", "zh": "他用巨大的柴堆把污物烧掉。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Hercules smashed two holes in the stable walls and dug a canal from a nearby river so the water carried the filth away.", "zh": "赫拉克勒斯在牛圈墙上砸出两个洞，从附近河流挖渠引水，让水流把污物冲走。"}}, {"q": {"en": "What happened to Hercules at the end of his life?", "zh": "赫拉克勒斯生命最后发生了什么？"}, "options": [{"en": "He stayed a mortal king of Mycenae ruling forever without dying.", "zh": "他一直作为迈锡尼的凡人国王统治，永不死去。"}, {"en": "He was slain by the centaur Nessos with a poisoned arrow.", "zh": "他被半人马涅索斯用毒箭射杀。"}, {"en": "He died on a pyre, then was raised to Mount Olympus as a demigod.", "zh": "他在火葬柴堆上死去，随后被众神带上奥林匹斯山，成为半神。"}, {"en": "He returned the hind and lived quietly with Artemis.", "zh": "他归还了母鹿，与阿尔忒弥斯安静地生活。"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Poisoned by Nessos’s cloak, Hercules built a pyre; Zeus and Hera relented, and the gods raised him to Olympus as a demigod.", "zh": "被涅索斯的毒袍所害后，赫拉克勒斯让人堆起柴堆；宙斯与赫拉终于息怒，众神将他带上奥林匹斯山成为半神。"}}], "extended": {"prompt": {"en": "Which labor of Hercules do you think best shows his ingenuity, and how would you describe it in your own words?", "zh": "你认为赫拉克勒斯的哪一项功绩最能体现他的机智？用你自己的话描述一下。"}, "guidance": {"en": ["Think about a labor where he solved a problem instead of only using force.", "The stables of Augeas and the trick on Atlas are two strong examples.", "Explain the clever method he used and why it worked."], "zh": ["想一想哪一项功绩是他用智慧而非蛮力解决的。", "奥革阿斯的牛圈和智胜阿特拉斯都是很好的例子。", "解释他用的是什么巧妙方法，以及为什么能成功。"]}}};</script>
