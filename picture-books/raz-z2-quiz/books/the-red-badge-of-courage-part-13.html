<script>window.BOOK = {"slug": "the-red-badge-of-courage-part-13", "title": "The Red Badge of Courage (Part 13)", "titleZh": "勇气红勋章（第13部分）", "level": "Z2", "genre": "Classic Novel", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "As Henry's tired band nears its own lines, how do the resting soldiers treat them?", "zh": "亨利那支疲惫的队伍靠近自己阵地时，休息的士兵怎么对待他们？"}, "options": [{"en": "They cheer loudly and wave a happy hello", "zh": "他们大声欢呼、快乐地挥手致意"}, {"en": "They give them hot food", "zh": "他们给热的饭食"}, {"en": "They mock them with rude questions", "zh": "他们用粗鲁的问题嘲弄他们"}, {"en": "They fall fast asleep", "zh": "他们倒头就睡"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "A gaunt regiment asks taunts like 'Where th' hell yeh been?' and 'Goin' home now?'", "zh": "一支憔悴的团用“你这混球刚才在哪儿？”之类的话嘲笑他们。"}}, {"q": {"en": "What does the galloping officer scold the colonel about?", "zh": "那个疾驰而来的军官，为了什么事斥责团长？"}, "options": [{"en": "That they lost the regimental flag", "zh": "说他们把团旗弄丢了"}, {"en": "That the charge fell short of its goal", "zh": "说那次冲锋没够到目标就停了"}, {"en": "That they ate too much bread", "zh": "说他们吃了太多面包"}, {"en": "That they slept through the noise according to some versions of the story", "zh": "说他们吵闹中都睡过去了（按书中另一种说法）"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "He cries 'what an awful bull you made'—the charge stopped short of success.", "zh": "他喊“你搞出了多糟的一团乱子”——冲锋在差一点儿成功处停了。"}}, {"q": {"en": "The resting soldiers are called 'gaunt'. What does gaunt mean?", "zh": "休息的士兵被形容为“gaunt”。gaunt 是什么意思？"}, "options": [{"en": "Extremely thin and worn down", "zh": "极度消瘦、疲惫不堪"}, {"en": "Sweet like a summer breeze according to some versions of the story", "zh": "像夏日微风般甜美（按书中另一种说法）"}, {"en": "Soft and rather sleepy", "zh": "柔和、有些困"}, {"en": "Bright and full of laughter", "zh": "明亮、充满欢笑"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Gaunt means extremely thin and worn down.", "zh": "gaunt 意为“极度消瘦、疲惫不堪”。"}}, {"q": {"en": "What r fixing rifles", "zh": "修步枪用的工具"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "Jimhickey is slang for a person who is excellent.", "zh": "jimhickey 是俚语，指“一个出色的人”。"}}, {"q": {"en": "In Chapter 22, how does Henry feel as the enemy comes again?", "zh": "第22章，敌人又涌来时，亨利是什么感觉？"}, "options": [{"en": "Sleepy and ready to yawn", "zh": "困倦、直想打哈欠"}, {"en": "Calm and confident inside", "zh": "内心平静且充满自信"}, {"en": "Hungry for some food", "zh": "饿着想吃东西"}, {"en": "Terribly scared and wanting to hide", "zh": "怕得要命、想躲起来"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says he felt serene self-confidence and smiled at the shells.", "zh": "书里说，他感到宁静的自信，对着炮弹甚至还微微一笑。"}}, {"q": {"en": "Why does the author contrast the rude taunts with later praise?", "zh": "作者为什么把粗鲁的嘲弄和后来的夸奖放在一起对照？"}, "options": [{"en": "To show words and bravery don't always match", "zh": "为了表现“言语”和“真正的勇敢”未必一致"}, {"en": "To give a step-by-step lesson in how to cook a simple camp meal", "zh": "为了一步步教人如何在营地煮顿简餐"}, {"en": "To list all the officers' names", "zh": "为了列出所有军官的名字"}, {"en": "To teach about riding horses", "zh": "为了教人骑马"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The gap shows how men talk about war differs from how they act in the midst of it.", "zh": "这种落差表明：人们“谈论战争”的方式，和“身在其中”的表现未必一致。"}}, {"q": {"en": "What does Henry resolve in Chapter 22 as the fight rages?", "zh": "第22章战斗正酣时，亨利下了什么决心？"}, "options": [{"en": "He resolves not to budge", "zh": "他决心一步也不退"}, {"en": "He will quickly run away to the rear", "zh": "他要赶快朝后方逃跑"}, {"en": "He will cook a meal", "zh": "他要做顿饭"}, {"en": "He will go to sleep", "zh": "他要睡过去"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The youth 'had resolved not to budge whatever should happen' at his post.", "zh": "年轻人“打定主意，无论发生什么都不挪窝”，守在自己的岗位上。"}}], "extended": {"prompt": {"en": "At first the men are mocked, then Henry is praised as a fine flag-bearer. When have you been judged wrongly at first and later seen differently? What matters more—others' words or your own actions?", "zh": "起先士兵们被嘲弄，后来亨利却被夸成出色的掌旗手。你有没有过“起初被看错、后来才被另眼相看”的时刻？更重要的，是旁人的话，还是你自己的行动？"}, "guidance": {"en": ["Recall the rude taunts when they returned to the lines.", "Notice the later praise for carrying the flag to the front.", "Think about a time words about you were wrong, but your deeds showed the truth."], "zh": ["回想他们回到阵地时那些粗鲁的嘲弄。", "注意后来因“把旗扛在最前头”而得到的夸奖。", "想想你某次被说错、却用行动证明真相的时刻。"]}}};</script>
