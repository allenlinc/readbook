<script>window.BOOK = {"slug": "the-red-badge-of-courage-part-1", "title": "The Red Badge of Courage (Part 1)", "titleZh": "英勇之红徽章（第1部分）", "level": "Z2", "genre": "Classic Literature", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Why does Henry decide to enlist in the army even though his mother objects?", "zh": "尽管母亲反对，亨利为什么还是决定参军？"}, "options": [{"en": "He is swept up by newspaper reports of victories, village gossip, and his own dreams of glory, and one night he tells his mother he is going to enlist.", "zh": "他被报纸上胜利的报道、村里的闲言碎语以及自己对荣耀的幻想所打动，终于有一天晚上告诉母亲他要去参军。"}, {"en": "His mother forces him to leave the farm and join the army.", "zh": "他的母亲强迫他离开农场去参军。"}, {"en": "The government orders him to enlist against his will.", "zh": "政府违背他的意愿命令他入伍。"}, {"en": "His school friends dare him to sign up as a joke.", "zh": "他的同学开玩笑激将他去报名。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Henry is inspired by newspaper accounts of victories and his own imagined glory, and he finally tells his mother he is going to enlist.", "zh": "亨利被报纸上关于胜利的记载和自己想象的荣耀所激励，终于告诉母亲他要去参军。"}}, {"q": {"en": "In Part 1, the word ‘ardor’ is used to describe Henry's feeling about war. What does ‘ardor’ mean here?", "zh": "在第1部分中，‘ardor’一词用来形容亨利对战争的态度。这里‘ardor’是什么意思？"}, "options": [{"en": "A calm and peaceful acceptance of quiet farm life at home.", "zh": "对家乡宁静农场生活平静而坦然的接受。"}, {"en": "A strong fear that he might flee during a battle.", "zh": "他可能在战斗中逃跑的强烈恐惧。"}, {"en": "A growing boredom and dislike of the army's endless and repetitive daily routine.", "zh": "对军队那没完没了、日复一日的日常生活的厌烦与厌恶。"}, {"en": "A deep longing or passion for the excitement and glory of war and patriotism.", "zh": "对战争的刺激与荣耀、对爱国情怀深切的渴望或热情。"}], "answer": 3, "skill": "Craft and Structure", "explain": {"en": "His mother doubts the quality of his war ardor, meaning his passionate longing to fight.", "zh": "母亲质疑他参军热情（ardor）的成色，这里的 ardour 指他渴望上战的炽热情感。"}}, {"q": {"en": "What does Henry's mother do when he tells her he has enlisted?", "zh": "当亨利告诉母亲他已经入伍时，她做了什么？"}, "options": [{"en": "She throws a large celebration party at the farm and invites the whole village to cheer him as a returning hero.", "zh": "她在农场办了一场盛大的庆祝会，邀请全村人来像欢迎凯旋英雄一样为他欢呼。"}, {"en": "She warns him to take care, knits him eight pairs of socks, and packs blackberry jam.", "zh": "她嘱咐他照顾好自己，给他织了八双袜子，还包了一杯黑莓酱。"}, {"en": "She reports him to the army officers for being too young to serve.", "zh": "她向军官报告说他年纪太小，不能服役。"}, {"en": "She tells him he must return with a medal or not come back at all.", "zh": "她告诉他要么带着勋章回来，要么就别回来。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "She gives practical, loving advice, knits eight pairs of socks, and packs a cup of blackberry jam in his bundle.", "zh": "她给了他实在而充满关爱的叮嘱，织了八双袜子，还在他的行囊里放了一杯黑莓酱。"}}, {"q": {"en": "What is true about the author Stephen Crane, according to Part 1?", "zh": "根据第1部分，关于作者斯蒂芬·克莱恩，哪一项是正确的？"}, "options": [{"en": "He was a famous Civil War general who personally led troops into battle and later wrote the book from his own vivid and detailed battlefield experience.", "zh": "他是一位著名的内战将军，亲自带兵作战，后来根据自己的战场经历写成此书。"}, {"en": "He lived to an old age and wrote many books about peaceful farm life in the countryside.", "zh": "他长寿到老年，写了许多关于乡村宁静农场生活的书。"}, {"en": "He wrote the novel in 1895 without ever having been in battle, and later worked as a war correspondent.", "zh": "他于1895年写成这部小说，此前从未上过战场，后来担任了战地记者。"}, {"en": "He was a soldier in Henry's regiment and based the story on his friends there.", "zh": "他是亨利所在团的一名士兵，故事基于他在那里的朋友写成。"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "The biographical note says Crane wrote the book in 1895 without battle experience and later reported on wars in Greece and Cuba.", "zh": "作者简介说明克莱恩于1895年写就此书，当时并无实战经验，后来曾到希腊和古巴做战地报道。"}}, {"q": {"en": "Part 1 describes the river as ‘purled at the army's feet.’ What does this imagery suggest?", "zh": "第1部分把河流描写为‘在军队脚下潺潺流淌’。这个意象暗示了什么？"}, "options": [{"en": "The river rushed downhill in a sudden and dangerous flood that threatened to wash the camp away.", "zh": "河水骤然暴涨，形成危险的洪水，眼看要把营地冲走。"}, {"en": "The river swirled and twisted gently as it flowed by the resting army.", "zh": "河水在休整的军队旁轻轻打着旋、蜿蜒流淌。"}, {"en": "The river was frozen solid and the soldiers walked across its hard surface.", "zh": "河流冻得结结实实，士兵们从坚硬的河面上走过。"}, {"en": "The river had completely dried up during the long and quiet campaign.", "zh": "在漫长而安静的战役里，河流已经完全干涸。"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The verb ‘purled’ means swirled or twisted, painting a calm, gentle flowing stream by the camp.", "zh": "“purled”意为打旋、蜿蜒，描绘出营旁一条平静而轻柔流淌的小溪。"}}, {"q": {"en": "How does Henry view the stories told by veteran soldiers?", "zh": "亨利是怎样看待老兵们讲的故事的？"}, "options": [{"en": "He believes every single word they say without any doubt because he thinks veterans always tell the exact truth.", "zh": "他毫无怀疑地相信他们说的每一个字，因为他认为老兵说的一定全是真话。"}, {"en": "He reports the veterans to his commander for spreading false rumors.", "zh": "他向指挥官举报老兵散播虚假谣言。"}, {"en": "He ignores them completely and never listens to a single story.", "zh": "他完全不理会，一个故事也不听。"}, {"en": "He thinks they may be partly lies meant to tease new recruits like him.", "zh": "他认为其中可能有谎话，是用来捉弄像他这样的新兵的。"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Henry cannot put full faith in the tales because recruits are the veterans’ prey and he suspects much may be lies.", "zh": "亨利无法完全相信这些故事，因为新兵是老兵捉弄的对象，他怀疑其中多半是谎话。"}}, {"q": {"en": "What rumor does the tall soldier Jim Conklin bring to the camp in Part 1?", "zh": "在第1部分中，高个子士兵吉姆·康克林在营地里带来了什么传闻？"}, "options": [{"en": "That the regiment will move up the river, cut across, and come around behind the enemy.", "zh": "团队将沿河而上、横穿过去，绕到敌人后方。"}, {"en": "That the war is over and every soldier will go home tomorrow.", "zh": "战争已经结束，每个士兵明天就能回家。"}, {"en": "That the enemy has surrendered and will soon send a formal peace treaty to the camp.", "zh": "敌人已经投降，很快就会向营地送来正式的和平条约。"}, {"en": "That the army will stay in camp forever and never march anywhere again.", "zh": "军队会永远驻守营地，再也不向任何地方行军。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Conklin announces the army will move up the river, cut across, and come around behind the enemy.", "zh": "康克林宣布军队将沿河而上、横穿过去，绕到敌人后方。"}}, {"q": {"en": "What main concern troubles Henry throughout Part 1?", "zh": "贯穿第1部分，亨利最主要的心事是什么？"}, "options": [{"en": "He is annoyed by the loud soldier's constant arguing with others.", "zh": "他被那个吵闹士兵不断和别人争论惹恼了。"}, {"en": "He misses the blackberry jam his mother packed for him.", "zh": "他想念母亲给他装的那杯黑莓酱。"}, {"en": "He worries that, when faced with real battle, he might run away like a coward.", "zh": "他担心，面对真正的战斗时，自己可能会像个懦夫一样逃走。"}, {"en": "He wants to become the regiment's commander someday.", "zh": "他想有朝一日成为团队的指挥官。"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "Henry is newly afraid that he might run from battle, and he cannot prove to himself that he would stand firm.", "zh": "亨利新近害怕自己可能在战斗中逃跑，又无法向自己证明自己能坚守不退。"}}, {"q": {"en": "The Focus Question asks how Henry's perception of war changes. At the start, how did he see war?", "zh": "焦点问题问的是亨利对战争的看法如何变化。一开始，他是怎样看待战争的？"}, "options": [{"en": "As an exciting video game he often played with his schoolmates.", "zh": "当作他常和同学一起玩的刺激电子游戏。"}, {"en": "As something from the distant past that he thought would never happen in his own time.", "zh": "把它看作遥远过去的事，认为自己这个时代再也不会发生战争。"}, {"en": "As a thrilling adventure story he had only read about in books and never expected to face himself.", "zh": "当作他只在书里读过的刺激冒险故事，从没想过自己会亲身面对。"}, {"en": "As a short training exercise that would last only one afternoon.", "zh": "当作只持续一个下午的简短训练。"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "He believed war belonged to the world's past and had disappeared forever over the horizon.", "zh": "他认为战争属于世界的过去，早已消失在天际，再也不会出现。"}}, {"q": {"en": "After enlisting, what happens when Henry visits his friends at the seminary?", "zh": "参军后，亨利去神学院看望同学时发生了什么？"}, "options": [{"en": "His friends laugh at him and refuse to speak to him.", "zh": "同学们嘲笑他并拒绝和他说话。"}, {"en": "He is punished by a teacher for leaving the school early.", "zh": "他因为提前离校被老师处罚。"}, {"en": "He forgets to say goodbye to anyone at all.", "zh": "他忘了和任何人道别。"}, {"en": "His friends admire him, and a darker girl watches his departure from a window with a sad look.", "zh": "同学们崇拜他，一个肤色较深的女孩从窗口望着他离去，神情忧伤。"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Schoolmates throng him with wonder and admiration, and a darker girl watches his leaving from a window.", "zh": "同学们满怀惊奇与敬慕地围住他，而一个肤色较深的女孩从窗口目送他离去。"}}], "extended": {"prompt": {"en": "Henry imagines war as glorious and Homeric, but his camp life is boring and uncertain. How do you think a person's expectations before a big challenge compare with the reality they meet? Use Henry's experience to support your ideas.", "zh": "亨利把战争想象成荣耀而史诗般的场面，但他真实的营地生活却无聊而充满不确定。你认为一个人在面对重大挑战前的期待，与他真正遇到的情况会有多大差距？请结合亨利的经历谈谈你的想法。"}, "guidance": {"en": ["Think about the difference between Henry's daydreams and his actual days in camp.", "Consider why the long wait made him doubt himself.", "Reflect on a time you expected something to be one way and found it different."], "zh": ["想想亨利的幻想与他营中真实日子之间的差别。", "思考漫长的等待为何让他开始怀疑自己。", "回想一次你以为会怎样、结果却不一样的事情。"]}}};</script>
