<script>window.BOOK = {"slug": "a-christmas-carol-part-7", "title": "A Christmas Carol (Part 7)", "titleZh": "《圣诞颂歌》（第7部分）", "level": "Z2", "genre": "Classic Literature", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Besides the Cratchits and the nephew's party, what other cheerful Christmas scenes does the Spirit show Scrooge?", "zh": "除了 Cratchit 一家和侄子的聚会，幽灵还让 Scrooge 看到了哪些欢乐的圣诞场景？"}, "options": [{"en": "A grand royal palace where a lonely king eats his Christmas dinner all alone in complete silence", "zh": "一座宏伟的皇宫，孤独的国王在完全的寂静中独自享用圣诞晚餐"}, {"en": "A school with no children", "zh": "一所没有孩子的学校"}, {"en": "Miners on a moor, men in a lighthouse, and sailors at sea", "zh": "荒原上的矿工、灯塔里的人和大海上的水手"}, {"en": "An empty desert with no people", "zh": "空无一人的沙漠"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "The Spirit shows miners on a moor, two keepers in a sea lighthouse, and the crew of a ship far from shore, all keeping Christmas.", "zh": "幽灵让 Scrooge 看到荒原上的矿工、海上灯塔里的两人，以及远航船只上的船员，大家都在过圣诞。"}}, {"q": {"en": "What does Scrooge's nephew Fred say about Scrooge's wealth?", "zh": "Scrooge 的侄子 Fred 是怎么评价 Scrooge 的财富的？"}, "options": [{"en": "That Scrooge's money does him no good and he does no good with it", "zh": "Scrooge 的钱对自己没好处，他也拿它行不了善"}, {"en": "That Scrooge gives it all away to the poor", "zh": "Scrooge 把钱全施舍给了穷人"}, {"en": "That Scrooge is poor and has no money", "zh": "Scrooge 很穷，没有钱"}, {"en": "That the money is hidden in a tree", "zh": "钱藏在树里"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Fred says Scrooge's wealth is of no use to him, he does no good with it, and gains no comfort or credit from it.", "zh": "Fred 说 Scrooge 的财富对他自己毫无用处，他拿它行不了善，也得不到安慰或好评。"}}, {"q": {"en": "The author writes that laughter is 'irresistibly contagious as laughter and good-humour.' What does this comparison show?", "zh": "作者写道笑声'像笑声与好脾气一样，不可抗拒地会传染'。这个比喻说明了什么？"}, "options": [{"en": "That loud laughter is a terrible sickness that doctors must quickly find a cure for", "zh": "响亮的笑声是一种可怕的疾病，医生必须尽快找到治疗方法"}, {"en": "That the room is too loud", "zh": "房间太吵"}, {"en": "That they should stop talking", "zh": "他们不该说话"}, {"en": "That one person's joy spreads quickly to others", "zh": "一个人的快乐会迅速传染给他人"}], "answer": 3, "skill": "Craft and Structure", "explain": {"en": "Calling laughter contagious shows joy spreads from one person to a whole room, like an infection of good cheer.", "zh": "把笑声比作会传染，说明快乐会从一个人的身上迅速传遍整个房间，如同好情绪的感染。"}}, {"q": {"en": "The Spirit says the two children under its robe are 'Man's,' names them Ignorance and Want, and warns 'beware them both.' What is the author warning about?", "zh": "幽灵说袍子下的两个孩子'属于人类'，称他们为'无知'与'匮乏'，并警告'当心他们两个'。作者在警告什么？"}, "options": [{"en": "That children should never go outside", "zh": "孩子绝不该出门"}, {"en": "That ignorance and poverty are dangers society must fear and fix", "zh": "无知与贫穷是社会必须警惕并解决的危害"}, {"en": "That all boys are bears", "zh": "所有男孩都是熊"}, {"en": "That the Spirit owns the children", "zh": "幽灵是这些孩子的主人"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Ignorance and Want are called children of Man, warnings that society's neglect of learning and need brings doom.", "zh": "'无知'与'匮乏'被称为人类的孩子，是在警告：社会忽视教育与民生将招致灾祸。"}}, {"q": {"en": "Fred says he will invite Scrooge every year 'for I pity him' and hopes to 'shake him' into leaving his clerk 'fifty pounds.' Why does the author show Fred's kind persistence?", "zh": "Fred 说他每年都要邀请 Scrooge，'因为我可怜他'，并希望'打动'他给职员留下'五十镑'。作者为何要写 Fred 这种善意的坚持？"}, "options": [{"en": "To show that Fred is only being kind because he secretly wants all of Scrooge's money for himself one day", "zh": "说明 Fred 之所以表现善意，只是暗中长期盼着有朝一日把 Scrooge 的钱全归自己"}, {"en": "To teach a dance step", "zh": "教一个舞步"}, {"en": "To show that patience and kindness can reach even a cold old man", "zh": "说明耐心与善意能打动即便冷硬的老人"}, {"en": "To describe the weather", "zh": "描写天气"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "Fred's steady, pitying invitations show that gentle persistence and kindness can touch even a cold old miser.", "zh": "Fred 始终带着怜悯的邀请说明，温和的坚持与善意能打动即便冷硬吝啬的老人。"}}, {"q": {"en": "In the game 'Yes and No,' what does Fred's family guess he is thinking of?", "zh": "在'是与否'游戏中，Fred 的家人猜到他在想什么？"}, "options": [{"en": "That Fred is thinking of his Uncle Scrooge, like a disagreeable savage animal", "zh": "Fred 想到的是他的叔叔 Scrooge，像一只可厌的野兽"}, {"en": "That Fred is thinking of a very friendly and cheerful golden retriever dog that loves to play in the park", "zh": "Fred 想到的是一只非常友善、爱在公园玩耍的金色寻回犬"}, {"en": "That Fred is thinking of a red apple", "zh": "Fred 想到的是一只红苹果"}, {"en": "That Fred is thinking of a wooden chair", "zh": "Fred 想到的是一把木椅"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Fred describes a savage, growling animal that walks London streets; his sister cries out it is Uncle Scrooge.", "zh": "Fred 描述了一只在伦敦街头咆哮的野蛮动物；他妹妹喊出那就是 Scrooge 叔叔。"}}, {"q": {"en": "The Spirit shows Scrooge sick beds, struggling men, poverty, almshouses, hospitals, and jails, leaving a blessing everywhere. What point is made?", "zh": "幽灵带 Scrooge 看病床、挣扎的人、贫穷、济贫院、医院和监狱，处处留下祝福。这说明了什么？"}, "options": [{"en": "That the Spirit only visits rich homes", "zh": "幽灵只拜访富人的家"}, {"en": "That Christmas should be cancelled", "zh": "圣诞节应该取消"}, {"en": "That the Spirit fears the dark", "zh": "幽灵害怕黑暗"}, {"en": "That Christmas good will reaches even the suffering and the forgotten", "zh": "圣诞的善意能触及即便受苦与被遗忘的人"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "By blessing sick, struggling, and imprisoned people, the Spirit shows Christmas cheer reaches the suffering and forgotten.", "zh": "幽灵为病人、挣扎者与囚徒祝福，说明圣诞的喜乐能抵达受苦与被遗忘之人。"}}, {"q": {"en": "The book says the Ghost of Christmas Present 'grew older, clearly older' as the night went on, while Scrooge did not. What does this change signal?", "zh": "书中说圣诞现在的幽灵随着夜深'变老了，明显地老了'，而 Scrooge 没有。这种变化预示了什么？"}, "options": [{"en": "That the glowing Christmas Spirit is in truth only a tiny little newborn child after all", "zh": "那位发光的圣诞幽灵其实归根结底只是个小小的婴儿"}, {"en": "That a single Christmas season is brief and the Spirit's life ends at midnight", "zh": "一个圣诞季节很短暂，幽灵的生命在午夜终结"}, {"en": "That Scrooge is getting younger", "zh": "Scrooge 正在变年轻"}, {"en": "That the room is shrinking", "zh": "房间在缩小"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The Spirit says its life on earth is brief and ends at midnight, so it ages as the single Christmas day passes.", "zh": "幽灵说它在世上的生命很短暂，午夜便终结，所以它随着这一个圣诞日的推移而变老。"}}, {"q": {"en": "When the clock strikes twelve and the Spirit vanishes, what appears next to Scrooge?", "zh": "当钟敲十二下、幽灵消失后，出现在 Scrooge 身边的是什么？"}, "options": [{"en": "A flock of singing birds", "zh": "一群歌唱的鸟"}, {"en": "His nephew Fred again", "zh": "他的侄子 Fred 又来了"}, {"en": "A solemn, hooded Phantom coming like mist—the next spirit", "zh": "一个庄严、戴兜帽、如雾般而来的幽灵——下一位幽灵"}, {"en": "A bright sunrise", "zh": "明亮的日出"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "As the bell stops, Scrooge sees a solemn, draped, hooded Phantom gliding like mist toward him—the Ghost of Christmas Yet to Come.", "zh": "钟声止息时，Scrooge 看见一个庄严、披袍戴兜帽、如雾般滑来的幽灵——那是圣诞未来的幽灵。"}}, {"q": {"en": "The Spirit answers Scrooge's question about refuge for the children with 'Are there no prisons?... Are there no workhouses?'—using Scrooge's own words. Why?", "zh": "面对 Scrooge 关于孩子是否有避难所的问题，幽灵用'难道没有监狱吗？……难道没有济贫院吗？'回答——用的正是 Scrooge 自己的话。为何如此？"}, "options": [{"en": "To show that the Spirit greatly praises Scrooge for his great kindness and care toward the poor", "zh": "为了表明幽灵极其赞赏 Scrooge 对穷人表现出的巨大仁慈与关怀"}, {"en": "To teach a spelling list", "zh": "教一份拼写表"}, {"en": "To describe a holiday meal", "zh": "描写一顿节日餐"}, {"en": "To shame Scrooge by throwing his cold words back at him", "zh": "用 Scrooge 冷酷的话回敬他，使他羞愧"}], "answer": 3, "skill": "Author's Purpose and Perspective", "explain": {"en": "The Spirit turns Scrooge's earlier heartless words about prisons and workhouses back on him to shame his cruelty.", "zh": "幽灵把 Scrooge 早先关于监狱和济贫院的冷酷之言原样奉还，让他为自己的残忍感到羞愧。"}}], "extended": {"prompt": {"en": "Fred keeps inviting his cold uncle to Christmas and says he 'pities him' rather than hating him. The Spirit also reveals Ignorance and Want as children of 'Man.' What responsibilities do we have to family we disagree with, and to people in need?", "zh": "Fred 不断邀请冷硬的叔叔过圣诞，并说他是'可怜'叔叔而非恨他。幽灵还把'无知'与'匮乏'揭示为'人类'的孩子。我们对意见不同的家人，以及对有需要的人，负有怎样的责任？"}, "guidance": {"en": ["Think about why Fred keeps inviting Scrooge though Scrooge is unkind.", "Consider what 'Ignorance' and 'Want' represent in real life.", "Connect Fred's pity to how we might treat difficult relatives or neighbours."], "zh": ["想想 Fred 为何在 Scrooge 刻薄时仍不断邀请他。", "思考'无知'与'匮乏'在现实中代表什么。", "把 Fred 的怜悯与我们如何对待难相处的亲人或邻居联系起来。"]}}};</script>
