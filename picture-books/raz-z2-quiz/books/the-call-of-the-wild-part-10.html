d camp.", "zh": "临近营地时，Buck 感到大地起了新动静，并被一种灾祸的压迫感笼罩。"}}, {"q": {"en": "What did Buck find when he reached the camp?", "zh": "Buck 回到营地时，发现了什么？"}, "options": [{"en": "A feast laid out by the partners (which the text plainly shows)", "zh": "伙伴们摆好的一场宴席"}, {"en": "A letter from Judge Miller", "zh": "Miller 法官寄来的一封信，读者可以在故事里找到"}, {"en": "That his friends were gone and the camp was changed", "zh": "他的朋友们都不在了，营地变了样"}, {"en": "A new team of sled dogs", "zh": "一支新来的雪橇犬队"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "Buck found the camp desolated and his friends no longer there, for Thornton was gone.", "zh": "Buck 发现营地一片荒凉，朋友们都不在了——Thornton 已经离去。"}}, {"q": {"en": "Who attacked the camp while Buck was away?", "zh": "Buck 不在时，是谁袭击了营地？"}, "options": [{"en": "A large pack of timber wolves out of the deep woods", "zh": "深林里出来的一大群森林狼"}, {"en": "A people called the Yeehats who came to camp", "zh": "一个称作 Yeehats 的族群，来到了营地"}, {"en": "A band of traveling goldseekers come up from the south", "zh": "一队从南方来的、跋涉的淘金者，这个说法符合前文的内容"}, {"en": "A group of rough men from a nearby trading town", "zh": "附近交易镇上一群粗野的男人"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The Yeehats had come to the camp, and Buck drove them off in his fury.", "zh": "Yeehats 人来到了营地，而 Buck 在盛怒中将他们赶走。"}}, {"q": {"en": "After the attack, what did Buck do to the attackers?", "zh": "袭击过后，Buck 对这些袭击者做了什么？"}, "options": [{"en": "He drove them off in a furious rage", "zh": "他在狂怒中将他们驱散"}, {"en": "He led them back to the town", "zh": "他把他们领回了镇上"}, {"en": "He joined them as a friend", "zh": "他作为朋友加入了他们"}, {"en": "He hid quietly and let them take over the camp", "zh": "他悄悄躲起，任由他们占据营地"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Buck rushed upon the attackers like a live hurricane and drove them into the woods.", "zh": "Buck 如一阵活飓风扑向袭击者，将他们赶进了树林。"}}, {"q": {"en": "What did Buck know once Thornton was gone?", "zh": "Thornton 离去后，Buck 明白了什么？"}, "options": [{"en": "That the timber wolves had carried off his friend", "zh": "森林狼把他的朋友叼走了"}, {"en": "That his last tie to humankind was broken", "zh": "他与人类最后的羁绊已经断了"}, {"en": "That he would at once return to the sunny Southland", "zh": "他会立刻回到阳光的南方故里，这与书里的描写相符"}, {"en": "That the gold dust was hidden somewhere near by", "zh": "金砂就藏在附近的某处"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "With Thornton dead, the last tie was broken and man no longer bound Buck.", "zh": "Thornton 一死，最后的羁绊断裂，人类再也无法束缚 Buck 了。"}}, {"q": {"en": "What happened when the wolf pack reached Buck?", "zh": "当狼群来到 Buck 面前时，发生了什么？"}, "options": [{"en": "They fought, then he ran with them as theirs", "zh": "他们先打斗，随后他作为同伴与它们同奔"}, {"en": "They took him and made him their unhappy prisoner", "zh": "他们逮住他，让他成了不快的囚徒"}, {"en": "They ignored him and simply ran straight past", "zh": "他们不理他，径直跑着越过"}, {"en": "They turned and fled from him in a great and sudden fear", "zh": "他们转身，在巨大而突发的恐惧中逃开，这一点文中说得很明白"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Buck fought the pack, then joined them and ran side by side with the wild brother.", "zh": "Buck 与狼群交手，随后加入它们，和那只野兄弟并肩同奔。"}}, {"q": {"en": "What legend did the Yeehats tell about Buck?", "zh": "Yeehats 人关于 Buck 流传着什么传说？"}, "options": [{"en": "A friendly dog who faithfully guarded all their camp", "zh": "一只忠心看守他们整个营地的友犬"}, {"en": "A spirit that brought them gold", "zh": "一个给他们带来黄金的精灵"}, {"en": "A lost traveler who joined the wolves", "zh": "一名加入狼群的迷途旅人"}, {"en": "A Ghost Dog that runs at the head of the pack", "zh": "一只能跑在狼群最前头的幽灵犬"}], "answer": 3, "skill": "Craft and Structure", "explain": {"en": "The Yeehats told of a Ghost Dog that runs at the head of the pack and fears no hunter.", "zh": "Yeehats 人讲述着一只能跑在狼群最前头、不畏任何猎手的幽灵犬。"}}, {"q": {"en": "Each fall, what does the story say Buck does?", "zh": "每年秋天，故事说 Buck 会做什么？"}, "options": [{"en": "He visits the valley and howls once, then departs", "zh": "他造访那座山谷，长嚎一声，便离去"}, {"en": "He sleeps quietly by the warm and cozy lodge fire (which the text plainly shows)", "zh": "他在温暖舒适的木屋火边安静酣睡"}, {"en": "He stays with the Yeehats as a pet", "zh": "他作为宠物留在 Yeehats 身边"}, {"en": "He leads the men to the lost mine", "zh": "他领着人们找到废矿"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Each fall Buck crosses alone to the open space and howls once, mournful, ere he departs.", "zh": "每年秋天，Buck 独自越过来到那片空地，哀哀长嚎一声，便离去了。"}}], "extended": {"prompt": {"en": "In Part 10, Buck's bond with people ends and he joins the wild. Do you think he was happier at the beginning or the end of his story? Write a short opinion with one reason from the book.", "zh": "在第十部分，Buck 与人的羁绊告终，他加入了荒野。你认为在他故事的起点还是终点，他更快乐？写一则短看法，并给出书里的一个理由。"}, "guidance": {"en": ["Say whether the start or the end seems happier.", "Give one reason from Part 10.", "It is fine to say it is a mix."], "zh": ["说明起点还是终点似乎更快乐。", "给出第十部分里的一个理由。", "你也可以说两者兼有。"]}}};</script>
