<script>window.BOOK = {"slug": "the-call-of-the-wild-part-5", "title": "The Call of the Wild (Part 5)", "titleZh": "《野性的呼唤》（第五部分）", "level": "Z2", "genre": "Classic Literature", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "What did Buck do when Francois put Sol-leks in the lead?", "zh": "当 Francois 让 Sol-leks 带队时，Buck 做了什么？"}, "options": [{"en": "He drove Sol-leks aside and took the lead himself", "zh": "他把 Sol-leks 挤开，自己占上了领头位"}, {"en": "He happily pulled behind Dave as before", "zh": "他像从前一样开心地在 Dave 身后拉橇，这与书里的描写相符"}, {"en": "He ran away and hid in the woods", "zh": "他跑开，藏进了树林"}, {"en": "He lay down and refused to move at all", "zh": "他躺下，根本不肯动弹"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Buck sprang upon Sol-leks and stood in the coveted lead place, claiming it was his by right.", "zh": "Buck 扑向 Sol-leks，站上那个令人垂涎的领头位，声称这是他应有的权利。"}}, {"q": {"en": "How did Perrault and Francois finally react to Buck's revolt?", "zh": "Perrault 和 Francois 最终怎样回应了 Buck 的反叛？"}, "options": [{"en": "They whipped him hard and made him the wheel-dog", "zh": "他们狠狠抽他，让他当橇尾犬"}, {"en": "They gave in and let him lead the team", "zh": "他们让步，让他带领队伍"}, {"en": "They sold him to a passing stranger at the very next camp", "zh": "他们在下一个营地把他卖给路过的陌生人"}, {"en": "They left him behind at the camp", "zh": "他们把他留在了营地"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "After an hour of chasing him, they gave in, unhitched Sol-leks, and let Buck lead.", "zh": "追逐了他一个钟头后，他们让步，解下 Sol-leks，让 Buck 领了队。"}}, {"q": {"en": "How did Buck act as the new lead dog?", "zh": "作为新任领头犬，Buck 表现如何？"}, "options": [{"en": "He let the team do whatever they wished", "zh": "他任由队伍想做什么就做什么，这是原文明确写到的"}, {"en": "He was unsure and often lost the trail", "zh": "他没把握，常常迷失雪道"}, {"en": "He gave the law and made his mates live up to it", "zh": "他立下规矩，逼同伴们遵守到底"}, {"en": "He ran slower than all the other dogs", "zh": "他跑得比所有别的狗都慢"}], "answer": 2, "skill": "Key Ideas and Details", 个短腿多毛的原始人，那是他深远遗传里的记忆。"}}, {"q": {"en": "How did Dave show his love of the trail?", "zh": "Dave 怎样表现出对雪道的挚爱？"}, "options": [{"en": "He tried to ride on the sled each day", "zh": "他每天都想骑上雪橇"}, {"en": "He ate all of his fish before any of the other dogs could", "zh": "他抢在所有别的狗之前吃光自己的鱼"}, {"en": "He fought to stay in the traces even when sick", "zh": "即便生病，他也拼命要留在挽具里"}, {"en": "He ran ahead to find the shortest path", "zh": "他跑在前头寻找最短的路"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "Even sick unto death, Dave resented being taken out and bit through Sol-leks's traces to return.", "zh": "即便病入膏肓，Dave 也不甘被换下，咬断 Sol-leks 的挽绳要回到位上。"}}, {"q": {"en": "What finally happened to Dave when he could not go on?", "zh": "当 Dave 再也走不动时，最终发生了什么？"}, "options": [{"en": "He was left to rest at a kind and friendly camp nearby", "zh": "他被留在附近一座友善的营地休息，这一点文中说得很明白"}, {"en": "He was given to a new set of owners", "zh": "他被交给了新的一批主人"}, {"en": "He was sent back south on a crowded steamer at once", "zh": "他立刻被送上拥挤的轮船送回南方"}, {"en": "The driver shot him after the team moved on", "zh": "队伍走远后，赶橇人开枪打死了他"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The Scotch half-breed retraced his steps, and a revolver-shot rang out behind the trees.", "zh": "苏格兰混血儿折返脚步，树林后传来一声手枪的枪响。"}}, {"q": {"en": "What does the book say about Buck's old Sunland memories?", "zh": "关于 Buck 对南方旧家的记忆，书中说了什么？"}, "options": [{"en": "They grew faint and had no power over him", "zh": "它们变得模糊，对他已毫无约束力"}, {"en": "They made him feel homesick on every single cold night", "zh": "它们在每一个寒夜都让他想家，这是原文明确写到的"}, {"en": "They helped him find the lost mine of gold", "zh": "它们帮他找到了藏金废矿"}, {"en": "They taught him how to lead the team", "zh": "它们教会了他如何带队"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The Sunland was very dim and distant, and such memories had no power over Buck.", "zh": "南方故里遥远而模糊，这样的记忆对 Buck 已没有任何约束力。"}}, {"q": {"en": "How did the other dogs treat Buck after he became lead dog?", "zh": "Buck 当上领头犬后，别的狗怎样对待他？"}, "options": [{"en": "They ignored him and tried to pick a different leader", "zh": "他们不理他，还想另选一个领头，读者可以在故事里找到"}, {"en": "Three fights with the fiercest made him master", "zh": "与最凶猛的几只打过三仗后他成了主宰"}, {"en": "They refused ever to pull the heavy sled", "zh": "他们死活不肯拉那沉重的雪橇"}, {"en": "They ran away into the dark woods at night", "zh": "他们夜里跑进黑森林里去了"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Three battles with the fiercest dogs brought Buck to mastery, so they got out of his way.", "zh": "与最凶猛的几只狗打过三仗，Buck 确立了主宰地位，它们见他就让。"}}], "extended": {"prompt": {"en": "In Part 5, Dave loves the trail so much that he cannot bear to be left out of the harness. Write a paragraph about a time you cared deeply about something, and what you did because of that care.", "zh": "在第五部分，Dave 如此热爱雪道，以至于无法忍受被排出挽具之外。写一段话，讲讲你曾深深在乎某件事的时候，以及因为那份在乎你做了什么。"}, "guidance": {"en": ["Name something you cared about deeply.", "Tell what you did because of that care.", "Keep it school-appropriate and brief."], "zh": ["说出一件你曾深深在乎的事。", "讲述因为那份在乎你做了什么。", "保持适合校园、简短。"]}}};</script>
