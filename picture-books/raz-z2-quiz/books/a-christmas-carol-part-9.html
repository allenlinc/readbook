<script>window.BOOK = {"slug": "a-christmas-carol-part-9", "title": "A Christmas Carol (Part 9)", "titleZh": "《圣诞颂歌》（第9部分）", "level": "Z2", "genre": "Classic Literature", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "What does Scrooge beg the Spirit to show him after seeing the lonely dead man?", "zh": "看到那孤独的死者后，Scrooge 恳求幽灵给他看什么？"}, "options": [{"en": "Someone in town who feels any emotion at the man's death", "zh": "镇上任何因那人的死而产生一丝情感的人"}, {"en": "The man's hidden gold coins", "zh": "那人藏起来的金币"}, {"en": "A map of the city", "zh": "一张城市地图"}, {"en": "A recipe for soup", "zh": "一道汤的配方"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Scrooge begs, 'If there is any person in the town who feels emotion caused by this man's death, show that person to me.'", "zh": "Scrooge 恳求道：'倘若镇上有人因这人的死而动容，请把那个人指给我看。'"}}, {"q": {"en": "The author describes the dead man's room as 'unwatched, unwept, uncared for.' What does this triple repetition show?", "zh": "作者把死者的房间描述为'无人守候、无人哭泣、无人照料'。这种三重重复说明了什么？"}, "options": [{"en": "That the room was actually full of happy dancing guests", "zh": "那房间其实满是会跳舞的欢乐宾客"}, {"en": "That the man was a king", "zh": "那人是个国王"}, {"en": "That no one grieved for or tended the dead man", "zh": "没有人哀悼或照料这位死者"}, {"en": "That the bed was made of gold", "zh": "床是金子做的"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "The repeated negatives stress that the dead miser was utterly alone, with no one to mourn or care for him.", "zh": "一连串的否定强调，这个死去的守财奴彻底孤独，无人哀悼也无人在意。"}}, {"q": {"en": "What news does the husband in the daylight room bring to his wife Caroline?", "zh": "在白昼那间屋子里，丈夫带给妻子 Caroline 的是什么消息？"}, "options": [{"en": "That they have just won a very great prize of money in a lucky public drawing", "zh": "他们刚在一场幸运的公开抽奖中赢了一大笔钱"}, {"en": "That it is snowing outside", "zh": "外面在下雪"}, {"en": "That the cat is missing", "zh": "猫不见了"}, {"en": "That their harsh creditor is dead, so they are not ruined after all", "zh": "他们苛刻的债主死了，所以他们终究没有破产"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The husband says their hard creditor is dead and past relenting, so the family is not ruined after all.", "zh": "丈夫说他们苛刻的债主已死、再不会心软，所以这家人终究没有破产。"}}, {"q": {"en": "The wife Caroline feels thankful when told the creditor is dead. What does this reveal?", "zh": "妻子 Caroline 听说债主死了反而心存感激。这揭示了什么？"}, "options": [{"en": "That she loved the creditor dearly", "zh": "她深爱那位债主"}, {"en": "That the miser's cruelty made even his death a relief to debtors", "zh": "守财奴的冷酷让即便他的死对欠债人也是一种解脱"}, {"en": "That the house was on fire", "zh": "房子着火了"}, {"en": "That they won a game", "zh": "他们赢了一场游戏"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Caroline's relief shows the miser's cruelty was so great that even his death brought debtors a sense of freedom.", "zh": "Caroline 的宽慰说明，守财奴的冷酷如此之深，连他的死都给欠债人带来了自由感。"}}, {"q": {"en": "The author shows both the dead miser's lonely room and the Cratchits' quiet grief. Why contrast these deaths?", "zh": "作者既写了死去的守财奴那孤寂的房间，又写了 Cratchit 一家静静的哀伤。为何要对比这两种死亡？"}, "options": [{"en": "To show that a life of love leaves grief and memory, while a loveless life leaves only emptiness", "zh": "说明有爱的人生留下哀思与记忆，而无爱的人生只余空虚"}, {"en": "To give the reader a long and careful step-by-step lesson in how to build a strong brick house from the very ground up by hand", "zh": "为了让读者上一堂漫长而细致、手把手的课，学习如何从地基起亲手盖一座结实的砖房"}, {"en": "To describe a type of bird", "zh": "描写一种鸟"}, {"en": "To list the months", "zh": "列出月份"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The contrast shows a loved life leaves mourning and memory, while a loveless life leaves only emptiness.", "zh": "这一对比说明，被爱的人生会留下哀思与记忆，而无爱的人生只余空虚。"}}, {"q": {"en": "Bob Cratchit 'broke down' and later 'was reconciled' after visiting Tiny Tim's room. What do these words show about him?", "zh": "Bob Cratchit'崩溃了'，之后在看过 Tiny Tim 的房间后又'坦然接受了'。这两个词说明了他怎样的性情？"}, "options": [{"en": "That he disliked his children", "zh": "他不喜欢自己的孩子"}, {"en": "That he wanted to leave home", "zh": "他想离家"}, {"en": "That he feels deep grief but accepts it with love and peace", "zh": "他深感悲痛，却以爱与平和接受了现实"}, {"en": "That he was hungry", "zh": "他饿了"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "Bob weeps openly yet finds peace in his love for Tim, showing a father's deep but gentle grief.", "zh": "Bob 哭得不能自已，却在爱 Tim 的心中找到平静，展现了一位父亲深沉而温柔的哀伤。"}}, {"q": {"en": "What name does Scrooge read on the neglected grave stone?", "zh": "Scrooge 在那座被忽视的墓碑上读到了什么名字？"}, "options": [{"en": "Jacob Marley", "zh": "Jacob Marley"}, {"en": "Bob Cratchit", "zh": "Bob Cratchit"}, {"en": "Fred the nephew", "zh": "侄子 Fred"}, {"en": "Ebenezer Scrooge", "zh": "Ebenezer Scrooge"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "Upon the stone of the neglected grave Scrooge reads his own name, Ebenezer Scrooge.", "zh": "在那座被忽视的墓碑上，Scrooge 读到了自己的名字——Ebenezer Scrooge。"}}, {"q": {"en": "Scrooge asks if the shadows are 'things that Will be, or... May be, only.' What does the Spirit's silent pointing teach?", "zh": "Scrooge 问这些影子是'将会发生之事'，还是'仅仅可能发生之事'。幽灵无言的指向教给了他什么？"}, "options": [{"en": "That the future is already written in stone and can never ever be changed by anyone at all", "zh": "未来早已刻在石头上，任何人永远永远都无法改变"}, {"en": "That the future can still change if he changes his life", "zh": "若他改变人生，未来仍可能改变"}, {"en": "That the grave is a treasure chest", "zh": "坟墓是个宝箱"}, {"en": "That the Spirit is a cat", "zh": "幽灵是只猫"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Scrooge reasons that if he departs from his current course, the ends will change; the future is still open.", "zh": "Scrooge 推断，若他改变当下的做法，结局也会改变；未来仍有转圜余地。"}}, {"q": {"en": "At the very end, the Phantom 'shrunk, collapsed, and dwindled down into a bedpost.' What does this sudden change show?", "zh": "在结尾，那个幽灵'缩紧、塌陷，缩小成了一根床柱'。这种突如其来的变化说明了什么？"}, "options": [{"en": "That the scary vision was a dream and Scrooge is waking up", "zh": "那可怕的幻象是一场梦，Scrooge 正醒来"}, {"en": "That the tall Phantom suddenly turned into a giant roaring fire-breathing dragon with huge wings", "zh": "那位高大的幽灵突然变成了一条长着巨翼、喷火咆哮的巨龙"}, {"en": "That it became a snowman", "zh": "它变成了一个雪人"}, {"en": "That it flew to the moon", "zh": "它飞到了月亮上"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The fearsome Phantom shrinking to a bedpost signals the vision was a dream and Scrooge is waking in his own bed.", "zh": "可怕的幽灵缩成床柱，表明那场幻象原是一场梦，Scrooge 正在自己的床上醒来。"}}, {"q": {"en": "Scrooge cries 'I will honour Christmas in my heart... The Spirits of all Three shall strive within me.' Why does the author give him this pledge?", "zh": "Scrooge 喊道'我要在心里敬重圣诞节……三位幽灵的精神将在我心中博弈'。作者为何让他立下这样的誓言？"}, "options": [{"en": "To show that Scrooge plans to sleep soundly through every single Christmas from now on without a care", "zh": "为了表明 Scrooge 打算从此在每个圣诞节都无忧无虑地睡大觉"}, {"en": "To describe a sunrise", "zh": "描写日出"}, {"en": "To show his change of heart and promise to live by the spirits' lessons", "zh": "表明他洗心革面，决心按三位幽灵的教训生活"}, {"en": "To list the dinner menu", "zh": "列出晚餐菜单"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "The pledge shows Scrooge's full change of heart and his vow to live by what the three spirits taught him.", "zh": "这段誓言表明 Scrooge 彻底洗心革面，并立誓按三位幽灵教给他的道理生活。"}}], "extended": {"prompt": {"en": "Scrooge reads his own name on a future grave and pleads for a chance to change. If you saw a warning about your own future, what habit or choice would you most want to change, and what small step could you take tomorrow?", "zh": "Scrooge 在未来的墓碑上读到了自己的名字，并恳求改变的机会。如果你看到关于自己未来的警示，你最想改变哪个习惯或选择？明天你能迈出怎样的一小步？"}, "guidance": {"en": ["Think about which of Scrooge's habits led to the lonely grave.", "Pick one small, real habit you could change in your own life.", "Imagine one concrete step you could take tomorrow."], "zh": ["想想 Scrooge 的哪些习惯导致了那座孤独的墓。", "在你自己的人生里，选一个可以改变的、真实的小习惯。", "设想一下明天你能采取的一个具体步骤。"]}}};</script>
