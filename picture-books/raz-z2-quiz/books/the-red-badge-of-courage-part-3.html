loud speech to the troops.", "zh": "一位正向部队大声演讲的将军。"}, {"en": "A boy who had wandered away from his mother.", "zh": "一个走失了母亲的小男孩。"}, {"en": "A man with worn shoe soles and a rent in his shoe, lying peaceful and still.", "zh": "一个鞋底磨破、鞋上破了个洞的男人，平静地躺在那里一动不动。"}, {"en": "A soldier who was still firing at the enemy.", "zh": "一名仍在向敌人开火的士兵。"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "Henry sees the dead man's soles worn thin as writing paper and a great rent in one shoe.", "zh": "亨利看到死者鞋底磨得像信纸一样薄，一只鞋上还有个大破洞。"}}, {"q": {"en": "Why does Henry at first want to break ranks and harangue his comrades?", "zh": "亨利起初为什么想冲出队列，向同伴们慷慨陈词？"}, "options": [{"en": "He wants to be made the new colonel of the regiment.", "zh": "他想让自己当上团队的新上校。"}, {"en": "He is bored and looking for something to do. This small detail helps show what the soldiers experienced on that day.", "zh": "他无聊，想找点事做。 这个小细节有助于表现士兵们当天的经历。"}, {"en": "He hopes to capture the enemy flag by himself.", "zh": "他想独自去夺取敌旗。"}, {"en": "He fears the generals are leading them into a trap where they will be sacrificed.", "zh": "他害怕将军们正把他们引进陷阱，让大家白白送命。"}], "answer": 3, "skill": "Author's Purpose and Perspective", "explain": {"en": "He becomes certain it is all a trap and that the generals are stupid, so he wants to warn the men.", "zh": "他认定这全是陷阱，将军们愚蠢无能，因此想警告大家。"}}, {"q": {"en": "The text says a ‘rent’ in the dead soldier's shoe exposed his hidden poverty. What is a ‘rent’?", "zh": "文中说死者鞋上的‘rent’暴露了他在生前隐藏的贫穷。‘rent’是什么？"}, "options": [{"en": "A hole or tear in the shoe that showed his hidden poverty.", "zh": "鞋上的破洞或裂口，暴露了他隐藏的贫穷。"}, {"en": "A rent is a kind of army tent used for sleeping.", "zh": "rent 是一种用来睡觉的军用帐篷。"}, {"en": "A rent is the money a soldier is paid each week. This small detail helps show what the soldiers experienced on that day.", "zh": "rent 是士兵每周领取的军饷。 这个小细节有助于表现士兵们当天的经历。"}, {"en": "A rent is a loud noise made by the cannon.", "zh": "rent 是大炮发出的巨响。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines rent as a hole or tear, here revealing the soldier's poor condition in life.", "zh": "词汇表把 rent 解释为破洞或裂口，这里揭示了士兵生前的穷困。"}}, {"q": {"en": "When Henry lags during the march, how does the young lieutenant treat him?", "zh": "行军中亨利落在后面时，年轻的副官怎样对待他？"}, "options": [{"en": "He praises Henry for his brave marching pace.", "zh": "他称赞亨利勇敢的行军步伐。"}, {"en": "He beats Henry with his sword and calls him a skulker for lagging.", "zh": "他用剑打亨利，骂他磨蹭，是个临阵退缩的人。"}, {"en": "He gives Henry a medal for good conduct.", "zh": "他给亨利发了一枚品行优良的奖章。"}, {"en": "He lets Henry lead the company forward.", "zh": "他让亨利带头率连前进。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The lieutenant heartily beats Henry with a sword, calling out against skulking in the ranks.", "zh": "副官用剑狠狠地打亨利，大声斥责他在队列里磨蹭退缩。"}}, {"q": {"en": "During a halt, the men begin erecting ‘tiny hills’ in front of them. What are these?", "zh": "在一次停顿中，士兵们开始在自己前方垒起‘小土丘’。这些是什么？"}, "options": [{"en": "Small campfires the men built to cook their food. This small detail helps show what the soldiers experienced on that day.", "zh": "士兵们用来做饭的小堆篝火。 这个小细节有助于表现士兵们当天的经历。"}, {"en": "Toy forts the soldiers made to amuse themselves.", "zh": "士兵们为了消遣搭的玩具堡垒。"}, {"en": "Small piles of stones and earth meant to block bullets.", "zh": "用石头和泥土堆起的小堆，用来挡子弹。"}, {"en": "Graves the men dug for the dead soldier.", "zh": "士兵们为死者挖的坟墓。"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The men use stones, sticks, and earth to build little protections they hope will turn a bullet.", "zh": "士兵们用石头、树枝和泥土垒起小掩体，指望能挡住子弹。"}}, {"q": {"en": "The noise of battle is described as growing ‘like the roar of an oncoming train.’ What is the purpose of this simile?", "zh": "战斗的喧闹被描写成‘像一列逼近的火车在轰鸣’。这个明喻的作用是什么？"}, "options": [{"en": "To show that the soldiers were falling asleep from tiredness.", "zh": "为了表现士兵们累得快要睡着了。"}, {"en": "To explain why the colonel rode a gigantic horse. This small detail helps show what the soldiers experienced on that day.", "zh": "为了解释上校为何骑一匹巨马。 这个小细节有助于表现士兵们当天的经历。"}, {"en": "To describe the calm and quiet of the forest.", "zh": "为了描写森林的平静与安静。"}, {"en": "To show the battle noise growing louder and more intense like a train.", "zh": "为了表现战斗的声响越来越大、越来越猛，像火车逼近。"}], "answer": 3, "skill": "Craft and Structure", "explain": {"en": "The din becomes a crescendo, compared to a train's roar, to convey rising intensity of sound.", "zh": "喧闹声渐成 crescendo（渐强），比作火车的轰鸣，以传达声响越来越猛烈。"}}, {"q": {"en": "At the end of Part 3, what does the loud soldier Wilson tell Henry?", "zh": "第3部分结尾，吵闹士兵威尔逊对亨利说了什么？"}, "options": [{"en": "He says it is his first and last battle and gives Henry a packet for his family.", "zh": "他说这是自己第一场也是最后一场战斗，并把一个小包交给亨利带给家人。"}, {"en": "He claims he will never speak to Henry again.", "zh": "他声称再也不和亨利说话了。"}, {"en": "He says he plans to run as fast as he can.", "zh": "他说自己打算拼命逃跑。"}, {"en": "He asks Henry to lend him a rifle.", "zh": "他向亨利借一支步枪。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Pale and trembling, Wilson says it is his first and last battle and hands Henry a packet for his folks.", "zh": "威尔逊脸色苍白、浑身发抖，说这是自己第一场也是最后一场战斗，把一个小包交给亨利转交家人。"}}, {"q": {"en": "By the afternoon, how does Henry's earlier fear of the landscape change?", "zh": "到了下午，亨利先前对景色的恐惧发生了怎样的变化？"}, "options": [{"en": "The landscape becomes even more frightening than before.", "zh": "景色变得比之前更可怕了。"}, {"en": "The landscape stops seeming threatening once he becomes familiar with it.", "zh": "当他熟悉了这片景色后，它便不再显得充满威胁。"}, {"en": "He decides the generals are brilliant after all.", "zh": "他认定将军们终究还是英明的。"}, {"en": "He forgets about the war completely. This small detail helps show what the soldiers experienced on that day.", "zh": "他把战争彻底忘光了。 这个小细节有助于表现士兵们当天的经历。"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "After the regiment passes over the same ground, the landscape ceases to threaten him as he grows familiar with it.", "zh": "团队走回先前经过的地方后，亨利熟悉了这片景色，它便不再令他感到威胁。"}}], "extended": {"prompt": {"en": "When Henry sees the dead soldier's worn shoes and the rent in one shoe, the text says poverty that was hidden in life is exposed in death. What does this detail suggest about what war reveals about ordinary people? Support your answer with the story.", "zh": "当亨利看到阵亡士兵磨破的鞋底和鞋上的破洞时，文中说生前隐藏的贫穷在死后被暴露出来。这个细节暗示了战争揭示了普通人怎样的处境？请结合故事说明理由。"}, "guidance": {"en": ["Focus on the ‘rent’ in the shoe and what it shows about the soldier's life.", "Think about how the marching men reacted by walking around the body.", "Consider what small details can reveal about a person's story."], "zh": ["关注鞋上的‘破洞’以及它揭示了士兵怎样的生前处境。", "想想行军的人绕开尸体时的反应。", "思考一个微小的细节能怎样透露一个人的故事。"]}}};</script>
