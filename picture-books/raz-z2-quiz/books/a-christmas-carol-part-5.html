holds a magic wand", "zh": "里面装着魔杖"}, {"en": "That the Spirit brings peace, not force or war", "zh": "这个幽灵带来的是和平，而非武力或战争"}], "answer": 3, "skill": "Craft and Structure", "explain": {"en": "An empty, rusted scabbard with no sword hints the Spirit's power is gentle and peaceful, not violent.", "zh": "空空生锈、没有剑的剑鞘暗示，幽灵的力量是温和与和平的，而非暴力。"}}, {"q": {"en": "When Scrooge asks about the torch's sprinkle, the Spirit says it applies 'to any kindly given. To a poor one most,' because 'it needs it most.' What is being taught?", "zh": "Scrooge 问到火把洒下的东西，幽灵说它适用于'任何善意给予的，对穷人的那份最甚'，因为'它最需要'。这教给了我们什么？"}, "options": [{"en": "That the torch makes food spicy", "zh": "火把让食物变辣"}, {"en": "That kindness and blessing mean most to those who have the least", "zh": "善意与祝福对那些所得最少的人意义最大"}, {"en": "That people should never cook at home", "zh": "人们绝不该在家做饭"}, {"en": "That only the richest dinners taste good according to some versions of the story", "zh": "只有最丰盛的晚餐才好吃（按书中另一种说法）"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The Spirit's own flavour blesses any kindly meal, and most of all a poor one, because the poor need it most.", "zh": "幽灵自身的'滋味'为任何善意的一餐祝福，而对穷人的那份最甚，因为穷人最需要它。"}}, {"q": {"en": "The Spirit says some people 'do their deeds of passion, pride, ill-will... in our name' but are 'strange to us.' Why does the author include this?", "zh": "幽灵说有些人'以我们的名义'行'激情、骄傲、恶意……之事'，却与'我们'毫不相干。作者为何要写这一段？"}, "options": [{"en": "To explain how to bake bread", "zh": "解释如何烤面包"}, {"en": "To describe a snowball fight", "zh": "描写打雪仗"}, {"en": "That only the very richest, most costly and lavish dinners in the whole wide town could ever taste truly good to anyone", "zh": "只有全城最昂贵、最丰盛、最铺张的晚餐，对任何人才可能真正好吃"}, {"en": "To say true Christmas spirit is kind, and cruel acts done in its name are not its fault", "zh": "说明真正的圣诞精神是仁慈的，借其名行的残忍之事并非它的错"}], "answer": 3, "skill": "Author's Purpose and Perspective", "explain": {"en": "The Spirit says selfish, hateful acts done in Christmas's name are the doers' own fault, not the spirit's.", "zh": "幽灵说，借圣诞节之名行自私仇恨之事，是行恶者自己的过错，而非圣诞精神之过。"}}, {"q": {"en": "The author fills pages describing the poulterers', fruiterers', and grocers' shops. What effect does this detailed description create?", "zh": "作者用大量篇幅描写禽肉店、水果店和杂货店。这种细致的描写营造了怎样的效果？"}, "options": [{"en": "To make the reader feel bored and sleepy according to some versions of the story", "zh": "让读者感到无聊想睡（按书中另一种说法）"}, {"en": "To describe a storm at sea", "zh": "描写海上风暴"}, {"en": "To show the cheerful plenty and joy of the Christmas market", "zh": "展现圣诞集市欢乐而丰盛的景象"}, {"en": "To teach a math lesson", "zh": "上一堂数学课"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "The rich, sensory detail of the crowded shops builds a mood of cheerful abundance and holiday joy.", "zh": "对各家店铺细致而充满感官细节的描写，营造出丰盛欢乐、节日喜悦的氛围。"}}, {"q": {"en": "Even though the Ghost is a gigantic Giant, he 'could accommodate himself to any place with ease,' even under a low roof. What does this show?", "zh": "尽管幽灵是个巨大的巨人，他却'能从容适应任何地方'，即使在低矮的屋顶下也行。这说明了什么？"}, "options": [{"en": "That his gentle spirit fits anywhere, grand or small", "zh": "他温和的精神无论在宏伟还是狭小处都能安适"}, {"en": "That he is afraid of open spaces according to some versions of the story", "zh": "他害怕空旷的地方（按书中另一种说法）"}, {"en": "That he cannot bend his knees", "zh": "他弯不下膝盖"}, {"en": "That he hates small houses", "zh": "他讨厌小房子"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Despite his huge size, the Spirit fits gracefully under low roofs, showing his kind nature goes anywhere.", "zh": "尽管身躯巨大，幽灵却能在低矮屋顶下优雅安适，说明他仁善的本性能去往任何地方。"}}, {"q": {"en": "At the end of this part, whose home does the Spirit bless, and what do we learn about that person?", "zh": "在本部分结尾，幽灵祝福了谁的家，我们由此了解到那个人什么情况？"}, "options": [{"en": "The grand mansion of the very rich mayor, which is filled from top to bottom with many busy servants", "zh": "极其富有的市长那座豪宅，从上到下挤满了许多忙碌的仆人"}, {"en": "Bob Cratchit's small home; he earns only fifteen bob a week", "zh": "Bob Cratchit 狭小之家；他每周只挣十五先令"}, {"en": "A king's palace with golden rooms", "zh": "金碧辉煌的国王宫殿"}, {"en": "The school where Scrooge studied", "zh": "Scrooge 就读过的学校"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The Spirit blesses Bob Cratchit's four-roomed house; Bob earns only fifteen bob a week yet is blessed.", "zh": "幽灵祝福了 Bob Cratchit 那有四间屋的小家；Bob 每周只挣十五先令，却得到了祝福。"}}, {"q": {"en": "The Spirit sprinkles 'incense' on the poor dinners carried to the bakers. What is the author showing about Christmas?", "zh": "幽灵把'馨香'洒在人们送往面包铺的穷人晚餐上。作者借此表现了圣诞节的什么？"}, "options": [{"en": "That cooking is a crime", "zh": "做饭是一种罪"}, {"en": "That Christmas is a holiday meant only for the very richest and grandest families in the whole town", "zh": "圣诞节是专属于全镇最富有、最显赫家庭的节日"}, {"en": "That Christmas brings warmth and blessing especially to the poor", "zh": "圣诞节把温暖与祝福特别带给穷人"}, {"en": "That people should eat alone", "zh": "人们应该独自吃饭"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "By blessing the poor dinners, the author shows Christmas generosity reaches and warms those with the least.", "zh": "通过祝福穷人的晚餐，作者表现了圣诞的慷慨特别温暖那些拥有最少的人。"}}, {"q": {"en": "The book says the Spirit has 'more than eighteen hundred' brothers. What does this tell us?", "zh": "书中说这位幽灵有'一千八百多'个兄弟。这告诉了我们什么？"}, "options": [{"en": "That Christmas has been kept for more than eighteen hundred years", "zh": "圣诞节已被庆祝了一千八百多年"}, {"en": "That he lives in a castle", "zh": "他住在城堡里"}, {"en": "That the jolly Spirit keeps a huge pack of exactly eighteen hundred pet dogs in his giant house", "zh": "这位快乐的幽灵在他巨大的房子里养着整整一千八百只宠物狗"}, {"en": "That he is a single baby", "zh": "他是个小婴儿"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The Spirit means each past Christmas is an elder brother, so the holiday has been kept for over eighteen hundred years.", "zh": "幽灵的意思是每一年的圣诞节都是他的兄长，所以这个节日已被庆祝了一千八百多年。"}}], "extended": {"prompt": {"en": "The Ghost of Christmas Present showers the poor dinners with blessing and says a poor meal 'needs it most.' Why might sharing and blessing matter more to people who have less? Have you seen kindness make a plain moment special?", "zh": "圣诞现在的幽灵把祝福洒在穷人的晚餐上，并说穷人的饭菜'最需要'这份祝福。为什么分享与祝福对拥有较少的人意义更大？你有没有见过善意让平凡的时刻变得特别？"}, "guidance": {"en": ["Think about why the Spirit says a poor dinner needs the blessing most.", "Consider how a small kind act can lift someone who has little.", "Recall a time a shared meal or gift felt extra special to you."], "zh": ["想想幽灵为什么说穷人的晚餐最需要这份祝福。", "考虑小小的善举如何能让拥有很少的人振作。", "回忆一次共享的餐食或礼物让你感到格外特别的经历。"]}}};</script>
