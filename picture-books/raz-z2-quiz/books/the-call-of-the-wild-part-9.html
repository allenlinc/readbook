<script>window.BOOK = {"slug": "the-call-of-the-wild-part-9", "title": "The Call of the Wild (Part 9)", "titleZh": "《野性的呼唤》（第九部分）", "level": "Z2", "genre": "Classic Literature", "mainSkill": "Author's Purpose and Perspective", "questions": [{"q": {"en": "What did Buck's winnings let Thornton do?", "zh": "Buck 赢来的钱让 Thornton 能够做什么？"}, "options": [{"en": "Buy a bigger team of twenty dogs", "zh": "买一支二十只狗的大队"}, {"en": "Pay debts and journey east for the lost mine", "zh": "还清欠债，并东行去寻找废矿"}, {"en": "Build a fine cabin by the river", "zh": "在河边建一间讲究的木屋，这与书里的描写相符"}, {"en": "Return south to the Santa Clara Valley", "zh": "回南方圣克拉拉谷"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The sixteen hundred dollars let Thornton pay debts and journey east after the fabled lost mine.", "zh": "那一千六百美元让 Thornton 还清欠债，并东行追寻传说中的废矿。"}}, {"q": {"en": "On the long journey east, what was the bill of fare?", "zh": "在东行漫长的旅途中，他们的主食是什么？"}, "options": [{"en": "Straight meat, with ammunition and tools on the sled", "zh": "直截的肉，雪橇上载着弹药和工具"}, {"en": "Canned goods from the long trail", "zh": "长途雪道上的罐头食品，这一点文中说得很明白"}, {"en": "Fish and bread from the villages", "zh": "从村落得来的鱼和面包"}, {"en": "The dogs' regular dried salmon", "zh": "狗群定例的干三文鱼"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Straight meat was the bill of fare; ammunition and tools made up the load on the sled.", "zh": "直截的肉是主食；雪橇上装的是弹药和工具。"}}, {"q": {"en": "What did the partners finally find instead of the lost mine?", "zh": "伙伴们最终找到的，不是废矿，而是什么？"}, "options": [{"en": "A deep cave full of bones", "zh": "一个满是骸骨的深洞"}, {"en": "A frozen lake with no life", "zh": "一座毫无生气的冻湖"}, {"en": "An ancient cabin with a flintlock", "zh": "一间有燧石枪的古老木屋，这是原文明确写到的"}, {"en": "A shallow placer where gold showed in the pan", "zh": "一处浅砂矿，淘盘里显出黄金"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "They found not the Lost Cabin but a shallow placer where gold showed like yellow butter.", "zh": "他们没找到废屋，却找到一处浅 "}, {"en": "He led the wild wolf all the way back to the camp", "zh": "他领着野狼一路回了营地，这与书里的描写相符，这与书里的描写相符"}, {"en": "He chased the wolf away for good", "zh": "他把狼永远赶走了"}, {"en": "He returned to Thornton at the camp", "zh": "他回到营地，回到 Thornton 身边"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "Buck remembered Thornton, turned about, and started slowly on the back track to camp.", "zh": "Buck 想起 Thornton，转过身，沿着旧路慢慢回向营地。"}}, {"q": {"en": "What did Buck kill while wandering alone?", "zh": "Buck 独自游荡时，杀死的是什么？"}, "options": [{"en": "A large black bear by the river", "zh": "河边一只巨大的黑熊"}, {"en": "A moose in the open valley", "zh": "开阔山谷里一只麋鹿"}, {"en": "A whole dozen wolverines quarreling over the spoil", "zh": "为赃物争吵的一打狼獾"}, {"en": "A timber wolf in the woods", "zh": "林中一只大森林狼"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "By a broad stream he killed a large black bear, and later scattered wolverines over a spoil.", "zh": "在一条宽阔溪流边，他杀死一只巨大的黑熊，后来又把争食的狼獾驱散。"}}, {"q": {"en": "How did Buck change as he answered the call?", "zh": "随着回应呼唤，Buck 起了什么变化？"}, "options": [{"en": "He grew soft and clean forgot the ways of the wild", "zh": "他变柔软，彻底忘了荒野的门道"}, {"en": "He became a killer, proud and full of vigor", "zh": "他成了杀手，骄傲且充满元气"}, {"en": "He learned to live only in the camp", "zh": "他学会只待在营地里生活"}, {"en": "He grew afraid of the forest", "zh": "他变得害怕森林"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "He became possessed of great pride and was in full flower, a killer thriving in a hostile land.", "zh": "他生出巨大的骄傲，正值盛年之花，成了在险境中兴旺的杀手。"}}, {"q": {"en": "What does the 'call of the wild' seem to mean?", "zh": "“野性的呼唤”似乎是什么意思？"}, "options": [{"en": "The early morning order of the dog-driver each day", "zh": "赶橇人每天清晨的号令"}, {"en": "A merry song the men sang together at the saloon", "zh": "男人们在酒馆同唱的欢歌，读者可以在故事里找到"}, {"en": "A pull toward the wild life of his forebears", "zh": "一种拉他回归祖先荒野生活的引力"}, {"en": "The jingling sound of the mail train's bright bells", "zh": "邮橇清脆的铃铛声"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "The call is the deep, luring pull of the wild and of his ancestors' way of life.", "zh": "呼唤是荒野、也是祖先生活方式那深沉而诱人的引力。"}}], "extended": {"prompt": {"en": "The call of the wild pulls Buck toward the forest and his ancestors. Write a paragraph about something that strongly pulls you (a hobby, a place, a person) and why it calls to you.", "zh": "野性的呼唤把 Buck 拉向森林与他的祖先。写一段话，讲讲有什么东西强烈地吸引着你（一种爱好、一个地方、一个人），以及它为何呼唤着你。"}, "guidance": {"en": ["Name the thing that pulls you.", "Tell why it calls to you.", "Keep it school-appropriate."], "zh": ["说出吸引你的那样东西。", "讲讲它为何呼唤着你。", "保持适合校园。"]}}};</script>
