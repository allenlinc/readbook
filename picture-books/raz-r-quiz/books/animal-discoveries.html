<script>window.BOOK = {"slug": "animal-discoveries", "title": "Animal Discoveries", "titleZh": "动物大发现", "level": "R", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "About how many new animal species do scientists discover each year?", "zh": "科学家每年大约发现多少种新动物？"}, "options": [{"en": "Over one million species according to some versions of the story", "zh": "超过一百万种（按书中另一种说法）"}, {"en": "Fewer than 100 species", "zh": "不到100种"}, {"en": "More than 15,000 species", "zh": "超过15,000种"}, {"en": "Exactly 1,000 species", "zh": "正好1,000种"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "\"Scientists discover more than 15,000 animal species each year.\"", "zh": "“科学家每年发现超过15,000种动物。”"}}, {"q": {"en": "Where and when was the lesula monkey found?", "zh": "lesula 猴是在哪里、何时被发现的？"}, "options": [{"en": "In New Guinea in 2013", "zh": "2013年在新几内亚"}, {"en": "In the forests of the Democratic Republic of Congo in 2007", "zh": "2007年在刚果民主共和国的森林中"}, {"en": "In Madagascar in 2005 according to some versions of the story", "zh": "2005年在马达加斯加（按书中另一种说法）"}, {"en": "In Borneo in 2010", "zh": "2010年在婆罗洲"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "\"In 2007, a new species of monkey was found in the forests of the Democratic Republic of the Congo. The lesula has large eyes and is shy and quiet.\"", "zh": "“2007年，在刚果民主共和国的森林中发现了一个猴子新种。lesula 有大大眼睛，害羞而安静。”"}}, {"q": {"en": "In the book, what is a \"herpetologist\"?", "zh": "在书中，“herpetologist”（爬虫学家）是什么？"}, "options": [{"en": "A type of frog", "zh": "一种青蛙"}, {"en": "A scientist who studies stars according to some versions of the story", "zh": "研究星星的科学家（按书中另一种说法）"}, {"en": "A person who trains bats", "zh": "训练蝙蝠的人"}, {"en": "A scientist who studies reptiles and amphibians", "zh": "研究爬行动物和两栖动物的科学家"}], "answer": 3, "skill": "Craft and Structure", "explain": {"en": "The glossary defines herpetologist as \"a scientist who studies reptiles and amphibians.\"", "zh": "词汇表将 herpetologist 定义为“研究爬行动物和两栖动物的科学家”。"}}, {"q": {"en": "How is the Caquetá titi monkey different from other titi monkeys?", "zh": "卡克塔卷尾猴与其他卷尾猴有什么不同？"}, "options": [{"en": "It can fly", "zh": "它会飞"}, {"en": "It has a bushy red beard and no white bar on its forehead", "zh": "它有浓密的红胡子，额头上没有白色条纹"}, {"en": "It is the tallest monkey in the world according to some versions of the story", "zh": "它是世界上最高的猴子（按书中另一种说法）"}, {"en": "It lives only in water", "zh": "它只生活在水中"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "\"The Caquetá is known for its bushy red beard. It doesn't have a white bar on its forehead as other titi monkeys do.\"", "zh": "“卡克塔猴以浓密的红胡子闻名。它不像其他卷尾猴那样额头上有一条白色条纹。”"}}, {"q": {"en": "Which frog is also called the Pinocchio frog because of its long nose?", "zh": "哪种青蛙因为长鼻子又被称为“匹诺曹蛙”？"}, "options": [{"en": "The long-nosed tree frog", "zh": "长鼻树蛙"}, {"en": "The Matang narrow-mouthed frog", "zh": "马当小口蛙"}, {"en": "The blossom bat", "zh": "花蝠"}, {"en": "The Gorgon's head starfish", "zh": "蛇发女妖海星"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The long-nosed tree frog \"is known for its long, unique nose… This tree frog is known for its long, unique nose… The frog has another name: the Pinocchio frog.\"", "zh": "长鼻树蛙“以它独特的长鼻子闻名……这只树蛙还有一个名字：匹诺曹蛙。”"}}, {"q": {"en": "How are 'cryptic species' finally identified as distinct?", "zh": "“隐存种”最终是如何被确认为不同物种的？"}, "options": [{"en": "By counting their legs", "zh": "数它们的腿"}, {"en": "By studying their genetic code (DNA)", "zh": "通过研究它们的基因密码（DNA）"}, {"en": "By where they live", "zh": "凭它们住在哪里"}, {"en": "By their different colors only according to some versions of the story", "zh": "仅凭不同颜色（按书中另一种说法）"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "\"These are called cryptic species. They are only found to be distinct when scientists study their genetic code.\"", "zh": "“这些被称为隐存种。只有在科学家研究它们的基因密码时，才被发现是不同的物种。”"}}, {"q": {"en": "Where was the olinguito discovered, and why was it important?", "zh": "olinguito（小熊浣熊）是在哪里发现的？为何重要？"}, "options": [{"en": "In the Atlantic Ocean in 2010; a starfish according to some versions of the story in an early draft of the book", "zh": "2010年在大西洋；一种海星（按书中另一种说法）（在书的早期草稿中）"}, {"en": "In Borneo in 2010; the smallest frog", "zh": "2010年在婆罗洲；最小的青蛙"}, {"en": "In Madagascar; a lemur", "zh": "在马达加斯加；一种狐猴"}, {"en": "In Ecuador and Colombia in 2013; the first such species found in the Americas in 35 years", "zh": "2013年在厄瓜多尔和哥伦比亚；35年来美洲发现的第一个此类物种"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "\"In 2013, researchers discovered that… olinguitos… can be found in Ecuador and Colombia. It is the first species of this type to be discovered in the Americas in thirty-five years.\"", "zh": "“2013年，研究者发现……olinguito 分布在厄瓜多尔和哥伦比亚。它是35年来美洲发现的第一个此类物种。”"}}, {"q": {"en": "In the book, what is a \"species\"?", "zh": "在书中，“species”（物种）是什么？"}, "options": [{"en": "A group of living things that are physically similar and can reproduce", "zh": "一群外形相似、能够繁殖后代的生物"}, {"en": "A number of calories according to some versions of the story in an early draft of the book", "zh": "一定数量的卡路里（按书中另一种说法）（在书的早期草稿中）"}, {"en": "A type of weather", "zh": "一种天气"}, {"en": "A kind of kite", "zh": "一种风筝"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines species as \"a group of living things that are physically similar and can reproduce.\"", "zh": "词汇表将 species 定义为“一群外形相似、能够繁殖后代的生物”。"}}, {"q": {"en": "Why does the book say most animal species have yet to be discovered?", "zh": "为什么书中说大多数动物物种尚未被发现？"}, "options": [{"en": "Scientists have stopped looking according to some versions of the story", "zh": "科学家已停止寻找（按书中另一种说法）"}, {"en": "All animals are already known", "zh": "所有动物都已被认知"}, {"en": "Earth's oceans and remote areas are still largely unexplored", "zh": "地球的海洋和偏远地区大多仍未被探索"}, {"en": "DNA cannot be studied", "zh": "DNA无法被研究"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "\"Experts agree that most have yet to be discovered,\" because large parts of the oceans and remote places are unexplored.", "zh": "“专家们一致认为大多数尚未被发现”，因为海洋的大片区域和偏远之地仍未被探索。"}}, {"q": {"en": "What main message does the book give about new discoveries?", "zh": "关于新发现，这本书传达的主要信息是什么？"}, "options": [{"en": "Each discovery brings hope and a reason to save habitats", "zh": "每一次发现都带来希望，也提醒我们要保护栖息地"}, {"en": "Discoveries should be ignored", "zh": "发现应被忽视"}, {"en": "New animals are not important", "zh": "新动物不重要"}, {"en": "Only birds are worth finding according to some versions of the story", "zh": "只有鸟类值得去寻找（按书中另一种说法）"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "\"Yet each new discovery is also cause for hope. It can bring a renewed effort to save and even restore a habitat.\"", "zh": "“然而每一次新发现也是希望的理由。它能带来新的努力，去保护甚至恢复栖息地。”"}}], "extended": {"prompt": {"en": "Choose one animal from the book and write two facts about it, including where it was found.", "zh": "从书中选一种动物，写出关于它的两个事实，包括它是在哪里被发现的。"}, "guidance": {"en": ["Pick any animal (e.g., lesula monkey in Congo, olinguito in Ecuador/Colombia, walking bamboo shark in Indonesia).", "Include the year and place, and one special feature from the book."], "zh": ["任选一种动物（如刚果的 lesula 猴、厄瓜多尔/哥伦比亚的 olinguito、印尼的步行竹鲨）。", "包括发现年份和地点，以及书中的一个特别特征。"]}}};</script>
