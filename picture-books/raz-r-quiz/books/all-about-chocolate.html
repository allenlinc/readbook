ng the beans", "zh": "种下豆子"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The book's picture steps show: 1. Roasting, 2. Shelling, 3. Grinding, 4. Mixing, 5. Conching, 6. Pouring, 7. Cooling, 8. Wrapping.", "zh": "书中的步骤图显示：1.烘烤，2.去壳，3.研磨，4.混合，5.精磨，6.浇注，7.冷却，8.包装。"}}, {"q": {"en": "Which country eats the most chocolate per person each year?", "zh": "哪个国家每人每年吃的巧克力最多？"}, "options": [{"en": "Switzerland (22.4 lbs / 10.1 kg)", "zh": "瑞士（22.4磅 / 10.1公斤）"}, {"en": "The United States", "zh": "美国"}, {"en": "Mexico", "zh": "墨西哥"}, {"en": "China", "zh": "中国"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "\"The people of Switzerland consume more chocolate per person than anyone else in the world… 1 Switzerland … 22.4 lbs … 10.1 kg.\"", "zh": "“瑞士人人均消费的巧克力比世界上任何国家都多……1 瑞士……22.4磅……10.1公斤。”"}}, {"q": {"en": "Why does the book include a recipe for chocolate brownies?", "zh": "书中为什么包含巧克力布朗尼的食谱？"}, "options": [{"en": "To let readers try making a chocolate treat themselves", "zh": "让读者自己动手做一份巧克力点心"}, {"en": "To explain how to grow cacao", "zh": "为了解释如何种植可可"}, {"en": "To teach a history lesson", "zh": "为了上一堂历史课"}, {"en": "To describe the weather", "zh": "为了描述天气"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The \"Try This!\" section gives a brownie recipe so readers can \"think about how it was made\" after eating chocolate.", "zh": "“试试看！”一节给出布朗尼食谱，让读者在吃巧克力后“想想它是怎么做出来的”。"}}, {"q": {"en": "What is the book's main purpose?", "zh": "这本书的主要目的是什么？"}, "options": [{"en": "To explain where chocolate comes from and how it is made", "zh": "解释巧克力的来源以及它是如何制作的"}, {"en": "To tell a ghost story", "zh": "讲一个鬼故事"}, {"en": "To teach about kites", "zh": "教关于风筝的知识"}, {"en": "To describe a basketball game", "zh": "描述一场篮球比赛"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book covers where cacao grows, preparing beans, making chocolate, its history, and chocolate today.", "zh": "本书涵盖可可的生长地、豆子的处理
