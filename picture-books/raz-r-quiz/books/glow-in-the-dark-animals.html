er + salt + sugar", "zh": "水 + 盐 + 糖"}, {"en": "Sunlight + blood + skin", "zh": "阳光 + 血液 + 皮肤"}, {"en": "Bones + muscle + fat", "zh": "骨头 + 肌肉 + 脂肪"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The chemical equation given is 'Luciferin + Luciferase + Oxygen = Light.'", "zh": "书中给出的化学方程式是“荧光素 + 荧光素酶 + 氧气 = 光”。"}}, {"q": {"en": "How does the flashlight fish produce its glow?", "zh": "闪光鱼是如何发出光的？"}, "options": [{"en": "It makes light inside its own cells", "zh": "它在自身细胞内制造光"}, {"en": "It stores glowing bacteria in a pouch beneath each eye", "zh": "它在每只眼睛下方的囊袋中储存发光细菌"}, {"en": "It reflects moonlight", "zh": "它反射月光"}, {"en": "It eats fireflies", "zh": "它吃萤火虫"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "'The flashlight fish stores about a billion glowing bacteria inside a pouch beneath each eye.'", "zh": "“闪光鱼在每只眼睛下方的囊袋中储存约十亿个发光细菌。”"}}, {"q": {"en": "In what ocean zone do most glowing animals live (about 200–1,000 m deep)?", "zh": "大多数发光动物生活在哪个海洋区域（约水深200–1000米）？"}, "options": [{"en": "The twilight zone", "zh": "微光带"}, {"en": "The surface only", "zh": "仅在水面"}, {"en": "The deepest trench", "zh": "最深的海沟"}, {"en": "Rivers and lakes", "zh": "河流和湖泊"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Scientists call the area 'from about 200 meters... to about 1,000 meters' the twilight zone, where most glowing animals produce matching blue-green light.", "zh": "科学家把“约200米……到约1000米”的区域称为微光带，大多数发光动物在那里发出相应的蓝绿色光。"}}, {"q": {"en": "How is an animal's glow different from a lightbulb's light?", "zh": "动物的光与灯泡的光有何不同？"}, "options": [{"en": "It gives off very little heat (a cool glow)", "zh": "它几乎不发热（是冷光）"}, {"en": "It is much hotter", "zh": "它热得多"}, {"en": "It only works underwater", "zh": "它只能在水下起作用"}, {"en": "It changes color with sound", "zh": "它随声音变色"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "'A glowing animal gives off very little heat.' Unlike a lightbulb, 'This chemically created light... is a cool glow.'", "zh": "“发光动物几乎不散发热量。”与灯泡不同，“这种化学反应产生的光……是冷光。”"}}], "extended": {"prompt": {"en": "Imagine you discovered a new glow-in-the-dark animal. Describe what it looks like and how it uses its glow to survive.", "zh": "假设你会发现一种新的夜间发光动物。描述它的样子，以及它如何利用光来生存。"}, "guidance": {"en": ["Name one reason it glows (signal, hunt, hide, fool enemies).", "Decide whether it lives on land or in the sea."], "zh": ["说出它发光的一个原因（发信号、捕猎、隐藏、迷惑敌人）。", "判断它生活在陆地还是海洋。"]}}};</script>
