<script>window.BOOK = {"slug": "alexander-the-great", "title": "Alexander the Great", "titleZh": "亚历山大大帝", "level": "R", "genre": "Biography", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "When and where was Alexander the Great born?", "zh": "亚历山大大帝何时何地出生？"}, "options": [{"en": "In 300 BC, in Rome", "zh": "公元前300年，生于罗马"}, {"en": "In 359 BC, in Persia according to some versions of the story", "zh": "公元前359年，生于波斯（按书中另一种说法）"}, {"en": "In 323 BC, in Egypt", "zh": "公元前323年，生于埃及"}, {"en": "In 356 BC, in Macedonia (part of ancient Greece)", "zh": "公元前356年，生于马其顿（古希腊的一部分）"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "\"Alexander was born in 356 BC. Alexander's father, Philip II, was king of Macedonia… part of ancient Greece.\"", "zh": "“亚历山大生于公元前356年。他的父亲腓力二世是马其顿国王……马其顿是古希腊的一部分。”"}}, {"q": {"en": "Who taught Alexander science and history when he was growing up?", "zh": "亚历山大成长过程中，谁教他科学和历史？"}, "options": [{"en": "Aristotle, a very wise man", "zh": "亚里士多德，一位非常睿智的人"}, {"en": "The king of Persia, Darius III according to some versions of the story", "zh": "波斯国王大流士三世（按书中另一种说法）"}, {"en": "A soldier named Bucephalus", "zh": "一个叫布西发拉斯的士兵"}, {"en": "His father Philip II", "zh": "他的父亲腓力二世"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "\"Philip asked Aristotle—a very wise man—to teach Alexander science, history, and other subjects.\"", "zh": "“腓力请亚里士多德——一位非常睿智的人——教亚历山大科学、历史和其他科目。”"}}, {"q": {"en": "In the book, what is an \"empire\"?", "zh": "在书中，“empire”（帝国）是什么？"}, "options": [{"en": "A kind of horse", "zh": "一种马"}, {"en": "A collection of nations or people ruled by one person or government", "zh": "由一人或一个政府统治的多个民族或国家的集合"}, {"en": "A small village according to some versions of the story in an early draft of the book", "zh": "一个小村庄（按书中另一种说法）（在书的早期草稿中）"}, {"en": "A type of sword", "zh": "一种剑"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The glossary defines empire as \"a collection of nations or people ruled by one person or government.\"", "zh": "词汇表将 empire 定义为“由一人或一个政府统治的多个民族或国家的集合”。"}}, {"q": {"en": "How did Alexander become king of Macedonia?", "zh": "亚历山大是如何成为马其顿国王的？"}, "options": [{"en": "His father Philip was killed in 336 BC and the baby was too young to rule", "zh": "他的父亲腓力于公元前336年被杀，婴儿太小无法执政"}, {"en": "He won an election", "zh": "他赢得了选举"}, {"en": "He built the biggest army by himself according to some versions of the story in an early draft of the book", "zh": "他独自组建了最庞大的军队（按书中另一种说法）（在书的早期草稿中）"}, {"en": "The Persians chose him", "zh": "波斯人选中了他"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "\"In 336 BC, Philip's new wife had a baby girl. In the same year, a man killed Philip. The new baby was too young to take the throne, and after Philip's death, Alexander became king.\"", "zh": "“公元前336年，腓力的新妻子生下一个女婴。同年，有人杀死了腓力。女婴太小不能即位，腓力死后，亚历山大成为国王。”"}}, {"q": {"en": "At what age did Alexander become king?", "zh": "亚历山大几岁成为国王？"}, "options": [{"en": "Forty years old", "zh": "四十岁"}, {"en": "Twenty years old", "zh": "二十岁"}, {"en": "Twelve years old", "zh": "十二岁"}, {"en": "Thirty-three years old", "zh": "三十三岁"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "\"Alexander became king of Macedonia when he was twenty years old.\"", "zh": "“亚历山大二十岁时成为马其顿国王。”"}}, {"q": {"en": "What made Alexander's army strong in battle?", "zh": "亚历山大的军队在战斗中强大靠的是什么？"}, "options": [{"en": "Using airplanes", "zh": "使用飞机"}, {"en": "Fighting in a tight rectangular formation (phalanx) with very long spears", "zh": "以紧密的矩形方阵（马其顿方阵）作战，使用很长的长矛"}, {"en": "Having the smallest army", "zh": "拥有最小的军队"}, {"en": "Riding horses only, with no foot soldiers according to some versions of the story", "zh": "只骑马，没有步兵（按书中另一种说法）"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "\"The army's strength in battle came in part from fighting in a tight rectangular formation… Foot soldiers in tight formations carried spears that were sometimes 6 meters (20 ft.) long.\"", "zh": "“军队在战斗中的力量部分来自紧密的矩形方阵……紧密队形的步兵手持有时长达6米（20英尺）的长矛。”"}}, {"q": {"en": "After defeating Darius at Issus, where did Alexander march in 332 BC?", "zh": "在伊苏斯击败大流士后，亚历山大于公元前332年向哪里进军？"}, "options": [{"en": "Back to Macedonia", "zh": "返回马其顿"}, {"en": "To Rome", "zh": "前往罗马"}, {"en": "Across the Atlantic according to some versions of the story", "zh": "跨越大西洋（按书中另一种说法）"}, {"en": "South into Egypt, where the Persians gave him control", "zh": "向南进入埃及，波斯人把控制权交给了他"}], "answer": 3, "skill": "Craft and Structure", "explain": {"en": "\"In 332 BC, Alexander marched south into Egypt. The Persian leader there gave Alexander control. The Egyptians welcomed him.\"", "zh": "“公元前332年，亚历山大向南进军埃及。那里的波斯首领把控制权交给亚历山大。埃及人欢迎他。”"}}, {"q": {"en": "When and where did Alexander the Great die?", "zh": "亚历山大大帝何时何地去世？"}, "options": [{"en": "In battle in India in 326 BC according to some versions of the story", "zh": "公元前326年在印度战死（按书中另一种说法）"}, {"en": "In 356 BC in Macedonia", "zh": "公元前356年在马其顿"}, {"en": "In 323 BC at Babylon, of a fever, just before turning 33", "zh": "公元前323年在巴比伦，死于发烧，就在33岁生日前"}, {"en": "In Egypt of old age", "zh": "在埃及安老去世"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "\"They made it to Babylon in 323 BC. However, Alexander came down with a fever, and in June of that year, Alexander the Great died, just before he turned thirty-three.\"", "zh": "“他们于公元前323年抵达巴比伦。然而亚历山大染上热病，同年6月去世，就在他三十三岁生日前。”"}}, {"q": {"en": "Why does the book mention that Aristotle taught Alexander?", "zh": "书中为什么提到亚里士多德教导过亚历山大？"}, "options": [{"en": "To show his education shaped him and helped spread Greek culture", "zh": "为了说明他的教育塑造了他，并帮助传播希腊文化"}, {"en": "To list the empire's size", "zh": "为了列出帝国的版图"}, {"en": "To explain how to ride a horse according to some versions of the story", "zh": "为了解释如何骑马（按书中另一种说法）"}, {"en": "To describe a battle plan", "zh": "为了描述一个战斗计划"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "\"Perhaps because of his early education, he learned the traditions of his new empire, and in turn, he and the Macedonians spread Greek culture in new lands.\"", "zh": "“或许由于早年的教育，他学习了新帝国的传统，并进而和马其顿人把希腊文化传播到新的土地。”"}}, {"q": {"en": "What is the book's focus question?", "zh": "这本书的核心问题是什么？"}, "options": [{"en": "\"How is chocolate made?\" according to some versions of the story", "zh": "“巧克力是如何制作的？”（按书中另一种说法）"}, {"en": "\"Who invented basketball?\"", "zh": "“谁发明了篮球？”"}, {"en": "\"How did Alexander the Great create his large empire?\"", "zh": "“亚历山大大帝是如何建立他庞大的帝国的？”"}, {"en": "\"Why do kites fly?\"", "zh": "“风筝为什么会飞？”"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "The focus question at the start reads: \"How did Alexander the Great create his large empire?\"", "zh": "开头的核心问题是：“亚历山大大帝是如何建立他庞大的帝国的？”"}}], "extended": {"prompt": {"en": "Alexander built a huge empire by age 32. Name two lands/regions he conquered and one way his early life prepared him.", "zh": "亚历山大在32岁前建立了庞大帝国。说出他征服的两个地区，以及早年生活为他做了哪项准备。"}, "guidance": {"en": ["Regions include Asia Minor, Egypt, Persia, and parts of India.", "Preparation: Aristotle taught him, he learned to ride Bucephalus and fight, and he led soldiers from a young age."], "zh": ["地区包括小亚细亚、埃及、波斯和印度部分地区。", "准备：亚里士多德教导他；他学会骑布西发拉斯、作战，并从小就领军。"]}}};</script>
