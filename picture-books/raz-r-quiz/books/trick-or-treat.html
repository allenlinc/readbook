s", "explain": {"en": "Aster's paper says $25 'can provide immunization to protect a child for life against the six leading childhood diseases.'", "zh": "阿斯特的纸条上写着25美元“能为一名儿童提供终身免疫，预防六种主要儿童疾病”。"}}, {"q": {"en": "What lesson does Mike learn in the story?", "zh": "在这个故事中，迈克学到了什么道理？"}, "options": [{"en": "That stealing is the best way to get what you want.", "zh": "偷窃是得到自己想要东西的最好方法。"}, {"en": "That doing the right thing and helping others feels better than being greedy.", "zh": "做正确的事、帮助他人，比贪婪的感觉更好。"}, {"en": "That UNICEF is a bad organization.", "zh": "联合国儿童基金会是个糟糕的组织。"}, {"en": "That his sister is annoying.", "zh": "他妹妹很烦人。"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "Mike smiles at the end after returning the money and learning the $25 would help a child, showing he chose what is right.", "zh": "迈克归还钱款、得知25美元能帮到一个孩子后，终于笑了，说明他选择了正确的事。"}}, {"q": {"en": "How does the author show Mike's change of heart?", "zh": "作者如何展现迈克内心的转变？"}, "options": [{"en": "Mike never changes.", "zh": "迈克从未改变。"}, {"en": "Mike goes from wanting to steal to feeling good about helping poor kids.", "zh": "迈克从想偷钱，转变为因帮助贫困儿童而感到安心快乐。"}, {"en": "Mike becomes a thief.", "zh": "迈克变成了一个小偷。"}, {"en": "Mike runs away from home.", "zh": "迈克离家出走了。"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The Focus Question is 'What lesson does Mike learn?' and he ends by smiling, saying 'Wow,' pleased to have helped.", "zh": "焦点问题是“迈克学到了什么道理？”，而结尾他微笑着说“哇”，为自己帮了人而高兴。"}}, {"q": {"en": "According to the UNICEF fact box, how much did U.S. trick-or-treaters raise from 1950 to 2015?", "zh": "根据书中联合国儿童基金会的小知识框，美国小朋友在1950到2015年间共募得多少？"}, "options": [{"en": "$1 million", "zh": "100万美元"}, {"en": "$175 million", "zh": "1.75亿美元"}, {"en": "$1 billion", "zh": "10亿美元"}, {"en": "Nothing", "zh": "一分钱也没有"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The box states: 'From 1950 to 2015, they raised $175 million.'", "zh": "小知识框写道：“从1950到
