arn that human scent on a baby mammal can be a problem?", "zh": "本书为什么警告说婴儿哺乳动物身上沾上人的气味会有问题？"}, "options": [{"en": "It makes the baby smell like a flower", "zh": "这会让幼崽闻起来像花"}, {"en": "Its parents may not care for it because mammals have a better sense of smell", "zh": "它的父母可能因此不再照顾它，因为哺乳动物嗅觉更灵敏"}, {"en": "It attracts more insects", "zh": "这会吸引更多昆虫"}, {"en": "It helps the baby find food", "zh": "这能帮助幼崽找到食物"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says, \"Human scent on a baby animal may cause its parents not to care for it. This is truer for mammals than for birds because mammals have a better sense of smell.\"", "zh": "书中写道：“幼崽身上沾上人的气味可能导致其父母不再照顾它。对哺乳动物来说这比鸟类更明显，因为哺乳动物嗅觉更灵敏。"}}, {"q": {"en": "According to the book, which animals are more likely than others to carry rabies?", "zh": "根据本书，哪些动物比其他动物更可能携带狂犬病？"}, "options": [{"en": "rabbits and deer", "zh": "兔子和鹿"}, {"en": "bats, raccoons, foxes, and skunks", "zh": "蝙蝠、浣熊、狐狸和臭鼬"}, {"en": "songbirds", "zh": "鸣禽"}, {"en": "goldfish", "zh": "金鱼"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says, \"Bats, coyotes, raccoons, foxes, and skunks are more likely than other wild animals to carry rabies.\"", "zh": "书中写道：“蝙蝠、土狼、浣熊、狐狸和臭鼬比其他野生动物更可能携带狂犬病。"}}, {"q": {"en": "Why does the author tell readers that taking a baby bird that is hopping on the ground may not actually be helping it?", "zh": "作者为什么要告诉读者，把地上跳跃的雏鸟带走可能并不是在帮助它？"}, "options": [{"en": "to explain that the bird may just be learning to fly and its parents are nearby", "zh": "为了说明那只鸟可能只是在学飞，而它的父母就在附近"}, {"en": "to show that birds don't need parents", "zh": "为了说明鸟不需要父母"}, {"en": "to encourage kids to keep wild pets", "zh": "为了鼓励孩子们养野生动物当宠物"}, {"en": "to say all baby animals are dangerous", "zh": "为了说所有幼小动物都很危险"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book says, \"A young bird hopping on the ground may not be orphaned. It might just be learning how to fly. Baby birds often hop around as they practice... Their parents usually watch them from somewhere nearby.\"", "zh": "书中写道：“在地上跳跃的雏鸟可能并非孤儿。它可能只是在学习飞翔。雏鸟常在练习时四处跳跃……它们的父母通常在附近的某处观察着它们。"}}, {"q": {"en": "About how many animals at rehabilitation centers are too sick or injured to ever return to the wild?", "zh": "在野生动物恢复中心，大约有多少动物病得太重或伤得太重，永远无法回到野外？"}, "options": [{"en": "almost none", "zh": "几乎没有"}, {"en": "about half", "zh": "大约一半"}, {"en": "all of them", "zh": "全部"}, {"en": "exactly one quarter", "zh": "恰好四分之一"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book states, \"About half the animals at rehabilitation centers are too sick or too badly injured to ever go back into the wild.\"", "zh": "书中写道：“野生动物恢复中心里大约一半的动物病得太重或伤得太重，永远无法回到野外。"}}, {"q": {"en": "The book says cow's milk sold in grocery stores is—", "zh": "本书说超市里卖的牛奶是——"}, "options": [{"en": "the best food for all baby animals", "zh": "对所有幼小动物都是最好的食物"}, {"en": "very harmful to many baby animals and can kill them", "zh": "对许多幼小动物非常有害，甚至可能致死"}, {"en": "good for baby birds only", "zh": "只对雏鸟有益"}, {"en": "a type of wetland", "zh": "一种湿地"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The book says, \"the cow's milk sold in grocery stores is very harmful to many baby animals and can kill them.\"", "zh": "书中写道：“超市里卖的牛奶对许多幼小动物非常有害，甚至可能致死它们。"}}, {"q": {"en": "How are young orphaned animals usually released compared with adult animals?", "zh": "与成年动物相比，幼年孤儿动物通常是怎样被放归的？"}, "options": [{"en": "They are released more slowly, with a pen left open and food provided until they can cope", "zh": "它们被更缓慢地放归，留一个敞开的围栏并提供食物，直到它们能自立"}, {"en": "They are released immediately and never fed", "zh": "它们被立即放归且不再喂食"}, {"en": "Adult animals are released near where found, but young ones are sent far away", "zh": "成年动物在发现地附近放归，但幼崽被送到很远的地方"}, {"en": "There is no difference", "zh": "没有任何区别"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says some young animals \"are released slowly. Rehabbers put a pen in a safe place in the wild with the door left open... provide food for the animal until it is clear that the animal can find food for itself.\" Adult animals are released much faster.", "zh": "书中说一些幼小动物“被缓慢地放归。恢复员在野外安全处放置一个敞开的围栏……在动物能自行觅食前提供食物”。成年动物则放归得快得多。"}}, {"q": {"en": "What is the main purpose of the book Wildlife Rescue?", "zh": "《野生动物救援》这本书的主要目的是什么？"}, "options": [{"en": "to teach readers to respect wildlife and call trained rehabbers when an animal is in trouble", "zh": "教导读者尊重野生动物，并在动物遇险时呼叫受过训练的恢复员"}, {"en": "to explain how to keep wild animals as pets", "zh": "解释如何把野生动物当宠物饲养"}, {"en": "to describe how to hunt animals", "zh": "描述如何狩猎动物"}, {"en": "to argue that all wild animals should be left to die", "zh": "主张所有野生动物都该任其死亡"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The Conclusion says, \"You can help rehabbers' efforts by respecting wildlife and by calling a rehabber if you see an animal in trouble.\"", "zh": "结尾写道：“你可以通过尊重野生动物，并在看到动物遇险时呼叫恢复员，来帮助恢复员的工作。"}}], "extended": {"prompt": {"en": "Write a short public-service announcement telling kids what to do if they find a wild animal that seems hurt.", "zh": "写一则简短的公益公告，告诉孩子们如果发现看似受伤的野生动物该怎么做。"}, "guidance": {"en": ["State the two rules: do not touch the animal and call an adult right away.", "Explain why trained rehabbers—not untrained people—should help the animal."], "zh": ["说明两条规则：不要触碰动物，并立刻呼叫成年人。", "解释为什么应由受过训练的恢复员——而非未受训练的人——来救助动物。"]}}};</script>
