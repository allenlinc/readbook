<script>window.BOOK = {"slug": "inventions", "title": "Inventions", "titleZh": "发明", "level": "R", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Besides a physical thing, what else can an invention be?", "zh": "除了具体的物品，发明还可以是什么？"}, "options": [{"en": "A type of animal", "zh": "一种动物"}, {"en": "Only a machine", "zh": "只能是一台机器"}, {"en": "A country", "zh": "一个国家"}, {"en": "A process, such as a way of making cheese", "zh": "一种流程，比如制作奶酪的方法"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The book says: 'An invention can also be a process. Examples of processes are ways of making certain metals or glass, or even kinds of cheese.'", "zh": "书中说：“发明也可以是一种流程。流程的例子包括制造某些金属或玻璃的方法，甚至各种奶酪的制作方法。”"}}, {"q": {"en": "According to the book, what often leads to new inventions?", "zh": "根据书中内容，新发明往往是由什么带来的？"}, "options": [{"en": "Only luck", "zh": "只有运气"}, {"en": "One invention leads to another, and needs lead people to invent", "zh": "一项发明催生另一项发明，而需求促使人们去发明"}, {"en": "Watching television", "zh": "看电视"}, {"en": "Eating cheese", "zh": "吃奶酪"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book titles a section 'Inventions Follow Inventions' and quotes 'need is the mother of invention,' showing both ideas drive new inventions.", "zh": "书中有一节题为“发明催生发明”，并引用“需求是发明之母”，说明这两点都会催生新发明。"}}, {"q": {"en": "What is a 'patent'?", "zh": "什么是“patent（专利）”？"}, "options": [{"en": "A sport", "zh": "一项运动"}, {"en": "Legal rights ensuring only the owner can make or sell the invention", "zh": "一种法律权利，确保只有拥有者才能制造或出售该发明"}, {"en": "A type of computer", "zh": "一种计算机"}, {"en": "A kind of cheese", "zh": "一种奶酪"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The book says: 'A patent ensures that only the person who owns the patent can make or sell the invention.'", "zh": "书中说：“专利确保只有拥有专利的人才能制造或出售该发明。”"}}, {"q": {"en": "Why does the book say 'need is the mother of invention'?", "zh": "书中为什么说“需求是发明之母”？"}, "options": [{"en": "Because inventions are made by mothers", "zh": "因为发明都是由母亲做出的"}, {"en": "Because all inventors have children", "zh": "因为所有发明家都有孩子"}, {"en": "Because a need forces people to invent ways to solve a problem", "zh": "因为需求会迫使人们发明出解决问题的方法"}, {"en": "Because food causes inventions", "zh": "因为食物导致了发明"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book explains this means 'a need for something forces people to invent ways to solve that problem,' such as inventing spacesuits to explore space.", "zh": "书中解释，这意味着“对某样东西的需求会迫使人们发明出解决该问题的方法”，比如为探索太空而发明宇航服。"}}, {"q": {"en": "Who is said to have built the first programmable computer in 1941?", "zh": "书中说谁在1941年造出了第一台可编程计算机？"}, "options": [{"en": "Thomas Edison", "zh": "托马斯·爱迪生"}, {"en": "Konrad Zuse, a German", "zh": "德国的康拉德·楚泽"}, {"en": "George Washington", "zh": "乔治·华盛顿"}, {"en": "Wayne Gretzky", "zh": "韦恩·格雷茨基"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says: 'Many historians think that a German named Konrad Zuse invented the computer. In 1941, he used old materials to build the first computer.'", "zh": "书中说：“许多历史学家认为，一位名叫康拉德·楚泽的德国人发明了计算机。1941年，他用旧材料造出了第一台计算机。”"}}, {"q": {"en": "What is the author's main purpose in writing this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"en": "To explain what inventions are and how they build on one another", "zh": "为了解释什么是发明，以及发明如何相互推动"}, {"en": "To tell a fairy tale", "zh": "为了讲一个童话"}, {"en": "To describe one person's life", "zh": "为了描写一个人的生平"}, {"en": "To teach how to cook", "zh": "为了教人做饭"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book covers what an invention is, how one leads to another, and ends by encouraging readers that there is always more to invent.", "zh": "这本书介绍了什么是发明、发明如何相互催生，并在结尾鼓励读者：总还有更多东西值得发明。"}}, {"q": {"en": "According to the book's chain of inventions, what came after the wheel?", "zh": "根据书中的发明链条，轮子之后出现了什么？"}, "options": [{"en": "Computers, then the Internet", "zh": "计算机，然后是互联网"}, {"en": "Carts, then animals to pull them, then the gasoline engine, then cars and trains", "zh": "推车，接着是用动物拉车，再然后是汽油发动机，然后是汽车和火车"}, {"en": "Rockets, then the Moon", "zh": "火箭，然后是月球"}, {"en": "Nothing followed the wheel", "zh": "轮子之后什么都没出现"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says the wheel led to carts, then horses/oxen to pull them, then the gasoline engine in the 1800s, then steamboats, cars, trains, and airplanes.", "zh": "书中说轮子催生了推车，接着用马或牛拉车，再到19世纪的汽油发动机，然后是汽船、汽车、火车和飞机。"}}, {"q": {"en": "What are 'integrated circuits'?", "zh": "什么是“integrated circuits（集成电路）”？"}, "options": [{"en": "A law", "zh": "一部法律"}, {"en": "A type of sport", "zh": "一种运动"}, {"en": "A kind of food", "zh": "一种食物"}, {"en": "Tiny electronic parts that make a computer work", "zh": "使计算机工作的微小电子部件"}], "answer": 3, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'integrated circuits' as 'tiny electronic parts that make a computer work.'", "zh": "词汇表将“integrated circuits”定义为“使计算机工作的微小电子部件”。"}}, {"q": {"en": "How many patents did Thomas Edison hold?", "zh": "托马斯·爱迪生一共拥有多少项专利？"}, "options": [{"en": "None", "zh": "一项都没有"}, {"en": "1,093 patents", "zh": "1,093项专利"}, {"en": "100 patents", "zh": "100项专利"}, {"en": "10 patents", "zh": "10项专利"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book states: 'Thomas Edison held 1,093 different patents for the things he invented, including the lightbulb.'", "zh": "书中说：“托马斯·爱迪生拥有1,093项不同发明的专利，其中包括电灯泡。”"}}, {"q": {"en": "How does the book distinguish an invention from a discovery?", "zh": "书中是如何区分“发明”与“发现”的？"}, "options": [{"en": "A discovery is made by inventors", "zh": "发现是由发明家做出的"}, {"en": "An invention is only found in nature", "zh": "发明只存在于自然界"}, {"en": "An invention uses existing knowledge to make new devices; a discovery is learning about things that already exist", "zh": "发明是利用已有知识造出新装置；发现是认识已经存在的东西"}, {"en": "They mean exactly the same thing", "zh": "它们的意思完全一样"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book says discoveries happen 'when people first learn about things that already exist,' while inventors 'use existing knowledge to create new devices or processes.'", "zh": "书中说发现是“人们第一次认识到已经存在的东西”，而发明家“利用已有知识创造出新的装置或流程”。"}}], "extended": {"prompt": {"en": "Think of a problem in your daily life. What invention could you create to solve it, and what need would it meet?", "zh": "想一想你日常生活中遇到的一个问题。你可以发明什么来解决这个问题？它能满足什么需求？"}, "guidance": {"en": ["Remember the book's idea that 'need is the mother of invention.'", "Think about how one invention often leads to another, like the wheel did."], "zh": ["记住书中“需求是发明之母”的观点。", "想想一项发明如何像轮子那样往往催生另一项发明。"]}}};</script>
