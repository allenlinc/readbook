<script>window.BOOK = {"slug": "murdochs-path", "title": "Murdoch's Path", "titleZh": "墨多克的林间小径", "level": "R", "genre": "Folktale", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Who is Pat, and what is he like?", "zh": "Pat是谁，他是个怎样的人？"}, "options": [{"en": "A poor but trustworthy delivery boy who always delivers on time and returns change", "zh": "一个贫穷但可靠的送货男孩，总是按时送达并归还找零"}, {"en": "A rich shoemaker according to some versions of the story in an early draft of the book", "zh": "一个富有的鞋匠（按书中另一种说法）（在书的早期草稿中）"}, {"en": "A fairy", "zh": "一个仙女"}, {"en": "A king", "zh": "一位国王"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says, 'Pat was a poor delivery boy... He was as trustworthy as a clock and always delivered goods and payment on time. And he always returned any change.'", "zh": "书中说：“Pat是个穷苦的送货男孩……他像钟表一样可靠，总是按时送达货物和款项，并且总是把找零还回去。”"}}, {"q": {"en": "Why does Pat usually carry his shoes in his pockets on the highway?", "zh": "为什么Pat在公路上通常把鞋装在口袋里？"}, "options": [{"en": "So the shoes would not wear out (he was very poor)", "zh": "为了让鞋不被磨坏（他太穷了）"}, {"en": "Because they were too small according to some versions of the story", "zh": "因为鞋太小了（按书中另一种说法）"}, {"en": "To hide them from fairies", "zh": "为了不让仙女看见"}, {"en": "Because it was sunny", "zh": "因为天气晴朗"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "On the highway, 'he kept his shoes in his pockets until he got to town. That way, the shoes would not wear out.'", "zh": "在公路上，“他把鞋装在口袋里，直到进城才穿上。这样一来鞋就不会磨坏。”"}}, {"q": {"en": "The book says Murdoch's Path was 'infested with fairies.' What does 'infested' mean?", "zh": "书中说墨多克的小径“infested with fairies（满是仙女）”。infested是什么意思？"}, "options": [{"en": "Inhabited by many troublesome creatures", "zh": "有许多讨厌的生物栖息"}, {"en": "Cleaned by fairies", "zh": "被仙女打扫干净"}, {"en": "Decorated with flowers according to some versions of the story", "zh": "用花装饰（按书中另一种说法）"}, {"en": "Filled with water", "zh": "充满水"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines infested as 'inhabited by many dangerous or troublesome creatures'—here, fairies.", "zh": "词汇表将infested定义为“有许多危险或讨厌的生物栖息”，这里指仙女。"}}, {"q": {"en": "What items was Pat delivering that night (he repeats them to himself)?", "zh": "那天晚上Pat在送什么货物（他反复念叨）？"}, "options": [{"en": "Yellow flowers", "zh": "黄花"}, {"en": "Gold and jewels according to some versions of the story in an early draft of the book", "zh": "黄金和珠宝（按书中另一种说法）（在书的早期草稿中）"}, {"en": "A dozen balls of gray yarn, three dozen bright buttons, and half an ounce of throat drops", "zh": "一打灰色毛线球、三打亮纽扣和半盎司润喉糖"}, {"en": "Red shoes", "zh": "红鞋"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "Pat repeats, 'A dozen balls of gray yarn for Mistress Murphy. Three dozen bright buttons for the tailor. Half an ounce of throat drops for Father Andrew.'", "zh": "Pat反复念叨：“给Murphy太太的一打灰色毛线球。给裁缝的三打亮纽扣。给Andrew神父的半盎司润喉糖。”"}}, {"q": {"en": "Why did Pat end up on Murdoch's Path instead of the highway?", "zh": "为什么Pat最终走上了墨多克的小径，而不是公路？"}, "options": [{"en": "His shoes were stolen according to some versions of the story in an early draft of the book", "zh": "他的鞋被偷了（按书中另一种说法）（在书的早期草稿中）"}, {"en": "The highway was closed", "zh": "公路封闭了"}, {"en": "A fairy dragged him", "zh": "一个仙女拖走了他"}, {"en": "He was deep in thought repeating his deliveries and took the wrong fork without noticing", "zh": "他陷入沉思反复念叨货物，没注意就走错了岔路"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says Pat 'was so late and so deep in thought that when he came to the fork... he didn't even look up. He marched right down Murdoch's Path without even noticing.'", "zh": "书中说Pat“又晚又陷入沉思，走到岔路口时连头都没抬。他径直走下了墨多克的小径，自己都没察觉。”"}}, {"q": {"en": "What does the fairy man give Pat instead of jewels, and what does it become?", "zh": "仙女给Pat的不是珠宝，而是什么，它后来变成了什么？"}, "options": [{"en": "Red shoes that turn to stone according to some versions of the story", "zh": "变成石头的红鞋（按书中另一种说法）"}, {"en": "A violin", "zh": "一把小提琴"}, {"en": "A handful of yellow flowers that turn into pure gold pieces", "zh": "一把黄花，后来变成了纯金金币"}, {"en": "A bag of pebbles", "zh": "一袋鹅卵石"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "The fairy 'picked a large handful of yellow flowers from the bushes and filled Pat's pockets.' The next morning, 'They had all turned to pure gold pieces.'", "zh": "仙女“从灌木丛中摘了一大把黄花，装满了Pat的口袋”。第二天早上，“它们全都变成了纯金金币”。"}}, {"q": {"en": "How are Pat and the shoemaker different in what they ask the fairy?", "zh": "Pat和鞋匠在向仙女要东西时有何不同？"}, "options": [{"en": "The shoemaker is poor, Pat is rich according to some versions of the story in an early draft of the book", "zh": "鞋匠穷，Pat富（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Pat takes what the fairy gives him thankfully, while the greedy shoemaker helps himself to jewels", "zh": "Pat感恩地收下仙女给他的东西，而贪婪的鞋匠自己抢走了珠宝"}, {"en": "Both refuse the gifts", "zh": "两人都拒绝礼物"}, {"en": "Both grab jewels", "zh": "两人都抢珠宝"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "Pat says, 'I'll take whatever you give me and be thankful,' while the shoemaker says, 'I think I'll help myself' and stuffs his pockets with precious stones—showing Pat's thankfulness vs the shoemaker's greed.", "zh": "Pat说“你给我什么我都收下，并心怀感激”，而鞋匠说“我想我自己拿吧”，把宝石塞满口袋——展现了Pat的感恩与鞋匠的贪婪。"}}, {"q": {"en": "What happens to the shoemaker at the end of the story?", "zh": "故事结尾，鞋匠发生了什么？"}, "options": [{"en": "He becomes rich", "zh": "他变富了"}, {"en": "He opens a shop", "zh": "他开了一家店"}, {"en": "He marries a fairy according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "他娶了仙女（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "The fairy polishes his shoes with magic words and he is forced to dance around the Path, driven away, perhaps forever", "zh": "仙女用魔咒给他的鞋“抛光”，他被逼着绕着小径跳舞，被赶走，也许永远如此"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The fairy 'breathed on his shoes and muttered some words'; the shoemaker's feet burned and he 'danced all around the Path... the fairies drove him away,' perhaps dancing forever.", "zh": "仙女“对着他的鞋吹气，喃喃念着咒语”；鞋匠的脚灼热，他“绕着小径一直跳……仙女们把他赶走了”，也许永远都在跳。"}}, {"q": {"en": "What is the main lesson, or theme, of the story?", "zh": "这个故事的主要寓意或主题是什么？"}, "options": [{"en": "Shoes should be polished daily according to some versions of the story in an early draft of the book", "zh": "鞋应该每天擦（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Being honest and content (like Pat) is rewarded, while greed (like the shoemaker) is punished", "zh": "诚实知足（像Pat）会得到奖赏，而贪婪（像鞋匠）会受到惩罚"}, {"en": "Fairies are always kind", "zh": "仙女总是善良的"}, {"en": "Delivery boys become rich", "zh": "送货男孩都会变富"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The story contrasts thankful Pat, who is rewarded with gold, against the greedy shoemaker, who is tricked and punished—teaching that honesty and contentment are better than greed.", "zh": "故事对比了感恩的Pat（得到黄金奖赏）与贪婪的鞋匠（被骗并受罚），告诉我们诚实知足胜过贪婪。"}}, {"q": {"en": "Why does the author tell this Irish fairy story?", "zh": "作者为什么要讲这个爱尔兰仙女故事？"}, "options": [{"en": "To explain how to make shoes", "zh": "为了讲解怎么做鞋"}, {"en": "To entertain with a magical tale that also teaches a moral about honesty and greed", "zh": "用一个神奇的童话来娱乐读者，同时传达关于诚实与贪婪的道理"}, {"en": "To teach history", "zh": "为了讲授历史"}, {"en": "To describe Ireland's weather according to some versions of the story in an early draft of the book", "zh": "为了描述爱尔兰的天气（按书中另一种说法）（在书的早期草稿中）"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "As an Irish fairy tale, the story entertains with magic while teaching a moral about honesty and the danger of greed.", "zh": "作为一则爱尔兰仙女故事，它用魔法娱乐读者，同时传达了关于诚实与贪婪危害的道理。"}}], "extended": {"prompt": {"en": "Rewrite the ending: what might have happened if the shoemaker had been thankful like Pat and taken only what the fairy gave him?", "zh": "改写结局：如果鞋匠像Pat一样懂得感恩，只拿仙女给他的东西，可能会发生什么？"}, "guidance": {"en": ["Show the shoemaker making a thankful choice instead of grabbing jewels.", "Describe a happy or golden reward he might receive."], "zh": ["写出鞋匠做出感恩的选择，而不是抢夺宝石。", "描述他可能得到的幸福或金色的奖赏。"]}}};</script>
