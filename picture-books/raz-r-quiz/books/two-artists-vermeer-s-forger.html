ple.", "zh": "阴暗而简单。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book says Vermeer 'was a genius at using light' and 'chose soft colors to create a mood.'", "zh": "书中说维米尔“是运用光线的天才”，并“选择柔和的色彩来营造情绪”。"}}, {"q": {"en": "According to the book, about how many known works did Vermeer paint?", "zh": "根据这本书，维米尔大约画了多少幅已知作品？"}, "options": [{"en": "About five.", "zh": "大约五幅。"}, {"en": "Exactly ten.", "zh": "正好十幅。"}, {"en": "About thirty-five.", "zh": "大约三十五幅。"}, {"en": "Over one hundred. according to some versions of the story", "zh": "一百多幅。（按书中另一种说法）"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book states: 'Experts have determined Vermeer painted about thirty-five known works of art.'", "zh": "书中写道：“专家们确定维米尔画了大约三十五幅已知作品。”"}}], "extended": {"prompt": {"en": "Imagine you are an art expert in 1993. Write a short report explaining how you would test a painting to decide if it is a real Vermeer or a forgery.", "zh": "想象你是1993年的一位艺术专家。写一份简短的报告，说明你会如何检验一幅画，判断它是维米尔真迹还是伪造品。"}, "guidance": {"en": ["Mention studying the paints, brushes, and canvas like the experts in the book.", "Explain that comparing the style and use of light to real Vermeers is key."], "zh": ["提到像书中的专家那样研究颜料、画笔和画布。", "说明将该画的风格和用光方式与真正的维米尔作品对比是关键。"]}}};</script>
