<script>window.BOOK = {"slug": "charlene-s-sea-of-cortez-journal", "title": "Charlene's Sea of Cortez Journal", "titleZh": "查伦的科尔特斯海日记", "level": "R", "genre": "Narrative Nonfiction", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "How old was Charlene when she wrote her Sea of Cortez journal?", "zh": "查伦写科尔特斯海日记时几岁？"}, "options": [{"en": "Eight years old", "zh": "八岁"}, {"en": "Six years old", "zh": "六岁"}, {"en": "Ten years old", "zh": "十岁"}, {"en": "Twelve years old", "zh": "十二岁"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The journal states: \"My name is Charlene, and I am eight years old.\"", "zh": "日记中写道：“我叫查伦，今年八岁。”"}}, {"q": {"en": "At which place did Charlene and her family board the ship Sea Bird?", "zh": "查伦一家是在哪个地方登上“海鸟号”船的？"}, "options": [{"en": "La Paz", "zh": "拉巴斯"}, {"en": "Guaymas", "zh": "瓜伊马斯"}, {"en": "Bahia de Los Angeles", "zh": "洛杉矶湾"}, {"en": "Catalina Island", "zh": "卡塔利娜岛"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says: \"Last night, we boarded the ship Sea Bird at La Paz.\"", "zh": "书中写道：“昨晚，我们在拉巴斯登上了‘海鸟号’船。”"}}, {"q": {"en": "In the book, what is a \"boojum\"?", "zh": "在书中，“boojum”是什么？"}, "options": [{"en": "A type of whale", "zh": "一种鲸鱼"}, {"en": "A tree that looks like an upside-down carrot", "zh": "一种看起来像倒立胡萝卜的树"}, {"en": "A kind of sea lion", "zh": "一种海狮"}, {"en": "A small desert bird according to some versions of the story", "zh": "一种小沙漠鸟（按书中另一种说法）"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The glossary says a boojum is \"a tree that looks like an upside-down carrot and only grows on the Baja California peninsula.\"", "zh": "词汇表说明 boojum 是“一种看起来像倒立胡萝卜、只生长在加利福尼亚半岛的树”。"}}, {"q": {"en": "What activity did Charlene do at Los Islotes on Monday?", "zh": "星期一在洛斯伊斯洛特斯岛，查伦做了什么活动？"}, "options": [{"en": "Watch dolphins with binoculars according to some versions of the story", "zh": "用望远镜看海豚（按书中另一种说法）"}, {"en": "Kayak in a two-seater", "zh": "划双
