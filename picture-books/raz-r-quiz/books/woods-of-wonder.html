ne forever", "zh": "它们需要保护，因为一旦消失，其美丽与科学价值可能永远丧失"}, {"en": "They are no longer important to study", "zh": "它们已不再值得研究"}, {"en": "They should only be protected in Japan", "zh": "它们只应在日本受到保护"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book warns, \"Once gone, the beauty and scientific information that these old-growth forests hold may be lost forever.\"", "zh": "书中警告：“一旦消失，这些原始森林所蕴含的美丽和科学信息可能永远丧失。"}}], "extended": {"prompt": {"en": "Pretend you are a park ranger. Write a short paragraph convincing visitors to protect old-growth forests, using details from the book.", "zh": "假设你是一名公园管理员。运用书中的细节，写一小段话说服游客保护原始森林。"}, "guidance": {"en": ["Mention that old-growth forests must be at least 150 years old and host unique species.", "Explain what could be lost forever if these forests disappear."], "zh": ["提到原始森林必须至少有150年树龄，并栖息着独特的物种。", "解释如果这些森林消失，什么会永远丧失。"]}}};</script>
