imals by dropping food", "zh": "他们投放食物喂养动物"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says scientists 'tag some animals with electronic sensors' and 'a satellite can track the signal from the tag attached to the animal's fin or back.'", "zh": "书中说科学家'用电子传感器给一些动物做标记'，'卫星可以追踪附着在动物鳍或背部标签发出的信号'。"}}, {"q": {"en": "What was the Census of Marine Life?", "zh": "什么是'海洋生物普查'（Census of Marine Life）？"}, "options": [{"en": "A ten-year study counting sea animals worldwide, released in 2010 with data from over 540 expeditions", "zh": "一项历时十年、统计全球海洋动物的研究，于 2010 年发布，数据来自 540 多次考察"}, {"en": "A one-day beach cleanup", "zh": "一次为期一天的海滩清理"}, {"en": "A cookbook of fish recipes", "zh": "一本鱼类食谱"}, {"en": "A map of the stars", "zh": "一张星图"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says oceanographers 'studied and counted animals for ten years' and the 'Census of Marine Life,' released in 2010, used 'data from more than 540 different expeditions.'", "zh": "书中说海洋学家'用了十年研究和统计动物'，而 2010 年发布的'海洋生物普查'使用了'540 多次考察的数据'。"}}, {"q": {"en": "What surprising fact does the book give about the deep ocean floor?", "zh": "本书对深海海底给出了什么令人惊讶的事实？"}, "options": [{"en": "It has over one million hot volcanoes, with water hot enough (400°C) to melt lead", "zh": "那里有超过一百万座炽热的火山，水温高达 400°C，足以熔化铅"}, {"en": "It is completely flat and empty", "zh": "那里完全平坦且空无一物"}, {"en": "It is covered in ice all year", "zh": "那里终年被冰覆盖"}, {"en": "It has no heat at all", "zh": "那里完全没有热量"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says the Deep Ocean Zone 'has more than one million hot volcanoes' and water at a volcano can be '400°C (752°F), which is hot enough to melt lead.'", "zh": "书中说深海区'有一百多万座炽热的火山'，火山处的水温可达'400°C（752°F），足以熔化铅'。"}}, {"q": {"en": "How do some deep-ocean animals survive in such extreme heat or cold?", "zh": "一些深海动物如何在极端的炎热或寒冷中生存？"}, "options": [{"en": "Some use sulfur instead of sunlight; others make
