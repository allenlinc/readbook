cording to some versions of the story", "zh": "一天中的日照量（按书中另一种说法）"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines elevation as 'the height of land above sea level.'", "zh": "词汇表将 elevation 定义为'陆地高出海平面的高度'。"}}, {"q": {"en": "Why might a place right at the equator still have a cold climate?", "zh": "为什么一个正好在赤道上的地方仍然可能气候寒冷？"}, "options": [{"en": "If it is near the North Pole", "zh": "如果它靠近北极"}, {"en": "If it is at a high elevation, like the top of a mountain", "zh": "如果它处于高海拔，比如山顶"}, {"en": "If it is very close to the ocean according to some versions of the story", "zh": "如果它非常靠近海洋（按书中另一种说法）"}, {"en": "If it has many clouds", "zh": "如果它有很多云"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says, 'Imagine you were at the equator standing on a high mountaintop. You would be in a cold climate!' because temperature drops about 3 degrees Fahrenheit per 1,000 feet of elevation.", "zh": "书中说：'想象你站在赤道上的一座高山顶。你所处的会是一个寒冷的气候！'因为海拔每升高 1000 英尺，气温约下降 3 华氏度。"}}, {"q": {"en": "According to the book, what causes the seasons in places away from the equator?", "zh": "根据本书，是什么造成了赤道以外地区的季节变化？"}, "options": [{"en": "Earth's tilt on its axis as it orbits the Sun", "zh": "地球绕太阳公转时地轴的倾斜"}, {"en": "The moon changing shape", "zh": "月亮形状的变化"}, {"en": "The number of clouds increasing according to some versions of the story", "zh": "云的数量增加（按书中另一种说法）"}, {"en": "The ocean currents speeding up", "zh": "洋流加速"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book states, 'Climates in other places on Earth change with the seasons because of Earth's tilt.'", "zh": "书中写道：'地球上其他地方气候随季节变化，是因为地球的地轴倾斜。'"}}, {"q": {"en": "What is the author's main purpose in writing this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"en": "To describe one single city's history", "zh": "描述一座城市的历史"}, {"en": "To teach how to fly a plane", "zh": "教人们如何驾驶飞机"}, {"en": "To explain the forces that create Earth's different climate
