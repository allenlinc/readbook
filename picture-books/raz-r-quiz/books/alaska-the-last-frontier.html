<script>window.BOOK = {"slug": "alaska-the-last-frontier", "title": "Alaska: The Last Frontier", "titleZh": "阿拉斯加：最后的边疆", "level": "R", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "According to the book, why do some people call Alaska \"The Last Frontier\"?", "zh": "根据本书，为什么有些人把阿拉斯加称为“最后的边疆”？"}, "options": [{"en": "Because it has the longest coastline in the world", "zh": "因为它拥有世界上最长的海岸线"}, {"en": "Because gold was the last resource found there", "zh": "因为黄金是那里最后被发现的资源"}, {"en": "Because it has such huge, empty spaces", "zh": "因为它有着如此广袤而空旷的土地"}, {"en": "Because it was the last state to join the United States", "zh": "因为它是最后一个加入美国的州"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "The book says, \"Because it has such huge, empty spaces, some people call Alaska 'The Last Frontier.'\"", "zh": "书中写道：“因为它有着如此广袤而空旷的土地，有些人把阿拉斯加称为‘最后的边疆’。"}}, {"q": {"en": "What is the tallest mountain in North America, located in Alaska?", "zh": "位于阿拉斯加的北美洲最高峰是哪座山？"}, "options": [{"en": "Mount Fuji", "zh": "富士山"}, {"en": "The Rocky Mountains", "zh": "落基山脉"}, {"en": "Mount Everest", "zh": "珠穆朗玛峰"}, {"en": "Mount McKinley", "zh": "麦金利山"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The book states, \"Alaska is home to Mount McKinley, the tallest mountain in North America.\"", "zh": "书中写道：“阿拉斯加是麦金利山的所在地，它是北美洲最高的山峰。"}}, {"q": {"en": "The phrase \"land of the midnight sun\" in the book refers to the most northern part of Alaska where—", "zh": "书中“午夜太阳之地”这个说法指的是阿拉斯加最北部的地区，在那里——"}, "options": [{"en": "the Sun rises in the west", "zh": "太阳从西边升起"}, {"en": "the Sun is always shining at midnight in winter according to some versions of the story", "zh": "冬天午夜时太阳始终照耀（按书中另一种说法）"}, {"en": "the Moon is brighter than the Sun", "zh": "月亮比太阳更亮"}, {"en": "the Sun does not fully set for 24 hours during the summer solstice", "zh": "在夏至期间太阳连续24小时都不会完全落下"}], "answer": 3, "skill": "Craft and Structure", "explain": {"en": "The book explains, \"Above the Arctic Circle, the Sun does not fully set for 24 hours during the summer solstice.\"", "zh": "书中解释道：“在北极圈以北，夏至期间太阳连续24小时都不会完全落下。"}}, {"q": {"en": "In what year did the United States buy Alaska from Russia?", "zh": "美国是在哪一年从俄国手中买下阿拉斯加的？"}, "options": [{"en": "1867", "zh": "1867年"}, {"en": "1959 according to some versions of the story", "zh": "1959年（按书中另一种说法）"}, {"en": "1741", "zh": "1741年"}, {"en": "1896", "zh": "1896年"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says, \"In 1867, the United States bought Alaska from Russia.\"", "zh": "书中写道：“1867年，美国从俄国手中买下了阿拉斯加。"}}, {"q": {"en": "How does the book say Alaska's size compares to Texas?", "zh": "本书中说阿拉斯加的面积与得克萨斯州相比如何？"}, "options": [{"en": "Alaska is more than twice the size of Texas", "zh": "阿拉斯加的面积超过得克萨斯州的两倍"}, {"en": "Alaska is smaller than Texas but larger than Mexico", "zh": "阿拉斯加小于得克萨斯州但大于墨西哥"}, {"en": "Texas is more than twice the size of Alaska", "zh": "得克萨斯州的面积超过阿拉斯加的两倍"}, {"en": "Alaska is about the same size as Texas", "zh": "阿拉斯加和得克萨斯州面积差不多"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book states, \"Alaska is more than twice the size of the next-largest state, Texas.\"", "zh": "书中写道：“阿拉斯加的面积超过第二大州得克萨斯州的两倍。"}}, {"q": {"en": "Why does the author point out that Alaska has no income or sales tax and even pays citizens money each year?", "zh": "作者为什么要指出阿拉斯加没有所得税或销售税，甚至每年还给居民发钱？"}, "options": [{"en": "To show that Alaska's oil wealth makes the state very rich", "zh": "为了说明阿拉斯加的石油财富让这个州非常富有"}, {"en": "To describe the climate", "zh": "为了描述气候"}, {"en": "To compare Alaska with Mexico", "zh": "为了将阿拉斯加与墨西哥作比较"}, {"en": "To explain why people leave Alaska according to some versions of the story", "zh": "为了解释为什么人们离开阿拉斯加（按书中另一种说法）"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book says Alaska makes so much money on oil that it has no income or sales tax and pays citizens nearly $2,000 a year, showing oil's wealth.", "zh": "书中说阿拉斯加靠石油赚了很多钱，因此没有所得税和销售税，还每年给居民近2000美元，显示了石油带来的财富。"}}, {"q": {"en": "Who designed Alaska's winning state flag as a seventh grader?", "zh": "谁在七年级时就设计了阿拉斯加州旗的获奖作品？"}, "options": [{"en": "Dane Dehler (the author)", "zh": "戴恩·德勒（本书作者）"}, {"en": "John Benson", "zh": "约翰·本森"}, {"en": "James Marshall", "zh": "詹姆斯·马歇尔"}, {"en": "Sam Brannan", "zh": "萨姆·布兰南"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says, \"Seventh grader John Benson created the winning design\" for Alaska's state flag.", "zh": "书中写道：七年级学生约翰·本森设计了阿拉斯加州旗的获奖作品。"}}, {"q": {"en": "The aurora borealis, or northern lights, shines when tiny particles from the Sun are pulled toward Earth by—", "zh": "北极光（即北极光）发光，是因为来自太阳的微小粒子被地球的什么吸引过来——"}, "options": [{"en": "the Moon's light", "zh": "月亮的光"}, {"en": "Earth's magnetic field", "zh": "地球的磁场"}, {"en": "the planet's gravity", "zh": "地球的引力"}, {"en": "Alaska's oil pipelines", "zh": "阿拉斯加的石油管道"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The book explains the aurora borealis shines \"when tiny particles from the Sun get pulled toward Earth by the planet's magnetic field.\"", "zh": "书中解释，北极光发光“是因为来自太阳的微小粒子被地球的磁场吸引过来”。"}}, {"q": {"en": "What discovery in 1968 changed Alaska's economy and became its biggest business?", "zh": "1968年的什么发现改变了阿拉斯加的经济，并成为它最大的产业？"}, "options": [{"en": "gold in the Yukon", "zh": "育空地区的黄金"}, {"en": "the Trans-Alaska Pipeline according to some versions of the story", "zh": "跨阿拉斯加管道（按书中另一种说法）"}, {"en": "oil on the northern coast", "zh": "北部海岸的石油"}, {"en": "the aurora borealis", "zh": "北极光"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book states, \"In 1968, oil was discovered on Alaska's northern coast. Oil has completely changed Alaska's economy. It is the biggest business in Alaska today.\"", "zh": "书中写道：“1968年，在阿拉斯加北部海岸发现了石油。石油彻底改变了阿拉斯加的经济。它是如今阿拉斯加最大的产业。"}}, {"q": {"en": "What main tension does the author describe about Alaska's future?", "zh": "作者描述了关于阿拉斯加未来的什么主要矛盾？"}, "options": [{"en": "Whether to keep the state flag", "zh": "是否要保留州旗"}, {"en": "Whether to drill for oil or preserve wilderness and wildlife", "zh": "是要开采石油还是保护荒野与野生动物"}, {"en": "Whether to join Canada or the United States", "zh": "是要加入加拿大还是美国"}, {"en": "Whether to build more cities or keep it empty according to some versions of the story", "zh": "是要建更多城市还是保持空旷（按书中另一种说法）"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book describes a debate: \"Some people say that drilling and shipping oil hurt the state's wildlife... Many people want to set aside huge areas... that cannot be drilled for oil.\"", "zh": "书中描述了一种争论：“一些人说开采和运输石油会损害该州的野生动物……许多人希望划出大片不能开采石油的区域。"}}], "extended": {"prompt": {"en": "Imagine you are a travel writer visiting Alaska. Write three sentences describing what makes Alaska 'America's Last Frontier' using facts from the book.", "zh": "假设你是一位到访阿拉斯加的旅行作家。运用书中的事实，写三句话描述是什么让阿拉斯加成为“美国最后的边疆”。"}, "guidance": {"en": ["Use at least two facts from the book, such as its huge empty spaces, Mount McKinley, or the midnight sun.", "Explain why the nickname fits Alaska's size, climate, or wildlife."], "zh": ["至少使用书中两个事实，例如广袤的空旷地带、麦金利山或午夜太阳。", "解释这个别称为何符合阿拉斯加的面积、气候或野生动物。"]}}};</script>
