atholic Church to today, showing its purpose is to explain how the holiday changed and where traditions came from.", "zh": "书中追溯了万圣节从凯尔特人、经天主教会到今天的发展，说明其目的是解释这个节日如何演变以及传统的来源。"}}, {"q": {"en": "When did trick-or-treaters begin to receive candy (instead of fruit, toys, coins)?", "zh": "“不给糖就捣蛋”的孩子们从什么时候开始收到糖果（而不是水果、玩具、硬币）？"}, "options": [{"en": "In the 1950s", "zh": "在1950年代"}, {"en": "In the 1800s according to some versions of the story", "zh": "在1800年代（按书中另一种说法）"}, {"en": "In the 1930s", "zh": "在1930年代"}, {"en": "In 1896", "zh": "在1896年"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says, 'Trick-or-treaters began to receive candy in the 1950s.'", "zh": "书中说：“不给糖就捣蛋的孩子们在1950年代开始收到糖果。”"}}, {"q": {"en": "According to the book, what did the Celtic priests believe they could do during Samhain?", "zh": "根据书中内容，凯尔特祭司相信自己能在萨温节期间做什么？"}, "options": [{"en": "Fly", "zh": "飞翔"}, {"en": "Speak to animals", "zh": "与动物说话"}, {"en": "Control the weather", "zh": "控制天气"}, {"en": "See the future", "zh": "预见未来"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The Celts 'believed that priests could see the future during this festival. The predictions made at Samhain were an important part of planning for the new year.'", "zh": "凯尔特人“相信祭司在这个节日里能预见未来。萨温节做出的预言是规划新一年的重要内容。”"}}, {"q": {"en": "What point does the author make about Halloween today?", "zh": "作者对今天的万圣节提出了什么观点？"}, "options": [{"en": "It mixes old traditions with new ones and keeps changing", "zh": "它把古老传统与新元素融合，并不断变化"}, {"en": "It is exactly the same as in ancient times according to some versions of the story", "zh": "它和古代完全一样（按书中另一种说法）"}, {"en": "Only children celebrate it", "zh": "只有儿童庆祝它"}, {"en": "It is no longer celebrated", "zh": "它已不再被庆祝"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The author writes, 'Its traditions keep changing, mixing the old with the new' and 'Halloween today looks very different' from the past.", "zh": "作者写道：“它的传统不断变化，把旧与新融合在一起”，而且“今天的万圣节看起来与过去大不相同”。"}}, {"q": {"en": "What is the legend of \"Stingy Jack\" about?", "zh": "“吝啬鬼杰克（Stingy Jack）”的传说讲的是什么？"}, "options": [{"en": "A child who invented trick-or-treating according to some versions of the story", "zh": "一个发明“不给糖就捣蛋”的孩子（按书中另一种说法）"}, {"en": "A farmer who grew the first pumpkin", "zh": "一个种出第一个南瓜的农民"}, {"en": "A man who carved a turnip with a candle to light his way as a roaming spirit", "zh": "一个男人死后成为游荡的幽灵，在芜菁上挖洞插蜡烛来照明"}, {"en": "A witch who flew on a broom", "zh": "一个骑扫帚飞的女巫"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "Stingy Jack's spirit 'was forced to roam in the darkness... he carved a hole in a turnip and placed a candle inside,' giving the name 'Jack-o'-lantern.'", "zh": "吝啬鬼杰克的灵魂“被迫在黑暗中游荡……他在芜菁上挖了个洞，放进一支蜡烛”，由此得名“Jack-o'-lantern（杰克灯）”。"}}], "extended": {"prompt": {"en": "Compare Halloween today with how it began long ago. Write a few sentences about one tradition that came from the past and one way it has changed.", "zh": "比较今天的万圣节和它古老的起源。写几句话，说说一个来自过去的传统，以及一个它发生的变化。"}, "guidance": {"en": ["Name one Halloween tradition that came from the past.", "Describe one way Halloween celebrations have changed over time."], "zh": ["说出一个来自过去的万圣节传统。", "描述万圣节庆祝方式随时间发生的一个变化。"]}}};</script>
