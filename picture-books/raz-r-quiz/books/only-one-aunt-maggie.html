狗；土豆泥→烤红薯"}, {"en": "Apples → oranges", "zh": "苹果→橘子"}, {"en": "Water → soda", "zh": "水→汽水"}, {"en": "Carrots → candy", "zh": "胡萝卜→糖果"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The poster lists less-healthy foods—'white flour tortillas, hot dogs, and mashed potatoes'—and healthier swaps: 'wheat tortillas, soy dogs, and baked sweet potatoes.'", "zh": "海报列出了较不健康的食物——“白面粉玉米饼、热狗、土豆泥”——以及更健康的替换：“全麦玉米饼、素热狗、烤红薯”。"}}, {"q": {"en": "What does the poster suggest when you crave sweet chocolate?", "zh": "当你馋甜巧克力时，海报建议怎么做？"}, "options": [{"en": "Try a fruity yogurt, Jello, or dried fruit", "zh": "试试水果酸奶、果冻或干果"}, {"en": "Eat a whole chocolate bar", "zh": "吃一整块巧克力"}, {"en": "Drink soda", "zh": "喝汽水"}, {"en": "Eat hot dogs", "zh": "吃热狗"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The poster says, 'If you crave sweet chocolate, try a fruity yogurt, Jello, or dried fruit.'", "zh": "海报上写道：“如果你馋甜巧克力，可以试试水果酸奶、果冻或干果。”"}}, {"q": {"en": "The glossary defines 'pledge' as:", "zh": "词汇表中“pledge”的定义是："}, "options": [{"en": "To promise", "zh": "承诺"}, {"en": "To forget", "zh": "忘记"}, {"en": "To eat", "zh": "吃"}, {"en": "To build", "zh": "建造"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines pledge as 'to promise.' Aunt Maggie says, 'Tonight I pledge to you and Dario that I will take this poster home with me, and I will follow it.'", "zh": "词汇表将pledge定义为“承诺”。Maggie阿姨说：“今晚我向你和Dario承诺，我会把这张海报带回家，并且照着做。”"}}, {"q": {"en": "What result does Aunt Maggie's letter report three months later?", "zh": "三个月后，Maggie阿姨的信里报告了什么结果？"}, "options": [{"en": "She lost 12 pounds thanks to the poster", "zh": "多亏了那张海报，她减了12磅"}, {"en": "She gained weight", "zh": "她长胖了"}, {"en": "She moved away", "zh": "她搬走了"}, {"en": "She became a pilot", "zh": "她成了飞行员"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Aunt Maggie's letter says, 'I've already lost 12 pounds thanks to your excellent poster!' signed 'Th
