e a paragraph describing how the story would change.", "zh": "假设鸟儿没有吃掉汉塞尔的面包屑。写一段话，描述故事会有怎样的不同。"}, "guidance": {"en": ["Think about whether the children would have found their way home.", "Consider what might have happened with the witch in the forest."], "zh": ["想一想孩子们是否能找到回家的路。", "设想一下森林里的女巫情节可能会怎样发展。"]}}};</script>
