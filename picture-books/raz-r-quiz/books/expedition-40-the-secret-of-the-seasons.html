": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says the North Atlantic Drift 'makes Western Europe's climates warmer,' and Madrid's location on the Iberian Peninsula (water on three sides) 'causes winters... to be cool, but not too cold.'", "zh": "书中说，北大西洋暖流'使西欧气候更温暖'，而马德里位于伊比利亚半岛（三面环水），这'使冬季……凉爽但不至于太冷'。"}}, {"q": {"en": "What did the Spanish build in Valdivia, Chile, and why?", "zh": "西班牙人在智利的瓦尔迪维亚建造了什么，原因是什么？"}, "options": [{"en": "Forts, to protect the city from pirates and invaders who came by sea", "zh": "堡垒，以保护城市免受从海上而来的海盗和入侵者侵袭"}, {"en": "A long wall stretching across the mountains", "zh": "横跨山脉的长城"}, {"en": "A giant aquarium for sea lions", "zh": "为海狮建造的巨大水族馆"}, {"en": "A weather station to study the seasons", "zh": "研究季节的气象站"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book notes the Spanish built forts in Valdivia 'to protect against invaders' who arrived by ship along the coast at 40 degrees south.", "zh": "书中指出，西班牙人在瓦尔迪维亚建造堡垒，以'防御入侵者'——那些沿南纬 40 度海岸乘船而来的人。"}}, {"q": {"en": "What is the 'secret of the seasons' the book reveals?", "zh": "本书揭示的'季节的秘密'是什么？"}, "options": [{"en": "Earth's tilt on its axis, which makes the two hemispheres have opposite seasons", "zh": "地球的地轴倾斜，使南北半球出现相反的季节"}, {"en": "The changing distance to the Moon", "zh": "到月球距离的变化"}, {"en": "The total number of days in a year", "zh": "一年的总天数"}, {"en": "The size of the world's oceans", "zh": "世界海洋的大小"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book explains that 'Earth is tilted on its axis,' so when one hemisphere leans toward the Sun it is summer there while the other has winter.", "zh": "书中解释说，'地球的地轴是倾斜的'，因此当某个半球倾向太阳时，那里是夏季，而另一半球则是冬季。"}}, {"q": {"en": "At about 41 degrees south, what kind of January weather does the book describe for Wellington?", "zh": "在约南纬 41 度，本书如何描述惠灵顿一月的天气？"}, "options": [{"en": "Warm summer weather, around 75°F (24°C)", "zh": "温暖的夏季天气，约 75°F（24°C）"}, {"en": "Freezing snow and ice everywhere", "zh": "处处冰冷的冰雪"}, {"en": "A howling blizzard", "zh": "呼啸的暴风雪"}, {"en": "The coldest month of its year", "zh": "一年中最冷的月份"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says that in January, Wellington (at about 41°S) enjoys summer with temperatures near 75°F, the opposite of New York's winter at the same time.", "zh": "书中说，一月时位于约南纬 41 度的惠灵顿正值夏季，气温接近 75°F，与同一时期纽约的冬季正相反。"}}, {"q": {"en": "What is the author's main purpose in writing this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"en": "To show that seasons depend on where you are on Earth, not just the calendar month", "zh": "向读者展示季节取决于你在地球上的位置，而不只是日历上的月份"}, {"en": "To teach readers how to build forts", "zh": "教授读者如何建造堡垒"}, {"en": "To sell airplane tickets", "zh": "推销飞机票"}, {"en": "To list the capital of every country", "zh": "列出每个国家的首都"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "By comparing January weather on different continents, the author helps readers see that one month can be summer in one hemisphere and winter in the other.", "zh": "通过对比不同大陆的一月天气，作者帮助读者认识到，同一个月在一个半球是夏季，在另一个半球却是冬季。"}}], "extended": {"prompt": {"en": "Choose a city near 40 degrees north or south latitude. Research or imagine its weather in January, and explain whether it would be summer or winter there—and why that depends on which hemisphere it is in.", "zh": "选择一座靠近北纬或南纬 40 度的城市。查阅或想象它在一月的天气，并解释那里是夏季还是冬季——以及为什么这取决于它所在的半球。"}, "guidance": {"en": ["Find your city's latitude and decide if it is in the Northern or Southern Hemisphere.", "Remember Earth's tilt: the hemisphere leaning toward the Sun has summer.", "In January, the Northern Hemisphere leans away (winter) and the Southern leans toward (summer).", "Describe the typical weather and one activity you could do there in January."], "zh": ["找出该城市的纬度，判断它位于北半球还是南半球。", "记住地球的地轴倾斜：倾向太阳的半球是夏季。", "一月时，北半球背离太阳（冬季），南半球朝向太阳（夏季）。", "描述那里一月典型的天气，以及你可以在一月进行的一项活动。"]}}};</script>
