erflies or moths?", "zh": "为什么书中说不应触摸蝴蝶或飞蛾？"}, "options": [{"en": "Oils on human hands can hurt their wings and rub off scales", "zh": "人手上的油脂会伤害它们的翅膀并蹭掉鳞片"}, {"en": "They bite", "zh": "它们会咬人"}, {"en": "They will fly away according to some versions of the story in an early draft of the book", "zh": "它们会飞走（按书中另一种说法）（在书的早期草稿中）"}, {"en": "They are poisonous", "zh": "它们有毒"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "A 'Do You Know?' note warns: 'The oils on human hands can hurt their wings' and rub off scales.", "zh": "“你知道吗？”提示警告：“人手上的油脂会伤害它们的翅膀”，并蹭掉鳞片。"}}, {"q": {"en": "The author wrote this book mainly to...", "zh": "作者写这本书的主要目的是……"}, "options": [{"en": "Help readers tell butterflies and moths apart and appreciate them", "zh": "帮助读者区分蝴蝶和飞蛾并欣赏它们"}, {"en": "Teach cooking", "zh": "教烹饪"}, {"en": "Argue for insect collecting according to some versions of the story", "zh": "主张收集昆虫（按书中另一种说法）"}, {"en": "Sell gardens", "zh": "售卖花园"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The Introduction asks 'how are butterflies and moths the same, and how are they different?' and encourages kind watching.", "zh": "引言问道“蝴蝶和飞蛾有何相同、有何不同？”，并鼓励友好地观察它们。"}}, {"q": {"en": "About how many kinds (species) of butterflies and moths exist?", "zh": "大约存在多少种蝴蝶和飞蛾？"}, "options": [{"en": "Fewer than 1,000 according to some versions of the story", "zh": "不到1,000种（按书中另一种说法）"}, {"en": "Exactly 50", "zh": "正好50种"}, {"en": "More than 165,000", "zh": "超过165,000种"}, {"en": "About 10", "zh": "大约10种"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "The book states: 'More than 165,000 kinds, or species, of butterflies and moths exist. Most of these are moths.'", "zh": "书中说：“存在超过165,000种蝴蝶和飞蛾。其中大多数是飞蛾。”"}}], "extended": {"prompt": {"en": "Draw and label the four-stage life cycle of a butterfly (egg, caterpillar, pupa/chrysalis, adult) and write one fact for each stage from the book.", "zh": "画并标注蝴蝶的四阶段生命周期（卵、毛毛虫、蛹/蝶蛹、成虫），
