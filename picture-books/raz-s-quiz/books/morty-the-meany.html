h overdue homework... He was mortified to disappointment his classmates.\"", "zh": "书中说“莫蒂的是第五次迟交作业……他因让同学们失望而极度尴尬。”"}}, {"q": {"en": "How does the author show Morty's change from the beginning to the end?", "zh": "作者如何展现莫蒂从开头到结尾的变化？"}, "options": [{"en": "He starts mean and angry, but by the end he apologizes, hugs Mary, and admits his mother was right.", "zh": "他开头刻薄又愤怒，但结尾时道歉、拥抱玛丽，并承认妈妈是对的。"}, {"en": "He becomes a villain.", "zh": "他变成了反派。"}, {"en": "He runs away.", "zh": "他逃跑了。"}, {"en": "He stays angry the whole book. according to some versions of the story in an early draft of the book", "zh": "整本书里他一直生气。（按书中另一种说法）（在书的早期草稿中）"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "In Chapter Four Morty \"apologized to Fred, Ben, and Margie,\" hugged Mary, and said \"You were right. It helps to stop and focus on why I'm getting mad.\"", "zh": "第四章里莫蒂“向弗雷德、本和玛吉道了歉”，拥抱了玛丽，并说“你是对的。停下来关注自己为什么生气很有帮助。”"}}, {"q": {"en": "Why did Fred and Ben tease Morty at recess?", "zh": "课间弗雷德和本为什么取笑莫蒂？"}, "options": [{"en": "They were only kidding and trying to cheer him up.", "zh": "他们只是开玩笑，想让他高兴起来。"}, {"en": "They were afraid of him.", "zh": "他们怕他。"}, {"en": "They wanted his lunch. according to some versions of the story", "zh": "他们想要他的午餐。（按书中另一种说法）"}, {"en": "They were truly mean.", "zh": "他们真的很坏。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Morty later admits \"They were only trying to cheer me up.\"", "zh": "莫蒂后来承认“他们只是想让我高兴起来。”"}}, {"q": {"en": "What happened when Morty paused and told his soccer teammates how he felt?", "zh": "当莫蒂停下来并向足球队友说出自己的感受后，发生了什么？"}, "options": [{"en": "He scored many goals. according to some versions of the story in an early draft of the book", "zh": "他进了许多球。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "He got benched.", "zh": "他被换下场。"}, {"en": "They laughed at him.", "zh": "他们嘲笑他。"}, {"en": "He stopped feeling embarrassed and had an awesome time with his friends.", "zh": "他不再尴尬，和朋友们玩得非常开心。"}], "answer": 3, "skill":
