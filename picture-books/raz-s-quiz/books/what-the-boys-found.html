ry in an early draft of the book", "zh": "讲一个吓人的鬼故事（按书中另一种说法）（在书的早期草稿中）"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "The subtitle is 'An Art History Mystery' and the book explains how scientists studied the Lascaux cave.", "zh": "副标题是“一个艺术史之谜”，全书讲解科学家如何研究拉斯科洞穴。"}}], "extended": {"prompt": {"en": "Imagine you are one of the four boys seeing the painted cave for the first time. Write a journal entry describing what you see and feel.", "zh": "想象你是四个男孩之一，第一次看到壁画洞穴。写一篇日记，描述你看到和感受到的一切。"}, "guidance": {"en": ["Describe the animals you might see on the walls using the book's examples.", "Explain why the discovery felt 'thrilling' to the boys."], "zh": ["用书中的例子描述你可能在墙上看到的动物。", "解释为什么这个发现让男孩们感到“激动”。"]}}};</script>
