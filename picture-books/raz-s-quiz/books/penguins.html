<script>window.BOOK = {"slug": "penguins", "title": "Penguins", "titleZh": "企鹅", "level": "S", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Why are penguins described as 'no ordinary bird'?", "zh": "为什么企鹅被称为“不普通的鸟”？"}, "options": [{"en": "They cannot fly and have flippers instead of wings.", "zh": "它们不会飞，有鳍状肢而不是翅膀。"}, {"en": "They can breathe underwater. according to some versions of the story", "zh": "它们能在水下呼吸。（按书中另一种说法）"}, {"en": "They live only in zoos.", "zh": "它们只生活在动物园。"}, {"en": "They are the largest birds.", "zh": "它们是最大的鸟。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "\"What type of bird cannot fly and has strong flippers instead of wings? ... it's a penguin!\"", "zh": "书中问：“哪种鸟不会飞、有强壮的鳍状肢而不是翅膀？……是企鹅！”"}}, {"q": {"en": "Where do all penguins live?", "zh": "所有企鹅生活在哪里？"}, "options": [{"en": "Only in zoos", "zh": "只在动物园"}, {"en": "In the southern hemisphere", "zh": "在南半球"}, {"en": "In the northern hemisphere according to some versions of the story", "zh": "在北半球（按书中另一种说法）"}, {"en": "Only in Antarctica", "zh": "只在南极洲"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "\"All penguins live in the southern hemisphere.\"", "zh": "书中写道：“所有企鹅都生活在南半球。”"}}, {"q": {"en": "What does 'streamlined' mean?", "zh": "“streamlined（流线型）”是什么意思？"}, "options": [{"en": "Being very colorful. according to some versions of the story in an early draft of the book", "zh": "色彩非常鲜艳。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Having long legs.", "zh": "有长腿。"}, {"en": "Being able to fly.", "zh": "能够飞翔。"}, {"en": "Having a design that allows for smooth movement through water or air.", "zh": "具有可在水或空气中顺畅移动的外形设计。"}], "answer": 3, "skill": "Craft and Structure", "explain": {"en": "Glossary: \"streamlined (adj.) having a design that allows for smooth movement through water or air.\"", "zh": "词汇表：“streamlined——具有可在水或空气中顺畅移动的外形设计。”"}}, {"q": {"en": "Which penguin lives near the equator?", "zh": "哪种企鹅生活在赤道附近？"}, "options": [{"en": "The little blue penguin according to some versions of the story in an early draft of the book", "zh": "小蓝企鹅（按书中另一种说法）（在书的早期草稿中）"}, {"en": "The emperor penguin", "zh": "帝企鹅"}, {"en": "The king penguin", "zh": "王企鹅"}, {"en": "The Galapagos penguin (off the west coast of South America near Ecuador)", "zh": "加拉帕戈斯企鹅（南美洲西海岸、厄瓜多尔附近）"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "\"the Galapagos penguin lives off the west coast of South America near Ecuador, which lies on the equator!\"", "zh": "书中说“加拉帕戈斯企鹅生活在南美洲西海岸、厄瓜多尔附近，而厄瓜多尔就位于赤道上！”"}}, {"q": {"en": "How do penguins keep water out and stay warm?", "zh": "企鹅如何防水并保持温暖？"}, "options": [{"en": "They don't go in water.", "zh": "它们不下水。"}, {"en": "They wear coats.", "zh": "它们穿外套。"}, {"en": "They rub oil from a gland at the base of their tail onto their outer feathers.", "zh": "它们用尾根处腺体分泌的油涂抹在外层羽毛上。"}, {"en": "They live only in hot places. according to some versions of the story in an early draft of the book", "zh": "它们只住在炎热的地方。（按书中另一种说法）（在书的早期草稿中）"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "\"Penguins rub their beaks on oil glands at the base of their tails and spread the oil on their outer feathers. Their oily coats keep out water and keep in heat.\"", "zh": "书中说“企鹅用喙蹭尾根处的油腺，把油涂在外层羽毛上。油性的羽毛外层既能防水又能保暖。”"}}, {"q": {"en": "What is 'tobogganing' in penguins?", "zh": "企鹅的“tobogganing（滑腹）”是什么？"}, "options": [{"en": "Sliding on their stomachs, which is faster than walking.", "zh": "趴在肚子上滑行，比走路更快。"}, {"en": "Building nests.", "zh": "筑巢。"}, {"en": "Swimming upside down. according to some versions of the story", "zh": "倒着游泳。（按书中另一种说法）"}, {"en": "Flying.", "zh": "飞翔。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "\"When they get tired of walking, they slide on their stomachs. This way of moving is called tobogganing.\"", "zh": "书中说“它们走累了就趴在肚子上滑行。这种移动方式叫做tobogganing。”"}}, {"q": {"en": "How do emperor penguin fathers care for the egg?", "zh": "帝企鹅爸爸如何照顾蛋？"}, "options": [{"en": "They leave it.", "zh": "它们丢弃蛋。"}, {"en": "The father cares for the egg on his feet while the mother leaves to get food, going up to 4 months without food.", "zh": "爸爸把蛋放在脚上照料，妈妈离开觅食，爸爸可长达4个月不进食。"}, {"en": "They bury it.", "zh": "它们把蛋埋起来。"}, {"en": "The mother cares alone. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "由妈妈独自照料。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "\"an emperor father cares for the egg while the mother leaves to get food. He may go without food for four months before his mate returns.\"", "zh": "书中说“帝企鹅爸爸在妈妈离开觅食时照顾蛋。在伴侣回来前，他可能长达四个月不进食。”"}}, {"q": {"en": "What is the biggest threat to adult penguins in the water?", "zh": "在水中，成年企鹅最大的威胁是什么？"}, "options": [{"en": "Sharks. according to some versions of the story", "zh": "鲨鱼。（按书中另一种说法）"}, {"en": "Leopard seals, which swim very fast.", "zh": "游得极快的豹海豹。"}, {"en": "Whales.", "zh": "鲸鱼。"}, {"en": "Orcas.", "zh": "虎鲸。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "\"their worst enemies are leopard seals, which can swim very fast.\"", "zh": "书中说“它们最可怕的敌人是豹海豹，它们游得极快。”"}}, {"q": {"en": "Why does the book discuss global warming and oil pollution?", "zh": "本书为什么讨论全球变暖和石油污染？"}, "options": [{"en": "To show that people and environmental dangers threaten penguins and they need our help.", "zh": "为了说明人类和环境危害正威胁着企鹅，它们需要我们的帮助。"}, {"en": "To say penguins are safe.", "zh": "为了说明企鹅很安全。"}, {"en": "To explain how to cook penguins. according to some versions of the story in an early draft of the book", "zh": "为了解释如何烹饪企鹅。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "To promote tourism.", "zh": "为了推销旅游。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book says \"Penguins, like all birds—and all wildlife—need our help to survive\" and links oil pollution and global warming to fewer penguins.", "zh": "书中说“企鹅，像所有鸟类——所有野生动物一样——需要我们的帮助才能生存”，并把石油污染和全球变暖与企鹅数量减少联系起来。"}}, {"q": {"en": "How many types of penguins does the book say there are?", "zh": "本书说企鹅共有多少种？"}, "options": [{"en": "100 according to some versions of the story in an early draft of the book", "zh": "100种（按书中另一种说法）（在书的早期草稿中）"}, {"en": "5", "zh": "5种"}, {"en": "17 (the emperor penguin plus sixteen other types)", "zh": "17种（帝企鹅加另外16种）"}, {"en": "2", "zh": "2种"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "\"The movie March of the Penguins sparked great interest in emperor penguins. There are also sixteen other types of penguins.\"", "zh": "书中说“电影《企鹅大冒险》引发了人们对帝企鹅的极大兴趣。此外还有另外十六种企鹅。”"}}], "extended": {"prompt": {"en": "Draw a diagram comparing two penguin species (for example, the emperor and the little blue) showing their size, where they live, and one special fact about each.", "zh": "画一张对比两种企鹅（例如帝企鹅和小蓝企鹅）的示意图，标出它们的体型、栖息地以及各自的一个特点。"}, "guidance": {"en": ["Use the book's table: emperor penguins are 120 cm and live on Antarctic ice; little blue are 43 cm and live in Australia/New Zealand.", "Note that the emperor is about the size of a third grader and the little blue about the size of a large duck."], "zh": ["参考书中的表格：帝企鹅高120厘米，生活在南极冰原；小蓝企鹅高43厘米，生活在澳大利亚/新西兰。", "注意帝企鹅大约相当于三年级学生的身高，小蓝企鹅大约相当于一只大鸭子的体型。"]}}};</script>
