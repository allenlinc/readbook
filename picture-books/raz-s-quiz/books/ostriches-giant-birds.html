<script>window.BOOK = {"slug": "ostriches-giant-birds", "title": "Ostriches Giant Birds", "titleZh": "鸵鸟：巨型鸟类", "level": "S", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "How tall and heavy can an adult male ostrich get?", "zh": "成年雄性鸵鸟能长到多高多重？"}, "options": [{"en": "20 feet and 1000 pounds. according to some versions of the story", "zh": "20英尺高，1000磅重。（按书中另一种说法）"}, {"en": "5 feet and 50 pounds.", "zh": "5英尺高，50磅重。"}, {"en": "Up to 9 feet (2.7 m) tall and 350 pounds (160 kg).", "zh": "高达9英尺（2.7米），重达350磅（160公斤）。"}, {"en": "3 feet and 10 pounds.", "zh": "3英尺高，10磅重。"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "\"Adult males can grow as tall as 9 feet (2.7 m) with their neck extended and weigh up to 350 pounds (160 kg).\"", "zh": "书中说“成年雄性鸵鸟伸着脖子可长到9英尺（2.7米）高，重达350磅（160公斤）。”"}}, {"q": {"en": "How fast can ostriches run?", "zh": "鸵鸟能跑多快？"}, "options": [{"en": "They cannot run. according to some versions of the story in an early draft of the book", "zh": "它们不会跑。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "5 mph.", "zh": "5英里/小时。"}, {"en": "100 mph.", "zh": "100英里/小时。"}, {"en": "30 mph over long distance, sprinting up to 45 mph.", "zh": "长距离30英里/小时，冲刺可达45英里/小时。"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "\"They can run 30 miles per hour (48.2 kph) over a long distance and can sprint up to 45 miles per hour (72.4 kph).\"", "zh": "书中说“它们长距离可跑30英里/小时（48.2公里/小时），冲刺可达45英里/小时（72.4公里/小时）。”"}}, {"q": {"en": "What is a 'gizzard'?", "zh": "“gizzard（砂囊）”是什么？"}, "options": [{"en": "A nest.", "zh": "一个巢。"}, {"en": "A type of feather. according to some versions of the story", "zh": "一种羽毛。（按书中另一种说法）"}, {"en": "A kick.", "zh": "一种踢击。"}, {"en": "An organ in birds that helps grind and break down food.", "zh": "鸟类体内帮助研磨、分解食物的器官。"}], "answer": 3, "skill": "Craft and Structure", "explain": {"en": "Glossary: \"gizzard (n.) an organ in birds that helps grind and break down food.\"", "zh": "词汇表：“gizzard——鸟类体内帮助研磨、分解食物的器官。”"}}, {"q": {"en": "What do ostriches do instead of burying their heads in sand?", "zh": "鸵鸟不把头埋进沙里时，实际会怎么做？"}, "options": [{"en": "They actually bury their heads. according to some versions of the story in an early draft of the book", "zh": "它们真的把头埋起来。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "They lie down and place their long neck on the ground to be less visible.", "zh": "它们趴下，把长脖子贴在地上以便不易被发现。"}, {"en": "They fly away.", "zh": "它们飞走。"}, {"en": "They hide in trees.", "zh": "它们躲在树上。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "\"If an ostrich can't fight or flee, it lies down and places its long neck on the ground... This defense has given rise to the myth that ostriches bury their heads in the sand.\"", "zh": "书中说“若鸵鸟无法战斗或逃跑，就趴下把长脖子贴在地上……这引发了鸵鸟把头埋进沙里的误解。”"}}, {"q": {"en": "What do ostriches eat?", "zh": "鸵鸟吃什么？"}, "options": [{"en": "Only meat.", "zh": "只吃肉。"}, {"en": "They are omnivores—leaves, seeds, roots, lizards, snakes, rodents, insects.", "zh": "它们是杂食动物——吃叶子、种子、根茎、蜥蜴、蛇、啮齿动物、昆虫。"}, {"en": "Only fish.", "zh": "只吃鱼。"}, {"en": "Only plants. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "只吃植物。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "\"Ostriches are omnivores. Their typical food is leaves, seeds, and roots. They also eat lizards, snakes, rodents, insects...\"", "zh": "书中说“鸵鸟是杂食动物。典型食物是叶子、种子和根茎，也吃蜥蜴、蛇、啮齿动物、昆虫……”"}}, {"q": {"en": "How strong is an ostrich's kick?", "zh": "鸵鸟的一脚有多强？"}, "options": [{"en": "Strong enough to kill a full-grown lion with one blow.", "zh": "强到一脚就能踢死一头成年狮子。"}, {"en": "Can knock over a bush. according to some versions of the story", "zh": "能踢翻一丛灌木。（按书中另一种说法）"}, {"en": "Only scares insects.", "zh": "只能吓走昆虫。"}, {"en": "Weak.", "zh": "很弱。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "\"Their kick is so strong that it can kill a full-grown lion with one blow.\"", "zh": "书中说“它们的踢击如此有力，一脚就能踢死一头成年狮子。”"}}, {"q": {"en": "Why are ostriches well suited to the African savanna?", "zh": "鸵鸟为什么很适应非洲草原？"}, "options": [{"en": "They need lots of water.", "zh": "它们需要大量水。"}, {"en": "They live in snow.", "zh": "它们生活在雪地。"}, {"en": "They are fast runners, have good vision and long necks to spot danger, and live in cooperative herds.", "zh": "它们跑得快，视力好、长脖子能及早发现危险，并且以合作的群体生活。"}, {"en": "They can fly away from danger. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "它们能飞离危险。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book's Focus Question is \"Why are ostriches well suited to live in the African savanna?\" and describes their speed, teamwork, vision, and tolerance of hot days and cold nights.", "zh": "本书焦点问题是“鸵鸟为什么很适应非洲草原生活？”，并描述了它们的速度、团队合作、视力以及对昼夜温差的耐受力。"}}, {"q": {"en": "Why does the book mention that ostriches are among T. rex's closest living relatives?", "zh": "本书为什么提到鸵鸟是霸王龙现存的近亲之一？"}, "options": [{"en": "To share an interesting scientific fact connecting ostriches to dinosaurs.", "zh": "为了分享一个把鸵鸟与恐龙联系起来的有趣科学事实。"}, {"en": "To promote a museum.", "zh": "为了宣传一家博物馆。"}, {"en": "To scare readers.", "zh": "为了吓唬读者。"}, {"en": "To say ostriches are extinct. according to some versions of the story in an early draft of the book", "zh": "为了说明鸵鸟已灭绝。（按书中另一种说法）（在书的早期草稿中）"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "\"Ostriches are among Tyrannosaurus rex's closest living relatives... cells most closely matched ostriches and chickens.\"", "zh": "书中说“鸵鸟是霸王龙现存的近亲之一……（其）细胞与鸵鸟和鸡最为接近。”"}}, {"q": {"en": "How are ostrich eggs described?", "zh": "书中如何描述鸵鸟蛋？"}, "options": [{"en": "Tiny like a pea.", "zh": "像豌豆一样小。"}, {"en": "The largest and thickest of any bird's; one equals about two dozen chicken eggs.", "zh": "是所有鸟中最大最厚的；一颗约等于两打鸡蛋的重量。"}, {"en": "Same as chicken eggs. according to some versions of the story in an early draft of the book", "zh": "和鸡蛋一样大。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Soft and rubbery.", "zh": "柔软而有弹性。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "\"Ostriches lay the world's biggest eggs. It would take two dozen chicken eggs to equal the weight of one ostrich egg.\"", "zh": "书中说“鸵鸟下世界上最大的蛋。一颗鸵鸟蛋的重量相当于两打鸡蛋。”"}}, {"q": {"en": "How does the author describe ostriches' intelligence?", "zh": "作者如何描述鸵鸟的智力？"}, "options": [{"en": "As very low—a vet says they are 'as dumb as a box of rocks' but are curious.", "zh": "很低——一位兽医说它们“蠢得像一箱子石头”，但很好奇。"}, {"en": "As average.", "zh": "中等水平。"}, {"en": "As smarter than humans. according to some versions of the story in an early draft of the book", "zh": "比人类还聪明。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "As geniuses.", "zh": "像天才。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "\"Ostrich veterinarian Dr. Carole Price says, 'Ostriches are as dumb as a box of rocks. They run or fight—they don't think.' They are, however, curious about everything.\"", "zh": "书中说“兽医卡罗尔·普赖斯博士说：‘鸵鸟蠢得像一箱子石头。它们只会跑或打——不会思考。’不过它们对一切都很好奇。”"}}], "extended": {"prompt": {"en": "Draw a labeled diagram of an ostrich showing two features that help it survive in the savanna (for example, its long neck for spotting danger and its powerful legs for running or kicking).", "zh": "画一张带标注的鸵鸟示意图，标出两个帮助它在草原生存的特征（例如用于观察危险的长脖子和用于奔跑或踢击的有力双腿）。"}, "guidance": {"en": ["Show the long neck and good eyesight that help spot predators from far away.", "Show the strong legs and two-toed feet that let ostriches run up to 45 mph and deliver a deadly kick."], "zh": ["画出长脖子和好视力，帮助鸵鸟从远处发现捕食者。", "画出强壮的双腿和两只脚趾，使鸵鸟能跑到每小时45英里并给出致命一踢。"]}}};</script>
