<script>window.BOOK = {"slug": "seven-wonders-of-the-modern-world", "title": "Seven Wonders of the Modern World", "titleZh": "现代世界七大奇迹", "level": "S", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Which of these is the ONLY Ancient Wonder still standing?", "zh": "以下哪一个是唯一至今仍存在的古代奇迹？"}, "options": [{"en": "The Great Pyramid of Egypt", "zh": "埃及大金字塔"}, {"en": "The Channel Tunnel", "zh": "英吉利海峡隧道"}, {"en": "The CN Tower", "zh": "加拿大国家电视塔"}, {"en": "The Itaipú Dam", "zh": "伊泰普水坝"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "\"The Great Pyramid of Egypt is the only Ancient Wonder still standing.\"", "zh": "书中写道：“埃及大金字塔是唯一一座仍然屹立的古代奇迹。”"}}, {"q": {"en": "Why did a group of engineers ask experts to pick new wonders?", "zh": "工程师们为什么请专家挑选新的奇迹？"}, "options": [{"en": "To honor the same ideas as the Ancient Wonders—courage and power to do what seemed impossible.", "zh": "为了致敬古代奇迹所代表的理念——完成看似不可能之事的勇气与力量。"}, {"en": "To build them.", "zh": "为了建造它们。"}, {"en": "To sell tickets.", "zh": "为了卖票。"}, {"en": "To replace the pyramids.", "zh": "为了取代金字塔。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "\"Their list of Modern Wonders honored the same ideas as the Ancient Wonders\" — honoring \"the courage and power to do things people thought couldn't be done.\"", "zh": "书中说“现代奇迹的名单致敬了与古代奇迹相同的理念”——即“完成人们以为做不到之事的勇气与力量”。"}}, {"q": {"en": "How long is the Channel Tunnel and how fast do its trains travel?", "zh": "英吉利海峡隧道有多长，列车时速多少？"}, "options": [{"en": "31 miles (50 km) long, about 100 mph", "zh": "长31英里（50公里），时速约100英里"}, {"en": "10 miles, 20 mph", "zh": "长10英里，时速20英里"}, {"en": "100 miles, 5 mph", "zh": "长100英里，时速5英里"}, {"en": "50 miles, 200 mph", "zh": "长50英里，时速200英里"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "\"traveling 31 miles (50 km) through an underwater tunnel at close to 100 miles (161 km) per hour.\"", "zh": "书中说“在50公里长的水下隧道中以接近每小时161公里的速度穿行”。"}}, {"q": {"en": "Why was the CN Tower built?", "zh": "加拿大国家电视塔（CN塔）为什么而建？"}, "options": [{"en": "Tall buildings blocked radio and TV signals, so a tower was needed that nothing could block.", "zh": "高楼阻挡了广播和电视信号，因此需要一座不会被任何建筑遮挡信号的塔。"}, {"en": "To be a hotel.", "zh": "为了做酒店。"}, {"en": "To store water.", "zh": "为了储水。"}, {"en": "To watch for fires.", "zh": "为了观察火灾。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "\"The city needed a tower tall enough so that no building could block signals coming from it.\"", "zh": "书中说：“城市需要一座足够高的塔，使任何建筑都无法遮挡从它发出的信号。”"}}, {"q": {"en": "During the Chunnel fire, what happened?", "zh": "海峡隧道发生火灾时发生了什么？"}, "options": [{"en": "Safety plans worked; people were led to the service tunnel and no one died.", "zh": "安全预案起作用，人们被带往维修隧道，无人死亡。"}, {"en": "The tunnel collapsed.", "zh": "隧道坍塌了。"}, {"en": "Everyone died.", "zh": "所有人都死了。"}, {"en": "The train exploded.", "zh": "列车爆炸了。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "\"A fire could have killed many, but the Channel Tunnel had plans for emergencies. People were taken off the train and led to the tunnel used for repairs... no one died or was seriously hurt.\"", "zh": "书中说火灾“本可能致死多人，但海峡隧道早有应急方案。人们被带离列车、引入维修隧道……无人死亡或重伤。”"}}, {"q": {"en": "What is a 'hydroelectric plant'?", "zh": "“水电站（hydroelectric plant）”是什么？"}, "options": [{"en": "A factory that uses water to make electricity", "zh": "利用水来发电的工厂"}, {"en": "A place to grow fish", "zh": "养鱼的地方"}, {"en": "A type of bridge", "zh": "一种桥"}, {"en": "A water tower", "zh": "水塔"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Glossary: \"hydroelectric plant — factory that uses water to make electricity.\"", "zh": "词汇表：“hydroelectric plant——利用水来发电的工厂。”"}}, {"q": {"en": "How did the Netherlands protect its land while still letting ships pass?", "zh": "荷兰如何既保护土地，又让船只通行？"}, "options": [{"en": "They built a floodwall with giant gates that stay open when calm and close during storms.", "zh": "他们建了一道带巨型闸门的防洪墙，平静时闸门开启，风暴时关闭。"}, {"en": "They built a giant dam everywhere.", "zh": "他们到处建了大水坝。"}, {"en": "They moved the people away.", "zh": "他们把人们迁走了。"}, {"en": "They filled the sea with sand.", "zh": "他们用沙把海填平了。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "\"They built a floodwall unlike any other. The wall was built with giant gates that stay open when the sea is calm... During storms, the gates can be closed to prevent flooding.\"", "zh": "书中说“他们建了一道与众不同的防洪墙，闸门在风平浪静时保持开启……风暴期间关闭以防水灾。”"}}, {"q": {"en": "How many men died falling while building the Golden Gate Bridge?", "zh": "在建造金门大桥时，有多少人坠亡？"}, "options": [{"en": "Eleven", "zh": "11人"}, {"en": "Zero", "zh": "0人"}, {"en": "One hundred", "zh": "100人"}, {"en": "Two", "zh": "2人"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "\"In fact, 11 men fell to their deaths while working on the bridge.\"", "zh": "书中写道：“事实上，有11名工人在建桥时坠亡。”"}}, {"q": {"en": "What do the Panama Canal's chambers do?", "zh": "巴拿马运河的船闸有什么作用？"}, "options": [{"en": "Raise and lower ships from the oceans to the lake.", "zh": "把船只从海洋升降到湖泊。"}, {"en": "Store water.", "zh": "储水。"}, {"en": "Block ships.", "zh": "阻挡船只。"}, {"en": "Power the trains.", "zh": "为列车提供动力。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "\"they built a system of chambers to raise and lower ships from the oceans to the lake.\"", "zh": "书中说“他们建了一套船闸系统，把船只从海洋升降到湖泊”。"}}, {"q": {"en": "What is the book's main message in the Conclusion?", "zh": "本书结语的主要信息是什么？"}, "options": [{"en": "These wonders prove the power and courage of human beings in the 1900s.", "zh": "这些奇迹证明了20世纪人类的力量与勇气。"}, {"en": "They are ugly.", "zh": "它们很丑。"}, {"en": "They should be torn down.", "zh": "它们应该被拆除。"}, {"en": "Only ancient people were great.", "zh": "只有古人才伟大。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Conclusion: \"these Seven Wonders of the Modern World are proof of the power and courage of human beings in the 1900s.\"", "zh": "结语写道：“这现代世界七大奇迹，是20世纪人类力量与勇气的证明。”"}}], "extended": {"prompt": {"en": "Choose one of the Seven Wonders and draw a labeled diagram or write a paragraph explaining how it was built and why it is impressive.", "zh": "选择现代世界七大奇迹之一，画一幅带标注的示意图，或写一段话说明它是如何建成的以及为什么令人赞叹。"}, "guidance": {"en": ["Pick a wonder such as the Chunnel, CN Tower, or Itaipú Dam and list key facts (location, years, size).", "Use the book's details—for example, the Itaipú Dam used enough concrete for a city of four million people."], "zh": ["选择一项奇迹，如英吉利海峡隧道、CN塔或伊泰普水坝，列出关键事实（地点、年份、规模）。", "运用书中的细节——例如伊泰普水坝用了足够建造一座400万人城市的混凝土。"]}}};</script>
