<script>window.BOOK = {"slug": "snakebite", "title": "Snakebite!", "titleZh": "蛇咬伤！", "level": "S", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Who was struck by a rattlesnake at age nine in 1951?", "zh": "1951年，谁在九岁时被响尾蛇咬伤？"}, "options": [{"en": "Jennifer Owings", "zh": "詹妮弗·欧文斯"}, {"en": "Mary", "zh": "玛丽"}, {"en": "Noni", "zh": "诺妮"}, {"en": "Margie", "zh": "玛吉"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The Introduction tells of \"nine-year-old Jennifer Owings\" riding her horse near a New Mexico ranch in 1951 when a rattlesnake struck her hand.", "zh": "引言部分讲述“九岁的詹妮弗·欧文斯”1951年在新墨西哥州一处牧场骑马时，手被响尾蛇咬伤。"}}, {"q": {"en": "How many species of rattlesnakes have scientists identified?", "zh": "科学家已确认有多少种响尾蛇？"}, "options": [{"en": "Thirty-one", "zh": "31种"}, {"en": "Seven", "zh": "7种"}, {"en": "Six", "zh": "6种"}, {"en": "One hundred", "zh": "100种"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "\"Scientists have identified thirty-one species of rattlesnakes.\"", "zh": "书中写道：“科学家已经确认了31种响尾蛇。”"}}, {"q": {"en": "According to the book, what is the difference between 'venomous' and 'poisonous'?", "zh": "根据本书，“有毒（venomous）”与“有毒（poisonous）”的区别是什么？"}, "options": [{"en": "Venom is injected into the bloodstream; poison is harmful when swallowed, breathed, or touched.", "zh": "毒液是被注入血液里的；而毒物是在吞下、吸入或接触时有害。"}, {"en": "They mean exactly the same thing.", "zh": "两者意思完全相同。"}, {"en": "Poison is injected and venom is swallowed.", "zh": "毒物是被注入的，毒液是被吞下的。"}, {"en": "Venom is swallowed.", "zh": "毒液是被吞下的。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The Word Wise box says rattlesnakes are \"correctly called venomous—not poisonous\" because venom is injected into the bloodstream, while poison is harmful when swallowed, breathed, or touched.", "zh": "“词汇须知”说明响尾蛇应被正确称为venomous而非poisonous，因为毒液是被注入血液的，而毒物是在吞下、吸入或接触时有害。"}}, {"q": {"en": "How do rattlesnakes find prey even in total darkness?", "zh": "响尾蛇如何在完全黑暗中也找到猎物？"}, "options": [{"en": "Using their sense of smell and heat (special areas on their face sense heat).", "zh": "利用嗅觉和热量感知（脸上特殊部位能感知热量）。"}, {"en": "Using their rattle.", "zh": "利用它们的响尾。"}, {"en": "Using their eyesight.", "zh": "利用它们的视力。"}, {"en": "Using their ears.", "zh": "利用它们的耳朵。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "\"Rattlesnakes can find prey even in total darkness. They mostly use their sense of smell and sense of heat. Special areas on their face can sense heat.\"", "zh": "书中说：“响尾蛇即使在完全黑暗中也能找到猎物。它们主要靠嗅觉和热量感知。脸上特殊部位能感知热量。”"}}, {"q": {"en": "Why does the author open the book with Jennifer Owings's true story?", "zh": "作者为什么用詹妮弗·欧文斯的真实故事作为开篇？"}, "options": [{"en": "To show a rattlesnake strike can happen to an ordinary person and to introduce the topic.", "zh": "为了说明响尾蛇咬伤可能发生在普通人身上，并引出主题。"}, {"en": "To prove rattlesnakes are always deadly.", "zh": "为了证明响尾蛇总是致命的。"}, {"en": "To encourage readers to ride horses.", "zh": "为了鼓励读者去骑马。"}, {"en": "To explain how to build a hospital.", "zh": "为了解释如何建医院。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The Introduction uses Jennifer's story to draw readers in and to frame the questions \"What happens when a rattlesnake strikes a person?\"", "zh": "引言用詹妮弗的故事吸引读者，并提出“当响尾蛇咬人时会发生什么？”等问题。"}}, {"q": {"en": "According to the book, what does rattlesnake venom do to the body?", "zh": "根据本书，响尾蛇毒液对人体有什么作用？"}, "options": [{"en": "It destroys red blood cells and prevents clotting, paralyzes muscles, and attacks cells and tissues.", "zh": "它破坏红细胞并阻止凝血、使肌肉瘫痪，并攻击细胞和组织。"}, {"en": "It only causes a rash.", "zh": "它只会引起皮疹。"}, {"en": "It makes the victim fall asleep.", "zh": "它让受害者睡着。"}, {"en": "It turns the skin blue.", "zh": "它把皮肤变蓝。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "\"Venom causes three types of damage. It travels through the bloodstream, destroying red blood cells and keeping blood from clotting. It also paralyzes muscles... Venom also attacks cells directly, breaking down organs and tissues.\"", "zh": "书中说毒液造成三类伤害：破坏红细胞、阻止凝血；使肌肉瘫痪；直接攻击细胞、破坏器官和组织。"}}, {"q": {"en": "What should you NOT do for rattlesnake first aid?", "zh": "响尾蛇急救中，你不应该做什么？"}, "options": [{"en": "Cut the wound or suck out the venom with your mouth.", "zh": "切开伤口或用嘴把毒液吸出来。"}, {"en": "Keep the victim calm.", "zh": "让受害者保持冷静。"}, {"en": "Call 9-1-1.", "zh": "拨打9-1-1。"}, {"en": "Remove rings and bracelets.", "zh": "取下戒指和手镯。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The DON'T list says \"Don't cut the wound\" and \"Don't try to suck out the venom with your mouth.\"", "zh": "“不要做”清单写明：“不要切开伤口”以及“不要用嘴把毒液吸出来”。"}}, {"q": {"en": "What does the book say about a rattling noise as a warning?", "zh": "关于响尾蛇发出的“嘎嘎”声作为警告，书中说了什么？"}, "options": [{"en": "You can't always count on it; rattlesnakes don't always rattle before they strike.", "zh": "不能总依赖它；响尾蛇并非总是在攻击前发出响声。"}, {"en": "They always rattle before striking.", "zh": "它们总是在攻击前发出响声。"}, {"en": "They only rattle after biting twice.", "zh": "它们只在咬两次后才发出响声。"}, {"en": "They never rattle.", "zh": "它们从不发出响声。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "\"It's a Fact! You can't count on a rattling noise as a warning. Rattlesnakes don't always rattle before they strike.\"", "zh": "书中“事实”栏写道：“你不能指望嘎嘎声作为警告。响尾蛇并非总是在攻击前发出响声。”"}}, {"q": {"en": "How long can an adult rattlesnake grow, and how far can it strike?", "zh": "成年响尾蛇能长到多长，又能攻击多远？"}, "options": [{"en": "Up to 1.8 m (6 ft) long and can strike at least half its body length.", "zh": "最长1.8米（6英尺），攻击距离至少为自己体长的一半。"}, {"en": "Up to 30 cm and strikes 1 m.", "zh": "最长30厘米，攻击距离1米。"}, {"en": "They cannot strike.", "zh": "它们不能攻击。"}, {"en": "Up to 10 m long.", "zh": "最长10米。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Safety Tips state rattlesnakes \"can grow to be 1.8 meters (6 ft) long\" and \"can strike at least half the length of their body.\"", "zh": "安全提示说响尾蛇“可长到1.8米（6英尺）长”，并“能攻击至少自己体长的一半距离”。"}}, {"q": {"en": "What main message does the book give about rattlesnakes in nature?", "zh": "关于自然界中的响尾蛇，本书传达了什么主要信息？"}, "options": [{"en": "They are an important part of the food chain and have a right to live.", "zh": "它们是食物链的重要一环，有生存的权利。"}, {"en": "They should all be killed.", "zh": "它们应该被全部消灭。"}, {"en": "They are useless.", "zh": "它们毫无用处。"}, {"en": "They only live in zoos.", "zh": "它们只生活在动物园。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The Conclusion says \"Without rattlesnakes, the numbers of mice... would become too large\" and \"Like all other living things, rattlesnakes have a right to live.\"", "zh": "结语说“没有响尾蛇，老鼠等小动物的数量会变得过多”，并说“像所有生物一样，响尾蛇有生存的权利。”"}}], "extended": {"prompt": {"en": "Create a 'Rattlesnake Safety' poster showing three things you SHOULD do and three things you should NOT do if you are in rattlesnake country.", "zh": "制作一张“响尾蛇安全”海报，列出在响尾蛇出没地区应该做的三件事和不应该做的三件事。"}, "guidance": {"en": ["List the DOs: get away, call 9-1-1, keep calm, remove tight items, wash the wound.", "List the DON'Ts: don't cut the wound, don't suck out venom, don't use ice."], "zh": ["列出应该做的事：远离蛇、拨打9-1-1、保持冷静、取下紧身物品、清洗伤口。", "列出不该做的事：不要切开伤口、不要用嘴吸毒液、不要敷冰。"]}}};</script>
