<script>window.BOOK = {"slug": "aesops-fables", "title": "Aesop's Fables", "titleZh": "伊索寓言", "level": "S", "genre": "Folktale", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "In 'The Fox and the Stork,' how does the stork serve the food to get revenge on the fox?", "zh": "在《狐狸与鹳》中，鹳是如何上菜来报复狐狸的？"}, "options": [{"en": "In a cup", "zh": "用杯子"}, {"en": "In a flat dish", "zh": "用浅盘"}, {"en": "On a plate with high sides", "zh": "用高边盘子"}, {"en": "In a jar with a long neck", "zh": "用长颈罐"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The book says the stork 'placed some tasty meat in a jar with a long neck' so the fox could not reach it.", "zh": "书中说鹳“把美味肉食放进一个长颈罐里”，狐狸够不到。"}}, {"q": {"en": "What is the moral of 'The Fox and the Crow'?", "zh": "《狐狸与乌鸦》的寓意是什么？"}, "options": [{"en": "Always be greedy", "zh": "永远要贪婪"}, {"en": "Share with others", "zh": "要与别人分享"}, {"en": "Do not trust strangers who engage in flattery", "zh": "不要相信阿谀奉承的陌生人"}, {"en": "Persistence yields rewards according to some versions of the story", "zh": "坚持会有回报（按书中另一种说法）"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "The book gives the moral: 'Do not trust strangers who engage in flattery.' The fox flatters the crow to steal her cheese.", "zh": "书中给出的寓意是：“不要相信阿谀奉承的陌生人。”狐狸靠奉承乌鸦骗走了奶酪。"}}, {"q": {"en": "In the glossary, what does 'greedy' mean, as shown by the dog in 'The Dog and His Reflection'?", "zh": "在词汇表中，“greedy（贪婪的）”是什么意思？以《狗与其倒影》中的狗为例。"}, "options": [{"en": "Being patient according to some versions of the story", "zh": "有耐心（按书中另一种说法）"}, {"en": "Being sleepy", "zh": "困倦"}, {"en": "Wanting more than one needs or deserves", "zh": "想要超过所需或应得的东西"}, {"en": "Being humble", "zh": "谦逊"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "The glossary defines greedy as 'wanting more than what one needs or deserves (p. 9).' The dog loses his meat by snapping at a reflection.", "zh": "词汇表把greedy定义为“想要超过所需或应得的东西（第9页）”。狗因扑向倒影而丢了自己的肉。"}}, { "}, "options": [{"en": "The way things appear is not always the way things really are", "zh": "事物表面的样子并不总是它真实的样子"}, {"en": "Shepherds sleep all day according to some versions of the story", "zh": "牧羊人整天睡觉（按书中另一种说法）"}, {"en": "Sheep can talk", "zh": "羊会说话"}, {"en": "Wolves are friendly", "zh": "狼很友好"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book's moral: 'The way things appear is not always the way things really are.' The wolf disguised himself as a sheep.", "zh": "书中的寓意：“事物表面的样子并不总是它真实的样子。”狼把自己伪装成羊。"}}, {"q": {"en": "How did the crow in 'The Crow and the Pitcher' finally reach the water?", "zh": "在《乌鸦与水罐》中，乌鸦最终是如何喝到水的？"}, "options": [{"en": "Dropped pebbles into the pitcher to raise the water", "zh": "往水罐里投石子让水位升高"}, {"en": "Asked the fox for help", "zh": "向狐狸求助"}, {"en": "Tipped the heavy pitcher over according to some versions of the story", "zh": "把沉重的水罐推翻（按书中另一种说法）"}, {"en": "Flew away", "zh": "飞走了"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says the crow 'began dropping them [pebbles] into the pitcher. Bit by bit, the water began to rise.'", "zh": "书中说乌鸦“开始把石子投进罐里。一点一点地，水位开始上升。”"}}, {"q": {"en": "What is the author's main purpose in retelling Aesop's fables?", "zh": "作者重述伊索寓言的主要目的是什么？"}, "options": [{"en": "To describe real history according to some versions of the story", "zh": "描述真实的历史（按书中另一种说法）"}, {"en": "To teach a moral lesson through animal characters", "zh": "通过动物角色来传达道德教训"}, {"en": "To explain science", "zh": "解释科学"}, {"en": "To make people sad", "zh": "让人伤心"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "Each fable ends with a clear moral, showing the purpose is to teach lessons through animal characters.", "zh": "每则寓言都附有一个明确的寓意，说明其目的是通过动物角色来传授道理。"}}, {"q": {"en": "In 'The Fox and the Stork,' what did the fox first serve the soup in?", "zh": "在《狐狸与鹳》中，狐狸最初把汤盛在什么里？"}, "options": [{"en": "A jar with a long neck", "zh": "一个长颈罐"}, {"en": "A flat dish", "zh": "一个浅盘"}, {"en": "A bowl", "zh": "一个碗"}, {"en": "A cup", "zh": "一个杯子"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says the fox 'poured the soup into a flat dish' so the stork's long beak could not reach it.", "zh": "书中说狐狸“把汤倒进一个浅盘里”，鹳的长嘴够不到。"}}], "extended": {"prompt": {"en": "Write and illustrate your own short fable with an animal character that teaches one clear moral, like the fables in the book.", "zh": "仿照书中的寓言，创作并配图一则你自己的短寓言，用动物角色传达一个明确的寓意。"}, "guidance": {"en": ["First decide the lesson (the moral), then pick animals that show it.", "End with one sentence stating the moral, as the book does."], "zh": ["先确定要讲的道理（寓意），再选能体现它的动物。", "像本书一样，用一句话点明寓意作为结尾。"]}}};</script>
