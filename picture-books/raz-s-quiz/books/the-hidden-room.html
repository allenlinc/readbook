<script>window.BOOK = {"slug": "the-hidden-room", "title": "The Hidden Room", "titleZh": "秘密房间", "level": "S", "genre": "Fiction", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Who are the two main characters searching in this story?", "zh": "这个故事里一起调查的两个主要角色是谁？"}, "options": [{"en": "Sarah and the narrator (a friend)", "zh": "萨拉（Sarah）和叙述者（一名朋友）"}, {"en": "Aunt Terra and John Porter", "zh": "泰拉阿姨（Aunt Terra）和约翰·波特（John Porter）"}, {"en": "Two dogs in the Hollow", "zh": "空心谷里的两只狗"}, {"en": "The king and the princess", "zh": "国王和公主"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The story is told by a narrator who is with Sarah in her room; 'Sarah sighs' and 'I say' show the two main characters are Sarah and the narrator.", "zh": "故事由一名叙述者讲述，他/她和萨拉在房间里；“萨拉叹气”和“我说”表明两个主角是萨拉和叙述者。"}}, {"q": {"en": "In the glossary, what does the word 'charitable' mean?", "zh": "在词汇表中，“charitable”一词是什么意思？"}, "options": [{"en": "Scary and causing fear", "zh": "可怕并引起恐惧"}, {"en": "Generous and caring toward those in need", "zh": "对困境中的人慷慨而关怀"}, {"en": "Moved from one country to another according to some versions of the story", "zh": "从一国迁居到另一国（按书中另一种说法）"}, {"en": "Very weird or unusual", "zh": "非常奇怪或不寻常"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The glossary defines charitable (adj.) as 'generous and caring toward those in need (p. 4).' John Porter's wife was 'considered very charitable.'", "zh": "词汇表将 charitable（形容词）定义为“对困境中的人慷慨而关怀（第4页）”。约翰·波特的妻子“被认为非常乐善好施”。"}}, {"q": {"en": "What three mysterious objects have Sarah and the narrator found?", "zh": "萨拉和叙述者找到了哪三件神秘物品？"}, "options": [{"en": "A book, a ring, and a crown", "zh": "一本书、一枚戒指和一顶王冠"}, {"en": "A map, a compass, and a sword", "zh": "一张地图、一个指南针和一把剑"}, {"en": "A key, a lantern, and a pair of scissors", "zh": "一把钥匙、一盏灯笼和一把剪刀"}, {"en": "A phone, a laptop, and a camera according to some versions of the story", "zh": "一部手机、一台笔记本和一台相机（按书中另一种说法）"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "The book says: 'The key, lantern, and scissors are spread before her.' They keep finding these items.", "zh": "书中写道：“钥匙、灯笼和剪刀摊开放在她面前。”他们不断发现这些物品。"}}, {"q": {"en": "What did the narrator learn about John Porter's wife?", "zh": "叙述者了解到了关于约翰·波特妻子的什么？"}, "options": [{"en": "She was Sarah's teacher", "zh": "她是萨拉的老师"}, {"en": "She was considered very charitable, taking in children who had nowhere else to go", "zh": "她被认为非常乐善好施，收留那些无家可归的孩子"}, {"en": "She disappeared into the Hollow", "zh": "她消失进了空心谷"}, {"en": "She built the first mill in town according to some versions of the story in an early draft of the book", "zh": "她在镇上建了第一座磨坊（按书中另一种说法）（在书的早期草稿中）"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The narrator says: 'She was considered very charitable, taking in children who had nowhere else to go and caring for them.'", "zh": "叙述者说：“她被认为非常乐善好施，收留那些无家可归的孩子并照顾他们。”"}}, {"q": {"en": "What does Sarah say about Aunt Terra's family background?", "zh": "关于泰拉阿姨的家庭背景，萨拉说了什么？"}, "options": [{"en": "They were from England's royal family according to some versions of the story in an early draft of the book", "zh": "他们来自英国王室（按书中另一种说法）（在书的早期草稿中）"}, {"en": "They founded the town's mill", "zh": "他们创办了镇上的磨坊"}, {"en": "They came from the moon", "zh": "他们来自月亮"}, {"en": "Her mom's family immigrated from a village on the border between Nepal and India", "zh": "她妈妈一家是从尼泊尔和印度边境的一个村庄移民来的"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The book says: 'Sarah told me her mom's family immigrated from a village on the border between Nepal and India.'", "zh": "书中写道：“萨拉告诉我，她妈妈一家是从尼泊尔和印度边境的一个村庄移民来的。”"}}, {"q": {"en": "How do the characters figure out there is a hidden room behind the bookshelf?", "zh": "角色们是怎样推断出书架后面有一间密室的？"}, "options": [{"en": "They read about it on the Internet according to some versions of the story in an early draft of the book", "zh": "他们在网上读到了（按书中另一种说法）（在书的早期草稿中）"}, {"en": "They hear a soft scratching like fingernails on wood from the opposite side of the wall", "zh": "他们听到墙的另一边传来像指甲刮木头一样的轻微抓挠声"}, {"en": "The king sends them a map", "zh": "国王送来一张地图"}, {"en": "Aunt Terra tells them directly", "zh": "泰拉阿姨直接告诉了他们"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Sarah presses her ear to a shelf and hears 'a soft scratching, like fingernails against wood,' leading them to wonder what is on the opposite side of the wall.", "zh": "萨拉把耳朵贴在书架上，听到“像指甲刮木头一样的轻微抓挠声”，让他们怀疑墙的另一边是什么。"}}, {"q": {"en": "What does Sarah discover in the office that connects to the scissors they found?", "zh": "萨拉在办公室里发现了什么，与找到的那把剪刀有关联？"}, "options": [{"en": "A map of the Hollow", "zh": "一张空心谷的地图"}, {"en": "A letter from John Porter according to some versions of the story in an early draft of the book", "zh": "一封约翰·波特写的信（按书中另一种说法）（在书的早期草稿中）"}, {"en": "A photo of her mother at a sewing machine; the scissors belonged to her mother", "zh": "一张母亲坐在缝纫机前的照片；那把剪刀原本属于她母亲"}, {"en": "A recipe book", "zh": "一本食谱"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "Sarah says 'They belonged to my mother' and shows a photo 'of a beautiful woman sitting at a sewing machine.'", "zh": "萨拉说“它们原本属于我母亲”，并展示了一张“坐在缝纫机前的美丽女子”的照片。"}}, {"q": {"en": "How do Sarah and the narrator actually open the hidden room?", "zh": "萨拉和叙述者究竟是怎样打开那间密室的？"}, "options": [{"en": "Aunt Terra opens it for them", "zh": "泰拉阿姨为他们打开的"}, {"en": "They break the wall with the axe", "zh": "他们用斧头砸开了墙"}, {"en": "They use the key to unlock a door according to some versions of the story", "zh": "他们用钥匙打开了一扇门（按书中另一种说法）"}, {"en": "They pull out fake books, find a handle, and the bookcase swings open", "zh": "他们抽出假书，找到一个把手，书架便旋转打开了"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The book says the books are fake; Sarah sees 'some kind of handle,' pulls it, and 'the entire bookcase shifts and swings toward us... reveals a dark room.'", "zh": "书中说那些书是假的；萨拉看到“某种把手”，拉了一下，“整个书架移动并向他们转开……露出一间黑暗的房间”。"}}, {"q": {"en": "In the glossary, what does the word 'Victorian' describe in the story?", "zh": "在词汇表中，“Victorian”一词在故事中描述的是什么？"}, "options": [{"en": "The style of Sarah's old house, which has a ridiculous number of tiny rooms", "zh": "萨拉老房子的风格，里面有着多得离谱的小房间"}, {"en": "The sewing machine", "zh": "那台缝纫机"}, {"en": "The strange kid in the Hollow according to some versions of the story in an early draft of the book", "zh": "空心谷里那个奇怪的孩子（按书中另一种说法）（在书的早期草稿中）"}, {"en": "The hidden bottles of herbs", "zh": "那些隐藏的草药瓶"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines Victorian as the style popular in Queen Victoria's reign; the book calls Sarah's home 'an old Victorian house... with a ridiculous number of tiny rooms.'", "zh": "词汇表将 Victorian 定义为维多利亚女王统治时期流行的风格；书中称萨拉的房子是“一座古老的维多利亚式房子……有着多得离谱的小房间”。"}}, {"q": {"en": "Why do you think the author ends the story with the question, 'Who was scratching inside the hidden room?'", "zh": "你认为作者为什么用“是谁在密室里抓挠？”这个问题来结束故事？"}, "options": [{"en": "To create suspense and make readers want to keep reading the next part", "zh": "为了制造悬念，让读者想继续读下去"}, {"en": "To teach a math lesson", "zh": "为了上一堂数学课"}, {"en": "To answer all the mysteries clearly according to some versions of the story", "zh": "为了清楚地解答所有谜团（按书中另一种说法）"}, {"en": "To explain how to build a bookcase", "zh": "为了讲解如何做书架"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book is a spooky mystery (note 'The Kids of the Hollow' series). Ending on 'Who was scratching inside the hidden room?' leaves a cliffhanger that builds suspense and hooks readers for the next book.", "zh": "这是一本带有神秘气氛的故事（注意“空心谷的孩子们”系列）。以“是谁在密室里抓挠？”收尾留下悬念，制造紧张感并吸引读者继续读下一本。"}}], "extended": {"prompt": {"en": "Write the next part of the story. Describe what Sarah and the narrator find when they go back into the hidden room to discover who (or what) was scratching inside.", "zh": "续写故事的下一段。描写萨拉和叙述者回到密室，去查明究竟是谁（或什么）在里面抓挠时，发现了什么。"}, "guidance": {"en": ["Use clues from the book: the little bottles of herbs, the scissors, key, lantern, and the small book with yellowed papers.", "Keep the spooky, mysterious tone and end with another small twist or question."], "zh": ["运用书中的线索：那些小草药瓶、剪刀、钥匙、灯笼，以及那本夹着发黄纸张的小书。", "保持神秘恐怖的基调，并以另一个小转折或疑问收尾。"]}}};</script>
