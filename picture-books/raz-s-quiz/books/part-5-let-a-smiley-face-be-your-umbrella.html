<script>window.BOOK = {"slug": "part-5-let-a-smiley-face-be-your-umbrella", "title": "Part 5 Let a Smiley Face Be Your Umbrella", "titleZh": "第五部分：让笑脸做你的伞", "level": "S", "genre": "Humor", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Who is the main character of this story?", "zh": "这个故事的主角是谁？"}, "options": [{"en": "Ethan Jordan according to some versions of the story", "zh": "伊森·乔丹（按书中另一种说法）"}, {"en": "Charly, a ten-year-old girl with a boy's nickname", "zh": "查理，一个有着男孩绰号的十岁女孩"}, {"en": "Mr. Rooney", "zh": "鲁尼先生"}, {"en": "Aunt Dee", "zh": "迪阿姨"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "\"a ten-year-old girl with a boy's nickname, Charly.\"", "zh": "书中写道：“一个有着男孩绰号的十岁女孩，查理。”"}}, {"q": {"en": "What did Charly dig up to plant her garden of wild oats?", "zh": "查理为了种野燕麦花园，挖开了什么？"}, "options": [{"en": "A library", "zh": "一座图书馆"}, {"en": "A school", "zh": "一所学校"}, {"en": "Mr. Rooney's flowerbeds in Brewster Hill Park", "zh": "布鲁斯特山公园里鲁尼先生的花坛"}, {"en": "Her own backyard according to some versions of the story", "zh": "她自己的后院（按书中另一种说法）"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "\"I dug up Mr. Head-of-the-Parks-Department Rooney's flowerbeds in Brewster Hill Park so I could sow my wild oats.\"", "zh": "书中说“我挖开了公园管理处处长鲁尼先生的花坛，好播下我的野燕麦。”"}}, {"q": {"en": "What does 'trampled' mean?", "zh": "“trampled（踩踏）”是什么意思？"}, "options": [{"en": "Decorated. according to some versions of the story", "zh": "装饰。（按书中另一种说法）"}, {"en": "Watered.", "zh": "浇水。"}, {"en": "Walked heavily on something and caused damage.", "zh": "重重地踩在某物上并造成损害。"}, {"en": "Planted.", "zh": "种植。"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "Glossary: \"trampled (v.) to have walked heavily and caused damage.\"", "zh": "词汇表：“trampled——重重地踩过并造成损害。”"}}, {"q": {"en": "What did the stray cat do to Ethan Jordan?", "zh": "那只流浪猫对伊森·乔丹做了什么？"}, "options": [{"en": "Ran away.", "zh": "跑走了。"}, {"en": "Jumped up and landed on his head, appearing to tap dance.", "zh": "跳起来落在他头上，像是在跳踢踏舞。"}, {"en": "Hid in a tree. according to some versions of the story in an early draft of the book", "zh": "藏在树上。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Bit his foot.", "zh": "咬了他的脚。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "\"that stray cat... jumped up to avoid Murray's chomping jaws—and landed right on Ethan's head\" (Charly thought it was more of a Can-Can).", "zh": "书中说那只流浪猫“为躲开穆雷的撕咬跳起来——正好落在伊森头上”（查理觉得更像是跳康康舞）。"}}, {"q": {"en": "What was Mr. Rooney's punishment for Charly?", "zh": "鲁尼先生对查理的惩罚是什么？"}, "options": [{"en": "She had to pay money.", "zh": "她必须付钱。"}, {"en": "She was banned forever. according to some versions of the story in an early draft of the book", "zh": "她被永远禁止进入。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "She had to leave town.", "zh": "她必须离开镇子。"}, {"en": "She could use the park for 30 days only to care for her garden, then there would be judging.", "zh": "她只能在接下来30天里使用公园照料花园，之后将进行评比。"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "\"For the next 30 days, you can still use the park, but ONLY to care for your garden. After that, we will have the official opening and judging.\"", "zh": "书中说“接下来的30天，你仍可使用公园，但只能照料你的花园。之后我们将举行正式的开放和评比。”"}}, {"q": {"en": "What did people finally see in Charly's garden?", "zh": "人们最终在查理的花园里看到了什么？"}, "options": [{"en": "A smiling face—the circular animal path formed the head, dark holes the eyes, a half-circle the mouth.", "zh": "一张笑脸——动物踩出的环形小路构成头，深色洞是眼睛，半圆是嘴。"}, {"en": "A statue.", "zh": "一座雕像。"}, {"en": "A playground. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "一座游乐场。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "Just grass.", "zh": "只是一片草。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Aunt Dee asks everyone to step back; \"The circular path where Murray chased the animals... was the head. Two dark spots... were the eyes. The small half-circle... was the mouth.\" They saw a smiling face.", "zh": "迪阿姨让大家退后：“穆雷追着动物跑出的环形小路是头。两个深色点是眼睛。那个小半圆是嘴。”大家看到了一张笑脸。"}}, {"q": {"en": "How was the zigzag path in Mr. Rooney's flowerbeds actually created?", "zh": "鲁尼先生花坛里之字形的小路实际上是怎样形成的？"}, "options": [{"en": "By Mr. Rooney's careful design. according to some versions of the story", "zh": "由鲁尼先生精心设计。（按书中另一种说法）"}, {"en": "By Charly.", "zh": "由查理。"}, {"en": "By Aunt Dee.", "zh": "由迪阿姨。"}, {"en": "By Murray and the animals zigzagging through during the chase.", "zh": "是穆雷和动物们在追逐中来回穿梭踩出来的。"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "A Scrabble friend praised the \"clever\" zigzag path, but \"Murray and the animals had created the zigzag path through the flowerbeds during their chase!\"", "zh": "一位拼字游戏朋友称赞那“巧妙”的之字形小路，但“其实是穆雷和动物们在追逐中踩出来的！”"}}, {"q": {"en": "What lesson does Charly's story teach?", "zh": "查理的故事传达了什么道理？"}, "options": [{"en": "That effort and looking at things from a new angle can turn a mess into something that makes people smile.", "zh": "努力并从新角度看问题，能把一团糟变成让人微笑的东西。"}, {"en": "That you should never plant gardens. according to some versions of the story in an early draft of the book", "zh": "你永远不该种花园。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "That cats are dangerous.", "zh": "猫很危险。"}, {"en": "That parks should be closed.", "zh": "公园应该关闭。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Charly tended her trampled garden for 30 days and, by stepping back, everyone saw a smiling face—\"it puts a smile on people's faces.\"", "zh": "查理照料被踩踏的花园30天，退后一看，大家发现了一张笑脸——“它让人们脸上露出微笑。”"}}, {"q": {"en": "What is Charly's dog's name and breed?", "zh": "查理的狗叫什么名字，是什么品种？"}, "options": [{"en": "Murray, a Labrador retriever (about 100 pounds)", "zh": "穆雷，一只拉布拉多寻回犬（约100磅）"}, {"en": "Buddy, a beagle according to some versions of the story", "zh": "巴迪，一只比格犬（按书中另一种说法）"}, {"en": "Max, a terrier", "zh": "麦克斯，一只㹴犬"}, {"en": "Rover, a poodle", "zh": "罗弗，一只贵宾犬"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "\"my Labrador retriever, Murray\" who \"has trouble fitting his 100 pounds of slobbering dogginess into the back of our van.\"", "zh": "书中说“我的拉布拉多寻回犬穆雷”，它“那100磅流着口水的狗身子很难塞进我们的厢式车后座。”"}}, {"q": {"en": "This book is part of what kind of series?", "zh": "这本书属于什么类型的系列？"}, "options": [{"en": "A nonfiction science book.", "zh": "一本科普非虚构书。"}, {"en": "A five-part leveled-book series about Charly's adventures that can each be read alone.", "zh": "一个关于查理冒险的、分为五部分的分级读物系列，每部分都可独立阅读。"}, {"en": "A single standalone novel. according to some versions of the story in an early draft of the book", "zh": "一本独立的单行本小说。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "A poetry collection.", "zh": "一本诗集。"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The Editor's note says \"Charly's adventures span five parts in a leveled book format. Each part... can be read on its own\" and lists Part Five.", "zh": "编者按说“查理的冒险分为五个部分，采用分级读物形式。每一部分……都可独立阅读”，并列出第五部分。"}}], "extended": {"prompt": {"en": "Draw Charly's garden from a distance so it shows the smiling face (head, eyes, and mouth made by the animal paths), and label the parts.", "zh": "从远处画一幅查理的花园，使它呈现那张笑脸（由动物踩出的小路构成的头、眼睛和嘴巴），并标注各部分。"}, "guidance": {"en": ["Make a circular path for the head, two dark spots for the eyes, and a small half-circle for the smiling mouth.", "Remember Charly tended the garden for 30 days before the judging day."], "zh": ["画一个圆形路径作为头，两个深色点作为眼睛，一个小小的半圆作为微笑的嘴。", "记住查理在评比日前照料了花园30天。"]}}};</script>
