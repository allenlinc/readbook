 the Islamic New Year?", "zh": "中国和犹太人的新年与伊斯兰新年有什么不同？"}, "options": [{"en": "The Islamic New Year follows the Moon's cycles, while the Chinese and Jewish New Years are based on both the lunar and solar calendars.", "zh": "伊斯兰新年遵循月亮的周期，而中国和犹太人的新年同时基于阴历和阳历。"}, {"en": "All three follow exactly the same 365-day solar calendar.", "zh": "这三个节日都严格遵循同样的365天阳历。"}, {"en": "The Chinese New Year follows only the Moon, while the others follow the Sun.", "zh": "中国新年只遵循月亮，其他两个遵循太阳。"}, {"en": "The Islamic New Year is based on both calendars, while the others follow the Moon.", "zh": "伊斯兰新年基于两种历法，其他两个遵循月亮。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book states the Islamic New Year is based on a lunar calendar (the Moon's cycles), while the Chinese and Jewish New Years are based on both calendars.", "zh": "书中说伊斯兰新年基于阴历（月亮的周期），而中国和犹太人的新年同时基于两种历法。"}}, {"q": {"en": "Why does the author include so many different countries and regions in the book?", "zh": "作者为什么在书中收录了那么多不同的国家和地区？"}, "options": [{"en": "To show the many different ways people around the world celebrate the New Year.", "zh": "为了展示世界各地人们庆祝新年的许多不同方式。"}, {"en": "To prove that only one correct way to celebrate exists.", "zh": "为了证明只有一种正确的庆祝方式。"}, {"en": "To teach readers how to cook international foods.", "zh": "为了教读者烹饪各国食物。"}, {"en": "To list every country on Earth.", "zh": "为了列出地球上的每一个国家。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book's Focus Question is 'What are different ways people celebrate the New Year?' so the author gives examples from North America, the Americas, Europe, and Southeast Asia to answer it.", "zh": "本书的聚焦问题是'人们以哪些不同的方式庆祝新年？'，所以作者列举了北美、美洲、欧洲和东南亚等地的例子来回答它。"}}, {"q": {"en": "What is the book's main conclusion about New Year's traditions?", "zh": "关于新年传统，本书的主要结论是什么？"}, "options": [{"en": "Many traditions are shared worldwide, and cleaning the house and setting off fireworks are among the most popular ways to welcome the New Year.", "zh": "许多传统在世界各地被共同分享，而打扫房屋和燃放烟花是最受欢迎的迎接新年的方式之一。"}, {"en": "Every country must celebrate the New Year on January 1.", "zh": "每个国家都必须在1月1日庆祝新年。"}, {"en": "Fireworks are banned in most countries.", "zh": "烟花在大多数国家被禁止。"}, {"en": "Only children are allowed to celebrate the New Year.", "zh": "只有儿童才被允许庆祝新年。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The Conclusion says many traditions are shared around the world and that cleaning your house and setting off fireworks are two of the most popular ways to welcome the New Year.", "zh": "结论部分说许多传统在世界各地被共同分享，打扫房屋和燃放烟花是最受欢迎的迎接新年的两种方式。"}}], "extended": {"prompt": {"en": "How do you celebrate the New Year? Draw a picture and write about what you do, then compare your celebration to one in the book (for example, fireworks, cleaning the house, or special foods). (Based on the book's Writing/Art and Social Studies activities.)", "zh": "你是如何庆祝新年的？画一幅画并写下你做的事，然后把你家的庆祝方式和书中某一种（例如烟花、打扫房屋或特色食物）作比较。（基于本书的'写作与美术'和'社会研究'活动。）"}, "guidance": {"en": ["Name the special foods, clothes, or activities your family uses to celebrate.", "Compare it to a tradition in the book, such as fireworks (North America), twelve grapes (Central/South America), or water festivals (Thailand).", "Notice when each celebration takes place (January 1 vs. a different date).", "Use a Venn diagram to show similarities and differences."], "zh": ["说出你家庆祝时会用的特别食物、衣服或活动。", "把它和书中的某种传统作比较，比如烟花（北美）、十二颗葡萄（中南美）或泼水节（泰国）。", "注意各自的庆祝时间（1月1日还是其他日期）。", "用韦恩图（Venn diagram）展示相同点和不同点。"]}}};</script>
