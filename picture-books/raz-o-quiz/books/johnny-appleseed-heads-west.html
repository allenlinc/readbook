看到约翰尼自己把锅装满。（按书中另一种说法）"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Joey 'waited so long that he got tired and fell asleep,' and when he woke the pot was full; he 'found tracks from many kinds of animals around the pot,' suggesting animals filled it.", "zh": "乔伊‘等得太久，累了便睡着了’，醒来时锅已装满；他‘在锅周围发现了许多种动物的脚印’，暗示是动物把锅装满了。"}}, {"q": {"en": "What is the main purpose of this story about Johnny Appleseed?", "zh": "这个关于约翰尼·苹果籽的故事，主要目的是什么？"}, "options": [{"en": "To share a folktale about a man who loved nature and helped others.", "zh": "分享一个关于热爱自然、助人为乐的人的民间故事。"}, {"en": "To describe real history exactly as it happened.", "zh": "如实描述真实的历史。"}, {"en": "To explain the American Revolution fact by fact. according to some versions of the story", "zh": "逐条解释美国独立战争。（按书中另一种说法）"}, {"en": "To teach how to sell apple trees for money.", "zh": "教人如何卖苹果树赚钱。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "It is a retold folk tale (tall tale) celebrating Johnny's kindness to nature and people, not a strict historical record.", "zh": "这是一个关于约翰尼善待自然与他人的复述民间故事（夸张故事），并非严格的历史记录。"}}], "extended": {"prompt": {"en": "Johnny Appleseed is a tall tale. What real values or lessons do you think this story teaches about nature and helping others, and why do people still tell it today?", "zh": "《约翰尼·苹果籽西行记》是一个夸张的民间故事。你认为这个故事传达了关于自然和助人方面的哪些真实价值或道理？为什么至今人们仍在讲述它？"}, "guidance": {"en": "- Discuss how Johnny respected all living things, even thorny plants and dangerous animals.\n- Note that he planted trees for people he never met, thinking of the future.\n- Connect the tall-tale exaggerations to the real John Chapman's love of apple trees.", "zh": "- 讨论约翰尼如何尊重一切生命，哪怕是带刺的植物和危险的动物。\n- 指出他为素不相识的人种树，想到了未来。\n- 将故事中的夸张描写与真实的‘苹果籽约翰’（John Chapman）热爱苹果树联系起来。"}}};</script>
