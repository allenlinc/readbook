orn!'", "zh": "躲在里面，阿南西大喊：“是我，西瓜！”后来又对负鼠说：“西瓜在你出生前就会说话了！”"}}, {"q": {"en": "Whom does Possum first decide to show the 'talking watermelon' to?", "zh": "负鼠最先决定把“会说话的西瓜”拿给谁看？"}, "options": [{"en": "King Bear.", "zh": "熊国王。"}, {"en": "Raccoon.", "zh": "浣熊。"}, {"en": "Gopher.", "zh": "地鼠。"}, {"en": "Anansi's mother.", "zh": "阿南西的妈妈。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Possum cries, 'Eureka! I must show King Bear the discovery I have made,' and carries the melon to the king's den.", "zh": "负鼠喊道：“有了！我必须把这一发现拿给熊国王看，”并抱着西瓜去了国王的洞穴。"}}, {"q": {"en": "When King Bear demands the melon pay respects and it stays silent, what happens?", "zh": "当熊国王要求西瓜表示敬意，而西瓜保持沉默时，发生了什么？"}, "options": [{"en": "King Bear thinks it is a trick and angrily throws the melon far away.", "zh": "熊国王认为这是个恶作剧，愤怒地把西瓜远远扔了出去。"}, {"en": "King Bear believes it and bows down.", "zh": "熊国王相信了，并鞠躬行礼。"}, {"en": "Possum admits the trick himself.", "zh": "负鼠自己承认了这是骗局。"}, {"en": "The melon really starts to talk.", "zh": "西瓜真的开始说话了。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The melon stays 'mum,' King Bear growls it is 'treacherous trickery,' then 'picked up the melon... and chucked it as hard and as far as he could.'", "zh": "西瓜“一言不发”，熊国王咆哮说这是“奸诈的诡计”，然后“抓起西瓜……用尽全力远远地扔了出去”。"}}, {"q": {"en": "Which animals join Possum and Raccoon on the way to see the king?", "zh": "在路上，哪些动物加入了负鼠和浣熊一起去见国王？"}, "options": [{"en": "Gopher, Rat, and Squirrel.", "zh": "地鼠、老鼠和松鼠。"}, {"en": "Lion, Tiger, and Bear.", "zh": "狮子、老虎和熊。"}, {"en": "Fox, Rabbit, and Deer.", "zh": "狐狸、兔子和鹿。"}, {"en": "Snake, Frog, and Toad.", "zh": "蛇、青蛙和蟾蜍。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The text says they 'came upon Gopher, Rat, and Squirrel,' who each laugh until they hear the melon's voice themselves.", "zh": "文中说他们“遇见了地鼠、老鼠和松鼠”，它们各自嘲笑，直到亲耳听到西瓜的声音。"}}, {"q": {"en": "What is the author's purpose in retelling this Anansi story?", "zh": "作者重述这个阿南西故事的目的是什么？"}, "options": [{"en": "To entertain and share a West African folktale that teaches a lesson.", "zh": "为了娱乐读者，并分享一则传授道理的西非民间故事。"}, {"en": "To teach readers how to garden.", "zh": "教读者如何种菜。"}, {"en": "To explain the science of spiders.", "zh": "解释蜘蛛的科学知识。"}, {"en": "To warn about talking to strangers.", "zh": "警告不要和陌生人说话。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The ending notes Anansi tales come from 'the oral tradition of West Africa' and 'teach children worldwide about life.'", "zh": "结尾说明阿南西故事源自“西非的口头传统”，并“向全世界的儿童传授生活道理”。"}}, {"q": {"en": "How does Anansi finally escape from the watermelon?", "zh": "阿南西最终是如何从西瓜里逃出来的？"}, "options": [{"en": "King Bear throws the melon, it cracks open, and Anansi gets free.", "zh": "熊国王把西瓜扔出去，它裂开了，阿南西得以脱身。"}, {"en": "He digs his own way out.", "zh": "他自己挖了出来。"}, {"en": "Possum frees him on purpose.", "zh": "负鼠故意放了他。"}, {"en": "He waits until he shrinks back to normal size.", "zh": "他等到自己缩回正常大小。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The melon 'landed with a crack and a thud, splitting wide open. Anansi was free!' and skittered back to his peach tree.", "zh": "西瓜“啪的一声重重落地，裂成了两半。阿南西自由了！”他赶紧爬回了自己的桃树。"}}, {"q": {"en": "What does the story's ending note tell us about Anansi tales?", "zh": "故事的结尾说明告诉了我们关于阿南西故事的什么？"}, "options": [{"en": "They are West African folktales featuring a clever spider who outwits bigger animals to teach lessons.", "zh": "它们是西非民间故事，主角是聪明的蜘蛛，用智慧胜过体型更大的动物，以传授道理。"}, {"en": "They are true news stories from today.", "zh": "它们是今天的真实新闻故事。"}, {"en": "They were written by King Bear.", "zh": "它们是由熊国王写的。"}, {"en": "They come from the continent of Asia.", "zh": "它们源自亚洲大陆。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The note says they are 'based on the oral tradition of West Africa' and 'feature a clever spider who outwits bigger animals.'", "zh": "说明中写道它们“基于西非的口头传统”，并“以一只用智慧胜过更大动物的聪明蜘蛛为主角”。"}}, {"q": {"en": "At the end, what does Anansi suggest Possum should grow next year?", "zh": "在结尾，阿南西建议负鼠明年该种什么？"}, "options": [{"en": "More peaches, because 'the king is sure to listen to a peach!'", "zh": "更多的桃子，因为“国王一定会听桃子的话！”"}, {"en": "More watermelons.", "zh": "更多的西瓜。"}, {"en": "Corn.", "zh": "玉米。"}, {"en": "Peanuts.", "zh": "花生。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Anansi tells Possum, 'Perhaps you should grow more peaches! The king is sure to listen to a peach!'", "zh": "阿南西对负鼠说：“也许你该多种点桃子！国王一定会听桃子的话！”"}}], "extended": {"prompt": {"en": "Anansi tricks the other animals and escapes. What do you think the story teaches about cleverness? Have you ever solved a problem by thinking cleverly instead of using force?", "zh": "阿南西骗过其他动物并逃脱了。你认为这个故事想教给我们关于“聪明”的什么道理？你有没有曾经用巧妙的思考而不是蛮力解决过问题？"}, "guidance": {"en": ["Anansi is small but uses his wits to outsmart bigger animals, showing brains can beat brawn.", "The story is a folktale meant to teach lessons about life, from West African oral tradition.", "Discuss whether tricks are always fair, and when cleverness is helpful versus unkind."], "zh": ["阿南西体型小，却用智慧胜过体型更大的动物，说明智胜勇。", "这是西非口头传统的民间故事，用来传授生活道理。", "讨论恶作剧是否总是公平，何时聪明有用、何时不妥。"]}}};</script>
