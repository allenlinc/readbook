om the train, stake her claim for a school she wanted to build, then jump back on before the last car passed.", "zh": "黛西计划从火车上跳下，为她想建的学校插桩认领，然后在最后一节车厢经过前跳回车上。"}}, {"q": {"en": "What does Chief Black Eagle hope for at the end of the book?", "zh": "在书的结尾，黑鹰酋长希望什么？"}, "options": [{"en": "That he will win the most land", "zh": "他会赢得最多的土地"}, {"en": "That the government keeps its promise not to take his tribe's land again, and that the fawn survives", "zh": "政府信守诺言不再夺走他部落的土地，并且那只小鹿能活下来"}, {"en": "That the boomers leave by train", "zh": "淘地者乘火车离开"}, {"en": "That he can build a blacksmith shop", "zh": "他能开一家铁匠铺"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "He hopes the government keeps its promise not to take their land again, and that the fawn survives as the hunting grounds become farms.", "zh": "他希望政府信守诺言不再夺走他们的土地，并且那只小鹿能活下来，因为狩猎场即将变成农场。"}}, {"q": {"en": "Why does the author include the perspective of Chief Black Eagle?", "zh": "作者为什么要加入黑鹰酋长的视角？"}, "options": [{"en": "To add the view of Native Americans whose land was being taken", "zh": "为了加入土地正被夺走的美国原住民的视角"}, {"en": "To explain how to build a log cabin", "zh": "为了解释如何建造原木小屋"}, {"en": "To describe the railroad schedule", "zh": "为了描述火车时刻表"}, {"en": "To show who fired the shot", "zh": "为了说明谁鸣的枪"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "His viewpoint shows the cost of the land run to Native Americans whose lands were taken.", "zh": "他的视角展现了土地奔跑给土地被夺走的美国原住民带来的代价。"}}, {"q": {"en": "What is the author's main purpose in writing The Great Land Run?", "zh": "作者写《大土地奔跑》的主要目的是什么？"}, "options": [{"en": "To describe the excitement and different people's hopes and worries during a real historical land run", "zh": "描述一场真实历史土地奔跑中人们的兴奋，以及不同人的希望与担忧"}, {"en": "To teach math", "zh": "教数学"}, {"en": "To argue against trains", "zh": "反对火车"}, {"en": "To tell a fairy tale", "zh": "讲述一个童话"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "I
