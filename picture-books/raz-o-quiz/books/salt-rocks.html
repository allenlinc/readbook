re soft like sand.", "zh": "它们像沙子一样松软。"}, {"en": "They are high in the mountains.", "zh": "它们位于高山上。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says salt flats are 'very large, flat areas' that are smooth because salt covers the ground, letting a jet car reach 763 mph.", "zh": "书中说盐滩是“非常大而平坦的区域”，因盐覆盖而光滑，能让喷汽车达到每小时763英里。"}}, {"q": {"en": "What was the author's main purpose in writing this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"en": "To teach fun and surprising facts about salt.", "zh": "为了讲授关于盐的有趣且令人惊讶的事实。"}, {"en": "To sell salt to readers.", "zh": "为了向读者卖盐。"}, {"en": "To tell a made-up story.", "zh": "为了讲一个虚构的故事。"}, {"en": "To teach how to cook dinner.", "zh": "为了教人做晚饭。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book is informational, sharing real facts about salt (its uses, history, science) in a lively, fun way to teach readers.", "zh": "这是一本知识性书籍，以生动有趣的方式分享关于盐的真实事实（用途、历史、科学）来教导读者。"}}, {"q": {"en": "How does the author make the topic of salt interesting for kids?", "zh": "作者如何让盐这个主题对孩子来说有趣？"}, "options": [{"en": "By using a character named Crystal and fun sayings.", "zh": "通过用一个叫Crystal的角色和有趣的谚语。"}, {"en": "By writing only in a foreign language.", "zh": "通过只用外语书写。"}, {"en": "By avoiding any facts.", "zh": "通过避免任何事实。"}, {"en": "By using only numbers.", "zh": "通过只用数字。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book uses a character 'Crystal' (like salt crystals) and 'Salt Sayings' boxes to make the topic engaging for young readers.", "zh": "书中用了角色“Crystal”（像盐的晶体）和“盐的谚语”小框，让主题对年轻读者更有吸引力。"}}, {"q": {"en": "Where is one of the biggest salt mines in the world located?", "zh": "世界上最大之一的盐矿位于哪里？"}, "options": [{"en": "Under the city of Detroit, Michigan.", "zh": "在密歇根州底特律市的地下。"}, {"en": "On top of a mountain in Germany.", "zh": "在德国的一座山顶上。"}, {"en": "In the middle of the ocean.", "zh": "在海洋中央。"}, {"en": "Inside the White House.", "zh": "在白宫里面。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says 'One of the biggest salt mines in the world is under the city of Detroit, Michigan' with about 50 miles of underground salt roads.", "zh": "书中说“世界上最大的盐矿之一位于密歇根州底特律市的地下”，有约50英里的地下盐道。"}}], "extended": {"prompt": {"en": "The book says salt was once so valuable that people were paid with it (the word 'salary' comes from salt). Why do you think something common today could become very valuable in the future, and what would it be?", "zh": "书中说盐曾如此珍贵，以至于人们用盐来支付报酬（“salary”一词源于盐）。你认为今天常见的什么东西未来可能变得非常珍贵？会是什么？"}, "guidance": {"en": "- Connect to the book's idea that salt was once expensive and locked up.\n- Encourage thinking about scarcity and need (water, clean air, etc.).\n- Accept any reasonable, explained idea from the student.", "zh": "- 联系书中盐曾经昂贵并被锁起来的观点。\n- 鼓励学生思考稀缺性与需求（水、洁净空气等）。\n- 接受学生提出的任何合理且有解释的想法。"}}};</script>
