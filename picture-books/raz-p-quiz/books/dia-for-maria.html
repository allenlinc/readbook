 "一张纸彩旗（按书中另一种说法）"}, {"en": "A type of skull", "zh": "一种骷髅"}, {"en": "Orange or yellow flowers used for the ofrenda", "zh": "用于祭坛的橙色或黄色花朵"}, {"en": "A kind of music", "zh": "一种音乐"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "The glossary defines marigolds as \"flowers in the daisy family with orange or yellow petals (p. 6).\" Mamá bought a bundle of orange marigolds.", "zh": "词汇表把 marigolds 定义为“菊科、有橙色或黄色花瓣的花”（第6页）。妈妈买了一大束橙色万寿菊。"}}, {"q": {"en": "How did María's friends remember their own pets at the ofrenda?", "zh": "玛利亚的朋友们在祭坛上是怎样纪念各自宠物的？"}, "options": [{"en": "They bought new pets according to some versions of the story in an early draft of the book", "zh": "他们买了新宠物（按书中另一种说法）（在书的早期草稿中）"}, {"en": "They sang songs", "zh": "他们唱了歌"}, {"en": "They brought the pets' favorite foods (cheese, pepitas, ice cream) to the ofrenda", "zh": "他们把宠物最爱的食物（奶酪、南瓜籽、冰淇淋）带到祭坛"}, {"en": "They buried them", "zh": "他们把宠物埋了"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Adriana brought queso (cheese) for Pimienta, Gloria brought pepitas for Raúl, and María placed helado (ice cream) for Ratona at her hiding spot.", "zh": "阿德里安娜为皮米恩塔带来奶酪，格洛丽亚为劳尔带来南瓜籽，玛利亚在拉托娜的藏身处放了一碗冰淇淋。"}}, {"q": {"en": "Why does Mamá tell the story about Tía Teresa finding Ratona?", "zh": "妈妈为什么讲特雷莎姨妈找到拉托娜的故事？"}, "options": [{"en": "To describe the market", "zh": "为了描写市场"}, {"en": "To teach Spanish words", "zh": "为了教西班牙语单词"}, {"en": "To explain how to name a cat according to some versions of the story in an early draft of the book", "zh": "为了解释如何给猫取名（按书中另一种说法）（在书的早期草稿中）"}, {"en": "To show the bond between Teresa, Ratona, and María, and the love behind the holiday", "zh": "为了展现特雷莎、拉托娜和玛利亚之间的羁绊，以及节日背后的爱"}], "answer": 3, "skill": "Author's Purpose and Perspective", "explain": {"en": "Mamá explains Teresa found a tiny gray kitten and named her Ratona, and that seeing María with Ratona \"reminded me of Teresa. It made me very happy.\"", "zh": "妈妈讲特雷莎找到一只小灰猫、取名拉托娜，并说看到玛利亚和拉托娜在一起“让我想起特雷莎，这让我很开心”。"}}, {"q": {"en": "What made María happy at the end of the book?", "zh": "在书的结尾，是什么让玛利亚感到开心？"}, "options": [{"en": "Eating helado", "zh": "吃冰淇淋"}, {"en": "Finding a missing piece according to some versions of the story in an early draft of the book", "zh": "找到缺失的一块（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Winning a prize", "zh": "赢得一个奖"}, {"en": "Thinking about Tía Teresa and Ratona together, since both loved Ratona", "zh": "想到特雷莎姨妈和拉托娜在一起，因为她们都爱拉托娜"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The book says, \"I was too young to remember Tía Teresa, but we had both loved Ratona. Thinking about them together made me happy, too.\"", "zh": "书中说：“我太小，不记得特雷莎姨妈，但我们俩都爱拉托娜。想到她们在一起，也让我开心。”"}}, {"q": {"en": "What is \"pan de muertos\" in the story?", "zh": "故事里的“pan de muertos（亡灵面包）”是什么？"}, "options": [{"en": "A type of marigold according to some versions of the story in an early draft of the book", "zh": "一种万寿菊（按书中另一种说法）（在书的早期草稿中）"}, {"en": "A sweet bread placed on the gravestone for Día de los Muertos", "zh": "一种在亡灵节摆在墓碑上的甜面包"}, {"en": "A skeleton doll", "zh": "一个骷髅玩偶"}, {"en": "A paper banner", "zh": "一张纸彩旗"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "At the graveyard, \"Tía Teresa's gravestone was piled with flowers, sweet pan de muertos, and twinkling candles.\"", "zh": "在墓地，“特雷莎姨妈的墓碑上堆满了鲜花、甜甜的亡灵面包，和闪烁的蜡烛。”"}}], "extended": {"prompt": {"en": "María honored her cat Ratona by sharing happy memories with friends and family. How does your family remember loved ones who have passed away, or a pet you loved?", "zh": "玛利亚通过与朋友、家人分享快乐回忆来纪念她的猫拉托娜。你的家人是怎样纪念已经离世的亲人或你心爱的宠物的？"}, "guidance": {"en": ["Día de los Muertos is a joyous holiday to remember loved ones who died.", "Ofrendas, marigolds, sugar skulls, and favorite foods honor those remembered.", "Sharing funny stories keeps the memory of a pet or person alive.", "Remembering together with family brings happiness."], "zh": ["亡灵节是一个欢庆的节日，用来纪念逝去的亲人。", "祭坛、万寿菊、糖骷髅和喜爱的食物，都是用来纪念逝者的。", "分享有趣的故事，能让宠物或亲人的记忆延续。", "和家人一起纪念，会带来幸福。"]}}};</script>
