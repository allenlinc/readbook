<script>window.BOOK = {"slug": "friends-around-the-world", "title": "Friends Around the World", "titleZh": "世界各地的朋友", "level": "P", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Who is the friend from Korea, and how old is he?", "zh": "来自韩国的朋友叫什么，几岁？"}, "options": [{"en": "Kipanik, eight years old", "zh": "基帕尼克，八岁"}, {"en": "Chang-Yong, ten years old", "zh": "昌勇，十岁"}, {"en": "Jessica, six years old", "zh": "杰西卡，六岁"}, {"en": "Natasha, seven years old", "zh": "娜塔莎，七岁"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says, \"Hi, I am Chang-Yong, and I am ten years old. My family lives in an apartment in Seoul, the capital of South Korea.\"", "zh": "书中说：“你好，我叫昌勇，今年十岁。我家住在韩国首都首尔的一间公寓里。”"}}, {"q": {"en": "What special Korean food does Chang-Yong say he enjoys eating?", "zh": "昌勇说他喜欢吃什么特别的韩国食物？"}, "options": [{"en": "Caribou with ketchup", "zh": "加番茄酱的北美驯鹿肉"}, {"en": "Raw fish", "zh": "生鱼片"}, {"en": "Buckwheat pancakes called bliny", "zh": "叫“bliny”的荞麦煎饼"}, {"en": "Barbecued beef called bulgogi", "zh": "叫“bulgogi”的烤牛肉"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The book says, \"I enjoy eating barbecued beef, which Koreans call bulgogi (bul-GO-gee). It's a delicious food!\"", "zh": "书中说：“我喜欢吃烤牛肉，韩国人叫它 bulgogi（烤牛肉）。真好吃！”"}}, {"q": {"en": "In Australia, Jessica watches an animal that lives only in her country. Which animal is it?", "zh": "在澳大利亚，杰西卡观察一种只生活在她祖国的动物。是哪一种？"}, "options": [{"en": "The kangaroo", "zh": "袋鼠"}, {"en": "The polar bear", "zh": "北极熊"}, {"en": "The penguin", "zh": "企鹅"}, {"en": "The caribou", "zh": "北美驯鹿"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says, \"A kangaroo is an animal that lives only in Australia. We like to watch the kangaroos hop around our yard.\"", "zh": "书中说：“袋鼠是一种只生活在澳大利亚的动物。我们喜欢看袋鼠在院子里蹦跳。”"}}, {"q": {"en": "In Russia, Natasha wears a fur hat with earflaps to keep warm. What is it called?", "zh": "在俄罗斯，娜塔莎戴一顶带护耳的毛皮帽子保暖。它叫什么？"}, "options": [{"en": "A boomerang", "zh": "回旋镖"}, {"en": "An enkaji according to some versions of the story", "zh": "enkaji（草顶木屋）（按书中另一种说法）"}, {"en": "An ushanka", "zh": "ushanka（护耳毛皮帽）"}, {"en": "A hanbok", "zh": "hanbok（韩服）"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "The book says, \"I wear a heavy coat and a fur hat called an ushanka (oo-SHAHN-kuh) to keep me warm. My ushanka has earflaps to keep my ears warm, too.\"", "zh": "书中说：“我穿厚外套，戴一顶叫 ushanka 的毛皮帽子保暖。我的 ushanka 还有护耳，能护住耳朵。”"}}, {"q": {"en": "In Tanzania, Manka's Masai people live in wooden huts with grass roofs. What word does the book use for these huts?", "zh": "在坦桑尼亚，曼卡的马赛人住在草顶木屋里。书中用什么词称呼这种屋子？"}, "options": [{"en": "Ushankas", "zh": "ushankas"}, {"en": "Enkajis", "zh": "enkajis"}, {"en": "Blinys", "zh": "blinys"}, {"en": "Hanboks", "zh": "hanboks"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says, \"Most of us live in wooden huts with grass roofs called enkajis (en-KAW-jees).\"", "zh": "书中说：“我们大多住在草顶的木屋里，这种屋子叫 enkajis。”"}}, {"q": {"en": "Among the Masai in Tanzania, the book describes different jobs for men and women. Which statement combines what it says?", "zh": "在坦桑尼亚的马赛人当中，书里描述了男女不同的分工。哪句话把这些内容综合起来了？"}, "options": [{"en": "Everyone hunts kangaroos", "zh": "大家都猎袋鼠"}, {"en": "Children build the huts and men carry water", "zh": "孩子盖屋子，男人打水"}, {"en": "Women take care of cattle, while men build huts according to some versions of the story in an early draft of the book", "zh": "女人照看牛群，男人盖屋子（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Men take care of the cattle, while women build the huts, make bead jewelry, and carry water", "zh": "男人照看牛群，女人盖屋子、做串珠首饰、去井边打水"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says, \"My father and the other men take care of the cattle... The women build the enkajis, make jewelry out of beads, and carry water from the well.\"", "zh": "书中说：“我父亲和其他男人负责照看牛群……女人们盖 enkajis，用珠子做首饰，并去井边打水。”"}}, {"q": {"en": "In far northern Canada, how does Kipanik's family usually travel across the snowy land?", "zh": "在加拿大最北端，基帕尼克一家平时如何在雪地里出行？"}, "options": [{"en": "By dogsled pulled by a team of dogs", "zh": "乘坐狗拉雪橇"}, {"en": "By boomerang according to some versions of the story", "zh": "用回旋镖（按书中另一种说法）"}, {"en": "By airplane", "zh": "坐飞机"}, {"en": "By kangaroo", "zh": "骑袋鼠"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says, \"My family often uses a dogsled to travel through areas covered with snow. We have a team of dogs that work hard pulling us wherever we need to go.\"", "zh": "书中说：“我家经常用狗拉雪橇在积雪的地方出行。我们有一队狗辛勤地拉着我们去任何要去的地方。”"}}, {"q": {"en": "The book's conclusion invites readers to think about the children. What is the author's main message?", "zh": "本书的结尾请读者想想这些孩子。作者的主要用意是什么？"}, "options": [{"en": "You can be part of a worldwide friendship circle; children are both alike and different", "zh": "你也能成为全球友谊圈的一员；孩子们既相似又不同"}, {"en": "Animals are more important than people according to some versions of the story in an early draft of the book", "zh": "动物比人更重要（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Only Korean food is worth eating", "zh": "只有韩国食物值得吃"}, {"en": "You should move to another country", "zh": "你应该搬去别的国家"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The conclusion asks, \"How are you like these children? How are you different? You, too, can be a part of this worldwide friendship circle. Do you want to join?\"", "zh": "结尾写道：“你和这些孩子有什么相同？有什么不同？你也能成为全球友谊圈的一员。你想加入吗？”"}}, {"q": {"en": "How does the author organize the book as she introduces children from different places?", "zh": "作者在介绍不同地方的孩子们时，是如何组织这本书的？"}, "options": [{"en": "By listing countries in alphabetical order only according to some versions of the story", "zh": "只按国家字母顺序罗列（按书中另一种说法）"}, {"en": "By 'visiting' a child friend in a different country, one per chapter", "zh": "通过“拜访”一个个不同国家的孩子，每章一位"}, {"en": "By telling one long story with no chapters", "zh": "讲一个没有章节的长故事"}, {"en": "By showing only pictures with no words", "zh": "只用图片，没有文字"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The table of contents shows chapters like \"Let's Visit a Friend in Korea,\" \"...in Australia,\" \"...in Russia,\" each introducing one child in a new place.", "zh": "目录里是“拜访韩国的一位朋友”“……澳大利亚的朋友”“……俄罗斯的朋友”等章节，每章介绍一个新地方的一个孩子。"}}, {"q": {"en": "The introduction says to 'follow the sunlight as it travels around the world' and notes all friends 'love to sing and play.' Why does the author begin this way?", "zh": "引言说“跟随阳光环游世界”，并指出所有朋友都“爱唱歌、爱玩耍”。作者为什么这样开头？"}, "options": [{"en": "To explain how the Sun moves scientifically according to some versions of the story in an early draft of the book", "zh": "为了科学地解释太阳如何运动（按书中另一种说法）（在书的早期草稿中）"}, {"en": "To describe a single family", "zh": "为了描写一个家庭"}, {"en": "To show that children everywhere share joyful things in common, linking them across the globe", "zh": "为了说明世界各地的孩子都有共通的快乐，把他们联结在一起"}, {"en": "To teach a new language", "zh": "为了教一门新语言"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "The introduction says, \"Follow the sunlight as it travels around the world... But all of these friends love to sing and play,\" connecting children worldwide through shared joys.", "zh": "引言写道：“跟随阳光环游世界……但这些朋友都爱唱歌、爱玩耍”，用共同的快乐把世界各地的孩子联系在一起。"}}], "extended": {"prompt": {"en": "The book shows children from Korea, Australia, Russia, Tanzania, and Canada. Which friend's life is most like yours, and which is most different? What would you like to ask one of them?", "zh": "本书介绍了韩国、澳大利亚、俄罗斯、坦桑尼亚和加拿大的孩子。哪位朋友的生活和你最像，哪位最不同？你想向其中一位问什么问题？"}, "guidance": {"en": ["Each child lives in a different country with different customs.", "Some eat different foods, wear different clothes, and play different games.", "All the children love to sing, play, and be friends.", "Think about what you share and what is new to you."], "zh": ["每个孩子生活在不同国家，有不同的习俗。", "他们吃不同的食物、穿不同的衣服、玩不同的游戏。", "所有孩子都爱唱歌、爱玩耍、爱交朋友。", "想想你和他们的共同点，以及让你觉得新鲜的地方。"]}}};</script>
