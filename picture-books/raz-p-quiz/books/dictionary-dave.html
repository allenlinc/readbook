ny comment", "zh": "一句俏皮话"}, {"en": "Sure of oneself according to some versions of the story", "zh": "对自己有把握（按书中另一种说法）"}, {"en": "Done for no reason", "zh": "毫无理由地做的"}], "answer": 3, "skill": "Craft and Structure", "explain": {"en": "Ben says, \"Arbitrary means done for no reason. Stationary means not moving,\" correcting Dave's mix-up.", "zh": "贝说：“arbitrary 是毫无理由地做的。stationary 是不动的。”纠正了戴夫的混淆。"}}, {"q": {"en": "How did Ben and Dave fix Dave's paper together?", "zh": "贝和戴夫是怎样一起修改戴夫的作文的？"}, "options": [{"en": "They looked up the wrong words and replaced them with correct ones and synonyms", "zh": "他们查出错词，并用正确的词及同义词替换"}, {"en": "They asked the teacher to write it according to some versions of the story in an early draft of the book", "zh": "他们请老师代写（按书中另一种说法）（在书的早期草稿中）"}, {"en": "They threw the paper away", "zh": "他们把作文扔了"}, {"en": "They copied Cindy's paper", "zh": "他们抄了辛迪的作文"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Ben explained fiendish means evil/cruel and they chose terrific (Dave suggested outstanding); abolish means get rid of, replaced with abode found in the dictionary.", "zh": "贝解释 fiendish 是邪恶/残忍，他们选了 terrific（戴夫建议 outstanding）；abolish 是去除，用词典查到的 abode 替代。"}}, {"q": {"en": "Why does the author include Ben feeling bad after correcting Dave?", "zh": "作者为什么要写到贝在纠正戴夫后感到难过？"}, "options": [{"en": "To describe gym class", "zh": "为了描写体育课"}, {"en": "To prove Ben was wrong according to some versions of the story in an early draft of the book", "zh": "为了证明贝是错的（按书中另一种说法）（在书的早期草稿中）"}, {"en": "To teach grammar rules", "zh": "为了教语法规则"}, {"en": "To show that embarrassing others can hurt feelings and that true friendship matters", "zh": "为了说明让他人难堪会伤人感情，而真挚的友谊很重要"}], "answer": 3, "skill": "Author's Purpose and Perspective", "explain": {"en": "Ben \"saw Dave blush. He realized that Dave was embarrassed... Ben felt awful and wanted to apologize,\" showing the value of kindness over being right.", "zh": "贝“看到戴夫脸红。他意识到戴夫很尴尬……贝很难过，想要道歉”，体现了善良比争对错更重要。"}}, {"q": {"en": "What did Dave ask Ben to teach him at the end of the story?", "zh": "在故事结尾，戴夫请贝教他什么？"}, "options": [{"en": "How to read", "zh": "如何阅读"}, {"en": "How to \"speak Mississippi\"", "zh": "如何“说密西西比口音”"}, {"en": "How to spell", "zh": "如何拼写"}, {"en": "How to play baseball according to some versions of the story", "zh": "如何打棒球（按书中另一种说法）"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Dave smiled and said, \"Maybe sometime you could teach me how to speak Mississippi?\" and Ben agreed to teach him at lunch.", "zh": "戴夫笑着说：“也许什么时候你能教我怎么‘说密西西比’？”贝答应午饭时教他。"}}, {"q": {"en": "In the story, what does \"fiendish\" mean?", "zh": "在故事里，“fiendish”是什么意思？"}, "options": [{"en": "Evil or cruel, like the prank Dave's brother played", "zh": "邪恶或残忍，就像戴夫哥哥开的玩笑"}, {"en": "Outstanding or terrific according to some versions of the story", "zh": "出色或极好的（按书中另一种说法）"}, {"en": "To get rid of something", "zh": "去除某物"}, {"en": "A kind of trip", "zh": "一种旅行"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Ben tells Dave, \"fiendish means evil or cruel—like that prank your brother played on you,\" then they pick a better word for his paper.", "zh": "贝对戴夫说：“fiendish 是邪恶或残忍——就像你哥哥对你开的那个玩笑”，然后他们为作文选了更好的词。"}}], "extended": {"prompt": {"en": "Ben and Dave became friends by sharing their love of words and helping each other. Tell about a time you became friends with someone by sharing an interest or helping them.", "zh": "贝和戴夫因为共同热爱词语、互相帮助而成了朋友。讲讲你曾经通过分享兴趣或帮助对方，与某人成为朋友的一段经历。"}, "guidance": {"en": ["Ben loved words and was a good speller.", "Dave studied vocabulary quizzes every night but was taught wrong meanings.", "Ben helped Dave fix his paper instead of just correcting him.", "They both earned good grades and found a good friend."], "zh": ["贝热爱词语，并且拼写很好。", "戴夫每晚都背词汇测验，却被教了错误的词义。", "贝没有只是纠正戴夫，而是帮他修改作文。", "两人都得了好成绩，并收获了一段友谊。"]}}};</script>
