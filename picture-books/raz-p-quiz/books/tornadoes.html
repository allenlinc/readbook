<script>window.BOOK = {"slug": "tornadoes", "title": "Tornadoes", "titleZh": "龙卷风", "level": "P", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "What do scientists believe produces the strongest and most violent tornadoes?", "zh": "科学家认为最强烈、最具破坏性的龙卷风由什么产生？"}, "options": [{"en": "Hurricanes", "zh": "飓风"}, {"en": "Large thunderstorms called supercells", "zh": "被称为超级单体风暴的大雷暴"}, {"en": "Earthquakes", "zh": "地震"}, {"en": "Volcanic eruptions according to some versions of the story", "zh": "火山喷发（按书中另一种说法）"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says: 'They know that the strongest and most violent tornadoes come from large thunderstorms called supercells.'", "zh": "书中写道：'他们知道，最强烈、最具破坏性的龙卷风来自被称为超级单体风暴的大雷暴。'"}}, {"q": {"en": "According to the book, how wide was the biggest tornado on record, and where did it strike?", "zh": "根据本书，有记录以来最大的龙卷风有多宽，它在哪里登陆？"}, "options": [{"en": "1 mile wide; Texas in 2000", "zh": "1英里宽；2000年的得克萨斯州"}, {"en": "0.5 miles wide; Nebraska in 2010 according to some versions of the story", "zh": "0.5英里宽；2010年内布拉斯加州（按书中另一种说法）"}, {"en": "5 miles wide; Kansas in 1990", "zh": "5英里宽；1990年的堪萨斯州"}, {"en": "Almost 2.6 miles wide; Oklahoma in 2013", "zh": "近2.6英里宽；2013年的俄克拉荷马州"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The book states: 'The biggest tornado on record was almost 2.6 miles wide (4.2 km). It struck Oklahoma in 2013.'", "zh": "书中写道：'有记录以来最大的龙卷风宽近2.6英里（4.2公里）。它于2013年袭击了俄克拉荷马州。'"}}, {"q": {"en": "According to the National Weather Service, what does a 'tornado watch' mean?", "zh": "根据国家气象局，'龙卷风观测警报'（watch）是什么意思？"}, "options": [{"en": "It is very possible a tornado will strike soon", "zh": "龙卷风很可能很快袭来"}, {"en": "A hurricane is coming", "zh": "飓风即将来临"}, {"en": "The storm is over", "zh": "风暴已经结束"}, {"en": "A tornado has already been spotted according to some versions of the story", "zh": "龙卷风已经被看见了（按书中另一种说法）"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says the NWS 'issues a tornado watch when it's very possible that a tornado will strike soon' and a warning 'when a tornado has actually been spotted.'", "zh": "书中写道，国家气象局'在龙卷风很可能很快袭来时发布观测警报'，而在'龙卷风真正被看见时'发布警告。"}}, {"q": {"en": "What is the Enhanced Fujita (EF) Scale used for?", "zh": "增强藤田（EF）等级的作用是什么？"}, "options": [{"en": "Counting tornadoes per year", "zh": "统计每年龙卷风的数量"}, {"en": "Rating a tornado's strength based on wind speed", "zh": "依据风速评定龙卷风的强度"}, {"en": "Predicting exactly when a tornado will strike according to some versions of the story", "zh": "准确预测龙卷风何时袭来（按书中另一种说法）"}, {"en": "Measuring how much rain falls", "zh": "测量降雨量"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "T. Theodore Fujita developed the EF Scale 'as a way to rate a tornado's strength based on wind speed.'", "zh": "T·西奥多·藤田开发增强藤田等级，'用来依据风速评定龙卷风的强度'。"}}, {"q": {"en": "What is 'Tornado Alley'?", "zh": "什么是'龙卷风走廊'？"}, "options": [{"en": "A theme park", "zh": "一个主题公园"}, {"en": "A type of thunderstorm according to some versions of the story", "zh": "一种雷暴（按书中另一种说法）"}, {"en": "The central U.S. region where most tornadoes occur", "zh": "美国中部龙卷风最常发生的地区"}, {"en": "A weather satellite", "zh": "一颗气象卫星"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "The book says more than 1,000 tornadoes a year occur in 'the central part of the country, also known as Tornado Alley,' including parts of South Dakota, Nebraska, Colorado, Kansas, Oklahoma, and Texas.", "zh": "书中说每年逾千场龙卷风发生在'美国中部地区，即龙卷风走廊'，包括南达科他、内布拉斯加、科罗拉多、堪萨斯、俄克拉荷马和得克萨斯的部分地区。"}}, {"q": {"en": "What is the safest place to go during a tornado warning if you are at home?", "zh": "如果你在家时发布龙卷风警告，最安全的地方是哪里？"}, "options": [{"en": "Outside under a tree", "zh": "在户外的树下"}, {"en": "A basement, closet, or bathroom away from windows", "zh": "远离窗户的地下室、壁橱或浴室"}, {"en": "On the roof", "zh": "在屋顶上"}, {"en": "Near a window to watch the storm according to some versions of the story", "zh": "靠近窗户观察风暴（按书中另一种说法）"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book advises: 'go indoors, into a basement if possible. You can also go into a closet or bathroom. Try to stay away from windows.'", "zh": "书中建议：'进入室内，尽可能进入地下室。也可以进入壁橱或浴室。尽量远离窗户。'"}}, {"q": {"en": "Which tornado killed the most people in U.S. history, according to the book?", "zh": "根据本书，美国历史上哪场龙卷风致死人数最多？"}, "options": [{"en": "The 2011 Missouri EF-5 tornado according to some versions of the story in an early draft of the book", "zh": "2011年密苏里州的EF-5级龙卷风（按书中另一种说法）（在书的早期草稿中）"}, {"en": "The March 2012 Henryville tornado", "zh": "2012年3月亨利维尔的龙卷风"}, {"en": "The 1925 tornado through Missouri, Illinois, and Indiana, killing 695", "zh": "1925年穿过密苏里、伊利诺伊和印第安纳的龙卷风，造成695人死亡"}, {"en": "The 1992 Mississippi tornado", "zh": "1992年密西西比州的龙卷风"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says a 1925 tornado 'killed 695 people, the highest number of people killed by a tornado in U.S. history.'", "zh": "书中写道，1925年的龙卷风'造成695人死亡，是美国历史上致死人数最多的龙卷风'。"}}, {"q": {"en": "Why do scientists estimate a tornado's wind speed by examining the damage it causes?", "zh": "为什么科学家通过检查龙卷风造成的破坏来估算其风速？"}, "options": [{"en": "Because it is difficult to get close to a tornado", "zh": "因为难以靠近龙卷风"}, {"en": "Because the EF Scale is wrong according to some versions of the story", "zh": "因为EF等级不准确（按书中另一种说法）"}, {"en": "Because they have no tools", "zh": "因为他们没有工具"}, {"en": "Because tornadoes are silent", "zh": "因为龙卷风没有声音"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book says: 'Because it's difficult to get close to a tornado, scientists estimate its wind speed by examining the damage it causes.'", "zh": "书中写道：'由于难以靠近龙卷风，科学家通过检查其造成的破坏来估算风速。'"}}, {"q": {"en": "What two air masses mix to create perfect tornado conditions in Tornado Alley?", "zh": "在龙卷风走廊，哪两团空气混合造成了完美的龙卷风条件？"}, "options": [{"en": "Warm, moist air from the Gulf of Mexico and cool, dry air from Canada", "zh": "来自墨西哥湾的温暖潮湿空气与来自加拿大的寒冷干燥空气"}, {"en": "Ocean air and mountain air", "zh": "海洋空气与山地空气"}, {"en": "Hot desert air and cold polar air", "zh": "炎热的沙漠空气与寒冷的极地空气"}, {"en": "Wet air from the Pacific and dry air from the East according to some versions of the story", "zh": "来自太平洋的湿润空气与来自东部的干燥空气（按书中另一种说法）"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book says warm, moist air travels north from the Gulf of Mexico and 'mixes with cool, dry air moving south from Canada.'", "zh": "书中说温暖的潮湿空气从墨西哥湾向北移动，并'与从加拿大向南移动的寒冷干燥空气混合'。"}}, {"q": {"en": "What should you do if you are outdoors with no shelter during a tornado?", "zh": "如果你在户外且找不到庇护所，遇到龙卷风应该怎么做？"}, "options": [{"en": "Stand still and watch", "zh": "站着不动观看"}, {"en": "Run toward the tornado according to some versions of the story", "zh": "朝龙卷风跑去（按书中另一种说法）"}, {"en": "Climb a tree", "zh": "爬上树"}, {"en": "Lie down flat on the ground, far away from trees", "zh": "平躺在地上，远离树木"}], "answer": 3, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book says: 'If you're stuck outdoors and can't find shelter, lie down flat on the ground, far away from trees.'", "zh": "书中写道：'如果你被困在户外且找不到庇护所，应平躺在地上，远离树木。'"}}], "extended": {"prompt": {"en": "Write a short newspaper article for children explaining why tornadoes are dangerous and what they should do to stay safe.", "zh": "为儿童写一篇简短的新闻报道，说明龙卷风为何危险以及应如何保护自己。"}, "guidance": {"en": ["Include at least two facts about how tornadoes form or their strength", "Explain the difference between a tornado watch and a tornado warning", "Give one safety tip from the book"], "zh": ["至少包含两个关于龙卷风如何形成或其强度的知识点", "解释龙卷风观测警报与龙卷风警告的区别", "给出书中提到的一条安全建议"]}}};</script>
