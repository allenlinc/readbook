g \"ant\"", "zh": "wol-la-chee，意思是“蚂蚁”"}, {"en": "dzeh, meaning \"elk\"", "zh": "dzeh，意思是“麋鹿”"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The Alphabet Code table lists B as shush, meaning \"bear.\" (A is wol-la-chee/ant, C is moasi/cat, E is dzeh/elk.)", "zh": "字母密码表把 B 列为 shush，意思是“熊”。（A 是 wol-la-chee/蚂蚁，C 是 moasi/猫，E 是 dzeh/麋鹿。）"}}, {"q": {"en": "During the Battle of Iwo Jima, how well did the six code talkers do?", "zh": "在硫磺岛战役中，那六名密码兵表现如何？"}, "options": [{"en": "They sent only one message", "zh": "他们只发了一条信息"}, {"en": "They made hundreds of mistakes according to some versions of the story", "zh": "他们犯了上百个错误（按书中另一种说法）"}, {"en": "They refused to work", "zh": "他们拒绝工作"}, {"en": "They sent and received over 800 messages with not a single error", "zh": "他们收发800多条信息，没有一处错误"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says six code talkers \"sent and received more than eight hundred messages in the heat of combat without a single error.\"", "zh": "书中说那六名密码兵“在激战中收发800多条信息，没有一处错误”。"}}, {"q": {"en": "Why does the author tell us the code talkers stayed silent for years and could not vote until 1948?", "zh": "作者为什么告诉我们密码兵多年保持沉默，而且直到1948年才能投票？"}, "options": [{"en": "To show the unfair treatment they faced after their brave service", "zh": "为了说明他们在英勇服役后所遭受的不公平对待"}, {"en": "To explain how radios work according to some versions of the story", "zh": "为了解释收音机如何工作（按书中另一种说法）"}, {"en": "To prove the code was easy", "zh": "为了证明密码很简单"}, {"en": "To describe the Pacific Ocean", "zh": "为了描述太平洋"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book notes they \"remained silent for years\" and faced discrimination; Navajo in Arizona and New Mexico \"could not vote until 1948,\" showing the injustice they endured.", "zh": "书中说他们“沉默多年”，并遭受歧视；亚利桑那和新墨西哥的纳瓦霍人“直到1948年才能投票”，说明他们承受的不公。"}}, {"q": {"en": "What did the Navajo code call a \"submarine\"?", "zh": "纳瓦霍密码把“潜艇”叫作什么？"}, "options": [{"en": "a chicken hawk", "zh": "a chicken hawk（鸡鹰）"}, {"en": "an iron fish", "zh": "iron fish（铁鱼）"}, {"en": "eggs", "zh": "eggs（蛋）"}, {"en": "a whale", "zh": "a whale（鲸鱼）"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says new meanings were given to 211 words: \"A submarine was called an iron fish.\" (Battleship was lo-tso/whale; dive bomber was gini/chicken hawk.)", "zh": "书中说211个词被赋予新含义：“潜艇被称为 iron fish（铁鱼）。”（战列舰是 lo-tso/鲸鱼；俯冲轰炸机是 gini/鸡鹰。）"}}, {"q": {"en": "What makes the Navajo code special even today?", "zh": "纳瓦霍密码即使在今天有什么特别之处？"}, "options": [{"en": "It is the only spoken military code that has never been broken", "zh": "它是唯一从未被破译的口语军事密码"}, {"en": "It was written down in a book", "zh": "它被写进了一本书里"}, {"en": "It was used only once", "zh": "它只被用过一次"}, {"en": "The Japanese broke it in 1945 according to some versions of the story", "zh": "日本人在1945年破译了它（按书中另一种说法）"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book states, \"To this day, the Navajo code is the only spoken military code that has never been broken.\"", "zh": "书中说：“直到今天，纳瓦霍密码是唯一从未被破译的口语军事密码。”"}}], "extended": {"prompt": {"en": "The Navajo code talkers used their language to protect lives, yet their work stayed secret for many years. Why do you think it is important to honor people whose quiet, hidden work helped others?", "zh": "纳瓦霍密码兵用自己的语言保护了无数生命，但他们的工作保密了许多年。你认为为什么应当铭记那些默默无闻、以隐秘工作帮助他人的人？"}, "guidance": {"en": ["The code talkers' language helped send messages with no errors in battle.", "Their work stayed secret for years, and they could not speak about it.", "They faced discrimination even after serving bravely.", "Their code was never broken, which saved many lives."], "zh": ["密码兵的语言帮助在战斗中零差错地传递信息。", "他们的工作保密多年，连自己都不能对外提起。", "即便英勇服役，他们仍曾遭受歧视。", "他们的密码从未被破译，从而挽救了许多生命。"]}}};</script>
