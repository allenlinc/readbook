<script>window.BOOK = {"slug": "deep-inside-a-copper-mine", "title": "Deep Inside a Copper Mine", "titleZh": "深入铜矿内部", "level": "P", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Where is the Queen Mine that the family tours?", "zh": "这一家参观的“女王铜矿”在哪里？"}, "options": [{"en": "Detroit", "zh": "底特律"}, {"en": "Bisbee, Arizona", "zh": "亚利桑那州的比斯比"}, {"en": "Grandma's house according to some versions of the story", "zh": "奶奶家（按书中另一种说法）"}, {"en": "Tennessee", "zh": "田纳西州"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says the family went on a tour of \"the old Bisbee, Arizona, copper mine\" called the Queen Mine.", "zh": "书中说这家人去参观亚利桑那州比斯比一座老铜矿，名叫“女王铜矿”。"}}, {"q": {"en": "In the glossary, what does \"claustrophobic\" mean?", "zh": "在词汇表中，“claustrophobic（幽闭恐惧的）”是什么意思？"}, "options": [{"en": "A type of lamp", "zh": "一种灯"}, {"en": "A kind of rock", "zh": "一种岩石"}, {"en": "Afraid of small, tight places", "zh": "害怕狭小、密闭的空间"}, {"en": "Liking the cold according to some versions of the story", "zh": "喜欢寒冷（按书中另一种说法）"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "The glossary defines claustrophobic as \"afraid of small, tight places (p. 8).\" The guide warned anyone claustrophobic could get off.", "zh": "词汇表把 claustrophobic 定义为“害怕狭小、密闭的空间”（第8页）。导游提醒有幽闭恐惧的人可以下车。"}}, {"q": {"en": "Why did the tour group have to wear rain slickers underground?", "zh": "为什么参观团在地下必须穿雨衣？"}, "options": [{"en": "Because they went swimming", "zh": "因为他们要去游泳"}, {"en": "Because water drops fell from the rock above them", "zh": "因为上方的岩石上不断有水珠滴落"}, {"en": "Because the mine was on fire", "zh": "因为矿井着火了"}, {"en": "Because it was raining outside according to some versions of the story", "zh": "因为外面正在下雨（按书中另一种说法）"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says, \"I could see why we needed the slickers as water drops fell from the rock above us.\"", "zh": "书中说：“当水珠从上方的岩石滴落时，我才明白为什么我们需要雨衣。”"}}, {"q": {"en": "What is the author's main purpose in this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"en": "To describe a real tour through an old copper mine and the work miners did", "zh": "为了描述一次真实的旧铜矿参观，以及矿工所做的工作"}, {"en": "To teach how to build a mine", "zh": "为了教人如何建造矿井"}, {"en": "To argue that copper is bad", "zh": "为了论证铜是有害的"}, {"en": "To tell a fictional space story according to some versions of the story in an early draft of the book", "zh": "为了讲一个虚构的太空故事（按书中另一种说法）（在书的早期草稿中）"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The narrator describes a real Queen Mine Tour, the gear, the man-car, dynamite, and malachite, ending by admitting mining \"was not the job for me,\" which is to inform.", "zh": "叙述者描述了真实的女王铜矿参观、装备、矿车、炸药和孔雀石，最后承认采矿“不是适合我的工作”，目的是告知。"}}, {"q": {"en": "What is malachite?", "zh": "孔雀石（malachite）是什么？"}, "options": [{"en": "A type of dynamite", "zh": "一种炸药"}, {"en": "A beautiful green mineral often found with copper ore", "zh": "一种美丽的绿色矿物，常和铜矿一起出现"}, {"en": "A kind of lamp", "zh": "一种灯"}, {"en": "A yellow rain slicker according to some versions of the story", "zh": "一件黄色雨衣（按书中另一种说法）"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The guide said the dull-shining spots were \"malachite, a beautiful green mineral often found with copper ore.\"", "zh": "导游说那些泛着暗淡光泽的斑点是“孔雀石，一种美丽的绿色矿物，常和铜矿一起出现”。"}}, {"q": {"en": "In the mine, what was the \"cage\"?", "zh": "在矿井里，“cage（笼）”是什么？"}, "options": [{"en": "A small animal according to some versions of the story in an early draft of the book", "zh": "一只小动物（按书中另一种说法）（在书的早期草稿中）"}, {"en": "A tunnel", "zh": "一条隧道"}, {"en": "A type of drill", "zh": "一种钻机"}, {"en": "An elevator with wire mesh instead of walls that took miners down", "zh": "一部用铁丝网代替墙壁的升降机，把矿工送到井下"}], "answer": 3, "skill": "Craft and Structure", "explain": {"en": "The guide \"showed us a cage, which is an elevator with wire mesh instead of walls. He said it took miners all the way down to the bottom of the mine.\"", "zh": "导游“给我们看了一个 cage，那是部用铁丝网代替墙壁的升降机。他说它把矿工一直送到矿井底部”。"}}, {"q": {"en": "What happened when the guide had everyone turn off their lamps?", "zh": "当导游让大家关掉头灯时，发生了什么？"}, "options": [{"en": "They saw the malachite glow", "zh": "他们看到孔雀石发光"}, {"en": "The man-car started moving", "zh": "矿车开始移动"}, {"en": "It was total darkness; they could not see a hand in front of their face", "zh": "一片彻底的黑暗；手放在眼前都看不见"}, {"en": "The mine lit up with fireworks according to some versions of the story in an early draft of the book", "zh": "矿井被烟花照亮（按书中另一种说法）（在书的早期草稿中）"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says, \"Oh, my gosh, it was so dark... I held my hand right in front of my face and I couldn't even see it.\"", "zh": "书中说：“哦天哪，太黑了……我把手放在脸正前方，却连手都看不见。”"}}, {"q": {"en": "Why does the author tell us the Queen Mine produced 8 billion pounds of copper?", "zh": "作者为什么告诉我们女王铜矿产出了80亿磅铜？"}, "options": [{"en": "To show the mine was very productive over its 100 years of operation", "zh": "为了说明这座矿在100年运营中产量巨大"}, {"en": "To explain how to cook copper according to some versions of the story", "zh": "为了解释如何烹制铜（按书中另一种说法）"}, {"en": "To describe the weather", "zh": "为了描写天气"}, {"en": "To say copper is cheap", "zh": "为了说明铜很便宜"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The \"Do You Know?\" box states the Queen Mine produced 8 billion pounds of copper in 100 years, plus gold, silver, lead, and zinc, showing its huge output.", "zh": "“你知道吗？”栏目说女王铜矿在100年里产出了80亿磅铜，还有金、银、铅、锌，说明其产量巨大。"}}, {"q": {"en": "About how cold does the copper mine stay all the time?", "zh": "铜矿里常年保持大约多少度？"}, "options": [{"en": "90 degrees", "zh": "90度"}, {"en": "120 degrees", "zh": "120度"}, {"en": "Below freezing, below zero according to some versions of the story", "zh": "冰点以下，零度以下（按书中另一种说法）"}, {"en": "About 47 degrees Fahrenheit", "zh": "大约47华氏度（约8摄氏度）"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The book says, \"the mine stays at about 47 degrees Fahrenheit. Actually, that is downright cold to me.\"", "zh": "书中说：“矿井里常年保持在大约47华氏度。说实话，对我来说那相当冷。”"}}, {"q": {"en": "What did miners use dynamite for?", "zh": "矿工用炸药来做什么？"}, "options": [{"en": "To blast the rock at the end of their shift", "zh": "在轮班结束时爆破岩石"}, {"en": "To make light according to some versions of the story", "zh": "用来照明（按书中另一种说法）"}, {"en": "To cook food", "zh": "用来煮饭"}, {"en": "To dig wells", "zh": "用来挖井"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says miners \"filled the holes with sticks of dynamite and wired them to blow up the rock. The miners would blast the rock at the end of their shift.\"", "zh": "书中说矿工“把炸药条塞进孔里、接上引线爆破岩石。他们会在轮班结束时引爆炸药”。"}}], "extended": {"prompt": {"en": "The narrator went deep underground and felt total darkness and cold he had never known. Describe a time you tried something new that felt strange or scary at first. What did you learn?", "zh": "叙述者深入地下，体验了从未经历过的全然黑暗与寒冷。讲讲你曾经尝试某件新事物、一开始觉得奇怪或害怕的经历。你学到了什么？"}, "guidance": {"en": ["Mines stay cold (about 47°F) and completely dark without lamps.", "Miners used dynamite, drills, and cages to reach copper deep underground.", "The Queen Mine produced huge amounts of copper and other metals.", "Trying something uncomfortable can teach you about the world and yourself."], "zh": ["矿井里常年寒冷（约47华氏度），没有灯就一片漆黑。", "矿工用炸药、钻机和升降笼深入地下开采铜。", "女王铜矿产出了巨量的铜和其他金属。", "尝试令自己不适的事，能让你更了解世界和自己。"]}}};</script>
