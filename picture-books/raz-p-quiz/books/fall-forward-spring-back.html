ylight Saving Time, so Nola had never thought much about it.\"", "zh": "书中说：“和大多数州不同，亚利桑那州不实行夏令时，所以诺拉以前从没太在意这件事。”"}}, {"q": {"en": "What did Nola's teacher tell the class to do with their clocks in November?", "zh": "诺拉的老师告诉全班，十一月要把时钟怎样调整？"}, "options": [{"en": "Set them back one hour (fall back)", "zh": "往回拨一小时（秋退 fall back）"}, {"en": "Throw them away", "zh": "把它们扔掉"}, {"en": "Set them forward one hour (spring forward)", "zh": "往前拨一小时（春进 spring forward）"}, {"en": "Leave them exactly the same", "zh": "保持不动"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The teacher said, \"Before you go to bed Saturday night, remember to adjust your clocks an hour... Spring forward, fall back,\" because Daylight Saving Time ends in November.", "zh": "老师说：“周六晚上睡觉前，记得把钟调一小时……春进秋退（spring forward, fall back）”，因为夏令时在十一月结束，所以要回拨。"}}, {"q": {"en": "Which saying does neighbor Frank repeat to encourage Nola and Pablo to be early?", "zh": "邻居弗兰克反复用哪句俗语来鼓励诺拉和巴勃罗要早到？"}, "options": [{"en": "A stitch in time saves nine according to some versions of the story", "zh": "及时一针省九针（按书中另一种说法）"}, {"en": "Better late than never", "zh": "迟做总比不做好"}, {"en": "Time is money", "zh": "时间就是金钱"}, {"en": "The early bird gets the worm", "zh": "早起的鸟儿有虫吃"}], "answer": 3, "skill": "Craft and Structure", "explain": {"en": "Frank cries, \"The early bird gets the worm!\" both when they find the float and again at the end, using the saying to celebrate being early.", "zh": "弗兰克发现花车时和结尾都喊：“早起的鸟儿有虫吃！”作者用这句俗语来烘托“早到”的主题。"}}, {"q": {"en": "What kind of float did neighbor Frank build for the parade?", "zh": "邻居弗兰克为游行做了什么样的花车？"}, "options": [{"en": "A giant chocolate cake according to some versions of the story", "zh": "一个巨大的巧克力蛋糕（按书中另一种说法）"}, {"en": "An eight-foot pumpkin set on a trailer", "zh": "一个放在拖车上的八英尺高南瓜"}, {"en": "A paper sailboat", "zh": "一艘纸帆船"}, {"en": "A bright red tractor", "zh": "一辆鲜红色拖拉机"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says, \"It was a float, an eight-foot pumpkin set up on a trailer.\"", "zh": "书中写道：“那是个花车——一个放在拖车上的八英尺高的南瓜。”"}}, {"q": {"en": "Nola sprang her clock forward an hour while everyone else fell back an hour. What does this mean about her timing?", "zh": "诺拉把钟往前拨了一小时，而别人都往回拨了一小时。这说明她的到场时间怎样了？"}, "options": [{"en": "She was three hours behind according to some versions of the story", "zh": "她落后了三小时（按书中另一种说法）"}, {"en": "She was two hours ahead of everyone else", "zh": "她比所有人都早了两个小时"}, {"en": "She was one hour late", "zh": "她晚了一小时"}, {"en": "She was exactly on time", "zh": "她刚好准时"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book explains, \"Nola had sprung forward an hour when everybody else had fallen back an hour. That meant she and Pablo were now two hours ahead of everybody else.\"", "zh": "书中解释：“别人都回拨了一小时，诺拉却往前拨了一小时，所以她和巴勃罗比所有人都早了两个小时。”"}}, {"q": {"en": "At the end, Nola makes sure to be early for everything, but how early does she aim to be?", "zh": "故事结尾，诺拉确保每件事都早到，但她目标是早到多久？"}, "options": [{"en": "Exactly on time according to some versions of the story", "zh": "刚好准时（按书中另一种说法）"}, {"en": "One day early", "zh": "早一整天"}, {"en": "Two hours early", "zh": "早两小时"}, {"en": "Two minutes early, not two hours", "zh": "早两分钟，而不是两小时"}], "answer": 3, "skill": "Author's Purpose and Perspective", "explain": {"en": "The author writes, \"It's also why, from that day to this, Nola O'Connor has made sure to be early for everything. Two minutes early, though—not two hours.\"", "zh": "作者写道：“从那天起，诺拉·奥康纳确保每件事都早到——不过早两分钟，而不是两小时。”说明作者想表达适度早到才是可取之道。"}}, {"q": {"en": "The real rule is 'spring forward, fall back,' but this book is titled 'Fall Forward, Spring Back.' Why?", "zh": "真正的口诀是“春进秋退”，而本书标题却是“秋进春退”。为什么这样改？"}, "options": [{"en": "To reflect Nola's mistake of setting her clock forward in the fall", "zh": "为了体现诺拉秋天把钟往前拨的错误"}, {"en": "Because the teacher said so", "zh": "因为老师是这么说的"}, {"en": "Because pumpkins grow in spring according to some versions of the story", "zh": "因为南瓜春天
