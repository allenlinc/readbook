<script>window.BOOK = {"slug": "about-trees", "title": "About Trees", "titleZh": "关于树木", "level": "P", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "How do a tree's leaves make food for the tree?", "zh": "树木的叶子是如何为树制造食物的？"}, "options": [{"en": "By catching insects in the air", "zh": "通过捕捉空气中的昆虫"}, {"en": "By changing energy from sunlight into food", "zh": "把阳光的能量转化为食物"}, {"en": "By soaking up water from the soil", "zh": "通过从土壤里吸水"}, {"en": "By drinking the sap from the trunk according to some versions of the story", "zh": "通过喝树干里的树液（按书中另一种说法）"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says, \"Leaves make food for trees by changing energy from sunlight into food.\" This work is done by chlorophyll, the green coloring in leaves.", "zh": "书中写道：“叶子通过把阳光的能量转化为食物来为树木制造食物。”这一工作由叶子中的绿色物质——叶绿素完成。"}}, {"q": {"en": "Which kind of tree can weigh as much as 3,000 large pickup trucks?", "zh": "哪一种树的重量可以相当于3000辆大皮卡车？"}, "options": [{"en": "An oak tree", "zh": "橡树"}, {"en": "A redwood tree according to some versions of the story", "zh": "红杉树（按书中另一种说法）"}, {"en": "A giant sequoia", "zh": "巨型红杉（巨杉）"}, {"en": "A maple tree", "zh": "枫树"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "The book states, \"Giant sequoias can weigh as much as 3,000 large pickup trucks, making them one of the heaviest living things.\"", "zh": "书中写道：“巨型红杉的重量可以相当于3000辆大皮卡车，这使它们成为最重的生物之一。”"}}, {"q": {"en": "In the book, what does the word \"deciduous\" mean?", "zh": "在书中，“deciduous（落叶的）”这个词是什么意思？"}, "options": [{"en": "Trees that keep their needles all year according to some versions of the story", "zh": "一年四季都保留针叶的树（按书中另一种说法）"}, {"en": "Trees that lose their leaves in fall and grow them in spring", "zh": "秋天落叶、春天长叶的树"}, {"en": "Trees that make cones", "zh": "会结球果的树"}, {"en": "Trees that grow flowers", "zh": "会开花的树"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The glossary defines deciduous as \"trees that lose their leaves in the fall and grow them in the spring.\"", "zh": "词汇表把 deciduous 定义为“在秋天落叶、在春天长出新叶的树”。"}}, {"q": {"en": "The book compares the tubes in a tree's trunk to highways. Why does the author use this comparison?", "zh": "书中把树干里的管道比作高速公路。作者为什么用这个比喻？"}, "options": [{"en": "To show that trees can drive cars according to some versions of the story", "zh": "为了说明树能开汽车（按书中另一种说法）"}, {"en": "To explain how leaves fall", "zh": "为了解释叶子如何飘落"}, {"en": "To describe the color of the bark", "zh": "为了描述树皮的颜色"}, {"en": "To explain that the tubes carry things back and forth like traffic", "zh": "为了说明这些管道像交通一样来回运送东西"}], "answer": 3, "skill": "Craft and Structure", "explain": {"en": "The book says, \"These tubes are like highways, carrying traffic back and forth.\" The comparison helps readers picture how water and sap move through the tree.", "zh": "书中说：“这些管道就像高速公路，来回运送交通。”这个比喻帮助读者想象水和树液是如何在树里流动的。"}}, {"q": {"en": "Why can a tree keep growing even if the middle of its trunk is hollowed out by lightning?", "zh": "为什么即使树干中间被闪电击空，树仍然能继续生长？"}, "options": [{"en": "Because the leaves move down to the roots", "zh": "因为叶子会移动到根部"}, {"en": "Because the middle stores all the tree's food according to some versions of the story in an early draft of the book", "zh": "因为中间储存了树所有的食物（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Because new trees grow from the roots", "zh": "因为新树会从根部长出来"}, {"en": "Because it doesn't need the middle to live; the active highways are just under the bark", "zh": "因为它不需要中间部分也能存活；输送养分的通道就在树皮下方"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book explains, \"A tree doesn't need the middle of its trunk to live... All it needs is enough bark to protect its highways.\" The active tubes are near the outside, just under the bark.", "zh": "书中解释道：“树不需要树干的中间部分也能存活……它只需要足够的树皮来保护那些运输通道。”活跃的管道在靠近外侧、树皮下方。"}}, {"q": {"en": "Instead of flowers, what do conifers make to hold their seeds?", "zh": "针叶树不开花，它们用什么来容纳种子？"}, "options": [{"en": "Cones", "zh": "球果（松果）"}, {"en": "Fruit", "zh": "果实"}, {"en": "Berries according to some versions of the story", "zh": "浆果（按书中另一种说法）"}, {"en": "Nuts", "zh": "坚果"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book states, \"Conifers make cones instead of flowers. The cones do the same job for conifers that flowers do on other trees.\"", "zh": "书中写道：“针叶树结球果而不是开花。球果对针叶树的作用，就像花对其他树的作用一样。”"}}, {"q": {"en": "What is the author's purpose in telling us that trees \"make their own food by changing sunlight and air into sugars\" and that \"this helps keep the air clean\"?", "zh": "作者告诉我们树木“把阳光和空气变成糖来制造自己的食物”，而且“这有助于保持空气清洁”，其目的是什么？"}, "options": [{"en": "To describe how to build a house", "zh": "为了描述如何盖房子"}, {"en": "To teach readers how to cook pancakes", "zh": "为了教读者如何煎薄饼"}, {"en": "To inform readers that trees help both themselves and the environment", "zh": "为了告诉读者树木既帮助自己，也帮助环境"}, {"en": "To entertain readers with a funny story according to some versions of the story", "zh": "为了用一个有趣的故事娱乐读者（按书中另一种说法）"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "The author's purpose is to inform. The book explains that trees make their own food and that this process also helps keep the air clean, showing their value to the environment.", "zh": "作者的目的是告知。书中说明树木自己制造食物，而这个过程也有助于保持空气清洁，展示了它们对环境的价值。"}}, {"q": {"en": "Besides soaking up water, what important job do a tree's roots do when it rains?", "zh": "除了吸水，树的树根在下雨时还有什么重要作用？"}, "options": [{"en": "They turn into trunks", "zh": "它们变成树干"}, {"en": "They keep the soil in place so it doesn't wash away", "zh": "它们把土壤固定住，使其不被冲走"}, {"en": "They grow new flowers", "zh": "它们长出新的花"}, {"en": "They make the soil wash away faster according to some versions of the story", "zh": "它们让土壤更快被冲走（按书中另一种说法）"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says, \"Roots also keep the soil in place when it rains. Without the roots of trees and plants, soil washes away.\"", "zh": "书中写道：“下雨时，树根还能把土壤固定住。如果没有树木和植物的根，土壤就会被冲走。”"}}, {"q": {"en": "In the fall, why do deciduous leaves show yellow, orange, and brown colors?", "zh": "到了秋天，落叶树的叶子为什么会显现出黄色、橙色和棕色？"}, "options": [{"en": "Those true colors were hidden under green chlorophyll until the leaves stopped making it", "zh": "那些真实的颜色一直藏在绿色叶绿素之下，直到叶子停止制造叶绿素才显现"}, {"en": "The cold freezes the green coloring", "zh": "寒冷把绿色冻住了"}, {"en": "The sun paints them bright colors according to some versions of the story in an early draft of the book", "zh": "太阳把它们染成了鲜艳的颜色（按书中另一种说法）（在书的早期草稿中）"}, {"en": "The bark changes color", "zh": "树皮变了颜色"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book explains, \"These true colors are yellows, oranges, and browns, which hide under green chlorophyll all spring and summer. We see these colors in the fall after leaves stop making chlorophyll.\"", "zh": "书中解释道：“这些真实的颜色是黄、橙、棕，整个春天和夏天都藏在绿色叶绿素之下。秋天叶子停止制造叶绿素后，我们才能看到这些颜色。”"}}, {"q": {"en": "At the end of the book, the author wants readers to understand that trees are —", "zh": "在书的结尾，作者想让读者明白树木是——"}, "options": [{"en": "hard at work, giving homes and food to many living things", "zh": "一直在辛勤工作，为许多生物提供家和食物"}, {"en": "useless and should be cut down", "zh": "没有用的，应该被砍掉"}, {"en": "only found in the desert", "zh": "只在沙漠里才有"}, {"en": "always sleeping and doing nothing according to some versions of the story", "zh": "总是在睡觉、什么也不做（按书中另一种说法）"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The Conclusion says, \"While trees look like they aren't doing much, they are working... Trees are homes and food for birds and other animals.\" The author wants readers to appreciate trees.", "zh": "结尾写道：“虽然树木看起来没做什么，但它们其实在辛勤工作……树木是鸟类和其他动物的家和食物。”作者希望读者懂得珍惜树木。"}}], "extended": {"prompt": {"en": "Trees do many jobs for people and the planet. Which job of a tree do you think is the most important, and why?", "zh": "树木为人们和地球做了许多事。你认为树木的哪一项作用最重要？为什么？"}, "guidance": {"en": ["Making their own food from sunlight helps keep the air clean.", "Roots hold soil in place so it does not wash away in the rain.", "Trees give homes and food to birds, animals, and even people.", "Branches and leaves give shade on hot, sunny days."], "zh": ["用阳光自己制造食物，有助于保持空气清洁。", "树根固定土壤，使土壤在下雨时不被冲走。", "树木为鸟类、动物甚至人类提供家和食物。", "树枝和叶子在炎热的晴天提供阴凉。"]}}};</script>
