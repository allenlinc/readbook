<script>window.BOOK = {"slug": "the-mongol-empire", "title": "The Mongol Empire", "titleZh": "蒙古帝国", "level": "X", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "During which century did the Mongols establish the largest land empire ever created?", "zh": "蒙古人是在哪个世纪建立了人类历史上最大的陆地帝国？"}, "options": [{"en": "During the 1200s.", "zh": "在13世纪（1200年代）。"}, {"en": "During the 1700s.", "zh": "在18世纪（1700年代）。"}, {"en": "During the 500s.", "zh": "在6世纪（500年代）。"}, {"en": "During the 1900s.", "zh": "在20世纪（1900年代）。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book states, 'During the 1200s, these horsemen from Asia established the largest land empire ever created.'", "zh": "书中说：'在13世纪，这些来自亚洲的骑兵建立了人类历史上最大的陆地帝国。'"}}, {"q": {"en": "Who was Temujin proclaimed to be in 1206, and what did the title mean?", "zh": "铁木真在1206年被尊称为什么？这个称号是什么意思？"}, "options": [{"en": "Genghis Khan, which meant 'Universal Ruler.'", "zh": "成吉思汗，意思是'普天下的统治者'（universal ruler）。"}, {"en": "Kublai Khan, which meant 'Great Sailor.'", "zh": "忽必烈汗，意思是'伟大的航海家'。"}, {"en": "Ogadei Khan, which meant 'Great Builder.'", "zh": "窝阔台汗，意思是'伟大的建造者'。"}, {"en": "Hulegu Khan, which meant 'Lion King.'", "zh": "旭烈兀汗，意思是'狮王'。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The leaders of the Mongol tribes proclaimed Temujin Genghis Khan in 1206, a title the book says meant 'Universal Ruler.'", "zh": "1206年蒙古各部落首领尊铁木真为成吉思汗，书中说这个称号的意思是'普天下的统治者'。"}}, {"q": {"en": "What capital city did Kublai Khan establish in northern China, and where was it built?", "zh": "忽必烈汗在华北建立了哪座都城？它建在什么地方？"}, "options": [{"en": "Khanbalik, meaning 'City of the Khan,' built on the site of Zhongdu (the destroyed Jin capital).", "zh": "汗八里（Khanbalik），意思是'可汗之城'，建在中都（被摧毁的金朝都城）旧址上。"}, {"en": "Karakorum, built on the steppes of Mongolia.", "zh": "哈拉和林，建在蒙古草原上。"}, {"en": "Baghdad, built in the Middle East.", "zh": "巴格达，建在中东。"}, {"en": "Samarkand, built in central Asia.", "zh": "撒马尔罕，建在中亚。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "In 1264 Kublai 'settled permanently in China' and established Khanbalik on the site of Zhongdu, calling it 'City of the Khan.'", "zh": "1264年忽必烈'永久定居中国'，在中都旧址上建立汗八里，称之为'可汗之城'。"}}, {"q": {"en": "What happened to the Mongol Empire after Kublai Khan died in 1294?", "zh": "忽必烈汗于1294年去世后，蒙古帝国发生了什么？"}, "options": [{"en": "It split into four large parts called khanates, each ruled by its own khan.", "zh": "它分裂成四个被称为'汗国'的大区域，各自由自己的可汗统治。"}, {"en": "It grew even larger and conquered all of Europe.", "zh": "它变得更大，并征服了整个欧洲。"}, {"en": "It was reunited under a single Great Khan.", "zh": "它在一位大可汗的领导下重新统一。"}, {"en": "It immediately disappeared without a trace.", "zh": "它立刻无影无踪地消失了。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says the empire 'split into four large parts called khanates' after Kublai's death, and 'there was no longer a Great Khan.'", "zh": "书中说忽必烈死后帝国'分裂成四个被称为汗国的大区域'，并且'不再有大可汗'。"}}, {"q": {"en": "What offer did Genghis Khan make to enemy cities?", "zh": "成吉思汗向敌城提出了什么交易？"}, "options": [{"en": "Surrender and you will be spared; resist and you will be wiped out.", "zh": "投降就饶恕你们；抵抗就把你们消灭。"}, {"en": "Pay gold and you may keep your army.", "zh": "缴纳黄金就可以保留军队。"}, {"en": "Join the Mongols as equal partners.", "zh": "作为平等的伙伴加入蒙古。"}, {"en": "Leave the city and never return.", "zh": "离开城市并且永不返回。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Genghis Khan's offer was: 'Surrender and you will be spared. Resist and you will be wiped out.'", "zh": "成吉思汗的交易是：'投降就饶恕你们。抵抗就把你们消灭。'"}}, {"q": {"en": "About how large were the Mongol armies, and what made them so hard to beat?", "zh": "蒙古军队规模大概多大？是什么让他们如此难以击败？"}, "options": [{"en": "Usually around 100,000 (max 250,000); they were the most highly trained and disciplined soldiers of their age.", "zh": "通常约10万人（最多25万）；他们是一千年来训练最有素、纪律最严明的士兵。"}, {"en": "Over a million soldiers who used gunpowder only.", "zh": "超过一百万、只使用火药的士兵。"}, {"en": "Just a few thousand untrained farmers.", "zh": "只是几千名没有受过训练的农民。"}, {"en": "Small fleets of ships.", "zh": "小型船队。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Mongol armies 'usually totaled around 100,000' and historians believe they were 'the most highly trained and highly disciplined soldiers' seen for a thousand years.", "zh": "蒙古军队'通常总兵力约10万'，历史学家认为他们是一千年来'训练最有素、纪律最严明的士兵'。"}}, {"q": {"en": "In this book, what does the glossary say 'nomadic' means?", "zh": "在这本书中，词汇表对'nomadic'（游牧的）的解释是什么？"}, "options": [{"en": "Moving from place to place without a permanent home.", "zh": "没有固定居所、不断迁移的生活方式。"}, {"en": "Living only in large stone cities.", "zh": "只住在大石头城里。"}, {"en": "Farming the same field for life.", "zh": "一辈子耕种同一块地。"}, {"en": "Sailing across oceans.", "zh": "横渡海洋。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'nomadic' as 'moving from place to place without a permanent home.'", "zh": "词汇表把 nomadic 定义为'没有固定居所、不断迁移'。"}}, {"q": {"en": "What dynasty did Kublai Khan establish after his final victory over the Sung Empire in 1279?", "zh": "忽必烈汗在1279年最终击败南宋后，建立了哪个朝代？"}, "options": [{"en": "The Yuan Dynasty.", "zh": "元朝。"}, {"en": "The Ming Dynasty.", "zh": "明朝。"}, {"en": "The Tang Dynasty.", "zh": "唐朝。"}, {"en": "The Jin Dynasty.", "zh": "金朝。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "In 1279 Kublai Khan 'established a new dynasty to rule China, the Yuan Dynasty.'", "zh": "1279年忽必烈汗'建立了统治中国的新朝代——元朝'。"}}, {"q": {"en": "What was the 'Mongol Peace,' and what good did it bring?", "zh": "什么是'蒙古和平'？它带来了哪些好处？"}, "options": [{"en": "A period of peace across Asia and the Middle East that let travelers and trade move safely and set the stage for the Renaissance.", "zh": "亚洲与中东的一段和平时期，使旅行者和贸易得以安全通行，并为文艺复兴埋下伏笔。"}, {"en": "A long war between the khanates.", "zh": "汗国之间的一场长期战争。"}, {"en": "A treaty that ended all trade.", "zh": "终止一切贸易的条约。"}, {"en": "A name for the Great Wall of China.", "zh": "中国长城的别称。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book calls the period of peace the 'Mongol Peace,' noting it let travelers cross Asia safely and 'actually set the stage for the Renaissance.'", "zh": "书中称这段和平时期为'蒙古和平'，指出它让旅行者安全穿越亚洲，并'实际上为文艺复兴埋下了伏笔'。"}}, {"q": {"en": "What is the author's main purpose in writing this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"en": "To inform readers about the history of the Mongol Empire—its conquests, leaders, and lasting influence.", "zh": "向读者介绍蒙古帝国的历史——它的征服、领袖与深远影响。"}, {"en": "To teach readers how to ride a horse.", "zh": "教读者如何骑马。"}, {"en": "To tell a made-up fairy tale.", "zh": "讲述一个虚构的童话。"}, {"en": "To give recipes for Mongolian food.", "zh": "提供蒙古美食的食谱。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book presents facts about the empire's rise, leaders like Genghis and Kublai Khan, its division, and its influence, showing it is informational.", "zh": "全书讲述帝国的兴起、成吉思汗与忽必烈等领袖、分裂及其影响，属于知识说明类内容。"}}], "extended": {"prompt": {"en": "The book says the Mongols are remembered with pride in Mongolia but with horror by many others because of the bloodshed. Based on what you read, do you think the Mongol Empire should be remembered more for its conquests and terror or for the 'Mongol Peace' and trade it later brought? Explain your view using facts from the book.", "zh": "书中说蒙古人在蒙古本土被引以为豪地铭记，但许多人因屠杀而对它感到恐惧。根据你读到的内容，你认为蒙古帝国更应因征服与恐怖被记住，还是因后来的'蒙古和平'与贸易被记住？用书中的事实说明你的看法。"}, "guidance": {"en": ["Think about the estimates of 60 to 150 million people killed and the use of terror against resisting cities.", "Consider the 'Mongol Peace' that allowed safe trade across Asia and may have helped start the Renaissance."], "zh": ["想想书中估计有6000万到1.5亿人被杀，以及对抵抗城市使用的恐怖手段。", "再想想'蒙古和平'让贸易安全穿越亚洲，并可能助推了文艺复兴。"]}}};</script>
