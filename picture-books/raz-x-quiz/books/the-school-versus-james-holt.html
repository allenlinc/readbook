<script>window.BOOK = {"slug": "the-school-versus-james-holt", "title": "The School Versus James Holt", "titleZh": "学校诉詹姆斯·霍尔特案", "level": "X", "genre": "Fiction (Courtroom Story)", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "What was James Holt accused of stealing?", "zh": "詹姆斯·霍尔特被指控偷了什么？"}, "options": [{"en": "Mr. Dawson's coffee mug.", "zh": "道森老师的咖啡杯。"}, {"en": "A math textbook from the classroom.", "zh": "教室里的一本数学课本。"}, {"en": "An old train engineer's hat that Larry brought in for show-and-tell.", "zh": "拉里带来做「展示与讲述」的一顶旧火车司机帽。"}, {"en": "A gold necklace belonging to Jasmine. according to some versions of the story", "zh": "贾斯敏的一条金项链。（按书中另一种说法）"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "James was accused of stealing the old train engineer's hat that Larry had brought in for show-and-tell and that was found in James's backpack.", "zh": "詹姆斯被指控偷了拉里带来做「展示与讲述」的旧火车司机帽，那顶帽子后来在詹姆斯的背包里被发现。"}}, {"q": {"en": "Because James is 'innocent until proven guilty,' who has the burden of proof in the trial?", "zh": "因为詹姆斯「在被证明有罪之前是无辜的」，审判中谁负有举证责任？"}, "options": [{"en": "The jury must prove it themselves.", "zh": "陪审团必须自己证明。"}, {"en": "The judge (Principal Jeffries) must prove it.", "zh": "法官（杰弗里斯校长）必须证明。"}, {"en": "The defense (Eva) must prove James is innocent. according to some versions of the story", "zh": "辩方（伊娃）必须证明詹姆斯无辜。（按书中另一种说法）"}, {"en": "The prosecution (Darnell) must prove James guilty beyond a reasonable doubt.", "zh": "控方（达内尔）必须排除合理怀疑地证明詹姆斯有罪。"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "Mr. Dawson explained that because the defendant is innocent until proven guilty, Darnell (the prosecution) has the burden of proof and must prove guilt beyond a reasonable doubt.", "zh": "道森老师解释说，因为被告在被证明有罪前是无辜的，达内尔（控方）负有举证责任，必须排除合理怀疑地证明有罪。"}}, {"q": {"en": "Why did Eva object when Darnell asked Jasmine, 'Do you think James stole Larry's hat?'", "zh": "为什么当达内尔问贾斯敏「你认为詹姆斯偷了拉里的帽子吗」时，伊娃提出了反对？"}, "options": [{"en": "Because Darnell was asking for Jasmine's opinion, not something she actually saw.", "zh": "因为达内尔问的是贾斯敏的个人看法，而不是她真正看到的事。"}, {"en": "Because the question was too loud.", "zh": "因为问题声音太大了。"}, {"en": "Because Eva did not like Darnell.", "zh": "因为伊娃不喜欢达内尔。"}, {"en": "Because Jasmine was not a real witness. according to some versions of the story in an early draft of the book", "zh": "因为贾斯敏不是真正的证人。（按书中另一种说法）（在书的早期草稿中）"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Principal Jeffries sustained Eva's objection because Darnell was asking the witness for an opinion, which is not allowed; Jasmine did not see whether James took the hat.", "zh": "杰弗里斯校长支持了伊娃的反对，因为达内尔是在向证人索取个人意见，这是不允许的；贾斯敏并没有看到詹姆斯是否拿了帽子。"}}, {"q": {"en": "Eva called the custodian, Mr. Billings, as a witness. What did he say he saw?", "zh": "伊娃传唤了管理员比林斯先生作证。他说自己看到了什么？"}, "options": [{"en": "He saw James take the hat from the closet.", "zh": "他看到詹姆斯从壁橱里拿走帽子。"}, {"en": "He saw James go to the bathroom and leave, and saw only Jasmine go into the classroom.", "zh": "他看到詹姆斯去上厕所然后离开，并只看到贾斯敏进了教室。"}, {"en": "He saw Jasmine and James fighting in the hall. according to some versions of the story in an early draft of the book", "zh": "他看到贾斯敏和詹姆斯在走廊里打架。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "He saw nothing at all that day.", "zh": "他那天什么都没看到。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Mr. Billings testified that James came in from outside, went to the bathroom, and left, and that the only person he saw go into the classroom was Jasmine.", "zh": "比林斯先生作证说，詹姆斯从外面进来、去上厕所然后离开，而他看到唯一进入教室的人是贾斯敏。"}}, {"q": {"en": "What was the jury's final verdict in the case of the School versus James Holt?", "zh": "在「学校诉詹姆斯·霍尔特案」中，陪审团的最终裁决是什么？"}, "options": [{"en": "Not guilty of the crime of theft.", "zh": "盗窃罪不成立（无罪）。"}, {"en": "Guilty but with no punishment.", "zh": "有罪但免于处罚。"}, {"en": "The case was dismissed with no verdict.", "zh": "案件被撤销，没有裁决。"}, {"en": "Guilty of theft and given detention.", "zh": "盗窃罪成立，给予留校察看。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The jury found the defendant 'not guilty of the crime of theft' after only a few minutes of deliberation.", "zh": "陪审团仅商议几分钟后便裁定被告「盗窃罪不成立」。"}}, {"q": {"en": "At the very end, Jasmine admitted she put the hat in James's backpack. What was her reason?", "zh": "在最后，贾斯敏承认是自己把帽子放进詹姆斯的背包。她的理由是什么？"}, "options": [{"en": "James had spilled juice on her dress and never apologized, so she wanted him to get in trouble.", "zh": "詹姆斯把果汁洒在她的裙子上却从不道歉，所以她想让他惹上麻烦。"}, {"en": "She wanted to keep the hat for herself. according to some versions of the story in an early draft of the book", "zh": "她想把帽子据为己有。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "She was jealous of Eva.", "zh": "她嫉妒伊娃。"}, {"en": "Mr. Dawson told her to do it.", "zh": "是道森老师让她这么做的。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Jasmine confessed she put the hat in James's backpack because he had ruined her dress by spilling juice and never apologized; she just wanted him to get in trouble.", "zh": "贾斯敏承认把帽子放进詹姆斯背包，是因为他把果汁洒在她裙子上却从未道歉，她只是想让他惹上麻烦。"}}, {"q": {"en": "Mr. Dawson mentioned the class had already done a mock trial of Goldilocks. How was this real trial different?", "zh": "道森老师提到班里已经做过一次「金发姑娘」的模拟审判。这次真正的审判有何不同？"}, "options": [{"en": "Goldilocks was found not guilty, but James was found guilty. according to some versions of the story in an early draft of the book", "zh": "金发姑娘被判无罪，而詹姆斯被判有罪。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "In the real case, the jury deliberated in private, while in the Goldilocks trial they decided in front of everyone.", "zh": "在真实案件中，陪审团私下商议；而在金发姑娘案中，他们当着所有人的面作出裁定。"}, {"en": "There was no jury in the real trial.", "zh": "真实审判中没有陪审团。"}, {"en": "The real trial used a different teacher as judge.", "zh": "真实审判由另一位老师担任法官。"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Because this was a real case, Mr. Dawson had the jury deliberate in private, unlike the Goldilocks trial where they chose a verdict in the classroom in front of everyone.", "zh": "因为这是真实案件，道森老师让陪审团私下商议，而不像金发姑娘案那样当着全班面前作出裁定。"}}, {"q": {"en": "In this book, what does the word 'hearsay' mean in the context of Haley's testimony?", "zh": "在本书中，就海莉的证词而言，「hearsay」（传闻证据）一词是什么意思？"}, "options": [{"en": "A written document used as evidence.", "zh": "用作证据的书面文件。"}, {"en": "Stories a witness heard from other people but did not actually see, which cannot be proven.", "zh": "证人从别人那里听来、本人并未亲眼看到的传言，无法被证实。"}, {"en": "A promise to tell the truth in court.", "zh": "在法庭上如实作证的承诺。"}, {"en": "The truth spoken directly by an eyewitness. according to some versions of the story in an early draft of the book", "zh": "目击者直接说出的真相。（按书中另一种说法）（在书的早期草稿中）"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "Eva objected because Haley was telling stories she had only heard from others; the objection was sustained because such hearsay could not be proven.", "zh": "伊娃提出反对，因为海莉讲的只是从别人那里听来的事；该反对得到支持，因为这类传闻证据无法被证实。"}}, {"q": {"en": "What is the author's main purpose in writing this story?", "zh": "作者写这个故事的主要目的是什么？"}, "options": [{"en": "To explain how to build a train.", "zh": "讲解如何造火车。"}, {"en": "To teach readers how to steal without getting caught. according to some versions of the story", "zh": "教读者如何偷东西而不被抓。（按书中另一种说法）"}, {"en": "To entertain readers with a classroom mock trial while showing how a court of law works.", "zh": "用一个课堂模拟审判来娱乐读者，同时展示法庭的运作方式。"}, {"en": "To give a factual history of the U.S. Supreme Court.", "zh": "提供美国最高法院的真实历史。"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "The story follows a fictional classroom trial to both entertain and teach readers about legal roles, objections, and due process.", "zh": "故事通过虚构的课堂审判来娱乐读者，并传授法律角色、反对程序和正当程序等知识。"}}, {"q": {"en": "Who acted as the judge, and why didn't Mr. Dawson serve as judge?", "zh": "谁担任了法官？为什么道森老师没有担任法官？"}, "options": [{"en": "Mr. Dawson was the judge because he is the teacher. according to some versions of the story", "zh": "道森老师是法官，因为他是老师。（按书中另一种说法）"}, {"en": "There was no judge in the trial.", "zh": "审判中没有法官。"}, {"en": "The bailiff, Bobby, was the judge.", "zh": "法警博比担任法官。"}, {"en": "Principal Jeffries acted as judge because Mr. Dawson might have to testify as a witness.", "zh": "杰弗里斯校长担任法官，因为道森老师可能要作为证人作证。"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "Mr. Dawson said he might have to testify as a witness, so Principal Jeffries agreed to act as judge to make sure everyone followed the rules.", "zh": "道森老师说自己可能要作为证人作证，因此杰弗里斯校长同意担任法官，以确保所有人遵守规则。"}}], "extended": {"prompt": {"en": "The book shows how 'due process' works: a person is innocent until proven guilty and gets a fair trial. If you were on the jury, which piece of evidence would matter most to you—the hat found in James's backpack, Jasmine's claim, or Mr. Billings's observation—and why?", "zh": "本书展示了「正当程序」如何运作：在被证明有罪前一个人是无辜的，并享有公正审判。如果你是陪审团成员，哪类证据对你最重要——在詹姆斯背包里发现的帽子、贾斯敏的说法，还是比林斯先生的观察？为什么？"}, "guidance": {"en": ["Review the burden of proof: the prosecution had to prove guilt 'beyond a reasonable doubt.'", "Compare the eyewitness account (Jasmine) with the independent observation (Mr. Billings) and the final confession."], "zh": ["回顾举证责任：控方必须「排除合理怀疑」地证明有罪。", "将目击者证词（贾斯敏）与独立观察（比林斯先生）以及最后的自白进行对比。"]}}};</script>
