<script>window.BOOK = {"slug": "the-velveteen-rabbit", "title": "The Velveteen Rabbit", "titleZh": "绒毛兔", "level": "X", "genre": "Fiction", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "According to the Skin Horse, what does it mean to be 'Real'?", "zh": "按照皮马（Skin Horse）的说法，'真实'（Real）意味着什么？"}, "options": [{"en": "It happens when a child loves you for a long, long time, really loves you.", "zh": "当有一个孩子长久地、真心地爱你时，你就变得真实了。"}, {"en": "It means having a clockwork motor inside you.", "zh": "意味着你身体里装着发条马达。"}, {"en": "It means being made of real rabbit fur.", "zh": "意味着你是用真正的兔毛做成的。"}, {"en": "It means being brand-new from a shop.", "zh": "意味着你是商店里刚出炉的全新玩具。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The Skin Horse tells the Rabbit, 'It's a thing that happens to you. When a child loves you for a long, long time, not just to play with, but really loves you, then you become Real.'", "zh": "皮马告诉小兔：'那是发生在你身上的事。当一个孩子长久地、不是只当玩具般、而是真心爱你时，你就变得真实了。'"}}, {"q": {"en": "Why did the other toys snub the Velveteen Rabbit?", "zh": "为什么其他玩具都冷落绒毛兔？"}, "options": [{"en": "Because he was mean to them.", "zh": "因为他对它们很坏。"}, {"en": "Because he was the biggest toy in the nursery.", "zh": "因为他是育儿室里最大的玩具。"}, {"en": "Because he was only made of velveteen, and the fancier mechanical toys felt superior.", "zh": "因为他只是用绒布做的，而那些更精致的机械玩具自觉高人一等。"}, {"en": "Because he could fly.", "zh": "因为他会飞。"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "The book says the Rabbit was naturally shy and 'some of the more expensive toys quite snubbed him' because he was only made of velveteen, while the mechanical toys felt superior.", "zh": "书中说小兔生性害羞，'一些更昂贵的玩具相当冷落他'，因为他只是用绒布做的，而机械玩具自觉高人一等。"}}, {"q": {"en": "How did the Velveteen Rabbit finally become Real?", "zh": "绒毛兔最终是如何变得'真实'的？"}, "options": [{"en": "A fairy turned him real the moment he was made.", "zh": "他一被做出来，仙女就让他变真实了。"}, {"en": "The Boy loved him and said he was real, so the nursery magic happened.", "zh": "男孩爱他，并说他是真实的，于是育儿室的魔法发生了。"}, {"en": "He was made of real fur from the very start.", "zh": "他从一开始就是用真毛做成的。"}, {"en": "He won a contest against the other toys.", "zh": "他在与其他玩具的比赛中获胜。"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "When the Boy said, 'He isn't a toy. He's real!', the Rabbit knew the Skin Horse's words had come true — 'The nursery magic had happened to him, and he was a toy no longer. He was Real.'", "zh": "当男孩说'他不是玩具，他是真实的！'时，小兔明白皮马的话成真了——'育儿室的魔法发生在他身上，他不再是玩具，他是真实的'。"}}, {"q": {"en": "What illness did the Boy catch that led to the Rabbit being thrown away?", "zh": "男孩得了什么病，导致小兔被扔掉？"}, "options": [{"en": "The measles.", "zh": "麻疹。"}, {"en": "A bad cold.", "zh": "重感冒。"}, {"en": "Chicken pox.", "zh": "水痘。"}, {"en": "Scarlet fever, which made the doctor order the Rabbit burned.", "zh": "猩红热，医生因此下令把小兔烧掉。"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The book says the Boy became ill with scarlet fever; when he got better, the doctor said the Rabbit was 'a mass of scarlet fever germs' and must be burned.", "zh": "书中说男孩染上猩红热；等他好转后，医生说小兔是'一堆猩红热病菌'，必须烧掉。"}}, {"q": {"en": "What did the wild rabbits say when they met the Velveteen Rabbit in the wood?", "zh": "野兔在林中遇见绒毛兔时说了什么？"}, "options": [{"en": "That he had no hind legs and 'didn't smell right,' so he wasn't real.", "zh": "说他没有后腿，而且'闻起来不对劲'，所以他不是真的兔子。"}, {"en": "That he was the king of all rabbits.", "zh": "说他是所有兔子的国王。"}, {"en": "That he should join their dance right away.", "zh": "说他应该立刻加入它们的舞蹈。"}, {"en": "That he was made of solid gold.", "zh": "说他是由纯金做成的。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The wild rabbits noticed the Velveteen Rabbit had no hind legs and said, 'He doesn't smell right! He isn't a rabbit at all! He isn't real!'", "zh": "野兔发现绒毛兔没有后腿，说：'他闻起来不对劲！他根本不是兔子！他不真实！'"}}, {"q": {"en": "In the glossary, what does the word 'shabby' mean?", "zh": "在词汇表中，'shabby'（破旧）一词是什么意思？"}, "options": [{"en": "Bright and brand-new.", "zh": "崭新而明亮。"}, {"en": "Worn, faded, or in poor condition.", "zh": "磨损、褪色或状况很差。"}, {"en": "Made of velvet.", "zh": "用天鹅绒做的。"}, {"en": "Very large.", "zh": "非常大。"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'shabby' as 'worn, faded, or in poor condition,' which describes the Rabbit as his velveteen fur wore thin from the Boy's love.", "zh": "词汇表把 shabby 定义为'磨损、褪色或状况很差'，这正是小兔因男孩的爱而绒毛变薄后的样子。"}}, {"q": {"en": "What happened where the Rabbit's tear fell after he was left in the garden sack?", "zh": "当小兔被丢在花园的麻袋里、一滴泪落下后，发生了什么？"}, "options": [{"en": "A wild rabbit appeared to cheer him up.", "zh": "一只野兔出现来安慰他。"}, {"en": "The Boy came back to rescue him.", "zh": "男孩回来救他。"}, {"en": "A mysterious flower grew, and out of it stepped the Nursery Magic Fairy.", "zh": "长出一朵神秘的花，花中走出育儿室魔法仙女。"}, {"en": "It suddenly began to rain.", "zh": "突然下起了雨。"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says a real tear trickled down his nose; where it fell, a mysterious flower grew, and out of its blossom stepped the Nursery Magic Fairy.", "zh": "书中说一滴真正的眼泪顺着他的鼻子流下；在泪落之处长出一朵神秘的花，花苞中走出了育儿室魔法仙女。"}}, {"q": {"en": "At the end, what did the Nursery Magic Fairy do for the Rabbit?", "zh": "最后，育儿室魔法仙女为小兔做了什么？"}, "options": [{"en": "She kissed him and turned him into a real rabbit with brown fur and hind legs.", "zh": "她吻了他，把他变成了一只长着棕色毛和后腿的真实兔子。"}, {"en": "She sent him back to the toy cupboard.", "zh": "她把他送回玩具柜。"}, {"en": "She gave him to a new child.", "zh": "她把他送给了一个新孩子。"}, {"en": "She made him into a clockwork toy.", "zh": "她把他变成了一个发条玩具。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The Fairy kissed him and flew with him into the wood; when he itched his nose he found he had real hind legs and brown fur — 'He was a Real Rabbit at last.'", "zh": "仙女吻了他，带他飞进树林；当他挠鼻子时发现长出了真正的后腿和棕色毛——'他终于成了一只真实的兔子'。"}}, {"q": {"en": "When the Boy saw the rabbits in the wood the next spring, what did he say?", "zh": "第二年春天，男孩在林中看到那两只兔子时说了什么？"}, "options": [{"en": "He didn't recognize the brown rabbit at all.", "zh": "他完全没认出那只棕色的兔子。"}, {"en": "He was scared of the rabbits.", "zh": "他很害怕那些兔子。"}, {"en": "He thought the brown rabbit was a cat.", "zh": "他以为那只棕色的兔子是只猫。"}, {"en": "He said the brown rabbit looked just like his old Bunny lost during scarlet fever.", "zh": "他说那只棕色的兔子很像他猩红热时丢失的旧兔子。"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The book ends with the Boy thinking, 'Why, he looks just like my old Bunny that was lost when I had scarlet fever!' — though he never knew it really was his Bunny.", "zh": "书的结尾，男孩心想：'哎呀，他真像我猩红热时丢失的旧兔子！'——尽管他始终不知道那正是他的小兔。"}}, {"q": {"en": "What is the author's main message or purpose in this story?", "zh": "作者写这个故事的主要寓意或目的是什么？"}, "options": [{"en": "To teach children how to sew their own toys.", "zh": "教孩子们如何缝制自己的玩具。"}, {"en": "To warn about the dangers of the woods.", "zh": "警告人们树林里的危险。"}, {"en": "To show that love can make something 'Real,' and being loved matters more than appearance.", "zh": "表达爱能让某物变得'真实'，并且被爱比外表更重要。"}, {"en": "To describe how baby rabbits are born.", "zh": "描述小兔子是如何出生的。"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "The Fairy tells the Rabbit, 'You were Real to the Boy because he loved you. Now you shall be Real to everyone,' showing the story's theme that love, not looks, makes something truly real.", "zh": "仙女对小兔说：'你对男孩来说是真实的，因为他爱你。现在你对所有人都是真实的了。'这体现了故事的主题：是爱而非外表，让某物真正真实。"}}], "extended": {"prompt": {"en": "The Skin Horse says, 'Once you are Real you can't be ugly, except to people who don't understand.' Do you agree that something can be 'Real' because it is loved, even if it looks worn or shabby? Explain your thinking using the Rabbit's experience.", "zh": "皮马说：'一旦你变得真实，就不会丑陋，除非在那些不懂的人眼里。'你是否同意，一件东西只要被爱就可以是'真实的'，哪怕它看起来破旧磨损？结合小兔的经历说说你的想法。"}, "guidance": {"en": ["Recall how the Boy loved the Rabbit so hard that he loved all the whiskers off and the pink rubbed from his nose, yet to the Boy he was always beautiful.", "Think about the Fairy's words that the Rabbit was 'Real to the Boy because he loved you,' and now Real to everyone."], "zh": ["回想男孩多么爱小兔，爱到把他的胡须都磨光、鼻子上的粉色也被蹭掉，但在男孩眼中他始终美丽。", "思考仙女的话：小兔'对男孩来说是真实的，因为他爱你'，而现在对所有人都是真实的了。"]}}};</script>
