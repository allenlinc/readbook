<script>window.BOOK = {"slug": "soccer", "title": "Soccer", "titleZh": "足球", "level": "X", "genre": "Sports", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "How many players are on a soccer team during a match?", "zh": "比赛中一支足球队有多少名球员？"}, "options": [{"en": "Nine players, like baseball.", "zh": "9 人，像棒球那样。"}, {"en": "Eleven players: one goalkeeper and ten field players.", "zh": "11 人：1 名守门员和 10 名场上球员。"}, {"en": "Five players, like basketball.", "zh": "5 人，像篮球那样。"}, {"en": "Twenty-two players on the field at once. according to some versions of the story", "zh": "场上同时 22 人。（按书中另一种说法）"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says a soccer team consists of eleven players — one goalkeeper and ten field players in different positions.", "zh": "书中说一支足球队由 11 人组成——1 名守门员和 10 名不同位置的场上球员。"}}, {"q": {"en": "Who scored the winning penalty kick for France in the Euro 2000 final?", "zh": "在 2000 年欧洲杯决赛中，谁为法国踢进了制胜的点球？"}, "options": [{"en": "Mia Hamm.", "zh": "米娅·哈姆。"}, {"en": "A Portuguese player.", "zh": "一名葡萄牙球员。"}, {"en": "Pelé.", "zh": "贝利。"}, {"en": "Zinedine Zidane.", "zh": "齐内丁·齐达内。"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The book describes Zinedine Zidane calmly kicking the ball into the upper left corner to give France the Euro 2000 win.", "zh": "书中描写齐内丁·齐达内冷静地将球踢进左上角，为法国赢得 2000 年欧洲杯。"}}, {"q": {"en": "What year was FIFA founded, and where is it based?", "zh": "国际足联（FIFA）是哪一年成立的，总部在哪里？"}, "options": [{"en": "1930, in Brazil.", "zh": "1930 年，在巴西。"}, {"en": "1904, in Switzerland.", "zh": "1904 年，在瑞士。"}, {"en": "1997, in the United States.", "zh": "1997 年，在美国。"}, {"en": "1863, in England.", "zh": "1863 年，在英国。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says FIFA (Fédération Internationale de Football Association) was founded in 1904 and is based in Switzerland.", "zh": "书中说国际足联（FIFA）成立于 1904 年，总部设在瑞士。"}}, {"q": {"en": "How did early soccer in the British Isles differ from today's game?", "zh": "不列颠群岛早期的足球与今天的比赛有何不同？"}, "options": [{"en": "The number of players was not standardized, whole villages played, and it was rougher and more violent.", "zh": "参赛人数没有统一标准，整个村庄一起上场，而且更粗糙、更暴力。"}, {"en": "It already had the same 11-player teams and referees we have now. according to some versions of the story", "zh": "它已经有了和现在一样的 11 人制球队和裁判。（按书中另一种说法）"}, {"en": "It was played only by women.", "zh": "它只由女性参加。"}, {"en": "It was played only indoors with artificial turf.", "zh": "它只在室内用人造草坪进行。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says from the 8th to 19th centuries the number of players wasn't standardized, whole villages played, and the game was rougher and more violent, even allowing kicking opponents.", "zh": "书中说从 8 世纪到 19 世纪，人数没有统一标准，整个村庄一起参赛，比赛更粗糙暴力，甚至允许踢对手。"}}, {"q": {"en": "Besides the goalkeeper, what body parts may field players use to touch the ball?", "zh": "除守门员外，场上球员可以用身体的哪些部位触球？"}, "options": [{"en": "Feet, legs, chest, and head.", "zh": "脚、腿、胸和头。"}, {"en": "Hands and arms. according to some versions of the story", "zh": "手和手臂。（按书中另一种说法）"}, {"en": "Only the feet.", "zh": "只有脚。"}, {"en": "Only the head.", "zh": "只有头。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book states players besides the goalkeeper can only touch the ball with their feet, legs, chest, and head.", "zh": "书中说明除守门员外，球员只能用脚、腿、胸和头触球。"}}, {"q": {"en": "What happened in 1863 that split soccer from rugby?", "zh": "1863 年发生了什么，使足球从橄榄球中分离出来？"}, "options": [{"en": "Cambridge University rules banned hands, and soccer split from rugby football.", "zh": "剑桥大学的规则禁止使用手，足球由此从英式橄榄球中分离。"}, {"en": "The first World Cup was played.", "zh": "第一届世界杯举行。"}, {"en": "FIFA was founded.", "zh": "国际足联成立。"}, {"en": "Women's soccer was added to the Olympics. according to some versions of the story in an early draft of the book", "zh": "女子足球被列入奥运会。（按书中另一种说法）（在书的早期草稿中）"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "In 1863 Cambridge University developed unifying rules that banned the use of hands, and because of this football (soccer) split off from rugby football.", "zh": "1863 年剑桥大学制定了统一规则、禁止使用手，足球因此从英式橄榄球中分离出来。"}}, {"q": {"en": "According to the book, what is special about Pelé?", "zh": "根据本书，贝利有什么特别之处？"}, "options": [{"en": "He invented the penalty kick.", "zh": "他发明了点球。"}, {"en": "He founded FIFA in 1904.", "zh": "他在 1904 年创立了国际足联。"}, {"en": "He was the first woman in the World Cup. according to some versions of the story in an early draft of the book", "zh": "他是世界杯第一位女球员。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "He is the only player to win the World Cup three times, scoring 1,281 goals in 1,363 matches.", "zh": "他是唯一三夺世界杯的球员，在 1,363 场比赛中攻入 1,281 球。"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The book says Pelé is widely considered the greatest player ever and the only one to win the World Cup three times, scoring 1,281 goals in 1,363 matches.", "zh": "书中说贝利被公认为史上最伟大球员，也是唯一三夺世界杯的人，在 1,363 场比赛中攻入 1,281 球。"}}, {"q": {"en": "In the book's list of soccer skills, what is 'heading'?", "zh": "在本书列出的足球技巧中，'heading'（顶球）是什么？"}, "options": [{"en": "Kicking the ball to score a goal.", "zh": "踢球射门得分。"}, {"en": "Getting the ball from a player on the other team.", "zh": "从对方球员脚下抢球。"}, {"en": "Using the head to move the ball.", "zh": "用头去顶球。"}, {"en": "Moving the ball small distances with the feet.", "zh": "用脚小范围带球。"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "The book lists 'Heading — using the head to move the ball' as one of the five soccer skills.", "zh": "书中把'Heading——用头去顶球'列为五项足球技巧之一。"}}, {"q": {"en": "What is the author's main purpose in writing this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"en": "To sell soccer equipment.", "zh": "推销足球装备。"}, {"en": "To teach readers to become professional athletes. according to some versions of the story", "zh": "教读者成为职业运动员。（按书中另一种说法）"}, {"en": "To explain how soccer developed into the modern game and why it is loved worldwide.", "zh": "解释足球如何发展成现代运动，以及它为何风靡全球。"}, {"en": "To argue that baseball is better than soccer.", "zh": "论证棒球比足球更好。"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "The focus question asks how soccer developed and changed into the modern game, and the book traces its history and global appeal.", "zh": "本书导读问题问足球如何发展成现代运动，全书追溯其历史与全球魅力。"}}, {"q": {"en": "What are two variations of soccer mentioned for playing differently?", "zh": "书中提到了哪两种不同玩法的足球变体？"}, "options": [{"en": "Ice hockey and basketball. according to some versions of the story", "zh": "冰球和篮球。（按书中另一种说法）"}, {"en": "Futsal (a fast indoor version) and beach soccer.", "zh": "室内快速版的五人制足球（futsal）和沙滩足球。"}, {"en": "Tennis and golf.", "zh": "网球和高尔夫。"}, {"en": "Rugby and cricket.", "zh": "橄榄球和板球。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book mentions futsal, a fast-paced indoor version of soccer, and beach soccer played on the shore, alongside traditional soccer.", "zh": "书中提到节奏快速的室内版五人制足球（futsal）和在海滩上玩的沙滩足球，与传统足球并列。"}}], "extended": {"prompt": {"en": "The book says soccer 'transcends national borders as well as cultural and income differences.' Why do you think a simple game with a ball can bring so many different people together?", "zh": "书中说足球'跨越国界，也跨越文化和收入的差异'。你认为一个用球玩的简单游戏，为何能把如此多不同的人凝聚在一起？"}, "guidance": {"en": ["The book notes as few as two people can play in any open area, and the sport is played in almost every country.", "It also points out soccer is governed globally by FIFA with 209 member countries and a World Cup every four years."], "zh": ["书中提到最少两个人就能在任何空地上玩，而且这项运动几乎在每个国家都开展。", "书中还指出足球由国际足联全球管理，拥有 209 个成员协会，并每四年举办一次世界杯。"]}}};</script>
