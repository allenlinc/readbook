<script>window.BOOK = {"slug": "beowulf", "title": "Beowulf", "titleZh": "贝奥武甫", "level": "X", "genre": "Myth/Legend", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "With how many friends did Beowulf set sail to help King Hrothgar?", "zh": "贝奥武甫带了多少名伙伴启航去帮助赫罗斯加王？"}, "options": [{"en": "Fourteen friends.", "zh": "十四名伙伴。"}, {"en": "Thirty friends.", "zh": "三十名伙伴。"}, {"en": "Eleven friends.", "zh": "十一名伙伴。"}, {"en": "Twelve friends.", "zh": "十二名伙伴。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says Beowulf had a strong ship made ready and 'with fourteen friends set sail to visit Hrothgar.'", "zh": "书中说贝奥武甫备好坚船，'带着十四名伙伴启航去拜访赫罗斯加'。"}}, {"q": {"en": "For how long did Grendel attack Hrothgar's hall before Beowulf arrived?", "zh": "在贝奥武甫到来之前，格伦德尔袭击赫罗斯加的大厅持续了多久？"}, "options": [{"en": "For twelve long years.", "zh": "长达十二年。"}, {"en": "For thirty years.", "zh": "三十年。"}, {"en": "For one year.", "zh": "一年。"}, {"en": "For a hundred years.", "zh": "一百年。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The text states, 'For twelve long years, Grendel warred against Hrothgar.'", "zh": "文中写道：'格伦德尔与赫罗斯加交战长达十二年。'"}}, {"q": {"en": "Why did Beowulf decide to fight Grendel without sword, shield, or buckler?", "zh": "贝奥武甫为什么决定不用剑、盾或圆盾与格伦德尔搏斗？"}, "options": [{"en": "Because Grendel did not use weapons, so Beowulf would fight him hand to hand.", "zh": "因为格伦德尔不使用武器，所以贝奥武甫要与他徒手搏斗。"}, {"en": "Because he had no sword of his own.", "zh": "因为他自己没有剑。"}, {"en": "Because King Hrothgar forbade it.", "zh": "因为赫罗斯加王禁止他使用武器。"}, {"en": "Because he was too weak to lift a sword.", "zh": "因为他太虚弱，举不起剑。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Beowulf tells the king, 'I know that the terrible monster does not use weapons, and therefore I shall use neither sword, nor shield, nor buckler; hand to hand I will fight the foe.'", "zh": "贝奥武甫对国王说：'我知道那可怕的怪物不用武器，因此我也既不用剑、也不用盾或圆盾；我将与它徒手搏斗。'"}}, {"q": {"en": "How did Beowulf kill Grendel's mother?", "zh": "贝奥武甫是如何杀死格伦德尔的母亲的？"}, "options": [{"en": "He seized a huge old sword made by giants from the wall and swung it with all his might.", "zh": "他从墙上抓起一把巨人打造的巨大古剑，用尽全力挥砍。"}, {"en": "With his own wonderful sword, which never failed.", "zh": "用他自己那把从不出错的宝剑。"}, {"en": "With his knife after she pinned him down.", "zh": "在她把他按倒后，用匕首。"}, {"en": "By strangling her with his bare hands.", "zh": "用双手将她掐死。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "When his own sword failed, Beowulf saw an old giant-made sword on the wall, seized it, and swung it so that 'the troll-dam gave up her life.'", "zh": "当自己的剑失效时，贝奥武甫看到墙上有一把巨人打造的古老大剑，抓起它用力挥砍，'女妖就此丧命'。"}}, {"q": {"en": "What happened to the magic sword after Beowulf used it to kill Grendel's mother?", "zh": "贝奥武甫用魔剑杀死格伦德尔的母亲后，那把剑怎么了？"}, "options": [{"en": "It melted in his hand like snow because the fiend's blood was so venomous.", "zh": "它像雪一样在他手中融化，因为怪物的血毒性极强。"}, {"en": "It broke into two pieces.", "zh": "它断成了两截。"}, {"en": "It turned to stone.", "zh": "它变成了石头。"}, {"en": "It was lost at the bottom of the pool.", "zh": "它遗失在池底。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says the magic sword 'melted in his hand, like snow in sunshine, so venomous was the blood of the fiend it had slain.' He brought back only the hilt and Grendel's head.", "zh": "书中说魔剑'在他手中融化，犹如阳光下的雪，因为它所杀的怪物之血毒性极强'。他只带回了剑柄和格伦德尔的头颅。"}}, {"q": {"en": "How many years did Beowulf rule as king before the dragon troubled his land?", "zh": "在巨龙为祸他的国土之前，贝奥武甫统治了多少年？"}, "options": [{"en": "Fifty years.", "zh": "五十年。"}, {"en": "A hundred years.", "zh": "一百年。"}, {"en": "Twelve years.", "zh": "十二年。"}, {"en": "Thirty years.", "zh": "三十年。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book states, 'In due time, Beowulf himself became king, and well he governed the land for fifty years. Then trouble came.'", "zh": "书中写道：'适时，贝奥武甫自己成了国王，把国家治理得很好，长达五十年。此后麻烦降临。'"}}, {"q": {"en": "What caused the dragon to wake up and attack the people?", "zh": "是什么让巨龙醒来并袭击百姓？"}, "options": [{"en": "A slave fleeing his master stole a golden cup from the dragon's treasure hoard.", "zh": "一个逃离主人的奴隶从巨龙的宝藏中偷走了一只金杯。"}, {"en": "Beowulf invaded the dragon's den unprovoked.", "zh": "贝奥武甫无故闯入巨龙的巢穴。"}, {"en": "King Hrothgar built a hall nearby.", "zh": "赫罗斯加王在附近建了一座大厅。"}, {"en": "Grendel's mother attacked the dragon.", "zh": "格伦德尔的母亲袭击了巨龙。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The text says a slave fleeing his master stumbled into the dragon's den and carried off a golden cup that was part of the dragon's treasure hoard, and the dragon awoke when it noticed the cup missing.", "zh": "文中说一个逃离主人的奴隶跌入巨龙巢穴，偷走了属于巨龙宝藏的一只金杯；巨龙发现杯子失踪后便醒来。"}}, {"q": {"en": "When the dragon attacked, which of Beowulf's men stayed to help him?", "zh": "巨龙来袭时，贝奥武甫的部下中谁留下来帮助他？"}, "options": [{"en": "Only Wiglaf stayed; the others crept away to the woods to save themselves.", "zh": "只有维格拉夫留下；其余的人都逃进树林自保。"}, {"en": "All of his men stayed and fought together.", "zh": "他所有的部下都留下并肩作战。"}, {"en": "No one stayed to help him.", "zh": "没有人留下帮他。"}, {"en": "The king sent an army to help.", "zh": "国王派了一支军队来帮忙。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says Beowulf's men crept away to the woods to save their lives, and 'one, and one only, Wiglaf by name' ran through smoke and flame to help his lord.", "zh": "书中说贝奥武甫的部下逃进树林保命，'唯有一人，名叫维格拉夫'，穿过烟火冲去助主。"}}, {"q": {"en": "In this book, what does the word 'buckler' mean?", "zh": "在这本书中，'buckler'（圆盾）一词是什么意思？"}, "options": [{"en": "A round, small shield.", "zh": "一种圆形的小盾牌。"}, {"en": "The handle of a sword (hilt).", "zh": "剑柄（hilt）。"}, {"en": "A golden cup used for mead.", "zh": "用来喝蜂蜜酒的金色杯子。"}, {"en": "A type of helmet.", "zh": "一种头盔。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'buckler' as 'a round, small shield.'", "zh": "词汇表把 buckler 定义为'圆形的小盾牌'。"}}, {"q": {"en": "What is the author's main purpose in telling this story?", "zh": "作者讲述这个故事的主要目的是什么？"}, "options": [{"en": "To retell the epic tale of a hero and explore what makes someone a hero (the Focus Question is 'What is a hero?').", "zh": "重述一位英雄的史诗故事，并探讨是什么造就英雄（焦点问题是'什么是英雄？'）。"}, {"en": "To teach the history of modern England.", "zh": "讲授现代英格兰的历史。"}, {"en": "To convince readers that dragons are real.", "zh": "让读者相信巨龙是真实存在的。"}, {"en": "To explain the grammar of Old English.", "zh": "讲解古英语的语法。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book's Focus Question is 'What is a hero?' and it retells Beowulf's deeds of strength, loyalty, and sacrifice, showing it is an adapted legend meant to explore heroism.", "zh": "本书的焦点问题是'什么是英雄？'，并重述了贝奥武甫的力量、忠诚与牺牲之举，说明这是一则改编传说，意在探讨英雄气概。"}}], "extended": {"prompt": {"en": "Beowulf shows strength by fighting monsters with his bare hands and loyalty by facing the dragon alone, yet even he needed Wiglaf's help at the end. In your opinion, what makes someone a true hero: great strength, willingness to risk one's life, or helping others even when it is dangerous? Use events from the text.", "zh": "贝奥武甫以徒手斗怪展现力量，以独自面对巨龙展现忠诚，但到最后连他也需要维格拉夫的帮助。在你看来，什么才造就真正的英雄：强大的力量、甘冒生命危险的意愿，还是在危险时帮助他人？请结合文中情节。"}, "guidance": {"en": ["Consider how Beowulf refused to fight the dragon with a large band, calling it shameful, and how only Wiglaf ran through the flames to help.", "Think about Beowulf's dying wish for a mound, 'Beowulf's Barrow,' to guide sailors, showing he cared for his people to the end."], "zh": ["想想贝奥武甫认为带大队人去打巨龙是耻辱，而唯有维格拉夫冲过火焰相助。", "想想贝奥武甫临终希望建一座'贝奥武甫冢'为水手指引航向，说明他至死关怀百姓。"]}}};</script>
