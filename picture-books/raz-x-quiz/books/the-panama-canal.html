ks.", "zh": "它们是让船只从山顶越过的桥梁。"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Locks are watertight chambers with steel doors; engineers change the water level inside to raise ships to Gatun Lake and lower them on the other side.", "zh": "船闸是带钢门的密闭水舱；工程师调节舱内水位，把船只抬升到加通湖，再在另一端降下。"}}, {"q": {"en": "Why did people call the canal a great shortcut?", "zh": "为什么人们称这条运河是一条伟大的捷径？"}, "options": [{"en": "It connected the Atlantic and Indian Oceans directly.", "zh": "它直接连通了大西洋和印度洋。"}, {"en": "It was shorter than the Panama railroad.", "zh": "它比巴拿马铁路还短。"}, {"en": "It let ships cross Panama instead of sailing all the way around South America, saving thousands of miles.", "zh": "它让船只穿越巴拿马，而不必绕行南美洲，节省数千英里航程。"}, {"en": "It was faster than traveling by train across the United States. according to some versions of the story in an early draft of the book", "zh": "它比乘火车横穿美国更快。（按书中另一种说法）（在书的早期草稿中）"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book's map shows the canal trip at about 5,300 miles versus about 13,000 miles rounding South America.", "zh": "书中的地图显示，走运河约5,300英里，而绕行南美洲约13,000英里。"}}, {"q": {"en": "In this book, what does the word 'isthmus' mean?", "zh": "在这本书中，'isthmus'（地峡）一词是什么意思？"}, "options": [{"en": "A narrow strip of land connecting two larger landmasses.", "zh": "连接两块较大陆地的狭长地带。"}, {"en": "A kind of oceangoing ship.", "zh": "一种远洋船只。"}, {"en": "A type of canal lock.", "zh": "一种运河船闸。"}, {"en": "A dangerous tropical disease. according to some versions of the story", "zh": "一种危险的热带疾病。（按书中另一种说法）"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'isthmus' as a narrow strip of land connecting two larger landmasses.", "zh": "词汇表把 isthmus 定义为连接两块较大陆地的狭长地带。"}}, {"q": {"en": "What is the author's main purpose in writing this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"en": "To tell a made-up adventure story.", "zh": "讲述一个虚构的冒险故事。"}, {"en": "To teach readers how to buil
