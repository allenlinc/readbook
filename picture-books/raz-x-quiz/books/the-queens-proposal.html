 her creations.'", "zh": "贾斯珀叔叔解释说：'昆恩从沙子中幻化出杰克、萨拉和安娜的影像，而女王劫持了她的造物。'"}}, {"q": {"en": "How does Qynn free herself from the Queen's grasp?", "zh": "昆恩是如何摆脱女王控制的？"}, "options": [{"en": "By picturing Jake, Sarah, and Anna turning back into sand, as Uncle Jasper tells her to do.", "zh": "按照贾斯珀叔叔的提示，想象杰克、萨拉和安娜变回沙子。"}, {"en": "By screaming as loud as she can.", "zh": "用尽全力大喊。"}, {"en": "By running away while the Queen sleeps.", "zh": "趁女王睡着时逃跑。"}, {"en": "By asking Seth for help.", "zh": "向塞斯求助。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Uncle Jasper yells, 'Imagine them gone right now... imagine them turning to sand again,' and the Queen's grasp slackens as Qynn focuses on that image.", "zh": "贾斯珀叔叔喊'现在就想象他们消失……想象他们变回沙子'，昆恩专注于这个画面后，女王的手松开了。"}}, {"q": {"en": "What does Qynn imagine to block the creatures chasing the group?", "zh": "昆恩想象了什么来阻挡追赶他们的怪物？"}, "options": [{"en": "A massive wall like the Great Wall of China that she had learned about in school.", "zh": "一道像她在学校学过的万里长城那样巨大的墙。"}, {"en": "A deep ocean.", "zh": "一片深海。"}, {"en": "A ring of fire.", "zh": "一圈火。"}, {"en": "A giant tree.", "zh": "一棵巨大的树。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Qynn's 'mind is instantaneously drawn to the Great Wall of China' from school, and she imagines a wall that blocks the creatures.", "zh": "昆恩'的思绪立刻联想到在学校学过的中国长城'，并想象出一道挡住怪物的墙。"}}, {"q": {"en": "Who warns the group that they must evacuate immediately after the Queen appears?", "zh": "女王出现后，是谁警告大家必须立刻撤离？"}, "options": [{"en": "Seth, who gasps 'She was here?' and says 'We must evacuate immediately!'", "zh": "塞斯，他倒吸一口气说'她来过这里？'并说'我们必须立刻撤离！'"}, {"en": "Odie the dog.", "zh": "狗奥迪。"}, {"en": "Sarah.", "zh": "萨拉。"}, {"en": "The Queen herself.", "zh": "女王本人。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "After learning the Queen had appeared, Seth gasps, 'She was here?' ... 'We must evacuate immediately!'", "zh": "得知女王出现后，塞斯倒吸一口气：'她来过这里？'……'我们必须立刻撤离
