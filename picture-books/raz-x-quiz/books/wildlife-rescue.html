ing to some versions of the story in an early draft of the book", "zh": "它是一只休息的成年鸟。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Birds never need their parents.", "zh": "鸟从来不需要父母。"}, {"en": "It may be a fledgling learning to fly, and its parents are usually watching nearby.", "zh": "它可能是一只正在学飞的小鸟，父母通常就在附近看护。"}, {"en": "It is always orphaned and dying.", "zh": "它总是孤儿，快要死了。"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "The book says a baby bird hopping on the ground may be a fledgling (a young bird learning to fly), and the parents usually watch though they may not be visible.", "zh": "书中说地上蹦跳的雏鸟可能是正在学飞的小鸟（fledgling），父母虽不一定看得见但通常在看护。"}}, {"q": {"en": "What is 'imprinting,' and why is it a problem for wildlife rehabbers?", "zh": "什么是\"印刻（imprinting）\"？为什么它对野生动物康复师是个难题？"}, "options": [{"en": "Baby animals imprint on their mothers; if they imprint on people instead, they think they are human and often cannot be returned to the wild.", "zh": "幼崽会印刻在母亲身上；若它们转而印刻在人身上，便以为自己是人，往往无法放归野外。"}, {"en": "It is when animals learn to fly. according to some versions of the story in an early draft of the book as mentioned in a later chapter before the main events begin", "zh": "那是动物学会飞翔的过程。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）（在主要事件发生之前）"}, {"en": "It is a type of bird cage.", "zh": "它是一种鸟笼。"}, {"en": "It means an animal is born healthy.", "zh": "指动物生来健康。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book explains baby animals imprint on their mothers; rehabbers avoid letting baby birds imprint on people, because then the birds may grow up thinking they are human and cannot return to the wild.", "zh": "书中解释幼崽会印刻在母亲身上；康复师避免让雏鸟印刻在人身上，否则它们会以为自己是人，无法回归野外。"}}, {"q": {"en": "In the book, what is 'euthanasia'?", "zh": "在书中，'euthanasia'（安乐死）是什么？"}, "options": [{"en": "Quick, painless killing used to end an animal's suffering when it can never survive in the wild or at a center.", "zh": "当动物永远无法在野外或中心存活时，用以结束其痛苦的快速、无痛苦的处理。"}, {"en": "A type of bird cage.", "zh": "一种鸟笼。"}, {"en": "Moving an animal to an outdoor pen. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "把动物移到室外围栏。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "A method of feeding baby animals.", "zh": "喂养幼崽的一种方法。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book defines euthanasia as quick, painless killing, sometimes the best way to end an animal's suffering when it will never survive in the wild or at a rehabilitation center.", "zh": "书中将安乐死定义为快速、无痛苦的处理，当动物永远无法在野外或康复中心存活时，这有时是结束其痛苦的最好方式。"}}, {"q": {"en": "Who is Terri Crisp, and what organization did she found?", "zh": "特里·克里斯普（Terri Crisp）是谁？她创立了什么组织？"}, "options": [{"en": "A scientist who studies birds (an ornithologist). according to some versions of the story in an early draft of the book", "zh": "研究鸟类（鸟类学家）的科学家。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "A rescuer of animals affected by disasters who founded Noah's Wish to train volunteers.", "zh": "一位救援受灾动物的志愿者，创立了 Noah's Wish 以培训志愿者。"}, {"en": "A veterinarian who invented the flight cage.", "zh": "发明飞行笼的兽医。"}, {"en": "The editor of the Springfield Daily Star.", "zh": "《斯普林菲尔德每日星报》的编辑。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says Terri Crisp spends much of her time rescuing animals affected by natural disasters and founded Noah's Wish to train volunteers to rescue animals at risk from disasters.", "zh": "书中说特里·克里斯普大部分时间用于救援受灾动物，并创立 Noah's Wish 以培训志愿者救援受灾动物。"}}, {"q": {"en": "The book says people cause the majority of wildlife injuries (cars, habitat loss), but also that natural disasters like wildfires and tsunamis hurt animals. What does this show about why rehabbers are needed?", "zh": "书中说人类活动造成大多数野生动物受伤（车祸、栖息地丧失），但野火、海啸等自然灾害也会伤害动物。这说明了为什么需要康复师？"}, "options": [{"en": "People never cause wildlife injuries.", "zh": "人类从不造成野生动物受伤。"}, {"en": "Rehabbers only work during spring.", "zh": "康复师只在春天工作。"}, {"en": "Only natural disasters ever hurt animals. according to some versions of the story", "zh": "只有自然灾害才会伤害动物。（按书中另一种说法）"}, {"en": "Animals need help from both human-caused threats and natural disasters.", "zh": "动物既需要应对人为威胁，也需要应对自然灾害，两方面都需要帮助。"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book notes people cause most wildlife injuries, yet natural disasters such as wildfires, tsunamis, and hurricanes also hurt animals, so rehabbers are needed for both kinds of threats.", "zh": "书中说人类造成大多数受伤，而野火、海啸、飓风等自然灾害也伤害动物，因此康复师对两类威胁都不可或缺。"}}, {"q": {"en": "The book describes 'slow release' for orphaned young animals and says rescued animals must learn to hunt or forage and eat natural foods. Why is this careful preparation important?", "zh": "书中描述了针对孤儿幼崽的\"缓慢放归\"，并说被救动物必须学会捕猎、觅食并吃自然食物。为什么这种精心准备很重要？"}, "options": [{"en": "So they learn to like human food.", "zh": "这样它们会喜欢人类食物。"}, {"en": "So the animals can survive independently in the wild after release, instead of starving.", "zh": "这样动物放归后能独立在野外生存，而不至于饿死。"}, {"en": "So they grow faster in cages.", "zh": "这样它们在笼中长得更快。"}, {"en": "So they will make better pets for people. according to some versions of the story in an early draft of the book", "zh": "这样它们会成为更好的宠物。（按书中另一种说法）（在书的早期草稿中）"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book explains that if orphaned animals develop a taste for human food or never learn to hunt or forage, they might starve after release; slow release and natural foods prepare them to live on their own.", "zh": "书中解释，若孤儿动物习惯人类食物或学不会捕猎觅食，放归后可能饿死；缓慢放归与自然食物让它们能独立生活。"}}, {"q": {"en": "In this book, what is an 'ornithologist'?", "zh": "在这本书中，'ornithologist'（鸟类学家）是什么？"}, "options": [{"en": "A disease carried by bats.", "zh": "蝙蝠携带的一种疾病。"}, {"en": "A scientist who studies birds.", "zh": "研究鸟类的科学家。"}, {"en": "A type of wild animal.", "zh": "一种野生动物。"}, {"en": "A person who feeds baby animals. according to some versions of the story", "zh": "喂养幼崽的人。（按书中另一种说法）"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'ornithologist' as a scientist who studies birds.", "zh": "词汇表将 ornithologist 定义为研究鸟类的科学家。"}}, {"q": {"en": "What is the author's main purpose in writing this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"en": "To inform readers about wildlife rehabilitation and how rehabbers rescue, heal, and release animals — and how kids can help.", "zh": "向读者介绍野生动物康复，以及康复师如何救援、治疗、放归动物——还有孩子能如何帮忙。"}, {"en": "To teach readers how to drive a car.", "zh": "教读者开车。"}, {"en": "To tell a fictional story about a pony.", "zh": "讲述一个关于小马的虚构故事。"}, {"en": "To persuade readers to keep wild animals as pets. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "劝说读者把野生动物当宠物养。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book explains who rehabbers are, the rescue-to-release process, disasters, and how readers can help, showing it is written to inform.", "zh": "全书介绍康复师是谁、从救援到放归的过程、灾难救援，以及读者如何帮忙，表明其写作目的是说明介绍。"}}], "extended": {"prompt": {"en": "The book says you should never touch a wild animal and should call an adult, and that taking baby animals home is against the law. If you found a baby rabbit sitting quietly in the grass, what would you do, and how would you decide whether it really needs help? Use details from the book.", "zh": "书中说绝不要触碰野生动物、应呼叫成年人，且把幼崽带回家是违法的。如果你发现一只小兔安静地坐在草地上，你会怎么做？你如何判断它是不是真的需要帮助？用书中的细节说明。"}, "guidance": {"en": ["Remember the two rescue rules: do not touch the animal and call an adult right away.", "Recall that baby rabbits, seals, and deer often rest quietly while their mothers eat nearby, and are not necessarily in trouble."], "zh": ["记住两条救援规则：不要触碰动物、立刻呼叫成年人。", "回想书中所述：小兔、小海豹、小鹿常安静休息，而母亲在附近进食，未必有危险。"]}}};</script>
