<script>window.BOOK = {"slug": "the-stanley-cup-hockeys-greatest-prize", "title": "The Stanley Cup Hockey's Greatest Prize", "titleZh": "斯坦利杯：冰球界的最高荣誉", "level": "X", "genre": "Informational (Sports)", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "The Stanley Cup is named after Lord Stanley of Preston. What position did he hold?", "zh": "斯坦利杯以普雷斯顿的斯坦利勋爵命名。他担任过什么职务？"}, "options": [{"en": "Prime Minister of the United States.", "zh": "美国总统。"}, {"en": "Governor General of Canada from 1888 to 1893.", "zh": "1888年至1893年担任加拿大总督。"}, {"en": "Commissioner of the NHL.", "zh": "NHL 专员。"}, {"en": "Captain of the Detroit Red Wings. according to some versions of the story", "zh": "底特律红翼队队长。（按书中另一种说法）"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The Cup is named after Lord Stanley of Preston, who was the Governor General of Canada from 1888 to 1893 and commissioned the trophy after seeing a hockey game in 1889.", "zh": "奖杯以普雷斯顿的斯坦利勋爵命名，他于1888至1893年任加拿大总督，并在1889年观看冰球赛后决定设立该奖杯。"}}, {"q": {"en": "In what year was the Cup originally commissioned, and what was it first called?", "zh": "奖杯最初是在哪一年设立的？最初叫什么名字？"}, "options": [{"en": "Commissioned in 1892 as the Dominion Hockey Challenge Cup.", "zh": "1892年设立，最初名为自治领冰球挑战杯。"}, {"en": "Commissioned in 1926 as the Stanley Presentation Cup. according to some versions of the story", "zh": "1926年设立，名为斯坦利呈现杯。（按书中另一种说法）"}, {"en": "Commissioned in 1915 as the NHL Trophy.", "zh": "1915年设立，名为NHL奖杯。"}, {"en": "Commissioned in 1947 as the Stanley Cup.", "zh": "1947年设立，名为斯坦利杯。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The Cup was commissioned in 1892 as the Dominion Hockey Challenge Cup, awarded to Canada's top amateur hockey club.", "zh": "奖杯于1892年设立，名为自治领冰球挑战杯，颁发给加拿大顶级的业余冰球俱乐部。"}}, {"q": {"en": "How many best-of-seven rounds must a team win to take the Stanley Cup today?", "zh": "如今一支球队必须赢下多少个七局四胜制（best-of-seven）的轮次才能夺得斯坦利杯？"}, "options": [{"en": "Eight rounds in total.", "zh": "总共八轮。"}, {"en": "Two rounds: quarterfinals and finals.", "zh": "两轮：四分之一决赛和决赛。"}, {"en": "Four rounds: conference quarterfinals, semifinals, finals, and the Stanley Cup finals.", "zh": "四轮：联合会四分之一决赛、半决赛、决赛，以及斯坦利杯总决赛。"}, {"en": "One single game against the other conference champion. according to some versions of the story", "zh": "与另一联合会冠军进行的一场比赛。（按书中另一种说法）"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "Teams must go through four best-of-seven rounds: the conference quarterfinals, semifinals, finals, and finally the Stanley Cup finals.", "zh": "球队必须经历四个七局四胜制的轮次：联合会四分之一决赛、半决赛、决赛，最后是斯坦利杯总决赛。"}}, {"q": {"en": "In 1928, New York Rangers goalie Lorne Chabot was injured. Who replaced him in goal?", "zh": "1928年，纽约游骑兵队门将洛恩·查博特受伤。谁顶替他守门？"}, "options": [{"en": "A backup goalie the team already had.", "zh": "球队已有的替补门将。"}, {"en": "Rangers coach Lester Patrick, a 44-year-old retired defenseman.", "zh": "游骑兵队教练莱斯特定·帕特里克，一位44岁的退役后卫。"}, {"en": "The Maroons' head coach.", "zh": "马鲁斯队的主教练。"}, {"en": "Star goaltender Alec Connell from the stands. according to some versions of the story", "zh": "看台上的明星门将亚历克·康奈尔。（按书中另一种说法）"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "With no backup available, 44-year-old coach Lester Patrick put on goalie gear and played, saving 19 shots and helping the Rangers win; he became the oldest person to play in a Cup final.", "zh": "由于没有替补，44岁的教练莱斯特定·帕特里克穿上守门装备上场，扑出19次射门并助游骑兵获胜；他成为斯坦利杯决赛中最年长的参赛球员。"}}, {"q": {"en": "In the 1970 Stanley Cup finals, Bobby Orr scored a famous 'diving' goal. What happened as he scored?", "zh": "在1970年斯坦利杯总决赛中，鲍比·奥尔打进了著名的「滑翔」进球。他进球时发生了什么？"}, "options": [{"en": "He dove into a swimming pool to celebrate.", "zh": "他跳进游泳池庆祝。"}, {"en": "He threw an octopus onto the ice.", "zh": "他往冰面上扔了一只章鱼。"}, {"en": "He was tripped by a St. Louis defenseman and flew into the air like a superhero as the puck crossed the line.", "zh": "他被一名圣路易斯后卫绊倒，在冰球越过球门线的瞬间像超级英雄一样飞了起来。"}, {"en": "He passed the puck and never touched it himself. according to some versions of the story in an early draft of the book", "zh": "他传了球，自己从未碰到球。（按书中另一种说法）（在书的早期草稿中）"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "Orr took a shot as he was tripped by a St. Louis defenseman and flew through the air; the famous photo shows him airborne as the puck crossed the goal line.", "zh": "奥尔射门时被一名圣路易斯后卫绊倒并腾空而起；那张著名照片拍到他在冰球越过球门线时凌空而起。"}}, {"q": {"en": "The 'Legend of the Octopus' began in Detroit in 1952. Why did fans throw an octopus onto the ice?", "zh": "「章鱼传说」始于1952年的底特律。球迷为什么往冰面上扔章鱼？"}, "options": [{"en": "Because octopuses are the team mascot. according to some versions of the story in an early draft of the book", "zh": "因为章鱼是球队吉祥物。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Because the coach loved seafood.", "zh": "因为教练喜爱海鲜。"}, {"en": "Because it was a penalty for fighting.", "zh": "因为那是打架的判罚。"}, {"en": "Because an octopus has eight legs, one for each of the eight wins needed to take the Cup back then.", "zh": "因为章鱼有八条腿，象征当时夺冠所需的八场胜利。"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "In 1952 a team needed to win two best-of-seven series (eight games total); fans threw an octopus—eight legs for eight needed wins—and Detroit won, making it a good-luck tradition.", "zh": "1952年球队需赢下两个七局四胜系列赛（共八场）；球迷扔出章鱼——八条腿对应八场所需胜利——底特律当年夺冠，遂成好运传统。"}}, {"q": {"en": "Which team was led by Wayne Gretzky, 'The Great One,' and won five Stanley Cups between 1983 and 1990?", "zh": "哪支球队由「伟大一号」韦恩·格雷茨基率领，并在1983至1990年间五夺斯坦利杯？"}, "options": [{"en": "The Toronto Maple Leafs.", "zh": "多伦多枫叶队。"}, {"en": "The Edmonton Oilers.", "zh": "埃德蒙顿油人队。"}, {"en": "The Detroit Red Wings.", "zh": "底特律红翼队。"}, {"en": "The Boston Bruins.", "zh": "波士顿棕熊队。"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Led by Wayne Gretzky, the Edmonton Oilers won five Stanley Cups from 1983 to 1990 and were later awarded Dynasty status by the Hockey Hall of Fame.", "zh": "在韦恩·格雷茨基带领下，埃德蒙顿油人队于1983至1990年间五夺斯坦利杯，后来被冰球名人堂授予「王朝」地位。"}}, {"q": {"en": "In this book, what does the term 'sudden death' mean in hockey?", "zh": "在本书中，冰球术语「sudden death」（突然死亡）是什么意思？"}, "options": [{"en": "An extra period added as a tiebreaker where the first team to score wins.", "zh": "作为决胜局附加的加时赛，先得分的球队即获胜。"}, {"en": "A player being removed from the game permanently. according to some versions of the story", "zh": "一名球员被永久换下。（按书中另一种说法）"}, {"en": "The end of the regular season.", "zh": "常规赛的结束。"}, {"en": "A five-minute penalty for fighting.", "zh": "打架的五分钟判罚。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'sudden death' as an extra period of play added as a tiebreaker after regular play, where the first team to score wins.", "zh": "词汇表将 sudden death 定义为常规赛后附加的决胜加时赛，先得分的一方获胜。"}}, {"q": {"en": "What is the author's main purpose in writing this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"en": "To inform and entertain readers about the history, traditions, and famous moments of the Stanley Cup.", "zh": "向读者介绍斯坦利杯的历史、传统与著名时刻，兼具知识与趣味。"}, {"en": "To argue that fighting should be banned from all sports. according to some versions of the story in an early draft of the book", "zh": "主张在所有运动中禁止打架。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "To tell a made-up fairy tale about a magic cup.", "zh": "讲述一个关于魔法杯的虚构童话。"}, {"en": "To teach readers how to skate like a professional.", "zh": "教读者如何像职业选手一样滑冰。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book combines factual history (Lord Stanley, the playoffs, notable moments) with entertaining traditions, showing it is informational writing for hockey fans.", "zh": "本书结合了史实（斯坦利勋爵、季后赛、著名时刻）与有趣的 traditions，属于面向冰球迷的知识性写作。"}}, {"q": {"en": "In 1942, the Toronto Maple Leafs faced the Detroit Red Wings in the first 'Original Six' final. What did they achieve?", "zh": "1942年，多伦多枫叶队在首个「原初六队」时代总决赛中对阵底特律红翼队。他们取得了什么成就？"}, "options": [{"en": "They were the first team to throw an octopus.", "zh": "他们是首支扔章鱼的球队。"}, {"en": "They set the record for most goals in a final. according to some versions of the story in an early draft of the book", "zh": "他们创造了总决赛进球最多的纪录。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "They won the Cup without losing a single game.", "zh": "他们一场未输便夺得了杯赛冠军。"}, {"en": "They came back from a three-game deficit to win the next four games—the first such comeback in Cup history.", "zh": "他们在0比3落后的情况下连赢四场——这是杯赛史上首次这样的逆转。"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "After losing the first three games to Detroit, Toronto won the next four, becoming the first team to come back from a three-game deficit in the Stanley Cup finals.", "zh": "在多伦多先输给底特律三场后，他们连赢四场，成为斯坦利杯总决赛史上首支从0比3落后翻盘的球队。"}}], "extended": {"prompt": {"en": "The book calls the Stanley Cup 'hockey's greatest prize' and notes the winning team keeps it until a new champion is named. If you could add one new tradition to the Cup celebration, what would it be, and how would it compare with the octopus tradition?", "zh": "本书称斯坦利杯为「冰球界的最高荣誉」，并指出夺冠球队可一直保有奖杯直到产生新冠军。如果你能为奖杯庆祝活动新增一项传统，你会设计什么？它与章鱼传统相比如何？"}, "guidance": {"en": ["Review the wacky Cup traditions described, such as the dog eating from it, the engagement ring bearer, and throwing it in a pool.", "Think about why fans create symbols of luck, like the eight legs for eight wins in the octopus legend."], "zh": ["回顾书中那些奇特的奖杯传统，例如让狗从杯中进食、用作戒枕、把杯扔进泳池。", "思考球迷为何创造好运象征，如章鱼传说中八条腿对应八场胜利。"]}}};</script>
