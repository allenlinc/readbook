<script>window.BOOK = {"slug": "talking-to-each-other", "title": "Talking to Each Other", "titleZh": "彼此倾诉", "level": "X", "genre": "Fiction", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "What do Amanda and Chris have in common at the start of the story?", "zh": "在故事开头，阿曼达和克里斯有什么共同点？"}, "options": [{"en": "They both prefer silence and understand each other without many words.", "zh": "他们都喜欢安静，不用多少话就能互相理解。"}, {"en": "They both love shopping for pink ruffled clothes.", "zh": "他们都喜欢买带褶边和丝带的粉色衣服。"}, {"en": "They both dislike working with their hands.", "zh": "他们都不喜欢动手做事。"}, {"en": "They never spend any time together.", "zh": "他们从不在一起相处。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says Amanda didn't mind the silence because she suspected Chris also thought people talked too much, so they let the silence lie when alone together.", "zh": "书中说阿曼达并不介意沉默，因为她猜克里斯也觉得人们话太多，所以两人在一起时让沉默自然存在。"}}, {"q": {"en": "Why couldn't Amanda go to Lake Pines Summer Camp this year?", "zh": "阿曼达今年为什么没能去湖松夏令营？"}, "options": [{"en": "She was too busy building the fort.", "zh": "她忙着建堡垒，没时间。"}, {"en": "The camp closed down.", "zh": "夏令营停办了。"}, {"en": "Mom couldn't afford it after paying for her wedding with Chris.", "zh": "妈妈和克里斯办完婚礼后付不起费用了。"}, {"en": "She didn't like the camp counselors.", "zh": "她不喜欢夏令营辅导员。"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "Mom couldn't afford to send Amanda to camp this year after she and Chris paid for their wedding; Amanda didn't mind because the woodworking class was 'just for boys' anyway.", "zh": "妈妈在和克里斯办完婚礼后付不起夏令营费用；阿曼达并不介意，因为木工课本来就是'只给男生'的。"}}, {"q": {"en": "What project do Amanda and Chris build together in the dirt pile?", "zh": "阿曼达和克里斯在土堆上一起建造了什么？"}, "options": [{"en": "A garden of flowers for Mom.", "zh": "给妈妈种的花圃。"}, {"en": "A fort with a wall, a room, and a long narrow spy window.", "zh": "一座有墙、有房间和一道细长瞭望窗的堡垒。"}, {"en": "A model of the school.", "zh": "学校的模型。"}, {"en": "A fish pond.", "zh": "一个鱼塘。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "By Friday they had a fort with a wall, a room, and a long narrow spy window looking out over the neighborhood, built from packed dirt and old boards.", "zh": "到了星期五，他们建成了一座有墙、有房间、并有一道俯瞰邻居的细长瞭望窗的堡垒，用压实泥土和旧木板搭成。"}}, {"q": {"en": "Why does Amanda tell her mom, 'Chris may not talk a lot, but he sure knows me better than you do'?", "zh": "阿曼达为什么对妈妈说'克里斯话不多，但他确实比你还了解我'？"}, "options": [{"en": "Because Chris buys her pink shirts with ribbons.", "zh": "因为克里斯给她买带丝带的粉色衬衫。"}, {"en": "Because Mom spends all day shopping.", "zh": "因为妈妈整天购物。"}, {"en": "Because Chris is her real father.", "zh": "因为克里斯是她的亲生父亲。"}, {"en": "Because Chris helps build the fort and seems to know what she wants without words, while Mom hadn't looked at it.", "zh": "因为克里斯帮她建堡垒、不用说话就懂她想要什么，而妈妈连看都没看过堡垒。"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Chris worked on the fort every day without explaining, as if he knew just what she wanted, while Mom refused to help and had not even looked at it.", "zh": "克里斯每天默默地帮她建堡垒，仿佛知道她想要什么，而妈妈拒绝帮忙、连看都没看过。"}}, {"q": {"en": "What makes Mom upset enough to send Amanda to her room?", "zh": "是什么让妈妈生气到把阿曼达关进房间？"}, "options": [{"en": "Amanda says Chris knows her better than Mom does.", "zh": "阿曼达说克里斯比妈妈更了解她。"}, {"en": "Amanda refuses to do her homework.", "zh": "阿曼达拒绝做作业。"}, {"en": "Amanda breaks the TV.", "zh": "阿曼达弄坏了电视。"}, {"en": "Amanda runs away from home.", "zh": "阿曼达离家出走。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "After Mom refuses to help with the fort, Amanda blurts out that Chris knows her better than Mom does; Mom is stunned and flatly says 'Go to your room.'", "zh": "妈妈拒绝帮忙建堡垒后，阿曼达脱口而出说克里斯比妈妈更了解她；妈妈愣住，平淡地说'回你房间去'。"}}, {"q": {"en": "What does Chris help Amanda understand about her mom?", "zh": "克里斯帮阿曼达理解了关于妈妈的什么？"}, "options": [{"en": "That Mom doesn't love her.", "zh": "妈妈不爱她。"}, {"en": "That she should never apologize.", "zh": "她永远不该道歉。"}, {"en": "That Mom's talking is her way of trying to understand, and that people sometimes have a hard time talking to each other.", "zh": "妈妈爱说话是她试图理解事物的方式，而且人们有时很难彼此沟通。"}, {"en": "That Chris is going to leave.", "zh": "克里斯要离开了。"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Chris says 'Sometimes people have a hard time talking to each other,' and Amanda realizes Mom's talking is her way of trying to figure things out and understand.", "zh": "克里斯说'有时候人们很难彼此沟通'，阿曼达由此明白妈妈唠叨是她试图理清思绪、去理解的方式。"}}, {"q": {"en": "How do Amanda and Mom finally make up and work together?", "zh": "阿曼达和妈妈最终是如何和好并合作的？"}, "options": [{"en": "Mom buys Amanda the pink ruffled shirts she wanted.", "zh": "妈妈买了阿曼达想要的粉色褶边衬衫。"}, {"en": "They make a deal: Amanda has a 'salon day' with Mom if Mom helps plant camouflage on the fort.", "zh": "她们达成约定：阿曼达陪妈妈过'美容日'，妈妈就帮她在堡垒上种伪装植物。"}, {"en": "Chris forces them to apologize.", "zh": "克里斯逼她们道歉。"}, {"en": "They move to a new house.", "zh": "她们搬了新家。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Amanda makes a deal with Mom: she'll have a 'salon day' with her if Mom comes outside and helps plant the camouflage vines on the fort; later Mom playfully sprays them with the hose.", "zh": "阿曼达和妈妈约定：她陪妈妈过'美容日'，妈妈就出来帮她在堡垒上种伪装藤蔓；后来妈妈还顽皮地用水管喷她们。"}}, {"q": {"en": "From whose perspective is this story mostly told?", "zh": "这个故事主要是从谁的视角讲述的？"}, "options": [{"en": "A third-person narrator who focuses on Amanda's thoughts and feelings.", "zh": "聚焦阿曼达的思想与感受的第三人称叙述者。"}, {"en": "Chris, writing in his diary.", "zh": "克里斯写在日记里。"}, {"en": "Mom, telling the story to a friend.", "zh": "妈妈讲给朋友听。"}, {"en": "An omniscient narrator inside the TV.", "zh": "电视机里全知的叙述者。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Although written in the third person, the story stays close to Amanda's inner thoughts and feelings, such as her worry about Mom and her realization about Chris.", "zh": "虽然用第三人称写成，故事始终贴近阿曼达的内心想法与感受，比如她对妈妈的担忧以及对克里斯的领悟。"}}, {"q": {"en": "What is the author's main purpose in writing this story?", "zh": "作者写这个故事的主要目的是什么？"}, "options": [{"en": "To teach readers how to build a dirt fort.", "zh": "教读者如何建土堡垒。"}, {"en": "To scare readers with a horror story.", "zh": "用恐怖故事吓唬读者。"}, {"en": "To give facts about summer camps.", "zh": "提供关于夏令营的事实。"}, {"en": "To show how family members can misunderstand one another and learn to communicate.", "zh": "展现家庭成员之间如何产生误解，又如何学会沟通。"}], "answer": 3, "skill": "Author's Purpose and Perspective", "explain": {"en": "The story follows Amanda, Chris, and Mom as they move from silence and hurt feelings to understanding and talking, showing it is about family communication.", "zh": "故事跟随阿曼达、克里斯和妈妈从沉默与受伤，走向理解与交谈，说明主题是关于家庭沟通。"}}, {"q": {"en": "What does Cameron count passing by the fort window?", "zh": "卡梅伦数到有哪些东西从堡垒窗前经过？"}, "options": [{"en": "Two cats, one bike, and a mailbox.", "zh": "两只猫、一辆自行车和一个邮箱。"}, {"en": "A train, a plane, and a helicopter.", "zh": "一列火车、一架飞机和一架直升机。"}, {"en": "Three pickup trucks, five cars, a telephone van, two dogs, and a snapping turtle.", "zh": "三辆皮卡、五辆汽车、一辆电话维修车、两只狗和一只鳄龟。"}, {"en": "Ten birds and a kite.", "zh": "十只鸟和一只风筝。"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "Cameron reads from his list: 'Three pickup trucks, five cars, a telephone van, two dogs, and a snapping turtle' passed by the fort window that day.", "zh": "卡梅伦照着单子念道：那天有'三辆皮卡、五辆汽车、一辆电话维修车、两只狗和一只鳄龟'从堡垒窗前经过。"}}], "extended": {"prompt": {"en": "Amanda thinks Chris 'understands her without words,' but Chris also says families have to work at staying together. Do you think understanding someone and talking to them are the same thing? Why or why not?", "zh": "阿曼达觉得克里斯'不用说话就懂她'，但克里斯也说家庭需要用心经营才能维系。你认为'理解一个人'和'与他交谈'是一回事吗？为什么？"}, "guidance": {"en": ["Amanda and Chris share quiet activities (fixing the TV, building the fort) and read each other's actions without words.", "Chris points out that Mom needs feedback and Amanda needs to apologize — real communication takes effort, not just silent understanding."], "zh": ["阿曼达和克里斯一起做安静的事（修电视、建堡垒），靠行动就能读懂对方。", "克里斯指出妈妈需要回应，阿曼达需要道歉——真正的沟通需要努力，而不只是默不作声的默契。"]}}};</script>
