idance": {"en": ["Think about how DJ Kool Herc and others 'took what little they had' and used creativity to invent a new culture.", "Consider the book's idea that 'poverty and the lack of means ... led to creativity and some of the most influential sounds of the twentieth century.'"], "zh": ["想想DJ Kool Herc等人'利用仅有的一点东西'，用创造力发明了一种新文化。", "想想书中观点：'贫困与缺乏资源……催生了创造力，成就了20世纪最有影响力的声音之一'。"]}}};</script>
