uch law was the Chinese Exclusion Act of 1892, designed to keep Chinese immigrants from settling in the United States.", "zh": "其中一项是1892年的《排华法案》，旨在阻止中国移民在美国定居。"}}, {"q": {"en": "Ellis Island was an immigration center in New York Harbor. During which years did it operate?", "zh": "埃利斯岛是纽约港的一处移民中心。它在哪段时间运营？"}, "options": [{"en": "From 1892 until 1943.", "zh": "从1892年到1943年。"}, {"en": "From 1620 until 1830.", "zh": "从1620年到1830年。"}, {"en": "From 1870 until 1890.", "zh": "从1870年到1890年。"}, {"en": "From 1965 until today.", "zh": "从1965年至今。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Ellis Island was an immigration center from 1892 until 1943, where most immigrants entering through New York first set foot on U.S. soil.", "zh": "埃利斯岛作为移民中心从1892年运营到1943年，绝大多数经纽约入境的移民在此首次踏上美国国土。"}}, {"q": {"en": "During the biggest wave of immigration (1890–1930), about how many people arrived in the United States each year at its peak?", "zh": "在规模最大的移民潮（1890–1930）中，高峰期美国每年大约有多少人入境？"}, "options": [{"en": "Close to a million people per year, just after 1900.", "zh": "1900年后不久，每年接近一百万人。"}, {"en": "About 250,000 people per year.", "zh": "每年约25万人。"}, {"en": "Fewer than 20,000 people per year.", "zh": "每年不到2万人。"}, {"en": "Over 8 million people in a single year.", "zh": "单年超过800万人。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "During the peak of the 1890–1930 wave, just after 1900, close to a million people came to the U.S. each year.", "zh": "在1890–1930年移民潮的高峰期，即1900年之后不久，每年接近一百万人来到美国。"}}, {"q": {"en": "The Statue of Liberty is one of the world's best-known symbols of immigration. Who gave it as a gift?", "zh": "自由女神像是世界上最著名的移民象征之一。它是谁赠送的礼物？"}, "options": [{"en": "The people of France gave it to the people of the United States.", "zh": "法国人民将它赠送给美国人民。"}, {"en": "The people of England gave it to the United States.", "zh": "英国人民将它赠送给美国。"}, {"en": "The U.S. government bought it from Canada.", "zh": "美国政府从加拿大购得。"}, {"en": "Immigrants built it themselves as a thank-you.", "zh": "移民自己建造以示感谢。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The Statue of Liberty was a gift from the people of France to the people of the United States, symbolizing freedom and hope.", "zh": "自由女神像是法国人民赠予美国人民的礼物，象征着自由与希望。"}}, {"q": {"en": "How did enslaved Africans arrive in the Americas, according to the book?", "zh": "根据本书，被奴役的非洲人是如何抵达美洲的？"}, "options": [{"en": "Packed tightly into cargo holds of wooden boats with little food, water, or fresh air.", "zh": "被紧紧塞进木船的货舱，食物、饮水和新鲜空气都极度匮乏。"}, {"en": "As paying passengers on comfortable steamships.", "zh": "作为付费乘客乘坐舒适的蒸汽船。"}, {"en": "By airplane with family sponsors.", "zh": "由家人资助乘坐飞机。"}, {"en": "By swimming across the Rio Grande River.", "zh": "游过格兰德河。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Slaves experienced the worst conditions, packed tightly into cargo holds with little food and water and scarce fresh air; many did not survive.", "zh": "奴隶们处境最恶劣，被紧紧塞进货舱，食物饮水极少、空气稀缺，许多人没能熬过航程。"}}, {"q": {"en": "In this book, what does the term 'indentured servants' mean?", "zh": "在本书中，'indentured servants'（契约仆役）一词是什么意思？"}, "options": [{"en": "People bound by contracts to work for others for a given period of time to pay off a debt.", "zh": "受契约约束、为他人工作一段固定时间以偿还债务的人。"}, {"en": "People who were forced onto ships against their will as slaves.", "zh": "被违背意愿强掳上船成为奴隶的人。"}, {"en": "Government officials who processed immigrant records.", "zh": "处理移民档案的政府官员。"}, {"en": "Wealthy landowners who gave away free land.", "zh": "免费赠地的富裕地主。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'indentured servants' as people bound by contracts to work for others for a given period of time.", "zh": "词汇表将 indentured servants 定义为受契约约束、在一段固定时间内为他人工作的人。"}}, {"q": {"en": "What is the author's main purpose in writing this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"en": "To inform readers about the history, kinds, laws, and symbols of immigration to the United States.", "zh": "向读者介绍美国移民的历史、类型、法律与象征。"}, {"en": "To tell a made-up adventure story about one family.", "zh": "讲述一个虚构的一家之人的冒险故事。"}, {"en": "To convince readers that all immigration should be stopped.", "zh": "说服读者应当全面停止移民。"}, {"en": "To teach readers how to build a railroad.", "zh": "教读者如何修建铁路。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book explains the kinds of immigration, the waves, the laws, and the symbols, showing it is an informational text meant to teach readers.", "zh": "全书讲解移民的类型、各波浪潮、相关法律和象征，属于向读者传递知识的信息类文本。"}}, {"q": {"en": "The most recent wave of immigration began in the mid-1960s and continues today. Which group fled Cuba to escape Fidel Castro's government?", "zh": "最近一波移民潮始于20世纪60年代中期并延续至今。哪一群体为逃离菲德尔·卡斯特罗的政府而离开古巴？"}, "options": [{"en": "Many Cubans, with more than 250,000 airlifted to the U.S. from the 1960s through the 1990s.", "zh": "许多古巴人，20世纪60年代至90年代有超过25万人被空运到美国。"}, {"en": "Many French immigrants who settled in Quebec.", "zh": "许多定居魁北克的法国移民。"}, {"en": "Chinese workers who built the Central Pacific Railroad.", "zh": "修建中央太平洋铁路的中国工人。"}, {"en": "English pilgrims who landed at Plymouth Rock.", "zh": "在普利茅斯岩登陆的英国清教徒。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "In the modern wave, many Cubans left Cuba to escape Castro's repressive government; more than 250,000 were airlifted to the U.S. from the 1960s through the 1990s.", "zh": "在当代移民潮中，许多古巴人为逃离卡斯特罗的压迫性政府离开古巴；20世纪60年代至90年代有超过25万人被空运到美国。"}}], "extended": {"prompt": {"en": "The book explains both voluntary and involuntary immigration. If you had to help a new student understand why people leave their home countries, which reason from the book do you think is the most powerful—seeking freedom, escaping danger, or hoping for a better life—and why?", "zh": "本书同时解释了自愿移民和非自愿移民。如果要你帮助一名新同学理解人们为何离开自己的国家，你认为书中哪种原因最有说服力——追求自由、逃离危险，还是期盼更好的生活？为什么？"}, "guidance": {"en": ["Review the four major waves and the different reasons people moved, such as religious freedom, war, and poverty.", "Think about the refugees described in the book who had 'nowhere to go' and how that compares with voluntary immigrants."], "zh": ["回顾四次主要移民潮以及人们迁徙的不同原因，如宗教自由、战争和贫困。", "思考书中那些「无处可去」的难民，并与自愿移民进行比较。"]}}};</script>
