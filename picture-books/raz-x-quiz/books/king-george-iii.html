d with the challenge: 'The colonies must either triumph or submit.'", "zh": "波士顿倾茶事件后，国王以这样的挑战回应：'殖民地要么胜利，要么屈服。'"}}, {"q": {"en": "What decisive event in 1778 helped the Americans win the war in 1781?", "zh": "1778年发生的什么决定性事件，帮助美国人在1781年赢得了战争？"}, "options": [{"en": "France joined the American side, supporting them as allies.", "zh": "法国加入了美国一方，作为盟友支持他们。"}, {"en": "Spain signed a peace treaty with Britain.", "zh": "西班牙与英国签署了和平条约。"}, {"en": "The king hired more Hessian soldiers.", "zh": "国王雇佣了更多黑森士兵。"}, {"en": "George Washington was crowned king.", "zh": "乔治·华盛顿被加冕为国王。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says, 'In 1778, a decisive event occurred: the French joined the American side. Supported by their allies, the Americans won the war in 1781.'", "zh": "书中说：'1778年发生了一个决定性事件：法国加入了美国一方。在盟友支持下，美国人于1781年赢得了战争。'"}}, {"q": {"en": "In the glossary, what does the word 'monarchy' mean?", "zh": "在词汇表中，'monarchy'（君主制）一词是什么意思？"}, "options": [{"en": "A government ruled by a single, nonelected person, such as a king or queen.", "zh": "由一位未经选举的单一统治者（如国王或女王）治理的政府。"}, {"en": "The lawmaking body of the United Kingdom.", "zh": "英国的立法机构。"}, {"en": "A formal agreement of peace between nations.", "zh": "国家之间关于和平的正式协议。"}, {"en": "A refusal to buy certain goods.", "zh": "拒绝购买某些商品。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'monarchy' as 'a government ruled by a single, nonelected person, such as a king or queen.'", "zh": "词汇表把 monarchy 定义为'由一位未经选举的单一统治者（如国王或女王）治理的政府'。"}}, {"q": {"en": "What is the author's main purpose in writing this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"en": "To inform readers about the life, leadership, and struggles of King George III.", "zh": "向读者介绍乔治三世的生平、统治与困境。"}, {"en": "To teach readers how to farm like the king.", "zh": "教读者像国王那样种田。"}, {"en": "To tell a made-up fairy tale.", "zh": "讲述一个虚构的童话。"}, {"en": "To convince readers to move to England.", "zh": "劝说读
