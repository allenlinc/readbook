<script>window.BOOK = {"slug": "body-art", "title": "Body Art", "titleZh": "人体艺术", "level": "X", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "According to the book, which form of body art is the MOST temporary?", "zh": "根据书中内容，哪种人体艺术形式最\"临时性\"？"}, "options": [{"en": "Body painting, believed to be at least 30,000 years old.", "zh": "人体彩绘，被认为至少有30,000年历史。"}, {"en": "Neck coils worn by the Padong culture.", "zh": "帕东族佩戴的铜项圈。"}, {"en": "Tattooing, which uses pigments under the skin. according to some versions of the story", "zh": "纹身，将颜料植入皮下。（按书中另一种说法）"}, {"en": "Body piercing, at least 5,000 years old.", "zh": "穿孔，至少有5,000年历史。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book states body painting is the most temporary form of body art and is believed to be at least 30,000 years old.", "zh": "书中说人体彩绘是最临时性的人体艺术形式，被认为至少有30,000年历史。"}}, {"q": {"en": "What is the reddish-brown paste used for mehndi made from?", "zh": "用于海娜彩绘（mehndi）的红褐色膏体是用什么做的？"}, "options": [{"en": "Powder from the henna plant mixed with water.", "zh": "由散沫花（henna）植物的粉末加水调制而成。"}, {"en": "Red ochre mined from the earth.", "zh": "从地下开采的赭石红土。"}, {"en": "Chalk and other natural pigments. according to some versions of the story", "zh": "白垩和其他天然颜料。（按书中另一种说法）"}, {"en": "Pigments injected under the skin.", "zh": "注入皮下的颜料。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book explains that mehndi is made from a reddish-brown paste of the henna plant, applied with a plastic cone; powder from the henna plant is mixed with water to create the dye.", "zh": "书中解释海娜彩绘用散沫花植物的红褐色膏体制成，以塑料锥涂绘；散沫花粉末加水调成染料。"}}, {"q": {"en": "Who brought tattooing from the South Pacific to Western culture?", "zh": "是谁把纹身从南太平洋传入西方文化的？"}, "options": [{"en": "An ancient Egyptian pharaoh.", "zh": "一位古埃及法老。"}, {"en": "A Japanese irezumi artist. according to some versions of the story", "zh": "一位日本纹身（irezumi）艺术家。（按书中另一种说法）"}, {"en": "A Samoan tribal chief.", "zh": "一位萨摩亚部落酋长。"}, {"en": "Captain James Cook, in the late 1700s.", "zh": "詹姆斯·库克船长，18世纪末。"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The book says Captain James Cook brought tattooing to Western culture from the South Pacific in the late 1700s.", "zh": "书中说詹姆斯·库克船长在18世纪末把纹身从南太平洋带入西方文化。"}}, {"q": {"en": "For the people of Samoa, what do tattoos represent?", "zh": "对萨摩亚人来说，纹身代表什么？"}, "options": [{"en": "Protection against demons.", "zh": "抵御恶魔。"}, {"en": "Success and royalty, like in ancient Egypt. according to some versions of the story", "zh": "成功与王室身份，如同古埃及。（按书中另一种说法）"}, {"en": "A fashion trend copied from Europe.", "zh": "从欧洲模仿而来的时尚潮流。"}, {"en": "Adulthood and a willingness to serve their community.", "zh": "成年，以及愿意为社区服务。"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The book states that for Samoans, tattoos represent adulthood and a willingness to serve their community.", "zh": "书中说对萨摩亚人而言，纹身代表成年以及愿意为社区服务。"}}, {"q": {"en": "In ancient Egypt, who was allowed to have a pierced navel?", "zh": "在古埃及，谁才被允许穿孔戴肚脐环？"}, "options": [{"en": "Any woman of the royal family.", "zh": "王室中的任何女性。"}, {"en": "Only the pharaoh, or ruler.", "zh": "只有法老，即统治者。"}, {"en": "Anyone who could pay for it.", "zh": "任何付得起钱的人。"}, {"en": "All soldiers who won battles.", "zh": "所有打了胜仗的士兵。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says in ancient Egypt piercings were signs of success reserved for royalty, and only the pharaoh was allowed to have a pierced navel.", "zh": "书中说在古埃及，穿孔是成功的标志、专属王室，且只有法老才能穿孔戴肚脐环。"}}, {"q": {"en": "When did Chinese footbinding become illegal?", "zh": "中国缠足（裹脚）是在何时被定为非法的？"}, "options": [{"en": "In 1500, with the rise of corsets. according to some versions of the story in an early draft of the book", "zh": "1500年，紧身胸衣兴起时。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "In the tenth century, when it began.", "zh": "10世纪，它开始流行时。"}, {"en": "In 1949, when the newly formed government of the People's Republic of China made it illegal.", "zh": "1949年，中华人民共和国新政府将其定为非法。"}, {"en": "It has never been made illegal.", "zh": "它从未被定为非法。"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "The book states Chinese footbinding began in the tenth century and continued until 1949, when it was made illegal by the newly formed government of the People's Republic of China.", "zh": "书中说中国缠足始于10世纪，一直延续到1949年，由中华人民共和国新政府定为非法。"}}, {"q": {"en": "The book gives the example of Aboriginal Australians (whose painting shows social rank and family bonds) and the Maasai (who consider red sacred). What do these examples together show?", "zh": "书中举了澳大利亚原住民（其彩绘体现社会等级与家族纽带）和马赛族（视红色为神圣）的例子。这些例子共同说明了什么？"}, "options": [{"en": "Only African cultures practice body art.", "zh": "只有非洲文化才实践人体艺术。"}, {"en": "Different cultures use body art for their own unique reasons and meanings.", "zh": "不同文化出于各自独特的理由和含义来创作人体艺术。"}, {"en": "All cultures paint their bodies for the exact same reason. according to some versions of the story", "zh": "所有文化彩绘身体的理由都完全相同。（按书中另一种说法）"}, {"en": "Body art was invented by one single culture.", "zh": "人体艺术是由某一个文化发明的。"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The introduction says every culture has unique styles of decoration and unique reasons for doing it; the Aboriginal and Maasai examples illustrate this point.", "zh": "引言说每种文化都有独特的装饰风格和独特的理由；原住民与马赛族的例子正说明了这一点。"}}, {"q": {"en": "Among the Mursi tribe of Ethiopia, what does a larger lip plate signal about a girl's family?", "zh": "在埃塞俄比亚的穆尔西部落，更大的唇盘意味着女孩家庭怎样？"}, "options": [{"en": "That she is still a child under age 10. according to some versions of the story", "zh": "她还是个10岁以下的孩童。（按书中另一种说法）"}, {"en": "The more wealth in cattle her father will receive when she marries.", "zh": "她出嫁时父亲能收到越多作为财富的牛。"}, {"en": "That she is the oldest daughter.", "zh": "她是长女。"}, {"en": "That her family rejects body art.", "zh": "她的家庭排斥人体艺术。"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book explains that among the Mursi, a round clay disk is inserted into the lip and the larger the plate, the more wealth in cattle the girl's father will receive when she marries.", "zh": "书中解释穆尔西族女孩下唇插入圆形陶盘，盘子越大，出嫁时父亲收到的牛（财富）越多。"}}, {"q": {"en": "In this book, what does the word 'intricate' mean (used to describe mehndi designs)?", "zh": "在这本书中，'intricate'（用于描述海娜图案）一词是什么意思？"}, "options": [{"en": "Sacred.", "zh": "神圣的。"}, {"en": "Temporary. according to some versions of the story", "zh": "暂时的。（按书中另一种说法）"}, {"en": "Complicated.", "zh": "复杂的。"}, {"en": "Colorless.", "zh": "无色的。"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'intricate' as complicated.", "zh": "词汇表将 intricate 定义为 complicated（复杂的）。"}}, {"q": {"en": "What is the author's main purpose in writing this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"en": "To inform readers about the many forms of body art practiced around the world and why people create them.", "zh": "向读者介绍世界各地的人体艺术形式及其创作原因。"}, {"en": "To persuade readers to get a tattoo.", "zh": "劝说读者去纹身。"}, {"en": "To tell a fictional story about a Samoan warrior.", "zh": "讲述一个关于萨摩亚战士的虚构故事。"}, {"en": "To teach readers how to paint their faces for Halloween. according to some versions of the story in an early draft of the book", "zh": "教读者如何在万圣节化妆。（按书中另一种说法）（在书的早期草稿中）"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book surveys body painting, tattooing, piercing, and body shaping across many cultures and ends with safety advice, showing it is written to inform.", "zh": "全书介绍了人体彩绘、纹身、穿孔与塑形等多种跨文化形式，并附安全建议，表明其写作目的是说明介绍。"}}], "extended": {"prompt": {"en": "The book describes both painful, permanent practices (like footbinding and tattooing) and temporary, playful ones (like face painting). In your opinion, what is the difference between body art that is done to fit a culture's traditions and body art done just for fun? Give an example from the book.", "zh": "书中既描述了痛苦而永久的做法（如缠足、纹身），也有临时而有趣的做法（如面部彩绘）。你认为\"为符合文化传统而进行的人体艺术\"与\"只为好玩而进行的人体艺术\"区别在哪里？书中举一个例子说明。"}, "guidance": {"en": ["Review the 'Be Smart About Body Art' section on which kinds are temporary versus permanent and the risks of permanent body art.", "Compare an example such as Chinese footbinding (tradition) with Halloween face painting (fun) from the text."], "zh": ["回顾\"关于人体艺术要明智\"一节中对临时与永久形式的区分，以及永久人体艺术的风险。", "对比书中的例子，如中国缠足（传统）与万圣节面部彩绘（好玩）。"]}}};</script>
