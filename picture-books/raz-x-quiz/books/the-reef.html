<script>window.BOOK = {"slug": "the-reef", "title": "The Reef", "titleZh": "暗礁", "level": "X", "genre": "Fiction (Historical Journal)", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Who is the narrator of this journal, and on what ship does he serve?", "zh": "这篇航海日志的叙述者是谁？他服役于哪艘船？"}, "options": [{"en": "Will Reynolds, a crewman on HMS Endeavour captained by James Cook.", "zh": "威尔·雷诺兹，詹姆斯·库克船长率领的「努力号」上的一名水手。"}, {"en": "Joseph Banks, the expedition's naturalist.", "zh": "约瑟夫·班克斯，探险队的自然学家。"}, {"en": "Captain Cook, writing about his own voyage.", "zh": "库克船长，记录自己的航行。"}, {"en": "A native of Tahiti met by the crew.", "zh": "一名塔希提原住民，被船员遇见。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Will Reynolds is a fictional crewman on His Majesty's Ship The Endeavour, captained by James Cook, which set sail from Plymouth on August 25, 1768.", "zh": "威尔·雷诺兹是「英王陛下的努力号」上一名虚构的水手，该船由詹姆斯·库克船长指挥，于1768年8月25日从普利茅斯起航。"}}, {"q": {"en": "When the crew reached Tahiti in 1769, what scientific purpose did the Captain and scientists have there?", "zh": "1769年船员抵达塔希提时，船长和科学家在那里有何科学目的？"}, "options": [{"en": "To make observations of the planets that would help determine the distance of the Earth from the Sun.", "zh": "观测行星，以帮助测定地球与太阳之间的距离。"}, {"en": "To search for gold and precious stones.", "zh": "寻找黄金和宝石。"}, {"en": "To build a large fort for the French navy.", "zh": "为法国海军修建一座大堡垒。"}, {"en": "To train native warriors to fight.", "zh": "训练原住民战士作战。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "At Tahiti the Captain and scientists made observations of the planets, including ones meant to help determine the distance of the Earth from the Sun.", "zh": "在塔希提，船长和科学家观测行星，其中包括旨在帮助测定地球与太阳距离的观察。"}}, {"q": {"en": "On May 1, while exploring the land of New Holland (Australia), what unusual animal did the crew see?", "zh": "5月1日，在探索新荷兰（澳大利亚）大陆时，船员看到了什么不寻常的动物？"}, "options": [{"en": "An animal about as tall as a young man that looked like a rat standing on its hind legs, with a large tail for support.", "zh": "一种约如年轻人般高、像用后腿站立的老鼠、并用大尾巴支撑身体的动物。"}, {"en": "A flying fish that confirmed tropical waters.", "zh": "表明身处热带水域的飞鱼。"}, {"en": "A Portuguese man-of-war jelly creature.", "zh": "葡萄牙战舰水母。"}, {"en": "A group of at least eight porpoises.", "zh": "至少八只的海豚群。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "On May 1 the crew saw an animal 'about as tall as a young man, which looked like a rat that stood on its hind legs' with a large tail it used for support (a kangaroo-like creature).", "zh": "5月1日，船员看到一种「约如年轻人般高、像用后腿站立的老鼠」、用大尾巴支撑身体的动物（类似袋鼠的生物）。"}}, {"q": {"en": "What happened at midnight on June 10-11 that put the ship in danger?", "zh": "6月10日至11日的午夜发生了什么，使船只陷入险境？"}, "options": [{"en": "The ship ran aground and got stuck on a sharp coral reef.", "zh": "船只搁浅，卡在尖锐的珊瑚礁上。"}, {"en": "The ship was attacked by native warriors.", "zh": "船只遭到原住民战士攻击。"}, {"en": "A violent waterspout struck the mast.", "zh": "剧烈的龙卷水柱击中了桅杆。"}, {"en": "The ship caught fire in the hold.", "zh": "船只货舱起火。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "At midnight the Endeavour ran aground and became firmly stuck upon a coral reef, which was dangerous because the sharp coral could destroy the ship's hull.", "zh": "午夜时分，「努力号」搁浅并牢牢卡在珊瑚礁上，这很危险，因为尖锐的珊瑚会毁掉船体。"}}, {"q": {"en": "To lighten the damaged ship and try to free it, what did the crew throw overboard?", "zh": "为了减轻受损船只的重量并尝试使其脱困，船员把什么扔下了船？"}, "options": [{"en": "Their ballast, firewood, stores, water casks, all their water, and six cannons.", "zh": "压舱物、木柴、补给、水桶、全部饮用水，以及六门火炮。"}, {"en": "The lances they had collected from the natives.", "zh": "他们从原住民那里收集的长矛。"}, {"en": "Mr. Banks's plant samples and books.", "zh": "班克斯先生的植物标本和书籍。"}, {"en": "The ship's sails and masts.", "zh": "船帆和桅杆。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The Captain ordered the load lightened, so the crew threw overboard ballast, firewood, stores, water casks, all their water, and six cannons, and started the pumps.", "zh": "船长下令减轻负载，于是船员把压舱物、木柴、补给、水桶、全部饮用水和六门火炮抛入海中，并启动抽水机。"}}, {"q": {"en": "How did Captain Cook try to prevent scurvy among the crew during the long voyage?", "zh": "在漫长航程中，库克船长如何试图预防船员的坏血病？"}, "options": [{"en": "He required a daily diet of onions, salted cabbage, carrot marmalade, sauerkraut, and lemons, with punishment for those who refused.", "zh": "他要求每日食用洋葱、咸卷心菜、胡萝卜酱、酸菜和柠檬，拒绝者会受罚。"}, {"en": "He gave everyone a daily dose of rum.", "zh": "他每天给每人一份朗姆酒。"}, {"en": "He made the crew swim in the ocean daily.", "zh": "他让船员每天在海里游泳。"}, {"en": "He avoided stopping at any islands.", "zh": "他避免在任何岛屿停靠。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Cook insisted the men eat his regimen of onions, salted cabbage, carrot marmalade, sauerkraut, and lemons daily to stave off scurvy, and those who did not could be lashed; later a crewman with swollen gums was given lemon juice.", "zh": "库克坚持让船员每日食用洋葱、咸卷心菜、胡萝卜酱、酸菜和柠檬以防坏血病，拒绝者会被鞭打；后来一名牙龈肿胀的水手被给予柠檬汁。"}}, {"q": {"en": "After the ship was holed on the reef, what helped slow the water coming in and saved the vessel?", "zh": "船在礁石上被撞出洞后，是什么减缓了进水、挽救了船只？"}, "options": [{"en": "A piece of coral the size of a large rock had broken off and lodged in the hole, slowing the flow of water.", "zh": "一块如巨石般大的珊瑚断裂后卡在洞中，减缓了水流。"}, {"en": "A fish swam into the hole and plugged it.", "zh": "一条鱼游进洞里堵住了它。"}, {"en": "The Captain's sail was nailed over the hole.", "zh": "船长的船帆被钉在洞上。"}, {"en": "The anchor was dropped directly into the breach.", "zh": "船锚直接抛入破口。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "When the tide fell on June 22, they saw the hole was big, but 'by some stroke of luck a piece of coral the size of a large rock had broken off in the hole and slowed the water coming in.'", "zh": "6月22日退潮时，他们看到破口很大，但「幸运的是一块如巨石般大的珊瑚断裂卡在洞中，减缓了进水」。"}}, {"q": {"en": "In the text, 'The tide has ebbed (gone down)' is used as the ship sat stuck on the reef. What does 'ebbed' mean here?", "zh": "文中写到船只卡在礁石上时「潮水已退（ebbed，gone down）」。这里的 ebbed 是什么意思？"}, "options": [{"en": "Gone down or receded, as the tide lowered.", "zh": "退去、下降，指潮水低落。"}, {"en": "Risen to its highest point.", "zh": "升至最高点。"}, {"en": "Become rough and stormy.", "zh": "变得汹涌stormy。"}, {"en": "Turned bright red.", "zh": "变成鲜红色。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The book defines 'ebbed' in parentheses as 'gone down,' meaning the tide lowered while the ship was stuck on the reef.", "zh": "书中用括号将 ebbed 解释为「gone down（退去）」，即船只卡在礁石时潮水下降了。"}}, {"q": {"en": "What is the author's main purpose in writing this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"en": "To tell a story in the form of a sailor's journal about Captain Cook's voyage, blending history with adventure.", "zh": "以水手日志的形式讲述库克船长航行的故事，将历史与冒险融为一体。"}, {"en": "To give a step-by-step science guide for building a ship.", "zh": "提供一步步造船的科学指南。"}, {"en": "To argue that exploration should be stopped.", "zh": "主张应当停止探险。"}, {"en": "To teach readers how to speak Tahitian.", "zh": "教读者说塔希提语。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book is presented as three months of a fictional crew member's journal of Cook's real Endeavour voyage, using a narrative to bring the historical journey to life.", "zh": "本书以一名虚构船员关于库克真实「努力号」航行的三个月日志形式呈现，用叙事让这段历史航程生动起来。"}}, {"q": {"en": "After the ship was patched and freed from the reef, which route home did Captain Cook decide to take?", "zh": "船被修补并脱离礁石后，库克船长决定走哪条返航路线？"}, "options": [{"en": "Return by way of the Cape of Good Hope, hoping to find a port for more repairs.", "zh": "取道好望角返航，希望沿途找到港口进行更大规模的维修。"}, {"en": "Sail straight back to Plymouth without stopping.", "zh": "不停靠直接驶回普利茅斯。"}, {"en": "Return through Tahiti and Tierra del Fuego.", "zh": "经塔希提和火地岛返回。"}, {"en": "Head north to explore more of New Holland.", "zh": "继续向北探索更多新荷兰地区。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Once the hole could be patched, the Captain decided they would return by way of the Cape of Good Hope to find a port for more extensive repairs along the way.", "zh": "一旦破口可以修补，船长决定取道好望角返航，以便沿途找到港口进行更大规模的维修。"}}], "extended": {"prompt": {"en": "Will Reynolds writes letters to his daughter Chelsea because he is far from home and afraid he may never return. If you were a sailor on the Endeavour, what would you tell your family about the reef accident, and what part would worry you most?", "zh": "威尔·雷诺兹给女儿切尔西写信，因为他远离家乡，担心自己可能再也无法回去。如果你是「努力号」上的一名水手，你会如何向家人讲述这次暗礁事故？最让你担忧的是哪部分？"}, "guidance": {"en": ["Review the midnight grounding on the coral reef and how the crew lightened the ship and worked the pumps in 15-minute shifts.", "Think about the crewman's clever fix using a sail pasted with rope fiber, wool, and tar, and the coral that luckily plugged the hole."], "zh": ["回顾午夜在珊瑚礁上的搁浅，以及船员如何减轻船重、以15分钟轮班操作抽水机。", "思考那名水手用涂满绳纤维、羊毛和焦油的船帆想出的巧法，以及幸运卡住破口的珊瑚。"]}}};</script>
