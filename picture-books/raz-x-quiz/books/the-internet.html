y Tim Berners-Lee alone.", "zh": "20世纪90年代，由蒂姆·伯纳斯-李独自发明。"}, {"en": "In the 1800s with the first telephone.", "zh": "19世纪随第一部电话出现。"}, {"en": "In 2004 with online shopping.", "zh": "2004年随网络购物出现。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says most people think it began in the 1960s when the U.S. Department of Defense created ARPAnet, which linked four computers.", "zh": "书中说多数人认为它始于20世纪60年代，当时美国国防部创建了连接四台电脑的 ARPAnet。"}}, {"q": {"en": "Who wrote the common language that let different computer networks 'talk' to each other?", "zh": "是谁编写了让不同计算机网络能够相互'对话'的通用语言？"}, "options": [{"en": "Tim Berners-Lee, in the 1990s.", "zh": "蒂姆·伯纳斯-李，在20世纪90年代。"}, {"en": "Thomas Edison.", "zh": "托马斯·爱迪生。"}, {"en": "George Washington.", "zh": "乔治·华盛顿。"}, {"en": "A group of university students in the 1980s.", "zh": "20世纪80年代的一群大学生。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "In the 1990s, physicist Tim Berners-Lee solved the problem by writing a common language that let computers in various networks talk to each other.", "zh": "20世纪90年代，物理学家蒂姆·伯纳斯-李编写了通用语言，解决了不同网络间电脑相互通信的问题。"}}, {"q": {"en": "In this book, what is a 'byte'?", "zh": "在这本书中，'byte'（字节）是什么？"}, "options": [{"en": "A whole webpage.", "zh": "一整个网页。"}, {"en": "A type of computer cable.", "zh": "一种电脑电缆。"}, {"en": "A unit of information equal to one letter of the alphabet or one number, like the letter A.", "zh": "等于一个字母或一个数字的信息单位，例如字母 A。"}, {"en": "A kind of search engine.", "zh": "一种搜索引擎。"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "The glossary defines a byte as 'a unit of information that can be stored on a computer and is equal to one letter of the alphabet or one number.'", "zh": "词汇表将 byte 定义为'可储存在电脑中的信息单位，等于一个字母或一个数字'。"}}, {"q": {"en": "What is the author's main purpose in writing this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"en": "To inform readers how the Internet works, how it began, and how it is used.", "zh": "向读者说明互联网如何运作、如何起源，以及如何使用。"}, {"en": "To persuade readers to buy a certain computer brand.", "zh": "劝说读者购买某个品牌的电脑。"}, {"en": "To tell a fictional adventure story.", "zh": "讲述一个虚构的冒险故事。"}, {"en": "To teach readers how to write computer code.", "zh": "教读者如何编写电脑代码。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book explains what the Internet is, how information is sent, how it works, how it began, and how it is used—clearly informational.", "zh": "全书解释了互联网是什么、信息如何发送、如何运作、如何起源以及如何被使用——明显属于知识说明类。"}}, {"q": {"en": "What is 'bandwidth' and why does it matter?", "zh": "什么是'带宽'，它为什么重要？"}, "options": [{"en": "The physical length of a cable.", "zh": "电缆的物理长度。"}, {"en": "The maximum amount of information that can move on a cable; more bandwidth means more information can travel.", "zh": "电缆可传输的最大信息量；带宽越大，能传输的信息越多。"}, {"en": "The number of computers in the world.", "zh": "世界上的电脑数量。"}, {"en": "The color of the wires.", "zh": "电线的颜色。"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The glossary defines bandwidth as the maximum amount of information that can move on an Internet cable; greater bandwidth lets more information flow.", "zh": "词汇表将带宽定义为电缆上可传输的最大信息量；带宽越大，能传输的信息就越多。"}}], "extended": {"prompt": {"en": "The book compares bandwidth to lanes on a highway. If sound, pictures, and video need more bandwidth than text, how might life change for people who only have a small 'one-lane' connection versus those with a huge 'many-lane' one?", "zh": "书中把带宽比作高速公路上的车道。如果声音、图片和视频比文字需要更多带宽，那么只有'单车道'连接的人与拥有'多车道'的人，生活会有什么不同？"}, "guidance": {"en": ["Think about the file-size chart: text is 2k, a picture 500k, music 2,500k, and video 8,500k.", "Consider how loading a video or a video call would feel on a small versus a large bandwidth."], "zh": ["想想文件大小对比图：文字2k、图片500k、音乐2500k、视频8500k。", "考虑在小带宽与大带宽下加载视频或进行视频通话会有怎样的感受。"]}}};</script>
