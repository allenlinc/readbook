uding Washington and Oregon.", "zh": "太平洋西北部，包括华盛顿和俄勒冈。"}, {"en": "The state of Florida.", "zh": "佛罗里达州。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says the Dust Bowl 'affected the southern region of the Great Plains of the United States, covering large parts of Texas, Kansas, Colorado, and Oklahoma.'", "zh": "书中说沙尘暴'影响了美国大平原的南部地区，覆盖了得克萨斯、堪萨斯、科罗拉多和俄克拉荷马的大片区域'。"}}, {"q": {"en": "What was 'Black Sunday,' and how fast did its dust wall move?", "zh": "'黑色星期日'是什么？它的沙尘墙移动速度有多快？"}, "options": [{"en": "April 14, 1935, when a gigantic wall of dust rushed across the plains at 60 miles (96.5 km) per hour.", "zh": "1935年4月14日，一道巨大的沙尘墙以每小时60英里（96.5公里）的速度席卷平原。"}, {"en": "A rainy day in 1929 that ended the drought.", "zh": "1929年结束干旱的一个雨天。"}, {"en": "The day the stock market crashed in 1929.", "zh": "1929年股市崩盘的那一天。"}, {"en": "The first day farmers planted wheat in 1930.", "zh": "1930年农民首次播种小麦的那天。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says, 'Perhaps the worst day of all during the Dust Bowl occurred on Black Sunday—April 14, 1935,' when a wall of dirt 'rushed across the rolling plains at 60 miles (96.5 km) per hour.'", "zh": "书中说：'沙尘暴期间也许最糟糕的一天是黑色星期日——1935年4月14日'，一道尘墙'以每小时60英里（96.5公里）的速度席卷起伏的平原'。"}}, {"q": {"en": "By the end of the 1930s, how many people had left the Plains states, and how many ended up in California?", "zh": "到1930年代末，有多少人离开了大平原各州？其中多少人最终到了加利福尼亚？"}, "options": [{"en": "2.5 million people left the Plains states, and 200,000 of them ended up in California.", "zh": "250万人离开了大平原各州，其中20万人最终到了加利福尼亚。"}, {"en": "100,000 people left, and 50,000 went to Texas.", "zh": "10万人离开，5万人去了得克萨斯。"}, {"en": "5 million people left, and 1 million went to New York.", "zh": "500万人离开，100万人去了纽约。"}, {"en": "No one left; everyone stayed.", "zh": "没有人离开；所有人都留下了。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "A 'Do You Know?' note says, 'By the end of the 1930s, 2.5 million people had left the Plains states. Two hundred thousand of them ended up in California.'", "zh": "一处'你知道吗？'注释说：'到1930年代末，250万人离开了大平原各州。其中20万人最终到了加利福尼亚。'"}}, {"q": {"en": "According to the book, why did wheat prices drop after farmers plowed up the grasslands?", "zh": "根据本书，农民开垦草原后，小麦价格为何下降？"}, "options": [{"en": "Plowing up so much grassland produced too much wheat, so prices began to drop and storage bins overflowed.", "zh": "开垦大量草原生产出过多小麦，于是价格开始下跌，粮仓也装不下了。"}, {"en": "A new law made wheat illegal to sell.", "zh": "一项新法律禁止出售小麦。"}, {"en": "Farmers stopped growing wheat entirely.", "zh": "农民完全停止种植小麦。"}, {"en": "The price of wheat went up, not down.", "zh": "小麦价格涨了，而不是跌了。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book explains two problems from plowing: it 'made so much wheat available that wheat prices began to drop,' and during drought the bare fields blew into dust.", "zh": "书中解释了开垦带来的两个问题：它'使小麦供应过多，价格开始下跌'，而在干旱期间，光秃的田地又被风吹成了沙尘。"}}, {"q": {"en": "How far did the dust storms reach, according to the book?", "zh": "根据本书，沙尘暴波及了多远？"}, "options": [{"en": "Winds carried dust eastward to Chicago, Atlanta, and New York, and even over the Atlantic Ocean onto ships.", "zh": "风把沙尘吹向东到达芝加哥、亚特兰大和纽约，甚至越过大西洋落到海上的船只上。"}, {"en": "The dust stayed only within Texas.", "zh": "沙尘只停留在得克萨斯州内。"}, {"en": "The dust reached only the next town over.", "zh": "沙尘只到达了邻近的城镇。"}, {"en": "The dust blew only as far as the Mississippi River.", "zh": "沙尘只吹到密西西比河。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says, 'Conditions got so bad that winds carried the dust eastward to fall across cities such as Chicago, Atlanta, and New York. Dust even blew over the Atlantic Ocean and fell upon decks of ships at sea.'", "zh": "书中说：'情况糟糕到风把沙尘向东吹落，覆盖芝加哥、亚特兰大和纽约等城市。沙尘甚至越过大西洋，落在海上船只的甲板上。'"}}, {"q": {"en": "In this book's glossary, what does the word 'erosion' mean?", "zh": "在本书词汇表中，'erosion' 一词是什么意思？"}, "options": [{"en": "The gradual wear on land s
