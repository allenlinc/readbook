<script>window.BOOK = {"slug": "saladin", "title": "Saladin", "titleZh": "萨拉丁", "level": "X", "genre": "Biography / World Leaders", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "What does Saladin's Muslim name, Salah al-Din, mean?", "zh": "萨拉丁的穆斯林名字'Salah al-Din'是什么意思？"}, "options": [{"en": "\"Builder of cities.\"", "zh": "“城市建设者。”"}, {"en": "\"He who honors the faith.\"", "zh": "“维护信仰之人。”"}, {"en": "\"Friend of the Christians.\" according to some versions of the story", "zh": "“基督徒之友。”（按书中另一种说法）"}, {"en": "\"King of the desert.\"", "zh": "“沙漠之王。”"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says, 'Saladin's Muslim name is Salah al-Din, which means \"he who honors the faith.\"'", "zh": "书中说：'萨拉丁的穆斯林名字是 Salah al-Din，意思是“维护信仰之人”。'"}}, {"q": {"en": "Where and when was Saladin born?", "zh": "萨拉丁出生在哪里、什么时候？"}, "options": [{"en": "In Cairo, Egypt, in 1169. according to some versions of the story", "zh": "1169年，生于埃及开罗。（按书中另一种说法）"}, {"en": "In Jerusalem, in 1099.", "zh": "1099年，生于耶路撒冷。"}, {"en": "In Tikrit, Mesopotamia, in 1137 or 1138.", "zh": "1137或1138年，生于美索不达米亚的提克里特。"}, {"en": "In Damascus, in 1193.", "zh": "1193年，生于大马士革。"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "The book states Saladin 'was born in 1137 or 1138 to a Muslim family in Tikrit, Mesopotamia.'", "zh": "书中说萨拉丁'1137或1138年生于美索不达米亚提克里特的一个穆斯林家庭'。"}}, {"q": {"en": "In 1187, which important battle did Saladin win before taking back Jerusalem?", "zh": "1187年，在夺回耶路撒冷之前，萨拉丁赢得了哪场重要战役？"}, "options": [{"en": "The Battle of Hattin, fought at the Horns of Hattin.", "zh": "哈丁之战，发生在哈丁双角山一带。"}, {"en": "The Battle of Acre.", "zh": "阿卡之战。"}, {"en": "The Battle of Tyre.", "zh": "提尔之战。"}, {"en": "The Battle of the Nile. according to some versions of the story", "zh": "尼罗河之战。（按书中另一种说法）"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Saladin's army 'defeated them badly' at the Horns of Hattin in 1187, then took Jerusalem on October 2, 1187.", "zh": "1187年萨拉丁的军队在哈丁双角山大败敌军，随后于1187年10月2日攻占耶路撒冷。"}}, {"q": {"en": "Who led the European Third Crusade against Saladin?", "zh": "谁领导了针对萨拉丁的第三次十字军东征？"}, "options": [{"en": "King Guy of Lusignan. according to some versions of the story", "zh": "吕西尼昂的居伊国王。（按书中另一种说法）"}, {"en": "Raynald of Châtillon.", "zh": "沙蒂永的雷纳尔德。"}, {"en": "Pope Urban II.", "zh": "乌尔班二世教皇。"}, {"en": "King Richard I of England, also called Richard the Lionheart.", "zh": "英格兰国王理查一世，即'狮心王'理查。"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "European leaders called for a Third Crusade and 'King Richard I of England (Richard the Lionheart) was one of the European kings who raised armies.'", "zh": "欧洲各国君主发起第三次十字军东征，'英格兰国王理查一世（狮心王理查）是起兵的欧洲国王之一'。"}}, {"q": {"en": "How did Saladin treat Jerusalem and its people when he took the city in 1187?", "zh": "1187年萨拉丁攻占耶路撒冷时，是如何对待这座城及其民众的？"}, "options": [{"en": "Unlike the Christian takeover in 1099, his takeover was not cruel or vengeful, and few people were killed.", "zh": "与1099年基督徒的占领不同，他的占领并不残暴也不报复，几乎无人被杀。"}, {"en": "He forced all Christians to leave the city forever.", "zh": "他强迫所有基督徒永远离开城市。"}, {"en": "He destroyed all Christian holy places.", "zh": "他摧毁了所有基督教圣地。"}, {"en": "He killed thousands of residents like the Franks had in 1099. according to some versions of the story in an early draft of the book", "zh": "他像1099年法兰克人那样杀了数千居民。（按书中另一种说法）（在书的早期草稿中）"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book contrasts the two takeovers: 'Saladin's takeover was not cruel or vengeful. No Christian holy places were destroyed, and ... few people were killed.'", "zh": "书中对比了两次占领：'萨拉丁的占领并不残暴也不报复。没有基督教圣地被毁，而且……几乎无人丧生。'"}}, {"q": {"en": "When and at what age did Saladin die?", "zh": "萨拉丁何时去世、享年多少？"}, "options": [{"en": "In 1250, at age seventy.", "zh": "1250年，享年70岁。"}, {"en": "On March 4, 1193, at age fifty-five.", "zh": "1193年3月4日，享年55岁。"}, {"en": "In 1213, at age ninety-one. according to some versions of the story", "zh": "1213年，享年91岁。（按书中另一种说法）"}, {"en": "In 1187, at age forty.", "zh": "1187年，享年40岁。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says he 'died only six months later, on March 4, 1193, at age fifty-five.'", "zh": "书中说他在停战约六个月后，'于1193年3月4日去世，享年55岁'。"}}, {"q": {"en": "According to the 1192 truce, what was allowed regarding Jerusalem and the holy places?", "zh": "根据1192年的停战协定，关于耶路撒冷和圣地是如何规定的？"}, "options": [{"en": "The land including Jerusalem stayed Muslim, but Christians were allowed to visit the holy places.", "zh": "包括耶路撒冷在内的土地仍属穆斯林，但基督徒被允许前往圣地朝拜。"}, {"en": "Jerusalem was given back completely to Christian control. according to some versions of the story in an early draft of the book", "zh": "耶路撒冷完全交还基督教控制。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "All holy places were destroyed.", "zh": "所有圣地都被摧毁。"}, {"en": "Christians were banned from ever entering the city.", "zh": "基督徒被永远禁止进入该城。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The truce let the Franks keep the coast between Tyre and Jaffa; 'the rest of the land, including Jerusalem, would be Muslim land, but Christians would be allowed to visit holy places.'", "zh": "停战让法兰克人保留提尔到雅法之间的海岸；'包括耶路撒冷在内的其余土地归穆斯林，但基督徒可前往圣地朝拜'。"}}, {"q": {"en": "What famous words did Saladin say about how he became great?", "zh": "萨拉丁关于自己何以伟大，说过哪句有名的话？"}, "options": [{"en": "\"Might makes right.\"", "zh": "“强权即公理。”"}, {"en": "\"Fear keeps the peace.\" according to some versions of the story in an early draft of the book", "zh": "“恐惧维持和平。”（按书中另一种说法）（在书的早期草稿中）"}, {"en": "\"Gold buys loyalty.\"", "zh": "“黄金买来忠诚。”"}, {"en": "\"I have become as great as I am because I have won men's hearts by gentleness and kindness.\"", "zh": "“我能有今天的成就，是因为我用温柔与善意赢得了人心。”"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "Just before dying he told his oldest son that line about winning men's hearts 'by gentleness and kindness.'", "zh": "临终前他对长子说了那句关于用'温柔与善意'赢得人心的话。"}}, {"q": {"en": "In this book, what is a 'crusade'?", "zh": "在这本书中，'crusade'（十字军东征）指什么？"}, "options": [{"en": "A trade route across the desert. according to some versions of the story in an early draft of the book", "zh": "穿越沙漠的贸易路线。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "A festival held in Jerusalem.", "zh": "在耶路撒冷举行的节日。"}, {"en": "Wars ordered by Popes calling Western European Christians to fight in the Middle East.", "zh": "由教皇下令、号召西欧基督徒去中东作战的战争。"}, {"en": "A type of Muslim prayer.", "zh": "一种穆斯林的祈祷。"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "The book's section on the Crusades says they 'were ordered by Popes who called for Western European Christians to fight in the Middle East.'", "zh": "书中'十字军东征'一节说，它们是'由教皇下令、号召西欧基督徒去中东作战'的战争。"}}, {"q": {"en": "What is the author's main purpose in writing this book about Saladin?", "zh": "作者写这本关于萨拉丁的书，主要目的是什么？"}, "options": [{"en": "To teach readers how to ride a horse.", "zh": "教读者骑马。"}, {"en": "To inform readers about a respected leader who was both fierce in battle and merciful to his enemies.", "zh": "向读者介绍一位既勇猛又对敌人仁慈、受人敬重的领袖。"}, {"en": "To tell a fictional fairy tale.", "zh": "讲一个虚构童话。"}, {"en": "To argue that war is always the best solution. according to some versions of the story in an early draft of the book", "zh": "论证战争总是最好的解决办法。（按书中另一种说法）（在书的早期草稿中）"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book describes Saladin as 'a leader who, while fierce in battle, also showed mercy,' respected by both Muslims and his Crusader enemies.", "zh": "本书把萨拉丁描述为'战场上勇猛、却也对敌人仁慈'、被穆斯林和十字军敌人共同敬重的领袖。"}}], "extended": {"prompt": {"en": "Saladin was respected by both Muslims and his Christian enemies. What qualities made him an 'honorable leader' — his mercy, his generosity, or his military skill — and which do you think mattered most?", "zh": "萨拉丁同时受到穆斯林和基督教敌人的敬重。哪些品质让他成为'可敬的领袖'——仁慈、慷慨，还是军事才能？你认为哪一点最重要？"}, "guidance": {"en": ["Recall that his men 'never looted or burned villages' and he spared King Guy's life after capture.", "Think about his quote: he won men's hearts 'by gentleness and kindness.'"], "zh": ["回想他的士兵'从不劫掠或烧毁村庄'，且他在俘获居伊国王后饶其性命。", "想想他的那句话：他用'温柔与善意'赢得了人心。"]}}};</script>
