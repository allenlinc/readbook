er. according to some versions of the story", "zh": "它们永久终结了亚洲与欧洲之间的贸易。（按书中另一种说法）"}, {"en": "They created a world more open to trading new materials and ideas and spread Greek ways.", "zh": "创造了一个更愿意交流新材料与新思想、并传播希腊文化的世界。"}, {"en": "They had no effect after his death.", "zh": "他死后毫无影响。"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The Legacy section says Alexander opened the eyes of people he met to Greek ways and created a world more open to trading new materials and new ideas.", "zh": "\"遗产\"一节说亚历山大让所遇之人对希腊文化大开眼界，并创造一个更愿意交流新材料与新思想的世界。"}}, {"q": {"en": "In this book, what is a 'phalanx'?", "zh": "在这本书中，'phalanx'（方阵）是什么？"}, "options": [{"en": "A tight formation of foot soldiers (about 16 rows) that followed the cavalry.", "zh": "一种紧随骑兵、紧密排列的步兵阵型（约16排）。"}, {"en": "A peaceful meeting between kings.", "zh": "国王之间的和平会晤。"}, {"en": "A type of warship used by the Persians. according to some versions of the story in an early draft of the book", "zh": "波斯人使用的一种战船。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "The name of Alexander's horse.", "zh": "亚历山大坐骑的名字。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The book describes the phalanx as a strong formation of foot soldiers in tight groups (about 16 rows) that followed the cavalry and crushed enemy soldiers.", "zh": "书中把方阵描述为一种紧随骑兵、紧密列队的步兵阵型（约16排），用于击溃敌军。"}}, {"q": {"en": "What is the author's main purpose in writing this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"en": "To tell a made-up fantasy story.", "zh": "讲述一个虚构的奇幻故事。"}, {"en": "To teach readers how to ride horses.", "zh": "教读者骑马。"}, {"en": "To inform readers about Alexander the Great's life, leadership, and lasting impact.", "zh": "向读者介绍亚历山大大帝的生平、领导力与持久影响。"}, {"en": "To convince readers that war is always good. according to some versions of the story in an early draft of the book", "zh": "劝说读者战争总是好事。（按书中另一种说法）（在书的早期草稿中）"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book is a biography following Alexander from birth through his conquests to his death and legacy, written to inform.", "zh": "全书按传记结构，从亚历山大出生、征战到去世与遗产，写作目的是说明介绍。"}}], "extended": {"prompt": {"en": "The book calls Alexander both \"one of the strongest leaders the world has ever known\" and \"brutal,\" noting close to 750,000 people were killed under his rule. Do you think a leader can be both great and cruel? Use details from the book to support your view.", "zh": "书中称亚历山大既是\"世界史上最强有力的领袖之一\"，又\"残暴\"，并指出在其统治下约有75万人丧生。你认为一位领袖能否既伟大又残酷？用书中的细节支持你的观点。"}, "guidance": {"en": ["Review how Alexander gained submission of Greek city-states by killing rebels and selling others into slavery.", "Consider the Legacy section's point that he explored customs and opened the world to new ideas, not just control."], "zh": ["回顾亚历山大如何以处死反叛者、将他人卖为奴隶来迫使希腊城邦臣服。", "结合\"遗产\"一节：他不仅征服，还探索习俗、让世界向新思想敞开。"]}}};</script>
