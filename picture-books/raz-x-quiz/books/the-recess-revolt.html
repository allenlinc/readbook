<script>window.BOOK = {"slug": "the-recess-revolt", "title": "The Recess Revolt", "titleZh": "课间抗议", "level": "X", "genre": "Fiction", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "What had Elias been most looking forward to doing with Ada during recess this year?", "zh": "伊莱亚斯今年最期待在课间和艾达一起做什么？"}, "options": [{"en": "Playing soccer on the school field.", "zh": "在学校球场上踢足球。"}, {"en": "Helping Ms. Fremont coach a team. according to some versions of the story", "zh": "帮弗伦蒙特老师带一支队伍。（按书中另一种说法）"}, {"en": "Running for class president.", "zh": "竞选班长。"}, {"en": "A chess rematch with Ada after traveling all summer.", "zh": "在暑假旅行之后和艾达再来一场国际象棋复赛。"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The book says Elias had 'especially been looking forward to a chess rematch with Ada during recess after traveling all summer long.'", "zh": "书中说伊莱亚斯'尤其期待暑假旅行之后在课间和艾达再来一场国际象棋复赛'。"}}, {"q": {"en": "What new recess policy upset Elias and Ada?", "zh": "哪项新的课间规定让伊莱亚斯和艾达感到不满？"}, "options": [{"en": "Only the fastest runners could go outside.", "zh": "只有跑得最快的学生才能去户外。"}, {"en": "Chess was made the only allowed game.", "zh": "国际象棋成了唯一被允许的游戏。"}, {"en": "Students had to do predetermined, teacher-run activities instead of freely choosing what to do.", "zh": "学生必须参加老师事先安排好的活动，而不能自由地选择想做的事。"}, {"en": "Recess was cancelled completely for fifth graders. according to some versions of the story in an early draft of the book", "zh": "五年级学生的课间活动被完全取消。（按书中另一种说法）（在书的早期草稿中）"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "The new rules said students 'had to participate in a predetermined set of activities run by the teachers' rather than freely choosing.", "zh": "新规定要求学生'必须参加由老师安排好的一组活动'，而不是自由地选择。"}}, {"q": {"en": "What peaceful tactic from the civil rights movement did Elias use on the soccer field?", "zh": "伊莱亚斯在足球场上用了民权运动中的哪种和平策略？"}, "options": [{"en": "A boycott of all school food.", "zh": "抵制学校所有食物。"}, {"en": "A hunger strike in the cafeteria." n": "The restaurants gave them free food forever.", "zh": "餐馆永远免费提供食物给他们。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Mr. Sterling said the restaurants 'lost income' and 'public opinion began to swing in the protesters' favor,' causing segregation to fall apart.", "zh": "斯特林老师说餐馆'损失了收入'，而且'公众舆论开始转向支持抗议者'，从而使种族隔离逐渐瓦解。"}}, {"q": {"en": "How many student signatures did Principal Ms. King require before she would consider changing the recess rules?", "zh": "金校长要求收集多少名学生的签名，才会考虑改变课间规则？"}, "options": [{"en": "More than 200 signatures out of the school's about 400 students.", "zh": "在学校约400名学生中争取到200多个签名。"}, {"en": "All 400 students had to sign. according to some versions of the story", "zh": "必须400名学生全部签名。（按书中另一种说法）"}, {"en": "Exactly 50 signatures.", "zh": "正好50个签名。"}, {"en": "No signatures, just a letter.", "zh": "不需要签名，只要一封信。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Ms. King said the school had 'about four hundred students' and 'if you can get more than two hundred signatures, I'll work with you.'", "zh": "金校长说学校'大约有四百名学生'，并说'如果你们能征集到两百多个签名，我就会和你们一起'考虑。"}}, {"q": {"en": "What problem forced the school to turn recess into organized sports?", "zh": "是什么问题迫使学校把课间变成了有组织的体育运动？"}, "options": [{"en": "The principal wanted to train a soccer team.", "zh": "校长想训练一支足球队。"}, {"en": "Severe budget cuts ended P.E., art, and music, but a law required 30 minutes of daily physical activity for elementary students.", "zh": "严重的预算削减取消了体育、美术和音乐课，但法律规定小学生每天必须有30分钟体育活动。"}, {"en": "Parents demanded more homework time.", "zh": "家长要求更多的作业时间。"}, {"en": "Too many students were getting injured at free play. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "太多学生在自由活动时受伤。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Ms. King explained 'severe budget cuts' cut P.E., art, and music, and 'the law says elementary students must get thirty minutes of physical activity every day.'", "zh": "金校长解释说'严重的预算削减'取消了体育、美术和音乐课，而且'法律规定小学生每天必须有30分钟体育活动'。"}}, {"q": {"en": "In this book, what does the glossary say 'petition' means?", "zh": "在这本书中，词汇表对'petition'（请愿书）的解释是什么？"}, "options": [{"en": "A formal written request, usually signed by many supporters.", "zh": "一份正式的书面请求，通常由许多支持者签名。"}, {"en": "A computer program for raising money.", "zh": "一个用来筹款的电脑程序。"}, {"en": "A type of soccer game.", "zh": "一种足球比赛。"}, {"en": "A peaceful protest that involves sitting down. according to some versions of the story", "zh": "一种涉及坐下的和平抗议。（按书中另一种说法）"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'petition' as 'a formal written request, usually signed by many supporters (p. 11).'", "zh": "词汇表把 petition 定义为'一份正式的书面请求，通常由许多支持者签名（第11页）'。"}}, {"q": {"en": "How did Elias and Ada finally raise the money to bring P.E. back?", "zh": "伊莱亚斯和艾达最终是如何筹到钱让体育课恢复的？"}, "options": [{"en": "By charging students to enter the soccer field. according to some versions of the story", "zh": "向学生收取进入足球场费用。（按书中另一种说法）"}, {"en": "By selling their chess sets.", "zh": "卖掉他们的国际象棋套装。"}, {"en": "By holding a single bake sale at school.", "zh": "在学校里办一次烘焙义卖。"}, {"en": "By setting up an online fund-raising campaign using a money-raising app.", "zh": "通过使用一个筹款应用，在网上发起募捐活动。"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "Elias found 'an app you can use to raise money for a cause online' and, with Ms. King, posted a fund-raiser that was shared widely.", "zh": "伊莱亚斯发现'一个可以在网上为某项事业筹款的应用'，并与金校长一起发布了被广泛转发的募捐活动。"}}, {"q": {"en": "What is the author's main purpose in writing this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"en": "To give a history of the Internet.", "zh": "讲述互联网的历史。"}, {"en": "To show how students can use peaceful, nonviolent protest to bring about change at school.", "zh": "展示学生如何运用和平、非暴力的抗议方式在学校里促成改变。"}, {"en": "To explain the rules of professional soccer. according to some versions of the story in an early draft of the book", "zh": "解释职业足球的比赛规则。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "To teach readers how to play chess.", "zh": "教读者如何下国际象棋。"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The story uses a fictional recess conflict to model the civil rights tactic of nonviolent civil disobedience and show students solving a problem peacefully.", "zh": "故事用一个虚构的课间冲突，来示范民权运动中的非暴力公民抗命策略，并展示学生如何和平地解决问题。"}}], "extended": {"prompt": {"en": "Elias and Ada's sit-in worked because many other students were also unhappy with the new recess policy. Think of a rule at your own school or community that you think is unfair. What peaceful, nonviolent tactic (a sit-in, a petition, or a boycott) might you use to try to change it, and why would that tactic fit the situation?", "zh": "伊莱亚斯和艾达的静坐之所以成功，是因为许多其他同学也不满新的课间规定。想一个你觉得学校或社区里不公平的规矩。你会用哪种和平、非暴力的策略（静坐、请愿或抵制）去尝试改变它？为什么这种策略适合那种情况？"}, "guidance": {"en": ["Look back at how Elias learned the sit-in idea from the civil rights lesson and then got others to join.", "Consider what Ms. King required (a clear written position plus broad student support) before she would act."], "zh": ["回顾伊莱亚斯如何从民权课上学到静坐的点子，并让其他同学加入。", "想想金校长提出的要求（一份清晰的书面立场加上广泛的同学支持）才愿意采取行动。"]}}};</script>
