.", "zh": "书中描写曼尼夹起一根玉米，涂上黄油、蛋黄酱、帕尔马干酪和辣椒粉，做成烤玉米。"}}, {"q": {"en": "Who teaches Takehito how to dance the tango?", "zh": "谁教塔基托跳探戈？"}, "options": [{"en": "Manny himself.", "zh": "曼尼本人。"}, {"en": "Mrs. Klein.", "zh": "克莱恩太太。"}, {"en": "Brent, the most popular boy in class. according to some versions of the story", "zh": "布伦特，班上最受欢迎的男生。（按书中另一种说法）"}, {"en": "Melinda, Manny's daughter, who is in eighth grade.", "zh": "曼尼的女儿梅琳达，她念八年级。"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "Manny says, 'This past year, I had him teach my daughter the tango. She could teach you for your show,' and Melinda is described as Manny's eighth-grade daughter.", "zh": "曼尼说：'今年我让我弟弟教了我女儿探戈，她可以教你表演。'梅琳达被描述为曼尼念八年级的女儿。"}}, {"q": {"en": "On what day was the school talent show held?", "zh": "学校的才艺表演是在星期几举行的？"}, "options": [{"en": "On Friday.", "zh": "星期五。"}, {"en": "On Sunday.", "zh": "星期日。"}, {"en": "On Monday.", "zh": "星期一。"}, {"en": "On Wednesday.", "zh": "星期三。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Takehito tells Manny, 'I want to do something for the talent show this Friday, but I don't know what to do.'", "zh": "塔基托对曼尼说：'我想在这个星期五的才艺表演上做点什么，但不知道做什么。'"}}, {"q": {"en": "According to the book, where and when did the tango begin?", "zh": "根据这本书，探戈是在哪里、什么时候起源的？"}, "options": [{"en": "In Buenos Aires in the late 1800s, when European and African immigrants danced with the locals.", "zh": "19世纪末的布宜诺斯艾利斯，当时欧洲和非洲移民与当地人一起跳舞。"}, {"en": "In Japan about a hundred years ago. according to some versions of the story in an early draft of the book", "zh": "约一百年前的日本。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "In Chicago just last year.", "zh": "就在去年的芝加哥。"}, {"en": "In Mexico in the 1900s.", "zh": "20世纪的墨西哥。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Melinda says, 'in the late 1800s, European and African immigrants danced with the locals in Buenos Aires... the tango was born.'", "zh": "梅琳达说：'19世纪末，欧洲和非洲移民在布宜诺斯艾利斯与当地人共舞……探戈由此诞生。'"}}, {"q": {"en": "How did the tango come to be, as Melinda explains it?", "zh": "正如梅琳达所解释的，探戈是如何形成的？"}, "options": [{"en": "It came from one old Japanese tradition.", "zh": "它源于日本的一项古老传统。"}, {"en": "It was a hodgepodge of movements created by people from many cultures—African, Indian, French, Spanish, and Italian.", "zh": "它是许多文化（非洲、印度、法国、西班牙、意大利）的人共同创造的混合舞步。"}, {"en": "It was invented by a single famous dancer. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "它是由某一位著名舞者发明的。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "Manny created it for his elote cart.", "zh": "曼尼为他的玉米摊创造了它。"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Melinda says people from African, Indian, French, Spanish, and Italian cultures created it, and 'the result was a hodgepodge of movements, and the tango was born.'", "zh": "梅琳达说非洲、印度、法国、西班牙和意大利文化的人共同创造了它，'结果是一堆混杂的舞步，探戈便诞生了。'"}}, {"q": {"en": "In the glossary, what does the word 'deliberate' mean?", "zh": "在词汇表中，'deliberate'（deliberate）一词是什么意思？"}, "options": [{"en": "Slow or careful movement or action.", "zh": "缓慢或小心的动作。"}, {"en": "Loud and noisy.", "zh": "喧闹的。"}, {"en": "Fast and clumsy. according to some versions of the story", "zh": "快速而笨拙。（按书中另一种说法）"}, {"en": "A type of dance.", "zh": "一种舞蹈。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'deliberate' as 'slow or careful movement or action.'", "zh": "词汇表把 deliberate 定义为'缓慢或小心的动作'。"}}, {"q": {"en": "What is the author's main purpose in writing this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"en": "To explain how to become a teacher.", "zh": "讲解如何成为一名老师。"}, {"en": "To entertain readers with a story about a shy boy who learns the tango to make friends.", "zh": "用一个腼腆男孩学跳探戈交朋友的故事来娱乐读者。"}, {"en": "To teach readers how to cook elotes.", "zh": "教读者如何制作烤玉米。"}, {"en": "To give facts about the history of trains. according to some versions of the story in an early draft of the book", "zh": "介绍火车的历史知识。（按书中另一种说法）（在书的早期草稿中）"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book is a fictional story following Takehito's journey from daydreaming and shyness to performing the tango, meant to entertain.", "zh": "这是一篇虚构故事，讲述塔基托从做白日梦、害羞到登台跳探戈的过程，目的是娱乐读者。"}}, {"q": {"en": "What happened when Takehito slipped off the curb during practice?", "zh": "排练时塔基托从路缘石上滑倒，发生了什么？"}, "options": [{"en": "He lost his cowboy hat.", "zh": "他弄丢了牛仔帽。"}, {"en": "He won first prize.", "zh": "他得了一等奖。"}, {"en": "He hurt his ankle and it swelled; Manny gave him ice from his cooler.", "zh": "他扭伤了脚踝并肿了起来；曼尼从冷藏箱里拿了冰块给他。"}, {"en": "He learned to fly like in his daydream. according to some versions of the story", "zh": "他像白日梦里那样学会了飞翔。（按书中另一种说法）"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "The text says Takehito slipped off the curb, 'clutching his ankle, which was swelling up fast,' and Manny scooped ice from his cooler for it.", "zh": "文中写塔基托从路缘石滑倒，'紧紧抓住脚踝，它迅速肿了起来'，曼尼从冷藏箱里舀了冰块给他。"}}], "extended": {"prompt": {"en": "Takehito worries about being a 'laughingstock' but performs anyway and ends up making a friend. Why do you think facing something scary can help people make friends or grow? Use details from the story.", "zh": "塔基托担心自己会成为'笑柄'，但还是上台表演，并最终交到了朋友。你认为面对害怕的事为什么能帮人交朋友或成长？请结合故事中的细节说明。"}, "guidance": {"en": ["Think about how Mrs. Klein wanted the talent show to help classmates learn about each other.", "Think about what changed for Takehito from the start, when he daydreamed and stayed quiet, to the end, when he smiled knowing he had made a friend."], "zh": ["想想克莱恩老师希望才艺表演能帮助同学们互相了解。", "想想塔基托从开头做白日梦、沉默不语，到结尾微笑着知道自己交到了朋友，发生了怎样的变化。"]}}};</script>
