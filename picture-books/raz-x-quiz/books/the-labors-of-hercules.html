<script>window.BOOK = {"slug": "the-labors-of-hercules", "title": "The Labors of Hercules", "titleZh": "赫拉克勒斯的功绩", "level": "X", "genre": "Myth/Legend", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Who were the parents of Hercules?", "zh": "赫拉克勒斯的父母是谁？"}, "options": [{"en": "Zeus, king of the gods, and Alcmene, a mortal woman.", "zh": "众神之王宙斯和凡间女子阿尔克墨涅。"}, {"en": "Hera and Zeus.", "zh": "赫拉和宙斯。"}, {"en": "Apollo and Alcmene.", "zh": "阿波罗和阿尔克墨涅。"}, {"en": "King Eurystheus and Alcmene.", "zh": "欧律斯透斯王和阿尔克墨涅。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book states Hercules was the child of Zeus, king of the gods, and a mortal woman named Alcmene.", "zh": "书中说赫拉克勒斯是众神之王宙斯与凡间女子阿尔克墨涅的孩子。"}}, {"q": {"en": "Why did the goddess Hera want to harm Hercules?", "zh": "女神赫拉为什么要伤害赫拉克勒斯？"}, "options": [{"en": "She wanted him to become a great hero.", "zh": "她想让他成为伟大的英雄。"}, {"en": "She was angry that Zeus had a child with Alcmene and swore revenge.", "zh": "她因宙斯与阿尔克墨涅生下孩子而愤怒，发誓报复。"}, {"en": "She needed him to clean the Augean stables.", "zh": "她需要他去清扫奥吉亚斯牛圈。"}, {"en": "She loved him as her own son.", "zh": "她像亲生儿子一样爱他。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Hera, Zeus's wife, was angry that Zeus had a child with Alcmene and swore revenge on both mother and child.", "zh": "宙斯的妻子赫拉因宙斯与阿尔克墨涅生下孩子而愤怒，对母子二人发誓报复。"}}, {"q": {"en": "How many labors did Hercules have to perform?", "zh": "赫拉克勒斯必须完成多少项任务？"}, "options": [{"en": "Ten at first, then twelve after Hera insisted.", "zh": "起初十项，在赫拉坚持后变成十二项。"}, {"en": "Always ten.", "zh": "一直是十项。"}, {"en": "Always twelve.", "zh": "一直是十二项。"}, {"en": "Seven.", "zh": "七项。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Apollo sentenced Hercules to ten labors, but when Eurystheus learned he had been paid for two, he increased the number from ten to twelve at Hera's insistence.", "zh": "阿波罗判赫拉克勒斯完成十项任务，但欧律斯透斯得知他因两项任务收了报酬后，在赫拉坚持下把数量从十增加到十二。"}}, {"q": {"en": "How did Hercules defeat the Nemean lion?", "zh": "赫拉克勒斯是如何打败尼米亚雄狮的？"}, "options": [{"en": "He shot it with arrows that pierced its heart.", "zh": "他用箭射穿了它的心脏。"}, {"en": "He built a trap and let it starve.", "zh": "他设下陷阱让它饿死。"}, {"en": "He choked it with his arms after his arrows and spear bounced off its hide.", "zh": "在箭和矛都被狮皮弹开后，他用双臂将其掐死。"}, {"en": "He poisoned it with a special herb.", "zh": "他用一种特殊的草药毒死了它。"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "Arrows and a spear could not pierce the lion's hide, so Hercules jumped on its back and choked it with his powerful arms.", "zh": "箭和长矛都无法刺穿狮皮，于是赫拉克勒斯跳到狮背上，用有力的双臂将其掐死。"}}, {"q": {"en": "How did Hercules clean the filthy stables of King Augeas?", "zh": "赫拉克勒斯是如何清扫奥吉亚斯国王肮脏的牛圈的？"}, "options": [{"en": "He swept it by hand with thousands of helpers.", "zh": "他带着数千名帮手亲手清扫。"}, {"en": "He used fire to burn the filth away.", "zh": "他用火把污物烧掉。"}, {"en": "He hired the Amazons to do it.", "zh": "他雇了亚马逊女战士来做。"}, {"en": "He smashed holes in the walls and let a river flow through to carry the filth away.", "zh": "他在墙上砸出洞，引河水穿过牛圈把污物冲走。"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Hercules smashed two large holes in the stable walls and dug a canal from a nearby river so the water flowed through and carried away years of filth.", "zh": "赫拉克勒斯在牛圈墙上砸出两个大洞，并从附近河流挖渠引水穿过牛圈，冲走了多年堆积的污物。"}}, {"q": {"en": "For the third labor, what did Hercules do with the Ceryneian Hind?", "zh": "在第三项任务中，赫拉克勒斯是如何对待刻律涅亚母鹿的？"}, "options": [{"en": "He killed it and ate it.", "zh": "他把它杀了吃掉。"}, {"en": "He tracked it for a year, caught it in a net, and returned it to Artemis as he promised.", "zh": "他追踪了一年，用网捉住它，并如约把它还给了阿尔忒弥斯。"}, {"en": "He gave it to Hera as a gift.", "zh": "他把它作为礼物送给了赫拉。"}, {"en": "He left it alone because it was too fast.", "zh": "他任由它离开，因为它跑得太快。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Hercules patiently tracked the hind for a full year, threw a net over it, and later kept his word to Artemis by returning it after the labor.", "zh": "赫拉克勒斯耐心地追踪母鹿整整一年，用网罩住它，并信守对阿尔忒弥斯的承诺，在任务结束后把它归还。"}}, {"q": {"en": "In the eleventh labor, how did Hercules get a golden apple from Atlas?", "zh": "在第十一项任务中，赫拉克勒斯是如何从阿特拉斯那里得到金苹果的？"}, "options": [{"en": "He offered to hold the world for Atlas, then tricked Atlas into taking it back so he could escape with the apple.", "zh": "他提出替阿特拉斯扛住世界，然后设计让阿特拉斯重新扛回，自己带着苹果逃走。"}, {"en": "He fought the nymphs and stole it.", "zh": "他与仙女们战斗并把苹果偷走。"}, {"en": "He climbed the tree himself.", "zh": "他自己爬上树去摘。"}, {"en": "He asked Zeus to give it to him.", "zh": "他请求宙斯把苹果给他。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Hercules agreed to hold the world for Atlas, then asked Atlas to hold it briefly so he could get comfortable; once Atlas lifted it again, Hercules escaped with the apple.", "zh": "赫拉克勒斯同意替阿特拉斯扛世界，随后借口要换个舒服姿势让阿特拉斯重新扛回，便带着苹果逃走了。"}}, {"q": {"en": "In this book, what does the word 'penance' mean?", "zh": "在这本书中，'penance'（赎罪）一词是什么意思？"}, "options": [{"en": "A type of weapon used in battle.", "zh": "战斗中使用的武器。"}, {"en": "A celebration held after a victory.", "zh": "胜利后举行的庆祝活动。"}, {"en": "Something a person does to show regret or atone for bad behavior.", "zh": "一个人为了表达悔意或弥补过错而做的事。"}, {"en": "A gift given to a king.", "zh": "献给国王的礼物。"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'penance' as something a person does to show regret or atone for bad behavior, as when Hercules took on his labors.", "zh": "词汇表把 penance 定义为一个人为了表达悔意或弥补过错而做的事，正如赫拉克勒斯承担那些任务一样。"}}, {"q": {"en": "What is the author's main purpose in telling this story?", "zh": "作者讲述这个故事的主要目的是什么？"}, "options": [{"en": "To teach readers how to build a temple.", "zh": "教读者如何建造神庙。"}, {"en": "To explain how to train lions.", "zh": "讲解如何训练狮子。"}, {"en": "To argue that Hera was right to be angry.", "zh": "论证赫拉生气是有道理的。"}, {"en": "To retell the Greek myth of Hercules's labors and his rise to immortality.", "zh": "重述赫拉克勒斯完成任务的希腊神话，以及他如何成为不朽英雄。"}], "answer": 3, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book retells the beloved myth of Hercules's labors, his struggles, and how Zeus raised him to Olympus as an immortal hero.", "zh": "全书重述了关于赫拉克勒斯任务的著名希腊神话，讲述他的奋斗，以及宙斯如何把他提升为不朽的英雄。"}}, {"q": {"en": "What does the story show about how Hercules completed his labors?", "zh": "这个故事说明了赫拉克勒斯是如何完成任务的？"}, "options": [{"en": "He used only brute strength and never any cleverness.", "zh": "他只靠蛮力，从不耍聪明。"}, {"en": "He used both great strength and clever tricks, such as the lion's claw and tricking Atlas.", "zh": "他既用强大的力量，也用巧妙的计谋，比如用狮爪和戏弄阿特拉斯。"}, {"en": "He always asked the gods to do the work for him.", "zh": "他总是请众神替他完成工作。"}, {"en": "He paid other people to complete every labor.", "zh": "他付钱让别人完成每一项任务。"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book shows Hercules combining strength and ingenuity, such as skinning the lion with its own claw and tricking Atlas to keep the golden apple.", "zh": "书中显示赫拉克勒斯将力量与智慧结合，比如用狮子的爪子剥皮，以及设计戏弄阿特拉斯保住金苹果。"}}], "extended": {"prompt": {"en": "Hercules is remembered as a hero, but some of his actions were not heroic—for example, killing his family in a fit of madness, or slaying Hippolyte after Hera tricked him. Which of his actions do you think were truly heroic, and which were not? Why?", "zh": "赫拉克勒斯被铭记为英雄，但他有些行为并不英雄——比如在发疯时杀死家人，或在赫拉设计后杀死希波吕忒。你认为他的哪些行为是真正英雄的，哪些不是？为什么？"}, "guidance": {"en": ["Consider his self-control with the Ceryneian Hind and his promise to Artemis versus the violence forced by Hera's tricks.", "Think about how he used both strength and cleverness, and whether completing labors as penance makes him heroic."], "zh": ["想想他对待刻律涅亚母鹿时的克制、对阿尔忒弥斯的承诺，以及那些因赫拉诡计而被迫使用的暴力。", "思考他如何同时运用力量与智慧，以及为赎罪而完成任务是否让他成为英雄。"]}}};</script>
