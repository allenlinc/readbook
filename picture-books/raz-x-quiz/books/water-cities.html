<script>window.BOOK = {"slug": "water-cities", "title": "Water Cities", "titleZh": "水上城市", "level": "X", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "What makes Venice, Italy special among water cities?", "zh": "意大利威尼斯在水上城市中有什么特别之处？"}, "options": [{"en": "It is the capital of the Netherlands.", "zh": "它是荷兰的首都。"}, {"en": "It is the world's best-known water city, built on more than a hundred islands with canals and bridges.", "zh": "它是世界上最著名的水上城市，建在百余座岛屿上，有运河和桥梁。"}, {"en": "It is the largest city in Africa.", "zh": "它是非洲最大的城市。"}, {"en": "It was built entirely underwater by the Aztecs.", "zh": "它是阿兹特克人完全建在水下的城市。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says people flock to Venice to see the famous city of canals and bridges built on more than a hundred islands, and that it is the world's best-known water city.", "zh": "书中说人们涌向威尼斯，去看这座建在百余座岛屿上、以运河和桥梁闻名的城市，并称它是世界上最著名的水上城市。"}}, {"q": {"en": "How did the Tofinu people create the village of Ganvié in Benin?", "zh": "托菲努人是如何创建贝宁的加恩维（Ganvié）村的？"}, "options": [{"en": "They fled to Lake Nokoué to escape slave traders and built a stilt village; its name means 'we survived.'", "zh": "他们逃到诺库埃湖以躲避奴隶贩子，并建起一个桩柱村；村名意为'我们活下来了'。"}, {"en": "They won a war and were given the land by a king.", "zh": "他们赢得战争，国王把土地赐给他们。"}, {"en": "They found it already built by European settlers.", "zh": "他们发现它早已由欧洲殖民者建好。"}, {"en": "They moved there after a volcano erupted.", "zh": "他们在火山爆发后迁居于此。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book explains that during the 17th-century slave trade, the Tofinu fled to Lake Nokoué because the Fon religion forbade pursuing people on water; they founded the stilt village, whose name means 'we survived.'", "zh": "书中解释，在17世纪奴隶贸易时期，因丰族宗教禁止在水上追捕人，托菲努人逃到诺库埃湖，建立了桩柱村，村名意为'我们活下来了'。"}}, {"q": {"en": "How is Singapore's method of adding land different from Amsterdam's?", "zh": "新加坡扩建陆地的方式与阿姆斯特丹有何不同？"}, "options": [{"en": "Both removed seawater by pumping it out.", "zh": "两者都通过抽干海水来造地。"}, {"en": "Singapore used only polders from the very beginning.", "zh": "新加坡从一开始就只使用圩田。"}, {"en": "Singapore dumps rocks and sand into the water to extend its coast, while Amsterdam reclaimed land by pumping seawater out.", "zh": "新加坡向水中倾倒岩石和沙土来延伸海岸，而阿姆斯特丹是通过抽干海水来填海造地。"}, {"en": "Amsterdam dumped sand into the sea like Singapore.", "zh": "阿姆斯特丹像新加坡一样向海中倾倒沙土。"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says Amsterdam reclaimed land by pumping out water, while Singapore extended its coastline by dumping rocks and sand into the water (a 2016 project will later add polders like Amsterdam).", "zh": "书中说阿姆斯特丹通过抽干水来填海造地，而新加坡是向水中倾倒岩石和沙土来延伸海岸（2016年的工程之后才会像阿姆斯特丹那样建造圩田）。"}}, {"q": {"en": "What are the floating islands of the Uros people in Peru made of?", "zh": "秘鲁乌鲁人的漂浮岛屿是用什么做的？"}, "options": [{"en": "Totora reeds, which disintegrate from the bottom so new reeds are added on top.", "zh": "托托拉芦苇，它们从底部腐烂，因此要在顶部不断添加新的芦苇。"}, {"en": "Clamshells held together by tree roots.", "zh": "由树根固定在一起的蛤壳。"}, {"en": "Plastic and metal.", "zh": "塑料和金属。"}, {"en": "Solid rock.", "zh": "坚硬的岩石。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says about 2,000 Uru live on roughly seventy floating islands made of totora reeds; the islands are 1.2 to 2.4 m thick, disintegrate from the bottom, and new reeds are added to the top.", "zh": "书中说约两千乌鲁人生活在约70座托托拉芦苇制成的漂浮岛上；岛厚1.2至2.4米，从底部腐烂，并在顶部不断添加新芦苇。"}}, {"q": {"en": "What is Mexcalitán, Mexico sometimes called, and what do children do there in the rainy season?", "zh": "墨西哥的墨西卡利特兰（Mexcalitán）常被称为什么？雨季里孩子们会做什么？"}, "options": [{"en": "The 'Venice of Africa,' where children ride camels.", "zh": "非洲的威尼斯，孩子们骑骆驼。"}, {"en": "The 'City of Sails,' where children sail boats.", "zh": "帆船之城，孩子们驾驶帆船。"}, {"en": "Shell Island, where children collect clams.", "zh": "贝壳岛，孩子们捡蛤蜊。"}, {"en": "The 'Mexican Venice'; in the rainy season boats are the only way through the streets and children play 'water soccer' on the underwater pitch.", "zh": "墨西哥的威尼斯；雨季里船是穿过街道的唯一方式，孩子们在被水淹没的球场上玩'水上足球'。"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The book says Mexcalitán is sometimes called the Mexican Venice, and that in the summer rainy season boats are the only way through the streets and local children play 'water soccer' on the island's underwater soccer pitch.", "zh": "书中说墨西卡利特兰有时被称为墨西哥的威尼斯；夏季雨季里船是穿过街道的唯一方式，当地孩子在被水淹没的球场上玩'水上足球'。"}}, {"q": {"en": "In the glossary, what does the word 'concentric' mean?", "zh": "在词汇表中，'concentric'（同心的）一词是什么意思？"}, "options": [{"en": "Made of shells.", "zh": "由贝壳制成。"}, {"en": "Sharing the same center, like Amsterdam's half-circle canals.", "zh": "共有一个中心，就像阿姆斯特丹的半圆形运河。"}, {"en": "Built on stilts above water.", "zh": "建在水上的桩柱之上。"}, {"en": "Located between two harbors.", "zh": "位于两个港口之间。"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'concentric' as 'sharing the same center,' which fits the book's description of Amsterdam's three more concentric half-circle canals.", "zh": "词汇表把 concentric 定义为'共有一个中心'，这正对应书中阿姆斯特丹那三条同心半圆运河的描述。"}}, {"q": {"en": "Why is Auckland, New Zealand nicknamed the 'City of Sails'?", "zh": "新西兰奥克兰为何被称为'帆船之城'？"}, "options": [{"en": "About one-sixth of residents own a boat and it has hosted the America's Cup yacht race twice.", "zh": "约六分之一的居民拥有船只，并且它曾两次举办美洲杯帆船赛。"}, {"en": "It has the world's largest ship factory.", "zh": "它拥有世界最大的造船厂。"}, {"en": "It is the only city built on an island.", "zh": "它是唯一建在岛上的城市。"}, {"en": "It was named after a famous sailor.", "zh": "它以一位著名水手命名。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says Auckland's nickname is the 'City of Sails' because about one-sixth of Aucklanders own a boat and the city has hosted the America's Cup yacht race twice.", "zh": "书中说奥克兰的绰号是'帆船之城'，因为约六分之一的奥克兰人拥有船只，且该市曾两次举办美洲杯帆船赛。"}}, {"q": {"en": "What is the purpose of the breakwater around Dubai's Palm Jumeirah?", "zh": "迪拜朱美拉棕榈岛周围的防波堤有什么作用？"}, "options": [{"en": "It is a bridge for cars to cross.", "zh": "它是供汽车通行的桥。"}, {"en": "It generates electricity from the sun.", "zh": "它利用太阳能发电。"}, {"en": "It is a crescent-shaped wall that protects the island from strong waves and storms.", "zh": "它是一个新月形的墙，保护岛屿免受巨浪和风暴侵袭。"}, {"en": "It is a fence built to keep fish inside the lagoon.", "zh": "它是用来把鱼圈在泻湖里的围栏。"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says a crescent-shaped breakwater around the island protects it from strong waves and storms.", "zh": "书中说岛周围的新月形防波堤保护它免受巨浪和风暴的侵袭。"}}, {"q": {"en": "Which water city is built on an island made entirely of clamshells?", "zh": "哪座水上城市建在完全由蛤壳构成的岛上？"}, "options": [{"en": "Ganvié, Benin.", "zh": "贝宁的加恩维。"}, {"en": "Fadiouth (Shell Island), Senegal.", "zh": "塞内加尔的法迪乌特（贝壳岛）。"}, {"en": "Venice, Italy.", "zh": "意大利的威尼斯。"}, {"en": "Singapore.", "zh": "新加坡。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says the residents of Fadiouth, Senegal live on an island made up entirely of clamshells, which they have recycled for over three centuries to build structures and even the land itself.", "zh": "书中说塞内加尔法迪乌特的居民住在一个完全由蛤壳构成的岛上，三百多年来他们回收蛤壳来建造房屋乃至土地本身。"}}, {"q": {"en": "What is the author's main purpose in writing this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"en": "To convince readers to move to Venice.", "zh": "劝说读者搬到威尼斯去住。"}, {"en": "To tell a fictional pirate story.", "zh": "讲一个虚构的海盗故事。"}, {"en": "To teach readers how to build a boat.", "zh": "教读者如何造船。"}, {"en": "To inform readers about the variety of water cities and how people adapt to living on water.", "zh": "向读者介绍各式各样的水上城市，以及人们如何适应水上生活。"}], "answer": 3, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book surveys water cities on every continent and ends by calling their diversity 'a testament to human adaptability and innovation,' showing it is informational.", "zh": "全书介绍了各大洲的水上城市，并以它们的多样性是'人类适应力与创造力的见证'作结，可见这是知识说明类内容。"}}], "extended": {"prompt": {"en": "The book says the diversity of water cities is 'a testament to human adaptability and innovation.' Choose two water cities from the book and explain how each one shows people adapting creatively to life on or near water.", "zh": "书中说水上城市的多样性是'人类适应力与创造力的见证'。从书中任选两座水上城市，分别说明每一座如何体现了人们在水上或水边生活的创造性适应。"}, "guidance": {"en": ["Think about how the Tofinu built Ganvié on stilts to escape slave traders, and how the Uros make floating reed islands on Lake Titicaca.", "Consider how Singapore and Dubai created new land from rock, sand, and artificial islands to grow their cities."], "zh": ["想想托菲努人如何为躲避奴隶贩子而在桩柱上建起加恩维，以及乌鲁人如何在的的喀喀湖上造出漂浮的芦苇岛。", "思考新加坡和迪拜如何用岩石、沙土和人工岛造出新陆地来扩展城市。"]}}};</script>
