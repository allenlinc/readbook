<script>window.BOOK = {"slug": "fun-by-remote-control", "title": "Fun by Remote Control", "titleZh": "遥控的乐趣", "level": "X", "genre": "Science", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Who invented the first radio-controlled machine?", "zh": "谁发明了第一台无线电遥控装置？"}, "options": [{"en": "John Perritano.", "zh": "约翰·佩里塔诺（John Perritano）。"}, {"en": "Nikola Tesla.", "zh": "尼古拉·特斯拉（Nikola Tesla）。"}, {"en": "Niels Herbrich.", "zh": "尼尔斯·赫布里希（Niels Herbrich）。"}, {"en": "Bob Motta.", "zh": "鲍勃·莫塔（Bob Motta）。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book states, 'We can thank Nikola Tesla for inventing the first radio-controlled machine.'", "zh": "书中说：'我们要感谢尼古拉·特斯拉发明了第一台无线电遥控装置。'"}}, {"q": {"en": "What world record did Niels Herbrich set with his radio-controlled jet?", "zh": "尼尔斯·赫布里希用他的遥控喷气式飞机创下了什么世界纪录？"}, "options": [{"en": "A new world speed record of 440 miles per hour (708 kph).", "zh": "每小时440英里（708公里）的新世界速度纪录。"}, {"en": "The smallest remote-controlled plane ever built. according to some versions of the story", "zh": "有史以来最小的遥控飞机。（按书中另一种说法）"}, {"en": "The highest altitude of 10 miles.", "zh": "10英里的最高飞行高度。"}, {"en": "The longest flight time of 24 hours.", "zh": "24小时的最长飞行时间。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says Herbrich's RC jet 'hits a peak speed of 440 miles per hour (708 kph)' and 'has just set a new world speed record.'", "zh": "书中说赫布里希的遥控喷气机'最高速度达到每小时440英里（708公里）'，并'刚刚创下新的世界速度纪录'。"}}, {"q": {"en": "Where and when did Tesla first demonstrate his radio-controlled boat?", "zh": "特斯拉首次展示他的无线电遥控船是在哪里、什么时候？"}, "options": [{"en": "At Madison Square Garden in New York City, in 1898.", "zh": "在纽约市的麦迪逊广场花园，1898年。"}, {"en": "At a World's Fair in Paris, in 1900. according to some versions of the story", "zh": "在巴黎的世界博览会上，1900年。（按书中另一种说法）"}, {"en": "On a radio show in 1920.", "zh": "在1920年的一档广播节目中。"}, {"en": "At a navy base in 1914.", "zh": "在1914年的一处海军基地。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says Tesla's demonstration took place at 'New York City's Madison Square Garden in 1898.'", "zh": "书中说特斯拉的演示发生在'1898年纽约市的麦迪逊广场花园'。"}}, {"q": {"en": "What 1947 invention made radio-controlled toys possible by shrinking electric motors?", "zh": "1947年出现的哪项发明让电动马达变小，从而使遥控玩具成为可能？"}, "options": [{"en": "The jet engine.", "zh": "喷气式发动机。"}, {"en": "The transistor.", "zh": "晶体管（transistor）。"}, {"en": "The receiver. according to some versions of the story", "zh": "接收器（receiver）。（按书中另一种说法）"}, {"en": "The computer.", "zh": "计算机。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book explains that 'That all changed in 1947 with the invention of the transistor,' which was tiny yet made currents more powerful and shrank motors.", "zh": "书中解释：'这一切在1947年因晶体管的发明而改变'，它虽小却让电流更强，并使马达缩小。"}}, {"q": {"en": "How do radio-controlled vehicles work, in basic terms?", "zh": "从基本原理上说，无线电遥控车是如何工作的？"}, "options": [{"en": "A computer on the ground steers it by satellite only.", "zh": "地面的计算机仅通过卫星来操控它。"}, {"en": "A wire connects the controller directly to the wheels. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "一根电线把控制器直接连到车轮上。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "A transmitter sends radio signals; a receiver inside the vehicle decodes them and sends currents to the motors that move it.", "zh": "发射器发出无线电信号；车内的接收器解码信号，并把电流送往驱动车辆的马达。"}, {"en": "The vehicle follows a person using a laser pointer.", "zh": "车辆用激光笔跟随一个人。"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "The 'Basics of RC' section says a transmitter sends signals over a frequency; a receiver inside decodes them and 'sending electric currents to the motors, which move and guide the vehicle.'", "zh": "'遥控基础'一节说，发射器按特定频率发出信号；车内的接收器解码后'把电流送往马达，由马达驱动并引导车辆'。"}}, {"q": {"en": "According to the book, what are radio waves, and how big and fast are they?", "zh": "根据本书，无线电波是什么？它们的大小和频率如何？"}, "options": [{"en": "Water waves in the ocean, about 10 feet long.", "zh": "海洋中的波浪，约10英尺长。"}, {"en": "A type of electromagnetic energy whose waves range from longer than a football field to about the size of a person, with a frequency of 1 to 100 million waves per second.", "zh": "一种电磁能量，其波长从比足球场还长到约一个人大小不等，频率为每秒100万到1亿个波。"}, {"en": "Light waves shorter than an atom, at a trillion waves per second.", "zh": "比原子还短的光波，每秒一万亿个波。"}, {"en": "Sound waves you can hear, about the size of a marble, at 20 waves per second. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "能听到的声波，约弹珠大小，每秒20个波。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The 'What Is Radio?' section says radio is electromagnetic energy; radio waves 'range from longer than a football field to about the size of a person and have a frequency of 1 million to 100 million waves per second.'", "zh": "'什么是无线电？'一节说无线电是电磁能量；无线电波'长度从比足球场还长到约一个人大小，频率为每秒100万到1亿个波'。"}}, {"q": {"en": "Which event did TV crews use drones to cover, according to the book's look at the future of RC technology?", "zh": "根据本书对遥控技术未来的介绍，电视摄制组曾用无人机报道过哪场活动？"}, "options": [{"en": "A car race at the Indianapolis 500.", "zh": "印第安纳波利斯500英里汽车赛。"}, {"en": "The 2014 Super Bowl in the United States. according to some versions of the story", "zh": "2014年美国超级碗。（按书中另一种说法）"}, {"en": "A World Cup soccer final in Brazil.", "zh": "在巴西举行的世界杯足球决赛。"}, {"en": "The 2014 Winter Olympic Games in Sochi, Russia.", "zh": "2014年俄罗斯索契冬季奥运会。"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says, 'TV crews used drones to cover the 2014 Winter Olympic Games in Sochi, Russia' via the Olympic Broadcasting Service.", "zh": "书中说：'电视摄制组用无人机报道了2014年俄罗斯索契冬季奥运会'，由奥林匹克广播服务公司操作。"}}, {"q": {"en": "What makes off-road RC vehicles popular, according to the book?", "zh": "根据本书，越野遥控车为什么受欢迎？"}, "options": [{"en": "They can only be driven on smooth race tracks. according to some versions of the story in an early draft of the book", "zh": "它们只能在平坦的赛道上行驶。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "They are the cheapest RC cars available.", "zh": "它们是市面上最便宜的遥控车。"}, {"en": "They run only on glow fuel, not batteries.", "zh": "它们只靠助燃燃料运行，不用电池。"}, {"en": "They come with large tires and heavy-duty shock absorbers, so they can go almost anywhere.", "zh": "它们配有大型轮胎和重型减震器，因此几乎哪里都能去。"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The book says off-road vehicles are popular 'since they come with large tires and heavy-duty shock absorbers' and 'can go just about anywhere.'", "zh": "书中说越野车受欢迎，是因为'它们配有大型轮胎和重型减震器'，而且'几乎哪里都能去'。"}}, {"q": {"en": "In this book's glossary, what does the word 'aerobatic' mean?", "zh": "在本书词汇表中，'aerobatic' 一词是什么意思？"}, "options": [{"en": "Of or relating to challenging or thrilling movements of an aircraft in flight.", "zh": "与飞机飞行中富有挑战性或惊险的动作有关。"}, {"en": "Powered by a battery instead of fuel.", "zh": "由电池而非燃料驱动。"}, {"en": "Flown only indoors.", "zh": "只在室内飞行。"}, {"en": "Built to look like a real warplane. according to some versions of the story", "zh": "被建造得看起来像真实的军用飞机。（按书中另一种说法）"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'aerobatic' as 'of or relating to challenging or thrilling movements of an aircraft in flight' (p. 13).", "zh": "词汇表把 aerobatic 定义为'与飞机飞行中富有挑战性或惊险的动作有关'（第13页）。"}}, {"q": {"en": "What is the author's main purpose in writing this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"en": "To teach readers how to fly a real passenger airplane.", "zh": "教读者如何驾驶真正的客机。"}, {"en": "To persuade readers to buy a specific brand of RC car. according to some versions of the story in an early draft of the book", "zh": "劝说读者购买某个特定品牌的遥控车。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "To inform readers about remote-controlled vehicles—their history, how they work, and how people use them.", "zh": "向读者介绍遥控车——它们的历史、工作原理以及人们如何使用它们。"}, {"en": "To tell a made-up adventure story about a toy plane.", "zh": "讲述一个关于玩具飞机的虚构冒险故事。"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book is informational: it explains the history of radio control, how RC works, racing and flying, and future drone uses.", "zh": "本书是知识说明类：它讲解无线电遥控的历史、遥控车的原理、赛车与飞行，以及无人机的未来用途。"}}], "extended": {"prompt": {"en": "The book says the same RC technology used for toys is now being used in drones that may deliver packages, carry organs for transplants, or find crop-eating insects. Which of these future uses do you think is most helpful, and why? Are there any worries you can think of?", "zh": "本书说，玩具所用的相同遥控技术，如今正被用于可能递送包裹、运送移植器官或寻找吃庄稼昆虫的无人机。你认为这些未来用途中哪一个最有用？为什么？你能想到什么担忧吗？"}, "guidance": {"en": ["Look back at the 'Future of RC Technology' section for the book's examples (farms, hospitals, delivery, Olympics).", "Think about safety, privacy, or cost when considering possible worries."], "zh": ["回顾'遥控技术的未来'一节中书的例子（农业、医院、递送、奥运会）。", "思考可能的担忧时，可从安全、隐私或成本角度考虑。"]}}};</script>
