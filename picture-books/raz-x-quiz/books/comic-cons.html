<script>window.BOOK = {"slug": "comic-cons", "title": "Comic Cons", "titleZh": "漫画大会", "level": "X", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Who is credited with starting early comic book conventions, and what famous convention did he found?", "zh": "谁被认为是早期漫画书大会的创办者？他创办了哪个著名的大会？"}, "options": [{"en": "Shel Dorf, who founded Comic-Con International (CCI): San Diego in 1970.", "zh": "谢尔·多夫（Shel Dorf），他于1970年创办了圣地亚哥国际漫画大会（CCI）。"}, {"en": "Stan Lee, who founded Marvel Comics.", "zh": "斯坦·李（Stan Lee），他创办了漫威漫画。"}, {"en": "Art Spiegelman, who founded the Pulitzer committee.", "zh": "阿特·斯皮格曼（Art Spiegelman），他创办了普利策委员会。"}, {"en": "Robert Downey Jr., who founded the Avengers panel.", "zh": "小罗伯特·唐尼（Robert Downey Jr.），他创办了复仇者联盟座谈。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says Shel Dorf 'organized small gatherings of comic fans in Detroit in the 1960s' and 'went on to found the convention now known as Comic-Con International (CCI): San Diego in 1970.'", "zh": "书中说谢尔·多夫'在1960年代于底特律组织了漫画迷的小型聚会'，并'随后创办了如今被称为圣地亚哥国际漫画大会（CCI）的活动，时在1970年'。"}}, {"q": {"en": "About how many people does San Diego Comic-Con host each year now, compared to its first event?", "zh": "与首届活动相比，如今圣地亚哥漫画大会每年大约接待多少人？"}, "options": [{"en": "More than 130,000 people a year now, compared to about 100 fans at the first event.", "zh": "现在每年超过13万人，而首届活动只有约100名粉丝。"}, {"en": "About 1,000 people now, up from 100 at the first event.", "zh": "现在约1,000人，从首届的100人增长。"}, {"en": "Exactly 100 people, the same as the first event.", "zh": "正好100人，与首届相同。"}, {"en": "Over one million people, up from 500 at the first event.", "zh": "超过100万人，从首届的500人增长。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says the first San Diego convention 'attracted about 100 fans; it now hosts over 130,000 people every year.'", "zh": "书中说首届圣地亚哥大会'吸引了约100名粉丝；如今每年接待超过13万人'。"}}, {"q": {"en": "Which writer and editor helped create Marvel superheroes such as Spider-Man, the X-Men, and the Hulk, and often appears at comic cons?", "zh": "哪位作家兼编辑帮助创造了蜘蛛侠、X战警和绿巨人等漫威超级英雄，并经常出现在漫画大会上？"}, "options": [{"en": "Stan Lee.", "zh": "斯坦·李（Stan Lee）。"}, {"en": "Shel Dorf.", "zh": "谢尔·多夫（Shel Dorf）。"}, {"en": "Art Spiegelman.", "zh": "阿特·斯皮格曼（Art Spiegelman）。"}, {"en": "Michael T. Foley.", "zh": "迈克尔·T·福利（Michael T. Foley）。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says, 'Legendary writer, editor, and publisher Stan Lee often appears at comic cons. Lee helped create many of Marvel Comics' most popular superheroes, including the Fantastic Four, the Incredible Hulk, Thor, Spider-Man, and the X-Men.'", "zh": "书中说：'传奇作家、编辑和出版人斯坦·李经常出现在漫画大会上。李帮助创造了漫威许多最受欢迎的超级英雄，包括神奇四侠、绿巨人、雷神、蜘蛛侠和X战警。'"}}, {"q": {"en": "Which two comic series from the late 1980s and early 1990s did critics praise as serious works of art?", "zh": "哪两套出自1980年代末和1990年代初的漫画系列被评论家称赞为严肃的艺术作品？"}, "options": [{"en": "The Sandman and Watchmen.", "zh": "《睡魔》（The Sandman）和《守望者》（Watchmen）。"}, {"en": "Superman and Batman.", "zh": "《超人》和《蝙蝠侠》。"}, {"en": "Iron Man and The Dark Knight.", "zh": "《钢铁侠》和《黑暗骑士》。"}, {"en": "Maus and Peggy Sue.", "zh": "《鼠族》（Maus）和《佩吉·休》（Peggy Sue）。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says comic series 'such as The Sandman and Watchmen broke new ground and were praised by critics as serious works of art.'", "zh": "书中说像《睡魔》和《守望者》这样的漫画系列'开辟了新天地，并被评论家称赞为严肃的艺术作品'。"}}, {"q": {"en": "What is 'cosplay' at a comic con?", "zh": "漫画大会上的'cosplay'（角色扮演）是什么？"}, "options": [{"en": "Fans dress up in costumes as characters from comic books, anime, manga, and other fantasy genres.", "zh": "粉丝们穿上服装，扮演漫画、动漫、漫画小说及其他奇幻题材中的角色。"}, {"en": "A type of video game tournament.", "zh": "一种电子游戏比赛。"}, {"en": "A way to buy rare comic books.", "zh": "一种购买稀有漫画书的方式。"}, {"en": "A panel where celebrities answer questions.", "zh": "名人回答问题的座谈会。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says, 'In cosplay, fans dress up in costumes as characters from comic books, anime, manga, and other fantasy genres.'", "zh": "书中说：'在角色扮演中，粉丝们穿上服装，扮演漫画、动漫、漫画小说及其他奇幻题材中的角色。'"}}, {"q": {"en": "According to the book, what were two main reasons comic cons became so popular?", "zh": "根据本书，漫画大会如此流行的主要原因有哪两个？"}, "options": [{"en": "Comic books became respected as serious art (e.g., The Sandman, Watchmen, graphic novels), and hit Hollywood movies based on comics brought in new fans.", "zh": "漫画书被公认为严肃艺术（如《睡魔》《守望者》、图像小说），且基于漫画的好莱坞热门电影吸引了新粉丝。"}, {"en": "The Internet was invented, and TV was canceled.", "zh": "互联网被发明，电视被取消。"}, {"en": "Comic books became cheaper, and paper became free.", "zh": "漫画书变得更便宜，纸张免费了。"}, {"en": "Sports became illegal, so people went to cons instead.", "zh": "运动被定为非法，所以人们改去大会。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book gives two causes: comics 'broke new ground and were praised by critics as serious works of art,' and 'the enormous success of recent Hollywood movies based on comic books has brought many people to comic cons.'", "zh": "书中给出了两个原因：漫画'开辟了新天地，被评论家称赞为严肃的艺术作品'，并且'近来基于漫画的好莱坞电影的巨大成功把许多人带到了漫画大会'。"}}, {"q": {"en": "How has the comic con audience changed, according to the book?", "zh": "根据本书，漫画大会的观众群体发生了怎样的变化？"}, "options": [{"en": "It used to be mostly male, but now about 40 percent of recent San Diego attendees are female and more than half are under 29, making it more diverse.", "zh": "过去以男性为主，但如今圣地亚哥近期观众约40%为女性，且超过一半不到29岁，更加多样化。"}, {"en": "It has always been only children under 10.", "zh": "一直以来只有10岁以下的儿童。"}, {"en": "It changed from mostly female to mostly male.", "zh": "从以女性为主变成了以男性为主。"}, {"en": "It is now only people over 60.", "zh": "现在只有60岁以上的人。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says attendees 'used to be mostly male, about forty percent of recent CCI: San Diego attendees are female. More than half of the people attending recent cons are under twenty-nine.'", "zh": "书中说观众'过去以男性为主，近期圣地亚哥CCI约40%为女性。近期大会观众超过一半不到29岁。'"}}, {"q": {"en": "In this book's glossary, what does the word 'censorship' mean?", "zh": "在本书词汇表中，'censorship'（审查）一词是什么意思？"}, "options": [{"en": "The omission or suppression of all or part of a publication because its content is considered offensive or threatening.", "zh": "因内容被认为冒犯性或具威胁性，而对出版物全部或部分的删减或压制。"}, {"en": "A group of experts discussing a subject.", "zh": "一组专家讨论某个主题。"}, {"en": "Signatures of famous people.", "zh": "名人的签名。"}, {"en": "Items that are bought or sold.", "zh": "被买卖的物品。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'censorship' as 'the omission or suppression of all or part of a publication, play, or film because its content is considered offensive or threatening' (p. 13).", "zh": "词汇表把 censorship 定义为'因内容被认为冒犯性或具威胁性，而对出版物、戏剧或电影全部或部分的删减或压制'（第13页）。"}}, {"q": {"en": "What is the author's main purpose in writing this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"en": "To inform readers about comic cons—what they are, their history, and why they are popular in modern culture.", "zh": "向读者介绍漫画大会——它们是什么、历史如何，以及为何在现代文化中流行。"}, {"en": "To persuade readers to become professional artists.", "zh": "劝说读者成为职业艺术家。"}, {"en": "To teach readers how to draw Spider-Man.", "zh": "教读者如何画蜘蛛侠。"}, {"en": "To tell a made-up story about a superhero.", "zh": "讲述一个关于超级英雄的虚构故事。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book explains what comic cons are, their origin (Shel Dorf), cosplay, celebrities, the exhibit hall, and why they boomed—showing it is informational.", "zh": "本书讲解了漫画大会是什么、起源（谢尔·多夫）、角色扮演、名人、展厅，以及它们为何兴起——说明它是知识说明类。"}}, {"q": {"en": "What award did Art Spiegelman win for his graphic memoir Maus?", "zh": "阿特·斯皮格曼凭借图像小说回忆录《鼠族》获得了什么奖项？"}, "options": [{"en": "The Pulitzer Prize.", "zh": "普利策奖（Pulitzer Prize）。"}, {"en": "The Nobel Prize.", "zh": "诺贝尔奖。"}, {"en": "The Oscar.", "zh": "奥斯卡奖。"}, {"en": "The Newbery Medal.", "zh": "纽伯瑞奖（Newbery Medal）。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says, 'Art Spiegelman won a Pulitzer Prize—a highly respected achievement—for his graphic memoir Maus.'", "zh": "书中说：'阿特·斯皮格曼凭借图像小说回忆录《鼠族》赢得了普利策奖——一项备受尊敬的成就。'"}}], "extended": {"prompt": {"en": "The book says some people worry that big comic cons have moved 'away from comic books' and become 'pop culture conventions,' while others welcome the larger, more diverse crowds. Do you think comic cons should stay focused only on comic books, or is it good that they include movies, games, and TV? Explain your view.", "zh": "书中说，有人担心大型漫画大会已经'偏离漫画书'，变成了'流行文化大会'，而另一些人则欢迎更大、更多元的群体。你认为漫画大会应当只聚焦漫画书，还是也应该包含电影、游戏和电视？说说你的看法。"}, "guidance": {"en": ["Look at the 'Growing Pains and Issues' section about the debate over focus and diversity.", "Think about the 'Rise of an Art Form' section and how movies brought new fans."], "zh": ["看'成长的烦恼与问题'一节，关于焦点与多样性的争论。", "想想'一种艺术形式的兴起'一节，电影如何带来了新粉丝。"]}}};</script>
