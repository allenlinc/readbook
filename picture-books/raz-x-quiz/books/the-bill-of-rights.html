ndment outlawed slavery in the United States?", "zh": "哪一条修正案在美国废除了奴隶制？"}, "options": [{"en": "The Thirteenth Amendment (1865).", "zh": "第十三修正案（1865年）。"}, {"en": "The First Amendment.", "zh": "第一修正案。"}, {"en": "The Nineteenth Amendment.", "zh": "第十九修正案。"}, {"en": "The Twenty-sixth Amendment.", "zh": "第二十六修正案。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says the Thirteenth Amendment, passed after the Civil War, outlawed slavery in the United States.", "zh": "书中说内战之后通过的第十三修正案在美国废除了奴隶制。"}}, {"q": {"en": "What did the Fourteenth Amendment do, and how was it used later?", "zh": "第十四修正案做了什么，后来又如何被运用？"}, "options": [{"en": "It granted citizenship and 'equal protection' to all; it became the basis for ending school segregation in 1954.", "zh": "它赋予所有人公民身份与'平等保护'；并成为1954年终结学校种族隔离的依据。"}, {"en": "It gave women the right to vote.", "zh": "它赋予女性投票权。"}, {"en": "It ended the Vietnam War.", "zh": "它结束了越南战争。"}, {"en": "It created the Bill of Rights.", "zh": "它创建了《权利法案》。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says the Fourteenth Amendment made former slaves citizens with equal protection and was key to the 1954 Supreme Court decision ending school segregation.", "zh": "书中说第十四修正案使前奴隶成为享有平等保护的公民，并成为1954年最高法院终结学校种族隔离判决的关键。"}}, {"q": {"en": "In this book, what does the word 'amendment' mean?", "zh": "在这本书中，'amendment'（修正案）一词是什么意思？"}, "options": [{"en": "A change or addition to a document or law.", "zh": "对文件或法律所作的改动或补充。"}, {"en": "A type of court.", "zh": "一种法庭。"}, {"en": "A kind of weapon.", "zh": "一种武器。"}, {"en": "A person who works for the government.", "zh": "为政府工作的人。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines an amendment as 'a change or addition to a document or law.'", "zh": "词汇表把 amendment 定义为'对文件或法律所作的改动或补充'。"}}, {"q": {"en": "What is the author's main purpose in writing this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"en": "To explain what the Bill of Rights is and why it is important.", "zh": "解释《权利法案》是什么，以及它为何重要。"}, {"en": "To persuade readers to break the law.", "zh": "劝说读者违法。"}, {"en": "To tell a fictional pirate story.", "zh": "讲述一个虚构的海盗故事。"}, {"en": "To teach readers how to cook.", "zh": "教读者如何烹饪。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book's focus question asks what the Bill of Rights is and why it is important, then explains each protected right.", "zh": "本书的焦点问题就是'《权利法案》是什么、为何重要'，并逐一解释了受保护的各项权利。"}}], "extended": {"prompt": {"en": "The book tells of students in Des Moines (1965) and Alondra Jones in San Francisco (2000) who stood up for their rights. Why do you think ordinary people sometimes have to fight to make the Bill of Rights real in their own lives?", "zh": "书中讲到得梅因的学生（1965）和旧金山的阿隆德拉·琼斯（2000）挺身维护自己的权利。你认为为什么普通人有时必须去争取，才能让《权利法案》在自己的生活中成为现实？"}, "guidance": {"en": ["Think about the 1969 case where students wore armbands to protest and won under the First Amendment.", "Consider Alondra's story: a court said California denied 'equal protection' under the Fourteenth Amendment."], "zh": ["想想1969年学生戴臂章抗议、并最终依据第一修正案胜诉的案例。", "想想阿隆德拉的故事：法院认定加州违反了第十四修正案的'平等保护'。"]}}};</script>
