he seven natural wonders of the world and extend 2.7 kilometers (1.7 mi.).", "zh": "书中说伊瓜苏瀑布是世界七大自然奇观之一，延伸达2.7公里。"}}, {"q": {"en": "What is the highest mountain peak in the Americas, located in Argentina's Andes?", "zh": "位于阿根廷安第斯山脉、也是美洲最高峰的是哪座山？"}, "options": [{"en": "Mount Aconcagua, at 6,962 meters tall.", "zh": "阿空加瓜山，高6,962米。"}, {"en": "Mount Everest, at over 8,800 meters.", "zh": "珠穆朗玛峰，高逾8,800米。"}, {"en": "The Patagonia Peak, home to the oil industry.", "zh": "巴塔哥尼亚峰，石油工业所在地。"}, {"en": "The Pampas Hill, where gauchos ride.", "zh": "潘帕斯丘陵，高乔人骑马之地。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book states Mount Aconcagua, in the Andes, is the highest mountain peak in the Americas, at 6,962 meters (22,841 ft.).", "zh": "书中说安第斯山脉的阿空加瓜山是美洲最高峰，高6,962米。"}}, {"q": {"en": "In what year did Argentina declare its independence from Spain?", "zh": "阿根廷是在哪一年宣布脱离西班牙独立的？"}, "options": [{"en": "1816.", "zh": "1816年。"}, {"en": "1853, when the Argentine Republic was founded.", "zh": "1853年，阿根廷共和国成立时。"}, {"en": "1880, when Buenos Aires became capital.", "zh": "1880年，布宜诺斯艾利斯成为首都时。"}, {"en": "1983, when democracy returned.", "zh": "1983年，民主回归时。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book's history section says Argentina declared its independence from Spain in 1816, and its national day of independence is July 9.", "zh": "书中历史一节说阿根廷于1816年宣布脱离西班牙独立，国庆日为7月9日。"}}, {"q": {"en": "What is yerba maté, a popular drink in Argentina?", "zh": "阿根廷人爱喝的马黛茶（yerba maté）是什么？"}, "options": [{"en": "A tea made from the dried leaves of the yerba maté plant that gives energy and alertness.", "zh": "一种用马黛植物干叶制成的茶，能提神醒脑。"}, {"en": "A type of wine made from Argentine grapes.", "zh": "一种用阿根廷葡萄酿成的葡萄酒。"}, {"en": "A soft drink invented in Buenos Aires.", "zh": "一种在布宜诺斯艾利斯发明的汽水。"}, {"en": "A sweet pastry filled with fruit.", "zh": "一种包着水果的甜馅饼。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says yerba maté is a tea made from the dried leaves of the yerba maté plant; Argentines say it gives them energy and helps their minds stay alert.", "zh": "书中说马黛茶是用马黛植物干叶制成的茶；阿根廷人说它能提供能量、让人头脑清醒。"}}, {"q": {"en": "Argentina's exports include beef and wine, and its food features Italian pasta and pizza. What does this combination show about the country?", "zh": "阿根廷的出口包括牛肉和葡萄酒，其饮食又有意大利面和披萨。这种组合说明了这个国家的什么特点？"}, "options": [{"en": "It has strong agriculture and was shaped by European immigrants, especially Italians.", "zh": "它农业发达，并深受欧洲移民（尤其是意大利人）影响。"}, {"en": "It has no native food traditions of its own.", "zh": "它自己没有任何本土饮食传统。"}, {"en": "It imports all its food from Asia.", "zh": "它的食物全部从亚洲进口。"}, {"en": "Its people eat only desserts.", "zh": "它的人民只吃甜点。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book notes Argentina is strong in agriculture and that Spanish, French, and Italian immigrants brought their tastes; Italian foods such as pasta and pizza are popular.", "zh": "书中说阿根廷农业发达，且西班牙、法国、意大利移民带来了各自的口味；意大利面食、披萨等很受欢迎。"}}, {"q": {"en": "How do the Andes Mountains and the Pampas region differ in what they provide Argentina?", "zh": "安第斯山脉与潘帕斯地区对阿根廷的贡献有何不同？"}, "options": [{"en": "The Andes form a great natural wall with Chile, while the Pampas are flat, fertile land where many crops are grown.", "zh": "安第斯山是与智利之间的天然屏障，而潘帕斯是平坦肥沃、可种植多种作物的土地。"}, {"en": "Both are deserts with no use to people.", "zh": "两者都是对人无用的沙漠。"}, {"en": "The Pampas are mountains, and the Andes are flat plains.", "zh": "潘帕斯是山脉，安第斯是平原。"}, {"en": "Both are mainly used for oil drilling only.", "zh": "两者都只用于开采石油。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book describes the Andes as a great wall between Chile and Argentina, and the Pampas as a large area of flat, fertile land where people grow many crops.", "zh": "书中把安第斯山描述为智利与阿根廷之间的天然屏障，潘帕斯则是平坦肥沃、可种植多种作物的广阔土地。"}}, {"q": {"en": "In this book, what does the word 'ecotourism' mean?", "zh": "在这本书中，'ecotourism'（生态旅游）一词是什么意思？"}, "options": [{"en": "A type of travel that visits natural places to observe wildlife without causing damage.", "zh": "一种前往自然之地观察野生动物、且不造成破坏的旅行方式。"}, {"en": "Travel by airplane to other continents.", "zh": "乘飞机前往其他大洲的旅行。"}, {"en": "Building cities in the wilderness.", "zh": "在荒野中建造城市。"}, {"en": "A sport played on the Pampas.", "zh": "在潘帕斯进行的一项运动。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'ecotourism' as a type of travel that involves visiting natural places to observe wildlife and explore the environment without causing any damage.", "zh": "词汇表将 ecotourism 定义为前往自然之地观察野生动物、探索环境而不造成破坏的旅行方式。"}}, {"q": {"en": "What is the author's main purpose in writing this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"en": "To inform readers about Argentina's land, people, history, celebrations, and culture.", "zh": "向读者介绍阿根廷的地形、人民、历史、节庆与文化。"}, {"en": "To convince readers to move to Argentina.", "zh": "劝说读者移居阿根廷。"}, {"en": "To tell a fictional story about gauchos.", "zh": "讲述一个关于高乔人的虚构故事。"}, {"en": "To teach readers how to dance the tango.", "zh": "教读者跳探戈。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book is a country profile organized by geography, people, history, food, and culture, showing it is written to inform.", "zh": "全书按地理、人民、历史、饮食、文化组织的国家概况，表明其写作目的是说明介绍。"}}], "extended": {"prompt": {"en": "The book says Argentina is \"solidly shaped by its European roots\" and that most Argentines have European ancestry, yet its native peoples suffered greatly after the Spanish invasion. How do you think a country can honor both its European heritage and the history of its original inhabitants?", "zh": "书中说阿根廷\"深受欧洲根源的塑造\"，多数阿根廷人有欧洲血统，但原住民在西班牙入侵后遭受重创。你认为一个国家如何既能尊重其欧洲传统，又能正视原住民的歷史？"}, "guidance": {"en": ["Think about the book's statement that native peoples lived in Argentina for thousands of years but many died from disease and warfare after the 1500s invasion.", "Consider how the conclusion describes Argentina as committed to equal rights and protecting the environment."], "zh": ["想想书中所述：原住民在阿根廷生活了数千年，但1500年代入侵后许多人死于疾病与战争。", "结合结尾所述：阿根廷致力于平等权利与保护环境。"]}}};</script>
