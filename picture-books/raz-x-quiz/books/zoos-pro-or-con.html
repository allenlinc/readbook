d zoos are, on average, one hundred times smaller than animals' minimum home ranges in the wild.", "zh": "书中\"思考\"框提到，英国研究发现英国野生动物园与动物园的围栏平均比动物野外最小活动范围小一百倍。"}}, {"q": {"en": "Who is the editor of the Springfield Daily Star who introduces the zoo debate?", "zh": "是谁以《斯普林菲尔德每日星报》编辑的身份引出这场动物园争论？"}, "options": [{"en": "Terry Shaw.", "zh": "特里·肖（Terry Shaw）。"}, {"en": "Suzanne McCoy.", "zh": "苏珊娜·麦考伊。"}, {"en": "Jose Gonzales.", "zh": "何塞·冈萨雷斯。"}, {"en": "Roy Chen.", "zh": "罗伊·陈。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book opens with a message from Terry Shaw, Editor of the Springfield Daily Star, who explains the community debate over the zoo's expansion.", "zh": "全书以《斯普林菲尔德每日星报》编辑特里·肖的来信开篇，说明社区围绕动物园扩建的争论。"}}, {"q": {"en": "Tamyra Green's 'Captured by aliens' letter asks readers to imagine being taken by aliens and locked in a small cage. What point is she making about zoos?", "zh": "塔米拉·格林的\"被外星人捕获\"信件让读者想象自己被外星人抓走关进小笼子。她想借此说明动物园的什么问题？"}, "options": [{"en": "Being locked in a zoo takes away an animal's freedom, just as humans would feel if captured.", "zh": "被关在动物园剥夺了动物的自由，正如人类被捕获时也会感受到的那样。"}, {"en": "Animals actually enjoy living in zoos.", "zh": "动物其实喜欢住在动物园。"}, {"en": "Zoos are exactly like alien spaceships.", "zh": "动物园和外星飞船一模一样。"}, {"en": "Humans should visit zoos more often.", "zh": "人类应当更常去动物园。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Tamyra Green's letter uses an analogy: just as a human would hate being captured and caged, it is no different for the animals we capture and force to live in zoos, showing the loss of freedom.", "zh": "塔米拉·格林用类比：正如人类被抓关会痛苦，我们捕获并圈养的动物也一样，说明自由被剥夺。"}}, {"q": {"en": "In the 'From the Editor' section, the editor says zoos are 'complex, controversial' and that each zoo must be considered individually. What is the editor suggesting?", "zh": "在\"编辑按\"一节中，编辑说动物园\"复杂、有争议\"，且每个动物园应被个别看待。编辑想表达什么？"}, "options": [{"en": "We should not label all zoos simply as good or bad; each should be judged on its own.", "zh": "我们不应简单地把所有动物园都贴上\"好\"或\"坏\"的标签；应逐个评判。"}, {"en": "All zoos are exactly the same and all are cruel.", "zh": "所有动物园都一样，且都很残忍。"}, {"en": "All zoos are perfect and should be expanded.", "zh": "所有动物园都完美，应当扩建。"}, {"en": "The debate will be solved very soon.", "zh": "这场争论很快就会解决。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The editor writes that zoos are a complex, controversial topic and that each zoo must be considered individually, since a small roadside zoo differs greatly from a large city zoo with naturalistic enclosures and breeding programs.", "zh": "编辑写道动物园是复杂、有争议的话题，每个应个别看待，因为路边小动物园与拥有自然化围栏和繁育项目的大城市动物园差别很大。"}}, {"q": {"en": "In this book, what does the word 'conservation' mean?", "zh": "在这本书中，'conservation'（保育）一词是什么意思？"}, "options": [{"en": "The protection and preservation of natural resources.", "zh": "对自然资源的保护与保存。"}, {"en": "The capture of wild animals for shows.", "zh": "为展览而捕获野生动物。"}, {"en": "A type of zoo enclosure.", "zh": "一种动物园围栏。"}, {"en": "Causing much disagreement.", "zh": "引发大量分歧。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'conservation' as the protection and preservation of natural resources.", "zh": "词汇表将 conservation 定义为对自然资源的保护与保存。"}}, {"q": {"en": "What is the author's main purpose in writing this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"en": "To present both the pros and cons of zoos so readers can form their own opinion.", "zh": "呈现动物园的利弊双方，让读者形成自己的判断。"}, {"en": "To prove that all zoos should be closed immediately.", "zh": "证明所有动物园都应立即关闭。"}, {"en": "To prove that all zoos are perfect.", "zh": "证明所有动物园都完美无缺。"}, {"en": "To teach readers how to train animals.", "zh": "教读者训练动物。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book prints a selection of readers' letters expressing both pros and cons and ends by inviting readers to decide, showing it aims to present both sides fairly.", "zh": "全书刊登了一系列表达利弊的读者来信，最后邀请读者自行判断，表明其意在公平呈现双方。"}}], "extended": {"prompt": {"en": "The book gives strong points on both sides: zoos can save endangered species like the California condor and teach millions of people, but captivity can cause stress and shortened lives. If your town were deciding whether to expand its zoo, what conditions would you want that zoo to meet? Use details from the book.", "zh": "书中双方都有有力论据：动物园能拯救加州神鹫等濒危物种、教育数百万人，但圈养也会造成压力与寿命缩短。如果你们镇要决定是否扩建动物园，你希望该动物园满足哪些条件？用书中的细节说明。"}, "guidance": {"en": ["Think about the pro points: captive breeding, returning animals to the wild, education, and establishing wildlife refuges.", "Think about the con points: proper enclosure size, following safety guidelines, meeting animals' full range of needs, and avoiding stress behaviors."], "zh": ["想想支持方观点：圈养繁育、放归野外、教育、建立野生动物保护区。", "想想反对方观点：足够的围栏空间、遵守安全规范、满足动物全方位需求、避免应激行为。"]}}};</script>
