rms, benefits people worry would be lost.", "zh": "书中说水坝提供廉价水电（全国最便宜的电力之一）、防洪、通航和为农场灌溉，人们担心失去这些好处。"}}], "extended": {"prompt": {"en": "The book says the best science says some dams should come down, but 'when money and politics are involved, science sometimes gets pushed aside.' If you had to decide, would you remove the four Snake River dams to help salmon, or keep them for cheap power? What would you weigh most?", "zh": "书中说最佳科学建议拆除部分水坝，但'一旦涉及金钱与政治，科学有时会被推到一边'。如果你来做决定，会为了救三文鱼拆除斯内克河的四座水坝，还是为了廉价电力保留它们？你最看重什么？"}, "guidance": {"en": ["The book says the four lower Snake River dams create about 140 miles of slack water that makes migration very hard for salmon.", "It also notes the dams provide some of the cheapest electricity in the country and that removal could cost jobs and raise pollution from other energy sources."], "zh": ["书中说斯内克河下游四座水坝形成约 140 英里的静水，使三文鱼洄游极为困难。", "书中也指出这些水坝提供全美最廉价的电力之一，拆除可能带来失业，并因改用其他能源而增加污染。"]}}};</script>
