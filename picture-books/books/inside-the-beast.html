<script>window.BOOK = {"slug": "inside-the-beast", "title": "Inside the Beast", "titleZh": "野兽之内", "level": "P", "genre": "Fiction", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "The Great Ice Beast Egdirf is called the group's \"protector.\" According to the guide Atenga, what job does the beast do for the people?", "zh": "大冰兽埃格迪尔夫被称为族群的“保护者”。根据向导阿滕加的说法，这只野兽为人们做什么？"}, "options": [{"en": "It protects the food placed inside it from the desert heat and feeds the people", "zh": "它保护放在它体内的食物不被沙漠高温毁坏，并养活人们"}, {"en": "It carries them across the desert", "zh": "它驮着他们穿越沙漠"}, {"en": "It builds their houses", "zh": "它为他们盖房子"}, {"en": "It makes the water", "zh": "它制造水"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Atenga says, \"The beast will protect what is placed inside it from the desert heat. We then feed from it like fleas from a dog.\"", "zh": "阿滕加说：“野兽会保护放在它体内的食物不被沙漠高温毁坏。然后我们像狗身上的跳蚤一样从它身上取食。”"}}, {"q": {"en": "Why had the Great Ice Beast become sick and filled the air with a terrible stench?", "zh": "大冰兽为什么会生病，并让空气中充满难闻的臭味？"}, "options": [{"en": "Because rotten, leftover food had been left inside it", "zh": "因为腐烂的剩饭剩菜被留在了它体内"}, {"en": "Because it caught a cold from the wind", "zh": "因为它染上了风寒"}, {"en": "Because Atenga hit it", "zh": "因为阿滕加打了它"}, {"en": "Because the desert was too hot for it", "zh": "因为沙漠对它来说太热了"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The Wanderer finds \"old fruit that had rotted\" and many leftovers inside; the book says they \"should not have... filled the beast with leftovers that won't be eaten.\"", "zh": "行者发现里面是“已经腐烂的旧水果”和许多剩食；书中说他们不该“把吃不完的剩饭塞满野兽”。"}}, {"q": {"en": "The book says, \"A stench came from within.\" The glossary defines \"stench\" as —", "zh": "书中写道：“一股恶臭从里面传出。”词汇表把“stench”定义为——"}, "options": [{"en": "A really gross smell", "zh": "非常难闻的气味"}, {"en": "A loud noise", "zh": "很大的噪音"}, {"en": "A bright light", "zh": "明亮的光"}, {"en": "A soft touch", "zh": "轻柔的触碰"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines stench as \"a really gross smell (p. 3).\"", "zh": "词汇表把stench定义为“非常难闻的气味（第3页）”。"}}, {"q": {"en": "Inside the beast, the Wanderer found \"cherry tomatoes covered with black mold.\" In the glossary, \"mold\" is —", "zh": "在野兽体内，行者发现了“长满黑霉的圣女果”。在词汇表中，“mold”是——"}, "options": [{"en": "A type of fungus that breaks down living things", "zh": "一种使生物分解的真菌"}, {"en": "A kind of metal", "zh": "一种金属"}, {"en": "A sweet fruit", "zh": "一种甜水果"}, {"en": "A color of paint", "zh": "一种油漆的颜色"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines mold as \"a type of fungus that causes the breakdown of other living things (p. 6).\"", "zh": "词汇表把mold定义为“一种使其他生物分解的真菌（第6页）”。"}}, {"q": {"en": "While cleaning the beast, the Wanderer found many spoiled foods. Which of these did he find covered with black mold?", "zh": "在清理野兽时，行者发现了许多变质的食物。以下哪一项是他发现长满黑霉的？"}, "options": [{"en": "Cherry tomatoes", "zh": "圣女果"}, {"en": "Hard English muffins", "zh": "变硬的英式松饼"}, {"en": "A jug of sour milk", "zh": "一壶变酸的牛奶"}, {"en": "A dried quesadilla", "zh": "一片干硬的墨西哥夹饼"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book lists items found, including \"cherry tomatoes covered with black mold\" and \"a chunk of steak coated with thick, fuzzy ooze.\"", "zh": "书中列出发现的物品，包括“长满黑霉的圣女果”和“裹着厚厚绒毛状黏液的牛排块”。"}}, {"q": {"en": "After the beast is cleaned, what new rule do Atenga and his brothers agree to follow?", "zh": "野兽被清理干净后，阿滕加和他的兄弟们同意遵守什么新规矩？"}, "options": [{"en": "They will put in the beast only what they can take out, not leftover food", "zh": "他们只把能拿出来的东西放进野兽体内，不放剩饭"}, {"en": "They will feed it even more leftovers", "zh": "他们要喂它更多剩饭"}, {"en": "They will never open its mouth again", "zh": "他们再也不打开它的嘴"}, {"en": "They will move to the city", "zh": "他们要搬去城市"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Atenga says, \"We will put in the beast only what we can take out. We will not fill the beast with leftovers that won't be eaten.\"", "zh": "阿滕加说：“我们只把能拿出来的东西放进野兽体内。我们不会把吃不完的剩饭塞满野兽。”"}}, {"q": {"en": "The Wanderer thinks, \"The ice beast did not deserve to be eaten alive from the inside.\" What lesson is the author teaching through this story?", "zh": "行者想：“冰兽不该被从里面活活吃掉。”作者通过这个故事想教什么道理？"}, "options": [{"en": "We should take care of the things that protect and help us", "zh": "我们应该爱护那些保护并帮助我们的事物"}, {"en": "Wild animals are dangerous", "zh": "野生动物很危险"}, {"en": "Food should be thrown away", "zh": "食物应该扔掉"}, {"en": "Deserts are fun", "zh": "沙漠很好玩"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book shows the beast only \"protected food\" yet was abused, and the Wanderer insists it \"did not deserve\" to be eaten from inside, teaching responsibility.", "zh": "书中表明野兽只是“保护食物”却被虐待，而行者坚持它“不该”被从里面吃掉，意在教导责任。"}}, {"q": {"en": "After the Wanderer removes the rotten food, how does the beast react?", "zh": "行者清除腐烂食物后，野兽有什么反应？"}, "options": [{"en": "It almost purred and its breath became clean and fresh again", "zh": "它几乎发出咕噜声，呼吸又变得清新了"}, {"en": "It roared louder", "zh": "它吼得更大声"}, {"en": "It ran away", "zh": "它跑掉了"}, {"en": "It fell asleep forever", "zh": "它永远睡着了"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says, \"The Great Ice Beast Egdirf almost purred. Its breath was clean and fresh again.\"", "zh": "书中说：“大冰兽埃格迪尔夫几乎发出咕噜声。它的呼吸又变得清新了。”"}}, {"q": {"en": "The people fed from the beast \"like fleas from a dog,\" and the beast kept their food safe from heat. What does this comparison show?", "zh": "人们“像狗身上的跳蚤一样”从野兽身上取食，而野兽让食物免受高温。这个比喻说明了什么？"}, "options": [{"en": "The beast acts like a living refrigerator that serves the group", "zh": "野兽就像一台为生存在族群服务的活冰箱"}, {"en": "The people are parasites", "zh": "那些人是寄生虫"}, {"en": "Dogs live in the desert", "zh": "狗生活在沙漠里"}, {"en": "Food grows on trees", "zh": "食物长在树上"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The guide explains they place food in the beast's mouth and it \"will protect what is placed inside it from the desert heat,\" like a cooler.", "zh": "向导解释说他们把食物放进野兽嘴里，它会“保护放在体内的食物不被沙漠高温毁坏”，像一台冷却器。"}}, {"q": {"en": "At the end, Atenga promises to care for the beast and the Wanderer leaves. What is the author's final message?", "zh": "结尾，阿滕加承诺会照顾野兽，行者离开了。作者最后想传达什么？"}, "options": [{"en": "Those who are cared for should also be cared about in return", "zh": "被照顾的对象也应当得到相应的爱护"}, {"en": "Travelers should avoid deserts", "zh": "旅行者应避免去沙漠"}, {"en": "Milk tastes bad", "zh": "牛奶很难喝"}, {"en": "Beasts cannot be saved", "zh": "野兽无法被拯救"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Atenga says, \"We will take better care of the beast,\" showing the story's message of mutual care and responsibility.", "zh": "阿滕加说：“我们会更好地照顾野兽”，体现了故事关于互相关爱与责任的寓意。"}}], "extended": {"prompt": {"en": "The beast protected the people's food, but they abused it by leaving rotten leftovers inside. Tell about something in your own life that helps you and how you should take care of it.", "zh": "野兽保护了人们的食物，可人们却把腐烂的剩饭留在它体内虐待它。讲讲你生活中帮助你的某样东西，以及你该如何爱护它。"}, "guidance": {"en": ["The beast protected food from the desert heat and fed the group.", "The people left old fruit, sour milk, and moldy food inside it.", "The Wanderer cleaned it out so its breath became fresh again.", "Atenga promised to put in only what they can take out."], "zh": ["野兽保护食物不被沙漠高温毁坏，并养活族群。", "人们在它体内留下旧水果、酸牛奶和发霉的食物。", "行者把它清理干净，让它呼吸重新变得清新。", "阿滕加承诺只放能拿出来的东西进去。"]}}};</script>
