<script>window.BOOK = {"slug": "im-the-small-one", "title": "I'm the Small One", "titleZh": "我是小个子", "level": "P", "genre": "Fiction", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "How old is the narrator, Sophie, and what grade is she in?", "zh": "叙述者索菲几岁？她上几年级？"}, "options": [{"en": "Eight years old, in second grade", "zh": "八岁，上二年级"}, {"en": "Ten years old, in fourth grade", "zh": "十岁，上四年级"}, {"en": "Six years old, in kindergarten", "zh": "六岁，上幼儿园"}, {"en": "Twelve years old, in sixth grade", "zh": "十二岁，上六年级"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says, \"At eight years old, I'm smaller than everyone else my age,\" and later Sophie answers \"Second grade\" when asked.", "zh": "书中写道：“我八岁了，比同龄所有人都矮”，后来索菲回答别人说自己是“二年级”。"}}, {"q": {"en": "At the audition for the spring play, what part did Mrs. Alvarez give Sophie?", "zh": "在春季话剧试镜时，阿尔瓦雷斯夫人给了索菲什么角色？"}, "options": [{"en": "The elf, because she was just the right size for the costume", "zh": "小精灵，因为她身材正好合服装"}, {"en": "The lead role of the wandering girl", "zh": "流浪女孩的主角"}, {"en": "The Fairy Queen", "zh": "仙后"}, {"en": "A giant mushroom", "zh": "巨大的蘑菇"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Mrs. Alvarez cried, \"You'll be perfect as the elf! You're just the right size for the costume.\"", "zh": "阿尔瓦雷斯夫人喊道：“你演小精灵最合适了！你的身材正好合服装。”"}}, {"q": {"en": "Sophie says, \"I had practiced all the lines, but I never got a chance to deliver them.\" In the glossary, \"deliver\" means —", "zh": "索菲说：“所有台词我都练过了，却从没机会把它们deliver（说出来）。”在词汇表中，“deliver”的意思是——"}, "options": [{"en": "To say something to a group of people", "zh": "对一群人说出某事"}, {"en": "To write something down", "zh": "把某事写下来"}, {"en": "To throw something away", "zh": "把某物扔掉"}, {"en": "To sing a song", "zh": "唱一首歌"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines deliver as \"to say something to a group of people, often in a formal or dramatic manner (p. 9).\"", "zh": "词汇表把deliver定义为“对一群人说出某事，通常以正式或戏剧化的方式（第9页）”。"}}, {"q": {"en": "After Sophie crawls under the stage and brings Prince out, the book says, \"When we emerged together, the audience clapped and cheered.\" The word \"emerged\" means —", "zh": "索菲爬到舞台下把王子带出来后，书中写道：“当我们emerged（出来）时，观众鼓掌欢呼。”“emerged”的意思是——"}, "options": [{"en": "Came out into view", "zh": "出现、出来"}, {"en": "Fell asleep", "zh": "睡着了"}, {"en": "Hid away", "zh": "躲起来"}, {"en": "Got angry", "zh": "生气了"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines emerged as \"came into view; came out (p. 15).\"", "zh": "词汇表把emerged定义为“进入视线；出来（第15页）”。"}}, {"q": {"en": "During the grand finale, Mrs. Alvarez's dog Prince jumped out of the box but then caused a problem. What happened?", "zh": "在大结局时，阿尔瓦雷斯夫人的狗王子从盒子里跳了出来，却惹了麻烦。发生了什么？"}, "options": [{"en": "He jumped into the giant mushroom, which fell, and he ran under the stage", "zh": "他跳进巨大的蘑菇里，蘑菇倒了，他跑到舞台下面去了"}, {"en": "He bit Mrs. Alvarez", "zh": "他咬了阿尔瓦雷斯夫人"}, {"en": "He ate the script", "zh": "他把剧本吃了"}, {"en": "He flew out the window", "zh": "他从窗户飞了出去"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says Prince \"jumped into the giant mushroom, which fell over,\" then \"leaped off the stage and disappeared underneath it.\"", "zh": "书中说王子“跳进巨大的蘑菇里，蘑菇倒了”，然后“跳下舞台，消失在舞台底下”。"}}, {"q": {"en": "Why was Sophie the only one who could solve the problem with the dog under the stage?", "zh": "为什么索菲是唯一能解决舞台下小狗问题的人？"}, "options": [{"en": "Because she was small enough to squeeze under the stage", "zh": "因为她足够小，能钻到舞台底下"}, {"en": "Because she was the tallest", "zh": "因为她最高"}, {"en": "Because she owned the dog", "zh": "因为那是她的狗"}, {"en": "Because she had a flashlight", "zh": "因为她有手电筒"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Sophie says, \"I'm small enough to squeeze under there,\" and crawls through the dust to reach Prince.", "zh": "索菲说：“我足够小，能钻到那儿底下”，于是爬过灰尘去够王子。"}}, {"q": {"en": "The book's focus question asks what the main character learns about herself. What does Sophie learn by the end?", "zh": "本书的焦点问题是主人公对自己有了什么认识。到结尾时索菲学到了什么？"}, "options": [{"en": "That being small has its advantages", "zh": "个子小也有它的好处"}, {"en": "That she should try to grow taller", "zh": "她应该努力长高"}, {"en": "That she dislikes acting", "zh": "她不喜欢演戏"}, {"en": "That dogs are scary", "zh": "狗很可怕"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book ends, \"I decided that Mom was right, after all: being small has its advantages.\"", "zh": "书的结尾写道：“我终于认定，妈妈是对的：个子小也有它的好处。”"}}, {"q": {"en": "When Sophie and Prince came out from under the stage, how did the audience react?", "zh": "当索菲和王子从舞台下出来时，观众有什么反应？"}, "options": [{"en": "They clapped and cheered, giving them more applause than the stars", "zh": "他们鼓掌欢呼，给的掌声比主角还多"}, {"en": "They booed", "zh": "他们发出嘘声"}, {"en": "They left the theater", "zh": "他们离开了剧场"}, {"en": "They stayed silent", "zh": "他们保持沉默"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says, \"the audience clapped and cheered... we got more applause than the stars at the end of the show.\"", "zh": "书中说：“观众鼓掌欢呼……我们得到的掌声比结尾时主角们还多。”"}}, {"q": {"en": "Before the play, Sophie tried many ways to get taller, like perfect posture and hanging from a tree. What changed her mind?", "zh": "在演戏之前，索菲尝试了许多长高的方法，比如端正姿势、挂在树上。是什么改变了她的想法？"}, "options": [{"en": "She realized being small let her save the dog and be a hero", "zh": "她意识到个子小让她能救狗并成为英雄"}, {"en": "She finally grew very tall", "zh": "她终于长得很高了"}, {"en": "Her mom made her stop", "zh": "妈妈让她停下来"}, {"en": "The teacher forced her", "zh": "老师逼她这样"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "After squeezing under the stage to rescue Prince, Sophie saw that her small size was useful, not a problem.", "zh": "在钻到舞台下救出王子后，索菲发现自己的小个子很有用，而不是问题。"}}, {"q": {"en": "At the very end, Sophie says she stopped worrying about her size. What was the author's main purpose for telling this story?", "zh": "在最后，索菲说她不再为自己的身高而烦恼。作者讲这个故事的主要目的是什么？"}, "options": [{"en": "To show that accepting yourself and your differences is valuable", "zh": "为了说明接纳自己和自己的不同之处是有价值的"}, {"en": "To teach how to build a stage", "zh": "为了教如何搭建舞台"}, {"en": "To explain dog training", "zh": "为了讲解训狗"}, {"en": "To describe a school schedule", "zh": "为了描述学校作息"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The story is a personal journey ending in self-acceptance: \"being small has its advantages.\"", "zh": "这个故事是一段以自我接纳作结的心路历程：“个子小也有它的好处。”"}}], "extended": {"prompt": {"en": "Sophie thought being small was a problem, but she later found it was an advantage. Tell about a time you felt different from others and how you could turn that difference into a strength.", "zh": "索菲曾以为个子小是个问题，但后来发现它也是一种优势。讲讲你曾经觉得自己和别人不同的时刻，以及你如何把这种不同变成一种长处。"}, "guidance": {"en": ["Sophie was smaller than everyone in her grade and even mistaken for a little kid.", "Her mom told her, \"being small has its advantages.\"", "She was the only one small enough to crawl under the stage and rescue the dog.", "By the end she was proud and stopped worrying about her size."], "zh": ["索菲比年级里所有人都矮，甚至被误认为小孩子。", "妈妈告诉她：“个子小也有它的好处。”", "她是唯一能爬到舞台底下救出小狗的人。", "到结尾时她感到自豪，不再为自己的身高烦恼。"]}}};</script>
