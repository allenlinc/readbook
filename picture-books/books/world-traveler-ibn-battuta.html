<script>window.BOOK = {"slug": "world-traveler-ibn-battuta", "title": "World Traveler Ibn Battuta", "titleZh": "周游世界的伊本·白图泰", "level": "P", "genre": "Biography", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Where and when was Ibn Battuta born, and what did he study?", "zh": "伊本·白图泰出生在何处、何时？他又学习了什么？"}, "options": [{"en": "In Spain in 1354, he studied medicine", "zh": "1354年生于西班牙，学医"}, {"en": "In Morocco, northern Africa, in 1304, he studied law", "zh": "1304年生于北非的摩洛哥，学习法律"}, {"en": "In China in 1325, he studied sailing", "zh": "1325年生于中国，学习航海"}, {"en": "In India in 1334, he studied farming", "zh": "1334年生于印度，学习农耕"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says, \"Abu Ibn Battuta was born in 1304 in the country of Morocco in northern Africa. He studied law when he was a young man.\"", "zh": "书中写道：“阿布·伊本·白图泰于1304年出生在北非的摩洛哥。他年轻时学习法律。”"}}, {"q": {"en": "In 1325, at age 21, where did Ibn Battuta set out to travel, and why was it important?", "zh": "1325年，21岁的伊本·白图泰动身前往哪里？那里为什么重要？"}, "options": [{"en": "To China, to meet the emperor", "zh": "去中国，面见皇帝"}, {"en": "To Mecca, a holy place for Muslims", "zh": "去麦加，那是穆斯林的圣地"}, {"en": "To Spain, to study law", "zh": "去西班牙，学习法律"}, {"en": "To India, to become a judge", "zh": "去印度，当法官"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book states he set out in 1325 \"to the city of Mecca... Mecca is a holy place for Muslims.\" Many Muslims try to visit Mecca at least once.", "zh": "书中说他在1325年动身前往“麦加城……麦加是穆斯林的圣地”。许多穆斯林都尽量至少去麦加一次。"}}, {"q": {"en": "The book shows maps with the \"Years of Travel\" (like 1325-1327, 1330-1332) marked on them. What do these map labels help the reader do?", "zh": "书中配有地图，并标出“旅行年份”（如1325-1327、1330-1332）。这些地图标注帮助读者做什么？"}, "options": [{"en": "Learn how to draw pictures", "zh": "学习如何画画"}, {"en": "Follow the route and order of his journeys", "zh": "跟随他的路线和旅程先后顺序"}, {"en": "Find out what food he ate", "zh": "弄清他吃了什么食物"}, {"en": "Count the number of bears", "zh": "数一数有多少只熊"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The maps and dated routes are text features. They help readers see where and when Ibn Battuta traveled, following his journeys across the pages.", "zh": "地图和标好日期的路线是文本特征（图示）。它们帮助读者看清白图泰在何时、去了何处，跟着书页追踪他的旅程。"}}, {"q": {"en": "Why does the author tell us Ibn Battuta traveled \"in the cool of the night using torches\" with large groups?", "zh": "作者为什么要告诉我们，白图泰总是“借着火炬、在夜晚的凉意中”跟着大队伍旅行？"}, "options": [{"en": "To show that travel was dangerous and needed safety in numbers", "zh": "为了说明旅途危险，需要成群结队来保证安全"}, {"en": "To explain that he was afriad of the dark", "zh": "为了说明他怕黑"}, {"en": "To describe his favorite meal", "zh": "为了描写他最爱的一餐"}, {"en": "To say he only traveled in winter", "zh": "为了说他只在冬天旅行"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The author includes these details to help readers understand the risks he faced: groups traveled at night with torches \"to stay safe from bandits.\"", "zh": "作者加入这些细节，是为了让读者明白他面临的艰险：队伍“为了在强盗手中保平安”，才在夜里举着火炬赶路。"}}, {"q": {"en": "In India, what happened to Ibn Battuta after the ruler first welcomed him?", "zh": "在印度，统治者起初欢迎他之后，伊本·白图泰遭遇了什么？"}, "options": [{"en": "He was made a judge, then suspected of treason, guarded, but later forgiven", "zh": "他先被任命为法官，后被怀疑叛国、遭到看管，但最终被原谅"}, {"en": "He became the ruler's cook", "zh": "他成了统治者的厨师"}, {"en": "He left immediately for China", "zh": "他立刻动身去了中国"}, {"en": "He opened a school", "zh": "他开办了一所学校"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says the ruler \"made him a judge,\" later \"suspected Ibn Battuta of treason and placed him under guard,\" and \"Eventually, the ruler forgave Ibn Battuta.\"", "zh": "书中说统治者“任命他为法官”，后来“怀疑白图泰叛国并把他看管起来”，而“最终，统治者原谅了白图泰”。"}}, {"q": {"en": "When Ibn Battuta reached China in 1346, what surprised him about even poor monks and beggars?", "zh": "1346年白图泰到达中国时，就连穷僧人和乞丐身上的什么让他感到惊讶？"}, "options": [{"en": "They rode camels", "zh": "他们骑着骆驼"}, {"en": "They wore clothing made of silk", "zh": "他们穿着丝绸做的衣服"}, {"en": "They spoke Arabic", "zh": "他们说阿拉伯语"}, {"en": "They lived in trees", "zh": "他们住在树上"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says, \"He was surprised that even poor monks and beggars in China had clothing made of silk. Silk was a very expensive fabric in most parts of the world.\"", "zh": "书中说：“他惊讶地发现，在中国就连穷僧人和乞丐都穿着丝绸做的衣服。在世界上大多数地方，丝绸都是非常昂贵的布料。”"}}, {"q": {"en": "The book says Ibn Battuta journeyed 75,000 miles — \"like going all the way around the world three times.\" What is the author's purpose in sharing this number?", "zh": "书中说白图泰旅行了75000英里——“相当于绕地球三圈”。作者分享这个数字的目的是什么？"}, "options": [{"en": "To prove he was an explorer of unknown lands", "zh": "为了证明他是探索未知之地的探险家"}, {"en": "To show the huge distance he traveled and why he is called a great traveler", "zh": "为了展示他旅行距离之远，以及他为何被称为伟大的旅行家"}, {"en": "To teach math", "zh": "为了教数学"}, {"en": "To describe the size of Morocco", "zh": "为了描写摩洛哥的面积"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The author uses the distance to help readers grasp how far he went, supporting the claim that he \"remains one of the greatest travelers in history.\"", "zh": "作者用这个距离帮助读者理解他走得有多远，从而支撑“他仍是史上最伟大的旅行家之一”这一说法。"}}, {"q": {"en": "When Ibn Battuta finally returned home to Morocco in 1349, how long had he been gone and how old was he?", "zh": "1349年白图泰终于回到摩洛哥老家时，他已经离家多久、多少岁了？"}, "options": [{"en": "Gone 10 years, age 31", "zh": "离家10年，31岁"}, {"en": "Gone 24 years, age 45", "zh": "离家24年，45岁"}, {"en": "Gone 5 years, age 26", "zh": "离家5年，26岁"}, {"en": "Gone 50 years, age 80", "zh": "离家50年，80岁"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says, \"In 1349, Ibn Battuta finally arrived back home in Morocco. He had been gone for twenty-four years and was now forty-five years old.\" Both parents had died.", "zh": "书中说：“1349年，白图泰终于回到摩洛哥的家。他已经离家24年，如今45岁了。”他的双亲都已去世。"}}, {"q": {"en": "On his way to China, what chain of troubles did Ibn Battuta face before finally getting there?", "zh": "在前往中国的路上，白图泰在最终到达之前遭遇了一连串什么麻烦？"}, "options": [{"en": "His group was attacked by rebels, their ships were lost in a storm, then a ruler of Sumatra gave him a ship", "zh": "他的队伍遭叛军袭击、船只被风暴毁掉，后来苏门答腊的统治者送了他一艘船"}, {"en": "He got lost in a desert and never left India", "zh": "他在沙漠中迷路，再也没离开印度"}, {"en": "He was made emperor of China", "zh": "他当上了中国的皇帝"}, {"en": "He traveled by airplane", "zh": "他乘飞机旅行"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book connects the events: rebels attacked and split the group, a storm destroyed the ships and lost the treasure, he stayed in islands, and \"the Muslim ruler of Sumatra gave him a ship\" to reach China in 1346.", "zh": "书中把这些事件串起来：叛军袭击使队伍分散，风暴毁掉船只、宝物尽失，他滞留海岛，最后“苏门答腊的穆斯林统治者送了他一艘船”，让他于1346年抵达中国。"}}, {"q": {"en": "The book says Ibn Battuta was \"not an explorer\" because he \"visited no unknown lands,\" yet he is \"one of the greatest travelers in history.\" What point is the author making?", "zh": "书中说白图泰“不是探险家”，因为他“没有去过未知之地”，却仍是“史上最伟大的旅行家之一”。作者想表达什么？"}, "options": [{"en": "That discovering new lands is the only way to be great", "zh": "“发现新陆地”是成伟大的唯一途径"}, {"en": "That traveling far and widely across many countries is impressive even without finding new lands", "zh": "“走得很远、游历众多国家”本身就了不起，哪怕没有发现新陆地"}, {"en": "That he was a poor traveler", "zh": "他是个糟糕的旅行者"}, {"en": "That he never left Africa", "zh": "他从未离开过非洲"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "By contrasting \"not an explorer\" with \"greatest travelers,\" the author shows that the sheer distance and number of countries (dozens) made his journeys remarkable.", "zh": "作者把“不是探险家”与“最伟大的旅行家”对照，说明正是那极远的距离和游历的众多国家（数十个），让他的旅程格外了不起。"}}], "extended": {"prompt": {"en": "Ibn Battuta traveled for more than twenty years and wrote a book about his journeys. If you could travel anywhere in the world, where would you go and what would you want to see or learn?", "zh": "伊本·白图泰旅行了二十多年，还写了一本关于旅行的书。如果你可以去世界上任何地方旅行，你会去哪里？想去看什么或了解什么？"}, "guidance": {"en": ["He was born in Morocco and first traveled to Mecca as a young man.", "He visited many places: Iraq, Iran, India, China, Spain, and Mali in Africa.", "He kept going even after dangers like rebels and storms.", "He wrote down his story so others could learn about the world."], "zh": ["他生于摩洛哥，年轻时第一次前往麦加。", "他游历过许多地方：伊拉克、伊朗、印度、中国、西班牙和非洲的马里。", "即使遇到叛军和风暴等危险，他仍继续前行。", "他把经历写成书，让别人也能了解这个世界。"]}}};</script>
