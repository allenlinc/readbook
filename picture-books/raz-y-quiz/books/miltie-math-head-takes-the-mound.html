rs)?", "zh": "为什么这个秘密联盟要保密比赛（没有奖杯、不上报纸）？"}, "options": [{"en": "So the honor of leading the parade stays meaningful among the kids, not for outside rewards", "zh": "让领头游行的荣誉在孩子间有意义，而非为了外部奖励"}, {"en": "Because it is illegal", "zh": "因为这是违法的"}, {"en": "Because they are ashamed", "zh": "因为他们感到羞耻"}, {"en": "Because adults forbid baseball", "zh": "因为大人禁止棒球"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Miltie explains that if adults found out, there would be trophies and headlines, and the parade honor would mean less.", "zh": "米尔蒂解释，若大人知道就会有奖杯和头条，游行荣誉也就没那么特别了。"}}], "extended": {"prompt": {"en": "Pretend you are Miltie explaining your winning pitching strategy to a younger player. Describe the blooper-then-fastball plan in your own words.", "zh": "假设你是米尔蒂，向一位小选手讲解你的制胜投球策略。用自己的话描述'先吊球、后快球'的计划。"}, "guidance": {"en": ["Explain what a blooper (fatball) pitch looks like.", "Tell how you set up the batter with two bloopers.", "Explain why the surprise fastball worked (psychology/timing)."], "zh": ["说明吊球（肥球）长什么样。", "讲你如何用两个吊球设局。", "解释为什么突如其来的快球奏效（心理/节奏）。"]}}};</script>
