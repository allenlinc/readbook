<script>window.BOOK = {"slug": "the-art-of-photography", "title": "The Art of Photography", "titleZh": "摄影的艺术", "level": "Y", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "According to the book, what does the word 'camera' mean?", "zh": "根据本书，'camera'（相机）一词是什么意思？"}, "options": [{"en": "A type of photograph", "zh": "一种照片"}, {"en": "A dark room or chamber (from Latin)—a dark box with light-sensitive film or a chip", "zh": "黑暗的房间或密室（源自拉丁语）——一个装有感光胶片或芯片的暗箱"}, {"en": "A flash attachment", "zh": "一个闪光灯配件"}, {"en": "A special kind of lens according to some versions of the story in an early draft of the book", "zh": "一种特殊的镜头（按书中另一种说法）（在书的早期草稿中）"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says 'camera' comes from a Latin word meaning 'chamber' or 'dark room,' describing a dark box with light-sensitive film or chip.", "zh": "书中说 camera 源自拉丁语'密室/暗室'，指一个装有感光胶片或芯片的暗箱。"}}, {"q": {"en": "Who created the first popular form of photography called daguerreotypes?", "zh": "是谁创造了被称为达盖尔银版照相法的第一种流行摄影形式？"}, "options": [{"en": "Louis Daguerre, a French inventor, in the 1830s", "zh": "法国发明家路易·达盖尔，在19世纪30年代"}, {"en": "George Eastman of Kodak", "zh": "柯达的乔治·伊士曼"}, {"en": "The ancient Romans around AD 1500 according to some versions of the story", "zh": "公元1500年前后的古罗马人（按书中另一种说法）"}, {"en": "A digital camera company", "zh": "一家数码相机公司"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "In the 1830s, French inventor Louis Daguerre created a way to make sharp pictures in under thirty seconds; his images were called daguerreotypes.", "zh": "19世纪30年代，法国发明家路易·达盖尔发明了不到30秒即可成像的清晰照片法，其影像被称为达盖尔银版照。"}}, {"q": {"en": "When did photography become an affordable hobby for ordinary people?", "zh": "摄影何时成为普通人负担得起的爱好？"}, "options": [{"en": "In the 1830s with daguerreotypes", "zh": "19世纪30年代达盖尔银版照相法出现时"}, {"en": "In the year 2000 with digital cameras", "zh": "2000年数码相机出现时"}, {"en": "Around AD 1500 with the first camera according to some versions of the story", "zh": "约公元1500年第一台相机出现时（按书中另一种说法）"}, {"en": "With the introduction of the Kodak box camera in 1888", "zh": "1888年柯达盒式相机问世时"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "It wasn't until the Kodak box camera in 1888 that photography became lightweight, inexpensive, and an affordable hobby.", "zh": "直到1888年柯达盒式相机问世，摄影才变得轻便、便宜，成为负担得起的爱好。"}}, {"q": {"en": "In film photography, what is a 'negative'?", "zh": "在胶片摄影中，什么是'底片'（negative）？"}, "options": [{"en": "An image that shows the reverse of the scene, with light objects dark and dark objects light", "zh": "呈现场景反像的画面——亮的物体显暗、暗的物体显亮"}, {"en": "A type of camera lens", "zh": "一种相机镜头"}, {"en": "The chemical that develops the film according to some versions of the story in an early draft of the book", "zh": "冲洗胶片的化学药剂（按书中另一种说法）（在书的早期草稿中）"}, {"en": "The final printed photograph", "zh": "最终印出来的照片"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "After developing, you have a negative showing the reverse of the image: light objects look dark and dark objects look light.", "zh": "显影后得到底片，呈现画面的反像：亮的物体显暗，暗的物体显亮。"}}, {"q": {"en": "In the book, what does 'exposure' mean?", "zh": "在本书中，'exposure'（曝光）是什么意思？"}, "options": [{"en": "The amount of light that falls on the film", "zh": "落在胶片上的光量"}, {"en": "The size of the camera", "zh": "相机的大小"}, {"en": "The type of lens used", "zh": "所用镜头的类型"}, {"en": "The number of photos on a roll according to some versions of the story", "zh": "一卷胶卷能拍的张数（按书中另一种说法）"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines exposure as 'the amount of light that falls on film.'", "zh": "术语表将 exposure 定义为'落在胶片上的光量'。"}}, {"q": {"en": "As used in the book, what is 'composition'?", "zh": "如书中用法，什么是'构图'（composition）？"}, "options": [{"en": "The brightness of the flash according to some versions of the story", "zh": "闪光的亮度（按书中另一种说法）"}, {"en": "The cost of the camera", "zh": "相机的价钱"}, {"en": "The speed of the film", "zh": "胶片的速度"}, {"en": "How the objects are arranged in a picture", "zh": "画面中物体的排列方式"}], "answer": 3, "skill": "Craft and Structure", "explain": {"en": "The glossary defines composition as 'how the objects are arranged in a picture.'", "zh": "术语表将 composition 定义为'画面中物体的排列方式'。"}}, {"q": {"en": "What does a film's 'speed' or ISO rating tell you?", "zh": "胶片的'速度'或 ISO 值告诉你什么？"}, "options": [{"en": "How many pictures fit on a roll", "zh": "一卷能拍多少张"}, {"en": "How quickly the film reacts to light; higher numbers need less light and suit dim or action shots", "zh": "胶片对光反应的速度；数值越高所需光越少，适合昏暗或运动拍摄"}, {"en": "The width of the film in millimeters according to some versions of the story in an early draft of the book", "zh": "胶片的毫米宽度（按书中另一种说法）（在书的早期草稿中）"}, {"en": "The color of the photo paper", "zh": "相纸的颜色"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Film speed tells how quickly it reacts to light; 400-speed suits dim/action, 100-speed suits full daylight, and 200 is a good multipurpose choice.", "zh": "胶片速度表示其对光反应快慢：400度适合昏暗/运动，100度适合充足日光，200度是很好的通用选择。"}}, {"q": {"en": "How does the book say digital cameras differ from film cameras?", "zh": "书中说数码相机与胶片相机有何不同？"}, "options": [{"en": "They require more chemicals to develop according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "它们需要更多化学药剂来冲洗（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "They use reusable light-sensitive microchips instead of film, show shots instantly, and let you delete or alter images on a computer", "zh": "它们用可重复使用的感光芯片代替胶片，可即时查看照片，并能在电脑上删除或修改图像"}, {"en": "They were invented before film cameras", "zh": "它们比胶片相机发明得更早"}, {"en": "They can only take black-and-white photos", "zh": "它们只能拍黑白照片"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Digital cameras use reusable light-sensitive microchips, let you preview instantly, delete, and alter images on a computer—no film to waste.", "zh": "数码相机使用可重复使用的感光芯片，可即时预览、删除并在电脑上修改图像，不会浪费胶片。"}}, {"q": {"en": "What is the author's main purpose in writing this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"en": "To tell a fictional story about a photographer", "zh": "讲一个关于摄影师的虚构故事"}, {"en": "To persuade readers to become professional photographers according to some versions of the story", "zh": "劝说读者成为专业摄影师（按书中另一种说法）"}, {"en": "To teach readers how cameras work and how to take better photographs", "zh": "教读者相机如何工作，以及如何拍出更好的照片"}, {"en": "To argue that film is better than digital", "zh": "主张胶片优于数码"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book is an instructional/informational text explaining camera science and practical tips for taking good photos.", "zh": "这是一本说明性/信息类读物，讲解相机原理以及拍好照片的实用技巧。"}}, {"q": {"en": "How does the author encourage the reader throughout the book?", "zh": "作者在全书如何鼓励读者？"}, "options": [{"en": "By saying photography is too expensive for kids", "zh": "说摄影对孩子来说太贵"}, {"en": "By telling readers to avoid using a flash", "zh": "告诉读者避免使用闪光灯"}, {"en": "By urging experimentation, saying not to fear mistakes, and to take lots of pictures while having fun", "zh": "鼓励尝试，说不要害怕犯错，并多拍照片、享受乐趣"}, {"en": "By warning that only experts can take good photos according to some versions of the story in an early draft of the book", "zh": "警告说只有专家才能拍好照片（按书中另一种说法）（在书的早期草稿中）"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "The author repeatedly tells readers to experiment, not fear mistakes, and take a camera everywhere to explore photography for fun.", "zh": "作者反复告诉读者要尝试、不要害怕犯错，并随身带相机、在玩乐中探索摄影。"}}], "extended": {"prompt": {"en": "The book says good composition means arranging what's in your picture thoughtfully. If you were photographing a friend in a park, what are three composition or lighting tips from the book you would use to make the photo better?", "zh": "书中说好的构图意味着用心安排画面内容。如果你要在公园给朋友拍照，会运用书中哪三条构图或用光技巧把照片拍得更好？"}, "guidance": {"en": ["Leave a little room around the head and shoulders and keep the subject between the viewfinder lines.", "Have light coming from behind you, but watch your own shadow and avoid squinting.", "Watch the background so nothing odd (like a branch) appears to stick out of your friend's head."], "zh": ["在头部和肩部周围留一点空间，让主体保持在取景框线内。", "让光从你身后照来，但注意自己的影子，并避免朋友眯眼。", "注意背景，别让奇怪的东西（如树枝）看起来从朋友头上长出来。"]}}};</script>
