g extra", "zh": "他们不额外消耗"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Average Americans use 3 times the food and 250 times the fresh water needed to survive and are called the world's biggest consumers.", "zh": "普通美国人消耗生存所需3倍的食物和250倍的淡水，被称为全球最大的消费者。"}}, {"q": {"en": "If everyone on Earth lived like most Americans, about how many people could Earth support?", "zh": "如果地球上每个人都像大多数美国人那样生活，地球大约能养活多少人？"}, "options": [{"en": "One hundred billion", "zh": "1000亿"}, {"en": "Two billion", "zh": "20亿"}, {"en": "Fifty billion", "zh": "500亿"}, {"en": "Ten billion", "zh": "100亿"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "If everyone lived like most Americans, Earth could support only two billion people because rich countries use over three-quarters of the world's resources.", "zh": "如果人人都像大多数美国人那样生活，地球只能养活20亿人，因为富裕国家消耗了全球逾四分之三的资源。"}}, {"q": {"en": "Burning fossil fuels releases carbon dioxide, which causes what global effect?", "zh": "燃烧化石燃料释放二氧化碳，会导致什么全球效应？"}, "options": [{"en": "More oxygen", "zh": "氧气更多"}, {"en": "Cleaner air", "zh": "空气更洁净"}, {"en": "The oceans freezing", "zh": "海洋冻结"}, {"en": "The planet warming", "zh": "地球变暖"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Burning fossil fuels releases CO2, trapping more heat at Earth's surface and warming the planet, melting ice caps and spreading deserts.", "zh": "燃烧化石燃料释放二氧化碳，在地球表面截留更多热量，使地球变暖，冰盖融化、沙漠扩张。"}}, {"q": {"en": "Why does the book compare the ecological footprints of the USA (5 planets) and India (0.4 planets)?", "zh": "本书为何比较美国（5个地球）和印度（0.4个地球）的生态足迹？"}, "options": [{"en": "To list countries according to some versions of the story in an early draft of the book", "zh": "为了列出国家（按书中另一种说法）（在书的早期草稿中）"}, {"en": "To show wealthy nations use far more resources per person", "zh": "为了说明富裕国家人均消耗资源远多"}, {"en": "To teach math", "zh": "为了教数学"}, {"en": "To promote travel", "zh": "为了推广旅游"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The comparison shows rich countries like the USA need several planets if everyone lived that way, highlighting unequal resource use.", "zh": "该比较表明，若人人都像美国那样生活需要多个地球，凸显资源消耗的不平等。"}}, {"q": {"en": "What is the author's closing message in 'An Island in Space'?", "zh": "作者在“太空中的岛屿”一节传达了什么结尾信息？"}, "options": [{"en": "Earth is our 'little island in space' whose limited resources we must protect", "zh": "地球是我们“太空中的小岛”，必须保护其有限资源"}, {"en": "The Rapanui were wrong", "zh": "拉帕努伊人错了"}, {"en": "Resources are endless", "zh": "资源是无限的"}, {"en": "People should move to other planets according to some versions of the story in an early draft of the book", "zh": "人们应移居其他星球（按书中另一种说法）（在书的早期草稿中）"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The authors urge us to learn from the Rapanui and protect Earth's limited resources, our own little island in space.", "zh": "作者敦促我们吸取拉帕努伊人的教训，保护地球——我们太空中的小岛——的有限资源。"}}], "extended": {"prompt": {"en": "What is one change your family could make to reduce your ecological footprint?", "zh": "你家可以做哪一项改变来减小生态足迹？"}, "guidance": {"en": ["Name the change", "Explain how it saves resources", "Say why it matters"], "zh": ["说出改变", "解释它如何节省资源", "说明其重要性"]}}};</script>
