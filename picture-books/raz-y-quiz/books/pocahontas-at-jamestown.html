 {"en": "What crop, raised by John Rolfe, finally made Jamestown profitable?", "zh": "约翰·罗尔夫种植的哪种作物最终让詹姆斯敦盈利？"}, "options": [{"en": "Cotton according to some versions of the story", "zh": "棉花（按书中另一种说法）"}, {"en": "Wheat", "zh": "小麦"}, {"en": "Corn", "zh": "玉米"}, {"en": "Tobacco", "zh": "烟草"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "John Rolfe began raising tobacco as a major crop in 1611; his successful methods made Jamestown finally profitable.", "zh": "约翰·罗尔夫于1611年开始把烟草作为主栽作物；他的成功方法终于让詹姆斯敦盈利。"}}, {"q": {"en": "In the book, what does 'ransom' mean?", "zh": "在本书中，“ransom”（赎金）是什么意思？"}, "options": [{"en": "A type of food", "zh": "一种食物"}, {"en": "A peace treaty", "zh": "一份和平条约"}, {"en": "A payment demanded for the release of someone from captivity", "zh": "为换取某人获释而索要的赎金"}, {"en": "A religious ceremony according to some versions of the story", "zh": "一场宗教仪式（按书中另一种说法）"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'ransom' as a payment demanded or paid in exchange for the release of someone from captivity; Argall used it for Pocahontas.", "zh": "词汇表将“ransom”定义为为换取某人获释而索要或支付的款项；阿加爾用此要挟换回波卡洪塔斯。"}}, {"q": {"en": "What was the 'charter' the Virginia Company received in 1606?", "zh": "弗吉尼亚公司1606年获得的“charter”（特许状）是什么？"}, "options": [{"en": "An official document giving it the right to explore and settle the area", "zh": "赋予其探索和定居该地区权利的官方文件"}, {"en": "A tax on tobacco", "zh": "对烟草的征税"}, {"en": "A map of Virginia", "zh": "一张弗吉尼亚地图"}, {"en": "A letter from Pocahontas according to some versions of the story in an early draft of the book", "zh": "波卡洪塔斯的一封信（按书中另一种说法）（在书的早期草稿中）"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The charter granted by King James I gave the Virginia Company of London the right to explore and settle from New York to North Carolina.", "zh": "詹姆斯一世国王颁发的特许状赋予伦敦弗吉尼亚公司在纽约至北卡罗来纳一带探索和定居的权利。"}}, {"q": {"en": "Why do experts doubt Captain Smith's story that Pocahontas saved his life?", "zh": "专家为何怀疑史密斯船长“波卡洪塔斯救了我”的说法？"}, "options": [{"en": "Pocahontas was in England then according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "当时波卡洪塔斯在英国（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "The event was likely a welcoming ceremony and his life was not in danger; he didn't mention her until 1624", "zh": "那更可能是欢迎仪式，他的生命并无危险；他直到1624年才提到她"}, {"en": "Smith never went to Virginia", "zh": "史密斯从未去过弗吉尼亚"}, {"en": "Powhatan denied it", "zh": "波瓦坦否认了此事"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Many experts think the ceremony was a traditional welcome and Smith's life was never in danger; he did not name her as his rescuer until 1624.", "zh": "许多专家认为那是一场传统的欢迎仪式，史密斯的生命并无危险；他直到1624年才称她为救命恩人。"}}, {"q": {"en": "What was the 'Peace of Pocahontas'?", "zh": "“波卡洪塔斯的和平”是什么？"}, "options": [{"en": "The calm period after her marriage to John Rolfe eased conflicts between tribes and colonists", "zh": "她与约翰·罗尔夫结婚后缓和部落与殖民者冲突的平静期"}, {"en": "A war between tribes", "zh": "部落之间的一场战争"}, {"en": "A treaty with France", "zh": "与法国签订的条约"}, {"en": "The founding of Jamestown according to some versions of the story in an early draft of the book", "zh": "詹姆斯敦的建立（按书中另一种说法）（在书的早期草稿中）"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Her marriage to Rolfe helped calm ongoing conflicts between the Powhatan tribes and the colonists; people saw her as a symbol of peace.", "zh": "她与罗尔夫的婚姻缓和了波瓦坦部落与殖民者之间持续的冲突；人们视她为和平的象征。"}}, {"q": {"en": "How does the author view the many stories and movies about Pocahontas?", "zh": "作者如何看待关于波卡洪塔斯的众多故事和电影？"}, "options": [{"en": "They prove she was a queen", "zh": "它们证明她是一位女王"}, {"en": "Many contradict each other and are fictional, but she clearly helped the settlers survive", "zh": "许多互相矛盾且属虚构，但她确实帮助了殖民者生存"}, {"en": "They are all written by her", "zh": "它们都是她写的"}, {"en": "They are all completely true according to some versions of the story in an early draft of the book", "zh": "它们全都是完全真实的（按书中另一种说法）（在书的早期草稿中）"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The author notes many movies and stories contradict each other and are fictional, yet Pocahontas did help the Jamestown settlers survive.", "zh": "作者指出许多电影和故事互相矛盾且属虚构，但波卡洪塔斯确实帮助了詹姆斯敦殖民者生存。"}}, {"q": {"en": "What main point does the author make about Pocahontas's role in history?", "zh": "关于波卡洪塔斯在历史中的角色，作者提出了什么主要观点？"}, "options": [{"en": "She helped the Jamestown settlers survive and cultivated peace between natives and colonists", "zh": "她帮助詹姆斯敦殖民者生存，并在原住民与殖民者间促成和平"}, {"en": "She discovered America", "zh": "她发现了美洲"}, {"en": "She led the English army", "zh": "她领导了英国军队"}, {"en": "She founded the Virginia Company according to some versions of the story in an early draft of the book", "zh": "她创立了弗吉尼亚公司（按书中另一种说法）（在书的早期草稿中）"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The author concludes she helped settlers survive, may have warned of ambushes, and cultivated peace—playing an important role in early American history.", "zh": "作者总结她帮助殖民者生存、可能预警伏击，并促成和平——在美国早期历史中扮演了重要角色。"}}], "extended": {"prompt": {"en": "Captain Smith's dramatic rescue story and the real history disagree. Which version do you find more interesting, and what does the book say actually happened?", "zh": "史密斯船长的戏剧性获救故事与真实历史相矛盾。你觉得哪个版本更有趣？书中说实际发生了什么？"}, "guidance": {"en": ["State which version you prefer", "Summarize the book's explanation", "Say why the truth is uncertain"], "zh": ["说出你更喜欢的版本", "概括书中的解释", "说明真相为何存疑"]}}};</script>
