<script>window.BOOK = {"slug": "battling-for-independence", "title": "Battling for Independence", "titleZh": "为独立而战", "level": "Y", "genre": "History", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Which event marked the beginning of the American Revolutionary War?", "zh": "哪一事件标志着美国独立战争的开始？"}, "options": [{"en": "The signing of the Declaration of Independence in 1776", "zh": "1776年《独立宣言》的签署"}, {"en": "Shots exchanged at Lexington and Concord on April 19, 1775", "zh": "1775年4月19日列克星数和康科德的交火"}, {"en": "The British surrender at Yorktown in 1781", "zh": "1781年英军在约克镇的投降"}, {"en": "The Olive Branch Petition to King George III", "zh": "向英王乔治三世呈递的橄榄枝请愿书"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says the first shot at Lexington and Concord on April 19, 1775 became known as 'the shot heard round the world,' signaling the start of the war.", "zh": "书中说，1775年4月19日列克星数和康科德的第一声枪响被称为“举世闻名的枪声”，标志着战争开始。"}}, {"q": {"en": "Whom did the Second Continental Congress choose to command the Continental Army?", "zh": "第二次大陆会议选择谁来指挥大陆军？"}, "options": [{"en": "Benedict Arnold", "zh": "本尼迪克特·阿诺德"}, {"en": "Thomas Jefferson", "zh": "托马斯·杰斑逊"}, {"en": "George Washington", "zh": "乔治·华盛顿"}, {"en": "Ethan Allen", "zh": "伊桐·艾伦"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "On May 10, 1775, the Second Continental Congress unanimously chose George Washington to command the colonial troops.", "zh": "1775年5月10日，第二次大陆会议一致推举乔治·华盛顿指挥埔民地军队。"}}, {"q": {"en": "What was the Olive Branch Petition sent to King George III?", "zh": "呈递给英王乔治三世的“橄榄枝请愿书”是什么？"}, "options": [{"en": "A formal declaration of war against Britain", "zh": "对英国正式宣战的文件"}, {"en": "A peace offering asking the king to grant colonists' rights", "zh": "请求国王给予埔民地人民权利的和平请愿"}, {"en": "A pamphlet written by Thomas Paine", "zh": "托马斯·潘恩写的小册子"}, {"en": "The official flag of the new republic", "zh": "新共和国的正式国旗"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The Olive Branch Petition was a peaceful appeal to King George III asking for the colonists' rights; he refused even to read it.", "zh": "“橄榄枝请愿书”是一份请求英王给予埔民地权利的和平诉求；乔治三世连看都不看就拒绝了。"}}, {"q": {"en": "At the Battle of Bunker Hill, what did Patriot officers tell soldiers to do to save gunpowder?", "zh": "在邦克山战役中，爱国者军官告诉士兵们为了节省火药要怎么做？"}, "options": [{"en": "Fire as quickly as possible", "zh": "尽快开火"}, {"en": "Wait until they saw 'the whites of their eyes'", "zh": "等到能看见敌人“眼白”时再开火"}, {"en": "Retreat immediately to Boston", "zh": "立即撤退到波士顿"}, {"en": "Surrender to the British", "zh": "向英军投降"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Because they had very little gunpowder, officers told soldiers to wait until the British were very close: 'Wait until you see the whites of their eyes.'", "zh": "由于火药极少，军官命令士兵等到英军非常近时才开火：“等到能看见他们的眼白再打。”"}}, {"q": {"en": "The author calls the first shot of the war 'the shot heard round the world.' What does this phrase suggest?", "zh": "作者称战争的第一枪为“举世闻名的枪声”。这个表述暗示了什么？"}, "options": [{"en": "It was a small, unimportant local event", "zh": "它是一次微不足道的本地小事件"}, {"en": "Its impact was so great it was known far beyond America", "zh": "它的影响极其重大，远播美国之外"}, {"en": "It was fired in a round-shaped field", "zh": "它是在一块圆形场地上发射的"}, {"en": "It was fired by King George III himself", "zh": "它是由乔治三世本人发射的"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The phrase is figurative language showing the battle's enormous, world-known significance as the start of a new nation.", "zh": "这句话是比喻，表明这场战役作为新国家开端具有举世睹目的重大意义。"}}, {"q": {"en": "The book uses a table of contents and chapters like 'The Patriots Take Ticonderoga' and 'Bunker Hill.' What text structure does this show?", "zh": "本书使用了目录以及“爱国者攻占提康德罗加堡”“邦克山”等章节。这体现了什么文本结构？"}, "options": [{"en": "Alphabetical order of names", "zh": "按姓名首字母排序"}, {"en": "A sequential, chronological order of historical events", "zh": "按历史事件发生的时间顺序组织"}, {"en": "A comparison between two countries", "zh": "两个国家之间的对比"}, {"en": "A fictional, made-up plot", "zh": "虚构编造的情节"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The chapters follow the order in which the battles and events actually happened, a chronological text structure.", "zh": "各章节按战役和事件实际发生的先后顺序排列，属于时间顺序的文本结构。"}}, {"q": {"en": "Which battle does the book describe as the turning point that convinced France to help the Patriots?", "zh": "书中将哪一场战役描述为促使法国加入战争支持爱国者的转折点？"}, "options": [{"en": "The Battle of Long Island", "zh": "长岛战役"}, {"en": "The Battle of Saratoga", "zh": "萨拉托加战役"}, {"en": "The Battle of Monmouth", "zh": "蒙茅斯战役"}, {"en": "The Battle of Camden", "zh": "卡姆登战役"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The Battle of Saratoga (October 1777) was a turning point that proved to France the Patriots might win; France then sent supplies and joined the war.", "zh": "1777年10月的萨拉托加战役是转折点，让法国相信爱国者可能获胜，于是法国送来物资并参战。"}}, {"q": {"en": "The book includes a feature on Nathan Hale with his last words. How does this help the reader?", "zh": "书中介绍了内森·黑尔及其临终遗言。这对读者有什么帮助？"}, "options": [{"en": "It shows how the British won at Trenton", "zh": "它说明了英军如何在特伦顿获胜"}, {"en": "It shows the bravery and sacrifice of Patriot spies", "zh": "它展现了爱国者间谍的勇敢与牺牲"}, {"en": "It explains how to sew a flag", "zh": "它解释了如何缝制国旗"}, {"en": "It describes the design of British cannons", "zh": "它描述了英军大炮的设计"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Nathan Hale, a 21-year-old teacher and spy, said 'I regret that I have but one life to give for my country,' showing Patriot sacrifice.", "zh": "21岁的教师边间谍内森·黑尔留下遗言“我遗憾只有一次生命献给我的神圣”，展现了爱国者的牺牲精神。"}}, {"q": {"en": "Why does the author include a 'Words to Know' glossary and 'Thinking Critically' boxes?", "zh": "作者为什么要包含“须知词汇”表以及“批判性思考”栏目？"}, "options": [{"en": "To entertain with a fictional love story", "zh": "用虚构的爱情故事来娱乐读者"}, {"en": "To build vocabulary and prompt readers to reflect", "zh": "帮助读者积累词汇并引导其思考"}, {"en": "To advertise other books for sale", "zh": "为其他在售书籍做广告"}, {"en": "To list the battles in alphabetical order", "zh": "按字母顺序列出各场战役"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "These features support readers' understanding of difficult words and encourage them to reflect on the content.", "zh": "这些设计帮助读者理解难词，并引导他们对读到的内容进行反思。"}}, {"q": {"en": "What is the author's main purpose in writing Battling for Independence?", "zh": "作者撰写《为独立而战》的主要目的是什么？"}, "options": [{"en": "To argue that Britain was right to tax the colonies", "zh": "论证英国对埔民地征税是正确的"}, {"en": "To explain how the war's battles led to the creation of the United States", "zh": "解释这场战争的各战役如何促成了美国的建立"}, {"en": "To teach readers how to play cricket", "zh": "教读者如何打板球"}, {"en": "To describe daily life in modern America", "zh": "描述现代美国的日常生活"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The Focus Question asks how the battles led to the creation of the United States, which is the book's central purpose.", "zh": "本书的聚焦问题就是“这些战役如何促成美利坚合众国的建立”，这正是全书的核心目的。"}}], "extended": {"prompt": {"en": "Imagine you are a soldier in the Continental Army at Valley Forge. Write a journal entry describing the challenges you face and why you keep fighting for independence.", "zh": "设想你是福吉谷（Valley Forge）大陆军中的一名士兵。写一篇日记，描述你所面临的艰难，以及你为何坚持为独立而战。"}, "guidance": {"en": ["Describe the harsh winter conditions and lack of supplies.", "Explain your belief in the cause of independence.", "Mention a specific battle or leader from the book."], "zh": ["描述严冬的恶劣环境与物资丏乏。", "说明你对独立事业的信念。", "提及书中某场具体战役或某位领袖。"]}}};</script>
