 "skill": "Key Ideas and Details", "explain": {"en": "In 1848 an explosion shot a three-foot iron rod through Gage's head; he survived but lost part of his frontal lobe and his personality changed.", "zh": "1848年一次爆炸将一根三英尺长的铁棍射穿盖奇的头；他活了下来，却失去部分额叶，性格随之改变。"}}, {"q": {"en": "According to the book, which hemisphere generally controls speech, writing, and math?", "zh": "根据本书，通常哪个半球控制语言、书写和数学？"}, "options": [{"en": "The left hemisphere", "zh": "左半球"}, {"en": "The right hemisphere", "zh": "右半球"}, {"en": "The brain stem", "zh": "脑干"}, {"en": "The cerebellum", "zh": "小脑"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says the left brain generally controls speech, writing, and math skills, while the right brain handles creativity and visual interpretation.", "zh": "书中说左脑通常控制语言、书写和数学，右脑则负责创造力与视觉解读。"}}, {"q": {"en": "In the book, what are 'neurons'?", "zh": "在本书中，什么是'neurons'（神经元）？"}, "options": [{"en": "Nerve cells that carry information within the brain and between the brain and the body", "zh": "在脑内以及脑与身体之间传递信息的神经细胞"}, {"en": "The four sections of the cerebrum", "zh": "大脑的四个分区"}, {"en": "A type of brain injury", "zh": "一种脑损伤"}, {"en": "The fluid that protects the brain", "zh": "保护大脑的液体"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines neurons as 'nerve cells that carry information within the brain and between the brain and other parts of the body.'", "zh": "术语表将 neurons 定义为'在脑内以及脑与身体其他部分之间传递信息的神经细胞'。"}}, {"q": {"en": "As used in the book, what is the 'corpus callosum'?", "zh": "如书中用法，什么是'corpus callosum'（胼胝体）？"}, "options": [{"en": "A bundle of nerves that connects the two hemispheres and carries messages between them", "zh": "连接左右两个半球、在它们之间传递信息的一束神经"}, {"en": "The part of the brain that controls balance", "zh": "控制平衡的大脑部位"}, {"en": "A machine that measures brain activity", "zh": "测量大脑活动的机器"}, {"en": "The section of the brain that governs emotions", "zh": "掌管情绪的大脑分区"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The book describes the corpus callosum as a bundle of nerves connecting the hemispheres and carrying messages between them.", "zh": "书中把胼胝体描述为连接两半球、在它们之间传递信息的一束神经。"}}, {"q": {"en": "How does an fMRI show which brain regions are active, according to the book?", "zh": "根据本书，fMRI 如何显示哪些脑区处于活跃状态？"}, "options": [{"en": "By measuring blood flow, since active neurons need more oxygen, and it can detect deep brain activity", "zh": "通过测量血流——活跃的神经元需要更多氧气——并能探测大脑深层的活动"}, {"en": "By measuring electrical signals only on the brain's surface", "zh": "只测量大脑表面的电信号"}, {"en": "By counting the number of neurons", "zh": "通过数神经元的数量"}, {"en": "By listening to the person's thoughts directly", "zh": "通过直接聆听人的思想"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "An fMRI identifies active regions by measuring blood flow; active neurons need more oxygen, and this method detects deep brain activity better than EEG.", "zh": "fMRI 通过测量血流来识别活跃区域；活跃的神经元需要更多氧气，这种方法比脑电图更能探测大脑深层活动。"}}, {"q": {"en": "According to the book, which habits help keep the brain healthy?", "zh": "根据本书，哪些习惯有助于保持大脑健康？"}, "options": [{"en": "Using the brain (mental exercise), getting physical exercise, enough sleep, and wearing a helmet for protection", "zh": "动脑（脑力锻炼）、进行体育锻炼、保证充足睡眠，以及戴头盔进行保护"}, {"en": "Avoiding all reading and sleeping as little as possible", "zh": "避免一切阅读并尽量少睡"}, {"en": "Only eating sugar and never exercising", "zh": "只吃糖且从不锻炼"}, {"en": "Watching TV all day instead of sleeping", "zh": "整天看电视而不睡觉"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says to keep the brain healthy by using it, exercising, sleeping enough, and wearing protective headgear during sports.", "zh": "书中说要保持大脑健康，需多动脑、锻炼、保证睡眠，并在运动时佩戴防护头盔。"}}, {"q": {"en": "What is the author's main purpose in writing this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"en": "To inform readers about how the brain works, how it is studied, and how to keep it healthy", "zh": "向读者介绍大脑如何运作、如何被研究，以及如何保持它的健康"}, {"en": "To persuade readers to become brain surgeons", "zh": "劝说读者成为脑外科医生"}, {"en": "To tell a fictional story about a talking brain", "zh": "讲一个会说话的大脑的虚构故事"}, {"en": "To argue that the brain is not important", "zh": "主张大脑并不重要"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book is an informational science text explaining brain structure, research methods like EEG and fMRI, and brain health.", "zh": "这是一本科普信息类读物，讲解大脑结构、脑电图与功能磁共振等研究方法，以及大脑健康。"}}, {"q": {"en": "How does the author show that the brain is 'amazing'?", "zh": "作者如何说明大脑'奇妙'？"}, "options": [{"en": "By using comparisons such as 2% of weight using 20% of energy, and more neuron connections than stars in 1,500 galaxies", "zh": "用对比说明：2%的体重消耗20%的能量，神经元连接比1500个星系的恒星还多"}, {"en": "By saying it is the smallest organ in the body", "zh": "说它是体内最小的器官"}, {"en": "By claiming it does nothing useful", "zh": "声称它毫无用处"}, {"en": "By comparing it only to a rock", "zh": "只把它和石头作比较"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The author uses striking facts—2% of weight yet 20% of energy, and more connections than stars in 1,500 Milky Way galaxies—to show the brain's wonder.", "zh": "作者用惊人事实——2%体重却耗20%能量、连接数比1500个银河系恒星还多——来展现大脑的奇妙。"}}], "extended": {"prompt": {"en": "The book says the cerebrum 'screens out' some information so you can focus. Describe a moment in your own day when your brain had to ignore distractions to help you concentrate, and why that ability is useful.", "zh": "书中说大脑会'筛除'部分信息以帮助你集中注意力。描述你一天中大脑必须忽略干扰来帮你专注的某个时刻，并说明这种能力为何有用。"}, "guidance": {"en": ["Think of a noisy or busy setting where you still finished a task (classroom, home, outdoors).", "Explain what your brain filtered out and what it kept.", "Connect it to the book's idea that screening information helps focus."], "zh": ["想一个嘈杂或繁忙、你却仍完成任务的场景（教室、家里、户外）。", "说明你的大脑过滤掉了什么、保留了什么。", "把它与书中'筛选信息有助于专注'的观点联系起来。"]}}};</script>
