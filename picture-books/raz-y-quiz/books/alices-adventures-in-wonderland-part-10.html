le to push Alice out, mocking how power abuses rules.", "zh": "国王为了把爱丽丝赶走而现编规则，嘲弄了权力对规则的滥用。"}}, {"q": {"en": "As Alice grows larger, she stops fearing the King and interrupts him boldly. What does her growth suggest?", "zh": "随着爱丽丝越长越大，她不再害怕国王，并大胆打断他。她的'长大'暗示了什么？"}, "options": [{"en": "Her growing size mirrors her growing confidence to stand up to nonsense authority", "zh": "她身形的增长映照出她敢于反抗荒唐权威的信心增长"}, {"en": "She is angry at the food according to some versions of the story in an early draft of the book", "zh": "她在为食物生气（按书中另一种说法）（在书的早期草稿中）"}, {"en": "She is becoming a giant", "zh": "她正在变成巨人"}, {"en": "She wants to leave", "zh": "她想离开"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Her size grows with her courage, letting her challenge the court's silly power.", "zh": "她的身形随勇气一起增长，使她敢于挑战法庭那荒唐的权力。"}}, {"q": {"en": "At the end, Alice's sister imagines all the Wonderland creatures as if real. What does this closing frame show?", "zh": "结尾处，爱丽丝的姐姐把仙境里所有生物都想象得如同真实存在。这个收尾框架说明了什么？"}, "options": [{"en": "The dream was a true history according to some versions of the story in an early draft of the book", "zh": "那场梦是一段真实历史（按书中另一种说法）（在书的早期草稿中）"}, {"en": "The sister is the real Queen", "zh": "姐姐才是真正的王后"}, {"en": "Alice forgot everything", "zh": "爱丽丝全忘了"}, {"en": "The dream blends into shared imagination, and stories live on in those who hear them", "zh": "梦境融入了共同的想象，故事在聆听者心中延续"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The sister's dream shows the tale lives on in imagination and will be passed to children.", "zh": "姐姐的梦表明这个故事在想象中延续，并将传给孩子们。"}}, {"q": {"en": "Why does the author have Alice finally shout 'You're nothing but a pack of cards!' and wake up?", "zh": "作者为什么让爱丽丝最后大喊'你们不过是一副纸牌！'然后醒来？"}, "options": [{"en": "To end the book sadly according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "为了悲伤地结束全书（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "To break the dream's spell, showing it was a dream and giving Alice power over the nonsense", "zh": "为了打破梦境的魔咒，表明那只是梦，并让爱丽丝获得凌驾于荒唐之上的力量"}, {"en": "To teach a lesson", "zh": "为了说教"}, {"en": "To start a war", "zh": "为了发动战争"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "Naming them 'a pack of cards' shatters the illusion and frees Alice from the chaos.", "zh": "称他们'不过是一副纸牌'，击碎了幻象，让爱丽丝从混乱中解脱。"}}, {"q": {"en": "What is the author's main purpose in Part 10?", "zh": "作者撰写第10部分的主要目的是什么？"}, "options": [{"en": "To write a cookbook", "zh": "写一本烹饪书"}, {"en": "To close the adventure by revealing it as a dream and highlighting the power of imagination", "zh": "通过揭示这只是一个梦来收束冒险，并凸显想象力的力量"}, {"en": "To explain real court law", "zh": "讲解真实的法庭法律"}, {"en": "To teach how to play croquet according to some versions of the story in an early draft of the book", "zh": "教人如何打槌球（按书中另一种说法）（在书的早期草稿中）"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "Part 10 wraps up the tale as a dream and celebrates story and imagination.", "zh": "第10部分把故事收束为一场梦，并赞颂了故事与想象的力量。"}}], "extended": {"prompt": {"en": "At the end, Alice's sister imagines all of Alice's adventures in Wonderland. Rewrite the courtroom scene as Alice's sister might imagine it, using her gentle, dreamy tone.", "zh": "结尾处，爱丽丝的姐姐想象出了仙境里爱丽丝的全部冒险。请以姐姐温柔而梦幻的口吻，重写那场法庭戏。"}, "guidance": {"en": ["Use a calm, dreamy voice.", "Keep the key events (trial, verses, cards flying).", "Show how the sister softens the scene with imagination."], "zh": ["用平静、梦幻的语气。", "保留关键事件（审判、诗句、纸牌飞舞）。", "展现姐姐如何用想象柔化了这一场景。"]}}};</script>
