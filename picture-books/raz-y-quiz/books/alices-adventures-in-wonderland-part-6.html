<script>window.BOOK = {"slug": "alices-adventures-in-wonderland-part-6", "title": "Alice's Adventures in Wonderland (Part 6)", "titleZh": "爱丽丝梦游仙境（第6部分）", "level": "Y", "genre": "Fiction", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Why were the three gardeners busily painting the white roses red?", "zh": "三位园丁为什么忙着把白玫瑰涂成红色？"}, "options": [{"en": "They liked the color red better", "zh": "他们更喜欢红色"}, {"en": "They had planted a white rose tree by mistake and feared the Queen would behead them", "zh": "他们不小心种了白玫瑰树，害怕王后会砍他们的头"}, {"en": "The King ordered them to do it", "zh": "国王命令他们这么做"}, {"en": "Red roses grow faster", "zh": "红玫瑰长得更快"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Two explains they put a white tree in by mistake; if the Queen found out, 'we should all have our heads cut off.'", "zh": "园丁二号解释他们误种了白玫瑰树，如果被王后发现，'我们都要被砍头'。"}}, {"q": {"en": "In the Queen's croquet game, what are the balls, mallets, and arches made of?", "zh": "在王后的槌球比赛中，球、球杆和球门分别是什么做的？"}, "options": [{"en": "Wooden balls, metal mallets, stone arches", "zh": "木球、金属杆、石门"}, {"en": "Live hedgehogs (balls), live flamingos (mallets), doubled-up soldiers (arches)", "zh": "活刺猬（球）、活火烈鸟（杆）、蜷起身子的士兵（门）"}, {"en": "Rubber balls, plastic mallets, rope arches", "zh": "橡胶球、塑料杆、绳门"}, {"en": "Apples, sticks, and hoops", "zh": "苹果、树枝和圆环"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Alice finds the balls are live hedgehogs, the mallets live flamingos, and the soldiers double up to make the arches.", "zh": "爱丽丝发现球是活刺猬，球杆是活火烈鸟，士兵们蜷起身来充当球门。"}}, {"q": {"en": "How does Alice save the three gardeners from being beheaded?", "zh": "爱丽丝是如何把三位园丁从被砍头中救下来的？"}, "options": [{"en": "She fights the soldiers", "zh": "她与士兵搏斗"}, {"en": "She hides them in a large flowerpot", "zh": "她把他们藏进一个大花盆里"}, {"en": "She runs to tell the King", "zh": "她跑去告诉国王"}, {"en": "She paints the roses herself", "zh": "她自己动手涂玫瑰"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Alice says 'You shan't be beheaded!' and puts the gardeners into a large flowerpot near her.", "zh": "爱丽丝说'你们不会被砍头！'并把园丁们藏进旁边的大花盆里。"}}, {"q": {"en": "When the Queen screams 'Off with her head!' at Alice, how does Alice react?", "zh": "当王后对爱丽丝大喊'砍她的头！'时，爱丽丝有何反应？"}, "options": [{"en": "She faints in fear", "zh": "她吓得晕倒了"}, {"en": "She says 'Nonsense!' very loudly and decidedly, and the Queen is silent", "zh": "她非常大声而坚定地说'胡说！'，王后便沉默了"}, {"en": "She runs away crying", "zh": "她哭着逃走了"}, {"en": "She bows and apologizes", "zh": "她鞠躬道歉"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Alice replies 'Nonsense!' very loudly and decidedly, and the Queen is left silent.", "zh": "爱丽丝非常大声而坚定地回了一句'胡说！'，王后哑口无言。"}}, {"q": {"en": "According to the glossary, what does the word 'oblong' mean, as used to describe the shape of the soldiers?", "zh": "根据词汇表，用来形容士兵形状的'oblong'是什么意思？"}, "options": [{"en": "Having a long shape", "zh": "细长的形状"}, {"en": "Round like a ball", "zh": "像球一样圆"}, {"en": "Very small", "zh": "非常小"}, {"en": "Covered in diamonds", "zh": "镶满钻石"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines oblong as 'having a long shape.' The soldiers are described as oblong and flat.", "zh": "词汇表将 oblong 定义为'细长的形状'。书中描述士兵们细长而扁平。"}}, {"q": {"en": "The characters are named King, Queen, Knave, and the gardeners/soldiers all look like 'a pack of cards.' What literary device is the story built on?", "zh": "书中人物名叫国王、王后、杰克，而园丁和士兵看起来都像'一副纸牌'。这个故事建立在什么文学手法之上？"}, "options": [{"en": "A playing-card motif/theme", "zh": "扑克牌的主题与意象"}, {"en": "A cooking recipe", "zh": "一份烹饪食谱"}, {"en": "A math equation", "zh": "一道数学方程式"}, {"en": "A real historical event", "zh": "一个真实的历史事件"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Carroll builds Wonderland on a playing-card motif: the characters are literally cards from a deck.", "zh": "卡罗尔以扑克牌为母题构建仙境：这些角色本身就是一副纸牌里的人物。"}}, {"q": {"en": "The live-animal croquet game, where arches walk away and balls crawl off, shows the reader what about Wonderland?", "zh": "球门会走开、球会爬走的活物槌球比赛，向读者展现了仙境的什么特点？"}, "options": [{"en": "Wonderland follows strict sports rules", "zh": "仙境有严格的运动规则"}, {"en": "Normal rules of games and nature do not apply; logic is topsy-turvy", "zh": "正常的游戏与自然法则都不适用，逻辑全然颠倒"}, {"en": "Alice is playing a real English sport", "zh": "爱丽丝在进行一项真正的英国运动"}, {"en": "The Queen is a fair referee", "zh": "王后是一位公正的裁判"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Everything being alive and rule-less shows Wonderland ignores ordinary logic and fair play.", "zh": "一切都活了起来且毫无规则，说明仙境无视寻常的逻辑与公平。"}}, {"q": {"en": "Alice realizes the gardeners, soldiers, and courtiers are 'only a pack of cards.' What does this reveal about the nature of Wonderland?", "zh": "爱丽丝意识到园丁、士兵和朝臣'不过是一副纸牌'。这揭示了仙境的什么本质？"}, "options": [{"en": "Wonderland is a real English palace", "zh": "仙境是一座真实的英国宫殿"}, {"en": "The world is a fantasy made of living playing cards", "zh": "这个世界是由活生生的纸牌构成的幻想之境"}, {"en": "Alice is at a real trial", "zh": "爱丽丝在参加一场真实的审判"}, {"en": "The cards are just a dream of the King", "zh": "这些牌只是国王的梦"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Seeing them as a pack of cards tells the reader Wonderland is a whimsical, card-based fantasy.", "zh": "把他们看作一副纸牌，告诉读者仙境是一个由纸牌构成的随心所欲的幻想世界。"}}, {"q": {"en": "Why does the author have the Queen shout 'Off with his head!' or 'Off with her head!' about once a minute?", "zh": "作者为什么让王后大约每一分钟就大喊一次'砍他的头！'或'砍她的头！'？"}, "options": [{"en": "To teach readers about real law", "zh": "为了向读者讲解真实的法律"}, {"en": "To show her absurd, excessive tyranny and create comedy through exaggeration", "zh": "为了展现她荒谬而过度的暴政，并通过夸张制造喜剧效果"}, {"en": "Because she is kind", "zh": "因为她很善良"}, {"en": "To describe a recipe", "zh": "为了描述一道菜谱"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The repeated cry parodies a tyrant and amuses readers through wild exaggeration.", "zh": "反复出现的喊声戏仿了暴君形象，并用极度夸张逗乐读者。"}}, {"q": {"en": "What is the author's main purpose in Part 6?", "zh": "作者撰写第6部分的主要目的是什么？"}, "options": [{"en": "To entertain by showing a bizarre, rule-breaking croquet game and the Queen's irrational power", "zh": "通过展现一场怪异、打破规则的槌球比赛以及王后失去理性的权力来娱乐读者"}, {"en": "To teach readers how to garden", "zh": "教读者如何做园艺"}, {"en": "To write a history of England", "zh": "写一部英国历史"}, {"en": "To explain chess rules", "zh": "解释国际象棋规则"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Part 6 delights readers with an absurd croquet match that mocks power and ordinary rules.", "zh": "第6部分用一场荒唐的槌球赛逗乐读者，并嘲弄了权力与寻常规则。"}}], "extended": {"prompt": {"en": "The Queen of Hearts rules by shouting 'Off with his head!' Write an essay describing five character traits that best describe the Queen and how she interacts with others.", "zh": "红心王后用大喊'砍他的头！'来统治。写一篇短文，描述最能概括王后的五个性格特征，以及她如何与他人互动。"}, "guidance": {"en": ["Name the trait (e.g., tyrannical, impatient).", "Support it with a detail from the croquet ground or trial.", "Explain how that trait affects other characters."], "zh": ["说出特征（如专横、没有耐心）。", "用槌球场或审判中的一个细节来支撑。", "说明这一特征如何影响其他角色。"]}}};</script>
