道”是什么？"}, "options": [{"en": "A water route through North America to Asia—a shortcut that did not actually exist", "zh": "一条穿过北美通往亚洲的水路——一条实际并不存在的捷径"}, {"en": "A road across the Atlantic Ocean", "zh": "一条横跨大西洋的公路"}, {"en": "A tunnel under the St. Lawrence", "zh": "圣劳伦斯河下的隧道"}, {"en": "A bridge between France and Canada", "zh": "法国与加拿大之间的桥"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Explorers hoped for a northern sea lane to Asia; Champlain searched for it but never found it because no such route existed.", "zh": "探险家希望找到通往亚洲的北方海路；尚普兰寻找过，但从没找到，因为这样的路线并不存在。"}}, {"q": {"en": "Why was the Kirke brothers' conquest of Quebec later considered illegal?", "zh": "为何柯克兄弟对魁北克的征服后来被视为非法？"}, "options": [{"en": "France and England had signed a peace treaty six months earlier", "zh": "法国与英国在六个月前已签署和平条约"}, {"en": "The Kirkes were pirates with no king's permission", "zh": "柯克兄弟是海盗，未经国王许可"}, {"en": "Champlain had already surrendered", "zh": "尚普兰已经投降"}, {"en": "The Pope forbade it", "zh": "教皇禁止此事"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "When Champlain reached England he learned the war was over; a peace treaty signed six months earlier made the Kirkes' conquest illegal, so the land was to be returned.", "zh": "尚普兰抵达英国后得知战争已结束；六个月前签署的和平条约使柯克兄弟的征服成为非法，因此土地应归还法国。"}}, {"q": {"en": "How does the author portray Champlain in 'A Lasting Legacy'?", "zh": "在“持久的遗产”一节中，作者如何描绘尚普兰？"}, "options": [{"en": "With admiration for his exploration and his friendships with Indian nations", "zh": "充满钦佩，赞颂他的探索及与印第安各民族的友谊"}, {"en": "As a failure who lost everything", "zh": "作为一个失去一切的失败者"}, {"en": "As a cruel villain", "zh": "作为一个残忍的恶棍"}, {"en": "As an unimportant figure", "zh": "作为一个无足轻重的人物"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The author says Champlain's gift for friendship with Indian nations helped France build a thriving fur trade and opened new areas for exploration.", "zh": "作者说尚普兰善于与印第安各民族建立友谊，帮助法国建立了繁荣的毛皮贸易，并开辟了新的探索区域。"}}, {"q": {"en": "Why does the author describe the four later wars (1689–1763) between France and Britain?", "zh": "作者为何描述1689至1763年间法国与英国的四次战争？"}, "options": [{"en": "To show New France did not endure as a French colony, though French culture survived", "zh": "为了说明新法兰西未能作为法国殖民地存续，但法国文化保留了下来"}, {"en": "To prove Champlain was a great warrior", "zh": "为了证明尚普兰是伟大的战士"}, {"en": "To explain how Quebec became a U.S. state", "zh": "为了解释魁北克如何成为美国的一个州"}, {"en": "To describe the American Revolution", "zh": "为了描述美国独立战争"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The author notes Champlain hoped New France would endure, but after four more wars France was defeated and its lands came under British rule—yet French origins survived.", "zh": "作者指出尚普兰希望新法兰西作为法国殖民地存续，但四次战争后法国战败，领土归英国统治——不过法国的根基保留了下来。"}}], "extended": {"prompt": {"en": "Which quality of Champlain's (explorer, mapmaker, friend-builder, or leader) do you think mattered most, and why?", "zh": "你认为尚普兰的哪种品质（探险者、制图师、交友者或领导者）最重要？为什么？"}, "guidance": {"en": ["Name the quality", "Give an example from the book", "Explain why it mattered for New France"], "zh": ["说出该品质", "举出书中的例子", "解释它对新法兰西为何重要"]}}};</script>
