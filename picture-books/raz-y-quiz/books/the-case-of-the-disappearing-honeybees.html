ny colonies", "zh": "有多个蜂群的蜂巢"}, {"en": "A forest with no pests", "zh": "没有害虫的森林"}, {"en": "A large farm that grows only a single crop", "zh": "只种植单一作物的庞大农场"}], "answer": 3, "skill": "Craft and Structure", "explain": {"en": "The book says today most farms are massive and grow a single crop such as wheat, corn, or soybeans—called a monoculture.", "zh": "书中说如今大多数农场规模庞大、只种单一作物如小麦、玉米或大豆——这被称为单一栽培。"}}, {"q": {"en": "Besides weakening bees' immune systems, how do systemic pesticides harm bees?", "zh": "除了削弱蜜蜂的免疫系统，内吸式杀虫剂还如何伤害蜜蜂？"}, "options": [{"en": "They target the nervous system, harming learning, memory, and navigation so bees fail to return to the hive", "zh": "它们攻击神经系统，损害学习、记忆和导航能力，使蜜蜂无法返回蜂巢"}, {"en": "They make the honey taste bad", "zh": "它们让蜂蜜变难吃"}, {"en": "They cause flowers to stop blooming according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "它们使花朵停止开放（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "They turn bees into parasites", "zh": "它们把蜜蜂变成寄生虫"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says systemic pesticides target the nervous system and may affect bees' ability to learn, remember, and navigate, so they fail to return after foraging.", "zh": "书中说内吸式杀虫剂攻击神经系统，可能影响蜜蜂学习、记忆和导航的能力，导致它们觅食后无法返回。"}}, {"q": {"en": "Why might Australia avoid the same bee problems despite using systemic pesticides?", "zh": "为什么澳大利亚尽管也使用内吸式杀虫剂，却可能避免同样的蜜蜂问题？"}, "options": [{"en": "Because Australia has no farms", "zh": "因为澳大利亚没有农场"}, {"en": "Because its winters are short and mild, it doesn't move bees between monocultures, and the harmful mite hasn't arrived", "zh": "因为它的冬天短暂温和、不把蜜蜂在单一栽培区间转移，且有害螨虫尚未传入"}, {"en": "Because Australia banned all pesticides according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "因为澳大利亚禁用了所有杀虫剂（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "Because Australian bees don't pollinate", "zh": "因为澳大利亚的蜜蜂不授粉"}], "
