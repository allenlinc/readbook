y defines 'duped' as tricked; the Sheriff was fooled again when Robin's arrow revealed the beggar was really Robin Hood.", "zh": "词汇表将“duped”定义为被愚弄；当罗宾汉的箭揭开乞丐真身时，郡长再次被耍了。"}}, {"q": {"en": "Why did Robin Hood attend the festival in a beggar's rags instead of his green forest suit?", "zh": "罗宾汉为何穿着乞丐的破衣参加节庆，而不是他的绿色森林装？"}, "options": [{"en": "If the Sheriff recognized him, he would be seized and thrown in the dungeon", "zh": "一旦被郡长认出，他就会被抓进地牢"}, {"en": "The festival required rags according to some versions of the story in an early draft of the book", "zh": "节庆要求穿破衣（按书中另一种说法）（在书的早期草稿中）"}, {"en": "He wanted to look rich", "zh": "他想看起来富有"}, {"en": "He had no other clothes", "zh": "他没有别的衣服"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "They realized they couldn't wear the green suits that camouflaged them in the forest, or the Sheriff's guards would seize them.", "zh": "他们意识到不能穿在森林中便于伪装的绿装，否则郡长的卫兵会抓住他们。"}}, {"q": {"en": "How did Robin Hood reveal to the Sheriff that the winning beggar was really him?", "zh": "罗宾汉如何向郡长揭示获胜的乞丐就是他自己？"}, "options": [{"en": "He announced it at the feast according to some versions of the story in an early draft of the book", "zh": "他在宴会上宣布（按书中另一种说法）（在书的早期草稿中）"}, {"en": "He sent an arrow through the window with a note, after scraping the gold off the prize arrow", "zh": "他把金箭刮去金层后，射箭穿窗并附上字条"}, {"en": "He never told him", "zh": "他从未告诉郡长"}, {"en": "He sent a messenger by horse", "zh": "他派骑马的信使"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "A shaft flew through the window into the venison with a note identifying the beggar as Robin Hood; the men had scraped off the gold.", "zh": "一支箭射穿窗户扎进鹿肉，附带的字条说明乞丐就是罗宾汉；手下们已刮去金箭上的金层。"}}, {"q": {"en": "How does the author portray Robin Hood?", "zh": "作者如何刻画罗宾汉？"}, "options": [{"en": "As a cruel murderer", "zh": "作为一个残忍的杀人犯"}, {"en": "As a clever, brave hero who helps the poor and outwits the greedy Sheriff", "zh": "作为一个聪明勇敢、帮助穷人并智胜贪婪郡长的英雄"}, {
