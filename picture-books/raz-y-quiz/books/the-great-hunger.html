劣条件"}, {"en": "Because they sailed only at night", "zh": "因为它们只在夜间航行"}, {"en": "Because they were built out of coffins according to some versions of the story in an early draft of the book", "zh": "因为它们是用棺材造的（按书中另一种说法）（在书的早期草稿中）"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Passengers were packed below deck where disease spread; many died, so the ships were nicknamed 'coffin' ships.", "zh": "乘客被塞在甲板下，疾病蔓延，许多人死亡，因此这些船被称作'棺材船'。"}}, {"q": {"en": "According to the timeline, when was the potato blight first reported, and from where did it spread to Ireland?", "zh": "根据大事年表，马铃薯疫病最早何时被报告，又从哪里蔓延到爱尔兰？"}, "options": [{"en": "In August 1845, spreading from southern Britain, Scotland, Belgium, and Holland", "zh": "1845年8月，从不列颠南部、苏格兰、比利时和荷兰蔓延而来"}, {"en": "In 1852, from the United States according to some versions of the story in an early draft of the book", "zh": "1852年，从美国（按书中另一种说法）（在书的早期草稿中）"}, {"en": "In 1800, from South America", "zh": "1800年，从南美洲"}, {"en": "In 1847, from France", "zh": "1847年，从法国"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The timeline says the first blight was reported in August 1845 and by September had spread from those regions to Ireland.", "zh": "年表显示疫病最早于1845年8月被报告，到9月已从那些地区蔓延到爱尔兰。"}}, {"q": {"en": "In the book, what does the word 'blight' mean?", "zh": "在本书中，'blight'（疫病）一词是什么意思？"}, "options": [{"en": "A disease that damages or destroys plants", "zh": "一种损害或摧毁植物的病害"}, {"en": "A government tax on farmers according to some versions of the story", "zh": "对农民征收的政府税（按书中另一种说法）"}, {"en": "A strong ocean storm", "zh": "一场强烈的海洋风暴"}, {"en": "A type of potato recipe", "zh": "一种土豆食谱"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines blight as 'a disease that damages or destroys plants.'", "zh": "术语表将 blight 定义为'一种损害或摧毁植物的病害'。"}}, {"q": {"en": "As used in the book, what is a 'tenant' farmer?", "zh": "如书中用法，什么是'佃农'（tenant farmer）？"}, "options": [{"en": "A sailor on a coffin ship", "zh": "棺材船上的一名水手"}, {"en": "A person who rents land from a landlord to farm it", "zh": "从地主那里租地耕种的人"}, {"en": "A government worker who collects rent", "zh": "收取租金的政府工作人员"}, {"en": "A wealthy landowner who rents to others according to some versions of the story", "zh": "把土地租给别人的富裕地主（按书中另一种说法）"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "A tenant is a person who rents land from a landlord; most Irish farmers were tenant farmers leasing small plots.", "zh": "佃户是向地主租地的人；大多数爱尔兰农民是租赁小块土地的佃农。"}}, {"q": {"en": "What happened to Ireland's population as a result of the Great Hunger?", "zh": "大饥荒导致爱尔兰人口发生了什么变化？"}, "options": [{"en": "It rose briefly and then doubled", "zh": "短暂上升后翻了一倍"}, {"en": "It grew to over 10 million", "zh": "增长到超过1000万"}, {"en": "It stayed the same at 8.5 million according to some versions of the story", "zh": "维持在850万不变（按书中另一种说法）"}, {"en": "It dropped from over 8.5 million to about 5 million by 1861", "zh": "从超过850万下降到1861年的约500万"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "By 1861 the population had dropped from over 8.5 million to 5 million—more than one in three people were gone.", "zh": "到1861年，人口从超过850万降到500万——超过三分之一的人不见了。"}}, {"q": {"en": "According to the book, how did the Great Hunger affect the United States?", "zh": "根据本书，大饥荒对美国产生了怎样的影响？"}, "options": [{"en": "It had no effect on the United States", "zh": "它对美国毫无影响"}, {"en": "Over five million Irish immigrants arrived (1850–1920), and 40 million Americans claim Irish roots", "zh": "逾五百万爱尔兰移民在1850–1920年间抵达，四千万美国人自称有爱尔兰血统"}, {"en": "It led the U.S. to colonize Ireland", "zh": "它导致美国去殖民爱尔兰"}, {"en": "It caused a famine in America as well according to some versions of the story in an early draft of the book", "zh": "它也在美国引发了一场饥荒（按书中另一种说法）（在书的早期草稿中）"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book notes over five million Irish arrived in the U.S. between 1850 and 1920, and today 40 million Americans claim Irish roots.", "zh": "书中提到1850至1920年间逾五百万爱尔兰人抵达美国，如今四千万美国人自称有爱尔兰血统。"}}, {"q": {"en": "What is the author's main purpose in writing this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"en": "To persuade readers to move to Ireland", "zh": "劝说读者移居爱尔兰"}, {"en": "To entertain with a fairy tale about leprechauns according to some versions of the story in an early draft of the book", "zh": "用一个关于小矮妖的童话来娱乐读者（按书中另一种说法）（在书的早期草稿中）"}, {"en": "To inform readers about the Irish Potato Famine—its causes, suffering, and lasting effects", "zh": "向读者介绍爱尔兰马铃薯饥荒——它的成因、苦难与深远影响"}, {"en": "To teach how to grow potatoes", "zh": "教人如何种植土豆"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book is an informational history of the Great Hunger, explaining its causes, events, and aftermath.", "zh": "这是一本关于大饥荒的信息类历史读物，解释其成因、过程与后果。"}}, {"q": {"en": "How does the author present Britain's response to the famine?", "zh": "作者如何呈现英国对饥荒的应对？"}, "options": [{"en": "As inadequate and unfair—many officials ignored pleas and exported grain while Irish people starved", "zh": "将其描述为不充分且不公——许多官员无视求救，还出口粮食，而爱尔兰人却在挨饿"}, {"en": "As the main cause of the potato blight", "zh": "描述为马铃薯疫病的主因"}, {"en": "As swift and generous, solving the famine quickly according to some versions of the story in an early draft of the book", "zh": "描述为迅速而慷慨，很快解决了饥荒（按书中另一种说法）（在书的早期草稿中）"}, {"en": "As completely unrelated to Ireland", "zh": "描述为与爱尔兰完全无关"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book says many British officials and landowners ignored pleas, exported grain, and that many Irish blamed Britain for not helping more.", "zh": "书中说许多英国官员和地主无视求救、出口粮食，许多爱尔兰人责怪英国援助不力。"}}], "extended": {"prompt": {"en": "The book says the bitterness from the famine 'would help fuel the revolution that finally split Ireland into two countries in 1922.' Why might a natural disaster lead to lasting political change? Use details from the book.", "zh": "书中说饥荒带来的怨恨'助长了最终在1922年将爱尔兰分裂为两个国家的革命'。一场自然灾害为何会引发持久的政治变革？请结合书中细节说明。"}, "guidance": {"en": ["Think about how many Irish people blamed Britain for not helping enough.", "Consider the anger over exported grain and evictions while people starved.", "Connect that bitterness to later demands for independence and partition."], "zh": ["想一想许多爱尔兰人如何责怪英国援助不力。", "考虑在人们挨饿时出口粮食、驱逐佃农所激起的愤怒。", "把这种怨恨与后来独立及分治的要求联系起来。"]}}};</script>
