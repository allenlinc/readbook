ructure", "explain": {"en": "After clay is baked in a kiln, the material is called ceramic and keeps its shape.", "zh": "黏土在窑中烘烤后称为陶瓷，能保持形状。"}}, {"q": {"en": "What is a 'loom' used for?", "zh": "'loom'（织布机）用来做什么？"}, "options": [{"en": "To blow glass", "zh": "吹制玻璃"}, {"en": "To carve stone", "zh": "雕刻石头"}, {"en": "To loop yarn into strips of fabric", "zh": "把纱线交织成布条"}, {"en": "To bake clay", "zh": "烘烤黏土"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "A loom is a machine that loops yarns over and under each other to make fabric.", "zh": "织布机是把纱线上下交织织成布的机器。"}}, {"q": {"en": "How do glassblowers create a bubble inside the hot glass?", "zh": "玻璃吹制师如何在热玻璃内部制造气泡？"}, "options": [{"en": "By blowing air through a long hollow tube called a blowpipe", "zh": "通过长空心管（吹管）吹气"}, {"en": "By hammering it", "zh": "用锤子敲"}, {"en": "By freezing it", "zh": "冷冻它"}, {"en": "By painting it", "zh": "涂色"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Glassblowers scoop hot glass on a blowpipe and blow air through it to form a bubble.", "zh": "玻璃吹制师用吹管蘸取热玻璃，吹气形成气泡。"}}, {"q": {"en": "What is 'found object art'?", "zh": "什么是'found object art'（现成品艺术）？"}, "options": [{"en": "Art made from everyday objects an artist finds", "zh": "用艺术家捡到的日常物品制作的艺术"}, {"en": "Art found in a museum", "zh": "在博物馆里发现的艺术"}, {"en": "Art made by children", "zh": "儿童制作的艺术"}, {"en": "Art painted on walls", "zh": "画在墙上的艺术"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Found object artists use rusty junk, old car parts, wire, and other everyday materials they find.", "zh": "现成品艺术家使用锈铁、旧零件、电线等捡来的日常材料。"}}, {"q": {"en": "What is an art 'installation'?", "zh": "什么是艺术'installation'（装置艺术）？"}, "options": [{"en": "A small painting", "zh": "一幅小画"}, {"en": "A whole room or building made into one work of art", "zh": "整个房间或建筑变成的一件艺术品"}, {"en": "A type of sculpture", "zh": "一种雕塑"}, {"en": "A photograph", "zh": "一张照片"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "An installation is very large, often an entire room or building made into one piece of art.", "zh": "装置艺术体形很大，常把整个房间或建筑变成一件作品。"}}, {"q": {"en": "Where have primitive drawings of animals, made over 13,000 years ago, been found?", "zh": "一万三千多年前的原始动物图画是在哪里被发现的？"}, "options": [{"en": "On city buildings", "zh": "在城市建筑上"}, {"en": "In caves in France and Spain", "zh": "在法国和西班牙的洞穴中"}, {"en": "On the ocean floor", "zh": "在海床上"}, {"en": "In modern museums only", "zh": "仅在现代博物馆"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Caves in France and Spain have primitive drawings of animals made over 13,000 years ago.", "zh": "法国和西班牙的洞穴中有超过一万三千年前的原始动物图画。"}}, {"q": {"en": "What is the main message about art in this book?", "zh": "本书关于艺术的核心信息是什么？"}, "options": [{"en": "Art is only for experts", "zh": "艺术只属于专家"}, {"en": "Art is mysterious and hard to enjoy", "zh": "艺术很神秘且难以欣赏"}, {"en": "Art is all around us and anyone can make and enjoy it", "zh": "艺术无处不在，任何人都能创作并欣赏"}, {"en": "Art must be serious", "zh": "艺术必须严肃"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book ends by telling readers to look for art around them because it is everywhere.", "zh": "本书结尾让读者留意身边的艺术，因为它无处不在。"}}], "extended": {"prompt": {"en": "Look around your home or school. Name one object you think is a work of art and explain why, using ideas from the book.", "zh": "观察你的家或学校，说出一件你认为属于艺术作品的东西，并用书中的观点解释原因。"}, "guidance": {"en": ["Recall the types of artists in the book: painters, sculptors, potters, glassblowers, fiber artists, quilters.", "Remember that even sand castles and found objects can be art."], "zh": ["回想书中各类艺术家：画家、雕塑家、陶艺家、玻璃吹制师、纤维艺术家、拼布师。", "记住沙堡和现成品也可以成为艺术。"]}}};</script>
