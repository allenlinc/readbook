ple", "zh": "他杀害了数千人"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Unlike the Christian takeover in 1099, Saladin did not kill thousands, destroyed no holy places, and let Christians visit them.", "zh": "与1099年基督徒的占领不同，萨拉丁没有屠杀数千人，也没有毁坏圣地，还允许基督徒前往朝圣。"}}, {"q": {"en": "Who was Richard the Lionheart in the book?", "zh": "书中“狮心王理查”是谁？"}, "options": [{"en": "The King of England who led the crusader armies", "zh": "英格兰国王，率领十字军"}, {"en": "A Muslim sultan who ruled Egypt", "zh": "统治埃及的穆斯林苏丹"}, {"en": "Saladin's brother who signed the truce", "zh": "签署休战协定的萨拉丁之弟"}, {"en": "A French knight who became king of Jerusalem", "zh": "成为耶路撒冷王的法国骑士"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "King Richard I of England, called Richard the Lionheart, was one of the European kings who led armies to retake Jerusalem.", "zh": "英格兰国王理查一世史称“狮心王理查”，是率军夺回耶路撒冷的欧洲国王之一。"}}, {"q": {"en": "How does the author organize the story of Saladin's life?", "zh": "作者是如何组织萨拉丁生平故事的？"}, "options": [{"en": "In chronological (time) order from his birth to his death", "zh": "按时间顺序，从出生写到去世"}, {"en": "By listing his battles from most to least important", "zh": "按战役重要程度排序"}, {"en": "As a comparison with other world leaders", "zh": "与其他世界领袖进行对比"}, {"en": "In alphabetical order of places he visited", "zh": "按他到访地点的字母顺序"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The table of contents (Early Years, Becoming a Leader, Going to War, etc.) shows the book follows his life in time order.", "zh": "目录（早年、成为领袖、走向战争等）显示本书按他的人生时间顺序展开。"}}, {"q": {"en": "What kind of leader does the author want readers to see Saladin as?", "zh": "作者希望读者把萨拉丁看作怎样的领袖？"}, "options": [{"en": "A fair, gentle, and kind leader", "zh": "一位公正、温和而仁慈的领袖"}, {"en": "A cruel and frightening conqueror", "zh": "一位残暴可怕的征服者"}, {"en": "A weak ruler who lost every war", "zh": "一位每战必败的软弱统治者"}, {"en": "A rich king who lived in a huge palace", "zh": "一位住在宏伟宫殿里的富有国王"}], "answer": 0, "skill": "Author'
