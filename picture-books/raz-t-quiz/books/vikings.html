": "He lost a sailing race", "zh": "他输了一场划船比赛"}, {"en": "He wanted to find gold", "zh": "他想寻找黄金"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says Eric the Red was often in trouble and was ordered to leave after he killed three men in a fight.", "zh": "书中说红发埃里克常惹麻烦，杀了三人后被判离开冰岛。"}}, {"q": {"en": "What is the author's main purpose in writing Vikings?", "zh": "作者写《维京人》的主要目的是什么？"}, "options": [{"en": "To convince readers that Vikings were only violent raiders", "zh": "让读者相信维京人只是暴力的掠夺者"}, {"en": "To inform readers about who the Vikings were and their explorations and conquests", "zh": "向读者介绍维京人是什么样的人，以及他们的探索与征服"}, {"en": "To teach how to build a longship", "zh": "教读者如何建造长船"}, {"en": "To persuade people to move to Iceland", "zh": "说服人们移居冰岛"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The author explains that Vikings were warriors, explorers, merchants, poets, farmers, and more, and describes their history.", "zh": "作者说明维京人既是战士、探险家，也是商人、诗人、农民等，并描述了他们的历史。"}}, {"q": {"en": "According to the timeline, in what year did Vikings raid the Lindisfarne monastery?", "zh": "根据年表，维京人袭击林迪斯法恩修道院是在哪一年？"}, "options": [{"en": "793", "zh": "793年"}, {"en": "845", "zh": "845年"}, {"en": "911", "zh": "911年"}, {"en": "1066", "zh": "1066年"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The timeline lists '793: Viking raid on Lindisfarne monastery.'", "zh": "年表列出“793年：维京人袭击林迪斯法恩修道院”。"}}, {"q": {"en": "Which common English word does the book say comes from the Viking language?", "zh": "书中说下列哪个常用英语单词来自维京语言？"}, "options": [{"en": "Computer", "zh": "Computer（电脑）"}, {"en": "Window", "zh": "Window（窗户）"}, {"en": "Tomato", "zh": "Tomato（番茄）"}, {"en": "Bicycle", "zh": "Bicycle（自行车）"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book notes about 900 English words come from Viking, including window, sky, skin, skirt, and husband.", "zh": "书中提到约900个英语单词来自维京语，包括 window、sky、skin、skirt、husband 等。"}}], "extended": {"prompt": {"en": "Imagine you are a young Viking who is not the oldest son. Would you stay home or sail to new lands? Explain your choice.", "zh": "想象你是一名不是长子的年轻维京人。你会留在家乡还是出海去新大陆？请解释你的选择。"}, "guidance": {"en": ["Think about why younger sons left—they received no land from their fathers.", "Use facts from the book, such as the dragonships and the search for rich lands.", "Consider both the dangers of sailing and the chance for fame and fortune."], "zh": ["想想年轻儿子离开的原因——他们无法从父亲那里继承土地。", "结合书中事实，如龙头船和对富裕之地的探索。", "权衡航行的危险与获取名望财富的机会。"]}}};</script>
