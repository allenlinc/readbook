ss against a grand master according to some versions of the story in an early draft of the book", "zh": "计算机与国际象棋大师对弈（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Scientists measure a robot's strength", "zh": "科学家测量机器人的力量"}, {"en": "A judge talks to a human and a computer at the same time and tries to tell them apart", "zh": "评委同时与人类和计算机交谈，并试图分辨出谁是谁"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "In the Turing Test, a judge communicates with a human and a computer at the same time; if the judge can't tell the difference, the computer wins.", "zh": "在图灵测试中，评委同时与人类和计算机交流；如果评委分辨不出差别，就算计算机赢。"}}, {"q": {"en": "According to the conclusion, why can't even the best robots replace people?", "zh": "根据结论，为什么即使最先进的机器人也无法取代人类？"}, "options": [{"en": "Humans are creative and adaptable, but even advanced robots are not", "zh": "人类富有创造力和适应力，而即使先进的机器人也不具备"}, {"en": "Robots need too much electricity according to some versions of the story in an early draft of the book", "zh": "机器人需要太多电力（按书中另一种说法）（在书的早期草稿中）"}, {"en": "People don't like robots", "zh": "人们不喜欢机器人"}, {"en": "Robots are too expensive to build", "zh": "造机器人太昂贵了"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The conclusion says humans are creative and adaptable, and even the most advanced robots are not.", "zh": "结论说人类富有创造力和适应力，而即使最先进的机器人也不具备这些特质。"}}], "extended": {"prompt": {"en": "Imagine you could design a robot to solve a problem in your daily life. What task would it do, and what parts (sensors, programs, moving parts) would it need?", "zh": "想象你可以设计一台机器人来解决你日常生活中的一个问题。它会完成什么任务？它需要哪些部件（传感器、程序、活动部件）？"}, "guidance": {"en": ["Think of one boring or dangerous chore you wish a robot could do.", "List the sensors and program steps the robot would need, like the book's simple robot arm."], "zh": ["想一件你希望机器人代劳的枯燥或危险家务。", "像书中简单的机械臂一样，列出机器人需要的传感器和程序步骤。"]}}};</script>
