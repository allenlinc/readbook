 and Details", "explain": {"en": "The Pyrenees mountains form a solid border between Spain and France, stretching 434 kilometers from the Mediterranean to the Atlantic.", "zh": "比利牛斯山脉构成了西班牙与法国之间坚固的边界，从地中海延伸到大西洋，长达434公里。"}}, {"q": {"en": "Who ruled Spain in the 1400s and paid explorers like Columbus?", "zh": "谁在15世纪统治西班牙并资助了哥伦布这样的探险家？"}, "options": [{"en": "King Ferdinand and Queen Isabella", "zh": "费迪南德国王和伊莎贝拉女王"}, {"en": "The Roman emperors according to some versions of the story", "zh": "罗马皇帝（按书中另一种说法）"}, {"en": "The Viking chiefs", "zh": "维京酋长"}, {"en": "The French kings", "zh": "法国国王"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "In the 1400s, King Ferdinand and Queen Isabella came to power and paid explorers such as Christopher Columbus to find new trade routes.", "zh": "15世纪时，费迪南德国王和伊莎贝拉女王掌权，并资助克里斯托弗·哥伦布等探险家寻找新的贸易路线。"}}, {"q": {"en": "What is La Tomatina?", "zh": "La Tomatina（番茄节）是什么？"}, "options": [{"en": "A type of Spanish dance", "zh": "一种西班牙舞蹈"}, {"en": "A quiet prayer meeting", "zh": "安静的祈祷聚会"}, {"en": "A national day for Columbus according to some versions of the story", "zh": "纪念哥伦布的国家节日（按书中另一种说法）"}, {"en": "A festival where people throw truckloads of tomatoes at one another", "zh": "人们互相投掷成卡车西红柿的节日"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "La Tomatina is likely the world's biggest tomato fight; people throw truckloads of ripened tomatoes at one another just for fun.", "zh": "La Tomatina可能是世界上最大的番茄大战，人们只是为了好玩就互相投掷成卡车的熟番茄。"}}, {"q": {"en": "What kind of government does Spain have today?", "zh": "西班牙今天实行什么样的政体？"}, "options": [{"en": "A monarchy with a king or queen, but elected officials rule and pass laws", "zh": "保留国王或女王的君主制，但由民选官员执政并立法"}, {"en": "A monarchy where a king or queen alone makes all the laws according to some versions of the story", "zh": "由国王或女王独自制定所有法律的君主制（按书中另一种说法）"}, {"en": "No central government at all", "zh": "完全没有中央政府"}, {"en": "A government run only by the army", "zh":
