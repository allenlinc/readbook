l name.", "zh": "网络欺凌利用科技发送伤人的信息，且常常不署真名。"}}, {"q": {"en": "According to expert Susan Limber, why do many kids bully others?", "zh": "根据专家苏珊·林伯的说法，许多孩子为什么欺负别人？"}, "options": [{"en": "Because they are hungry.", "zh": "因为他们饿了。"}, {"en": "Because they are very shy.", "zh": "因为他们非常害羞。"}, {"en": "Because they can, and they enjoy having power over others.", "zh": "因为他们能做到，而且享受凌驾于他人之上的力量感。"}, {"en": "Because they want to make friends. according to some versions of the story", "zh": "因为他们想交朋友。（按书中另一种说法）"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "Limber says research suggests many bullies do it just because they can and they enjoy it.", "zh": "林伯说，研究表明许多欺凌者只是因为'能做到'并且乐在其中。"}}, {"q": {"en": "How can bullying affect the kids who are targeted?", "zh": "欺凌会怎样影响被欺负的孩子？"}, "options": [{"en": "They may get sick, fear school, and feel bad about themselves.", "zh": "他们可能生病、害怕上学，并对自己感觉糟糕。"}, {"en": "They learn to fly.", "zh": "他们学会飞行。"}, {"en": "They get better grades automatically. according to some versions of the story", "zh": "他们的成绩自动变好。（按书中另一种说法）"}, {"en": "They become stronger athletes.", "zh": "他们成为更强壮的运动员。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says targets may have stomachaches, trouble sleeping, and low self-worth.", "zh": "书中说受害者可能胃痛、失眠，并自我感觉很差。"}}, {"q": {"en": "What did President Obama do about bullying?", "zh": "奥巴马总统针对欺凌做了什么？"}, "options": [{"en": "He held the first-ever White House conference on bullying prevention.", "zh": "他召开了史上首次白宫反欺凌会议。"}, {"en": "He wrote a novel.", "zh": "他写了一本小说。"}, {"en": "He banned all sports.", "zh": "他禁止了所有运动。"}, {"en": "He closed all schools. according to some versions of the story in an early draft of the book", "zh": "他关闭了所有学校。（按书中另一种说法）（在书的早期草稿中）"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book notes Obama hosted the first White House conference on bullying prevention.", "zh": "书中提到，奥巴马主持了史上首次白宫反欺凌会议。"}}, {"q": {"en": "What does the book say a target of bullying should do first?", "zh": "书中说被欺凌者首先应该怎么做？"}, "options": [{"en": "Keep it a secret forever.", "zh": "永远保密。"}, {"en": "Speak up and make sure adults know there is a problem.", "zh": "说出来，并确保成年人知道存在问题。"}, {"en": "Fight back with fists.", "zh": "用拳头反击。"}, {"en": "Move to another country. according to some versions of the story", "zh": "搬到另一个国家。（按书中另一种说法）"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Experts agree the most important step is to speak up so caring adults can help.", "zh": "专家认为，最重要的一步是说出来，以便关心的成年人能提供帮助。"}}, {"q": {"en": "Besides the target, who else can bullying affect?", "zh": "除了受害者，欺凌还会影响谁？"}, "options": [{"en": "Only the teacher.", "zh": "只有老师。"}, {"en": "Witnesses, who may feel afraid or guilty for not helping.", "zh": "旁观者，他们可能因没有出手相助而感到害怕或内疚。"}, {"en": "No one else.", "zh": "不会有其他任何人。"}, {"en": "Only the bully's pet. according to some versions of the story in an early draft of the book", "zh": "只有欺凌者的宠物。（按书中另一种说法）（在书的早期草稿中）"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says children who witness bullying can feel afraid or guilty that they did not step in.", "zh": "书中说，目睹欺凌的孩子可能会因为没出手相助而感到害怕或内疚。"}}, {"q": {"en": "What is one short-term strategy the book recommends for dealing with bullying?", "zh": "书中推荐的一个应对欺凌的短期策略是什么？"}, "options": [{"en": "Run to another city.", "zh": "跑到另一座城市。"}, {"en": "Tell a lie about the bully.", "zh": "对欺凌者撒谎。"}, {"en": "Wait many years and do nothing. according to some versions of the story", "zh": "等很多年且什么都不做。（按书中另一种说法）"}, {"en": "Use words or actions at the moment to stop or disrupt the situation.", "zh": "当下用语言或行动去制止或打断该情境。"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Limber suggests a short-term strategy used in the moment, plus a long-term solution.", "zh": "林伯建议既有当下可用的短期策略，也有长期的解决方案。"}}, {"q": {"en": "What is the author's main purpose in this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"
