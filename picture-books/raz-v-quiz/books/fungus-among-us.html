<script>window.BOOK = {"slug": "fungus-among-us", "title": "Fungus Among Us", "titleZh": "我们身边的真菌", "level": "V", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "What do moldy grapes, park mushrooms, athlete's foot, and bread yeast all have in common?", "zh": "发霉的葡萄、公园里的蘑菇、脚气和水面包用的酵母有什么共同点？"}, "options": [{"en": "They are all types of fungi.", "zh": "它们都是真菌。"}, {"en": "They are all kinds of plants.", "zh": "它们都是植物。"}, {"en": "They are all animals.", "zh": "它们都是动物。"}, {"en": "They are all made by people.", "zh": "它们都是人造的。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says all four organisms are types of fungi.", "zh": "书中说这四种生物都属于真菌。"}}, {"q": {"en": "Why are fungi NOT considered plants?", "zh": "为什么真菌不被归为植物？"}, "options": [{"en": "They cannot do photosynthesis to make their own food.", "zh": "它们不能进行光合作用来制造食物。"}, {"en": "They cannot move at all.", "zh": "它们完全不能动。"}, {"en": "They live only underwater.", "zh": "它们只生活在水下。"}, {"en": "They have no cells.", "zh": "它们没有细胞。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Plants make food by photosynthesis; fungi cannot, so they get food another way.", "zh": "植物靠光合作用制造食物，真菌不能，所以靠别的方式获取营养。"}}, {"q": {"en": "How do fungi get their food?", "zh": "真菌如何获取食物？"}, "options": [{"en": "They release enzymes that break down matter, then absorb the nutrients.", "zh": "它们释放酶分解物质，再吸收营养。"}, {"en": "They make food from sunlight like plants.", "zh": "它们像植物一样用阳光制造食物。"}, {"en": "They eat other animals with their mouths.", "zh": "它们用嘴吃其他动物。"}, {"en": "They drink water only.", "zh": "它们只喝水。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Fungi release enzymes that break complex molecules into nutrients, absorbed through hyphae.", "zh": "真菌释放酶把复杂分子分解成养分，再通过菌丝吸收。"}}, {"q": {"en": "In the glossary, what does the word 'spores' mean?", "zh": "在词汇表中，'spores'（孢子）是什么意思？"}, "options": [{"en": "Tiny structures that can grow into new fungi.", "zh": "能长成新真菌的微小结构。"}, {"en": "The green leaves of a plant.", "zh": "植物的绿叶。"}, {"en": "A kind of animal hair.", "zh": "一种动物毛发。"}, {"en": "A type of rock.", "zh": "一种岩石。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines spores as tiny structures made by fungi that grow into new fungi.", "zh": "词汇表把孢子定义为真菌产生的、能长成新真菌的微小结构。"}}, {"q": {"en": "What is a lichen?", "zh": "什么是地衣？"}, "options": [{"en": "A growth made when fungi and algae live together.", "zh": "真菌和藻类一起生长形成的物体。"}, {"en": "A kind of single-celled yeast.", "zh": "一种单细胞酵母。"}, {"en": "A type of poisonous mushroom.", "zh": "一种有毒蘑菇。"}, {"en": "A disease of the skin.", "zh": "一种皮肤病。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book explains lichen is created when fungi and algae grow together.", "zh": "书中解释说地衣是真菌和藻类共同生长形成的。"}}, {"q": {"en": "Why does the author tell the story of penicillin's accidental discovery?", "zh": "作者为什么要讲青霉素被偶然发现的故事？"}, "options": [{"en": "To show that some fungi are useful and can help cure diseases.", "zh": "为了说明有些真菌很有用，能帮助治病。"}, {"en": "To prove all fungi are poisonous.", "zh": "为了证明所有真菌都有毒。"}, {"en": "To explain how bread is made.", "zh": "为了解释面包怎么做。"}, {"en": "To describe a famous chef.", "zh": "为了描写一位名厨。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The author gives penicillin as an example of fungi that help cure people.", "zh": "作者用青霉素作为真菌助人治病的例子。"}}, {"q": {"en": "What caused the Great Irish Famine in the 1840s?", "zh": "19世纪40年代爱尔兰大饥荒是由什么引起的？"}, "options": [{"en": "A fungal blight that killed most of the potato plants.", "zh": "一种真菌病害摧毁了大部分马铃薯。"}, {"en": "A long drought with no rain.", "zh": "长期干旱无雨。"}, {"en": "An invasion of insects from the sea.", "zh": "来自海洋的昆虫入侵。"}, {"en": "A war between two countries.", "zh": "两国之间的战争。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "A fungal disease called blight killed most potato plants, and many people depended on potatoes.", "zh": "一种叫枯萎病的真菌病害毁掉了大部分马铃薯，而当时许多人靠马铃薯维生。"}}, {"q": {"en": "Why does the book warn that eating wild mushrooms can be dangerous?", "zh": "为什么书中警告吃野生蘑菇可能危险？"}, "options": [{"en": "Some kinds are poisonous and hard to tell from safe ones.", "zh": "有些有毒，且很难和无毒的区别。"}, {"en": "All mushrooms taste bad.", "zh": "所有蘑菇都很难吃。"}, {"en": "Mushrooms are made of plastic.", "zh": "蘑菇是塑料做的。"}, {"en": "They are too expensive to eat.", "zh": "它们太贵吃不起。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says some mushrooms contain poisons and it is hard to tell poisonous from nonpoisonous ones.", "zh": "书中说有些蘑菇含毒，且很难分辨有毒无毒。"}}, {"q": {"en": "According to the book, what is the largest living thing?", "zh": "根据本书，最大的生物是什么？"}, "options": [{"en": "An underground fungus in Oregon spreading 3.5 square miles.", "zh": "俄勒冈州一片占地3.5平方英里的地下真菌。"}, {"en": "A blue whale in the ocean.", "zh": "海洋里的蓝鲸。"}, {"en": "A giant redwood tree.", "zh": "巨大的红杉树。"}, {"en": "A large elephant.", "zh": "一头大象。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says a fungus in Malheur National Forest spreads 3.5 square miles underground.", "zh": "书中说俄勒冈州马尔赫尔国家森林的地下真菌蔓延达3.5平方英里。"}}, {"q": {"en": "What is the author's main message about fungi?", "zh": "作者关于真菌的主要观点是什么？"}, "options": [{"en": "They can be surprising, useful, and even fun to learn about.", "zh": "它们令人惊讶、有用，甚至了解起来很有趣。"}, {"en": "They should all be killed at once.", "zh": "应该立刻把它们全部消灭。"}, {"en": "They are only found in the ocean.", "zh": "它们只生活在海洋里。"}, {"en": "They are not really alive.", "zh": "它们其实不是生物。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book ends by saying fungi can be fun and encourages readers to keep discovering them.", "zh": "书末说真菌可以很有趣，并鼓励读者继续探索它们。"}}], "extended": {"prompt": {"en": "The book says fungi are more like animals than plants. Do you think something can be useful and harmful at the same time? Give an example from the book or your own life.", "zh": "书中说真菌更像动物而不是植物。你认为一样东西可以同时既有益又有害吗？请举书中或你生活中的例子说明。"}, "guidance": {"en": ["Think about penicillin (useful medicine) versus athlete's foot (harmful disease).", "Consider how the same fungus can help and hurt depending on the situation."], "zh": ["想想青霉素（有用的药）和脚气（有害的病）。", "想想同一种真菌在不同情况下如何既助人又害人。"]}}};</script>
