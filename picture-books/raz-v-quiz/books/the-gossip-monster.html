<script>window.BOOK = {"slug": "the-gossip-monster", "title": "The Gossip Monster", "titleZh": "八卦怪物", "level": "V", "genre": "Narrative", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "What first leads Jamie to start a rumor about Del?", "zh": "是什么让杰米开始传播关于德尔的谣言？"}, "options": [{"en": "She sees Del in the principal's office with a crying little boy and assumes he beat the child up.", "zh": "她看到德尔和一位哭泣的小男孩在校长办公室，就以为他打了那个孩子。"}, {"en": "Del actually punched a kindergartner in front of the whole class.", "zh": "德尔当着全班的面打了一个幼儿园小孩。"}, {"en": "Mrs. Cosgrove told her Del had been expelled.", "zh": "科斯格罗夫校长告诉她德尔被开除了。"}, {"en": "She read about it in the school newspaper.", "zh": "她在学校的报纸上读到了这件事。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Jamie peeks through the principal's window and jumps to the conclusion that Del hurt the crying boy, then tells her friends.", "zh": "杰米透过校长办公室的窗户偷看，就断定德尔伤害了那个哭泣的男孩，然后告诉了朋友。"}}, {"q": {"en": "Why does the author include Mr. Sanchez's Telephone game?", "zh": "作者为什么要写桑切斯老师玩的“传话游戏”？"}, "options": [{"en": "To show how a message changes and grows as it is passed from person to person.", "zh": "为了说明消息在人与人之间传递时会改变、放大。"}, {"en": "To teach the students how to use a telephone.", "zh": "为了教学生们如何使用电话。"}, {"en": "To help the class learn a new song.", "zh": "为了帮全班学一首新歌。"}, {"en": "Because Del loved playing games at recess.", "zh": "因为德尔喜欢在课间玩游戏。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The game shows that messages mutate as they travel, just like a rumor growing into a 'gossip monster.'", "zh": "这个游戏说明消息在传递中会走样，就像谣言慢慢变成“八卦怪物”一样。"}}, {"q": {"en": "What is the main lesson the book teaches?", "zh": "这本书主要想告诉我们什么道理？"}, "options": [{"en": "Spreading rumors can hurt people and is like feeding a monster that grows.", "zh": "传播谣言会伤害他人，就像喂养一只不断变大的怪物。"}, {"en": "You should always believe what your friends tell you.", "zh": "你应该永远相信朋友告诉你的话。"}, {"en": "Principal Cosgrove is the strictest teacher.", "zh": "科斯格罗夫校长是最严厉的老师。"}, {"en": "Kickball is the best recess game.", "zh": "踢球是最好的课间游戏。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Mr. Sanchez explains that starting or passing a rumor is like feeding a monster that becomes meaner and more hurtful.", "zh": "桑切斯老师解释说，散播或传播谣言就像喂养怪物，会让它变得更刻薄、更伤人。"}}, {"q": {"en": "How does the rumor about Del change as it spreads?", "zh": "关于德尔的谣言在传播过程中发生了怎样的变化？"}, "options": [{"en": "It grows and gets worse, from 'sent home' to 'expelled' to 'going to prison.'", "zh": "它不断变大变严重，从“被送回家”变成“被开除”，再到“要进监狱”。"}, {"en": "It stays exactly the same from beginning to end.", "zh": "它从头到尾完全没变。"}, {"en": "It becomes a kind story about Del helping a child.", "zh": "它变成了一个德尔帮助孩子的温暖故事。"}, {"en": "It disappears as soon as Jamie stops talking.", "zh": "杰米一闭嘴，谣言就消失了。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Each retelling adds details, so the story mutates from a guess into wild claims like Del going to prison.", "zh": "每传一次就添油加醋，故事从一个猜测变成了“德尔要进监狱”之类的离谱说法。"}}, {"q": {"en": "How is Jamie's own experience like Del's?", "zh": "杰米自己的经历和德尔有什么相似？"}, "options": [{"en": "Both were hurt by rumors others spread about them.", "zh": "两人都曾被别人散布的谣言伤害。"}, {"en": "Both were principals at the school.", "zh": "两人都是学校的校长。"}, {"en": "Neither of them liked kickball.", "zh": "他们俩都不喜欢踢球。"}, {"en": "Both moved to a new school.", "zh": "两人都转学了。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Jamie was nicknamed 'Germy' because of an old rumor, so she knows what it feels like to be gossiped about.", "zh": "杰米因为旧谣言被叫“病菌”，所以她知道被八卦议论是什么滋味。"}}, {"q": {"en": "Why does Jamie finally apologize to Del?", "zh": "杰米最后为什么向德尔道歉？"}, "options": [{"en": "She started the false rumor and realized gossiping made her the real bully.", "zh": "因为她编造了假谣言，并意识到说闲话的自己才是真正的欺凌者。"}, {"en": "Del forced her to say sorry in front of the class.", "zh": "德尔逼她在全班面前道歉。"}, {"en": "She wanted to copy Cassie and May.", "zh": "她想学卡西和梅的样子。"}, {"en": "Mrs. Cosgrove gave her detention.", "zh": "科斯格罗夫校长罚她留校。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "After learning the truth, Jamie admits she assumed things without proof and hurt Del for selfish reasons.", "zh": "得知真相后，杰米承认自己在没有证据的情况下乱猜，并出于自私伤害了德尔。"}}, {"q": {"en": "What does the 'gossip monster' in the story stand for?", "zh": "故事里的“八卦怪物”代表什么？"}, "options": [{"en": "A rumor that changes and grows more hurtful as it spreads.", "zh": "一个在传播中不断改变、变得更具伤害性的谣言。"}, {"en": "A real animal that lives in the school basement.", "zh": "一只住在学校地下室里的真实动物。"}, {"en": "The principal's pet dog.", "zh": "校长的宠物狗。"}, {"en": "A character from a video game.", "zh": "一个电子游戏里的角色。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Mr. Sanchez uses the monster as a metaphor: once started, a gossip monster is almost impossible to stop.", "zh": "桑切斯老师用怪物作比喻：谣言一旦开始，就几乎无法停下。"}}, {"q": {"en": "Why was Del really called to the principal's office?", "zh": "德尔被叫到校长办公室的真正原因是什么？"}, "options": [{"en": "His mom and little brother were there; his dad was hurt overseas and coming home.", "zh": "他的妈妈和小弟弟在那里；爸爸在海外受伤，即将回家。"}, {"en": "He had beaten up a kindergartner.", "zh": "他打了幼儿园的小孩。"}, {"en": "He was being given an award.", "zh": "他要被颁发奖项。"}, {"en": "He forgot his homework.", "zh": "他忘了写作业。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Del explains the truth to Jamie: the woman was his mom and the boy was his little brother, worried about their dad.", "zh": "德尔向杰米说明了真相：那位女士是他妈妈，男孩是他弟弟，他们都在担心爸爸。"}}, {"q": {"en": "How does Jamie feel after she tells the truth and apologizes?", "zh": "杰米说出真相并道歉后感觉如何？"}, "options": [{"en": "Relieved and better, because she stopped being part of the bullying.", "zh": "如释重负、好受多了，因为她不再参与欺凌。"}, {"en": "Angry that Del would not be her friend.", "zh": "因为德尔不愿做她朋友而生气。"}, {"en": "Proud that the rumor had spread so far.", "zh": "为谣言传得那么远而得意。"}, {"en": "Sorry that she had not started more rumors.", "zh": "后悔自己没多编些谣言。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Jamie feels terrible at first but better once she admits the truth and stands up to the gossip.", "zh": "杰米起初很难受，但承认真相、不再附和八卦后，心里好受了许多。"}}, {"q": {"en": "What does Mr. Sanchez say is usually best to do when you know something is true about someone?", "zh": "当桑切斯老师确认某件事是真的时，他认为通常最好怎么做？"}, "options": [{"en": "Not to gossip about people when they are not around, unless you are saying something nice.", "zh": "不要在别人不在场时说长道短，除非是在说好话。"}, {"en": "Tell the whole school right away.", "zh": "立刻告诉全校。"}, {"en": "Write it in the school newspaper.", "zh": "把它写进校报。"}, {"en": "Pretend you never heard it.", "zh": "假装自己从没听说过。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "He says let people speak for themselves and let others decide what to believe.", "zh": "他说应该让别人自己开口，也让别人自己决定要相信什么。"}}], "extended": {"prompt": {"en": "Have you ever seen a small story grow into something much bigger as it was retold? What could you do the next time you hear a rumor?", "zh": "你有没有见过一个小故事在被人转述时越变越大？下次再听到谣言时，你可以怎么做？"}, "guidance": {"en": ["Think about a time you heard something that turned out not to be true.", "Consider one kind action you could take, like checking the facts or speaking up."], "zh": ["回想一件你听来听去、最后发现并不真实的事。", "想一想你可以做的一件善意小事，比如核实事实或站出来说话。"]}}};</script>
