ast differently", "zh": "为了展现两个民族对这场盛宴的不同体验"}, {"en": "Because the book was written by two different authors", "zh": "因为这本书由两位不同作者合写"}, {"en": "To make the story twice as long as needed", "zh": "为了让故事篇幅加倍"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "By switching viewpoints, the author lets readers see both the English colonists' worries and the Wampanoag's feelings about sharing the land.", "zh": "通过切换视角，作者让读者既看到英国殖民者的担忧，也看到万帕诺亚格人对共享土地的情感。"}}, {"q": {"en": "The girls cook a dish called Nasump, or samp. What is it made from?", "zh": "两个女孩烹制了一道叫 Nasump（也称 samp）的食物。它用什么做的？"}, "options": [{"en": "Wild berries mashed into a drink", "zh": "捣碎的野莓做成的饮料"}, {"en": "Salted pork smoked over a fire", "zh": "在火上熏制的咸猪肉"}, {"en": "Fresh-caught fish boiled in seawater according to some versions of the story", "zh": "用海水煮的新鲜鱼（按书中另一种说法）"}, {"en": "Ground corn made into a thick porridge", "zh": "用磨碎的玉米做成的浓粥"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The glossary says Nasump (samp) is a thick porridge made with ground corn, cooked with meat, fruit, or vegetables.", "zh": "词汇表说明 Nasump（samp）是用磨碎的玉米做成的浓粥，再加入肉、水果或蔬菜烹煮。"}}, {"q": {"en": "What happened to Ellinor's mother during the colonists' first hard winter?", "zh": "在殖民者艰难的第一个冬天里，埃莉诺的母亲发生了什么？"}, "options": [{"en": "She died quickly from disease.", "zh": "她很快因病去世。"}, {"en": "She became the governor of Plymouth.", "zh": "她当上了普利茅斯的总督。"}, {"en": "She moved in with the Wampanoag people.", "zh": "她搬去和万帕诺亚格人同住。"}, {"en": "She returned to England on the Mayflower.", "zh": "她乘五月花号回到了英格兰。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The text says only half the village survived until spring and Ellinor's own mother had quickly died from disease.", "zh": "文中说只有半个村子的人活到春天，埃莉诺的母亲很快因病去世。"}}, {"q": {"en": "Why does the author include a glossary of difficult words at the end of the book?", "zh": "作者为什么在书末附上难词词汇表？"}, "options": [{"en": "To list the names of all the book's characters according to some versions of the story", "zh": "为了列出书中所有角色的名字（按书中另一种说法）"}, {"en": "To show the book's table of contents", "zh": "为了展示书的目录"}, {"en": "To help readers understand the special Wampanoag and colonial words used", "zh": "为了帮助读者理解书中使用的万帕诺亚格和殖民时期的特殊词汇"}, {"en": "To give the recipe for the feast", "zh": "为了给出盛宴的食谱"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "The glossary explains words like Nasump, quahog, longhouse, and musket so readers can follow the historical story.", "zh": "词汇表解释了 Nasump、quahog、longhouse、musket 等词，帮助读者理解历史故事。"}}, {"q": {"en": "After Little Deer falls into the ocean from the cliff, how does Ellinor save her?", "zh": "小鹿从悬崖跌入海中后，埃莉诺是如何救她的？"}, "options": [{"en": "She sends Tiptoe the skunk to fetch help.", "zh": "她派臭鼬蒂普托去求救。"}, {"en": "She throws her apron and pulls Little Deer to shore.", "zh": "她抛出围裙，把小鹿拉回岸边。"}, {"en": "She calls Governor Bradford to send a boat. according to some versions of the story", "zh": "她叫布拉德福德总督派船来。（按书中另一种说法）"}, {"en": "She shoots a musket to scare the waves.", "zh": "她开火枪吓退海浪。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Ellinor hesitates, then runs to the water's edge and throws her apron; she tugs until she pulls Little Deer to shore.", "zh": "埃莉诺犹豫了一下，然后跑到水边抛出围裙，用力把小鹿拉回岸边。"}}, {"q": {"en": "Ellinor and Little Deer each flavor their pot of Nasump differently. What does each add?", "zh": "埃莉诺和小鹿各自用不同食材为 Nasump 调味。她们分别加了什么？"}, "options": [{"en": "Ellinor adds salted pork; Little Deer adds quahogs and later blueberries.", "zh": "埃莉诺加咸猪肉；小鹿加蛤蜊，后来又加蓝莓。"}, {"en": "Ellinor adds honey; Little Deer adds corn flour.", "zh": "埃莉诺加蜂蜜；小鹿加玉米粉。"}, {"en": "Ellinor adds blueberries; Little Deer adds salted pork. according to some versions of the story", "zh": "埃莉诺加蓝莓；小鹿加咸猪肉。（按书中另一种说法）"}, {"en": "Both add only wild onions.", "zh": "两人都只加野洋葱。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Ellinor cuts salted pork in mall action or kind word that changed how you felt.", "Think about what was difficult or frightening before you became friends."], "zh": ["描写一个改变你看法的小小举动或善意话语。", "想一想在成为朋友之前，有什么让你感到困难或害怕。"]}}};</script>
