raft and Structure", "explain": {"en": "The simile helps readers imagine energy constantly bubbling to the surface like boiling soup.", "zh": "这个比喻帮助读者想象能量不断像沸腾的汤一样冒到表面。"}}, {"q": {"en": "The book describes dark spots moving across the Sun. What are sunspots?", "zh": "书中描述了在太阳表面移动的暗斑。太阳黑子是什么？"}, "options": [{"en": "Hot lava from the Sun's center", "zh": "来自太阳中心的炽热熔岩"}, {"en": "Holes that let the Sun go dark", "zh": "让太阳变暗的洞"}, {"en": "Pieces of the Moon blocking the Sun according to some versions of the story", "zh": "遮挡太阳的月球碎片（按书中另一种说法）"}, {"en": "Cooler, dark areas where magnetic energy bursts to the surface", "zh": "比周围更冷、磁能从表面迸发的暗区"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Sunspots are cooler than the surrounding gases and occur where magnetic energy bursts to the surface.", "zh": "太阳黑子比周围气体更冷，出现在磁能从表面迸发的地方。"}}, {"q": {"en": "Energy leaving the Sun travels at 300,000 km per second. How long does it take to reach Earth?", "zh": "离开太阳的能量以每秒30万公里传播。它到达地球需要多久？"}, "options": [{"en": "One full day", "zh": "整整一天"}, {"en": "Less than one second", "zh": "不到一秒钟"}, {"en": "One year", "zh": "一年"}, {"en": "About eight minutes", "zh": "大约八分钟"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "Even at that speed, it takes energy leaving the Sun eight minutes to make the trip to Earth.", "zh": "即便速度如此之快，能量从太阳到地球仍需约八分钟。"}}, {"q": {"en": "The book includes a 'Try This' activity to build a solar cooker. Why?", "zh": "书中包含了一个制作太阳能炊具的'试一试'活动。为什么？"}, "options": [{"en": "To replace indoor stoves", "zh": "为了取代室内的炉灶"}, {"en": "To prove the Sun is dangerous", "zh": "为了证明太阳很危险"}, {"en": "To let readers personally see how the Sun's energy can be used", "zh": "为了让读者亲身感受太阳能的利用"}, {"en": "To teach cooking as a career according to some versions of the story", "zh": "为了把烹饪当作职业来教（按书中另一种说法）"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "Hands-on activities help readers experience and understand the Sun's usable energy.", "zh": "动手活动让读者亲身体验并理解太阳能的利用。"}}, {"q": {"en": "The book mentions a massive solar explosion in 1989. What did it cause on Earth?", "zh": "书中提到1989年一次大规模太阳爆发。它在地球上造成了什么？"}, "options": [{"en": "It melted the polar ice caps", "zh": "它融化了极地冰盖"}, {"en": "It knocked out a power grid, leaving millions without electricity", "zh": "它摧毁了电网，使数百万人断电"}, {"en": "It started a forest fire in France according to some versions of the story", "zh": "它在法国引发了一场森林火灾（按书中另一种说法）"}, {"en": "It created the aurora in Africa", "zh": "它在非洲制造了极光"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "In 1989 a massive solar explosion knocked out a power grid, leaving almost seven million people without electricity.", "zh": "1989年一次大规模太阳爆发摧毁了电网，使近七百万人失去电力供应。"}}, {"q": {"en": "How does the author help readers grasp how enormous the Sun is?", "zh": "作者如何帮助读者理解太阳的巨大？"}, "options": [{"en": "By stating 1.3 million Earths could fit inside it", "zh": "通过说明130万个地球能装进太阳里"}, {"en": "By counting its sunspots", "zh": "通过数它的太阳黑子"}, {"en": "By comparing it to the Moon's size according to some versions of the story", "zh": "通过与月球的大小比较（按书中另一种说法）"}, {"en": "By measuring its age in days", "zh": "通过以天为单位计算它的年龄"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "A 'Do You Know?' box notes that 1.3 million Earths could fit inside the Sun.", "zh": "'你知道吗？'栏目指出，130万个地球能装进太阳里。"}}, {"q": {"en": "Besides giving us light and heat, what danger does the Sun's ultraviolet light pose?", "zh": "除了光和热，太阳的紫外线对人有什么危险？"}, "options": [{"en": "It makes people taller", "zh": "它会让人长高"}, {"en": "Overexposure can cause skin cancer (melanoma)", "zh": "过度暴晒可能导致皮肤癌（黑色素瘤）"}, {"en": "It prevents all disease according to some versions of the story", "zh": "它能预防所有疾病（按书中另一种说法）"}, {"en": "It improves eyesight", "zh": "它能改善视力"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book warns that melanoma, a skin cancer, is caused by overexposure to the Sun's harmful ultraviolet rays.", "zh": "书中警告，过度暴露在有害紫外线下会导致黑色素瘤（皮肤癌）。"}}, {"q": {"en": "What main message does the book give about humans and the Sun?", "zh": "这本书关于人类与太阳传达了什么主要信息？"}, "options": [{"en": "The Sun is unimportant to daily life", "zh": "太阳对日常生活并不重要"}, {"en": "We depend on the Sun for almost all our energy and survival", "zh": "我们几乎所有的能量和生存都依赖于太阳"}, {"en": "Only plants need the Sun", "zh": "只有植物需要太阳"}, {"en": "We should block out the Sun completely according to some versions of the story", "zh": "我们应该完全挡住太阳（按书中另一种说法）"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The conclusion states we depend on the Sun for survival as the source of most energy we use.", "zh": "结论指出，作为我们使用的大部分能源之源，我们的生存依赖于太阳。"}}], "extended": {"prompt": {"en": "The book says even wind and fossil fuels come from the Sun. Choose one everyday activity and trace how the Sun's energy makes it possible.", "zh": "书里说连风和化石燃料都来自太阳。选一项日常活动，追溯一下太阳的能量是如何让它成为可能的。"}, "guidance": {"en": ["Start with the food you eat or the electricity you use.", "Follow the chain step by step back to sunlight."], "zh": ["从你吃的食物或使用的电力开始。", "一步一步顺着线索回溯到阳光。"]}}};</script>
