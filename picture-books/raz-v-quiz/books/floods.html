ving at 10 mph has the same force as a 270 mph wind.", "zh": "文中解释，时速10英里的水流冲击力等同于时速270英里的大风。"}}, {"q": {"en": "What causes a seiche (SAYSH)?", "zh": "是什么引起了湖震（seiche）？"}, "options": [{"en": "Earthquakes or strong winds make lake water slosh back and forth.", "zh": "地震或强风使湖水来回晃动。"}, {"en": "Rivers overflow their banks after heavy rain.", "zh": "大雨后河流漫过两岸。"}, {"en": "A hurricane pushes ocean water onto the shore. according to some versions of the story", "zh": "飓风把海水推向海岸。（按书中另一种说法）"}, {"en": "Ice dams break and release huge lakes.", "zh": "冰坝破裂释放出巨大的湖水。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "A seiche happens when winds or earthquakes shift lake water, which then overflows the banks.", "zh": "湖震发生在强风或地震使湖水移动、随后漫过岸边时。"}}, {"q": {"en": "What is a storm surge?", "zh": "什么是风暴潮？"}, "options": [{"en": "A river that overflows its floodplain.", "zh": "漫过洪泛区的河流。"}, {"en": "A flood caused by melting snow in the mountains. according to some versions of the story", "zh": "由山中积雪融化引起的洪水。（按书中另一种说法）"}, {"en": "Ocean water pushed onto land by hurricane or storm winds.", "zh": "被飓风或风暴大风推上岸的海水。"}, {"en": "Water that sloshes in a lake during an earthquake.", "zh": "地震时湖中晃动的水。"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "The book defines a storm surge as ocean water forced upward and onto land by storm winds.", "zh": "书中把风暴潮定义为风暴大风把海水推高并冲上陆地的现象。"}}, {"q": {"en": "According to the book, why can floods be good for nature?", "zh": "根据书中内容，为什么洪水对自然也可能有益？"}, "options": [{"en": "They wash away all the trees and soil. according to some versions of the story", "zh": "它们冲走所有的树木和泥土。（按书中另一种说法）"}, {"en": "They stop rivers from flowing.", "zh": "它们让河流停止流动。"}, {"en": "They leave behind nutrients that nourish plants and animals.", "zh": "它们留下滋养植物和动物的养分。"}, {"en": "They make the weather warmer.", "zh": "它们让天气变得更暖和。"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "Floods leave sediment full of nutrients that feed plants and animals in many ecosystems.", "zh": "洪水留下富含养分的泥沙，为许多生态系统中的植物和动物提供养料。"}}, {"q": {"en": "How do beavers help reduce flooding?", "zh": "河狸是如何帮助减少洪水的？"}, "options": [{"en": "They build levees out of concrete.", "zh": "它们用水泥修筑堤坝。"}, {"en": "They eat the plants that block rivers. according to some versions of the story", "zh": "它们吃掉堵塞河流的植物。（按书中另一种说法）"}, {"en": "They dig deeper river channels.", "zh": "它们把河道挖得更深。"}, {"en": "Their dams hold back water and release it slowly.", "zh": "它们筑的坝拦住水流，再一点点放出去。"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Beaver dams back up water during heavy rains and release it a little at a time instead of all at once.", "zh": "河狸的坝在大雨时拦住水流，再一点点释放，而不是一次性倾泻。"}}, {"q": {"en": "What massive system protects the Netherlands from flooding?", "zh": "是什么庞大的工程保护荷兰免受洪水侵袭？"}, "options": [{"en": "The Great Wall.", "zh": "长城。"}, {"en": "The North Sea Protection Works.", "zh": "北海防护工程。"}, {"en": "The Mississippi Levees. according to some versions of the story", "zh": "密西西比河堤坝。（按书中另一种说法）"}, {"en": "The Hoover Dam.", "zh": "胡佛水坝。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book describes the North Sea Protection Works, a system of dams and barriers built by the Netherlands.", "zh": "书中描述了北海防护工程，那是荷兰修建的一套水坝与挡潮闸系统。"}}, {"q": {"en": "What does the word 'floodplain' mean in the book?", "zh": "书中'floodplain'（洪泛区）一词是什么意思？"}, "options": [{"en": "A type of fast-moving storm.", "zh": "一种快速移动的风暴。"}, {"en": "Low, flat land covered by water when rivers overflow.", "zh": "河流泛滥时被水覆盖的低洼平地。"}, {"en": "The highest point of a mountain. according to some versions of the story", "zh": "山脉的最高点。（按书中另一种说法）"}, {"en": "A wall built to block water.", "zh": "用来挡水的墙。"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The glossary defines a floodplain as low, flat land covered with water when streams overflow.", "zh": "词汇表把洪泛区定义为溪流泛滥时被水覆盖的低洼平地。"}}, {"q": {"en": "What is the author's main point about floods?", "zh": "关于洪水，作者想表达的主要观点是什么？"}, "options": [{"en": "They are both destructive and necessary for healthy ecosystems.", "zh": "它们既有破坏性，也对生态系统健康必不可少。"}, {"en": "They are always harmful and should be eliminated. according to some versions of the story", "zh": "它们总是有害，应当被彻底消除。（按书中另一种说法）"}, {"en": "They are a new problem caused by cities.", "zh": "它们是城市造成的新问题。"}, {"en": "They only happen in the United States.", "zh": "它们只发生在美国。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The conclusion says floods cause damage but are also necessary to the health of many living things.", "zh": "结语指出，洪水虽造成破坏，却对许多生物的生存必不可少。"}}], "extended": {"prompt": {"en": "The book says floods can be both destructive and helpful. Think of a natural event (like a fire, a storm, or a drought) in your own area. In what ways might it cause harm, and in what ways might it help the environment?", "zh": "书中说洪水既有破坏性也有益处。想想你所在地区的一种自然现象（比如火灾、风暴或干旱）。它可能在哪些方面造成危害，又可能在哪些方面对环境有益？"}, "guidance": {"en": ["List at least one way the event causes harm and one way it might help nature.", "Use facts from the book about floods as a model for your thinking."], "zh": ["至少列出这一现象造成危害的一个方面，以及对自然可能有益的一个方面。", "以书中关于洪水的利弊作为思考的范例。"]}}};</script>
