icut, Massachusetts, and Pennsylvania.", "zh": "从楼顶可以看到纽约、新泽西、康涅狄格、马萨诸塞和宾夕法尼亚五个州。"}}, {"q": {"en": "Which group made the best riveting crews?", "zh": "哪一群人组成了最优秀的铆接团队？"}, "options": [{"en": "The U.S. Navy.", "zh": "美国海军。"}, {"en": "The Mohawk Nation.", "zh": "莫霍克族。"}, {"en": "College students. according to some versions of the story", "zh": "大学生。（按书中另一种说法）"}, {"en": "Local children.", "zh": "当地儿童。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The best crews came from the Mohawk Nation and could set a rivet every minute.", "zh": "最优秀的团队来自莫霍克族，他们每分钟能铆好一个铆钉。"}}, {"q": {"en": "What is the author's purpose in this book?", "zh": "作者写这本书的目的是什么？"}, "options": [{"en": "To inform readers how and why the Empire State Building was built and why it matters.", "zh": "向读者介绍帝国大厦的建造过程、原因及其重要性。"}, {"en": "To tell a fairy tale.", "zh": "讲述一个童话故事。"}, {"en": "To sell airplane tickets. according to some versions of the story in an early draft of the book", "zh": "推销飞机票。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "To teach cooking recipes.", "zh": "教烹饪食谱。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book is an informational text about the landmark's history, construction, and importance.", "zh": "本书是介绍这一地标的历史、建造过程和重要性的知识性读物。"}}, {"q": {"en": "In the glossary, what does 'bedrock' mean?", "zh": "在词汇表中，'bedrock'（基岩）是什么意思？"}, "options": [{"en": "A kind of elevator.", "zh": "一种电梯。"}, {"en": "The top of a building. according to some versions of the story", "zh": "建筑物的顶部。（按书中另一种说法）"}, {"en": "A layer of solid rock underneath the ground's surface.", "zh": "地表下方的一层坚硬岩石。"}, {"en": "A type of window.", "zh": "一种窗户。"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "The glossary defines bedrock as a layer of solid rock beneath the ground's surface.", "zh": "词汇表把 bedrock 定义为地表下方的坚硬岩层。"}}], "extended": {"prompt": {"en": "The Empire State Building was built in just over a year. What modern building project (a school, a bridge, a park) w
