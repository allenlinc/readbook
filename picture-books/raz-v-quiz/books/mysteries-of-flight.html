ileron）起什么作用？"}, "options": [{"en": "They make the plane go up and down.", "zh": "它们让飞机上下移动。"}, {"en": "They help control the plane and make it roll side to side.", "zh": "它们帮助控制飞机并使其左右滚转。"}, {"en": "They steer the nose left and right. according to some versions of the story", "zh": "它们控制机头左右转向。（按书中另一种说法）"}, {"en": "They carry the luggage.", "zh": "它们装载行李。"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "Ailerons are hinged surfaces on the wings that help the plane roll from side to side.", "zh": "副翼是机翼后缘可动的小翼面，帮助飞机左右滚转。"}}, {"q": {"en": "Which part controls yaw, moving the nose left or right?", "zh": "哪个部件控制偏航，让机头左右转动？"}, "options": [{"en": "The elevators. according to some versions of the story", "zh": "升降舵。（按书中另一种说法）"}, {"en": "The ailerons.", "zh": "副翼。"}, {"en": "The engine.", "zh": "发动机。"}, {"en": "The rudder, controlled by pedals.", "zh": "方向舵，由脚踏板控制。"}], "answer": 3, "skill": "Craft and Structure", "explain": {"en": "Pedals move the rudder, which yaws the plane's nose left or right.", "zh": "脚踏板控制方向舵，使机头向左或向右偏航。"}}, {"q": {"en": "What do the elevators control?", "zh": "升降舵（elevator）控制什么？"}, "options": [{"en": "The color of the plane.", "zh": "飞机的颜色。"}, {"en": "Pitch — the nose moving up or down.", "zh": "俯仰——机头向上或向下。"}, {"en": "The speed of the engine.", "zh": "发动机的速度。"}, {"en": "Roll — tilting side to side. according to some versions of the story", "zh": "滚转——左右倾斜。（按书中另一种说法）"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "Elevators on the tail move up and down to pitch the plane's nose up or down.", "zh": "尾部的升降舵上下运动，使机头俯仰（向上或向下）。"}}, {"q": {"en": "What is 'lift'?", "zh": "什么是“升力”（lift）？"}, "options": [{"en": "A type of fuel.", "zh": "一种燃料。"}, {"en": "The weight of the plane. according to some versions of the story", "zh": "飞机的重量。（按书中另一种说法）"}, {"en": "An upward force that pushes the wing against gravity.", "zh": "一种把机翼向上推、对抗重力的力。"}, {"en": "The pilot's seat.", "zh": "飞行员的座位。"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "Lift is the upward aerodynamic force that lets a plane leave the ground and fly.", "zh": "升力是一种向上的空气动力，使飞机离地升空。"}}, {"q": {"en": "Why is an airplane wing curved on top?", "zh": "为什么飞机机翼上表面是弯曲的？"}, "options": [{"en": "To look pretty.", "zh": "为了好看。"}, {"en": "Air moves faster over the top, lowering pressure and creating lift.", "zh": "气流在上方更快，降低压强，从而产生升力。"}, {"en": "To store fuel.", "zh": "为了储存燃料。"}, {"en": "To hold more passengers. according to some versions of the story in an early draft of the book", "zh": "为了容纳更多乘客。（按书中另一种说法）（在书的早期草稿中）"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The curved top makes air travel faster there, so lower pressure above and higher below push the wing up.", "zh": "弯曲的上表面使气流更快，上方压强降低、下方较高，从而把机翼向上推。"}}, {"q": {"en": "According to the book, what is the key to flight?", "zh": "按书中说法，飞行的关键是什么？"}, "options": [{"en": "The shape of the wings, which generates lift.", "zh": "机翼的形状，它能产生升力。"}, {"en": "The color of the plane.", "zh": "飞机的颜色。"}, {"en": "The number of passengers. according to some versions of the story", "zh": "乘客的数量。（按书中另一种说法）"}, {"en": "The size of the wheels.", "zh": "轮子的大小。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book says all wings share the same curved shape, and that wing shape is the secret behind flight.", "zh": "书中说所有机翼都有相同的弯曲形状，机翼形状正是飞行的奥秘所在。"}}, {"q": {"en": "What did two French brothers invent in 1783?", "zh": "1783年，两位法国兄弟发明了什么？"}, "options": [{"en": "The first successful hot-air balloon.", "zh": "第一只成功的热气球。"}, {"en": "The airplane.", "zh": "飞机。"}, {"en": "The rocket.", "zh": "火箭。"}, {"en": "The helicopter. according to some versions of the story", "zh": "直升机。（按书中另一种说法）"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "In 1783, two French brothers discovered hot air rises and built the first hot-air balloon.", "zh": "1783年，两位法国兄弟发现热空气上升，并造出第一只热气球。"}}], "extended": {"prompt": {"en": "If you could design your own flying machine, what would it look like and how would it stay in the air?", "zh": "如果你能设计自己的飞行器，它会是什么样？靠什么留在空中？"}, "guidance": {"en": ["Think about the wing shape and the need for lift.", "Consider what power source would move it forward."], "zh": ["想想机翼形状与产生升力的需要。", "考虑用什么动力让它向前飞。"]}}};</script>
