<script>window.BOOK = {"slug": "who-likes-lemonade", "title": "Who Likes Lemonade?", "titleZh": "谁喜欢柠檬水？", "level": "Q", "genre": "Fiction", "mainSkill": "Author's Purpose and Perspective", "questions": [{"q": {"en": "Why does Mike want to raise money by selling lemonade?", "zh": "麦迪（Mike）为什么想靠卖柠檬水来赚钱？"}, "options": [{"en": "To buy his friend Derek's used Super Spy Kit, which costs $25", "zh": "为了买朋友德里克(Derek)那套二手「超级间谍套装」，要价 25 美元"}, {"en": "To buy a brand-new bicycle", "zh": "为了买一辆崭新的自行车"}, {"en": "To save up for college", "zh": "为了攒大学学费"}, {"en": "To buy his little sister Aster a birthday gift", "zh": "为了给妹妹艾斯特(Aster)买生日礼物"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Mike wanted a Super Spy Kit like Derek's. A new one cost $75, but Derek offered his used kit for a third of that—$25. Mike needed 'one big influx of cash' to buy it.", "zh": "麦迪想要一套像德里克那样的超级间谍套装。新的要 75 美元，但德里克愿以三分之一的价格——25 美元——卖出自己的旧套装。麦迪需要「一大笔进账」才能买下它。"}}, {"q": {"en": "What went wrong with Mike's lemonade stand last summer?", "zh": "去年夏天，麦迪的柠檬水摊出了什么问题？"}, "options": [{"en": "He got bored and wandered away from the stand", "zh": "他觉得很无聊，自己跑开了"}, {"en": "It rained and washed everything away", "zh": "下大雨，把东西都冲走了"}, {"en": "No one liked the taste of his lemonade", "zh": "没人喜欢他的柠檬水味道"}, {"en": "His mom made him close early", "zh": "妈妈让他提前收摊"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "His mom reminds him: 'You got bored and wandered away.' That is why she says this summer must be different.", "zh": "妈妈提醒他：「你当时觉得无聊，自己走开了。」所以她说今年夏天必须不一样。"}}, {"q": {"en": "In the glossary, what does the word 'artisanal' mean?", "zh": "在词汇表里，「artisanal」（手工精制的）是什么意思？"}, "options": [{"en": "Made by a skilled person who creates items by hand", "zh": "由手艺熟练的人亲手制作的东西"}, {"en": "Made cheaply in a factory", "zh": "在工厂里廉价批量生产的"}, {"en": "Made from artificial powder", "zh": "用人工粉末做成的"}, {"en": "Made only in the winter", "zh": "只在冬天制作的"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'artisanal' as 'made by or relating to a person who is skilled at a craft or trade and who creates items by hand.' Mike calls his from-scratch lemonade 'artisanal.'", "zh": "词汇表把 artisanal 定义为「由手艺熟练、靠手工制作物品的人做出的」。麦迪把自己现做的柠檬水称为「手工精制」的。"}}, {"q": {"en": "In the glossary, what is a 'profit margin'?", "zh": "在词汇表里，「profit margin」（利润空间）是什么？"}, "options": [{"en": "The difference between the cost of a product and its selling price", "zh": "一件产品的成本与售价之间的差额"}, {"en": "The total amount of money from sales", "zh": "卖出的所有钱的总额"}, {"en": "A type of lemon", "zh": "一种柠檬"}, {"en": "A discount on the regular price", "zh": "对原价打的折扣"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'profit margin' as 'the difference between the cost of a product or service and its selling price.' Mike's mom warns that out-of-season lemons will 'eat straight into your profit margin.'", "zh": "词汇表把 profit margin 定义为「一件产品或服务的成本与售价之间的差额」。麦迪的妈妈警告说，反季的柠檬会「直接吃掉你的利润空间」。"}}, {"q": {"en": "According to Mike's mom, when are lemons in season, and what does that mean for his summer stand?", "zh": "根据麦迪妈妈的话，柠檬在什么季节才当令？这对他夏天的摊子意味着什么？"}, "options": [{"en": "Lemons are out of season in summer; they come ripe in the winter", "zh": "柠檬夏天是反季的，要到冬天才成熟上市"}, {"en": "Lemons are in season all summer long", "zh": "整个夏天柠檬都当令"}, {"en": "Lemons grow all year round at the same price", "zh": "柠檬一年四季都有，价格一样"}, {"en": "Lemons only ripen in the spring", "zh": "柠檬只在春天成熟"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Mom says, 'Lemons are out of season now. Lemons come ripe in the winter.' That is why out-of-season lemons cost so much and hurt Mike's profit.", "zh": "妈妈说：「现在柠檬是反季的。柠檬是冬天才成熟的。」正因为如此，反季柠檬很贵，侵蚀了麦迪的利润。"}}, {"q": {"en": "After paying costs, did Mike actually make a profit from the lemonade stand?", "zh": "在扣除成本之后，麦迪的柠檬水摊实际上赚钱了吗？"}, "options": [{"en": "No—his sales were $27.35 but costs were $27.50, so he owed his mom $1.50 (a small loss)", "zh": "没有——他卖出 27.35 美元，但成本有 27.50 美元，所以还欠妈妈 1.50 美元（小亏一笔）"}, {"en": "Yes—he made a $26 profit after costs", "zh": "赚了——扣除成本后净赚 26 美元"}, {"en": "Yes—he made exactly $75", "zh": "赚了——正好赚了 75 美元"}, {"en": "No—he lost more than $20", "zh": "没赚——亏了 20 多美元"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Gross sales were $27.35. The lemons cost $20.70 and the sugar $6.80, so total cost was $27.50. He ended up owing his mom $1.50—his net was a small loss.", "zh": "总销售额是 27.35 美元。柠檬花了 20.70 美元、糖 6.80 美元，总成本 27.50 美元。结果他还欠妈妈 1.50 美元——净下来是小亏。"}}, {"q": {"en": "Why did Mike's lemonade stand do so well ('business boomed')?", "zh": "为什么麦迪的柠檬水摊生意那么红火（「business boomed」）？"}, "options": [{"en": "Adults and kids both loved the real, high-quality lemonade, and Aster's smile drew in customers", "zh": "大人和小孩都喜欢那真正高品质的柠檬水，而艾斯特的笑容吸引了顾客"}, {"en": "It was the only lemonade stand in the whole town", "zh": "因为它是全镇唯一的柠檬水摊"}, {"en": "He sold each cup for only a penny", "zh": "因为他每杯只卖一美分"}, {"en": "The weather was cold so people wanted warm drinks", "zh": "因为天气冷，大家都想喝热饮"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says 'Adults loved the lemonade, kids loved the lemonade, and business boomed.' Mike also used Aster's missing-tooth smile to 'draw in customers,' and his lemonade made lips pucker with a 'one-two punch' of sweet and sour.", "zh": "书里说「大人爱这柠檬水，小孩也爱，生意一下子红火起来」。麦迪还用艾斯特缺牙的笑容「招揽顾客」，他的柠檬水以酸甜「一记快拳」让人嘴唇发皱。"}}, {"q": {"en": "What lesson does Mike learn by the end of the story?", "zh": "故事结尾，麦迪学到了什么道理？"}, "options": [{"en": "That making a quality product and working hard matters—even a 'failure' can be something to be proud of", "zh": "亲手做出好产品、努力付出是有意义的——即使看似「失败」，也值得骄傲"}, {"en": "That he should never sell lemonade again", "zh": "他再也不该卖柠檬水了"}, {"en": "That cheating customers is the best way to make money", "zh": "欺骗顾客是赚钱的最好办法"}, {"en": "That his sister should run the business instead", "zh": "应该让妹妹来经营生意"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Mike calls himself 'a total failure' for losing money, but his mom says 'Not you' and is 'so proud of you two.' He finally tastes his own delicious lemonade. The book suggests effort and quality matter, not just profit.", "zh": "麦迪因为亏钱自称「彻底失败」，但妈妈说「你才不是」，并「为你们俩感到骄傲」。他终于尝到自己美味的柠檬水。书想表达的是：努力和品质才有意义，而不只是赚不赚钱。"}}, {"q": {"en": "What is the book's Focus Question—the big question the author wants you to think about?", "zh": "这本书的「聚焦问题」(Focus Question) 是什么？也就是作者希望你思考的核心问题。"}, "options": [{"en": "What lesson does Mike learn from having a lemonade stand?", "zh": "麦迪从经营柠檬水摊中学到了什么道理？"}, {"en": "What is the best recipe for lemonade?", "zh": "柠檬水的最佳配方是什么？"}, {"en": "Why do lemons cost so much money?", "zh": "柠檬为什么这么贵？"}, {"en": "How old is Mike?", "zh": "麦迪几岁了？"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book opens with the Focus Question: 'What lesson does Mike learn from having a lemonade stand?' The whole story and its ending answer it.", "zh": "书一开头就提出聚焦问题：「麦迪从经营柠檬水摊中学到了什么道理？」整个故事和结尾都在回答它。"}}, {"q": {"en": "In the glossary, what does the word 'influx' mean—the word Mike used when he needed cash?", "zh": "在词汇表里，「influx」（大量涌入）是什么意思？——那是麦迪需要现金时用到的一个词。"}, "options": [{"en": "The steady flowing in or arrival of large amounts of something", "zh": "大量某物持续涌入或到来"}, {"en": "A type of lemonade", "zh": "一种柠檬水"}, {"en": "Running completely out of something", "zh": "把某物用得一干二净"}, {"en": "A discount on the price", "zh": "价格上的折扣"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'influx' as 'the steady flowing in or arrival of large amounts of something.' Mike hoped 'one big influx of cash' would let him buy Derek's kit.", "zh": "词汇表把 influx 定义为「大量某物持续涌入或到来」。麦迪希望有一大笔现金「涌入」，好买下德里克的套装。"}}], "extended": {"prompt": {"en": "Mike did not make a profit, but he learned about gross vs. net profit, the cost of quality ingredients, and the value of hard work. Have you ever tried to earn money or make something to sell? What did you learn about costs, prices, or making a good product?", "zh": "麦迪没有赚到钱，但他弄懂了毛利与净利、好原料的成本，以及努力工作的价值。你有没有试过自己赚钱，或做点东西来卖？你从成本、定价或做好一件产品中学到了什么？"}, "guidance": {"en": ["Mike's gross sales were $27.35, but his costs (lemons $20.70 + sugar $6.80 = $27.50) left him owing $1.50 (p. 11-13).", "He learned 'out of season = expensive' only after checking the grocery receipt (p. 11).", "A good answer gives a real example of earning or making something and explains what it taught you about money or quality."], "zh": ["麦迪总销售额 27.35 美元，但成本（柠檬 20.70 + 糖 6.80 = 27.50 美元）让他反而欠了 1.50 美元（第11-13页）。", "他是看了购物小票才明白「反季 = 昂贵」（第11页）。", "好的回答会举一个真实赚钱或做东西的例子，并说明它让你对金钱或品质有了什么认识。"]}}};</script>
