<script>window.BOOK = {"slug": "eleventeen", "title": "Eleventeen", "titleZh": "十一岁的小大人", "level": "Q", "genre": "Fiction", "mainSkill": "Author's Purpose and Perspective", "questions": [{"q": {"en": "Who is the only person who has ever turned 'eleventeen'?", "zh": "谁是唯一一个曾经「十一又十七岁」(eleventeen) 的人？"}, "options": [{"en": "Sarah", "zh": "莎拉"}, {"en": "Her sister Kate", "zh": "她的姐姐凯特"}, {"en": "Her brother Noah", "zh": "她的弟弟诺亚"}, {"en": "Her mother", "zh": "她的妈妈"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says, 'Sarah turned eleventeen yesterday,' and 'Sarah is the only person who has ever turned eleventeen. Ever!'", "zh": "书里说「莎拉昨天变成了十一又十七岁」，而且「莎拉是唯一一个曾经变成十一又十七岁的人。空前绝后！」"}}, {"q": {"en": "What does eight-year-old Noah say he wishes about his two sisters?", "zh": "八岁的诺亚说，他希望自己的两个姐姐怎样？"}, "options": [{"en": "He wishes they were both eighteen so they'd go to college and he'd have Mom to himself", "zh": "他希望她们都十八岁，好去上大学，那样妈妈就只属于他一个人了"}, {"en": "He wishes they were both snails", "zh": "他希望她们都变成蜗牛"}, {"en": "He wishes they would take him to the mall", "zh": "他希望她们带他去商场"}, {"en": "He wishes they would stop eating breakfast", "zh": "他希望她们别再吃早饭"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Noah says, 'I wish you were both eighteen... Because then they'd both go away to college, and I'd have Mommy all to myself.'", "zh": "诺亚说：「我希望你们都十八岁……因为那样你们就都去上大学了，妈妈就只属于我一个人了。」"}}, {"q": {"en": "Once Sarah turns eleven, what new things will she be able to do, according to the book?", "zh": "根据这本书，莎拉一旦满十一岁，就能做哪些新事情？"}, "options": [{"en": "Jog to the park with her friend Alika and babysit her brother Noah for pay", "zh": "和好朋友阿莉卡慢跑去公园，并且有偿帮妈妈照看弟弟诺亚"}, {"en": "Drive a car", "zh": "开汽车"}, {"en": "Go to college", "zh": "上大学"}, {"en": "Vote in an election", "zh": "参加选举投票"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says at eleven she and Alika 'would be able to jog down to the park,' and 'her parents said she could babysit Noah and they would pay her.'", "zh": "书里说，到了十一岁，她和阿莉卡「就能慢跑着去公园」，而且「父母说她可以照看诺亚，还会付她钱」。"}}, {"q": {"en": "Why does Sarah say 'eleven was only five words away from sixteen'?", "zh": "莎拉为什么说「十一离十六只差五个词」？"}, "options": [{"en": "Counting from eleven to sixteen (twelve, thirteen, fourteen, fifteen, sixteen) is only five number-words", "zh": "从十一数到十六（十二、十三、十四、十五、十六）只有五个数字词"}, {"en": "Eleven and sixteen are spelled almost the same", "zh": "十一和十六的拼写几乎一样"}, {"en": "She would turn sixteen in five days", "zh": "再过五天她就十六岁了"}, {"en": "Her sister Kate is five years older", "zh": "她的姐姐凯特比她大五岁"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "She means that by counting the number-words — twelve, thirteen, fourteen, fifteen, sixteen — eleven is just five words from sixteen, which makes her feel almost a teenager.", "zh": "她的意思是，顺着数字词数下去——十二、十三、十四、十五、十六——十一离十六只差五个词，这让她觉得自己简直像个青少年了。"}}, {"q": {"en": "From what point of view is the story told?", "zh": "这个故事是用什么视角（人称）叙述的？"}, "options": [{"en": "Third-person — a narrator describes Sarah's thoughts and actions (e.g., 'Sarah turned eleventeen yesterday')", "zh": "第三人称——由叙述者描述莎拉的想法和行为（例如「莎拉昨天变成了十一又十七岁」）"}, {"en": "First-person — Sarah tells it as 'I'", "zh": "第一人称——由莎拉以「我」的口吻讲述"}, {"en": "Second-person — the reader is the main character", "zh": "第二人称——读者就是主角"}, {"en": "As a script performed on stage", "zh": "以舞台剧本的形式"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The narrator describes Sarah from outside, using 'Sarah turned eleventeen yesterday' and 'Sarah said,' which is third-person narration.", "zh": "叙述者从外部描写莎拉，用「莎拉昨天变成了十一又十七岁」「莎拉说」，这是第三人称叙述。"}}, {"q": {"en": "When Sarah has a dilemma, what does her dad tell her to do, and what does it mean?", "zh": "当莎拉遇到两难问题时，爸爸叫她怎么做？这句话是什么意思？"}, "options": [{"en": "Weigh the facts — compare the good points of each choice as if putting them on a scale", "zh": "「权衡事实」——就像把每个选项的优点放到天平上比较"}, {"en": "Run away — leave the house until she feels better", "zh": "「逃跑」——离开家直到心情好转"}, {"en": "Ask Kate — let her big sister decide", "zh": "「去问凯特」——让姐姐替她决定"}, {"en": "Eat breakfast — food solves everything", "zh": "「吃早饭」——食物能解决一切"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The book says, 'Whenever Sarah had a dilemma, her father would tell her to \"weigh the facts.\"' She uses a table like a scale to compare the two sides.", "zh": "书里说：「每当莎拉遇到两难，爸爸就会叫她『权衡事实』。」她用一张表格当天平，来比较两种选择。"}}, {"q": {"en": "Sarah makes a table comparing 'being a teenager' and 'being eleven.' What does she conclude about how eleven is like being sixteen?", "zh": "莎拉画了一张表，比较「当青少年」和「当十一岁」。她得出什么结论：十一岁在哪些方面像十六岁？"}, "options": [{"en": "At eleven she can earn her own money and decide how to spend it, just like a sixteen-year-old", "zh": "到了十一岁，她能自己赚钱、自己决定怎么花，就像十六岁的人一样"}, {"en": "At eleven she can go to college", "zh": "到了十一岁她就能上大学"}, {"en": "At eleven she can drive a car", "zh": "到了十一岁她就能开车"}, {"en": "At eleven she can vote", "zh": "到了十一岁她就能投票"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "She notes that at eleven she can babysit Noah, earn money, and 'use her own money and buy things she wanted... just like a sixteen-year-old.'", "zh": "她注意到，到了十一岁，她可以照看诺亚、赚钱，并且「用自己的钱买想要的东西……就像十六岁的人一样」。"}}, {"q": {"en": "How does Sarah combine her ideas to create the word 'eleventeen'?", "zh": "莎拉是怎样把自己的想法组合起来，造出「eleventeen」这个词的？"}, "options": [{"en": "She blends 'eleven' with 'teen' because she feels responsible and grown-up like a teenager, though still eleven in years", "zh": "她把「eleven」和「teen」合在一起，因为虽然年纪还是十一，她却觉得自己像青少年一样懂事、长大了"}, {"en": "She counts to eleven and then adds seven", "zh": "她数到十一，再加上七"}, {"en": "She copies the word from her sister Kate", "zh": "她从姐姐凯特那儿抄来的"}, {"en": "She finds it in the dictionary", "zh": "她在字典里查到的"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "She realizes eleven is 'only five words away from sixteen' and decides to call herself 'eleventeen' — like a teenager (responsible, able to earn money), but not yet one in years.", "zh": "她意识到十一「离十六只差五个词」，于是决定自称「eleventeen」——像青少年一样（懂事、能赚钱），但年纪上还不是。"}}, {"q": {"en": "What lesson does Sarah learn by the end of the story?", "zh": "到故事结尾，莎拉学到了什么道理？"}, "options": [{"en": "It is more important to act older (responsible, earning money) than to actually be older", "zh": "表现得成熟（有责任心、能赚钱）比实际年龄更大更重要"}, {"en": "Being twelve is the best age of all", "zh": "十二岁才是最好玩的年纪"}, {"en": "She should never listen to her dad", "zh": "她永远不该听爸爸的话"}, {"en": "Snails are faster than sisters", "zh": "蜗牛比姐姐跑得快"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book ends with Sarah thinking, 'it's more important to act older than to be older. Her dad was right—when you have a dilemma, all you have to do is weigh the facts.'", "zh": "书的结尾，莎拉想：「表现得成熟比实际年龄更大更重要。爸爸是对的——遇到两难时，你只要权衡事实就好。」"}}, {"q": {"en": "How does the author make the story feel playful and draw the reader in?", "zh": "作者用了什么手法，让故事显得俏皮、并把读者吸引进来？"}, "options": [{"en": "The narrator speaks directly to the reader ('I'll let you in on a little secret') and uses a made-up word", "zh": "叙述者直接对读者说话（「让我悄悄告诉你一个小秘密」），还用了一个自造的词"}, {"en": "The book is written as a science report", "zh": "这本书是以科学报告的形式写的"}, {"en": "The story takes place in outer space", "zh": "故事发生在外太空"}, {"en": "The characters are all animals", "zh": "角色全都是动物"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The narrator breaks the fourth wall — 'I'll let you in on a little secret' — and invents 'eleventeen,' giving the story a light, playful tone.", "zh": "叙述者打破了「第四面墙」——「让我悄悄告诉你一个小秘密」——还发明了「eleventeen」这个词，让故事充满轻松俏皮的语气。"}}], "extended": {"prompt": {"en": "Sarah invents 'eleventeen' because she feels caught between being a little kid and being a teenager. Think of a time you felt 'too young' for something you wanted to do. What did you do about it? How is Sarah's way of 'acting older than her age' like or unlike what you did?", "zh": "莎拉发明了「eleventeen」，因为她觉得自己卡在「小孩子」和「青少年」之间。回想一次你觉得「太小了」、做不了想做的事的经历。你当时是怎么做的？莎拉这种「表现得比实际年龄更成熟」的方式，和你当时的做法有什么相似或不同？"}, "guidance": {"en": ["Sarah feels stuck: she is 'bored being ten' and 'bored being eleven,' and 'twelve sounded just awful' (p. 11).", "She solves it by 'weighing the facts' in a table, listing good things about being eleven vs. a teenager (p. 12-18).", "A good answer gives a real personal example and compares it to Sarah's idea that acting responsibly matters more than the number of years."], "zh": ["莎拉觉得被困住了：她「嫌十岁无聊」「嫌十一岁无聊」，而且「十二岁听起来糟透了」（第11页）。", "她用一张表格「权衡事实」，列出当十一岁和当青少年各自的好处（第12-18页）。", "好的回答会举一个真实的亲身例子，并把它和莎拉「表现得负责任比年龄数字更重要」的想法作比较。"]}}};</script>
