<script>window.BOOK = {"slug": "his-biggest-fan", "title": "His Biggest Fan", "titleZh": "他最忠实的粉丝", "level": "Q", "genre": "Fiction", "mainSkill": "Author's Purpose and Perspective", "questions": [{"q": {"en": "What event is Kenny racing in at the finals?", "zh": "肯尼在决赛中参加的是哪个项目？"}, "options": [{"en": "The 100-meter dash", "zh": "100 米短跑"}, {"en": "The long jump", "zh": "跳远"}, {"en": "The marathon", "zh": "马拉松"}, {"en": "The relay race", "zh": "接力赛"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says, 'Kenny and the other runners moved into their lanes for his event: the 100-meter dash.'", "zh": "书里写道：『肯尼和其他选手各就各位，参加他的项目：100 米短跑。』"}}, {"q": {"en": "Why did Kenny tell his dad not to come watch the race?", "zh": "肯尼为什么不让爸爸来看比赛？"}, "options": [{"en": "Because his dad made him nervous and he thought he'd do better 'on my own'", "zh": "因为爸爸会让他紧张，他觉得『自己一个人』会发挥得更好"}, {"en": "Because his dad was too busy with work", "zh": "因为爸爸工作太忙"}, {"en": "Because only teammates were allowed in the stands", "zh": "因为只有队友才能进看台"}, {"en": "Because he was embarrassed by his dad", "zh": "因为他觉得爸爸让他难为情"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Kenny tells his dad, 'It's just that you make me nervous, Dad. I think I'll do better... on my own.'", "zh": "肯尼对爸爸说：『只是你让我紧张，爸爸。我觉得自己一个人会发挥得更好……』"}}, {"q": {"en": "Even after arguing with his dad, what did Kenny do before the race?", "zh": "即使和爸爸吵了一架，肯尼赛前还是做了什么？"}, "options": [{"en": "He followed his dad's advice: went to bed early, ate a light breakfast, and ran two laps and three sprints", "zh": "他照爸爸的建议做了：早点睡觉、早餐吃得清淡，还跑了两圈、做了三组冲刺"}, {"en": "He skipped the warm-up to rest his legs", "zh": "他跳过热身，让腿休息"}, {"en": "He ate a big meal for energy", "zh": "他吃了一大顿饭补充能量"}, {"en": "He asked his dad to coach him at the track", "zh": "他请爸爸到跑道边指导他"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says Kenny 'went to bed early, so he felt rested. He'd had a light breakfast, and he ran his two laps and three sprints, just as his dad had suggested.'", "zh": "书里说肯尼『早点睡了，所以精神饱满。他早餐清淡，还跑了两圈、做了三组冲刺——正如爸爸建议的那样』。"}}, {"q": {"en": "Coach Fisher tells the runners, 'don't run to the finish line, run through the finish line!' What does this mean?", "zh": "费舍尔教练对选手们说：『别跑到终点线就停，要冲过终点线！』这是什么意思？"}, "options": [{"en": "Keep pushing with full effort past the line instead of slowing down at it", "zh": "保持全力冲过终点线，而不是在线上减速"}, {"en": "Stop exactly on the finish line", "zh": "正好停在终点线上"}, {"en": "Run in a straight line to the finish", "zh": "沿直线跑向终点"}, {"en": "Walk calmly through the finish line", "zh": "镇静地走过终点线"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The coach's strategy is to drive hard the whole way; Kenny remembers it at the end—'Don't run to it, run through it'—and leans forward to break the tape with full speed.", "zh": "教练的策略是全程全力冲刺；肯尼最后想起这句话——『别跑到线就停，要冲过去』——便前倾身体、以全速撞线。"}}, {"q": {"en": "From what point of view is Kenny's story told?", "zh": "肯尼的故事是用什么视角（人称）叙述的？"}, "options": [{"en": "Third person—a narrator describes Kenny's thoughts and feelings from outside", "zh": "第三人称——由叙述者从外部描写肯尼的想法和感受"}, {"en": "First person—Kenny tells it as 'I'", "zh": "第一人称——由肯尼以『我』讲述"}, {"en": "Second person—the reader is 'you'", "zh": "第二人称——以『你』称呼读者"}, {"en": "It is told through text messages", "zh": "它是用短信的形式讲的"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The narrator says things like 'Kenny heard every word' and 'Kenny's heart sank,' describing his inner life from outside—third person.", "zh": "叙述者写道『肯尼听到每一个字』『肯尼的心一沉』，从外部描写他的内心——这是第三人称。"}}, {"q": {"en": "Kenny wins and sets a personal record, but how does he feel afterward?", "zh": "肯尼赢了，还刷新了个人最好成绩，但他赛后感觉如何？"}, "options": [{"en": "Proud of his record but empty, because the person he wanted to show it to—his dad—wasn't there", "zh": "为自己破纪录骄傲，却感到空虚，因为最想给之看的人——爸爸——不在场"}, {"en": "Overjoyed and celebrated with his whole family", "zh": "欣喜若狂，和全家一起庆祝"}, {"en": "Angry that he didn't break the world record", "zh": "气自己没破世界纪录"}, {"en": "Relieved it was over and forgot about it", "zh": "如释重负，事情结束就忘了"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says his time was 'a personal record—the best he'd ever run. It didn't feel as good as he hoped,' and holding the medal 'He wanted to show it to someone... but that someone wasn't there.'", "zh": "书里说他的成绩是『个人最好纪录——他跑得最快的一次。却没有他希望的那么开心』，捧着奖牌时『他想给某个人看……但那个人不在』。"}}, {"q": {"en": "At the top of the bleachers, Kenny finds a handwritten sign that says 'I was here. Nice job.' Who left it, and what does it show?", "zh": "在看台最高处，肯尼发现一张手写的小纸条：『我来了。干得漂亮。』是谁留的？这说明了什么？"}, "options": [{"en": "His dad left it—showing he came to support Kenny quietly even after being told not to", "zh": "是爸爸留的——说明即使被嘱咐别来，他仍悄悄来为肯尼加油"}, {"en": "His coach left it as a joke", "zh": "是教练留着开玩笑的"}, {"en": "A stranger who watched the race", "zh": "一个看了比赛的陌生人"}, {"en": "Kenny's friend Eric", "zh": "肯尼的朋友埃里克"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Kenny 'knew that handwriting'—it was his father's. The sign shows his dad was there cheering him on, respecting Kenny's wish to be independent while still showing love.", "zh": "肯尼『认得那字迹』——是爸爸的。纸条说明爸爸就在现场为他加油，既尊重肯尼想要独立的愿望，又默默表达爱。"}}, {"q": {"en": "The book's Focus Question is 'How does it feel to become more independent as you get older?' What feeling does Kenny's story show?", "zh": "这本书的「聚焦问题」是：『随着年龄增长变得更独立，是什么感觉？』肯尼的故事展现了怎样的感受？"}, "options": [{"en": "It can feel good but also lonely and mixed—Kenny wanted independence yet missed his dad's support", "zh": "既好又掺杂着孤独与矛盾——肯尼想要独立，却又想念爸爸的支持"}, {"en": "It feels only exciting and free, with no downsides", "zh": "只有兴奋和自由，没有任何不好"}, {"en": "It feels scary and should always be avoided", "zh": "很可怕，应该永远避免"}, {"en": "It means you must cut off your family completely", "zh": "意味着必须和家人彻底断绝关系"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The author shows Kenny choosing independence ('I'll do better on my own') but then feeling 'a nagging regret' and emptiness when he wins without his dad there—independence feels mixed.", "zh": "作者写出肯尼选择独立（『自己一个人会做得更好』），却在爸爸不在场时赢了比赛后感到『挥之不去的懊悔』与空虚——独立的感觉是复杂的。"}}, {"q": {"en": "Why do you think the author ends the story with the father's quiet sign instead of a big reunion?", "zh": "你认为作者为什么用爸爸那张安静的纸条来结尾，而不是一场大团圆的重逢？"}, "options": [{"en": "To show that love and support can stay with you even when you choose to stand on your own", "zh": "为了说明即使你选择独立前行，爱与支持也依然陪伴着你"}, {"en": "To punish Kenny for being rude to his dad", "zh": "为了惩罚肯尼对爸爸无礼"}, {"en": "To show the dad was angry and left forever", "zh": "为了说明爸爸生气、永远离开了"}, {"en": "To surprise the reader with a mystery", "zh": "为了让读者对一个谜团感到意外"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "By ending with the gentle sign 'I was here. Nice job,' the author shows the father's pride and quiet love, teaching that growing independent doesn't mean losing family support.", "zh": "以那张温柔的纸条『我来了。干得漂亮。』收尾，作者表现出爸爸的骄傲与默默的爱，告诉我们：变得独立并不意味着失去家人的支持。"}}, {"q": {"en": "What does Kenny learn about independence and family by the end of the story?", "zh": "到故事结尾，肯尼对「独立」和「家人」学到了什么？"}, "options": [{"en": "That wanting to do things on your own is okay, but you can still value and miss your family's support", "zh": "想自己做事没什么不对，但你依然可以珍视、并想念家人的支持"}, {"en": "That he should never listen to his father again", "zh": "他以后绝不该再听爸爸的话"}, {"en": "That winning is the only thing that matters", "zh": "赢才是唯一重要的事"}, {"en": "That he was right to push his dad away completely", "zh": "他彻底推开爸爸是对的"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Kenny feels 'a nagging regret' for pushing his dad away and lights up at the sign, learning that independence and family love can exist together.", "zh": "肯尼对推开爸爸感到『挥之不去的懊悔』，看到纸条又露出笑容，从而明白：独立与家人的爱可以并存。"}}], "extended": {"prompt": {"en": "Kenny wanted to race on his own because his dad made him nervous, but after winning he wished his dad had been there to share it. Think of a time you wanted to do something by yourself, or asked a family member to give you space. How did it feel? What did you learn about independence and the people who support you?", "zh": "肯尼因为爸爸让他紧张而想自己比赛，可赢了之后却希望爸爸在场分享。回想一次你想独自完成某事、或请家人给你空间的经验。那是什么感觉？你从「独立」和「支持你的人」身上学到了什么？"}, "guidance": {"en": ["Kenny told his dad, 'you make me nervous... I think I'll do better on my own' (p. 8).", "After winning, he felt 'a nagging regret' and wanted to show the medal 'to someone... but that someone wasn't there' (p. 12).", "A good answer shares a real experience of wanting independence and reflects on missing (or appreciating) a supporter."], "zh": ["肯尼对爸爸说：『你让我紧张……我觉得自己一个人会做得更好』（第8页）。", "赢了之后，他感到『挥之不去的懊悔』，想把奖牌给『某个人看……但那个人不在』（第12页）。", "好的回答要分享一段想独立的真实经历，并反思对支持者的想念（或感激）。"]}}};</script>
