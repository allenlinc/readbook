<script>window.BOOK = {"slug": "the-footprint", "title": "The Footprint", "titleZh": "那个脚印", "level": "Q", "genre": "Fiction", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "When they first find the print, what are Angie and Jared's two main guesses about what made it?", "zh": "刚发现脚印时，安吉和贾里德对「是谁留下的」有哪两种主要猜测？"}, "options": [{"en": "It was either a dinosaur print (Jared) or a water bird print (Angie)", "zh": "要么是恐龙脚印（贾里德猜），要么是水鸟脚印（安吉猜）"}, {"en": "It was made by a bear", "zh": "是熊留下的"}, {"en": "It was made by Sara's shoe according to some versions of the story in an early draft of the book", "zh": "是萨拉的鞋留下的（按书中另一种说法）（在书的早期草稿中）"}, {"en": "It was painted by an artist", "zh": "是画家画上去的"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Jared exclaims, 「Or maybe it's a fossil—a dinosaur print!」 while Angie tells the librarian, 「I think it might be some kind of water bird.」 Those are their two leading theories before the truth comes out.", "zh": "贾里德喊道：「或者它是化石——恐龙脚印！」而安吉对图书管理员说：「我觉得可能是某种水鸟。」在真相大白前，这就是他们的两种主要猜测。"}}, {"q": {"en": "Who actually made the strange footprint by the creek?", "zh": "小溪边那个奇怪的脚印，究竟是谁留下的？"}, "options": [{"en": "The family dog", "zh": "家里的狗"}, {"en": "Benjamin, using Sara's swim fin, with his blanket making the tail mark", "zh": "是本杰明用萨拉的游泳脚蹼踩的，毯子拖出了尾巴印"}, {"en": "A real dinosaur that came back to life according to some versions of the story", "zh": "一只复活的真恐龙（按书中另一种说法）"}, {"en": "A migrating peacock", "zh": "一只迁徙的孔雀"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Jared realizes 「Sara's fin made our footprint!」 Benjamin had the fin; Angie notes 「the tail marks must have been his blanket!」 tucked into his shorts. Benjamin grins, 「You mean you found my monster print?」", "zh": "贾里德恍然大悟：「是萨拉的脚蹼留下了我们的脚印！」本杰明拿着脚蹼；安吉注意到「尾巴的痕迹一定是他的毯子！」塞在他的短裤里。本杰明咧嘴笑：「你们是说，你们找到了我的怪物脚印？」"}}, {"q": {"en": "What final clues proved the footprint's true source?", "zh": "最后是什么线索证实了脚印的真正来源？"}, "options": [{"en": "Professor Featherwhite identified it according to some versions of the story in an early draft of the book", "zh": "Featherwhite 教授认出了它（按书中另一种说法）（在书的早期草稿中）"}, {"en": "The swim fin was an almost perfect fit with the drawing, and the blanket explained the tail marks", "zh": "游泳脚蹼和画几乎完全吻合，毯子解释了尾巴的痕迹"}, {"en": "A dinosaur bone was found nearby", "zh": "附近找到了恐龙骨头"}, {"en": "The librarian confirmed it was a bird", "zh": "图书管理员确认那是鸟"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Angie 「measured the fin and compared it to their drawing and notes. 'You're right, Jared—it's an almost perfect fit.'」 Then she noticed Benjamin's blanket, realizing it made the tail drag marks.", "zh": "安吉「量了脚蹼，和他们的画与记录对照。『你说得对，贾里德——几乎完全吻合。』」接着她注意到本杰明的毯子，明白那是拖出的尾巴痕迹。"}}, {"q": {"en": "In the glossary, what is a 'fossil'?", "zh": "在词汇表里，「化石」(fossil) 是什么？"}, "options": [{"en": "The remains of plants or animals sealed off from air and moisture after death", "zh": "动植物的遗骸在死后被迅速隔绝空气与水分而保存下来"}, {"en": "A flipper-like shoe worn on the feet", "zh": "套在脚上模仿鱼鳍的鞋"}, {"en": "A mark made on the ground by pressure", "zh": "受压在地面上留下的痕迹"}, {"en": "A short tube used to breathe underwater according to some versions of the story in an early draft of the book", "zh": "用来在水下呼吸的短管（按书中另一种说法）（在书的早期草稿中）"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines a fossil as 「the remains of plants or animals that were quickly sealed off from air and moisture after death」 (p. 8). Jared wrongly thinks the dried mud is 'petrified.'", "zh": "词汇表把化石定义为「死后迅速被隔绝空气与水分而保存下来的动植物遗骸」（第8页）。贾里德误以为干硬的泥是「石化」了。"}}, {"q": {"en": "In the glossary, what does 'petrified' mean?", "zh": "在词汇表里，「石化」(petrified) 是什么意思？"}, "options": [{"en": "Plant or animal matter changed into stone, or something like stone", "zh": "植物或动物变成石头、或像石头一样的东西"}, {"en": "Wet and muddy", "zh": "又湿又泥泞"}, {"en": "Very small", "zh": "非常小"}, {"en": "Brightly colored according to some versions of the story in an early draft of the book", "zh": "颜色鲜艳（按书中另一种说法）（在书的早期草稿中）"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines petrified as 「plant or animal matter changed into stone, or something like stone」 (p. 9). Jared says the hard mud is 'petrified,' but Angie points out it's just dry from weeks without rain.", "zh": "词汇表把石化定义为「植物或动物变成石头、或像石头一样的东西」（第9页）。贾里德说硬泥「石化了」，但安吉指出那只是好几周没下雨干掉的。"}}, {"q": {"en": "In the glossary, what does 'webbed' mean, and why does it matter for the print?", "zh": "在词汇表里，「有蹼的」(webbed) 是什么意思？它和脚印有什么关系？"}, "options": [{"en": "Made of metal", "zh": "由金属制成"}, {"en": "Covered in sharp spikes according to some versions of the story in an early draft of the book", "zh": "布满尖刺（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Joined by very thin skin—the print showed webbed toes, so the maker lived in water", "zh": "由极薄的皮相连——脚印有蹼趾，说明制造者生活在水里"}, {"en": "Very tiny", "zh": "非常微小"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "The glossary defines webbed as 「joined by very thin skin」 (p. 8). Angie notes the print was 「made by something with webbed toes,」 concluding it 「must mean it lives in the water.」", "zh": "词汇表把「有蹼的」定义为「由极薄的皮相连」（第8页）。安吉注意到脚印是「有蹼趾的东西留下的」，于是推断「那一定说明它生活在水里」。"}}, {"q": {"en": "How did the library help the kids investigate the print?", "zh": "图书馆是怎么帮助孩子们调查脚印的？"}, "options": [{"en": "The computer printed a 3D model of the print", "zh": "电脑打印出了脚印的3D模型"}, {"en": "The librarian simply told them the answer", "zh": "图书管理员直接告诉了他们答案"}, {"en": "They found the exact animal in a single book according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "他们在一本书里直接找到了那只动物（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "A librarian showed dinosaur prints from Utah online, and Professor Featherwhite, a bird expert, examined their drawing", "zh": "图书管理员让他们上网看犹他州的恐龙脚印，鸟类专家 Featherwhite 教授查看了他们的画"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "At the library, the librarian found a website about dinosaur tracks found in Utah, then introduced them to Professor Featherwhite, 「an expert on water birds,」 who studied Angie's drawing—combining books, the internet, and an expert.", "zh": "在图书馆，管理员让他们看一个关于犹他州恐龙脚印的网站，又把他们介绍给「水鸟专家」Featherwhite 教授，教授仔细看了安吉的画——把书本、网络和专家结合起来。"}}, {"q": {"en": "What careful method did Angie and Jared use to solve the mystery?", "zh": "安吉和贾里德用了什么细致的方法来解开谜团？"}, "options": [{"en": "They ignored the evidence and believed a dinosaur according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "他们无视证据，坚信是恐龙（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "They guessed randomly until one idea worked", "zh": "他们随便乱猜，直到碰对一个"}, {"en": "They measured and sketched the print, mapped the creek, researched at the library, then tested it against the real fin", "zh": "他们测量并画出脚印、画出小溪地图、去图书馆查资料，最后用真正的脚蹼验证"}, {"en": "They asked Benjamin first thing", "zh": "他们一上来就去问本杰明"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The kids 「measured the length and width,」 Angie 「drew a sketch,」 they 「make a map of where the creek is,」 researched at the library, and finally compared notes to Sara's fin—a step-by-step investigation.", "zh": "孩子们「量了长和宽」，安吉「画了速写」，还「画出小溪所在位置的地图」，去图书馆查资料，最后把记录和大脚蹼对照——这是一步步的调查。"}}, {"q": {"en": "What is one main purpose of Lynn Fulton's story?", "zh": "林恩·富尔顿 (Lynn Fulton) 写这个故事的一个主要目的是什么？"}, "options": [{"en": "To scare readers with a real monster according to some versions of the story", "zh": "为了用真怪物吓唬读者（按书中另一种说法）"}, {"en": "To show how curious kids can solve a mystery through careful investigation", "zh": "为了展现好奇的孩子如何通过细致调查解开谜团"}, {"en": "To teach that dinosaurs still exist", "zh": "为了说明恐龙仍然存在"}, {"en": "To explain how to make swim fins", "zh": "为了讲解怎么制作脚蹼"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The story follows Angie and Jared as they observe, measure, research, and test ideas—modeling how young readers can use investigation and evidence to answer questions.", "zh": "故事跟着安吉和贾里德观察、测量、查资料、验证想法——为小读者示范了如何用调查和证据来解答疑问。"}}, {"q": {"en": "Why does the story end by calling the print the 'scariest monster in the whole world'?", "zh": "为什么故事结尾把那个脚印称作「全世界最可怕的怪物」？"}, "options": [{"en": "Because it was a dangerous animal according to some versions of the story in an early draft of the book", "zh": "因为那是一种危险的动物（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Because a real dragon made it", "zh": "因为真是龙留下的"}, {"en": "Because the librarian said so", "zh": "因为图书管理员这么说"}, {"en": "As a joke—the 'monster' was really little Benjamin playing, turning fear into something funny", "zh": "这是个玩笑——「怪物」其实是玩耍的小本杰明，把恐惧变成了好笑的事"}], "answer": 3, "skill": "Author's Purpose and Perspective", "explain": {"en": "Once they learn Benjamin made the print with a swim fin, Angie laughs that it was 「the scariest monster in the whole world!」—the author uses humor to show the scary mystery had a harmless explanation.", "zh": "当他们得知是本杰明用脚蹼留下的脚印后，安吉笑着说那是「全世界最可怕的怪物！」——作者用幽默表明，这个吓人的谜团其实有个无害的解释。"}}], "extended": {"prompt": {"en": "Angie and Jared turned a scary 'monster print' into a solved mystery by observing, measuring, and checking facts instead of just guessing. Tell about a time you were curious or a little afraid about something. How did you find out the truth, and what did you learn?", "zh": "安吉和贾里德没有瞎猜，而是观察、测量、查证，把一个吓人的「怪物脚印」变成了已解开的谜。讲讲你曾经对某事感到好奇或有点害怕的经历。你是怎么弄清真相的？又学到了什么？"}, "guidance": {"en": ["They measured the footprint and sketched it, then made a map of where they found it (p. 10).", "They used the library, a website about Utah dinosaur tracks, and an expert, Professor Featherwhite (p. 11-13).", "A good answer tells a real curious-or-scared moment and the steps (look, ask, check) used to learn the truth."], "zh": ["他们测量并画下脚印，还画了发现地点的地图（第10页）。", "他们借助图书馆、关于犹他州恐龙脚印的网站，以及专家 Featherwhite 教授（第11-13页）。", "好的回答要讲一个真实的好奇或害怕的时刻，以及用来弄清真相的步骤（观察、请教、查证）。"]}}};</script>
