<script>window.BOOK = {"slug": "the-cave-of-the-lost", "title": "The Cave of the Lost", "titleZh": "迷失之洞", "level": "Q", "genre": "Fiction", "mainSkill": "Craft and Structure", "questions": [{"q": {"en": "Which of these characters does NOT go into the cave?", "zh": "下面哪个角色没有进洞穴？"}, "options": [{"en": "The aunt (she only told stories about it)", "zh": "阿姨（她只讲过关于洞的故事）"}, {"en": "The narrator (Lynn)", "zh": "叙述者（林恩）"}, {"en": "Sarah", "zh": "萨拉"}, {"en": "Jake and Odie the dog", "zh": "杰克和狗欧迪"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The explorers are the narrator, best friend Sarah, little brother Jake, and the dog Odie. The aunt is only mentioned as the one who told Sarah the legend of the cave.", "zh": "进洞探险的是叙述者、好朋友萨拉、小弟弟杰克和狗欧迪。阿姨只在对话里被提到，是她给萨拉讲了洞穴的传说。"}}, {"q": {"en": "What do the kids use to see in the dark cave?", "zh": "孩子们在漆黑的洞穴里用什么照明？"}, "options": [{"en": "Sarah's Li'l Quacker keychain—a duck that lights up and quacks when squeezed", "zh": "萨拉的「小鸭呱呱」钥匙链——捏一下鸭子嘴里会亮并呱呱叫"}, {"en": "A flashlight they brought from home", "zh": "从家里带的手电筒"}, {"en": "The full moon shining outside", "zh": "外面照进来的满月"}, {"en": "Glow-in-the-dark paint on the walls", "zh": "墙上会发光的颜料"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Sarah tosses the narrator 「her house keys with the Li'l Quacker keychain I gave her for her last birthday. When I squeeze it, the light in the duck's mouth comes on, and it quacks over and over.」", "zh": "萨拉把「她家钥匙串扔给我，上面挂着去年生日我送她的『小鸭呱呱』钥匙链。我一捏，鸭子嘴里的灯就亮了，还不停地呱呱叫」。"}}, {"q": {"en": "What does the narrator find at the bottom of the clear pool in the chamber?", "zh": "叙述者在大厅里那汪清水池底发现了什么？"}, "options": [{"en": "A key", "zh": "一把钥匙"}, {"en": "A lost child's shoe", "zh": "一个迷路孩子的鞋"}, {"en": "A pile of gold", "zh": "一堆金子"}, {"en": "The Li'l Quacker keychain", "zh": "「小鸭呱呱」钥匙链"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "After a splash, the narrator plunges a hand into the frigid water and says, 「It's a key,」 holding it up to the light before putting it in a pocket.", "zh": "一声水花后，叙述者把手动进冰冷的水里，说「是一把钥匙」，举到灯下看了看，然后放进口袋。"}}, {"q": {"en": "In the glossary, what is a 'fork' in the cave?", "zh": "在词汇表里，洞穴里的「分岔」(fork) 是什么？"}, "options": [{"en": "A place where a path branches into two directions", "zh": "通道分岔成两个方向的地方"}, {"en": "A tool for eating in the cave", "zh": "在洞里吃饭用的工具"}, {"en": "A type of rock formation", "zh": "一种岩石形态"}, {"en": "The entrance to the cave", "zh": "洞穴的入口"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines a fork as 「a place where something such as a path, river, or road branches into two directions」 (p. 9)—the cave has many forks that make it easy to get lost.", "zh": "词汇表把分岔定义为「小路、河流或道路等分成两条方向的地方」（第9页）——洞里有许多分岔，很容易迷路。"}}, {"q": {"en": "In the glossary, what is a 'gorge'?", "zh": "在词汇表里，「峡谷」(gorge) 是什么？"}, "options": [{"en": "A long, deep valley surrounded by higher land", "zh": "两侧被高地环绕的狭长深谷"}, {"en": "A small pool of water", "zh": "一小汪水潭"}, {"en": "A kind of cave chamber", "zh": "一种洞穴大厅"}, {"en": "A narrow mountain road", "zh": "一条狭窄的山路"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines a gorge as 「a long, deep valley surrounded by higher land」 (p. 4). The cave sits at the bottom of Finneas Gorge, and the boy waves from the edge above.", "zh": "词汇表把峡谷定义为「两侧被高地环绕的狭长深谷」（第4页）。洞穴位于芬尼斯峡谷底部，那个男孩就在上方的边缘向下面挥手。"}}, {"q": {"en": "From what point of view is the story told?", "zh": "这个故事是用什么视角（人称）叙述的？"}, "options": [{"en": "First person—the narrator uses 'I' and is part of the adventure", "zh": "第一人称——叙述者用「我」，并亲身参与冒险"}, {"en": "Third person—a narrator describes others from outside", "zh": "第三人称——由局外叙述者描写他人"}, {"en": "Second person—the reader is addressed as 'you'", "zh": "第二人称——以「你」称呼读者"}, {"en": "It is written as a script for the stage", "zh": "它是一出舞台剧本"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The narrator says 「I ask Sarah,」 「my little brother Jake,」 and 「I take a few steps inside,」 using 'I' throughout, so the story is told in the first person.", "zh": "叙述者说「我问萨拉」「我的小弟弟杰克」「我往里走了几步」，通篇用「我」，所以故事是第一人称叙述。"}}, {"q": {"en": "How do the kids finally find their way out of the cave?", "zh": "孩子们最后是怎么找到出路的？"}, "options": [{"en": "They follow the sound of footsteps moving away from the laughter, which leads them to the cave mouth", "zh": "他们循着远离笑声的脚步声，走到了洞口"}, {"en": "They use the key found in the pool to unlock a door", "zh": "他们用池里找到的钥匙开了门"}, {"en": "The aunt comes in and leads them out", "zh": "阿姨进来带他们出去"}, {"en": "They follow the laughing children they heard", "zh": "他们跟着听到的那些笑着的孩子的声音"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "After getting lost, the narrator hears 「someone running away to my right」 and decides to follow the footsteps; 「leading us away from the laughter. Suddenly, we come to the mouth of the cave.」", "zh": "迷路后，叙述者听到「有人往我右边跑开」，便决定跟着脚步声；「它把我们带离了笑声。突然，我们到了洞口。」"}}, {"q": {"en": "According to the legend Sarah's aunt told, what happened to people who entered the Cave of the Lost?", "zh": "根据萨拉阿姨讲的传说，进了「迷失之洞」的人发生了什么？"}, "options": [{"en": "Explorers went in and never came out; only one man escaped, waking alone in 'the Hollow'", "zh": "探险者进去后再没出来；只有一个人逃出，独自在「空洞」中醒来"}, {"en": "They all became rich from gold", "zh": "他们都靠金子发了财"}, {"en": "They turned into statues", "zh": "他们变成了雕像"}, {"en": "They were rescued the next morning", "zh": "他们在第二天早上获救"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The aunt said that after Porter's Mill was built, explorers entered and 「never came out,」 and only one man escaped but 「couldn't explain how」—he woke up in the Hollow, alone. This story-within-a-story builds the cave's mystery.", "zh": "阿姨说波特磨坊建成后，探险者进去就「再没出来」，只有一个人逃出却「说不清怎么出来的」——他独自在「空洞」中醒来。这个嵌套在故事里的传说，烘托了洞穴的神秘。"}}, {"q": {"en": "Why does the author fill the cave with strange sounds (echoes, laughter, crying, footsteps)?", "zh": "作者为什么让洞穴里充满各种奇怪的声音（回声、笑声、哭声、脚步声）？"}, "options": [{"en": "To build suspense and a creepy, mysterious mood", "zh": "为了营造悬念和阴森神秘的氛围"}, {"en": "To teach facts about how sound travels", "zh": "为了讲授声音传播的知识"}, {"en": "To show the cave is a fun amusement park", "zh": "为了表现洞穴是个好玩的游乐园"}, {"en": "To describe a music concert", "zh": "为了描写一场音乐会"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The unexplained laughter, weeping, and footsteps keep readers (and the characters) unsure what is real, creating the spooky suspense typical of a mystery.", "zh": "那些来历不明的笑声、哭泣声和脚步声，让读者（和角色）无从判断什么是真的，营造出悬疑故事特有的阴森紧张感。"}}, {"q": {"en": "Why does the story end with the small boy looking 'very familiar' but unexplained?", "zh": "为什么故事结尾那个小男孩「看着很眼熟」却未作解释？"}, "options": [{"en": "To leave the mystery open-ended and make readers wonder about the cave's secrets", "zh": "为了留下开放式的谜团，让读者对洞穴的秘密产生好奇"}, {"en": "To prove the boy was definitely their lost friend", "zh": "为了证明那男孩一定是他们走失的朋友"}, {"en": "To show the adventure was only a dream", "zh": "为了表明这场冒险只是一场梦"}, {"en": "To explain how the cave was formed", "zh": "为了解释洞穴是怎么形成的"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The narrator says, 「He looks very familiar, but I can't explain why,」 leaving the connection between the waving boy and the cave's mysteries unanswered—an author's choice to end on puzzle and wonder.", "zh": "叙述者说「他看着很眼熟，可我说不清为什么」，挥手男孩与洞穴谜团之间的联系就此悬而未决——这是作者选择以悬念和遐想收尾。"}}], "extended": {"prompt": {"en": "Inside the cave, the narrator uses the light and sound clues (the quacking keychain, the weeping from the left, the footsteps leading out) to make decisions. Tell about a time you had to find your way through something unfamiliar. What clues did you use, and how did you stay calm?", "zh": "在洞里，叙述者借助光和声音线索（呱呱叫的钥匙链、从左传来的哭泣声、指引出口的脚步声）来做决定。讲讲你曾经在陌生环境中「找路」的经历。你用了什么线索？又是怎么保持冷静的？"}, "guidance": {"en": ["The narrator uses Sarah's Li'l Quacker keychain for light and memorizes each turn to avoid getting lost (p. 8-9).", "They follow the weeping (left passage) then the footsteps away from the laughter to escape (p. 9, 13-14).", "A good answer describes a real navigating experience and the clues or calm thinking that helped."], "zh": ["叙述者用萨拉的「小鸭呱呱」钥匙链照明，并记住每个转弯以免迷路（第8-9页）。", "他们先循着哭泣声（左通道），再循着远离笑声的脚步声逃出（第9、13-14页）。", "好的回答要描述一次真实的「找路」经历，以及帮助到自己的线索或冷静思考。"]}}};</script>
