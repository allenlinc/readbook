<script>window.BOOK = {"slug": "plight-of-the-polar-bear", "title": "Plight of the Polar Bear", "titleZh": "北极熊的困境", "level": "Q", "genre": "Nonfiction", "mainSkill": "Author's Purpose and Perspective", "questions": [{"q": {"en": "What does the word 'tundra' mean, and where is it found?", "zh": "「tundra」(苔原) 是什么意思？它分布在哪里？"}, "options": [{"en": "A 'treeless plain'; it is the snow-covered land of the northern Arctic", "zh": "「无树的平原」；它是北极地区被雪覆盖的土地"}, {"en": "A hot, sandy desert near the equator", "zh": "赤道附近炎热多沙的沙漠"}, {"en": "A deep part of the ocean", "zh": "海洋很深的部分"}, {"en": "A tall mountain covered in trees", "zh": "长满树的高山"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The Word Wise note says 'tundra' comes from a language of native peoples in northernmost Europe and 'means \"treeless plain\"' — the book describes the 'snow-covered winter tundra of the northern Arctic.'", "zh": "「字词小贴士」说 tundra 源自欧洲最北端原住民的语言，意思是「无树的平原」——书里描写的是「北极地区被雪覆盖的冬季苔原」。"}}, {"q": {"en": "According to the book, what is the polar bear's main food source?", "zh": "根据这本书，北极熊主要吃什么？"}, "options": [{"en": "Seals, though they also eat walruses, smaller whales, and some land animals", "zh": "海豹，不过它们也吃海象、较小的鲸鱼和一些陆地动物"}, {"en": "Only fish, and nothing else", "zh": "只吃鱼，别的什么都不吃"}, {"en": "Penguins that live on the ice", "zh": "住在冰上的企鹅"}, {"en": "Tree bark and leaves", "zh": "树皮和树叶"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book states, 'Polar bears' main food source is seals, but they also eat walruses, smaller whales, and some land animals.'", "zh": "书里写道：「北极熊的主食是海豹，但它们也吃海象、较小的鲸鱼和一些陆地动物。」"}}, {"q": {"en": "The glossary defines 'permafrost.' What is permafrost?", "zh": "词汇表里定义了「permafrost」(永久冻土)。什么是永久冻土？"}, "options": [{"en": "The permanently frozen soil of the tundra (from 'permanent' + 'frost')", "zh": "苔原上常年冻结的土壤（由 permanent「永久」+ frost「霜冻」组成）"}, {"en": "The warm top layer of soil in summer", "zh": "夏天温暖的上层土壤"}, {"en": "A kind of flowing river", "zh": "一种流动的河流"}, {"en": "Melting ice on the ocean", "zh": "海洋上融化的冰"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The Word Wise note says the frozen soil 'is called permafrost. It is a combination of the words permanent and frost.'", "zh": "「字词小贴士」说这种冻结的土壤「叫做 permafrost。它由 permanent（永久）和 frost（霜冻）两个词组合而成。」"}}, {"q": {"en": "How far away can a polar bear smell a dead, rotting seal?", "zh": "北极熊能闻到多远以外的、腐烂的死海豹？"}, "options": [{"en": "From 32 kilometers (20 miles) away", "zh": "32公里（20英里）之外"}, {"en": "From just 1 meter away", "zh": "只有1米之外"}, {"en": "From across an entire ocean", "zh": "隔着整片海洋"}, {"en": "They cannot smell at all", "zh": "它们根本没有嗅觉"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says polar bears 'have a very good sense of smell. They can smell a dead, rotting seal from 32 kilometers (20 mi) away.'", "zh": "书里说北极熊「嗅觉非常灵敏。它们能闻到32公里（20英里）之外腐烂的死海豹。」"}}, {"q": {"en": "The book says polar bear fur looks white but each hair is actually transparent, and studies show the fur does NOT carry sunlight to the skin. What does this tell us?", "zh": "书里说北极熊的毛看起来白，其实每根都是透明的，而且研究证明毛并不会把阳光传到皮肤上。这说明了什么？"}, "options": [{"en": "The old belief that clear fur warms the bear by sending sunlight to its skin was proven wrong", "zh": "过去认为透明毛靠把阳光送到皮肤来取暖的说法，被证明是错的"}, {"en": "Polar bear fur is made of glass", "zh": "北极熊的毛是玻璃做的"}, {"en": "The bears are actually bright pink", "zh": "熊其实是亮粉色的"}, {"en": "Sunlight keeps the bears completely cold", "zh": "阳光让熊一直很冷"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The text contrasts the 'commonly believed' idea (clear fur carries sunlight to black skin to make heat) with the fact that 'studies... have proven that it does not transmit sunlight to a bear's skin.'", "zh": "正文把「人们普遍认为」的说法（透明毛把阳光送到黑色皮肤转化为热）与「研究已证明毛并不会把阳光传到皮肤」的事实作了对比。"}}, {"q": {"en": "According to the book, what is the GREATEST threat to polar bears' survival today?", "zh": "根据这本书，如今对北极熊生存最大的威胁是什么？"}, "options": [{"en": "What humans are doing to the environment — global warming from pollutants — not direct hunting", "zh": "人类对环境做的事——污染物造成的全球变暖——而不是直接的捕猎"}, {"en": "Other polar bears hunting them", "zh": "其他北极熊捕食它们"}, {"en": "Sharks in the ocean", "zh": "海洋里的鲨鱼"}, {"en": "Too many trees in the tundra", "zh": "苔原上太多的树"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book says the polar bear 'has only one enemy — humans,' and 'it may be what humans are doing to the environment that poses the greatest threat,' i.e. global warming, not hunting.", "zh": "书里说北极熊「只有一个敌人——人类」，而且「可能对环境所做的事才是最大的威胁」，也就是全球变暖，而非捕猎。"}}, {"q": {"en": "By how much has the polar ice pack shrunk, according to scientists in the book?", "zh": "根据书中的科学家，北极冰盖缩小了多少？"}, "options": [{"en": "About 14 percent smaller than 20 years ago, melting 1.5 to 2 weeks faster each year", "zh": "比20年前小了约14%，每年提早1.5到2周融化"}, {"en": "It has not shrunk at all", "zh": "完全没有缩小"}, {"en": "It is half the size it was last year", "zh": "只有去年的一半大"}, {"en": "It grows bigger every single year", "zh": "每年都在变大"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Scientists 'estimate that the ice pack is 14 percent smaller than it was 20 years ago' and 'melting at a rate that is 1.5 to 2 weeks faster than 20 years ago.'", "zh": "科学家「估计冰盖比20年前小了14%」，而且「融化的速度比20年前快了1.5到2周」。"}}, {"q": {"en": "In the glossary, what does 'insulate' mean?", "zh": "在词汇表里，「insulate」(隔热/保暖) 是什么意思？"}, "options": [{"en": "To retain (keep in) heat", "zh": "保持（留存）热量"}, {"en": "To melt ice quickly", "zh": "让冰快速融化"}, {"en": "To swim very fast", "zh": "游得很快"}, {"en": "To hunt for seals", "zh": "捕猎海豹"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines insulate as 'to retain (keep in) heat' — 'Two layers of fur and a thick layer of body fat insulate polar bears from extremely cold temperatures.'", "zh": "词汇表把 insulate 定义为「保持（留存）热量」——「两层毛和厚厚一层体脂让北极熊隔绝极寒。」"}}, {"q": {"en": "The book's diagram shows 'How Pollution Reaches Polar Bears.' What is that chain?", "zh": "书中图表展示了「污染如何到达北极熊身上」。这条链条是怎样的？"}, "options": [{"en": "Toxic chemicals enter Arctic water, fish absorb them, seals eat the fish, and polar bears eat the seals and ingest the toxins stored in seal fat", "zh": "有毒化学物质进入北极水域，鱼吸收它们，海豹吃鱼，北极熊吃海豹、从而吃下存在海豹脂肪里的毒素"}, {"en": "Bears drink polluted water directly from factories", "zh": "熊直接喝工厂排出的脏水"}, {"en": "People feed bears plastic on purpose", "zh": "人们故意喂熊吃塑料"}, {"en": "The sun melts the toxins onto the ice", "zh": "太阳把毒素融化到冰上"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The diagram traces it: toxic chemicals reach Arctic water, Arctic seals eat fish high in pollutants, and 'When bears eat these seals, they ingest the toxins' stored in the seals' body fat.", "zh": "图表追溯：有毒化学物质进入北极水域，北极海豹吃下污染物很高的鱼，而「熊吃这些海豹时，就吃下了」存在海豹体脂里的毒素。"}}, {"q": {"en": "What is the author's main purpose in writing this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"en": "To inform readers about the polar bear's struggles — especially from global warming and pollution — and encourage people to help protect them", "zh": "为了让读者了解北极熊的困境（尤其来自全球变暖和污染），并鼓励人们帮忙保护它们"}, {"en": "To give a step-by-step recipe for cooking seal", "zh": "给出一步步烹饪海豹的食谱"}, {"en": "To argue that polar bears should be kept in zoos", "zh": "主张把北极熊养在动物园里"}, {"en": "To describe how to drill for oil in the Arctic", "zh": "讲解怎样在北极钻油"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book ends by naming groups 'concerned about the plight of the polar bear' who 'are taking steps to protect these magnificent creatures,' showing the author wants readers informed and motivated to help.", "zh": "书末点名了「关心北极熊困境」、并「采取行动保护这些壮丽生灵」的组织，说明作者想让读者既了解状况、也被触动去帮忙。"}}], "extended": {"prompt": {"en": "The book says the polar bear population is shrinking because of global warming and pollution caused by humans. Think about the 'Think About It' box: make a list
