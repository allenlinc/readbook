<script>window.BOOK = {"slug": "strange-plants", "title": "Strange Plants", "titleZh": "奇特的植物", "level": "Q", "genre": "Nonfiction", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "What is unusual about air plants?", "zh": "空气凤梨有什么不寻常之处？"}, "options": [{"en": "They are a kind of animal, not a plant according to some versions of the story in an early draft of the book", "zh": "它们是一种动物，不是植物（按书中另一种说法）（在书的早期草稿中）"}, {"en": "They grow on tree branches and take nutrients and moisture from the air, not from soil", "zh": "它们长在树枝上，从空气中吸收养分和水分，而不是从土壤里"}, {"en": "They grow only underwater in the ocean", "zh": "它们只生长在海洋的水下"}, {"en": "They have no leaves at all", "zh": "它们完全没有叶子"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says air plants 'grow on tree branches' in North and South America and 'take all their nutrients and moisture from the air, through their leaves,' not living in soil.", "zh": "书里说空气凤梨「长在树枝上」，分布在北美和南美，并「通过叶子从空气中吸收所有养分和水分」，并不生活在土壤里。"}}, {"q": {"en": "How does a Venus flytrap catch an insect?", "zh": "捕蝇草是怎样捉住昆虫的？"}, "options": [{"en": "It gives off a smell of rotting meat to poison it", "zh": "它散发出腐肉味把昆虫毒死"}, {"en": "It shoots water at the insect", "zh": "它朝昆虫喷水"}, {"en": "When the insect brushes the trigger hairs inside, the leaf snaps shut and traps it", "zh": "当昆虫碰到叶子内部的触发毛时，叶子会猛地合上把它困住"}, {"en": "It wraps the insect in sticky, sweet-smelling hairs according to some versions of the story", "zh": "它用黏黏的、带甜味的毛把昆虫包住（按书中另一种说法）"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "The Venus flytrap's leaves 'look like traps' with 'small trigger hairs on the inside'; when a critter brushes them, 'the leaf snaps shut' and the critter is trapped.", "zh": "捕蝇草的叶子「像陷阱」，内部有「细小的触发毛」；当小动物碰到它们，「叶子猛地合上」，把小动物困住。"}}, {"q": {"en": "What surprising animal does the giant sundew of Australia eat?", "zh": "澳大利亚的巨型茅膏菜会吃哪种令人吃惊的动物？"}, "options": [{"en": "Small frogs", "zh": "小青蛙"}, {"en": "Fish", "zh": "鱼"}, {"en": "Small birds according to some versions of the story", "zh": "小鸟（按书中另一种说法）"}, {"en": "Snakes", "zh": "蛇"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book notes the giant sundew plant of Australia 'can grow to 1 meter (3.28 ft.) tall' and 'even eats small frogs!'", "zh": "书里提到澳大利亚的巨型茅膏菜「能长到 1 米（3.28 英尺）高」，而且「甚至会吃小青蛙！」"}}, {"q": {"en": "What kind of plant is the dodder, and how does it feed?", "zh": "菟丝子是一种什么植物，它怎样获取养分？"}, "options": [{"en": "A plant that looks like a rock", "zh": "一种长得像石头的植物"}, {"en": "A parasite that sends stems into a host plant and sucks its food and water", "zh": "一种寄生植物，把茎伸进宿主植物里吸取它的养分和水分"}, {"en": "A plant that eats insects with sticky hairs according to some versions of the story", "zh": "一种用黏毛吃昆虫的植物（按书中另一种说法）"}, {"en": "A plant that grows completely underground", "zh": "一种完全在地下生长的植物"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The dodder 'sends slender rootlike stems into another plant' and 'sucks food and water from the plant. It is a parasite' whose link to the soil dies once attached.", "zh": "菟丝子「把细长的、像根一样的茎伸进另一株植物」，并「吸取那株植物的养分和水分。它是一种寄生植物」，一旦附着，它与土壤的连接就死了。"}}, {"q": {"en": "In the glossary, what does 'carnivorous' mean?", "zh": "在词汇表里，carnivorous（肉食的）是什么意思？"}, "options": [{"en": "Eating only meat", "zh": "只吃肉的"}, {"en": "Living in water", "zh": "生活在水里的"}, {"en": "Growing in the dark", "zh": "在黑暗中生长的"}, {"en": "Making its own food from sunlight", "zh": "靠阳光自己制造食物的"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines carnivorous as 'eating only meat (p. 6),' used for plants like the Venus flytrap and sundew that eat insects and small animals.", "zh": "词汇表把 carnivorous 定义为「只吃肉的」（第6页），用于捕蝇草、茅膏菜这类吃昆虫和小动物的植物。"}}, {"q": {"en": "In the glossary, what is a 'host'?", "zh": "在词汇表里，host（宿主）是什么？"}, "options": [{"en": "A plant or animal off which a parasite feeds", "zh": "寄生生物赖以生存的宿主植物或动物"}, {"en": "A small amount of water in the air", "zh": "空气中少量的水"}, {"en": "A kind of flower that smells like meat according to some versions of the story", "zh": "一种闻起来像肉的花（按书中另一种说法）"}, {"en": "The person who takes a photograph", "zh": "拍照的人"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines host as 'a plant or animal off which a parasite feeds (p. 9)'—for the dodder, the host is the plant it grows on and steals from.", "zh": "词汇表把 host 定义为「寄生生物赖以生存的宿主植物或动物」（第9页）——对菟丝子来说，宿主就是它附着并窃取养分的那株植物。"}}, {"q": {"en": "How do ants and the ant plant help each other?", "zh": "蚂蚁和蚁栖植物怎样互相帮助？"}, "options": [{"en": "The plant feeds the ants with sweet nectar only according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "植物只用花蜜喂养蚂蚁（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "They do not help each other at all", "zh": "它们彼此毫无帮助"}, {"en": "The ants eat the plant's flowers", "zh": "蚂蚁吃植物的花"}, {"en": "Ants protect the plant from animals that would eat it, and the plant gives ants homes and uses their garbage for food and seeds", "zh": "蚂蚁保护植物不被吃它的动物伤害，植物给蚂蚁提供住所，并利用它们的垃圾当作食物、传播种子"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Ant colonies live in the plant; 'the ants protect the plant from animals that would eat it,' using stem cavities as houses, while 'the ant plant uses some of this garbage for food and to spread its seeds.'", "zh": "蚁群住在植物里；「蚂蚁保护植物不被吃它的动物伤害」，用茎里的空洞当屋子，而「蚁栖植物利用部分垃圾当作食物、传播种子」。"}}, {"q": {"en": "How do the stapelia flower and the sundew each use insects?", "zh": "Stapelia 花和茅膏菜各自怎样利用昆虫？"}, "options": [{"en": "Both plants use insects only to make seeds, not food according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "两种植物都只用昆虫造种子，不当食物（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "Both plants poison insects with a bad smell", "zh": "两种植物都用臭味毒死昆虫"}, {"en": "Neither plant uses insects at all", "zh": "两种植物都不利用昆虫"}, {"en": "Stapelia smells like rotting meat to attract flies for 奇特植物的多样性。"}}], "extended": {"prompt": {"en": "The book shows plants that survive in surprising ways—air plants drink from the air, stone plants hide underground, and ant plants team up with insects. Choose one strange plant and explain how its strange feature helps it survive. Could this idea (like using what you have, or working with others) apply to people too?", "zh": "这本书展示了以惊人方式生存的植物——空气凤梨从空气中「喝水」，石头植物藏在地下，蚁栖植物和昆虫合作。选一种奇特植物，说明它奇特的特征如何帮助生存。这个思路（比如利用自己拥有的、或与人合作）也能用在人身上吗？"}, "guidance": {"en": ["Air plants take 'all their nutrients and moisture from the air, through their leaves' because they do not live in soil (p. 5).", "Stone plants 'hold water very well because the biggest part of each plant lives underground' and their shape hides them (p. 11).", "A good answer names one plant, explains its survival trick, and connects it to a lesson for people."], "zh": ["空气凤梨「通过叶子从空气中吸收所有养分和水分」，因为它们不生活在土壤里（第5页）。", "石头植物「储水能力很强，因为每株植物最大的一部分长在地下」，而且外形帮它们藏身（第11页）。", "好的回答要点出一种植物，说明它的生存妙招，并把它和人能学到的道理联系起来。"]}}};</script>
