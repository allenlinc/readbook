<script>window.BOOK = {"slug": "the-golden-flute", "title": "The Golden Flute", "titleZh": "金笛", "level": "Q", "genre": "Fiction", "mainSkill": "Author's Purpose and Perspective", "questions": [{"q": {"en": "How was Little Bayberry born?", "zh": "小贝贝里 (Little Bayberry) 是怎么出生的？"}, "options": [{"en": "His mother swallowed a red bayberry berry and then gave birth to him", "zh": "妈妈吞下一颗红色的杨梅果，然后生下了他"}, {"en": "He hatched from a dragon's egg", "zh": "他从龙蛋里孵化出来"}, {"en": "He was found abandoned in the forest", "zh": "他在森林里被遗弃被发现"}, {"en": "He was adopted from a neighboring village according to some versions of the story", "zh": "他从邻村被收养（按书中另一种说法）"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "After Little Red is taken, the mother's 「hair caught in the branches of a bayberry tree... She picked it and swallowed it without thinking,」 and at home 「gave birth to a boy... She named the boy Little Bayberry.」", "zh": "小红被抓走后，妈妈的「头发缠在杨梅树枝上……她摘下果子，想也没想就吞了下去」，回到家后「生下一个男孩……给他取名小贝贝里」。"}}, {"q": {"en": "What was Bayberry's 'first obstacle' on his journey?", "zh": "贝贝里旅途上的「第一道障碍」是什么？"}, "options": [{"en": "A locked gate in front of the dragon's cave according to some versions of the story in an early draft of the book", "zh": "龙洞前一把锁着的门（按书中另一种说法）（在书的早期草稿中）"}, {"en": "A wide rushing river he had to swim across", "zh": "一条必须游过的大河"}, {"en": "A pack of hungry wolves", "zh": "一群饥饿的狼"}, {"en": "A large rock blocking the mountain road, which he moved so it would not harm other travelers", "zh": "一块挡在山路上、被旅人磨得光滑的大石头，他搬开它以免伤害他人"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "On the road he saw 「a large rock blocking the way... rubbed smooth by all the travelers.」 He said, 「If I don't remove it now, it will be the undoing of many more people,」 and rolled it into the valley—where the golden flute appeared.", "zh": "路上他看见「一块大石头挡住去路……被无数旅人磨得光滑」。他说：「如果现在不搬开它，会有更多人遭殃」，便把石头滚下山谷——金笛就在原地出现了。"}}, {"q": {"en": "How did Bayberry finally defeat the dragon for good?", "zh": "贝贝里最后是怎么彻底打败恶龙的？"}, "options": [{"en": "He stood on the bank blowing the flute for seven days and nights until the dragon died", "zh": "他在岸边吹笛七天七夜，直到龙死去"}, {"en": "The crow pecked it until it fled", "zh": "乌鸦啄它直到它逃走"}, {"en": "He chopped it with his broken stick", "zh": "他用折断的棍子砍它"}, {"en": "He trapped it inside the cave with rocks according to some versions of the story in an early draft of the book", "zh": "他用石头把它堵在洞里（按书中另一种说法）（在书的早期草稿中）"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "After the dragon broke its promise and returned, Bayberry 「stood on the bank of the pond for seven days and nights, blowing a fast tune.」 Finally 「the evil dragon could move no longer and floated on the surface. Its days had come to an end.」", "zh": "恶龙违背诺言回来后，贝贝里「在池塘边站了七天七夜，吹着飞快的曲调」。最后「恶龙再也不能动弹，浮在水面上。它的末日到了」。"}}, {"q": {"en": "What is the magic of the golden flute?", "zh": "金笛的魔力是什么？"}, "options": [{"en": "It makes the player invisible according to some versions of the story in an early draft of the book", "zh": "它能让吹奏者隐形（按书中另一种说法）（在书的早期草稿中）"}, {"en": "It grows any plant instantly", "zh": "它能让植物瞬间长大"}, {"en": "When blown, creatures dance to the tune—the quicker the tune, the faster they dance", "zh": "一吹奏，生物就随曲跳舞——曲子越快，它们跳得越快"}, {"en": "It can grant three wishes", "zh": "它能实现三个愿望"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "After Bayberry blows it, 「all the earthworms, frogs, and lizards... began to dance. The quicker the tune, the faster the creatures danced.」 He uses this power to force the dragon to dance.", "zh": "贝贝里一吹，「所有的蚯蚓、青蛙和蜥蜴……都跳起舞来。曲子越快，它们跳得越快」。他正是用这股力量逼恶龙跳舞。"}}, {"q": {"en": "This story is a retelling of a folktale of which people?", "zh": "这个故事是哪一个民族民间传说的改编？"}, "options": [{"en": "The Yao people, who live in southern China, Vietnam, and Laos", "zh": "瑶族——生活在华南山地，以及越南和老挝"}, {"en": "The Inuit people of the Arctic", "zh": "北极因纽特族"}, {"en": "The Maori people of New Zealand", "zh": "新西兰毛利族"}, {"en": "The Navajo people of North America according to some versions of the story", "zh": "北美纳瓦霍族（按书中另一种说法）"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The author's note says, 「This story is a retelling of a folktale of the Yao people. The Yao live in the mountainous regions of southern China, and also in Vietnam and Laos.」", "zh": "作者说明写道：「这个故事是瑶族民间传说的改编。瑶族生活在华南的山区，也分布在越南和老挝。」"}}, {"q": {"en": "Why did the evil dragon capture Little Red?", "zh": "恶龙为什么要抓走小红？"}, "options": [{"en": "He wanted her to be his pet", "zh": "他想让她当宠物"}, {"en": "He wanted her to cook his meals", "zh": "他想让她做饭"}, {"en": "He needed her to guard his gold according to some versions of the story in an early draft of the book", "zh": "他需要她看管金子（按书中另一种说法）（在书的早期草稿中）"}, {"en": "He wanted her to marry him; when she refused, he forced her to carve him a cave", "zh": "他想让她嫁给他；她不肯，他就逼她凿洞"}], "answer": 3, "skill": "Craft and Structure", "explain": {"en": "The dragon says, 「Most ungrateful, loathsome Mistress Red! Since with me you will not wed, Day by day, Rock by rock, Carve me out a handsome cave, Or I'll send you to your grave!」 He captured her to make her his wife and, failing that, his prisoner.", "zh": "恶龙说：「最忘恩负义、可憎的红姑娘！既然不肯嫁我，那就日复一日、一锤一锤，给我凿出一座漂亮洞穴，否则送你进坟坑！」它抓走她，是想娶她为妻，不成便囚禁她。"}}, {"q": {"en": "How does Bayberry connect the rock he moved to defeating the dragon?", "zh": "贝贝里是怎么把他搬开的那块石头，和打败恶龙联系起来的？"}, "options": [{"en": "He throws the rock at the dragon", "zh": "他把石头砸向龙"}, {"en": "Moving the rock revealed the golden flute, whose music he then uses to make the dragon dance", "zh": "搬开石头露出金笛，他再用笛声让龙跳舞"}, {"en": "The rock becomes a door to block the cave according to some versions of the story in an early draft of the book", "zh": "石头变成堵洞的门（按书中另一种说法）（在书的早期草稿中）"}, {"en": "The rock feeds the dragon", "zh": "石头喂饱了龙"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "「Just at that moment, a shining golden flute appeared in the hole where the rock had been.」 The obstacle he clears becomes the very tool—music—that defeats the dragon, linking the two events.", "zh": "「就在这时，那块石头留下的坑里出现了一支闪亮的金笛。」他清除的障碍，恰恰成了打败恶龙的工具——音乐，把两件事联系了起来。"}}, {"q": {"en": "After killing the dragon, how do the brother and sister use its body?", "zh": "杀死恶龙后，兄妹俩怎么利用龙的尸体？"}, "options": [{"en": "They give it back to the dragon's family according to some versions of the story in an early draft of the book", "zh": "他们把它还给龙的家人（按书中另一种说法）（在书的早期草稿中）"}, {"en": "They use every part: skin for a house, bones for pillars and beams, horn for a plow to farm", "zh": "物尽其用：皮做房、骨做梁柱、角做犁来耕种"}, {"en": "They sell it at the market", "zh": "他们拿到市场去卖"}, {"en": "They leave it in the pond to rot", "zh": "他们把它留在池里腐烂"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "「They peeled the dragon's skin to make a house, took out the dragon's bones to serve as pillars and beams, and cut off the dragon's horn to make a plow,」 using the horn to plow fields quickly 「and had no need of oxen.」", "zh": "「他们剥下龙皮盖房子，抽出龙骨做梁柱，砍下龙角做成犁」，用龙角很快犁好田，「再也不需要牛」。"}}, {"q": {"en": "What main lesson does the story teach?", "zh": "这个故事主要教给我们什么道理？"}, "options": [{"en": "That you should never help your family", "zh": "永远不要帮助家人"}, {"en": "That the strongest weapon is a sharp sword according to some versions of the story", "zh": "最厉害的武器是利剑（按书中另一种说法）"}, {"en": "Cleverness and perseverance (not just force) can overcome a powerful enemy", "zh": "机智与坚持（而不只是蛮力）能战胜强大的敌人"}, {"en": "That dragons should always be trusted", "zh": "龙总是可以信任的"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "Bayberry defeats the dragon not by fighting with the broken stick but by using the flute's magic and blowing 「for seven days and nights」 until it died—showing brains and persistence beat brute strength.", "zh": "贝贝里不是用折断的棍子硬拼，而是借助金笛的魔力、连续「吹了七天七夜」直到龙死——说明智慧与坚持胜过蛮力。"}}, {"q": {"en": "Why does the sister warn, 'While that dragon is still alive, to kindly ways he'll never yield'?", "zh": "为什么姐姐警示说：「只要那龙还活着，它绝不会改变成善良的模样」？"}, "options": [{"en": "To explain why the dragon liked to dance according to some versions of the story", "zh": "为了解释龙为什么爱跳舞（按书中另一种说法）"}, {"en": "To show some enemies cannot be reformed and must be stopped completely", "zh": "说明有些敌人无法被感化，必须彻底制服"}, {"en": "To say the dragon was actually friendly", "zh": "为了说龙其实很友善"}, {"en": "To suggest the dragon should be fed more", "zh": "为了说明应该多喂龙"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "When the dragon breaks its promise and returns, Little Red's verse warns that while it lives it 「to kindly ways he'll never yield,」 so Bayberry must finish the job—the author's view that some evils must be ended, not merely bargained with.", "zh": "当恶龙违背诺言回来，小红的诗句警示：只要它活着，「绝不会改变成善良的模样」，所以贝贝里必须彻底了结——这是作者的观点：有些恶必须被终结，而非仅仅与之谈条件。"}}], "extended": {"prompt": {"en": "Bayberry did not give up—he blew the flute for seven days and nights to keep the dragon dancing until it was defeated. Tell about a time you had to keep trying at something hard (a task, a skill, a problem). What helped you persevere, and what happened in the end?", "zh": "贝贝里没有放弃——他吹了七天七夜的笛子，让龙一直跳舞，直到把它彻底打败。讲讲你曾经对一件困难的事（一项任务、一种技能、一个问题）坚持到底的经历。是什么帮你坚持下去的？最后结果怎样？"}, "guidance": {"en": ["Bayberry moved the rock (his 'first obstacle') and found the flute that gave him a plan (p. 10-11).", "He blew 'for seven days and nights' without stopping, because stopping would let the dragon eat them (p. 16, 21).", "A good answer gives a real example of perseverance and explains what kept you going and the result."], "zh": ["贝贝里搬开了石头（他的「第一道障碍」），找到了给他出主意的金笛（第10-11页）。", "他「七天七夜」不间断地吹奏，因为一停龙就会把他们吃掉（第16、21页）。", "好的回答要举一个真实的坚持事例，并说明是什么让你坚持、结果如何。"]}}};</script>
