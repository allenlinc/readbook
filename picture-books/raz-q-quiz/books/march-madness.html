<script>window.BOOK = {"slug": "march-madness", "title": "March Madness", "titleZh": "疯狂三月", "level": "Q", "genre": "Nonfiction", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "According to the book, when did March Madness begin and with how many teams?", "zh": "根据这本书，疯狂三月(March Madness)是从什么时候开始、最初有多少支球队参加的？"}, "options": [{"en": "In March 1939, with just eight teams", "zh": "1939年3月，只有8支球队"}, {"en": "In 1950, with the City College of New York team", "zh": "1950年，以纽约市立学院球队为起点"}, {"en": "In 1982, with the first women's tournament", "zh": "1982年，伴随首届女子锦标赛"}, {"en": "In 1968, with the first Special Olympics", "zh": "1968年，伴随首届特奥会"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says, 'In March 1939, this college basketball tournament began with just eight teams,' and it has grown into today's 68-team event.", "zh": "书里写道：「1939年3月，这场大学篮球锦标赛只有8支球队参加」，如今已发展成68支球队的赛事。"}}, {"q": {"en": "What kind of tournament is March Madness, and how many teams play in it as of 2016?", "zh": "疯狂三月是什么样的赛制？截至2016年有多少支球队参加？"}, "options": [{"en": "A single-elimination tournament with 68 teams", "zh": "单场淘汰制(single-elimination)的比赛，共68支球队"}, {"en": "A double-elimination tournament with 32 teams", "zh": "双败淘汰制，共32支球队"}, {"en": "A round-robin tournament with 64 teams", "zh": "循环赛制，共64支球队"}, {"en": "An eight-team invitational with no elimination", "zh": "8支球队的邀请赛，没有淘汰"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book states the tournament 'still sweeps across the country every March' with '68 teams playing in a single-elimination tournament, anything can happen.'", "zh": "书里说每年三月赛事席卷全国，「68支球队参加单场淘汰制，什么都可能发生」。"}}, {"q": {"en": "In the glossary, what is a 'bracket'?", "zh": "在词汇表里，「bracket」(对阵表) 是什么？"}, "options": [{"en": "A grid that pairs opponents in a tournament", "zh": "把参赛对手两两配对的一张表格"}, {"en": "The trophy given to the winning team", "zh": "颁给冠军队的奖杯"}, {"en": "A type of basketball shot worth three points", "zh": "一种得三 "书里说2011年她学校里一些男同事办了一个竞猜、不让她参加；「最后她把他们全赢了……还有线上超过三百万名参赛者」，赢得了整张最终四强竞猜。"}}, {"q": {"en": "Why does the author include the story of President Obama and the eleven-year-old girl?", "zh": "作者为什么写进「奥巴马总统和一个十一岁女孩」的故事？"}, "options": [{"en": "To show that filling out brackets is so popular it reaches everyone from the president to a child", "zh": "为了说明填对阵表太受欢迎了，上到总统、下到一个孩子都乐在其中"}, {"en": "To explain the rules of the men's tournament", "zh": "为了解释男子锦标赛的规则"}, {"en": "To prove Obama was the best bracket picker", "zh": "为了证明奥巴马是最会填对阵表的人"}, {"en": "To describe how the champion is awarded", "zh": "为了描述冠军是怎么颁奖的"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book notes Obama 'did not have much success with his picks,' and in 2015 an eleven-year-old girl wrote him because her bracket beat his — showing bracket-filling appeals to all kinds of people, even the president.", "zh": "书里说奥巴马「预测成绩并不好」，而2015年一个十一岁女孩因为自己的对阵表赢了总统而给他写了信——说明填对阵表吸引了各种各样的人，连总统也不例外。"}}, {"q": {"en": "What does the book say about the women's March Madness tournament?", "zh": "关于女子疯狂三月锦标赛，书里是怎么说的？"}, "options": [{"en": "It started in 1982 with 32 teams (now 64); the Connecticut Huskies have 11 titles, the most of any team", "zh": "1982年创办，最初32支球队（现在64支）；康涅狄格哈士奇队11次夺冠，居各队之首"}, {"en": "It started in 1939 with eight teams, the same year as the men's", "zh": "1939年与男子同期创办，同样8支球队"}, {"en": "It has always had exactly 68 teams like the men's", "zh": "一直和男子一样恰好68支球队"}, {"en": "The Tennessee Volunteers hold the record with 11 championships", "zh": "田纳西志愿者队以11次冠军保持纪录"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book states the women's tournament 'started in 1982' with 32 teams and has doubled to 64; 'The Connecticut Huskies have been the most dominant... with eleven national championships' (Tennessee is next with eight).", "zh": "书里说女子锦标赛「1982年创办」时32支球队，如今翻倍到64支；「康涅狄格哈士奇队最强势……拿下11次全国冠军」（田纳西以8次紧随其后）。"}}, {"q": {"en": "In the 1985 championship, why was Villanova's win over Georgetown called an upset?", "zh": "1985年决赛里，维拉诺瓦(Villanova)战胜乔治城(Georgetown)为什么被称为「爆冷」？"}, "options": [{"en": "Georgetown was the defending champion and top-ranked; 8th-ranked Villanova won by shooting over 78% from the field, 66-64", "zh": "乔治城是卫冕冠军且排名第一；排名第8的维拉诺瓦以超过78%的投篮命中率、66比64取胜"}, {"en": "Villanova was favored and won easily by 30 points", "zh": "维拉诺瓦本就被看好，轻松赢了30分"}, {"en": "It was the first game ever played in the tournament", "zh": "那是锦标赛历史上第一场比赛"}, {"en": "A referee made the winning call by mistake", "zh": "是一名裁判误判决定了胜负"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Georgetown was 'the defending champion and was awarded the top rank,' while Villanova was ranked eighth; Villanova shocked them with a 78% field-goal rate (22 of 28) to win 66-64 — a classic Cinderella upset.", "zh": "乔治城是「卫冕冠军、当年排名第一」，而维拉诺瓦仅排第八；维拉诺瓦以78%的命中率（28投22中）爆冷66比64取胜——典型的灰姑娘式冷门。"}}, {"q": {"en": "In the glossary, what is an 'upset'?", "zh": "在词汇表里，「upset」(爆冷) 是什么？"}, "options": [{"en": "An unexpected result in a sports game or other competition", "zh": "体育比赛或其他竞赛中出乎意料的结果"}, {"en": "A guaranteed win by the top-ranked team", "zh": "排名第一球队的稳赢"}, {"en": "A type of tournament bracket", "zh": "一种对阵表的类型"}, {"en": "A team that is expected to lose", "zh": "一支被看好会输的球队"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines an upset as 'an unexpected result in a sports game or other competition' — like Villanova beating Georgetown or Middle Tennessee beating Michigan State.", "zh": "词汇表把 upset 定义为「体育比赛或其他竞赛中出乎意料的结果」——比如维拉诺瓦胜乔治城、中田纳西胜密歇根州立。"}}, {"q": {"en": "What happened with the 'Billion-Dollar Bracket' in 2014, and what does it show?", "zh": "2014年的「十亿美元对阵表」(Billion-Dollar Bracket) 发生了什么？这说明了什么？"}, "options": [{"en": "$1 billion was offered for a perfect bracket, but no one won because the odds are between 1 in 5 billion and 1 in 135 billion", "zh": "有人悬赏10亿美元给填出完美对阵表的人，但无人能赢，因为全猜对的概率介于50亿分之一到1350亿分之一之间"}, {"en": "A student won $1 billion on his very first try", "zh": "一名学生第一次尝试就赢走了10亿美元"}, {"en": "The prize was $1 million and many people won it", "zh": "奖金是100万美元，而且很多人赢到了"}, {"en": "The contest was canceled before it started", "zh": "比赛还没开始就被取消了"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book says in 2014 '$1 billion was offered' for the perfect bracket, but 'no one could' win it; the odds of picking every game correctly are 'between 1 in 5 billion and 1 in 135 billion' — showing how unpredictable March Madness is.", "zh": "书里说2014年「悬赏10亿美元」给完美对阵表，但「没人能赢」；全猜对的概率是「50亿分之一到1350亿分之一之间」——说明疯狂三月有多么难以预测。"}}], "extended": {"prompt": {"en": "The book calls surprise wins by weak teams 'Cinderella stories' and says 'any team can claw its way to an exciting upset victory.' Think of a time you or someone you know beat the odds or achieved something others didn't expect. What made that 'upset' possible, and why do you think underdogs capture our imagination?", "zh": "书里把弱队爆冷取胜称作「灰姑娘故事」(Cinderella stories)，并说「任何球队都能一路拼出激动人心的冷门」。想一想你或你认识的人「以弱胜强」或做出别人没料到的事的经历。那次「爆冷」靠的是什么？为什么我们总被逆袭的弱队打动？"}, "guidance": {"en": ["In 1985, 8th-ranked Villanova beat top-ranked Georgetown by shooting over 78% from the field (p. 13).", "In 2016, 15th-ranked Middle Tennessee beat 2nd-ranked Michigan State 90-81 and 'busted a lot of people's brackets' (p. 14).", "A good answer gives a real example of an underdog win and explains why we root for them (hope, surprise, fairness)."], "zh": ["1985年，排名第8的维拉诺瓦以超过78%的命中率击败了排名第一的乔治城（第13页）。", "2016年，排名第15的中田纳西以90比81战胜排名第2的密歇根州立，「搅黄了好多人的对阵表」（第14页）。", "好的回答要举一个真实的弱队逆袭例子，并解释我们为何支持他们（希望、惊喜、公平感）。"]}}};</script>
