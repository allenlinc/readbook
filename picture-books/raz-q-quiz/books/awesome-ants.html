<script>window.BOOK = {"slug": "awesome-ants", "title": "Awesome Ants", "titleZh": "了不起的蚂蚁", "level": "Q", "genre": "Nonfiction", "mainSkill": "Author's Purpose and Perspective", "questions": [{"q": {"en": "What is the book's Focus Question — the big question the author wants you to think about?", "zh": "这本书的「聚焦问题」(Focus Question) 是什么？也就是作者希望你思考的核心问题。"}, "options": [{"en": "What makes ants awesome?", "zh": "蚂蚁为什么了不起？"}, {"en": "How do ants build their nests?", "zh": "蚂蚁怎样筑巢？"}, {"en": "Why are ants in danger of dying out?", "zh": "蚂蚁为什么濒临灭绝？"}, {"en": "Where do ants go in the winter?", "zh": "蚂蚁冬天去哪里？"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book opens with the Focus Question 'What makes ants awesome?' and the whole book answers it — from their strength to how they work together.", "zh": "书一开头就提出聚焦问题「蚂蚁为什么了不起？」，全书都在回答这个问题——从它们的力量到它们的合作方式。"}}, {"q": {"en": "About how old are ants?", "zh": "蚂蚁大约有多少年的历史？"}, "options": [{"en": "About 100 million years old", "zh": "约一亿年"}, {"en": "About 49 million years old", "zh": "约四千九百万年"}, {"en": "About 1 million years old", "zh": "约一百万年"}, {"en": "Only a few thousand years old", "zh": "只有几千年的"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says ants are about 100 million years old and were 'crawling around under the dinosaurs.' A 49-million-year-old fossil is shown, but that is just one fossil, not the whole species' age.", "zh": "书里说蚂蚁约有一亿年历史，当时「在恐龙脚下爬来爬去」。书中展示了一块四千九百万年的化石，但那只是单块化石，并非整个物种的年龄。"}}, {"q": {"en": "On which continent do ants NOT live?", "zh": "蚂蚁不在哪个大洲生活？"}, "options": [{"en": "Antarctica", "zh": "南极洲"}, {"en": "Africa", "zh": "非洲"}, {"en": "Asia", "zh": "亚洲"}, {"en": "South America", "zh": "南美洲"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says more than 10,000 species live 'on every continent except Antarctica.'", "zh": "书里说有一万多种蚂蚁生活在「除南极洲以外的每个大洲」。"}}, {"q": {"en": "In the book, what are pheromones?", "zh": "在书中，信息素 (pheromones) 是什么？"}, "options": [{"en": "Special chemicals ants release so other ants can smell their messages", "zh": "蚂蚁释放的特殊化学物质，其他蚂蚁能靠气味接收到信息"}, {"en": "The noises ants make by rubbing their legs together", "zh": "蚂蚁摩擦腿发出的声音"}, {"en": "The tiny hooks on an ant's legs that help it climb", "zh": "蚂蚁腿上帮助攀爬的小钩子"}, {"en": "A kind of room inside an ant colony", "zh": "蚁巢里的一种房间"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary and text define pheromones as chemicals ants release; 'The main way ants communicate is by smell' using these chemicals to send messages like alarms or food trails.", "zh": "词汇表与正文把信息素定义为蚂蚁释放的化学物质；「蚂蚁主要靠气味交流」，用这些化学物质来传递警报或食物踪迹等信息。"}}, {"q": {"en": "What do ants mainly use their antennae for?", "zh": "蚂蚁主要用触角来做什么？"}, "options": [{"en": "To taste, smell, hear, and communicate through touch", "zh": "用来尝、闻、听，以及通过触碰交流"}, {"en": "To lift objects many times their own weight", "zh": "用来举起数倍于自身体重的物体"}, {"en": "To dig tunnels underground", "zh": "用来在地下挖隧道"}, {"en": "To fly away and start new colonies", "zh": "用来飞走并建立新蚁群"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The book calls the antennae 'all-in-one sense machines' that ants use 'to taste, smell, hear, and communicate with other ants through touch.'", "zh": "书里把触角称作「全能的感觉器官」，蚂蚁用它来「尝、闻、听，并通过触碰与其他蚂蚁交流」。"}}, {"q": {"en": "Like all insects, how many legs and body parts do ants have?", "zh": "和所有昆虫一样，蚂蚁有几条腿、几个身体部分？"}, "options": [{"en": "Six legs and three body parts", "zh": "六条腿、三个身体部分"}, {"en": "Eight legs and two body parts", "zh": "八条腿、两个身体部分"}, {"en": "Four legs and one body part", "zh": "四条腿、一个身体部分"}, {"en": "Ten legs and four body parts", "zh": "十条腿、四个身体部分"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book states, 'Like all insects, ants have six legs and three body parts' (head, thorax, and abdomen).", "zh": "书里写道：「和所有昆虫一样，蚂蚁有六条腿和三个身体部分」（头、胸、腹）。"}}, {"q": {"en": "What are the three ways ants communicate, and which is the MAIN way?", "zh": "蚂蚁有哪三种交流方式？其中最主要的是哪一种？"}, "options": [{"en": "Touch, sound, and smell — with smell being the main way", "zh": "触碰、声音和气味——其中最主要的是气味"}, {"en": "Sight, hearing, and taste — with sight being the main way", "zh": "视觉、听觉和味觉——其中最主要的是视觉"}, {"en": "Dancing, singing, and jumping — with dancing the main way", "zh": "跳舞、唱歌和跳跃——其中最主要的是跳舞"}, {"en": "Smell, flying, and digging — with flying the main way", "zh": "气味、飞行和挖掘——其中最主要的是飞行"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book lists three ways — touch, sound, and smell — and says, 'The main way ants communicate is by smell,' using pheromones.", "zh": "书里列出三种方式——触碰、声音和气味，并说「蚂蚁最主要的交流方式是气味」，靠信息素实现。"}}, {"q": {"en": "How do ants cross a river or a gap in their path?", "zh": "蚂蚁是怎样过河或跨越路上的缺口的？"}, "options": [{"en": "They link their bodies to form rafts or bridges", "zh": "它们用身体连成木筏或桥"}, {"en": "They build wooden boats", "zh": "它们造木船"}, {"en": "They swim using their wings", "zh": "它们用翅膀游泳"}, {"en": "They wait for the water to dry up", "zh": "它们等水干掉"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says ants 'climb on top of each other and link their legs until they form a raft or bridge made of their own bodies,' and can 'shape themselves into boats to float across rivers.'", "zh": "书里说蚂蚁「一个爬到另一个身上、钩住腿，直到用身体连成木筏或桥」，还能「把自己变成小船漂过河」。"}}, {"q": {"en": "What is the queen ant's role in the colony?", "zh": "蚁后在蚁群中扮演什么角色？"}, "options": [{"en": "She is the leader and lays thousands of eggs, but does not command the others", "zh": "她是领导者，每天产下成千上万颗卵，但并不指挥其他蚂蚁"}, {"en": "She builds the nest and finds all the food", "zh": "她筑巢并寻找所有食物"}, {"en": "She is the smallest ant and does the hardest jobs", "zh": "她是最小的蚂蚁，干最重的活"}, {"en": "She is a male ant that mates with the workers", "zh": "她是一只会和工蚁交配的公蚁"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book says the queen 'is the leader of the colony, but she doesn't tell the other ants what to do,' and is 'an egg-laying machine' laying 'thousands of eggs every day.'", "zh": "书里说蚁后「是蚁群的领导者，但她并不指挥其他蚂蚁做事」，而且是「产卵机器」，「每天产下成千上万颗卵」。"}}, {"q": {"en": "What does the author want you to do the next time you see a trail of ants?", "zh": "作者希望你下次看到一排蚂蚁时怎么做？"}, "options": [{"en": "Stop, watch, and follow them — but don't step on their trail", "zh": "停下、观察并跟着它们——只是别踩到它们的路线"}, {"en": "Kill them so they don't invade your kitchen", "zh": "消灭它们，免得它们闯进厨房"}, {"en": "Collect them to keep as pets", "zh": "把它们抓来当宠物养"}, {"en": "Avoid them because they are dangerous", "zh": "躲开它们，因为它们很危险"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The ending says, 'the next time you come across a trail of ants, stop and watch... just don't step on their trail' — the author wants readers to appreciate how awesome ants are.", "zh": "结尾写道：「下次你碰到一排蚂蚁，停下来看看……只是别踩到它们的路线」——作者希望读者去欣赏蚂蚁有多了不起。"}}], "extended": {"prompt": {"en": "The book says ants shape themselves into boats to float across rivers and link their bodies to build bridges. Have you ever worked with others to do something none of you could do alone? Describe a time you cooperated with a group, and explain why working together (like ants) can achieve more than working alone.", "zh": "书里说蚂蚁能把自己连成小船漂过河、用身体搭成桥跨过缺口。你有没有和别人一起完成过一件单靠自己做不到的事？描述一次你与团队合作的经验，并解释为什么「像蚂蚁一样」合作能比单打独斗做成更多事。"}, "guidance": {"en": ["Ants link their legs to form rafts or bridges made of their own bodies (p. 13).", "Working together, thousands of ants can overpower animals hundreds of times their own size (p. 14).", "A good answer gives a real example of teamwork and explains the benefit of cooperating."], "zh": ["蚂蚁互相钩住腿，用身体连成木筏或桥（第13页）。", "成千上万只蚂蚁合作，能制服比自己大几百倍的动物（第14页）。", "好的回答会举一个真实的团队合作例子，并说明合作的好处。"]}}};</script>
