<script>window.BOOK = {"slug": "landfills-what-a-load-of-garbage", "title": "Landfills: What a Load of Garbage!", "titleZh": "垃圾填埋场：一堆垃圾！", "level": "Q", "genre": "Nonfiction", "mainSkill": "Author's Purpose and Perspective", "questions": [{"q": {"en": "What did people in the ancient city of Troy do with their garbage?", "zh": "古代特洛伊城（Troy）的人是怎样处理垃圾的？"}, "options": [{"en": "They sent it to the moon", "zh": "他们把垃圾送到月球"}, {"en": "They threw it on their floors and, when filthy, buried it under a layer of earth — piling so many layers they had to raise their roofs", "zh": "他们把垃圾丢在地板上，脏了就盖一层土埋起来——层层堆积，最后不得不把屋顶加高"}, {"en": "They recycled everything into new tools according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "他们把一切回收做成新工具（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "They fed it all to their pets", "zh": "他们把垃圾全喂给宠物"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says people in Troy 'threw their garbage on their floors. When the floors grew filthy enough, the people would put another layer of earth on top to bury the garbage... they had to raise the roofs of their houses!'", "zh": "书里说特洛伊人「把垃圾丢在地板上。地板脏到一定程度，就盖一层土把垃圾埋起来……最后他们不得不把屋顶加高！」"}}, {"q": {"en": "About how much trash does the average American create every day?", "zh": "普通美国人每天大约制造多少垃圾？"}, "options": [{"en": "4.5 pounds (2 kg) of trash every day", "zh": "每天4.5磅（2公斤）垃圾"}, {"en": "Nothing at all", "zh": "完全没有"}, {"en": "A tiny pinch, less than an ounce according to some versions of the story", "zh": "一小撮，不到一盎司（按书中另一种说法）"}, {"en": "One ton every day", "zh": "每天一吨"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says 'The average American creates 4.5 pounds (2 kg) of trash every day,' even though Americans are only 5% of the world's population but make 25% of its waste.", "zh": "书里说「普通美国人每天制造4.5磅（2公斤）垃圾」，尽管美国人只占世界人口的5%，却制造了世界25%的垃圾。"}}, {"q": {"en": "In a landfill, what is a 'cell'?", "zh": "在垃圾填埋场里，「 : "Craft and Structure", "explain": {"en": "The book says as trash breaks down, 'its toxic parts mix with rainwater to produce leachate. Leachate is the often-toxic liquid that has drained, or leached, through the landfill.'", "zh": "书里说垃圾分解时，「有毒成分与雨水混合，产生渗滤液。渗滤液就是渗透、滤出填埋场的、常带毒性的液体。」"}}, {"q": {"en": "In the glossary, what does 'biodegradable' mean?", "zh": "在词汇表里，「可生物降解的」(biodegradable) 是什么意思？"}, "options": [{"en": "Impossible to destroy by any means according to some versions of the story", "zh": "用任何方法都无法摧毁的（按书中另一种说法）"}, {"en": "Brightly colored and easy to see", "zh": "颜色鲜艳、容易看见的"}, {"en": "Capable of being broken down by microorganisms such as bacteria", "zh": "能被细菌等微生物分解、降解的"}, {"en": "Made only from plastic", "zh": "只用塑料制成的"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'biodegradable' as 'capable of being decomposed or broken down by microorganisms, such as bacteria.'", "zh": "词汇表把 biodegradable 定义为「能被细菌等微生物分解、降解的」。"}}, {"q": {"en": "How do landfills deal with the gas methane, and why does it matter?", "zh": "填埋场是怎样处理甲烷气体的？为什么这很重要？"}, "options": [{"en": "Methane from rotting garbage is released or burned to avoid explosions, and can be used for electricity and fuel — but it is a greenhouse gas that causes climate change", "zh": "腐烂垃圾产生的甲烷被释放或烧掉以防爆炸，也可用来发电和作燃料——但它是一种导致气候变化的温室气体"}, {"en": "Methane is ignored because it is harmless", "zh": "甲烷无害，所以被忽略"}, {"en": "Methane is collected and sold as a soft drink according to some versions of the story in an early draft of the book as mentioned in a later chapter before the main events begin", "zh": "甲烷被收集起来当汽水卖（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）（在主要事件发生之前）"}, {"en": "Methane is used to grow flowers", "zh": "甲烷被用来种花"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says garbage rot creates methane that 'must be released or burned. Otherwise, it can cause explosions,' and 'Methane from landfills can be used to generate electricity.' But 'methane is a powerful greenhouse gas' that adds to climate change.", "zh": "书里说垃圾腐烂产生甲烷，「必须释放或烧掉，否则会引发爆炸」，而且「填埋场的甲烷可用来发电」。但「甲烷是一种强效温室气体」，会加剧气候变化。"}}, {"q": {"en": "Why does garbage sealed inside a landfill NOT break down quickly?", "zh": "为什么被封在填埋场里的垃圾不会很快分解？"}, "options": [{"en": "Because the garbage is painted with special paint according to some versions of the story in an early draft of the book as mentioned in a later chapter before the main events begin as the author once noted", "zh": "因为垃圾被涂了特殊油漆（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）（在主要事件发生之前）（正如作者曾提到的）"}, {"en": "Sealing it from air and water 'mummifies' the garbage, so the bacteria and organisms that break things down can't do their job; plastic can take thousands of years and Styrofoam over a million", "zh": "把它与空气、水隔绝等于「做成木乃伊」，分解垃圾的细菌和生物无法工作；塑料要数千年，发泡胶要逾百万年"}, {"en": "Because landfills are kept very hot inside", "zh": "因为填埋场内部很热"}, {"en": "Because there are no workers inside", "zh": "因为里面没有工人"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says sealing trash 'from air and water is like mummifying our garbage,' and 'These organisms can't do their job... because they need air and water to survive.' Plastic isn't biodegradable, and a Styrofoam cup 'could take more than a million years to turn to dust.'", "zh": "书里说把垃圾与空气、水隔绝「就像给垃圾做木乃伊」，而「这些生物无法工作……因为它们需要空气和水才能生存」。塑料不可降解，发泡胶杯「可能要一百多万年才能化为尘土」。"}}, {"q": {"en": "What is the author's main message at the end of the book ('A Legacy of Trash')?", "zh": "书末「垃圾的遗产」(A Legacy of Trash) 一节中，作者的主要观点是什么？"}, "options": [{"en": "Garbage disappears the moment we forget it", "zh": "垃圾只要我们不去想就立刻消失"}, {"en": "There is nothing we can do, so keep throwing everything away according to some versions of the story in an early draft of the book", "zh": "我们无能为力，所以尽管把东西全扔掉（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Each of us has a choice: about half our trash could be recycled, and we can reduce waste by buying less", "zh": "我们每个人都有选择：约一半垃圾可以回收，而且少买东西就能减少垃圾"}, {"en": "The best plan is to build landfills on the moon", "zh": "最佳方案是在月球上建填埋场"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book says 'each of us has a choice about what we do with our garbage. About half the things we throw away could be recycled... We can also reduce the amount of garbage we're creating each day by buying less.'", "zh": "书里说「我们每个人对如何处理垃圾都有选择。我们扔掉的东西里约有一半可以回收……我们也可以通过少买东西，减少每天制造的垃圾量。」"}}, {"q": {"en": "Why does the author begin the book with ancient Troy and the Middle Ages instead of starting with modern landfills?", "zh": "作者为什么不从现代填埋场开头，而要先讲古代特洛伊和中世纪？"}, "options": [{"en": "To describe old buildings", "zh": "为了描写老建筑"}, {"en": "To teach a history lesson about kings and queens according to some versions of the story in an early draft of the book", "zh": "为了上一堂关于国王王后的历史课（按书中另一种说法）（在书的早期草稿中）"}, {"en": "To prove that garbage is a new problem", "zh": "为了证明垃圾是个新问题"}, {"en": "To show that people have always had to deal with trash, connecting the past to our problem today", "zh": "为了说明人类一直都要处理垃圾，把过去和今天的难题联系起来"}], "answer": 3, "skill": "Author's Purpose and Perspective", "explain": {"en": "The author opens with Troy burying trash under floors and the Middle Ages spreading the plague through street waste, writing 'Ancient or modern, people still have to figure out what to do with their trash' — linking past and present.", "zh": "作者以特洛伊把垃圾埋在地板下、中世纪因街头垃圾传播瘟疫开头，并写道「无论古代还是现代，人们都得想办法处理垃圾」——把过去和现在联系起来。"}}], "extended": {"prompt": {"en": "The book says about half of what we throw away could be recycled, and we can make less trash by buying less. Look around your home or classroom: what are three things people throw away that could be recycled, composted, or avoided? Pick one and explain how you and your family or class could keep it out of a landfill.", "zh": "书里说我们扔掉的东西里约有一半可以回收，而且少买东西就能减少垃圾。看看你的家或教室：人们扔掉的东西里，有哪三样可以回收、堆肥或避免丢弃？选其中一样，说明你和家人或班级可以怎样让它不进填埋场。"}, "guidance": {"en": ["About half of thrown-away items 'could be recycled and kept out of landfills' (p. 15).", "Composting food scraps and yard waste breaks garbage down instead of burying it (p. 5, p. 15).", "A good answer names three real throwaway items and gives one concrete way to keep one out of the landfill (recycle, compost, reuse, or buy less)."], "zh": ["扔掉的东西里「约有一半可以回收、不进填埋场」（第15页）。", "把厨余和庭院垃圾堆肥，能让垃圾分解，而不是被埋起来（第5、15页）。", "好的回答会说出三样真实的丢弃物，并给出一项具体办法让其中一样不进填埋场（回收、堆肥、重复使用或少买）。"]}}};</script>
