y", "zh": "在学校失物招领处（按书中另一种说法）"}, {"en": "In Daron's classroom", "zh": "在 Daron 的教室里"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Michael says, 'I found it in Elm Creek Park, by a park bench,' and Daron's mom remembers they sat on a bench while walking the dog and forgot it.", "zh": "Michael 说：「我在 Elm Creek 公园、一张长椅旁找到的」，Daron 的妈妈也想起遛狗时坐在长椅上、后来忘了拿。"}}, {"q": {"en": "How does Michael know the camera belongs to Daron?", "zh": "Michael 怎么知道这台相机是 Daron 的？"}, "options": [{"en": "He printed the photos and saw Daron with his ant sculpture, then realized they shared Mr. Casey as a teacher", "zh": "他洗出了照片，看到 Daron 和他的蚂蚁雕塑，进而发现他们同是 Casey 老师的学生"}, {"en": "The camera was gold and easy to spot", "zh": "相机是金色的，很容易认"}, {"en": "A police officer told him", "zh": "一位警察告诉他的"}, {"en": "Daron's name was written on the camera according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "相机上写着 Daron 的名字（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Michael 'printed the pictures' and saw 'the one showing you in your classroom with your ant sculpture.' He realized 'We had the same third-grade teacher' (Mr. Casey), who assigns recycled sculptures.", "zh": "Michael「把照片洗了出来」，看到「你在教室里和蚂蚁雕塑的合照」。他意识到「我们有同一个三年级老师」（Casey 老师），而那位老师总会让学生用回收材料做雕塑。"}}, {"q": {"en": "From what point of view is the story told?", "zh": "这个故事是用什么视角（人称）叙述的？"}, "options": [{"en": "As a newspaper article", "zh": "以新闻报道的形式"}, {"en": "Third person—a narrator describes Daron's thoughts and feelings from outside", "zh": "第三人称——由外部的叙述者描写 Daron 的想法和感受"}, {"en": "First person—Daron tells it as 'I'", "zh": "第一人称——由 Daron 以「我」讲述"}, {"en": "Second person—addressing the reader as 'you' according to some versions of the story", "zh": "第二人称——以「你」称呼读者（按书中另一种说法）"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The narrator says 'Daron was excited' and 'He felt like a balloon,' describing Daron from outside, which is third-person narration.", "zh": "叙述者说「Daron 很兴奋」「他感觉像一个快要爆掉的气球」，从外部描写 Daron，属于第三人称叙述。"}}, {"q": {"en": "What does the title 'The Ant in the Photograph' refer to?", "zh": "书名「照片里的蚂蚁」(The Ant in the Photograph) 指的是什么？"}, "options": [{"en": "The cover of a book about insects", "zh": "一本昆虫书的封面"}, {"en": "A real ant that crawls into a camera according to some versions of the story in an early draft of the book", "zh": "一只爬进相机里的真蚂蚁（按书中另一种说法）（在书的早期草稿中）"}, {"en": "A picture hanging in the classroom", "zh": "挂在教室里的一幅画"}, {"en": "The photo of Daron holding his ant sculpture, which becomes the only record of it after it is ruined", "zh": "Daron 抱着蚂蚁雕塑的那张照片，雕塑毁掉后它成了唯一的记录"}], "answer": 3, "skill": "Craft and Structure", "explain": {"en": "After the sculpture is ruined, Daron hopes 'the photograph of it turns out' so Dad can see it; that photo is later what lets Michael identify the owner.", "zh": "雕塑毁掉后，Daron 希望「那张它的照片洗得出来」好让爸爸看到；而那张照片后来正是 Michael 认出失主的关键。"}}, {"q": {"en": "What two problems does Daron face in the story (the Focus Question)?", "zh": "故事中 Daron 遇到了哪两个问题（即「聚焦问题」）？"}, "options": [{"en": "He forgets his homework AND loses his mom according to some versions of the story", "zh": "他忘了作业，又跟妈妈走散（按书中另一种说法）"}, {"en": "His ant sculpture is ruined AND the camera with its only photo is lost", "zh": "他的蚂蚁雕塑毁了，而且存有唯一照片的相机也丢了"}, {"en": "He fails a test AND breaks a window", "zh": "他考试不及格，又打碎了窗户"}, {"en": "He loses his dog AND misses the bus", "zh": "他丢了狗，又错过了校车"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The Focus Question asks 'What problems does Daron face?'—first the sculpture is ruined ('it's ruined!'), then the camera with the photo is lost and can't be found.", "zh": "书的「聚焦问题」问「Daron 遇到了什么问题？」——先是雕塑毁了（「毁了！」），接着存有照片的相机丢了、怎么也找不到。"}}, {"q": {"en": "How are Daron's problems solved?", "zh": "Daron 的问题是怎样解决的？"}, "options": [{"en": "Michael finds the camera at the park and returns it, so Daron can show Dad the photo", "zh": "Michael 在公园找到相机并归还，Daron 才能把照片给爸爸看"}, {"en": "His dad fixes the broken ant", "zh": "他爸爸把坏掉的蚂蚁修好了"}, {"en": "The teacher makes a new sculpture for him according to some versions of the story in an early draft of the book", "zh": "老师替他做了一个新雕塑（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Daron buys a new camera", "zh": "Daron 买了一台新相机"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Michael returns the blue camera bag; inside are the photographs, including the one of Daron and his ant, so Daron says, 'Now I can show the ant to Dad.'", "zh": "Michael 归还了蓝色相机包；里面的照片包括 Daron 和蚂蚁的合照，于是 Daron 说：「现在我能把蚂蚁给爸爸看了。」"}}, {"q": {"en": "What lesson about strangers does Daron learn by the end?", "zh": "到结尾，Daron 关于「陌生人」学到了什么道理？"}, "options": [{"en": "Sometimes you can count on the kindness of a stranger", "zh": "有时候你可以信赖陌生人的善意"}, {"en": "Strangers are always dangerous", "zh": "陌生人总是危险的"}, {"en": "Never talk to older boys", "zh": "永远不要和年长的男孩说话"}, {"en": "You should keep cameras at home according to some versions of the story", "zh": "你应该把相机留在家里（按书中另一种说法）"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "After Michael returns the camera, Daron says, 'I guess sometimes people can count on the kindness of a stranger.'", "zh": "Michael 归还相机后，Daron 说：「我想，有时候人是可以信赖陌生人的善意的。」"}}, {"q": {"en": "Why does the author include Michael's own memory of making a recycled sculpture?", "zh": "作者为什么要写 Michael 自己也做过回收材料雕塑的回忆？"}, "options": [{"en": "To teach readers how to make a dog", "zh": "为了教读者怎么做一只狗"}, {"en": "To show Michael did not like school according to some versions of the story in an early draft of the book", "zh": "为了表现 Michael 不喜欢上学（按书中另一种说法）（在书的早期草稿中）"}, {"en": "To prove Michael was a better artist", "zh": "为了证明 Michael 艺术更好"}, {"en": "To explain how Michael recognized the camera's owner and to show the school project connects them", "zh": "为了说明 Michael 是怎样认出相机主人的，也展现这个学校作业把两人联系了起来"}], "answer": 3, "skill": "Author's Purpose and Perspective", "explain": {"en": "Michael says he 'made a dog' for the same third-grade project with Mr. Casey, which is why he recognized Daron's photo—the shared recycled-sculpture tradition links them.", "zh": "Michael 说自己在 Casey 老师的三年级课堂上也「做了一只狗」，正因此他认出了 Daron 的照片——这个共同的回收材料雕塑传统把两人连在了一起。"}}], "extended": {"prompt": {"en": "Daron loses something important (his sculpture and the photo of it), but a stranger's kindness solves the problem. Think of a time you lost something or made a mistake, and someone helped you—maybe a friend, a family member, or even a stranger. What happened, and how did that help change things?", "zh": "Daron 丢了重要的东西（他的雕塑和它的照片），却靠一位陌生人的善意解决了问题。回想一次你弄丢东西或犯了错、却有人帮了你的经历——也许是朋友、家人，甚至陌生人。发生了什么？那份帮助怎样改变了局面？"}, "guidance": {"en": ["Daron's ant is ruined and the camera with its photo is lost at Elm Creek Park (p. 5-9).", "Michael finds the camera, prints the photos, and returns it because he recognizes the shared school project (p. 13-15).", "A good answer tells a real story of losing something or needing help, and explains how another person's kindness made a difference."], "zh": ["Daron 的蚂蚁毁了，存有照片的相机也丢在了 Elm Creek 公园（第5-9页）。", "Michael 找到相机、洗出照片并归还，因为他认出了两人共同的学校作业（第13-15页）。", "好的回答要讲一个真实的弄丢东西或需要帮助的故事，并说明别人的善意带来了怎样的改变。"]}}};</script>
