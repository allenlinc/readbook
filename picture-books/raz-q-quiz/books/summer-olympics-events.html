e long jump", "zh": "马拉松和跳远"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says, 'Only women compete on the balance beam and in the uneven bars events,' while rings, pommel horse, and parallel bars are for men only.", "zh": "书里说「只有女子参加平衡木和高低杠」，而吊环、鞍马、双杠只限男子参加。"}}, {"q": {"en": "What five activities make up the pentathlon?", "zh": "五项全能包含哪五项活动？"}, "options": [{"en": "Ride a horse, shoot targets with a pistol, fight with a sword, run, and swim", "zh": "骑马、用手枪射击、用剑格斗、跑步和游泳"}, {"en": "Run, jump, throw, swim, and fence", "zh": "跑、跳、投、游泳和击剑"}, {"en": "Sprint, cycle, row, ski, and shoot", "zh": "短跑、骑车、划船、滑雪和射击"}, {"en": "Box, wrestle, lift weights, dive, and climb", "zh": "拳击、摔跤、举重、跳水和攀岩"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The pentathlon is 'based on an imaginary scenario of a soldier' who must 'ride a horse, shoot targets with a pistol, fight with a sword, run, and swim.'", "zh": "五项全能「基于一个士兵的假想情境」，这名士兵必须「骑马、用手枪射击、用剑格斗、跑步和游泳」。"}}, {"q": {"en": "In the glossary, what is a 'marathon'?", "zh": "在词汇表里，marathon（马拉松）是什么？"}, "options": [{"en": "A very long running race", "zh": "一场很长的赛跑"}, {"en": "A short running race", "zh": "一场短跑"}, {"en": "A swimming race", "zh": "一场游泳比赛"}, {"en": "A fight with swords", "zh": "用剑的格斗"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines marathon as 'a very long running race (p. 11),' and the book says it is 'the longest running event,' over 42 kilometers (26 mi).", "zh": "词汇表把 marathon 定义为「一场很长的赛跑」（第11页），书里也说它是「最长的跑步项目」，超过 42 公里（26 英里）。"}}, {"q": {"en": "In the glossary, what does 'duel' mean, as used for fencers?", "zh": "在词汇表里，duel（对决）是什么意思——书里用于击剑选手？"}, "options": [{"en": "To fight one-on-one", "zh": "一对一地较量"}, {"en": "To run as fast as possible", "zh": "尽可能快地跑"}, {"en": "To swim a long distance", "zh": "游很长距离"}, {"en": "To jump over a high bar", "zh": "跳过一根高横杆"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines duel as 'to fight one-on-one (p. 16),' and the book says 'Olympic fencers duel with practice swords.'", "zh": "词汇表把 duel 定义为「一对一地较量」（第16页），书里说「奥运击剑选手用练习剑 duel（对决）」。"}}, {"q": {"en": "In swimming, what is special about the freestyle event?", "zh": "在游泳项目中，自由泳有什么特别之处？"}, "options": [{"en": "Swimmers can choose whichever stroke they want, unlike races limited to one stroke", "zh": "游泳者可以任选泳姿，不像某些比赛被限定只能用一种姿势"}, {"en": "Swimmers must use only the butterfly stroke", "zh": "游泳者必须只用蝶泳"}, {"en": "Swimmers are not allowed to use their arms", "zh": "游泳者不准用手臂"}, {"en": "Swimmers race only two at a time", "zh": "游泳者每次只两人比赛"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says many races 'allow swimmers to use only one kind of stroke,' but 'in the freestyle event, swimmers can choose the stroke they want to use.'", "zh": "书里说许多比赛「只允许游泳者用一种姿势」，但「在自由泳项目里，游泳者可以任选想用的姿势」。"}}, {"q": {"en": "Why do runners train high in the mountains?", "zh": "跑步运动员为什么要在高山上训练？"}, "options": [{"en": "So their bodies get better at delivering oxygen to muscles to create energy", "zh": "让身体更好地把氧气输送给肌肉以产生能量"}, {"en": "So they can learn to ski", "zh": "为了学滑雪"}, {"en": "So they can avoid the heat", "zh": "为了避开炎热"}, {"en": "So they can practice fencing", "zh": "为了练习击剑"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says runners 'train for the Olympic Games by running in locations high in the mountains' because this 'helps their bodies become better at delivering oxygen to their muscles to create energy.'", "zh": "书里说跑步者「在高山地区跑步训练」，因为这「帮助他们的身体更好地把氧气输送给肌肉以产生能量」。"}}, {"q": {"en": "According to the book, what big idea do the Olympic Games promote?", "zh": "根据这本书，奥运会提倡的核心精神是什么？"}, "options": [{"en": "Understanding and friendship among people from all countries", "zh": "促进各国人民之间的理解与友谊"}, {"en": "Winning as many gold medals as possible", "zh": "尽可能多地赢得金牌"}, {"en": "Becoming the richest athlete", "zh": "成为最富有的运动员"}, {"en": "Traveling to Greece every year", "zh": "每年都去希腊旅行"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book says the Games 'are intended to promote understanding and friendship among people from all countries,' which is the author's main point about why the Olympics matter.", "zh": "书里说奥运会「旨在促进各国人民之间的理解与友谊」，这是作者关于奥运意义的核心观点。"}}, {"q": {"en": "Why does the author organize the book into clear sections like Water Sports, Track and Field, Gymnastics, Fencing, and Pentathlon?", "zh": "作者为什么把书分成「水上项目」「田径」「体操」「击剑」「五项全能」这样清晰的章节？"}, "options": [{"en": "To present many different Olympic events in an organized way so readers can learn about each one", "zh": "为了有条理地介绍许多不同的奥运项目，方便读者逐一了解"}, {"en": "To tell a made-up story about one athlete", "zh": "为了讲一个虚构的某运动员的故事"}, {"en": "To list only the sports the author likes", "zh": "为了只列出作者喜欢的项目"}, {"en": "To teach how to build a stadium", "zh": "为了教人怎么建体育场"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The Table of Contents and section headings group the events (team sports, water sports, track and field, gymnastics, fencing, pentathlon), helping readers understand the wide range of Olympic events.", "zh": "目录和各小节标题把项目分类（团体项目、水上项目、田径、体操、击剑、五项全能），帮助读者理解奥运项目的广泛多样。"}}], "extended": {"prompt": {"en": "The pentathlon was created to test many skills a soldier might need, and athletes train in mountains to get better. Think of a skill or activity you have trained for (a sport, an instrument, a hobby). What did training involve, and why does practice in the right conditions help you improve?", "zh": "五项全能是为了考验士兵可能需要的多种技能而设立的，运动员还在高山训练以求进步。想一想你曾为之训练的一项技能或活动（运动、乐器、爱好）。训练包含什么？为什么在合适的条件下练习能帮你进步？"}, "guidance": {"en": ["The pentathlon includes five skills—ride, shoot, fence, run, and swim—based on a soldier's scenario (p. 17).", "Runners train high in the mountains so their bodies deliver oxygen to muscles better (p. 12).", "A good answer names a real activity you trained for and explains how practice (and good conditions) helped you improve."], "zh": ["五项全能包含五种技能——骑、射、剑、跑、游泳，基于士兵的情境（第17页）。", "跑步者在高山训练，让身体更好地把氧气输送给肌肉（第12页）。", "好的回答要点出你真实训练过的一项活动，并说明练习（和好条件）如何帮你进步。"]}}};</script>
