<script>window.BOOK = {"slug": "are-gmos-safe", "title": "Are GMOs Safe", "titleZh": "转基因食品安全吗", "level": "Z1", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "What was the Flavr Savr tomato, approved by the FDA in 1994?", "zh": "1994年获FDA批准的'Flavr Savr'番茄是什么？"}, "options": [{"en": "A traditional wild tomato from Mexico. according to some versions of the story", "zh": "一种来自墨西哥的传统野生番茄。（按书中另一种说法）"}, {"en": "The first genetically modified tomato, bred to stay firm long after ripening.", "zh": "第一种转基因番茄，培育后能在成熟后长期保持坚硬。"}, {"en": "A type of potato.", "zh": "一种马铃薯。"}, {"en": "A tomato grown only in greenhouses.", "zh": "一种只在温室中种植的番茄。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says in 1994 the FDA approved the Flavr Savr tomato, grown from lab-altered seeds, which 'stayed firm long after ripening' so it could ripen longer on the vine.", "zh": "书中说1994年FDA批准了Flavr Savr番茄，它用实验室改造过的种子培育，能'在成熟后长期保持坚硬'，从而可在藤上更久地成熟。"}}, {"q": {"en": "According to the USDA, about what percentage of corn, cotton, and soybeans grown in the United States are GMOs?", "zh": "根据美国农业部(USDA)，美国种植的大豆、棉花和玉米中，大约有多少比例是转基因的？"}, "options": [{"en": "About 10 percent.", "zh": "约10%。"}, {"en": "Less than 1 percent.", "zh": "不到1%。"}, {"en": "Exactly 50 percent.", "zh": "恰好50%。"}, {"en": "About 90 percent.", "zh": "约90%。"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The book states that 'About 90 percent of the corn, cotton, and soybeans grown in the United States are GMOs.'", "zh": "书中说'美国种植的大豆、棉花和玉米中约有90%是转基因的'。"}}, {"q": {"en": "What is Bt corn, as described in the book?", "zh": "书中描述的'Bt玉米'是什么样的玉米？"}, "options": [{"en": "Corn changed to include genes from a soil bacterium (Bt) that kills insects which eat it.", "zh": "被改造、加入了土壤细菌(Bt)基因、能杀死取食昆虫的玉米。"}, {"en": "Corn that is white instead of yellow.", "zh": "白色而非黄色的玉米。"}, {"en": "A type of corn with no genes at all. according to some versions of the story in an early draft of the book", "zh": "一种完全没有基因的玉米。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Corn that grows only in the desert.", "zh": "只在沙漠中生长的玉米。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says most U.S. corn has been changed to include genes from a soil bacterium called Bt, 'which kills insects that ingest it,' so the corn can kill pests that feed on it.", "zh": "书中说美国大部分玉米被改造、加入了名为Bt的土壤细菌基因，'能杀死取食它的昆虫'，因而可杀灭啃食的害虫。"}}, {"q": {"en": "What concern do opponents raise about planting the same few GMO varieties, according to Princeton University experts in the book?", "zh": "根据书中普林斯顿大学专家的观点，反对者就'种植少数几种相同转基因品种'提出了什么担忧？"}, "options": [{"en": "That relying on fewer varieties 'can lead to the quicker spread of diseases' in plants, making the food supply vulnerable.", "zh": "依赖少数品种'会导致植物病害更快传播'，使粮食供应变得脆弱。"}, {"en": "That it prevents all plant disease.", "zh": "这能杜绝一切植物病害。"}, {"en": "That it makes food taste better.", "zh": "这会让食物更美味。"}, {"en": "That it increases the number of farmers. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "这会增加农民的数量。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says Princeton experts warn that planting fewer varieties of crops 'can lead to the quicker spread of diseases' in plants—for example, if one GMO corn disease wiped out that corn, it would erase a key food source.", "zh": "书中说普林斯顿专家警告，种植较少品种'会导致植物病害更快传播'——例如若某种病害摧毁了唯一的转基因玉米，就会抹去一项关键食物来源。"}}, {"q": {"en": "The book presents both benefits and risks of GMOs in a balanced way. What does this structure show about the author's approach?", "zh": "本书以平衡的方式同时呈现转基因的益处与风险。这种结构显示了作者怎样的写作取向？"}, "options": [{"en": "A recipe book.", "zh": "一本食谱。"}, {"en": "A balanced, two-sided approach that lets readers weigh evidence rather than pushing one conclusion.", "zh": "一种平衡、兼顾两面的取向，让读者自行权衡证据，而非强推某一结论。"}, {"en": "A one-sided argument that GMOs are always dangerous. according to some versions of the story in an early draft of the book", "zh": "一面倒地主张转基因总是危险。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "A comic strip format.", "zh": "连环漫画的形式。"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "Chapters such as 'The Benefits and Risks of GMOs' and sections giving both proponents' and opponents' views show the author deliberately presents two sides so readers can weigh the evidence.", "zh": "'转基因的益处与风险'等章节以及同时呈现支持方与反对方观点的段落，显示作者刻意兼顾两面，让读者权衡证据。"}}, {"q": {"en": "The book notes a disagreement about scientific studies. What conflict does it describe?", "zh": "本书提到关于科学研究的争议。它描述了怎样的冲突？"}, "options": [{"en": "Proponents cite a review of ~1,800 papers finding no harm, while opponents say science has not proved safety and note industry-funded studies may be biased.", "zh": "支持方引用一项对约1800篇论文的综述称无危害，反对方则称科学尚未证明安全性，并指出产业资助的研究可能带有偏见。"}, {"en": "No studies exist at all.", "zh": "根本不存在任何研究。"}, {"en": "Everyone agrees GMOs are harmless. according to some versions of the story in an early draft of the book as mentioned in a later chapter before the main events begin", "zh": "所有人都同意转基因无害。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）（在主要事件发生之前）"}, {"en": "All studies were done by farmers.", "zh": "所有研究都是农民做的。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The book says proponents cite a review of nearly 1,800 papers concluding GMOs are not harmful, while opponents point to statements that science has not proved safety and that industry studies may be biased or unreliable.", "zh": "书中说支持方引用对近1800篇论文的综述，结论是转基因无害；反对方则指出科学尚未证明其安全，且产业资助的研究可能带有偏见或不可靠。"}}, {"q": {"en": "The book says between 60 and 80 percent of processed foods in the U.S. contain GMOs. Why might shoppers not realize this?", "zh": "书中说美国60%至80%的加工食品含有转基因成分。购物者为何可能意识不到这一点？"}, "options": [{"en": "Because GMOs only appear in fresh fruit.", "zh": "因为转基因只出现在新鲜水果中。"}, {"en": "Because all labels list GMOs in big red letters. according to some versions of the story in an early draft of 一章提到的）"}, {"en": "To raise crop yields, reduce chemical use, and potentially solve world hunger and health problems, though risks remain debated.", "zh": "为了提高产量、减少化学品使用，并有望解决世界饥饿与健康问题，尽管风险仍存争议。"}, {"en": "To increase the number of wild animals.", "zh": "为了增加野生动物的数量。"}, {"en": "Only to make food look prettier.", "zh": "仅仅是为了让食物更好看。"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The Focus Question 'Why is agriculture being altered with GMOs?' is answered through sections on higher yields, fewer pesticides, vitamin-enriched rice, and warnings about superweeds and unknown long-term effects.", "zh": "聚焦问题'为何农业要借转基因改造？'通过'提高产量、减少农药、富含维生素A的转基因大米'，以及对'超级杂草'与未知长期影响的警示来作答。"}}, {"q": {"en": "The book describes seed banks saving 'heirloom' crop varieties. What problem are they trying to address?", "zh": "本书描述了保存'传家宝'(heirloom)传统作物品种的种子库。它们试图解决什么问题？"}, "options": [{"en": "That there are too many kinds of corn. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "玉米种类太多。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "That GMOs grow too slowly.", "zh": "转基因长得太慢。"}, {"en": "That 90 percent of historic fruit and vegetable varieties in the U.S. have gone extinct, reducing food choice for future generations.", "zh": "美国90%的历史果蔬品种已经灭绝，从而减少后代的粮食选择。"}, {"en": "That seeds have become too cheap.", "zh": "种子变得太便宜。"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book notes '90 percent of historic fruit and vegetable varieties in the United States' have gone extinct, so seed banks preserve diverse heirloom crops 'to ensure more food choice for future generations.'", "zh": "书中提到美国'90%的历史果蔬品种'已灭绝，因此种子库保存多样的传家宝作物，'以确保后代拥有更多食物选择'。"}}], "extended": {"prompt": {"en": "The book presents both sides of the GMO debate and notes the U.S. does not require GMO labels while over sixty countries do. If you were in charge of food labeling, would you require GMO labels? Use evidence from the book (such as the 60-80 percent of processed foods or the Vermont law) to support your view.", "zh": "本书呈现了转基因辩论的两方，并指出美国不强制转基因标识，而超过六十个国家这样做。若由你负责食品标识，你会要求标注转基因吗？请用书中证据（如60%—80%的加工食品或佛蒙特州法律）支持你的观点。"}, "guidance": {"en": ["Mention that 60-80 percent of U.S. processed foods contain GMOs yet labels don't show it.", "You could contrast the U.S. approach with the sixty-plus countries that require or ban GMO labeling."], "zh": ["提及美国60%—80%的加工食品含转基因成分，但标签并未显示。", "你可以将美国的做法与六十多个要求或禁止转基因标识的国家作对比。"]}}};</script>
