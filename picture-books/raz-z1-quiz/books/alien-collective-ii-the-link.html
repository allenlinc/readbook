<script>window.BOOK = {"slug": "alien-collective-ii-the-link", "title": "Alien Collective II The Link", "titleZh": "异星联盟 II：联结", "level": "Z1", "genre": "Narrative", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "In this story, what is 'the Link' that connects Charlotte to the Collective?", "zh": "在本故事中，将夏洛特(Charlotte)与'联盟'(the Collective)相连的'联结'(the Link)是什么？"}, "options": [{"en": "A book she is reading.", "zh": "她正在读的一本书。"}, {"en": "A radio she carries.", "zh": "她随身携带的一台收音机。"}, {"en": "A mental connection that lets her communicate with Artie and access the Collective's stored memories of destroyed civilizations.", "zh": "一种精神联结，使她能与阿尔蒂(Artie)交流，并调取联盟所储存的、关于被毁文明的记忆。"}, {"en": "A physical cable plugged into her brain. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "一根插在她脑中的实体电缆。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "The book says Charlotte 'attempted to communicate through the Collective Link,' and later she can 'scroll' through the Collective's experiences 'as if she had opened a computer file,' showing it is a mental link.", "zh": "书中说夏洛特'尝试通过联盟联结进行交流'，后来她能'像打开电脑文件一样'翻阅联盟的经历，说明那是一种精神联结。"}}, {"q": {"en": "What does Artie show Charlotte in the nursery / observation room about the trees?", "zh": "在苗圃/观测室里，阿尔蒂向夏洛特展示了关于树木的什么？"}, "options": [{"en": "That the trees were made of metal. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "那些树是金属做的。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "That trees can talk.", "zh": "树木会说话。"}, {"en": "That the Collective made the native trees grow faster, live longer, take in more CO2, and release more oxygen.", "zh": "联盟让本地树木长得更快、活得更久、吸收更多二氧化碳、释放更多氧气。"}, {"en": "That they cut down all the trees.", "zh": "他们砍光了所有树木。"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "Artie tells Charlotte 'The trees now grow a little faster, stay alive longer, take in more carbon dioxide, and release more oxygen,' describing the Collective's changes to the native species.", "zh": "阿尔蒂告诉夏洛特'这些树如今长得更快、活得更久、吸收更多二氧化碳、释放更多氧气'，描述了联盟对本地树种的改造。"}}, {"q": {"en": "According to Artie, why do civilizations destroy themselves before contacting the Collective?", "zh": "根据阿尔蒂的说法，为何各文明在与联盟接触前就自我毁灭了？"}, "options": [{"en": "Because aliens always attack them first. according to some versions of the story in an early draft of the book", "zh": "因为外星人总是先攻击他们。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Because developing new technologies is easier than learning to use them safely and wisely.", "zh": "因为发展新科技，比学会安全、明智地使用它们更容易。"}, {"en": "Because they run out of food immediately.", "zh": "因为他们立刻耗尽食物。"}, {"en": "Because the Collective destroys them.", "zh": "因为联盟毁灭了他们。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Artie says 'it's much easier for a species to develop new technologies than to learn to use them safely and responsibly,' explaining why they destroy themselves before contact.", "zh": "阿尔蒂说'一个物种发展新科技，远比学会安全负责地使用它们更容易'，以此解释它们为何在接触前自我毁灭。"}}, {"q": {"en": "After Charlotte returns to the Resistance compound, what does she lie about to the doctor?", "zh": "夏洛特回到抵抗组织(Resistance)基地后，她对医生撒了什么谎？"}, "options": [{"en": "She says she never saw Artie.", "zh": "她说自己从未见过阿尔蒂。"}, {"en": "She says she doesn't remember what happened in the Streed (the alien structure).", "zh": "她说自己不记得在'斯特里德'(Streed，外星建筑)里发生了什么。"}, {"en": "She says she joined the aliens willingly. according to some versions of the story in an early draft of the book", "zh": "她说自己是自愿加入外星人的。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "She says she destroyed the Collective.", "zh": "她说自己摧毁了联盟。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "When the doctor asks what happened in the Streed, Charlotte thinks about the risk of being seen as brainwashed, then lies: 'I don't remember... Maybe something will come back to me later.'", "zh": "当医生问斯特里德里发生了什么，夏洛特顾虑会被视为被洗脑，于是撒谎：'我不记得了……也许以后会想起来。'"}}, {"q": {"en": "The story is told through Charlotte's limited viewpoint and inner thoughts. What does this narrative choice achieve?", "zh": "故事通过夏洛特有限的视角与内心独白来叙述。这种叙事选择达到了什么效果？"}, "options": [{"en": "It uses a narrator who knows everything.", "zh": "它采用全知全能的叙事者。"}, {"en": "It tells the whole story from the alien leader's view. according to some versions of the story in an early draft of the book", "zh": "它从外星领袖的视角讲述整个故事。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "It is written as a stage play.", "zh": "它写成了一部舞台剧。"}, {"en": "It builds mystery and sympathy, letting readers question the Collective alongside Charlotte as she uncovers the truth.", "zh": "营造悬念与共鸣，让读者随夏洛特一同发掘真相、对联盟产生疑问。"}], "answer": 3, "skill": "Craft and Structure", "explain": {"en": "Readers experience events only through Charlotte's mind—her confusion, the Link, and her doubts—so the mystery of the Collective unfolds with her, creating suspense and empathy.", "zh": "读者只透过夏洛特的内心经历事件——她的困惑、联结与怀疑——于是联盟之谜随她一同展开，制造了悬念与共鸣。"}}, {"q": {"en": "Charlotte jokes, 'I've been kidnapped by alien tree huggers.' What does this moment reveal about her character?", "zh": "夏洛特开玩笑说'我被外星树拥抱者绑架了'。这一刻揭示了她怎样的性格？"}, "options": [{"en": "That she has given up completely.", "zh": "她已彻底放弃。"}, {"en": "That she is terrified and cannot speak. according to some versions of the story in an early draft of the book", "zh": "她吓得说不出话。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "That she loves trees more than people.", "zh": "她爱树胜过爱人。"}, {"en": "Her sarcasm and resilience—she uses humor to cope with fear and an impossible situation.", "zh": "她的讽刺与韧性——用幽默来应对恐惧与荒诞处境。"}], "answer": 3, "skill": "Craft and Structure", "explain": {"en": "After Artie explains the Collective wants humanity to 'transition,' Charlotte groans 'I've been kidnapped by alien tree huggers,' showing her sarcastic coping humor in a frightening situation.", "zh": "在阿尔蒂说明联盟希望人类'转型'后，夏洛特抱怨'我被外星树拥抱者绑架了'，展现出她在可怕处境中用讽刺来自我调侃。"}}, {"q": {"en": "Artie argues the Collective must intervene on Earth. What reason does he give involving 'habitable planets'?", "zh": "阿尔蒂主张联盟必须干预地球。他给出的、与'宜居行星'有关的理由是什么？"}, "options": [{"en": "Habitable planets are rare, and with humanity's uncontrolled consumption and disregard for the environment, Earth would destroy itself and take everything else with it.", "zh": "宜居行星十分稀少，而人类无节制消耗、漠视环境，地球会自我毁灭并拖垮一切其他生命。"}, {"en": "There are too many habitable planets already.", "zh": "宜居行星已经太多了。"}, {"en": "Planets don't matter at all.", "zh": "行星根本无足轻重。"}, {"en": "Earth is the only habitable planet, so it must be colonized. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "地球是唯一的宜居行星，故必须被殖民。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Artie says 'The loss of any habitable planet is a tragedy' and that with 'uncontrolled consumption, overpopulation, and complete disregard for the environment, you would have destroyed yourselves in short order.'", "zh": "阿尔蒂说'失去任何一颗宜居行星都是悲剧'，并指人类'无节制消耗、人口过剩、彻底漠视环境'，会'很快自我毁灭'。"}}, {"q": {"en": "Charlotte realizes through the Link that the Collective was NOT responsible for the destroyed civilizations. What had they actually been?", "zh": "通过联结，夏洛特意识到联盟并非那些被毁文明的罪魁。他们实际上扮演了什么角色？"}, "options": [{"en": "The direct destroyers of every world. according to some versions of the story", "zh": "每个世界直接的毁灭者。（按书中另一种说法）"}, {"en": "Passive observers who watched for a very long time but never stepped in.", "zh": "长期的被动旁观者，旁观良久却从未介入。"}, {"en": "Time travelers from Earth.", "zh": "来自地球的时间旅行者。"}, {"en": "The builders of the planets.", "zh": "那些行星的建造者。"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says Charlotte knew 'the Collective had not been involved in the destruction of any of the civilizations. Instead, they had been passive observers, sometimes for a very long time, but never stepping in.'", "zh": "书中说夏洛特明白'联盟并未参与任何文明的毁灭。相反，他们是被动的旁观者，有时旁观极久，却从未介入'。"}}, {"q": {"en": "The Focus Question asks who Charlotte should trust—Artie or the Resistance. What does the book invite readers to do?", "zh": "聚焦问题是：夏洛特该信任谁——阿尔蒂还是抵抗组织？本书邀请读者去做什么？"}, "options": [{"en": "Weigh both sides' claims and propaganda, since neither is purely good, and decide what Charlotte should believe.", "zh": "权衡双方的说法与宣传（没有一方纯然善良），并判断夏洛特应当相信什么。"}, {"en": "Ignore the Resistance completely.", "zh": "彻底无视抵抗组织。"}, {"en": "Assume the book gives one clear answer. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "以为本书给出了唯一明确的答案。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "Trust only the aliens without question.", "zh": "毫无保留地只信任外星人。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The Focus Question 'Who should Charlotte trust, Artie or the Resistance? Why do you think that?' shows the author wants readers to analyze competing perspectives and propaganda rather than accept one side.", "zh": "聚焦问题'夏洛特该信任谁，阿尔蒂还是抵抗组织？你为何这样想？'显示作者希望读者分析相互竞争的观点与宣传，而非接受某一方。"}}, {"q": {"en": "Why does Charlotte lie to the Resistance doctors about her memory of the Streed?", "zh": "夏洛特为何向抵抗组织的医生隐瞒自己在斯特里德的记忆？"}, "options": [{"en": "She fears they would think she was brainwashed or turned into an alien spy, so she stays silent to protect herself.", "zh": "她担心他们会认为自己被洗脑或变成了外星间谍，于是保持沉默以自保。"}, {"en": "The doctors never asked her anything.", "zh": "医生根本没问她任何事。"}, {"en": "She truly forgot everything instantly.", "zh": "她真的瞬间忘掉了一切。"}, {"en": "She wanted to join the Collective loudly. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "她想大声宣告加入联盟。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Charlotte thinks 'What would they do if she told them the truth? ... Would they think she had been brainwashed or turned into a spy for the aliens?' so she lies to avoid being distrusted.", "zh": "夏洛特想'若说出真相他们会怎样？……会以为她被洗脑或成了外星间谍吗？'于是撒谎以免遭怀疑。"}}], "extended": {"prompt": {"en": "Artie claims the Collective must step in to stop humanity from destroying itself and the planet. Do you think an outside power ever has the right to take over a society 'for its own good'? Use details from the book (such as Artie's points about consumption and habitable planets) to explain your view.", "zh": "阿尔蒂声称联盟必须介入，以阻止人类自我毁灭及毁灭地球。你认为一个外部力量是否 ever 有权'为了对方好'而接管一个社会？请用书中细节（如阿尔蒂关于消耗与宜居行星的论点）说明你的看法。"}, "guidance": {"en": ["Mention Artie's argument that habitable planets are rare and humanity's uncontrolled consumption endangers Earth.", "Consider Charlotte's counter-question: 'who gave you the right to decide?'"], "zh": ["提及阿尔蒂'宜居行星稀少、人类无节制消耗危及地球'的论点。", "也可思考夏洛特的反问：'谁赋予你决定的权利？'"]}}};</script>
