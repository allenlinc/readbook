<script>window.BOOK = {"slug": "american-sports-legends", "title": "American Sports Legends", "titleZh": "美国体育传奇", "level": "Z1", "genre": "Biography", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "At the 1912 Stockholm Olympics, what did Jim Thorpe achieve in the pentathlon and decathlon?", "zh": "在1912年斯德哥尔摩奥运会上，吉姆·索普(Jim Thorpe)在五项全能和十项全能达到怎样的成就？"}, "options": [{"en": "He won both gold medals, setting a world record in the decathlon—a feat no one had done before or since.", "zh": "他包揽两枚金牌，并创十项全能世界纪录——前无古人、后无来者。"}, {"en": "He won no medals at all.", "zh": "他一块奖牌都没拿到。"}, {"en": "He only competed in swimming.", "zh": "他只参加了游泳。"}, {"en": "He was disqualified before competing.", "zh": "他在参赛前就被取消资格。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says Thorpe won four of five pentathlon events, set a world record in the decathlon, and won gold in both—'No one in Olympic history had done this before Jim, and no one has done it since.'", "zh": "书中说索普赢了五项全能中四项、创十项全能世界纪录，并包揽两枚金牌——'奥运史上无人曾在吉姆之前做到，此后也无人做到'。"}}, {"q": {"en": "What did Jim Thorpe do in 1920 related to professional football?", "zh": "1920年，吉姆·索普在职业橄榄球方面做了什么？"}, "options": [{"en": "He became the first president of the American Football Association, which later became the NFL.", "zh": "他成为美国橄榄球协会（后演变为NFL）的首任主席。"}, {"en": "He retired from all sports.", "zh": "他从所有运动中退役。"}, {"en": "He became a baseball umpire only.", "zh": "他只成了一名棒球裁判。"}, {"en": "He coached basketball in Europe.", "zh": "他在欧洲执教篮球。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book states 'In 1920, Jim became the first president of the American Football Association, which later became the National Football League.'", "zh": "书中说'1920年，吉姆成为美国橄榄球协会的首任主席，该协会后来演变为全国橄榄球联盟(NFL)'。"}}, {"q": {"en": "Why is Babe Didrikson Zaharias famous in golf, according to the book?", "zh": "根据书中内容，巴布·迪德里克森·扎哈里亚斯(Babe Didrikson Zaharias)因何闻名于高尔夫球？"}, "options": [{"en": "She won 82 tournaments (17 in a row in 1946-47) and cofounded the LPGA in 1949.", "zh": "她赢得82个锦标赛冠军（1946—47年连胜17场），并于1949年共同创立LPGA。"}, {"en": "She invented the golf cart.", "zh": "她发明了高尔夫球车。"}, {"en": "She only played mini-golf.", "zh": "她只打迷你高尔夫。"}, {"en": "She refused to compete after 1935.", "zh": "1935年后她拒绝参赛。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says Babe won eighty-two tournaments including seventeen in a row in 1946-47, and she and Patty Berg cofounded the LPGA in 1949.", "zh": "书中说巴布赢得82个锦标赛冠军，包括1946—47年连胜17场，并与帕蒂·伯格于1949年共同创立LPGA。"}}, {"q": {"en": "What historic barrier did Jackie Robinson break on April 15, 1947?", "zh": "1947年4月15日，杰基·罗宾逊(Jackie Robinson)打破了怎样的历史壁垒？"}, "options": [{"en": "He became the first African American to play Major League Baseball in the modern era.", "zh": "他成为现代时期首位出战美国职业棒球大联盟的非裔美国人。"}, {"en": "He was the first pitcher to throw 100 mph.", "zh": "他是首位投出100英里时速的投手。"}, {"en": "He was the first to play in the Negro Leagues.", "zh": "他是首位在黑人联盟打球的人。"}, {"en": "He invented the home run.", "zh": "他发明了本垒打。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says 'On April 15, 1947, he became the first African American to play Major League Baseball,' breaking the color barrier.", "zh": "书中说'1947年4月15日，他成为首位出战美国职业棒球大联盟的非裔美国人'，打破了肤色壁垒。"}}, {"q": {"en": "The book is a collection of biographies. How does its structure help the reader?", "zh": "本书是一部传记合集。它的结构如何帮助读者？"}, "options": [{"en": "By profiling several athletes in separate chapters, each showing a different kind of greatness and legacy.", "zh": "以分章方式为数位运动员立传，各自展现不同类型的伟大与遗产。"}, {"en": "By telling one long fictional story.", "zh": "讲述一个长篇虚构故事。"}, {"en": "By listing only statistics with no narrative.", "zh": "只列数据、毫无叙述。"}, {"en": "By focusing only on one sport.", "zh": "只聚焦于一项运动。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The book uses a Table of Contents with separate sections for Jim Thorpe, Babe Didrikson Zaharias, Jackie Robinson, and Jesse Owens, letting each life illustrate a distinct form of athletic greatness.", "zh": "本书目录为吉姆·索普、巴布·迪德里克森、杰基·罗宾逊和杰西·欧文斯分设章节，让每个人的生平展现一种独特的伟大。"}}, {"q": {"en": "Jackie Robinson's rookie year is described as 'an ordeal.' What does the book say he faced?", "zh": "杰基·罗宾逊的新秀年被描述为'一场磨难'(an ordeal)。书中说他遭遇了什么？"}, "options": [{"en": "Insults from opponents, pitches thrown at him, booing fans, threats to his family, and even hostile teammates—yet he responded with dignity.", "zh": "对手的辱骂、故意朝他投来的球、嘘他的观众、对他家人的威胁，甚至充满敌意的队友——而他以尊严回应。"}, {"en": "He was praised by everyone and faced no problems.", "zh": "人人称赞他，毫无困扰。"}, {"en": "He was injured and never played.", "zh": "他受伤后再未上场。"}, {"en": "He was the highest-paid player immediately.", "zh": "他立刻成了薪酬最高的球员。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The book says Robinson's rookie season was an ordeal: 'Opposing players yelled insults... Pitchers purposely threw at him. Fans booed. His family was threatened. Even some of Jackie's teammates treated him badly.' Yet he kept his dignity.", "zh": "书中说罗宾逊的新秀年是磨难：'对手辱骂……投手故意砸他。观众嘘他。家人受威胁。连某些队友也对他不友善。'但他始终保持尊严。"}}, {"q": {"en": "Jesse Owens won four gold medals at the 1936 Berlin Olympics. What was the historical significance of this?", "zh": "杰西·欧文斯(Jesse Owens)在1936年柏林奥运会赢得四枚金牌。这在历史上有何意义？"}, "options": [{"en": "It embarrassed Hitler's 'master race' ideology, as Owens (a Black athlete) triumphed on a stage meant to prove Aryan superiority.", "zh": "它让希特勒的'优等种族'意识形态难堪，因为欧文斯（一名黑人运动员）在原本要证明雅利安人优越的舞台上大获全胜。"}, {"en": "It proved that Germany was the best nation.", "zh": "它证明了德国是最强的国家。"}, {"en": "It had no political meaning.", "zh": "它毫无政治含义。"}, {"en": "It led Hitler to shake his hand.", "zh": "它让希特勒与他握手。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says Nazi leader Hitler believed Aryans were a 'master race' and thought the games would prove it; Owens won four golds, and 'Chancellor Hitler has left the stadium rather than shake his hand,' embarrassing the dictator.", "zh": "书中说纳粹领袖希特勒相信雅利安人是'优等种族'、并以为奥运会能证明这点；欧文斯夺得四金，'希特勒总理离场、不肯与他握手'，令独裁者难堪。"}}, {"q": {"en": "Why did Babe Didrikson keep playing golf after being diagnosed with cancer in 1953?", "zh": "1953年被诊断出癌症后，巴布·迪德里克森为何仍坚持打高尔夫？"}, "options": [{"en": "To prove to herself and her fans that she could still compete at a professional level.", "zh": "为了向自己和粉丝证明，她仍能在职业水平上参赛竞争。"}, {"en": "Because the doctor ordered her to play.", "zh": "因为医生命令她去打球。"}, {"en": "To earn money for a car.", "zh": "为了赚钱买车。"}, {"en": "She never played again after the diagnosis.", "zh": "确诊后她再未上场。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says after cancer surgery doctors thought she would never play again, but four months later she returned, because 'Babe needed to prove to herself and her fans that she could still compete at a professional level.'", "zh": "书中说癌症手术后医生以为她再不能打球，但四个月后她重返赛场，因为'巴布需要向自己和粉丝证明，她仍能在职业水平上竞争'。"}}, {"q": {"en": "The Focus Question asks who these legends are and why we remember them. What quality links all four athletes in the book?", "zh": "聚焦问题是：这些传奇是谁，我们为何铭记他们？书中四位运动员共同的品质是什么？"}, "options": [{"en": "Extraordinary talent combined with determination, courage, and breaking barriers for others who followed.", "zh": "非凡天赋，加上决心、勇气，并为后来者打破壁垒。"}, {"en": "They were all born wealthy.", "zh": "他们都出身富裕。"}, {"en": "They never faced any hardship.", "zh": "他们从未遭遇任何困苦。"}, {"en": "They only played one sport each.", "zh": "他们每人只从事一项运动。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book presents Thorpe, Zaharias, Robinson, and Owens as versatile, determined athletes who overcame obstacles and opened doors—Robinson 'broke baseball's color barrier' and Owens defied Nazi ideals.", "zh": "本书将索普、扎哈里亚斯、罗宾逊和欧文斯呈现为多才、坚毅、克服障碍并为人开门的运动员——罗宾逊'打破了棒球的肤色壁垒'，欧文斯则蔑视纳粹理念。"}}, {"q": {"en": "What does the book say about Jackie Robinson's lasting legacy beyond baseball records?", "zh": "关于杰基·罗宾逊超越棒球纪录的持久遗产，书中说了什么？"}, "options": [{"en": "He will be remembered for breaking the color barrier and proving that ability—not race—should decide who belongs in the Major Leagues.", "zh": "人们铭记他打破肤色壁垒，并证明应凭能力而非种族决定谁属于大联盟。"}, {"en": "He is remembered only for his batting average.", "zh": "人们只记得他的打击率。"}, {"en": "He was forgotten after retirement.", "zh": "退役后他便被遗忘。"}, {"en": "He became a politician who banned sports.", "zh": "他成了禁止体育的政治家。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book says Robinson 'didn't break any baseball records, but he will be remembered long after the records are forgotten because he broke baseball's color barrier' and showed ability is what mattered.", "zh": "书中说罗宾逊'没有打破任何棒球纪录，但即便纪录被遗忘，人们仍会铭记他，因为他打破了棒球的肤色壁垒'，并证明能力才是关键。"}}], "extended": {"prompt": {"en": "The book highlights athletes who broke barriers—Jackie Robinson in baseball and Jesse Owens against Nazi ideals. Which legend's story inspires you most, and what personal challenge in your own life could you face with similar determination? Use details from the book.", "zh": "本书聚焦于打破壁垒的运动员——棒球场上的杰基·罗宾逊，以及对抗纳粹理念的杰西·欧文斯。哪位传奇的故事最激励你？你自己的哪个人生挑战，可以用类似的决心去面对？请用书中细节。"}, "guidance": {"en": ["Refer to Robinson facing insults with dignity, or Owens winning four golds despite Hitler's 'master race' belief.", "You might also mention Babe Didrikson returning to golf after cancer surgery."], "zh": ["可提及罗宾逊以尊严面对辱骂，或欧文斯在希特勒'优等种族'信念下勇夺四金。", "你也可以提到巴布·迪德里克森在癌症手术后重返高尔夫。"]}}};</script>
