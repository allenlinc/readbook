<script>window.BOOK = {"slug": "the-treasure-of-el-dorado", "title": "The Treasure of El Dorado", "titleZh": "黄金国的宝藏", "level": "Z1", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "What is Lake Guatavita shaped like, and why was it sacred to the Muisca?", "zh": "瓜塔维塔湖是什么形状？它为何对穆伊斯卡人而言是神圣的？"}, "options": [{"en": "It is a bowl-shaped crater with a notch like a drinking vessel; the Muisca zipa covered himself in gold dust and rinsed it into the lake yearly.", "zh": "它是一个碗状的火山口，带一个像饮器般的缺口；穆伊斯卡族的 zipa 会把全身涂满金粉，每年把金子冲入湖中。"}, {"en": "It is a long, narrow river where they fished.", "zh": "它是一条狭长、供人捕鱼的河流。"}, {"en": "It is a square temple built of stone.", "zh": "它是一座石砌的方形神庙。"}, {"en": "It is a desert where gold was mined.", "zh": "它是一片开采黄金的沙漠。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says the lake 'sits in this bowl-shaped crater with a weird notch on one side, almost like a drinking vessel' and describes the zipa's gold ritual.", "zh": "书中说该湖'坐落在一个碗状火山口里，一侧有个奇怪的缺口，几乎像个饮器'，并描写了 zipa 的黄金仪式。"}}, {"q": {"en": "According to the book, how did the Muisca view gold?", "zh": "根据本书，穆伊斯卡人如何看待黄金？"}, "options": [{"en": "They did not think of it as currency or money; it was precious symbolically and aesthetically, so they gave it away gratefully.", "zh": "他们不把黄金当作货币；它之所以珍贵，是因为象征与审美意义，因此他们心怀感激地将其奉送出去。"}, {"en": "They used it as the only form of money.", "zh": "他们把它当作唯一的货币形式。"}, {"en": "They refused to touch gold at all.", "zh": "他们完全拒绝触碰黄金。"}, {"en": "They buried it to hide it from enemies.", "zh": "他们把黄金埋起来，以躲避敌人。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Professor Kat says the Muisca 'didn't think of gold as currency... precious... symbolically and aesthetically rather than financially, which is why they dropped so much of it in the lake.'", "zh": "卡特教授说穆伊斯卡人'不把黄金当货币……它珍贵是出于象征与审美，而非金融，因此他们才把这么多黄金投入湖中'。"}}, {"q": {"en": "What does the sonar unit and the submersible drone 'Jacques' help the team discover under the lake?", "zh": "声纳设备和名为'雅克'的潜水机器人帮助团队在湖底发现了什么？"}, "options": [{"en": "Parallel ditches (irrigation), cut stone walls like a building, and finally a pre-Columbian stone jaguar carving.", "zh": "平行的沟渠（灌溉系统）、像建筑物墙壁的切割石块，最后还有一尊前哥伦布时期的石头美洲豹雕像。"}, {"en": "A sunken Spanish treasure ship full of coins.", "zh": "一艘满载硬币的西班牙沉船。"}, {"en": "The lost city of El Dorado made of gold.", "zh": "用黄金建造的失落黄金国。"}, {"en": "Nothing but mud and weeds.", "zh": "除了泥巴和杂草什么都没有。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "They find 'parallel ditches' and 'cut stone' walls, and Jacques finally reveals 'a jaguar carving... it certainly looks pre-Columbian, and definitely stone!'", "zh": "他们发现了'平行的沟渠'和'切割过的石块'墙壁，最后雅克揭示出'一尊美洲豹雕像……看起来确属前哥伦布时期，而且是石头！'"}}, {"q": {"en": "What unexpected event ruins the expedition on June 21?", "zh": "6 月 21 日，是什么意外事件毁掉了这次探险？"}, "options": [{"en": "A sudden storm with hail strikes; the boat is holed, laptops are soaked, and the equipment (including Jacques) is disabled.", "zh": "突如其来的冰雹风暴袭来；船被砸出洞，笔记本电脑浸水，设备（包括潜水器雅克）失效，探险被迫中止。"}, {"en": "The lake completely dries up.", "zh": "湖水彻底干涸了。"}, {"en": "The team finds the gold and goes home rich.", "zh": "团队找到黄金，满载而归。"}, {"en": "A friendly dolphin appears.", "zh": "一只友好的海豚出现了。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "A storm 'approaching fast' brings hail ('It's hail!'); later Andre reports 'a hole in the boat, our laptops are totally soaked, and Jacques won't be much use.'", "zh": "风暴'迅速逼近'，下起冰雹（'是冰雹！'）；后来安德烈汇报'船破了洞，笔记本全湿透，雅克也派不上用场了'。"}}, {"q": {"en": "The story is told through blog posts, video updates, and audio updates. How does this structure affect the reader?", "zh": "这个故事通过博客、视频更新和音频更新来讲述。这种结构对读者有何影响？"}, "options": [{"en": "It creates a sense of real-time discovery and personal involvement, as if the reader is following the expedition live.", "zh": "它营造出实时探索、亲身参与的感觉，仿佛读者正实时跟进这次探险。"}, {"en": "It makes the story confusing and hard to follow.", "zh": "它让故事混乱、难以理解。"}, {"en": "It presents only dry facts with no feeling.", "zh": "它只呈现枯燥的事实，毫无情感。"}, {"en": "It hides the characters' true opinions.", "zh": "它掩盖了角色们的真实看法。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Dated entries like 'June 19, 10:12 a.m.' and 'Audio Update, June 21, 6:03 p.m.' make the reader feel present as events unfold.", "zh": "像'6 月 19 日上午 10:12'、'6 月 21 日下午 6:03 音频更新'这样带日期的记录，让读者仿佛亲历事件展开。"}}, {"q": {"en": "The guide from Andre's map says the full moon will rise in 'the keyhole of the crater.' How does this detail function in the plot?", "zh": "安德烈地图上的指引说，满月将在'火山口的钥匙孔'中升起。这个细节在情节中起什么作用？"}, "options": [{"en": "It sets up a specific condition that later comes true when Andre sees the moon perfectly in the V-shaped notch, driving him to wade in.", "zh": "它设定了一个特定条件，后来当安德烈看到月亮恰好嵌在 V 形缺口中时应验，促使他走进湖中。"}, {"en": "It is just a random line with no meaning.", "zh": "它只是一句毫无意义的随机文字。"}, {"en": "It tells the team where to dig for gold.", "zh": "它告诉团队该去哪里挖黄金。"}, {"en": "It describes how to build a boat.", "zh": "它在讲解如何造船。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Andre later says, 'The full moon is sitting perfectly in that V-shaped notch in the ridgeline' — the map's clue becoming the trigger for his final wade.", "zh": "安德烈后来说：'满月正好嵌在山脊那个 V 形缺口里'——地图的线索成了他最终涉水的触发点。"}}, {"q": {"en": "Andre's grandpa (Abuelo) is revealed to be 'Mario Fernandez,' who wrote the note dated June 22, 1954. What does this show?", "zh": "安德烈的祖父（Abuelo）被揭示为'马里奥·费尔南德斯'，即写下 1954 年 6 月 22 日字条的人的名字。这说明什么？"}, "options": [{"en": "The 'treasure' Andre found was a childhood keepsake his grandfather had hidden in the lake, not the mythical El Dorado gold.", "zh": "安德烈找到的'宝藏'是祖父童年时藏在湖里的纪念物，并非神话中的黄金国黄金。"}, {"en": "The grandfather was a famous Spanish conqueror.", "zh": "祖父是一位著名的西班牙征服者。"}, {"en": "The note proves El Dorado's gold is still in the lake.", "zh": "字条证明黄金国的黄金仍藏在湖里。"}, {"en": "Andre had never met his grandfather.", "zh": "安德烈从未见过自己的祖父。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The rolled paper reads 'You have found... my greatest treasure... Mario Fernandez... June 22, 1954,' and Andre realizes, 'Grandpa... my grandpa. He was just a kid then.'", "zh": "卷纸写道'你找到了……我最伟大的宝藏……马里奥·费尔南德斯……1954 年 6 月 22 日'，安德烈恍然大悟：'祖父……他当时还是个孩子。'"}}, {"q": {"en": "The book says the summer solstice and a full moon coincided, something that had not happened for almost seventy-five years. Why is this important?", "zh": "书中说夏至与满月重合，这是近七十五年来未曾有过的。为何这一点很重要？"}, "options": [{"en": "It matches the map's clue about 'the brightest day, with the shortest night,' giving Andre his one chance to follow the guide.", "zh": "它正好对应地图上'白昼最长、夜晚最短'的线索，让安德烈获得唯一一次按指引行动的机会。"}, {"en": "It means the lake would freeze over.", "zh": "这意味着湖面会结冰。"}, {"en": "It proves the expedition was a failure.", "zh": "它证明探险是失败的。"}, {"en": "It shows the moon was made of gold.", "zh": "它说明月亮是金子做的。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Andre notes, 'Tomorrow night is the summer solstice and a full moon simultaneously. Those haven't coincided for almost seventy-five years,' matching the map's 'brightest day, shortest night.'", "zh": "安德烈提到：'明晚夏至与满月同时出现。这近七十五年未曾重合'，正好对应地图上'白昼最长、夜晚最短'的说法。"}}, {"q": {"en": "What does the author suggest are the 'two kinds of treasure' Andre finds?", "zh": "作者认为安德烈找到的'两种宝藏'分别是什么？"}, "options": [{"en": "The imagined golden treasure of El Dorado, and the real treasure of family connection and his grandfather's love.", "zh": "一是想象中黄金国的黄金宝藏，二是真实的、与家人和祖父之爱相连的情感宝藏。"}, {"en": "Gold coins and silver coins.", "zh": "金币和银币。"}, {"en": "A car and a house.", "zh": "一辆汽车和一所房子。"}, {"en": "Two different maps.", "zh": "两张不同的地图。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The focus question asks what two treasures Andre finds; the story answers with the mythic gold and, finally, Abuelo's jaguar figurine given as 'Our treasure' to Andre.", "zh": "焦点问题问安德烈找到的两种宝藏；故事以神话黄金和最后祖父赠予的'我们的宝藏'美洲豹雕像作答。"}}, {"q": {"en": "What perspective does the author express about the Muisca people?", "zh": "作者对穆伊斯卡人表达了怎样的态度？"}, "options": [{"en": "A respectful one—portraying them as cooperative, egalitarian, and spiritually rich rather than as conquerors focused on gold.", "zh": "一种敬重的态度——把他们描绘成合作、平等、精神富足的民族，而非追逐黄金的征服者。"}, {"en": "A mocking view that they were weak.", "zh": "嘲讽他们软弱。"}, {"en": "A belief that they were cruel warriors.", "zh": "认为他们是残暴的武士。"}, {"en": "An idea that they cared only about gold.", "zh": "认为他们只在乎黄金。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Kat explains the Muisca 'cooperated instead of conquering and lived a simpler, egalitarian life' and gave gold away gratefully.", "zh": "卡特解释穆伊斯卡人'以合作取代征服，过着更简单、更平等的生活'，并心怀感激地奉出黄金。"}}], "extended": {"prompt": {"en": "Andre learns that his grandfather's old 'treasure map' was really a family memory. Do you have an object or story from an older family member that feels like treasure? Describe it.", "zh": "安德烈发现，祖父那张古老的'藏宝图'其实是一段家族记忆。你是否有来自长辈、对你而言如同宝藏的物品或故事？请描述它。"}, "guidance": {"en": ["Name the object or story and who it came from.", "Explain why it feels valuable to you, even if it is not worth money."], "zh": ["说出那件物品或故事，以及它来自哪位长辈。", "解释为何它对你而言珍贵，即便它并不值钱。"]}}};</script>
