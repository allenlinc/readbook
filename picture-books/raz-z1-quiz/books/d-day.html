<script>window.BOOK = {"slug": "d-day", "title": "D-Day", "titleZh": "D日（诺曼底登陆）", "level": "Z1", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "In military terminology, what does the 'D' in 'D-Day' stand for?", "zh": "在军事术语中，'D日'里的'D'代表什么？"}, "options": [{"en": "Defense", "zh": "防御"}, {"en": "Dwight (Eisenhower's first name)", "zh": "德怀特（艾森豪威尔的名）"}, {"en": "Day", "zh": "Day（日子）"}, {"en": "Destruction", "zh": "毁灭"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "The book explains that in military terminology the 'D' in D-Day stands for 'day,' used for the day of any important military operation; for this one it was June 6, 1944.", "zh": "书中解释，在军事术语中D日的'D'代表'day（日子）'，用于任何重要军事行动的当天；这一次是1944年6月6日。"}}, {"q": {"en": "The D-Day invasion landed Allied forces on five beaches in Normandy. What were their names?", "zh": "D日登陆将盟军送上了诺曼底的五个海滩。它们的名字是什么？"}, "options": [{"en": "Paris, London, Berlin, Rome, and Madrid", "zh": "巴黎、伦敦、柏林、罗马和马德里"}, {"en": "Utah, Omaha, Gold, Juno, and Sword", "zh": "犹他、奥马哈、黄金、朱诺和宝剑"}, {"en": "Alpha, Bravo, Charlie, Delta, and Echo", "zh": "阿尔法、布拉沃、查理、德尔塔和回声"}, {"en": "North, South, East, West, and Central", "zh": "北、南、东、西和中"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book lists the five beaches as Utah, Omaha, Gold, Juno, and Sword, guarded by German troops.", "zh": "书中列出五个海滩为犹他、奥马哈、黄金、朱诺和宝剑，由德军把守。"}}, {"q": {"en": "Which beach was the largest and suffered the heaviest American casualties, with about 3,686 U.S. casualties?", "zh": "哪个海滩最大、美军伤亡最重，约有3686名美军伤亡？"}, "options": [{"en": "Gold Beach", "zh": "黄金海滩"}, {"en": "Omaha Beach", "zh": "奥马哈海滩"}, {"en": "Utah Beach", "zh": "犹他海滩"}, {"en": "Sword Beach according to some versions of the story", "zh": "宝剑海滩（按书中另一种说法）"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says Omaha Beach was 6 miles long, the largest of the five, overlooked by 100-foot cliffs, and had 34,000 U.S. troops landed with 3,686 casualties.", "zh": "书中说奥马哈海滩长6英里，是五个中最大的，上方有100英尺高的悬崖，登陆美军34000人，伤亡3686人。"}}, {"q": {"en": "At Utah Beach, which general said 'We'll start the war from here!' after the landing craft went off course?", "zh": "在犹他海滩，登陆艇偏离航向后，是哪位将军说'我们就从这里开始打仗！'？"}, "options": [{"en": "Brigadier General Theodore Roosevelt Jr.", "zh": "西奥多·罗斯福准将（小西奥多·罗斯福）"}, {"en": "Lieutenant General Omar Bradley according to some versions of the story", "zh": "奥马尔·布拉德利中将（按书中另一种说法）"}, {"en": "General George Washington", "zh": "乔治·华盛顿将军"}, {"en": "President Franklin Roosevelt", "zh": "富兰克林·罗斯福总统"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says Brigadier General Theodore Roosevelt Jr., the oldest son of former President Theodore Roosevelt, told his men 'We'll start the war from here!' when the craft landed off target.", "zh": "书中说前总统西奥多·罗斯福的长子小西奥多·罗斯福准将在登陆艇偏离目标时，对部下说'我们就从这里开始打仗！'。"}}, {"q": {"en": "The book includes maps and 'by the numbers' boxes (such as troop and casualty counts) for each beach. What is the main purpose of these text features?", "zh": "书中为每个海滩都配有地图和'数据'方框（如兵力和伤亡数字）。这些文本特征的主要目的是什么？"}, "options": [{"en": "To present the factual scale and cost of the invasion clearly and visually.", "zh": "清晰、直观地把登陆的规模和代价用事实呈现出来。"}, {"en": "To list the book's photograph credits. according to some versions of the story in an early draft of the book", "zh": "列出书的图片来源。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "To tell a fictional love story.", "zh": "讲述一个虚构的爱情故事。"}, {"en": "To teach French vocabulary.", "zh": "教法语词汇。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The maps and numeric boxes are nonfiction text features that let readers grasp the size of the operation and the human cost at a glance.", "zh": "地图和数字方框是非虚构读物的文本特征，让读者一眼就能把握行动规模与人力代价。"}}, {"q": {"en": "The book opens with a vivid scene: 'Hundreds of men huddled in dozens of small landing craft... All of them were scared.' Why does the author begin this way?", "zh": "本书以生动场景开头：'数百名男子挤在几十艘小登陆艇中……他们都很害怕。'作者为何这样开头？"}, "options": [{"en": "To draw readers into the human experience of the soldiers before explaining the facts.", "zh": "在讲解史实之前，先让读者身临其境地感受士兵的经历。"}, {"en": "To describe the weather only.", "zh": "只为了描写天气。"}, {"en": "To list the chapter titles.", "zh": "列出章节标题。"}, {"en": "To prove the invasion was a holiday. according to some versions of the story in an early draft of the book", "zh": "证明这次登陆是个假日。（按书中另一种说法）（在书的早期草稿中）"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The author uses a narrative, second-person-like opening scene to engage readers emotionally and set up the factual account that follows.", "zh": "作者用叙事性的开场场景在情感上吸引读者，并为后文的史实叙述做铺垫。"}}, {"q": {"en": "The book connects D-Day to the wider war by noting later surrender dates. When did Germany finally surrender, ending the war in Europe?", "zh": "书中用后来的投降日期把D日与整场战争联系起来。德国最终何时投降，结束了欧洲战事？"}, "options": [{"en": "August 15, 1945 (Japan's surrender)", "zh": "1945年8月15日（日本投降）"}, {"en": "June 6, 1944", "zh": "1944年6月6日"}, {"en": "May 8, 1945", "zh": "1945年5月8日"}, {"en": "September 3, 1783", "zh": "1783年9月3日"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book's conclusion states Germany surrendered on May 8, 1945, and Japan on August 15, 1945, officially ending the war; D-Day was a key turning point toward that end.", "zh": "书的结论说德国于1945年5月8日投降，日本于1945年8月15日投降，正式结束战争；D日是通向胜利的关键转折点。"}}, {"q": {"en": "The book defines 'casualties' as killed, wounded, missing in action, and prisoners of war. Why is this definition important for reading the beach numbers?", "zh": "书中把'casualties（伤亡）'定义为阵亡、受伤、失踪和战俘。为何这个定义对理解各海滩的数字很重要？"}, "options": [{"en": "Because it only counts soldiers who were late. according to some versions of the story", "zh": "因为它只统计迟到的士兵。（按书中另一种说法）"}, {"en": "Because the totals include all those categories, not just deaths.", "zh": "因为总数包含了所有这些类别，而不仅仅是死亡人数。"}, {"en": "Because it refers to the weather.", "zh": "因为它指的是天气。"}, {"en": "Because it means the beaches were empty.", "zh": "因为它意味着海滩空无一人。"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The glossary clarifies that 'casualties' covers all losses suffered by the armed forces, so readers understand the beach numbers represent a broad toll, not just fatalities.", "zh": "词汇表说明'casualties'涵盖军队遭受的所有损失，因此读者明白各海滩的数字代表广泛的代价，而不仅仅是阵亡。"}}, {"q": {"en": "The author notes the soldiers were 'teachers, store clerks, housepainters, and other ordinary citizens' who had been drafted. Why include this detail?", "zh": "作者提到这些士兵是'教师、店员、房屋油漆工和其他普通公民'，是被征召入伍的。为何加入这一细节？"}, "options": [{"en": "To list the book's chapters.", "zh": "列出书的章节。"}, {"en": "To explain how schools were built. according to some versions of the story in an early draft of the book", "zh": "解释学校是如何建造的。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "To describe French food.", "zh": "描述法国食物。"}, {"en": "To show that ordinary people became soldiers and to humanize the invasion.", "zh": "说明普通人成了士兵，让这次登陆更具人情味。"}], "answer": 3, "skill": "Author's Purpose and Perspective", "explain": {"en": "By stressing the soldiers' ordinary civilian backgrounds, the author helps readers appreciate the personal sacrifice behind the military operation.", "zh": "通过强调士兵平凡的平民背景，作者让读者体会到军事行动背后个人的牺牲。"}}, {"q": {"en": "What is the author's main purpose in writing D-Day?", "zh": "作者写《D日》的主要目的是什么？"}, "options": [{"en": "To teach readers how to cook.", "zh": "教读者做饭。"}, {"en": "To describe a fairy tale.", "zh": "描述一个童话。"}, {"en": "To argue that beaches are for swimming. according to some versions of the story", "zh": "主张海滩是用来游泳的。（按书中另一种说法）"}, {"en": "To explain the D-Day invasion and its effect on the outcome of World War II.", "zh": "解释D日登陆及其对第二次世界大战结局的影响。"}], "answer": 3, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book's Focus Question asks what effect D-Day had on World War II, and the text explains the invasion as a turning point that helped free occupied France.", "zh": "本书聚焦问题分析D日对二战的影响，正文把这次登陆解释为帮助解放被占领法国的转折点。"}}], "extended": {"prompt": {"en": "The book says the soldiers were ordinary citizens like teachers and clerks. If you were a young person in 1944, what would you want people today to remember about those who landed on the beaches? Use details from the book.", "zh": "书中说士兵们是教师、店员等普通公民。假如你是1944年的年轻人，你希望今天的人们记住那些登陆海滩的人什么？用书中细节说明。"}, "guidance": {"en": ["Mention that many were drafted ordinary citizens, not career soldiers.", "Reference the high casualties, such as Omaha Beach's 3,686 U.S. casualties."], "zh": ["提到许多人是从平民中被征召的，并非职业军人。", "提及惨重伤亡，例如奥马哈海滩3686名美军伤亡。"]}}};</script>
