<script>window.BOOK = {"slug": "1865-the-end-of-the-civil-war", "title": "1865 The End of the Civil War", "titleZh": "1865：内战的终结", "level": "Z1", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Where did General Lee surrender to General Grant?", "zh": "李将军在哪里向格兰特将军投降？"}, "options": [{"en": "Richmond, Virginia", "zh": "弗吉尼亚州里士满"}, {"en": "Appomattox Court House, Virginia", "zh": "弗吉尼亚州阿波马托克斯法院"}, {"en": "Washington, D.C.", "zh": "华盛顿特区"}, {"en": "Gettysburg, Pennsylvania according to some versions of the story", "zh": "宾夕法尼亚州葛底斯堡（按书中另一种说法）"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book states Lee met Grant 'at a private home in the town of Appomattox Court House, Virginia' on April 9, 1865.", "zh": "书中说1865年4月9日，李在'弗吉尼亚州阿波马托克斯法院镇的一栋私宅'与格兰特会面。"}}, {"q": {"en": "Which amendment, ratified December 6, 1865, ended slavery in the United States?", "zh": "哪一项修正案于1865年12月6日批准，结束了美国的奴隶制？"}, "options": [{"en": "The Nineteenth Amendment", "zh": "第十九修正案"}, {"en": "The First Amendment", "zh": "第一修正案"}, {"en": "The Twenty-Sixth Amendment", "zh": "第二十六修正案"}, {"en": "The Thirteenth Amendment", "zh": "第十三修正案"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The book says 'By December 6, 1865, the Thirteenth Amendment had been ratified ...' and it 'prohibited slavery in the United States.'", "zh": "书中说'到1865年12月6日，第十三修正案已获批准……'，它'在美国禁止奴隶制'。"}}, {"q": {"en": "About how many Americans died in the Civil War, making it the deadliest in U.S. history?", "zh": "约有多少美国人在内战中死亡，使之成为美国历史上最致命的战争？"}, "options": [{"en": "At least 620,000", "zh": "至少62万人"}, {"en": "Exactly 100", "zh": "恰好100人"}, {"en": "Over 5 million according to some versions of the story", "zh": "超过500万（按书中另一种说法）"}, {"en": "About 1,000", "zh": "约1000人"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The text states 'At least 620,000 Americans, both Union and Confederate, died in the four-year conflict,' the deadliest war in U.S. history.", "zh": "文中说'至少62万美国人，包括联邦军与邦联军，死于这场四年冲突'，是美国史上最致命的战争。"}}, {"q": {"en": "Why did the Emancipation Proclamation NOT free slaves in border states like Maryland and Kentucky?", "zh": "为何《解放黑人奴隶宣言》没有解放马里兰、肯塔基等边界州的奴隶？"}, "options": [{"en": "Those states never seceded, and Lincoln feared freeing them would push them to join the Confederacy", "zh": "这些州从未脱离联邦，林肯担心解放他们会促使他们加入邦联"}, {"en": "The Proclamation applied only to the North according to some versions of the story in an early draft of the book", "zh": "宣言只适用于北方（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Lincoln forgot about them", "zh": "林肯把他们忘了"}, {"en": "They had no slaves", "zh": "它们没有奴隶"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book explains the border states 'never seceded from the Union' and Lincoln 'was concerned that freeing slaves in these states would persuade the states to join the Confederacy.'", "zh": "书中解释边界州'从未脱离联邦'，林肯'担心在这些州解放奴隶会促使它们加入邦联'。"}}, {"q": {"en": "The book includes a map-like sidebar listing Union and Confederate states and battle sites. What technique helps readers understand the war?", "zh": "书中包含一个类似地图的附栏，标出联邦州、邦联州和战役地点。什么手法帮助读者理解战争？"}, "options": [{"en": "Listing recipes according to some versions of the story", "zh": "罗列菜谱（按书中另一种说法）"}, {"en": "Using maps and visual aids to support the text", "zh": "使用地图和视觉辅助来支撑文字"}, {"en": "Singing songs", "zh": "唱歌"}, {"en": "Telling jokes", "zh": "讲笑话"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The visual 'Union v. Confederate States, 1865' map lets readers place events like Gettysburg and Antietam geographically.", "zh": "'1865年联邦对邦联'的视觉地图，让读者能在地理上定位葛底斯堡、安提塔姆等事件。"}}, {"q": {"en": "The author quotes soldiers' memories—'men fell like leaves in autumn' (Fredericksburg) and 'This wasn't war, but murder' (Cold Harbor). What effect does this create?", "zh": "作者引用了士兵的回忆——'人们像秋叶般倒下'（弗雷德里克斯堡）和'这不是战争，而是谋杀'（冷港）。这产生了什么效果？"}, "options": [{"en": "It adds vivid, personal evidence of the war's horror", "zh": "它增添了生动、个人的证据，展现战争的恐怖"}, {"en": "It makes the war sound fun according to some versions of the story", "zh": "它让战争听起来有趣（按书中另一种说法）"}, {"en": "It describes the weather", "zh": "它描写天气"}, {"en": "It lists the generals' names", "zh": "罗列将军的名字"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Firsthand quotes give emotional, credible weight to the book's account of battlefield suffering.", "zh": "第一手的引语为书中关于战场苦难的叙述增添了情感与可信度。"}}, {"q": {"en": "The text says two-thirds of Civil War deaths came from disease and infection, not battle. What can be concluded?", "zh": "文中说内战死亡人数中有三分之二是因疾病和感染，而非战斗。可以得出什么结论？"}, "options": [{"en": "No one was injured", "zh": "没有人受伤"}, {"en": "Doctors were perfect", "zh": "医生完美无缺"}, {"en": "Lack of medical knowledge caused more deaths than combat itself", "zh": "医学知识的缺乏造成的死亡多于战斗本身"}, {"en": "Battles were the only cause of death according to some versions of the story", "zh": "战斗是唯一的死因（按书中另一种说法）"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book notes 'diseases and infections caused two-thirds of Civil War deaths' because surgeons spread infection with unsterile instruments.", "zh": "书中指出'疾病和感染造成了内战死亡人数的三分之二'，因为外科医生用未消毒的器械传播了感染。"}}, {"q": {"en": "Comparing the Emancipation Proclamation (freed slaves only in the Confederacy) with the Thirteenth Amendment (ended slavery everywhere) shows what progression?", "zh": "将《解放宣言》（只在邦联解放奴隶）与第十三修正案（在全国废除奴隶制）对比，显示了怎样的发展？"}, "options": [{"en": "Nothing changed", "zh": "毫无变化"}, {"en": "Slavery was expanded", "zh": "奴隶制被扩大了"}, {"en": "The war's goal shifted from a limited military measure to a permanent national ban on slavery", "zh": "战争目标从一项有限的军事措施，转变为全国性的永久废奴"}, {"en": "The Proclamation was the final law according to some versions of the story in an early draft of the book", "zh": "宣言是最终法律（按书中另一种说法）（在书的早期草稿中）"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The Proclamation was a wartime act; the ratified Thirteenth Amendment made abolition permanent and nationwide.", "zh": "《解放宣言》是战时举措；批准的第十三修正案使废奴成为永久且全国性的。"}}, {"q": {"en": "The Focus Question asks 'How did the Civil War change the United States?' What is the author's purpose?", "zh": "焦点问题问'内战如何改变了美国？'作者的写作目的是什么？"}, "options": [{"en": "To describe a movie", "zh": "描写一部电影"}, {"en": "To teach a foreign language according to some versions of the story in an early draft of the book", "zh": "教一门外语（按书中另一种说法）（在书的早期草稿中）"}, {"en": "To list sports teams", "zh": "罗列运动队"}, {"en": "To explain the war's lasting changes: end of slavery, an indivisible union, and civil rights", "zh": "解释战争持久的改变：奴隶制终结、不可分裂的联邦、民权"}], "answer": 3, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book traces changes from emancipation through the Reconstruction amendments to later civil rights laws.", "zh": "本书从解放奴隶，追溯到重建修正案，再到后来的民权法，梳理了这些改变。"}}, {"q": {"en": "The 'Legacy' section calls the Civil Rights Act of 1964 and Voting Rights Act of 1965 'the final chapter of the Civil War.' What perspective is shown?", "zh": "'遗产'一节称1964年《民权法案》和1965年《投票权法案》是'内战的最后一章'。这显示了什么视角？"}, "options": [{"en": "The author thinks the war had no effect according to some versions of the story in an early draft of the book", "zh": "作者认为战争毫无影响（按书中另一种说法）（在书的早期草稿中）"}, {"en": "The author views the war's consequences as still unfolding in the struggle for equality", "zh": "作者认为战争的后果在争取平等的过程中仍在延续"}, {"en": "The war ended in 1865 only", "zh": "战争只在1865年结束"}, {"en": "The author dislikes laws", "zh": "作者讨厌法律"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "Linking 1960s civil rights laws to the Civil War shows the author sees its impact reaching a century later.", "zh": "将1960年代的民权法与内战联系起来，说明作者认为其影响延续到了一个世纪之后。"}}], "extended": {"prompt": {"en": "The book says the Civil War established that the United States is 'an indivisible nation.' Do you think that idea still matters today? Why or why not?", "zh": "书中说内战确立了美国是'一个不可分裂的国家'。你认为这个观念今天仍然重要吗？为什么？"}, "guidance": {"en": ["Refer to the book's point that states do not have the right to secede.", "Connect it to unity or division you see in the world today."], "zh": ["引用书中'各州无权脱离联邦'的观点。", "将其与你今天在世界中看到的团结或分裂联系起来。"]}}};</script>
