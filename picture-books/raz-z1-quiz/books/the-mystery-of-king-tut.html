<script>window.BOOK = {"slug": "the-mystery-of-king-tut", "title": "The Mystery of King Tut", "titleZh": "图坦卡蒙之谜", "level": "Z1", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Who discovered King Tut's tomb, and in what year?", "zh": "是谁发现了图坦卡蒙的陵墓？在哪一年？"}, "options": [{"en": "British archaeologist Howard Carter found it in 1922.", "zh": "英国考古学家霍华德·卡特于 1922 年发现了它。"}, {"en": "Napoleon Bonaparte in 1798.", "zh": "拿破仑·波拿巴于 1798 年。"}, {"en": "Zahi Hawass in 2005.", "zh": "扎希·哈瓦斯于 2005 年。"}, {"en": "A treasure hunter in 1922 named Lord Carnarvon. according to some versions of the story", "zh": "1922 年一位叫卡那封勋爵的寻宝者。（按书中另一种说法）"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book states, 'In 1922, a British archaeologist... made a fantastic discovery... He found the tomb of Tutankhamun... Howard Carter.'", "zh": "书中写道：'1922 年，一位英国考古学家……有了惊人发现……他找到了图坦卡蒙的陵墓……霍华德·卡特。'"}}, {"q": {"en": "At what age did Tutankhamun become pharaoh, and how long did he rule?", "zh": "图坦卡蒙几岁即位？统治了多久？"}, "options": [{"en": "He became pharaoh at age nine and ruled less than a decade before dying at about nineteen.", "zh": "他 9 岁即位，统治不足十年，约 19 岁时去世。"}, {"en": "He never became pharaoh.", "zh": "他从未当过法老。"}, {"en": "He became pharaoh at age thirty and ruled for fifty years. according to some versions of the story", "zh": "他 30 岁即位，统治了五十年。（按书中另一种说法）"}, {"en": "He became pharaoh at age five and ruled for one year.", "zh": "他 5 岁即位，统治了一年。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says Tut 'becoming pharaoh at the age of nine. He ruled less than a decade before dying suddenly at about age nineteen.'", "zh": "书中说图坦卡蒙'9 岁成为法老。统治不足十年，约 19 岁时突然去世'。"}}, {"q": {"en": "What religious change did Tut make during his reign?", "zh": "图坦卡蒙在位期间做出了什么宗教改变？"}, "options": [{"en": "He kept the worship of Aten exactly as his father did. according to some versions of the story in an early draft of the book", "zh": "他完全保留了父亲对阿顿神的崇拜。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "He declared war on all the gods.", "zh": "他向所有神祇宣战。"}, {"en": "He built the largest temple to Ra.", "zh": "他为拉神修建了最大的神庙。"}, {"en": "Advised by Ay and Horemheb, he ended the worship of Aten and restored Amun, changing his name to Tutankhamun.", "zh": "在阿伊和霍朗赫布的建议下，他终止了对阿顿神的崇拜、恢复阿蒙神，并将自己的名字改为图坦卡蒙。"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "Horemheb and Ay 'persuade Tut to end the worship of Aten... change his name from Tutankhaten to Tutankhamun,' restoring Amun.", "zh": "霍朗赫布与阿伊'说服图坦卡蒙终止对阿顿的崇拜……将名字从图坦卡顿改为图坦卡蒙'，恢复阿蒙神。"}}, {"q": {"en": "What did CT scans in 2005 reveal about the skull damage previously seen on X-rays?", "zh": "2005 年的 CT 扫描对先前 X 光所见的颅骨骨折揭示了什么？"}, "options": [{"en": "They confirmed a fatal blow to the head. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "它们确认了头部受到致命击打。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "Led by Zahi Hawass, the scans showed the damage happened after death, likely during the mummification process — not a fatal blow.", "zh": "在扎希·哈瓦斯的带领下，扫描显示损伤发生于死后，很可能是在制作木乃伊的过程中——并非致命击打。"}, {"en": "They showed he died of old age.", "zh": "它们显示他死于衰老。"}, {"en": "They proved he was stabbed in the back.", "zh": "它们证明他是被从背后刺死的。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Hawass 'announced that King Tutankhamun definitely did not die from a blow to the head... the skull damage happened after Tut was already dead... during the mummification process.'", "zh": "哈瓦斯'宣布图坦卡蒙绝非死于头部击打……颅骨骨折发生在他死后……是在制作木乃伊的过程中造成的'。"}}, {"q": {"en": "The book is organized like a detective investigation ('The Suspects,' 'The Body,' 'Mystery Solved?'). What does this structure do?", "zh": "本书像侦探调查一样组织（'嫌疑人''尸体''谜团解开了？'）。这种结构起什么作用？"}, "options": [{"en": "It hides all the evidence from the reader. according to some versions of the story in an early draft of the book", "zh": "它向读者隐瞒了所有证据。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "It makes the book read like a cookbook.", "zh": "它让这本书读起来像一本食谱。"}, {"en": "It engages the reader by presenting Tut's death as a cold case to be solved with evidence.", "zh": "它把图坦卡蒙之死当作一桩有待用证据破解的悬案来呈现，从而吸引读者。"}, {"en": "It lists only the kings' names.", "zh": "它只列举各位国王的名字。"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "Chapters titled like a police file ('The Suspects,' 'The Body') frame the historical questions as a mystery to investigate.", "zh": "以警方档案式的小标题（'嫌疑人''尸体'）把历史疑问框定为待破解的谜案。"}}, {"q": {"en": "The author explains the Rosetta Stone's role in deciphering hieroglyphics. Why is this included?", "zh": "作者解释了罗塞塔石碑在破译象形文字中的作用。为何要 inclusion 这一内容？"}, "options": [{"en": "To explain how to build a pyramid.", "zh": "为了讲解如何建造金字塔。"}, {"en": "To describe a recipe for stone soup. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "为了描写一道石头汤的做法。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "To show how archaeologists finally learned to read Egyptian writing, which helped them locate and understand the tombs.", "zh": "为了说明考古学家如何最终学会解读埃及文字，从而帮助他们找到并理解那些陵墓。"}, {"en": "To list the names of French soldiers.", "zh": "为了列举法国士兵的名字。"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "The book says scholars used the Greek text on the Rosetta Stone 'as a key' to translate hieroglyphics, which let archaeologists read tomb inscriptions.", "zh": "书中说学者以罗塞塔石碑上的希腊文'作为钥匙'来翻译象形文字，使考古学家得以读懂陵墓铭文。"}}, {"q": {"en": "Based on the genetic and CT evidence, what is the book's most supported explanation for Tut's death?", "zh": "根据基因与 CT 证据，本书对图坦卡蒙之死最有力的解释是什么？"}, "options": [{"en": "He was definitely murdered by a single blow to the head. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "他肯定是被一记击头致死的。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "He drowned in the Nile.", "zh": "他溺死在尼罗河里。"}, {"en": "He died peacefully in his sleep of old age.", "zh": "他在睡梦中安详地老死。"}, {"en": "A combination of a broken leg that became infected, several bouts of severe malaria, and other physical weaknesses — not murder.", "zh": "是腿部骨折后感染、多次严重的疟疾以及其他身体隐患共同作用的结果——而非谋杀。"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "CT scans found a broken leg that 'may have developed an infection,' and genetic tests found 'multiple attacks of severe malaria' and bone necrosis — pointing to natural causes.", "zh": "CT 扫描发现腿部骨折'可能已感染'，基因检测发现'多次严重的疟疾'和骨坏死——指向自然原因。"}}, {"q": {"en": "Who were the two men who actually governed most affairs during Tut's reign, and what did they want?", "zh": "在图坦卡蒙在位期间，实际掌管大部分事务的是哪两个人？他们想要什么？"}, "options": [{"en": "The cupbearer and the gardener.", "zh": "侍酒童与园丁。"}, {"en": "Ay and Horemheb; they wanted to end Aten worship and restore the old gods, and they became pharaohs after Tut died.", "zh": "阿伊与霍朗赫布；他们希望终止对阿顿的崇拜、恢复旧神，并在图坦卡蒙死后相继即位。"}, {"en": "Two foreign kings from Greece. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "两位来自希腊的外国王者。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "Two of Tut's own children.", "zh": "图坦卡蒙自己的两个孩子。"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says 'two men in particular' — Ay and Horemheb — 'carried out' the court's work and 'hoped King Tut would bring back the old ways'; both later became pharaoh.", "zh": "书中说'尤其有两人'——阿伊与霍朗赫布——'执行'了宫廷事务，并'希望图坦卡蒙恢复旧制'；两人后来都当上了法老。"}}, {"q": {"en": "What stance does the author take on whether the 'Mummy's Curse' was real?", "zh": "关于'木乃伊的诅咒'是否真实，作者持什么立场？"}, "options": [{"en": "The author insists the curse is absolutely real.", "zh": "作者坚称诅咒绝对真实。"}, {"en": "The author treats it as legend, noting Carter — who should have been most cursed — lived to sixty-six, casting doubt on the curse.", "zh": "作者将其视为传说，并指出本应最受诅咒的卡特却活到了 66 岁，从而质疑了诅咒的真实性。"}, {"en": "The author says Carter died immediately.", "zh": "作者说卡特当场就死了。"}, {"en": "The author claims the curse killed millions. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "作者声称诅咒夺去了数百万人的性命。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book notes Carnarvon died but 'Howard Carter... lived until the age of sixty-six,' undermining the idea that the curse struck those who entered.", "zh": "书中提到卡那封去世，但'霍华德·卡特……活到了 66 岁'，削弱了诅咒会降罪于入墓者的说法。"}}, {"q": {"en": "What does the author suggest about how new science changes our understanding of history?", "zh": "关于新科学如何改变我们对历史的理解，作者暗示了什么？"}, "options": [{"en": "That tools like DNA testing and CT scans let experts revise old theories, though different experts may interpret evidence differently.", "zh": "像 DNA 检测和 CT 扫描这样的工具能让专家修正旧理论，但不同专家可能对证据有不同解读。"}, {"en": "That science never changes history. according to some versions of the story in an early draft of the book as mentioned in a later chapter before the main events begin", "zh": "科学永远不会改变历史。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）（在主要事件发生之前）"}, {"en": "That only books can teach history.", "zh": "只有书籍才能传授历史。"}, {"en": "That all experts always agree.", "zh": "所有专家永远意见一致。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The closing says 'With new scientific research and DNA evidence, theories... become more provable. But different experts might interpret them differently.'", "zh": "结尾写道：'借助新的科学研究和 DNA 证据，各种理论变得更有据可循。但不同专家可能有不同解读。'"}}], "extended": {"prompt": {"en": "The book uses modern science (CT scans, DNA) to solve a centuries-old mystery. Describe a mystery from your own life or a story that was solved by looking more closely at evidence. What was the answer?", "zh": "本书借助现代科学（CT 扫描、DNA）破解了延续数个世纪的谜团。请描述你生活中或某个故事里，通过更仔细地审视证据而解开的一个谜，答案是什么？"}, "guidance": {"en": ["State the mystery and what people first assumed.", "Explain what new evidence revealed the real answer."], "zh": ["说出谜团，以及人们最初的猜测。", "解释新的证据揭示了怎样的真实答案。"]}}};</script>
