cue was needed, the book describes the wider historical context. Which event does the book describe as the systematic killing of six million Jews?", "zh": "为了帮助读者理解救援的必要性，书中描述了更广阔的历史背景。书中将哪一事件描述为对600万犹太人的系统性屠杀？"}, "options": [{"en": "The Holocaust", "zh": "大屠杀（Holocaust）"}, {"en": "World War I", "zh": "第一次世界大战"}, {"en": "The Great Depression", "zh": "大萧条"}, {"en": "The French Revolution", "zh": "法国大革命"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book defines the Holocaust as Hitler's attempt to destroy all Jews; it notes six million Jews were murdered in the camps.", "zh": "书中将大屠杀定义为希特勒消灭所有犹太人的企图，并提到600万犹太人在集中营中被杀害。"}}, {"q": {"en": "The author includes Vera Gissing's own words, such as 'Had we not been spirited away, we would have been murdered alongside them.' Why does the author include these personal quotations?", "zh": "作者引用了薇拉·吉辛的原话，例如'若我们没有被秘密救走，就会和他们一起被杀害'。作者为何加入这些个人引语？"}, "options": [{"en": "To show the real human impact of Winton's rescue from the perspective of a child he saved.", "zh": "从一个被救儿童的视角，展现温顿救援真实的人性影响。"}, {"en": "To prove Winton was a professional writer.", "zh": "证明温顿是一位专业作家。"}, {"en": "To describe the geography of Czechoslovakia.", "zh": "描述捷克斯洛伐克的地理。"}, {"en": "To explain how trains were built.", "zh": "解释火车是如何制造的。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "By quoting Gissing, a rescued child, the author personalizes the historical event and shows the life-or-death impact of Winton's actions.", "zh": "通过引用被救儿童吉辛的话，作者让历史事件具象化，并展现温顿行动生死攸关的影响。"}}, {"q": {"en": "What is the author's main purpose in writing Escape From the Holocaust?", "zh": "作者写《逃离大屠杀》的主要目的是什么？"}, "options": [{"en": "To inform readers about how an ordinary banker secretly saved 669 children and to honor his legacy.", "zh": "向读者介绍一位普通银行家如何秘密拯救669名儿童，并纪念他的功绩。"}, {"en": "To teach readers how to build railroads.", "zh": "教读者如何修建铁路。"}, {"en": "To argue that skiing is better than banking.", "zh": "主张滑雪比银行业更好。"}, {"en": "To entertain with a fictional adventure story.", "zh": "用一个虚构的冒险故事来娱乐。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book is an informational biography meant to teach readers about Winton's quiet heroism and the historical events around it.", "zh": "这是一本资讯性传记，旨在向读者介绍温顿默默无闻的英雄事迹及相关历史事件。"}}], "extended": {"prompt": {"en": "If you had to leave home suddenly as a child to escape danger, what one keepsake would you bring and why? How does Vera Gissing's story of being spirited away make you think about family and courage?", "zh": "如果你还是孩子时不得不突然离家躲避危险，你会带哪一件纪念物，为什么？薇拉·吉辛被秘密救走的故事让你如何看待家庭与勇气？"}, "guidance": {"en": ["Think about what object would remind you of home and give you hope.", "Connect your ideas to how Winton's children carried keepsakes and letters from their parents."], "zh": ["想想什么物品能让你想起家并给你希望。", "把你的想法与书中温顿救助的孩子们携带父母纪念物和信件的内容联系起来。"]}}};</script>
