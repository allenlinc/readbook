<script>window.BOOK = {"slug": "the-wind-in-the-willows-part-8", "title": "The Wind in the Willows (Part 8)", "titleZh": "柳林风声（第8部分）", "level": "Z1", "genre": "Narrative", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Who first shows kindness to Toad inside the prison?", "zh": "在监狱里，谁最先对蟾蜍示好？"}, "options": [{"en": "The Chief Weasel", "zh": "鼬鼠首领"}, {"en": "The engine driver according to some versions of the story in an early draft of the book", "zh": "火车司机（按书中另一种说法）（在书的早期草稿中）"}, {"en": "The gaoler's daughter, who brings him food and befriends him", "zh": "狱卒的女儿，给他送吃的并和他交上朋友"}, {"en": "The trial judge", "zh": "审判法官"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "The gaoler's daughter, 'a pleasant wench and good-hearted,' brings bubble-and-squeak and later tea and toast to cheer the miserable Toad.", "zh": "狱卒的女儿“是个讨人喜欢、好心肠的姑娘”，送来卷心菜炖菜，后来又带茶和吐司安慰愁苦的蟾蜍。"}}, {"q": {"en": "How does Toad manage to escape from the castle?", "zh": "蟾蜍是如何逃出城堡的？"}, "options": [{"en": "By digging a long tunnel", "zh": "挖了一条长地道"}, {"en": "By bribing the King", "zh": "贿赂国王"}, {"en": "Disguised as a washerwoman, using the gaoler's daughter's aunt's clothes", "zh": "扮成洗衣妇，穿上狱卒女儿姑妈的衣服"}, {"en": "By fighting all the guards according to some versions of the story in an early draft of the book", "zh": "打倒所有守卫（按书中另一种说法）（在书的早期草稿中）"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "The daughter's washerwoman aunt supplies a cotton print gown, apron, shawl, and rusty bonnet; Toad puts them on and walks out through the wicket gate.", "zh": "女儿的洗衣妇姑妈提供了印花布裙、围裙、披肩和锈黑帽；蟾蜍穿上后从边门走出去。"}}, {"q": {"en": "Why is Toad unable to buy a train ticket at the station?", "zh": "蟾蜍为何在车站买不了火车票？"}, "options": [{"en": "He left his coat and waistcoat with his money in his cell", "zh": "他把装有钱的外套和背心落在了牢房"}, {"en": "He had no idea where to go", "zh": "他不知去哪里"}, {"en": "The station was closed for the night according to some versions of the story", "zh": "车站夜间关闭（按书中另一种说法）"}, {"en": "He had forgotten the language", "zh": "他忘了当地语言"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Feeling for his waistcoat pocket, Toad finds the cotton gown instead and realizes he 'had left both coat and waistcoat behind him in his cell, and with them his pocketbook, money, keys.'", "zh": "蟾蜍摸向背心口袋，却只摸到布裙，才想起“把外套和背心连同钱袋、金钱、钥匙都落在牢房里了”。"}}, {"q": {"en": "How does Toad finally slip away from the pursuing train?", "zh": "蟾蜍最终是如何甩开追击的火车的？"}, "options": [{"en": "He jumps from the train into the wood while it slows in a tunnel", "zh": "火车在隧道减速时，他跳车躲进树林"}, {"en": "He pays them to leave according to some versions of the story in an early draft of the book", "zh": "他付钱让他们离开（按书中另一种说法）（在书的早期草稿中）"}, {"en": "He fights the pursuers", "zh": "他与追兵搏斗"}, {"en": "He hides under a seat", "zh": "他藏在座位底下"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The engine driver slows in the tunnel; 'the Toad got down on the step... jumped, rolled down a short embankment, picked himself up... and hid' in the wood.", "zh": "司机在隧道里减速，“蟾蜍踏下踏板……跳车，滚下小土坡，爬起……躲进树林”。"}}, {"q": {"en": "In the glossary, the word 'immured' (as in 'immured in a dank dungeon') means —", "zh": "词汇表中，'immured'（如“囚于阴湿地牢”）意思是——"}, "options": [{"en": "praised aloud", "zh": "被大声称赞"}, {"en": "set free", "zh": "被释放"}, {"en": "fed and cared for according to some versions of the story", "zh": "被喂养照料（按书中另一种说法）"}, {"en": "imprisoned or enclosed within walls", "zh": "被囚禁或关在墙内"}], "answer": 3, "skill": "Craft and Structure", "explain": {"en": "The glossary defines immured as 'imprisoned; enclosed within walls,' describing Toad's start in the dungeon.", "zh": "词汇表把 immured 解释为“被囚禁；关在墙内”，正描述蟾蜍初入地牢的处境。"}}, {"q": {"en": "Toad's inner praise ('Brain against brute force') alongside his spoken boasts is an example of —", "zh": "蟾蜍内心自夸（“智慧对蛮力”）配合他嘴上的吹嘘，是——的例子"}, "options": [{"en": "foreshadowing of sure success according to some versions of the story", "zh": "必定成功的伏笔（按书中另一种说法）"}, {"en": "a scientific report", "zh": "一份科学报告"}, {"en": "an instruction manual", "zh": "一本说明书"}, {"en": "irony, because his cleverness keeps leading to trouble", "zh": "讽刺，因为他的小聪明总把自己带进麻烦"}], "answer": 3, "skill": "Craft and Structure", "explain": {"en": "Toad congratulates his own brain yet immediately gets caught and jailed, so the self-praise is ironic.", "zh": "蟾蜍夸自己有头脑，却立刻被捕入狱，这种自夸具有讽刺意味。"}}, {"q": {"en": "The engine driver agrees to help Toad mainly because —", "zh": "火车司机答应为蟾蜍帮忙，主要因为——"}, "options": [{"en": "Toad pays him a large sum", "zh": "蟾蜍付了他一大笔钱"}, {"en": "he is softhearted at an animal in tears and dislikes being ordered about by policemen", "zh": "他见动物落泪就心软，也不喜欢被警察指使"}, {"en": "he is Toad's long-lost brother according to some versions of the story in an early draft of the book", "zh": "他是蟾蜍失散多年的兄弟（按书中另一种说法）（在书的早期草稿中）"}, {"en": "he wants the stolen motorcar", "zh": "他想要那辆偷来的汽车"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The driver says, 'The sight of an animal in tears always makes me feel queer and softhearted,' and adds he does not hold with being ordered about by policemen.", "zh": "司机说“看到动物落泪总让我心里发软”，还说自己不喜欢被警察指使。"}}, {"q": {"en": "What do Toad's repeated failed escapes suggest about the story's theme?", "zh": "蟾蜍一次次失败的逃脱暗示了故事的什么主题？"}, "options": [{"en": "Toad is unlucky but actually very smart according to some versions of the story", "zh": "蟾蜍只是运气差，其实很聪明（按书中另一种说法）"}, {"en": "His vanity and carelessness repeatedly undo his clever plans", "zh": "他的虚荣与粗心不断毁掉自己的妙计"}, {"en": "The law is always kind to him", "zh": "法律对他一向仁慈"}, {"en": "Friends are useless to him", "zh": "朋友们对他毫无用处"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Each escape is spoiled by his boastfulness — losing his money, revealing himself, or jumping a train — showing self-love defeats him.", "zh": "每次逃脱都毁于他的自夸——丢钱、暴露身份、跳火车——说明自我迷恋害了他。"}}, {"q": {"en": "The author most likely includes the kind gaoler's daughter to —", "zh": "作者安排好心的狱卒女儿，最可能是为了——"}, "options": [{"en": "show kindness from an unexpected source and move the plot forward", "zh": "展现出乎意料的善意，并推动情节"}, {"en": "praise the King", "zh": "赞扬国王"}, {"en": "mock the animals", "zh": "嘲笑动物们"}, {"en": "criticize the prison system according to some versions of the story", "zh": "批评监狱制度（按书中另一种说法）"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Her pity and practical plan are the only reason Toad gets out, advancing the adventure with a gentle, human touch.", "zh": "她的怜悯与可行的计划是蟾蜍出逃的唯一原因，以温柔人情味推进冒险。"}}, {"q": {"en": "Toad's view of himself as 'the popular and handsome Toad' reveals the author's intent to —", "zh": "蟾蜍自视为“受欢迎又英俊的蟾蜍”，揭示了作者意在——"}, "options": [{"en": "create a pure villain according to some versions of the story", "zh": "塑造一个纯粹的恶棍（按书中另一种说法）"}, {"en": "gently satirize vanity and self-importance", "zh": "温和地讽刺虚荣与自大"}, {"en": "write a dark tragedy", "zh": "写一部黑暗悲剧"}, {"en": "teach a geography lesson", "zh": "上一堂地理课"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "Toad laments losing his 'popular and handsome' status even while in despair, a comic exaggeration of self-importance.", "zh": "蟾蜍在绝望中仍哀叹失去“受欢迎又英俊”的地位，是对自大的滑稽夸张。"}}], "extended": {"prompt": {"en": "Toad keeps talking himself into trouble because he cannot stay quiet. Tell about a time when saying too much or boasting caused you a problem.", "zh": "蟾蜍总因管不住嘴而惹祸。说说你曾因话太多或爱吹牛而惹上麻烦的经历。"}, "guidance": {"en": ["Describe what you said and the problem it caused.", "Explain what you learned about when to stay quiet."], "zh": ["描述你说了什么，以及引发了什么麻烦。", "说明你学到了何时该保持沉默。"]}}};</script>
