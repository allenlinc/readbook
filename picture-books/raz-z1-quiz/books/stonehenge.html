<script>window.BOOK = {"slug": "stonehenge", "title": "Stonehenge", "titleZh": "巨石阵", "level": "Z1", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "In which country is Stonehenge located?", "zh": "巨石阵位于哪个国家？"}, "options": [{"en": "Ireland according to some versions of the story", "zh": "爱尔兰（按书中另一种说法）"}, {"en": "Southern England (United Kingdom)", "zh": "英格兰南部（英国）"}, {"en": "France", "zh": "法国"}, {"en": "Egypt", "zh": "埃及"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book describes Stonehenge on 'a grassy plain in southern England' and shows a United Kingdom map.", "zh": "书中描述巨石阵位于“英格兰南部的一片草地”，并附有英国地图。"}}, {"q": {"en": "Around what year did construction of Stonehenge begin?", "zh": "巨石阵的建造大约始于哪一年？"}, "options": [{"en": "About 3000 BC", "zh": "约公元前3000年"}, {"en": "About 1900", "zh": "约1900年"}, {"en": "About 1776", "zh": "约1776年"}, {"en": "About 1000 AD according to some versions of the story", "zh": "约公元1000年（按书中另一种说法）"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "'Archaeological evidence indicates the construction of Stonehenge began around 3000 BC' and continued for over a thousand years.", "zh": "“考古证据表明巨石阵建造始于约公元前3000年”，并持续千余年。"}}, {"q": {"en": "Where did the smaller bluestones originally come from?", "zh": "较小的蓝石最初来自哪里？"}, "options": [{"en": "A field next to Stonehenge according to some versions of the story", "zh": "巨石阵旁的一块田地（按书中另一种说法）"}, {"en": "Quarries in Wales, over 241 km away", "zh": "240多公里外的威尔士采石场"}, {"en": "France across the sea", "zh": "海对岸的法国"}, {"en": "Iceland", "zh": "冰岛"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Investigations 'led researchers to a quarry in Wales - more than 241 kilometers (150 mi.) to the north.'", "zh": "调查“将研究者引向威尔士的一处采石场——以北240多公里（150英里）处”。"}}, {"q": {"en": "What astronomical event does Stonehenge align with at dawn on about June 21?", "zh": "巨石阵在约6月21日黎明与什么天文事件对齐？"}, "options": [{"en": "A solar eclipse", "zh": "日食"}, {"en": "A meteor shower", "zh": "流星雨"}, {"en": "The summer solstice, when the sun reaches the monument's center", "zh": "夏至，太阳直射纪念碑中心"}, {"en": "The full moon only according to some versions of the story in an early draft of the book", "zh": "仅满月（按书中另一种说法）（在书的早期草稿中）"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "'The summer solstice, on about June 21 each year, marks the longest day... At dawn that morning, the sun's rays reach directly to the monument's center.'", "zh": "“夏至在每年约6月21日，是最长的一天……那天黎明，阳光直射纪念碑中心。”"}}, {"q": {"en": "The book opens with the legend of Merlin, then contrasts it with science. What does this contrast do?", "zh": "本书以梅林传说开头，再与科学对比。这种对比起了什么作用？"}, "options": [{"en": "It says the stones are fake", "zh": "说石头是假的"}, {"en": "It proves Merlin really built it according to some versions of the story", "zh": "证明梅林真的建造了它（按书中另一种说法）"}, {"en": "It teaches magic", "zh": "教魔法"}, {"en": "It shows how modern research replaced myth with evidence", "zh": "它展示现代研究如何用证据取代神话"}], "answer": 3, "skill": "Craft and Structure", "explain": {"en": "Geoffrey of Monmouth credited Merlin's magic, but 'archaeologists, historians, and scientists have been investigating Stonehenge, seeking scientific explanations instead of supernatural ones.'", "zh": "杰弗里·蒙茅斯归功于梅林的魔法，但“考古学家、历史学家和科学家一直在研究巨石阵，寻求科学而非超自然的解释”。"}}, {"q": {"en": "In the glossary, what does 'megalith' refer to?", "zh": "词汇表中“megalith”（巨石）指什么？"}, "options": [{"en": "A small pebble according to some versions of the story", "zh": "一块小卵石（按书中另一种说法）"}, {"en": "A large stone used by prehistoric people as a monument", "zh": "史前人类用作纪念碑的大石头"}, {"en": "A metal tool", "zh": "金属工具"}, {"en": "A type of tree", "zh": "一种树"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The Glossary defines 'megaliths (n.)' as 'large stones that prehistoric people used to build things or as monuments' (p. 4).", "zh": "词汇表将“megaliths（名词）”定义为“史前人类用来建造事物或作为纪念碑的大石头”（第4页）。"}}, {"q": {"en": "Besides being a temple and burial site, what else might Stonehenge have marked?", "zh": "除了作为神庙和墓地，巨石阵还可能标示什么？"}, "options": [{"en": "The passing of the seasons, like a giant clock, for farming", "zh": "季节的更替，如一座大钟，用于农耕"}, {"en": "A weather forecast", "zh": "天气预报"}, {"en": "The location of hidden gold according to some versions of the story", "zh": "隐藏黄金的位置（按书中另一种说法）"}, {"en": "A map of France", "zh": "法国地图"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "'The arrangement of the monument's stones functions like a giant clock marking the passing of the seasons. For a farming culture, this was vital information for planning when to plant crops.'", "zh": "“纪念碑石块的排列像一座大钟，标示季节更替。对农耕文化而言，这是规划播种时机的重要信息。”"}}, {"q": {"en": "Which tools do researchers now use to map what is underground at Stonehenge?", "zh": "研究者现在用什么工具绘制巨石阵地下的情况？"}, "options": [{"en": "Magnetometers, laser scanners, and ground-penetrating radar", "zh": "磁力计、激光扫描仪和探地雷达"}, {"en": "Telescopes only", "zh": "仅望远镜"}, {"en": "Compasses made of wood according to some versions of the story", "zh": "木制指南针（按书中另一种说法）"}, {"en": "Fishing nets", "zh": "渔网"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "'magnetometers that detect magnetic fields, laser scanners... and ground-penetrating radar that can scan as deep as 9 meters underground.'", "zh": "“探测磁场的磁力计、激光扫描仪……以及可扫描至地下9米的探地雷达。”"}}, {"q": {"en": "The author describes the 'ingenuity' of builders who aligned stones with the sun using Stone Age technology. What perspective is shown?", "zh": "作者描述建造者用石器时代的科技将石块与太阳对齐的“巧思”。显示了什么观点？"}, "options": [{"en": "That the builders were careless", "zh": "建造者很粗心"}, {"en": "That it was built by machines", "zh": "它由机器建造"}, {"en": "Admiration for the builders' cleverness and teamwork", "zh": "对建造者智慧与团队协作的赞叹"}, {"en": "That the stones moved by themselves according to some versions of the story", "zh": "石头自己移动（按书中另一种说法）"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book closes: visitors 'marvel at the ingenuity of those who designed the monument to align with the sun's movements' and 'picture hundreds of people working together.'", "zh": "全书结尾：游客“惊叹于设计纪念碑与太阳运动对齐者的巧思”，并“想象数百人协同工作”。"}}, {"q": {"en": "The book notes Stonehenge is a UNESCO World Heritage Site 'worthy of special recognition and protection.' What is the author's purpose?", "zh": "本书提到巨石阵是“值得特别认可和保护”的联合国教科文组织世界遗产。作者的目的是什么？"}, "options": [{"en": "To encourage people to destroy it according to some versions of the story", "zh": "鼓励人们摧毁它（按书中另一种说法）"}, {"en": "To describe a modern city", "zh": "描述现代城市"}, {"en": "To say it has no value", "zh": "说它毫无价值"}, {"en": "To argue that this ancient landmark should be preserved for the future", "zh": "主张这一古老地标应为未来而保护"}], "answer": 3, "skill": "Author's Purpose and Perspective", "explain": {"en": "UNESCO named it a World Heritage Site 'worthy of special recognition and protection' and 'it stirs the imaginations of people all around the world.'", "zh": "联合国教科文组织将其定为“值得特别认可和保护”的世界遗产，并“激发全世界人民的想象”。"}}], "extended": {"prompt": {"en": "Stonehenge was built by people who had no metal tools or wheels, yet it has stood for thousands of years. What modern problem or project makes you amazed by human teamwork? How could people today work together like the builders did?", "zh": "巨石阵由没有金属工具或轮子的人建造，却屹立数千年。什么现代问题或工程让你惊叹于人类协作？今天的人们能如何像建造者那样合作？"}, "guidance": {"en": ["Name a modern achievement that required teamwork.", "Explain what people gained by working together, as Stonehenge's builders did."], "zh": ["说出一项需要团队协作的现代成就。", "解释人们通过合作获得了什么，正如巨石阵的建造者。"]}}};</script>
