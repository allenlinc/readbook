h": "他忘记了开门所需的咒语"}, {"en": "The cave was locked from the outside", "zh": "山洞从外面被锁住了"}, {"en": "He was too weak to walk", "zh": "他虚弱得走不动了"}, {"en": "The treasure was too heavy to carry", "zh": "财宝太重搬不动"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Cassim forgot the password, trying 'Open, barley,' 'Open, ginger,' and others that failed, so the robbers later found and killed him inside.", "zh": "卡西姆忘了咒语，试了'大麦开门''生姜开门'等都失败，强盗后来在洞里发现并杀了他。"}}, {"q": {"en": "The tale contrasts Cassim's greed with Ali Baba's contentment and happy marriage. What literary technique is this?", "zh": "故事将卡西姆的贪婪与阿里巴巴的知足和幸福婚姻形成对比。这是什么文学手法？"}, "options": [{"en": "Characterization through contrast", "zh": "通过对比来塑造人物"}, {"en": "Personification", "zh": "拟人"}, {"en": "Onomatopoeia", "zh": "拟声词"}, {"en": "Foreshadowing of the weather", "zh": "对天气的伏笔"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The author develops Cassim and Ali Baba as opposites—one prosperous but greedy, the other poor but loving—to highlight their different choices.", "zh": "作者把卡西姆和阿里巴巴塑造成对立面——一个富有却贪婪，一个贫穷却充满爱——以突出他们不同的选择。"}}, {"q": {"en": "Morgiana's cleverness is revealed gradually, from spreading a false story about Cassim to outsmarting the robbers in barrels. What does this create?", "zh": "莫琪安娜的聪明是逐步展现的，从散布卡西姆的假死谣言到识破桶中强盗。这营造了什么效果？"}, "options": [{"en": "A surprise twist that builds suspense about who will save the family", "zh": "一个出人意料的转折，为'谁来拯救这个家庭'营造悬念"}, {"en": "A boring description of cooking", "zh": "一段关于烹饪的枯燥描写"}, {"en": "A list of the book's chapters", "zh": "书中章节的列表"}, {"en": "A factual history lesson", "zh": "一堂真实的历史课"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Morgiana starts as a maid and grows into the story's true problem-solver, keeping readers unsure until the climax who will defeat the robbers.", "zh": "莫琪安娜起初只是女仆，逐渐成长为故事中真正解决问题的人，让读者直到高潮都不确定谁会打败强盗。"}}, {"q": {"en": "Both Ali Baba (who takes treasure from robbers) and the robbers commit theft. Based on the Focus Question, what distinguishes Ali Baba in the book's framing?", "zh": "阿里巴巴（从强盗处拿财宝）和强盗都偷窃。根据焦点问题，书中如何区分阿里巴巴？"}, "options": [{"en": "His intentions differ—he takes only what he needs and shares with family, not through violence", "zh": "他的意图不同——他只拿自己所需并与家人分享，而非通过暴力"}, {"en": "He is a professional thief by trade", "zh": "他是以偷窃为业的职业盗贼"}, {"en": "He kills anyone who opposes him", "zh": "他杀死所有反对他的人"}, {"en": "He works for the government", "zh": "他为政府工作"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The Focus Question asks whether Ali Baba's intentions make his actions acceptable versus the robbers', pointing to motive rather than the act alone.", "zh": "焦点问题追问阿里巴巴的'意图'是否使他的行为不同于强盗，强调的是动机而非行为本身。"}}, {"q": {"en": "Morgiana quietly watches the disguised holy man from behind a curtain and later copies his X onto every door. How does this detail support the plot?", "zh": "莫琪安娜从窗帘后悄悄观察假扮的'圣徒'，后来把他的X标记复制到每家门上。这个细节如何推动情节？"}, "options": [{"en": "It shows her observant nature, which lets her outsmart the robbers", "zh": "它展现了她善于观察的性格，使她能智胜强盗"}, {"en": "It proves she cannot read", "zh": "它证明她不识字"}, {"en": "It explains why the cave is hidden", "zh": "它解释了山洞为何隐蔽"}, {"en": "It describes the weather", "zh": "它描写了天气"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Her careful observation of the chalk X lets her foil the robbers' plan by marking all the doors, a key turning point.", "zh": "她仔细观察粉笔X标记，从而用在所有门上做记号的方法挫败强盗计划，这是关键转折。"}}, {"q": {"en": "The Focus Question asks whether Ali Baba's intentions make his actions acceptable compared to the robbers'. What is the author's purpose?", "zh": "焦点问题问：与强盗相比，阿里巴巴的意图是否使他的行为可以接受？作者的写作目的是什么？"}, "options": [{"en": "To prompt readers to analyze moral ambiguity and the role of intention", "zh": "引导读者分析道德的模糊性以及意图的作用"}, {"en": "To teach arithmetic", "zh": "教算术"}, {"en": "To list the robbers' names", "zh": "罗列强盗的名字"}, {"en": "To describe Persian geography", "zh": "描写波斯的地理"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The question frames the tale as a moral debate about intention versus action, encouraging analysis rather than a simple verdict.", "zh": "该问题把故事框定为关于'意图与行为'的道德辩论，鼓励分析而非简单结论。"}}, {"q": {"en": "The 'Connections' section asks students to analyze how Morgiana's actions influence the events. What does this reveal about the author's view of her?", "zh": "'拓展'部分要求学生分析莫琪安娜的行为如何影响事件。这揭示了作者对她持什么看法？"}, "options": [{"en": "The author views Morgiana as the true heroine whose actions drive the resolution", "zh": "作者视莫琪安娜为真正的主角，是她的行为推动了结局"}, {"en": "The author sees her as a minor, unimportant character", "zh": "作者认为她是个无关紧要的小角色"}, {"en": "The author thinks she is the villain", "zh": "作者认为她是反派"}, {"en": "The author ignores her completely", "zh": "作者完全忽略了她"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "By centering a writing task on Morgiana's influence, the author signals she is central to saving the family and resolving the story.", "zh": "通过以莫琪安娜的影响作为写作任务的核心，作者表明她是拯救家庭、解决故事的关键。"}}], "extended": {"prompt": {"en": "Do you think Ali Baba was right to take treasure from the robbers, given that he too was stealing? Explain your answer using the story.", "zh": "鉴于阿里巴巴同样是在偷窃，你认为他从强盗那里拿走财宝是对的吗？请结合故事解释你的答案。"}, "guidance": {"en": ["Consider the difference between Ali Baba's needs and the robbers' violence.", "Think about Morgiana's role and what the story seems to reward."], "zh": ["思考阿里巴巴的'需求'与强盗的'暴力'之间的区别。", "想想莫琪安娜的角色，以及故事似乎在褒奖什么。"]}}};</script>
