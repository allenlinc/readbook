xplain": {"en": "The author calls it 'one of the most beautiful memorials ever created' and describes Shah Jahan's grief after Mumtaz died in 1631.", "zh": "作者称其为“有史以来最美丽的纪念碑之一”，并描述1631年穆姆塔兹去世后沙·贾汗的悲痛。"}}, {"q": {"en": "The book explains modern conservation efforts like the Taj Trapezium. What perspective on its future?", "zh": "本书解释了如“泰姬陵梯形区”等现代保护措施。对其未来持何种观点？"}, "options": [{"en": "That pollution helps it", "zh": "污染对它有益"}, {"en": "That it needs ongoing protection to survive coming centuries", "zh": "它需要持续保护才能存续至未来世纪"}, {"en": "That it will surely collapse soon according to some versions of the story", "zh": "它很快必定倒塌（按书中另一种说法）"}, {"en": "That no one cares about it", "zh": "没人在乎它"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "'With a bit of luck and a lot of hard work, it will survive the coming centuries' thanks to conservation measures.", "zh": "“凭借一点运气和大量努力，它将存续至未来世纪”，得益于保护措施。"}}], "extended": {"prompt": {"en": "The Taj Mahal was built as a memorial of love. Is there a place, object, or tradition in your family or culture that honors someone's memory? What makes it meaningful?", "zh": "泰姬陵是作为爱的纪念而建。在你的家庭或文化中，是否有一处地方、一件物品或一种传统用来纪念某人？它为何有意义？"}, "guidance": {"en": ["Describe a monument, object, or tradition that honors someone.", "Explain who it honors and why it is meaningful to people today."], "zh": ["描述一个纪念某人的纪念碑、物品或传统。", "解释它纪念谁，以及为何对今人有意义。"]}}};</script>
