<script>window.BOOK = {"slug": "by-hook-or-by-crook", "title": "By Hook or by Crook", "titleZh": "千方百计", "level": "Z1", "genre": "Narrative", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Where do Ruth and Charlie ultimately try to go, and why?", "zh": "露丝和查理最终想去哪里，为什么？"}, "options": [{"en": "To New York, to see a movie.", "zh": "去纽约看电影。"}, {"en": "To Europe, for a vacation.", "zh": "去欧洲度假。"}, {"en": "To the North Pole, to meet Santa. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "去北极见圣诞老人。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "To California, to live with their grandparents (Gram and Gramps) after their parents could no longer care for them.", "zh": "去加利福尼亚，投奔祖父母（因为父母已无法照顾他们）。"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The story says after their mother died and their father left, Ruth and Charlie rode the rails west to California, where their grandparents lived, repeating 'By hook or by crook, we have got to get to California!'", "zh": "故事中说母亲去世、父亲离去后，露丝和查理乘火车一路向西去加利福尼亚投奔祖父母，并反复说'千方百计，我们也要到加利福尼亚去！'"}}, {"q": {"en": "How do Ruth and Charlie travel most of the way to California?", "zh": "露丝和查理去加利福尼亚的大部分路程是如何旅行的？"}, "options": [{"en": "By airplane.", "zh": "乘飞机。"}, {"en": "By hopping onto freight trains and hiding in boxcars, known as 'riding the rails.'", "zh": "跳上货运列车、藏在棚车里，即'搭乘火车流浪'。"}, {"en": "By bicycle.", "zh": "骑自行车。"}, {"en": "By sailing a ship. according to some versions of the story in an early draft of the book", "zh": "乘船。（按书中另一种说法）（在书的早期草稿中）"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book describes them waiting for a train at night, running alongside, and leaping into a boxcar; thousands of Americans traveled this way during the Depression.", "zh": "书中描写他们夜里等车、跟着火车跑并跳进棚车；大萧条时期成千上万美国人这样旅行。"}}, {"q": {"en": "In Dodge City, Kansas, Ruth and Charlie meet Joe in a Hooverville. What was a Hooverville?", "zh": "在堪萨斯州道奇城，露丝和查理在胡佛村遇到乔。什么是胡佛村？"}, "options": [{"en": "A shantytown built by poor, out-of-work people during the Great Depression, named for President Herbert Hoover.", "zh": "大萧条时期穷困失业者搭建的棚户区，以赫伯特·胡佛总统命名。"}, {"en": "A large hotel.", "zh": "一家大旅馆。"}, {"en": "A school building. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "一栋校舍。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "A type of train.", "zh": "一种火车。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The glossary defines Hooverville as any shantytown built by poor and out-of-work people during the Great Depression, named for President Herbert Hoover.", "zh": "词汇表将胡佛村定义为大萧条时期穷困失业者搭建的棚户区，以赫伯特·胡佛总统命名。"}}, {"q": {"en": "As the train crosses the Great Plains, what natural disaster do the children pass through?", "zh": "当火车穿越大平原时，孩子们经历了哪种自然灾害？"}, "options": [{"en": "A dust storm (the Dust Bowl), with thick, noxious dust that made them cough.", "zh": "沙尘暴（尘暴区），浓烈有害的尘土让他们咳嗽。"}, {"en": "A flood.", "zh": "洪水。"}, {"en": "An earthquake. according to some versions of the story in an early draft of the book", "zh": "地震。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "A snowstorm.", "zh": "暴风雪。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says a black cloud on the horizon turned out to be a dust storm billowing across the barren prairie; the thick, noxious dust streaked their faces and made them cough.", "zh": "书中说地平线上的黑云其实是一场席卷荒芜草原的沙尘暴；浓烈有害的尘土沾满他们的脸，让他们咳嗽不止。"}}, {"q": {"en": "The story is told from a third-person point of view that focuses closely on Ruth's thoughts and feelings. What does this perspective help the reader do?", "zh": "故事采用贴近露丝思绪与感受的第三人称视角。这种视角帮助读者做什么？"}, "options": [{"en": "Understand Ruth's worries, courage, and determination as the events unfold.", "zh": "随着情节展开，理解露丝的担忧、勇气与决心。"}, {"en": "Hear the story from the train's point of view. according to some versions of the story", "zh": "从火车的角度听故事。（按书中另一种说法）"}, {"en": "Read a newspaper report.", "zh": "读一篇新闻报道。"}, {"en": "Only learn what Charlie is thinking.", "zh": "只了解查理在想什么。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The third-person limited viewpoint lets readers inside Ruth's mind, making her fear for Charlie and her drive to reach California feel immediate.", "zh": "第三人称限知视角让读者进入露丝的内心，使她为查理担忧、一定要到加利福尼亚的决心显得真切。"}}, {"q": {"en": "The author writes that 'the lights of St. Louis flew by before finally vanishing behind them.' What does this image show?", "zh": "作者写道'圣路易斯的灯光飞逝，最终消失在身后'。这一画面说明了什么？"}, "options": [{"en": "That they were going to a party. according to some versions of the story", "zh": "他们要去参加派对。（按书中另一种说法）"}, {"en": "That the lights were stars.", "zh": "那些光是星星。"}, {"en": "That the children are leaving their old life and home behind for good.", "zh": "孩子们永远离开了过去的生活与家园。"}, {"en": "That the train was a toy.", "zh": "火车是个玩具。"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "The imagery of the city lights vanishing conveys the finality of the children's departure from everything familiar as they begin their journey.", "zh": "城市灯火消失的意象传达出孩子们离开一切熟悉之物的决绝，旅程就此开始。"}}, {"q": {"en": "The book connects the children's journey to real history through 'hobo hieroglyphs.' What were these?", "zh": "本书通过'流浪汉象形文字'把孩子们的旅程与真实历史联系起来。这些是什么？"}, "options": [{"en": "A type of comic book.", "zh": "一种漫画书。"}, {"en": "A code of symbols hobos used to share information and warnings, such as 'food for work' or 'danger.'", "zh": "流浪汉用来交流信息和警告的一套符号，如'以工换食'或'危险'。"}, {"en": "A kind of train ticket. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "一种火车票。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "Ancient Maya writing.", "zh": "古代玛雅文字。"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book explains that hobos used chalk or coal to write symbols meaning things like 'kind woman,' 'food for work,' or 'danger' to help each other during the Depression.", "zh": "书中解释流浪汉用粉笔或煤写下表示'善良女子''以工换食'或'危险'等含义的符号，在大萧条时期互相帮助。"}}, {"q": {"en": "At one stop, a woman gives Ruth boys' clothing and says 'men don't need to know' she is becoming a woman. What does this reveal about Ruth's situation?", "zh": "在一站，一位妇女给露丝男孩的衣服，并说'男人不需要知道'她正长成少女。这揭示了露丝处境的什么？"}, "options": [{"en": "That she wanted to be a sailor.", "zh": "她想当水手。"}, {"en": "That clothes were free everywhere. according to some versions of the story in an early draft of the book", "zh": "到处都有免费衣服。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "That the woman was her mother.", "zh": "那妇女是她母亲。"}, {"en": "That traveling alone as a young woman was risky, so she disguised herself for safety.", "zh": "作为年轻女子独自旅行很危险，所以她伪装自己以求安全。"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The detail shows the real dangers faced by a girl traveling during the Depression; the disguise was a protective measure suggested by a kind stranger.", "zh": "这一细节展现了大萧条时期少女旅行面临的实际危险；伪装是陌生好心人建议的保护措施。"}}, {"q": {"en": "The Werners offer to adopt only Charlie, not Ruth. Why does Ruth leave that night instead of letting them adopt Charlie?", "zh": "韦纳夫妇提出只收养查理，不收养露丝。为何露丝当晚就离开，而不是让查理被收养？"}, "options": [{"en": "Because Ruth liked apples too much.", "zh": "因为露丝太爱吃苹果。"}, {"en": "Because she and Charlie promised their grandparents they would stay together, and separation would break that promise.", "zh": "因为她和查理向祖父母承诺会在一起，分开会违背诺言。"}, {"en": "Because Charlie wanted to be a farmer. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "因为查理想当农民。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "Because the Werners were unkind.", "zh": "因为韦纳夫妇不友善。"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "Ruth refuses to be separated from her brother because family loyalty is central to the story; Charlie himself says 'Gram and Gramps would never separate us!'", "zh": "露丝拒绝与弟弟分开，因为家庭忠诚是故事的核心；查理自己也说'祖父母绝不会让我们分开！'"}}, {"q": {"en": "What is the author's main purpose in telling this story?", "zh": "作者讲述这个故事的主要目的是什么？"}, "options": [{"en": "To argue that children should run away. according to some versions of the story in an early draft of the book", "zh": "主张孩子应当离家出走。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "To describe a science experiment.", "zh": "描述一个科学实验。"}, {"en": "To show how courage, resourcefulness, and family loyalty helped two children survive the Great Depression.", "zh": "展现勇气、机智与家庭忠诚如何帮助两个孩子在大萧条中生存。"}, {"en": "To teach readers how to build a train.", "zh": "教读者造火车。"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "The story follows Ruth and Charlie's hardships to highlight resilience and the bond between siblings during a hard historical time, ending with their arrival at a safe, kind home.", "zh": "故事追随露丝和查理的苦难，凸显艰难历史年代中兄妹的韧性与亲情，并以他们抵达安全而友善的家作结。"}}], "extended": {"prompt": {"en": "Ruth says 'By hook or by crook, we have got to get to California!' Have you ever worked hard to reach a goal despite obstacles? Describe your goal and what kept you going, comparing it to Ruth's determination.", "zh": "露丝说'千方百计，我们也要到加利福尼亚去！'你有没有曾克服阻碍、努力实现目标？描述你的目标以及支撑你的动力，并与露丝的决心比较。"}, "guidance": {"en": ["Think about a time you faced a challenge and refused to give up.", "Connect it to Ruth's promise to keep her brother and reach their grandparents."], "zh": ["想想你曾面对挑战却不放弃的时刻。", "把它与露丝守护弟弟、抵达祖父母的承诺联系起来。"]}}};</script>
