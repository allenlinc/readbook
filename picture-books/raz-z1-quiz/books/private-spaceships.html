ne hour", "zh": "在一小时内绕地球飞行一圈"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book states the $10 million prize would go to the first private company to fly a person 62.1 miles up, return, and 'repeat the whole trip within two weeks.'", "zh": "书中说，1000万美元奖金将授予首家把人送到62.1英里高空、返回并在“两周内重复整个航程”的私人公司。"}}, {"q": {"en": "Who was the first space tourist, and how much did he pay in 2001?", "zh": "谁是第一位太空游客？他在2001年支付了多少费用？"}, "options": [{"en": "Dennis Tito, who paid $20 million to visit the ISS", "zh": "丹尼斯·蒂托，他支付2000万美元前往国际空间站"}, {"en": "Richard Garriott, $30 million", "zh": "理查德·加里奥特，3000万美元"}, {"en": "Anousheh Ansari, $20 million", "zh": "阿努什·安萨里，2000万美元"}, {"en": "A computer game designer, $1 million", "zh": "一位电脑游戏设计师，100万美元"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says: 'Space tourism began in 2001, when American Dennis Tito paid $20 million... to catch a ride to the International Space Station aboard a Russian Soyuz rocket.'", "zh": "书中说：“太空旅游始于2001年，当时美国人丹尼斯·蒂托支付2000万美元……搭乘俄罗斯联盟号火箭前往国际空间站。”"}}, {"q": {"en": "The book states SpaceShipTwo 'will act like a giant badminton birdie' as it returns to Earth. What technique is this?", "zh": "书中说太空船二号返回地球时“会像一只巨大的羽毛球”。这是什么修辞手法？"}, "options": [{"en": "A simile comparing the craft to a shuttlecock to explain its slow fall", "zh": "将飞船比作羽毛球以解释其缓慢下落的比喻"}, {"en": "A literal description of a bird", "zh": "对一只鸟的字面描述"}, {"en": "A mathematical formula", "zh": "一个数学公式"}, {"en": "A chapter title", "zh": "一个章节标题"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Calling the craft a 'giant badminton birdie' is a simile that helps readers picture how tilting the wings makes it fall slowly and avoid overheating on re-entry.", "zh": "把飞行器称为“巨大的羽毛球”是一个明喻，帮助读者想象倾斜机翼如何使其缓慢下落、并在再入时避免过热。"}}, {"q": {"en": "The glossary defines 're-entry' as returning to Earth's atmosphere from space. In the book, why does SpaceShipTwo avoid a heavy heat shield?", "zh": "术语表将“再入”（re-entry）定义为从太空返回地球大气层。书中，太空船二号为何不需要沉重的隔热罩？"}, "options": [{"en": "Its tilted wings slow it down so it isn't get too hot during re-entry", "zh": "其倾斜的机翼使其减速，从而再入时不会过热"}, {"en": "It travels faster than sound to burn up safely", "zh": "它超音速飞行以便安全烧蚀"}, {"en": "It uses no fuel at all", "zh": "它完全不使用燃料"}, {"en": "It lands on the Moon first", "zh": "它先降落在月球上"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The book explains the pilot tilts the wings 'to slow down the vehicle. SpaceShipTwo will act like a giant badminton birdie and fall back to Earth much more slowly. Slowing down this way keeps it from getting too hot during re-entry.'", "zh": "书中解释飞行员倾斜机翼“使飞行器减速。太空船二号会像巨大的羽毛球一样缓慢落回地球。这样减速可使其在再入时不会过热。”"}}, {"q": {"en": "The book includes a table of 'The First Space Tourists' (2001-2009). What does the data show?", "zh": "书中包含一张“首批太空游客”（2001—2009）的表格。这些数据说明了什么？"}, "options": [{"en": "Early tourists all used Soyuz rockets and paid $20-35 million for ISS trips", "zh": "早期游客都乘坐联盟号火箭，为前往国际空间站支付2000万至3500万美元"}, {"en": "Tourists flew for free on the space shuttle", "zh": "游客免费搭乘航天飞机飞行"}, {"en": "Only children went to space", "zh": "只有儿童去过太空"}, {"en": "No one paid to go to space", "zh": "没有人花钱去过太空"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The table lists Tito, Shuttleworth, Olsen, Ansari, Simonyi, Garriott, and Laliberte with costs from $20 million to $35 million, and the note says 'All of the early space tourists used Soyuz rockets.'", "zh": "表格列出蒂托、沙特尔沃思、奥尔森、安萨里、西蒙尼、加里奥特和拉利伯特，费用从2000万到3500万美元不等，并注明“所有早期太空游客都使用了联盟号火箭”。"}}, {"q": {"en": "Combining the text about SpaceX's Dragon and NASA's shift to commercial companies, what change occurred?", "zh": "结合书中关于SpaceX龙飞船以及NASA向商业公司转变的内容，发生了什么变化？"}, "options": [{"en": "Private companies like SpaceX now handle cargo and crew transport that NASA used to do", "zh": "像SpaceX这样的私人公司现在承担了过去由NASA负责的货物与人员运输"}, {"en": "NASA stopped all space science", "zh": "NASA停止了所有太空科学"}, {"en": "Only governments can launch rockets now", "zh": "如今只有政府能发射火箭"}, {"en": "The ISS was shut down", "zh": "国际空间站被关闭"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says NASA 'made the decision to turn over the more common types of missions to commercial companies,' and SpaceX now flies the reusable Dragon to deliver cargo to the ISS.", "zh": "书中说NASA“决定将较常规的航天任务交给商业公司”，而SpaceX如今用可重复使用的龙飞船向国际空间站运送货物。"}}, {"q": {"en": "What is the author's main purpose in writing this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"en": "To explain how space travel evolved from government-only to private/commercial efforts", "zh": "为了说明太空旅行如何从政府专属演变为私人/商业努力"}, {"en": "To argue that space travel should be banned", "zh": "为了论证应禁止太空旅行"}, {"en": "To teach how to build a car", "zh": "为了教人如何造车"}, {"en": "To describe only the 1960s", "zh": "为了只描述20世纪60年代"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The focus question is 'How and why has space travel evolved?' and the Conclusion frames the shuttle's final flight as 'the beginning of an exciting new age of commercial spaceflight.'", "zh": "焦点问题是“太空旅行如何以及为何演变？”结论将航天飞机的最后飞行框定为“商业太空飞行激动人心的新时代的开端”。"}}, {"q": {"en": "How does the author treat the risks of private spaceflight (e.g., the 2014 SpaceShipTwo crash)?", "zh": "作者如何处理私人太空飞行的风险（如2014年太空船二号坠毁）？"}, "options": [{"en": "By acknowledging the dangers while showing the continued push for commercial spaceflight", "zh": "承认其中的危险，同时展现对商业太空飞行持续不懈的推进"}, {"en": "By claiming spaceflight is perfectly safe", "zh": "声称太空飞行绝对安全"}, {"en": "By ignoring all accidents", "zh": "忽略所有事故"}, {"en": "By saying only governments should fly", "zh": "声称只有政府才应该飞行"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "After noting one pilot died when SpaceShipTwo crashed in 2014, the book quotes Whitesides, 'Space is hard,' yet 'The company plans to continue working toward safe commercial spaceflight,' balancing risk with resolve.",
