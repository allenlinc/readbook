<script>window.BOOK = {"slug": "the-plague", "title": "The Plague!", "titleZh": "大瘟疫！", "level": "Z1", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Where and when did the plague first arrive in Europe according to the book?", "zh": "根据本书，瘟疫最初是何时、何地传入欧洲的？"}, "options": [{"en": "In London in 1351. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "1351 年，在伦敦。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "In October 1347, when trading ships carrying dead, infected crew sailed into Messina, Sicily.", "zh": "1347 年 10 月，满载死去的染病船员的商船驶入西西里岛的墨西拿港。"}, {"en": "In Paris in 1300.", "zh": "1300 年，在巴黎。"}, {"en": "In Rome in 1400.", "zh": "1400 年，在罗马。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says, 'In October 1347, a dozen trading ships sailed into the port of Messina, Sicily... Most of the crew aboard the ships were already dead.'", "zh": "书中说：'1347 年 10 月，十几艘商船驶入西西里墨西拿港……船上大多数船员已经死亡。'"}}, {"q": {"en": "What bacterium do scientists identify as the likely cause of the Black Death?", "zh": "科学家认定黑死病的很可能病因是哪种细菌？"}, "options": [{"en": "A type of flu bacteria found in 1500. according to some versions of the story in an early draft of the book", "zh": "1500 年发现的一种流感细菌。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Poison put in the water supply.", "zh": "投入水源的毒药。"}, {"en": "A virus discovered in 2020.", "zh": "2020 年发现的一种病毒。"}, {"en": "Yersinia pestis, identified in 1894 — about 550 years after the outbreak.", "zh": "鼠疫耶尔森菌（Yersinia pestis），于 1894 年（疫情后约 550 年）被确认。"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The text states: 'It was not until 1894... that scientists identified the likely culprit: a bacterium called Yersinia pestis.'", "zh": "文中写道：'直到 1894 年……科学家才确认可能的元凶：一种叫鼠疫耶尔森菌的细菌。'"}}, {"q": {"en": "According to the book, how did the plague mainly spread from person to person?", "zh": "根据本书，瘟疫主要如何在人与人之间传播？"}, "options": [{"en": "Through direct contact — a person's pus, blood, or saliva via coughs, handshakes, or touch.", "zh": "通过直接接触——人的脓液、血液或唾液经咳嗽、握手或触碰传播。"}, {"en": "Only by sharing books.", "zh": "只通过共用书籍。"}, {"en": "Only through contaminated drinking water. according to some versions of the story in an early draft of the book", "zh": "只通过被污染的水源。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Only through the air from plants.", "zh": "只通过植物散播到空气中的途径。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says, 'A person's pus, blood, or saliva could infect others it touched. A simple cough or handshake could transmit the sickness.'", "zh": "书中说：'人的脓液、血液或唾液可传染触碰者。一声咳嗽或一次握手就能传播疾病。'"}}, {"q": {"en": "What were the three forms of plague described?", "zh": "书中描述了瘟疫的哪三种形式？"}, "options": [{"en": "Bubonic (swollen buboes), pneumonic (attacks lungs, airborne), and septicemic (in the blood, almost always fatal).", "zh": "腺鼠疫（淋巴结肿大成肿块）、肺鼠疫（攻击肺部、经空气传播）和败血症鼠疫（进入血液，几乎必死）。"}, {"en": "Bird, cat, and dog plague.", "zh": "禽类、猫类和犬类瘟疫。"}, {"en": "Spring, summer, and winter plague. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "春季、夏季和冬季瘟疫。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "Red, yellow, and blue plague.", "zh": "红色、黄色和蓝色的瘟疫。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book names 'bubonic plague,' 'pneumonic plague' (bleeding lungs, airborne cough), and 'septicemic plague' (bacteria in the blood, 'almost always fatal').", "zh": "书中列出'腺鼠疫''肺鼠疫'（肺部出血、咳嗽空气传播）和'败血症鼠疫'（细菌入血，'几乎总是致命'）。"}}, {"q": {"en": "The author writes that the plague could 'come in different forms' and describes each in detail. What is the purpose of this structure?", "zh": "作者写道瘟疫会'以不同形式出现'，并逐一详细描写。这种结构安排的目的是什么？"}, "options": [{"en": "To describe cooking recipes.", "zh": "为了描写烹饪食谱。"}, {"en": "To list the kings of Europe. according to some versions of the story in an early draft of the book", "zh": "为了列举欧洲的国王。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "To explain why the disease was so deadly and hard to recognize, by showing its varying symptoms.", "zh": "通过展示不同的症状，解释这种疾病为何如此致命、又难以辨认。"}, {"en": "To make the book longer.", "zh": "为了让书更长。"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "By separating bubonic, pneumonic, and septicemic forms, the author shows why one illness killed in so many different, confusing ways.", "zh": "把腺型、肺型和败血症型分开说明，作者借此揭示了同一种病为何会以多种令人困惑的方式致命。"}}, {"q": {"en": "The book notes record-keeping was 'spotty' in medieval Europe. How does this affect the information presented?", "zh": "书中指出中世纪的欧洲记录'很不完善'。这如何影响文中呈现的信息？"}, "options": [{"en": "It means historians can only estimate death counts rather than know exact numbers.", "zh": "这意味着历史学家只能估算死亡人数，而无法得知确切数字。"}, {"en": "It shows the book is fictional.", "zh": "它说明这本书是虚构的。"}, {"en": "It proves no one died at all.", "zh": "它证明根本没有人死亡。"}, {"en": "It means the numbers are perfectly exact. according to some versions of the story in an early draft of the book", "zh": "这意味着数字是绝对精确的。（按书中另一种说法）（在书的早期草稿中）"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The Aftermath section says, 'Record-keeping in medieval Europe was spotty, so historians can only estimate the death count.'", "zh": "在'余波'一节中，作者说'中世纪的欧洲记录很不完善，因此历史学家只能估算死亡人数'。"}}, {"q": {"en": "How did some cities try to control the spread of the plague?", "zh": "一些城市是如何试图控制瘟疫蔓延的？"}, "options": [{"en": "They invited everyone to a festival. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "他们邀请所有人参加节庆。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "They blocked infected ships (quarantine of forty days), limited travel and trade, and isolated infected families.", "zh": "他们封锁染疫船只（40 天隔离检疫），限制出行与贸易，并隔离染病家庭。"}, {"en": "They opened the borders completely.", "zh": "他们完全敞开了边境。"}, {"en": "They burned all the books.", "zh": "他们烧掉了所有的书。"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Port cities 'began to block those [ships] that came from plague-infected areas' with a forty-day quarantine; officials 'set limits on travel and trade' and blocked infected families.", "zh": "港口城市'开始封锁来自疫区的船只'，实行 40 天检疫；官员'限制出行与贸易'，并封锁染病家庭。"}}, {"q": {"en": "What was one major social consequence of the massive death toll?", "zh": "巨大的死亡人数造成了什么重大社会后果？"}, "options": [{"en": "The population grew very quickly.", "zh": "人口飞速增长。"}, {"en": "Kings gained more loyal subjects.", "zh": "国王获得了更多忠诚的臣民。"}, {"en": "Everyone became much richer instantly. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "每个人瞬间都变得非常富有。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "A severe worker shortage gave peasants more bargaining power, better pay, and the ability to move for better opportunities.", "zh": "严重的劳动力短缺让农民获得了更强的议价能力、更高的报酬，并能为更好的机会而迁移。"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says a 'massive shortage of workers' let 'Workers... demand better pay' and peasants 'moved from their home villages to where they were offered better opportunities.'", "zh": "书中说'严重的劳动力短缺'使'工人得以要求更高报酬'，农民'从家乡迁往能提供更好机会的地方'。"}}, {"q": {"en": "What view does the author express about the link between the Black Death and the Renaissance?", "zh": "关于黑死病与文艺复兴的联系，作者表达了什么看法？"}, "options": [{"en": "The author thinks the Renaissance happened before the plague. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "作者认为文艺复兴发生在瘟疫之前。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "The author notes some historians link the plague's devastation with the later Renaissance, a period of 'rebirth' in European culture.", "zh": "作者指出，一些历史学家把瘟疫的破坏与后来的文艺复兴联系起来，那是一个欧洲文化的'重生'时期。"}, {"en": "The author says the two events are completely unrelated.", "zh": "作者说这两件事毫无关联。"}, {"en": "The author believes the plague caused the Renaissance to fail.", "zh": "作者认为瘟疫导致文艺复兴失败。"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The Rebirth section states, 'some historians link the ruin it caused with the Renaissance period, which soon followed... Renaissance means rebirth.'", "zh": "'重生'一节写道：'一些历史学家把它的破坏与紧随其后的文艺复兴联系起来……文艺复兴意为重生。'"}}, {"q": {"en": "How does the author portray the response of ordinary people to the plague?", "zh": "作者如何刻画普通民众对瘟疫的反应？"}, "options": [{"en": "As perfectly organized by the government. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "表现为政府组织得井井有条。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "As completely calm and scientific.", "zh": "认为冷静且科学。"}, {"en": "As a mix of panic, misplaced blame (e.g., against Jews), desperate superstition, and some sensible quarantine measures.", "zh": "表现为恐慌、无端指责（如针对犹太人）、绝望的迷信，以及一些明智的检疫措施混杂在一起。"}, {"en": "As cheerful and unconcerned.", "zh": "表现为快乐而无所谓。"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book shows panic (families abandoned the sick), false cures, blaming Jews (Pope Clement VI defended them), and sensible quarantines—presenting a mixed response.", "zh": "书中展现了恐慌（家人抛弃病人）、无效偏方、归咎犹太人（克雷芒六世为他们辩护），以及明智的隔离——呈现出复杂的反应。"}}], "extended": {"prompt": {"en": "The book shows how fear can lead people to blame others unfairly. Describe a time when you saw or felt people blame a group for something they did not cause. What would have helped?", "zh": "本书展示了恐惧如何让人不公地指责他人。请描述一次你目睹或感受到人们把并非自己造成的事归咎于某个群体的经历，本可以怎样做得更好？"}, "guidance": {"en": ["Describe the situation and who was wrongly blamed.", "Suggest one better response based on facts rather than fear."], "zh": ["描述当时的情况，以及被冤枉的是谁。", "根据事实而非恐惧，提出一个更好的应对方式。"]}}};</script>
