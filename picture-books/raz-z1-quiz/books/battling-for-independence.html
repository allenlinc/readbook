<script>window.BOOK = {"slug": "battling-for-independence", "title": "Battling for Independence", "titleZh": "为独立而战", "level": "Z1", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "What event on April 19, 1775, is described as 'the shot heard round the world'?", "zh": "1775年4月19日的哪一事件被称为'震惊世界的一枪'(the shot heard round the world)？"}, "options": [{"en": "The signing of the Declaration of Independence. according to some versions of the story in an early draft of the book", "zh": "《独立宣言》的签署。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "The first exchange of shots between British soldiers and colonists at Lexington and Concord.", "zh": "英军与殖民者在列克星敦和康科德之间响起的第一次交火。"}, {"en": "The Boston Tea Party.", "zh": "波士顿倾茶事件。"}, {"en": "The surrender at Yorktown.", "zh": "约克镇投降。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says a confrontation on April 19, 1775, at Lexington and Concord led to shots exchanged on the village green; 'That first shot became known as the shot heard round the world,' beginning the war.", "zh": "书中说1775年4月19日列克星敦与康科德的对峙，在村中草地上引发了交火；'那第一枪被称为震惊世界的一枪'，标志着战争开始。"}}, {"q": {"en": "Who did the Second Continental Congress unanimously choose to command the colonies' troops?", "zh": "第二届大陆会议一致推选谁来统帅殖民地的军队？"}, "options": [{"en": "George Washington, a delegate from Virginia and former British army officer.", "zh": "乔治·华盛顿，来自弗吉尼亚的代表、前英军军官。"}, {"en": "King George III.", "zh": "乔治三世国王。"}, {"en": "Thomas Jefferson.", "zh": "托马斯·杰斐逊。"}, {"en": "Benedict Arnold. according to some versions of the story in an early draft of the book", "zh": "本尼迪克特·阿诺德。（按书中另一种说法）（在书的早期草稿中）"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book states that on May 10, 1775, the Second Continental Congress unanimously chose George Washington, a delegate from Virginia and former British officer, to command the troops.", "zh": "书中说1775年5月10日，第二届大陆会议一致推选来自弗吉尼亚、曾任英军军官的代表乔治·华盛顿统帅军队。"}}, {"q": {"en": "At the Battle of Bunker Hill, what order did Patriot officers give their soldiers about firing?", "zh": "在邦克山战役中，爱国者军官对士兵下达了怎样的开火命令？"}, "options": [{"en": "Fire as soon as the British appear on the horizon. according to some versions of the story", "zh": "英军一出现在地平线上就开火。（按书中另一种说法）"}, {"en": "Never fire, only use bayonets.", "zh": "绝不开枪，只使用刺刀。"}, {"en": "Retreat immediately without shooting.", "zh": "不射击、立即撤退。"}, {"en": "'Wait until you see the whites of their eyes' to conserve scarce gunpowder.", "zh": "'等到看见他们眼白'再开火，以节省稀缺的火药。"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "With very little gunpowder, Patriot officers told soldiers to make every shot count by waiting until the British were very close: 'Wait until you see the whites of their eyes.'", "zh": "因火药极度短缺，爱国者军官命令士兵节省每一发子弹，等英军逼近再开火：'等到你看见他们的眼白'。"}}, {"q": {"en": "Who actually wrote the Declaration of Independence, and when was it approved?", "zh": "《独立宣言》实际由谁执笔撰写？它又是何时获得批准的？"}, "options": [{"en": "Benjamin Franklin wrote it alone.", "zh": "本杰明·富兰克林独自撰写。"}, {"en": "King George III wrote it.", "zh": "乔治三世国王撰写。"}, {"en": "Thomas Jefferson wrote it; Congress approved it on July 4, 1776.", "zh": "托马斯·杰斐逊撰写；大陆会议于1776年7月4日批准。"}, {"en": "George Washington wrote it in 1775. according to some versions of the story", "zh": "乔治·华盛顿于1775年撰写。（按书中另一种说法）"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "The book says Thomas Jefferson was chosen as the actual writer because of his writing skills, and the Continental Congress approved the Declaration of Independence on July 4, 1776.", "zh": "书中说托马斯·杰斐逊因文笔出众被选中实际执笔，大陆会议于1776年7月4日批准了《独立宣言》。"}}, {"q": {"en": "The book is part of a three-book series (Seeds of Revolution, this book, Building a Nation). How is it organized to show the war's progress?", "zh": "本书是三部曲（ Seeds of Revolution、本书、Building a Nation）中的一部。它是如何组织以展现战争进程的？"}, "options": [{"en": "Through chronological chapters of major battles and turning points, from Lexington to the surrender at Yorktown.", "zh": "按主要战役与转折点的时间顺序，从列克星敦一直到约克镇投降。"}, {"en": "As a single diary entry.", "zh": "以一篇日记的形式。"}, {"en": "As a list of only the British victories. according to some versions of the story in an early draft of the book", "zh": "仅以英军胜利清单的形式。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "In alphabetical order by battle name.", "zh": "按战役名称的字母顺序排列。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The book's chapters move chronologically through the war—Second Continental Congress, Ticonderoga, Bunker Hill, Declaring Independence, Southern Battles, and finally Yorktown—showing the war's progression.", "zh": "本书章节按战争时间推进——第二届大陆会议、提康德罗加、邦克山、宣布独立、南方战役，直至约克镇——展现了战争的进程。"}}, {"q": {"en": "The book highlights 'Thinking Critically' side notes (e.g., about a unanimous vote). What is the author's purpose in including these?", "zh": "书中突出'批判性思考'(Thinking Critically)的边栏（例如关于一致投票）。作者加入这些的目的是什么？"}, "options": [{"en": "To list the book's index.", "zh": "列出本书的索引。"}, {"en": "To translate French words.", "zh": "翻译法语单词。"}, {"en": "To fill empty space on the page. according to some versions of the story in an early draft of the book", "zh": "填补页面上的空白。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "To prompt readers to analyze motives and consequences rather than just memorize facts.", "zh": "促使读者去分析动机与后果，而非仅仅死记事实。"}], "answer": 3, "skill": "Craft and Structure", "explain": {"en": "The 'Thinking Critically' notes ask questions like 'WHAT does a unanimous vote reveal about the delegates' perception of George Washington?', pushing readers to interpret meaning, not just recall.", "zh": "'批判性思考'边栏提问如'一致投票揭示了代表们对华盛顿的何种看法？'，促使读者解读含义，而非仅仅回忆事实。"}}, {"q": {"en": "Why was the Battle of Saratoga a turning point in the war?", "zh": "为何萨拉托加战役(Saratoga)是战争的转折点？"}, "options": [{"en": "Because the British captured all of New England. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "因为英军攻占了整个新英格兰。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "Because it proved to France and other European countries that the Patriots might win, leading France to join the fight.", "zh": "因为它向法国及其他欧洲国家证明爱国者可能取胜，从而促使法国加入战局。"}, {"en": "Because it was the last battle of the war.", "zh": "因为它是战争的最后一战。"}, {"en": "Because Washington was defeated there.", "zh": "因为华盛顿在那里被击败。"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says Saratoga was a turning point 'because it proved to France and other European countries that the Patriots might win the war,' and in 1778 France joined against Great Britain.", "zh": "书中说萨拉托加是转折点，'因为它向法国及其他欧洲国家证明爱国者可能赢得战争'，并于1778年促使法国站到英国对立面。"}}, {"q": {"en": "How did the French alliance help end the war at Yorktown?", "zh": "在约克镇，法同盟是如何帮助结束战争的？"}, "options": [{"en": "French troops fought only in Canada.", "zh": "法军只在加拿大作战。"}, {"en": "French ships drove off the British rescue fleet and brought extra soldiers, helping lay siege until Cornwallis surrendered on October 19, 1781.", "zh": "法国舰队击退了前来救援英军的舰队，并增派士兵，协助围困直至康沃利斯于1781年10月19日投降。"}, {"en": "The French refused to help at all.", "zh": "法国人根本拒绝援助。"}, {"en": "The French supplied only food, no soldiers. according to some versions of the story in an early draft of the book as mentioned in a later chapter before the main events begin", "zh": "法国只提供食物，未出兵。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）（在主要事件发生之前）"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says French ships drove off the British rescue fleet at Yorktown and brought extra soldiers; French and Patriot troops laid siege for three weeks until Cornwallis surrendered on October 19, 1781.", "zh": "书中说在约克镇，法国舰队击退了前来救援的英舰并增派士兵；法军与爱国者围困三周后，康沃利斯于1781年10月19日投降。"}}, {"q": {"en": "The book's Focus Question asks how the battles led to the creation of the United States. What does the author want readers to understand?", "zh": "本书聚焦问题是：这些战役如何促成美利坚合众国的建立？作者希望读者理解什么？"}, "options": [{"en": "That no fighting actually occurred.", "zh": "实际上并未发生任何战斗。"}, {"en": "That one single battle created the country overnight. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "一场单独的战役在一夜之间缔造了国家。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "That a series of battles and alliances, culminating at Yorktown and the 1783 Peace of Paris, transformed thirteen colonies into an independent nation.", "zh": "一系列战役与同盟（以约克镇战役和1783年《巴黎和约》为顶点）将十三个殖民地转变为一个独立国家。"}, {"en": "That Britain voluntarily gave up the colonies.", "zh": "英国是自愿放弃殖民地的。"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "The Focus Question asks 'How did the battles of the Revolutionary War lead to the creation of the United States of America?' and the book traces the war from Lexington to the 1783 Peace of Paris that made independence official.", "zh": "聚焦问题问'独立战争的战役如何促成美利坚合众国的建立？'，本书从列克星敦一路写到1783年使独立正式生效的《巴黎和约》。"}}, {"q": {"en": "The book describes Benedict Arnold as both a brave general and later a traitor. What does this dual portrait show about the war?", "zh": "本书既把本尼迪克特·阿诺德描述为勇敢的将军，又写他后来成为叛徒。这种双重刻画说明了战争的什么？"}, "options": [{"en": "That the Revolution was fought by real, flawed people whose loyalty could shift, not by simple heroes and villains.", "zh": "独立战争是由有缺陷、忠诚可能动摇的真实人物所打动的，而非简单的英雄与恶人。"}, {"en": "That Arnold never fought at all.", "zh": "阿诺德从未参加过战斗。"}, {"en": "That traitors won the war.", "zh": "叛徒赢得了战争。"}, {"en": "That Arnold was always a villain from the start. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "阿诺德从一开始就是恶人。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "By showing Arnold's bravery at Ticonderoga and Saratoga and then his plot to sell West Point, the author presents the war through complex, flawed individuals rather than one-dimensional figures.", "zh": "通过展现阿诺德在提康德罗加与萨拉托加的勇武，以及后来出卖西点要塞的图谋，作者把战争呈现在复杂、有缺陷的个体身上，而非脸谱化人物。"}}], "extended": {"prompt": {"en": "The book ends with the Patriots winning independence after years of hardship, including a cold, hungry winter at Valley Forge. If you had been a colonist in 1775, would you have joined the Patriots or stayed Loyalist? Explain using events from the book such as Bunker Hill or the winter at Valley Forge.", "zh": "本书以爱国者在多年艰苦（包括瓦利福奇那个寒冷饥饿的冬天）后赢得独立作结。若你是1775年的一名殖民者，你会加入爱国者还是保持效忠派？请用书中事件（如邦克山或瓦利福奇之冬）说明。"}, "guidance": {"en": ["Mention the Patriots' morale boost at Bunker Hill despite losing, or the suffering at Valley Forge.", "You might weigh the risks shown by Nathan Hale's execution or Benedict Arnold's betrayal."], "zh": ["提及爱国者在邦克山虽败犹荣的士气提升，或瓦利福奇的困苦。", "你也可以权衡内森·黑尔被处决或阿诺德背叛所显示的风险。"]}}};</script>
