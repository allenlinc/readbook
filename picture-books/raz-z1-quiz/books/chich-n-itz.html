<script>window.BOOK = {"slug": "chich-n-itz", "title": "Chichén Itzá", "titleZh": "奇琴伊察", "level": "Z1", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "In 1842, who rediscovered the jungle-covered city of Chichén Itzá?", "zh": "1842年，是谁重新发现了被丛林覆盖的奇琴伊察古城？"}, "options": [{"en": "John Lloyd Stephens and Frederick Catherwood", "zh": "约翰·劳埃德·斯蒂芬斯和弗雷德里克·卡瑟伍德"}, {"en": "Gustave Eiffel", "zh": "古斯塔夫·埃菲尔"}, {"en": "Nicholas Winton", "zh": "尼古拉斯·温顿"}, {"en": "Shel Dorf", "zh": "谢尔·多尔夫"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says that in 1842, John Lloyd Stephens and Frederick Catherwood spotted a pointed hill in the jungle that turned out to be a crumbling 1,300-year-old pyramid of Chichén Itzá.", "zh": "书中说1842年约翰·劳埃德·斯蒂芬斯和弗雷德里克·卡瑟伍德在丛林中发现一座尖顶小山，原来是奇琴伊察一座1300年的残破金字塔。"}}, {"q": {"en": "What is El Castillo, the most famous monument at Chichén Itzá?", "zh": "奇琴伊察最著名的纪念碑El Castillo（城堡）是什么？"}, "options": [{"en": "A giant stepped pyramid with a temple at the top dedicated to Kukulcán, a winged serpent god.", "zh": "一座巨大的阶梯金字塔，顶端有供奉羽蛇神库库尔坎的神庙。"}, {"en": "A small wooden hut.", "zh": "一座小木屋。"}, {"en": "A modern hotel.", "zh": "一家现代酒店。"}, {"en": "A train station.", "zh": "一座火车站。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book describes El Castillo as a giant stepped pyramid; the building at its top is a temple dedicated to Kukulcán, depicted as a winged serpent.", "zh": "书中把El Castillo描述为一座巨大的阶梯金字塔；顶端建筑是供奉羽蛇神库库尔坎的神庙。"}}, {"q": {"en": "What are cenotes, and why were two of them important to the Maya at Chichén Itzá?", "zh": "什么是cenote（天然井）？为什么其中两个对奇琴伊察的玛雅人很重要？"}, "options": [{"en": "Natural wells where water surfaces; one supplied fresh water and the other (the Sacred Cenote) was used for offerings to the rain god Chac.", "zh": "地下水涌出地表的天然井；一个提供淡水，另一个（圣井）用于向雨神恰克献祭。"}, {"en": "Underground prisons.", "zh": "地下监狱。"}, {"en": "Types of pyramids.", "zh": "金字塔的一种。"}, {"en": "A kind of Maya food.", "zh": "一种玛雅食物。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says cenotes are spots where water wells up from bedrock; the Maya used one for fresh water and the Sacred Cenote for religious offerings to the rain god Chac.", "zh": "书中说cenote是地下水从基岩涌出的地方；玛雅人用一个取淡水，用圣井向雨神恰克献祭。"}}, {"q": {"en": "The Great Ball Court was used for a game called pok-a-tok. How was the ball played, according to the book?", "zh": "大球场用于一种叫pok-a-tok的球戏。根据书中内容，这种球是如何玩的？"}, "options": [{"en": "Two teams used their hips and knees to hit a large, heavy rubber ball made from rubber-tree sap.", "zh": "两队用臀部和膝盖击打用橡胶树汁制成的大而重的橡胶球。"}, {"en": "Players kicked a stone ball with their feet only.", "zh": "球员只用脚踢石球。"}, {"en": "They threw a metal ball with their hands.", "zh": "他们用手扔金属球。"}, {"en": "They bounced a basketball on a court.", "zh": "他们在球场上拍篮球。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says pok-a-tok involved two teams of players who used their hips and knees to hit a large, heavy rubber ball made from the sap of a rubber tree.", "zh": "书中说pok-a-tok由两队用臀部和膝盖击打用橡胶树汁制成的大而重的橡胶球。"}}, {"q": {"en": "The book is organized into chapters such as 'Structures in Stone,' 'Buildings Near the Water,' 'Scientific Secrets,' and 'A Visit to Chichén Itzá.' What does this structure show?", "zh": "本书分为'石砌建筑''水边建筑''科学奥秘''探访奇琴伊察'等章节。这种结构说明了什么？"}, "options": [{"en": "A logical progression from describing physical structures to explaining their cultural and scientific meaning.", "zh": "从描述实体建筑，到解释其文化与科学意义的合乎逻辑的发展。"}, {"en": "A random list of recipes.", "zh": "随机罗列的菜谱。"}, {"en": "Strictly alphabetical order.", "zh": "严格的字母顺序。"}, {"en": "Only the weather report.", "zh": "仅仅是天气报告。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The chapter order moves from the site's buildings and water features to deeper meaning (astronomy, calendars) and finally to visiting today, a clear expository structure.", "zh": "章节顺序从遗址建筑与水文，深入到更深层含义（天文、历法），最后到今日参观，结构清晰、说明性强。"}}, {"q": {"en": "The book explains the Maya often built a larger structure over an existing one 'to retain an old temple or palace's holiness.' Why does the author include this explanation?", "zh": "书中解释玛雅人常常在原有建筑上加盖更大的建筑，以'保留旧神庙或宫殿的神圣性'。作者为何加入这一解释？"}, "options": [{"en": "To help readers understand the Maya's cultural and religious reasoning for building over older temples.", "zh": "帮助读者理解玛雅人在旧神庙上加盖建筑的文化与宗教理由。"}, {"en": "To describe how to cook food.", "zh": "描述如何做饭。"}, {"en": "To list the book's chapters.", "zh": "列出书的章节。"}, {"en": "To explain a math formula.", "zh": "解释一个数学公式。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The author explains the Maya's reasoning so readers grasp why El Castillo and the Temple of the Warriors were built atop earlier constructions.", "zh": "作者解释玛雅人的理由，让读者理解为何El Castillo和战士神庙建在更早的建筑之上。"}}, {"q": {"en": "How does the book show that the Maya had a strong understanding of astronomy?", "zh": "书中如何表明玛雅人具有很强的天文学知识？"}, "options": [{"en": "Buildings like El Castillo and El Caracol were aligned with the sun, equinoxes, and Venus.", "zh": "El Castillo和El Caracol等建筑与太阳、春分秋分和金星相对齐。"}, {"en": "They built only swimming pools.", "zh": "他们只建游泳池。"}, {"en": "They used telescopes made of plastic.", "zh": "他们使用塑料制成的望远镜。"}, {"en": "They ignored the stars completely.", "zh": "他们完全无视星辰。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says El Castillo's 365 steps track the year and its shadows form a serpent on equinoxes, while El Caracol is aligned with Venus's positions.", "zh": "书中说El Castillo的365级台阶对应一年，春分秋分时其阴影形成蛇形；而El Caracol与金星的位置相对齐。"}}, {"q": {"en": "The book connects Chichén Itzá to a wider Maya world across five modern countries. What does this reveal?", "zh": "书中把奇琴伊察与横跨五个现代国家的更广阔玛雅世界联系起来。这揭示了什么？"}, "options": [{"en": "That Chichén Itzá was one powerful city within a broad Maya civilization.", "zh": "奇琴伊察是广阔玛雅文明中一座强大的城市。"}, {"en": "That it was the only Maya city ever built.", "zh": "它是唯一建过的玛雅城市。"}, {"en": "That the Maya lived only in France.", "zh": "玛雅人只生活在法国。"}, {"en": "That it was built by Europeans.", "zh": "它由欧洲人建造。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says the Maya empire extended across what are now Mexico, Belize, Guatemala, Honduras, and El Salvador, with Chichén Itzá becoming the most powerful city in the region.", "zh": "书中说玛雅帝国横跨今墨西哥、伯利兹、危地马拉、洪都拉斯和萨尔瓦多，奇琴伊察成为该地区最强大的城市。"}}, {"q": {"en": "The author notes that since 2006, climbing El Castillo has been forbidden after a tourist died falling down the stairs. Why mention this?", "zh": "作者提到自2006年起，一名游客从台阶跌落身亡后，攀登El Castillo被禁止。为何提到这点？"}, "options": [{"en": "To explain how the ruins are now protected and preserved for safety.", "zh": "说明遗址如今如何为安全而受到保护与维护。"}, {"en": "To encourage everyone to climb.", "zh": "鼓励每个人都去攀登。"}, {"en": "To describe a recipe.", "zh": "描述一道菜谱。"}, {"en": "To list the beach names.", "zh": "列出海滩名称。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The author includes the climbing ban to show that the site is actively preserved and that visitor safety matters, reflecting modern care for the ruins.", "zh": "作者提到攀登禁令，表明遗址受到积极保护、游客安全受到重视，体现了今人对遗迹的呵护。"}}, {"q": {"en": "What is the author's main purpose in writing Chichén Itzá?", "zh": "作者写《奇琴伊察》的主要目的是什么？"}, "options": [{"en": "To reveal what studying Chichén Itzá teaches us about Maya culture.", "zh": "揭示研究奇琴伊察能让我们了解玛雅文化的什么。"}, {"en": "To teach readers how to ski.", "zh": "教读者滑雪。"}, {"en": "To argue that pyramids should be destroyed.", "zh": "主张应当摧毁金字塔。"}, {"en": "To describe a modern movie.", "zh": "描述一部现代电影。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book's Focus Question asks what studying Chichén Itzá has revealed about Maya culture, and the text explores the site's structures, astronomy, and history to answer it.", "zh": "本书聚焦问题分析研究奇琴伊察揭示了玛雅文化的什么，正文通过遗址建筑、天文和历史来回答。"}}], "extended": {"prompt": {"en": "The book says El Castillo's shadows form a serpent on the spring and fall equinoxes. If you could visit Chichén Itzá, would you go on an equinox to see this event? Why or why not, using details from the book?", "zh": "书中说春分和秋分时节，El Castillo的阴影会形成一条蛇。如果你能去奇琴伊察，你会选在春分秋分去看这一景象吗？为什么？用书中细节说明。"}, "guidance": {"en": ["Mention that crowds gather at the equinoxes to watch the serpent shadow.", "Note the site gets over one million visitors a year."], "zh": ["提到春分秋分时人群聚集观看蛇形阴影。", "指出该遗址每年游客超过一百万人。"]}}};</script>
