<script>window.BOOK = {"slug": "the-wind-in-the-willows-part-2", "title": "The Wind in the Willows (Part 2)", "titleZh": "柳林风声（第二部分）", "level": "Z1", "genre": "Narrative", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "What new obsession has Toad developed when Mole and Rat visit Toad Hall?", "zh": "当鼹鼠和河鼠拜访蟾蜍宫时，蟾蜍迷上了什么新事物？"}, "options": [{"en": "He has given up boating and become obsessed with a canary-yellow Gypsy caravan and 'the open road.'", "zh": "他放弃了划船，迷上了明黄色的吉普赛大篷车以及'开阔的大路'。"}, {"en": "He has bought a new sailing boat.", "zh": "他买了一艘新帆船。"}, {"en": "He is building a large houseboat.", "zh": "他正在建造一艘大船屋。"}, {"en": "He has started collecting rare birds.", "zh": "他开始收集珍稀鸟类。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Toad shows them a 'Gipsy caravan, shining with newness, painted a canary yellow,' and cries about 'The open road!'", "zh": "蟾蜍向他们展示一辆'崭新的吉普赛大篷车，漆成明黄色'，并为'开阔的大路'而欢呼。"}}, {"q": {"en": "How does the canary-colored cart meet its end?", "zh": "那辆明黄色的大篷车是如何毁掉的？"}, "options": [{"en": "A fast motorcar zooms past, scares the horse, and the horse backs the cart into a ditch, wrecking it.", "zh": "一辆飞驰的汽车驶过，吓到了马，马把大篷车倒退进沟里，彻底撞毁。"}, {"en": "It is struck by lightning during a storm.", "zh": "它在暴风雨中被闪电击中。"}, {"en": "Toad sells it for a motorcar.", "zh": "蟾蜍把它卖掉换了一辆汽车。"}, {"en": "The river floods and washes it away.", "zh": "河水泛滥把它冲走了。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The motorcar's 'poop-poop' terrifies the horse, who 'drove the cart backwards towards the deep ditch... an irredeemable wreck.'", "zh": "汽车的'嘟——嘟'吓坏了马，马'把大篷车倒退着推向深沟……成了无法挽回的残骸'。"}}, {"q": {"en": "What is Toad's immediate reaction after the cart is destroyed?", "zh": "大篷车被毁后，蟾蜍的即时反应是什么？"}, "options": [{"en": "He ignores the wreck and becomes instantly obsessed with the motorcar, calling it 'the poetry of motion.'", "zh": "他对残骸不闻不问，立刻迷上了那辆汽车，称其为'运动的诗篇'。"}, {"en": "He cries and refuses to ever travel again.", "zh": "他大哭，并发誓再也不旅行了。"}, {"en": "He blames Rat and Mole and sends them home.", "zh": "他责怪河鼠和鼹鼠，把他们打发回家。"}, {"en": "He repairs the cart by himself.", "zh": "他独自修好了大篷车。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Toad sits in the road murmuring 'Poop-poop!' and calls the car 'The poetry of motion! The real way to travel!'", "zh": "蟾蜍坐在路中间喃喃'嘟——嘟！'，称汽车是'运动的诗篇！真正的旅行方式！'"}}, {"q": {"en": "According to Rat, what is wrong with Toad after the motorcar passes?", "zh": "按照河鼠的说法，汽车驶过后蟾蜍怎么了？"}, "options": [{"en": "Toad is 'possessed' by a new craze and is useless for practical purposes, like an animal in a happy dream.", "zh": "蟾蜍被一种新的狂热'附身'了，变得不切实际，像个沉浸在美梦里的动物。"}, {"en": "Toad is badly injured and cannot walk.", "zh": "蟾蜍受了重伤，无法行走。"}, {"en": "Toad has become afraid of all vehicles.", "zh": "蟾蜍变得害怕所有车辆。"}, {"en": "Toad decides to become a farmer.", "zh": "蟾蜍决定去当农民。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Rat says, 'He is now possessed. He has got a new craze... He'll continue like that for days now, like an animal walking in a happy dream.'", "zh": "河鼠说：'他被附身了。他又有了新狂热……他会像沉浸在美梦里的动物那样好几天都这副模样。'"}}, {"q": {"en": "The author repeats Toad's cry 'Poop-poop!' and describes the motorcar with words like 'glittering plate glass' and 'breath-snatching.' What effect does this create?", "zh": "作者反复描写蟾蜍的'嘟——嘟！'，并用'闪闪发亮的玻璃'、'令人屏息'等词形容汽车。这营造了什么效果？"}, "options": [{"en": "It conveys the sudden, overwhelming excitement and glamour that captures Toad's attention.", "zh": "它传达出那种突如其来、令人无法抗拒的刺激与魅力，正是它俘获了蟾蜍的心。"}, {"en": "It makes the car seem slow and boring.", "zh": "这让汽车显得缓慢而无趣。"}, {"en": "It shows Rat enjoys the noise.", "zh": "这说明河鼠喜欢这噪声。"}, {"en": "It describes a calm, quiet afternoon.", "zh": "它在描写一个平静安静的午后。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Vivid, admiring language mirrors Toad's dazzled fascination and explains why the craze takes hold so fast.", "zh": "生动而带着仰慕的语言，正好呼应了蟾蜍被迷住的心理，也解释了狂热为何瞬间发作。"}}, {"q": {"en": "Rat says 'I think about it—all the time!' about the river. What does this reveal about Rat's character?", "zh": "河鼠说到河流时叹息'我无时无刻不在想念它！'这揭示了河鼠怎样的性格？"}, "options": [{"en": "He is deeply attached to his home river and values his simple life there over adventure.", "zh": "他深深眷恋着自己的家乡河流，比起冒险，更珍视那里的简朴生活。"}, {"en": "He dislikes the river and wants to leave.", "zh": "他讨厌河流，想要离开。"}, {"en": "He cares only about motorcars.", "zh": "他只在乎汽车。"}, {"en": "He is jealous of Toad's wealth.", "zh": "他嫉妒蟾蜍的财富。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Even on the trip Rat thinks of the river; he says quietly, 'I think about it—all the time!' showing his loyalty to home.", "zh": "即便在旅途中，河鼠也思念河流；他轻声说'我无时无刻不在想念它！'，显露出对家园的眷恋。"}}, {"q": {"en": "Comparing Part 1 and Part 2, what pattern in Toad's behavior does the text highlight?", "zh": "结合第一部分与第二部分，文本凸显了蟾蜍行为上的什么规律？"}, "options": [{"en": "Toad constantly abandons one hobby for the next (sailing, punting, houseboating, caravan, now motorcars).", "zh": "蟾蜍不断地抛弃一种爱好去追逐下一种（帆船、撑篙、船屋、大篷车，如今又是汽车）。"}, {"en": "Toad has stayed loyal to boating his whole life.", "zh": "蟾蜍一生都忠于划船。"}, {"en": "Toad never changes his mind about anything.", "zh": "蟾蜍对任何事都从不改变主意。"}, {"en": "Toad only cares about money.", "zh": "蟾蜍只在乎金钱。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The Otter recalls Toad's past fads: 'Once, it was nothing but sailing... then he tired of that and took to punting... houseboating... whatever he takes up, he gets tired of it.'", "zh": "水獭回忆蟾蜍过去的狂热：'曾经只爱帆船……后来厌倦了去撑篙……又迷上船屋……无论迷上什么，他总会厌倦。'"}}, {"q": {"en": "Why does Rat eventually agree to join the caravan trip?", "zh": "河鼠最终为什么答应加入大篷车之旅？"}, "options": [{"en": "He does not want to disappoint his friends Mole and Toad, whose excitement overrides his own objections.", "zh": "他不想让自己的两位朋友（鼹鼠和蟾蜍）失望，他们的热情压过了他自己的反对。"}, {"en": "He loves motorcars more than anything.", "zh": "他最爱汽车，胜过一切。"}, {"en": "Toad forces him against his will.", "zh": "蟾蜍不顾他的意愿强行逼他。"}, {"en": "He wants to escape the river forever.", "zh": "他想永远逃离河流。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The text says Rat 'allowed his good nature to override his personal objections' so as not to disappoint his two friends.", "zh": "文中写道，河鼠'让自己的好脾气压倒了自己的反对意见'，不愿让两位朋友失望。"}}, {"q": {"en": "What attitude does the author seem to take toward Toad's endless fads?", "zh": "作者对蟾蜍没完没了的狂热持什么态度？"}, "options": [{"en": "A gentle, amused one—portraying him as foolish but good-natured and affectionate.", "zh": "一种温和、带着调侃的态度——把他描绘得可笑，但本性善良、惹人喜爱。"}, {"en": "A harsh, angry criticism of his wastefulness.", "zh": "对他浪费行为的严厉愤怒的批评。"}, {"en": "A completely serious and admiring tone.", "zh": "一种完全严肃而仰慕的口吻。"}, {"en": "A cold, uncaring description with no opinion.", "zh": "一种冷漠、毫无看法的描写。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Rat calls him 'so simple, so good-natured, and so affectionate... perhaps boastful and conceited' — fond yet teasing.", "zh": "河鼠称他'那么单纯、那么善良、那么亲切……或许有点自夸自负'——既喜爱又带调侃。"}}, {"q": {"en": "What does the author suggest about the appeal of 'the open road' versus a settled home?", "zh": "关于'开阔的大路'与安稳家园的吸引力，作者暗示了什么？"}, "options": [{"en": "The open road is thrilling and tempting, but the book also shows the comfort and loyalty of home and friendship.", "zh": "开阔的大路令人兴奋、充满诱惑，但书中也展现了家的温暖与友情的忠诚。"}, {"en": "The open road is always better than staying home.", "zh": "开阔的大路永远胜过待在家里。"}, {"en": "Home is a terrible place to be avoided.", "zh": "家是个应当回避的可怕地方。"}, {"en": "Travel should never be attempted.", "zh": "永远不该去旅行。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Toad loves the road, yet the story ends with Rat happily back in his riverside parlour, valuing home and friends.", "zh": "蟾蜍热爱大路，但故事以河鼠愉快地回到河边小屋作结，凸显了对家园与友情的珍视。"}}], "extended": {"prompt": {"en": "Toad jumps from one craze to the next. Describe a hobby or interest you once loved and then outgrew. Why did your feelings change?", "zh": "蟾蜍从一个狂热跳到另一个。请描述你曾经喜爱、后来又失去兴趣的一个爱好，你的感受为何改变了？"}, "guidance": {"en": ["Name the hobby and what first attracted you to it.", "Explain what caused your interest to fade or shift to something new."], "zh": ["说出那个爱好，以及最初吸引你的地方。", "解释是什么让你的兴趣减退，或转向了新事物。"]}}};</script>
