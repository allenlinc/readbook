<script>window.BOOK = {"slug": "seven-billion-and-counting", "title": "Seven Billion and Counting", "titleZh": "七十亿与持续增长", "level": "Z1", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "The book compares Earth's growing population to which earlier society as a warning?", "zh": "本书将地球不断增长的人口与哪个早期社会作对比以发出警告？"}, "options": [{"en": "The Rapanui people of Easter Island, who used up their island's resources", "zh": "复活节岛的拉帕努伊人，他们耗尽了岛上的资源"}, {"en": "The ancient Romans, who built vast aqueducts", "zh": "建造巨大引水渠的古罗马人"}, {"en": "The settlers of the Mayflower", "zh": "五月花号的移民"}, {"en": "The builders of the Great Wall of China", "zh": "中国长城的建造者"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book opens with the Rapanui of Easter Island, who cut down their forests and exceeded the island's carrying capacity, comparing their fate to today's seven billion humans using up Earth's resources.", "zh": "本书以复活节岛的拉帕努伊人开篇，他们砍光森林、超出岛屿的承载能力，并将他们的命运与今天七十亿人类耗尽地球资源相类比。"}}, {"q": {"en": "According to the book, about how many people could Earth support if everyone lived like most Americans?", "zh": "根据本书，如果每个人都像大多数美国人那样生活，地球大约能养活多少人？"}, "options": [{"en": "Two billion", "zh": "二十亿"}, {"en": "Seven billion", "zh": "七十亿"}, {"en": "Forty billion", "zh": "四百亿"}, {"en": "Ten billion", "zh": "一百亿"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book states: 'If everyone on Earth lived the way most Americans live, Earth could only support two billion people,' because rich countries use more than three-quarters of the world's resources.", "zh": "书中写道：“如果地球上每个人都像大多数美国人那样生活，地球只能养活二十亿人”，因为富裕国家消耗了世界四分之三以上的资源。"}}, {"q": {"en": "In what year did the world's population reach seven billion?", "zh": "世界人口在哪一年达到七十亿？"}, "options": [{"en": "2011", "zh": "2011年"}, {"en": "1800", "zh": "1800年"}, {"en": "1960", "zh": "1960年"}, {"en": "1927", "zh": "1927年"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book's timeline notes: 'The year 2011 saw the seven billionth person on the planet—and a population still growing at more than 200,000 people each day.'", "zh": "书中时间线写道：“2011年，地球上迎来了第70亿个人——且人口仍以每天逾20万人的速度增长。”"}}, {"q": {"en": "By 2010, what had happened to the global population growth rate?", "zh": "到2010年，全球人口增长率发生了什么变化？"}, "options": [{"en": "It had slowed from 2.2% to 1.1% per year", "zh": "它已从每年2.2%放缓到1.1%"}, {"en": "It had risen above 3% per year", "zh": "它已升到每年3%以上"}, {"en": "It had stopped completely at zero", "zh": "它已彻底降为零"}, {"en": "It had stayed exactly the same as in 1800", "zh": "它与1800年时完全相同"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The 'Good News' section reports that by 2010 the global growth rate had dropped from a high of 2.2 percent to 1.1 percent per year as rich countries' birthrates fell below replacement.", "zh": "“好消息”一节提到，到2010年全球增长率已从2.2%的高点下降到每年1.1%，因为富裕国家的出生率已低于更替水平。"}}, {"q": {"en": "The author opens and closes the book with the story of Easter Island. What technique is this?", "zh": "作者以复活节岛的故事开篇并以它收尾。这是什么写作手法？"}, "options": [{"en": "Bookending the text with a cautionary comparison", "zh": "用警示性的对比为全文“首尾呼应”"}, {"en": "Using a fictional fairy tale", "zh": "使用一个虚构的童话"}, {"en": "Listing every country's population", "zh": "列出每个国家的人口"}, {"en": "Printing the text in two languages", "zh": "以两种语言印刷文本"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The Easter Island mystery appears both at the start (A Giant Mystery) and the end (An Island in Space), framing the whole book as a warning about overusing resources.", "zh": "复活节岛之谜既出现在开篇（“巨大的谜团”），也出现在结尾（“太空中的孤岛”），以此将全书框定为对资源过度消耗的警示。"}}, {"q": {"en": "In this book, what does the term 'carrying capacity' mean?", "zh": "在本书中，“承载能力”（carrying capacity）一词是什么意思？"}, "options": [{"en": "The largest number of people an environment can support without using up needed resources", "zh": "一个环境在不耗尽所需资源的前提下能够供养的最大人口数量"}, {"en": "The weight a ship can carry in its hold", "zh": "一艘船的货舱能装载的重量"}, {"en": "The number of books in a library", "zh": "图书馆里藏书的数量"}, {"en": "The distance a person can walk in a day", "zh": "一个人一天能步行的距离"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines carrying capacity as 'the greatest population that an environment can support indefinitely,' and the book applies it to both Easter Island and Earth.", "zh": "术语表将承载能力定义为“一个环境能够无限期供养的最大人口”，书中将其同时用于复活节岛和地球。"}}, {"q": {"en": "The book's chart shows the USA would need 5 planets, China 1.0, and India 0.4 if everyone lived like them. What does this show?", "zh": "书中图表显示，如果每个人都像他们那样生活，美国需要5个地球、中国需要1.0个、印度需要0.4个。这说明了什么？"}, "options": [{"en": "Rich countries use far more resources per person than poorer countries", "zh": "富裕国家人均消耗的资源远多于贫穷国家"}, {"en": "India has the most natural resources", "zh": "印度拥有最多的自然资源"}, {"en": "The USA has the smallest population", "zh": "美国人口最少"}, {"en": "All countries use the same amount of resources", "zh": "所有国家消耗的资源量相同"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The 'Enough for Everyone' section uses the ecological-footprint chart to show that Americans need 5 planets while India needs only 0.4, proving resource use differs hugely by lifestyle.", "zh": "“人人富足”一节用生态足迹图表说明，美国人需要5个地球，而印度仅需0.4个，证明资源消耗因生活方式而差异巨大。"}}, {"q": {"en": "The 'Math Minute' shows Southern Arizona's water table dropped 170 feet as population grew from 40,000 to 1 million. What does this illustrate?", "zh": "“数学一分钟”显示，随着人口从4万增长到100万，亚利桑那南部的地下水位下降了170英尺。这说明了什么？"}, "options": [{"en": "Growing populations can overuse and deplete groundwater", "zh": "不断增长的人口会过度使用并耗尽地下水"}, {"en": "Rainfall increased as more people moved in", "zh": "随着更多人迁入，降雨量增加"}, {"en": "The water table rose because of irrigation", "zh": "由于灌溉，地下水位反而上升"}, {"en": "Population growth has no effect on water", "zh": "人口增长对水资源没有影响"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The Math Minute ties a falling water table directly to population growth, supporting the book's point that fresh water is unevenly distributed and easily depleted.", "zh": "“数学一分钟”把地下水位下降直接与人口增长挂钩，印证了书中“淡水分布不均且易被耗尽”的观点。"}}, {"q": {"en": "What is the author's main reason for writing this book?", "zh": "作者写这本书的主要目的什么？"}, "options": [{"en": "To inform readers about overpopulation and urge protection of Earth's limited resources", "zh": "向读者说明人口过剩问题，并呼吁保护地球有限的资源"}, {"en": "To teach readers how to build a spaceship", "zh": "教读者如何建造宇宙飞船"}, {"en": "To argue that more people are always better", "zh": "主张人越多越好"}, {"en": "To describe how to cook with less salt", "zh": "介绍如何用更少的盐做饭"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The focus question asks what factors drive overpopulation and how it affects Earth, and the closing hopes the Easter Island tale will 'teach us to protect our limited resources.'", "zh": "焦点问题询问哪些因素导致人口过剩及其对地球的影响，结尾则希望复活节岛的故事能“教会我们保护有限的资源”。"}}, {"q": {"en": "How does the author present the role of technology such as the Green Revolution?", "zh": "作者如何看待绿色革命等技术所起的作用？"}, "options": [{"en": "As both helpful (more food) and harmful (pollution, new problems)", "zh": "既有益（更多粮食）也有害（污染、新问题）"}, {"en": "As entirely bad and useless", "zh": "完全有害且无用"}, {"en": "As a complete solution to all problems", "zh": "是解决一切问题的完整方案"}, {"en": "As something the author refuses to discuss", "zh": "是作者拒绝讨论的内容"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book credits the Green Revolution with tripling food production but also notes its chemicals polluted food and water, showing the author's balanced view of technology.", "zh": "书中肯定绿色革命使粮食产量增至三倍，但也指出其化学制品污染了食物和水源，体现了作者对技术的平衡看法。"}}], "extended": {"prompt": {"en": "The book compares Earth to a small island in space with limited resources. What is one habit you could change in your own life to reduce your ecological footprint, and why would it help?", "zh": "本书把地球比作太空中资源有限的小岛。你在生活中可以
