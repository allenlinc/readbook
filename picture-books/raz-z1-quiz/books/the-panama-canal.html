<script>window.BOOK = {"slug": "the-panama-canal", "title": "The Panama Canal", "titleZh": "巴拿马运河", "level": "Z1", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "When did the Panama Canal officially open, and what ship made the first trip?", "zh": "巴拿马运河何时正式通航？是哪艘船完成了首次通行？"}, "options": [{"en": "It opened on August 15, 1914, when the cargo ship Ancon made the first passage.", "zh": "它于 1914 年 8 月 15 日通航，货轮 Ancon 号完成了首次通行。"}, {"en": "It opened in 1903 with a French ship.", "zh": "1903 年，由一艘法国船通航。"}, {"en": "It opened in 2000 with a Panamanian ship.", "zh": "2000 年，由一艘巴拿马船通航。"}, {"en": "It opened in 1855 with a train.", "zh": "1855 年，由一列火车通行。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The Introduction says, 'on August 15, 1914, when the cargo ship Ancon sailed through its narrow channels.'", "zh": "引言写道：'1914 年 8 月 15 日，货轮 Ancon 驶过其狭窄水道。'"}}, {"q": {"en": "Who first tried and failed to build a canal across Panama?", "zh": "谁最先尝试、却未能建成横穿巴拿马的运河？"}, "options": [{"en": "A French company led by Ferdinand de Lesseps, who had built the Suez Canal, failed after about seven years.", "zh": "由建造了苏伊士运河的费迪南·德·雷赛布领导的法国公司，约七年后以失败告终。"}, {"en": "The United States, under Teddy Roosevelt.", "zh": "西奥多·罗斯福领导下的美国。"}, {"en": "A British company in the 1700s.", "zh": "18 世纪的一家英国公司。"}, {"en": "The local Panamanian government alone.", "zh": "单靠巴拿马地方政府。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "In 1879 'a group of French businessmen formed a company' headed by de Lesseps; 'After seven years, the project crumbled... De Lesseps left Panama a failure.'", "zh": "1879 年'一批法国商人组建公司'，由德·雷赛布领导；'七年后工程崩溃……德·雷赛布失败地离开了巴拿马。'"}}, {"q": {"en": "How did the United States gain the right to build the canal in Panama?", "zh": "美国是如何获得在巴拿马修建运河的权利的？"}, "options": [{"en": "After Colombia rejected a treaty, the U.S. helped Panamanian revolutionaries, who broke from Colombia in November 1903, and the U.S. recognized Panama's independence.", "zh": "在哥伦比亚否决条约后，美国协助巴拿马革命者于 1903 年 11 月脱离哥伦比亚，美国随后承认巴拿马独立。"}, {"en": "Panama simply invited the U.S. with no conflict.", "zh": "巴拿马毫无争议地直接邀请了美国。"}, {"en": "The U.S. bought the land from France for one dollar.", "zh": "美国以一美元向法国买下了土地。"}, {"en": "Colombia happily gave the land as a gift.", "zh": "哥伦比亚高兴地把土地当作礼物送人。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The Colombian congress rejected the treaty; 'Roosevelt decided to help Panamanian revolutionaries... On November 3, 1903, rebels began to seize control... the United States formally recognized Panama's independence three days later.'", "zh": "哥伦比亚国会否决了条约；'罗斯福决定帮助巴拿马革命者……1903 年 11 月 3 日叛军开始夺权……三天后美国正式承认巴拿马独立。'"}}, {"q": {"en": "What method did Dr. William Gorgas use to fight mosquito-borne disease?", "zh": "威廉·戈加斯博士用何种方法对抗蚊媒疾病？"}, "options": [{"en": "He had workers empty standing water, sprayed insecticides, and used bed netting to stop mosquito bites.", "zh": "他让人排空积水、喷洒杀虫剂，并使用蚊帐来防止蚊虫叮咬。"}, {"en": "He built taller walls around the city.", "zh": "他在城市周围筑起更高的墙。"}, {"en": "He told workers to drink only soda.", "zh": "他让员工只喝汽水。"}, {"en": "He moved all workers to the mountains.", "zh": "他把所有工人迁到山区。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Gorgas 'organized teams... to empty barrels of standing water,' sent 'fumigators to spray homes,' and demanded 'bed netting' over beds.", "zh": "戈加斯'组织人手排空积水的桶'，派'熏烟工喷洒房屋'，并要求床上'挂蚊帐'。"}}, {"q": {"en": "The book explains the lock system step by step (ship enters, door closes, water fills, ship rises). What does this organizational choice do?", "zh": "本书一步步讲解船闸系统（船进入、闸门关闭、注水、船升高）。这种组织方式有什么作用？"}, "options": [{"en": "It clearly shows how the engineering works, making a complex system understandable to the reader.", "zh": "它清晰地展示了工程的运作原理，让读者能够理解这一复杂系统。"}, {"en": "It hides how the canal functions.", "zh": "它掩盖了运河的运作方式。"}, {"en": "It describes a recipe for cooking.", "zh": "它在描写一道烹饪食谱。"}, {"en": "It lists the names of workers.", "zh": "它在列举工人的名字。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The 'How the Panama Canal Works' section walks through each step so the reader can follow the staircase of locks logically.", "zh": "'巴拿马运河如何运作'一节逐步讲解，让读者能顺着逻辑理解这套阶梯式船闸。"}}, {"q": {"en": "The author uses the phrase 'Make the Dirt Fly' as a section title. What does it refer to?", "zh": "作者把'让泥土飞起来'用作一节的小标题。它指的是什么？"}, "options": [{"en": "President Roosevelt's order to engineer John Wallace to start excavating the canal quickly.", "zh": "罗斯福总统命令工程师约翰·华莱士尽快开始挖掘运河。"}, {"en": "A command to plant more trees.", "zh": "种植更多树木的命令。"}, {"en": "A game the workers played.", "zh": "工人们玩的一种游戏。"}, {"en": "The name of a type of train.", "zh": "一种火车的名字。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The section says construction 'began in 1904 under... John Wallace. Roosevelt ordered Wallace to make the dirt fly.'", "zh": "该节说工程'1904 年在约翰·华莱士手下启动。罗斯福命令华莱士让泥土飞起来'。"}}, {"q": {"en": "How did the canal's design change under engineer John Stevens?", "zh": "在工程师约翰·史蒂文斯的领导下，运河的设计发生了怎样的变化？"}, "options": [{"en": "He abandoned the sea-level plan and instead proposed locks plus a dam creating Gatun Lake, so ships could 'climb' over the mountains.", "zh": "他放弃了海平面方案，改为建造船闸，并筑坝形成加通湖，让船只能够'翻越'群山。"}, {"en": "He made the canal twice as long and dug at sea level.", "zh": "他把运河加长一倍，并按海平面开挖。"}, {"en": "He cancelled the project entirely.", "zh": "他彻底取消了工程。"}, {"en": "He decided to build a bridge instead.", "zh": "他决定改修一座桥。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Stevens 'changed construction plans... The original plan called for workers to dig the canal at sea level... Stevens proposed building a series of locks... and dam the Chagres River and create a huge lake.'", "zh": "史蒂文斯'改变了施工方案……原计划按海平面开凿……史蒂文斯提议修建一系列船闸……并筑坝拦截查格雷斯河、形成大湖。'"}}, {"q": {"en": "According to the book, what was one major effect of the canal on the United States' global position?", "zh": "根据本书，运河对美国的国际地位造成了什么重大影响？"}, "options": [{"en": "It helped establish the United States as a world power and spurred global commerce.", "zh": "它帮助美国确立世界强国的地位，并刺激了全球贸易。"}, {"en": "It made the U.S. weaker than before.", "zh": "它让美国比以前更弱。"}, {"en": "It had no effect on world affairs.", "zh": "它对世界局势毫无影响。"}, {"en": "It caused the U.S. to lose its navy.", "zh": "它导致美国失去了海军。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The Introduction says the canal 'helped establish the United States as a world power' and 'spurred global commerce.'", "zh": "引言说运河'帮助美国确立世界强国的地位'，并'刺激了全球贸易'。"}}, {"q": {"en": "What perspective does the author take on the French failure?", "zh": "作者对法国人的失败持什么看法？"}, "options": [{"en": "The author attributes it to de Lesseps ignoring jungle warnings and the tropical climate, calling the result a 'muddy mess' and great loss of life.", "zh": "作者将其归因于德·雷赛布无视丛林警告与热带气候，称其结果是一团'烂泥'并付出了巨大的生命代价。"}, {"en": "The author blames only the weather with no human error.", "zh": "作者只怪天气，不认为有人为失误。"}, {"en": "The author says the French succeeded completely.", "zh": "作者说法国人完全成功了。"}, {"en": "The author thinks the failure was a good thing.", "zh": "作者认为那次失败是件好事。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book says de Lesseps 'ignored warnings' about the jungle and that after seven years the project left 'little more than a muddy mess and the loss of more than twenty thousand lives.'", "zh": "书中说德·雷赛布'无视'丛林的警告，七年后工程只留下'一团烂泥和两万多条生命的损失'。"}}, {"q": {"en": "How does the author view the canal's expansion completed in 2016?", "zh": "作者对 2016 年完工的运河扩建持什么看法？"}, "options": [{"en": "As a further marvel of engineering that doubled cargo capacity and met the needs of larger modern ships.", "zh": "视之为工程上的又一奇迹，它使货运能力翻倍，满足了现代大型船只的需求。"}, {"en": "As a wasteful mistake that should not have happened.", "zh": "视为不该发生的浪费性错误。"}, {"en": "As something that closed the canal.", "zh": "视为导致运河关闭的事。"}, {"en": "As unimportant and barely mentioned.", "zh": "视为无关紧要、几乎未提及。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The 'Old Timer' section calls the 2016 expansion 'yet another marvel of engineering' that 'doubling the amount of cargo it can handle each day.'", "zh": "'老计时员'一节称 2016 年扩建是'工程上的又一奇迹'，使'每日货运能力翻倍'。"}}], "extended": {"prompt": {"en": "The Panama Canal changed world trade by shortening the trip between two oceans. Think of an invention or building that shortened a distance or saved time in your life. What was it and how did it help?", "zh": "巴拿马运河通过缩短两洋之间的航程改变了世界贸易。请想一个在你生活中缩短距离或节省时间的发明或建筑，它是什么，又有何帮助？"}, "guidance": {"en": ["Name the invention or structure and what distance or time it shortened.", "Explain the difference it made in daily life."], "zh": ["说出该发明或建筑，以及它缩短了什么距离或时间。", "解释它给日常生活带来的改变。"]}}};</script>
