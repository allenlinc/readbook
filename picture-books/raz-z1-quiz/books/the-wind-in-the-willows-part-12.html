<script>window.BOOK = {"slug": "the-wind-in-the-willows-part-12", "title": "The Wind in the Willows (Part 12)", "titleZh": "柳林风声（第12部分）", "level": "Z1", "genre": "Narrative", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "For how much does Toad sell the horse to the gipsy?", "zh": "蟾蜍把马卖给吉普赛人，卖了多少钱？"}, "options": [{"en": "Nothing at all", "zh": "分文未取"}, {"en": "Six shillings and sixpence, plus a breakfast", "zh": "六先令六便士，外加一顿早餐"}, {"en": "One shilling total according to some versions of the story", "zh": "一共一先令（按书中另一种说法）"}, {"en": "Twenty pounds", "zh": "二十英镑"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "After bargaining from 'a shilling a leg' (four shillings), Toad demands 'six shillings and sixpence, cash down' plus 'as much breakfast as I can possibly eat' from the pot.", "zh": "从“一条腿一先令”（共四先令）讨价还价后，蟾蜍要“六先令六便士现钱”，外加“锅里的早餐管饱”。"}}, {"q": {"en": "What familiar motorcar does Toad hail on the high road?", "zh": "蟾蜍在公路上拦下的是哪辆眼熟的汽车？"}, "options": [{"en": "The very car he had stolen from the Red Lion", "zh": "正是他从红狮旅馆偷走的那辆"}, {"en": "A brand-new car he had never seen according to some versions of the story", "zh": "一辆从没见过的新车（按书中另一种说法）"}, {"en": "A police patrol car", "zh": "一辆警用巡逻车"}, {"en": "Badger's own car", "zh": "獾自己的车"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "He sees the approaching car is 'the very one he had stolen out of the yard of the Red Lion Hotel on that fatal day,' with the same people inside.", "zh": "他认出驶近的车“正是那个灾日他从红狮旅馆院子偷走的那辆”，车里还是原班人马。"}}, {"q": {"en": "What happens when Toad takes the wheel of the motorcar?", "zh": "蟾蜍握上方向盘后发生了什么？"}, "options": [{"en": "He gives the car back", "zh": "他把车还了回去"}, {"en": "He is arrested on the spot according to some versions of the story", "zh": "他当场被捕（按书中另一种说法）"}, {"en": "He crashes it into a horsepond and escapes", "zh": "他把车撞进饮马塘后逃走"}, {"en": "He drives safely home", "zh": "他平安开回了家"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"e plain": {"en": "Lines like 'never a name to go down to fame Compared with that of Toad' wildly overstate his greatness for comic effect.", "zh": "“千古英名，谁比得上蟾蜍”之类词句极度夸大他的伟大，制造喜剧效果。"}}, {"q": {"en": "The gentlemen in the car mistake Toad for —", "zh": "车里的绅士把蟾蜍误认成——"}, "options": [{"en": "a police officer according to some versions of the story", "zh": "一名警察（按书中另一种说法）"}, {"en": "the King", "zh": "国王"}, {"en": "a famous thief", "zh": "一名著名窃贼"}, {"en": "a poor, fainting washerwoman in need of help", "zh": "一位晕倒、需要帮助的可怜洗衣妇"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "They say, 'Here is a poor old thing—a washerwoman apparently—who has fainted in the road!' and lift him in, not recognizing Toad.", "zh": "他们说：“这是个可怜的老东西——看样子是洗衣妇——晕倒在路上了！”把他扶上车，没认出蟾蜍。"}}, {"q": {"en": "Toad's escape from the horsepond, leaping 'like a swallow,' suggests —", "zh": "蟾蜍从饮马塘逃脱时“像燕子般”跃起，暗示——"}, "options": [{"en": "his luck and physical agility keep saving him despite recklessness", "zh": "他的运气与灵活总在莽撞中救他一命"}, {"en": "he is quickly caught according to some versions of the story in an early draft of the book", "zh": "他很快被抓住（按书中另一种说法）（在书的早期草稿中）"}, {"en": "the car is unharmed", "zh": "汽车毫发无损"}, {"en": "he can actually fly", "zh": "他真的会飞"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "He 'landed on his back... in the soft, rich grass,' unhurt, showing how his daring and fortune combine to spare him.", "zh": "他“仰面落进柔软丰美的草里”毫发无伤，显示他的胆大与运气合力保命。"}}, {"q": {"en": "The author repeats Toad's boasting to show —", "zh": "作者反复写蟾蜍吹牛，是为了表明——"}, "options": [{"en": "his pride continually leads him back into danger", "zh": "他的骄傲不断把他重新拖入险境"}, {"en": "that Toad is truly humble according to some versions of the story", "zh": "蟾蜍真的很谦卑（按书中另一种说法）"}, {"en": "that luck is useless", "zh": "运气毫无用处"}, {"en": "that boasting is wise", "zh": "吹牛是明智的"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Each song and swagger ('Ho, ho! I am The Toad!') immediately precedes a new disaster, linking pride to peril.", "zh": "每回唱歌吹嘘（“嗬嗬！我就是蟾蜍！”）紧接着就出新祸，把骄傲与危险联系起来。"}}, {"q": {"en": "The near-capture by the real car owners teaches that —", "zh": "被真正的车主几乎抓回，说明了——"}, "options": [{"en": "the owners are kind", "zh": "车主很善良"}, {"en": "Toad should drive more often according to some versions of the story", "zh": "蟾蜍该多开开车（按书中另一种说法）"}, {"en": "Toad's tricks are risky and his past catches up with him", "zh": "蟾蜍的把戏很危险，过去的事会找上门"}, {"en": "stealing is perfectly safe", "zh": "偷东西绝对安全"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "The very car he stole returns to haunt him, showing that his crimes cannot stay hidden forever.", "zh": "他偷的那辆车回来缠上他，说明罪行不可能永远掩盖。"}}], "extended": {"prompt": {"en": "Toad keeps boasting that he is the cleverest animal, then immediately gets into worse trouble. Tell about a time your confidence led you into a mistake.", "zh": "蟾蜍老吹自己最聪明，结果马上惹上更大麻烦。说说你曾因过于自信而犯错的时候。"}, "guidance": {"en": ["Describe the mistake and what your confidence blinded you to.", "Explain what the consequence taught you."], "zh": ["描述那次错误，以及自信让你忽略了什么。", "说明后果教会了你什么。"]}}};</script>
