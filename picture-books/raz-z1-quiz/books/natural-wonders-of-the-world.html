nd smoothed down by endless years of weathering,' contrasting young mountains with older, worn-down ones.", "zh": "书中指出珠峰的山峰“尚未被漫长岁月的风化侵蚀磨平”，将年轻山脉与更古老、已被磨平的山脉形成对比。"}}, {"q": {"en": "The Introduction lists the five wonders using bullet points (a layered canyon, a young volcano, a waterfall, a reef, a mountain). What organizational pattern is this?", "zh": "引言用项目符号列出五处奇观（层叠峡谷、年轻火山、瀑布、礁脉、高山）。这是什么组织方式？"}, "options": [{"en": "A poem", "zh": "一首诗"}, {"en": "A table of contents only", "zh": "仅是一个目录"}, {"en": "A preview that outlines the book's structure before the chapters", "zh": "在章节之前概述全书结构的预览"}, {"en": "A random list of facts according to some versions of the story", "zh": "一份随机的事实列表（按书中另一种说法）"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "The Introduction bullet list (a layered canyon, a young volcano, a waterfall, an immense coral reef, a towering mountain) previews exactly the five chapters that follow, a common expository preview.", "zh": "引言的项目符号列表（层叠峡谷、年轻火山、瀑布、巨大珊瑚礁、巍峨高山）正好预告了随后五章的内容，是一种常见的说明文预览。"}}, {"q": {"en": "The book says the Great Barrier Reef is built from the skeletons of polyps, and 'as the polyps die, new ones grow on top.' What can readers conclude?", "zh": "书中说大堡礁由珊瑚虫的骨骼构成，并“随着珊瑚虫死亡，新的在上方生长”。读者可以得出什么结论？"}, "options": [{"en": "The reef is a living structure built up layer by layer over thousands of years", "zh": "礁体是一种有生命的结构，经过数千年一层层堆积而成"}, {"en": "The reef is made of solid metal according to some versions of the story in an early draft of the book", "zh": "礁体由实心金属构成（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Polyps live only one day", "zh": "珊瑚虫只活一天"}, {"en": "The reef was built by humans", "zh": "礁体由人类建造"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book explains 'As the polyps die, new ones grow on top of the old skeletons. The many layers of skeletons form the limestone base of a coral reef,' so the reef is a living, accumulating structure.", "zh": "书中解释“珊瑚虫死亡后，新的在旧骨骼上方生长。层层骨骼构成了珊瑚礁的石灰岩基底”，因此礁体是一种不 ts care about according to some versions of the story in an early draft of the book", "zh": "视为只有游客才关心的事（按书中另一种说法）（在书的早期草稿中）"}, {"en": "As unnecessary and a waste of money", "zh": "视为不必要且浪费金钱"}, {"en": "As important, with environmentalists and UNESCO working to protect them for the future", "zh": "视为重要之事，环保人士与联合国教科文组织正为保护它们而努力"}, {"en": "As illegal", "zh": "视为非法"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book notes the Reef was listed as a World Heritage Site by UNESCO in 1981 and that 'Environmentalists are working with all of these groups to protect the Reef so future generations can learn from it.'", "zh": "书中提到该礁于1981年被联合国教科文组织列为世界遗产，并说“环保人士正与各群体合作保护礁体，让后代能够从中学习”。"}}], "extended": {"prompt": {"en": "The book presents wonders formed over millions of years (Grand Canyon) and others in a human lifetime (Paricutin). Which wonder would you most like to visit, and what would you hope to see or learn?", "zh": "本书介绍了历经数百万年形成的奇观（大峡谷）以及人类一生内形成的奇观（帕里库廷火山）。你最想探访哪一处？你希望看到或了解什么？"}, "guidance": {"en": ["Choose one of the five wonders and describe a feature from the book.", "Explain what personal question or feeling you hope the visit would answer."], "zh": ["从五处奇观中任选一处，并描述书中提到的一个特征。", "说明你希望这次探访能解答怎样的个人疑问或情感。"]}}};</script>
