l": "Key Ideas and Details", "explain": {"en": "The Mole forms the prisoners in line, reports the rooms are clean, and says 'I didn't have to lick them' and 'let them out at the back.'", "zh": "鼹鼠把俘虏排成队，报告房间已打扫干净，并说'我不必打他们'，且'把他们从后门放走'。"}}, {"q": {"en": "What do Rat and Badger forbid Toad from doing at the Banquet?", "zh": "老鼠和獾禁止蟾蜍在宴会上做什么？"}, "options": [{"en": "Giving speeches and singing songs", "zh": "发表演讲和唱歌"}, {"en": "Eating food", "zh": "吃东西"}, {"en": "Inviting guests according to some versions of the story", "zh": "邀请客人（按书中另一种说法）"}, {"en": "Sitting down", "zh": "坐下"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Rat tells Toad 'there are going to be no speeches and no songs,' and refuses even 'one little song.'", "zh": "老鼠告诉蟾蜍'不会有演讲，也不会有歌声'，连'一首小歌'也拒绝。"}}, {"q": {"en": "The chapter is titled 'The Return of Ulysses,' alluding to Odysseus/Ulysses from The Odyssey. What does this suggest about Toad?", "zh": "本章标题为'尤利西斯的归来'，暗指《奥德赛》中的奥德修斯/尤利西斯。这对蟾蜍有何暗示？"}, "options": [{"en": "It compares Toad's homecoming after his adventures to the hero's return", "zh": "它把蟾蜍历经冒险后的归家，比作英雄的归来"}, {"en": "It means Toad is a god according to some versions of the story in an early draft of the book", "zh": "它意味着蟾蜍是个神（按书中另一种说法）（在书的早期草稿中）"}, {"en": "It refers to the weather", "zh": "它指天气"}, {"en": "It describes a boat", "zh": "它描写一条船"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The 'Connections' note explains the chapter echoes Odysseus's return home, linking Toad's reclaiming of his hall to that epic homecoming.", "zh": "'拓展'说明本章呼应奥德修斯归家，将蟾蜍夺回府邸比作史诗般的归乡。"}}, {"q": {"en": "The author contrasts Toad's private boasting (vain invitations) with his public modesty at the banquet. What character technique is this?", "zh": "作者将蟾蜍私下的自夸（虚荣的邀请函）与宴会上公开的谦逊形成对比。这是什么人物塑造手法？"}, "options": [{"en": "Listing the menu", "zh": "罗列菜单"}, {"en": "Describing the weather according to some versions of the story", "zh": "描写天气（按书中另一种说法）"}, {"en": "Showing character growth through contrast and irony", "zh": "通过对比与反讽展现人物成长"}, {"en": "A math lesson", "zh": "一堂数学课"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "Toad writes 'Speech ... by Toad' and 'Song ... by Toad' privately, yet at the banquet says 'Not at all!'—contrast that reveals his change.", "zh": "蟾蜍私下写'演讲……蟾蜍'、'歌曲……蟾蜍'，宴会上却说'哪里哪里！'——对比揭示他的转变。"}}, {"q": {"en": "The 'Connections' section asks readers to research Odysseus/Ulysses and explain the chapter title. What connection is drawn?", "zh": "'拓展'部分要求读者研究奥德修斯/尤利西斯并解释章名。这里建立了什么联系？"}, "options": [{"en": "Both Toad and Ulysses return home and reclaim their place after struggles", "zh": "蟾蜍和尤利西斯都历经磨难后归家并重获自己的位置"}, {"en": "The book is a history text according to some versions of the story in an early draft of the book", "zh": "本书是历史课本（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Toad travels to Greece", "zh": "蟾蜍去了希腊"}, {"en": "Ulysses is a weasel", "zh": "尤利西斯是一只黄鼠狼"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The prompt explicitly links the chapter's title to Odysseus's return, asking students to connect literature across cultures.", "zh": "该提示明确把章名与奥德修斯的归来联系，要求学生跨文本联想。"}}, {"q": {"en": "Rat says he 'confiscated' Toad's boastful invitations and Mole wrote 'plain, simple invitation cards.' With the no-speech rule, what does this show?", "zh": "老鼠说他'没收'了蟾蜍自夸的邀请函，鼹鼠写了'朴素简单的邀请卡'。结合'不许演讲'的规定，这说明了什么？"}, "options": [{"en": "They dislike the banquet", "zh": "他们讨厌宴会"}, {"en": "They are the enemies", "zh": "他们是敌人"}, {"en": "They want Toad to be famous according to some versions of the story", "zh": "他们想让蟾蜍出名（按书中另一种说法）"}, {"en": "The friends want Toad to behave humbly and not embarrass himself", "zh": "朋友们希望蟾蜍谦逊行事，别让自己出丑"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "By replacing Toad's vain cards and banning speeches, the friends protect Toad from his own boastfulness, as Rat explains he confiscated them.", "zh": "通过替换蟾蜍虚荣的卡片并禁止演讲，朋友们保护蟾蜍不至于因自夸出丑，正如老鼠所说他没收了那些卡片。"}}, {"q": {"en": "The Focus Question asks 'How has life changed for Toad and the other river animals?' What is the author's purpose?", "zh": "焦点问题问'蟾蜍和其他河边动物生活如何改变了？'作者的写作目的是什么？"}, "options": [{"en": "To describe a storm", "zh": "描写一场风暴"}, {"en": "To show Toad's growth from boastful to modest and the restored peace of the community", "zh": "展现蟾蜍从自夸到谦逊的成长，以及社区恢复的和平"}, {"en": "To teach cooking", "zh": "教烹饪"}, {"en": "To list animal facts according to some versions of the story in an early draft of the book", "zh": "罗列动物知识（按书中另一种说法）（在书的早期草稿中）"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book closes with Toad 'an altered Toad' and friends living 'in great joy and contentment,' showing changed, peaceful lives.", "zh": "本书以'变了的蟾蜍'和朋友们'在极大喜悦与满足中'生活作结，展现改变后的安宁生活。"}}, {"q": {"en": "The 'Connections' prompt asks readers to explain 'a possible theme' of the story regarding both conflicts. What does this reveal?", "zh": "'拓展'提示要求读者解释故事关于两类冲突的'可能主题'。这揭示了什么？"}, "options": [{"en": "The author rewards boasting", "zh": "作者奖励自夸"}, {"en": "The author values humility, friendship, and growth over pride", "zh": "作者看重谦逊、友谊与成长，而非骄傲"}, {"en": "The author dislikes animals according to some versions of the story", "zh": "作者不喜欢动物（按书中另一种说法）"}, {"en": "The author wants a quiz", "zh": "作者想要测验"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "By asking for a theme, the author signals that Toad's taming of pride through friends is the story's moral center.", "zh": "通过要求归纳主题，作者表明'蟾蜍在朋友帮助下克制骄傲'是故事的道义核心。"}}], "extended": {"prompt": {"en": "Toad changes from boastful to modest by the end. Describe a time you acted proudly and later realized humility was better. What helped you change?", "zh": "蟾蜍在结尾从自夸变得谦逊。描述一次你表现得骄傲、后来意识到谦逊更好的经历。是什么帮助你改变？"}, "guidance": {"en": ["Think of a real moment when friends or family gave you honest feedback like Rat and Badger did.", "Connect it to Toad learning to listen to his friends."], "zh": ["回想一个
