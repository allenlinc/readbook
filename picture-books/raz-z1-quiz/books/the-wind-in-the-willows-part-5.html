 Ideas and Details", "explain": {"en": "The foraging yields 'a tin of sardines—a box of captain's biscuits, nearly full—and a German sausage encased in silver paper,' though there is no bread.", "zh": "翻找的结果是‘一罐沙丁鱼——一盒几乎满的船长饼干——还有一根包着银纸的德式香肠’，只不过没有面包。"}}, {"q": {"en": "Who arrives at Mole End to sing carols, making it feel 'like old times'?", "zh": "是谁来到鼹鼠居唱起颂歌，让一切‘宛如往昔’？"}, "options": [{"en": "A group of field mice", "zh": "一群田鼠"}, {"en": "The hedgehogs from Badger's", "zh": "獾家的刺猬"}, {"en": "The rabbits from the Wild Wood", "zh": "野树林里的兔子"}, {"en": "Otter and his family", "zh": "水獭和他的家人"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Mole says 'it must be the field mice' who go round carol-singing, and they arrive in the forecourt singing an old-time carol.", "zh": "鼹鼠说‘一定是田鼠们’，它们会挨家挨户唱颂歌，随后果然来到前院唱起古老的颂歌。"}}, {"q": {"en": "The author describes Mole's sense of smell as a 'telegraphic current' and a 'fine filament' reaching him in the dark. What figure of speech is this?", "zh": "作者把鼹鼠的嗅觉形容为一道‘电报般的电流’和‘纤细的丝线’，在黑暗中向他传来。这是什么修辞手法？"}, "options": [{"en": "A metaphor comparing smell to a communication wire", "zh": "隐喻，把气味比作传递信息的电线"}, {"en": "Onomatopoeia imitating a sound", "zh": "拟声，模仿某种声音"}, {"en": "Hyperbole exaggerating his fear", "zh": "夸张，夸大他的恐惧"}, {"en": "Alliteration of repeated consonants", "zh": "头韵，重复相同的辅音"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The author compares the scent to 'a fine filament, the telegraphic current' and a 'mysterious fairy call,' using metaphor to show smell as a message from home.", "zh": "作者把气味比作‘纤细的丝线、电报般的电流’以及‘神秘的仙界呼唤’，用隐喻把气味表现为来自家乡的消息。"}}, {"q": {"en": "How does the author let readers know Mole's private thoughts and deep feelings during the journey?", "zh": "在旅途中，作者是如何让读者得知鼹鼠内心的想法和深切感受的？"}, "options": [{"en": "By narrating his inner thoughts and emotions directly", "zh": "通过直接叙述他内心的想法与情感"}, {"en": "Through letters that Mole writes to Rat", "zh": "通过鼹鼠写给老鼠的信"}, {"en": "Through another c eping that home base."], "zh": ["描述一个让你感到安全、做回自己的地方或习惯。", "解释你在保留这个‘大本营’的同时，如何与更广阔的世界保持联系。"]}}};</script>
