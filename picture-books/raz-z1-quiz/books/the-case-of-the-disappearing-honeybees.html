<script>window.BOOK = {"slug": "the-case-of-the-disappearing-honeybees", "title": "The Case of the Disappearing Honeybees", "titleZh": "消失的蜜蜂之谜", "level": "Z1", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Colony Collapse Disorder (CCD) was identified after bees began vanishing in which year?", "zh": "蜂群崩溃失调症（CCD）是在蜜蜂于哪一年开始消失后被确认的？"}, "options": [{"en": "2006 (October 2006)", "zh": "2006年（2006年10月）"}, {"en": "1990", "zh": "1990年"}, {"en": "1945", "zh": "1945年"}, {"en": "2015", "zh": "2015年"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The problem became clear in October 2006, when a Florida beekeeper found 400 hives empty and 20 million bees gone.", "zh": "问题在2006年10月变得清晰：一名佛罗里达养蜂人发现400个蜂箱空了，2000万只蜜蜂消失。"}}, {"q": {"en": "What is the role of worker bees in a hive?", "zh": "工蜂在蜂群中的职责是什么？"}, "options": [{"en": "Female bees that guard, clean, and stock the hive but do not reproduce.", "zh": "雌蜂，负责守卫、清洁和储粮，但不繁殖。"}, {"en": "Male bees that lay eggs.", "zh": "负责产卵的雄蜂。"}, {"en": "The only bees that reproduce.", "zh": "唯一能繁殖的蜂。"}, {"en": "Bees that never leave the queen.", "zh": "从不离开蜂王的蜂。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book's 'Who's Who in the Hive' says worker bees are female, do not reproduce, but guard, clean, and stock the hive with food.", "zh": "书中“蜂群众生相”说工蜂为雌性、不繁殖，但负责守卫、清洁并为蜂巢储粮。"}}, {"q": {"en": "Which parasite is called the 'vampire mite' because it sucks bees' blood?", "zh": "哪种寄生虫被称为“吸血鬼螨”，因为它吸食蜜蜂的血？"}, "options": [{"en": "Varroa destructor", "zh": "狄斯瓦螨（Varroa destructor）"}, {"en": "Nosema apis", "zh": "蜜蜂微孢子虫（Nosema apis）"}, {"en": "A honeybee", "zh": "一只蜜蜂"}, {"en": "A ladybug", "zh": "瓢虫"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book identifies Varroa destructor as the 'vampire mite' that clings to adult bees and sucks their blood, leaving wounds prone to infection.", "zh": "书中将狄斯瓦螨称为“吸血鬼螨”，它附着在成年蜜蜂身上吸血，留下易感染的伤口。"}}, {"q": {"en": "According to the book, roughly how many managed honeybee colonies existed in the 1940s versus today?", "zh": "根据本书，20世纪40年代的受管理蜂群大约有多少，如今又有多少？"}, "options": [{"en": "About 5 million in the 1940s, and about half that today.", "zh": "20世纪40年代约500万，如今约其一半。"}, {"en": "About 100 in the 1940s.", "zh": "40年代约100群。"}, {"en": "About 1 million then and 10 million now.", "zh": "当时约100万，现在约1000万。"}, {"en": "The same number, 2 million.", "zh": "数量相同，都是200万。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book states managed honeybee colonies declined from five million in the 1940s to half that number today.", "zh": "书中说受管理蜂群从20世纪40年代的500万下降到如今的一半。"}}, {"q": {"en": "The book uses a 'Who's Who in the Hive' feature with diagrams of queen, drone, and worker. What does this text feature do?", "zh": "本书用“蜂群众生相”板块配蜂王、雄蜂、工蜂图示，这一文本板块起什么作用？"}, "options": [{"en": "It helps readers distinguish the roles of different bees.", "zh": "帮助读者区分不同蜜蜂的角色。"}, {"en": "It teaches how to cook honey.", "zh": "教人如何用蜂蜜烹饪。"}, {"en": "It lists beekeeping laws.", "zh": "列出养蜂法规。"}, {"en": "It shows a world map.", "zh": "展示世界地图。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The feature labels each type (queen lays eggs, drones mate, workers guard and clean) so readers can tell them apart.", "zh": "该板块标注了各类蜜蜂（蜂王产卵、雄蜂交配、工蜂守卫清洁），便于读者区分。"}}, {"q": {"en": "The author frames the book with the focus question about factors in bee disappearance and presents multiple suspected causes. What does this structure do?", "zh": "作者以“蜜蜂消失的因素”为焦点问题开篇，并列出多个可疑原因，这种结构起到什么作用？"}, "options": [{"en": "It frames the book like a detective investigation, or 'the case.'", "zh": "把全书框架成一次侦探式的调查，即“案件”。"}, {"en": "It gives the final answer immediately.", "zh": "它立刻给出最终答案。"}, {"en": "It tells a fairy tale.", "zh": "它讲了一个童话。"}, {"en": "It reviews a movie.", "zh": "它在评论一部电影。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The title 'The Case of the Disappearing Honeybees' and the focus question present the mystery as something scientists must investigate like detectives.", "zh": "书名《消失的蜜蜂之谜》与焦点问题把这一谜题呈现为科学家需像侦探般调查的案件。"}}, {"q": {"en": "Connecting monoculture farming and systemic pesticides, what combined problem do they create for bees?", "zh": "将单一作物农业与内吸性农药联系起来，它们给蜜蜂造成了什么综合问题？"}, "options": [{"en": "Single-crop farms leave bees without food after blooming, while pesticides may weaken their immune systems.", "zh": "单一作物农场在花期后使蜜蜂无食可寻，而农药可能削弱其免疫系统。"}, {"en": "They make bees stronger.", "zh": "它们让蜜蜂更强壮。"}, {"en": "They have no effect on bees.", "zh": "它们对蜜蜂毫无影响。"}, {"en": "They only affect flowers.", "zh": "它们只影响花。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Monoculture offers only one blooming season (no pollen afterward), and systemic pesticides may weaken bees' immune systems, allowing pathogens to take hold.", "zh": "单一农业只提供一个花期（之后无花粉），而内吸性农药可能削弱蜜蜂免疫系统，使病原体乘虚而入。"}}, {"q": {"en": "Why does the book note that Australia has not seen the same bee problems?", "zh": "本书为何指出澳大利亚没有出现同样的蜜蜂问题？"}, "options": [{"en": "Its winters are mild, it doesn't move bees between monocultures, and the Varroa mite hasn't reached there.", "zh": "其冬季温和、不将蜜蜂在单一作物间迁移，且狄斯瓦螨尚未到达。"}, {"en": "Australia has no bees.", "zh": "澳大利亚没有蜜蜂。"}, {"en": "Australia banned all farming.", "zh": "澳大利亚禁止一切农业。"}, {"en": "Australia uses more pesticides.", "zh": "澳大利亚使用更多农药。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The 'Do You Know?' note says Australia's short mild winters, lack of migratory beekeeping, and absence of the mite help explain its healthier bees.", "zh": "“你知道吗？”指出，澳大利亚冬季短而温和、不实行迁徙养蜂且尚无该螨，有助于解释其蜜蜂更健康。"}}, {"q": {"en": "The author's main purpose in writing this book is to...", "zh": "作者写这本书的主要目的是……"}, "options": [{"en": "Explain the mystery of disappearing honeybees and what people can do to help.", "zh": "解释蜜蜂消失之谜，以及人们可以如何帮忙。"}, {"en": "Persuade readers to fear all insects.", "zh": "劝读者害怕所有昆虫。"}, {"en": "Teach how to make candles.", "zh": "教人制作蜡烛。"}, {"en": "Describe a fictional story.", "zh": "讲述一个虚构故事。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book investigates CCD's possible causes and ends with a 'Help the Bees' section on actions people can take, showing an explanatory and helpful purpose.", "zh": "本书探究CCD的可能成因，并以“帮助蜜蜂”一节收尾，说明其解释性与助人目的。"}}, {"q": {"en": "By ending with 'Help the Bees' suggestions (wildflowers, sanctuaries, local apiaries), what perspective does the author convey?", "zh": "以“帮助蜜蜂”的建议（野花、庇护所、本地蜂场）结尾，作者传达了怎样的观点？"}, "options": [{"en": "Individuals and communities can take action to protect bees while science finds answers.", "zh": "在科学寻找答案的同时，个人与社区都能采取行动保护蜜蜂。"}, {"en": "Only scientists can help.", "zh": "只有科学家能帮忙。"}, {"en": "Bees are hopeless.", "zh": "蜜蜂已无可救药。"}, {"en": "People should ignore the problem.", "zh": "人们应忽视这一问题。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The 'Help the Bees' section urges readers to create bee-friendly environments, showing the author believes action matters alongside research.", "zh": "“帮助蜜蜂”一节呼吁读者营造对蜂友好的环境，表明作者相信行动与研究同样重要。"}}], "extended": {"prompt": {"en": "Write a letter to the editor persuading readers to help save honeybees. Use what you learned about their importance and how to help.", "zh": "给编辑写一封信，劝说读者帮助拯救蜜蜂。运用你学到的蜜蜂重要性与帮助方法。"}, "guidance": {"en": ["State why honeybees matter (pollination, one in three bites of food).", "Suggest concrete actions like planting wildflowers or supporting local beekeepers."], "zh": ["说明蜜蜂为何重要（授粉、每三口食物就有一口靠它们）。", "提出具体行动，如种植野花或支持本地养蜂人。"]}}};</script>
