<script>window.BOOK = {"slug": "the-wind-in-the-willows-part-3", "title": "The Wind in the Willows (Part 3)", "titleZh": "柳林风声（第三部分）", "level": "Z1", "genre": "Narrative", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Why does Rat keep putting off Mole's wish to meet Badger?", "zh": "河鼠为什么一直推迟鼹鼠想见獾的愿望？"}, "options": [{"en": "Because Badger lives in the middle of the Wild Wood, hates society and invitations, and is very shy.", "zh": "因为獾住在野树林的深处，讨厌社交和请客，而且非常害羞。"}, {"en": "Because Badger is away on a long vacation.", "zh": "因为獾外出度长假了。"}, {"en": "Because Rat does not know Badger at all.", "zh": "因为河鼠根本不认识獾。"}, {"en": "Because Badger only visits in summer.", "zh": "因为獾只在夏天来访。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Rat says Badger 'hates Society, and invitations, and dinner' and 'He's so very shy,' and lives in 'the very middle of the Wild Wood.'", "zh": "河鼠说獾'讨厌社交、请客和晚宴'，而且'非常害羞'，住在'野树林的最深处'。"}}, {"q": {"en": "What terrifies Mole when he enters the Wild Wood alone?", "zh": "当鼹鼠独自进入野树林时，是什么把他吓坏了？"}, "options": [{"en": "Evil faces peering from holes, eerie whistling, and the pattering of many little feet closing in on him.", "zh": "从洞里窥视的邪恶面孔、诡异的口哨声，以及越来越近的许多小脚啪嗒声。"}, {"en": "A friendly rabbit offering him food.", "zh": "一只友好的兔子给他食物。"}, {"en": "A sunny meadow full of flowers.", "zh": "一片开满花的阳光草地。"}, {"en": "Badger inviting him to dinner.", "zh": "獾邀请他吃晚饭。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Mole sees 'a little evil wedge-shaped face' in holes, hears 'the whistling began,' and 'the pattering began' of little feet all around him.", "zh": "鼹鼠看见洞里'一张邪恶的楔形小脸'，听见'口哨声响起'，以及四面八方'啪嗒啪嗒'的小脚声。"}}, {"q": {"en": "How does Rat prepare to rescue Mole?", "zh": "河鼠是如何准备去营救鼹鼠的？"}, "options": [{"en": "He straps on a belt with pistols and takes a stout cudgel before heading into the wood.", "zh": "他系上腰带、别上两支手枪，并拿上一根结实的木棍，然后走进树林。"}, {"en": "He calls the police for help.", "zh": "他打电话叫警察帮忙。"}, {"en": "He asks Toad to drive them there.", "zh": "他请蟾蜍开车送他们去。"}, {"en": "He brings only a picnic basket.", "zh": "他只带了一个野餐篮。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The text says Rat 'strapped a belt round his waist, shoved a brace of pistols into it, took up a stout cudgel... and set off for the Wild Wood.'", "zh": "文中写道，河鼠'系上腰带，别上一对枪，抄起一根结实木棍……朝野树林出发'。"}}, {"q": {"en": "What clue first leads Rat to realize they are at Badger's door?", "zh": "是什么线索让河鼠首先意识到他们正站在獾的家门口？"}, "options": [{"en": "Mole cuts his shin on something metal; Rat finds a door scraper, then a doormat, and finally a green door with 'Mr. Badger' on a brass plate.", "zh": "鼹鼠被金属物划伤了小腿；河鼠先找到擦鞋刮器，再找到门垫，最后发现一扇绿色小门，黄铜牌上写着'獾先生'。"}, {"en": "They see Toad waiting outside the door.", "zh": "他们看见蟾蜍在门外等候。"}, {"en": "A signpost points to Toad Hall.", "zh": "一块路标指向蟾蜍宫。"}, {"en": "The River suddenly appears in the woods.", "zh": "河流突然出现在树林里。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Rat reasons from the cut that it was 'a sharp edge of something in metal,' then digs up a door scraper, a doormat, and at last 'a solid-looking little door painted a dark green' with Mr. Badger's plate.", "zh": "河鼠由伤口推断是'金属利刃'，继而挖出擦鞋刮器、门垫，最终发现'一扇漆成深绿色的小门'，上面有獾先生的铜牌。"}}, {"q": {"en": "The author describes the snow changing the wood: 'Holes, hollows, pools, pitfalls... were vanishing fast.' What does this imagery show?", "zh": "作者描写雪改变了树林：'坑洞、洼地、水潭、陷阱……迅速消失了。'这段意象表现了什么？"}, "options": [{"en": "The snow covers the dangers and transforms the frightening wood into something calm and beautiful.", "zh": "雪掩盖了各种危险，把令人恐惧的树林变成了平静而美丽的地方。"}, {"en": "The snow makes the wood even more dangerous.", "zh": "雪让树林变得更加危险。"}, {"en": "The wood turns into a village.", "zh": "树林变成了一座村庄。"}, {"en": "The animals all move away.", "zh": "动物们全都搬走了。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The snow lays 'a gleaming carpet of faery' over the menaces, so the wood that 'had been so dreadful' now looks 'in a changed aspect.'", "zh": "雪在那些威胁之上铺开'一张仙子的闪光地毯'，于是'曾如此可怕'的树林呈现出'另一番模样'。"}}, {"q": {"en": "Rat calls Mole 'dull-witted' and 'thick-headed' during the search. How does this dialogue develop the story?", "zh": "搜寻中，河鼠称鼹鼠'迟钝'、'笨头笨脑'。这段对话如何推动情节？"}, "options": [{"en": "It creates humor and shows Rat's cleverness contrasting with Mole's confusion, building up to the discovery of Badger's door.", "zh": "它制造了幽默，并凸显了河鼠的机敏与鼹鼠的懵懂之间的反差，为最终发现獾的家做铺垫。"}, {"en": "It shows the two are enemies.", "zh": "它说明两人是敌人。"}, {"en": "It explains why Badger is mean.", "zh": "它解释了獾为何刻薄。"}, {"en": "It describes the weather.", "zh": "它在描写天气。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Rat's teasing ('you dull-witted animal') followed by Mole's silly talk of a 'door scraper' builds comic tension before the real clue appears.", "zh": "河鼠的调侃（'你这迟钝的动物'）与鼹鼠关于'擦鞋刮器'的傻话，在真正线索出现前制造了喜剧张力。"}}, {"q": {"en": "What does the 'Terror of the Wild Wood' represent for the smaller animals?", "zh": "对体型较小的动物们来说，'野树林的恐惧'代表着什么？"}, "options": [{"en": "A dreaded experience that field and hedgerow dwellers fear, which Rat tried to shield Mole from.", "zh": "一种田野和树篱小动物们都畏惧的可怕经历，也是河鼠一直想保护鼹鼠免受的遭遇。"}, {"en": "A fun game the animals play.", "zh": "动物们玩的一种有趣游戏。"}, {"en": "A type of delicious food.", "zh": "一种美味的食物。"}, {"en": "The name of Badger's pet.", "zh": "獾的宠物的名字。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Mole 'knew it at last... that dread thing which other little dwellers in field and hedgerow had encountered... that thing which the Rat had vainly tried to shield him from.'", "zh": "鼹鼠'终于明白了……那种田野与树篱小动物都曾遭遇的可怕事物……也就是河鼠曾徒劳地想保护他免受的恐惧'。"}}, {"q": {"en": "Based on Rat's explanation, why are river bankers usually safe in the Wild Wood?", "zh": "根据河鼠的解释，为何'河岸居民'在野树林里通常安全？"}, "options": [{"en": "They go in couples and know passwords, signs, plants, and verses that protect them—things small, alone animals do not know.", "zh": "他们总是结伴而去，并且懂得口令、暗号、护身植物和咒语——这些是落单的小动物所不懂的。"}, {"en": "They carry large sums of money.", "zh": "他们携带大量金钱。"}, {"en": "They are faster than all the other animals.", "zh": "他们比所有其他动物都跑得快。"}, {"en": "The Wild Wood is actually their home.", "zh": "野树林其实是他们的家。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Rat says river bankers come 'in couples' and know 'passwords, and signs, and sayings which have power... plants you carry... verses you repeat.'", "zh": "河鼠说河岸居民'至少结伴'而去，并懂得'口令、暗号、有魔力的话语……随身带的植物……反复念的咒语'。"}}, {"q": {"en": "What does the author suggest about friendship through Rat's rescue of Mole?", "zh": "通过河鼠营救鼹鼠，作者表达了关于友情的什么看法？"}, "options": [{"en": "True friends look out for each other and brave danger to help, even when the other made a foolish choice.", "zh": "真正的朋友会彼此关照，甚至不惜冒险去帮助对方，即便对方做了愚蠢的选择。"}, {"en": "Friends should always let each other get lost.", "zh": "朋友应当任由对方迷路。"}, {"en": "Only rich animals can be friends.", "zh": "只有富有的动物才能做朋友。"}, {"en": "Friendship is not important in the book.", "zh": "友情在书中并不重要。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Rat risks the frightening wood with pistols and a cudgel to find Mole, showing loyal friendship despite Mole's mistake.", "zh": "河鼠带着枪和木棍冒险进入可怕的树林去寻找鼹鼠，显示出忠诚的友情，尽管鼹鼠犯了错。"}}, {"q": {"en": "How does the author build suspense in this part?", "zh": "在这一部分中，作者如何营造悬念？"}, "options": [{"en": "By using mounting sensory details—sight, sound, and darkness—to make Mole's fear and the wood's danger feel real.", "zh": "通过不断叠加的感官描写——视觉、声音和黑暗——让读者真切感受到鼹鼠的恐惧与树林的危险。"}, {"en": "By describing a happy picnic.", "zh": "通过描写一场快乐的野餐。"}, {"en": "By listing facts about plants.", "zh": "通过列举关于植物的知识。"}, {"en": "By explaining how to build a boat.", "zh": "通过讲解如何造船。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The slow sequence of 'faces,' then 'whistling,' then 'patterning' footsteps draws the reader tighter into Mole's growing panic.", "zh": "由'面孔'到'口哨'再到'啪嗒'脚步声的递进式描写，把读者越拉越紧，浸入鼹鼠不断加剧的恐慌。"}}], "extended": {"prompt": {"en": "Mole ignores a warning and gets into trouble, but a friend rescues him. Tell about a time you were warned, wouldn't listen, and learned a lesson. What happened?", "zh": "鼹鼠无视警告惹上麻烦，却被朋友所救。请讲述一次你被警告却没听、并从中吸取教训的经历，发生了什么？"}, "guidance": {"en": ["Describe the warning you received and what you did instead.", "Explain what you learned from the consequence and any help you received."], "zh": ["描述你收到的警告，以及你反而做了什么。", "说明你从后果以及得到的帮助中学到了什么。"]}}};</script>
