<script>window.BOOK = {"slug": "biomimicry", "title": "Biomimicry", "titleZh": "仿生学", "level": "Z1", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "What does the word 'biomimicry' mean, according to the book?", "zh": "根据书中内容，'biomimicry（仿生学）'一词是什么意思？"}, "options": [{"en": "Bio means 'life' and mimic means 'to copy'; it is the science of learning from nature's designs.", "zh": "bio意为'生命'，mimic意为'模仿'；它是向自然设计学习的科学。"}, {"en": "Building museums out of stone.", "zh": "用石头建博物馆。"}, {"en": "Studying only dinosaurs.", "zh": "只研究恐龙。"}, {"en": "Writing comic books.", "zh": "写漫画书。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says biomimicry comes from 'bio' (life) and 'mimic' (to copy); it learns from nature's adaptations rather than using the living things themselves.", "zh": "书中说仿生学源自bio（生命）与mimic（模仿）；它向自然的适应之道学习，而非直接使用生物本身。"}}, {"q": {"en": "Velcro was inspired by which natural object, according to the book?", "zh": "根据书中内容，维可牢搭扣（Velcro）的灵感来自哪种自然物体？"}, "options": [{"en": "Burrs (seeds with tiny hooks that caught on fabric and animal hair).", "zh": "牛蒡（带有小钩的种子，能钩住布料和动物毛发）。"}, {"en": "A lotus leaf.", "zh": "荷叶。"}, {"en": "A kingfisher's beak.", "zh": "翠鸟的喙。"}, {"en": "A termite mound.", "zh": "白蚁丘。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says Swiss engineer Georges de Mestral noticed burrs stuck to his dog via tiny hooks, and from that created Velcro, which even helped astronauts go to the Moon.", "zh": "书中说瑞士工程师乔治·德·梅斯特拉尔注意到牛蒡用细小钩子粘在狗身上，由此发明了维可牢，它甚至还帮助宇航员登上月球。"}}, {"q": {"en": "Japan's Shinkansen bullet train had a noise problem leaving tunnels. Its nose was redesigned based on which animal?", "zh": "日本新干线子弹头列车驶出隧道时有噪音问题。它的车头是根据哪种动物重新设计的？"}, "options": [{"en": "The kingfisher, whose beak lets it dive without a splash.", "zh": "翠鸟，其喙让它入水不溅起水花。"}, {"en": "The elephant.", "zh": "大象。"}, {"en": "The penguin.", "zh": "企鹅。"}, {"en": "The kangaroo.", "zh": "袋鼠。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says designers based the new train nose on a kingfisher's beak, which solved the booming noise and made the train faster and more efficient.", "zh": "书中说设计师以翠鸟的喙为蓝本设计新车头，解决了轰鸣噪音，并让列车更快、更高效。"}}, {"q": {"en": "The Eastgate Centre in Harare, Zimbabwe, stays cool without air conditioning by mimicking what?", "zh": "津巴布韦哈拉雷的Eastgate Centre不用空调就能保持凉爽，是模仿了什么？"}, "options": [{"en": "Termite mounds, which use tunnels and vents to keep a constant temperature.", "zh": "白蚁丘，利用通道和通风口保持恒定温度。"}, {"en": "A shark's skin.", "zh": "鲨鱼皮。"}, {"en": "A cat's eye.", "zh": "猫眼。"}, {"en": "A peacock's feathers.", "zh": "孔雀羽毛。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says termite mounds stay cool via tunnels and vents; the Eastgate Centre copied this and uses only 10 percent of the energy of a normal building of its size.", "zh": "书中说白蚁丘靠通道和通风口保持凉爽；Eastgate Centre加以模仿，能耗仅为同等规模普通建筑的10%。"}}, {"q": {"en": "The book carefully defines biomimicry as learning FROM nature, 'not using living things.' Why make this distinction?", "zh": "本书特意把仿生学定义为向自然'学习'，'而非使用生物本身'。为何作此区分？"}, "options": [{"en": "To clarify that biomimicry copies nature's ideas, not the organisms themselves.", "zh": "说明仿生学模仿的是自然的构思，而非生物本身。"}, {"en": "To say nature is unimportant.", "zh": "说自然不重要。"}, {"en": "To describe a movie.", "zh": "描述一部电影。"}, {"en": "To list the chapters.", "zh": "列出章节。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The author defines the key term precisely so readers do not confuse biomimicry with simply harvesting or using living organisms.", "zh": "作者精确界定这一关键术语，以免读者把仿生学误认为只是采集或使用生物。"}}, {"q": {"en": "Each example (Velcro, Cat's Eye, moth's eye, lotus leaf, kingfisher) follows the same pattern: a natural observation leads to a human invention. What does this repeated structure help the reader do?", "zh": "每个例子（维可牢、猫眼、蛾眼、荷叶、翠鸟）都遵循同一模式：自然观察引出人类发明。这种重复结构帮助读者做什么？"}, "options": [{"en": "Recognize the consistent 'nature to invention' pattern of biomimicry.", "zh": "识别仿生学'自然到发明'的一致模式。"}, {"en": "Memorize animal names only.", "zh": "只记住动物名称。"}, {"en": "Learn a recipe.", "zh": "学一道菜谱。"}, {"en": "Count the chapters.", "zh": "数章节数量。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "By repeating the observe-nature-then-invent structure, the author teaches the method of biomimicry clearly through multiple examples.", "zh": "作者通过反复使用'观察自然再发明'的结构，用多个例子清晰传授仿生学的方法。"}}, {"q": {"en": "The book connects human production to environmental harm (fossil fuels, greenhouse gases, waste) and contrasts it with nature. What lesson does biomimicry offer?", "zh": "书中把人类生产与环境危害（化石燃料、温室气体、废弃物）联系起来，并与自然对比。仿生学提供了什么启示？"}, "options": [{"en": "We can make things more sustainably by copying nature's low-waste systems.", "zh": "我们可以模仿自然低废弃的系统，更可持续地制造物品。"}, {"en": "We should burn more fossil fuels.", "zh": "我们应当烧更多化石燃料。"}, {"en": "Nature wastes everything.", "zh": "自然浪费一切。"}, {"en": "Garbage is good.", "zh": "垃圾是好事。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says nature works in sustainable ways with little waste, while human production creates pollution; biomimicry lets us learn to live more sustainably.", "zh": "书中说自然以低废弃的可持续方式运作，而人类生产造成污染；仿生学让我们学会更可持续地生活。"}}, {"q": {"en": "The book links several examples (lotus leaf and self-cleaning paint, coral and cement). What bigger idea connects them?", "zh": "本书把多个例子联系起来（荷叶与自洁涂料、珊瑚与水泥）。是什么更大的思想把它们串在一起？"}, "options": [{"en": "Nature provides models that can solve human problems in building and cleaning.", "zh": "自然提供了可解决人类建造与清洁问题的范本。"}, {"en": "Only animals matter.", "zh": "只有动物才重要。"}, {"en": "Plants cannot help us.", "zh": "植物帮不了我们。"}, {"en": "Inventions come from luck only.", "zh": "发明只靠运气。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Across examples, the book shows that studying natural structures (a leaf's surface, coral's use of CO2) leads to human technologies like self-cleaning coatings and cement.", "zh": "全书通过多个例子表明，研究自然结构（叶片表面、珊瑚利用二氧化碳）能催生自洁涂层、水泥等人类技术。"}}, {"q": {"en": "The author describes future possibilities like spider silk (three times stronger than steel) and fish antifreeze. Why include these?", "zh": "作者描述了蜘蛛丝（强度是钢的三倍）和鱼类防冻液等未来可能。为何加入这些？"}, "options": [{"en": "To show the promising future and unsolved challenges biomimicry may address.", "zh": "展示仿生学可能应对的有前景的未来与未解挑战。"}, {"en": "To teach readers how to fish.", "zh": "教读者钓鱼。"}, {"en": "To list the chapters.", "zh": "列出章节。"}, {"en": "To describe a sport.", "zh": "描述一项运动。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "By presenting future applications, the author suggests biomimicry's potential to solve upcoming challenges such as medicine and ocean exploration.", "zh": "通过呈现未来应用，作者暗示仿生学在医学、海洋探索等方面解决未来挑战的潜力。"}}, {"q": {"en": "What is the author's main purpose in writing Biomimicry?", "zh": "作者写《仿生学》的主要目的是什么？"}, "options": [{"en": "To explain what biomimicry is and the important lessons we learn from nature.", "zh": "解释仿生学是什么，以及我们向自然学到的重要启示。"}, {"en": "To teach readers how to ski.", "zh": "教读者滑雪。"}, {"en": "To argue that nature should be ignored.", "zh": "主张应当忽视自然。"}, {"en": "To describe a fairy tale.", "zh": "描述一个童话。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book's Focus Question asks what important lessons we have learned from biomimicry, and the text defines the field and gives many real examples.", "zh": "本书聚焦问题分析我们从仿生学学到了什么重要启示，正文界定了这一领域并给出许多真实例子。"}}], "extended": {"prompt": {"en": "The book says 'the most interesting and efficient solutions to our challenges may be right under our noses' in nature. Name a plant or animal adaptation from the book and explain how it could inspire a useful invention you would like to see.", "zh": "书中说'应对挑战最有趣、最高效的方案可能就在我们眼前的自然中'。说出书中一种植物或动物的适应之道，并解释它如何启发你希望看到的实用发明。"}, "guidance": {"en": ["Pick an example such as the lotus leaf, kingfisher, termite mound, or shark skin.", "Explain the natural feature and the human problem it could solve."], "zh": ["选一个例子，如荷叶、翠鸟、白蚁丘或鲨鱼皮。", "解释其天然特征，以及它能解决的人类问题。"]}}};</script>
