<script>window.BOOK = {"slug": "beowulf", "title": "Beowulf", "titleZh": "贝奥武甫", "level": "Z1", "genre": "Narrative", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Who built the great mead-hall called Heorot, and why did Grendel attack it?", "zh": "是谁建造了名为赫罗特(Heorot)的巨大蜜酒厅？葛rendel为何攻击它？"}, "options": [{"en": "Beowulf built it to celebrate his victories. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "贝奥武甫建造它以庆祝自己的胜利。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "King Arthur built it for his knights.", "zh": "亚瑟王为他的骑士建造了它。"}, {"en": "Grendel built it as his home.", "zh": "葛rendel建造它作为自己的家。"}, {"en": "King Hrothgar built it; Grendel, a wicked monster from the moors, attacked because he preyed on the sleeping thanes.", "zh": "赫罗斯加国王建造了它；来自荒原的邪恶怪物葛rendel攻击它，是因为他猎食那些沉睡的 warriors（亲兵）。"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The book says old King Hrothgar built Heorot, a great mead-hall covered with gold, and that Grendel, a wicked monster out of the moors, came and seized thirty thanes in their sleep.", "zh": "书中说老国王赫罗斯加建造了赫罗特——一座镶金的大型蜜酒厅；而来自荒原的邪恶怪物葛rendel来袭，在睡梦中抓走了三十名亲兵。"}}, {"q": {"en": "How did Beowulf choose to fight Grendel, and why?", "zh": "贝奥武甫选择以怎样的方式与葛rendel战斗？为什么？"}, "options": [{"en": "With bare hands, bearing neither sword, shield, nor buckler, because Grendel despised weapons.", "zh": "赤手空拳，既不带剑也不持盾与圆盾，因为葛rendel鄙视武器。"}, {"en": "With a bow and arrows from a distance.", "zh": "用弓箭在远处射击。"}, {"en": "With the help of the king's army.", "zh": "在国王军队的协助下作战。"}, {"en": "With a giant sword enchanted by giants. according to some versions of the story in an early draft of the book", "zh": "用一把巨人施过魔法的巨剑。（按书中另一种说法）（在书的早期草稿中）"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Beowulf tells Hrothgar he will have the task alone and 'bear neither sword, nor shield, nor buckler' because he knows the terrible monster despises weapons and he will fight hand to hand.", "zh": "贝奥武甫对赫罗斯加说他要独自承担任务，'既不带剑，也不持盾与圆盾'，因为他知道这恐怖的怪物鄙视武器，他要徒手搏斗。"}}, {"q": {"en": "After Beowulf defeats Grendel, who comes to avenge Grendel's death?", "zh": "贝奥武甫击败葛rendel之后，是谁前来为葛rendel复仇？"}, "options": [{"en": "The thief who stole the gold cup.", "zh": "偷走金杯的奴隶。"}, {"en": "King Hrothgar himself.", "zh": "赫罗斯加国王本人。"}, {"en": "Grendel's mother, a furious troll-woman who lived in a dreadful pool.", "zh": "葛rendel的母亲，一位居住在恐怖水池中的、怒火中烧的母巨魔。"}, {"en": "A dragon guarding a hoard of gold. according to some versions of the story in an early draft of the book", "zh": "守护宝藏的巨龙。（按书中另一种说法）（在书的早期草稿中）"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "The book says Grendel was dead but his mother still lived; furious at her son's death, she crept to the hall and killed the king's dearest friend, prompting Beowulf to hunt her.", "zh": "书中说葛rendel死了，但他的母亲还活着；她因儿子之死怒不可遏，潜入大厅杀死了国王最亲密的朋友，促使贝奥武甫去追猎她。"}}, {"q": {"en": "In the underwater fight with Grendel's mother, what weapon finally kills her?", "zh": "在与葛rendel母亲的水下搏斗中，最终是什么武器杀死了她？"}, "options": [{"en": "Beowulf's own sword, which never failed him. according to some versions of the story", "zh": "贝奥武甫自己的剑，那把从未让他失望的剑。（按书中另一种说法）"}, {"en": "An old giant-made sword Beowulf found on the wall of her hall.", "zh": "贝奥武甫在她大厅墙壁上发现的一把古老巨人所造的剑。"}, {"en": "A magic arrow.", "zh": "一支魔法箭。"}, {"en": "A spear thrown by his men above.", "zh": "岸上同伴投下的一杆长矛。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Beowulf's own sword would not bite, but he saw an old sword of huge size, the handiwork of giants, on the wall, seized it, and smote the troll-dam so that she gave up her life.", "zh": "贝奥武甫自己的剑咬不住敌人，但他看见墙上有一把巨人打造的巨剑，便抓起它猛击母巨魔，令其丧命。"}}, {"q": {"en": "The book is adapted from 'an epic poem' (noted in the Connections). Which element below is typical of an epic and shown in this tale?", "zh": "书中'延伸活动'提到本书改编自'一部史诗'(an epic poem)。下列哪一项是史诗的典型特征，并在本故事中有所体现？"}, "options": [{"en": "A short, humorous poem about daily village life. according to some versions of the story in an early draft of the book", "zh": "一首关于乡村日常生活的短小幽默诗。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "A factual news report about a real battle.", "zh": "一篇关于真实战役的事实性新闻报道。"}, {"en": "A hero of superhuman strength who performs great deeds and faces monsters and a dragon.", "zh": "一位拥有超人力量、完成伟大功绩、并与怪物及巨龙战斗的英雄。"}, {"en": "A recipe written in rhyme.", "zh": "一首押韵的食谱。"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "The book presents Beowulf with the strength of thirty men, a hero who battles Grendel, his mother, and a dragon—classic features of an epic poem as noted in the Writing connection.", "zh": "本书呈现了拥有三十人之力的贝奥武甫——一位先后与葛rendel、其母亲及巨龙战斗的英雄，这正是'写作'延伸活动中提到的史诗典型特征。"}}, {"q": {"en": "At the end, when Beowulf dies after fighting the dragon, what does he ask Wiglaf to do?", "zh": "故事结尾，贝奥武甫与巨龙战斗后死去，他吩咐威格拉夫(Wiglaf)去做什么？"}, "options": [{"en": "Build a lofty mound on the headland by the sea called Beowulf's Barrow to guide sailors.", "zh": "在海岬上建一座高耸的坟丘，称作'贝奥武甫之冢'，为水手指引方向。"}, {"en": "Bury the dragon's gold for himself.", "zh": "把巨龙的黄金据为己有、自行埋藏。"}, {"en": "Return to the king and claim the throne. according to some versions of the story in an early draft of the book", "zh": "回到国王那里并夺取王位。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Forget the battle ever happened.", "zh": "忘记这场战斗曾经发生。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Dying, Beowulf tells Wiglaf to make a lofty mound on the headland overlooking the sea, to be called Beowulf's Barrow, 'to guide sailors over the stormy seas.'", "zh": "弥留之际，贝奥武甫吩咐威格拉夫在海岬上建一座高耸的坟丘，称为'贝奥武甫之冢'，以'为水手指引穿越风暴之海的方向'。"}}, {"q": {"en": "Beowulf's final foe is a dragon awakened when a slave steals a gold cup from its hoard. What does this event show about the story's theme?", "zh": "贝奥武甫最后的敌人是一条因奴隶偷走金杯而惊醒的巨龙。这一事件揭示了故事的什么主题？"}, "options": [{"en": "That Beowulf was afraid of water. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "贝奥武甫怕水。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "That greed and a small act of theft can unleash destruction, tying wealth, fate, and a hero's final sacrifice together.", "zh": "贪婪与一次微小的偷窃会释放毁灭，将财富、命运与英雄最后的牺牲联系在一起。"}, {"en": "That the slave becomes king.", "zh": "那个奴隶当上了国王。"}, {"en": "That dragons are friendly pets.", "zh": "巨龙是友善的宠物。"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book shows a slave fleeing his master stumbled into the dragon's den and carried off a gold cup, which woke the dragon and brought fire upon the land—linking greed, fate, and Beowulf's final sacrifice.", "zh": "书中写一名逃离主人的奴隶偶然闯入巨龙巢穴并偷走一只金杯，惊醒了巨龙、令火焚大地——把贪婪、命运与贝奥武甫最后的牺牲联系起来。"}}, {"q": {"en": "When all of Beowulf's men flee except one, who stays to help him fight the dragon, and what does this reveal?", "zh": "当贝奥武甫所有的部下都逃走、只剩一人时，是谁留下来帮他对抗巨龙？这揭示了什么？"}, "options": [{"en": "The dragon's helper stays.", "zh": "巨龙的帮手留了下来。"}, {"en": "Wiglaf stays; this reveals true loyalty and contrasts with the other warriors' cowardice.", "zh": "威格拉夫留了下来；这揭示了真正的忠诚，并与其余战士的怯懦形成对比。"}, {"en": "King Hrothgar stays.", "zh": "赫罗斯加国王留了下来。"}, {"en": "Grendel's mother stays. according to some versions of the story in an early draft of the book", "zh": "葛rendel的母亲留了下来。（按书中另一种说法）（在书的早期草稿中）"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says Beowulf's men crept away to the woods, and 'one, and one only, Wiglaf' ran through smoke and flame to help his lord, showing loyalty against the others' flight.", "zh": "书中说贝奥武甫的部下都逃进了树林，'唯有一人，名叫威格拉夫'穿过烟火前去助主，以忠诚对照了他人的溃逃。"}}, {"q": {"en": "The book's Focus Question asks 'What is a hero?' Based on Beowulf's words and actions, what idea of heroism does the author present?", "zh": "本书的聚焦问题是'什么是英雄？'。根据贝奥武甫的言行，作者呈现了怎样的英雄观？"}, "options": [{"en": "A hero uses strength and courage to protect others and faces death willingly for his people.", "zh": "英雄以力量与勇气保护他人，并甘愿为人民直面死亡。"}, {"en": "A hero rules by fear.", "zh": "英雄靠恐惧来统治。"}, {"en": "A hero avoids all danger and stays safe. according to some versions of the story in an early draft of the book", "zh": "英雄避开一切危险、保全自身。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "A hero seeks treasure only for himself.", "zh": "英雄只为自已搜罗财宝。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Through Beowulf's vow to fight alone, his protection of Hrothgar's people, and his final stand for his country, the author presents heroism as courage and self-sacrifice for others.", "zh": "通过贝奥武甫独自迎战的誓言、对赫罗斯加子民的守护，以及为国家奋战到最后一刻，作者将英雄主义呈现为勇气与为他人自我牺牲。"}}, {"q": {"en": "Why does the author include the detail that Beowulf ruled wisely for fifty years before the dragon's attack?", "zh": "作者为何加入'贝奥武甫在巨龙来袭前贤明地统治了五十年'这一细节？"}, "options": [{"en": "To list the years of the festival.", "zh": "列出节日的年份。"}, {"en": "To prove the dragon was his friend. according to some versions of the story in an early draft of the book", "zh": "证明巨龙曾是他的朋友。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "To explain how to build a hall.", "zh": "解释如何建造大厅。"}, {"en": "To show he was not only a warrior but a just king, deepening the loss when he falls.", "zh": "表明他不仅是战士，也是一位公正的国王，从而加深他陨落时的悲剧感。"}], "answer": 3, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book notes Beowulf 'well he governed the land for fifty years,' showing his wisdom as a ruler and making his final, fatal sacrifice for his people more meaningful.", "zh": "书中写贝奥武甫'贤明地统治了这片土地五十年'，展现了他作为统治者的智慧，也使他为人民做出的最后牺牲更具分量。"}}], "extended": {"prompt": {"en": "Beowulf says he would be ashamed to fight the dragon with a large band because he had killed Grendel alone as a youth. If you were a warrior in his hall, would you have stayed like Wiglaf or fled like the others? Explain using details from the story.", "zh": "贝奥武甫说，既然年轻时曾独自杀死葛rendel，如今与巨龙作战若带大队人马他会感到羞耻。如果你是厅中一名战士，你会像威格拉夫那样留下，还是像其他人那样逃走？请用故事中的细节说明。"}, "guidance": {"en": ["Mention that all but Wiglaf fled to the woods to save themselves.", "You might contrast Wiglaf's loyalty with the king's earlier boast about facing the dragon alone."], "zh": ["提及除威格拉夫外所有人都逃进树林自保。", "你可以将威格拉夫的忠诚与国王早先'独自面对巨龙'的豪言作对比。"]}}};</script>
