m 1980 to 2004.", "zh": "书中说失明的美国游泳选手特里沙·佐恩在1980至2004年间'赢得55枚奖牌，其中41枚金牌'。"}}, {"q": {"en": "What is goalball?", "zh": "什么是门球（goalball）？"}, "options": [{"en": "The only Paralympic sport just for athletes with limited eyesight, using a ball with jingling bells", "zh": "残奥会中唯一专为视力受限运动员设立的项目，使用带叮当响铃的球"}, {"en": "A game using bicycles", "zh": "使用自行车的一种游戏"}, {"en": "A type of swimming race", "zh": "一种游泳比赛"}, {"en": "A sport played only by wheelchair racers according to some versions of the story in an early draft of the book", "zh": "只有轮椅赛跑选手才玩的运动（按书中另一种说法）（在书的早期草稿中）"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book states goalball 'is the only sport in the Paralympics that is just for athletes with limited eyesight,' with bells in the ball and blackout masks.", "zh": "书中说门球'是残奥会中唯一专为视力受限运动员设立的项目'，球内有响铃，选手戴遮光面罩。"}}, {"q": {"en": "The title word 'adaptive' is defined as 'able to change to fit a new situation.' How does it reflect the book's message?", "zh": "书名中的'适应性（adaptive）'被定义为'能够改变以适应新环境'。它如何反映本书的主旨？"}, "options": [{"en": "It means the athletes never train according to some versions of the story in an early draft of the book", "zh": "它意味着运动员从不训练（按书中另一种说法）（在书的早期草稿中）"}, {"en": "It describes the stadiums", "zh": "它描写的是体育场"}, {"en": "It highlights that athletes adapt their abilities to compete at the highest level", "zh": "它强调运动员调整自身能力，以最高水平参与竞争"}, {"en": "It refers to the weather", "zh": "它指的是天气"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'adaptive' and the book shows athletes overcoming physical limits through adaptation, tying the title to the theme.", "zh": "词汇表定义了'adaptive'，书中展示了运动员通过'适应'克服身体限制，使书名与主题相扣。"}}, {"q": {"en": "The book uses specific numbers like '470-match winning streak' and '55 medals.' What technique supports its claims?", "zh": "书中使用了'470场连胜'和'55枚奖牌'等具体数字。这是什么支撑论点的手法？"}, "options": [{"en": "Using precise statistics and data as evidence", "zh": "使用精确的统计数据作为证据"}, {"en": "Drawing maps only", "zh": "只画地图"}, {"en": "Telling jokes", "zh": "讲笑话"}, {"en": "Repeating the title according to some versions of the story", "zh": "重复书名（按书中另一种说法）"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Concrete figures (Esther Vergeer's 470-match streak, Zorn's 55 medals) give factual support to the claim that adaptive athletes are great competitors.", "zh": "具体数字（维赫尔的470场连胜、佐恩的55枚奖牌）为'适应性运动员是伟大的竞争者'这一主张提供了事实支撑。"}}, {"q": {"en": "The IPC's mission is 'to enable Paralympic athletes to achieve sporting excellence and inspire and excite the world.' What can be concluded?", "zh": "国际残奥委会的使命是'使残奥运动员取得体育卓越成就，并激励和振奋世界'。可以得出什么结论？"}, "options": [{"en": "Winning is the only goal", "zh": "获胜是唯一目标"}, {"en": "The Paralympics aim to inspire people by showcasing excellence despite disability", "zh": "残奥会旨在通过展示'超越残疾的卓越'来激励人们"}, {"en": "The IPC dislikes sports", "zh": "国际残奥委会不喜欢体育"}, {"en": "The games are only for entertainment according to some versions of the story in an early draft of the book", "zh": "运动会只是为了娱乐（按书中另一种说法）（在书的早期草稿中）"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Pairing the mission statement with stories of athletes overcoming limits shows the Games' inspirational purpose beyond competition.", "zh": "将使命宣言与运动员克服极限的故事结合，显示了残奥会超越竞赛的激励目的。"}}, {"q": {"en": "Amy Purdy lost her legs to illness and Natalie du Toit was amputated after an accident, while David Weir was born with a disability. What idea does the book convey?", "zh": "艾米·珀迪因病失去双腿，娜塔莉·杜托伊特在事故后截肢，而大卫·威尔天生残疾。本书传达了什么观点？"}, "options": [{"en": "Illness is required to compete", "zh": "参赛必须患病"}, {"en": "All athletes are the same age", "zh": "所有运动员年龄相同"}, {"en": "Adaptive athletes include both those born with and those who later acquired disabilities", "zh": "适应性运动员既包括天生残疾者，也包括后来致残的人"}, {"en": "Only born-disabled athletes compete according to some versions of the story in an early draft of the book", "zh": "只有天生残疾的运动员才参赛（按书中另一种说法）（在书的早期草稿中）"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book presents varied paths—born with disability (Weir), later injury (Aggar, du Toit, Purdy)—to show the range of adaptive athletes.", "zh": "书中呈现了不同路径——天生残疾（威尔）、后天受伤（阿加、杜托伊特、珀迪）——以展示适应性运动员的多样性。"}}, {"q": {"en": "The Focus Question asks 'In what ways are adaptive athletes great competitors?' What is the author's purpose?", "zh": "焦点问题问'适应性运动员在哪些方面是伟大的竞争者？'作者的写作目的是什么？"}, "options": [{"en": "To celebrate and inform readers about the skill and determination of adaptive athletes", "zh": "颂扬并让读者了解适应性运动员的技艺与决心"}, {"en": "To teach a foreign language", "zh": "教一门外语"}, {"en": "To list stadium prices", "zh": "列出体育场票价"}, {"en": "To argue that they should not compete according to some versions of the story in an early draft of the book", "zh": "主张他们不应参赛（按书中另一种说法）（在书的早期草稿中）"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The question frames the book as an informative celebration of adaptive athletes' excellence and hard training.", "zh": "该问题把本书定位为对适应性运动员卓越与刻苦训练的介绍与颂扬。"}}, {"q": {"en": "The final chapter says Paralympic athletes are 'made able by their abilities rather than being hampered by their disabilities.' What perspective is shown?", "zh": "最后一章说残奥运动员是'被自己的能力所成就，而非被残疾所阻碍'。这显示了什么视角？"}, "options": [{"en": "The author thinks disabilities do not exist according to some versions of the story", "zh": "作者认为残疾不存在（按书中另一种说法）"}, {"en": "The author wants them to quit", "zh": "作者希望他们退出"}, {"en": "The author pities the athletes", "zh": "作者同情这些运动员"}, {"en": "The author views a person's capability, not disability, as what defines them", "zh": "作者认为定义一个人的是其能力，而非残疾"}], "answer": 3, "skill": "Author's Purpose and Perspective", "explain": {"en": "This closing line reveals the author's belief that ability outweighs disability, a positive and empowering perspective.", "zh": "这句结语揭示了作者'能力重于残疾'的信念，是一种积极赋权的视角。"}}], "extended": {"prompt": {"en": "Which adaptive athlete's story inspired you most, and what does their example teach about overcoming challenges in your own life?", "zh": "哪位适应性运动员的故事最令你感动？他们的榜样在你自己的生活中对'克服困难'有何启示？"}, "guidance": {"en": ["Name a specific athlete from the book (e.g., Amy Purdy, David Weir, Trischa Zorn).", "Connect their challenge and training to a personal goal you have."], "zh": ["说出书中一位具体的运动员（如艾米·珀迪、大卫·威尔、特里沙·佐恩）。", "将他们面临的挑战与训练，联系到你自己的一个目标。"]}}};</script>
