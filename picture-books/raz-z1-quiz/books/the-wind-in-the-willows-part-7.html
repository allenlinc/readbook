<script>window.BOOK = {"slug": "the-wind-in-the-willows-part-7", "title": "The Wind in the Willows (Part 7)", "titleZh": "柳林风声（第7部分）", "level": "Z1", "genre": "Narrative", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Who is missing at the start of Part 7, sending Rat and Mole on a night search?", "zh": "第7部分开头谁不见了，促使河鼠和鼹鼠连夜搜寻？"}, "options": [{"en": "Toad, who escaped prison according to some versions of the story", "zh": "越狱的蟾蜍（按书中另一种说法）"}, {"en": "The Rat himself", "zh": "河鼠自己"}, {"en": "Mole, who wandered off", "zh": "走失的鼹鼠"}, {"en": "Portly, Otter's young son", "zh": "水獭的儿子小波特利"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "Rat tells Mole, 'Little Portly is missing again,' and explains Otter is anxious because the child has not learned to swim well and may be near the weir.", "zh": "河鼠告诉鼹鼠“小波特利又不见了”，并说水獭很焦急，因为孩子还不太会游泳，可能靠近水坝。"}}, {"q": {"en": "What divine being do Rat and Mole find on the island at the weir?", "zh": "河鼠和鼹鼠在水坝小岛上发现了什么神祇？"}, "options": [{"en": "A mermaid of the river according to some versions of the story", "zh": "河中的美人鱼（按书中另一种说法）"}, {"en": "Pan, the god with panpipes and curved horns", "zh": "潘神，吹排箫、长着弯角的神"}, {"en": "The spirit of the Wind", "zh": "风之精灵"}, {"en": "Zeus, king of the gods", "zh": "众神之王宙斯"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "They see 'the Friend and Helper' with 'the backward sweep of the curved horns' and 'the long supple hand still holding the panpipes' — the god Pan.", "zh": "他们看到“朋友与帮手”有“弯角向后舒展”，并“仍握着排箫的长手”——这正是潘神。"}}, {"q": {"en": "What gift does the god give to Rat and Mole after revealing himself?", "zh": "神显现后赐予河鼠和鼹鼠什么礼物？"}, "options": [{"en": "The gift of forgetfulness", "zh": "遗忘的礼物"}, {"en": "A bag of gold coins according to some versions of the story", "zh": "一袋金币（按书中另一种说法）"}, {"en": "Wings to fly away", "zh": "能飞走的翅膀"}, {"en": "A magic boat", "zh": "一条魔法船"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The text says 'the kindly demigod is careful to bestow on those to whom he has revealed himself... the gift of forgetfulness,' so the vision will not overshadow their lives.", "zh": "文中说“仁慈的半神总把遗忘的礼物赐给曾蒙他显现的人”，好让这景象不笼罩它们的生活。"}}, {"q": {"en": "Where do Rat and Mole finally return Portly?", "zh": "河鼠和鼹鼠最终把波特利送回了哪里？"}, "options": [{"en": "To a school for otters according to some versions of the story", "zh": "送进水獭学校（按书中另一种说法）"}, {"en": "To his father Otter, watching by the ford", "zh": "送回在浅滩守候的父亲水獭身边"}, {"en": "Back to Toad Hall", "zh": "送回蟾蜍府"}, {"en": "Into the Wild Wood", "zh": "送进野林"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "They paddle downstream to the familiar ford where 'Otter start up... from out of the shallows,' joyfully reunited with his son.", "zh": "他们划回熟悉的浅滩，水獭“从浅水中一跃而起”，欣喜地与儿子重逢。"}}, {"q": {"en": "Phrases like 'silver kingdom' and 'purple loosestrife' are examples of the author's use of —", "zh": "“银色的王国”“紫色的千屈菜”这类措辞是作者运用——的例子"}, "options": [{"en": "rich, poetic imagery to create a dreamlike mood", "zh": "丰富诗意的意象，营造梦幻氛围"}, {"en": "legal language", "zh": "法律用语"}, {"en": "scientific terminology according to some versions of the story", "zh": "科学术语（按书中另一种说法）"}, {"en": "comic slang", "zh": "滑稽俚语"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Grahame fills the night search with moonlit, colored descriptions ('washed clean of mystery,' 'purple loosestrife') to make the scene feel magical.", "zh": "格雷厄姆用月下斑斓的描写（“洗去神秘”“紫色千屈菜”）让场景充满魔幻感。"}}, {"q": {"en": "In the glossary, the word 'august' (as in 'august Presence') most nearly means —", "zh": "词汇表中，'august'（如“庄严的 Presence”）最接近的意思是——"}, "options": [{"en": "invisible and hidden according to some versions of the story", "zh": "隐形而隐蔽的（按书中另一种说法）"}, {"en": "angry and loud", "zh": "愤怒而喧闹的"}, {"en": "small and tiny", "zh": "渺小细小的"}, {"en": "impressive and dignified", "zh": "令人敬畏而威严的"}], "answer": 3, "skill": "Craft and Structure", "explain": {"en": "The glossary gives august as 'impressive or dignified,' matching the awe Rat and Mole feel before Pan.", "zh": "词汇表把 august 解释为“令人敬畏或威严的”，正合河鼠和鼹鼠在潘神面前的敬畏。"}}, {"q": {"en": "The Focus Question asks how 'outside forces' affect Rat and Mole's quest. What happens?", "zh": "焦点问题问“外部力量”如何影响河鼠和鼹鼠的搜寻。实际发生了什么？"}, "options": [{"en": "A mysterious supernatural power guides them to Portly and protects him", "zh": "一股神秘的超自然力量引导他们找到波特利并保护他"}, {"en": "A storm traps them in the boat according to some versions of the story in an early draft of the book", "zh": "一场风暴把他们困在船上（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Toad helps them search", "zh": "蟾蜍帮他们搜寻"}, {"en": "The police arrest them", "zh": "警察逮捕了他们"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Pan's piping draws them upstream, and the god is found watching over the sleeping Portly, a force beyond the animals' own planning.", "zh": "潘神的笛声引他们逆流而上，而神正守着熟睡的波特利，这是超出动物自身计划的力量。"}}, {"q": {"en": "The song Rat recites ('Lest the awe should dwell... But then you shall forget!') mainly serves to —", "zh": "河鼠吟诵的歌（“唯恐敬畏长存……但你终将遗忘！”）主要作用是——"}, "options": [{"en": "list the fish of the river", "zh": "列举河里的鱼"}, {"en": "describe how to cook a dinner according to some versions of the story", "zh": "描述如何做饭（按书中另一种说法）"}, {"en": "explain why the animals will forget the vision and return to peace", "zh": "解释动物为何会遗忘幻象、重归安宁"}, {"en": "warn of a coming war", "zh": "警告即将到来的战争"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The verses state the god will 'look on my power at the helping hour—But then you shall forget,' matching the gift of forgetfulness.", "zh": "歌词写道神会“在相助之时显现神力——但你终将遗忘”，正呼应遗忘的礼物。"}}, {"q": {"en": "The author's purpose in including the god Pan is most likely to —", "zh": "作者安排潘神这一角色，其目的最可能是——"}, "options": [{"en": "criticize organized religion according to some versions of the story", "zh": "批评有组织的宗教（按书中另一种说法）"}, {"en": "make fun of Otter", "zh": "取笑水獭"}, {"en": "personify nature as a kind, protecting force in the animals' world", "zh": "把自然拟人化为动物世界中仁慈的保护力量"}, {"en": "teach a history lesson", "zh": "上一堂历史课"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "Pan appears as 'Friend and Helper' who comforts lost creatures, presenting nature as gentle and guarding.", "zh": "潘神以“朋友与帮手”的面目出现，安慰迷途的小生命，把自然呈现为温柔的守护者。"}}, {"q": {"en": "What feeling does the author create through the long night search?", "zh": "作者通过漫漫长夜的搜寻营造了怎样的感受？"}, "options": [{"en": "Boredom and dullness according to some versions of the story", "zh": "无聊与沉闷（按书中另一种说法）"}, {"en": "Awe and wonder mixed with peace", "zh": "敬畏与惊奇，又夹杂安宁"}, {"en": "Fear and horror", "zh": "恐惧与惊骇"}, {"en": "Anger and resentment", "zh": "愤怒与怨恨"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The moonlit voyage, the music, and the calm return all build a tone of reverent wonder rather than fear.", "zh": "月下航行、乐声与平静归来，共同营造出敬畏惊奇而非恐惧的基调。"}}], "extended": {"prompt": {"en": "Rat and Mole felt awed by something bigger than themselves. Describe a moment in nature that made you feel small, peaceful, or amazed.", "zh": "河鼠和鼹鼠被某种比自身更伟大的事物震撼。描述一个让你感到渺小、安宁或惊叹的自然时刻。"}, "guidance": {"en": ["Name the place and what you saw or heard.", "Explain how that moment changed your mood or thoughts."], "zh": ["说出地点以及你看到或听到的景象。", "说明那一刻如何改变了你的心情或想法。"]}}};</script>
