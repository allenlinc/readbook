rsions of the story", "zh": "它让动物永远待在笼中（按书中另一种说法）"}, {"en": "It makes animals prettier", "zh": "它让动物更漂亮"}, {"en": "It gives offspring a better chance of survival when released to the wild", "zh": "放归野外时，能让后代有更好的生存机会"}, {"en": "It reduces food needs", "zh": "它减少食物需求"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Captive breeding maintains genetic diversity so released offspring survive better.", "zh": "圈养繁育维持遗传多样性，使放归的后代更易存活。"}}, {"q": {"en": "DNA fingerprinting is compared to regular fingerprinting. What advantage does DNA have?", "zh": "DNA指纹与常规指纹作比较。DNA有何优势？"}, "options": [{"en": "DNA is visible to the eye", "zh": "DNA肉眼可见"}, {"en": "Criminals never leave DNA according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "罪犯从不留下DNA（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "DNA changes every hour", "zh": "DNA每小时都变"}, {"en": "A criminal may avoid fingerprints but almost always leaves traces of DNA (skin, hair, fluid)", "zh": "罪犯或许能避开指纹，却几乎总会留下DNA痕迹（皮屑、毛发、体液）"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Like fingerprints, DNA is unique, and a criminal almost always leaves microscopic DNA traces.", "zh": "如同指纹，DNA是独一无二的，而罪犯几乎总会留下微量DNA痕迹。"}}, {"q": {"en": "The focus question asks 'How has the science of genetics evolved over time?' What is the author's main purpose?", "zh": "焦点问题问：“遗传科学是如何随时间演变的？”作者的主要目的是什么？"}, "options": [{"en": "To show how genetics is used across many fields today and has grown as a science", "zh": "展示遗传学如今如何跨多个领域应用，并作为一门科学不断发展"}, {"en": "To sell seeds", "zh": "出售种子"}, {"en": "To teach history only according to some versions of the story in an early draft of the book", "zh": "只讲授历史（按书中另一种说法）（在书的早期草稿中）"}, {"en": "To describe weather", "zh": "描述天气"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book surveys farming, breeding, zoos, crime, and health to show genetics' reach.", "zh": "本书涵盖农业、育种、动物
