<script>window.BOOK = {"slug": "mysterious-shipwrecks", "title": "Mysterious Shipwrecks", "titleZh": "神秘的海难", "level": "Z1", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Near which Greek island was the ancient Antikythera shipwreck found in 1900?", "zh": "1900年，那艘古老的安蒂基西拉沉船是在哪个希腊岛屿附近发现的？"}, "options": [{"en": "Sicily, holding a car", "zh": "西西里岛，装有一辆汽车"}, {"en": "Crete, holding only gold coins according to some versions of the story in an early draft of the book", "zh": "克里特岛，只装有金币（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Cyprus, holding a library", "zh": "塞浦路斯岛，装有一座图书馆"}, {"en": "Antikythera, and it held the Antikythera Mechanism, an early 'computer'", "zh": "安蒂基西拉岛，船中还有安蒂基西拉机械——早期的“计算机”"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The book says in 1900 divers found a wreck near the Greek island of Antikythera, and among its artifacts was 'the earliest known computer—a mechanical device that used gears to calculate the positions of the stars and planets.'", "zh": "书中说1900年潜水员在希腊安蒂基西拉岛附近发现一艘沉船，其文物中包含“已知最早的计算机——一种用齿轮计算星辰与行星位置的机械装置”。"}}, {"q": {"en": "What happened to the Mary Celeste in 1872?", "zh": "1872年，“玛丽·塞莱斯特号”发生了什么？"}, "options": [{"en": "It was the first ship to the Moon", "zh": "它是第一艘登上月球的船"}, {"en": "It was found drifting with no one aboard, though the cargo and belongings remained", "zh": "它被发现在海上漂流，船上空无一人，但货物与物品仍在"}, {"en": "It arrived safely in Genoa with all crew according to some versions of the story in an early draft of the book", "zh": "它载着全体船员安全抵达热那亚（按书中另一种说法）（在书的早期草稿中）"}, {"en": "It was sunk by a volcano", "zh": "它被火山击沉"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says the Dei Gratia spotted the Mary Celeste drifting; 'a boarding party found no one on the ship... all the cargo was still in the hold,' and Captain Briggs and crew were never seen again.", "zh": "书中说“德伊·格拉西亚号”发现玛丽·塞莱斯特号在漂流；“登船人员发现船上空无一人……所有货物仍在货舱中”，而布里格斯船长和船员再未现身。"}}, {"q": {"en": "The Franklin Expedition's ships HMS Erebus and HMS Terror were lost in the Arctic. When were their wrecks found?", "zh": "富兰克林探险队的“幽冥号”与“恐怖号”在北极失踪。它们的残骸是何时被发现的？"}, "options": [{"en": "Both in 1845", "zh": "两艘都在1845年"}, {"en": "Both in 1900", "zh": "两艘都在1900年"}, {"en": "Neither has ever been found according to some versions of the story", "zh": "两艘都从未被发现（按书中另一种说法）"}, {"en": "Erebus in 2014 and Terror in 2016", "zh": "幽冥号于2014年，恐怖号于2016年"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The book states a ship found Erebus in 2014 'well preserved in 12 meters of frigid Arctic waters,' and 'Its partner ship remained missing until September 2016, when the preserved remains of the HMS Terror were found.'", "zh": "书中说2014年一艘船在“12米深的冰冷北极水域”发现了保存完好的幽冥号，而“它的姊妹船一直失踪到2016年9月，恐怖号的残骸才被发现”。"}}, {"q": {"en": "Which wreck does the book call the most valuable in the world, worth up to $16 billion?", "zh": "书中称哪艘沉船为世界上最值钱的，价值高达160亿美元？"}, "options": [{"en": "The Spanish galleon San Jose, sunk in 1708", "zh": "1708年沉没的西班牙大帆船圣何塞号"}, {"en": "The SS Valencia", "zh": "SS 瓦伦西亚号"}, {"en": "The USS Cyclops according to some versions of the story", "zh": "USS 独眼巨人号（按书中另一种说法）"}, {"en": "The Mary Celeste", "zh": "玛丽·塞莱斯特号"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book's 'Richest Wreck' section says the San Jose, sunk in 1708 with gold and emeralds, was estimated in 2015 to be worth as much as $16 billion, 'making it the most valuable shipwreck in the world.'", "zh": "书中“最富有的沉船”一节说，1708年载着黄金与祖母绿沉没的圣何塞号，在2015年估计价值高达160亿美元，“成为世界上最值钱的沉船”。"}}, {"q": {"en": "The book uses headings like 'Ghost Ship: Mary Celeste' and 'Terror on the Rocks: SS Valencia.' What does this heading style do?", "zh": "本书使用了“幽灵船：玛丽·塞莱斯特号”“礁石上的恐怖：SS瓦伦西亚号”这样的标题。这种标题风格起什么作用？"}, "options": [{"en": "Lists coordinates only", "zh": "只列出坐标"}, {"en": "Gives the captain's full name", "zh": "给出船长全名"}, {"en": "Uses vivid, story-like labels to draw readers into each wreck's mystery", "zh": "用生动、故事化的标签把读者拉入每艘沉船的谜团"}, {"en": "Names the ships alphabetically according to some versions of the story in an early draft of the book", "zh": "按字母顺序给船命名（按书中另一种说法）（在书的早期草稿中）"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "Headings such as 'Ghost Ship' and 'Terror on the Rocks' use dramatic, narrative language to frame each section as a mystery, a craft choice that hooks readers.", "zh": "“幽灵船”“礁石上的恐怖”等标题使用戏剧性、叙事化的语言，把每一节框定为谜团，这种写法能吸引读者。"}}, {"q": {"en": "The glossary defines 'supernatural' as something science can't explain. In the book, which wrecks inspired supernatural tales?", "zh": "术语表将“超自然”定义为科学无法解释的事物。书中，哪些沉船引发了超自然传说？"}, "options": [{"en": "The Great Barrier Reef", "zh": "大堡礁"}, {"en": "None of them", "zh": "没有一艘"}, {"en": "The SS Valencia (ghost ship sightings) and the Bermuda Triangle", "zh": "SS瓦伦西亚号（幽灵船目击）与百慕大三角"}, {"en": "Only the Antikythera according to some versions of the story in an early draft of the book", "zh": "只有安蒂基西拉号（按书中另一种说法）（在书的早期草稿中）"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "The book reports newspapers in 1910 described a 'ghostly Valencia sailing near the site,' and the Bermuda Triangle section notes rumors of 'supernatural powers sinking or snatching ships.'", "zh": "书中报道1910年报纸描述了“一艘幽灵般的瓦伦西亚号在沉船地点附近航行”，而百慕大三角一节提到“超自然力量击沉或掳走船只”的传闻。"}}, {"q": {"en": "The book compares the HMS Victory (lost 1744, found 2008) and USS Cyclops (lost 1918, never found). What contrast do they show?", "zh": "书中将HMS胜利号（1744年失踪，2008年发现）与USS独眼巨人号（1918年失踪，从未找到）进行对比。它们展示了什么对照？"}, "options": [{"en": "Neither was a real ship", "zh": "两艘都不是真实的船"}, {"en": "Modern sonar can solve some mysteries but others remain unsolved forever", "zh": "现代声纳能破解部分谜团，但另一些永远无解"}, {"en": "Both sank in the same storm according to some versions of the story in an early draft of the book", "zh": "两艘都在同一场风暴中沉没（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Both were found within a year", "zh": "两艘都在一年内被发现"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Victory was located in 2008 using sonar 100 km from where expected, while the Cyclops vanished with 'not one piece of wreckage ever found,' showing some mysteries get solved and some do not.", "zh": "胜利号于2008年用声纳在偏离预期100公里处被找到，而独眼巨人号“连一块残骸都从未被发现”，说明有些谜团被解开，有些则没有。"}}, {"q": {"en": "The book links several disasters (Edmund Fitzgerald, rogue waves) and notes about 2,000 people die in wrecks yearly. What conclusion fits?", "zh": "书中将若干灾难（埃德蒙·菲茨杰拉德号、异常巨浪）联系起来，并提到每年约2000人死于海难。哪个结论合适？"}, "options": [{"en": "The sea remains dangerous and some wrecks are never explained despite modern technology", "zh": "海洋依然危险，尽管有现代技术，有些海难仍无法解释"}, {"en": "No one dies at sea anymore", "zh": "海上再没有人死亡"}, {"en": "Shipping is now completely safe according to some versions of the story in an early draft of the book", "zh": "如今航运已完全安全（按书中另一种说法）（在书的早期草稿中）"}, {"en": "All wrecks are solved quickly", "zh": "所有海难都能迅速破解"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says 'dozens of shipwrecks still claim the lives of about two thousand people every year' and 'much of the time, though, the sea keeps these secrets to itself,' combining danger with unsolved mystery.", "zh": "书中说“每年仍有数十起海难夺去约两千人的生命”，且“不过多数时候，大海将这些秘密留给了自己”，将危险与未解之谜结合在一起。"}}, {"q": {"en": "What is the author's main reason for writing about shipwrecks?", "zh": "作者写海难的主要原因是什么？"}, "options": [{"en": "To argue the ocean should be drained according to some versions of the story in an early draft of the book", "zh": "为了论证应抽干海洋（按书中另一种说法）（在书的早期草稿中）"}, {"en": "To explore the enduring mysteries of lost ships and why they capture curiosity", "zh": "为了探究沉船持久的谜团，以及它们为何能俘获人们的好奇心"}, {"en": "To list only treasure hunters", "zh": "为了只列举寻宝者"}, {"en": "To teach how to build a boat", "zh": "为了教人如何造船"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book says 'Every shipwreck holds some kind of mystery' and asks what really sent each ship to its doom, showing the author's aim to explore enduring maritime mysteries.", "zh": "书中说“每一艘沉船都藏着某种谜团”，并追问究竟是什么将每艘船送入末路，体现了作者探究持久海上谜团的目的。"}}, {"q": {"en": "How does the author present the unexplained disappearances?", "zh": "作者如何呈现那些无法解释的失踪事件？"}, "options": [{"en": "As genuine mysteries where the sea often keeps its secrets", "zh": "将其呈现为真实的谜团，大海常常保守自己的秘密"}, {"en": "As proven hoaxes", "zh": "将其呈现为已被证实的骗局"}, {"en": "As unimportant trivia", "zh": "将其呈现为无关紧要的琐事"}, {"en": "As always caused by monsters according to some versions of the story", "zh": "将其呈现为总是由怪物造成（按书中另一种说法）"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The closing states 'Much of the time, though, the sea keeps these secrets to itself,' presenting unexplained losses as real, respectful mysteries rather than hoaxes.", "zh": "结尾写道“不过多数时候，大海将这些秘密留给了自己”，将未解的失踪呈现为真实、值得敬重的谜团，而非骗局。"}}], "extended": {"prompt": {"en": "Every shipwreck in the book leaves unanswered questions. Which wreck's mystery interests you most, and what clue or theory from the book would you most want to investigate?", "zh": "本书中每一次海难都留下了未解之谜。哪一次海难最让你感兴趣？你最想探究书中提到的哪条线索或理论？"}, "guidance": {"en": ["Select one wreck, such as the Mary Celeste, USS Cyclops, or Edmund Fitzgerald.", "Use a fact from the book (a missing lifeboat, the Bermuda Triangle, rogue waves) as your starting clue."], "zh": ["选择一处沉船，如玛丽·塞莱斯特号、独眼巨人号或埃德蒙·菲茨杰拉德号。", "用书中一个事实（失踪的救生艇、百慕大三角、异常巨浪）作为你的起始线索。"]}}};</script>
