<script>window.BOOK = {"slug": "believe-it-or-not", "title": "Believe It or Not?", "titleZh": "信不信由你？", "level": "Z1", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "What four unsolved mysteries does the book present evidence about?", "zh": "本书针对哪四个未解之谜提供了证据？"}, "options": [{"en": "The pyramids, Stonehenge, Easter Island, and the Titanic. according to some versions of the story", "zh": "金字塔、巨石阵、复活节岛与泰坦尼克号。（按书中另一种说法）"}, {"en": "Bigfoot, crop circles, the curse of the mummy, and the Bermuda Triangle.", "zh": "大脚怪、麦田怪圈、木乃伊的诅咒，以及百慕大三角。"}, {"en": "Vampires, werewolves, witches, and dragons.", "zh": "吸血鬼、狼人、女巫与龙。"}, {"en": "UFOs, Atlantis, the Loch Ness Monster, and ghosts.", "zh": "UFO、亚特兰蒂斯、尼斯湖水怪与鬼魂。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The Table of Contents lists the four mysteries: Bigfoot, Crop Circles, The Curse of the Mummy, and the Bermuda Triangle, and the Introduction says readers will get evidence about 'these four unsolved mysteries.'", "zh": "目录列出了这四大谜团：大脚怪、麦田怪圈、木乃伊的诅咒与百慕大三角；引言也说读者将获得'这四个未解之谜'的证据。"}}, {"q": {"en": "What does the book say about the name 'Bigfoot' and the Salish peoples?", "zh": "关于'大脚怪'(Bigfoot)这个名字与萨利什(Salish)原住民，书中说了什么？"}, "options": [{"en": "Native Americans in the Pacific Northwest told stories for hundreds of years; the Salish called the creatures Sasquatch, meaning 'wild man of the woods.'", "zh": "太平洋西北部的原住民数百年来一直讲述相关故事；萨利什人把这种生物称作Sasquatch，意为'林中野人'。"}, {"en": "Bigfoot is the scientific name given by biologists.", "zh": "大脚怪是生物学家给出的科学名称。"}, {"en": "The name Bigfoot was invented by scientists in the 1990s. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "'大脚怪'这个名字是1990年代由科学家发明的。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "The Salish people never heard of such creatures.", "zh": "萨利什人从未听说过这类生物。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says Native Americans in the Pacific Northwest told stories for hundreds of years, and the Salish peoples of Canada called them Sasquatch, meaning 'wild man of the woods.'", "zh": "书中说太平洋西北部的原住民数百年来一直讲述这类故事，加拿大的萨利什人称其为Sasquatch，意为'林中野人'。"}}, {"q": {"en": "According to the book, in 1977 a Bigfoot sighting in northern Washington turned out to be what?", "zh": "根据书中内容，1977年华盛顿州北部的一次'大脚怪目击'最终被证实是什么？"}, "options": [{"en": "A real apelike creature captured on film. according to some versions of the story", "zh": "一只被拍到的真实类猿生物。（按书中另一种说法）"}, {"en": "A bear standing on its hind legs.", "zh": "一只用后腿站立的熊。"}, {"en": "A hoax planned by three young men with gorilla suits and walkie-talkies.", "zh": "由三名年轻人用大猩猩装和步话机策划的一场骗局。"}, {"en": "A fallen tree mistaken for a body.", "zh": "一棵被误认为尸体的倒木。"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "The book states that in 1977 a Bigfoot sighting in northern Washington 'turned out to be a hoax planned by three young men with gorilla suits and walkie-talkies.'", "zh": "书中说1977年华盛顿州北部的'大脚怪目击'最终被证实是'由三名年轻人用大猩猩装和步话机策划的一场骗局'。"}}, {"q": {"en": "What did Englishmen Doug Bower and David Chorley claim in 1991 about crop circles?", "zh": "1991年，英国人道格·鲍尔(Doug Bower)和大卫·乔利(David Chorley)对麦田怪圈作了什么声称？"}, "options": [{"en": "They claimed they had never seen a crop circle. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "他们声称自己从未见过麦田怪圈。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "They claimed they had made every crop circle since 1978, though Chorley later retracted and blamed 'unknown forces.'", "zh": "他们声称自1978年以来所有的麦田怪圈都是他们制造的，尽管乔利后来收回说法，归咎于'未知力量'。"}, {"en": "They claimed the circles were made by tornadoes.", "zh": "他们声称怪圈是龙卷风造成的。"}, {"en": "They claimed aliens made all the circles.", "zh": "他们声称所有怪圈都是外星人制造的。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says in 1991 Bower and Chorley claimed they had made every crop circle since 1978, but Doug retracted his confession seven years later, declaring 'unknown forces' made the circles.", "zh": "书中说1991年鲍尔和乔利声称自1978年以来所有麦田怪圈都是他们制造的，但七年后道格收回供词，宣称是'未知力量'造就了这些怪圈。"}}, {"q": {"en": "The book presents each mystery and then asks 'Do you think it is real or a hoax?' What structure does this reveal about the author's approach?", "zh": "本书在讲述每个谜团后都会追问'你认为它是真的还是骗局？'。这揭示了作者怎样的写作手法？"}, "options": [{"en": "A balanced, open-ended approach that lays out evidence and lets readers decide, rather than asserting one answer.", "zh": "一种平衡、开放的处理方式：摆出证据、让读者自行判断，而非断言单一答案。"}, {"en": "A trick that always proves the mystery is fake. according to some versions of the story in an early draft of the book", "zh": "一种总是证明谜团是假把戏的套路。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "A step-by-step science experiment.", "zh": "一个循序渐进的科学实验。"}, {"en": "A scary story meant only to frighten readers.", "zh": "一个只为吓唬读者的恐怖故事。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "After each section the author asks 'Do you think ... is real or a hoax?' and the Conclusion says readers should 'determine what you believe,' showing a deliberately open-ended, evidence-first structure.", "zh": "每个章节后作者都问'你认为……是真的还是骗局？'，结论部分也说读者应'判断你相信什么'，显示出一种刻意开放、'先证据后判断'的结构。"}}, {"q": {"en": "How does the book explain the 'Curse of the Mummy' involving King Tut's tomb?", "zh": "关于图坦卡蒙王(King Tut)陵墓的'木乃伊诅咒'，本书是如何解释的？"}, "options": [{"en": "It confirms the curse truly killed twenty-six people. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "它确认诅咒确实杀死了二十六人。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "It says the curse was carved in gold on the wall.", "zh": "它说诅咒是用黄金刻在墙上的。"}, {"en": "It says newspapers spread curse stories, but research showed only six involved people died in ten years and the curse was not actually written in the tomb.", "zh": "书中说报纸散布了诅咒传闻，但研究表明十年间只有六名相关人员死亡，且墓中根本没写那种诅咒。"}, {"en": "It claims a cobra was the real killer.", "zh": "它声称一条眼镜蛇才是真正的杀手。"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "The book reports newspapers said twenty-six died, but 'Research shows that actually only six people ... died in the first ten years' and 'the curse that was reportedly written in the tomb was not there at all.'", "zh": "书中说报纸称有二十六人死去，但'研究表明实际上头十年只有六名相关人员死亡'，且'据称写在墓中的诅咒根本不存在'。"}}, {"q": {"en": "Flight 19, mentioned in the Bermuda Triangle section, was what kind of incident?", "zh": "百慕大三角部分提到的'19号航班'(Flight 19)属于哪一类事件？"}, "options": [{"en": "A passenger jet that landed safely.", "zh": "一架安全降落的客机。"}, {"en": "A spaceship that reached the moon. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "一艘抵达月球的宇宙飞船。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "A ship that found treasure.", "zh": "一艘寻得宝藏的船。"}, {"en": "Five Avenger bombers on a 1945 training mission that lost their bearings and disappeared, and the rescue airship also vanished.", "zh": "1945年一次训练中，五架复仇者轰炸机迷失方向后失踪，前去搜救的飞艇也一并消失。"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says that in 1945, during a routine training mission, all five Avenger bombers of Flight 19 lost their bearings and disappeared, and the rescue airship that went looking also disappeared.", "zh": "书中说1945年一次例行训练中，19号航班全部五架复仇者轰炸机迷失方向后失踪，前去搜救的飞艇也一并消失。"}}, {"q": {"en": "The book notes that in the vast ocean, violent weather could destroy a ship without leaving evidence. Which explanation for Bermuda Triangle losses does this support?", "zh": "书中指出，在浩瀚海洋中，猛烈天气可能摧毁船只而不留任何痕迹。这支持了关于百慕大三角失踪事件的哪种解释？"}, "options": [{"en": "The view that UFOs capture all the crews.", "zh": "'UFO掳走所有船员'的说法。"}, {"en": "The natural-explanation view that storms, waterspouts, and tidal waves—not a mysterious force—can erase vessels without a trace.", "zh": "自然解释一派的观点：是风暴、水龙卷与海啸（而非神秘力量）让船只消失得无影无踪。"}, {"en": "The view that the triangle is pure fantasy with no incidents. according to some versions of the story in an early draft of the book", "zh": "'三角区纯属幻想、并无事故'的说法。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "The view that the lost ships were stolen by pirates.", "zh": "'失踪船只被海盗盗走'的说法。"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book presents the side that 'the unexplained losses are a result of the severe weather common in the area,' noting violent weather 'could destroy a ship and not leave any evidence,' supporting a natural explanation.", "zh": "书中列出一派认为'这些无法解释的失踪是当地常见恶劣天气所致'，并称猛烈天气'可能摧毁船只而不留任何证据'，从而支持自然解释。"}}, {"q": {"en": "The Focus Question asks why people are fascinated by unsolved mysteries. What main idea does the book convey?", "zh": "聚焦问题是：人们为何对未解之谜如此着迷？本书传达的主要观点是什么？"}, "options": [{"en": "Mysteries fascinate us because we cannot understand them, and people will always disagree about whether they are real or nonsense.", "zh": "谜团令我们着迷，正因我们无法理解它们；而对于它们是真实还是无稽之谈，人们永远会各执一词。"}, {"en": "Mysteries are illegal to discuss.", "zh": "讨论谜团是违法的。"}, {"en": "All mysteries have been proven fake. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "所有谜团都已被证明是假的。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "Only children like mysteries.", "zh": "只有孩子才喜欢谜团。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The Conclusion states 'Mysterious occurrences—things we can't understand—will always exist' and that some will call them nonsense while others claim they are real, capturing why they fascinate.", "zh": "结论写道'无法理解的事物——我们弄不懂的事情——将永远存在'，并指出有人视之为无稽、有人坚信其真实，这正点出了它们令人着迷的原因。"}}, {"q": {"en": "The book gives the example of the Ellen Austin, a merchant ship that found a ghost ship in 1881. What happened to the second crew sent aboard?", "zh": "本书举了'艾伦·奥斯汀号'(Ellen Austin)商船在1881年发现一艘幽灵船的例子。被派上船的第二批船员后来怎样了？"}, "options": [{"en": "They captured the original crew.", "zh": "他们抓捕了原来的船员。"}, {"en": "They found treasure and became rich.", "zh": "他们发现了宝藏并发财。"}, {"en": "They sailed it safely into port and were rewarded. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "他们将它安全驶入港口并获得了奖赏。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "After a thick fog separated the ships overnight, the ghost ship was found the next day with the second crew also disappeared.", "zh": "浓雾让两船失联一夜后，次日找到幽灵船时，第二批船员也同样消失了。"}], "answer": 3, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book says the Ellen Austin found a crewless ghost ship in 1881; a crew boarded to steer it, but after fog separated the ships, the ghost ship was found next day 'the second crew had disappeared as well.'", "zh": "书中说1881年艾伦·奥斯汀号发现一艘无人的幽灵船；一批船员登船领航，但浓雾使两船分离，次日幽灵船被发现时'第二批船员也同样消失了'。"}}], "extended": {"prompt": {"en": "The book asks you to decide whether each mystery is real or a hoax. Which of the four mysteries (Bigfoot, crop circles, the mummy's curse, the Bermuda Triangle) do you find most believable, and which seems most like a hoax? Use evidence from the book to defend your choice.", "zh": "本书要你判断每个谜团是真还是骗局。四大谜团（大脚怪、麦田怪圈、木乃伊诅咒、百慕大三角）中，你觉得哪一个最可信，哪一个最像骗局？请用书中证据为你的选择辩护。"}, "guidance": {"en": ["Refer to specific details, such as the 1977 Bigfoot hoax or the research that only six people died in the tomb's first ten years.", "You might also weigh the natural-weather explanation for the Bermuda Triangle against the UFO theory."], "zh": ["引用具体细节，例如1977年大脚怪骗局，或'陵墓头十年仅六人死'的研究结论。", "你也可以将百慕大三角的'恶劣天气自然解释'与'UFO说法'加以权衡。"]}}};</script>
