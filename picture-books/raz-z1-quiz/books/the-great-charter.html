<script>window.BOOK = {"slug": "the-great-charter", "title": "The Great Charter", "titleZh": "大宪章", "level": "Z1", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "At Runnymede in 1215, how did King John make the Great Charter official?", "zh": "1215年在兰尼米德，国王约翰如何使《大宪章》生效？"}, "options": [{"en": "By affixing his royal seal, not by signing with a quill pen.", "zh": "加盖王室印章，而非用羽毛笔签名。"}, {"en": "By writing his name in ink.", "zh": "用墨水写下名字。"}, {"en": "By shouting it in public.", "zh": "在公开场合喊出来。"}, {"en": "By mailing it to the pope.", "zh": "把它邮寄给教皇。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book clarifies that illustrations showing John signing with a quill are inaccurate; the Magna Carta was formalized with the king's seal pressed into wax.", "zh": "书中澄清，描绘约翰用羽毛笔签字的画作并不准确；大宪章是用国王压印在蜡上的印章生效的。"}}, {"q": {"en": "Which pope nullified the Magna Carta in August 1215?", "zh": "1215年8月是哪位教皇废止了《大宪章》？"}, "options": [{"en": "Pope Innocent III", "zh": "英诺森三世"}, {"en": "Pope Leo", "zh": "利奥教皇"}, {"en": "Pope John", "zh": "约翰教皇"}, {"en": "The Archbishop of Canterbury", "zh": "坎特伯雷大主教"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "John called on his ally Pope Innocent, who took John's side and in August 1215 nullified the charter, freeing John from its provisions.", "zh": "约翰求助于盟友英诺森教皇，教皇站在约翰一边，于1215年8月废止了宪章，使约翰免除其条款约束。"}}, {"q": {"en": "After John's death in 1216, who became regent for the young King Henry III?", "zh": "1216年约翰死后，谁成为年幼的亨利三世（Henry III）的摄政？"}, "options": [{"en": "William Marshall", "zh": "威廉·马歇尔"}, {"en": "Robert Fitzwalter", "zh": "罗伯特·菲茨沃尔特"}, {"en": "Pope Innocent", "zh": "英诺森教皇"}, {"en": "Prince Louis of France", "zh": "法国的路易王子"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Henry III, then nine, became king; William Marshall, aged seventy, became regent and advised Henry to reissue the charter.", "zh": "时年九岁的亨利三世即位；七十岁的威廉·马歇尔出任摄政，并建议亨利重新颁布宪章。"}}, {"q": {"en": "What tax, hated by the barons, could be paid instead of performing military service?", "zh": "男爵们深恶痛绝、可替代服兵役而缴纳的是什么税？"}, "options": [{"en": "Scutage", "zh": "兵役免除税（scutage）"}, {"en": "Income tax", "zh": "所得税"}, {"en": "Sales tax", "zh": "销售税"}, {"en": "Tithe", "zh": "什一税"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Scutage was a payment made in lieu of military service; John used the funds to pay mercenaries, which the barons despised.", "zh": "兵役免除税是可替代服役的缴款；约翰用它雇佣雇佣兵，令男爵们憎恶。"}}, {"q": {"en": "The book ends with a timeline of 'Events of the Great Charter.' What does this structural feature help readers do?", "zh": "本书末尾附有“大宪章事件”时间线，这一结构特点帮助读者做什么？"}, "options": [{"en": "See the sequence of historical events in chronological order.", "zh": "按时间顺序看清历史事件的先后。"}, {"en": "Memorize the pope's name.", "zh": "记住教皇的名字。"}, {"en": "Learn a new language.", "zh": "学习一门新语言。"}, {"en": "Find the book's index.", "zh": "找到本书索引。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The timeline lists events from 1199 to 1297, helping readers follow the charter's creation, nullification, and reissue in order.", "zh": "时间线列出从1199到1297年的事件，帮助读者按顺序了解宪章的诞生、废止与重新颁布。"}}, {"q": {"en": "The author notes that pictures of John 'signing' with a quill are inaccurate because the charter was sealed. What does this clarification show?", "zh": "作者指出约翰“用羽毛笔签字”的图画不准确，因为宪章是盖印生效的，这一澄清说明了什么？"}, "options": [{"en": "The author's concern with historical accuracy.", "zh": "作者对历史准确性的重视。"}, {"en": "That John could not write.", "zh": "约翰不会写字。"}, {"en": "That the book is fiction.", "zh": "本书是虚构的。"}, {"en": "That pens did not exist.", "zh": "当时还没有笔。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "By correcting a common visual error, the author shows attention to factual detail and teaches how medieval documents were made official.", "zh": "通过纠正常见的图像错误，作者表现出对史实细节的在意，并说明了中世纪文件如何正式生效。"}}, {"q": {"en": "Connecting King John's conflict with Pope Innocent III and the barons' cause, how did the pope's later actions affect the charter?", "zh": "将国王约翰与英诺森三世的冲突，同男爵们的事业联系起来，教皇后来的行动对宪章有何影响？"}, "options": [{"en": "Innocent sided with John and nullified the charter, freeing John from its provisions.", "zh": "英诺森站在约翰一边并废止了宪章，使约翰免除其约束。"}, {"en": "The pope ordered John to obey the charter.", "zh": "教皇命令约翰遵守宪章。"}, {"en": "The pope wrote a new charter.", "zh": "教皇另写了一份宪章。"}, {"en": "The pope ignored the conflict.", "zh": "教皇对冲突置之不理。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Although Innocent initially opposed John, once John submitted to him, the pope became his ally and nullified the charter in 1215.", "zh": "尽管英诺森起初反对约翰，但约翰臣服后，教皇成为其盟友，并于1215年废止了宪章。"}}, {"q": {"en": "How does the book connect the Magna Carta to the United States?", "zh": "本书如何将《大宪章》与美国联系起来？"}, "options": [{"en": "Its ideas influenced the American colonies and appear in the U.S. Constitution and Bill of Rights.", "zh": "它的思想影响了北美殖民地，并体现在美国宪法与权利法案中。"}, {"en": "It was signed in America.", "zh": "它在美洲签署。"}, {"en": "It caused the American Revolution directly.", "zh": "它直接引发了美国革命。"}, {"en": "It is displayed in the White House only.", "zh": "它仅陈列于白宫。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book states the charter influenced political thinking in Europe and the American colonies, with ideas reappearing in the U.S. Constitution and Bill of Rights.", "zh": "书中说宪章影响了欧洲与北美殖民地的政治思想，其理念重现于美国宪法与权利法案之中。"}}, {"q": {"en": "The focus question asks how the Great Charter became a symbol of freedom. What is the author's purpose?", "zh": "焦点问题问《大宪章》如何成为自由的象征，作者的目的是什么？"}, "options": [{"en": "To explain the charter's lasting influence on liberty and the rule of law.", "zh": "解释宪章对自由与法治的持久影响。"}, {"en": "To describe King John's hobbies.", "zh": "描写国王约翰的爱好。"}, {"en": "To teach sword fighting.", "zh": "教授剑术。"}, {"en": "To list French kings.", "zh": "罗列法国国王。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The afterword states the charter became a powerful symbol of liberty and the principle that no one is above the law, influencing later democracies.", "zh": "书末指出，宪章成为自由的有力象征，以及“无人凌驾于法律之上”的原则，影响了后来的民主制度。"}}, {"q": {"en": "By describing John as 'detested' and listing his crimes (murder of Arthur, killing prisoners), what perspective does the author convey?", "zh": "通过把约翰描述为“遭人憎恨”并列举其罪行（杀害阿瑟、杀死囚犯），作者传达了怎样的观点？"}, "options": [{"en": "John was an unjust ruler whose excesses prompted the barons to demand the charter.", "zh": "约翰是个不义的统治者，其暴行促使男爵们要求制定宪章。"}, {"en": "John was a beloved saint.", "zh": "约翰是受人爱戴的圣徒。"}, {"en": "John was a fair and kind king.", "zh": "约翰是公正仁慈的国王。"}, {"en": "John built the wall.", "zh": "约翰修建了长城。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book details John's taxation, seizure of property, and probable murder of his nephew Arthur to show why the barons opposed him and forced the charter.", "zh": "本书详述约翰的征税、没收财产以及可能杀害侄子阿瑟，说明男爵们为何反对他并迫使宪章产生。"}}], "extended": {"prompt": {"en": "Do you think King John was a good ruler? Write a paragraph supporting your position using evidence from the text.", "zh": "你认为国王约翰是位好君主吗？用书中证据写一段话支撑你的观点。"}, "guidance": {"en": ["List specific actions of John described in the book, such as taxes, the murder of Arthur, or the interdict.", "State whether these make him a good or bad ruler and why."], "zh": ["列举书中描写的约翰具体行为，如征税、杀害阿瑟或绝罚令。", "说明这些让他成为好或坏的君主，并解释原因。"]}}};</script>
