ame pull himself.", "zh": "河鼠听到“急切的翅膀搏动，服从那不容置疑的呼唤”，不久自己也被这股拉力攫住。"}}, {"q": {"en": "How do the field mice and harvest mice respond to the coming of winter?", "zh": "田鼠和收获鼠如何应对冬天的来临？"}, "options": [{"en": "They dig, pack, and move to winter quarters early", "zh": "它们早早挖掘、收拾并迁往过冬住所"}, {"en": "They ignore the change", "zh": "它们对变化置之不理"}, {"en": "They sleep all winter in the open field according to some versions of the story", "zh": "它们整个冬天睡在田野里（按书中另一种说法）"}, {"en": "They fly south like birds", "zh": "它们像鸟一样南飞"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The text shows them 'digging and tunnelling busily' and 'already elbow deep packing their belongings' for the Stores.", "zh": "文中写它们“忙着挖掘打洞”，并“已双肘没入行李中打包”，准备存粮过冬。"}}, {"q": {"en": "Rat's reaction to the swallows' talk shows that he —", "zh": "河鼠对燕子谈话的反应表明他——"}, "options": [{"en": "feels a new, unsettling pull toward the unknown South", "zh": "对未知的南方感到一种新的、不安的牵引"}, {"en": "hates all birds", "zh": "讨厌所有鸟类"}, {"en": "wants to become a farmer according to some versions of the story", "zh": "想当个农夫（按书中另一种说法）"}, {"en": "plans to build a hotel", "zh": "打算建一座旅馆"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Listening to their 'southern-bound' chatter, Rat's 'heart burned within him' and a 'wild, new sensation' awakens, though he has always stayed.", "zh": "听它们“南飞”的闲谈，河鼠“心里燃起火”，一阵“狂野的新感受”被唤醒，尽管他一向安居不出。"}}, {"q": {"en": "The author uses the Sea Rat's travel stories to —", "zh": "作者借航海鼠的旅行故事来——"}, "options": [{"en": "teach geography only according to some versions of the story in an early draft of the book", "zh": "仅仅教地理（按书中另一种说法）（在书的早期草稿中）"}, {"en": "stir wanderlust and contrast settled home life with adventure", "zh": "激起漫游的渴望，并对比安稳的家与冒险"}, {"en": "criticize sailors", "zh": "批评水手"}, {"en": "praise farming life", "zh": "赞扬农耕生活"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The Sea Rat's vivid ports make Rat 'follow the Adventurer league by league,' showing how stories of far places tempt the settled.", "zh": "航海鼠生动的港口让河鼠“一里一里地追随冒险者”，显示远方的故事如何诱惑安居者。"}}, {"q": {"en": "In the story, the 'call of the South' most likely symbolizes —", "zh": "故事中“南方的呼唤”最可能象征——"}, "options": [{"en": "the restless human longing for adventure and the unfamiliar", "zh": "人对冒险与未知的永不安分的渴望"}, {"en": "a dinner bell", "zh": "开饭的铃声"}, {"en": "a warning of danger", "zh": "危险的警告"}, {"en": "only a literal bird call according to some versions of the story", "zh": "只是一声真实的鸟鸣（按书中另一种说法）"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "It draws even home-loving Rat toward distant seas, standing for the deep pull of the new and unknown.", "zh": "它连恋家的河鼠都被引向远海，象征着对新奇与未知的深切渴望。"}}], "extended": {"prompt": {"en": "The animals feel pulled to leave home for something new. Tell about a time you felt drawn to try something unfamiliar, even if it meant leaving what was comfortable.", "zh": "动物们感到被吸引去远方尝试新事物。说说你曾被吸引去尝试陌生事物、哪怕要离开舒适圈的时刻。"}, "guidance": {"en": ["Name what pulled you and what you left behind.", "Explain whether the change was worth it."], "zh": ["说出吸引你的是什么，以及你离开了什么。", "说明这次改变是否值得。"]}}};</script>
