d single access point 'made it relatively easy to guard,' and its distance from Thebes 'helped discourage tomb robbers.' What follows?", "zh": "帝王谷陡峭的悬崖和唯一的入口'使其相对容易守卫'，且与底比斯的距离'有助于阻止盗墓者'。由此可以得出什么？"}, "options": [{"en": "Tomb locations were chosen for both religious and practical security reasons", "zh": "墓葬选址兼顾了宗教意义与实际的安全考量"}, {"en": "The tombs were built only for beauty", "zh": "墓葬只为了美观而建"}, {"en": "Robbers were welcomed", "zh": "盗墓者受到欢迎"}, {"en": "The Nile was the only road", "zh": "尼罗河是唯一的路"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The text links the desert wadi's layout to both spiritual purpose (underworld journey) and practical defense against robbers.", "zh": "文中把沙漠谷地的地形与精神目的（通往来世的旅程）以及防范盗墓的实际防御联系起来。"}}, {"q": {"en": "The book says writings from the workers' village Dier al-Medina are 'the source of much of what we know,' and KV 5 was missed until 1989. What does this suggest?", "zh": "书中说工人村德尔麦迪纳留下的文字是'我们大部分知识的来源'，而KV5号墓直到1989年才被发现。这说明了什么？"}, "options": [{"en": "Our understanding depends on evidence that is still being discovered", "zh": "我们的认知依赖于仍在不断被发现的证据"}, {"en": "Everything is already known", "zh": "一切都已经为人所知"}, {"en": "The tombs were built yesterday", "zh": "这些墓是昨天才建的"}, {"en": "No one studies Egypt", "zh": "没有人研究埃及"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "KV 5 was labeled 'uninteresting' for decades until Kent Weeks found 150+ chambers, showing knowledge grows with new evidence.", "zh": "KV5号墓被贴上'无趣'标签数十年，直到肯特·威克斯发现150多个墓室，说明认知随新证据而增长。"}}, {"q": {"en": "The Focus Question asks 'Why is the Valley of the Kings a significant part of Egypt's history?' What is the author's purpose?", "zh": "焦点问题问'为何帝王谷是埃及历史的重要部分？'作者的写作目的是什么？"}, "options": [{"en": "To explain the valley's historical and cultural importance as a royal burial site", "zh": "解释帝王谷作为王室陵墓地的历史与文化重要性"}, {"en": "To sell tickets", "zh": "卖票"}, {"en": "To teach cooking", "zh": "教烹饪"}, {"en": "To list modern cities", "zh": "罗列现代城市"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The question frames the book as an explanation of why the valley matters to Egypt's past and heritage.", "zh": "该问题把本书定位为解释帝王谷为何对埃及的过去与遗产具有重要意义。"}}, {"q": {"en": "The 'Connections' section asks readers to research 'The Curse of King Tut' and form their own opinion. What does this reveal?", "zh": "'拓展'部分要求读者研究'图坦卡蒙的诅咒'并形成自己的看法。这揭示了什么？"}, "options": [{"en": "The author encourages inquiry and evidence-based reasoning beyond the text", "zh": "作者鼓励在文本之外进行探究和基于证据的推理"}, {"en": "The author believes the curse is real", "zh": "作者相信诅咒是真的"}, {"en": "The author hates research", "zh": "作者讨厌研究"}, {"en": "The author wants a yes-or-no answer", "zh": "作者想要一个是非答案"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The prompt asks students to 'cite outside resources for support,' showing the author values independent, evidence-based thinking.", "zh": "该提示要求学生'引用外部资料作为支撑'，说明作者重视独立、基于证据的思考。"}}], "extended": {"prompt": {"en": "If you could visit the Valley of the Kings, which tomb or artifact from the book would you most want to see, and what would you hope to learn?", "zh": "如果你能参观帝王谷，书中哪座墓葬或哪件文物你最想看？你希望从中了解什么？"}, "guidance": {"en": ["Name a specific item, such as Tutankhamen's golden mask or the shabti figures.", "Connect it to what the book says about Egyptian beliefs about the afterlife."], "zh": ["说出具体物品，如图坦卡蒙的黄金面具或沙伯提俑。", "将其与书中关于埃及人来世信仰的内容联系起来。"]}}};</script>
