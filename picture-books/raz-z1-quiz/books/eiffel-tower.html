<script>window.BOOK = {"slug": "eiffel-tower", "title": "Eiffel Tower", "titleZh": "埃菲尔铁塔", "level": "Z1", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "For what event was the Eiffel Tower built, and what did that event celebrate?", "zh": "埃菲尔铁塔是为哪一场活动而建，那场活动又庆祝了什么？"}, "options": [{"en": "The 1889 World's Fair, marking the hundredth anniversary of the French Revolution.", "zh": "1889年世界博览会，纪念法国大革命一百周年。"}, {"en": "The 1939 World's Fair, marking the end of World War I.", "zh": "1939年世界博览会，纪念一战结束。"}, {"en": "The 2000 New Year celebration in Paris.", "zh": "2000年巴黎的新年庆祝。"}, {"en": "A 1957 television broadcast.", "zh": "1957年的一场电视转播。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book states the Eiffel Tower was constructed for the 1889 World's Fair, which marked the hundredth anniversary of the French Revolution.", "zh": "书中说埃菲尔铁塔是为1889年世界博览会而建，那场博览会纪念法国大革命一百周年。"}}, {"q": {"en": "Although credit usually goes to Gustave Eiffel, who actually drew the original design of the tower in 1884?", "zh": "虽然荣誉通常归于古斯塔夫·埃菲尔，但实际上是谁在1884年绘制了铁塔的原始设计图？"}, "options": [{"en": "Maurice Koechlin and Emile Nouguier, chief engineers for Eiffel's company.", "zh": "莫里斯·凯什兰和埃米尔·努吉耶，埃菲尔公司的首席工程师。"}, {"en": "Gustave Eiffel himself, alone.", "zh": "古斯塔夫·埃菲尔本人，独自完成。"}, {"en": "Stephen Sauvestre, the architect.", "zh": "建筑师斯蒂芬·绍维斯特。"}, {"en": "Napoleon Bonaparte.", "zh": "拿破仑·波拿巴。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says credit for the design usually goes to Gustave Eiffel, but the original drawings were the work of Maurice Koechlin and Emile Nouguier, chief engineers for Eiffel's company.", "zh": "书中说设计荣誉通常归于古斯塔夫·埃菲尔，但原始图纸出自埃菲尔公司的首席工程师莫里斯·凯什兰和埃米尔·努吉耶。"}}, {"q": {"en": "How long did it take to complete the Eiffel Tower?", "zh": "埃菲尔铁塔的建造耗时多久？"}, "options": [{"en": "Two years, two months, and five days (completed March 31, 1889).", "zh": "两年两个月零五天（1889年3月31日完工）。"}, {"en": "Ten years.", "zh": "十年。"}, {"en": "Five months.", "zh": "五个月。"}, {"en": "Forty-one years.", "zh": "四十一年。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says ground was broken on January 26, 1887, and the project was completed just over two years later, on March 31, 1889.", "zh": "书中说1887年1月26日动工，仅两年多后于1889年3月31日完工。"}}, {"q": {"en": "About how many rivets were used to join the iron pieces of the Eiffel Tower?", "zh": "建造埃菲尔铁塔时大约用了多少颗铆钉来连接铁件？"}, "options": [{"en": "2.5 million rivets", "zh": "250万颗铆钉"}, {"en": "About 100 rivets", "zh": "约100颗铆钉"}, {"en": "57,000 rivets", "zh": "57000颗铆钉"}, {"en": "10 million rivets", "zh": "1000万颗铆钉"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book states a total of 2.5 million rivets were used, each installed by a team of four workers, and they shrank after cooling to pull the pieces tightly together.", "zh": "书中说共用了250万颗铆钉，每颗由四人小组安装，冷却后收缩把铁件紧紧拉合。"}}, {"q": {"en": "A group of 300 artists, writers, and architects called the tower a 'gigantic black smokestack' in a petition. Why does the author include this vivid criticism?", "zh": "一群300人的艺术家、作家和建筑师在请愿书中称铁塔是'巨大的黑色烟囱'。作者为何加入这段生动批评？"}, "options": [{"en": "To show that many famous people originally opposed the tower's design.", "zh": "表明许多名流最初反对铁塔的设计。"}, {"en": "To prove the tower was made of smoke.", "zh": "证明铁塔是用烟做的。"}, {"en": "To describe its color accurately.", "zh": "准确描述它的颜色。"}, {"en": "To explain how trains worked.", "zh": "解释火车如何运作。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The author quotes the critics' own figurative language to reveal the strong early opposition and create contrast with the tower's later fame.", "zh": "作者引用批评者本人的比喻性语言，揭示早期强烈的反对声音，并与铁塔后来的名声形成对比。"}}, {"q": {"en": "The book is divided into chapters such as 'Paris Icon,' 'A Daring Dream,' 'Doubters and Dissenters,' and 'A Must-See Landmark.' What does this organization reflect?", "zh": "本书分为'巴黎标志''大胆的梦想''怀疑者与异议者''必看地标'等章节。这种组织方式反映了什么？"}, "options": [{"en": "A progression from the tower's fame, to its design, opposition, and finally its lasting landmark status.", "zh": "从铁塔的名声，到设计、异议，最终到其持久地标地位的发展顺序。"}, {"en": "A random list of unrelated topics.", "zh": "随机罗列互不相关的主题。"}, {"en": "Strictly alphabetical order.", "zh": "严格的字母顺序。"}, {"en": "Only the construction steps.", "zh": "仅按施工步骤排列。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The chapter order moves from the tower as a symbol, to how it was dreamed up and opposed, to its place today, showing a logical historical-developmental structure.", "zh": "章节顺序从铁塔作为象征，到它的构思与受阻，再到今日的地位，呈现出符合历史发展的逻辑结构。"}}, {"q": {"en": "How did the Eiffel Tower serve France during the two world wars, according to the book?", "zh": "根据书中内容，埃菲尔铁塔在两次世界大战期间如何为法国服务？"}, "options": [{"en": "In WWI it was used for wireless communication with ships and intercepting enemy messages; in WWII the French resistance cut the elevator cables to hinder the Nazis.", "zh": "一战中用于与船只的无线通信和截获敌方情报；二战中法国抵抗者切断电梯缆绳以阻碍纳粹。"}, {"en": "It was used as a prison for soldiers.", "zh": "它被用作关押士兵的监狱。"}, {"en": "It was demolished during both wars.", "zh": "它在两次战争期间都被拆毁了。"}, {"en": "It served only as a restaurant.", "zh": "它只被用作餐厅。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says during WWI the tower was used by the French military for wireless communication and intercepting messages; during WWII, when Germany occupied Paris, resistance fighters cut the elevator cables.", "zh": "书中说一战中法军将铁塔用于无线通信和截获情报；二战德军占领巴黎时，抵抗者切断了电梯缆绳。"}}, {"q": {"en": "The tower was built as a temporary exhibit meant to be torn down after twenty years. Why was it NOT torn down?", "zh": "铁塔本是作为临时展览建造、计划二十年后拆除。为什么它没有被拆掉？"}, "options": [{"en": "Eiffel gave it lasting scientific value, such as a meteorology lab and later radio and TV transmissions, so it was kept.", "zh": "埃菲尔让它具有持久的科学价值，如气象实验室以及后来的广播和电视传输，因而被保留。"}, {"en": "It was too short to matter.", "zh": "它太矮了，无关紧要。"}, {"en": "No one remembered the plan.", "zh": "没人记得这个计划。"}, {"en": "It was made of wood.", "zh": "它是木制的。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book explains Eiffel equipped the third floor with a meteorology lab and later the tower was used for radio (1909) and television, giving it value that saved it from demolition.", "zh": "书中说埃菲尔在三层设立了气象实验室，后来铁塔用于广播（1909年）和电视，其价值使它免于被拆。"}}, {"q": {"en": "The author notes the top-floor office has wax figures of Eiffel and Thomas Edison. Why include this detail?", "zh": "作者提到顶层办公室里有埃菲尔和托马斯·爱迪生的蜡像。为何加入这一细节？"}, "options": [{"en": "To let visitors connect with Eiffel's story and show the tower honoring its creator.", "zh": "让游客与埃菲尔的故事产生连接，并体现铁塔对其创造者的纪念。"}, {"en": "To explain how wax is made.", "zh": "解释蜡是如何制成的。"}, {"en": "To describe a movie scene.", "zh": "描述电影场景。"}, {"en": "To list the tower's height.", "zh": "列出铁塔的高度。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "By describing the restored office with figures of Eiffel and Edison, the author personalizes the monument and highlights Eiffel's legacy as a creator.", "zh": "通过描写复原的办公室及埃菲尔与爱迪生蜡像，作者让纪念碑更具人情味，并凸显埃菲尔作为创造者的遗产。"}}, {"q": {"en": "What is the author's main purpose in writing Eiffel Tower?", "zh": "作者写《埃菲尔铁塔》的主要目的是什么？"}, "options": [{"en": "To explain how the tower surpassed expectations and became a well-known landmark.", "zh": "说明铁塔如何超出预期并成为著名的地标。"}, {"en": "To teach readers French cooking.", "zh": "教读者法国菜。"}, {"en": "To argue that all towers should be torn down.", "zh": "主张所有铁塔都应拆除。"}, {"en": "To describe a fictional story.", "zh": "描述一个虚构故事。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book's Focus Question asks how the Eiffel Tower surpassed expectations and became a landmark, and the text sets out to answer that.", "zh": "本书的聚焦问题是埃菲尔铁塔如何超出预期并成为地标，全文正是为了回答这个问题。"}}], "extended": {"prompt": {"en": "The book says the tower 'leans up to 18 centimeters' on hot days because of heat expansion. If you visited the tower, would you rather see it on a cool calm day or during a light show? Explain your choice using details from the book.", "zh": "书中说铁塔在热天会因热胀而'倾斜多达18厘米'。如果你去参观，你更想在凉爽无风的日子里看它，还是在灯光秀期间看？用书中细节说明你的选择。"}, "guidance": {"en": ["Mention the light shows described, such as the year 2000 fireworks or colored lighting for special events.", "You could also note the 336 night-time projectors."], "zh": ["提到书中描述的灯光秀，如2000年烟花或特殊活动的彩色照明。", "你也可以提到夜间336台投影灯。"]}}};</script>
