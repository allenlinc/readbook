ive years in prison", "zh": "五年监禁"}, {"en": "Life imprisonment", "zh": "终身监禁"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The Clerk totals twelve months for theft, three years for furious driving, and fifteen years for cheek, which comes to nineteen, and the Chairman rounds it up to 'a round twenty years.'", "zh": "书记员算出偷车12个月、飙车3年、顶撞警察15年，共19年，首席法官干脆“凑个整数”判了二十年。"}}, {"q": {"en": "At which inn does Toad steal the motorcar that leads to his arrest?", "zh": "蟾蜍是在哪家旅馆偷走汽车并因此被捕的？"}, "options": [{"en": "The Red Lion", "zh": "红狮旅馆"}, {"en": "The Green Dragon", "zh": "绿龙旅馆"}, {"en": "The Painted Dragon", "zh": "彩龙旅馆"}, {"en": "The Coach and Horses", "zh": "马车与马旅馆"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Toad stops at an inn where 'the sign of The Red Lion' reminds him he is hungry, and later he steals the unattended motorcar from its yard.", "zh": "蟾蜍在挂着“红狮”招牌的旅馆停下吃饭，随后从院子里偷走了无人看管的汽车。"}}, {"q": {"en": "In the glossary, the word 'panoply' is used for Toad's motorclothes. What does it mean?", "zh": "在词汇表中，'panoply' 用来形容蟾蜍的驾车行头，它是什么意思？"}, "options": [{"en": "His large house", "zh": "他的大房子"}, {"en": "A full set of outfit or protective clothing", "zh": "一整套装束或防护衣物"}, {"en": "His group of friends according to some versions of the story", "zh": "他的一群朋友（按书中另一种说法）"}, {"en": "His stolen money", "zh": "他偷来的钱"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The glossary defines panoply as 'a full suit of armor or protective clothing,' fitting the description of Toad's goggles, cap, gaiters, and overcoat.", "zh": "词汇表将 panoply 定义为“一整套盔甲或防护衣物”，正对应蟾蜍的风镜、帽子、绑腿和外套。"}}, {"q": {"en": "The line 'Brain against brute force—and brain came out on the top' shows Toad's —", "zh": "“智慧对蛮力——智慧占了上风”这句话表现了蟾蜍的——"}, "options": [{"en": "fear of the law", "zh": "对法律的恐惧"}, {"en": "sadness at leaving his home according to some versions of the story", "zh": "离家时的悲伤（按书中另一种说法）"}, {"en": "love of the quiet river", "zh": "对宁静河流的喜爱"}, {"en": elped you change or whether you still struggle with it."], "zh": ["描述这个习惯，以及它难改的原因。", "说明是什么最终帮你改变，或者你是否仍在与之斗争。"]}}};</script>
