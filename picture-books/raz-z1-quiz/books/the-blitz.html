raft of the book", "zh": "在城市间传递消息。（按书中另一种说法）（在书的早期草稿中）"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Reggie's dad explained the barrage balloons kept German dive bombers from coming in low, making their bomb runs less accurate.", "zh": "Reggie 的父亲解释，阻塞气球使德国俯冲轰炸机无法低飞，从而降低投弹精度。"}}, {"q": {"en": "How is Reggie's father finally confirmed safe?", "zh": "Reggie 的父亲最终是如何被确认安全的？"}, "options": [{"en": "A telegram says he died.", "zh": "电报说他已牺牲。"}, {"en": "He walks in from the garden. according to some versions of the story in an early draft of the book", "zh": "他从花园走进来。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Lieutenant Warren explains the French Resistance rescued him and he is returning.", "zh": "沃伦中尉说明法国抵抗组织救了他，他将归来。"}, {"en": "The nurse finds him.", "zh": "护士找到了他。"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "Lieutenant Warren tells Reggie that the French Resistance reached his father first and sneaked him onto a submarine; he is coming home that afternoon.", "zh": "沃伦中尉告诉 Reggie，法国抵抗组织先找到了他父亲，并把他偷送上潜艇；他当天下午就要回家。"}}, {"q": {"en": "The story follows Reggie's thoughts and feelings from a third-person perspective. What does this point of view help readers do?", "zh": "故事以第三人称视角跟随 Reggie 的想法与感受，这种视角帮助读者做什么？"}, "options": [{"en": "Read a textbook chapter.", "zh": "读教科书章节。"}, {"en": "Experience the events through Reggie's eyes and emotions.", "zh": "通过 Reggie 的视角与情感来经历事件。"}, {"en": "Learn facts about World War I.", "zh": "了解一战史实。"}, {"en": "Hear only the father's voice. according to some versions of the story", "zh": "只听到父亲的声音。（按书中另一种说法）"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The third-person limited narration stays close to Reggie, letting readers feel his fear, love, and relief throughout the Blitz.", "zh": "第三人称限知叙述紧贴 Reggie，让读者在轰炸中感受到他的恐惧、爱与宽慰。"}}, {"q": {"en": "The recurring gesture of Mum pushing up her jaw ('keep your chin up') functions as what in the story?", "zh": "母亲推下巴（“抬起下巴”）这一反复出现的动作，在故事中起到了什么作用？"}, "options": [{"en": "A symbol of courage and reassurance between mother and son.", "zh": "母子之间勇气与安慰的象征。"}, {"en": "A way to tell time.", "zh": "报时的方法。"}, {"en": "A description of the weather. according to some versions of the story", "zh": "对天气的描写。（按书中另一种说法）"}, {"en": "A signal to board the train.", "zh": "上火车信号。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Mum uses the thumb-to-jaw gesture and 'keep your chin up' whenever Reggie is frightened, making it a repeated symbol of bravery and comfort.", "zh": "每当 Reggie 害怕，母亲就用拇指推下巴并说“抬起下巴”，使其成为反复出现的勇气与安慰象征。"}}, {"q": {"en": "Connecting Reggie's decision to return to London with the air raid that follows, what does this reveal about his character?", "zh": "将 Reggie 决定返回伦敦与随后的空袭联系起来，这揭示了他的什么性格？"}, "options": [{"en": "He wants to annoy the warden.", "zh": "他想惹恼管理员。"}, {"en": "He is careless and silly.", "zh": "他粗心又傻。"}, {"en": "He is running from responsibility. according to some versions of the story in an early draft of the book", "zh": "他在逃避责任。（按书中另一种说法）（在书的早期草稿中）"}, {"en": "His love for his mother outweighs his fear, driving him to face danger.", "zh": "他对母亲的爱胜过了恐惧，驱使他直面危险。"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Despite the bombing, Reggie sneaks back to London and digs his mum from the rubble, showing devotion stronger than his fear.", "zh": "尽管有轰炸，Reggie 仍偷偷回伦敦，把母亲从瓦砾中挖出，显示其深情胜过恐惧。"}}, {"q": {"en": "How does the raspberry jam Reggie buys connect to the story's resolution?", "zh": "Reggie 买的树莓酱如何与故事结局相联系？"}, "options": [{"en": "The jam causes the bombing.", "zh": "果酱引发了轰炸。"}, {"en": "The 'blood' on his pocket turns out to be jam, a light moment that relieves tension at his reunion with Mum.", "zh": "他口袋上的“血”原来是果酱，这一轻松片刻在他与母亲重逢时缓解了紧张。"}, {"en": "The jam feeds the soldiers.", "zh": "果酱喂了士兵。"}, {"en": "The jam is never mentioned again. according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "果酱之后再未提及。（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Reggie buys raspberry jam as a peace offering; later the sticky red substance on his pocket looks like blood but is jam, a relieved laugh with his mum.", "zh": "Reggie 买树莓酱作为赔礼；后来口袋上的红色黏物看似血迹，却是果酱，母子相认时化作释然一笑。"}}, {"q": {"en": "The focus question asks how the historical setting affects Reggie and his family. What is the author's purpose?", "zh": "焦点问题问历史背景如何影响 Reggie 及其家人，作者的目的是什么？"}, "options": [{"en": "To show how ordinary families were affected by the Blitz.", "zh": "展现普通家庭如何受到大轰炸的影响。"}, {"en": "To promote a train company.", "zh": "为某铁路公司做广告。"}, {"en": "To teach the dates of World War I. according to some versions of the story", "zh": "讲授一战的日期。（按书中另一种说法）"}, {"en": "To describe a holiday trip.", "zh": "描写一次假日旅行。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Set during the Blitz, the story uses Reggie's family (a nurse mum, a missing RAF dad) to personalize the war's impact on civilians.", "zh": "故事以大轰炸为背景，借 Reggie 一家（护士母亲、失踪的皇家空军父亲）让战争对平民的影响具象化。"}}, {"q": {"en": "By contrasting the danger of the bombing with moments of love (the jam, the reunion), what perspective does the author convey?", "zh": "通过把轰炸的危险与爱的瞬间（果酱、重逢）相对照，作者传达了怎样的观点？"}, "options": [{"en": "London is safe.", "zh": "伦敦是安全的。"}, {"en": "War is fun and exciting.", "zh": "战争有趣又刺激。"}, {"en": "Human bonds endure even amid the devastation of war.", "zh": "即便在战争的废墟中，人与人之间的纽带依然坚挺。"}, {"en": "Families should be separated. according to some versions of the story", "zh": "家庭应当分离。（按书中另一种说法）"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "Even as bombs destroy their home, Reggie's return and his father's rescue show that love and family connection survive the Blitz.", "zh": "即便炸弹摧毁了家园，Reggie 的归来与父亲获救仍表明，爱与亲情在大轰炸中幸存下来。"}}], "extended": {"prompt": {"en": "The story is set during the Blitz. How would you feel if you were Reggie, and what would you have done when you read the telegram about your father?", "zh": "故事发生在大轰炸时期。如果你是 Reggie，会有什么感受？读到关于父亲的那封电报时，你会怎么做？"}, "guidance": {"en": ["Think about Reggie's love for his parents and his fear of the bombs.", "Decide whether you would have stayed in the country or returned to London, and explain why."], "zh": ["想想 Reggie 对父母的爱与对炸弹的恐惧。", "决定你会留在乡间还是返回伦敦，并解释原因。"]}}};</script>
