<script>window.BOOK = {"slug": "the-wind-in-the-willows-part-1", "title": "The Wind in the Willows (Part 1)", "titleZh": "柳林风声（第一部分）", "level": "Z1", "genre": "Narrative", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "What makes Mole leave his underground home at the very start of the story?", "zh": "故事一开始，是什么让鼹鼠离开了自己的地下之家？"}, "options": [{"en": "He grows tired of spring-cleaning and feels a restless longing to explore the world outside.", "zh": "他厌倦了春季大扫除，并感到一种想去外面世界探索的不安分的渴望。"}, {"en": "He is hungry and goes out to look for food.", "zh": "他饿了，出去寻找食物。"}, {"en": "A predator chases him out of his home.", "zh": "捕食者把他赶出了家门。"}, {"en": "He wants to visit Toad at Toad Hall.", "zh": "他想去蟾蜍宫拜访蟾蜍。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The text says Mole was spring-cleaning when 'a sense of divine discontent and longing' filled him, so he flung down his brush and bolted outside.", "zh": "文中写道，鼹鼠正在大扫除，却感到'一种神圣的不满与渴望'，于是扔下刷子冲了出去。"}}, {"q": {"en": "According to the Water Rat, what is the best thing in the world?", "zh": "按照河鼠的说法，世界上最好的事情是什么？"}, "options": [{"en": "Messing about in boats.", "zh": "在船上闲荡（划船玩耍）。"}, {"en": "Spring-cleaning his house.", "zh": "打扫自己的房子。"}, {"en": "Exploring the Wide World.", "zh": "探索广阔的世界。"}, {"en": "Building a fine residence like Toad Hall.", "zh": "建造像蟾蜍宫那样华丽的宅邸。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Rat tells Mole, 'There is nothing — absolute nothing — half so much worth doing as simply messing about in boats.'", "zh": "河鼠对鼹鼠说：'没有什么——绝对没有什么——比在船上闲荡更值得做的了。'"}}, {"q": {"en": "What happens when Mole insists on rowing the boat himself?", "zh": "当鼹鼠坚持要自己划船时，发生了什么？"}, "options": [{"en": "He loses control, the boat overturns, and he falls into the river, where Rat rescues him.", "zh": "他失去控制，小船翻了，他掉进河里，由河鼠把他救了上来。"}, {"en": "He rows perfectly and impresses Rat.", "zh": "他划得非常完美，让河鼠刮目相看。"}, {"en": "He rows them all the way home safely.", "zh": "他一路把他们安全地划回了家。"}, {"en": "The boat hits a weir and Toad appears.", "zh": "小船撞上了堰，蟾蜍出现了。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Mole grabs the sculls, misses the water, and 'Over went the boat, and he found himself struggling in the river' until Rat pulls him out.", "zh": "鼹鼠抓起船桨，却扑了个空，'小船翻了，他发现自己正在河里挣扎'，直到河鼠把他拖上岸。"}}, {"q": {"en": "Which two animals do Mole and Rat encounter during their riverside lunch?", "zh": "在河边的午餐中，鼹鼠和河鼠遇到了哪两种动物？"}, "options": [{"en": "Otter and Badger (though Badger quickly leaves).", "zh": "水獭和獾（不过獾很快就离开了）。"}, {"en": "Toad and Otter.", "zh": "蟾蜍和水獭。"}, {"en": "The Rabbit and Mole's neighbor.", "zh": "兔子和鼹鼠的邻居。"}, {"en": "Badger and Toad.", "zh": "獾和蟾蜍。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The Otter hauls himself out to share food, and Badger appears from the hedge but grunts 'Company' and turns away.", "zh": "水獭爬上岸来分享食物，而獾从树篱里探出头，却嘟囔一句'有人'，转身离开了。"}}, {"q": {"en": "How does the author show that Mole gradually becomes comfortable with river life?", "zh": "作者如何表现鼹鼠逐渐适应了河边生活？"}, "options": [{"en": "By showing his behavior shift from clumsy panic to confidently helping and wanting to row.", "zh": "通过描写他的行为从笨拙慌乱，逐渐变为自信地帮忙、想要划船。"}, {"en": "By having Rat give him a long lecture about boats.", "zh": "通过让河鼠给他上一堂关于船的长篇大课。"}, {"en": "By describing Mole reading a book about rivers.", "zh": "通过描写鼹鼠读了一本关于河流的书。"}, {"en": "By making Mole move into Toad Hall.", "zh": "通过让鼹鼠搬进蟾蜍宫。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Early on Mole falls in the river, but later he eagerly unpacks the lunch, takes the oars, and tells Rat 'I am very sorry indeed for my foolish and ungrateful conduct' — showing growth.", "zh": "起初鼹鼠掉进河里，但后来他积极地 unpack 午餐、抢过船桨，并向河鼠道歉认错——表现出成长。"}}, {"q": {"en": "The author personifies the river, calling it 'the River' with a capital letter and 'brother and sister' to Rat. What does this reveal?", "zh": "作者把河流拟人化，称其为大写'河流'，并说是河鼠的'兄妹'。这揭示了什么？"}, "options": [{"en": "Rat views the river as a living companion and family member, not just water.", "zh": "河鼠把河流看作有生命的伙伴，甚至是家人，而不仅仅是一片水。"}, {"en": "Rat thinks the river is dangerous and frightening.", "zh": "河鼠认为河流危险而可怕。"}, {"en": "The river is actually a character who speaks aloud.", "zh": "河流其实是一个会开口说话的角色。"}, {"en": "It shows Mole dislikes the water.", "zh": "这说明鼹鼠讨厌水。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Rat says, 'By it and with it and on it and in it... It's brother and sister to me,' showing deep personification.", "zh": "河鼠说：'我在它之中、与它为伴、依它而活……它是我的兄妹'，体现出深度的拟人化。"}}, {"q": {"en": "Based on the text, how is the Wild Wood different from the River Bank for the animal characters?", "zh": "根据文本，对动物们来说，野树林与河岸有何不同？"}, "options": [{"en": "The River Bank is a friendly, sociable place, while river bankers rarely visit the Wild Wood, which they consider dangerous.", "zh": "河岸是一个友善、热闹的聚居地，而河岸居民很少去野树林，认为那里危险。"}, {"en": "The Wild Wood is where all the animals hold picnics.", "zh": "野树林是所有动物举办野餐的地方。"}, {"en": "The River Bank is empty and the Wild Wood is crowded.", "zh": "河岸空无一人，而野树林人满为患。"}, {"en": "Both places are equally safe and welcoming.", "zh": "两个地方同样安全、同样好客。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Rat says, 'We don't go there very much, we river bankers,' and warns the Wild Wood holds weasels, stoats, and foxes.", "zh": "河鼠说：'我们河岸居民很少去那里'，并警告野树林里有黄鼠狼、白鼬和狐狸。"}}, {"q": {"en": "What does the Rat tell Mole about 'the Wide World' beyond the Wild Wood?", "zh": "关于野树林之外的'广阔世界'，河鼠对鼹鼠说了什么？"}, "options": [{"en": "He says he has never been there, never intends to go, and asks Mole never to mention it again.", "zh": "他说自己从未去过，也永远不会去，并让鼹鼠以后不要再提起它。"}, {"en": "He says it is the best place to build a house.", "zh": "他说那是盖房子的最佳地点。"}, {"en": "He plans to move there with Mole next spring.", "zh": "他打算明年春天和鼹鼠搬去那里。"}, {"en": "He says Toad lives there now.", "zh": "他说蟾蜍现在住在那里。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Rat tells Mole, 'I've never been there, and I'm never going, nor you either... Don't ever refer to it again, please.'", "zh": "河鼠对鼹鼠说：'我从未去过，也永远不会去，你也不许去……请以后别再提它了。'"}}, {"q": {"en": "What does the author's focus question suggest is a central theme of this part of the book?", "zh": "作者的焦点问题暗示了本书这一部分的核心主题是什么？"}, "options": [{"en": "The difference between living in a community (like Rat) and a life of solitude (like Mole at first).", "zh": "群居生活（如河鼠）与独处生活（如起初的鼹鼠）之间的不同。"}, {"en": "How to build the fastest boat on the river.", "zh": "如何在河上造出最快的船。"}, {"en": "Why Toad keeps changing his hobbies.", "zh": "为什么蟾蜍不断更换爱好。"}, {"en": "The best way to catch fish for dinner.", "zh": "抓鱼当晚餐的最佳方法。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The focus question asks, 'How is Rat's life in a community different from Mole's life of solitude?'", "zh": "焦点问题写道：'河鼠的社群生活与鼹鼠的独处生活有何不同？'"}}, {"q": {"en": "How does the author portray the simple pleasures of nature and friendship?", "zh": "作者如何描绘自然与友情的简单乐趣？"}, "options": [{"en": "Positively and warmly, as something worth celebrating and sharing.", "zh": "以积极、温暖的方式，将其描绘成值得珍惜和分享的事物。"}, {"en": "As boring and not worth describing.", "zh": "认为无聊，不值得描写。"}, {"en": "As dangerous and to be avoided.", "zh": "认为危险，应当回避。"}, {"en": "As something only rich animals can enjoy.", "zh": "认为只有富有的动物才能享受。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book celebrates lazy river days, shared lunches, and Rat's kindness in taking Mole in, treating them as joys.", "zh": "全书赞美悠闲的河边时光、共享的午餐，以及河鼠收留鼹鼠的善意，将其视为乐事。"}}], "extended": {"prompt": {"en": "Mole leaves a solitary life for friendship by the river. Describe a time you tried something new with the help of a friend. What did you learn?", "zh": "鼹鼠离开独居生活，在河边收获了友谊。请描述一次你在朋友帮助下尝试新事物的经历，你学到了什么？"}, "guidance": {"en": ["Think about a moment when someone introduced you to a new activity.", "Explain how that person's support changed how you felt about the new experience."], "zh": ["回想有人带你接触一项新活动的时刻。", "说明那个人的支持如何改变了你对这次新体验的感受。"]}}};</script>
