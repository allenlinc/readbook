<script>window.BOOK = {"slug": "galapagos-wonder", "title": "Galapagos Wonder", "titleZh": "加拉帕戈斯奇观", "level": "U", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Where are the Galapagos Islands located?", "zh": "加拉帕戈斯群岛位于哪里？"}, "options": [{"en": "In the Caribbean Sea", "zh": "加勒比海"}, {"en": "In the Pacific Ocean, off the northwest coast of South America, part of Ecuador", "zh": "太平洋中，南美洲西北海岸外，属厄瓜多尔"}, {"en": "In the Atlantic Ocean near Africa according to some versions of the story in an early draft of the book", "zh": "靠近非洲的大西洋（按书中另一种说法）（在书的早期草稿中）"}, {"en": "In the Indian Ocean", "zh": "印度洋"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "They lie in the Pacific about 966 km off South America's northwest coast, on the equator, and belong to Ecuador.", "zh": "它们位于太平洋，距南美洲西北海岸约966公里，地处赤道，属于厄瓜多尔。"}}, {"q": {"en": "Why is the Galapagos climate surprisingly cool for being on the equator?", "zh": "加拉帕戈斯地处赤道，气候为何却出奇凉爽？"}, "options": [{"en": "The Humboldt current brings cold water north from Antarctica", "zh": "洪堡寒流从南极带来了冷水"}, {"en": "There are high mountains according to some versions of the story", "zh": "那里有高山（按书中另一种说法）"}, {"en": "It rains constantly", "zh": "终年下雨"}, {"en": "There is deep snow", "zh": "有深厚的积雪"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The cold Humboldt current flowing north from Antarctica cools the islands, allowing penguins and sea lions to live there.", "zh": "来自南极的寒冷洪堡寒流使群岛降温，使企鹅和海狮也能在此生存。"}}, {"q": {"en": "How were the Galapagos Islands formed?", "zh": "加拉帕戈斯群岛是如何形成的？"}, "options": [{"en": "By erosion", "zh": "由侵蚀形成"}, {"en": "By coral buildup according to some versions of the story in an early draft of the book", "zh": "由珊瑚堆积形成（按书中另一种说法）（在书的早期草稿中）"}, {"en": "By volcanic activity over a 'hot spot' in the earth's crust", "zh": "由地壳“热点”上的火山活动形成"}, {"en": "By glaciers", "zh": "由冰川形成"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "They sit over a volcanic hot spot; molten lava built up on the seafloor until islands rose above the water.", "zh": "它们位于火山热点之上，熔岩在海底堆积，最终露出水面形成岛屿。"}}, {"q": {"en": "Who visited the islands in 1835 and later developed the theory of natural selection?", "zh": "谁在1835年访问该群岛，后来提出了自然选择学说？"}, "options": [{"en": "Christopher Columbus", "zh": "克里斯托弗·哥伦布"}, {"en": "Captain Gregory", "zh": "格雷戈里船长"}, {"en": "Alexander the Great", "zh": "亚历山大大帝"}, {"en": "Charles Darwin", "zh": "查尔斯·达尔文"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "British naturalist Charles Darwin visited in 1835 at age 24 and his observations helped him develop the theory of natural selection.", "zh": "英国博物学家查尔斯·达尔文24岁时于1835年到访，他的观察帮助他提出了自然选择学说。"}}, {"q": {"en": "What did Darwin notice about similar kinds of animals on different islands?", "zh": "达尔文注意到不同岛屿上相似的动物有什么特点？"}, "options": [{"en": "They developed different traits on different islands", "zh": "它们在不同岛屿上演化出不同的特征"}, {"en": "They were all identical according to some versions of the story", "zh": "它们完全一样（按书中另一种说法）"}, {"en": "They came from Europe", "zh": "它们来自欧洲"}, {"en": "They were all extinct", "zh": "它们都已灭绝"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Darwin observed that similar species developed different traits on different islands, showing nature's variety.", "zh": "达尔文观察到相似物种在不同岛屿上演化出不同特征，体现了自然的多样性。"}}, {"q": {"en": "How do marine iguanas get rid of the extra salt they take in from seawater?", "zh": "海鬣蜥如何排出从海水中摄入的多余盐分？"}, "options": [{"en": "By drinking fresh water according to some versions of the story in an early draft of the book", "zh": "喝淡水（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Through special glands connected to their nostrils (they seem to sneeze)", "zh": "通过连接鼻孔的特殊腺体（看起来像打喷嚏）"}, {"en": "By sweating", "zh": "通过出汗"}, {"en": "By crying", "zh": "通过哭泣"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "Special glands linked to their nostrils remove salt; the iguanas appear to sneeze as they expel it.", "zh": "与鼻孔相连的特殊腺体排出盐分，海鬣蜥排出时看起来像在打喷嚏。"}}, {"q": {"en": "What makes the Galapagos penguin unusual?", "zh": "加拉帕戈斯企鹅有什么特别之处？"}, "options": [{"en": "It cannot swim", "zh": "它不会游泳"}, {"en": "It lives near Antarctica according to some versions of the story in an early draft of the book", "zh": "它生活在南极附近（按书中另一种说法）（在书的早期草稿中）"}, {"en": "It is the most northern penguin, living on islands on the equator", "zh": "它是最北的企鹅，生活在赤道上的群岛"}, {"en": "It is huge", "zh": "它体型巨大"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "Galapagos penguins are the most northern penguin species, living right on the equator thanks to the cold current.", "zh": "加拉帕戈斯企鹅是最北的企鹅种类，借助寒流生活在赤道上的群岛。"}}, {"q": {"en": "What is described as the most serious threat to the native plants and animals?", "zh": "书中认为对当地动植物最严重的威胁是什么？"}, "options": [{"en": "Non-native species brought by humans", "zh": "人类带来的外来物种"}, {"en": "Cold ocean water according to some versions of the story", "zh": "寒冷的海水（按书中另一种说法）"}, {"en": "Volcanoes", "zh": "火山"}, {"en": "Tourists only", "zh": "仅游客"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Cats, dogs, pigs, goats, rats and other introduced animals became feral and ate native eggs, hatchlings, and plants.", "zh": "猫、狗、猪、山羊、老鼠等被引入的动物野化后，吃掉了本土动物的蛋、幼体和植物。"}}, {"q": {"en": "In what year did Ecuador declare 95 percent of the islands' land a national park?", "zh": "厄瓜多尔在哪一年将岛屿95%的土地划为国家公园？"}, "options": [{"en": "1835 according to some versions of the story", "zh": "1835年（按书中另一种说法）"}, {"en": "1986", "zh": "1986年"}, {"en": "2001", "zh": "2001年"}, {"en": "1959", "zh": "1959年"}], "answer": 3, "skill": "Author's Purpose and Perspective", "explain": {"en": "In 1959 Ecuador declared 95 percent of the land a national park to help protect the unique ecology.", "zh": "1959年厄瓜多尔将95%的土地划为国家公园，以保护独特的生态。"}}, {"q": {"en": "About how many of the roughly 560 native plant kinds are found nowhere else on Earth?", "zh": "约560种本土植物中，大约有多少种在地球其他地方找不到？"}, "options": [{"en": "All 560", "zh": "全部560种"}, {"en": "About 180 (almost one-third)", "zh": "约180种（近三分之一）"}, {"en": "About 10", "zh": "约10种"}, {"en": "About 400 according to some versions of the story", "zh": "约400种（按书中另一种说法）"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Almost one-third of the native plants are found nowhere else on Earth, making the islands unique.", "zh": "近三分之一的本土植物在世界其他地方绝无仅有，使这些岛屿非常独特。"}}], "extended": {"prompt": {"en": "The Galapagos Islands are home to many rare species found nowhere else. If you were in charge of protecting them, what rules would you make for visitors, and why?", "zh": "加拉帕戈斯群岛栖息着许多别处没有的稀有物种。如果由你负责保护它们，你会为游客制定什么规则？为什么？"}, "guidance": {"en": ["Think about the harm that non-native species and pollution can cause.", "Consider how limiting visitors helps both wildlife and future generations."], "zh": ["想想外来物种和污染可能造成的危害。", "考虑限制游客数量如何同时保护野生动物和子孙后代。"]}}};</script>
