<script>window.BOOK = {"slug": "the-history-of-halloween", "title": "The History of Halloween", "titleZh": "万圣节的历史", "level": "U", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "On what date is Halloween celebrated each year?", "zh": "万圣节每年在哪一天庆祝？"}, "options": [{"en": "November 1", "zh": "11月1日"}, {"en": "October 31", "zh": "10月31日"}, {"en": "December 25", "zh": "12月25日"}, {"en": "January 1", "zh": "1月1日"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says Halloween is celebrated on October 31, when trick-or-treaters pour into the streets.", "zh": "书中说道，万圣节在10月31日庆祝，那天“不给糖就捣蛋”的孩子们涌上街头。"}}, {"q": {"en": "Which ancient peoples started the traditions that led to Halloween?", "zh": "是哪个古老的民族开创了后来演变成万圣节的传统？"}, "options": [{"en": "The Celts", "zh": "凯尔特人"}, {"en": "The Greeks", "zh": "希腊人"}, {"en": "The Romans", "zh": "罗马人"}, {"en": "The Egyptians", "zh": "埃及人"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says the holiday began with the Celtic peoples who lived in Great Britain, Ireland, and northern France about two thousand years ago.", "zh": "书中说这个节日始于约两千年前居住在不列颠、爱尔兰和法国北部的凯尔特人。"}}, {"q": {"en": "What was Samhain in the Celtic tradition?", "zh": "在凯尔特传统中，萨温节（Samhain）是什么？"}, "options": [{"en": "A Christian holy day", "zh": "一个基督教圣日"}, {"en": "A harvest festival and the final day of the Celtic year", "zh": "丰收节，也是凯尔特人一年的最后一天"}, {"en": "A summer music festival according to some versions of the story", "zh": "一个夏季音乐节（按书中另一种说法）"}, {"en": "A type of jack-o'-lantern", "zh": "一种南瓜灯"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The book explains Samhain was a fall harvest festival, and according to the Celtic calendar October 31 was the final day of the year.", "zh": "书中解释，萨温节是秋季的丰收节；按照凯尔特历，10月31日是一年的最后一天。"}}, {"q": {"en": "How did the name \"Halloween\" develop?", "zh": "“Halloween”这个名字是如何形成的？"}, "options": [{"en": "From the Celtic word for \"pumpk n": "They replaced it with a new holiday", "zh": "他们用一个新的节日取而代之"}, {"en": "They ended the celebration completely according to some versions of the story", "zh": "他们彻底终结了这一庆祝活动（按书中另一种说法）"}, {"en": "They made it much more popular and brought traditions like jack-o'-lanterns", "zh": "他们让万圣节更受欢迎，并带来了南瓜灯等传统"}, {"en": "They had no effect on it", "zh": "他们对此没有任何影响"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says the holiday became much more popular when large numbers of Irish immigrants arrived in the 1800s, bringing jack-o'-lanterns and mumming traditions.", "zh": "书中说，19世纪大批爱尔兰移民到来后，这个节日变得更为流行，他们带来了南瓜灯和扮装讨食等传统。"}}], "extended": {"prompt": {"en": "Halloween mixes old traditions (like the Celtic Samhain and Irish jack-o'-lanterns) with new ones (like candy and costumes for adults). Think of a holiday or celebration in your own culture that blends old and new traditions, and describe one old part and one new part.", "zh": "万圣节把古老传统（如凯尔特人的萨温节、爱尔兰的南瓜灯）与新元素（如糖果和成人 costumes）融合在一起。想想你文化中一个新旧传统交融的节日，分别描述其中新旧各一部分。"}, "guidance": {"en": ["Look back at how Halloween combined Celtic, Catholic, and modern American customs.", "Consider a festival you celebrate and which parts feel old versus new."], "zh": ["回顾万圣节如何融合凯尔特、天主教和现代美国习俗。", "想想你庆祝的节日中，哪些部分古老、哪些部分新颖。"]}}};</script>
