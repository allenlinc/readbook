<script>window.BOOK = {"slug": "chichn-itz", "title": "Chichén Itzá", "titleZh": "奇琴伊察", "level": "U", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Who discovered Chichén Itzá in 1842?", "zh": "1842年是谁发现了奇琴伊察？"}, "options": [{"en": "The Maya emperor Kukulkan", "zh": "玛雅皇帝库库尔坎"}, {"en": "John Lloyd Stephens and Frederick Catherwood", "zh": "约翰·劳埃德·斯蒂芬斯和弗雷德里克·卡瑟伍德"}, {"en": "Guy Fawkes and Benjamin Hall", "zh": "盖伊·福克斯和本杰明·霍尔"}, {"en": "Charles Barry and Augustus Pugin according to some versions of the story", "zh": "查尔斯·巴里和奥古斯特·普金（按书中另一种说法）"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says that in 1842, explorers John Lloyd Stephens and Frederick Catherwood were traveling through the jungle in eastern Mexico when they found the ancient city.", "zh": "书中说，1842年探险家约翰·劳埃德·斯蒂芬斯和弗雷德里克·卡瑟伍德在墨西哥东部的丛林中旅行时，发现了那座古城。"}}, {"q": {"en": "About how old was the city when the explorers found it?", "zh": "探险家发现这座城时，它大约有多少年历史？"}, "options": [{"en": "Over 5,000 years old according to some versions of the story", "zh": "超过5000年（按书中另一种说法）"}, {"en": "About 1,300 years old", "zh": "约1300年"}, {"en": "Only 50 years old", "zh": "只有50年"}, {"en": "About 100 years old", "zh": "约100年"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says they had found the 1,300-year-old city of Chichén Itzá.", "zh": "书中说，他们发现的是一座有1300年历史的奇琴伊察古城。"}}, {"q": {"en": "Across which modern countries did the Maya empire spread?", "zh": "玛雅帝国分布在哪些现代国家？"}, "options": [{"en": "Canada, USA, Mexico, Brazil, Chile", "zh": "加拿大、美国、墨西哥、巴西、智利"}, {"en": "China, India, Japan, Korea, Vietnam", "zh": "中国、印度、日本、韩国、越南"}, {"en": "Mexico, Belize, Guatemala, Honduras, and El Salvador", "zh": "墨西哥、伯利兹、危地马拉、洪都拉斯和萨尔瓦多"}, {"en": "Spain, France, Italy, Germany, Portugal according to some versions of the story", "zh": "西班牙、法国、意大利、德国、葡萄牙（按书中另一种说法）"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says the Maya empire spread across land that is now five countries: Mexico, Belize, Guatemala, Honduras, and El Salvador.", "zh": "书中说，玛雅帝国分布在如今五个国家的土地上：墨西哥、伯利兹、危地马拉、洪都拉斯和萨尔瓦多。"}}, {"q": {"en": "What is El Castillo?", "zh": "“埃尔卡斯蒂略”是什么？"}, "options": [{"en": "The Great Ball Court", "zh": "大球场"}, {"en": "A sacred well for offerings according to some versions of the story", "zh": "一口用于献祭的圣井（按书中另一种说法）"}, {"en": "The observatory building", "zh": "天文台建筑"}, {"en": "The large pyramid in the center, meaning 'the castle'", "zh": "位于中心的大金字塔，意思是“城堡”"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The book says the large pyramid, El Castillo (Spanish for 'the castle'), is in the center of Chichén Itzá and was the structure Stephens and Catherwood first spotted.", "zh": "书中说，大金字塔“埃尔卡斯蒂略”（西班牙语意为“城堡”）位于奇琴伊察中心，正是斯蒂芬斯和卡瑟伍德最先看到的建筑。"}}, {"q": {"en": "How did the Maya move the heavy limestone blocks without wheels or large animals?", "zh": "在没有车轮也没有大型牲畜的情况下，玛雅人如何搬运沉重的石灰岩石块？"}, "options": [{"en": "Workers carried the blocks to the city and put them in place by hand", "zh": "工人把石块扛到城里，亲手安放到位"}, {"en": "They used horses and oxen to drag them", "zh": "他们用马和牛拖运"}, {"en": "They used wagons with wheels", "zh": "他们用带轮子的马车"}, {"en": "They floated them down rivers on boats according to some versions of the story", "zh": "他们用船沿河漂流运下去（按书中另一种说法）"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The book explains the Maya did not use wheels in transportation and had no wagons or large animals, so workers carried blocks and placed them by hand.", "zh": "书中解释，玛雅人运输不用轮子，也没有马车或大型牲畜，所以工人只能把石块扛过去并亲手安放。"}}, {"q": {"en": "What was the Sacred Cenote used for?", "zh": "圣井（Sacred Cenote）是用来做什么的？"}, "options": [{"en": "As a ball court", "zh": "当作球场"}, {"en": "As a place to make offerings to Chac, the rain god", "zh": "作为向雨神恰克献祭的地方"}, {"en": "As the king's residence according to some versions of the story", "zh": "作为国王的居所（按书中另一种说法）"}, {"en": "As a marketplace", "zh": "当作市场"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says the Maya used the Sacred Cenote, a natural well, as a place to make offerings to Chac, their rain god.", "zh": "书中说，玛雅人把圣井这座天然水井当作向雨神恰克献祭的场所。"}}, {"q": {"en": "What is special about the number of steps on El Castillo?", "zh": "埃尔卡斯蒂略的台阶数量有什么特别？"}, "options": [{"en": "Four staircases of 91 steps plus the platform equal 365, one for each day of the year", "zh": "四条各91级的阶梯加上顶层平台共365级，对应一年中的每一天"}, {"en": "There are exactly 100 steps", "zh": "正好100级"}, {"en": "There are 12 steps for the months according to some versions of the story in an early draft of the book", "zh": "对应月份的12级（按书中另一种说法）（在书的早期草稿中）"}, {"en": "There are no steps, only a ramp", "zh": "没有台阶，只有斜坡"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The book says El Castillo has four staircases of ninety-one steps each, and counting the platform at the top there is a step for each day of the year (365).", "zh": "书中说，埃尔卡斯蒂略有四条各91级的阶梯，加上顶层的平台，正好每天一级，共365级。"}}, {"q": {"en": "What happens twice a year at sunset on El Castillo?", "zh": "每年有两次，夕阳照在埃尔卡斯蒂略上会发生什么？"}, "options": [{"en": "A festival of music is held", "zh": "举行音乐节"}, {"en": "Fireworks light up the pyramid according to some versions of the story in an early draft of the book", "zh": "烟花照亮金字塔（按书中另一种说法）（在书的早期草稿中）"}, {"en": "The king gives a speech", "zh": "国王发表演讲"}, {"en": "Sun rays cast triangular shadows that look like a slithering serpent", "zh": "阳光投下三角形阴影，看上去像一条游动的巨蛇"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says twice a year at sunset the rays hit the pyramid and cast triangular shadows down a stairway like a slithering serpent that connects to a stone snake-head carving.", "zh": "书中说，每年有两次，落日光线照在金字塔上，沿阶梯投下三角形阴影，宛如一条游动的巨蛇，与底部的石头蛇头雕刻相连。"}}, {"q": {"en": "What was the observatory El Caracol built to view?", "zh": "天文台“埃尔卡拉科尔”是为了观测什么而建的？"}, "options": [{"en": "Venus at its northernmost point in the sky", "zh": "处于天空中最北端时的金星"}, {"en": "Falling stars", "zh": "流星"}, {"en": "The Moon only", "zh": "仅观测月亮"}, {"en": "The Sun at noon according to some versions of the story", "zh": "正午的太阳（按书中另一种说法）"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says El Caracol's building and windows are perfectly angled for seeing Venus when it appears at its northernmost point in the sky.", "zh": "书中说，埃尔卡拉科尔的建筑和窗子角度精确，能在金星出现在天空最北端时观测到它。"}}, {"q": {"en": "Why are visitors no longer allowed to climb El Castillo?", "zh": "为什么现在游客不被允许攀登埃尔卡斯蒂略？"}, "options": [{"en": "Because it is too far from the entrance", "zh": "因为离入口太远"}, {"en": "Because the Maya still use it for ceremonies according to some versions of the story", "zh": "因为玛雅人仍用它举行仪式（按书中另一种说法）"}, {"en": "To protect the pyramid from wear and to protect tourists from falls", "zh": "为了保护金字塔免受磨损，也保护游客免于坠落"}, {"en": "Because it is made of gold", "zh": "因为它是金子做的"}], "answer": 2, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book says the rule helps protect the pyramid from the wear of climbers' feet and also protects tourists from a possible fall.", "zh": "书中说，这一规定既能保护金字塔免受攀爬者脚步的磨损，也能保护游客免于可能的坠落。"}}], "extended": {"prompt": {"en": "The book's focus question asks what has been discovered about Chichén Itzá. Choose one discovery the Maya left behind (such as the 365-step pyramid, the serpent-shadow event, or the Venus observatory) and explain what it tells us about Maya knowledge and skills.", "zh": "书中聚焦的问题是：关于奇琴伊察，人们有了哪些发现。请选择玛雅人留下的一项发现（比如365级的金字塔、蛇影奇观，或金星天文台），说明它告诉我们玛雅人拥有怎样的知识与技艺。"}, "guidance": {"en": ["Refer to a specific structure or event described in the book.", "Connect it to what it shows about Maya understanding of astronomy, math, or building."], "zh": ["请引用书中描述的具体建筑或事件。", "把它与玛雅人在天文、数学或建筑方面的理解联系起来。"]}}};</script>
