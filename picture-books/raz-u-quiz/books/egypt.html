<script>window.BOOK = {"slug": "egypt", "title": "Egypt", "titleZh": "埃及", "level": "U", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "On which continent is most of Egypt located?", "zh": "埃及大部分位于哪个大洲？"}, "options": [{"en": "Africa", "zh": "非洲"}, {"en": "Europe", "zh": "欧洲"}, {"en": "Australia", "zh": "大洋洲"}, {"en": "Asia", "zh": "亚洲"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Egypt is in northern Africa; only the Sinai Peninsula is in Asia.", "zh": "埃及位于非洲北部，只有西奈半岛在亚洲。"}}, {"q": {"en": "What is the capital of Egypt?", "zh": "埃及的首都是哪里？"}, "options": [{"en": "Giza", "zh": "吉萨"}, {"en": "Alexandria", "zh": "亚历山大"}, {"en": "Cairo", "zh": "开罗"}, {"en": "Luxor", "zh": "卢克索"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "Cairo, on the Nile River, is the capital and one of the largest cities in Africa with over eleven million people.", "zh": "开罗位于尼罗河畔，是首都，也是非洲最大城市之一，人口逾1100万。"}}, {"q": {"en": "Which river is the main source of water for most Egyptians?", "zh": "对大多数埃及人来说，哪条河是主要水源？"}, "options": [{"en": "The Tigris", "zh": "底格里斯河"}, {"en": "The Amazon", "zh": "亚马逊河"}, {"en": "The Nile", "zh": "尼罗河"}, {"en": "The Suez", "zh": "苏伊士河"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "Most Egyptians live along the Nile, which provides much of the country's water for drinking and farming.", "zh": "多数埃及人居住在尼罗河沿岸，该河提供了全国大部分饮用和灌溉用水。"}}, {"q": {"en": "What covers most of Egypt's land?", "zh": "埃及大部分土地被什么覆盖？"}, "options": [{"en": "Forests according to some versions of the story", "zh": "森林（按书中另一种说法）"}, {"en": "Deserts", "zh": "沙漠"}, {"en": "Lakes", "zh": "湖泊"}, {"en": "Farms", "zh": "农田"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "Deserts cover most of Egypt; the Western Desert alone is two-thirds of the country, all part of the Sahara.", "zh": "沙漠覆盖埃及大部分土地，仅西部沙漠就占国土三分之二，均属撒哈拉沙漠。"}}, {"q": {"en": "Around what year was the Great Pyramid of Khufu built?", "zh": "胡夫大金字塔大约建于哪一年？"}, "options": [{"en": "About 2589 BC", "zh": "约公元前2589年"}, {"en": "640 AD", "zh": "公元640年"}, {"en": "1889", "zh": "1889年"}, {"en": "1922 AD according to some versions of the story", "zh": "公元1922年（按书中另一种说法）"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The Great Pyramid of Khufu, the largest and oldest at Giza, was built around 2589 BC from 2.3 million stone blocks.", "zh": "吉萨最大最古老的胡夫大金字塔约建于公元前2589年，由230万块石头砌成。"}}, {"q": {"en": "What connects the Mediterranean Sea and the Red Sea?", "zh": "什么连接了地中海与红海？"}, "options": [{"en": "Lake Nasser", "zh": "纳赛尔湖"}, {"en": "The Sahara Desert", "zh": "撒哈拉沙漠"}, {"en": "The Nile River", "zh": "尼罗河"}, {"en": "The Suez Canal", "zh": "苏伊士运河"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The French built the Suez Canal between 1859 and 1869, linking the two seas.", "zh": "法国于1859至1869年间开凿苏伊士运河，连通两海。"}}, {"q": {"en": "What happened when Tutankhamun's tomb was discovered in 1922?", "zh": "1922年图坦卡蒙墓被发现时情况如何？"}, "options": [{"en": "It was found by Alexander", "zh": "由亚历山大发现"}, {"en": "Its treasures were still inside", "zh": "墓中的珍宝仍在里面"}, {"en": "It was found empty in the 1800s", "zh": "在19世纪被发现时已是空墓"}, {"en": "It was never found", "zh": "它从未被发现"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Unlike many tombs robbed long ago, Tutankhamun's tomb still held its treasures when found in 1922.", "zh": "与许多早被盗空的墓不同，图坦卡蒙墓在1922年发现时珍宝尚存。"}}, {"q": {"en": "When did Egypt win partial independence from Britain?", "zh": "埃及何时从英国手中获得部分独立？"}, "options": [{"en": "640 AD", "zh": "公元640年"}, {"en": "1922", "zh": "1922年"}, {"en": "1952", "zh": "1952年"}, {"en": "332 BC", "zh": "公元前332年"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "After coming under British control during World War I, Egypt won partial independence in 1922.", "zh": "在一战期间受英国控制后，埃及于1922年获得部分独立。"}}, {"q": {"en": "What is the Great Sphinx?", "zh": "狮身人面像（Great Sphinx）是什么？"}, "options": [{"en": "A stone figure with a man's head and a lion's body", "zh": "一座人面狮身的石像"}, {"en": "A river", "zh": "一条河"}, {"en": "A temple", "zh": "一座神庙"}, {"en": "A pyramid according to some versions of the story", "zh": "一座金字塔（按书中另一种说法）"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The Great Sphinx near the Pyramids of Giza has the head of a man and the body of a lion.", "zh": "吉萨金字塔旁的狮身人面像，是人头狮身的石雕。"}}, {"q": {"en": "What is the main purpose of this book?", "zh": "这本书的主要目的是什么？"}, "options": [{"en": "To sell tours", "zh": "推销旅游"}, {"en": "To teach math", "zh": "教数学"}, {"en": "To tell a fictional story according to some versions of the story", "zh": "讲述虚构故事（按书中另一种说法）"}, {"en": "To inform readers about Egypt's geography, history, and culture", "zh": "向读者介绍埃及的地理、历史与文化"}], "answer": 3, "skill": "Author's Purpose and Perspective", "explain": {"en": "As a 'Countries Around the World' title, it gives factual information about where Egypt is, its people, land, history, and landmarks.", "zh": "作为“世界各国”系列，它提供关于埃及位置、人民、土地、历史和地标的 factual 信息。"}}], "extended": {"prompt": {"en": "Egypt's history stretches back thousands of years, yet the Nile still shapes life today. What is one fact about Egypt that surprised you, and why does the Nile matter so much?", "zh": "埃及的历史绵延数千年，而尼罗河至今仍影响着人们的生活。书中哪个关于埃及的事实让你惊讶？尼罗河为何如此重要？"}, "guidance": {"en": ["Look at how the Nile provides water, farmland, and transportation.", "Compare Egypt's ancient past with its modern cities like Cairo."], "zh": ["看看尼罗河如何提供水、农田和交通。", "对比埃及的古代历史与开罗等现代城市。"]}}};</script>
