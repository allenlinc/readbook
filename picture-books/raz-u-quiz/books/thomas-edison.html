 "蒸汽动力"}, {"en": "Gas lamps", "zh": "煤气灯"}, {"en": "Edison's direct current (DC) according to some versions of the story", "zh": "爱迪生的直流电（DC）（按书中另一种说法）"}, {"en": "Westinghouse and Tesla's alternating current (AC)", "zh": "西屋与特斯拉的交流电（AC）"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book explains Edison used DC, while Westinghouse used AC (invented by Tesla), and AC eventually became dominant.", "zh": "书中解释爱迪生采用直流电，而西屋公司采用特斯拉发明的交流电，最终交流电占据了主导。"}}, {"q": {"en": "How many patents did Edison obtain in his lifetime?", "zh": "爱迪生一生共获得了多少项专利？"}, "options": [{"en": "1,093", "zh": "1,093项"}, {"en": "1869", "zh": "1,869项"}, {"en": "25", "zh": "25项"}, {"en": "3,500 according to some versions of the story", "zh": "3,500项（按书中另一种说法）"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says throughout his life Edison obtained 1,093 patents, a record at the time.", "zh": "书中说爱迪生一生共获得1,093项专利，在当时是一项纪录。"}}, {"q": {"en": "What does the book suggest about Edison's attitude toward failure?", "zh": "书中体现了爱迪生对失败持怎样的态度？"}, "options": [{"en": "He said negative results were as valuable as positive ones because they showed what did not work", "zh": "他说负面结果和正面结果一样有价值，因为它们表明哪些方法行不通"}, {"en": "He gave up easily", "zh": "他很容易就放弃"}, {"en": "He only succeeded on the first try according to some versions of the story in an early draft of the book", "zh": "他每次都一次成功（按书中另一种说法）（在书的早期草稿中）"}, {"en": "He avoided taking any risks", "zh": "他避免冒任何风险"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Edison said 'Negative results are just as valuable to me as positive results,' because he learned what did not work.", "zh": "爱迪生说“负面结果对我而言与正面结果同样有价值”，因为他能从中得知哪些方法行不通。"}}, {"q": {"en": "How did the nation honor Edison when he died in 1931?", "zh": "1931年爱迪生逝世时，全国是如何纪念他的？"}, "options": [{"en": "With a moment of silence only in New Jersey according to some versions of the story", "zh": "仅在新泽西州默哀片刻（按书中另一种说法）"}
