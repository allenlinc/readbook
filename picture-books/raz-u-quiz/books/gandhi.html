<script>window.BOOK = {"slug": "gandhi", "title": "Gandhi", "titleZh": "甘地", "level": "U", "genre": "Biography", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "What does the name 'Mahatma' mean?", "zh": "“圣雄（Mahatma）”这个名字是什么意思？"}, "options": [{"en": "Great Soul", "zh": "伟大的灵魂"}, {"en": "Father of India", "zh": "印度之父"}, {"en": "Peaceful protester", "zh": "和平抗议者"}, {"en": "Law leader", "zh": "法律领袖"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Indians called Gandhi 'Mahatma,' meaning 'Great Soul,' in honor of his influence.", "zh": "印度人尊称甘地为“圣雄”，意为“伟大的灵魂”。"}}, {"q": {"en": "What happened to Gandhi on a train in South Africa?", "zh": "甘地在南非的火车上发生了什么？"}, "options": [{"en": "He was given a free ticket", "zh": "他得到了一张免费车票"}, {"en": "He was thrown off the first-class car because of his skin color", "zh": "他因肤色被赶出一等车厢"}, {"en": "He became the conductor", "zh": "他成了列车员"}, {"en": "He met the president", "zh": "他会见了总统"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Although he had a first-class ticket, Gandhi was forced off the train because of the color of his skin, sparking his fight against unfair laws.", "zh": "尽管持有一等座车票，甘地却因肤色被赶下车，这促使他投身反抗不公法律。"}}, {"q": {"en": "What does the word 'satyagraha' mean?", "zh": "“satyagraha（坚持真理）”一词是什么意思？"}, "options": [{"en": "Holding firmly to the truth", "zh": "坚守真理"}, {"en": "Peaceful fasting", "zh": "和平绝食"}, {"en": "Noncooperation", "zh": "不合作"}, {"en": "Civil war", "zh": "内战"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Gandhi used 'satyagraha' to describe his form of nonviolent protest: holding firmly to the truth.", "zh": "甘地用“satyagraha”描述他的非暴力抗议方式：坚守真理。"}}, {"q": {"en": "How long was Gandhi's Salt March, and how far did he walk?", "zh": "甘地的食盐长征持续多久、走了多远？"}, "options": [{"en": "21 days and 240 miles (386 km)", "zh": "21天，240英里（386公里）"}, {"en": "10 days and 100 miles", "zh": "10天，100英里"}, {"en": "One year", "zh": "一年"}, {"en": "3 days", "zh": "3天"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Beginning March 12, 1930, Gandhi and followers walked 240 miles over 21 days to the sea at Dandi.", "zh": "1930年3月12日起，甘地与追随者用21天步行240英里抵达丹迪海边。"}}, {"q": {"en": "In what year did Gandhi lead the Salt March to Dandi?", "zh": "甘地领导食盐长征前往丹迪是在哪一年？"}, "options": [{"en": "1930", "zh": "1930年"}, {"en": "1915", "zh": "1915年"}, {"en": "1947", "zh": "1947年"}, {"en": "1885", "zh": "1885年"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The famous Salt March took place in 1930 as a protest against the British salt tax.", "zh": "这场著名的食盐长征发生在1930年，抗议英国的盐税。"}}, {"q": {"en": "What was the Amritsar Massacre?", "zh": "阿姆利则惨案是什么？"}, "options": [{"en": "A peaceful protest", "zh": "一场和平抗议"}, {"en": "British troops fired on peaceful protesters, killing hundreds", "zh": "英军向和平抗议者开火，造成数百人死亡"}, {"en": "A storm", "zh": "一场风暴"}, {"en": "A festival", "zh": "一个节日"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "In 1919 British troops opened fire on a peaceful gathering; between 400 and 1,500 Indians died, pushing Gandhi toward noncooperation.", "zh": "1919年英军向和平集会开火，400至1500名印度人丧生，促使甘地转向不合作运动。"}}, {"q": {"en": "Why did Gandhi use fasting?", "zh": "甘地为何使用绝食？"}, "options": [{"en": "To lose weight", "zh": "为了减肥"}, {"en": "As a religious practice and as a political tool", "zh": "作为一种宗教修行，也作为政治工具"}, {"en": "Only to protest the salt tax", "zh": "仅为抗议盐税"}, {"en": "To avoid arrest", "zh": "为了逃避逮捕"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "Fasting was both a Hindu religious practice and a way Gandhi pressured others to make peace, such as ending the 1947 Calcutta riots.", "zh": "绝食既是印度教修行，也是甘地迫使他人求和的手段，例如终结1947年加尔各答的暴乱。"}}, {"q": {"en": "What happened in 1947 when British rule in India ended?", "zh": "1947年英国在印度的统治结束时发生了什么？"}, "options": [{"en": "India remained one united country", "zh": "印度保持统一"}, {"en": "The country was split into India and Pakistan", "zh": "国家被分为印度和巴基斯坦"}, {"en": "Gandhi became president", "zh": "甘地成为总统"}, {"en": "Pakistan joined India", "zh": "巴基斯坦并入印度"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Against Gandhi's advice, the land was partitioned; the Muslim League's wish created Pakistan and over ten million people moved.", "zh": "违背甘地的意愿，土地被分割；穆斯林联盟的愿望促成巴基斯坦建国，逾千万人迁徙。"}}, {"q": {"en": "Who assassinated Gandhi, and why?", "zh": "谁刺杀了甘地？为什么？"}, "options": [{"en": "A young Hindu man who opposed Gandhi's work for peace with Muslims", "zh": "一名反对甘地与穆斯林和平努力的年轻印度教徒"}, {"en": "A British soldier", "zh": "一名英国士兵"}, {"en": "A Muslim leader", "zh": "一名穆斯林领袖"}, {"en": "A stranger with no reason", "zh": "一名无故的陌生人"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "On January 30, 1948, a young Hindu who opposed Gandhi's peacemaking with Muslims shot him three times.", "zh": "1948年1月30日，一名反对甘地与穆斯林和解的年轻印度教徒向他开了三枪。"}}, {"q": {"en": "Which world leaders were inspired by Gandhi's work?", "zh": "哪些世界领袖受到了甘地事业的启发？"}, "options": [{"en": "Martin Luther King Jr. and Nelson Mandela", "zh": "马丁·路德·金和纳尔逊·曼德拉"}, {"en": "Only the British king", "zh": "仅英国国王"}, {"en": "Napoleon", "zh": "拿破仑"}, {"en": "No one", "zh": "没有人"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "His nonviolent methods inspired leaders such as Martin Luther King Jr. and Nelson Mandela.", "zh": "他的非暴力方法启发了马丁·路德·金和纳尔逊·曼德拉等领袖。"}}], "extended": {"prompt": {"en": "Gandhi achieved change without using violence. Do you think nonviolent protest can work today? Give an example of a problem you would try to solve this way.", "zh": "甘地用非暴力实现了变革。你认为非暴力抗议在今天仍然有效吗？请举一个你愿意用这种方式去解决的问题。"}, "guidance": {"en": ["Recall how satyagraha and the Salt March pressured the British government.", "Think about a local or school issue where peaceful action could make a difference."], "zh": ["回想“坚持真理”和食盐长征如何向英国政府施压。", "想想在学校或社区里，和平行动能改变什么问题的例子。"]}}};</script>
