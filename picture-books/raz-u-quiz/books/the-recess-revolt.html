<script>window.BOOK = {"slug": "the-recess-revolt", "title": "The Recess Revolt", "titleZh": "课间休息大反抗", "level": "U", "genre": "Narrative", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Why was Elias so upset about the new recess policy at the very start of the story?", "zh": "在故事一开始，伊莱亚斯为什么对新课间规则这么生气？"}, "options": [{"en": "He had looked forward to a chess rematch with his friend Ada.", "zh": "他一直盼着和朋友阿达下一盘国际象棋重赛。"}, {"en": "He was not allowed to eat lunch outside anymore.", "zh": "他再也不被允许在外面吃午饭了。"}, {"en": "He failed his math test that morning.", "zh": "他那天早上数学考试没及格。"}, {"en": "He wanted to play soccer every single day.", "zh": "他想每天都踢足球。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Elias had spent the summer looking forward to a chess rematch with Ada during recess, but the new rules sent them to the soccer field instead.", "zh": "伊莱亚斯整个暑假都盼着课间和阿达下象棋重赛，可新规则却把他们送去了足球场。"}}, {"q": {"en": "What was the new recess rule that the students had to follow?", "zh": "学生们必须遵守的新课间规则是什么？"}, "options": [{"en": "They could only read books quietly in the classroom.", "zh": "他们只能安静地在教室里看书。"}, {"en": "They had to join teacher-run activities instead of free play.", "zh": "他们必须参加老师组织的活动，而不是自由玩耍。"}, {"en": "They were banned from going to the playground at all.", "zh": "他们完全被禁止去操场。"}, {"en": "They had to eat lunch with the principal every day.", "zh": "他们每天必须和校长一起吃午饭。"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Instead of playing on their own, students now had to participate in a set of activities run by the teachers, like the soccer game Elias and Ada were sent to.", "zh": "学生不能再自己玩，而是必须参加老师组织的一系列活动，比如伊莱亚斯和阿达被安排去的足球活动。"}}, {"q": {"en": "The story compares Elias's protest to the civil rights sit-ins. What is a 'sit-in'?", "zh": "故事把伊莱亚斯的抗议比作民权运动中的静坐。什么叫“静坐”？"}, "options": [{"en": "A peaceful protest where people sit and refuse to leave.", "zh": "一种人们坐下并拒绝离开的和平抗议。"}, {"en": "A loud march through the streets of a city.", "zh": "在城市的街道上大声游行。"}, {"en": "A violent uprising against the government.", "zh": "针对政府的暴力起义。"}, {"en": "A written letter sent to the mayor.", "zh": "寄给市长的一封书面信件。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Mr. Sterling explains a sit-in as protesters sitting quietly and refusing to move, like African Americans who sat at whites-only restaurant counters.", "zh": "斯特林老师解释说，静坐是抗议者安静地坐着、拒绝离开，就像当年在只限白人的餐厅柜台前坐下的非裔美国人。"}}, {"q": {"en": "According to Mr. Sterling, what three nonviolent tactics did civil rights protesters use?", "zh": "根据斯特林老师的说法，民权运动抗议者使用了哪三种非暴力策略？"}, "options": [{"en": "Sit-ins, riots, and angry speeches.", "zh": "静坐、暴乱和愤怒的演讲。"}, {"en": "Votes, petitions, and school rallies.", "zh": "投票、请愿和学校集会。"}, {"en": "Marches, boycotts, and sit-ins.", "zh": "游行、抵制和静坐。"}, {"en": "Strikes, lawsuits, and marches.", "zh": "罢工、诉讼和游行。"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "Mr. Sterling tells the class they will study three tactics: marches, boycotts, and sit-ins.", "zh": "斯特林老师告诉全班，他们将学习三种策略：游行、抵制和静坐。"}}, {"q": {"en": "How did the civil rights sit-ins help Elias plan his own protest?", "zh": "民权运动的静坐如何帮助伊莱亚斯策划自己的抗议？"}, "options": [{"en": "They taught him how to play soccer much better.", "zh": "它们让他学会了把足球踢得更好。"}, {"en": "They gave him a model of nonviolent protest to copy.", "zh": "它们给了他一个可以效仿的非暴力抗议范本。"}, {"en": "They showed him how to write a school budget.", "zh": "它们教他如何写学校预算。"}, {"en": "They proved that teachers are always right.", "zh": "它们证明了老师永远是对的。"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Elias learns about sit-ins in class and decides to use the same peaceful method to protest the recess rules.", "zh": "伊莱亚斯在课堂上学到了静坐，于是决定用同样的和平方式去抗议课间规则。"}}, {"q": {"en": "Why did Principal Ms. King ask Elias and Ada to gather signatures on a petition?", "zh": "校长金女士为什么让伊莱亚斯和阿达收集请愿书上的签名？"}, "options": [{"en": "She wanted proof of how many students agreed before changing rules.", "zh": "她想在改变规则前，先证明有多少学生同意。"}, {"en": "She wanted to punish them with extra homework.", "zh": "她想用额外的作业惩罚他们。"}, {"en": "She needed names for a new soccer team.", "zh": "她需要为新的足球队收集名字。"}, {"en": "She planned to cancel even more classes.", "zh": "她打算取消更多课程。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Ms. King wanted more information and said she would consider alternatives only if more than 200 of about 400 students signed the petition.", "zh": "金女士想了解更多信息，并表示只有在约400名学生中有超过200人签名时，她才会考虑其他方案。"}}, {"q": {"en": "How many signatures did Ms. King require before she would consider alternatives?", "zh": "金女士要求在考虑其他方案前收集到多少个签名？"}, "options": [{"en": "Exactly 50 signatures.", "zh": "正好50个签名。"}, {"en": "All 400 students had to sign.", "zh": "必须全部400名学生都签名。"}, {"en": "Only Elias and Ada's own names.", "zh": "只有伊莱亚斯和阿达自己的名字。"}, {"en": "More than 200 out of about 400 students.", "zh": "约400名学生中超过200人签名。"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The school had about four hundred students, and Ms. King promised to work on alternatives if they got more than two hundred signatures.", "zh": "学校约有400名学生，金女士答应只要他们拿到超过200个签名，就会一起考虑替代方案。"}}, {"q": {"en": "How was the school's P.E. program ultimately saved so free time could return?", "zh": "学校的体育课最终是如何被保住、从而恢复自由时间的？"}, "options": [{"en": "A local sporting goods store owner offered sponsorship.", "zh": "一家本地体育用品店老板提供了赞助。"}, {"en": "The mayor gave the school a large grant.", "zh": "市长给了学校一大笔拨款。"}, {"en": "Parents paid a fee for every child.", "zh": "每位家长都为孩子交了费用。"}, {"en": "A single bake sale raised enough money.", "zh": "一次烘焙义卖就筹到了足够的钱。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The owner of a local sporting goods store, Mr. Pope, called to offer sponsorship of the P.E. program for the next five years.", "zh": "本地一家体育用品店的老板波普先生打来电话，表示愿意在未来五年赞助学校的体育课项目。"}}, {"q": {"en": "In the story, what does 'circulate' mean when Elias and Ada circulate their petition?", "zh": "在故事里，伊莱亚斯和阿达“传阅”请愿书时，“circulate”是什么意思？"}, "options": [{"en": "To throw the paper away.", "zh": "把纸扔掉。"}, {"en": "To sign it only once themselves.", "zh": "只由他们自己签一次名。"}, {"en": "To pass it around from person to person.", "zh": "在人与人之间传递传阅。"}, {"en": "To hide it from all the teachers.", "zh": "把它藏起来不让老师看见。"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "The glossary defines circulate as 'to pass or move around from person to person,' which is what they did at lunch, in the halls, and at recess.", "zh": "词汇表把 circulate 定义为“在人与人之间的传递或传阅”，这正是他们在午餐、走廊和课间所做的事。"}}, {"q": {"en": "What lesson from social studies most changed the outcome of the story?", "zh": "社会课上学到的哪个道理最改变了故事的结局？"}, "options": [{"en": "That recess is a legal right for every student.", "zh": "课间休息是每个学生合法拥有的权利。"}, {"en": "That soccer is required by law every afternoon.", "zh": "法律要求每天下午都必须踢足球。"}, {"en": "That principals are not allowed to say no.", "zh": "校长不被允许说“不”。"}, {"en": "That nonviolent protest can lead to real change.", "zh": "非暴力抗议可以带来真正的改变。"}], "answer": 3, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The class lesson about nonviolent civil disobedience inspired Elias's sit-in and petition, which ultimately won back free time at recess.", "zh": "课堂上关于非暴力公民抗命的内容启发了伊莱亚斯的静坐和请愿，最终为他们赢回了课间自由时间。"}}], "extended": {"prompt": {"en": "Elias and Ada used a peaceful protest to solve a problem at school. Think of a rule at your own school or community that you think is unfair. How could students use a nonviolent method—like a petition, a sit-in, or a fund-raiser—to try to change it?", "zh": "伊莱亚斯和阿达用和平抗议解决了学校里的一个问题。想想你自己学校或社区里一条你觉得不公平的规定。学生们可以如何用非暴力的方式——比如请愿、静坐或筹款——去尝试改变它？"}, "guidance": {"en": ["Identify the specific rule you disagree with and why it affects students.", "Choose one peaceful method from the story and explain the steps you would take."], "zh": ["先说出你不同意的这条具体规则，以及它如何影响学生。", "从故事中挑选一种和平方式，并说明你会采取哪些步骤。"]}}};</script>
