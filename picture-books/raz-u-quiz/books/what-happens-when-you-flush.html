il?", "zh": "在排水场里，液体废物是如何穿过土壤的？"}, "options": [{"en": "It is pumped back upstairs according to some versions of the story", "zh": "被抽回楼上（按书中另一种说法）"}, {"en": "It percolates, trickling slowly through the ground", "zh": "它渗透(percolate)，缓缓渗入地下"}, {"en": "It boils", "zh": "它沸腾"}, {"en": "It evaporates instantly", "zh": "它立刻蒸发"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The effluent runs into the drainage field and percolates through the ground, where the soil naturally filters out pollutants.", "zh": "污水流入排水场后，会渗透过土壤，由土壤自然地滤除污染物。"}}, {"q": {"en": "Why is groundwater important to people?", "zh": "地下水对人们为什么重要？"}, "options": [{"en": "It makes clouds", "zh": "它制造云朵"}, {"en": "It is a kind of food", "zh": "它是一种食物"}, {"en": "It is a major source of our drinking water", "zh": "它是我们饮用水的重要来源"}, {"en": "It is used to paint houses according to some versions of the story", "zh": "它用来漆房子（按书中另一种说法）"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Groundwater collects naturally underground and is a major source of drinking water; leaking sewers can contaminate it with harmful microorganisms.", "zh": "地下水在地下自然汇集，是饮用水的重要来源；破裂的下水道会把有害微生物渗进地下水造成污染。"}}, {"q": {"en": "By 1914, about how many miles of sewers did New York City have?", "zh": "到1914年，纽约市大约建了多少英里的下水道？"}, "options": [{"en": "Over 5,000 miles", "zh": "超过5000英里"}, {"en": "Zero", "zh": "零"}, {"en": "About 10 miles", "zh": "约10英里"}, {"en": "Nearly 850 miles", "zh": "近850英里"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "New York began building sewers in the mid-1800s and by 1914 had nearly 850 miles (1,368 km) of sewers.", "zh": "纽约在19世纪中期开始修建下水道，到1914年已有近850英里（1368公里）的管道。"}}, {"q": {"en": "Why does the author compare modern sewer systems with those of the past?", "zh": "作者为什么把现代下水道系统和过去的比作比较？"}, "options": [{"en": "To sell old pipes", "zh": "为了卖旧管子"}, {"en": "To show the progress made and help us appreciate modern sewers", "zh": "为了展现取得的进步，并让我们感激现代下水道"}, {"en": "To describe a sport", "zh": "为了介绍一项运动"}, {"en": "To teach a cooking recipe according to some versions of the story in an early draft of the book", "zh": "为了教一道菜谱（按书中另一种说法）（在书的早期草稿中）"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "By contrasting past problems (waste in streets and rivers) with today's treatment, the author helps readers appreciate modern systems.", "zh": "通过对比过去（街道和河流中的污物）与今天的污水处理，作者帮助读者感激现代系统。"}}], "extended": {"prompt": {"en": "The book says more than two billion people have no flush toilets or sewers, and millions die each year from diseases linked to untreated sewage. Why do you think this is still a problem, and what might communities do about it?", "zh": "书中说，全球超过二十亿人没有抽水马桶或下水道，每年有数百万人死于与未经处理的污水有关的疾病。你认为为什么这至今仍是个问题？社区可以怎么做？"}, "guidance": {"en": ["Think about cost, geography, and access to technology.", "Consider how a simple septic system or clean water project could help."], "zh": ["想一想成本、地理条件以及获得技术的难易。", "考虑一个简单的化粪系统或清洁水项目能带来怎样的帮助。"]}}};</script>
