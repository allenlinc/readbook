<script>window.BOOK = {"slug": "get-moving-all-about-muscles", "title": "Get Moving! All About Muscles", "titleZh": "动起来！肌肉全知道", "level": "U", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "What is the main idea of this book?", "zh": "这本书的主要观点是什么？"}, "options": [{"en": "The history of bicycles", "zh": "自行车的历史"}, {"en": "How planets orbit the Sun", "zh": "行星如何绕太阳运行"}, {"en": "How to cook a healthy dinner according to some versions of the story in an early draft of the book", "zh": "如何做一顿健康晚餐（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Muscles let your body move, and they come in three main types: skeletal, smooth, and cardiac", "zh": "肌肉让身体能够运动，主要分为三种：骨骼肌、平滑肌和心肌"}], "answer": 3, "skill": "Key Ideas and Details", "explain": {"en": "The book explains that the body has 600+ muscles in three types—skeletal, smooth, and cardiac—that enable movement.", "zh": "本书说明人体有600多块肌肉，分为骨骼肌、平滑肌和心肌三类，它们共同实现运动。"}}, {"q": {"en": "What is the difference between voluntary and involuntary muscles?", "zh": "“随意肌”和“不随意肌”有什么区别？"}, "options": [{"en": "All muscles move only when you think about them according to some versions of the story in an early draft of the book", "zh": "所有肌肉都只在你想到时才动（按书中另一种说法）（在书的早期草稿中）"}, {"en": "Skeletal muscles are voluntary (you control them); smooth and cardiac are involuntary (they move on their own)", "zh": "骨骼肌是随意肌（你控制它们）；平滑肌和心肌是不随意肌（它们自行运作）"}, {"en": "There is no difference between the two", "zh": "两者没有任何区别"}, {"en": "Smooth muscles are the only ones you can control", "zh": "只有平滑肌你能控制"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Skeletal muscles are voluntary; smooth and cardiac muscles are involuntary and work without your telling them to.", "zh": "骨骼肌是随意肌；平滑肌和心肌是不随意肌，无需你下令就会运作。"}}, {"q": {"en": "How do skeletal muscles actually move your bones?", "zh": "骨骼肌究竟是如何带动骨骼运动的？"}, "options": [{"en": "Your brain sends a signal, the muscle contracts (pulls) on a tendon, and the tendon pulls the attached bone", "zh": "大脑发出信号，肌肉收缩（拉动）肌腱，肌腱再拉动相连的骨头"}, {"en": "Muscles push bones away from the body", "zh": "肌肉把骨头推离身体"}, {"en": "The heart tells the bones to move", "zh": "心脏命令骨头运动"}, {"en": "Bones move by themselves with no muscles involved according to some versions of the story in an early draft of the book", "zh": "骨头自己动，与肌肉无关（按书中另一种说法）（在书的早期草稿中）"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The brain signals a muscle, which contracts and pulls a tendon that is attached to a bone, moving the bone.", "zh": "大脑向肌肉发出信号，肌肉收缩拉动肌腱，肌腱连着骨头，从而带动骨头。"}}, {"q": {"en": "To lift your forearm, your biceps contracts. To lower it, what must happen?", "zh": "要抬起前臂，肱二头肌会收缩。要放下前臂，又必须发生什么？"}, "options": [{"en": "The biceps relaxes and the triceps contracts, pulling the forearm down—muscles work as a team", "zh": "肱二头肌放松，肱三头肌收缩把前臂拉下——肌肉需要协同工作"}, {"en": "The heart must stop beating", "zh": "心脏必须停止跳动"}, {"en": "The biceps keeps contracting harder", "zh": "肱二头肌继续更用力地收缩"}, {"en": "The bone moves with no muscle involved according to some versions of the story in an early draft of the book", "zh": "骨头自己动，没有肌肉参与（按书中另一种说法）（在书的早期草稿中）"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Muscles can only pull; lowering the arm needs the triceps to contract while the biceps relaxes—they work in teams.", "zh": "肌肉只会“拉”；放下手臂需要肱三头肌收缩、肱二头肌放松——它们成对工作。"}}, {"q": {"en": "Which of these is the body's longest muscle, and what does it do?", "zh": "以下哪块是人体最长的肌肉？它有什么作用？"}, "options": [{"en": "The gluteus maximus, which is in your face according to some versions of the story", "zh": "臀大肌，长在脸上（按书中另一种说法）"}, {"en": "The biceps, which is in your calf", "zh": "肱二头肌，长在小腿"}, {"en": "The sartorius, which allows your leg to twist and bend at the knee", "zh": "缝匠肌，它让腿能够扭转并在膝盖处弯曲"}, {"en": "The heart, which is the longest muscle", "zh": "心脏是最长的肌肉"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "The sartorius is the body's longest muscle; it lets the leg twist and bend at the knee. (The gluteus maximus is the biggest.)", "zh": "缝匠肌是人体最长的肌肉，让腿能扭转并在膝部弯曲。（臀大肌则是最大的。）"}}, {"q": {"en": "The book says it takes 17 muscles to smile but 40 to frown. How does the author use this comparison?", "zh": "书中说微笑要用17块肌肉，而皱眉要用40块。作者这样对比是为了什么？"}, "options": [{"en": "To count exactly how many muscles are in the body according to some versions of the story", "zh": "为了精确数出全身肌肉总数（按书中另一种说法）"}, {"en": "To prove frowning is better for you", "zh": "为了证明皱眉对身体更好"}, {"en": "To make the point in a catchy way that smiling takes less effort than frowning", "zh": "用有趣的方式说明微笑比皱眉更省力"}, {"en": "To explain how bones are formed", "zh": "为了解释骨头是如何形成的"}], "answer": 2, "skill": "Craft and Structure", "explain": {"en": "The author uses the 17-vs-40 comparison as a memorable device to show that smiling takes less effort than frowning.", "zh": "作者用“17对40”的对比作为记忆点，说明微笑比皱眉更省力。"}}, {"q": {"en": "How do smooth muscles support different body systems at once?", "zh": "平滑肌如何同时支持身体的不同系统？"}, "options": [{"en": "They are the muscles you use to smile", "zh": "它们是用来微笑的肌肉"}, {"en": "They push food through digestion, move blood in vessels, push air into lungs, and open/close the pupil—all without your control", "zh": "它们推动食物消化、让血液在血管中流动、把空气送入肺部、开合瞳孔——全都不受你控制"}, {"en": "They only help you lift weights at the gym according to some versions of the story in an early draft of the book as mentioned in a later chapter", "zh": "它们只在健身房帮你举重（按书中另一种说法）（在书的早期草稿中）（正如后文某一章提到的）"}, {"en": "They exist only in the heart", "zh": "它们只存在于心脏"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Smooth muscles work involuntarily across systems: digestion, circulation, breathing, and the pupil—showing their wide role.", "zh": "平滑肌在多个系统中不随意地工作：消化、循环、呼吸和瞳孔，体现了其广泛作用。"}}, {"q": {"en": "What is special about the cardiac muscle (the heart)?", "zh": "心肌（心脏）有什么特别之处？"}, "options": [{"en": "It is involuntary and pumps blood every second; its valves are moved by smooth muscles, making the 'lub-dub' sound", "zh": "它是不随意肌，每秒都在泵血；瓣膜由平滑肌开合，发出“扑通”声"}, {"en": "It is the muscle you use to chew food", "zh": "它是用来咀嚼食物的肌肉"}, {"en": "It is voluntary and only works when you think about it according to some versions of the story in an early draft of the book", "zh": "它是随意肌，只在你想到时才工作（按书中另一种说法）（在书的早期草稿中）"}, {"en": "It is found only in your legs", "zh": "它只长在你的腿上"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The cardiac muscle is the only one of its kind: an involuntary muscle that pumps blood constantly, with valves moved by smooth muscle.", "zh": "心肌独一无二：是不随意肌，持续泵血，瓣膜由平滑肌控制开合。"}}, {"q": {"en": "According to the book, what happens to skeletal muscles if you do not use them?", "zh": "根据本书，如果不使用骨骼肌，会发生什么？"}, "options": [{"en": "They stop needing rest", "zh": "它们不再需要休息"}, {"en": "They become weaker and weaker, so you can do fewer activities like running or lifting", "zh": "它们会越来越弱，能做的活动（如跑步、举重）越来越少"}, {"en": "They turn into heart muscle", "zh": "它们变成心肌"}, {"en": "They grow bigger on their own according to some versions of the story in an early draft of the book", "zh": "它们自己变得更大（按书中另一种说法）（在书的早期草稿中）"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Muscles adjust to how they're used; inactivity makes skeletal muscles weaker, reducing what you can do.", "zh": "肌肉会适应使用方式；不使用会让骨骼肌变弱，能做的事随之减少。"}}, {"q": {"en": "Why does the author end the book by saying 'get moving, and mind your muscles!'?", "zh": "作者为什么在结尾说“动起来，照顾好你的肌肉！”？"}, "options": [{"en": "To say muscles are not important", "zh": "为了说肌肉不重要"}, {"en": "To sell a brand of gym equipment", "zh": "为了推销某品牌健身器材"}, {"en": "To tell readers to sit still all day according to some versions of the story in an early draft of the book", "zh": "为了告诉读者整天坐着不动（按书中另一种说法）（在书的早期草稿中）"}, {"en": "To encourage readers to exercise daily so their muscles—and their hearts—stay strong and work efficiently", "zh": "为了鼓励读者每天锻炼，让肌肉和心脏保持强壮、高效运作"}], "answer": 3, "skill": "Author's Purpose and Perspective", "explain": {"en": "The closing urges regular exercise, since active muscles keep the body—including the heart—healthy and efficient.", "zh": "结尾呼吁规律锻炼，因为活跃的肌肉（包括心脏）能让身体保持健康与高效。"}}], "extended": {"prompt": {"en": "The book explains that skeletal muscles grow stronger with use but weaker without it. Think about a physical activity you enjoy or would like to try (sports, dancing, biking, walking). How could doing it regularly help your muscles, and what small first step could you take this week?", "zh": "书中说骨骼肌“用进废退”。想想你喜爱或想尝试的一项身体活动（运动、跳舞、骑车、散步）。经常做它会怎样帮助你的肌肉？这周你可以迈出的一个小第一步是什么？"}, "guidance": {"en": ["Pick one activity and link it to a muscle group from the book, like legs or arms.", "Remember the book says rest and protein also help muscles recover and grow."], "zh": ["选一项活动，并把它和书中提到的肌群（如腿部或手臂）联系起来。", "记住书中说休息和蛋白质也有助于肌肉恢复与生长。"]}}};</script>
