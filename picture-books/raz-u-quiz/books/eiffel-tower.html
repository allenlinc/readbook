y.", "zh": "它以法国工程师古斯塔夫·埃菲尔命名，他的公司承建了该塔，他也曾参与自由女神像。"}}, {"q": {"en": "Who actually drew the original design for the tower?", "zh": "实际上谁绘制了铁塔的最初设计图？"}, "options": [{"en": "Maurice Koechlin and Emile Nouguier, chief engineers", "zh": "首席工程师莫里斯·克什兰和埃米尔·努吉耶"}, {"en": "Gustave Eiffel", "zh": "古斯塔夫·埃菲尔"}, {"en": "The mayor of Paris", "zh": "巴黎市长"}, {"en": "A painter", "zh": "一位画家"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The original drawings were by chief engineers Koechlin and Nouguier; architect Sauvestre later made it attractive.", "zh": "最初的设计图出自首席工程师克什兰和努吉耶之手，建筑师索维斯特后来让它更美观。"}}, {"q": {"en": "About how many rivets hold the tower's pieces together?", "zh": "大约用了多少颗铆钉把铁塔的部件固定在一起？"}, "options": [{"en": "2.5 million", "zh": "250万颗"}, {"en": "18,000", "zh": "1.8万颗"}, {"en": "250", "zh": "250颗"}, {"en": "1 million", "zh": "100万颗"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "About 2.5 million rivets were used; each was heated, installed, and shrank as it cooled for a tight fit.", "zh": "约使用了250万颗铆钉，每颗加热后安装，冷却收缩形成紧密连接。"}}, {"q": {"en": "Why did some people object to building the tower?", "zh": "为什么有些人反对建造铁塔？"}, "options": [{"en": "It was too expensive", "zh": "它太昂贵"}, {"en": "They thought it would look ridiculous and harm the Paris skyline", "zh": "他们认为它看起来荒唐，会破坏巴黎天际线"}, {"en": "It was too short", "zh": "它太矮"}, {"en": "It was made of wood", "zh": "它是木制的"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "About 300 artists, writers, and architects tried to stop it, fearing it would look like a huge black smokestack.", "zh": "约300名艺术家、作家和建筑师试图阻止，担心它像巨大的黑色烟囱破坏景观。"}}, {"q": {"en": "What did Eiffel add so the tower would not be torn down after 20 years?", "zh": "为了让铁塔在20年后不被拆除，埃菲尔做了什么？"}, "options": [{"en": "A restaurant", "zh": "一家餐厅"}, {"en": "A weather laboratory for scientists", "zh": "一座供科学家使用的气象实验室"}, {"en": "Only a radio tower", "zh": "仅一座无线电塔"}, {"en": "Apartments", "zh": "几套公寓"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "Eiffel installed a weather lab with instruments so the tower kept a scientific purpose and was saved from demolition.", "zh": "埃菲尔安装了带仪器的气象实验室，使铁塔保留科学用途，从而避免被拆。"}}, {"q": {"en": "On which floor is there a glass floor that makes visitors feel they are walking on air?", "zh": "哪一层有玻璃地板，让游客仿佛漫步于空中？"}, "options": [{"en": "The first floor (57 m)", "zh": "第一层（57米）"}, {"en": "The second floor", "zh": "第二层"}, {"en": "The top floor", "zh": "顶层"}, {"en": "None of the floors", "zh": "都没有"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The first floor, 57 meters up, has a glass floor along with shops, restaurants, and a winter ice rink.", "zh": "距地面57米的第一层设有玻璃地板，还有商店、餐厅和冬季溜冰场。"}}, {"q": {"en": "About how many people visit the Eiffel Tower each year?", "zh": "每年大约有多少人参观埃菲尔铁塔？"}, "options": [{"en": "Nearly 7 million", "zh": "近700万"}, {"en": "1 million", "zh": "100万"}, {"en": "50 million", "zh": "5000万"}, {"en": "100", "zh": "100人"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Almost seven million people visit every year, making it the most-visited paid monument in the world.", "zh": "每年近700万人参观，使之成为世界上参观人数最多的收费纪念碑。"}}], "extended": {"prompt": {"en": "The Eiffel Tower was once criticized but became a beloved symbol of Paris. Think of a modern building or structure you find interesting—what makes it worth visiting?", "zh": "埃菲尔铁塔曾受批评，后来却成了巴黎的象征。想想一座你觉得有趣现代建筑或结构——它有什么值得参观之处？"}, "guidance": {"en": ["Consider its design, the view it offers, and the story behind it.", "Think about why landmarks become symbols of a city."], "zh": ["思考它的设计、提供的景观以及背后的故事。", "想想地标为何会成为城市的象征。"]}}};</script>
