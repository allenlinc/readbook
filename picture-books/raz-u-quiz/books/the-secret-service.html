<script>window.BOOK = {"slug": "the-secret-service", "title": "The Secret Service", "titleZh": "特勤局", "level": "U", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Why did Congress create the Secret Service in 1865?", "zh": "国会为什么在1865年创建特勤局？"}, "options": [{"en": "To catch people who printed fake money (counterfeiters).", "zh": "为了抓捕印刷假币（伪造货币）的人。"}, {"en": "To protect the president from assassins.", "zh": "为了保护总统免受刺客伤害。"}, {"en": "To guard the White House building.", "zh": "为了守卫白宫建筑。"}, {"en": "To investigate foreign spies.", "zh": "为了调查外国间谍。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The text says the Secret Service was formed in 1865 to track down and arrest counterfeiters; protecting the president came later, after McKinley's 1901 assassination.", "zh": "文中说特勤局于1865年成立，最初是为了追捕伪造货币者；保护总统是后来在1901年麦金利遇刺之后才开始的。"}}, {"q": {"en": "Whose assassination led Congress to assign the Secret Service to protect presidents?", "zh": "哪位总统遇刺后，国会才让特勤局负责保护总统？"}, "options": [{"en": "William McKinley (1901)", "zh": "威廉·麦金利（1901年）"}, {"en": "Abraham Lincoln (1865)", "zh": "亚伯拉罕·林肯（1865年）"}, {"en": "James Garfield (1881)", "zh": "詹姆斯·加菲尔德（1881年）"}, {"en": "Ronald Reagan (1981)", "zh": "罗纳德·里根（1981年）"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "After President William McKinley was assassinated in 1901, Congress asked the Secret Service to protect all future presidents.", "zh": "1901年威廉·麦金利总统遇刺后，国会要求特勤局保护此后所有的总统。"}}, {"q": {"en": "What did agents nickname the president's specially built armored car?", "zh": "特工们把为总统特别打造的装甲车叫做什么？"}, "options": [{"en": "\"The Beast\"", "zh": "“野兽”（The Beast）"}, {"en": "\"The Eagle\"", "zh": "“雄鹰”（The Eagle）"}, {"en": "\"Air Force One\"", "zh": "“空军一号”"}, {"en": "\"Renegade\"", "zh": "“叛逆者”（Renegade）"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says agents built the president a new car and nicknamed it 'The Beast'—a black limousine with eight inches of armor.", "zh": "书中说特工为总统打造了一辆新车，昵称“野兽”——一辆有八英寸装甲的黑色礼车。"}}, {"q": {"en": "In the section titled 'A Slave of His Office,' what does the phrase 'slave of his office' mean?", "zh": "在“职位的奴隶”这一节中，“职位的奴隶”这个短语是什么意思？"}, "options": [{"en": "A president would lose his freedom and be watched all the time.", "zh": "总统会失去自由，时刻被人监视。"}, {"en": "A president would have to work very long hours.", "zh": "总统必须工作很长时间。"}, {"en": "A president would become very rich.", "zh": "总统会变得非常富有。"}, {"en": "A president would travel to many countries.", "zh": "总统会到许多国家出访。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The New York Tribune warned that bodyguards would make the president a 'slave of his office,' meaning he would not be free to live and meet people normally.", "zh": "《纽约论坛报》警告说保镖会把总统变成“职位的奴隶”，意思是总统将无法自由地生活和会见民众。"}}, {"q": {"en": "What is the author's main purpose in writing The Secret Service?", "zh": "作者写《特勤局》这本书的主要目的是什么？"}, "options": [{"en": "To inform readers about the history and daily work of the Secret Service.", "zh": "向读者介绍特勤局的历史与日常工作。"}, {"en": "To convince readers that the Secret Service should be ended.", "zh": "说服读者应该取消特勤局。"}, {"en": "To entertain with a fictional spy story.", "zh": "用一个虚构的间谍故事来娱乐读者。"}, {"en": "To teach readers how to become president.", "zh": "教读者如何成为总统。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book is an informational text that explains how and why the Secret Service was created and what agents do, so its purpose is to inform.", "zh": "这是一本知识性读物，介绍特勤局是如何以及为何成立的、特工们做什么，目的是向读者提供信息。"}}, {"q": {"en": "According to the 'Important Dates' timeline, which event happened FIRST?", "zh": "根据“特勤局历史重要日期”时间表，以下哪件事发生得最早？"}, "options": [{"en": "Congress created the Secret Service in 1865.", "zh": "国会于1865年创建特勤局。"}, {"en": "The Secret Service began protecting the president's family in 1951.", "zh": "特勤局于1951年开始保护总统家人。"}, {"en": "The Secret Service joined the Department of Homeland Security in 2002.", "zh": "特勤局于2002年并入国土安全部。"}, {"en": "Congress asked the agency to protect presidents in 1901.", "zh": "国会于1901年要求该机构保护总统。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The timeline lists 1865 (creation to fight counterfeiting) as the earliest date, before 1901, 1951, and 2002.", "zh": "时间表上最早的是1865年（成立以打击伪钞），早于1901、1951和2002年。"}}, {"q": {"en": "During the 1981 shooting, what did Agent Timothy McCarthy do?", "zh": "在1981年的枪击事件中，特工蒂莫西·麦卡锡做了什么？"}, "options": [{"en": "He shielded Reagan with his own body and was shot.", "zh": "他用身体护住里根，自己中弹。"}, {"en": "He ran away to call for help.", "zh": "他跑开去求救。"}, {"en": "He arrested the vice president.", "zh": "他逮捕了副总统。"}, {"en": "He drove the president to the hospital.", "zh": "他开车把总统送到医院。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The text says Agent Timothy McCarthy used his body to shield Reagan from the shooter and was struck by a bullet but later recovered.", "zh": "文中说蒂莫西·麦卡锡特工用身体为里根挡子弹，自己中弹但后来康复了。"}}, {"q": {"en": "The section 'Shades and Sleeves' mainly explains...", "zh": "“墨镜与衣袖”这一节主要解释了……"}, "options": [{"en": "how agents use sunglasses and hidden earpieces/microphones to do their job.", "zh": "特工如何利用墨镜和隐藏的耳机/麦克风来执行任务。"}, {"en": "why agents wear dark suits to fancy parties.", "zh": "特工为什么穿深色西装参加舞会。"}, {"en": "how the president chooses his clothes.", "zh": "总统如何挑选衣服。"}, {"en": "where agents buy their sunglasses.", "zh": "特工在哪里买墨镜。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "This section describes how sunglasses help agents see crowds and how hidden speakers and sleeve microphones let them communicate.", "zh": "这一节描述了墨镜如何帮助特工观察人群，以及隐藏的耳机和衣袖里的麦克风如何让他们保持联络。"}}, {"q": {"en": "Which detail shows that presidential children sometimes rebelled against Secret Service protection?", "zh": "以下哪个细节说明总统的孩子们有时会反抗特勤局的保护？"}, "options": [{"en": "Quentin Roosevelt threw snowballs at agents from the White House roof.", "zh": "昆汀·罗斯福从白宫屋顶向特工扔雪球。"}, {"en": "The Obama daughters loved having agents follow them everywhere.", "zh": "奥巴马的女儿喜欢特工处处跟着她们。"}, {"en": "All presidential children joined the Secret Service.", "zh": "所有总统的子女都加入了特勤局。"}, {"en": "Presidential children were never allowed outside.", "zh": "总统的子女从不被允许出门。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book gives examples such as Quentin Roosevelt climbing on the roof to throw snowballs at agents, and Jenna Bush sneaking out of the White House.", "zh": "书中举例：昆汀·罗斯福爬上白宫屋顶向特工扔雪球，珍娜·布什曾偷偷溜出白宫。"}}, {"q": {"en": "How does the author show respect for Secret Service agents?", "zh": "作者是如何表达对特勤局特工的敬意的？"}, "options": [{"en": "By noting that 35 agents have given their lives in the line of duty.", "zh": "通过指出已有35名特工在执行任务时献出生命。"}, {"en": "By saying agents are paid the most money.", "zh": "说特工薪水最高。"}, {"en": "By claiming agents never face danger.", "zh": "声称特工从不面临危险。"}, {"en": "By writing that agents work only on holidays.", "zh": "写道特工只在节假日工作。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The author highlights the danger and sacrifice of the job, noting thirty-five agents have died in the line of duty to show admiration.", "zh": "作者强调了这份工作的危险与牺牲，指出已有35名特工殉职，以此表达敬意。"}}], "extended": {"prompt": {"en": "Imagine you are a Secret Service agent assigned to protect the president on Inauguration Day. Write a short paragraph describing what you would watch for and how you would keep the president safe.", "zh": "假设你是负责在就职日保护总统的特勤局特工。写一小段话，描述你会留意哪些情况，以及如何确保总统的安全。"}, "guidance": {"en": ["Think about the crowds, buildings, and routes described in the book (street closures, checkpoints, rooftop watchers).", "Explain one specific action you would take and why it keeps the president safe."], "zh": ["回想书中描写的人群、建筑和路线（封路、检查点、屋顶上的瞭望者）。", "说明你会采取的一项具体行动，以及它为何能保护总统安全。"]}}};</script>
