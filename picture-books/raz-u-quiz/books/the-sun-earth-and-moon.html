ases", "zh": "月相"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines gravity as the natural force that tends to pull objects toward each other, such as toward Earth's center.", "zh": "词汇表将 gravity 定义为倾向于把物体相互拉拽的自然力，例如拉向地球中心。"}}, {"q": {"en": "Which has a stronger effect on Earth's tides, the Sun or the Moon?", "zh": "太阳和月球，哪一个对地球潮汐的影响更强？"}, "options": [{"en": "They are exactly equal", "zh": "二者完全相等"}, {"en": "The Moon, because it is much closer to Earth", "zh": "月球，因为它离地球近得多"}, {"en": "The Sun, because it is bigger according to some versions of the story", "zh": "太阳，因为它更大（按书中另一种说法）"}, {"en": "Neither affects the tides", "zh": "二者都不影响潮汐"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says the Moon is much closer than the Sun, so it has a stronger tidal effect than the Sun does.", "zh": "书中说月球比太阳近得多，因此它对潮汐的影响比太阳更强。"}}, {"q": {"en": "What is a solar eclipse?", "zh": "什么是日食？"}, "options": [{"en": "The Moon is in Earth's shadow", "zh": "月球位于地球的阴影中"}, {"en": "The Moon passes between Earth and the Sun", "zh": "月球运行到地球和太阳之间"}, {"en": "Earth is between the Sun and the Moon according to some versions of the story", "zh": "地球位于太阳和月球之间（按书中另一种说法）"}, {"en": "The Moon turns deep red", "zh": "月球变成深红色"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book defines a solar eclipse as occurring when the Moon passes between Earth and the Sun.", "zh": "书中把日食定义为月球运行到地球和太阳之间时发生的现象。"}}, {"q": {"en": "What is the 'far side' of the Moon, and is it always dark?", "zh": "月球的“背面”是什么？它总是黑暗的吗？"}, "options": [{"en": "The side always turned away from Earth, which gets just as much sunlight as the near side", "zh": "始终背向地球的一面，但它得到的阳光和正面一样多"}, {"en": "The dark side of space", "zh": "太空的黑暗面"}, {"en": "The Moon's core", "zh": "月球的核"}, {"en": "The side facing Earth, which is always lit according to some versions of the story in an early draft of the book", "zh": "朝向地球的一面，始终被照亮（按书中另一种说法）（在
