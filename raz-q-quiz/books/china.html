<script>window.BOOK = {"slug": "china", "title": "China", "titleZh": "中国", "level": "Q", "genre": "Nonfiction", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "How big and how populated is China, according to the book?", "zh": "根据这本书，中国有多大、人口有多少？"}, "options": [{"en": "It is the third largest country and has the world's largest population—over 1.3 billion, about 1 in 5 people on Earth", "zh": "它是世界第三大国家，人口世界第一——超过13亿，约占全球每5人中的1人"}, {"en": "It is the smallest country in Asia with 1 million people", "zh": "它是亚洲最小的国家，人口100万"}, {"en": "It is the largest country by area, with 5 billion people", "zh": "它是面积最大的国家，人口50亿"}, {"en": "It has no cities and only farmers", "zh": "它没有城市，只有农民"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says China 'is the third largest country in the world (only Russia and Canada are bigger). And it has the largest population in the world... one out of every five people in the world live in China—that's more than 1.3 billion people!'", "zh": "书里说中国是「世界第三大国家（只有俄罗斯和加拿大更大）。它也是世界人口最多的国家……全球每五个人中就有一个住在中国——超过13亿人！」"}}, {"q": {"en": "What is the longest river in China, and how does it rank in the world?", "zh": "中国最长的河流是哪条？它在世界排名第几？"}, "options": [{"en": "The Yangtze; it is the third longest river in the world (after the Amazon and the Nile)", "zh": "长江；它是世界第三长河（仅次于亚马逊河和尼罗河）"}, {"en": "The Yellow River; the longest in the world", "zh": "黄河；世界最长"}, {"en": "The Nile; the longest in China", "zh": "尼罗河；中国最长"}, {"en": "The Amazon; located in China", "zh": "亚马逊河；位于中国"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "A 'Do You Know?' box says, 'The longest river in China is the Yangtze... which is the third longest river in the world. (Only the Amazon River in South America and the Nile River in Africa are longer!)'", "zh": "「你知道吗？」小栏目写道：「中国最长的河流是长江……是世界第三长河。（只有南美洲的亚马逊河和非洲的尼罗河更长！）」"}}, {"q": {"en": "Who started the Great Wall, and why was it built?", "zh": "长城是谁开始修建的？为什么要建？"}, "options": [{"en": "China's first emperor, Qin Shi Huangdi, over 2,000 years ago, to keep hostile tribes from invading", "zh": "中国第一位皇帝秦始皇，两千多年前，为阻挡外族入侵"}, {"en": "A group of farmers to grow rice", "zh": "一群农民为了种水稻"}, {"en": "Foreign traders to mark the border", "zh": "外国商人用来标界"}, {"en": "The Ming emperor to host festivals", "zh": "明朝皇帝用来办节庆"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says, 'More than 2,000 years ago, the first emperor of China, Qin Shi Huangdi... started building the Great Wall. It was designed to keep hostile tribes from invading China.'", "zh": "书里说：「两千多年前，中国的第一位皇帝秦始皇……开始修建长城。它的作用是阻挡外族入侵中国。」"}}, {"q": {"en": "What is 'Mandarin' as the book uses the word?", "zh": "书中用到的「Mandarin」指的是什么？"}, "options": [{"en": "The official language of China, which uses more than 6,000 characters instead of a 26-letter alphabet", "zh": "中国的官方语言，用六千多个汉字而不是26个字母"}, {"en": "A type of orange grown in China", "zh": "中国产的一种橘子"}, {"en": "A kind of traditional clothing", "zh": "一种传统服饰"}, {"en": "A style of Chinese music", "zh": "一种中国音乐风格"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines Mandarin as 'the main language spoken in China.' The book adds it 'uses more than 6,000 characters instead of the 26-letter alphabet used in the English language.'", "zh": "词汇表把 Mandarin 定义为「中国使用的主要语言」。书中补充它「使用六千多个汉字，而不是英语的26个字母」。"}}, {"q": {"en": "What are 'paddies'?", "zh": "「paddies」（稻田）是什么？"}, "options": [{"en": "Fields that are flooded with water to grow rice", "zh": "灌了水用来种水稻的田"}, {"en": "Large deserts in western China", "zh": "中国西部的沙漠"}, {"en": "Mountain peaks in the south", "zh": "南方的山峰"}, {"en": "Boats used on rivers", "zh": "河上用的船"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines paddies as 'fields that are flooded to grow rice.' The book says rice 'is grown in flooded fields called paddies.'", "zh": "词汇表把 paddies 定义为「灌水用来种水稻的田」。书中说水稻「种在叫 paddies 的淹水田里」。"}}, {"q": {"en": "What is 'porcelain'?", "zh": "「porcelain」（瓷器/瓷土）是什么？"}, "options": [{"en": "A hard, white clay that can be shaped and fired into pottery or other forms", "zh": "一种坚硬的白黏土，可塑形、烧制成瓷器或其他物品"}, {"en": "A soft red wood", "zh": "一种柔软的红木"}, {"en": "A type of rice noodle", "zh": "一种米粉"}, {"en": "A metal used for coins", "zh": "用来铸币的金属"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines porcelain as 'a hard, white clay that can be shaped and fired into pottery or other forms.' China was the first to make and use it.", "zh": "词汇表把 porcelain 定义为「一种坚硬的白黏土，可塑形、烧制成瓷器或其他物品」。中国是最早制造和使用瓷器的国家。"}}, {"q": {"en": "The book says the Chinese were the first to invent paper, printing, the compass, and gunpowder. What does this show?", "zh": "书里说中国人最早发明了造纸、印刷、指南针和火药。这说明了什么？"}, "options": [{"en": "That China has a long, rich history of learning and inventing", "zh": "说明中国有着悠久而丰富的学习与发明历史"}, {"en": "That China copied ideas from Europe", "zh": "说明中国抄袭了欧洲的点子"}, {"en": "That these items are no longer used", "zh": "说明这些东西已不再使用"}, {"en": "That only farmers invented things", "zh": "说明只有农民才搞发明"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book states, 'The Chinese also have a long, rich history of learning and inventing. They were the first people to make and use paper, ink, writing, silk cloth, printing, kites, porcelain, gunpowder, the compass, and much more.'", "zh": "书里写道：「中国人还有着悠久而丰富的学习与发明历史。他们是最早制造和使用造纸、墨、文字、丝织、印刷、风筝、瓷器、火药、指南针等众多事物的人。」"}}, {"q": {"en": "How does the book connect China's past and present through silk?", "zh": "书里是如何通过丝绸把中国的过去和现在联系起来的？"}, "options": [{"en": "China discovered silk around 2640 BC and kept it secret for 3,000 years, and today is still the world's leading silk maker and a top exporter", "zh": "中国约公元前2640年发现丝绸并保密近三千年，如今仍是世界最大的丝绸生产国和出口国之一"}, {"en": "Silk was invented in America and brought to China", "zh": "丝绸在美国发明后被带到中国"}, {"en": "China stopped making silk long ago", "zh": "中国很早就不产丝绸了"}, {"en": "Silk is only used for clothing today", "zh": "丝绸如今只用于做衣服"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says 'most of the world's silk is produced in China' and the Chinese 'discovered silk about 2640 BC and kept it a secret for almost 3,000 years.' Today China 'is a leader in making and selling many products... such as silk.'", "zh": "书里说「世界上大部分丝绸产自中国」，中国人「约公元前2640年发现丝绸，并保密了近三千年」。如今中国「在制造和销售包括丝绸在内的许多商品上处于领先地位」。"}}, {"q": {"en": "Why does the book include both celebrations (like New Year dragons) and challenges (like pollution and unemployment)?", "zh": "为什么书里既写了节庆（如新年的龙），又写了挑战（如污染和失业）？"}, "options": [{"en": "To give readers a balanced, complete picture of China today—its culture and its problems", "zh": "给读者一幅均衡、完整的当代中国图景——既有文化，也有问题"}, {"en": "To prove China has no problems", "zh": "证明中国没有问题"}, {"en": "To say festivals are more important than work", "zh": "说节日比工作更重要"}, {"en": "To advertise Chinese tourism only", "zh": "只为给中国旅游业打广告"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book celebrates China's culture and history but also says 'China faces big challenges' and 'faces the challenge of providing enough jobs and resources... while still protecting the environment'—the author wants a fair, full view.", "zh": "书里歌颂中国的文化和历史，但也指出「中国面临巨大挑战」「需要在保护环境的同时提供足够的就业和资源」——作者想呈现一幅公平、完整的图景。"}}, {"q": {"en": "What is the author's main purpose in writing China?", "zh": "作者写《中国》这本书的主要目的是什么？"}, "options": [{"en": "To inform readers about China's geography, wildlife, culture, history, and the challenges it faces today", "zh": "向读者介绍中国的地理、野生动植物、文化、历史以及当今面临的挑战"}, {"en": "To convince readers to move to China", "zh": "劝读者搬到中国"}, {"en": "To tell a fictional dragon story", "zh": "讲一个关于龙的虚构故事"}, {"en": "To teach Chinese cooking recipes", "zh": "教中国菜谱"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book is an informational text organized into 'China: An Amazing Country!', 'Celebrating China', and 'China: Past, Present, and Future'—its goal is to teach readers about the real country.", "zh": "全书是一本科学说明文，分为「了不起的中国」「庆祝中国」和「中国的过去、现在与未来」——目的是向读者介绍真实的中国。"}}], "extended": {"prompt": {"en": "The book says China's population is growing and the country must provide 'more water, energy, food, and other resources' while 'still protecting the environment and people's rights.' Why might it be hard for a country with over 1.3 billion people to balance these needs? What is one idea from the book (or your own thinking) that could help?", "zh": "书里说中国人口在增长，必须在「保护环境、保障人民权利」的同时，提供「更多的水、能源、食物和其他资源」。一个拥有13亿多人口的国家，为什么很难平衡这些需求？书里（或你自己想到）有什么办法能帮上忙？"}, "guidance": {"en": ["China has the world's largest population—'more than 1.3 billion people' and 'one out of every five people in the world' (p. 5).", "The book lists challenges: more resources needed, unemployment from economic changes, and protecting the environment (pp. 17-18).", "A good answer explains why scale makes balance hard and offers one thoughtful idea (e.g., saving resources, cleaner energy, better planning)."], "zh": ["中国人口世界第一——「超过13亿」，占「全球每五人中的一人」（第5页）。", "书里列出的挑战有：需要更多资源、经济转型带来失业、还要保护环境（第17-18页）。", "好的回答会说明「规模大」为何让平衡变难，并提出一个用心的点子（如节约资源、清洁能源、更好规划）。"]}}};</script>
