<script>window.BOOK = {"slug": "the-kid-who-couldn-t-save", "title": "The Kid Who Couldn't Save", "titleZh": "不会存钱的小孩", "level": "Q", "genre": "Fiction", "mainSkill": "Author's Purpose and Perspective", "questions": [{"q": {"en": "Mike's dad likes to say 'A penny saved is a penny earned.' How does Mike respond to this saying?", "zh": "迈克的爸爸总爱说「省下的一便士就是赚到的一便士」。迈克是怎么回应这句话的？"}, "options": [{"en": "He objects, saying technically earning a penny is not the same as saving one", "zh": "他反对，说从严格意义上讲，「赚到一便士」和「省下一便士」并不是一回事"}, {"en": "He agrees completely and starts saving right away", "zh": "他完全同意，立刻开始存钱"}, {"en": "He ignores it and changes the subject", "zh": "他不予理会，岔开了话题"}, {"en": "He writes it down as his favorite quote", "zh": "他把这句话抄下来当作座右铭"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Mike 'objected to it each time' and told his dad, 'Technically, that's incorrect... Earning a penny is not the same thing as saving a penny.'", "zh": "迈克「每次都反对这句话」，还告诉爸爸：「严格来说，这不对……赚到一便士和省下一便士不是一回事。」"}}, {"q": {"en": "Mike's little sister Aster has a savings account. What does the interest from it let her do?", "zh": "迈克的小妹妹艾斯特有一个储蓄账户。账户里的利息能让她做什么？"}, "options": [{"en": "Buy herself a candy bar every month (about twelve a year)", "zh": "每个月给自己买一块糖果条（一年大约十二块）"}, {"en": "Buy a new spy kit", "zh": "买一套新的间谍装备"}, {"en": "Pay for a trip to another country", "zh": "支付去国外的旅行"}, {"en": "Nothing—the interest is only a few cents", "zh": "什么也做不了——利息只有几美分"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Aster 'earned interest every month'—'enough interest to buy herself a candy bar every month. That was twelve candy bars a year, courtesy of Great Plains Bank!'", "zh": "艾斯特「每个月都有利息进账」——「利息够她每个月买一块糖果条。一年就是十二块，全是 Great Plains 银行的功劳！」"}}, {"q": {"en": "In the glossary and the story, what does it mean to earn 'compound' interest?", "zh": "在词汇表和故事里，「复利」(compound interest) 是什么意思？"}, "options": [{"en": "Earning interest on both your original money and the interest the bank already paid you", "zh": "既在你原本的钱上生息，也在银行已经付给你的利息上再生息"}, {"en": "Paying a fee to open a savings account", "zh": "为开储蓄账户付一笔手续费"}, {"en": "Putting coins into a jar", "zh": "把硬币放进罐子里"}, {"en": "Borrowing money from a friend", "zh": "向朋友借钱"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines compound as earning interest 'on an original amount of money plus the interest that money has already earned'; Mike explains Aster earns 'interest on both her money and the interest the bank paid her.'", "zh": "词汇表把复利定义为在「原本金额加上已经赚到的利息」上生息；迈克解释说艾斯特赚的是「钱本身和银行已付利息两方面的利息」。"}}, {"q": {"en": "Mike got $25 in birthday money from his grandparents, but the spy kit cost three times that. How much did the spy kit cost?", "zh": "迈克从祖父母那里拿到25美元生日钱，但那套间谍装备的价格是它的三倍。间谍装备要多少钱？"}, "options": [{"en": "$75", "zh": "75美元"}, {"en": "$25", "zh": "25美元"}, {"en": "$50", "zh": "50美元"}, {"en": "$100", "zh": "100美元"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The text says Mike 'corralled his unspent birthday money—twenty-five dollars from his grandparents. The spy kit cost three times that,' so 3 × $25 = $75.", "zh": "文中说迈克「把没花掉的生日钱凑在一起——祖父母给的25美元。间谍装备要三倍的价格」，所以 3 × 25 = 75美元。"}}, {"q": {"en": "Mike calls the bank 'Great Pains' instead of 'Great Plains.' Why is he so annoyed by Aster's interest?", "zh": "迈克把银行叫做「Great Pains（大痛苦）」，而不是「Great Plains（大平原）」。他为什么对艾斯特的利息这么耿耿于怀？"}, "options": [{"en": "He is jealous that Aster's saved money earns candy-bar money while his own keeps slipping through his fingers", "zh": "他嫉妒艾斯特靠存下的钱就能买糖果，而自己的钱却总是不知不觉花光"}, {"en": "He thinks the bank is cheating Aster", "zh": "他认为银行在骗艾斯特"}, {"en": "He wants the bank to close down", "zh": "他希望那家银行关门"}, {"en": "He dislikes the bank's color scheme", "zh": "他不喜欢银行的配色"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Mike grumbles 'More like Great Pains' and calls it 'the really disgusting part' that Aster could buy candy with interest yet still didn't—he is envious she can save and he cannot.", "zh": "迈克嘟囔「不如叫大痛苦」，还说艾斯特能用利息买糖却偏偏不买是「最让人受不了的部分」——他嫉妒艾斯特能存钱，而自己做不到。"}}, {"q": {"en": "At the end, after Mike feels down, what does Aster do to cheer him up?", "zh": "结尾迈克垂头丧气时，艾斯特做了什么来让他高兴起来？"}, "options": [{"en": "She brings Mike's favorite jumbo candy bar and breaks off a big chunk to share with him", "zh": "她带来迈克最爱的大号糖果条，掰下一大块分给他吃"}, {"en": "She lends him her spy kit", "zh": "她把间谍装备借给他"}, {"en": "She gives him all her savings", "zh": "她把全部积蓄都给了他"}, {"en": "She buys him a new video game", "zh": "她给他买了一款新电子游戏"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Aster 'came home with Mike's favorite candy bar, jumbo size' and 'broke off a jumbo chunk, which she handed over to Mike,' saying 'Thought this might cheer you up.'", "zh": "艾斯特「回家时拿着迈克最爱的大号糖果条」，并「掰下一大块递给迈克」，说「想着这个也许能让你开心点」。"}}, {"q": {"en": "The glossary defines 'corral' as a verb. What does Mike do when he 'corrals his unspent birthday money'?", "zh": "词汇表里把 corral 定义为动词。当迈克「corral 他没花掉的生日钱」时，他做了什么？"}, "options": [{"en": "He gathers the money together for a purpose (to save up for the spy kit)", "zh": "他把钱集中到一起，为了某个目的（为买间谍装备攒钱）"}, {"en": "He donates it to charity", "zh": "他把钱捐给了慈善机构"}, {"en": "He hides it under his bed", "zh": "他把钱藏在了床底下"}, {"en": "He spends it immediately", "zh": "他立刻把钱花掉了"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary says corral means 'to gather together for a purpose'; Mike corrals his $25 so he can save toward the spy kit.", "zh": "词汇表说 corral 是「为了某个目的把东西集中到一起」；迈克把25美元凑在一起，好为买间谍装备攒钱。"}}, {"q": {"en": "Both Mike and Aster get allowances, yet Aster has a savings account and Mike never did. According to the book, why?", "zh": "迈克和艾斯特都拿零花钱，可艾斯特有储蓄账户，迈克却从来没有。根据书里说的，为什么？"}, "options": [{"en": "Aster saved since kindergarten and kept her money, while Mike spent his as fast as it arrived and never had enough to open one", "zh": "艾斯特从幼儿园起就存钱、留住了钱；而迈克钱一到手就花光，从没攒够开账户的钱"}, {"en": "Aster's allowance was much larger than Mike's", "zh": "艾斯特的零花钱比迈克多得多"}, {"en": "The bank only let girls open accounts", "zh": "银行只让女孩开户"}, {"en": "Mike was too young to have an allowance", "zh": "迈克年纪太小，还没零花钱"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says Aster 'had a savings account... since kindergarten—Mike never had enough money to open one,' while Mike 'spent money as quickly as ice cream melts' and 'had a hard time holding on to it.'", "zh": "书里说艾斯特「从幼儿园起就有储蓄账户——迈克却从没攒够开账户的钱」，而迈克「花钱像七月的冰淇淋融化一样快」、「很难把钱留住几天」。"}}, {"q": {"en": "The book's Focus Question is 'What lesson does Mike learn about saving money?' What lesson does he take away?", "zh": "这本书的「聚焦问题」是「迈克学到了什么关于存钱的教训？」他领悟到的教训是什么？"}, "options": [{"en": "Saving may not be his strength, and he can find another way to reach his goal", "zh": "存钱也许不是他的强项，但他可以另想办法去实现目标"}, {"en": "He must never spend any money again", "zh": "他从此再也绝不能花一分钱"}, {"en": "Only little sisters should have savings accounts", "zh": "只有小妹妹才该有储蓄账户"}, {"en": "Banks are always a bad idea", "zh": "银行永远是个坏主意"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "After Aster says 'Maybe saving's not your thing,' Mike thinks, 'I've got to find my other thing. I'm gonna find my thing!'—he learns saving isn't for everyone and looks for another path.", "zh": "艾斯特说「也许存钱不是你的强项」后，迈克想：「我得找到我的另一种办法。我要找到我的办法！」——他明白存钱并非人人擅长，于是另寻出路。"}}, {"q": {"en": "The author uses funny images, like calling Mike a 'walking ATM with two missing front teeth.' Why does the author write this way?", "zh": "作者用了很多好笑的比喻，比如把迈克称作「缺了两颗门牙、会走路的ATM」。作者为什么这样写？"}, "options": [{"en": "To make a money lesson fun and relatable for young readers through humor", "zh": "用幽默让关于金钱的道理对小读者来说既好笑又好懂"}, {"en": "To scare children away from banks", "zh": "为了吓唬孩子远离银行"}, {"en": "To teach a serious history lesson", "zh": "为了讲一堂严肃的历史课"}, {"en": "To describe a real ATM machine", "zh": "为了描写一台真正的ATM机"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The playful comparisons (Mike as a 'little sweetly smiling money machine, like a walking ATM with two missing front teeth') keep the story light while teaching about saving and spending.", "zh": "这些俏皮的比喻（迈克像个「甜甜微笑、缺两颗门牙的小小赚钱机器，会走路的ATM」）让故事轻松有趣，同时把存钱与花钱的道理讲给孩子听。"}}], "extended": {"prompt": {"en": "Mike finds it very hard to save money, but his sister Aster saves easily and earns interest. Think about something you have tried to save up for. Did saving come easily to you, or was it hard like Mike? What strategy (like Aster's savings account or compound interest) could help you reach a goal? Explain using ideas from the book.", "zh": "迈克觉得存钱特别难，而妹妹艾斯特轻松存下钱还赚了利息。想一想你曾经想攒钱买的东西。存钱对你来说是容易还是像迈克一样难？书里提到的哪种办法（比如艾斯特的储蓄账户或复利）能帮你达成目标？请结合书里的点子说明。"}, "guidance": {"en": ["Aster opened a savings account in kindergarten and let her interest 'compound' so her money grew (p. 5-7).", "Mike spent his $25 birthday money little by little at the arcade and Jump and Bump until it was gone (p. 9-11).", "A good answer connects a personal saving goal to a strategy from the book, like starting a savings account or saving a set amount each time."], "zh": ["艾斯特从幼儿园就开了储蓄账户，并让利息「复利」增长，钱越变越多（第5-7页）。", "迈克把25美元生日钱在游戏厅和 Jump and Bump 一点一点花光了（第9-11页）。", "好的回答会把你个人的存钱目标联系到书里的办法，比如开个储蓄账户、或每次固定存下一笔钱。"]}}};</script>
