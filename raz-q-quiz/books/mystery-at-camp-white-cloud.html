<script>window.BOOK = {"slug": "mystery-at-camp-white-cloud", "title": "Mystery at Camp White Cloud", "titleZh": "白云营地的谜团", "level": "Q", "genre": "Fiction", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Where is Camp White Cloud, and how long do the campers stay?", "zh": "白云营地(Camp White Cloud)在哪里？营员们要待多久？"}, "options": [{"en": "In the mountains of Colorado, for two weeks", "zh": "在科罗拉多州的山里，待两个星期"}, {"en": "On a beach in Florida, for one day", "zh": "在佛罗里达的海滩上，待一天"}, {"en": "In a city in New York, for the whole summer", "zh": "在纽约市里，待整个夏天"}, {"en": "Near a lake in Texas, for three months", "zh": "在得克萨斯的一个湖边，待三个月"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says Frankie arrived 'along with 199 other campers, to spend two weeks in the mountains of Colorado.'", "zh": "书里说弗兰基「和其他199名营员一起到达，要在科罗拉多州的山里待两个星期」。"}}, {"q": {"en": "Who is Angela Hansen, and what is special about her situation at camp?", "zh": "安琪拉·汉森(Angela Hansen)是谁？她在营地里有什么特别之处？"}, "options": [{"en": "Her dad is the Camp Director, so she gets to play all summer but rarely sees him because he is busy", "zh": "她爸爸是营地主任，所以她整个夏天都能玩，但因为爸爸很忙，很少见到他"}, {"en": "She is the camp cook who feeds everyone", "zh": "她是给所有人做饭的营地厨师"}, {"en": "She is a new camper who just arrived that day", "zh": "她是当天才刚到的新营员"}, {"en": "She is the soccer coach for the boys' team", "zh": "她是男足队的教练"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Gil says, 'Her dad is Camp Director. She gets to play all summer,' and Frankie adds, 'he's always busy running the camp. She probably doesn't see her dad much.'", "zh": "吉尔说：「她爸爸是营地主任。她整个夏天都能玩。」弗兰基补充：「他总是忙着管营地。她大概很少见到爸爸。」"}}, {"q": {"en": "From what point of view is this mystery told?", "zh": "这个谜团故事是用什么视角（人称）叙述的？"}, "options": [{"en": "Third-person — a narrator describes Frankie's thoughts and actions from outside", "zh": "第三人称——叙述者从外部描写弗兰基的想法和行为"}, {"en": "First-person — Frankie tells it herself as 'I'", "zh": "第一人称——由弗兰基以「我」的口吻讲述"}, {"en": "Second-person — the reader is addressed as 'you'", "zh": "第二人称——以「你」来称呼读者"}, {"en": "It is written as a newspaper article", "zh": "它是一篇新闻报道的形式"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The narrator describes Frankie from outside, e.g. 'Frankie didn't believe the story' and 'Frankie could faintly see Angela's bunk' — that is third-person.", "zh": "叙述者从外部描写弗兰基，例如「弗兰基不相信这个故事」、「弗兰基隐约能看到安琪拉的床铺」——这是第三人称。"}}, {"q": {"en": "According to the story Angela told, who was Old Man Looper?", "zh": "根据安琪拉讲的故事，「卢珀老头」(Old Man Looper) 是谁？"}, "options": [{"en": "A miner who hoped to find gold, had little luck, and mysteriously disappeared, said to haunt the camp", "zh": "一个想挖到金子却运气不佳、神秘失踪的矿工，据说在营地出没"}, {"en": "The first Camp Director who built the wooden arch", "zh": "建造木拱门的第一任营地主任"}, {"en": "A friendly bear that lives in the woods", "zh": "住在森林里的一只友好的熊"}, {"en": "Frankie's grandfather", "zh": "弗兰基的祖父"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Angela told that Looper 'was a miner who hoped to find a fortune in gold... he had little luck... One day, he mysteriously disappeared; Angela said he'd haunted the camp ever since.'", "zh": "安琪拉讲道，卢珀「是个想靠金子发财的矿工……运气很差……有一天神秘失踪；安琪拉说他从那以后就在营地出没。」"}}, {"q": {"en": "Frankie did NOT believe the prowler was Looper's ghost. Which clues in the text support that a real person — not a ghost — was behind it?", "zh": "弗兰基不相信那是卢珀老头的鬼魂。文中哪些线索表明背后是真实的人，而不是鬼？"}, "options": [{"en": "Angela stayed 'asleep' (stuffed her bag with pillows), fresh carved messages appeared, and a letter was found in her woodworking box", "zh": "安琪拉一直「在睡」（用枕头塞满睡袋装睡）、出现了刚刻不久的字、在她的木工盒里发现了一封信"}, {"en": "The cabin door was locked from the outside every night", "zh": "小屋的门每晚都从外面锁着"}, {"en": "A real ghost was seen by the camp director", "zh": "营地主任亲眼看到了真正的鬼"}, {"en": "The carvings were made by a wild animal", "zh": "那些刻字是野兽刻的"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Frankie and Gil realized Angela 'didn't wake up when the prowler came' (she faked sleep), 'left woodworking early,' and they 'found a letter addressed to you, Sir, in her woodworking box' — real, human clues, not a ghost.", "zh": "弗兰基和吉尔推断安琪拉「闹鬼那晚没醒」（是装睡）、「提前离开了木工课」，而且他们在「她的木工盒里发现了一封写给主任的信」——都是真实的人留下的线索，不是鬼。"}}, {"q": {"en": "Why did Angela create the scary warnings and carve the messages at camp?", "zh": "安琪拉为什么要制造那些恐怖警告、在营地里刻字？"}, "options": [{"en": "She was upset that her busy father, the Camp Director, never spent time with her, and wanted his attention", "zh": "她因为爸爸（营地主任）太忙、从不陪她而难过，想引起爸爸的注意"}, {"en": "She wanted to win the soccer game", "zh": "她想赢足球比赛"}, {"en": "She was bored and liked carving wood", "zh": "她无聊，又喜欢刻木头"}, {"en": "She wanted to close the camp to get more pocket money", "zh": "她想关闭营地，好多拿零花钱"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "In the epilogue Angela says, 'I know how important you are to all of these campers, but I just couldn't stand not getting time with you any more' — her mischief was a cry for her father's attention.", "zh": "在尾声里安琪拉说：「我知道你对这些营员多重要，可我实在受不了再也得不到你的陪伴」——她的恶作剧是想引起爸爸的注意。"}}, {"q": {"en": "What words were carved into the dining hall wall during the 'Last Chance' warning?", "zh": "在「最后通牒」(Last Chance) 那次，餐厅墙上刻了什么字？"}, "options": [{"en": "\"LAST WARNING! LEAVE NOW!\"", "zh": "「最后警告！马上离开！」"}, {"en": "\"THIS IS NOT YOUR HOME! LEAVE NOW!\"", "zh": "「这里不是你的家！马上离开！」"}, {"en": "\"WELCOME TO CAMP WHITE CLOUD\"", "zh": "「欢迎来到白云营地」"}, {"en": "\"OLD MAN LOOPER LIVES HERE\"", "zh": "「卢珀老头住在这里」"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "At the dining hall, 'one wall was carved with \"LAST WARNING! LEAVE NOW!\"' The earlier cabin message was 'THIS IS NOT YOUR HOME! LEAVE NOW!'", "zh": "在餐厅里，「一面墙上刻着『最后警告！马上离开！』」。更早小屋上刻的是『这里不是你的家！马上离开！』"}}, {"q": {"en": "The book calls the shadow outside the cabin a 'prowler.' What is a prowler?", "zh": "书里把小屋外的黑影叫做「prowler」。prowler 是什么意思？"}, "options": [{"en": "Someone who moves around secretly, especially at night, to spy on or disturb others", "zh": "在暗处（尤其夜里）悄悄走动、窥探或捣乱的人"}, {"en": "A type of friendly camp counselor", "zh": "一种友好的营地辅导员"}, {"en": "A kind of owl that lives in trees", "zh": "一种住在树上的猫头鹰"}, {"en": "The name of the camp's dog", "zh": "营地一条狗的名字"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The 'prowler' is the shadow Frankie glimpsed 'sneaking around our cabin, scratching and moving around' — a person moving about secretly at night, not a ghost.", "zh": "那个「prowler」就是弗兰基瞥见的黑影，「在我们小屋外鬼鬼祟祟地溜达、抓挠、挪动」——是夜里悄悄走动的人，不是鬼。"}}, {"q": {"en": "How did Frankie and Gil solve the case and save Camp White Cloud from closing?", "zh": "弗兰基和吉尔是怎样破案、让白云营地免于关闭的？"}, "options": [{"en": "They gathered clues (fake sleep, early leave from woodworking, the letter in her box) and told Director Hansen, proving Angela was behind it", "zh": "他们收集线索（装睡、提前离开木工课、木工盒里的信）告诉了汉森主任，证明是安琪拉干的"}, {"en": "They caught a real ghost in the woods", "zh": "他们在树林里抓到了真正的鬼"}, {"en": "They guessed randomly and got lucky", "zh": "他们随便猜、碰巧猜中"}, {"en": "They asked the soccer team to vote", "zh": "他们让足球队投票决定"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Frankie whispered the evidence to Director Hansen, and he announced, 'Thanks to Frankie and Gil, Camp White Cloud stays open!' — their clue-combining solved it.", "zh": "弗兰基把证据悄悄告诉汉森主任，主任宣布：「多亏了弗兰基和吉尔，白云营地继续开放！」——他们把线索串起来破了案。"}}, {"q": {"en": "What is the author's main purpose in telling this mystery?", "zh": "作者讲这个谜团故事，主要目的是什么？"}, "options": [{"en": "To show how paying attention to clues and working together can solve a problem — and help us understand someone else's feelings", "zh": "为了说明留意线索、团队合作能破解问题，也帮助我们理解别人的感受"}, {"en": "To teach readers how to dig for gold", "zh": "教读者怎样挖金子"}, {"en": "To prove that ghosts are real", "zh": "证明鬼是真实存在的"}, {"en": "To explain how to build a wooden arch", "zh": "讲解怎样搭建木拱门"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book ends with Director Hansen praising 'detectives like Frankie and Gil to solve the case,' and reveals Angela's sad reason — the author wants readers to see both smart detective work and empathy.", "zh": "书以汉森主任表扬「像弗兰基和吉尔这样的小侦探破了案」作结，并揭出安琪拉难过的缘由——作者想让读者既看到聪明的侦查，也看到同理心。"}}], "extended": {"prompt": {"en": "Angela scared everyone not because she was mean, but because she wanted more time with her busy father. Think of a time you did something wrong to get attention, or a time you solved a problem by paying attention to clues. What did you learn about honesty, attention, or understanding others?", "zh": "安琪拉吓唬大家不是因为坏，而是想多得到忙碌爸爸的陪伴。回想一次你为了引起注意而做错事，或者一次你靠留意线索解决了问题的经历。你从诚实、观察或理解他人中，学到了什么？"}, "guidance": {"en": ["Angela's clue was that she 'didn't wake up when the prowler came' — she had stuffed her sleeping bag with pillows (p. 18).", "Frankie and Gil also found 'a letter addressed to you, Sir, in her woodworking box' that showed how upset she was (p. 18).", "A good answer connects a personal story to a lesson about honesty, careful observation, or seeing things from another person's point of view."], "zh": ["安琪拉的破绽是「闹鬼那晚她没醒」——她用枕头塞满了睡袋装睡（第18页）。", "弗兰基和吉尔还在「她的木工盒里发现了一封写给主任的信」，看出她有多难过（第18页）。", "好的回答要把亲身经历和「诚实、细心观察、或从他人角度看问题」的教训联系起来。"]}}};</script>
