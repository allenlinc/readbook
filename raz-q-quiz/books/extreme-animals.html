ars", "zh": "乌龟；150到200年"}, {"en": "The snail; it never hurries", "zh": "蜗牛；它从不着急"}, {"en": "The lungfish; four years without food", "zh": "肺鱼；四年不吃东西"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Under 'Shortest Life,' the book says, 'A mayfly usually lives only one day after it hatches into an adult insect.'", "zh": "在「最短寿命」一节，书里说：「蜉蝣变成成虫后通常只能活一天。」"}}, {"q": {"en": "According to the book, what are the fastest animals mentioned?", "zh": "根据这本书，提到的最快的动物是哪些？"}, "options": [{"en": "The cheetah (over 105 km/h on land) and the peregrine falcon (over 322 km/h diving)", "zh": "猎豹（陆地上超过105公里/小时）和游隼（俯冲时超过322公里/小时）"}, {"en": "The snail and the sloth", "zh": "蜗牛和树懒"}, {"en": "The penguin and the flamingo", "zh": "企鹅和火烈鸟"}, {"en": "The tortoise and the mayfly", "zh": "乌龟和蜉蝣"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says a cheetah 'can run over 105 kilometers (65 mi) an hour,' and a peregrine falcon 'can swoop down on its prey at over 322 kilometers (200 mi) an hour.'", "zh": "书里说猎豹「每小时能跑超过105公里（65英里）」，游隼「俯冲捕猎时速度超过322公里（200英里）每小时」。"}}, {"q": {"en": "The book calls extreme animals 'the rock stars in the animal kingdom.' What does this mean?", "zh": "书里把「极限动物」称作动物王国里的「摇滚明星」(rock stars)。这是什么意思？"}, "options": [{"en": "They get noticed everywhere they go because of their unusual, standout traits", "zh": "因为它们有着不寻常、格外突出的特点，走到哪里都引人注目"}, {"en": "They all play musical instruments", "zh": "它们都会演奏乐器"}, {"en": "They live only in concert halls", "zh": "它们只住在音乐厅里"}, {"en": "They are made of stone", "zh": "它们是用石头做的"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The ending says extreme animals 'are the rock stars in the animal kingdom—they get noticed everywhere they go,' meaning their traits make them stand out.", "zh": "结尾说极限动物「是动物王国里的摇滚明星——走到哪里都引人注目」，意思是它们凭借特点而格外突出。"}}, {"q": {"en": "In this book, what does it mean for an animal to be 'extreme'?", "zh": "在这本书里，一种动物被称为「极限」(extreme) 是什么意思？"}, "options": [{"en": " gration of Knowledge and Ideas", "explain": {"en": "Under 'Quietest,' the giraffe 'is one of the quietest animals' (it communicates with body language), while the 'Loudest' section covers the blue whale's rocket-loud song and the howler monkey's far-carrying howl.", "zh": "在「最安静」一节，长颈鹿「是最安静的动物之一」（它用肢体语言交流）；而「最吵」一节讲的是蓝鲸像火箭般响亮的歌声和吼猴传得很远的吼叫。"}}, {"q": {"en": "Why did the author write this book?", "zh": "作者写这本书的目的是什么？"}, "options": [{"en": "To share odd, unknown, and fun facts about unusual animals and what makes them special", "zh": "为了分享那些奇特、少见又有趣的事实，介绍不寻常的动物以及它们的特别之处"}, {"en": "To teach readers how to train pets", "zh": "为了教读者怎么训练宠物"}, {"en": "To argue that all animals are the same", "zh": "为了论证所有动物都一样"}, {"en": "To list every animal in the world", "zh": "为了列出世界上每一种动物"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The intro says the book 'tells many odd, unknown, and fun facts about these unusual animals, and what makes them different and special.'", "zh": "引言说，这本书「讲述许多奇特、少见又有趣的事实，介绍这些不寻常的动物，以及它们与众不同、特别的地方」。"}}, {"q": {"en": "What is the book's final message about extreme animals?", "zh": "这本书关于「极限动物」的最终主旨是什么？"}, "options": [{"en": "They come in many different sizes and shapes and get noticed like 'rock stars'", "zh": "它们有各种各样的体型和外形，像「摇滚明星」一样引人注目"}, {"en": "Only the biggest animals matter", "zh": "只有最大的动物才重要"}, {"en": "Small animals should be afraid", "zh": "小型动物应该感到害怕"}, {"en": "Animals should try to be normal", "zh": "动物应该努力变得普通"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The ending says 'extreme animals come in many different sizes and shapes,' and calls them 'the rock stars in the animal kingdom.'", "zh": "结尾说「极限动物有各种各样的体型和外形」，并称它们是「动物王国里的摇滚明星」。"}}], "extended": {"prompt": {"en": "The book groups animals by their 'extremes' — biggest, smallest, loudest, quietest, longest-lived, shortest-lived, slowest, and fastest. Which extreme animal in the book amazes you the most, and why? Use a fact from
