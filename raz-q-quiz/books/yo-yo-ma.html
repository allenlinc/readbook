<script>window.BOOK = {"slug": "yo-yo-ma", "title": "Yo-Yo Ma", "titleZh": "马友友", "level": "Q", "genre": "Nonfiction", "mainSkill": "Author's Purpose and Perspective", "questions": [{"q": {"en": "Where and when was Yo-Yo Ma born?", "zh": "马友友出生在何时、何地？"}, "options": [{"en": "In 1955 in Paris, France", "zh": "1955 年，生于法国巴黎"}, {"en": "In 1955 in New York City", "zh": "1955 年，生于纽约市"}, {"en": "In 1962 in China", "zh": "1962 年，生于中国"}, {"en": "In 1945 in Paris, France", "zh": "1945 年，生于法国巴黎"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says, 'Yo-Yo Ma was born in 1955 in Paris, France, into a musical family.' His parents were both born in China and had moved to France so his father could teach music.", "zh": "书里说：「马友友 1955 年生于法国巴黎，出生在一个音乐家庭。」他的父母都出生在中国，为了父亲能在当地教音乐而移居法国。"}}, {"q": {"en": "How did Yo-Yo Ma come to play the cello instead of the violin or the double bass?", "zh": "马友友为什么最终拉大提琴，而不是小提琴或低音提琴？"}, "options": [{"en": "He smashed violins in frustration and quit; later wanted a double bass but it was too big, so his parents got him the cello, the second-biggest string instrument", "zh": "他因受挫摔坏过小提琴便放弃了；后来想要低音提琴，但太大，于是父母给他买了第二大的弦乐器——大提琴"}, {"en": "He always loved the violin best", "zh": "他一直最爱的就是小提琴"}, {"en": "His older sister chose the cello for him", "zh": "是他的姐姐替他选了大提琴"}, {"en": "He won a cello in a music contest", "zh": "他在一场音乐比赛里赢了一把大提琴"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Given a violin at age three, he 'sounded terrible' and 'smashed more than one violin in frustration,' then quit. At four he wanted a double bass, but it was about 6 feet tall—too big—so his parents got him the cello instead.", "zh": "他三岁得到小提琴，却「声音糟透了」还「气得摔坏不止一把」就放弃了。四岁时他想要低音提琴，但那约有 6 英尺（1.8 米）高——太大了——于是父母改给他大提琴。"}}, {"q": {"en": "At what age did Yo-Yo Ma perform for President John F. Kennedy?", "zh": "马友友几岁时为约翰·肯尼迪(John F. Kennedy)总统演出？"}, "options": [{"en": "At age seven, in 1962", "zh": "七岁，1962 年"}, {"en": "At age three", "zh": "三岁"}, {"en": "At age fifteen", "zh": "十五岁"}, {"en": "At age twenty-three", "zh": "二十三岁"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says, 'In 1962, seven-year-old Yo-Yo performed for President John F. Kennedy.' The next year he and his sister played on TV for millions.", "zh": "书里说：「1962 年，七岁的友友为约翰·肯尼迪总统演出。」第二年他和姐姐在电视上给数百万人表演。"}}, {"q": {"en": "What health problem forced Ma to stop playing, and what happened after his surgery?", "zh": "什么健康问题曾逼得马友友停止演奏？手术后又发生了什么？"}, "options": [{"en": "Scoliosis (a curved spine) required risky back surgery; after a successful operation he was in a body cast for six months", "zh": "脊柱侧弯( scoliosis) 需要冒险做背部手术；手术成功后他打了六个月的石膏固定身体"}, {"en": "He broke his arm in an accident", "zh": "他在一次意外中摔断了手臂"}, {"en": "He lost his hearing", "zh": "他失聪了"}, {"en": "He caught a bad cold before a concert", "zh": "他在演出前得了重感冒"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "As soon as he graduated, Ma 'had to stop playing cello' for back surgery to correct scoliosis. The surgery succeeded, but 'Yo-Yo was in a body cast for six months' and could not play.", "zh": "一毕业，马友友就「不得不停止拉大提琴」去做矫正脊柱侧弯的背部手术。手术成功了，但「友友打了六个月的石膏」，无法演奏。"}}, {"q": {"en": "In the glossary, what is a 'cello'?", "zh": "在词汇表里，「cello」（大提琴）是什么？"}, "options": [{"en": "A large stringed instrument in the violin family that a seated player holds upright between the legs", "zh": "小提琴家族中的一种大型弦乐器，演奏者坐着把它竖直夹在双腿之间"}, {"en": "A small wind instrument you blow into", "zh": "一种用嘴吹的小型管乐器"}, {"en": "A kind of drum", "zh": "一种鼓"}, {"en": "A type of singing voice", "zh": "一种人声唱法"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'cello' as 'a large stringed instrument in the violin family that a seated player holds upright between the legs while playing.'", "zh": "词汇表把 cello 定义为「小提琴家族中的一种大型弦乐器，演奏者坐着把它竖直夹在双腿之间演奏」。"}}, {"q": {"en": "In the glossary, what is an 'ensemble'?", "zh": "在词汇表里，「ensemble」（乐团/合奏团）是什么？"}, "options": [{"en": "A group of people, such as musicians, who perform together", "zh": "一群一起表演的人，例如音乐家"}, {"en": "A single solo performer", "zh": "一位独奏表演者"}, {"en": "A kind of musical note", "zh": "一种音符"}, {"en": "A type of musical instrument", "zh": "一种乐器"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'ensemble' as 'a group of people, such as actors or musicians, who perform together.' Ma founded the Silk Road Ensemble.", "zh": "词汇表把 ensemble 定义为「一群一起表演的人，例如演员或音乐家」。马友友创立的正是「丝绸之路乐团」(Silk Road Ensemble)。"}}, {"q": {"en": "How does the Silk Road Ensemble reflect Yo-Yo Ma's background?", "zh": "丝绸之路乐团如何体现了马友友的身世背景？"}, "options": [{"en": "It brings together musicians from twenty countries and mixes musical traditions, reflecting his Chinese, French, and American influences", "zh": "它汇聚了来自二十个国家的音乐家、融合各种音乐传统，体现了他中国、法国和美国的多元影响"}, {"en": "It only plays traditional American music", "zh": "它只演奏美国传统音乐"}, {"en": "It was founded by his older sister", "zh": "它是由他姐姐创立的"}, {"en": "It uses only one kind of instrument", "zh": "它只用一种乐器"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says Chinese, French, and American ideas 'have all shaped Ma's music.' In 1998 he founded the Silk Road Ensemble, 'musicians and composers from twenty countries' making music from traditions all over the world.", "zh": "书里说中国、法国和美国的观念「共同塑造了友友的音乐」。1998 年他创立了丝绸之路乐团，由「来自二十个国家的音乐家和作曲家」组成，创作融合世界各地的音乐传统。"}}, {"q": {"en": "Why did Ma leave Juilliard for another college?", "zh": "马友友为什么从朱利亚德(Juilliard)音乐学院转去另一所大学？"}, "options": [{"en": "He didn't want the cello to be the only thing in his life and wanted to study other subjects", "zh": "他不想让大提琴成为生命中的唯一，还想学习别的东西"}, {"en": "He failed all of his music classes", "zh": "他所有音乐课都不及格"}, {"en": "Juilliard closed down", "zh": "朱利亚德音乐学院关门了"}, {"en": "His father forced him to leave", "zh": "他父亲逼他离开的"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "He chose Juilliard, 'one of the best music schools,' but 'soon... switched to a college where he could study other things besides music. Yo-Yo didn't want the cello to be the only thing in his life.'", "zh": "他选了「最好的音乐学府之一」朱利亚德，但「很快……转去一所可以学音乐以外东西的大学。友友不想让大提琴成为生命中的唯一」。"}}, {"q": {"en": "What is the book's Focus Question about the Silk Road Ensemble?", "zh": "这本书关于丝绸之路乐团的「聚焦问题」(Focus Question) 是什么？"}, "options": [{"en": "How is the Silk Road Ensemble a reflection of Yo-Yo Ma's background and music?", "zh": "丝绸之路乐团如何反映了马友友的身世背景与音乐？"}, {"en": "How old is Yo-Yo Ma?", "zh": "马友友多大了？"}, {"en": "Why did he learn the cello?", "zh": "他为什么要学大提琴？"}, {"en": "Where was he born?", "zh": "他出生在哪里？"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book opens with the Focus Question: 'How is the Silk Road Ensemble a reflection of Yo-Yo Ma's background and music?' The chapters about his cultures and the Ensemble answer it.", "zh": "书一开头就提出聚焦问题：「丝绸之路乐团如何反映了马友友的身世背景与音乐？」后面讲述他的多元文化与乐团的章节都在回答它。"}}, {"q": {"en": "When Ma says 'I'm an accident,' what is he saying about his success?", "zh": "当马友友说「我是个意外」(I'm an accident) 时，他是在怎样解释自己的成功？"}, "options": [{"en": "He credits many people (parents, teachers, sister, wife, children) and experiences, not just his own talent", "zh": "他把成功归功于许多人（父母、老师、姐姐、妻子、孩子）和种种经历，而不只是自己的天赋"}, {"en": "He thinks he succeeded purely by random luck", "zh": "他认为自己纯粹是靠运气偶然成功的"}, {"en": "He does not actually like music", "zh": "他其实并不喜欢音乐"}, {"en": "He regrets becoming a musician", "zh": "他后悔成为了音乐家"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Ma says his success 'comes from many things. His parents, teachers, sister, wife, and children have all helped him,' plus living in Paris and New York and performing young. He feels any difference might have changed his life.", "zh": "马友友说他的成功「来自许多方面。他的父母、老师、姐姐、妻子和孩子都帮过他」，还有在巴黎、纽约的生活以及自幼登台。他觉得任何一点不同都可能改变他的一生。"}}], "extended": {"prompt": {"en": "Yo-Yo Ma says being open to new ideas from many cultures made his music better, and that many people helped him succeed. Think of a skill or hobby you have. Who helped you learn it, and how has trying new styles or ideas made it better?", "zh": "马友友说，乐于接纳来自多种文化的新想法让他的音乐更好，而且有许多人帮他成功。想一想你的一项技能或爱好。是谁帮你学会的？尝试新的风格或想法又是怎样让它变得更好的？"}, "guidance": {"en": ["Ma plays bluegrass, tango, jazz, and traditional music from China, Japan, and Brazil—he says being 'open to new ideas' helps him understand music and people (p. 13).", "He credits his parents, teachers, sister, wife, and children for his success (p. 15).", "A good answer names a real skill or hobby, the people who helped, and a new idea or style that improved it."], "zh": ["马友友演奏蓝草、探戈、爵士，以及中国、日本、巴西的传统音乐——他说「乐于接受新想法」帮他理解音乐与人（第13页）。", "他把成功归功于父母、老师、姐姐、妻子和孩子（第15页）。", "好的回答要说出一项真实的技能或爱好、帮过你的人，以及一个让它变得更好的新想法或新风格。"]}}};</script>
