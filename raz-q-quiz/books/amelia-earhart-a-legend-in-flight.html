s", "zh": "连衣裙"}, {"en": "Pilot uniforms", "zh": "飞行员制服"}, {"en": "Football helmets", "zh": "橄榄球头盔"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Their mother made 'bloomers' for them 'to wear. Unlike dresses, bloomers allowed the girls to be as active as the boys.'", "zh": "妈妈给她们做了「灯笼裤」来穿。「和连衣裙不同，灯笼裤让女孩能像男孩一样活跃。」"}}, {"q": {"en": "In the glossary, what does 'navigator' mean — the job of Fred Noonan on Amelia's last flight?", "zh": "在词汇表里，「navigator」(领航员) 是什么意思？——也就是弗雷德·努南在阿梅莉亚最后一次飞行中的角色。"}, "options": [{"en": "A person who plots a course to arrive at an intended destination", "zh": "规划航线、以抵达既定目的地的人"}, {"en": "The person who actually flies the plane", "zh": "真正驾驶飞机的人"}, {"en": "A passenger riding on the plane", "zh": "飞机上的乘客"}, {"en": "A person who builds airplanes", "zh": "制造飞机的人"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines a navigator as 'a person who plots a course to arrive at an intended destination' — Fred Noonan did this on the around-the-world flight.", "zh": "词汇表把 navigator 定义为「规划航线、以抵达既定目的地的人」——弗雷德·努南在环球飞行中就担任这个角色。"}}, {"q": {"en": "During the 1932 flight, ice froze the plane's controls and it went into a 'tailspin.' What is a tailspin?", "zh": "在 1932 年的飞行中，冰冻结了飞机的控制装置，飞机进入了「tailspin」(尾旋)。什么是尾旋？"}, "options": [{"en": "The rapid descent of a diving aircraft while turning round and round", "zh": "飞机俯冲时一边旋转一边急速下坠"}, {"en": "A slow climb upward", "zh": "缓慢地向上爬升"}, {"en": "A kind of storm cloud", "zh": "一种风暴云"}, {"en": "A type of airplane engine", "zh": "一种飞机引擎"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines tailspin as 'the rapid descent of a diving aircraft while turning round and round' — Amelia struggled to pull the plane out of its spin.", "zh": "词汇表把 tailspin 定义为「飞机俯冲时一边旋转一边急速下坠」——阿梅莉亚奋力把飞机从旋转中拉了回来。"}}, {"q": {"en": "By age thirty-nine, Amelia had made every major flight except one. What was the greatest challenge left, and what route did she choose?", "zh": "到 39 岁时，阿梅莉亚已完成每一项重大飞行，只差一项。剩下的最大挑战是什么？她选择了什么航线？"}, "options": [{"en": "To fly around the world, following the equator — the longest and most difficult route", "zh": "环球飞行，并沿着赤道飞——这是最长也最困难的航线"}, {"en": "To be the first woman to ride across the Atlantic as a passenger (already done in 1928)", "zh": "成为第一位作为乘客飞越大西洋的女性（1928 年已完成）"}, {"en": "To fly across the United States only", "zh": "只飞越美国本土"}, {"en": "To land on the moon", "zh": "登陆月球"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "'The greatest challenge left was to fly around the world.' Only one pilot had done it, but not along the equator — 'the longest and most difficult route. This was the route Amelia would fly.'", "zh": "「剩下的最大挑战就是环球飞行。」之前只有一名飞行员做到过，但没有沿赤道飞——「那条最长也最困难的航线，正是阿梅莉亚要飞的路。」"}}, {"q": {"en": "During her last flight, what happened as Amelia and Fred flew close to Howland Island?", "zh": "在最后一次飞行中，当阿梅莉亚和弗雷德飞近豪兰岛时，发生了什么？"}, "options": [{"en": "Her radio messages became odd and irregular; she said 'We're running north and south' and was never heard from again", "zh": "她的无线电信号变得古怪而不规律；她说「我们在南北方向来回飞」，此后便再无音讯"}, {"en": "She landed safely and waved to a big crowd", "zh": "她安全降落，并向一大群人挥手"}, {"en": "She turned the plane back toward California", "zh": "她把飞机掉头飞回加利福尼亚"}, {"en": "Her plane was struck by lightning", "zh": "她的飞机被闪电击中"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Near Howland Island the radio signals were 'irregular and strange'; more than twenty hours in, her voice said 'We're running north and south. She was never heard from again.'", "zh": "在豪兰岛附近，无线电信号「不规律又奇怪」；飞行超过二十小时后，她的声音说「我们在南北方向来回飞」。此后她再无音讯。"}}, {"q": {"en": "The book's Focus Question is 'Who is Amelia Earhart, and why is she a legend?' What is the author's main purpose?", "zh": "这本书的聚焦问题是「阿梅莉亚·埃尔哈特是谁，为什么她是传奇？」。作者的主要目的是什么？"}, "options": [{"en": "To show how Amelia broke limits for women and became a legend of flight", "zh": "展现阿梅莉亚如何打破对女性的限制，成为飞行传奇"}, {"en": "To teach people how to build airplanes", "zh": "为了教人们怎么造飞机"}, {"en": "To prove that flying is always dangerous", "zh": "为了证明飞行总是很危险"}, {"en": "To list every airport in the world", "zh": "为了列出世界上每一个机场"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book explains her 'accomplishments' and ends by saying she showed 'women didn't have to live with limits' and 'anyone could fly. She was a legend.'", "zh": "书里讲述了她的「成就」，结尾说她证明了「女性不必活在限制之中」「任何人都能飞。她是个传奇」。"}}, {"q": {"en": "What happened to Amelia is 'still a mystery today.' Which theory does the book say many people believe is the easiest answer?", "zh": "阿梅莉亚的遭遇「至今仍是谜」。书中说许多人认为最说得通的是哪一种猜测？"}, "options": [{"en": "The plane landed in the water and Amelia and Fred probably drowned before inflating their life raft", "zh": "飞机落水，阿梅莉亚和弗雷德大概还没来得及给救生艇充气就淹死了"}, {"en": "They were kidnapped by aliens", "zh": "他们被外星人绑架了"}, {"en": "They moved to a different country to hide", "zh": "他们搬到另一个国家躲了起来"}, {"en": "The plane was stolen by someone on the ground", "zh": "飞机被地面上的人偷走了"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book says, 'Many people believe the easiest answer is that the plane landed in the water. Perhaps Amelia and Fred drowned before they inflated their life raft.'", "zh": "书里说：「许多人认为最说得通的是飞机落入了水中。也许阿梅莉亚和弗雷德还没给救生艇充气就淹死了。」"}}, {"q": {"en": "The book says Amelia showed that 'women didn't have to live with limits' and 'anyone could fly.' What does the author want readers to learn?", "zh": "书里说阿梅莉亚证明了「女性不必活在限制之中」「任何人都能飞」。作者想让读者学到什么？"}, "options": [{"en": "That with courage, people (especially women) can break barriers and achieve great things", "zh": "只要有勇气，人（尤其是女性）就能打破障碍、成就大事"}, {"en": "That only men should ever fly planes", "zh": "只有男性才应该开飞机"}, {"en": "That flying is impossible for most people", "zh": "对大多数人来说飞行是不可能的"}, {"en": "That fame is not important at all", "zh": "名声一点都不重要"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The closing says there is 'no doubt that Amelia Earhart is one of the greatest Americans of the 20th century' who showed everyone that limits could be beaten.", "zh": "结尾说「毫无疑问，阿梅莉亚·埃尔哈特是 20 世纪最伟大的美国人之一」，她向所有人证明限制可以被打破。"}}], "extended": {"prompt": {"en": "Amelia disappeared while trying to fly around the world, and to this day no one knows exactly what happened. Why do you think people are still so interested in her story? If you could ask Amelia one question, what would it be?", "zh": "阿梅莉亚在尝试环球飞行时失踪，直到今天没人确切知道发生了什么。你认为人们为什么至今仍对她的故事如此着迷？如果你能问阿梅莉亚一个问题，你会问什么？"}, "guidance": {"en": ["Three women died trying to cross the Atlantic the year before Amelia's 1928 flight (p. 8).", "Her last radio message said 'We're running north and south' near Howland Island, and she was never heard from again (p. 13).", "A good answer connects her bravery and the unsolved mystery to why people stay interested."], "zh": ["在阿梅莉亚 1928 年飞越大西洋的前一年，有三位女性尝试时丧生（第8页）。", "她最后一条无线电说在豪兰岛附近「我们在南北方向来回飞」，之后再无音讯（第13页）。", "好的回答要把她的勇气与未解的谜团联系起来，说明人们为何念念不忘。"]}}};</script>
