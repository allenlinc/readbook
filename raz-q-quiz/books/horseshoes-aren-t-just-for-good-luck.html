<script>window.BOOK = {"slug": "horseshoes-aren-t-just-for-good-luck", "title": "Horseshoes Aren't Just For Good Luck", "titleZh": "马蹄蟹可不只是好运的象征", "level": "Q", "genre": "Fiction", "mainSkill": "Author's Purpose and Perspective", "questions": [{"q": {"en": "Before the narrator could go to the beach alone, what did Gram say the currents and undertow could do?", "zh": "在叙述者能独自去海滩之前，格兰姆说海流和退潮流（undertow）会造成什么危险？"}, "options": [{"en": "They were strong flows of water that could drag her far out into the ocean", "zh": "它们是强劲的水流，能把她远远拖进大海"}, {"en": "They were small fish that liked to nibble on children's toes", "zh": "它们是喜欢轻咬小孩脚趾的小鱼"}, {"en": "They were gentle waves that helped her float to sleep", "zh": "它们是帮她漂着入睡的轻柔波浪"}, {"en": "They were types of seashells found only on the beach", "zh": "它们是只在海滩上才能找到的贝壳"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Gram taught the rules of the sea: she told the narrator not to go in the water without her or Jim, and explained that currents and undertow 'were strong flows of water that could drag me far out into the ocean.'", "zh": "格兰姆教给叙述者海边的安全规则：没有她或吉姆陪着不能下水，并解释海流和退潮流「是强劲的水流，能把她远远拖进大海」。"}}, {"q": {"en": "What are the jetties, and why did the town build them?", "zh": "书中的「突堤」(jetties) 是什么？镇上为什么要建造它们？"}, "options": [{"en": "Long walls of rocks stretching into the ocean, built to keep the beach sand from eroding with the tides", "zh": "伸入大海的一道道石墙，用来防止海滩的沙子被潮水冲走"}, {"en": "Wooden piers built for fishing and boat docking", "zh": "用来钓鱼和停船的木栈桥"}, {"en": "Tall lighthouses that warned ships of rocks", "zh": "提醒船只注意礁石的高灯塔"}, {"en": "Sandcastles that children built every summer", "zh": "孩子们每年夏天堆的沙堡"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Gram showed the narrator 'the long shoreline between two rock jetties.' The jetties 'were long walls of rocks that stretched out into the ocean' and 'the town had built them years ago to prevent the beach sand from eroding away with the tides.'", "zh": "格兰姆带叙述者看「两道石砌突堤之间的长海岸线」。突堤「是伸入大海的一道道石墙」，镇上「多年前建造它们，是为了防止海滩的沙子被潮水侵蚀冲走」。"}}, {"q": {"en": "About how many eggs might ONE female horseshoe crab lay in a single season?", "zh": "一只雌马蹄蟹在一个繁殖季里大约会产多少颗卵？"}, "options": [{"en": "As many as eighty thousand (80,000) eggs", "zh": "多达八万颗（80,000）"}, {"en": "About a dozen (12) eggs", "zh": "大约十二颗（12）"}, {"en": "Exactly one hundred (100) eggs", "zh": "正好一百颗（100）"}, {"en": "Only two or three eggs", "zh": "只有两三颗"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Gram said the females lay 'green, jellylike eggs under the sand' and that 'one female crab might lay eighty thousand eggs in one season!'", "zh": "格兰姆说雌蟹会在沙下产「绿色、果冻般的卵」，而且「一只雌蟹在一个繁殖季里可能产下八万颗卵！」"}}, {"q": {"en": "What did Gram say a horseshoe crab does if it is stranded on the hot beach after the tide goes out?", "zh": "格兰姆说，如果马蹄蟹在退潮后被困在炽热的海滩上，它会怎么做？"}, "options": [{"en": "It tries to stay cool by burrowing into the wet sand", "zh": "它会钻进湿沙里，尽量保持凉爽"}, {"en": "It immediately swims back out to the deep ocean", "zh": "它立刻游回深海"}, {"en": "It climbs up the nearest tree to find shade", "zh": "它爬上最近的树去找阴凉"}, {"en": "It waits for a bird to carry it home", "zh": "它等鸟儿把它带回家"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Gram said that if 'a crab is stranded on the hot beach after the tide goes out, it tries to stay cool by burrowing into the wet sand.'", "zh": "格兰姆说，如果「螃蟹在退潮后被困在炽热的海滩上，它会钻进湿沙里尽量保持凉爽」。"}}, {"q": {"en": "Why are these creatures called 'horseshoe crabs'?", "zh": "为什么这些生物被叫做「马蹄蟹」(horseshoe crabs)？"}, "options": [{"en": "Because of the U shape in their shells; scientists call them limuli", "zh": "因为它们的壳呈 U 形；科学家称它们为 limuli"}, {"en": "Because they are kept as pets by people with horses", "zh": "因为它们被养马的人当宠物养"}, {"en": "Because they eat only horseshoe-shaped food", "zh": "因为它们只吃马蹄形状的食物"}, {"en": "Because they make a sound like a galloping horse", "zh": "因为它们发出的声音像奔马"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Gram said scientists call them limuli, 'but most people call them horseshoe crabs because of the U shape in their shells.'", "zh": "格兰姆说科学家叫它们 limuli，「但大多数人因为壳呈 U 形而称它们为马蹄蟹」。"}}, {"q": {"en": "In the book, what does it mean when an animal 'molts'?", "zh": "在书中，动物「蜕皮」(molts) 是什么意思？"}, "options": [{"en": "It sheds its skin, fur, or feathers and grows new ones, usually because it is growing larger", "zh": "它褪去皮肤、毛发或羽毛，再长出新的，通常是因为在长大"}, {"en": "It digs a deep hole in the sand to sleep", "zh": "它在沙里挖个深洞睡觉"}, {"en": "It swims all the way across the ocean", "zh": "它一路游过大洋"}, {"en": "It lays eggs under the sand", "zh": "它在沙下产卵"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Gram explained, 'Molting is when an animal sheds its skin, fur, or feathers and then grows back new ones,' and 'usually this happens because the animal is growing larger.'", "zh": "格兰姆解释：「蜕皮就是动物褪去皮肤、毛发或羽毛，再长出新的」，而且「通常是因为动物在长大」。"}}, {"q": {"en": "The book connects two surprising facts about horseshoe crabs. Which statement is true?", "zh": "书中把关于马蹄蟹的两个惊人事实联系在了一起。下面哪项是正确的？"}, "options": [{"en": "They have been around 350 million years AND their blood can be used to test for human diseases and new drugs", "zh": "它们已存在约三亿五千万年，而且它们的血可用来检测人类疾病和测试新药"}, {"en": "They live only in trees AND they eat only fruit", "zh": "它们只生活在树上，而且只吃水果"}, {"en": "They can breathe fire AND they build nests out of stones", "zh": "它们能喷火，而且用石头筑巢"}, {"en": "They are brand-new animals discovered last year AND they have no blood", "zh": "它们是去年才被发现的新动物，而且没有血"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says horseshoe crabs 'have been around for 350 million years—since dinosaurs roamed the Earth,' and that 'limulus blood can be used to test for some human diseases and to test new drugs.' Both facts show they are ancient, valuable living creatures.", "zh": "书里说马蹄蟹「已存在约三亿五千万年——自恐龙在地球上漫步时起」，而且「鲎血可用来检测一些人类疾病并测试新药」。这两个事实都说明它们是古老而有价值的生物。"}}, {"q": {"en": "What unusual thing must horseshoe crabs be doing in order to chew their food?", "zh": "马蹄蟹要处于什么不寻常的状态才能咀嚼食物？"}, "options": [{"en": "They must be walking, because they grind food with their spiny leg segments", "zh": "它们必须边走边吃，因为它们用带刺的腿节磨碎食物"}, {"en": "They must be completely still and quiet", "zh": "它们必须完全静止、安静"}, {"en": "They must be upside down on their shells", "zh": "它们必须四脚朝天翻在壳上"}, {"en": "They must be sitting in a tree", "zh": "它们必须坐在树上"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says, 'Because they grind food with their spiny leg segments, these crabs have to be walking to chew their food!'", "zh": "书里说：「因为它们用带刺的腿节磨碎食物，这些螃蟹必须边走才能边咀嚼！」"}}, {"q": {"en": "Why did Gram tell the narrator to leave the birds alone instead of chasing them away from the eggs?", "zh": "为什么格兰姆让叙述者别去赶走那些吃卵的鸟，而要由它们去？"}, "options": [{"en": "Because the birds needed the food to eat on their flight back north", "zh": "因为鸟儿在飞回北方的途中需要这些食物"}, {"en": "Because the birds were Gram's pets", "zh": "因为那些鸟是格兰姆的宠物"}, {"en": "Because the birds laid the eggs, not the crabs", "zh": "因为卵是鸟下的，不是蟹下的"}, {"en": "Because the birds were scared of the narrator", "zh": "因为鸟儿害怕叙述者"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Gram said to leave the birds alone 'because they needed food to eat on their flight back north' — the author shows a respectful, balanced view of nature where every creature has a role.", "zh": "格兰姆说别去管那些鸟，「因为它们在飞回北方的途中需要食物」——作者表达了对自然的尊重与平衡的看法，每种生物都有自己的角色。"}}, {"q": {"en": "What is the main message of the title 'Horseshoes Aren't Just For Good Luck'?", "zh": "书名《马蹄蟹可不只是好运的象征》想要传达的主要意思是什么？"}, "options": [{"en": "Horseshoe crabs are real, ancient, important animals worth learning about and protecting — not just lucky charms", "zh": "马蹄蟹是真实、古老而重要的动物，值得了解和保护，而不仅仅是好运的护身符"}, {"en": "Horseshoes should always be nailed above every doorway", "zh": "马蹄铁应该一律钉在每扇门上方"}, {"en": "Crabs are better pets than horses", "zh": "螃蟹比马更适合当宠物"}, {"en": "Summer is the only good time to visit the beach", "zh": "夏天是去海滩唯一的好时节"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Through the narrator's summer of rescuing and learning about horseshoe crabs, the author shows they are living creatures that have survived 350 million years and help science — far more than a symbol of good luck.", "zh": "通过叙述者一整个夏天救助和了解马蹄蟹的经历，作者告诉我们它们是活生生的生物，已存活三亿五千万年还能助力科学——远不止是好运的象征。"}}], "extended": {"prompt": {"en": "The narrator spends her summer rescuing stranded horseshoe crabs and learning why they matter. Think of a small living thing in nature (an insect, a crab, a plant, a bird) that you have seen. Why is it important, and what is one kind thing you could do to help it or the place it lives?", "zh": "叙述者整个夏天都在救助搁浅的马蹄蟹，并了解它们为什么重要。想一想你在自然中见过的一种小生物（昆虫、螃蟹、植物、鸟都行）。它为什么重要？你能做一件什么善意的小事来帮助它或它生活的地方？"}, "guidance": {"en": ["The narrator turns stranded crabs upright and tosses them into the waves so they won't get too hot and die (p. 14).", "Horseshoe crab blood is used to test for human diseases and new drugs, and they are 350 million years old (p. 13).", "A good answer names a real living thing, explains why it matters, and suggests one concrete, kind action."], "zh": ["叙述者把搁浅的螃蟹翻正、丢进浪里，免得它们被晒得太热而死（第14页）。", "鲎血可用来检测人类疾病和测试新药，而且它们已有三亿五千万年历史（第13页）。", "好的回答会说出一种真实的生物，说明它为什么重要，并提出一个具体、善意的行动。"]}}};</script>
