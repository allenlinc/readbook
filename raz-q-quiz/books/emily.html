<script>window.BOOK = {"slug": "emily", "title": "Emily", "titleZh": "艾米丽", "level": "Q", "genre": "Fiction", "mainSkill": "Author's Purpose and Perspective", "questions": [{"q": {"en": "What is the name of the story's narrator — the girl riding with her mother?", "zh": "这个故事的叙述者——和妈妈同行的那个女孩——叫什么名字？"}, "options": [{"en": "Mary", "zh": "玛丽"}, {"en": "Emily", "zh": "艾米丽"}, {"en": "Kate", "zh": "凯特"}, {"en": "Sarah", "zh": "莎拉"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The mother calls her 'Baby' and 'Mary' (e.g., 'How many miles is fifty kilometers, Mary?'), so the narrator's name is Mary.", "zh": "妈妈叫她「宝贝」和「玛丽」（例如「五十公里是多少英里，玛丽？」），所以叙述者叫玛丽。"}}, {"q": {"en": "Who is Harry?", "zh": "哈里(Harry)是谁？"}, "options": [{"en": "The narrator's mother's new boyfriend, her 'significant other'", "zh": "叙述者妈妈的新男友，也就是她的「另一半」"}, {"en": "The narrator's father", "zh": "叙述者的爸爸"}, {"en": "The narrator's teacher", "zh": "叙述者的老师"}, {"en": "A family dog", "zh": "家里的一只狗"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says, 'Harry was my mother's new boyfriend, her \"significant other,\" she called him,' and they might get married.", "zh": "书里说：「哈里是我妈妈的新男友，她管他叫『另一半』」，而且他们可能要结婚了。"}}, {"q": {"en": "Who is Emily?", "zh": "艾米丽(Emily)是谁？"}, "options": [{"en": "Harry's daughter, about Mary's height, with brown hair and Harry's neat little nose", "zh": "哈里的女儿，个头和玛丽差不多，棕色头发，长着和哈里一样小巧挺拔的鼻子"}, {"en": "Mary's little sister", "zh": "玛丽的妹妹"}, {"en": "The family's new puppy", "zh": "家里新养的小狗"}, {"en": "Mary's mother", "zh": "玛丽的妈妈"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "A girl steps from behind the door, 'about my height, with brown hair and the same neat little nose as Harry' — she is Harry's daughter Emily.", "zh": "一个女孩从门后走出来，「个头和我不相上下，棕色头发，长着和哈里一样小巧挺拔的鼻子」——她就是哈里的女儿艾米丽。"}}, {"q": {"en": "From what point of view is the story told?", "zh": "这个故事是用什么视角（人称）叙述的？"}, "options": [{"en": "First-person — Mary tells it as 'I,' sharing her own thoughts and feelings", "zh": "第一人称——由玛丽以「我」的口吻讲述，分享她自己的想法和感受"}, {"en": "Third-person — a narrator describes Mary from outside", "zh": "第三人称——由叙述者从外部描写玛丽"}, {"en": "Second-person — the reader is Mary", "zh": "第二人称——读者就是玛丽"}, {"en": "As a news report", "zh": "以新闻报道的形式"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Mary narrates with 'I': 'I sat motionless in the passenger seat,' and shares her private thoughts, which is first-person point of view.", "zh": "玛丽用「我」来叙述：「我一动不动地坐在副驾驶座上」，还分享自己心里的想法，这是第一人称视角。"}}, {"q": {"en": "What does the phrase 'in the same boat' mean when Mary thinks, 'Emily and I were in the same boat'?", "zh": "当玛丽想「艾米丽和我在同一条船上」时，「在同一条船上」(in the same boat) 是什么意思？"}, "options": [{"en": "They are in the same situation — both have a parent who is dating and want them to get along", "zh": "她们处境相同——各自都有一个正在谈恋爱的家长，都希望她们和睦相处"}, {"en": "They are literally riding in a boat", "zh": "她们真的坐在一艘船上"}, {"en": "They both like to go fishing", "zh": "她们都喜欢钓鱼"}, {"en": "They go to the same school", "zh": "她们上同一所学校"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "It is an idiom meaning 'in the same situation.' Mary realizes both girls were given the same speech and face the same new-family situation.", "zh": "这是一句习语，意思是「处境相同」。玛丽意识到两个女孩都被家长说了同样的话，面对着同样的新家庭处境。"}}, {"q": {"en": "Before meeting Harry, how did Mary picture him, and what was he actually like?", "zh": "在见到哈里之前，玛丽把他想象成什么样？而他实际上又是什么样子？"}, "options": [{"en": "She imagined him big and empty-headed, but he was actually slight, with wire-rimmed glasses and thinning hair", "zh": "她想象他高大、脑袋空空，但他其实很清瘦，戴着金属细框眼镜，头发稀疏"}, {"en": "She imagined a small boy, but he was a giant", "zh": "她想象是个小男孩，但他是个巨人"}, {"en": "She imagined a girl, but he was a man", "zh": "她想象是个女孩，但他是个男人"}, {"en": "She imagined a dog, but he was a cat", "zh": "她想象是只狗，但他是只猫"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Mary imagined Harry as 'bigger than Dad, with an enormous head with lots of empty space inside,' but the real Harry was 'kind of slight, with wire-rimmed glasses and thinning hair.'", "zh": "玛丽把哈里想象成「比爸爸还高大，长着一个空空荡荡的大脑袋」，但真正的哈里「有点清瘦，戴着金属细框眼镜，头发稀疏」。"}}, {"q": {"en": "Why does Mary decide she and Emily can be friends even though she is unsure about the marriage?", "zh": "虽然玛丽对这桩婚姻还不确定，她为什么还是决定和艾米丽能成为朋友？"}, "options": [{"en": "Because they are 'in the same boat' — both were told to be nice so the adults could be happy, and there is no reason not to be friends", "zh": "因为她们「处境相同」——家长都希望她们乖巧和睦，好让大人开心，而她们没有理由不交朋友"}, {"en": "Because Emily gave her a puppy", "zh": "因为艾米丽送了她一只小狗"}, {"en": "Because they both love popcorn", "zh": "因为她们都爱爆米花"}, {"en": "Because their mothers are sisters", "zh": "因为她们的妈妈是姐妹"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Mary thinks, 'Emily and I were in the same boat—there was no reason for us not to be friends,' after realizing both adults gave the same 'be nice' speech.", "zh": "玛丽意识到两位家长都说了同样的「要乖、要和睦」的话之后，心想：「艾米丽和我在同一条船上——我们没有理由不交朋友。」"}}, {"q": {"en": "What does the author show about dealing with a parent's new relationship?", "zh": "关于如何面对家长的新恋情，作者想表达什么？"}, "options": [{"en": "It can feel awkward, but finding common ground with a step-sibling can turn nervousness into friendship", "zh": "这可能会让人尴尬，但和未来的继兄弟姐妹找到共同点，就能把紧张变成友谊"}, {"en": "Children should always refuse to meet new people", "zh": "孩子应该永远拒绝见新认识的人"}, {"en": "Parents should never date", "zh": "家长永远不该谈恋爱"}, {"en": "Moving to Canada is the only solution", "zh": "搬到加拿大是唯一解决办法"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The story moves from Mary's sarcastic worry to her smiling at Emily and holding her hand, showing that shared experience can build friendship.", "zh": "故事从玛丽讽刺、担忧，发展到她对艾米丽微笑、牵起她的手，说明共同的处境能促成友谊。"}}, {"q": {"en": "Why do you think the book is titled 'Emily' rather than the narrator's name?", "zh": "你认为这本书为什么叫「艾米丽」，而不是用叙述者的名字？"}, "options": [{"en": "The story is really about two girls from separate homes learning they can be friends as their parents grow close", "zh": "因为故事真正讲的是两个来自不同家庭的女孩，在家长走近的过程中学会成为朋友"}, {"en": "Emily is the narrator's mother", "zh": "艾米丽是叙述者的妈妈"}, {"en": "The author's name is Emily", "zh": "作者的名字叫艾米丽"}, {"en": "It is a book about a dog", "zh": "这是一本写狗的书"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Although Mary narrates, the heart of the story is her meeting Emily — the other girl in the same boat — so the title highlights that new friendship.", "zh": "虽然由玛丽叙述，但故事的核心是她遇见艾米丽——那个与她处境相同的女孩——所以书名突出了这段新友谊。"}}, {"q": {"en": "At the start, why does Mary say sarcastically, 'I'll be sugar and spice and everything nice'?", "zh": "开头时，玛丽为什么带着讽刺说「我会又甜又乖、什么都好」？"}, "options": [{"en": "To show she is nervous and unsure about meeting Harry, hiding her worry with sarcasm", "zh": "为了表现她对见哈里感到紧张不安，用讽刺来掩饰自己的担忧"}, {"en": "Because she actually likes baking", "zh": "因为她真的很喜欢烘焙"}, {"en": "Because her mother forced her to say it", "zh": "因为妈妈逼她说的"}, {"en": "Because she is happy about the trip", "zh": "因为她对这趟旅行很开心"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Mary says it 'sarcastically' while staring out at the Canadian countryside, revealing her discomfort about her mother's new boyfriend rather than real cheerfulness.", "zh": "玛丽是「带着讽刺」说的，一边盯着加拿大的乡野——这流露出她对妈妈新男友的不安，而非真正的开心。"}}], "extended": {"prompt": {"en": "Mary is worried and sarcastic about meeting her mom's new boyfriend and his daughter, but she ends up smiling at Emily and becoming her friend. Think of a time you met someone new who seemed different or intimidating at first. What helped you get past your nerves? How was it like (or unlike) Mary and Emily being 'in the same boat'?", "zh": "玛丽对见妈妈的新男友和他的女儿又担忧又讽刺，但最后她对艾米丽笑了，还和她成了朋友。回想一次你遇见某个起初显得不一样、令你紧张的人。是什么帮你克服了紧张？这和你与艾米丽「处境相同」的经历有什么相似或不同？"}, "guidance": {"en": ["Mary worries because her mom 'looked glowing and energetic' with Harry and might marry him (p. 3-4).", "Both girls got the same 'be nice and get along' speech from their parents (p. 5).", "Mary and Emily smile at each other and Emily asks, 'Want to come up and see my room?' — shared experience eases the awkwardness (p. 6).", "A good answer shares a real experience of meeting someone new and explains what turned nervousness into friendship."], "zh": ["玛丽之所以担心，是因为妈妈和哈里在一起时「容光焕发、精力充沛」，还可能要结婚（第3-4页）。", "两个女孩都被家长说了同样的「要乖、要和睦」的话（第5页）。", "玛丽和艾米丽相视而笑，艾米丽问「想上楼看看我的房间吗？」——共同的处境化解了尴尬（第6页）。", "好的回答会分享一次真实的认识新人的经历，并说明是什么把紧张变成了友谊。"]}}};</script>
