<script>window.BOOK = {"slug": "ramses-ii", "title": "Ramses II", "titleZh": "拉美西斯二世", "level": "Q", "genre": "Nonfiction", "mainSkill": "Author's Purpose and Perspective", "questions": [{"q": {"en": "When was Ramses II born, and who were his parents?", "zh": "拉美西斯二世是哪一年出生的？他的父母是谁？"}, "options": [{"en": "In 1303 BC, to Seti I and Mut-Tuy", "zh": "公元前1303年，父亲是塞提一世(Seti I)，母亲是穆特-图伊(Mut-Tuy)"}, {"en": "In 1303 BC, to Horemheb and Nefertari", "zh": "公元前1303年，父亲是霍伦海布(Horemheb)，母亲是奈菲尔塔莉(Nefertari)"}, {"en": "In 1213 BC, to the Hittite king", "zh": "公元前1213年，由赫梯国王所生"}, {"en": "In 1500 BC, to a family of farmers", "zh": "公元前1500年，出生于农民家庭"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says 'in the year 1303 BC, Ramses II was born in Egypt. His father, Seti I, and mother, Mut-Tuy... probably didn't expect their son to become king.'", "zh": "书里说「公元前1303年，拉美西斯二世出生于埃及。他的父亲塞提一世、母亲穆特-图伊……大概没想到儿子会成为国王」。"}}, {"q": {"en": "How many wives did Ramses have, and who was his favorite?", "zh": "拉美西斯有多少位妻子？他最爱的是谁？"}, "options": [{"en": "Historians think he married eight or more times; his first wife, Nefertari, remained his favorite", "zh": "历史学家认为他至少结过八次婚；他的第一任妻子奈菲尔塔莉始终是他的最爱"}, {"en": "He had only one wife, Nefertari, for his whole life", "zh": "他一生只有奈菲尔塔莉一位妻子"}, {"en": "He had two wives, and he loved them equally", "zh": "他有两任妻子，并且同样深爱她们"}, {"en": "He never married at all", "zh": "他终身未娶"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says it was common for rulers to marry more than once and 'Many historians think Ramses married eight or more times. His first wife, Nefertari, remained his favorite.'", "zh": "书里说统治者娶多位妻子很常见，「许多历史学家认为拉美西斯至少结过八次婚。他的第一任妻子奈菲尔塔莉始终是他的最爱」。"}}, {"q": {"en": "What was special about the Battle of Kadesh, and how big was Ramses's army?", "zh": "卡叠什(Kadesh)之战有什么特别之处？拉美西斯的军队规模有多大？"}, "options": [{"en": "It was the world's largest chariot battle; Ramses led about 20,000 soldiers and 2,000 chariots", "zh": "它是世界上最庞大的战车之战；拉美西斯率领约两万名士兵和两千辆战车"}, {"en": "It was a small fight with only a few soldiers on each side", "zh": "它只是一场小规模冲突，双方都只有几个士兵"}, {"en": "It was a naval battle fought only on the sea", "zh": "它是一场只在海上进行的海战"}, {"en": "It was the first time Ramses used airplanes", "zh": "那是拉美西斯第一次使用飞机"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says Ramses 'led about twenty thousand soldiers and two thousand chariots' at Kadesh, and 'This battle became one of the most famous events... It holds the record as the world's largest chariot battle.'", "zh": "书里说拉美西斯在卡叠什「率领约两万名士兵和两千辆战车」，而且「这场战役成为……最著名的事件之一。它保持着世界上最庞大战车之战的纪录」。"}}, {"q": {"en": "In the glossary, what is a “pharaoh”?", "zh": "在词汇表里，「pharaoh」(法老) 是什么？"}, "options": [{"en": "A ruler in ancient Egypt", "zh": "古埃及的统治者"}, {"en": "A large stone statue", "zh": "一座巨大的石像"}, {"en": "A type of temple", "zh": "一种神庙"}, {"en": "A kind of written language", "zh": "一种书面文字"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines pharaohs as 'rulers in ancient Egypt' (p. 4) — Ramses II was one of the most important of them.", "zh": "词汇表把 pharaohs 定义为「古埃及的统治者」（第4页）——拉美西斯二世是其中最重要的一位。"}}, {"q": {"en": "In the glossary, what is a “dynasty”?", "zh": "在词汇表里，「dynasty」(王朝) 是什么？"}, "options": [{"en": "A series of rulers from the same family in a country", "zh": "一个国家里，由同一家族连续出任的一连串统治者"}, {"en": "A large building project like a temple", "zh": "像神庙那样的大型建筑工程"}, {"en": "A kind of ancient weapon", "zh": "一种古代武器"}, {"en": "A treaty between two nations", "zh": "两国之间的一份条约"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines a dynasty as 'a series of rulers from the same family in a country' (p. 14) — the book notes the New Kingdom dynasty was nearly over after Ramses died.", "zh": "词汇表把 dynasty 定义为「一个国家里，由同一家族连续出任的一连串统治者」（第14页）——书里提到拉美西斯死后，新王国王朝已近尾声。"}}, {"q": {"en": "How did Ramses change his father's building program, and what was the result?", "zh": "拉美西斯怎样改变了父亲的建筑计划？结果如何？"}, "options": [{"en": "He had workers carve images directly into stone, which doubled the building rate, and he built more temples than any other king", "zh": "他让工人把图像直接刻进石头，使建造速度翻倍，并且建的庙宇比任何一位国王都多"}, {"en": "He stopped all building to save money", "zh": "他为了省钱，停止了所有建筑工程"}, {"en": "He built only small houses for farmers", "zh": "他只给农民盖小房子"}, {"en": "He copied exactly what his father started and changed nothing", "zh": "他完全照搬父亲开工的样式，毫无改动"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says Ramses 'directed workers to carve images directly into the stone. This made the carvings easier and faster... He doubled the rate of building and ended up building more temples than any other king.'", "zh": "书里说拉美西斯「让工人把图像直接刻进石头。这样雕刻更省力也更快……他把建造速度翻了一倍，最终建的庙宇比任何一位国王都多」。"}}, {"q": {"en": "What shows that Ramses made peace with the Hittites, and how do we know about it today?", "zh": "有什么表明拉美西斯与赫梯人讲和了？今天我们是怎样知道这件事的？"}, "options": [{"en": "Ramses and the Hittite king agreed to make peace; two versions of the treaty survive (Egyptian hieroglyphs and the Hittite language)", "zh": "拉美西斯与赫梯国王同意讲和；条约的两个版本留存至今（埃及象形文字版和赫梯语版）"}, {"en": "They fought forever and never made peace", "zh": "他们一直打到死，从未讲和"}, {"en": "Only a single Egyptian drawing shows the war, with no treaty", "zh": "只有一幅埃及图画描绘了战争，并没有条约"}, {"en": "The Hittites won and destroyed all Egyptian records", "zh": "赫梯人获胜并销毁了所有埃及记录"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "After fifteen years, 'Ramses decided against another war' and 'Ramses and the Hittite king agreed to make peace.' The book notes 'Two versions of the peace treaty survive today, one written in Egyptian hieroglyphs... and the other in the language of the Hittites.'", "zh": "十五年后，「拉美西斯决定不再开战」，并「与赫梯国王同意讲和」。书里提到「这份和平条约的两个版本留存至今，一份用埃及象形文字书写……另一份用赫梯人的语言」。"}}, {"q": {"en": "What is the book's Focus Question — the big question the author wants you to think about?", "zh": "这本书的「聚焦问题」(Focus Question) 是什么？也就是作者希望你思考的核心问题。"}, "options": [{"en": "Why is Ramses II known as Ramses the Great?", "zh": "为什么拉美西斯二世被称为「伟大的拉美西斯」？"}, {"en": "How did the pyramids get built?", "zh": "金字塔是怎样建成的？"}, {"en": "Why did the Nile River flood each year?", "zh": "尼罗河为什么每年泛滥？"}, {"en": "Who were the Hittites?", "zh": "赫梯人是什么人？"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book opens with the Focus Question 'Why is Ramses II known as Ramses the Great?' and the whole book answers it through his battles, buildings, and long rule.", "zh": "书一开头就提出聚焦问题「为什么拉美西斯二世被称为『伟大的拉美西斯』？」，全书通过他的征战、建筑和长久统治来回答。"}}, {"q": {"en": "According to the book, why is Ramses II called “the Great”?", "zh": "根据这本书，拉美西斯二世为什么被称为「伟大的」(the Great)？"}, "options": [{"en": "He was a brave warrior, built more temples than any king, ruled a long time, and left behind art, buildings, and records", "zh": "他是勇猛的战士，建的庙宇比任何国王都多，统治长久，并留下了艺术、建筑与记录"}, {"en": "He was the tallest pharaoh who ever lived", "zh": "他是历史上个子最高的法老"}, {"en": "He discovered a new ocean", "zh": "他发现了一片新海洋"}, {"en": "He was the first person to write a book", "zh": "他是第一个写书的人"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book shows he was a brave soldier, 'built more temples than any other king,' ruled for decades, and 'Today, Ramses II is known as Ramses the Great. We know more about the people of his time thanks to the art, buildings, and records he left behind.'", "zh": "书里展现了他是勇猛的战士、「建的庙宇比任何国王都多」、统治数十年；「今天，拉美西斯二世被称为伟大的拉美西斯。多亏他留下的艺术、建筑与记录，我们才更了解那个时代的人」。"}}, {"q": {"en": "How old was Ramses II when he died, and what happened to his dynasty afterward?", "zh": "拉美西斯二世去世时多少岁？此后他的王朝怎样了？"}, "options": [{"en": "He died at ninety-one of natural causes; about 150 years later the New Kingdom came to an end", "zh": "他九十一岁时自然死亡；大约一百五十年后，新王国走向终结"}, {"en": "He died young in battle at age twenty-five", "zh": "他二十五岁时战死沙场"}, {"en": "He lived to be over 120 and ruled forever", "zh": "他活过120岁，永远在位"}, {"en": "He was killed by the Hittites and his family disappeared", "zh": "他被赫梯人杀死，家族就此消失"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book says 'Ramses II died of natural causes at the age of ninety-one... One hundred fifty years after Ramses's death, the New Kingdom came to an end.'", "zh": "书里说「拉美西斯二世于九十一岁自然死亡……他去世一百五十年后，新王国走向终结」。"}}], "extended": {"prompt": {"en": "Ramses II wanted to be remembered as a hero, so he ordered many wall carvings of the Battle of Kadesh — and every one showed him as the hero, even though other records say the battle was a draw. Why do you think leaders want to be shown in a certain way? Think of a modern example of someone shaping how people remember them, and explain why the 'real story' still matters.", "zh": "拉美西斯二世想被记成英雄，所以他下令雕刻了许多卡叠什之战的壁画——每一幅都把他画成英雄，尽管别的记录说那场仗其实打成了平手。你觉得为什么领袖都希望被以某种方式呈现？请想一个现代人「塑造他人记忆中形象」的例子，并说明为什么「真实的故事」仍然重要。"}, "guidance": {"en": ["Ramses 'ordered many wall carvings of the battle. All of them showed him as a hero' (p. 12).", "Hittite records lead scholars to think the Battle of Kadesh 'was a draw,' not the clear win Ramses claimed (p. 11).", "A good answer gives a real or imagined example of image-making and explains why honest history matters."], "zh": ["拉美西斯「下令雕刻了许多战役壁画。每一幅都把他画成英雄」（第12页）。", "依据赫梯记录，学者认为卡叠什之战「是平局」，并非拉美西斯宣称的完胜（第11页）。", "好的回答会举一个塑造形象的真实或设想中的例子，并说明诚实的历史为何重要。"]}}};</script>
