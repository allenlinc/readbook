r in daylight", "zh": "它只在夜里进行，绝不在白天"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book says Halloween is 'often about scaring people,' but 'Día de los Muertos is a time of happiness and joy, when some... believe the spirits of loved ones come home to visit.'", "zh": "书里说万圣节「常常是为了吓人」，而「亡灵节是快乐喜悦的时刻，有些人相信逝去亲人的灵魂会回家探访」。"}}, {"q": {"en": "In the glossary, what are altars?", "zh": "在词汇表里，「祭坛」(altars) 是什么？"}, "options": [{"en": "Tables or raised surfaces used for religious or spiritual purposes", "zh": "用于宗教或精神用途的桌子或抬高的台面"}, {"en": "The souls of dead family members (spirits)", "zh": "死去家人的灵魂（精灵）"}, {"en": "A formal parade (procession)", "zh": "一种正式的游行（队伍）"}, {"en": "Family members from long ago (ancestors)", "zh": "很久以前的家人（祖先）"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines altars as 'tables or other raised surfaces that are used for religious or spiritual purposes' (p. 14).", "zh": "词汇表把祭坛定义为「用于宗教或精神用途的桌子或其他抬高的台面」（第14页）。"}}, {"q": {"en": "Throughout the book, the author includes 'Do You Know?' boxes. What do these boxes add?", "zh": "全书里作者穿插了「你知道吗？」(Do You Know?) 的小栏目。这些栏目补充了什么？"}, "options": [{"en": "Extra background facts, like Aztec harvest festivals and why marigolds guide spirits home", "zh": "额外的背景知识，比如阿兹特克丰收节，以及万寿菊为何能引导灵魂回家"}, {"en": "The answers to the quiz questions at the end", "zh": "书末测验题的答案"}, {"en": "Recipes for cooking the meals", "zh": "烹饪这些菜肴的食谱"}, {"en": "Maps showing every country", "zh": "显示每个国家的地图"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The 'Do You Know?' boxes give extra facts — e.g., that Native Americans held early-November harvest festivals, and that the scent of marigolds helps spirits find their way home.", "zh": "「你知道吗？」栏目补充了额外事实——例如美洲原住民在11月初办丰收节，以及万寿菊的香气能帮助灵魂找到回家的路。"}}, {"q": {"en": "The book tells Lidia Teran-Cooper's personal story. What does her story show about the holiday?", "zh": "书中讲述了莉迪亚·特兰-库珀(Lidia Teran-Cooper)的个人故事。她的故事说明了这个节日什么？"}, "options": [{"en": "It is a happy day of remembering loved ones, and traditions can be carried to a new country", "zh": "它是纪念所爱之人的快乐日子，传统也可以被带到一个新的国家延续"}, {"en": "It is a sad holiday that people try to forget", "zh": "它是人们想忘掉的悲伤节日"}, {"en": "Only children are allowed to celebrate it", "zh": "只有孩子才被允许庆祝"}, {"en": "It can only be celebrated in Mexico", "zh": "它只能在墨西哥庆祝"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Lidia celebrated every year in Mexico, and now in the U.S. she 'marches in the Tucson parade every year to honor their ancestors' — the holiday is joyful and travels with families.", "zh": "莉迪亚每年在墨西哥庆祝，如今在美国她「每年都参加图森游行，纪念祖先」——这个节日充满喜悦，并随家庭迁徙而延续。"}}, {"q": {"en": "According to the book, what do families place on altars and why?", "zh": "根据这本书，各家各户会在祭坛上摆放什么？为什么？"}, "options": [{"en": "Photos, candles, pan de muertos bread, and marigolds — to welcome and guide the spirits of loved ones", "zh": "照片、蜡烛、亡灵面包(pan de muertos)和万寿菊——为了迎接并指引所爱之人的灵魂"}, {"en": "Toys, video games, and candy for living children", "zh": "给在世孩子的玩具、电子游戏和糖果"}, {"en": "Sports equipment and bicycles", "zh": "运动器材和自行车"}, {"en": "Nothing — altars are left completely empty", "zh": "什么都不放——祭坛完全空着"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Families build altars with 'photos of the person who has died,' light candles, make pan de muertos, and add marigolds whose scent is believed to help spirits find their way home.", "zh": "各家在祭坛上摆放「逝者的照片」、点燃蜡烛、制作亡灵面包，并放上万寿菊——人们相信其香气能帮灵魂找到回家的路。"}}, {"q": {"en": "Why do you think the author includes both Lidia's story and the children's celebration?", "zh": "你认为作者为什么要同时写莉迪亚的故事和孩子们的庆祝活动？"}, "options": [{"en": "To show the holiday is personal and joyful for all ages, passed from generation to generation", "zh": "为了表现这个节日对各个年龄层都亲切而欢乐，并一代代传承下去"}, {"en": "To prove the holiday is only for adults", "zh": "为了证明这个节日只属于成年人"}, {"en": "To warn readers not to take part", "zh": "为了警告读者不要参与"}, {"en": "To compare it unfavorably with Halloween", "zh": "为了把它和万圣节作负面比较"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "By mixing a personal family story (Lidia) with a children's parade, the author shows the holiday is meaningful and fun across generations and cultures.", "zh": "作者把个人家庭故事（莉迪亚）和儿童游行交织在一起，说明这个节日跨越世代与文化，既有意义又充满欢乐。"}}, {"q": {"en": "In the 'Full of Life' section, what is the author's main perspective on Día de los Muertos?", "zh": "在「生机盎然」(Full of Life) 一节中，作者对亡灵节的主要观点是什么？"}, "options": [{"en": "It is a fun, creative, loving way to remember the dead and honor ancestors", "zh": "它是纪念逝者、致敬祖先的一种有趣、有创意且充满爱的方式"}, {"en": "It is a boring, serious event with no joy", "zh": "它是无聊严肃、毫无欢乐的活动"}, {"en": "It should replace all other holidays", "zh": "它应当取代所有其他节日"}, {"en": "It is mainly about scary costumes", "zh": "它主要关于吓人的服装"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book calls it 'a holiday unlike any other, full of fun, costumes, life, masks, joy, memories, and love' that helps people 'feel better after losing someone.'", "zh": "书里称它是「一个与众不同的节日，充满乐趣、盛装、生机、面具、喜悦、回忆与爱」，能帮人在失去所爱后「感觉好一些」。"}}, {"q": {"en": "What are sugar skulls, and what do children do with them?", "zh": "「糖骷髅」(sugar skulls) 是什么？孩子们怎么对待它们？"}, "options": [{"en": "Colorful skulls made from white sugar pressed into molds, which children in Mexico and the U.S. love to eat", "zh": "用白砂糖压模制成的彩色骷髅，墨西哥和美国的孩子们都爱吃"}, {"en": "Real skulls buried in cemeteries", "zh": "埋在墓地里的真骷髅"}, {"en": "Skulls made of plastic sold in toy stores", "zh": "玩具店卖的塑料骷髅"}, {"en": "Skulls carved from stone by artists", "zh": "艺术家用石头雕刻的骷髅"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says people 'make colorful sugar skulls every year' from white sugar pressed into molds and decorated with frosting; 'Children in Mexico and the United States love eating the sweet skulls.'", "zh": "书里说人们每年用压模的白砂糖「制作彩色糖骷髅」，再用糖霜装饰；「墨西哥和美国的孩子们都爱吃这种甜骷髅」。"}}], "extended": {"prompt": {"en": "The book shows many ways people honor loved ones who have died — parades, altars with photos and favorite foods, sugar skulls, and marigold petals to guide spirits home. Think of a person or pet you miss. How might you remember or honor them? What from the book's traditions could inspire your own way of remembering?", "zh": "书中展现了人们纪念逝去亲友的许多方式——游行、摆着照片和挚爱食物的祭坛、糖骷髅，以及为指引灵魂回家而撒下的万寿菊花瓣。想一想你思念的某个人或宠物。你会怎样纪念或致敬他们？书中哪些传统能启发你自己的纪念方式？"}, "guidance": {"en": ["Families build altars with photos, candles, pan de muertos, and marigolds to welcome spirits (p. 14-16).", "Lidia honors ancestors by marching in a parade and wearing a skeleton mask she made (p. 9-12).", "The holiday is described as 'full of fun, costumes, life, masks, joy, memories, and love' (p. 19).", "A good answer names a real person/pet and connects a book tradition to a personal way of remembering."], "zh": ["各家在祭坛上摆照片、蜡烛、亡灵面包和万寿菊，迎接灵魂（第14-16页）。", "莉迪亚通过参加游行、戴上自己做的骷髅面具来纪念祖先（第9-12页）。", "这个节日被描述为「充满乐趣、盛装、生机、面具、喜悦、回忆与爱」（第19页）。", "好的回答会说出真实的人或宠物，并把书里的传统联系到自己的纪念方式。"]}}};</script>
