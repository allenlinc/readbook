<script>window.BOOK = {"slug": "chili-pepper-powder-surprise", "title": "Chili Pepper Powder Surprise", "titleZh": "奇利·佩珀·鲍德·苏普赖斯", "level": "Q", "genre": "Fiction", "mainSkill": "Author's Purpose and Perspective", "questions": [{"q": {"en": "Where is Trisha from, and whose farm is she visiting?", "zh": "特里莎来自哪里？她去看的是谁家的农场？"}, "options": [{"en": "She is from Chicago, visiting her cousin Adrian's farm in Tennessee", "zh": "她来自芝加哥，去表哥阿德里安在田纳西州的农场做客"}, {"en": "She is from Tennessee, visiting a farm in Chicago", "zh": "她来自田纳西，去芝加哥的农场"}, {"en": "She is from New York, visiting her uncle in Texas", "zh": "她来自纽约，去得州看叔叔"}, {"en": "She is from California, visiting a zoo", "zh": "她来自加州，去动物园"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The story says Trisha came 'to her cousin Adrian's farm in Tennessee from Chicago' and had 'never seen a regular horse, much less a thoroughbred.'", "zh": "故事说特里莎「从芝加哥来到表哥阿德里安在田纳西的农场」，之前「从没见过普通的马，更别说纯种马了」。"}}, {"q": {"en": "What is the horse's full name?", "zh": "这匹马的全名是什么？"}, "options": [{"en": "Chili Pepper Powder Surprise (Pepper for short)", "zh": "奇利·佩珀·鲍德·苏普赖斯（简称佩珀）"}, {"en": "Thunderbolt the Swift", "zh": "闪电飞毛腿"}, {"en": "Old Paint", "zh": "老花斑"}, {"en": "Sir Gallops-a-Lot", "zh": "小跑爵士"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Adrian says, 'We call him Pepper for short, because his full name is Chili Pepper Powder Surprise.'", "zh": "阿德里安说：「我们简称他佩珀，因为他的全名是奇利·佩珀·鲍德·苏普赖斯。」"}}, {"q": {"en": "What happens right after Trisha gets on Pepper?", "zh": "特里莎一骑上佩珀，立刻发生了什么？"}, "options": [{"en": "Pepper bolts out of the stable; she can't grab the reins, her foot tangles in the stirrup, and he races around the corral", "zh": "佩珀冲出马厩；她没抓到缰绳，脚卡在马镫里，马绕着圈狂奔"}, {"en": "Pepper calmly walks back to the barn", "zh": "佩珀安静地走回马厩"}, {"en": "Pepper lies down to sleep", "zh": "佩珀躺下睡觉"}, {"en": "Trisha easily rides him around the field", "zh": "特里莎轻松地骑着他绕场"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Trisha 'flew out the open door of the stable' without the reins; her 'foot was tangled in the stirrup' and Pepper 'ran straight across his corral' and kept 'running and running' around it.", "zh": "特里莎「冲出敞开的大门」却没抓住缰绳；她「脚卡在马镫里」，佩珀「径直冲过圈场」并一直「绕着圈狂奔」。"}}, {"q": {"en": "Why does the author compare galloping to 'a roller coaster with no straps'?", "zh": "作者为什么把疾驰比作「没有安全带的过山车」？"}, "options": [{"en": "To show how terrifyingly rough and out-of-control the ride felt to Trisha", "zh": "为了表现那段骑行对特里莎来说有多吓人、多颠、多失控"}, {"en": "To explain that the horse loved amusement parks", "zh": "说明这匹马喜欢游乐园"}, {"en": "To describe the shape of the corral", "zh": "描写马圈的形状"}, {"en": "To compare the horse's speed to a train", "zh": "把马的速度比作火车"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Trisha 'had never imagined a galloping horse would be so terrifyingly rough—it always looked smooth and easy in the movies, but it was more like riding a roller coaster with no straps.'", "zh": "特里莎「从没想过疾驰的马会这么吓人地颠——电影里看着又顺又轻松，实际却更像坐没有安全带的过山车」。"}}, {"q": {"en": "From what point of view is the story told?", "zh": "这个故事是用什么视角（人称）叙述的？"}, "options": [{"en": "Third-person—a narrator describes Trisha's thoughts and feelings from outside", "zh": "第三人称——叙述者从外部描写特里莎的想法和感受"}, {"en": "First-person—Trisha tells it as 'I'", "zh": "第一人称——由特里莎以「我」讲述"}, {"en": "Second-person—the reader is 'you'", "zh": "第二人称——以「你」称呼读者"}, {"en": "It is written as a script", "zh": "它是剧本形式"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The narrator describes Trisha from the outside, e.g. 'She'd always held back while he teased her,' and tells her feelings rather than using 'I'—that is third-person.", "zh": "叙述者从外部描写特里莎，例如「他捉弄她时，她总是退缩」，并讲述她的感受而非用「我」——这是第三人称。"}}, {"q": {"en": "What does the simile 'like a beautiful princess forced to wear an ugly parka' show about Pepper?", "zh": "「像一位被迫穿上丑陋羽绒服的美丽公主」这个比喻，说明了佩珀的什么？"}, "options": [{"en": "That the horse disliked and was uncomfortable under the heavy, lumpy saddle", "zh": "说明这匹马不喜欢、也不舒服那副又重又疙疙瘩瘩的鞍"}, {"en": "That the horse was actually a girl horse", "zh": "说明这匹马其实是母马"}, {"en": "That the saddle was made of silk", "zh": "说明马鞍是丝绸做的"}, {"en": "That Pepper loved wearing clothes", "zh": "说明佩珀喜欢穿衣服"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "When Adrian lowered the saddle, 'the horse submitted and stood under his lumpy saddle like a beautiful princess forced to wear an ugly parka'—showing Pepper tolerated the saddle unhappily.", "zh": "阿德里安放下马鞍时，「马顺从地站在疙疙瘩瘩的鞍下，像一位被迫穿上丑陋羽绒服的美丽公主」——说明佩珀是不情愿、不舒服地忍受着马鞍。"}}, {"q": {"en": "How did Adrian's dares during the week lead to Trisha riding Pepper?", "zh": "阿德里安一整周的激将，是怎样一步步导致特里莎骑上佩珀的？"}, "options": [{"en": "He had dared her all week (hog pen, tractor); tired of holding back, she finally gave in and got on the horse", "zh": "他一整周都在激她（猪圈、拖拉机）；她厌倦了一直退缩，终于让步骑上了马"}, {"en": "Adrian forced her at gunpoint", "zh": "阿德里安用枪逼她"}, {"en": "Trisha wanted to steal the horse", "zh": "特里莎想偷这匹马"}, {"en": "The uncle told her to ride", "zh": "叔叔叫她骑"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Adrian 'had been daring her to do such things all week, like jump the fence into the hog pen or sit in his dad's tractor. She'd always held back... suddenly she decided she was sick of it' and agreed to ride.", "zh": "阿德里安「一整周都在激她做这做那，比如跳过猪圈栅栏、坐他爸爸的拖拉机。她一直退缩……突然她受够了」，于是同意骑马。"}}, {"q": {"en": "At the end, Trisha apologizes to Pepper using his full name. What does this show?", "zh": "结尾特里莎用佩珀的全名向他道歉，这说明了什么？"}, "options": [{"en": "She realizes her mistake and now respects the horse, showing she learned her lesson", "zh": "她意识到自己错了，并开始尊重这匹马，说明她学到了教训"}, {"en": "She is still angry at the horse", "zh": "她还在生马的气"}, {"en": "She plans to ride him again", "zh": "她打算再骑一次"}, {"en": "She forgot his short name", "zh": "她忘了他的简称"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "After being rescued, Trisha looks back at Pepper, who 'grazed calmly' and 'looked up at her.' She says, 'Sorry, Chili Pepper Powder Surprise,' and 'the horse tossed his mane, as if he understood'—she now treats him with care and respect.", "zh": "获救后，特里莎回头看佩珀，他「安静地吃草」并「抬头看她」。她说：「对不起，奇利·佩珀·鲍德·苏普赖斯」，而「马甩了甩鬃毛，仿佛听懂了」——她此刻懂得体贴和尊重这匹马。"}}, {"q": {"en": "Why does the author have the uncle ask Trisha whether she knew she was doing something wrong?", "zh": "作者为什么让叔叔问特里莎：上马前有没有想过自己是在做错事？"}, "options": [{"en": "To make readers think about stopping to consider right and wrong before acting", "zh": "让读者思考：行动前要先想想这件事对不对"}, {"en": "To make the uncle look mean", "zh": "为了让叔叔显得刻薄"}, {"en": "To confuse the reader", "zh": "为了把读者搞糊涂"}, {"en": "To show the uncle didn't care", "zh": "说明叔叔根本不在乎"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The uncle asks Trisha to think about 'everything that went through your head the moment before you got on that horse' and whether 'it never occurred to you that you were doing something wrong'—the author uses this to deliver the story's lesson.", "zh": "叔叔让特里莎回想「上马前一刻脑海里闪过的念头」，以及「你难道从没想过自己是在做错事吗」——作者借此点出故事的教训。"}}, {"q": {"en": "What is the author's main purpose in writing this story?", "zh": "作者写这个故事的主要目的是什么？"}, "options": [{"en": "To entertain readers with a farm adventure while showing that giving in to dares and ignoring rules can be dangerous", "zh": "用一个农场冒险逗乐读者，同时说明经不住激将、无视规矩会很危险"}, {"en": "To teach readers how to ride a horse", "zh": "教读者怎么骑马"}, {"en": "To advertise a brand of horse food", "zh": "为一款马粮打广告"}, {"en": "To argue that farms are unsafe", "zh": "论证农场不安全"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The exciting, funny mishap with Pepper entertains, while the uncle's talk and Trisha's apology teach that following rules and thinking before acting matters—the story both delights and delivers a lesson.", "zh": "特里莎和佩珀这场又惊险又好笑的意外让人读来有趣，而叔叔的谈话和她最后的道歉则教人：要守规矩、行动前先思考——故事既好玩又有教诲。"}}], "extended": {"prompt": {"en": "Trisha got on Pepper because Adrian dared her and she was 'sick of' always holding back. Have you ever done something just because friends dared or pressured you, even though you weren't sure it was a good idea? What happened, and what would you tell a friend who is being dared to do something risky?", "zh": "特里莎骑上佩珀，是因为阿德里安激她、而她「受够了」总是一味退缩。你有没有因为朋友激将或施压，就去做一件自己也不确定对不对的事？结果怎样？你会对一个正被怂恿去冒险的朋友说什么？"}, "guidance": {"en": ["Adrian dared Trisha all week, and she rode only after deciding she was 'sick of' holding back (p. 5).", "The uncle makes her admit she knew it was wrong before she got on (p. 7).", "A good answer connects a real experience to the lesson of thinking for yourself and not giving in to dares."], "zh": ["阿德里安一整周都在激特里莎，而她是在「受够了退缩」之后才骑上马的（第5页）。", "叔叔让她承认：上马前她就知道自己做得不对（第7页）。", "好的回答会联系真实经历，点出「要有主见、别被激将」的教训。"]}}};</script>
