red. The window green.'", "zh": "信中写道：「我把墙涂成淡紫色……木床和椅子像黄油一样黄；床单和枕头是柠檬浅绿。床罩是猩红色。窗户是绿色。」"}}, {"q": {"en": "In the glossary, what does 'haven' mean, the word used for Vincent's bedroom?", "zh": "在词汇表里，「haven」是什么意思？——书里用它来形容梵高的卧室。"}, "options": [{"en": "A place that offers comfort, rest, protection, or shelter", "zh": "一个提供安慰、休息、保护或庇护的地方"}, {"en": "A kind of paintbrush", "zh": "一种画笔"}, {"en": "A famous museum", "zh": "一座著名的博物馆"}, {"en": "A type of flower", "zh": "一种花"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'haven' as 'a place that offers comfort, rest, protection, or shelter' — the book calls Vincent's bedroom 'a simple, restful, cheery haven.'", "zh": "词汇表把 haven 定义为「一个提供安慰、休息、保护或庇护的地方」——书里称梵高的卧室是「简朴、安宁、令人愉悦的庇护所」。"}}, {"q": {"en": "According to the book, what were the three features of Vincent's painting style?", "zh": "根据这本书，梵高绘画风格的三种特点是什么？"}, "options": [{"en": "Large swirls of color, thick short brush strokes, and colors that express feelings", "zh": "大团旋转的色彩、粗短的笔触，以及能表达情感的颜色"}, {"en": "Tiny dots, only black and white, and straight lines", "zh": "小点点、只有黑白两色、直线条"}, {"en": "Spray paint, computer images, and photographs", "zh": "喷漆、电脑图像和照片"}, {"en": "Pencils, gray shading, and no color at all", "zh": "铅笔、灰色阴影、完全没有颜色"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The 'Vincent's Style' box says to paint like him you need 'large swirls of color, thick, short brush strokes, [and] colors that express feelings.'", "zh": "「梵高的风格」一栏说，要像他那样画，需要「大团旋转的色彩、粗短的笔触，以及能表达情感的颜色」。"}}, {"q": {"en": "How was Van Gogh's way of painting different from most artists of the mid-1800s?", "zh": "梵高的作画方式，和19世纪中大多数画家有什么不同？"}, "options": [{"en": "He spent most days painting outside, while most artists painted inside a studio", "zh": "他大部分时间在外面作画，而多数画家在画室里画"}, {"en": "He only painted at night, while others painted at noon", "zh": "他只在夜里画，别人在中午画"}, {"en": "He used only pencils, while others used oil paint", "zh": "他只用铅笔，别人用油画颜料"}, {"en": "He painted animals, while others painted people", "zh": "他画动物，别人画人"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says Vincent 'spent most of his days outside, painting pictures of the fields, sky, and sunflowers,' which 'was a new way to paint in the mid-1800s, as most artists... had always painted inside a studio.'", "zh": "书里说梵高「大部分时间在外面，画田野、天空和向日葵」，这「在19世纪中期是一种新画法，因为多数画家……一向在画室里作画」。"}}, {"q": {"en": "Why did Vincent choose calm and cheerful colors for his bedroom?", "zh": "梵高为什么给卧室选了平静又明快的颜色？"}, "options": [{"en": "Because his moods changed often and he needed a calm, cheerful place to feel safe; color expressed his feelings", "zh": "因为他的情绪常常变化，需要一处平静明快的地方让自己安心；颜色能表达他的感受"}, {"en": "Because those were the only paints he could afford", "zh": "因为那些是他唯一买得起的颜料"}, {"en": "Because the king told him to", "zh": "因为国王吩咐他这么做的"}, {"en": "Because the bedroom had no windows", "zh": "因为卧室没有窗户"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Because 'Vincent's moods changed often,' he 'needed a calm and cheerful place in which to live and work,' and he 'used color to express his feelings' so the bedroom colors made him 'feel content and glad to be home.'", "zh": "因为「梵高的情绪常常变化」，他「需要一处平静明快的地方生活和工作」，又「用颜色表达情感」，所以卧室的颜色让他「感到满足、高兴回家」。"}}, {"q": {"en": "Why does the book mention the website www.vggallery.com?", "zh": "这本书为什么要提到网站 www.vggallery.com？"}, "options": [{"en": "Because the Internet lets people see all of Vincent's work in one place, since the paintings are in museums across Europe and North America", "zh": "因为互联网让人能在一个地方看遍梵高所有作品，而那些画分散在欧洲和北美的博物馆里"}, {"en": "Because Vincent built the website himself", "zh": "因为梵高亲自建了这个网站"}, {"en": "Because it sells paintbrushes", "zh": "因为它卖画笔"}, {"en": "Because it is a game about soccer", "zh": "因为它是一个足球游戏"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book notes that to see even the few paintings in the book you'd 'need to travel to several cities in Europe and North America,' but the Internet 'created a way for people to see all of Vincent's work in one place.'", "zh": "书里说，单看书中这几幅画就得「跑遍欧洲和北美的好几座城市」，而互联网「让人能在一个地方看遍梵高全部作品」。"}}, {"q": {"en": "What is the author's main purpose in writing Vincent's Bedroom?", "zh": "作者写《梵高的卧室》的主要目的是什么？"}, "options": [{"en": "To show how Van Gogh's bedroom paintings reveal his feelings and daily life, and to explore his use of color and style", "zh": "通过卧室画作展现梵高的情感与日常生活，并探讨他的用色与风格"}, {"en": "To teach readers how to speak French", "zh": "教读者说法语"}, {"en": "To list every museum in the world", "zh": "列出世界上每一座博物馆"}, {"en": "To explain how to build a house", "zh": "讲解怎样盖房子"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book walks readers through the Bedroom series, Vincent's letters to Theo, his color choices, and his brushstroke style, all to help readers understand his art and feelings.", "zh": "这本书带着读者看「卧室」系列、梵高写给提奥的信、他的用色和笔触风格，都是为了帮读者理解他的艺术与情感。"}}, {"q": {"en": "In the glossary, what is a 'studio'?", "zh": "在词汇表里，「studio」是什么？"}, "options": [{"en": "A place where an artist works", "zh": "艺术家工作的地方"}, {"en": "A type of bedroom", "zh": "一种卧室"}, {"en": "A kind of museum", "zh": "一种博物馆"}, {"en": "A musical instrument", "zh": "一种乐器"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'studio' as 'a place where an artist works' — the book notes most artists of Van Gogh's time painted inside one, while he painted outdoors.", "zh": "词汇表把 studio 定义为「艺术家工作的地方」——书里说梵高同时代的多数画家在画室里作画，而他却在户外。"}}], "extended": {"prompt": {"en": "Vincent used color to show his feelings and made his bedroom a calm, cheerful 'haven.' Think about your own room or a favorite place. What colors are there, and how do those colors make you feel? If you could repaint that space to match a feeling you want (calm, happy, energetic), what colors would you choose and why?", "zh": "梵高用颜色表达自己的情感，把卧室变成一处平静明快的「庇护所」。想想你自己的房间或某个最爱的地方。那里是什么颜色，这些颜色让你有什么感觉？如果你可以重新粉刷那个空间、来呼应你想要的心情（平静、快乐、有活力），你会选什么颜色？为什么？"}, "guidance": {"en": ["Vincent 'used color to express his feelings' and loved 'the colors of the sky, butter, wheat, and light from the sun' (p. 19).", "His bedroom was a 'simple, restful, cheery haven' whose colors made him 'feel content and glad to be home' (p. 13, 19).", "The book invites readers: 'If this were your bedroom, what colors would you use to decorate it?' (p. 19).", "A good answer names real colors, links them to a feeling, and explains the choice."], "zh": ["梵高「用颜色表达情感」，钟爱「天空、黄油、麦子和阳光的颜色」（第19页）。", "他的卧室是「简朴、安宁、令人愉悦的庇护所」，那些颜色让他「感到满足、高兴回家」（第13、19页）。", "书里邀请读者：「如果这是你的卧室，你会用什么颜色来装饰？」（第19页）。", "好的回答要说出真实的颜色，把它和某种感觉联系起来，并说明原因。"]}}};</script>
