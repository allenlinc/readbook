<script>window.BOOK = {"slug": "mike-van-zee-special-olympian", "title": "Mike Van Zee, Special Olympian", "titleZh": "麦克·凡泽，特奥运动员", "level": "Q", "genre": "Nonfiction", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Before he joined the Special Olympics, how did Mike Van Zee feel about himself?", "zh": "在参加特奥会之前，麦克·凡泽(Mike Van Zee)对自己感觉如何？"}, "options": [{"en": "He was small for his age, not as smart as some kids, and not strong, and he disliked being teased and bullied", "zh": "他比同龄人矮小、没一些孩子聪明、也不够强壮，而且讨厌被人取笑和欺负"}, {"en": "He was the tallest, strongest kid and loved sports", "zh": "他是最高最壮的孩子，而且热爱运动"}, {"en": "He was already a famous basketball star", "zh": "他已经是著名的篮球明星"}, {"en": "He never cared what other people thought", "zh": "他从来不在乎别人怎么看"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says Mike 'didn't like being teased... laughed at' and 'knew he was small for his age... not as smart as some kids... not strong enough to stick up for himself.'", "zh": "书里说麦克「不喜欢被取笑……被嘲笑」，也「知道自己比同龄人矮小……没一些孩子聪明……不够强壮、没法为自己出头」。"}}, {"q": {"en": "Who founded the Special Olympics organization?", "zh": "特奥会(Special Olympics)这个组织是谁创立的？"}, "options": [{"en": "Eunice Kennedy Shriver", "zh": "尤妮斯·肯尼迪· Shriver (Eunice Kennedy Shriver)"}, {"en": "Coach Pat Gray", "zh": "帕特·格雷教练 (Coach Pat Gray)"}, {"en": "Arnold Schwarzenegger", "zh": "阿诺德·施瓦辛格 (Arnold Schwarzenegger)"}, {"en": "Mike Van Zee's parents", "zh": "麦克·凡泽的父母"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book states Special Olympics is 'a worldwide organization founded by Eunice Kennedy Shriver,' who became 'a champion of children and adults who had difficulty learning.'", "zh": "书里说特奥会是「由尤妮斯·肯尼迪· Shriver 创立的一个全球性组织」，她成了「学习有困难的孩子和成人的倡导者」。"}}, {"q": {"en": "In the glossary, what does 'perseverance' mean?", "zh": "在词汇表里，「perseverance」(坚持不懈) 是什么意思？"}, "options": [{"en": "Steady work to reach a goal", "zh": "为达成目标而持续稳定的努力"}, {"en": "A type of Olympic sport", "zh": "一种奥林匹克运动项目"}, {"en": "Being afraid to try", "zh": "不敢去尝试"}, {"en": "Winning first place", "zh": "拿到第一名"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines perseverance as 'steady work to reach a goal (p. 12)' — the book says Mike's 'perseverance paid off' after eight years of hard training.", "zh": "词汇表把 perseverance 定义为「为达成目标而持续稳定的努力（第12页）」——书中说麦克苦练八年后，「他的坚持不懈有了回报」。"}}, {"q": {"en": "What was Camp Shriver, and how did it lead to the Special Olympics?", "zh": "「Shriver 夏令营」(Camp Shriver) 是什么？它和特奥会的诞生有什么联系？"}, "options": [{"en": "In June 1962, Eunice Shriver invited 35 boys and girls with intellectual disabilities to her Maryland home; it became annual and grew to 300+ camps by 1968, leading to the first official Games", "zh": "1962年6月，尤妮斯· Shriver 邀请35名有智力障碍的男孩女孩到她马里兰的家中；活动年年办、到1968年发展成300多个营地，并最终促成首届正式赛事"}, {"en": "A summer camp for professional basketball players", "zh": "为职业篮球运动员办的夏令营"}, {"en": "A camp Mike attended to learn how to lift weights", "zh": "麦克去学举重的一个营地"}, {"en": "A training site built in Chicago in 1968", "zh": "1968年在芝加哥建的训练基地"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says Shriver 'believed that everyone should be given the opportunity to excel' and in June 1962 invited 35 children to her home, calling it Camp Shriver; by 1968 there were 300+ such camps, and that year the first official Special Olympics was organized.", "zh": "书里说 Shriver 「相信每个人都该有机会出彩」，1962年6月邀请35名孩子到家中，称之为 Camp Shriver；到1968年这类营地超过300个，同年首届正式特奥会也组织起来了。"}}, {"q": {"en": "Why does the book include Eunice Shriver's 'Oath' speech from 1968?", "zh": "书里为什么引用尤妮斯· Shriver 1968年的「誓言」(Oath) 演讲？"}, "options": [{"en": "To show the Special Olympics spirit: winning matters less than being brave in the attempt", "zh": "为了展现特奥会的精神：相比获胜，在尝试中勇敢更为重要"}, {"en": "To explain the rules of floor hockey", "zh": "为了解释地板曲棍球的规则"}, {"en": "To list the countries that took part", "zh": "为了列出参赛的国家"}, {"en": "To describe how to lift weights safely", "zh": "为了说明如何安全举重"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Shriver told athletes, 'Let me win. But if I cannot win, let me be brave in the attempt.' The book says this speech 'has been made an oath' repeated at every World Games — capturing the movement's values.", "zh": "Shriver 对运动员说：「让我赢。但若我赢不了，也愿我在尝试中勇敢。」书里说这段演讲「已成为誓言」，在每一届世界特奥会上重复——凝聚了这个运动的核心价值。"}}, {"q": {"en": "Where and when was the first official Special Olympics held, and what sports were played?", "zh": "首届正式特奥会在何时何地举办？比赛项目有哪些？"}, "options": [{"en": "In 1968 in Chicago, Illinois, with athletes from 26 U.S. states and Canada, competing in floor hockey, aquatics, and athletics", "zh": "1968年在伊利诺伊州芝加哥举办，运动员来自美国26个州和加拿大，比赛项目有地板曲棍球、水上运动和田径"}, {"en": "In 1962 in Maryland, with only swimming events", "zh": "1962年在马里兰举办，只有游泳项目"}, {"en": "In 1983 in North Carolina, with powerlifting only", "zh": "1983年在北卡罗来纳举办，只有举重"}, {"en": "In 2003 in Ireland, with winter sports", "zh": "2003年在爱尔兰举办，只有冬季项目"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says 'That year [1968] Mrs. Shriver worked with others to organize the first official Special Olympics. The event took place in Chicago, Illinois. Participants came from 26 U.S. states and from Canada. They competed in floor hockey, aquatics, and athletics.'", "zh": "书里说「那年（1968）Shriver 夫人和他人一起组织了首届正式特奥会。赛事在伊利诺伊州芝加哥举行。参赛者来自美国26个州和加拿大。他们参加了地板曲棍球、水上运动和田径。」"}}, {"q": {"en": "In the glossary, what are 'gladiators'?", "zh": "在词汇表里，「gladiators」(角斗士) 是什么？"}, "options": [{"en": "Fighters in ancient Rome who fought in public to entertain other people", "zh": "古罗马在公开场合格斗、供人娱乐的斗士"}, {"en": "The name of a Special Olympics sport", "zh": "特奥会一个运动项目的名字"}, {"en": "Coaches who train athletes", "zh": "训练运动员的教练"}, {"en": "People who watch the games", "zh": "观看比赛的人"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines gladiators as 'fighters in ancient Rome who fought in public to entertain other people (p. 14)' — Shriver quotes them in her Oath speech.", "zh": "词汇表把 gladiators 定义为「古罗马在公开场合格斗、供人娱乐的斗士（第14页）」——Shriver 在誓言演讲中引用了他们的话。"}}, {"q": {"en": "According to the 'By the Numbers' section, how big is Special Olympics today?", "zh": "根据「数字看特奥」(By the Numbers) 一节，如今的特奥会规模有多大？"}, "options": [{"en": "Over 2 million athletes in 200+ programs in 160+ countries, with 32 Olympic-type sports and athletes at least 8 years old", "zh": "超过200万运动员、160多个国家200多个项目、共32个奥运型运动项目，参赛运动员至少8岁"}, {"en": "Only a few hundred athletes in one U.S. state", "zh": "只有几百名运动员，集中在美国一个州"}, {"en": "About 35 athletes, all from Maryland", "zh": "约35名运动员，全都来自马里兰"}, {"en": "Exactly 68 athletes, like March Madness", "zh": "正好68名运动员，像疯狂三月那样"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The 'By the Numbers' box states 'Over 2 million athletes,' 'more than 200 Special Olympics programs in more than 160 countries,' '32 Olympic-type... sports,' and 'Athletes must be at least 8 years old.'", "zh": "「数字看特奥」框内写道：「超过200万运动员」「160多个国家200多个特奥项目」「32个奥运型运动项目」，以及「运动员参赛年龄至少8岁」。"}}, {"q": {"en": "What change in Mike shows the main message of his story?", "zh": "麦克身上发生的变化，体现了这个故事的主旨是什么？"}, "options": [{"en": "Through training he gained self-confidence; his days of being bullied are past, and he now knows he can do anything he sets his mind to", "zh": "通过训练他获得了自信；被欺负的日子已成过去，如今他相信自己只要下定决心就能做成任何事"}, {"en": "He became a professional basketball player in the NBA", "zh": "他成了NBA的职业篮球运动员"}, {"en": "He stopped exercising and stayed home", "zh": "他不再运动，整天待在家里"}, {"en": "He moved away from his family", "zh": "他搬离了家人"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The 'Community Champion' section says Mike's 'self-confidence... make him a pleasure to be around' and 'His days of being bullied and teased have been left in the past... He now knows he can do anything he sets his mind to do.'", "zh": "「社区之星」一节说麦克「自信……让他很好相处」，「被欺负取笑的日子已成过去……他现在知道自己只要下定决心就能做成任何事」。"}}, {"q": {"en": "What is the book's big idea about people with intellectual disabilities and sports?", "zh": "这本书关于「有智力障碍的人与运动」的核心观点是什么？"}, "options": [{"en": "They deserve the chance to play, compete, and grow — exactly the purpose Shriver gave the Special Olympics", "zh": "他们理应拥有「参与、竞争、成长」的机会——这正是 Shriver 赋予特奥会的目的"}, {"en": "They should not be allowed to play sports at all", "zh": "他们根本不该被允许参加运动"}, {"en": "Sports are only for professional, paid athletes", "zh": "运动只属于职业的、有薪水的运动员"}, {"en": "They can compete but never win anything", "zh": "他们可以参赛，但永远赢不了任何东西"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book quotes Shriver's purpose for the Games: to give people with intellectual disabilities 'the chance to play, the chance to compete, and the chance to grow' — the whole book shows this through Mike's life.", "zh": "书里引用了 Shriver 办赛的目的：给有智力障碍的人「参与的机会、竞争的机会、成长的机会」——整本书都通过麦克的人生印证了这一点。"}}], "extended": {"prompt": {"en": "The Special Olympics Oath says, 'Let me win. But if I cannot win, let me be brave in the attempt.' Mike trained for eight years and finished in the middle of his heat, yet everyone was pleased. Think of a time you worked hard at something even though you knew you might not win or be the best. What did you gain from the effort, and why can 'being brave in the attempt' matter more than the result?", "zh": "特奥会的誓言说：「让我赢。但若我赢不了，也愿我在尝试中勇敢。」麦克苦练八年，只拿到小组中游，大家却都为他高兴。想一想你曾为某件事努力、尽管知道未必能赢或未必最好的经历。你从努力中收获了什么？为什么「在尝试中勇敢」有时比结果更重要？"}, "guidance": {"en": ["Mike entered the program in 1983 and trained for 'eight years of hard work' before competing in the 1999 Summer Games (p. 11-12).", "The Oath values bravery in the attempt over winning (p. 14).", "A good answer shares a personal effort, names what was gained (confidence, friendship, skill), and explains why trying matters."], "zh": ["麦克1983年加入项目，苦练「八年」后才在1999年夏季赛事中参赛（第11-12页）。", "誓言看重的是「在尝试中勇敢」，而非一定要赢（第14页）。", "好的回答要分享一段自己的努力，说出收获（自信、友谊、技能），并解释为什么「尝试」本身有意义。"]}}};</script>
