e to seven years, traveling thousands of miles.'", "zh": "书里说成年三文鱼「在海洋中以较小的鱼为食生活一到七年，游动数千英里」。"}}, {"q": {"en": "In the glossary, what is an 'estuary'?", "zh": "在词汇表里，「estuary」（河口）是什么？"}, "options": [{"en": "The part of a river where fresh water mixes with the ocean's salt water (brackish)", "zh": "河流中淡水与海水混合（变成微咸水）的那一段"}, {"en": "A deep part of the open ocean", "zh": "开阔海洋的深处"}, {"en": "A type of dam built by humans", "zh": "人类修建的一种水坝"}, {"en": "A nest where salmon lay eggs", "zh": "三文鱼产卵的巢"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines an estuary as 'the part of a river where the fresh water mixes with the ocean's salt water' — the smolts prepare there for the ocean.", "zh": "词汇表把 estuary 定义为「河流中淡水与海水混合的那一段」——小鱼在那里为进入海洋做准备。"}}, {"q": {"en": "According to the glossary, what are 'alevins'?", "zh": "根据词汇表，「alevins」是什么？"}, "options": [{"en": "Baby salmon that have a food sac on their underbelly", "zh": "肚子下面带着食物囊的幼小三文鱼"}, {"en": "Adult salmon that swim in the ocean", "zh": "在海洋里游的成年三文鱼"}, {"en": "The eggs before they hatch", "zh": "孵化前的卵"}, {"en": "A kind of plankton", "zh": "一种浮游生物"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines alevins as 'baby salmon that have a food sac on their underbelly' (the stage right after hatching).", "zh": "词汇表把 alevins 定义为「肚子下面带着食物囊的幼小三文鱼」（刚孵化后的阶段）。"}}, {"q": {"en": "In the glossary, what does 'spawn' mean?", "zh": "在词汇表里，「spawn」是什么意思？"}, "options": [{"en": "To reproduce and lay eggs", "zh": "繁殖并产卵"}, {"en": "To swim upstream quickly", "zh": "快速逆流而上"}, {"en": "To change color", "zh": "变色"}, {"en": "To eat other fish", "zh": "吃其他鱼"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines spawn as 'reproduce and lay eggs' — the return trip salmon make to lay and fertilize eggs.", "zh": "词汇表把 spawn 定义为「繁殖并产卵」——三文鱼返乡产卵受精的旅程。"}}, {"q": {"en": "The book explains that estuaries can become polluted with chemicals. What happens to a bird as a result?", "zh": "书中说河口可能被化学物质污染。这会导致鸟怎样？"}, "options": [{"en": "The smolt absorbs the chemicals, and when a bird eats the smolt, the bird becomes poisoned", "zh": "小鱼吸收了化学物质，鸟吃掉小鱼后就会中毒"}, {"en": "The bird grows larger and stronger", "zh": "鸟变得更大更强壮"}, {"en": "The bird learns to avoid the water", "zh": "鸟学会避开那片水"}, {"en": "The chemicals turn the bird into a fish", "zh": "化学物质把鸟变成了鱼"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says if a smolt 'absorbs pollution into its body and then a bird eats the smolt, the bird becomes poisoned' — one link harming the next.", "zh": "书里说，如果小鱼「把污染吸进体内，随后鸟吃掉小鱼，鸟就会中毒」——链条上一环受损，下一环也受害。"}}, {"q": {"en": "After spawners lay eggs and die about a week later, how do their bodies help the life cycle begin again?", "zh": "产卵者产完卵、约一周后死去，它们的身体如何帮助生命循环重新开始？"}, "options": [{"en": "Their decomposing bodies fertilize the stream and feed plankton", "zh": "它们腐烂的尸体为溪流施肥，并成为浮游生物的食物"}, {"en": "They are eaten only by humans", "zh": "只被人类吃掉"}, {"en": "They turn into new rivers", "zh": "变成了新的河流"}, {"en": "They are frozen and saved for later", "zh": "被冷冻保存起来"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says the decomposing salmon 'fertilize the stream' and their 'flesh and bones also provide food for plankton,' restarting the cycle.", "zh": "书里说腐烂的三文鱼「为溪流施肥」，其「肉和骨头也成为浮游生物的食物」，让生命循环重新开始。"}}, {"q": {"en": "What big idea does the author want readers to understand about food chains?", "zh": "关于食物链，作者最想让读者明白的核心观点是什么？"}, "options": [{"en": "Harming one living thing in a food chain harms the other living things connected to it", "zh": "伤害食物链中的某一个生物，就会伤害与它相连的其他生物"}, {"en": "Only the biggest animal matters in a food chain", "zh": "食物链里只有最大的动物才重要"}, {"en": "Food chains never change", "zh": "食物链永远不变"}, {"en": "Salmon are the only important link", "zh": "三文鱼是唯一重要的一环"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book repeats that s
