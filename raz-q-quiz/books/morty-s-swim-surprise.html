le into a big muddy, oozing pit", "zh": "水管开了一整夜，挖好的坑变成了一个又大又泥泞、直冒水的坑"}, {"en": "The hole was completely dry and cracked", "zh": "坑完全干裂了"}, {"en": "The pool water was bright and sparkling", "zh": "池水明亮闪烁"}, {"en": "The soil was as hard as solid rock", "zh": "泥土硬得像石头"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "After Morty left the hose running all night, the brothers 'sloshed through the mud toward the big oozing hole' — a thick, muddy fluid slowly flowing out, not a clean pool.", "zh": "麦蒂让水管开了一整夜后，兄弟们「踩着泥，朝那个直冒水的大坑走去」——那是缓缓流出的浓稠泥水，而不是干净的泳池。"}}, {"q": {"en": "When Morty's parents saw the backyard, what did Morty admit had gone wrong?", "zh": "当麦蒂的父母看到后院时，麦蒂承认了什么出了错？"}, "options": [{"en": "He had left the hose running all night by mistake, so the dug hole became a mud pit strewn with Mother's dead shrubs", "zh": "他不小心让水管开了一整夜，挖好的坑变成了泥坑，还散落着妈妈枯死的花灌木"}, {"en": "His brothers dug the hole far too deep on purpose", "zh": "他的弟弟们故意把坑挖得太深了"}, {"en": "A heavy rainstorm had filled the yard with water", "zh": "一场大暴雨把院子灌满了水"}, {"en": "The family dog had made the whole mess", "zh": "是家里的狗弄得一团糟"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Morty admitted, 'I must have left the hose running all night by mistake,' and the text says 'the clear, sparkling pool Morty had envisioned was a mud pit strewn with Mother's dead shrubs.'", "zh": "麦蒂承认：「我肯定是不小心让水管开了一整夜。」书里说「麦蒂想象中清澈闪亮的泳池，变成了一个散落着妈妈枯死花灌木的泥坑」。"}}, {"q": {"en": "From what point of view is this story told?", "zh": "这个故事是用什么视角（人称）叙述的？"}, "options": [{"en": "Third-person — a narrator describes Morty's thoughts and actions from outside", "zh": "第三人称——叙述者从外部描写麦蒂的想法和行为"}, {"en": "First-person — Morty tells it himself as 'I'", "zh": "第一人称——由麦蒂以「我」的口吻讲述"}, {"en": "Second-person — the reader is addressed as 'you'", "zh": "第二人称——以「你」来称呼读者"}, {"en": "It is written as a play script", "zh": "它是一出剧本的形式"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The narrator describes Morty other he will do about the ruined garden?", "zh": "结尾时，麦蒂向妈妈承诺要怎么补救被毁的花园？"}, "options": [{"en": "Work hard so the garden looks even better than it did before", "zh": "努力把花园打理得比从前还要好"}, {"en": "Never dig in the yard again", "zh": "再也不在后院挖东西了"}, {"en": "Join the country club to forget about it", "zh": "去加入乡村俱乐部，好把这事忘掉"}, {"en": "Buy new shrubs with his own saved money", "zh": "用自己攒的钱买新灌木"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Morty tells Mother, 'I'm really sorry about your garden... I promise I'll work hard and make it look even better than it did before.'", "zh": "麦蒂对妈妈说：「我真对不起你的花园……我保证会努力，让它变得比从前还要好。」"}}, {"q": {"en": "When Father asked how it happened, what did Morty do?", "zh": "当爸爸问起事情怎么发生时，麦蒂是怎么做的？"}, "options": [{"en": "He told the truth, admitting it was his idea and that he told his brothers not to tell their parents", "zh": "他说了实话，承认这是他的主意，而且是他让弟弟们别告诉父母"}, {"en": "He blamed everything on his brothers Mack and Arnie", "zh": "他把一切都怪到弟弟麦考和阿尼头上"}, {"en": "He ran away from the backyard", "zh": "他跑出了后院"}, {"en": "He lied and said a stranger left the hose on", "zh": "他撒谎说是一个陌生人没关水管"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Morty 'ran through excuses in his head, but he knew he needed to tell the truth,' saying 'it was my idea' and 'I told them not to tell you.'", "zh": "麦蒂「在脑海里过了一遍借口，但他知道自己得说实话」，说「这是我的主意」，而且「我告诉他们别告诉你」。"}}, {"q": {"en": "Morty envisioned a 'clear, sparkling pool' but the result was a muddy pit. What does this contrast show?", "zh": "麦蒂想象的是「清澈闪亮的泳池」，结果却是个泥坑。这种反差说明了什么？"}, "options": [{"en": "He acted on a spur-of-the-moment idea without thinking the whole project through, so his plan failed", "zh": "他一时冲动就行动，没有把整个计划想周全，所以计划失败了"}, {"en": "The country club pool is actually better than any backyard pool", "zh": "乡村俱乐部的泳池其实比任何后院泳池都好"}, {"en": "Digging a pool is always easy and quick", "zh": "挖泳池总是又容易又快的"}, {"en": "Mud pits are more fun than real pools", "zh": "泥坑比真正的泳池更好玩"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says Morty 'wished he had thought things through before he acted,' and that he 'hadn't predicted that his pool plans could go so horribly wrong' — the gap between his dream and the muddy reality shows poor planning.", "zh": "书里说麦蒂「真希望自己动手前先把事情想清楚」，而且「没料到泳池计划会搞得这么糟」——梦想与泥泞现实之间的落差说明他计划不周。"}}], "extended": {"prompt": {"en": "Morty acted on a spur-of-the-moment idea without thinking it through, and he ruined his mother's garden. Think of a time you started a project or trick without a full plan. What happened? Why is it important to 'think things through before you act'? What would you tell Morty?", "zh": "麦蒂一时冲动就行动、没有想周全，结果毁了妈妈的花园。回想一次你没想清楚就动手做某件事（或恶作剧）的经历。结果如何？为什么「动手前先把事情想清楚」很重要？你会对麦蒂说些什么？"}, "guidance": {"en": ["Morty's plan was just 'Let's dig our own pool!' with no thought about drainage, the garden, or permission (p. 5).", "He left the hose running all night, turning the hole into a mud pit with 'Mother's dead shrubs' (p. 10).", "By the end Morty 'wished he had thought things through before he acted' (p. 15) — a good answer connects a personal story to this lesson."], "zh": ["麦蒂的计划只是「我们自己挖个泳池吧！」，完全没想到排水、花园，也没想到要先征得同意（第5页）。", "他让水管开了一整夜，坑变成泥坑，里面「散落着妈妈枯死的花灌木」（第10页）。", "结尾麦蒂「真希望自己动手前先把事情想清楚」（第15页）——好的回答要把亲身经历和这个教训联系起来。"]}}};</script>
