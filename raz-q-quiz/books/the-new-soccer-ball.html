<script>window.BOOK = {"slug": "the-new-soccer-ball", "title": "The New Soccer Ball", "titleZh": "新足球", "level": "Q", "genre": "Fiction", "mainSkill": "Author's Purpose and Perspective", "questions": [{"q": {"en": "How long ago had David arrived in the United States when the story begins?", "zh": "故事开始时，大卫到美国多久了？"}, "options": [{"en": "About two months ago", "zh": "大约两个月前"}, {"en": "About two years ago", "zh": "大约两年前"}, {"en": "Just one week ago", "zh": "才刚一个星期"}, {"en": "Almost ten years ago", "zh": "快十年了"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says David had 'arrived in the United States and started school two months ago,' and English was still 'a language that was fairly new to him.'", "zh": "书里说大卫「两个月前才到美国、开始上学」，英语对他来说仍是「一门相当新的语言」。"}}, {"q": {"en": "What happens to David's brand-new soccer ball at recess?", "zh": "课间休息时，大卫那颗崭新的足球发生了什么？"}, "options": [{"en": "Jacob kicks it over the fence and it lands in the back of a passing pickup truck", "zh": "雅各布把它踢过围栏，落在一辆路过的皮卡后车厢里"}, {"en": "David scores a goal and the teacher keeps it", "zh": "大卫进了一球，老师把球收走了"}, {"en": "It rolls into the classroom and breaks a window", "zh": "它滚进教室，打碎了一扇窗户"}, {"en": "Another student returns it to his mother", "zh": "另一个学生把它还给了他的妈妈"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Jacob 'kicked David's ball with all his might. The ball soared over the school's high fence, bounced once, and landed in the back of a passing pickup truck,' taking it away.", "zh": "雅各布「用尽全力踢大卫的球。球飞过学校的高围栏，弹了一下，落在一辆路过的皮卡后车厢里」，被带走了。"}}, {"q": {"en": "Where did David's family live in Africa before coming to America?", "zh": "来美国之前，大卫一家在非洲住在哪里？"}, "options": [{"en": "In a one-room cement block house in the Tongogara refugee camp in Zimbabwe", "zh": "在津巴布韦通戈加拉难民营的一间水泥砌的小屋里"}, {"en": "In a big brick apartment building in a city in the Congo", "zh": "在刚果某市一栋砖砌的大公寓楼里"}, {"en": "In a wooden house on a farm in South Africa", "zh": "在南非一个农场的木屋里"}, {"en": "In a tent on the beach in Egypt", "zh": "在埃及海滩上的帐篷里"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Ruth explains that in Africa 'we lived in a one-room cement block house in the Tongogara refugee camp in Zimbabwe.' (Ruth was born in the Congo, but the family lived in the Zimbabwe camp.)", "zh": "露丝说在非洲「我们住在津巴布韦通戈加拉难民营的一间水泥砌的小屋里」。（露丝出生在刚果，但一家人住在津巴布韦的难民营。）"}}, {"q": {"en": "In the glossary, what does 'dribbled' mean?", "zh": "在词汇表里，「dribbled」(带球) 是什么意思？"}, "options": [{"en": "Quickly moved a soccer ball forward using repeated taps with the feet", "zh": "用脚连续轻踢，让足球向前滚动"}, {"en": "Kicked the ball as hard as possible", "zh": "用尽力气把球踢飞"}, {"en": "Caught the ball with both hands", "zh": "用双手把球接住"}, {"en": "Threw the ball over a fence", "zh": "把球抛过围栏"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'dribbled' as 'quickly moved a soccer ball forward using repeated taps with the feet' — how David moved the ball across the field.", "zh": "词汇表把 dribbled 定义为「用脚连续轻踢、让足球向前快速移动」——正是大卫把球带过球场的方式。"}}, {"q": {"en": "The book says David felt like an 'alien' at his new school. What does 'alien' mean in the glossary?", "zh": "书里说大卫在新学校感觉自己像个「alien」。词汇表里「alien」是什么意思？"}, "options": [{"en": "A being from a place other than Earth; an outsider", "zh": "来自地球以外某个地方的存在；外来者"}, {"en": "A very fast runner", "zh": "一个跑得很快的人"}, {"en": "A kind of soccer player", "zh": "一种足球运动员"}, {"en": "A teacher's helper", "zh": "老师的助手"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'alien' as 'a being from a place other than Earth; an outsider,' which is why David felt like an outsider who didn't fit in at the new school.", "zh": "词汇表把 alien 定义为「来自地球以外某个地方的存在；外来者」，这正是大卫觉得自己格格不入、像外来者的原因。"}}, {"q": {"en": "What kind of soccer ball did David and his friends make and play with at the refugee camp?", "zh": "在难民营里，大卫和朋友们自己做、用来踢的是什么样的足球？"}, "options": [{"en": "A ball made out of lots of plastic bags tied together with string", "zh": "用很多塑料袋用绳子绑在一起做成的球"}, {"en": "A ball carved from a block of wood", "zh": "用木块雕刻出来的球"}, {"en": "A ball bought at a store", "zh": "在商店里买的球"}, {"en": "A ball made from a real animal's skin", "zh": "用真正的动物皮做的球"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "David remembers 'the soccer ball that my friends and I made out of lots of plastic bags tied together with string. That's the only ball we had' at the camp.", "zh": "大卫记得「我和朋友们用很多塑料袋用绳子绑在一起做的足球。那是我们在营里唯一的球」。"}}, {"q": {"en": "When David worries he doesn't know what to draw, how does his sister Ruth describe the difference between their life in America and in Africa?", "zh": "大卫发愁不知道该画什么时，姐姐露丝怎样形容他们在美国和非洲生活的差别？"}, "options": [{"en": "She says it's like comparing melons to bananas", "zh": "她说这就像拿甜瓜和香蕉比"}, {"en": "She says it's like night and day but exactly the same", "zh": "她说就像昼夜，但其实一模一样"}, {"en": "She says it's like two drops of water", "zh": "她说就像两滴水一样"}, {"en": "She says there is no difference at all", "zh": "她说根本没有任何区别"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Ruth smiles and says, 'It's like comparing melons to bananas,' to show David how different his life in America is from his life in Africa.", "zh": "露丝笑着说：「这就像拿甜瓜和香蕉比」，让大卫明白他在美国的生活和非洲有多不一样。"}}, {"q": {"en": "Why does Mrs. Marquez suggest David bring drawings, photos, or special objects to school?", "zh": "为什么马奎兹老师建议大卫带画、照片或特别的东西去学校？"}, "options": [{"en": "She thinks the students would understand how he feels if he told them about his life in Africa", "zh": "她觉得如果大卫讲讲在非洲的生活，同学们就能理解他的感受"}, {"en": "She wants him to show off his new soccer ball", "zh": "她想让他炫耀自己的新足球"}, {"en": "She needs the objects for an art project grade", "zh": "她需要这些物品来给美术作业打分"}, {"en": "She plans to send them back to Africa", "zh": "她打算把它们寄回非洲"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Mrs. Marquez says, 'I think the students would understand how you feel if you told them about your life in Africa,' so she asks him to bring items to share.", "zh": "马奎兹老师说：「我觉得如果你跟他们讲讲在非洲的生活，同学们就能理解你的感受」，所以让他带东西来分享。"}}, {"q": {"en": "What does Ruth say is important for David's classmates to know?", "zh": "露丝说，让大卫的同学了解什么很重要？"}, "options": [{"en": "That people are from different places and have had different experiences, and why they feel lucky to live here", "zh": "人们来自不同的地方、有过不同的经历，以及他们为什么觉得住在这里很幸运"}, {"en": "That everyone should learn to play soccer", "zh": "每个人都应该学会踢足球"}, {"en": "That they should never eat rice and beans", "zh": "他们永远不该吃米饭和豆子"}, {"en": "That frogs live in every kitchen sink", "zh": "每只厨房水槽里都住着青蛙"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Ruth says, 'It's important for your classmates to know that people are from different places and have had different experiences. It's especially important for them to know why we feel lucky to live here.'", "zh": "露丝说：「让同学们知道人们来自不同的地方、有过不同的经历，这很重要。尤其要让他们知道我们为什么觉得住在这里很幸运。」"}}, {"q": {"en": "What is the author's main purpose in telling David's story?", "zh": "作者讲述大卫的故事，主要目的是什么？"}, "options": [{"en": "To help readers understand and appreciate people who come from different countries and refugee experiences", "zh": "帮助读者理解并接纳来自不同国家、有过难民经历的人"}, {"en": "To teach the rules of how to play soccer", "zh": "教大家踢足球的规则"}, {"en": "To explain how to cook foo foo", "zh": "讲解怎么做 foo foo（稠食）"}, {"en": "To describe how soccer balls are made in factories", "zh": "描述足球在工厂里怎么生产"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The author's note thanks two people 'whose immigration story helped shape this one,' showing the book's purpose is to build understanding of immigrant and refugee experiences.", "zh": "作者的致谢提到两位「移民经历启发了这本书」的人，说明写书的目的就是让大家理解移民和难民的经历。"}}], "extended": {"prompt": {"en": "David felt like an 'alien' and an outsider when he first came to a new country where the language was new. Think of a time you or someone you know moved to a new place, started a new school, or felt different. How did it feel, and what helped you (or them) feel welcome? What can we learn from David's classmates once they understood his story?", "zh": "大卫刚到一个语言全新的国家时，觉得自己像个「外星人」、是个外来者。回想一次你或你认识的人搬去新地方、转学或觉得自己「不一样」的经历。那是什么感觉？是什么让你（或他们）感到被接纳？从大卫的同学听懂他的故事之后，我们能学到什么？"}, "guidance": {"en": ["David felt like an 'alien' at his new school and used soccer so he 'didn't have to speak English' (p. 5).", "Mrs. Marquez tells David to share his life in Africa so classmates 'would understand how you feel' (p. 8).", "After David's presentation, Jacob gives him his own soccer ball — understanding changed how the class treated him (p. 18).", "A good answer connects a personal experience of feeling different to the value of listening and empathy."], "zh": ["大卫在新学校觉得自己像「外星人」，靠踢足球来「不用讲英语」（第5页）。", "马奎兹老师让大卫分享非洲的生活，这样同学「就能理解你的感受」（第8页）。", "大卫分享之后，雅各布把自己的足球送给了他——理解改变了全班对他的态度（第18页）。", "好的回答要把「感觉不一样」的亲身经历，与「倾听、共情」的价值联系起来。"]}}};</script>
