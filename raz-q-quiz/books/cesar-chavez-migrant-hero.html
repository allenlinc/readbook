n": "The right to stop working on Sundays", "zh": "周日休息的权利"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "In 1965, Filipino farm workers 'went on strike against the grape growers in Delano, California. They were asking for a pay raise from $.90 an hour to $1.40 an hour.'", "zh": "1965年，一群菲律宾农工「在加州德拉诺对葡萄种植园主罢工。他们要求时薪从0.90美元涨到1.40美元」。"}}, {"q": {"en": "What does the book's glossary say a 'boycott' is?", "zh": "书的词汇表里，「boycott」（抵制）是什么意思？"}, "options": [{"en": "To refuse to buy or take part in something in order to force a change", "zh": "拒绝购买或参与某事，以迫使改变"}, {"en": "A type of farm machine", "zh": "一种农用机器"}, {"en": "A union meeting", "zh": "一次工会集会"}, {"en": "A holiday celebration", "zh": "节日庆祝"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines boycott as 'to refuse to buy or take part in something in order to make a point or force a change.' Strikers asked people to boycott grapes.", "zh": "词汇表把 boycott 定义为「拒绝购买或参与某事，以表明立场或迫使改变」。罢工者正是请大家抵制葡萄。"}}, {"q": {"en": "According to the book, what is a 'labor union'?", "zh": "根据这本书，什么是「labor union」（工会）？"}, "options": [{"en": "A group of workers who unite to demand certain rights and benefits", "zh": "团结起来争取某些权利和福利的一群工人"}, {"en": "A team of farmers who share one tractor", "zh": "共用一台拖拉机的农民小组"}, {"en": "A school for migrant children", "zh": "流动儿童学校"}, {"en": "A government agency that pays wages", "zh": "发工资的政府机构"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines a labor union as 'a group of workers who act together to protect and expand their rights in the workplace.' Chavez started one for farm workers.", "zh": "词汇表把工会定义为「团结行动、在工作场所保护和扩大自身权利的一群工人」。查韦斯正是为农工组建了工会。"}}, {"q": {"en": "What did Chavez mean by his slogan 'Si se puede'?", "zh": "查韦斯的口号「Si se puede」是什么意思？"}, "options": [{"en": "\"Yes, it can be done\"—his belief that a farm workers' union was possible", "zh": "「一定能做到」——他相信建立农工工会是可能的"}, {"en": "\"We shall be heard\"", "zh": "「我们会被听见」"}, {"en": "\"The rich have money, but the poor have time\"", "zh": "「富人很有钱，穷人很有时间」"}, {"en": "\"Never give up farming\"", "zh": "「永远别放弃种田」"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Although others had 'tried and failed' to organize farm workers, 'he said, Si se puede—\"Yes, it can be done.\"'", "zh": "尽管前人「尝试过却失败」，他仍说「Si se puede——『一定能做到』」。"}}, {"q": {"en": "What was the result of the grape boycott that Chavez's union supported?", "zh": "查韦斯工会支持的抵制葡萄行动，最终结果如何？"}, "options": [{"en": "More than 14 million Americans joined the boycott, and after five years the growers agreed to the union's demands", "zh": "超过1400万美国人加入抵制，五年后种植园主答应了工会的要求"}, {"en": "The growers won and the union was shut down immediately", "zh": "种植园主赢了，工会立刻被关闭"}, {"en": "Only a few hundred people took part", "zh": "只有几百人参与"}, {"en": "The boycott ended after one week with no change", "zh": "抵制一周后结束，毫无改变"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Strikers asked people to boycott grapes and 'More than 14 million Americans did just that,' and 'after five long years, the grape growers agreed to the union's demands.'", "zh": "罢工者请大家抵制葡萄，「超过1400万美国人照做了」，而「漫长的五年后，葡萄种植园主终于答应了工会的要求」。"}}, {"q": {"en": "How did Chavez's 25-day water-only hunger strike help the grape strike?", "zh": "查韦斯那次只喝水的25天绝食，是怎样帮助葡萄罢工的？"}, "options": [{"en": "When some workers wanted violence, his fast put an end to that talk and helped the strike succeed", "zh": "当一些工人想动武时，他的绝食制止了这种念头，帮罢工取得成功"}, {"en": "It made the growers angrier and the strike fail", "zh": "它让种植园主更愤怒，导致罢工失败"}, {"en": "It had no effect on the strike", "zh": "对罢工毫无影响"}, {"en": "It forced the workers to eat less", "zh": "它逼工人吃得更少"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "During the 1968 grape strike, 'some of the farm workers became discouraged and wanted to resort to violence. Chavez went on a water-only hunger strike that lasted twenty-five days. His fast put an
