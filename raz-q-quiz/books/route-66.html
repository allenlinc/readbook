<script>window.BOOK = {"slug": "route-66", "title": "Route 66", "titleZh": "66号公路", "level": "Q", "genre": "Nonfiction", "mainSkill": "Integration of Knowledge and Ideas", "questions": [{"q": {"en": "How long was Route 66, and what two cities did it connect?", "zh": "66号公路有多长？它连接了哪两座城市？"}, "options": [{"en": "It stretched 2,400 miles (3,862 km) from Chicago, Illinois, to Los Angeles, California", "zh": "它全长2400英里（3862公里），从伊利诺伊州芝加哥到加利福尼亚州洛杉矶"}, {"en": "It was 500 miles from New York to Boston", "zh": "它长500英里，从纽约到波士顿"}, {"en": "It ran 1,000 miles from Texas to Canada", "zh": "它长1000英里，从得州到加拿大"}, {"en": "It was a short road across one small town", "zh": "它只是穿过一座小镇的短小路"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says one new highway 'stretched 2,400 miles (3,862 km) from Chicago, Illinois, to Los Angeles, California. Its name was Route 66.'", "zh": "书里说有一条新公路「全长2400英里（3862公里），从伊利诺伊州芝加哥到加利福尼亚州洛杉矶。它的名字叫66号公路」。"}}, {"q": {"en": "What fond nickname did people give to Route 66?", "zh": "人们给了66号公路什么亲切的绰号？"}, "options": [{"en": "The “Main Street of America”", "zh": "「美国的主街」(Main Street of America)"}, {"en": "The “River of the West”", "zh": "「西部之河」"}, {"en": "The “Road to the Moon”", "zh": "「通往月亮的路」"}, {"en": "The “King's Highway”", "zh": "「国王大道」"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says Route 66 was 'fondly... called the “Main Street of America.”'", "zh": "书里说66号公路被亲切地称为「美国的主街」。"}}, {"q": {"en": "In John Steinbeck's novel The Grapes of Wrath, what did he call Route 66?", "zh": "在约翰·斯坦贝克(John Steinbeck)的小说《愤怒的葡萄》(The Grapes of Wrath) 里，他把66号公路称作什么？"}, "options": [{"en": "“the mother road” and “the road of flight”", "zh": "「母亲之路」(the mother road) 和「逃亡之路」(the road of flight)"}, {"en": "“the golden highway” and “the road home”", "zh": "「金色公路」和「回家之路」"}, {"en": "“the lonely trail” and “the road of dust”", "zh": "「孤独小径」和「尘土之路」"}, {"en": "“the royal road” and “the road of kings”", "zh": "「王家之路」和「王者之路」"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says Steinbeck's 1939 novel is about a family fleeing Oklahoma on Route 66, and 'Steinbeck described Route 66 as “the mother road” and “the road of flight.”'", "zh": "书里说斯坦贝克1939年的小说讲述一家人在66号公路上逃离俄克拉荷马，「斯坦贝克把66号公路描述为『母亲之路』和『逃亡之路』」。"}}, {"q": {"en": "What famous line from the 1946 song “Route 66” helped make the highway famous?", "zh": "1946年歌曲《Route 66》里哪句著名的歌词让这条公路声名大噪？"}, "options": [{"en": "“get your kicks on Route Sixty-Six”", "zh": "「在六十六号公路上找乐子」(get your kicks on Route Sixty-Six)"}, {"en": "“drive slow on the open road”", "zh": "「在开阔的公路上慢慢开」"}, {"en": "“goodbye to the city lights”", "zh": "「告别城市的灯火」"}, {"en": "“follow the river to the sea”", "zh": "「沿着河流去海边」"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says the 1946 song 'Route 66' became a top hit, and 'Its most famous line told listeners to “get your kicks on Route Sixty-Six.”'", "zh": "书里说1946年的歌曲《Route 66》成为热门金曲，「最著名的一句告诉听众：『在六十六号公路上找乐子』」。"}}, {"q": {"en": "In the glossary, what does “bypassed” mean?", "zh": "在词汇表里，「bypassed」(绕开) 是什么意思？"}, "options": [{"en": "Passed by or avoided, often to make a process quicker or easier", "zh": "从旁边经过或避开，常是为了让过程更快或更省力"}, {"en": "Built brand new from the ground up", "zh": "从零开始全新建造"}, {"en": "Closed down forever", "zh": "永远关闭"}, {"en": "Painted with bright colors", "zh": "涂上鲜艳的颜色"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines bypassed as 'passed by or avoided, often to make a process quicker or easier' (p. 8) — by 1970 most of the original Route 66 was bypassed by a new highway.", "zh": "词汇表把 bypassed 定义为「从旁边经过或避开，常是为了让过程更快或更省力」（第8页）——到1970年，原有的66号公路大部分被新公路绕开了。"}}, {"q": {"en": "In the glossary, what does “jagged” mean, and how did it affect early drivers?", "zh": "在词汇表里，「jagged」(锯齿状的) 是什么意思？它怎样影响了早期的开车人？"}, "options": [{"en": "Having a sharp, irregular shape or edge; early cars popped tires on jagged rocks", "zh": "有尖锐、不规则的形状或边缘；早期汽车常因锯齿状岩石而爆胎"}, {"en": "Smooth and flat like a road", "zh": "像路面一样平滑"}, {"en": "Brightly colored for advertising", "zh": "为做广告而色彩鲜艳"}, {"en": "Very wide and easy to drive on", "zh": "非常宽阔、好开"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines jagged as 'having a sharp, irregular shape or edge' (p. 5). The book says a hundred years ago cars 'popped tires on jagged rocks.'", "zh": "词汇表把 jagged 定义为「有尖锐、不规则的形状或边缘」（第5页）。书里说一百年前汽车常「在锯齿状岩石上爆胎」。"}}, {"q": {"en": "How did the Disney-Pixar movie Cars connect to real Route 66 sights?", "zh": "迪士尼-皮克斯的动画电影《汽车总动员》(Cars) 是怎样和真实的66号公路景点联系起来的？"}, "options": [{"en": "The Wigwam Motel became the Cozy Cone Motel, and a rusty tow truck became the character Tow Mater", "zh": "威格沃姆汽车旅馆变成了「舒适圆锥旅馆」，一辆生锈的拖车变成了角色「拖拖」(Tow Mater)"}, {"en": "The movie was filmed entirely in a studio with no real locations", "zh": "电影完全在摄影棚里拍，没有真实取景"}, {"en": "It was based on a book about New York City", "zh": "它改编自一本写纽约市的书"}, {"en": "The characters were all real presidents", "zh": "角色全都是真实的总统"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Director John Lasseter turned his Route 66 trip into Cars (2006). The book says 'the Wigwam Motel in Holbrook, Arizona, became the Cozy Cone Motel,' and 'a rusty tow truck... in Galena, Kansas, became the Cars movie character Tow Mater.'", "zh": "导演约翰·拉塞特把66号公路之旅拍成了《汽车总动员》（2006）。书里说「亚利桑那州霍尔布鲁克的威格沃姆汽车旅馆变成了舒适圆锥旅馆」，而「堪萨斯州加利纳一辆生锈的拖车……变成了电影角色拖拖」。"}}, {"q": {"en": "What are some examples of the unusual roadside attractions found along Route 66?", "zh": "66号公路沿途有哪些奇特的路边景点例子？"}, "options": [{"en": "Things like Cadillac Ranch (buried cars), the Blue Whale (80-foot whale), and Elmer's Bottle Tree Ranch", "zh": "例如卡迪拉克农场（埋着的汽车）、蓝鲸（80英尺的鲸鱼）和埃尔默的瓶子树牧场"}, {"en": "Only ordinary gas stations and plain hotels", "zh": "只有普通的加油站和平凡的旅馆"}, {"en": "Only mountains and forests, with no art", "zh": "只有山林，没有任何艺术装置"}, {"en": "Only big shopping malls", "zh": "只有大型购物中心"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book describes many attractions: Cadillac Ranch (ten cars buried nose-down), the 80-foot Blue Whale built for an anniversary, and Elmer's Bottle Tree Ranch made of recycled bottles and car parts.", "zh": "书里描写了许多景点：卡迪拉克农场（十辆汽车倒插在地里）、为纪念日而建的两栖80英尺蓝鲸，以及用回收瓶子和汽车零件做成的埃尔默瓶子树牧场。"}}, {"q": {"en": "What is the book's Focus Question — the big question the author wants you to think about?", "zh": "这本书的「聚焦问题」(Focus Question) 是什么？也就是作者希望你思考的核心问题。"}, "options": [{"en": "What is the significance of Route 66?", "zh": "66号公路的意义是什么？"}, {"en": "How long does it take to drive across America?", "zh": "横穿美国需要开多久？"}, {"en": "Who invented the automobile?", "zh": "谁发明了汽车？"}, {"en": "Why did the dinosaurs disappear?", "zh": "恐龙为什么会灭绝？"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book opens with the Focus Question 'What is the significance of Route 66?' and the whole book answers it through history, culture, and attractions.", "zh": "书一开头就提出聚焦问题「66号公路的意义是什么？」，全书通过历史、文化和景点来回答。"}}, {"q": {"en": "What did the U.S. Congress do in 1999 to help save Route 66, and why was it needed?", "zh": "1999年美国国会为拯救66号公路做了什么？为什么需要这样做？"}, "options": [{"en": "It passed a law giving money to help businesses and towns keep important sights open, after many had closed when interstates bypassed the road", "zh": "它通过一项法律，拨款帮助商家和城镇维持重要景点开放——此前许多因州际公路绕开此路而倒闭"}, {"en": "It closed the road forever to all traffic", "zh": "它永远关闭了这条路，禁止一切通行"}, {"en": "It built a wall along the entire route", "zh": "它沿整条公路筑起一道墙"}, {"en": "It renamed the road “Interstate 66”", "zh": "它把这条路改名为「66号州际公路」"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "After interstates were built around Route 66, 'businesses on Route 66 lost customers, and many closed.' In 1999 'the United States Congress passed a law to protect Route 66. It gave money to help businesses and towns keep important sights open.'", "zh": "州际公路绕开66号公路后，「沿线的商家失去了顾客，许多都关门了」。1999年「美国国会通过一项法律保护66号公路。它拨款帮助商家和城镇维持重要景点开放」。"}}], "extended": {"prompt": {"en": "Route 66 went from a busy, famous highway to being bypassed by interstates, then was saved by a 1999 law and rediscovered through the movie Cars. Think of a place, object, or tradition that was once popular and then faded, or one being saved today. Why do you think people work to preserve old things, and what would you want to save and why?", "zh": "66号公路曾是一条繁忙有名的公路，后来被州际公路绕开而衰落，又靠1999年的法律和电影《汽车总动员》被重新发掘、得以保存。想一想某个曾经流行后来衰落的地方、物品或传统，或者今天正在被保护的事物。为什么人们会努力保存旧事物？你最想保存什么，为什么？"}, "guidance": {"en": ["By 1970 most of the original Route 66 'was bypassed by a new highway,' and many businesses 'lost customers, and many closed' (p. 8).", "In 1999 Congress passed a law to protect Route 66 and gave money to keep sights open; 'Now Route 66 is growing popular again' (p. 15).", "A good answer names a real or personal example of something old being preserved and explains why saving it matters."], "zh": ["到1970年，原有的66号公路「大部分被新公路绕开」，许多商家「失去顾客，纷纷关门」（第8页）。", "1999年国会通过法律保护66号公路并拨款维持景点开放；「如今66号公路又重新流行起来」（第15页）。", "好的回答会说出某个真实或亲身相关的、被保存的旧事物，并说明保存它为何重要。"]}}};</script>
