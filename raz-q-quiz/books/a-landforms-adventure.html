f flat land", "zh": "一大片抬高的平原"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines a delta as 'an area of land shaped like a triangle formed by sediment at the mouth of a river' (the Skagit River delta is the book's example).", "zh": "词汇表把三角洲定义为「在河流入海口由泥沙堆积成的三角形陆地」（书里以斯卡吉特河三角洲为例）。"}}, {"q": {"en": "How did the Rocky Mountains form?", "zh": "落基山脉(Rocky Mountains)是怎么形成的？"}, "options": [{"en": "Two small plates beneath the Pacific slid under the North American Plate", "zh": "太平洋底下的两块小板块滑到了北美板块之下"}, {"en": "A glacier carved them out of the land", "zh": "冰川把它们从陆地里刻出来"}, {"en": "Wind and water erosion wore them down", "zh": "风和水侵蚀把它们磨低了"}, {"en": "They were built from river sediments", "zh": "它们由河流泥沙堆积而成"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says the Rockies 'formed when two small tectonic plates beneath the Pacific Ocean slid under the North American Plate.'", "zh": "书里说落基山脉「是在太平洋底下的两块小构造板块滑到北美板块之下时形成的」。"}}, {"q": {"en": "What natural tools does the book say cause weathering and erosion?", "zh": "书中说，是什么自然力量造成了风化与侵蚀？"}, "options": [{"en": "Wind, water, and ice", "zh": "风、水和冰"}, {"en": "Fire, lightning, and rain", "zh": "火、闪电和雨"}, {"en": "People, animals, and plants", "zh": "人、动物和植物"}, {"en": "Magnets, heat, and pressure", "zh": "磁铁、热量和压强"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book states 'Wind, water, and ice are the main tools of weathering and erosion' that break down and carry away rock.", "zh": "书里说「风、水和冰是风化与侵蚀的主要工具」，它们把岩石打碎并带走。"}}, {"q": {"en": "What is a plain, and how did the Great Plains form?", "zh": "什么是「平原」(plain)？大平原(Great Plains)又是怎么形成的？"}, "options": [{"en": "A plain is a large, flat, treeless area; the Great Plains formed when two plates smashed together", "zh": "平原是一大片平坦少树的陆地；大平原本是两个板块相撞拼合而成"}, {"en": "A plain is a tall mountain formed by volcanoes", "zh": "平原是火山形成的高山"}, {"en": "A plain is a type of lake formed only by glaciers", "z  changing, shaped by both slow and fast forces", "zh": "地球表面一直在变化，由缓慢和快速两股力量共同塑造"}, {"en": "Landforms never change once they are formed", "zh": "地貌一旦形成就再也不变"}, {"en": "Only volcanoes can create new landforms", "zh": "只有火山能造就新地貌"}, {"en": "People build all of the landforms", "zh": "所有地貌都是人造的"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Mr. Lopez says Earth's surface 'is always changing' — some changes are slow, others fast, and both 'can change existing landforms and create new ones.'", "zh": "洛佩兹老师说地球表面「一直在变化」——有的变化缓慢，有的很快，两者都「能改变旧地貌、造就新地貌」。"}}, {"q": {"en": "Why does the author tell the story as a Boston-to-Seattle road trip?", "zh": "作者为什么要把故事讲成「从波士顿到西雅图的自驾旅行」？"}, "options": [{"en": "To show real landforms across North America so readers see the science in familiar places", "zh": "为了展现北美各地真实的地貌，让读者在熟悉的地方看到科学"}, {"en": "To teach the reader how to drive a car", "zh": "为了教读者怎么开车"}, {"en": "To compare Boston and Seattle as cities", "zh": "为了比较波士顿和西雅图这两座城市"}, {"en": "To list every U.S. state in order", "zh": "为了按顺序列出美国每一个州"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "By traveling Boston→Seattle, the narrator meets real landforms (peninsula, plateau, Great Lakes, plains, Rockies, volcano, delta), making the science concrete and relatable.", "zh": "通过波士顿→西雅图的旅行，叙述者一路遇到真实的地貌（半岛、高原、大湖、平原、落基山、火山、三角洲），让科学知识变得具体可感。"}}], "extended": {"prompt": {"en": "The book says Earth's surface is 'always changing' from both slow forces (tectonic plates) and fast ones (volcanoes, erosion). Think of a landform or natural change you have seen or heard about (a hill, a river, a volcano, a coast). How do you think it formed? Why is it useful to know that Earth is always changing?", "zh": "书里说地球表面「一直在变化」，既有缓慢的力量（板块），也有快速的力量（火山、侵蚀）。想一想你见过或听过的一种地貌或自然变化（山丘、河流、火山、海岸……）。你觉得它是怎么形成的？明白「地球一直在变」这件事，有什么用？"}, "guidance": {"en": ["Mr. Lopez says Earth's crust is broken into tectonic plates that 'slowly slide around... the most important underground forces that create landforms' (p. 6).", "Weathering and erosion by wind, water, and ice 'carry away the pieces' and reshape land (p. 8).", "A good answer names a real landform and links it to a slow or fast force, then explains why knowing Earth changes matters (e.g., safety, curiosity)."], "zh": ["洛佩兹老师说地壳碎成构造板块，「缓慢滑动……是造就地貌最重要的地下力量」（第6页）。", "风、水、冰造成的风化与侵蚀会「带走碎块」、重塑大地（第8页）。", "好的回答要说出一种真实的地貌，把它和缓慢或快速的力量联系起来，再说明「知道地球在变」为何有用（如安全、好奇）。"]}}};</script>
