<script>window.BOOK = {"slug": "puffins", "title": "Puffins", "titleZh": "海鹦", "level": "Q", "genre": "Nonfiction", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "What nickname does the book give to puffins, and why does it fit?", "zh": "这本书给海鹦起了什么绰号？为什么会这么叫？"}, "options": [{"en": "“Clowns of the sea” — their funny, unusual looks make people enjoy watching them", "zh": "「海上的小丑」——它们滑稽奇特的外表让人看了就喜欢"}, {"en": "“Kings of the sky” — they rule the air above the ocean", "zh": "「天空之王」——它们统治着海面上的天空"}, {"en": "“Giants of the north” — they are the largest birds in the world", "zh": "「北方的巨人」——它们是世界上最大的鸟"}, {"en": "“Ships of the storm” — they carry sailors across the sea", "zh": "「风暴之船」——它们载着水手渡海"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The author opens the book with the section 'Sea Clowns' and gives puffins the nickname 'clowns of the sea' to engage readers with their plump bodies, black-and-white feathers, and huge, colorful beaks that look 'funny and unusual.'", "zh": "书的第一节标题就是「海上的小丑」，说海鹦被昵称为「海上的小丑」，因为它们胖乎乎的身体、黑白羽毛和巨大彩色喙看起来「滑稽又特别」。"}}, {"q": {"en": "How deep can puffins dive, and how long can they stay underwater?", "zh": "海鹦能潜多深？能在水下待多久？"}, "options": [{"en": "About 100 feet (30 m) deep, for about half a minute", "zh": "约100英尺（30米）深，约半分钟"}, {"en": "Only a few inches, for just a second or two", "zh": "只有几英寸，只待一两秒"}, {"en": "Over 1,000 feet (300 m), for more than an hour", "zh": "超过1000英尺（300米），一个多小时"}, {"en": "They cannot dive at all — they only swim on the surface", "zh": "它们根本不会潜水——只在表面游"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says puffins 'can dive 100 feet (30 m) or more and stay underwater for about half a minute.'", "zh": "书里说海鹦「能潜100英尺（30米）或更深，并在水下待约半分钟」。"}}, {"q": {"en": "According to the book, how many types of puffins are there, and what are they?", "zh": "根据这本书，海鹦有几种？分别叫什么？"}, "options": [{"en": "Four: Atlantic, Horned, Tufted, and Rhinoceros auklet", "zh": "四种：大西洋海鹦、角海鹦、簇羽海鹦和犀角海鹦（Rhinoceros auklet）"}, {"en": "Two: the North Atlantic and the North Pacific kinds", "zh": "两种：北大西洋型和北太平洋型"}, {"en": "Only one: all puffins are the same species", "zh": "只有一种：所有海鹦都是同一物种"}, {"en": "Six: one for each color of their beaks", "zh": "六种：喙的每种颜色对应一种"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book describes 'The four types of puffins' in separate sections: the Atlantic puffin, the Horned puffin, the Tufted puffin, and the Rhinoceros auklet.", "zh": "书里用独立的章节介绍了「海鹦的四种类型」：大西洋海鹦、角海鹦、簇羽海鹦和犀角海鹦。"}}, {"q": {"en": "During the breeding season, how do puffins “dress up,” and why do they do it?", "zh": "到了繁殖季节，海鹦是怎样「盛装打扮」的？它们为什么要这么做？"}, "options": [{"en": "They grow colorful beaks, extra feathers, and bright orange feet to attract a mate", "zh": "它们长出彩色喙、额外的羽毛和亮橙色脚掌，是为了吸引配偶"}, {"en": "They turn completely white to hide from enemies", "zh": "它们全身变白，好躲开敌人"}, {"en": "They shrink in size so they fit in their burrows", "zh": "它们缩小体型，好钻进洞穴"}, {"en": "They grow extra feathers only to stay warm in winter", "zh": "它们只为了冬天保暖才多长羽毛"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says that during the breeding season puffins 'dress up' to 'attract a mate,' growing large colorful beaks, white feather areas, decoration feathers, and bright orange webbed feet.", "zh": "书里说繁殖季节海鹦会「盛装」以「吸引配偶」，长出大彩色喙、白色羽毛区、装饰性羽毛，脚掌也变成亮橙色。"}}, {"q": {"en": "In the glossary, what is a “burrow”?", "zh": "在词汇表里，「burrow」（洞穴）是什么？"}, "options": [{"en": "A hole dug in the ground by an animal for use as a home", "zh": "动物在地上挖出来当家的洞"}, {"en": "A kind of fish that puffins eat", "zh": "海鹦吃的一种鱼"}, {"en": "A group of puffins flying together", "zh": "一群一起飞的海鹦"}, {"en": "The colorful beak of a puffin", "zh": "海鹦彩色的喙"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines a burrow as 'a hole dug in the ground by an animal for use as a home' (p. 11) — puffins dig these in soft soil for nesting.", "zh": "词汇表把 burrow }], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says, 'In contrast to Atlantic and horned puffins, tufted puffins have a black chest and belly,' while the other two have white chests, bellies, and faces.", "zh": "书里说：「与北大西洋海鹦和角海鹦不同，簇羽海鹦的胸和腹是黑色的」，而另外两种的胸、腹和脸都是白的。"}}, {"q": {"en": "Why are Rhinoceros auklets sometimes NOT thought of as true puffins?", "zh": "为什么「犀角海鹦」(Rhinoceros auklet) 有时不被认为是真正的海鹦？"}, "options": [{"en": "They look very different and are sometimes thought to be close cousins instead of actual puffins", "zh": "它们长得非常不一样，有时被当成近亲，而不是真正的海鹦"}, {"en": "They live only in fresh water, not the ocean", "zh": "它们只生活在淡水里，不住在海里"}, {"en": "They cannot fly at all", "zh": "它们根本不会飞"}, {"en": "They are much larger than all other birds", "zh": "它们比所有别的鸟都大得多"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says Rhinoceros auklets 'are less well known' and 'look very different,' so 'they are sometimes thought to be close cousins instead of actual puffins.'", "zh": "书里说犀角海鹦「不太为人所知」且「长得非常不一样」，所以「有时被当成近亲，而不是真正的海鹦」。"}}, {"q": {"en": "What was wildlife scientist Dr. Stephen Kress's goal with Project Puffin, and what happened by 2014?", "zh": "野生动物科学家斯蒂芬·克雷斯(Stephen Kress)博士发起「海鹦计划」(Project Puffin)的目的是什么？到2014年发生了什么？"}, "options": [{"en": "To bring Atlantic puffins back to Eastern Egg Rock; by 2014 the island had 148 breeding pairs", "zh": "把大西洋海鹦带回东方蛋岩岛；到2014年该岛已有148对繁殖海鹦"}, {"en": "To teach puffins to live in zoos around the world", "zh": "教海鹦在世界各地的动物园里生活"}, {"en": "To stop all hunting of puffins in every country", "zh": "在所有国家禁止一切猎捕海鹦的行为"}, {"en": "To make puffins the national bird of the United States", "zh": "把海鹦定为美国国鸟"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book says Dr. Kress visited Eastern Egg Rock in the early 1970s, wondered if he could bring puffins back, started Project Puffin, and 'As of 2014, the island had 148 breeding pairs.'", "zh": "书里说克雷斯博士在1970年代初造访东方蛋岩岛，想能否把海鹦带回来，于是发起「海鹦计划」；「到2014年，该岛已有148对繁殖海鹦」。"}}], "extended": {"prompt": {"en": "The book explains that during the breeding season puffins 'dress up' with colorful beaks and bright orange feet to attract a mate, and that they return to the same nesting sites year after year. Why do you think animals have special 'looks' or behaviors just for certain times of year? Give an example from the book and one idea of your own about why these changes help the animal survive.", "zh": "书里说海鹦在繁殖季节会「盛装」——长出彩色喙和亮橙色脚掌来吸引配偶，而且年复一年回到同一处筑巢。你觉得动物为什么会在一年里的特定时段拥有特别的「外表」或行为？请举书中的一个例子，并自己想一个主意，说明这些变化怎样帮助动物生存。"}, "guidance": {"en": ["During the breeding season puffins 'dress up' with colorful beaks and bright orange feet to attract a mate (p. 6).", "Puffins return to 'the same nesting sites year after year' and each pair prepares a burrow (p. 11).", "A good answer names a real change from the book and explains how it helps puffins find a mate or raise chicks."], "zh": ["繁殖季节海鹦用彩色喙和亮橙色脚掌「盛装」以吸引配偶（第6页）。", "海鹦「年复一年回到同一处筑巢地」，每对还会挖好一个洞穴（第11页）。", "好的回答会说出书里一个真实的变化，并解释它如何帮助海鹦找到配偶或养育雏鸟。"]}}};</script>
