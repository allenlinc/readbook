弟妹妹「看住」，让他们安全地待在家里"}, {"en": "It is a special mouse toy he bought", "zh": "那是他买的一种老鼠玩具"}, {"en": "It is the name of his favorite TV show", "zh": "那是他最爱看的电视节目的名字"}, {"en": "It is a kind of oatmeal cookie", "zh": "那是一种燕麦饼干"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "A babysitter watches children; Morty jokes that the thick oatmeal 'will make the perfect mouse-sitter' because it keeps the mice from getting into trouble while he is gone.", "zh": "保姆是看孩子的人；麦蒂开玩笑说稠燕麦片「会是完美的老鼠保姆」，因为它能在他离开时看住小鼠们、不让他们闯祸。"}}, {"q": {"en": "What does Mother promise Morty if 'all goes well' while she is away helping Aunt Edna?", "zh": "妈妈答应麦蒂：如果她去帮埃德娜阿姨时「一切顺利」，就带他去干什么？"}, "options": [{"en": "Take Morty, Ben, and Fred to the circus the next day", "zh": "第二天带麦蒂、本和弗雷德去看马戏"}, {"en": "Buy him a bulk bag of oatmeal", "zh": "给他买一大袋燕麦片"}, {"en": "Let him watch TV all day", "zh": "让他一整天看电视"}, {"en": "Take him to Aunt Edna's house", "zh": "带他去埃德娜阿姨家"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Mother says, 'If all goes well while I'm gone, I'll take you, Ben, and Fred to the circus tomorrow.'", "zh": "妈妈说：「我不在的这段时间如果一切顺利，明天就带你们——你、本和弗雷德——去看马戏。」"}}, {"q": {"en": "What daring thing does Morty do at the circus, on a dare from his friend Fred?", "zh": "在马戏团里，麦蒂经不住朋友弗雷德的激将，做了什么大胆的事？"}, "options": [{"en": "He squeezes through the bars of the lion's cage to touch the lion's mane", "zh": "他从栏杆间钻进狮笼，去摸狮子的鬃毛"}, {"en": "He rides on the back of an elephant", "zh": "他骑在大象背上"}, {"en": "He swallows a sword like the sword swallower", "zh": "他像吞剑人那样吞下一把剑"}, {"en": "He steals cheese popcorn from a stand", "zh": "他从摊位偷了芝士爆米花"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "On a dare from Fred, Morty 'squeezed himself through the bars of the cage to gently touch the lion's mane,' his heart pounding with fear.", "zh": "经弗雷德一激，麦蒂「从栏杆间挤进笼子，轻轻摸了摸狮子的鬃毛」，当时吓得心跳都要跳出胸口。"}}, {"q": {"en": "When Morty finally talks to his mother at the end, what important trait about him does the book point out?", "zh": "结尾麦蒂终于和妈妈坦白时，书里特别强调了他哪一个重要品质？"}, "options": [{"en": "He ALWAYS tells the truth", "zh": "他永远都说真话"}, {"en": "He is the fastest runner in the family", "zh": "他是家里跑得最快的"}, {"en": "He is not afraid of lions", "zh": "他一点都不怕狮子"}, {"en": "He is very good at winning games", "zh": "他特别擅长赢游戏"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book states plainly, 'Now, there's one thing about Morty. HE ALWAYS TELLS THE TRUTH,' and Morty admits what he did.", "zh": "书里明明白白地写：「麦蒂有一点——他永远都说真话。」他也确实承认了自己做的事。"}}, {"q": {"en": "What is the main consequence Morty faces for his mischievous trick?", "zh": "麦蒂因为这场恶作剧，主要受到了什么后果？"}, "options": [{"en": "He is grounded—he cannot go to the circus, must buy oatmeal with his saved money, and clean the bathroom", "zh": "他被禁足——不能去看马戏，要用攒下的钱买燕麦片，还要打扫浴室"}, {"en": "He gets extra circus tickets as a reward", "zh": "他反而得到额外的马戏门票作为奖励"}, {"en": "His brothers forgive him and they all go to the circus", "zh": "弟弟们原谅了他，大家一起去看马戏"}, {"en": "Mother laughs and says the trick was funny", "zh": "妈妈大笑，说这个恶作剧很好笑"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Mother says, 'you will not be going to the circus tomorrow. You are grounded... use the money you saved for the circus to buy a bulk bag of oatmeal,' and clean the bathroom.", "zh": "妈妈说：「明天你不去看马戏了，你被禁足……用你为马戏攒下的钱去买一大袋燕麦片」，还要打扫浴室。"}}, {"q": {"en": "From what point of view is this story told?", "zh": "这个故事是用什么视角（人称）叙述的？"}, "options": [{"en": "Third-person—a narrator describes Morty's thoughts and actions", "zh": "第三人称——由叙述者描述麦蒂的想法和行为"}, {"en": "First-person—Morty tells it as 'I'", "zh": "第一人称——由麦蒂以「我」的口吻讲述"}, {"en": "Second-person—the reader is addressed as 'you'", "zh": "第二人称——以「你」来称呼读者"}, {"en": "It is written as a play script", "zh": "它是一出剧本的形式"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The narrator uses 'Morty thought...' and describes his feelings from outside, e.g. 'His heart felt like it would pound right out of his chest,' which is third-person.", "zh": "叙述者用「麦蒂想……」从外部描写他的感受，例如「他的心仿佛要从胸口跳出来」，这是第三人称。"}}, {"q": {"en": "According to the author's note, why did Kathy Hoggan first create the Morty Mouse stories?", "zh": "根据作者的话，凯西·霍根(Kathy Hoggan)最初是为什么创作出「麦蒂鼠」这一系列故事的？"}, "options": [{"en": "She told them to her own children, inspired by her grandmother's tales of Suzette Scamper", "zh": "她讲给自己孩子听，灵感来自外婆讲的苏珊特·斯坎珀的故事"}, {"en": "A newspaper asked her to write them", "zh": "一家报纸请她写的"}, {"en": "They were based on a popular movie", "zh": "它们是改编自一部热门电影"}, {"en": "A publisher hired her to make a mascot", "zh": "一家出版商雇她创作一个吉祥物"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The author's note says the stories 'began with Kathy Hoggan telling her children about the adventures of a mischievous mouse, inspired by her grandmother's tales of Suzette Scamper.'", "zh": "作者说明，这一系列「始于凯西·霍根给自己的孩子讲一只淘气小鼠的冒险，灵感来自她外婆讲的苏珊特·斯坎珀的故事」。"}}, {"q": {"en": "While Morty is cleaning the messy bathroom at the end, what does he keep thinking about?", "zh": "结尾麦蒂在打扫一团糟的浴室时，心里一直在想什么？"}, "options": [{"en": "The stuffed Mega Mouse he could have won at the circus, but now will not get the chance", "zh": "那个他本可以在马戏团赢到的麦加鼠玩偶，但现在没机会了"}, {"en": "How much he enjoyed the oatmeal bath", "zh": "他多喜欢那次燕麦片澡"}, {"en": "A plan to sneak out to the circus anyway", "zh": "一个无论如何也要溜去看马戏的计划"}, {"en": "The lion he touched earlier", "zh": "他早先摸过的那头狮子"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Up to his elbows in oatmeal slurry, 'all Morty could think about was that stuffed Mega Mouse. He knew he could win it, but now, he wouldn't even get the chance to try.'", "zh": "麦蒂两只胳膊都陷在燕麦糊里，「满脑子只想着那个麦加鼠玩偶。他知道自己能赢到，可现在连试的机会都没有了。」"}}], "extended": {"prompt": {"en": "Morty breaks a promise to his mother and plays a mean trick, but he tells the truth about it at the end. Think of a time you did something you knew was wrong. Did you tell
