<script>window.BOOK = {"slug": "sprak", "title": "SPRAK!", "titleZh": "SPRAK！传递随机善举", "level": "Q", "genre": "Fiction", "mainSkill": "Author's Purpose and Perspective", "questions": [{"q": {"en": "What does SPRAK stand for in this book?", "zh": "在这本书里，SPRAK 代表什么？"}, "options": [{"en": "Spread Random Acts of Kindness", "zh": "传递随机善举（Spread Random Acts of Kindness）"}, {"en": "Save Rare Animals in Kentucky", "zh": "在肯塔基拯救稀有动物"}, {"en": "Speak Remotely About Knowledge", "zh": "远程讲授知识"}, {"en": "Send Really Awesome Kittens", "zh": "送出生动的猫咪"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book explains SPRAK = Spread Random Acts of Kindness; Coach Jake says 'SPRAK. Spread Random Acts of Kindness. It feels good to think about others.'", "zh": "书里解释 SPRAK = Spread Random Acts of Kindness（传递随机善举）；教练杰克说：「SPRAK，就是传递随机善举。想着别人会让人感觉很好。」"}}, {"q": {"en": "Why does Mark buy a cup of warm cider even though he doesn't really like warm cider?", "zh": "马克其实不太喜欢热苹果酒，为什么还是买了一杯？"}, "options": [{"en": "To help his neighbor Mia, who had no customers at her cider stand", "zh": "为了帮助邻居米娅，她的热苹果酒摊位一个顾客都没有"}, {"en": "Because he was starving and wanted a snack", "zh": "因为他饿坏了想吃零食"}, {"en": "Because his mother made him buy it", "zh": "因为妈妈逼他买的"}, {"en": "Because it was a holiday weekend special", "zh": "因为那是假日周末特价"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Mark noticed Mia wasn't getting much business, went inside for fifty cents from his mom, and bought a cup to support her.", "zh": "马克注意到米娅的生意很差，回家向妈妈要了五十分钱，买了一杯来支持她。"}}, {"q": {"en": "What kind act does Coach Jake do for Mark's grandma at the soccer game?", "zh": "在足球比赛现场，教练杰克为马克的奶奶做了什么善事？"}, "options": [{"en": "He dashes to his car and puts a plaid wool blanket on her lap because she is shivering", "zh": "他跑向车里，拿一条格子羊毛毯盖在奶奶腿上，因为她一直在发抖"}, {"en": "He buys her a cup of warm cider", "zh": "他给她买了一杯热苹果酒"}, {"en": "He gives her his soccer ball", "zh": "他把足球送给她"}, {"en": "He walks her home", "zh": "他送她回家"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Grandma is shivering, so Coach Jake runs to his car and returns with a plaid wool blanket for her lap.", "zh": "奶奶在发抖，于是教练杰克跑向车里，拿回一条格子羊毛毯盖在她腿上。"}}, {"q": {"en": "From what point of view is the SPRAK! book told?", "zh": "SPRAK！这本书是用什么视角（人称）叙述的？"}, "options": [{"en": "Third-person — a narrator describes what the characters think and do", "zh": "第三人称——由叙述者描述人物的想法和行为"}, {"en": "First-person — Mark tells it as 'I'", "zh": "第一人称——由马克以「我」讲述"}, {"en": "Second-person — the reader is addressed as 'you'", "zh": "第二人称——以「你」称呼读者"}, {"en": "It is written as a play script", "zh": "它是剧本形式"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The stories use a narrator who describes characters from outside (e.g., 'Mia, still beaming, thought for a moment'), which is third-person.", "zh": "故事由外部叙述者描述人物（如「米娅仍挂着笑容，想了一会儿」），属于第三人称。"}}, {"q": {"en": "In the glossary, what does 'furtively' mean, and how is it shown in the story?", "zh": "在词汇表里，「furtively」是什么意思？在故事里是如何体现的？"}, "options": [{"en": "Slyly or sneakily — Duane slips a couple dollars into Rosaria's hand so others won't notice", "zh": "偷偷地、鬼鬼祟祟地——杜安悄悄把几美元塞进罗莎莉亚手里，不让别人看见"}, {"en": "Loudly and proudly", "zh": "大声而骄傲地"}, {"en": "Slowly and carefully", "zh": "缓慢而小心地"}, {"en": "Happily and openly", "zh": "开心而公开地"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines furtively as 'slyly or sneakily,' and Duane 'furtively slipped a couple dollars into Rosaria's hand' to help her buy a snack.", "zh": "词汇表把 furtively 定义为「偷偷地、鬼鬼祟祟地」，杜安正是「悄悄把几美元塞进罗莎莉亚手里」帮她买零食。"}}, {"q": {"en": "What does the Spanish word 'chiquitas' (in the glossary) tell readers about Rosaria's family?", "zh": "词汇表里的西班牙语词「chiquitas」向读者透露了罗莎莉亚一家什么信息？"}, "options": [{"en": "It means 'little girls,' showing the family speaks Spanish at home", "zh": "意思是「小女孩」，说明这家人家里说西班牙语"}, {"en": "It means 'big boys'", "zh": "意思是「大男孩」"}, {"en": "It is the name of their cat", "zh": "那是他们猫的名字"}, {"en": "It means 'pancakes'", "zh": "意思是「煎饼」"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary says chiquitas (Spanish) means 'little girls'; Rosaria's mother calls her daughters 'my chiquitas,' showing their Spanish heritage.", "zh": "词汇表指出 chiquitas（西班牙语）意为「小女孩」；罗莎莉亚的妈妈称女儿们为「我的 chiquitas」，体现她们的西班牙语背景。"}}, {"q": {"en": "How does one act of kindness in the book lead to another?", "zh": "书中一个善举是如何促成另一个善举的？"}, "options": [{"en": "The woman's tip to volunteer Duane lets him later slip money to his friend Rosaria for a snack", "zh": "那位女士给志愿者杜安的小费，让杜安后来能把钱悄悄塞给朋友罗莎莉亚买零食"}, {"en": "Mark's soccer practice leads Mia to sell more cider", "zh": "马克练球让米娅卖出更多苹果酒"}, {"en": "The lost kitten teaches Anna to play guitar", "zh": "走失的小猫教会了安娜弹吉他"}, {"en": "The blanket helps Coach Jake win the game", "zh": "毯子帮教练杰克赢了比赛"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Duane receives a tip at the animal rescue center, then uses that money to secretly help his friend Rosaria buy popcorn and cocoa — one kind act enabling the next.", "zh": "杜安在动物救助中心收到小费，随后用那笔钱悄悄帮朋友罗莎莉亚买爆米花和热可可——一个善举促成了下一个。"}}, {"q": {"en": "How does Coach Jake's own behavior connect to the book's title, SPRAK?", "zh": "教练杰克自己的行为与书名 SPRAK 有什么联系？"}, "options": [{"en": "He regularly SPRAKs (helped a crying kid with a pretzel, gave a dog water), then explains the idea to Mark", "zh": "他经常做随机善举（逗哭着的小男孩、给狗水喝），随后向马克解释了这一理念"}, {"en": "He coaches the team to always win", "zh": "他执教球队只为常胜"}, {"en": "He sells cider on weekends", "zh": "他周末卖苹果酒"}, {"en": "He writes the book's glossary", "zh": "他写了书的词汇表"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Coach Jake reminds Mark that he already SPRAKs often (made a kid laugh over a dropped pretzel, gave a thirsty dog water), showing the title in action.", "zh": "教练杰克提醒马克，他自己就经常做善举（让掉了椒盐卷饼哭泣的孩子破涕为笑、给口渴的狗水喝），把书名落到了行动上。"}}, {"q": {"en": "What is the author's main message in SPRAK!?", "zh": "SPRAK！这本书的作者想传达的主要信息是什么？"}, "options": [{"en": "That small, random acts of kindness make the world better and feel good to do", "zh": "小小的随机善举能让世界更美好，而且做起来让人感觉很好"}, {"en": "That you must be famous to help others", "zh": "必须成名才能帮助别人"}, {"en": "That winning soccer games is the most important thing", "zh": "赢足球比赛是最重要的事"}, {"en": "That money is the only way to be kind", "zh": "钱是表达善意唯一的方式"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The whole book shows characters doing small kind acts and ends with SPRAK = Spread Random Acts of Kindness, encouraging readers to think about others.", "zh": "全书展示人物做小小的善举，结尾点明 SPRAK = 传递随机善举，鼓励读者去关心他人。"}}, {"q": {"en": "Why does the author tell the story through several short, separate kindness scenes instead of one long plot?", "zh": "作者为什么用几个独立的小善举场景来讲述，而不是一条长篇情节？"}, "options": [{"en": "To show that random acts of kindness can happen anywhere, to anyone, in everyday life", "zh": "为了说明随机善举可以在日常生活的任何地方、对任何人发生"}, {"en": "To make the book as long as possible", "zh": "为了把书凑得越长越好"}, {"en": "To focus only on soccer players", "zh": "为了只写足球运动员"}, {"en": "To teach how to run a business", "zh": "为了教人如何做生意"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "By linking short scenes — a cider stand, a sweater donation, a lost kitten, a tip, a snack, a song, a letter, a blanket — the author shows many everyday ways to be kind.", "zh": "通过串联一个个小场景——苹果酒摊、捐毛衣、走失的小猫、小费、零食、歌曲、信、毯子——作者展示了日常生活中许多表达善意的方式。"}}], "extended": {"prompt": {"en": "In the book, characters do small kind things for others — buying cider, donating a sweater, helping a kitten, sharing a snack, giving a blanket. Think of a random act of kindness you have done or seen. What did you do or notice, and how did it make you or the other person feel? Why do you think small kind acts matter?", "zh": "书里的人物都为别人做了小小的善事——买苹果酒、捐毛衣、救助小猫、分享零食、送上毯子。想一想你做过的或见过的「随机善举」。你做了什么或注意到了什么？这让你或对方有什么感受？为什么你认为小小的善举很重要？"}, "guidance": {"en": ["Mark buys cider to support Mia when she has no customers, and Coach Jake gives Grandma a blanket when she shivers (p. 4, 17).", "Duane uses his tip to help Rosaria, and Rosaria surprises Anna with a guitar concert (p. 12, 13).", "A good answer describes a real kind act and explains how it felt, showing why small kindnesses matter."], "zh": ["马克在米娅没顾客时买苹果酒支持她，教练杰克在奶奶发抖时送她毯子（第4、17页）。", "杜安用收到的小费帮罗莎莉亚，罗莎莉亚用吉他演奏给安娜一个惊喜（第12、13页）。", "好的回答会描述一件真实的善事，并说明感受，体现小小善举的意义。"]}}};</script>
