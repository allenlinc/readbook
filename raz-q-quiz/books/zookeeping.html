: "杰夫说他从「世界鸟类馆」做起，「后来调到非洲动物区，在那里已经干了 17 年」。"}}, {"q": {"en": "About how much does a giraffe weigh, according to the book?", "zh": "根据这本书，一只长颈鹿大约有多重？"}, "options": [{"en": "1,500 to 2,500 pounds (680 to 1,134 kg)", "zh": "1,500 到 2,500 磅（680 到 1,134 公斤）"}, {"en": "50 to 100 pounds", "zh": "50 到 100 磅"}, {"en": "500 to 700 pounds", "zh": "500 到 700 磅"}, {"en": "5,000 to 6,000 pounds", "zh": "5,000 到 6,000 磅"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Jeff says, 'A giraffe weighs 1,500 to 2,500 pounds (680 to 1,134 kilograms), depending on whether it's male or female.'", "zh": "杰夫说：「一只长颈鹿重 1,500 到 2,500 磅（680 到 1,134 公斤），取决于它是公是母。」"}}, {"q": {"en": "What are 'mixed species exhibits' at Jeff's zoo?", "zh": "在杰夫工作的动物园里，「混种展示区」(mixed species exhibits) 是什么？"}, "options": [{"en": "Yards where birds and mammals that are safe together live in the same space", "zh": "把能安全共处的鸟类和哺乳动物养在同一片场地里的展区"}, {"en": "Exhibits that contain only one animal", "zh": "只养一种动物的展区"}, {"en": "Exhibits with fake model animals", "zh": "摆放假动物模型的展区"}, {"en": "Exhibits that are completely underwater", "zh": "完全在水下的展区"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Jeff says, 'We run mixed species exhibits, where we have birds and mammals that are safe together in the same yard.'", "zh": "杰夫说：「我们经营混种展示区，把能安全共处的鸟类和哺乳动物放在同一片场地里。」"}}, {"q": {"en": "In the book, what does zoo 'furniture' mean?", "zh": "在书中，动物园的「furniture」（家具）指的是什么？"}, "options": [{"en": "Natural objects like rocks and logs added to exhibits for the animals", "zh": "添加到展区里、给动物用的自然物件，比如石头和原木"}, {"en": "Real chairs and tables for the keepers", "zh": "给饲养员坐的真椅子和桌子"}, {"en": "Beds where the zookeepers sleep", "zh": "饲养员睡觉的床"}, {"en": "Vending machines for visitors", "zh": "给游客用的自动售货机"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Jeff says exhibit yards 'include what we call \"furniture,\" like rocks and logs' to let animals show natural behaviors and avoid boredom.", "zh": "杰夫说展区里「有我们所谓的『家具』，比如石头和原木」，好让动物表现出自然行为、不至于无聊。"}}, {"q": {"en": "How does Jeff manage a group of giraffes?", "zh": "杰夫是怎样管理一群长颈鹿的？"}, "options": [{"en": "As herd animals, they follow a set routine; he uses his voice and sometimes a long stick to keep a safe distance", "zh": "它们是群居动物，会遵循固定的流程；他用声音指挥，有时用长棍保持安全距离"}, {"en": "He trains them using only food treats", "zh": "他只用食物奖励来训练它们"}, {"en": "He separates every giraffe from the others", "zh": "他把每只长颈鹿都分开单独关"}, {"en": "He uses loud music to move them", "zh": "他用很吵的音乐来驱赶它们"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Jeff explains hoofed stock 'do everything as a group' and follow a routine. 'We give orders with our voices, and sometimes we'll use a long stick to tap them; it lets us keep a safe distance.'", "zh": "杰夫解释，有蹄动物「做什么都成群结队」、会遵循固定流程。「我们用声音下命令，有时用长棍轻点它们；这样能保持安全距离。」"}}, {"q": {"en": "Why does Jeff prefer mother-reared animals over hand-raised ones?", "zh": "为什么杰夫更喜欢由母兽带大的动物，而不是人工喂养大的？"}, "options": [{"en": "Because mother-reared animals learn to behave like their own species, while hand-raised ones may forget", "zh": "因为由母兽带大的动物会学会像自己的同类那样行事，而人工喂养的可能会忘了"}, {"en": "Because mother-reared animals are cheaper to keep", "zh": "因为由母兽带大的饲养成本更低"}, {"en": "Because hand-raised animals are dangerous to humans", "zh": "因为人工喂养的动物对人类很危险"}, {"en": "Because the mothers do not care for their young", "zh": "因为母兽根本不照顾幼崽"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Jeff says, 'The mother-reared animal is better because it knows how to behave like the animal it is. Animals that are human-oriented forget to act like a zebra or a giraffe.' They only hand-raise if absolutely necessary.", "zh": "杰夫说：「由母兽带大的更好，因为它知道自己该怎样像同类那样行事。被人类带大的动物会忘了怎么像斑马或长颈鹿。」只有在万不得已时才人工喂养。"}}, {"q": {"en": "Why does the author present this book as an interview with Jeff Polcen?", "zh": "作者为什么要把这本书写成对杰夫·波尔森的采访？"}, "options": [{"en": "To let a real zookeeper share his firsthand experiences and expertise with readers", "zh": "为了让一位真实的饲养员向读者讲述他的亲身经历与专业知识"}, {"en": "To tell a made-up fictional story", "zh": "为了编一个虚构的故事"}, {"en": "To sell tickets to the zoo", "zh": "为了推销动物园门票"}, {"en": "To teach readers how to draw animals", "zh": "为了教读者画动物"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book is 'An Interview with Jeff Polcen / Conducted by Kathie Lester.' Presenting it as an interview lets the expert's real voice and experience teach readers about the job.", "zh": "这本书是「对杰夫·波尔森的采访／由凯西·莱斯特进行」。以采访形式呈现，能让专家真实的声音和经验来向读者介绍这份工作。"}}, {"q": {"en": "How does Jeff feel about his job as a zookeeper?", "zh": "杰夫对自己饲养员的工作感受如何？"}, "options": [{"en": "He finds it satisfying, interesting, and challenging, and wants to stay for the rest of his working life", "zh": "他觉得这份工作令人满足、有趣又充满挑战，并想干上一辈子"}, {"en": "He is bored and wants to quit", "zh": "他觉得无聊，想辞职"}, {"en": "He thinks the job is much too easy", "zh": "他觉得这工作太简单了"}, {"en": "He dislikes the animals he cares for", "zh": "他不喜欢自己照料的动物"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Jeff says, 'I would say so' about staying. 'I find caring for these animals very satisfying, interesting, and challenging,' with 'a lot I want to accomplish.'", "zh": "杰夫对是否留任说「可以这么说」。他「觉得照料这些动物非常满足、有趣又充满挑战」，还有「很多想完成的事」。"}}], "extended": {"prompt": {"en": "Jeff says observation is the most important skill and that every animal has its own personality. Think of an animal you know—a pet, a farm animal, or one at a zoo. What have you observed about how it behaves or what it needs? Why is careful observation important when caring for living things?", "zh": "杰夫说观察力是最重要的技能，而且每只动物都有自己的个性。想一想你熟悉的一种动物——宠物、农场动物，或动物园里的。你观察到它怎样行为、需要什么？为什么在照料生命时，仔细的观察很重要？"}, "guidance": {"en": ["Jeff says 'Observation is the most important skill' to notice sickness, birth, or conflict in a group (p. 4).", "He notes 'All the animals have different personalities' and that is where observational skills help keepers
