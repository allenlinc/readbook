g was bigger than me' (p. 9).", "On April 15, 1947, he became the first African American in MLB and the Dodgers 'earned a victory... over prejudice against African Americans' (p. 11).", "A good answer shows understanding that personal self-control can help achieve a larger social good."], "zh": ["里基要求罗宾逊不回应偏见；罗宾逊同意，因为「整件事比我个人更大」（第9页）。", "1947年4月15日，他成为MLB首位非裔美国人，道奇队「赢得了一场……战胜对非裔美国人的偏见」的胜利（第11页）。", "好的回答要体现出：个人的自制也能促成更大的社会善意。"]}}};</script>
