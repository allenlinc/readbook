<script>window.BOOK = {"slug": "walking-in-roman-footsteps", "title": "Walking in Roman Footsteps", "titleZh": "追随罗马人的足迹", "level": "Q", "genre": "Fiction", "mainSkill": "Integration of Knowledge and Ideas", "questions": [{"q": {"en": "Where do Andria and Rosa live, and where did their ancestors come from?", "zh": "安德莉亚(Andria)和罗莎(Rosa)住在哪里？她们的祖先又来自哪里？"}, "options": [{"en": "They live in New York City; their great-grandparents and earlier ancestors lived in Italy", "zh": "她们住在纽约市；曾祖父母及更早的祖先住在意大利"}, {"en": "They live in Rome; their ancestors came from China", "zh": "她们住在罗马；祖先来自中国"}, {"en": "They live in London; their ancestors came from France", "zh": "她们住在伦敦；祖先来自法国"}, {"en": "They live in Egypt; their ancestors came from Rome", "zh": "她们住在埃及；祖先来自罗马"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says 'Andria and Rosa live in New York City with their parents. They know that their great-grandparents and earlier ancestors lived in Italy,' so the family visits Rome.", "zh": "书里说「安德莉亚和罗莎和父母住在纽约市。她们知道曾祖父母及更早的祖先住在意大利」，所以全家去了罗马。"}}, {"q": {"en": "On the city tour, which three ancient ruins do the girls see that were built over 2,600 years ago?", "zh": "在城市观光中，女孩们看到了哪三处建于2600多年前的古代遗迹？"}, "options": [{"en": "The Colosseum, the Roman Forum, and the Teatro Marcello", "zh": "斗兽场(Colosseum)、罗马广场(Roman Forum)和马尔切洛剧院(Teatro Marcello)"}, {"en": "The Eiffel Tower, the Louvre, and Notre Dame", "zh": "埃菲尔铁塔、卢浮宫和巴黎圣母院"}, {"en": "The Pyramids, the Sphinx, and the Nile", "zh": "金字塔、狮身人面像和尼罗河"}, {"en": "The Great Wall, the Forbidden City, and the Temple of Heaven", "zh": "长城、故宫和天坛"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says the family learns about 'places built over 2,600 years ago. Among the ancient ruins they see are those of the Colosseum, the Roman Forum, and the Teatro Marcello.'", "zh": "书里说一家人了解到「建于2600多年前的古迹。她们看到的古代遗迹包括斗兽场、罗马广场和马尔切洛剧院」。"}}, {"q": {"en": "How are the sisters transported back in time to ancient Rome?", "zh": "姐妹俩是怎样被带回古罗马的？"}, "options": [{"en": "A dancing gypsy woman draws them into a dance; as they whirl, everything blurs and the crowd changes into ancient clothes", "zh": "一位跳舞的吉普赛女人把她们拉进舞里；旋转时一切模糊，人群换成了古代服饰"}, {"en": "They fall asleep on the airplane", "zh": "她们在飞机上睡着了"}, {"en": "They read a magic book", "zh": "她们读了一本魔法书"}, {"en": "They touch a statue in a museum", "zh": "她们摸了博物馆里一座雕像"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "A dancer 'draws Andria and Rosa into the dance.' As the performers whirl them, 'everything around them blurs' and the crowd is 'now dressed in ancient-looking clothes' with 'horses and chariots' instead of cars.", "zh": "一位舞者「把安德莉亚和罗莎拉进舞里」。表演者带着她们旋转时，「周围一切都模糊了」，人群「换上了古代服饰」，街上出现「马和战车」而不是汽车。"}}, {"q": {"en": "In the glossary, what does 'piazza' mean?", "zh": "在词汇表里，「piazza」是什么意思？"}, "options": [{"en": "An Italian word for plaza, or a public area", "zh": "意大利语里指广场或公共区域"}, {"en": "A type of Italian sandwich", "zh": "一种意大利三明治"}, {"en": "A frozen dessert", "zh": "一种冷冻甜点"}, {"en": "An ancient temple", "zh": "一座古老的神庙"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'piazza' as 'Italian word for plaza, or a public area' — the family stops in the Piazza Navona for lunch.", "zh": "词汇表把 piazza 定义为「意大利语里指广场或公共区域」——一家人在纳沃纳广场(Piazza Navona)停下吃午饭。"}}, {"q": {"en": "In the glossary, what does 'ancient' mean?", "zh": "在词汇表里，「ancient」是什么意思？"}, "options": [{"en": "Very old", "zh": "非常古老的"}, {"en": "Brand new", "zh": "全新的"}, {"en": "Very small", "zh": "非常小的"}, {"en": "Brightly colored", "zh": "色彩鲜艳的"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines 'ancient' as 'very old' — used for the ruins, clothes, pillars, and buildings the girls see in the past (p. 7).", "zh": "词汇表把 ancient 定义为「非常古老的」——用来描述女孩们在过去看到的遗迹、服饰、石柱和建筑（第7页）。"}}, {"q": {"en": "What does Rosa remember the tour guide said about the Colosseum's marble?", "zh": "罗莎记得导游说过斗兽场的大理石怎样了？"}, "options": [{"en": "Marble once covered the Colosseum, and when St. Peter's Basilica was built, some of that marble was used for its floors", "zh": "斗兽场曾覆盖大理石；建圣彼得大教堂时，部分大理石被用在了它的地板上"}, {"en": "The marble was shipped to Egypt to build pyramids", "zh": "大理石被运到埃及建金字塔"}, {"en": "The marble was painted bright pink", "zh": "大理石被漆成了亮粉色"}, {"en": "The marble was sold to pay for the tour", "zh": "大理石被卖掉来付观光费用"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Rosa remembers the guide explaining 'marble once covered the walls, steps, and seats of the Colosseum,' and that when St. Peter's Basilica was built, 'some of the Colosseum's marble was used to cover the floors' — new built on old.", "zh": "罗莎记得导游说「斗兽场的墙、台阶和座位曾覆盖大理石」，建圣彼得大教堂时「部分斗兽场的大理石被用来铺地板」——新的建在旧的之上。"}}, {"q": {"en": "At the Roman Forum, why can't Andria find the ancient stone road she walked on the day before?", "zh": "在罗马广场，安德莉亚为什么找不到前一天走过的那条石板古道？"}, "options": [{"en": "Because centuries of dirt covered it, and Titus built the Arch of Titus on top of that dirt (new on old)", "zh": "因为积了几个世纪的尘土把它盖住，而提图斯拱门就建在那层尘土之上（新的建在旧的上面）"}, {"en": "Because it was carried away by a flood", "zh": "因为它被洪水冲走了"}, {"en": "Because it was hidden under the Colosseum", "zh": "因为它藏在斗兽场下面"}, {"en": "Because the girls were dreaming", "zh": "因为女孩们在做梦"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Andria realizes the street 'was covered by centuries of dirt! Augustus Caesar had built the ancient street in 6 BC. Almost a hundred years later, Titus built the arch on top of the dirt' — Romans building on their past.", "zh": "安德莉亚明白那条路「被几个世纪的尘土盖住了！奥古斯都·凯撒在公元前6年修了古道。近百年后，提图斯把拱门建在那层尘土之上」——罗马人在旧迹上建新物。"}}, {"q": {"en": "What is the main lesson the gypsy woman — and the book — want readers to learn?", "zh": "吉普赛女人（以及这本书）最想让读者学到的主要道理是什么？"}, "options": [{"en": "Rome was built 'layer upon layer, new upon old'; without the past, the new would have nothing to stand on", "zh": "罗马是一层叠一层、「新叠在旧上」建成的；没有过去，新事物就无处立足"}, {"en": "Old things should always be thrown away", "zh": "旧东西总该被扔掉"}, {"en": "Only kings can build cities", "zh": "只有国王才能建城"}, {"en": "Time travel is the best way to learn history", "zh": "时间旅行是学历史最好的方式"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The dancer tells the girls Rome was built 'layer upon layer, new upon old,' and at the end they learn 'without the past, the new would have nothing to stand on. In many ways, the new depends on the old.'", "zh": "舞者告诉女孩们，罗马是「一层叠一层、新叠在旧上」建成的；结尾她们明白「没有过去，新事物就无处立足。新往往在依靠着旧」。"}}, {"q": {"en": "Why does the dancer take the girls back in time?", "zh": "舞者为什么要把女孩们带回过去？"}, "options": [{"en": "To teach them how Rome was built (new upon old) and to help them learn about their family's past", "zh": "为了让她们懂得罗马是怎样建成的（新叠旧），并帮她们了解家族的过去"}, {"en": "To scare them away from Italy", "zh": "为了把她们吓离意大利"}, {"en": "To find a lost gold coin", "zh": "为了找回一枚丢失的金币"}, {"en": "To teach them how to dance", "zh": "为了教她们跳舞"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The dancer says, 'You have been taken back in time to learn how Rome was built — layer upon layer, new upon old,' connecting the trip to both history and the family's Italian roots.", "zh": "舞者说：「你们被带回过去，是为了学习罗马是怎样建成的——一层叠一层、新叠在旧上」，把旅行同时联系到历史和家族的意大利根源。"}}, {"q": {"en": "Each time the girls discover a place where the new is built on or around the old, what surprise do they receive?", "zh": "每当女孩们发现一处「新建筑在旧迹之上或之旁」的地方，会得到什么惊喜？"}, "options": [{"en": "A gold coin appears in their pocket (three coins in all)", "zh": "口袋里出现一枚金币（一共三枚）"}, {"en": "A magic map appears", "zh": "出现一张魔法地图"}, {"en": "They turn back into the present at once", "zh": "她们立刻回到现在"}, {"en": "They win a free gelato", "zh": "她们赢得一份免费意式冰淇淋"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The dancer said 'each time you do, you will get a surprise.' Rosa finds a gold coin at the Colosseum, Andria at the Forum, and a third coin rolls to them at Teatro Marcello — three coins total.", "zh": "舞者说「每做到一次，就会得到一个惊喜」。罗莎在斗兽场找到一枚金币，安德莉亚在广场找到一枚，马尔切洛剧院又滚来第三枚——总共三枚。"}}], "extended": {"prompt": {"en": "The girls learn that Rome was built 'layer upon layer, new upon old,' and that the new depends on the old. Think of an old building, monument, or tradition in your own town or family. Is something new built on or around it? Or is there an old story from your family's past (like the sisters' Italian ancestors) that shapes who you are? Explain the connection between the old and the new.", "zh": "女孩们学到，罗马是「一层叠一层、新叠在旧上」建成的，新事物依靠着旧事物。想想你自己的城市或家庭里一座老建筑、古迹或老传统。有没有什么新东西建在它之上或之旁？或者你家族过去有没有一段老故事（像两姐妹的意大利祖先）塑造了今天的你？说说旧与新之间的联系。"}, "guidance": {"en": ["The dancer says Rome was built 'layer upon layer, new upon old' and each discovery gives a surprise (p. 8).", "At the Forum, the ancient street was buried by dirt and the Arch of Titus built on top of it (p. 11-12).", "The book concludes: 'without the past, the new would have nothing to stand on... the new depends on the old' (p. 14-15).", "A good answer names a real old thing and shows how something new connects to or rests upon it."], "zh": ["舞者说罗马是「一层叠一层、新叠在旧上」建成的，每次发现都有惊喜（第8页）。", "在广场，古道被尘土掩埋，提图斯拱门就建在它之上（第11-12页）。", "书总结道：「没有过去，新事物就无处立足……新往往在依靠着旧」（第14-15页）。", "好的回答要说出一件真实的旧事物，并说明新事物怎样与它相连、或以它为基。"]}}};</script>
