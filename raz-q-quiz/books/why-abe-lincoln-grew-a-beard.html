d the Civil War", "zh": "它结束了南北战争"}, {"en": "It elected Abraham Lincoln", "zh": "它选举了亚伯拉罕·林肯"}, {"en": "It made beards illegal", "zh": "它规定留胡子违法"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The side note says, 'Women struggled for many years to achieve the right to vote. They weren't allowed to vote until 1920, when the 19th Amendment was ratified.' Grace wrote in 1860 that she wished she could vote.", "zh": "旁注写道：「女性奋斗多年才争取到投票权。她们直到 1920 年第十九条修正案批准时才被允许投票。」格雷丝在 1860 年写信说，如果自己是男人就会投他一票。"}}, {"q": {"en": "According to Grace, why would growing a beard help Lincoln become president?", "zh": "根据格雷丝的说法，留胡子为什么会帮林肯当上总统？"}, "options": [{"en": "Because ladies liked whiskers and would push their husbands to vote for him", "zh": "因为女士们喜欢胡子，会去说服丈夫投他"}, {"en": "Because it made him look like a soldier", "zh": "因为那让他看起来像个军人"}, {"en": "Because the law required candidates to have a beard", "zh": "因为法律要求候选人必须留胡子"}, {"en": "Because it scared his opponents away", "zh": "因为那能把对手吓跑"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Grace reasoned that 'all the ladies like whiskers' and would 'tease their husbands to vote for you.' She connected a beard to winning votes, especially from women's influence.", "zh": "格雷丝的逻辑是「所有女士都喜欢胡子」，会「缠着丈夫投你一票」。她把留胡子与赢得选票——尤其是通过女性影响丈夫——联系了起来。"}}, {"q": {"en": "What does the book say about Lincoln and the presidents who came before him?", "zh": "关于林肯和他之前的各位总统，书里是怎么说的？"}, "options": [{"en": "Lincoln was the 16th president and the first to grow a full beard; none of the 15 before him even had a mustache", "zh": "林肯是第 16 任总统，也是第一位留满胡子的；之前的 15 位连八字胡都没有"}, {"en": "He was the very first president of the United States", "zh": "他是美国第一任总统"}, {"en": "All 15 presidents before him had full beards", "zh": "他之前的 15 位总统都留着满脸胡子"}, {"en": "He was the 10th president of the United States", "zh": "他是美国第 10 任总统"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book states Lincoln 'was the first president to grow a full beard. None of the fifteen presidents who came before him even had a mustache.' He was the 16th president.", "zh": "书里说林肯「是第一位留满胡子的总统。在他之前的十五位总统连八字胡都没有。」他是第 16 任总统。"}}, {"q": {"en": "Why does the author tell the story of a child's letter to the president?", "zh": "作者为什么要讲述一个小孩给总统写信的故事？"}, "options": [{"en": "To show that one child's suggestion can influence history, and that letters let ordinary people reach their leaders", "zh": "为了说明一个孩子的一个建议也能影响历史，而且信件能让普通人联系到他们的领袖"}, {"en": "To teach readers how to grow a beard", "zh": "为了教读者怎么留胡子"}, {"en": "To argue that presidents should never listen to children", "zh": "为了论证总统绝不该听孩子的话"}, {"en": "To explain how postage stamps are made", "zh": "为了解释邮票是怎么印出来的"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book frames Grace's letter as 'one such child, one such suggestion, and one of our most famous presidents'—showing how a child's idea reached the president and became part of history.", "zh": "书把格雷丝的信描述成「这样一个孩子、这样一个建议，以及我们最著名的总统之一」——说明一个孩子的想法如何传达到总统耳中，并成了历史的一部分。"}}, {"q": {"en": "Why is there a statue of Lincoln and Grace in Westfield, New York?", "zh": "为什么纽约州韦斯特菲尔德会有一座林肯和格雷丝的雕像？"}, "options": [{"en": "To remember the real meeting between the girl whose letter led to his beard and the president-elect", "zh": "为了纪念那位用信件促成他留胡子的女孩与当选总统之间真实的一次会面"}, {"en": "Because Grace later became president", "zh": "因为格雷丝后来当了总统"}, {"en": "Because Lincoln was born there", "zh": "因为林肯出生在那里"}, {"en": "Because it is where Lincoln died", "zh": "因为那是林肯去世的地方"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "At Lincoln-Bedell Statue Park in Westfield, two bronze statues 'capture the historic meeting' between president-elect Lincoln and Grace Bedell, erected in 1999.", "zh": "在韦斯特菲尔德的林肯-贝德尔雕像公园，两座青铜雕像「定格了当选总统林肯与格雷丝·贝德尔那次历史性的会面」，于 1999 年落成。"}}], "extended": {"prompt": {"en": "Grace, an eleven-year-old, wrote a letter that may have changed history by conv
