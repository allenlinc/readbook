<script>window.BOOK = {"slug": "robin-hood-and-the-king", "title": "Robin Hood and the King", "titleZh": "罗宾汉与国王", "level": "Q", "genre": "Fiction", "mainSkill": "Author's Purpose and Perspective", "questions": [{"q": {"en": "Where did Robin Hood and his Merry Men live, and what did they do?", "zh": "罗宾汉和他的快乐伙伴(Merry Men)住在哪里？他们做些什么？"}, "options": [{"en": "They hid in Sherwood Forest and stole only from the rich to give to the poor", "zh": "他们躲在舍伍德森林(Sherwood Forest)，只劫富济贫"}, {"en": "They lived in the king's castle and protected the rich lords", "zh": "他们住在国王的城堡里，保护富有的领主"}, {"en": "They sailed on the ocean as pirates", "zh": "他们在大海上当海盗"}, {"en": "They worked as farmers in a village", "zh": "他们在一个村子里当农夫"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The story says Robin Hood and his Merry Men 'lived in hiding in Sherwood Forest... they stole only from the rich and gave the money to the poor.'", "zh": "故事说罗宾汉和快乐伙伴「躲在舍伍德森林里……只劫富济贫」。"}}, {"q": {"en": "How did King Richard disguise himself so he could meet Robin Hood?", "zh": "国王理查德(理查德)是怎样伪装自己，才得以见到罗宾汉的？"}, "options": [{"en": "He dressed as a fat abbot with seven followers dressed as friars, carrying gold", "zh": "他扮成一位肥胖的修道院院长，带七个扮成修士的随从，带着金子"}, {"en": "He dressed as a poor beggar with no followers", "zh": "他扮成一个没有随从的穷乞丐"}, {"en": "He dressed as a soldier in full armor", "zh": "他穿上全套盔甲扮成士兵"}, {"en": "He dressed as Robin Hood's mother", "zh": "他扮成罗宾汉的母亲"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "A companion suggested the king 'Put on the robes of a fat abbot' and ride with gold; 'the king and seven of his followers dressed themselves as an abbot and seven friars.'", "zh": "一位随从建议国王「穿上肥胖修道院院长的袍子」带着金子出行；于是「国王和七个随从扮成院长和七名修士」。"}}, {"q": {"en": "What happened when Robin Hood took his turn at the archery match?", "zh": "轮到罗宾汉参加射箭比赛时，发生了什么？"}, "options": [{"en": "His final arrow missed the garland, so he had to take the punishment himself", "zh": "他最后一支箭脱靶没中花环，所以必须自己接受惩罚"}, {"en": "He hit the center with all three arrows and won a prize", "zh": "他三箭全部命中靶心，赢得了奖品"}, {"en": "He refused to shoot at all", "zh": "他干脆拒绝射箭"}, {"en": "He shot the king by accident", "zh": "他不小心射中了国王"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Robin's first two arrows hit, but 'the final arrow he shot was missing some feathers. It flew to one side and struck an inch outside the garland.' He then took his punishment from the guest.", "zh": "罗宾前两箭命中，但「最后一支箭少了些羽毛。它偏到一边，落在花环外一英寸处」。于是他由客人（国王）来施以惩罚。"}}, {"q": {"en": "After revealing himself, what did King Richard offer Robin Hood?", "zh": "表明身份后，国王理查德向罗宾汉提出了什么条件？"}, "options": [{"en": "He would forgive Robin's crimes, have him serve at court, make three men knights, and the rest royal rangers", "zh": "他赦免罗宾的罪行、让他在宫廷效力、封三人为骑士，其余成为皇家护林员"}, {"en": "He would hang Robin Hood for being an outlaw", "zh": "他要把罗宾汉当作绿林好汉绞死"}, {"en": "He would send Robin away to another country", "zh": "他要把罗宾汉流放到别的国家"}, {"en": "He would make Robin a rich lord with land", "zh": "他要让罗宾成为拥有领地的富有的领主"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The king said, 'Come with me to my court and serve me there... I will forgive all your crimes... You shall bring three of your best men to become knights... The rest of your men will be royal rangers.'", "zh": "国王说：「来我的宫廷效力……我会赦免你所有的罪行……你带三名最得力的部下成为骑士……其余的人做皇家护林员。」"}}, {"q": {"en": "In the glossary, what is a “garland” in this story?", "zh": "在这则故事里，词汇表中的「garland」指的是什么？"}, "options": [{"en": "A small group of branches arranged in a circle or semicircle — the archery target", "zh": "一圈或半圆排列的小树枝——也就是射箭的靶子"}, {"en": "A kind of tree that grows in Sherwood Forest", "zh": "舍伍德森林里生长的一种树"}, {"en": "A crown worn by the king", "zh": "国王戴的王冠"}, {"en": "A type of food served at the feast", "zh": "宴席上供应的一类食物"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines a garland as 'a small group of branches arranged in a circle or semicircle' (p. 9) — in the story it is the tiny target of leaves and flowers hung from a stake.", "zh": "词汇表把 garland 定义为「一圈或半圆排列的小树枝」（第9页）——在故事里，它是挂在木桩上、由叶子和花做成的小小靶子。"}}, {"q": {"en": "In the glossary, what does “corrupt” mean, and who does Robin think the corrupt ones are?", "zh": "在词汇表里，「corrupt」(腐败的) 是什么意思？罗宾认为腐败的是哪些人？"}, "options": [{"en": "Dishonest in order to gain something; Robin thinks the corrupt lords are the real thieves", "zh": "为了获利而不诚实；罗宾认为那些腐败的领主才是真正的窃贼"}, {"en": "Brave and honest; Robin admires the corrupt lords", "zh": "勇敢而诚实；罗宾敬重那些腐败的领主"}, {"en": "Very poor; Robin feels sorry for them", "zh": "非常贫穷；罗宾为他们感到难过"}, {"en": "Good at archery; Robin wants to learn from them", "zh": "擅长射箭；罗宾想向他们学习"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines corrupt as 'dishonest in order to gain something' (p. 4). The story says Robin 'thought the corrupt lords were the real thieves' who ruled unjustly.", "zh": "词汇表把 corrupt 定义为「为了获利而不诚实」（第4页）。故事里说罗宾「认为那些腐败的领主才是真正的窃贼」，他们不公正地统治着土地。"}}, {"q": {"en": "After taking the king's gold pouch, why did Robin return one-third of it to the pretend abbot?", "zh": "拿走国王的金袋后，罗宾为什么把其中三分之一还给假扮的院长？"}, "options": [{"en": "Because he never left any man in need", "zh": "因为他从不让任何人陷入窘境（不愿让任何人有所欠缺）"}, {"en": "Because the abbot threatened to call the king", "zh": "因为院长威胁要去叫国王"}, {"en": "Because the gold was fake", "zh": "因为那些金子是假的"}, {"en": "Because he was afraid of the churchmen", "zh": "因为他害怕那些教会人士"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says Robin 'returned one-third of the gold to the pretend abbot because he never left any man in need.'", "zh": "书里说罗宾「把三分之一的金子还给了假扮的院长，因为他从不让任何人有所欠缺」。"}}, {"q": {"en": "Why did Robin choose the pretend abbot to give him his punishment, and what surprised him?", "zh": "罗宾为什么选择让假院长来惩罚自己？结果什么让他大吃一惊？"}, "options": [{"en": "He thought a churchman's arms would be soft, but the king's thick, strong arm knocked him down", "zh": "他以为教会人士的手臂柔软，可国王粗壮有力的手臂把他打翻在地"}, {"en": "He knew it was the king all along and wanted to impress him", "zh": "他从头就知道那是国王，想给国王留个好印象"}, {"en": "He wanted the friars to laugh at him", "zh": "他想让修士们笑话自己"}, {"en": "He was too tired to punish himself", "zh": "他太累了，懒得自己惩罚自己"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Robin 'did not like the thought of being knocked down in front of his band' and thought 'the arms of a churchman would be soft.' But the king 'bared an arm so thick' and struck 'a mighty blow. Down went Robin Hood.'", "zh": "罗宾「不想当着部下的面被击倒」，又以为「教会人士的手臂应该柔软」。但国王「露出一条粗壮的手臂」，给了「重重一击。罗宾汉应声倒地」。"}}, {"q": {"en": "Why did King Richard disguise himself instead of simply announcing a royal visit?", "zh": "国王理查德为什么不直接宣布御驾亲临，而要伪装自己？"}, "options": [{"en": "He feared that if Robin heard the king was coming, he would run and hide deep in the forest", "zh": "他怕罗宾一听说国王来了，就会跑进森林深处躲起来"}, {"en": "He wanted to steal from Robin Hood", "zh": "他想去抢罗宾汉的东西"}, {"en": "He was ashamed to be king", "zh": "他为自己是国王而感到羞耻"}, {"en": "He liked wearing robes and friars' clothes", "zh": "他喜欢穿长袍和修士的衣服"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The king said, 'if they heard the king was coming, they would think that I wanted only to arrest them. They would run and hide deep in the forest, and I would never see them.'", "zh": "国王说：「他们若听说国王来了，会以为我只想抓他们。他们会跑进森林深处躲起来，我就永远见不到他们了。」"}}, {"q": {"en": "What is the main message or theme of this folktale?", "zh": "这则民间故事的主要寓意或主题是什麽？"}, "options": [{"en": "Even an outlaw can be loyal and honorable, and true justice means helping the common people", "zh": "即使是绿林好汉也可以忠诚而有荣誉感，而真正的公正在于帮助普通百姓"}, {"en": "Kings are always cruel and should never be trusted", "zh": "国王总是残忍的，绝不可信任"}, {"en": "Rich people deserve to be robbed no matter what", "zh": "有钱人不管怎样都该被抢"}, {"en": "Archery is more important than being kind", "zh": "射箭比善良更重要"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The tale shows Robin was 'always... loyal to his king' and believed 'helping the poor people of England was the greatest service he could perform,' and in the end the common folk 'never had to suffer under the rule of wicked lords again.'", "zh": "故事表明罗宾「始终……忠于国王」，并相信「帮助英格兰的穷人就是为国王尽最大本分」；结局里普通人「再也不用在邪恶领主统治下受苦」。"}}], "extended": {"prompt": {"en": "Robin Hood steals from the rich and gives to the poor because he believes the corrupt lords are the real thieves. Do you think it is ever right to break a rule or law in order to help others? Use the story and an example from your own life or the news to explain your answer.", "zh": "罗宾汉劫富济贫，是因为他认为腐败的领主才是真正的窃贼。你觉得，为了帮助别人，打破规则或法律是否 ever 是对的？请结合故事，以及你生活中或新闻里的一个例子，来说明你的看法。"}, "guidance": {"en": ["Robin 'stole only from the rich and gave the money to the poor' because he thought the lords were the real thieves (p. 4).", "King Richard still respected Robin as 'this outlaw who fought to protect the common people' (p. 4).", "A good answer takes a clear side and supports it with the story plus a real example, weighing fairness against following rules."], "zh": ["罗宾「只劫富济贫」，因为他认为领主才是真正的窃贼（第4页）。", "理查德国王仍然敬重罗宾这位「为保护百姓而战的出林好汉」（第4页）。", "好的回答要有明确立场，并用故事加一个真实例子来支撑，权衡「公平」与「遵守规则」。"]}}};</script>
