<script>window.BOOK = {"slug": "the-buffalo-soldiers", "title": "The Buffalo Soldiers", "titleZh": "水牛兵", "level": "Q", "genre": "Nonfiction", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "How many Black soldiers fought for the North during the Civil War, according to the book?", "zh": "根据这本书，内战期间有多少黑人士兵为北方作战？"}, "options": [{"en": "More than 170,000", "zh": "超过 17 万"}, {"en": "About 17,000", "zh": "约 1.7 万"}, {"en": "Fewer than 1,700", "zh": "不到 1,700"}, {"en": "Over 1.7 million", "zh": "超过 170 万"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book states that during the Civil War (1861-1865), 「more than 170,000 black soldiers fought for the North to end slavery in the South.」", "zh": "书里说，内战（1861-1865）期间「超过 17 万黑人士兵为北方作战，以结束南方的奴隶制」。"}}, {"q": {"en": "In 1866, how did Black soldiers' pay compare to White soldiers' pay?", "zh": "1866 年，黑人士兵的薪水和白人士兵相比如何？"}, "options": [{"en": "They were paid the same — $13 per month", "zh": "薪水相同——每月 13 美元"}, {"en": "Black soldiers were paid less", "zh": "黑人士兵薪水更少"}, {"en": "Black soldiers were not paid at all", "zh": "黑人士兵根本没薪水"}, {"en": "Black soldiers were paid more", "zh": "黑人士兵薪水更多"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "In 1866 the army paid black soldiers the same as white soldiers—$13 per month; it also taught those who couldn't read or write to do so.", "zh": "1866 年，军队付给黑人士兵和白人士兵相同的薪水——每月 13 美元；还教那些不会读写的士兵识字。"}}, {"q": {"en": "Where did the nickname 'Buffalo Soldiers' come from?", "zh": "「水牛兵」(Buffalo Soldiers) 这个绰号是怎么来的？"}, "options": [{"en": "Native Americans gave it to them (some say the Comanches or Cheyennes)", "zh": "是美洲原住民起的（有人说是科曼奇人或夏延人）"}, {"en": "They named themselves after the buffalo they herded", "zh": "他们以自己放牧的野牛命名"}, {"en": "The U.S. government officially gave them the name", "zh": "是美国政府正式取的名字"}, {"en": "They were named for the buffalo coats the army issued them", "zh": "因军队发的野牛皮大衣而得名"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says the name 「came from Native Americans. Some say Comanches gave the 10th the name, while others say it was the Cheyennes,」 and all the black regiments soon adopted it.", "zh": "书里说这个名字「来自美洲原住民。有人说科曼奇人给第10团起了这名，也有说是夏延人」，而所有黑人军团很快都采用了它。"}}, {"q": {"en": "In the glossary, what is 'discrimination'?", "zh": "在词汇表里，「歧视」(discrimination) 是什么？"}, "options": [{"en": "Unfair treatment of a person or group based on race, age, religion, etc.", "zh": "基于种族、年龄、宗教等差异，对个人或群体不公平的对待"}, {"en": "The act of serving in the army", "zh": "在军队服役的行为"}, {"en": "Land set aside by the government for Native Americans", "zh": "政府划给原住民的土地"}, {"en": "A military unit of two or more large groups", "zh": "由两个以上大队组成的军事单位"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines discrimination as 「the unfair treatment of a person or group based on gender, race, age, religion, or other differences」 (p. 5).", "zh": "词汇表把歧视定义为「基于性别、种族、年龄、宗教或其他差异，对个人或群体不公平的对待」（第5页）。"}}, {"q": {"en": "According to the book's note, what is a cavalry?", "zh": "根据书中的补充说明，「骑兵」(cavalry) 是什么？"}, "options": [{"en": "In the past, soldiers who rode horses (today, soldiers in vehicles)", "zh": "过去是骑马作战的士兵（如今是乘载具的士兵）"}, {"en": "Soldiers who fight on foot", "zh": "步行作战的士兵"}, {"en": "Soldiers who sail ships", "zh": "在船上作战的士兵"}, {"en": "Soldiers who fly airplanes", "zh": "驾驶飞机的士兵"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The sidebar says, 「In the past, cavalries were made up of soldiers who rode horses. Today, cavalries are made up of soldiers in vehicles,」 while infantries fight on foot. The 9th and 10th were Cavalry Regiments.", "zh": "书中的补充说明写道：「过去，骑兵由骑马的士兵组成。如今，骑兵由乘载具的士兵组成」，而步兵是步行作战。第9和第10团都是骑兵团。"}}, {"q": {"en": "In the glossary, what is a 'reservation'?", "zh": "在词汇表里，「保留地」(reservation) 是什么？"}, "options": [{"en": "Land set aside by the U.S. government for Native Americans", "zh": "美国政府为原住民划出的土地"}, {"en": "A military fort on the frontier", "zh": "边境上的军事堡垒"}, {"en": "A wilderness area at a country's edge", "zh": "国家边缘的荒野地带"}, {"en": "A type of soldier regiment", "zh": "一种士兵军团"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines a reservation as 「land set aside by the United States government for Native Americans」 (p. 9). (Option 3 is the glossary definition of 'frontier.')", "zh": "词汇表把保留地定义为「美国政府为原住民划出的土地」（第9页）。（选项3是词汇表里「边境」frontier 的定义。）"}}, {"q": {"en": "In the 1890s, what did the army test using the Buffalo Soldiers and bicycles?", "zh": "19 世纪 90 年代，军队用水牛兵和自行车做了什么试验？"}, "options": [{"en": "Whether bikes could replace horses (they were cheaper and easier to care for)", "zh": "自行车能否取代马匹（更便宜、更好照料）"}, {"en": "Whether bikes could be used to fight in the Spanish-American War", "zh": "自行车能否用于美西战争作战"}, {"en": "A bike race across the whole country", "zh": "一场横穿全国的自行车赛"}, {"en": "Delivering the mail by bike", "zh": "用自行车送信"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says the army wanted to see if bikes could replace horses 「since bikes were cheaper and easier to care for.」 The Buffalo Soldiers rode 1,900 miles from Fort Missoula to St. Louis, crossed the Rockies, rivers, and sandhills, and averaged 50 miles a day.", "zh": "书里说军队想看看自行车能否取代马匹，「因为自行车更便宜、更好照料」。水牛兵从密苏拉的堡骑了 1,900 英里到圣路易斯，跨过落基山、河流和流沙丘，平均每天 50 英里。"}}, {"q": {"en": "Between 1899 and 1904, what work did Buffalo Soldiers do in California's national parks?", "zh": "1899 到 1904 年间，水牛兵在加州的国家公园里做了什么工作？"}, "options": [{"en": "Worked as park rangers—built roads and trails, fought forest fires, stopped hunting and timber theft", "zh": "担任公园管理员——修路筑径、扑灭林火、阻止偷猎盗木"}, {"en": "Lived there as settlers with their families", "zh": "作为定居者和家人住在那里"}, {"en": "Fought against outlaws and Native Americans", "zh": "和亡命之徒与原住民作战"}, {"en": "Mined for gold", "zh": "开采金矿"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book states that between 1899 and 1904 they 「worked as park rangers in several California national parks. They built roads and trails, fought forest fires, and stopped people from hunting animals and stealing timber.」", "zh": "书里写道，1899 到 1904 年间他们「在加州几座国家公园里当管理员。他们修路筑径、扑灭林火，并阻止人们猎杀动物、偷盗木材」。"}}, {"q": {"en": "What was unusual about Colonel Benjamin Grierson?", "zh": "本杰明·格里森 (Benjamin Grierson) 上校有什么不寻常之处？"}, "options": [{"en": "He was a white officer who led the 10th Cavalry for 22 years (1866-1888), a rare exception", "zh": "他是一名白人军官，却领导第10骑兵团长达22年（1866-1888），实属罕见"}, {"en": "He was a Black officer who was not allowed to lead", "zh": "他是一名不被允许带兵的黑人士兵"}, {"en": "He refused to lead Black regiments", "zh": "他拒绝领导黑人军团"}, {"en": "He was an outlaw who robbed stagecoaches", "zh": "他是个抢劫驿马车的亡命之徒"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book notes that black officers weren't allowed to lead and white officers often didn't want to lead black regiments, but 「Colonel Benjamin Grierson was a rare exception. He led the 10th Cavalry for twenty-two years, from 1866 to 1888.」", "zh": "书里提到，黑人军官不被允许带兵，白人军官也常不愿领导黑人军团，但「本杰明·格里森上校是个罕见的例外。他从 1866 到 1888 年领导第10骑兵团长达二十二年」。"}}, {"q": {"en": "How does the book say history remembers the Buffalo Soldiers?", "zh": "这本书说，历史是如何铭记水牛兵的？"}, "options": [{"en": "As tough men who took on tough jobs and proved themselves through bravery and service", "zh": "作为承担艰巨任务的硬汉，用勇敢与奉献证明了自己"}, {"en": "As outlaws who stole cattle and robbed banks", "zh": "作为偷牛抢银行的亡命之徒"}, {"en": "As settlers who built the first towns out West", "zh": "作为在西部建起第一批城镇的定居者"}, {"en": "As people who were never treated unfairly", "zh": "作为从未受到不公对待的人"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The Legacy section says history remembers them 「as tough men who took on tough jobs. Although they were often treated poorly... they fought to prove they were good at their jobs. Their bravery and service are an important part of America's story.」", "zh": "「传承」一节说，历史铭记他们「是承担艰巨任务的硬汉。尽管常受不公对待……他们仍奋力证明自己胜任工作。他们的勇敢与奉献是美国故事中重要的一部分」。"}}], "extended": {"prompt": {"en": "The book shows the Buffalo Soldiers faced discrimination yet served bravely for decades. Why do you think their story is an important part of America's history? Connect their experience to the ideas of fairness and perseverance.", "zh": "这本书里的「水牛兵」虽然遭受歧视，却勇敢服役数十年。你认为他们的故事为何是美国历史的重要一环？把他们的经历与「公平」和「坚持」联系起来谈谈。"}, "guidance": {"en": ["More than 170,000 Black soldiers fought in the Civil War, and after 1865 the army formed the first black regiments (p. 4).", "Even when treated unfairly (old horses, poor food, no leadership roles), they were praised for their work and conduct (p. 7, 10).", "They earned 14 Medals of Honor (1870-1890) and are remembered as tough men who took on tough jobs (p. 12, 15)."], "zh": ["超过 17 万黑人士兵在内战中作战，1865 年后军队组建了第一批黑人军团（第4页）。", "即便受到不公对待（老马、劣质口粮、不能带兵），他们仍因表现与操守受到称赞（第7、10页）。", "他们获得 14 枚荣誉勋章（1870-1890），并被铭记为承担艰巨任务的硬汉（第12、15页）。"]}}};</script>
