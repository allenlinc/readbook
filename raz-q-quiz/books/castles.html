iles were placed in every moat", "zh": "是真的——每座护城河都放了鳄鱼"}, {"en": "Crocodiles lived there only during the winter", "zh": "鳄鱼只在冬天住在里面"}, {"en": "The book says moats were always filled with sharks", "zh": "书里说护城河里总是有鲨鱼"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book states, 'There is a myth that crocodiles were placed in some moats. Some moats did have eels and other kinds of fish in them for food, but there were no crocodiles.'", "zh": "书里写道：「有传言说有些护城河里放了鳄鱼。其实有些护城河里养了鳗鱼和其他鱼类当食物，但根本没有鳄鱼。」"}}, {"q": {"en": "What is the author's main purpose in writing Castles?", "zh": "作者写《城堡》这本书的主要目的什么？"}, "options": [{"en": "To inform readers about how medieval castles were built, who lived in them, and how they were defended", "zh": "向读者介绍中世纪城堡是怎么建造的、谁住在里面、又是如何防御的"}, {"en": "To convince readers to build their own castles", "zh": "劝读者自己动手建城堡"}, {"en": "To tell a fictional adventure story about a knight", "zh": "讲一个骑士的虚构冒险故事"}, {"en": "To argue that castles were a waste of money", "zh": "论证城堡是浪费钱"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The whole book is an informational text describing castle design, the people who lived in and around them, and how they were defended—its goal is to teach readers about real medieval castles.", "zh": "全书是一本科学说明文，描述城堡的设计、住在城堡内外的人，以及城堡如何防御——目的是让读者了解真实的中世纪城堡。"}}, {"q": {"en": "Why does the book describe the social ranks from the king and nobles down to the peasants?", "zh": "为什么书里要描写从国王、贵族一直到农民的社会等级？"}, "options": [{"en": "To show how medieval society was organized around the castle and the king's power", "zh": "说明中世纪社会是如何以城堡和君权为中心组织起来的"}, {"en": "To prove that peasants were the happiest class", "zh": "证明农民是最快乐的阶层"}, {"en": "To explain how to become a king", "zh": "解释怎样成为国王"}, {"en": "To list the foods each class ate", "zh": "列出每个阶层吃什么"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book shows 'the king and church had great power' and lists nobles, knights, merchants, and peasants, explaining how everyone 'paid taxes' and was loyal up the chain—to show society was built around the castle.", "zh": "书里说「国王和教会拥有极大的权力」，并列出贵族、骑士、商人、农民，说明人人「交税」、层层效忠——以此展示社会是围绕城堡建立起来的。"}}], "extended": {"prompt": {"en": "The book explains that castles were designed for both defense (thick walls, moats, crenelations, a safe keep) and comfort (a Great Hall for feasts, big windows for light). If you were designing a safe but comfortable place for your family today, what features would you include and why? Use ideas from the book.", "zh": "书里说城堡既为防御而建（厚墙、护城河、锯齿垛口、安全的 keep 主楼），也为舒适而建（办宴席的大厅、透光的宽窗）。如果今天你要为家人设计一个既安全又舒服的地方，你会加入哪些设计，为什么？请用书中的点子。"}, "guidance": {"en": ["Castles used thick walls, moats, and crenelations for defense, and a central keep as the safest place (pp. 7-9, 14).", "Inside, the Great Hall was for meals and gatherings, and windows let in light so fewer candles were needed (pp. 10-11).", "A good answer names real features from the book and explains how each keeps people safe OR comfortable."], "zh": ["城堡用厚墙、护城河、锯齿垛口来防御，并把中央的 keep 作为最安全的地方（第7-9、14页）。", "城堡内部，大厅用来吃饭和聚会，宽窗透光、省下蜡烛（第10-11页）。", "好的回答会说出书里真实的建筑特点，并解释它如何保障安全或带来舒适。"]}}};</script>
