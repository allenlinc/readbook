"en": "Color-sensitive cells in the retina; the book describes three types (red, green, blue)", "zh": "视网膜上负责颜色感知的细胞；书中描述了三种（红、绿、蓝）"}, {"en": "Cells that only work in dim light and cannot see color", "zh": "只在昏暗光线下工作、无法分辨颜色的细胞"}, {"en": "Cells that carry sound from the ear to the brain", "zh": "把声音从耳朵传向大脑的细胞"}, {"en": "Tiny animals called polyps that build coral", "zh": "建造珊瑚的、叫珊瑚虫的小动物"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary says cone cells are 'cells in the eye's retina that are color sensitive' (p. 6); the book describes three types that absorb blue, green, and red light.", "zh": "词汇表说视锥细胞是「视网膜上负责颜色感知的细胞」（第6页）；书中描述了三种，分别吸收蓝光、绿光和红光。"}}, {"q": {"en": "The book has a section on 'Color Vision in Animals.' Which statement about animals is TRUE according to the book?", "zh": "书里有一节讲「动物的色觉」。根据这本书，关于动物的哪种说法正确？"}, "options": [{"en": "Dogs see only blue and yellow, bulls are completely color-blind, and some bees see more colors than humans", "zh": "狗只能看见蓝和黄，公牛完全色盲，而有些蜜蜂比人能看到更多颜色"}, {"en": "All animals see exactly the same colors as humans", "zh": "所有动物看到的颜色和人类完全一样"}, {"en": "Only humans can see any color at all", "zh": "只有人类能看见任何颜色"}, {"en": "Cats have better color vision than butterflies", "zh": "猫的色觉比蝴蝶更好"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book states dogs see 'shades of blue and yellow,' bulls are 'completely color-blind,' and 'some birds, bees, and butterflies see more colors than humans.'", "zh": "书里说狗只能看见「蓝和黄的色调」，公牛「完全色盲」，而「有些鸟、蜜蜂和蝴蝶比人类看到更多颜色」。"}}, {"q": {"en": "Since doctors cannot yet cure color blindness, what tools does the book say can HELP people live with it?", "zh": "既然医生还无法治愈色盲，书中说有哪些工具能帮助患者应对它？"}, "options": [{"en": "Smartphone apps that identify colors, and special glasses that filter light so red and green can be told apart", "zh": "能识别颜色的手机应用，以及能过滤光线、区分红绿的特制眼镜"}, {"en": "A daily vitamin that restores full-color vision", "zh": "一种能恢复全色觉的每日维生素"}, {"en": "Eye drops that permanently cure it overnight", "zh": "一夜之间就能永久治愈的眼药水"}, {"en": "Surgery that replaces the eyeball", "zh": "更换眼球的手术"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says smartphone 'apps can do tasks such as identifying colors' and high-tech sunglasses 'filter out specific wavelengths' so red-green color-blind people can tell the two colors apart.", "zh": "书里说手机「应用可以识别颜色」，而高科技太阳镜能「过滤特定波长的光」，让红绿色盲者能区分这两种颜色。"}}, {"q": {"en": "How does the author seem to feel about the future of color blindness, based on the ending?", "zh": "从结尾来看，作者对色盲的未来持什么态度？"}, "options": [{"en": "Hopeful — research and new tools are advancing, and a cure may come soon", "zh": "充满希望——研究和新工具在进步，治愈或许指日可待"}, {"en": "Angry — the author thinks nothing will ever change", "zh": "愤怒——作者认为一切都不会改变"}, {"en": "Bored — the author says it does not matter", "zh": "无聊——作者说这无关紧要"}, {"en": "Fearful — the author worries it will spread to everyone", "zh": "担忧——作者怕它会传染给所有人"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book ends hoping a 'treatment for color blindness may be available in the near future' and 'Maybe someday soon, color blindness will be a thing of the past!' after the successful squirrel-monkey experiment.", "zh": "在松鼠猴实验成功后，书的结尾期待「色盲的治疗方法也许不久就能出现」，并说「也许很快有一天，色盲会成为过去！」"}}, {"q": {"en": "The book titles a section 'Color Blindness Is No Joke.' Why does the author say this?", "zh": "书中有一节题为「色盲可不是闹着玩的」(Color Blindness Is No Joke)。作者为什么这么说？"}, "options": [{"en": "To show color blindness causes real problems: trouble at school, safety risks, and limited career choices", "zh": "为了说明色盲会造成真实问题：学习困难、安全隐患，以及受限的职业选择"}, {"en": "To make fun of people who cannot see colors", "zh": "为了取笑那些看不见颜色的人"}, {"en": "To explain that it only affects animals, not people", "zh": "为了说明它只影响动物，不影响人"}, {"en": "To say it is a brand-new disease just discovered", "zh": "为了说它是一种刚被发现的新疾病"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The section explains color blindness 'can cause serious problems' — trouble reading maps, school struggles, safety issues with red/yellow emergency equipment, and limited jobs like airline pilot.", "zh": "该节说明色盲「会造成严重问题」——看地图困难、学业受挫、红/黄应急设备带来的安全隐患，以及像飞行员这样受限的职业。"}}], "extended": {"prompt": {"en": "The book explains that color blindness happens when cone cells in the eye don't work properly, and that it can make everyday things — like reading a map or choosing ripe fruit — harder. Imagine you could not tell red from green. What challenges might you face in a single day, and what tools or helpers from the book could make your life easier?", "zh": "书中解释，色盲是因为眼睛里的视锥细胞不能正常工作，它会让日常小事——比如看地图、挑熟水果——变得更难。想象一下你分不清红和绿。在一天里你可能会遇到哪些困难？书里提到的哪些工具或办法能让你生活更轻松？"}, "guidance": {"en": ["Red-green color blindness makes red and green hard to tell apart; about 1 in 12 men have it (p. 8).", "It can cause safety issues (red/yellow emergency equipment) and limit jobs like airline pilot (p. 11).", "Tools such as color-identifying apps and EnChroma-style glasses can help (p. 13).", "A good answer names real daily challenges and connects them to a tool or strategy from the book."], "zh": ["红绿色盲让人难以区分红和绿；约每12个男性中有1个患病（第8页）。", "它可能带来安全隐患（红/黄应急设备）并限制如飞行员等职业（第11页）。", "能识别颜色的应用、EnChroma 类眼镜等工具有帮助（第13页）。", "好的回答会举出真实的日常困难，并联系书中的工具或策略。"]}}};</script>
