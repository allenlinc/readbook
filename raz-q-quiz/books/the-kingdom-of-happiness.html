ppiness that would help Bhutan's growth,' instead of measuring by money alone.", "zh": "旺楚克国王「为不丹想出了一个计划，叫国民幸福总值（GNH）」，包含「关于幸福的四个要点，帮助不丹发展」，而不是只靠金钱衡量成就。"}}, {"q": {"en": "What are the Four Pillars of Happiness in Bhutan?", "zh": "不丹的「幸福四大支柱」是哪四个？"}, "options": [{"en": "Government rule, social and work matters, culture and traditions, and nature and the environment", "zh": "政府治理、社会与劳动、文化与传统、自然与环境"}, {"en": "Sports, music, food, and clothing", "zh": "运动、音乐、食物和服饰"}, {"en": "Mountains, rivers, forests, and deserts", "zh": "山脉、河流、森林和沙漠"}, {"en": "Reading, writing, math, and science", "zh": "阅读、写作、数学和科学"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book lists the four pillars as 'government rule, social and work matters, culture and traditions, and nature and the environment,' which the king considered when making new laws.", "zh": "书里列出的四大支柱是「政府治理、社会与劳动、文化与传统、自然与环境」，国王制定新法律时都会考虑这四点。"}}, {"q": {"en": "Between the 2010 survey and the 2015 survey, what happened to Bhutan's happiness?", "zh": "在2010年和2015年两次调查之间，不丹的幸福度发生了什么变化？"}, "options": [{"en": "It grew by 1.8 percent overall, though some areas like volunteering dropped", "zh": "整体上增长了1.8%，不过志愿服务等一些方面有所下降"}, {"en": "It fell by half", "zh": "下降了一半"}, {"en": "It stayed exactly the same", "zh": "完全没变"}, {"en": "It became the lowest in the world", "zh": "变成了全世界最低"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "After the 2010 survey, 'another survey was done in 2015. Bhutan learned that its citizens' happiness grew by 1.8 percent!'—but in some areas (volunteer work, valuing traditions) it dropped.", "zh": "2010年调查之后，「2015年又做了一次调查。不丹得知国民幸福度增长了1.8%！」——但在志愿服务、重视传统等方面有所下降。"}}, {"q": {"en": "What important change happened in Bhutan in 1999?", "zh": "1999年不丹发生了什么重要的变化？"}, "options": [{"en": "Bhutan allowed television and the Internet into the country for the first time", "zh": "不丹首次允许电视和互联网进入该国"}, {"en": "Bhutan won a gold medal at the Olympics", "zh": "不丹在奥运会上赢得金牌"}, {
