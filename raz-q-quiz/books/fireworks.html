<script>window.BOOK = {"slug": "fireworks", "title": "Fireworks", "titleZh": "烟花", "level": "Q", "genre": "Nonfiction", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "Where and when did fireworks most likely begin?", "zh": "烟花最可能是在哪里、什么时候开始的？"}, "options": [{"en": "In China, over 1,000 years ago, when a cook accidentally made gunpowder", "zh": "在中国，一千多年前，一位厨师意外制出了火药"}, {"en": "In Italy, about 200 years ago", "zh": "在意大利，大约两百年前"}, {"en": "In the United States, in 1900", "zh": "在美国，1900年"}, {"en": "In Egypt, with the pyramids", "zh": "在埃及，和金字塔一起"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says, 'we do know that it happened in China over 1,000 years ago. Legend says that a Chinese cook accidentally created gunpowder by mixing ingredients in his kitchen.'", "zh": "书里说：「我们确实知道它发生在中国，一千多年前。传说一位中国厨师在厨房里把几种材料混合，意外制出了火药。」"}}, {"q": {"en": "According to the book's chart, which chemical makes fireworks burn blue?", "zh": "根据书里的图表，哪种化学物质让烟花燃烧出蓝色？"}, "options": [{"en": "Copper salts", "zh": "铜盐"}, {"en": "Strontium salts", "zh": "锶盐"}, {"en": "Sodium", "zh": "钠"}, {"en": "Barium nitrate", "zh": "硝酸钡"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The chart lists: Copper salts → Blue; Strontium salts → Red; Sodium → Yellow; Barium nitrate → Green; Potassium perchlorate → Makes loud booms.", "zh": "图表列出：铜盐→蓝；锶盐→红；钠→黄；硝酸钡→绿；高氯酸钾→发出巨响。"}}, {"q": {"en": "How does a firework make its loud sound?", "zh": "烟花是怎样发出巨大声响的？"}, "options": [{"en": "The intense heat expands the air around it in a wave, which the ear hears as sound — much like thunder from lightning", "zh": "炽热使周围的空气以波的形式向外膨胀，耳朵把这声波听成声音——就像闪电产生雷声一样"}, {"en": "The gunpowder is mixed with musical instruments", "zh": "火药里混入了乐器"}, {"en": "The shell is made of especially loud metal", "zh": "弹壳是用特别响的金属做的"}, {"en": "The stars spin against each other", "zh": "是「星体」互相摩擦旋转发出的"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says, 'Fireworks cause sound because the intense heat expands the air around the firework. The air is pushed outward in a wave... This is the same way that lightning creates thunder.'", "zh": "书里说：「烟花发出声音，是因为炽热使周围的空气膨胀。空气以波的形式向外推……这跟闪电产生雷声是同样的道理。」"}}, {"q": {"en": "What are the small balls of colored or sparkling gunpowder inside a firework called?", "zh": "烟花里那些彩色或闪亮的小火药球叫什么？"}, "options": [{"en": "Stars", "zh": "星体 (stars)"}, {"en": "Mortars", "zh": "发射管 (mortars)"}, {"en": "Salutes", "zh": "礼炮 (salutes)"}, {"en": "Leaders", "zh": "引信 (leaders)"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says, 'Fireworks makers roll the colored or sparkling gunpowder into small balls called stars.' Hundreds of stars can fit inside one shell.", "zh": "书里说：「烟花工匠把彩色或闪亮的火药滚成小圆球，叫做 stars（星体）。」一颗弹壳里能装下数百个星体。"}}, {"q": {"en": "In the glossary, what is a 'mortar'?", "zh": "在词汇表里，「发射管」(mortar) 是什么？"}, "options": [{"en": "A metal tube that holds a firework shell and shoots it into the sky", "zh": "一种金属管，装着火弹壳并把它们射向天空"}, {"en": "A kind of explosive powder", "zh": "一种爆炸性火药"}, {"en": "The fuse that lights the lift charge", "zh": "点燃发射药的引信"}, {"en": "A bright flash and a loud bang", "zh": "一道亮光和一声巨响"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines mortars as 'metal tubes that hold fireworks shells and shoot them into the sky (p. 17).' Each mortar holds one shell and shoots it like a cannon shoots a cannonball.", "zh": "词汇表把 mortar 定义为「装着火弹壳、并把它们射向天空的金属管」（第17页）。每根发射管装一颗弹壳，像大炮发射炮弹一样把它射出。"}}, {"q": {"en": "What does the word 'pyrotechnics' mean?", "zh": "「烟火术」(pyrotechnics) 这个词是什么意思？"}, "options": [{"en": "The making and lighting of fireworks and other fire effects", "zh": "烟花及其他火焰效果的制造与燃放"}, {"en": "A type of chemical salt", "zh": "一种化学盐"}, {"en": "The study of weather", "zh": "对天气的研究"}, {"en": "A wooden rack for holding shells", "zh": "摆放弹壳的木架"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines pyrotechnics as 'the making and lighting of fireworks and other fire effects (p. 5).' The book also calls it the craft of making and launching fireworks.", "zh": "词汇表把 pyrotechnics 定义为「烟花及其他火焰效果的制造与燃放」（第5页）。书里也称它是制作和发射烟花的技艺。"}}, {"q": {"en": "How can fireworks today be set to music?", "zh": "如今的烟花怎样能做到配合音乐燃放？"}, "options": [{"en": "Computer firing panels are so precise that designers program shells to light in time with a CD or computer music file", "zh": "电脑燃放面板非常精准，设计师可以把弹壳编好程序，配合CD或电脑里的音乐文件同步点亮"}, {"en": "Musicians play live music right next to each firework", "zh": "乐手在每颗烟花旁现场演奏"}, {"en": "The fireworks themselves make musical notes", "zh": "是烟花自己发出乐音"}, {"en": "The crowd sings along with the show", "zh": "是观众跟着表演一起唱"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says, 'Computer firing panels have become so precise that fireworks can be set to music... The firing panel is programmed to light the shells with the music, using the timer on the CD or computer file.'", "zh": "书里说：「电脑燃放面板已经精准到可以让烟花配合音乐……燃放面板被编好程序，用CD或电脑文件上的计时器让弹壳随音乐点亮。」"}}, {"q": {"en": "The introduction says fireworks 'combine science and art.' Which sentence below shows this combination?", "zh": "引言说烟花「把科学和艺术结合在一起」。下面哪句话体现了这种结合？"}, "options": [{"en": "Makers use chemistry for colors and sound, while designers shape shells into globes, stars, or smiley faces and set them to music", "zh": "工匠用化学制造颜色和声音，而设计师把弹壳做成球体、星星或笑脸的形状，并让它配合音乐"}, {"en": "Fireworks are made only by machines in factories", "zh": "烟花只在工厂里由机器制造"}, {"en": "Fireworks are used only for wars", "zh": "烟花只用于战争"}, {"en": "Only small children enjoy fireworks", "zh": "只有小孩子喜欢烟花"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book blends science (chemicals for color, heat for sound) with art (shaping shells into globes, stars, or smiley faces, and setting them to music), calling it 'science and art.'", "zh": "书里把科学（用化学物质制造颜色、用热量制造声音）与艺术（把弹壳做成球体、星星或笑脸，并配合音乐）融合在一起，称之为「科学和艺术」。"}}, {"q": {"en": "The safety section says fireworks injure about 10,000 people a year in the U.S. What does the author want readers to do?", "zh": "安全章节说，仅在美国每年就有约一万人被烟花炸伤。作者希望读者怎么做？"}, "options": [{"en": "Leave fireworks to trained professionals and never light them yourself", "zh": "把烟花交给受过训练的专业人士，自己绝不去点燃"}, {"en": "Buy as many fireworks as possible", "zh": "尽量多买烟花"}, {"en": "Store illegal fireworks at home", "zh": "把非法烟花存放在家里"}, {"en": "Light fireworks without an adult", "zh": "没有大人在场也去点燃烟花"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "After listing the dangers, the book concludes, 'It is best to leave fireworks to the trained professionals,' and gives safety tips such as never lighting fireworks yourself.", "zh": "书里列举危险后总结道：「最好把烟花交给受过训练的专业人士」，并给出安全提示，比如绝不自己点燃烟花。"}}, {"q": {"en": "Why does the author open the book with a description of fireworks welcoming the year 2000 all around the world?", "zh": "作者为什么在书的一开头，描写世界各地用烟花迎接2000年的情景？"}, "options": [{"en": "To show that fireworks are a worldwide celebration that brings people together, and to spark the reader's interest", "zh": "为了展现烟花是一场把人们聚在一起的世界性庆典，并激发读者的兴趣"}, {"en": "To teach the reader how to travel the world", "zh": "为了教读者怎样周游世界"}, {"en": "To prove fireworks only happen in big cities", "zh": "为了证明烟花只在大城市才有"}, {"en": "To explain how to tell time by the Earth's turning", "zh": "为了讲解怎样根据地球转动来判断时间"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The introduction sweeps from Sydney to Hong Kong, Bombay, the pyramids, Moscow, the Eiffel Tower, Mexico City, and Chicago — showing fireworks as a shared global tradition that welcomes the new year and draws readers in.", "zh": "引言从悉尼写到香港、孟买、金字塔、莫斯科、埃菲尔铁塔、墨西哥城和芝加哥——把烟花呈现为一种全球共享的传统，用来迎接新年并吸引读者。"}}], "extended": {"prompt": {"en": "The book explains both the science (chemicals make colors, heat makes sound) and the art (shapes like stars and smiley faces, shows set to music) of fireworks. Imagine you are a fireworks designer for a big New Year's show. What 'story' would you tell with your fireworks, and which science facts from the book would you use to make it happen (chemicals for color, stars, lift charges, timing)?", "zh": "这本书既讲了烟花的科学（化学物质制造颜色、热量制造声音），又讲了它的艺术（星星、笑脸等形状，配合音乐燃放）。想象你是新年烟花秀的设计师。你会用烟花讲一个什么「故事」？你会用书里的哪些科学常识来实现它（制造颜色的化学物质、星体、发射药、定时）？"}, "guidance": {"en": ["Different chemicals make different colors — copper salts = blue, strontium = red, sodium = yellow, barium nitrate = green (p. 10).", "Makers pack 'stars' (small balls of colored gunpowder) into shells shaped as globes, stars, or smiley faces (p. 12).", "A 'lift charge' shoots the shell high into the sky, and a 'time fuse' controls when it bursts (p. 14, 16).", "A good answer connects a chosen theme to at least one real science fact from the book."], "zh": ["不同化学物质产生不同颜色——铜盐=蓝，锶=红，钠=黄，硝酸钡=绿（第10页）。", "工匠把「星体」（彩色火药小球）装进做成球体、星星或笑脸形状的弹壳里（第12页）。", "「发射药」把弹壳射向高空，「定时引信」控制它在何时爆炸（第14、16页）。", "好的回答要把选定的主题和书里至少一条真实的科学常识联系起来。"]}}};</script>
