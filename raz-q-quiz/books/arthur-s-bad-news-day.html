<script>window.BOOK = {"slug": "arthur-s-bad-news-day", "title": "Arthur's Bad-News Day", "titleZh": "亚瑟的倒霉日子", "level": "Q", "genre": "Fiction", "mainSkill": "Author's Purpose and Perspective", "questions": [{"q": {"en": "In Arthur's 'perfect' life, how does his mom wake him up every morning?", "zh": "在亚瑟「完美」的生活里，妈妈每天早上怎么把他叫醒？"}, "options": [{"en": "By tickling the bottoms of his feet", "zh": "挠他的脚底板"}, {"en": "By ringing a loud bell", "zh": "摇响一个很响的铃"}, {"en": "By turning on the TV", "zh": "打开电视"}, {"en": "By calling his name from downstairs", "zh": "从楼下喊他的名字"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Arthur says, 'every morning my mom wakes me up by tickling the bottoms of my feet, making me giggle.'", "zh": "亚瑟说：「每天早上妈妈挠我的脚底板把我弄醒，逗得我咯咯笑。」"}}, {"q": {"en": "What does Dad make for breakfast, and what does Arthur especially love?", "zh": "爸爸做什么当早餐？亚瑟特别喜欢的是什么？"}, "options": [{"en": "Mickey Mouse-shaped pancakes, sometimes with chocolate chips or blueberries", "zh": "米老鼠形状的煎饼，有时会加巧克力豆或蓝莓"}, {"en": "Plain toast", "zh": "普通的吐司"}, {"en": "Only eggs and bacon", "zh": "只有鸡蛋和培根"}, {"en": "A big salad", "zh": "一大份沙拉"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Dad 'always makes these really cool Mickey Mouse-shaped pancakes, sometimes adding chocolate chips or blueberries. They are so delicious that I could eat them for the rest of my life.'", "zh": "爸爸「总是做超酷的米老鼠形状煎饼，有时加巧克力豆或蓝莓。好吃到我想一辈子都吃它们」。"}}, {"q": {"en": "What is the 'bad news' that Arthur's parents tell him?", "zh": "亚瑟的父母告诉他的「坏消息」到底是什么？"}, "options": [{"en": "He is going to have a little sister", "zh": "他就要有一个小妹妹了"}, {"en": "They are moving to another country", "zh": "他们要搬去另一个国家"}, {"en": "He has to change schools", "zh": "他必须转学"}, {"en": "The family is getting a dog", "zh": "家里要养一只狗"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Arthur reveals, 'a few months ago, my parents told me that soon I'm going to have a little sister. Ugh!'", "zh": "亚瑟揭开谜底：「几个月前，爸妈告诉我很快我就要有一个小妹妹了。唉！」"}}, {"q": {"en": "The story begins, 'Hey, take a seat, and I'll tell you a story...' What point of view is this?", "zh": "故事开头说：「嘿，坐下，我给你讲个故事……」这是第几人称视角？"}, "options": [{"en": "First-person narration — Arthur tells his own story using 'I'", "zh": "第一人称叙述——亚瑟用「我」讲自己的故事"}, {"en": "An outside narrator who is not in the story", "zh": "一个不在故事里的旁观叙述者"}, {"en": "Written as a play script", "zh": "写成剧本的形式"}, {"en": "Told by Arthur's mom", "zh": "由亚瑟的妈妈来讲述"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Arthur says 'My name is Arthur Hankins' and 'I'll tell you a story,' using 'I' throughout — this is first-person point of view.", "zh": "亚瑟说「我叫亚瑟·汉金斯」「我给你讲个故事」，通篇用「我」——这是第一人称视角。"}}, {"q": {"en": "On the car ride to school, what imaginary instrument does Arthur say he learned to play very well?", "zh": "在上学路上的车里，亚瑟说自己练得很好的是哪种「想象出来的」乐器？"}, "options": [{"en": "An imaginary harmonica", "zh": "一把想象中的口琴"}, {"en": "A real guitar", "zh": "一把真的吉他"}, {"en": "A piano", "zh": "一架钢琴"}, {"en": "A trumpet", "zh": "一把小号"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Arthur says, 'Over the years, I've learned to play my imaginary harmonica very well,' while his parents pretend to play other instruments.", "zh": "亚瑟说：「这些年里，我把那把想象中的口琴练得很好」，而爸妈则假装演奏别的乐器。"}}, {"q": {"en": "Arthur worries his life will change. What does his friend Jeff's experience with a baby sister suggest might happen?", "zh": "亚瑟担心生活会变。他朋友杰夫有了小妹妹后的经历，暗示可能会发生什么？"}, "options": [{"en": "Jeff's parents got busy with the baby but he got used to it — showing Arthur might adjust, too", "zh": "杰夫的爸妈忙起了宝宝，但杰夫慢慢习惯了——说明亚瑟也可能适应"}, {"en": "Jeff's parents stopped loving him", "zh": "杰夫的爸妈不再爱他了"}, {"en": "Jeff ran away from home", "zh": "杰夫离家出走了"}, {"en": "Jeff never saw his parents again", "zh": "杰夫再也没见过爸妈"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Jeff's parents were busy with the baby, but 'He says he got used to it' — a hint 必须离开"}, {"en": "That he should never share anything", "zh": "自己永远不该分享任何东西"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Arthur thinks, 'I'm beginning to realize that Mom and Dad have enough love to share with both me and my sister.'", "zh": "亚瑟想：「我开始明白，爸爸妈妈的爱足够同时分给我和妹妹。」"}}, {"q": {"en": "What is the author's main message or purpose in this story?", "zh": "这个故事的作者主要想传达什么信息或目的？"}, "options": [{"en": "To show that a big change can feel scary at first but can turn out okay when there is love", "zh": "说明巨大的变化起初会让人害怕，但在爱的包围下结果可能还不错"}, {"en": "To warn kids not to have siblings", "zh": "警告孩子们不要有兄弟姐妹"}, {"en": "To complain about parents", "zh": "为了抱怨父母"}, {"en": "To teach how to build puzzles", "zh": "为了教人拼拼图"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Arthur starts upset and ends accepting his sister, learning 'having a little sister won't be so bad' — the story shows change can be okay with an open heart.", "zh": "亚瑟从心烦到接受妹妹，明白「有个小妹妹也许没那么糟」——故事说明只要敞开心扉，变化也能变得可以接受。"}}], "extended": {"prompt": {"en": "Arthur is upset about getting a little sister, but by the end he changes his mind when the baby grabs his finger. Think of a time something you feared turned out to be okay (or not!). What helped you feel better, and what would you tell Arthur about handling big changes?", "zh": "亚瑟因为要有一个小妹妹而心烦，但结尾当宝宝抓住他的手指时，他改变了想法。回想一次你害怕的事最后却还好（或没那么好）的经历。是什么让你感觉好些？你会对亚瑟说些什么，关于怎么面对大变化？"}, "guidance": {"en": ["Arthur feared sharing his parents and his room, but the baby grabbing his finger made him feel loved (p. 15).", "Mom told him, 'You'll love her... you might even like the company' (p. 12).", "A good answer connects a personal experience to accepting change with an open mind."], "zh": ["亚瑟害怕要和妹妹分享父母与房间，但宝宝抓住他的手指让他感受到被爱（第15页）。", "妈妈告诉他：「你会爱她的……甚至可能喜欢有伴」（第12页）。", "好的回答要把亲身经历和「以开放心态接受变化」联系起来。"]}}};</script>
