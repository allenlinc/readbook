<script>window.BOOK = {"slug": "famous-first-ladies", "title": "Famous First Ladies", "titleZh": "著名的白宫第一夫人", "level": "Q", "genre": "Nonfiction", "mainSkill": "Author's Purpose and Perspective", "questions": [{"q": {"en": "According to the book, who is the First Lady of the United States?", "zh": "根据这本书，什么是「美国第一夫人」？"}, "options": [{"en": "The wife of the president", "zh": "总统的妻子"}, {"en": "The president's mother", "zh": "总统的母亲"}, {"en": "A woman elected by the voters", "zh": "由选民选出的女性"}, {"en": "The president's oldest daughter", "zh": "总统的长女"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book states, 'The First Lady of the United States is the wife of the president.' It also notes First Ladies don't get paid and are very much in the public eye.", "zh": "书里写道：「美国第一夫人是总统的妻子。」还提到第一夫人没有薪水，而且非常受公众关注。"}}, {"q": {"en": "In 1939, a famous African-American singer named Marian Anderson was banned from singing at Constitution Hall. What did Eleanor Roosevelt do?", "zh": "1939年，著名的非裔美国歌手玛丽安·安德森被禁止在宪法大厅演出。埃莉诺·罗斯福是怎么做的？"}, "options": [{"en": "She resigned from the group that banned Anderson and invited her to sing at the Lincoln Memorial, where 75,000 people attended", "zh": "她退出了那个禁止安德森演出的团体，并邀请安德森到林肯纪念堂演唱，现场有7.5万人观看"}, {"en": "She agreed with the ban and stayed silent", "zh": "她同意这项禁令，并保持沉默"}, {"en": "She sang in Anderson's place", "zh": "她代替安德森上台演唱"}, {"en": "She ignored the whole situation", "zh": "她对整件事不闻不问"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The Daughters of the American Revolution banned Anderson because she was African-American. Eleanor resigned in protest and invited her to sing at the Lincoln Memorial, where 75,000 people saw the concert.", "zh": "美国革命女儿会（DAR）以安德森是非裔美国人为由禁止她演出。埃莉诺为此辞职抗议，并邀请她到林肯纪念堂演唱，现场有7.5万人观看。"}}, {"q": {"en": "Which of these 'firsts' did Hillary Rodham Clinton achieve?", "zh": "希拉里·罗德姆·克林顿取得了以下哪一项「第一」？"}, "options": [{"en": "She was the first First Lady to hold an official government position, the first elected to the U.S. Senate, and the first to become U.S. Secretary of State", "zh": "她是第一位担任政府公职的第一夫人、第一位当选美国参议员的第一夫人，也是第一位出任美国国务卿的第一夫人"}, {"en": "She was the first First Lady to be a newspaper photographer", "zh": "她是第一位当过报社摄影师的第一夫人"}, {"en": "She was the first First Lady to travel around the world", "zh": "她是第一位周游世界的第一夫人"}, {"en": "She was the first woman to become president", "zh": "她是第一位成为总统的女性"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says she was the first First Lady with an official government position (leading the health-care task force), the first elected to the U.S. Senate, and the first to serve as U.S. Secretary of State.", "zh": "书里说她是第一位有政府公职的第一夫人（领导医疗改革工作组）、第一位当选美国参议员的第一夫人，也是第一位出任美国国务卿的第一夫人。"}}, {"q": {"en": "As First Lady, what did Jacqueline Kennedy do for the White House?", "zh": "杰奎琳·肯尼迪在担任第一夫人时，为白宫做了什么？"}, "options": [{"en": "She restored it as a kind of museum, promoted the arts, and gave a televised tour in 1962", "zh": "她把白宫修复得像一座博物馆、推广艺术，并在1962年做了一场电视转播的参观导览"}, {"en": "She turned it into a hospital for soldiers", "zh": "她把白宫改成了军人医院"}, {"en": "She built a new floor just for the president", "zh": "她为总统新建了一层楼"}, {"en": "She sold the old furniture to raise money", "zh": "她卖掉旧家具来筹钱"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Jackie worked to 'restore the White House as a kind of museum,' promoted arts such as painting and dance, and in 1962 a CBS camera crew followed her on a personal tour shown on TV.", "zh": "杰奎琳「把白宫修复得像一座博物馆」，推广绘画、舞蹈等艺术；1962年，CBS摄影队跟着她做了一场电视播出的私人导览。"}}, {"q": {"en": "According to the book, how did the term 'First Lady' begin to be used?", "zh": "根据这本书，「第一夫人」(First Lady) 这个词是怎么开始被使用的？"}, "options": [{"en": "After a crowd greeted Martha Washington with shouts of 'Long live Lady Washington!'", "zh": "在一次人群向玛莎·华盛顿高呼「华盛顿夫人万岁！」之后"}, {"en": "It was created by the first woman president", "zh": "它由第一位女总统创造"}, {"en": "Congress passed a law making it official", "zh": "国会通过法律把它定为正式称呼"}, {"en": "Eleanor Roosevelt invented the phrase", "zh": "是埃莉诺·罗斯福发明了这个词"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "A 'Do You Know?' box says that when George Washington was president, a crowd greeted Martha Washington with 'Long live Lady Washington!' and shortly after the term First Lady began to be used. It was added to the dictionary in 1934.", "zh": "书里的「你知道吗？」说，华盛顿任总统时，人群向玛莎·华盛顿高呼「华盛顿夫人万岁！」，不久后「第一夫人」一词就开始被使用，并在1934年收录进词典。"}}, {"q": {"en": "In the glossary, what is a 'humanitarian'?", "zh": "在词汇表里，「人道主义工作者」(humanitarian) 是什么意思？"}, "options": [{"en": "A person who helps people", "zh": "一个帮助他人的人"}, {"en": "A kind of fireworks", "zh": "一种烟花"}, {"en": "A political leader", "zh": "一位政治领袖"}, {"en": "A type of disease", "zh": "一种疾病"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines a humanitarian as 'a person who helps people (p. 8).' Eleanor Roosevelt worked as a humanitarian, giving to people who needed her help.", "zh": "词汇表把 humanitarian 定义为「一个帮助他人的人」（第8页）。埃莉诺·罗斯福就曾当人道主义工作者，帮助有需要的人。"}}, {"q": {"en": "The book says First Ladies 'are very much in the public eye,' which gives them a chance to support causes. Which event shows a First Lady using her position to fight unfair treatment?", "zh": "书里说第一夫人「非常受公众关注」，这给她们机会去支持自己相信的事业。下面哪件事体现了第一夫人利用自己的地位对抗不公平的对待？"}, "options": [{"en": "Eleanor Roosevelt resigning from a group to protest the banning of Marian Anderson because of her race", "zh": "埃莉诺·罗斯福退出某个团体，抗议因种族原因禁止玛丽安·安德森演出"}, {"en": "A First Lady refusing to give any speeches", "zh": "某位第一夫人拒绝发表任何演讲"}, {"en": "A First Lady running for president herself", "zh": "某位第一夫人自己去竞选总统"}, {"en": "A First Lady moving to a new city", "zh": "某位第一夫人搬到了新城市"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Because First Ladies are in the public eye, they can speak out. Eleanor used her position to resign in protest of racial discrimination against Marian Anderson, bringing attention to unfair treatment.", "zh": "正因第一夫人备受关注，她们能为事业发声。埃莉诺利用自己的地位，以辞职抗议对玛丽安·安德森的种族歧视，引起人们对不公的关注。"}}, {"q": {"en": "The book says 'Many famous First Ladies have been more active and outspoken than the rest.' How are the three women in this book described?", "zh": "书里说「许多知名的第一夫人比其他人更积极、更敢言」。本书中的三位女性被怎样描述？"}, "options": [{"en": "They are three of the most influential, active, and outspoken First Ladies", "zh": "她们是影响力最大、最积极也最敢言的三位第一夫人"}, {"en": "They all married presidents who died while in office", "zh": "她们的丈夫都在任内去世"}, {"en": "They all grew up in the same city", "zh": "她们都在同一座城市长大"}, {"en": "They were all quiet and stayed out of public view", "zh": "她们都很安静，不抛头露面"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says it is 'about three of the most influential First Ladies' and notes that famous First Ladies 'have been more active and outspoken than the rest.'", "zh": "书里说它讲的是「最有影响力的三位第一夫人」，并提到知名的第一夫人「比其他人更积极、更敢言」。"}}, {"q": {"en": "A 'Do You Know?' box asks: if a woman is elected president of the United States, what will her husband be called?", "zh": "书里的「你知道吗？」提问：如果一位女性当选美国总统，她的丈夫会被称作什么？"}, "options": [{"en": "The First Gentleman", "zh": "第一先生 (The First Gentleman)"}, {"en": "The First Man", "zh": "第一男人"}, {"en": "The President's Assistant", "zh": "总统助理"}, {"en": "The First Husband", "zh": "第一丈夫"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The 'Do You Know?' box answers that if a woman is elected president, 'her husband' would be called 'The First Gentleman.' The author uses this box to engage readers with a fun question.", "zh": "「你知道吗？」给出的答案是：如果女性当选总统，「她的丈夫」会被称为「第一先生」。作者用这个问答框来引起读者的兴趣。"}}, {"q": {"en": "Why did the author Linda Johns write this book about Eleanor Roosevelt, Jacqueline Kennedy, and Hillary Clinton?", "zh": "作者琳达·约翰斯(Linda Johns)为什么写这本关于埃莉诺·罗斯福、杰奎琳·肯尼迪和希拉里·克林顿的书？"}, "options": [{"en": "To introduce three of the most influential First Ladies who worked hard to help others, improve schools, and enrich children's lives", "zh": "为了介绍三位最有影响力的第一夫人——她们努力帮助他人、改善学校、丰富孩子们的生活"}, {"en": "To explain how to run for president", "zh": "为了讲解怎样竞选总统"}, {"en": "To list every First Lady in history", "zh": "为了列出历史上每一位第一夫人"}, {"en": "To teach readers how to cook for the president", "zh": "为了教读者给总统做饭"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book says it is 'about three of the most influential First Ladies' and that First Ladies 'have worked hard to help the poor; improve the environment, schools, and libraries; and enrich the lives of thousands of children.'", "zh": "书里说它讲的是「最有影响力的三位第一夫人」，并说第一夫人「努力帮助穷人、改善环境、学校和图书馆，并丰富了成千上万孩子的生活」。"}}], "extended": {"prompt": {"en": "The book shows First Ladies using their public position to support causes they believe in — Eleanor Roosevelt fought racial discrimination, Jacqueline Kennedy promoted the arts, and Hillary Clinton worked for health care. Think of a cause or problem you care about (animals, the environment, helping others). How could you use your own 'public eye' — your voice, your actions, or your example — to make a difference, the way these First Ladies did?", "zh": "这本书展现了第一夫人利用自己的公众地位去支持自己相信的事业——埃莉诺·罗斯福对抗种族歧视，杰奎琳·肯尼迪推广艺术，希拉里·克林顿推动医疗改革。想一想你关心的一项事业或问题（动物、环境、帮助他人都可以）。你能怎样像这些第一夫人一样，用你自己的「公众影响力」——你的声音、行动或榜样——去带来改变？"}, "guidance": {"en": ["Eleanor Roosevelt resigned from a group to protest the banning of Marian Anderson because of her race (p. 7).", "Jacqueline Kennedy restored the White House as a museum and promoted the arts (p. 11).", "Hillary Clinton led the Task Force on National Health Care Reform and spoke about children's immunizations (p. 14).", "A good answer names a real cause and gives a concrete, personal way to help — not just a wish."], "zh": ["埃莉诺·罗斯福退出某团体，抗议因种族原因禁止玛丽安·安德森演出（第7页）。", "杰奎琳·肯尼迪把白宫修复成博物馆并推广艺术（第11页）。", "希拉里·克林顿领导国家医疗改革工作组，并呼吁儿童接种疫苗（第14页）。", "好的回答会说出一项真实关心的事业，并给出具体、个人的行动方式，而不只是空想。"]}}};</script>
