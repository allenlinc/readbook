<script>window.BOOK = {"slug": "the-legend-of-nessie", "title": "The Legend of Nessie", "titleZh": "尼斯湖怪传说", "level": "Q", "genre": "Nonfiction", "mainSkill": "Integration of Knowledge and Ideas", "questions": [{"q": {"en": "According to the 'Word Origins' box, what does the word 'loch' mean, and what language does it come from?", "zh": "根据书中的「词源」(Word Origins) 小栏目，「loch」这个词是什么意思，又来自哪种语言？"}, "options": [{"en": "It means a lake or narrow arm of the sea stretching inland; it comes from Scottish Gaelic", "zh": "意思是「湖」或「向内延伸的狭长海湾」；来自苏格兰盖尔语"}, {"en": "It means a type of monster; from French", "zh": "意思是一种怪兽；来自法语"}, {"en": "It means a castle; from German", "zh": "意思是一座城堡；来自德语"}, {"en": "It means a mountain; from Spanish", "zh": "意思是一座山；来自西班牙语"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The book states, 'The word loch means lake or a narrow arm of the sea that stretches inland. It comes from the language of Scotland, called Scottish Gaelic.'", "zh": "书里说：「loch 意为湖或向内延伸的狭长海湾，来自苏格兰的语言——盖尔语。」"}}, {"q": {"en": "How big is Loch Ness, according to the book?", "zh": "根据书里的说法，尼斯湖有多大？"}, "options": [{"en": "The largest freshwater body in the British Isles: 24 miles long, 1 mile wide, over 800 feet deep", "zh": "不列颠群岛最大的淡水水体：长24英里、宽1英里、深超过800英尺"}, {"en": "A small pond about 10 feet across", "zh": "一个约10英尺宽的小池塘"}, {"en": "The widest ocean in the world", "zh": "世界上最宽的海洋"}, {"en": "A tiny stream you can step across", "zh": "一条能跨过去的小溪"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says Loch Ness 'is the largest body of fresh water in the British Isles. Loch Ness is 24 miles (39 km) long, only 1 mile (1.6 km) wide, and over 800 feet (244 m) deep in some places.'", "zh": "书里说尼斯湖「是不列颠群岛最大的淡水水体，长24英里（39公里）、宽仅1英里（1.6公里），有些地方深超过800英尺（244米）」。"}}, {"q": {"en": "In the glossary, how is a 'legend' defined?", "zh": "在词汇表里，「legend（传说）」是怎么定义的？"}, "options": [{"en": "A historical story that is believed to be true but cannot be proved", "zh": "一个被认为真实、却无法被证实的历史故事"}, {"en": "A book about science facts", "zh": "一本讲科学事实的书"}, {"en": "A made-up joke", "zh": "一个编出来的笑话"}, {"en": "A list of names", "zh": "一份名单"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines legend as 'a historical story that is believed to be true, but cannot be proved.'", "zh": "词汇表把 legend 定义为「一个被认为真实、却无法被证实的历史故事」。"}}, {"q": {"en": "Who made the first recorded sighting of a monster in Loch Ness, and when?", "zh": "书里记载的第一次尼斯湖怪兽目击是谁、在什么时候？"}, "options": [{"en": "An Irish missionary named Saint Columba, in AD 565", "zh": "一位叫圣哥伦巴的爱尔兰传教士，公元565年"}, {"en": "A scientist with NASA, in 1970", "zh": "一位NASA科学家，1970年"}, {"en": "A tourist with a camera, in 1934", "zh": "一位带相机的游客，1934年"}, {"en": "A fisherman, in the year 2000", "zh": "一位渔夫，2000年"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says, 'The first recorded sighting was in AD 565 by an Irish missionary named Saint Columba,' who commanded a creature to leave his servant alone.", "zh": "书里说：「第一次有记载的目击是在公元565年，由一位叫圣哥伦巴的爱尔兰传教士」，他曾命令一只怪兽别伤害他的仆人。"}}, {"q": {"en": "In 1987, scientists ran 'Operation Deep Scan.' What did they find in Loch Ness?", "zh": "1987年，科学家开展了「深度扫描行动」(Operation Deep Scan)。他们在尼斯湖里发现了什么？"}, "options": [{"en": "Using 24 boats and sonar, they found at least one unexplained echo from a 'large and moving' object about 200 feet down", "zh": "用24艘船和声纳，他们发现了至少一个来自约200英尺深处「又大又在移动」物体的、无法解释的回声"}, {"en": "They found the monster's bones on the shore", "zh": "他们在岸上找到了怪兽的骨头"}, {"en": "They found nothing at all", "zh": "他们什么也没找到"}, {"en": "They found a sunken ship from World War II", "zh": "他们找到了一艘二战沉船"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "In 1987 scientists used '24 boats to map the bottom and sides of the loch with sonar' and 'could not explain at least one echo from a large and moving object 200 feet down.'", "zh": "1987年，科学家用「24艘船和声纳绘制湖底与湖岸地图」，并「无法解释至少有一个来自200英尺深处、又大又在移动的物体的回声」。"}}, {"q": {"en": "Why is Loch Ness too cold for people to swim in?", "zh": "为什么尼斯湖太冷、不适合人游泳？"}, "options": [{"en": "Thick peat blocks sunlight so the water can't warm; below the top 100 feet it stays about 42°F (6°C) year round", "zh": "厚厚的泥炭挡住阳光，水无法被晒暖；水面以下100英尺常年保持约42°F（6°C）"}, {"en": "Volcanoes heat it from below", "zh": "火山从底下加热湖水"}, {"en": "It is filled with hot springs", "zh": "湖里全是温泉"}, {"en": "The sun shines on it all day", "zh": "太阳整天照着湖面"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book explains peat (dead plant material) 'allows light to travel only as deep as a few yards,' so 'sunlight can't warm the water'; the top 100 feet reaches 54°F in summer but the rest stays 42°F all year.", "zh": "书里解释，泥炭（腐烂的植物）「只让光线照到几码深」，所以「阳光无法温暖湖水」；最上面100英尺夏天达54°F，其余部分全年保持42°F。"}}, {"q": {"en": "In the glossary, what is 'sonar'?", "zh": "在词汇表里，「sonar（声纳）」是什么？"}, "options": [{"en": "A system that finds objects underwater and measures depth by sending sound and measuring the echoes that bounce back", "zh": "一种通过发出声音、测量回声来探测水下物体并测量水深系统"}, {"en": "A kind of fish", "zh": "一种鱼"}, {"en": "A type of boat", "zh": "一种船"}, {"en": "A weather report", "zh": "一份天气预报"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines sonar as 'a system to find objects under water and to measure water's depth by making sounds and measuring their echoes coming back.'", "zh": "词汇表把 sonar 定义为「一种通过发出声音、测量回声来探测水下物体并测量水深系统」。"}}, {"q": {"en": "The book describes several famous hoaxes about Nessie. What is one example?", "zh": "书里讲了几个著名的尼斯湖怪恶作剧(hoax)。能举出一个例子吗？"}, "options": [{"en": "A famous 1934 photo was a fake sea-serpent head attached to a toy submarine", "zh": "1934年那张著名的照片，是把假海蛇头装在玩具潜艇上伪造的"}, {"en": "A real dinosaur was found alive", "zh": "发现了一只活着的真恐龙"}, {"en": "The monster was caught on live TV", "zh": "怪兽在电视直播中被抓住了"}, {"en": "Scientists proved it was a whale", "zh": "科学家证明那是一头鲸鱼"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book lists hoaxes including a 'famous photograph from 1934' that 'turned out to be a fake sea-serpent head attached to a toy submarine,' plus hay bales in tar and a hippo-foot footprint.", "zh": "书里列举的恶作剧包括「1934年那张著名照片」其实是「装在玩具潜艇上的假海蛇头」，还有裹着沥青的干草捆和用河马脚做的脚印。"}}, {"q": {"en": "The author presents both 'believers' and 'nonbelievers' about Nessie. Why does the author give both points of view?", "zh": "作者既写了尼斯湖怪的「相信者」也写了「怀疑者」。为什么作者要同时给出两种观点？"}, "options": [{"en": "To show the question is still unsolved and let readers decide, since the mystery is part of its appeal", "zh": "为了表明这个问题仍未有定论、让读者自己判断，因为谜团本身就是它的魅力"}, {"en": "To prove the monster definitely exists", "zh": "为了证明怪兽一定存在"}, {"en": "To prove the monster is fake", "zh": "为了证明怪兽是假的"}, {"en": "To teach how to swim", "zh": "为了教人游泳"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Believers cite similar descriptions and sonar; nonbelievers cite lack of hard evidence and think tales kept kids from the cold water. The author stays neutral so 'the mystery might be its greatest appeal.'", "zh": "相信者引用相似的描述和声纳；怀疑者指出缺乏硬证据、并认为故事是为不让小孩靠近冷水。作者保持中立，所以「谜团或许正是它最大的魅力」。"}}, {"q": {"en": "In the Conclusion, the author says the mystery of Nessie 'might be its greatest appeal.' What does the author mean?", "zh": "在「结论」里，作者说尼斯湖怪的谜团「或许正是它最大的魅力」。作者是什么意思？"}, "options": [{"en": "Not knowing for sure keeps people curious and the legend alive in their imaginations", "zh": "正因为无法确定，才让人保持好奇，让这个传说在人们想象中延续"}, {"en": "The monster is definitely real and dangerous", "zh": "怪兽肯定是真实且危险的"}, {"en": "People should stop caring about it", "zh": "人们应该不再关心它"}, {"en": "The loch will soon dry up", "zh": "湖泊很快就会干涸"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The Conclusion says 'for now, Nessie remains a mystery. That mystery might be its greatest appeal. The legend continues to capture people's imaginations.'", "zh": "结论写道：「目前，尼斯还只是个谜。这谜团或许正是它最大的魅力。这个传说持续吸引着人们的想象力。」"}}], "extended": {"prompt": {"en": "The book shows that some Nessie 'sightings' were hoaxes, while others remain unexplained. Do you think the Loch Ness Monster is real, a myth, or something else? Use evidence from the book (such as the sonar echo, the hoaxes, or the similar creatures in other lakes) to support your opinion.", "zh": "书里显示，有些尼斯湖怪的「目击」是恶作剧，也有些至今无法解释。你觉得尼斯湖怪是真实的、是神话，还是别的什么？请用书中的证据（比如声纳回声、那些恶作剧，或其他湖泊里的类似生物）来支持你的看法。"}, "guidance": {"en": ["Believers point to similar descriptions, many eyewitness reports, and possible sonar evidence (p. 11).", "Nonbelievers note hoaxes like the 1934 toy-submarine photo and the lack of hard proof (p. 11-12).", "A good answer takes a clear stance and backs it with at least one fact from the book."], "zh": ["相信者指出描述相似、目击报告多，以及可能的声纳证据（第11页）。", "怀疑者提到1934年玩具潜艇照片之类的恶作剧，以及缺乏硬证据（第11-12页）。", "好的回答会明确表态，并至少引用书里一条事实来支撑。"]}}};</script>
