y out of ice", "zh": "完全用冰雕成"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says the Incas 'constructed the large buildings, walls, ramps, and more than seven hundred terraces without using iron, steel, or wheels!'", "zh": "书里说印加人「建造了大型建筑、城墙、坡道和七百多级梯田，却没有使用铁、钢或轮子！」"}}, {"q": {"en": "What happened to the city of Pompeii in AD 79?", "zh": "公元79年，庞贝城(Pompeii)发生了什么？"}, "options": [{"en": "Mount Vesuvius erupted for two days, burying it under 20 feet (6 m) of ash", "zh": "维苏威火山喷发了两天，把城市埋在20英尺（6米）厚的火山灰下"}, {"en": "It sank into the ocean in a single day and night", "zh": "它在一天一夜之间沉入了大海"}, {"en": "It was abandoned because of a war", "zh": "它因战争被遗弃"}, {"en": "It was flooded by a river delta", "zh": "它被河流三角洲淹没"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says, 'In AD 79, Mount Vesuvius erupted for two days, burying the city of Pompeii under 20 feet (6 m) of ash.'", "zh": "书里说：「公元79年，维苏威火山喷发了两天，把庞贝城埋在20英尺（6米）厚的火山灰下。」"}}, {"q": {"en": "The book compares what archaeologists do to what everyday activity?", "zh": "书中把考古学家的工作比作哪种日常活动？"}, "options": [{"en": "Piecing bits of the past together 'like a giant puzzle'", "zh": "把过去的碎片「像巨型拼图一样」拼起来"}, {"en": "Cooking a large meal", "zh": "做一顿大餐"}, {"en": "Flying an airplane", "zh": "驾驶飞机"}, {"en": "Planting a garden", "zh": "种一座花园"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Dr. Chip Colwell-Chanthaphonh says archaeologists 'piece all of these bits of the past together like a giant puzzle.'", "zh": "奇普·科尔韦尔-昌塔蓬博士说，考古学家把「这些过去的碎片像巨型拼图一样拼起来」。"}}, {"q": {"en": "According to the book, why do lost cities continue to interest people today?", "zh": "根据这本书，为什么失落的城市至今仍让人们着迷？"}, "options": [{"en": "They offer a look into our ancient past and the promise of new secrets to discover", "zh": "它们让我们窥见古老的过去，也蕴含着等待发现的新秘密"}, {"en": "They are all still inhabited by millions of people", "zh": "它们都仍有数百万居民居住"}, {"en": "They were built by people from other planets e a giant puzzle' to picture life long ago (p. 5).", "A good answer picks a real old object and explains what it reveals about today, and why preserving the past matters."], "zh": ["考古学家通过研究人们留下的东西来了解过去，「常常是他们的垃圾」——旧房子、破碗、被吃掉的动物骨头（第5页）。", "他们把这些碎片「像巨型拼图一样」拼起来，还原很久以前的生活（第5页）。", "好的回答会选出一件真实的旧物，说明它展现了今天的什么，并解释为什么保护过去有意义。"]}}};</script>
