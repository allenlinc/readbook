arned his nickname because he was cheap.", "zh": "词汇表把 stingy 定义为「不喜欢、也不愿意花钱、给予或分享」。「吝啬鬼杰克」因为小气而得此绰号。"}}, {"q": {"en": "How did the jack-o'-lantern tradition travel from Ireland to become popular in America?", "zh": "杰克灯的传统是怎样从爱尔兰传到美国并流行起来的？"}, "options": [{"en": "Irish, English, and Scottish immigrants brought the custom to the U.S., found pumpkins worked well, and by the 1920s pumpkin carving was widespread", "zh": "爱尔兰、英格兰和苏格兰移民把这一习俗带到美国，发现南瓜很合适，到1920年代南瓜雕刻已十分普遍"}, {"en": "A famous American company invented pumpkins and sold them worldwide", "zh": "一家美国名企发明了南瓜并向全球销售"}, {"en": "The Irish mailed carved turnips to America by ship", "zh": "爱尔兰人用船把雕好的芜菁寄到美国"}, {"en": "Television ads in the 1500s made it popular", "zh": "16世纪的电视广告让它流行"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says Irish, English, and Scottish people 'immigrated to the United States, they brought the jack-o'-lantern tradition with them. They soon found that pumpkins... worked well,' and 'By the 1920s, pumpkin carving became widespread across America.'", "zh": "书里说爱尔兰、英格兰和苏格兰人「移民到美国时把杰克灯传统带了过来。他们很快发现南瓜……很合适」，而且「到了1920年代，南瓜雕刻已在美国普遍流行」。"}}, {"q": {"en": "By about what time had pumpkin carving become widespread across America?", "zh": "大约在什么时候，南瓜雕刻在美国已经十分普遍了？"}, "options": [{"en": "By the 1920s", "zh": "到了1920年代"}, {"en": "By the year 1500", "zh": "到了1500年"}, {"en": "Only in the last five years", "zh": "仅仅最近五年"}, {"en": "Exactly in the year 2000", "zh": "正好在2000年"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book states plainly, 'By the 1920s, pumpkin carving became widespread across America.'", "zh": "书里明确写道：「到了1920年代，南瓜雕刻已在美国普遍流行。」"}}, {"q": {"en": "In the book, what is a 'planetarium' — and how is the word used at the Hudson Valley event?", "zh": "在书中，「天文馆」(planetarium) 是什么？它在哈德逊河谷的活动里又是怎么被使用的？"}, "options": [{"en": "A building where the night sky is projected on a curved ceiling; at the event, pumpkins were arranged to form a
