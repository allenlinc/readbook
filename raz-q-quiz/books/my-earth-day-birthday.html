<script>window.BOOK = {"slug": "my-earth-day-birthday", "title": "My Earth Day Birthday", "titleZh": "我的地球日生日", "level": "Q", "genre": "Nonfiction", "mainSkill": "Author's Purpose and Perspective", "questions": [{"q": {"en": "When is Tara's birthday, and why is it special to her?", "zh": "塔拉(Tara)的生日是哪一天？为什么对她来说很特别？"}, "options": [{"en": "April 22 — Earth Day; she calls it her 'Earth Day birthday' and helps the environment each year", "zh": "4月22日——地球日；她称之为「地球日生日」，每年都做一件保护环境的事"}, {"en": "December 25 — Christmas; she gives presents to friends", "zh": "12月25日——圣诞节；她给朋友送礼物"}, {"en": "July 4 — Independence Day; she watches fireworks", "zh": "7月4日——独立日；她看烟花"}, {"en": "January 1 — New Year's Day; she makes resolutions", "zh": "1月1日——元旦；她立新年愿望"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says, 'My birthday is on April 22 — Earth Day. I call it my \"Earth Day birthday.\" Every year, I do something special on my birthday to help the environment.'", "zh": "书里写道：「我的生日是4月22日——地球日。我把它叫做『地球日生日』。每年生日我都做一件特别的事来保护环境。」"}}, {"q": {"en": "What happened two years before the story, on a trip to Mexico, that made Tara want to help the environment?", "zh": "故事发生前两年，在墨西哥的一次旅行中发生了什么，让塔拉想要保护环境？"}, "options": [{"en": "She saw a dead sea turtle that had choked on a plastic grocery bag", "zh": "她看到一只被塑料袋噎死的海龟"}, {"en": "She got lost on a hiking trail", "zh": "她在一条徒步小路上迷路了"}, {"en": "She won a poster contest at school", "zh": "她在学校海报比赛中获奖"}, {"en": "She met a famous scientist", "zh": "她遇见了一位著名科学家"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "On a beach in Mexico, Tara 'saw a dead sea turtle that had choked on a plastic grocery bag,' and 'that day, I decided I would find a way to help the environment.'", "zh": "在墨西哥的海滩上，塔拉「看到一只被塑料袋噎死的海龟」，并「就在那天，我决定要想办法保护环境」。"}}, {"q": {"en": "In the glossary, what does 'renewable' mean?", "zh": "在词汇表里，「renewable」(可再生) 是什么意思？"}, "options": [{"en": "Able to be replaced and not permanently used up", "zh": "能够被替代、不会永久耗尽"}, {"en": "Made only from plastic", "zh": "只用塑料制成"}, {"en": "Something you throw away after one use", "zh": "用过一次就扔掉的东西"}, {"en": "A type of sea animal", "zh": "一种海洋动物"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines renewable as 'able to be replaced and not permanently used up' — Tara's class sold things 'made from renewable materials such as bamboo.'", "zh": "词汇表把 renewable 定义为「能够被替代、不会永久耗尽」——塔拉的班级贩卖「用竹子之类的可再生材料做成的东西」。"}}, {"q": {"en": "According to the book, who came up with the idea for Earth Day, and when?", "zh": "根据这本书，是谁、在什么时候想出了「地球日」这个点子？"}, "options": [{"en": "Gaylord Nelson, a U.S. senator from Wisconsin, in the late 1960s", "zh": "威斯康星州的美国参议员盖洛德·纳尔逊(Gaylord Nelson)，在20世纪60年代末"}, {"en": "Tara's teacher, Ms. Gonzales, in 2010", "zh": "塔拉的老师冈萨雷斯女士，在2010年"}, {"en": "The mayor of Tara's town, last year", "zh": "塔拉所在镇的镇长，去年"}, {"en": "A group of sea turtles, long ago", "zh": "一群海龟，很久以前"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says 'Gaylord Nelson was a U.S. senator from Wisconsin. He came up with the idea for Earth Day in the late 1960s' and announced the first event for spring 1970.", "zh": "书里说「盖洛德·纳尔逊是威斯康星州的美国参议员。他在20世纪60年代末想出了地球日的点子」，并宣布在1970年春天举办第一次活动。"}}, {"q": {"en": "Ms. Gonzales gave the class matching T-shirts with a sea turtle and the words 'Respect Nature.' What do these shirts represent?", "zh": "冈萨雷斯女士给全班发了印有海龟和「尊重自然」字样的同款 T 恤。这些 T 恤代表了什么？"}, "options": [{"en": "A birthday gift to Tara that honors the sea turtle from Mexico that inspired her love for the environment", "zh": "送给塔拉的生日礼物，纪念那只在墨西哥改变了她、让她爱上环保的海龟"}, {"en": "A prize for winning the school soccer game", "zh": "赢得学校足球赛的奖品"}, {"en": "The uniform for the community garden cleanup", "zh": "社区花园清扫活动的制服"}, {"en": "A free gift from the town mayor", "zh": "镇长送的免费礼物"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The design was 'Ms. Gonzales's birthday present to me. She knew 有塑料袋"}, {"en": "She moved the fair to a different country", "zh": "她把市集搬到了另一个国家"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "Tara got 'a phone call that night from our town's mayor' who, after the news, 'decided to hold an Earth Day celebration for the whole town next year' and asked Tara to work with her.", "zh": "塔拉「那天晚上接到了镇长的电话」，镇长看了新闻后「决定明年为整个镇举办地球日活动」，并请塔拉一起参与。"}}], "extended": {"prompt": {"en": "Tara saw one dead sea turtle and decided to do something about it, growing from a worried kid into the organizer of a town-changing fair. Think of an environmental problem you care about (litter, plastic, wasted energy, a local park). What is one small action you could take, and how could you get others involved like Tara did?", "zh": "塔拉看到一只死海龟，就决定做点什么，从一个担心的孩子成长为一场改变全镇的市集组织者。想一想你关心的某个环境问题（垃圾、塑料、能源浪费、社区公园……）。你能采取的一个小行动是什么？你又能像塔拉那样带动别人一起参与吗？"}, "guidance": {"en": ["Tara's spark was seeing a sea turtle 'choked on a plastic grocery bag' in Mexico (p. 6).", "Her class fair used many small actions — reusable bags, a garden, a cleanup, a skit (pp. 7-16).", "A good answer names a real problem, picks one doable action, and explains how to involve others (like Tara's mayor-inspired town event)."], "zh": ["塔拉的触发点是看到墨西哥一只「被塑料袋噎死的海龟」（第6页）。", "她班级的市集用了许多小行动——可重复使用袋子、社区花园、清扫、短剧（第7-16页）。", "好的回答要说出真实问题、选一个可行的行动，并说明怎样带动他人（像塔拉带动镇长办全镇活动那样）。"]}}};</script>
