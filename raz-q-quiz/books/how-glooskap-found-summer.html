<script>window.BOOK = {"slug": "how-glooskap-found-summer", "title": "How Glooskap Found Summer", "titleZh": "格鲁斯卡普如何找到夏天", "level": "Q", "genre": "Fiction", "mainSkill": "Author's Purpose and Perspective", "questions": [{"q": {"en": "At the beginning of the story, what was wrong with the world?", "zh": "故事开头，世界出了什么问题？"}, "options": [{"en": "A frosty wind from the north covered the lands in ice and snow, so fires couldn't keep people warm and corn wouldn't grow", "zh": "一阵从北方刮来的寒风把大地覆盖在冰雪之下，火堆无法让人取暖，玉米也无法生长"}, {"en": "A great flood covered everything with water", "zh": "一场大洪水把一切都淹没了"}, {"en": "A terrible drought left the land dry and dusty", "zh": "一场严重干旱让大地干裂、尘土飞扬"}, {"en": "A volcano buried the villages in ash", "zh": "一座火山把村庄埋在火山灰里"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says 'a frosty wind blew out of the north, and an unbroken blanket of ice and snow covered the lands. The cold was so severe that fires couldn't keep the people warm, and the corn wouldn't grow.'", "zh": "书里写道：「一阵寒风从北方刮来，一层无缝的冰雪毯子覆盖了大地。寒冷如此剧烈，火堆无法让人取暖，玉米也无法生长。」"}}, {"q": {"en": "Who flew to find Glooskap and woke him from Winter's freezing sleep?", "zh": "是谁飞去找格鲁斯卡普，把他从冬天冰冷的沉睡中唤醒的？"}, "options": [{"en": "Tatler the Loon, Glooskap's friend and messenger", "zh": "潜鸟塔特勒（Tatler the Loon），格鲁斯卡普的朋友兼信使"}, {"en": "Summer herself", "zh": "夏天本人"}, {"en": "An old owl who lived in the wigwam", "zh": "住在棚屋里的老猫头鹰"}, {"en": "Glooskap's great-grandmother", "zh": "格鲁斯卡普的曾祖母"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Glooskap 'slept like a bear for six months under the spell until one day Tatler the Loon flew to find him. Tatler was Glooskap's friend and messenger.'", "zh": "格鲁斯卡普「在咒语下沉睡了六个月，像熊一样，直到有一天潜鸟塔特勒飞去找他。塔特勒是格鲁斯卡普的朋友兼信使。」"}}, {"q": {"en": "Where and how did Glooskap find Summer?", "zh": "格鲁斯卡普是在哪里、怎样找到夏天的？"}, "options": [{"en": "In a warm southern land, dancing in a circle of spirits, with long brown hair and a crown of flowers", "zh": "在温暖南方的一片土地，在一圈精灵中跳舞，留着棕色长发、头戴花冠"}, {"en": "Hidden deep inside Winter's icy wigwam", "zh": "藏在冬天冰棚屋的深处"}, {"en": "Swimming in the frozen northern ocean", "zh": "在冻结的北方海洋里游泳"}, {"en": "Sleeping on a bed of snow", "zh": "睡在雪床上"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Glooskap traveled south to 'a land where it was still sunny and warm' and saw 'a group of spirits dancing in a circle. In the middle of the circle was the beautiful Summer. She had long brown hair and wore a crown of flowers on her head.'", "zh": "格鲁斯卡普向南走到「依然阳光明媚而温暖的土地」，看见「一圈精灵在跳舞。圆圈中央是美丽的夏天。她留着棕色长发，头戴花冠。」"}}, {"q": {"en": "How did Summer defeat the giant Winter?", "zh": "夏天是怎样打败巨人冬天的？"}, "options": [{"en": "She chanted her own spell of heat and warmth, which made Winter sweat and forced him to leave", "zh": "她念起自己带来炎热与温暖的咒语，让冬天冒汗，并迫使他离开"}, {"en": "She threw snowballs at him until he ran away", "zh": "她朝他扔雪球，直到他逃跑"}, {"en": "She asked Glooskap to fight him with a sword", "zh": "她让格鲁斯卡普用剑和他打"}, {"en": "She locked him inside his own wigwam", "zh": "她把他锁进自己的棚屋里"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Winter's spell did not affect Summer. 'She began to chant her own spell, which brought heat and warmth to the whole land, and soon sweat poured down the face of Winter.' She told him he must leave.", "zh": "冬天的咒语对夏天无效。「她开始念自己的咒语，给整片大地带来炎热与温暖，很快冬天的脸上就冒出了汗。」她告诉他必须离开。"}}, {"q": {"en": "In the glossary, what is a 'wigwam'?", "zh": "在词汇表里，「棚屋」(wigwam) 是什么？"}, "options": [{"en": "A type of hut built by Native Americans in the Northeast that used curved poles for support", "zh": "美国东北部原住民建造的一种小屋，用弯曲的杆子做支撑"}, {"en": "A kind of boat made from animal skins", "zh": "一种用兽皮做的小船"}, {"en": "A frozen river in the far north", "zh": "北方远方一条结冰的河"}, {"en": "A crown made of flowers", "zh": "用花编成的王冠"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines a wigwam as 'a type of hut built by Native Americans in the Northeast that used curved poles for support.' Winter lived in 'an enormous wigwam made of solid ice.'", "zh": "词汇表把棚屋定义为「美国东北部原住民建造的一种小屋，用弯曲的杆子做支撑」。冬天住在「一座用实心冰建成的大棚屋」里。"}}, {"q": {"en": "What does the word 'confront' mean, and how did Glooskap confront Winter?", "zh": "「对抗」(confront) 这个词是什么意思？格鲁斯卡普是怎样对抗冬天的？"}, "options": [{"en": "To oppose directly and stand up to someone; Glooskap went straight to the door, determined to face the giant", "zh": "直接反对、挺身面对某人；格鲁斯卡普径直走到门前，决心面对巨人"}, {"en": "To hide quietly and run away", "zh": "悄悄躲起来并逃跑"}, {"en": "To give someone a gift", "zh": "送给某人礼物"}, {"en": "To fall fast asleep", "zh": "很快睡着"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary says 'confront' means 'to oppose directly and openly; to stand up to.' Glooskap 'went straight to the door of the wigwam, determined to confront the powerful giant.'", "zh": "词汇表说 confront 意为「直接、公开地反对；挺身面对」。格鲁斯卡普「径直走到棚屋门前，决心对抗那位强大的巨人」。"}}, {"q": {"en": "Why did Glooskap have to get help from Summer instead of defeating Winter by himself?", "zh": "为什么格鲁斯卡普必须向夏天求助，而不能独自打败冬天？"}, "options": [{"en": "He realized he did not have the strength to defeat the giant on his own, and Winter's frost spell could only put him to sleep, not destroy him", "zh": "他意识到自己没有足够力量独自打败巨人，而且冬天的冰霜咒只能让他入睡，无法消灭他"}, {"en": "He was too afraid of the dark to go north alone", "zh": "他太怕黑，不敢独自去北方"}, {"en": "Summer had promised him a crown of flowers", "zh": "夏天答应送他一顶花冠"}, {"en": "Winter was actually his friend", "zh": "冬天其实是他的朋友"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says 'Winter's magic was strong enough to put Glooskap to sleep, but he could not destroy the mighty warrior,' and 'Realizing that he did not have the strength to defeat the giant on his own,' Glooskap went south for help.", "zh": "书里说「冬天的魔法强到能让格鲁斯卡普入睡，却无法消灭这位强大的战士」，而「意识到自己没有足够力量独自打败巨人」，格鲁斯卡普便去南方求助。"}}, {"q": {"en": "What agreement did Summer make with Winter about how the seasons would work?", "zh": "夏天和冬天就季节如何更替达成了什么约定？"}, "options": [{"en": "Winter keeps the far north (always winter, undisturbed), may visit other lands part of each year, but every spring Summer returns and Winter must retreat north", "zh": "冬天保有遥远的北方（终年寒冬、不受打扰），每年可到各地作客一段时间，但每年春天夏天归来，冬天必须退回北方"}, {"en": "Winter must leave the Earth forever and never return", "zh": "冬天必须永远离开地球，再也不回来"}, {"en": "Summer stays only one single day each year", "zh": "夏天每年只停留一天"}, {"en": "They take turns every single hour", "zh": "它们每小时轮流一次"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Summer said Winter 'will have his land in the north to rule over... always winter there,' and 'you may come and visit other lands for part of each year. But every spring, I will return to warm the land, and you must retreat to the north.'", "zh": "夏天说冬天「将保有北方那片领土……终年寒冬」，而且「每年可到各地作客一段时间。但每年春天我都会回来温暖大地，你必须退回北方。」"}}, {"q": {"en": "Why does the author tell this story as an Algonquin folktale?", "zh": "作者为什么把这个故事写成阿尔冈昆（Algonquin）民间传说？"}, "options": [{"en": "To explain in a story-like way why we have cold winters and why warm spring always returns", "zh": "用讲故事的方式解释为什么会有寒冷的冬天，以及温暖的春天为何总会回来"}, {"en": "To teach readers how to build an icy wigwam", "zh": "教读者怎样搭建冰棚屋"}, {"en": "To list the real names of all the months", "zh": "列出所有月份的真实名称"}, {"en": "To describe how to catch a loon", "zh": "描述怎样捕捉潜鸟"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "As a folktale, the story gives a creative explanation for the seasons: Winter rules for months each year, but 'in the spring, Summer arrives and chases Winter away,' and 'although sometimes it seems as if winter will never end, spring will always come.'", "zh": "作为民间传说，这个故事对季节做了富有想象力的解释：冬天每年统治数月，但「春天来临时，夏天到来并把冬天赶走」，而且「虽然有时冬天好像永远不会结束，但春天终会到来」。"}}, {"q": {"en": "What hopeful message does the story leave with the reader?", "zh": "这个故事给读者留下了什么充满希望的信息？"}, "options": [{"en": "No matter how long and cold the winter, spring will always come back", "zh": "无论冬天多长多冷，春天总会回来"}, {"en": "Winter is stronger than Summer and wins in the end", "zh": "冬天比夏天更强，最终会获胜"}, {"en": "People should never leave their homes", "zh": "人们永远不该离开家"}, {"en": "Giants are always friendly", "zh": "巨人总是友好的"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book ends by saying 'Although sometimes it seems as if winter will never end, spring will always come' — the author wants readers to feel hope even in the hardest, coldest times.", "zh": "书的结尾说：「虽然有时冬天好像永远不会结束，但春天终会到来」——作者想让读者即使在最艰难、最寒冷的时刻也怀抱希望。"}}], "extended": {"prompt": {"en": "In the story, Glooskap could not defeat Winter alone, so he asked Summer for help and they worked together. Think of a time you needed help from someone else to solve a problem you couldn't fix by yourself. Who helped you, and what did you learn about asking for help?", "zh": "故事里，格鲁斯卡普无法独自打败冬天，于是他请夏天帮忙，两人一起解决了问题。回想一次你需要别人帮忙、才能解决自己搞不定的问题的经历。谁帮了你？你从「开口求助」这件事中学到了什么？"}, "guidance": {"en": ["Glooskap realized 'he did not have the strength to defeat the giant on his own' and traveled south for help (p. 8).", "Summer's spell of heat defeated Winter when Glooskap's own strength could not (p. 12).", "A good answer gives a real example of needing help and explains why teamwork or asking for help is wise."], "zh": ["格鲁斯卡普意识到「自己没有足够力量独自打败巨人」，于是去南方求助（第8页）。", "当格鲁斯卡普自己的力量办不到时，夏天用炎热的咒语打败了冬天（第12页）。", "好的回答会举一个真正需要帮助的例子，并说明为什么合作或求助是明智的。"]}}};</script>
