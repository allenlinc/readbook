<script>window.BOOK = {"slug": "goliath-bird-eating-spiders-giant-arachnids", "title": "Goliath Bird-Eating Spiders: Giant Arachnids", "titleZh": "歌利亚食鸟蛛：巨型蛛形动物", "level": "Q", "genre": "Nonfiction", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "How much can a Goliath bird-eating spider weigh, according to the book?", "zh": "根据这本书，一头巨人食鸟蛛最重能有多重？"}, "options": [{"en": "Up to 6 ounces (about 170 g)—roughly the weight of a large apple", "zh": "最重约 6 盎司（约 170 克）——差不多相当于一个大苹果的重量"}, {"en": "Up to 6 pounds", "zh": "最重约 6 磅"}, {"en": "Up to 60 ounces (about 1.7 kg)", "zh": "最重约 60 盎司（约 1.7 千克）"}, {"en": "About the size of a person's thumb", "zh": "差不多有一个人拇指那么大"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book states Goliaths are the heaviest spiders in the world and 'can weigh up to 6 ounces (170 g)—about the weight of a large apple.' The thumb comparison is for the fangs, not the whole spider.", "zh": "书里说食鸟蛛是世界上最重的蜘蛛，『最重可达 6 盎司（170 克）——差不多相当于一个大苹果』。拇指大小的比较是说它的毒牙，不是整只蜘蛛。"}}, {"q": {"en": "Goliath spiders have eight eyes but poor eyesight. How do they detect prey nearby?", "zh": "巨人食鸟蛛有八只眼睛，视力却很差。它们靠什么察觉附近的猎物？"}, "options": [{"en": "Special hairs on their body that feel the slightest vibrations in the ground and air", "zh": "身上特殊的绒毛，能感知地面和空气中最细微的震动"}, {"en": "A strong sense of smell like a bloodhound", "zh": "像猎犬一样灵敏的嗅觉"}, {"en": "Excellent night vision from their eight eyes", "zh": "八只眼睛带来的超强夜视能力"}, {"en": "A web that trembles when prey touches it", "zh": "猎物碰到就会震动的蜘蛛网"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says that although they have eight eyes and poor eyesight, they 'depend on special hairs that cover their body to sense when prey is near' because the hairs 'can feel the slightest vibrations on the ground and in the air.'", "zh": "书里说，虽然它们有八只眼睛、视力很差，却『靠覆盖全身的特殊绒毛来感知猎物靠近』，因为这些绒毛『能感觉到地面和空气中最细微的震动』。"}}, {"q": {"en": "In the book's diagram, what are the spider's pedipalps (the two short limbs near the head)?", "zh": "在书的图解里，蜘蛛的触肢（pedipalps，头部旁的两截短肢）是做什么用的？"}, "options": [{"en": "Short limbs that help hold a victim and pull prey toward the mouth and fangs", "zh": "用来抓住猎物、并把食物拉向口器和毒牙的短肢"}, {"en": "The silk-making glands in the back body part", "zh": "位于身体后段的吐丝腺"}, {"en": "The eight eyes on the front of the head", "zh": "长在头部前端的八只眼睛"}, {"en": "The hollow fangs filled with venom", "zh": "注满毒液的空心毒牙"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The book calls the two limbs next to the head 'pedipalps' and says 'They help to hold prey' and 'help pull the prey toward the Goliath's mouth and fangs.'", "zh": "书里把头部旁的两截肢叫做『触肢』(pedipalps)，并说它们『帮助抓住猎物』，还能『把猎物拉向食鸟蛛的口器和毒牙』。"}}, {"q": {"en": "The book says Goliaths are 'nocturnal.' What does nocturnal mean?", "zh": "书里说食鸟蛛是『nocturnal』（夜行性的）。nocturnal 是什么意思？"}, "options": [{"en": "Active at night rather than during the day", "zh": "在夜间活动，而不是在白天"}, {"en": "Active during the daytime", "zh": "在白天活动"}, {"en": "A type of spider that lives in water", "zh": "一种生活在水里的蜘蛛"}, {"en": "An animal that eats only birds", "zh": "只吃鸟类的动物"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines nocturnal as 'active at night rather than during the day,' and the book says tarantulas 'stay hidden in their burrows during the day' and hunt 'after the Sun goes down.'", "zh": "词汇表把 nocturnal 定义为『在夜间活动，而不是在白天』。书中也说这类蛛形动物『白天躲在地洞里』，『太阳下山后才出来捕猎』。"}}, {"q": {"en": "What is on a Goliath bird-eating spider's normal menu?", "zh": "巨人食鸟蛛平常都吃些什么？"}, "options": [{"en": "Small animals like crickets, beetles, frogs, bats, and mice—and only rarely a small bird", "zh": "蟋蟀、甲虫、青蛙、蝙蝠、老鼠等小动物——只有偶尔才会吃一只小鸟"}, {"en": "Mostly birds, since its name says 'bird-eating'", "zh": "主要是鸟，因为名字里带『食鸟』"}, {"en": "Only plants and fruit", "zh": "只吃植物和水果"}, {"en": "Fish from rainforest rivers", "zh": "雨林河流里的鱼"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book lists 'Crickets, beetles, frogs, bats, mice, and other small animals' on their menu and notes they 'sometimes eat a small bird, but feathered creatures aren't a normal part of their diet.'", "zh": "书里列出的菜单有『蟋蟀、甲虫、青蛙、蝙蝠、老鼠和其他小动物』，并说明它们『有时会吃一只小鸟，但长羽毛的动物并不是它们日常的饮食』。"}}, {"q": {"en": "According to the book's 'What Makes a Tarantula a Spider?' diagram, what does the BACK body part contain?", "zh": "根据书中『是什么让狼蛛成为蜘蛛？』的图解，蜘蛛身体的『后段』里装着什么？"}, "options": [{"en": "The silk-making glands", "zh": "吐丝腺（制造蛛丝的腺体）"}, {"en": "The eyes, fangs, mouth, and stomach", "zh": "眼睛、毒牙、嘴和胃"}, {"en": "The spider's brain", "zh": "蜘蛛的大脑"}, {"en": "The eight legs", "zh": "八条腿"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The diagram shows the front body part has eyes, fangs, mouth, and stomach, while 'The back part contains the silk glands.'", "zh": "图解显示前段身体有眼睛、毒牙、嘴和胃，而『后段身体装着吐丝腺』。"}}, {"q": {"en": "What happens when a tarantula hawk (spider wasp) attacks a Goliath?", "zh": "当『蛛蜂』（tarantula hawk，一种蜘蛛黄蜂）袭击巨人食鸟蛛时，会发生什么？"}, "options": [{"en": "The female wasp stings it, paralyzes but doesn't kill it, lays an egg on it, and the larva feeds on the living spider", "zh": "雌蜂蜇它，把它麻痹但不杀死，在它身上产卵，幼虫就以这只活蜘蛛为食"}, {"en": "It spins a web and traps the wasp inside", "zh": "它织一张网把黄蜂困在里面"}, {"en": "The spider's venom immediately kills the wasp", "zh": "蜘蛛的毒液立刻杀死了黄蜂"}, {"en": "The wasp eats the spider's web and steals its eggs", "zh": "黄蜂吃掉的蜘蛛的网并偷走它的卵"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book describes how a female tarantula hawk 'stings it. The sting paralyzes the spider but doesn't kill it... lays an egg on it... the larva feeds on the spider.'", "zh": "书里描写雌蛛蜂『蜇它。这一蜇把蜘蛛麻痹却不杀死……在它身上产卵……幼虫就以这只蜘蛛为食』。"}}, {"q": {"en": "How does a Goliath spider turn its prey into food it can eat?", "zh": "巨人食鸟蛛是怎样把猎物变成可以吃的食物的？"}, "options": [{"en": "It sprays strong juices that turn the prey's flesh into liquid, then sucks it up through its straw-shaped mouth", "zh": "它喷出强力的消化液，把猎物的肉化成液体，再用吸管状的嘴吸进去"}, {"en": "It chews the prey with strong jaws and swallows pieces", "zh": "它用有力的颚把猎物嚼碎、吞下块块肉"}, {"en": "It wraps the prey in silk and waits for it to rot", "zh": "它用丝把猎物包起来，等它腐烂"}, {"en": "It cooks the prey with heat from its venom", "zh": "它用毒液产生的热量把猎物『煮熟』"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says the mouth is 'a straw-shaped opening that can only suck' and spiders 'spray strong juices on the paralyzed animal... These juices turn the flesh into liquid' which they then suck up.", "zh": "书里说它的嘴是『一个只能吸的、吸管状的开口』，蜘蛛会『朝被麻痹的动物喷出强力消化液……这些液体把肉化成汁』，再被吸进去。"}}, {"q": {"en": "According to the 'Why Spiders Matter' section, why are Goliath spiders important to their habitat?", "zh": "根据『蜘蛛为何重要』(Why Spiders Matter) 一节，巨人食鸟蛛对它们栖息地的生态系统为何重要？"}, "options": [{"en": "They help keep rodents, insects, and other prey species under control and provide food for other animals", "zh": "它们帮助控制鼠类、昆虫和其他猎物的数量，也为其他动物提供食物"}, {"en": "They build the burrows that other animals live in", "zh": "它们建造的洞穴是其他动物的家"}, {"en": "They pollinate the rainforest's flowers", "zh": "它们为雨林里的花朵传粉"}, {"en": "They eat the poisonous plants that harm the forest", "zh": "它们吃掉危害森林的有毒植物"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The 'Why Spiders Matter' section states they 'help keep rodents, insects, and other prey species under control' and 'also provide food for other animals,' playing 'an important role in the habitats where they live.'", "zh": "『蜘蛛为何重要』一节写道，它们『帮助控制鼠类、昆虫和其他猎物的数量』，并且『也为其他动物提供食物』，在栖息地中扮演『重要的角色』。"}}, {"q": {"en": "What is the book's Focus Question — the big question the author wants you to think about?", "zh": "这本书的「聚焦问题」(Focus Question) 是什么？也就是作者希望你思考的核心问题。"}, "options": [{"en": "How do the unique features of a Goliath bird-eating spider help it to survive in the rainforest?", "zh": "巨人食鸟蛛独特的外形特征，怎样帮助它在雨林中生存？"}, {"en": "Why are Goliath spiders dangerous to humans?", "zh": "巨人食鸟蛛为什么对人类很危险？"}, {"en": "How many eggs does a female Goliath lay?", "zh": "雌蛛会产多少颗卵？"}, {"en": "Where did the spider get its name 'Goliath'?", "zh": "这种蜘蛛的名字『歌利亚』是从哪里来的？"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book opens with the Focus Question: 'How do the unique features of a Goliath bird-eating spider help it to survive in the rainforest?' and the whole book answers it.", "zh": "书一开头就提出聚焦问题：『巨人食鸟蛛独特的外形特征，怎样帮助它在雨林中生存？』全书都在回答这个问题。"}}], "extended": {"prompt": {"en": "The book explains that the Goliath's special features—its hairs that sense vibrations, its venom-filled fangs, and its silk-lined burrow—all help it survive. Think about an animal you know (a pet, a backyard creature, or one from a zoo). What special feature helps it survive, and how is that feature like or unlike the Goliath's? Use details from the book to compare.", "zh": "这本书讲到，巨人食鸟蛛的特殊构造——能感知震动的绒毛、注满毒液的毒牙、铺着丝的地洞——都帮它活下来。想一想你认识的一种动物（宠物、院子里的家伙，或动物园里的）。它有什么特殊构造帮它生存？这种构造和食鸟蛛的相似还是不同？用书中细节来比较。"}, "guidance": {"en": ["The Goliath senses prey through body hairs that feel vibrations, not through its poor eyes (p. 7).", "Its hollow fangs inject venom that paralyzes small prey by attacking the nervous system (p. 11).", "A good answer names one real animal, describes its survival feature, and compares it to a feature from the book."], "zh": ["食鸟蛛靠身上能感知震动的绒毛来发现猎物，而不是靠它很差的眼睛（第7页）。", "它空心的毒牙注入毒液，攻击神经系统、麻痹小猎物（第11页）。", "好的回答要说出一种真实的动物、描述它的生存构造，并和书中的一种构造作比较。"]}}};</script>
