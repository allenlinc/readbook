": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book covers the sport's history, field, positions, scoring, and legends to help readers see 'why the spectacular sport of American football is something to cheer about.'", "zh": "这本书涵盖了运动的历史、场地、位置、得分和传奇人物，帮助读者明白「为什么精彩的美式橄榄球值得欢呼」。"}}, {"q": {"en": "The book mentions different kinds of football. What is the difference between touch football and flag football?", "zh": "书里提到了不同形式的橄榄球。触式橄榄球(touch football)和腰旗橄榄球(flag football)有什么区别？"}, "options": [{"en": "Touch football: just touch the carrier to stop; flag football: grab a cloth (flag) attached to the waist", "zh": "触式：只要碰到持球人就能拦停；腰旗：要拽下挂在对方腰间的布条(旗)"}, {"en": "Touch uses real tackling; flag uses a ball", "zh": "触式用真擒抱；腰旗用球"}, {"en": "They are exactly the same game", "zh": "它们完全是同一种游戏"}, {"en": "Flag football is played in the water", "zh": "腰旗橄榄球是在水里玩的"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book says in touch football players 'only need to touch the ball carrier to stop him,' while in flag football they 'stop a ball carrier by grabbing a piece of cloth attached to his or her waist.'", "zh": "书里说触式橄榄球里球员「只要碰到持球人就能拦停」，而腰旗橄榄球里是「拽下挂在对方腰间的一块布条来拦停」。"}}, {"q": {"en": "Who were Jerry Rice and Joe Montana, and what did they accomplish?", "zh": "杰里·赖斯(Jerry Rice)和乔·蒙塔纳(Joe Montana)是谁？他们取得了什么成就？"}, "options": [{"en": "Two San Francisco 49ers legends (Rice the best wide receiver, Montana the best quarterback) who led the team to three Super Bowl wins", "zh": "旧金山 49 人队的两位传奇（赖斯是最佳外接手，蒙塔纳是最佳四分卫），带领球队三夺超级碗"}, {"en": "Coaches who invented the game", "zh": "发明这项运动的教练"}, {"en": "Referees at the 2000 Super Bowl", "zh": "2000 年超级碗的裁判"}, {"en": "Owners of the Tennessee Titans", "zh": "田纳西泰坦队的主人"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book calls Rice 'the best wide receiver in football history' and Montana 'probably the best quarterback ever,' and 'Together they led the 49ers to three Super Bowl wins.'", "zh": "书里称赖斯是「橄榄球史上最佳外接手」，蒙塔纳是「大概史上最佳四分卫」，两人「一起带领 49 人队三夺超级碗」。"}}], "extended": {"prompt": {"en": "The book asks how football became America's favorite sport. Some people worry the game is too rough. Do you think the gear described in the book (helmet, chin strap, and pads) is enough to keep players safe, or should the game change? Give reasons using details from the book.", "zh": "书里问橄榄球是怎样成为美国最受欢迎的运动。也有人担心这项运动太激烈。你认为书里提到的装备（头盔、下巴带、各种护垫）足以保护球员安全吗？还是应该改变规则？用书中细节说明理由。"}, "guidance": {"en": ["Helmets, chin straps, and pads under the uniforms (shoulder, hip, thigh, knee) 'help them avoid getting hurt' (p. 13).", "A touchdown is worth 6 points, and tackling (knocking down the ball carrier) is how defense stops the other team (p. 11).", "A good answer takes a clear position and supports it with evidence from the book."], "zh": ["头盔、下巴带和护垫（肩、胯、大腿、膝盖）「帮助他们避免受伤」（第13页）。", "达阵值 6 分，而「擒抱/拦截」(tackling，撞倒持球人) 是防守方拦停对方的方式（第11页）。", "好的回答要明确立场，并用书中的证据来支持。"]}}};</script>
