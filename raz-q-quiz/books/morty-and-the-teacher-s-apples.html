<script>window.BOOK = {"slug": "morty-and-the-teacher-s-apples", "title": "Morty and the Teacher's Apples", "titleZh": "麦蒂与老师的苹果", "level": "Q", "genre": "Fiction", "mainSkill": "Author's Purpose and Perspective", "questions": [{"q": {"en": "What rule did Mr. Albert have about his apples, and why did Morty and his friends pick up fallen ones?", "zh": "阿尔伯特先生(Mr. Albert) 对苹果定下什么规矩？麦蒂和朋友们为什么去捡掉落的苹果？"}, "options": [{"en": "Mr. Albert said they could have any apples that fall to the ground, but picking his apples is stealing; the mice used the fallen, overripe, worm-eaten apples for a trick", "zh": "阿尔伯特先生说掉到地上的苹果可以拿，但摘他的苹果就是偷；几只老鼠就把那些过熟、被虫蛀的落果用来恶搞"}, {"en": "Mr. Albert let them pick any apples they wanted for free", "zh": "阿尔伯特先生让他们随便免费摘"}, {"en": "Mr. Albert paid them to pick all the apples", "zh": "阿尔伯特先生付钱让他们把苹果都摘光"}, {"en": "There was no rule about the apples at all", "zh": "对苹果根本没有规矩"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says Mr. Albert yelled, 'You can have any that fall to the ground, but picking my apples is stealing!' Morty then said, 'I know just what to do with those rotten apples... we'll make applesauce for Miss Snickerwiser.'", "zh": "书里说阿尔伯特先生吼道：「掉地上的你们可以拿，但摘我的苹果就是偷！」麦蒂接着说：「我知道拿那些烂苹果干什么……我们给斯尼克维瑟老师做苹果酱。」"}}, {"q": {"en": "What trick did Morty, Ben, and Fred play on Miss Snickerwiser's car?", "zh": "麦蒂、本和弗雷德对斯尼克维瑟老师(Miss Snickerwiser) 的车做了什么恶作剧？"}, "options": [{"en": "They filled her red two-seater Mouse Mini with overripe apples, then added water through the window so the sun cooked them into applesauce", "zh": "他们把过熟的苹果塞满她那辆红色双座「老鼠迷你」车，又从车窗灌水，让太阳把苹果「煮」成苹果酱"}, {"en": "They painted the car bright blue", "zh": "他们把车漆成了亮蓝色"}, {"en": "They let the air out of the tires", "zh": "他们放掉了轮胎的气"}, {"en": "They put a polite thank-you note inside", "zh": "他们在车里放了一张感谢便条"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The three mice filled the unlocked 'slick, red, two-seater Mouse Mini' with apples; later Morty 'grabbed the hose... to stick the running hose in the window,' and 'the sun was... cooking the apples' into a 'nasty batch of applesauce.'", "zh": "三只老鼠把苹果塞满了没锁的「光亮的红色双座老鼠迷你车」；后来麦蒂「抓起水管……把流水灌进车窗」，而「太阳……把苹果煮成了」一摊「恶心的苹果酱」。"}}, {"q": {"en": "From what point of view is this story told?", "zh": "这个故事是用什么视角（人称）叙述的？"}, "options": [{"en": "Third person — a narrator describes Morty's thoughts and actions from outside", "zh": "第三人称——由叙述者从外部描写麦蒂的想法和行为"}, {"en": "First person — Morty tells it as 'I'", "zh": "第一人称——由麦蒂以「我」的口吻讲述"}, {"en": "Second person — the reader is 'you'", "zh": "第二人称——以「你」称呼读者"}, {"en": "It is written as a letter to the teacher", "zh": "它是一封写给老师的信"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The narrator describes Morty from outside, e.g. 'Morty was scampering to school with Ben and Fred, his best buddies,' which is third-person narration.", "zh": "叙述者从外部描写麦蒂，比如「麦蒂和最好的伙伴本、弗雷德蹦蹦跳跳去上学」，这是第三人称叙述。"}}, {"q": {"en": "Why did Morty feel sick with regret after the trick?", "zh": "恶作剧之后，麦蒂为什么会因后悔而心里难受？"}, "options": [{"en": "He learned Miss Snickerwiser's mother was very sick in the hospital, and realized his prank was 'as rotten as the apples' and she didn't deserve it", "zh": "他得知斯尼克维瑟老师的妈妈重病住院，意识到自己的恶作剧「和那些苹果一样腐烂」，而老师根本不配被这样对待"}, {"en": "He ate too many apples and got a stomachache", "zh": "他苹果吃太多，肚子痛"}, {"en": "He was caught by Mr. Albert", "zh": "他被阿尔伯特先生当场抓住"}, {"en": "The car would not start", "zh": "车子发动不起来了"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Back in class, Miss Snickerwiser announced her mother 'is in the hospital' and 'has been very sick'; Morty 'felt sick in his stomach... the kind of sick you get when you really regret something.' Deep inside, 'Morty knew his prank was just as rotten as the apples, and Miss Snickerwiser did not deserve it.'", "zh": "回到教室，斯尼克维瑟老师说妈妈「住院了」「病得很重」；麦蒂「胃里一阵难受……是那种真的后悔时才会有的难受」。他内心清楚「自己的恶作剧和那些苹果一样腐烂，而斯尼克维瑟老师不配被这样对待」。"}}, {"q": {"en": "When Miss Snickerwiser praised her clean car, why did Morty confess instead of just saying yes?", "zh": "当斯尼克维瑟老师夸车子干净时，麦蒂为什么选择坦白、而不是顺口答应「是我洗的」？"}, "options": [{"en": "Because 'HE ALWAYS TELLS THE TRUTH' — even though saying yes would let him 'come out smelling like a rose,' he admits the mean trick", "zh": "因为「他永远都说真话」——尽管说「是」就能「浑身清香地脱身」，他还是坦白了那场恶作剧"}, {"en": "Because the teacher forced him to", "zh": "因为老师逼他说出来"}, {"en": "Because Ben and Fred told on him", "zh": "因为本和弗雷德告了他的状"}, {"en": "Because he wanted a reward", "zh": "因为他想要奖励"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book says Morty could 'simply answer yes and come out smelling like a rose,' but 'HE ALWAYS TELLS THE TRUTH,' so he admits, 'before I washed your car, I played a pretty mean trick on you.'", "zh": "书里说麦蒂本可「只回答是、浑身清香地脱身」，但「他永远都说真话」，于是坦白：「我洗你车之前，对你耍了个挺过分的恶作剧。」"}}, {"q": {"en": "How does Miss Snickerwiser respond when Morty confesses?", "zh": "麦蒂坦白后，斯尼克维瑟老师是怎么回应的？"}, "options": [{"en": "She accepts his apology, pats his head, says next time tell her before leaving the playground, and asks him to thank his mother for teaching him to wash dishes", "zh": "她接受了道歉、拍拍他的头，说下次离开操场前要先告诉她，并让他回家谢谢妈妈教会他做完饭洗碗"}, {"en": "She sends him straight to the principal's office", "zh": "她立刻把他送进校长办公室"}, {"en": "She makes him write lines all night", "zh": "她罚他抄写一整晚"}, {"en": "She laughs and ignores the whole thing", "zh": "她大笑，然后把这事全当没发生"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "Miss Snickerwiser 'smiled at Morty and patted his head... I accept your apology. But next time you decide to leave the playground, you really need to tell me.' She then asks, 'will you tell your mother “Thank you”?' because 'Your mom has done a fine job of teaching you to wash the dishes after you cook.'", "zh": "斯尼克维瑟老师「对麦蒂微笑、拍拍他的头……我接受你的道歉。但下次你决定离开操场，一定要先告诉我。」接着她问：「回家会跟你妈妈说声『谢谢』吗？」因为「你妈妈把你教得真好，做完饭会洗碗」。"}}, {"q": {"en": "Which comparison shows how hard Morty worked to clean the car?", "zh": "下面哪个比喻表现出麦蒂洗车有多卖力？"}, "options": [{"en": "He scrubbed 'like his hero Mega Mouse — 1,000 times faster and stronger than a normal mouse'", "zh": "他「像自己的英雄麦加鼠那样——比普通老鼠快一千倍、强一千倍」地刷洗"}, {"en": "He cleaned 'as slowly as a sleepy snail'", "zh": "他「像困倦的蜗牛一样慢」地清洗"}, {"en": "He washed 'as quietly as a mouse in a library'", "zh": "他「像图书馆里的老鼠一样安静」地洗"}, {"en": "He scrubbed 'like he was planting a garden'", "zh": "他「像在种花园」一样刷洗"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The book says, 'Morty scrubbed like his hero Mega Mouse — 1,000 times faster and stronger than a normal mouse,' showing how determined he was to fix his mess.", "zh": "书里说：「麦蒂像自己的英雄麦加鼠那样——比普通老鼠快一千倍、强一千倍」地刷洗，表现出他一心要弥补自己的烂摊子。"}}, {"q": {"en": "What does Morty realize about Miss Snickerwiser and about himself by the end?", "zh": "到结尾时，麦蒂对斯尼克维瑟老师、也对自己有了什么认识？"}, "options": [{"en": "He sees she wasn't any harder on him than other mice, his prank came from his own anger, and he no longer likes the smell of rotten apples", "zh": "他明白老师对他并不比对别的老鼠更苛刻，恶作剧源于自己的愤怒，而且他再也不喜欢烂苹果的味道了"}, {"en": "He decides Miss Snickerwiser is the meanest teacher ever", "zh": "他认定斯尼克维瑟是史上最刻薄的老师"}, {"en": "He plans to play the same trick again next year", "zh": "他打算明年再搞一次同样的恶作剧"}, {"en": "He decides he loves the smell of apples forever", "zh": "他决定永远爱苹果的味道"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Morty thinks, 'she wasn't any harder on him than any other mouse in the class,' and 'his prank was just as rotten as the apples.' After cleaning, 'he did not like the smell of warm rotten apple... he wouldn't mind it if he never smelled apples again.'", "zh": "麦蒂想：「她对他并不比对班里别的老鼠更苛刻」，而且「他的恶作剧和那些苹果一样腐烂」。洗完车后，「他不喜欢温热的烂苹果味……就算再也不闻苹果味也无所谓」。"}}, {"q": {"en": "Why does the author tell us Miss Snickerwiser had been 'crabby lately' and once called Morty's mother about catsup packets?", "zh": "作者为什么要告诉我们斯尼克维瑟老师「最近脾气变差」，还曾因为番茄酱包的事打电话给麦蒂妈妈？"}, "options": [{"en": "To show Morty's motive (he was angry at her being tough) and that her sharpness had a cause (her sick mother), which deepens his regret", "zh": "为了交代麦蒂的动机（他气老师太严厉），也说明老师的火气事出有因（妈妈病了），从而加深他的愧疚"}, {"en": "To prove the teacher was always unfair", "zh": "为了证明老师一贯不公"}, {"en": "To explain the rule about the apples", "zh": "为了解释苹果的规定"}, {"en": "To describe what Morty ate for lunch", "zh": "为了描写麦蒂午饭吃了什么"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book notes she 'had been crabby lately' and 'even called his mother when Morty smashed catsup packets' — this gives Morty a reason to be mad, but then reveals her mother is sick, so readers understand both sides and Morty's change of heart.", "zh": "书里说她「最近脾气变差」，还「在麦蒂砸了番茄酱包时打电话给他妈妈」——这给了麦蒂生气的理由；但随后揭示她妈妈病重，让读者理解双方，也理解麦蒂为何转变了心意。"}}, {"q": {"en": "What special favor does Miss Snickerwiser ask of Morty at the end?", "zh": "结尾斯尼克维瑟老师请麦蒂帮一个什么特别的忙？"}, "options": [{"en": "To go home and tell his mother 'Thank you' for teaching him to wash dishes after cooking", "zh": "回家后跟妈妈说声「谢谢」，谢谢她教会自己做完饭要洗碗"}, {"en": "To bring her a basket of fresh apples", "zh": "给她带一篮新鲜苹果"}, {"en": "To clean the whole school by himself", "zh": "独自把整所学校打扫干净"}, {"en": "To never speak to Ben and Fred again", "zh": "永远不再和本、弗雷德说话"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "She asks, 'Morty, will you do me one little favor? When you get home, will you tell your mother “Thank you”?' and explains, 'Your mom has done a fine job of teaching you to wash the dishes after you cook.'", "zh": "她问：「麦蒂，能帮我一个小忙吗？回家后，跟你妈妈说声『谢谢』好吗？」并解释：「你妈妈把你教得真好，做完饭会洗碗。」"}}], "extended": {"prompt": {"en": "Morty played a mean trick because he was mad at his teacher, but then he learned she was going through a hard time with her mother. Think of a time you were angry at someone without knowing their full story, or did something unkind you later regretted. How did you handle it, and what helps you choose kindness even when you're upset?", "zh": "麦蒂因为生老师的气而搞了恶作剧，后来才知道老师正因妈妈重病而难过。想一想你曾对某人生气、却并不了解他全部处境，或做了自己后来后悔的不友善之事的经历。你是怎么处理的？当你心烦时，是什么帮你选择善良？"}, "guidance": {"en": ["Miss Snickerwiser's mother was in the hospital and 'very sick,' which is why she seemed crabby (p. 11).", "Morty 'felt sick... when you really regret something you've done' and knew his prank was 'just as rotten as the apples' (p. 12, 15).", "A good answer shares a real moment of misjudging someone, and explains a way to pause and choose kindness."], "zh": ["斯尼克维瑟老师的妈妈住院且「病得很重」，这正是她脾气变差的原因（第11页）。", "麦蒂「感到难受……是那种真的后悔时才会有的难受」，并知道自己的恶作剧「和那些苹果一样腐烂」（第12、15页）。", "好的回答要分享一次误解别人的真实时刻，并说明如何停下来、选择善良。"]}}};</script>
