ore to Java, Bali, the Amazon, the Congo, and Kenya along the equator.", "zh": "本书以第一人称的'探险'形式，沿着赤道从新加坡到爪哇、巴厘岛、亚马逊、刚果，再到肯尼亚。"}}, {"q": {"en": "Why are there very few roads and farms in the Amazon rainforest region?", "zh": "为什么亚马逊雨林地区几乎没有公路和农田？"}, "options": [{"en": "The forest is too thick and the soil is too poor for farming", "zh": "森林太茂密，而且土壤太贫瘠，不适合耕种"}, {"en": "People are not allowed to build there", "zh": "那里不允许人们建造任何东西"}, {"en": "It never stops raining", "zh": "那里从不停雨"}, {"en": "The equator makes the land too hot to stand", "zh": "赤道让土地太热，无法站立"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says, 'You see almost no farms in this region—the forest is too thick, and the soil is too poor.'", "zh": "书中说：'你在这里几乎看不到农田——森林太茂密，而且土壤太贫瘠。'"}}, {"q": {"en": "Which city in the book is described as having many skyscrapers and one of the world's busiest harbors?", "zh": "本书中哪座城市被描述为拥有许多摩天大楼和世界上最繁忙的港口之一？"}, "options": [{"en": "Singapore", "zh": "新加坡"}, {"en": "Manaus", "zh": "马瑙斯"}, {"en": "Kinshasa", "zh": "金沙萨"}, {"en": "Nanyuki", "zh": "纳纽基"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says of Singapore, 'Its shiny skyscrapers make this small island country look very large... Singapore has one of the world's busiest ports.'", "zh": "书中写到新加坡：'闪亮的摩天大楼让这个小小的岛国显得很大……新加坡拥有世界上最繁忙的港口之一。'"}}, {"q": {"en": "What is the author's main purpose in writing Expedition Zero?", "zh": "作者写《零度探险》的主要目的是什么？"}, "options": [{"en": "To describe a journey around the equator and the variety of life and cultures there", "zh": "描述一次环绕赤道的旅程，以及那里丰富多样的生物与文化"}, {"en": "To teach readers how to cook foufou", "zh": "教读者如何烹饪富富"}, {"en": "To argue that the equator is the best place to live", "zh": "论证赤道是最佳居住地"}, {"en": "To explain how to build a spaceship", "zh": "解释如何建造宇宙飞船"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book is a travelogue showing 'the world is full of variety, even on the same latitude line,' visiting many cultures along the equator.", "zh": "本书是一篇游记，展示了'即使在同一条纬度线上，世界也充满多样性'，沿途走访了赤道上的多种文化。"}}, {"q": {"en": "What does the book say is special about day and night at the equator?", "zh": "本书说赤道上的白天和黑夜有什么特别之处？"}, "options": [{"en": "Each day and each night is close to twelve hours long all year", "zh": "一年到头，白天和黑夜都接近各十二小时长"}, {"en": "Days last forty-eight hours", "zh": "一天长达四十八小时"}, {"en": "There is no night at all", "zh": "那里根本没有夜晚"}, {"en": "Nights are twice as long as days", "zh": "夜晚是白天的两倍长"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book's 'Do You Know?' note says, 'at the equator, each day (and each night) is very close to twelve hours long, no matter what season of the year it is.'", "zh": "书中的'你知道吗？'提到：'在赤道上，无论一年中的哪个季节，白天（和夜晚）都接近十二小时长。'"}}], "extended": {"prompt": {"en": "If you could take an expedition along the equator, which of the places in the book would you most want to visit, and what would you hope to see or do there?", "zh": "如果你能沿赤道去探险，书中提到的这些地方里你最想去哪里？你希望在那里看到什么或做什么？"}, "guidance": {"en": ["Name one place from the book (such as Singapore, Bali, the Amazon, the Congo, or Kenya).", "Describe one activity or sight you would look forward to there."], "zh": ["说出书中提到的一个地方（如新加坡、巴厘岛、亚马逊、刚果或肯尼亚）。", "描述你会在那里期待的一项活动或景观。"]}}};</script>
