apital Plymouth was destroyed.", "zh": "“1995年7月，火山喷发，并且至今仍在喷发。”首府普利茅斯被摧毁。"}}, {"q": {"en": "Which town became a ghost town after a 1986 nuclear accident?", "zh": "哪座城镇是在1986年核事故后变成鬼镇的？"}, "options": [{"en": "Pripyat, Ukraine", "zh": "乌克兰的普里皮亚季"}, {"en": "Centralia, Pennsylvania", "zh": "宾夕法尼亚州的森特利亚"}, {"en": "Okuma, Japan", "zh": "日本的大熊町"}, {"en": "Kolmanskop, Namibia", "zh": "纳米比亚的科尔曼斯科普"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "Pripyat, Ukraine, 'was abandoned after a deadly nuclear accident in 1986' at Chernobyl.", "zh": "乌克兰的普里皮亚季“在1986年切尔诺贝利致命核事故后被废弃”。"}}, {"q": {"en": "What do all ghost towns have in common, according to the book?", "zh": "根据本书，所有鬼镇有何共同点？"}, "options": [{"en": "They are near the ocean", "zh": "它们都靠近海洋"}, {"en": "They are lonely places where people left due to a threat or lost work", "zh": "它们都是荒凉之地，人们因受威胁或失去生计而离开"}, {"en": "They were all founded in 1923", "zh": "它们都建于1923年"}, {"en": "They all have gold", "zh": "它们都有金子"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "'Residents often leave a town because of some kind of threat or because their work disappeared.' All are 'lonely places with secrets to share.'", "zh": "“居民常因某种威胁或生计消失而离开。”它们都是“有着秘密可分享的荒凉之地”。"}}, {"q": {"en": "What is special about Ordos (Kangbashi), China?", "zh": "中国的鄂尔多斯（康巴什）有什么特别之处？"}, "options": [{"en": "It is the world's largest ghost city that was always empty", "zh": "它是世界上最大的鬼城，且从一开始就空着"}, {"en": "It was abandoned after a volcano", "zh": "它在火山喷发后被废弃"}, {"en": "It was a whaling port", "zh": "它曾是一座捕鲸港"}, {"en": "It was built on a cliff", "zh": "它建在悬崖上"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "'the world's largest ghost town—actually a ghost city—has always been empty' because it was poorly planned and too expensive.", "zh": "“世界上最大的鬼镇——其实是一座鬼城——从一开始就是空的”，因为它规划不善、过于昂贵。"}}, {"q": {"en": "Why did the underground fire start in Centralia, Pennsylvania?", "zh": "宾夕法尼亚州森特利亚的地下火是如何燃
