<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Ultimate Guide · 猫武士 Warriors Quiz</title>
<style>
  :root{
    --forest:#2f5d3a;
    --forest-dark:#1e3f27;
    --ember:#d35400;
    --cream:#fbf7ee;
    --ink:#2a2118;
    --gold:#e0a82e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--forest),var(--forest-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--ember);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.55rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--ember);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.94;
  }
  .bookzh{margin:2px 0 0 !important;font-weight:bold;letter-spacing:1px;}
  .mark{
    width:54px;height:54px;border-radius:50%;
    background:#fff;margin:12px auto 0;
    display:flex;align-items:center;justify-content:center;
    font-size:1.8rem;
    box-shadow:0 3px 10px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--forest);background:#f3fbf6;}
  .q.wrong{border-color:var(--ember);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--ember);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--forest);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--ember);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--forest-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--ember);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(211,84,0,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(211,84,0,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--forest-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9486;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>The Ultimate Guide</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Erin Hunter</p>
    <p class="bookzh">终极指南</p>
    <div class="mark">📚</div>
  </header>
  <main>
    <p style="text-align:center;color:#555;font-size:.9rem;margin:-2px 0 16px;line-height:1.5">The complete encyclopedia of the Warriors world, with profiles of cats, Clans, and key events.<br><span style="color:#a06a1f">猫武士世界的完整百科，收录了猫角色、族群与关键事件的档案。</span></p>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Warriors: Field Guides — The Ultimate Guide</em> (HarperCollins)</footer>
</div>
<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Erin Hunter",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the story well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The prophecy is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Erin Hunter",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这本书。",
    ok: "不错——不过有几处细节被你漏掉了。",
    low: "该重读一遍啦！真相藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What kind of book is The Ultimate Guide?", "zh": "《终极指南》是一本什么样的书？"}, "options": [{"en": "A book of poems", "zh": "一本诗集"}, {"en": "A complete encyclopedia of the Warriors world", "zh": "猫武士世界的完整百科"}, {"en": "A single Clan's diary according to some versions of the story", "zh": "某一个族群的日记（按书中另一种说法）"}, {"en": "A cookbook for cats", "zh": "一本给猫的食谱"}], "answer": 1, "explain": {"en": "The Ultimate Guide is a comprehensive reference covering cats, Clans, and history.", "zh": "《终极指南》是一本综合性参考书，涵盖猫角色、族群与历史。"}}, {"q": {"en": "In the forest, which Clan's camp is hidden inside a sandy ravine?", "zh": "在森林中，哪个族群的营地隐藏在沙质峡谷（ravine）之中？"}, "options": [{"en": "RiverClan", "zh": "河族（RiverClan）"}, {"en": "ShadowClan according to some versions of the story", "zh": "影族（ShadowClan）（按书中另一种说法）"}, {"en": "WindClan", "zh": "风族（WindClan）"}, {"en": "ThunderClan", "zh": "雷族（ThunderClan）"}], "answer": 3, "explain": {"en": "ThunderClan's camp is tucked into a ravine sheltered by a bramble wall.", "zh": "雷族的营地藏在峡谷里，被荆棘墙所遮蔽。"}}, {"q": {"en": "Which Clan's camp is built among reeds beside a river?", "zh": "哪个族群的营地建在河边的芦苇丛中？"}, "options": [{"en": "ShadowClan", "zh": "影族（ShadowClan）"}, {"en": "WindClan", "zh": "风族（WindClan）"}, {"en": "ThunderClan", "zh": "雷族（ThunderClan）"}, {"en": "RiverClan", "zh": "河族（RiverClan）"}], "answer": 3, "explain": {"en": "RiverClan makes its camp in the reeds along the riverbank.", "zh": "河族的营地建在河岸边的芦苇丛中。"}}, {"q": {"en": "Which Clan's camp lies in a hollow among the pine trees of the conifer forest?", "zh": "哪个族群的营地坐落在针叶林中松树间的洼地里？"}, "options": [{"en": "ShadowClan", "zh": "影族（ShadowClan）"}, {"en": "RiverClan", "zh": "河族（RiverClan）"}, {"en": "ThunderClan", "zh": "雷族（ThunderClan）"}, {"en": "WindClan", "zh": "风族（WindClan）"}], "answer": 0, "explain": {"en": "ShadowClan's damp, shadowy camp is set among the pines.", "zh": "影族潮湿而阴暗的营地坐落在松树之间。"}}, {"q": {"en": "Which Clan's camp is hidden in a ditch on the open moor?", "zh": "哪个族群的营地隐藏在开阔荒原上的一条沟壑（ditch）里？"}, "options": [{"en": "RiverClan", "zh": "河族（RiverClan）"}, {"en": "ThunderClan", "zh": "雷族（ThunderClan）"}, {"en": "WindClan", "zh": "风族（WindClan）"}, {"en": "ShadowClan", "zh": "影族（ShadowClan）"}], "answer": 2, "explain": {"en": "WindClan's camp is a shallow ditch dug into the open moorland.", "zh": "风族的营地是荒原上挖出的一条浅沟。"}}, {"q": {"en": "In Clan belief, what is Silverpelt?", "zh": "在族群的信仰中，银毛带（Silverpelt）是什么？"}, "options": [{"en": "A Clan's territory", "zh": "某个族群的领地"}, {"en": "The trail of stars where StarClan walks", "zh": "星族漫步其上的星河（银河）"}, {"en": "A type of prey", "zh": "一种猎物"}, {"en": "A medicine cat's herb according to some versions of the story", "zh": "巫医使用的一种草药（按书中另一种说法）"}], "answer": 1, "explain": {"en": "Silverpelt is the band of stars (the Milky Way) where StarClan cats walk at night.", "zh": "银毛带是星河中星族猫夜间漫步的星带（即银河）。"}}, {"q": {"en": "Which ThunderClan medicine cat received the first prophecy, 'Fire alone can save our Clan'?", "zh": "哪位雷族巫医接收到了第一条预言「唯有火（Fire）能拯救我们的族群」？"}, "options": [{"en": "Leafpool", "zh": "叶池（Leafpool）"}, {"en": "Cinderpelt according to some versions of the story", "zh": "炭毛（Cinderpelt）（按书中另一种说法）"}, {"en": "Spottedleaf", "zh": "斑叶（Spottedleaf）"}, {"en": "Yellowfang", "zh": "黄牙（Yellowfang）"}], "answer": 2, "explain": {"en": "Spottedleaf, as ThunderClan's medicine cat, received the prophecy about Firestar.", "zh": "斑叶（Spottedleaf）作为雷族巫医，接收到了关于火心的预言。"}}, {"q": {"en": "Which cat is Firestar's daughter and the mate of Bramblestar?", "zh": "哪只猫是火心的女儿，也是棘星（Bramblestar）的伴侣？"}, "options": [{"en": "Squirrelflight", "zh": "松鼠飞（Squirrelflight）"}, {"en": "Sandstorm", "zh": "沙暴（Sandstorm）"}, {"en": "Leafpool", "zh": "叶池（Leafpool）"}, {"en": "Cinderpelt according to some versions of the story", "zh": "炭毛（Cinderpelt）（按书中另一种说法）"}], "answer": 0, "explain": {"en": "Squirrelflight is Firestar's daughter and Bramblestar's loyal mate.", "zh": "松鼠飞（Squirrelflight）是火心的女儿，也是棘星忠实的伴侣。"}}, {"q": {"en": "How many Clans originally shared the forest before SkyClan's return?", "zh": "在天族回归之前，最初共有多少个族群共享这片森林？"}, "options": [{"en": "Four", "zh": "四个"}, {"en": "Two", "zh": "两个"}, {"en": "Three", "zh": "三个"}, {"en": "Five", "zh": "五个"}], "answer": 0, "explain": {"en": "Four Clans—ThunderClan, RiverClan, ShadowClan, and WindClan—shared the forest.", "zh": "雷族、河族、影族和风族这四个族群共享森林。"}}, {"q": {"en": "Which son of Tigerstar became a ThunderClan leader after Firestar?", "zh": "虎星的哪个儿子在火心之后成为了雷族族长？"}, "options": [{"en": "Hawkfrost according to some versions of the story", "zh": "鹰霜（Hawkfrost）（按书中另一种说法）"}, {"en": "Bramblestar", "zh": "棘星（Bramblestar）"}, {"en": "Mothwing", "zh": "蛾翅（Mothwing）"}, {"en": "Tawnypelt", "zh": "苍毛（Tawnypelt）"}], "answer": 1, "explain": {"en": "Brambleclaw, later Bramblestar, son of Tigerstar, became ThunderClan's leader.", "zh": "虎星之子荆棘爪（后称棘星 Bramblestar）成为了雷族族长。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
