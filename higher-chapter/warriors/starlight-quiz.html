<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starlight · 猫武士 Warriors Quiz</title>
<style>
  :root{
    --forest:#2f5d3a;
    --forest-dark:#1e3f27;
    --ember:#d35400;
    --cream:#fbf7ee;
    --ink:#2a2118;
    --gold:#e0a82e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--forest),var(--forest-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--ember);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.55rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--ember);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.94;
  }
  .bookzh{margin:2px 0 0 !important;font-weight:bold;letter-spacing:1px;}
  .mark{
    width:54px;height:54px;border-radius:50%;
    background:#fff;margin:12px auto 0;
    display:flex;align-items:center;justify-content:center;
    font-size:1.8rem;
    box-shadow:0 3px 10px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--forest);background:#f3fbf6;}
  .q.wrong{border-color:var(--ember);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--ember);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--forest);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--ember);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--forest-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--ember);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(211,84,0,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(211,84,0,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--forest-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9486;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>Starlight</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Erin Hunter</p>
    <p class="bookzh">星光闪烁</p>
    <div class="mark">⭐</div>
  </header>
  <main>
    <p style="text-align:center;color:#555;font-size:.9rem;margin:-2px 0 16px;line-height:1.5">At the lake the four Clans claim their territories, find the Island for Gatherings, and face a blaze together.<br><span style="color:#a06a1f">在湖边，四大猫族划分领地，找到用于集会的岛屿，并一同扑灭一场大火。</span></p>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Warriors: The New Prophecy — Starlight</em> (HarperCollins)</footer>
</div>
<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Erin Hunter",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the story well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The prophecy is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Erin Hunter",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这本书。",
    ok: "不错——不过有几处细节被你漏掉了。",
    low: "该重读一遍啦！真相藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Where do the Clans hold their Gatherings at the new lake home?", "zh": "在湖边的新家园，猫族把集会地点设在了哪里？"}, "options": [{"en": "On the Island in the middle of the lake", "zh": "在湖心的小岛上"}, {"en": "In a hollow oak tree according to some versions of the story", "zh": "在一棵空心的橡树里（按书中另一种说法）"}, {"en": "On a high cliff", "zh": "在一处高高的悬崖上"}, {"en": "Inside a Twoleg den", "zh": "在一个两脚兽的棚屋里"}], "answer": 0, "explain": {"en": "The cats discover a small island in the lake and choose it as their safe Gathering place.", "zh": "猫们发现湖中有一座小岛，便选它作为安全的集会地。"}}, {"q": {"en": "How do the cats cross from the shore to the Island for Gatherings?", "zh": "猫们是怎样从岸边到达岛上集会的？"}, "options": [{"en": "They fly with the owls", "zh": "它们跟着猫头鹰飞过去"}, {"en": "They walk across a fallen tree that forms a bridge", "zh": "它们走过一棵倒下、搭成桥的树"}, {"en": "They are carried by Twolegs according to some versions of the story", "zh": "它们被两脚兽载过去（按书中另一种说法）"}, {"en": "They swim across", "zh": "它们游过去"}], "answer": 1, "explain": {"en": "A tree has fallen across the water, making a natural bridge the cats can walk on.", "zh": "一棵树横倒在湖面上，形成一座猫可以行走的天然树桥。"}}, {"q": {"en": "Who leads ShadowClan once the Clans reach the lake?", "zh": "猫族抵达湖边后，谁领导着影族？"}, "options": [{"en": "Blackstar", "zh": "黑星（Blackstar）"}, {"en": "Onestar", "zh": "一星（Onestar）"}, {"en": "Leopardstar", "zh": "豹星（Leopardstar）"}, {"en": "Tigerstar", "zh": "虎星（Tigerstar）"}], "answer": 0, "explain": {"en": "Blackstar is the ShadowClan leader; the four leaders are Firestar, Leopardstar, Blackstar, and Onestar.", "zh": "黑星是影族族长；四位族长分别是火星、豹星、黑星和一星。"}}, {"q": {"en": "Why is Brambleclaw treated with suspicion by some of the other cats?", "zh": "为什么有些猫对荆棘爪抱有怀疑？"}, "options": [{"en": "He is too young to be a warrior according to some versions of the story", "zh": "他太年轻，还不是武士（按书中另一种说法）"}, {"en": "He once lived as a kittypet", "zh": "他曾经是宠物猫"}, {"en": "His father is the evil Tigerstar", "zh": "他的父亲是邪恶的虎星"}, {"en": "He lost a battle with dogs", "zh": "他曾在和狗的战斗中落败"}], "answer": 2, "explain": {"en": "Because Brambleclaw is Tigerstar's son, some cats fear he may turn out like his wicked father.", "zh": "因为荆棘爪是虎星之子，一些猫担心他会变得像邪恶的父亲一样。"}}, {"q": {"en": "What troubles Leafpool about her feelings for Crowfeather?", "zh": "叶池对乌掌的感情，让她有什么困扰？"}, "options": [{"en": "She is too old for him", "zh": "她年纪比他大太多"}, {"en": "He belongs to ShadowClan", "zh": "他属于影族"}, {"en": "She is a medicine cat who must not take a mate", "zh": "她是巫医，不能结伴侣"}, {"en": "He is a kittypet", "zh": "他是宠物猫"}], "answer": 0, "explain": {"en": "As a medicine cat, Leafpool has vowed to serve her Clan and may not love a cat from another Clan.", "zh": "作为巫医，叶池立誓服务族群、不可另结伴侣，更不能与异族之猫相恋。"}}, {"q": {"en": "What disaster brings the four Clans together to help one another at the lake?", "zh": "在湖边，是什么灾难让四大猫族携手互助？"}, "options": [{"en": "A hailstorm", "zh": "一场冰雹"}, {"en": "A fire", "zh": "一场大火"}, {"en": "An earthquake", "zh": "一场地震"}, {"en": "A flood", "zh": "一场洪水"}], "answer": 3, "explain": {"en": "A fire sweeps near the lake, and the Clans put aside their differences to save each other.", "zh": "大火席卷湖边，各族放下分歧，互相救助。"}}, {"q": {"en": "What old Gathering place does the Island replace?", "zh": "这座小岛取代了从前哪一处集会地？"}, "options": [{"en": "The sun-drown-place", "zh": "太阳沉没之地"}, {"en": "The four trees (Fourtrees) in the old forest", "zh": "旧森林里的四棵树（Fourtrees）"}, {"en": "The horseplace", "zh": "马场"}, {"en": "The Tribe's cave", "zh": "部落的洞穴"}], "answer": 3, "explain": {"en": "In the old forest the Clans met at Fourtrees; at the lake they meet on the new Island instead.", "zh": "在旧森林里，各族在四棵树集会；到了湖边，他们改在湖心小岛集会。"}}, {"q": {"en": "Which Clan's medicine cat is Mothwing?", "zh": "蛾翅是哪一支族的巫医？"}, "options": [{"en": "WindClan", "zh": "风族（WindClan）"}, {"en": "RiverClan", "zh": "河族（RiverClan）"}, {"en": "ShadowClan", "zh": "影族（ShadowClan）"}, {"en": "ThunderClan", "zh": "雷族（ThunderClan）"}], "answer": 1, "explain": {"en": "Mothwing serves as the medicine cat of RiverClan after training under the older Mudfur.", "zh": "蛾翅曾跟随年长的泥毛学医，之后担任河族的巫医。"}}, {"q": {"en": "Who is the WindClan leader at the lake, formerly known as Onewhisker?", "zh": "湖边风族的族长是谁？他原名一根须。"}, "options": [{"en": "Tallstar", "zh": "高星（Tallstar）"}, {"en": "Onestar", "zh": "一星（Onestar）"}, {"en": "Mudclaw", "zh": "泥掌（Mudclaw）"}, {"en": "Crowfeather", "zh": "乌掌（Crowfeather）"}], "answer": 2, "explain": {"en": "Onewhisker receives his leader name Onestar and guides WindClan at the lake.", "zh": "一根须获得族长名号一星，在湖边带领风族。"}}, {"q": {"en": "What must the four Clans agree on to live peacefully around the lake?", "zh": "为了在湖边和平共处，四大猫族必须商定什么？"}, "options": [{"en": "Who will rule all the Clans", "zh": "由谁来统治所有族群"}, {"en": "Which Clan owns the fish", "zh": "哪族拥有湖里的鱼"}, {"en": "Which cats must leave", "zh": "哪些猫必须离开"}, {"en": "To share the lake and set fair boundaries", "zh": "共享湖水并划定公平的边界"}], "answer": 1, "explain": {"en": "The leaders meet and mark out each Clan's territory so they can share the lake in peace.", "zh": "族长们会面并划分各族的领地，这样大家才能和平共享湖水。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
