<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tigerclaw's Fury · 猫武士 Warriors Quiz</title>
<style>
  :root{
    --forest:#2f5d3a;
    --forest-dark:#1e3f27;
    --ember:#d35400;
    --cream:#fbf7ee;
    --ink:#2a2118;
    --gold:#e0a82e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--forest),var(--forest-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--ember);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.55rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--ember);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.94;
  }
  .bookzh{margin:2px 0 0 !important;font-weight:bold;letter-spacing:1px;}
  .mark{
    width:54px;height:54px;border-radius:50%;
    background:#fff;margin:12px auto 0;
    display:flex;align-items:center;justify-content:center;
    font-size:1.8rem;
    box-shadow:0 3px 10px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--forest);background:#f3fbf6;}
  .q.wrong{border-color:var(--ember);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--ember);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--forest);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--ember);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--forest-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--ember);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(211,84,0,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(211,84,0,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--forest-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9486;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>Tigerclaw's Fury</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Erin Hunter</p>
    <p class="bookzh">虎掌的愤怒</p>
    <div class="mark">😡</div>
  </header>
  <main>
    <p style="text-align:center;color:#555;font-size:.9rem;margin:-2px 0 16px;line-height:1.5">Exiled from ThunderClan, the furious Tigerclaw gathers followers and plots his rise to power in ShadowClan.<br><span style="color:#a06a1f">被雷族放逐后，怒火中烧的虎掌（Tigerclaw）集结追随者，谋划在影族夺取权力。</span></p>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Warriors: Novellas — Tigerclaw's Fury</em> (HarperCollins)</footer>
</div>
<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Erin Hunter",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the story well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The prophecy is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Erin Hunter",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这本书。",
    ok: "不错——不过有几处细节被你漏掉了。",
    low: "该重读一遍啦！真相藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Why was Tigerclaw driven out of ThunderClan?", "zh": "虎掌为什么被赶出雷族？"}, "options": [{"en": "He tried to kill Bluestar and his treason was exposed by Fireheart", "zh": "他企图杀害蓝星，叛徒行径被火星（Fireheart）揭穿"}, {"en": "He wanted to join RiverClan", "zh": "他想加入河族"}, {"en": "He lost an important battle", "zh": "他输了一场重要的战斗"}, {"en": "He was too old to be deputy according to some versions of the story in an early draft of the book", "zh": "他年纪太大当不了副族长（按书中另一种说法）（在书的早期草稿中）"}], "answer": 0, "explain": {"en": "As deputy, Tigerclaw plotted against Bluestar; Fireheart uncovered the truth and he was exiled.", "zh": "身为副族长的虎掌阴谋反对蓝星，火星揭穿真相，他便被放逐。"}}, {"q": {"en": "How does Tigerclaw feel after his exile?", "zh": "被放逐后，虎掌是什么心情？"}, "options": [{"en": "Happy to be free according to some versions of the story", "zh": "为获得自由而高兴（按书中另一种说法）"}, {"en": "Sorry and ashamed", "zh": "后悔又羞愧"}, {"en": "Calm and at peace", "zh": "平静而安宁"}, {"en": "Full of fury and wanting revenge on ThunderClan", "zh": "满腔怒火，想向雷族复仇"}], "answer": 3, "explain": {"en": "The novella is named for his fury; he burns to punish ThunderClan for casting him out.", "zh": "这部外传正因他的愤怒得名，他一心要惩罚将他逐出的雷族。"}}, {"q": {"en": "Which group of cats joins Tigerclaw after he is cast out?", "zh": "被放逐后，哪群猫投奔了虎掌？"}, "options": [{"en": "StarClan spirits", "zh": "星族的魂魄"}, {"en": "A band of rogues and exiled ShadowClan cats", "zh": "一群流浪猫和被逐出影族的猫"}, {"en": "Loyal ThunderClan warriors according to some versions of the story", "zh": "忠诚的雷族武士（按书中另一种说法）"}, {"en": "RiverClan cats", "zh": "河族猫"}], "answer": 1, "explain": {"en": "Former ShadowClan warriors like Blackfoot and Clawface, plus rogues, gather around Tigerclaw.", "zh": "黑脚（Blackfoot）、利爪面（Clawface）等前影族武士以及一些流浪猫聚到虎掌身边。"}}, {"q": {"en": "During a raid on ThunderClan territory, which ThunderClan cat does Tigerclaw kill?", "zh": "在雷族领地上的一次突袭中，虎掌杀死了哪只雷族猫？"}, "options": [{"en": "Bluestar", "zh": "蓝星（Bluestar）"}, {"en": "Whitethroat according to some versions of the story", "zh": "白喉（Whitethroat）（按书中另一种说法）"}, {"en": "Fireheart", "zh": "火星（Fireheart）"}, {"en": "Runningwind", "zh": "疾风（Runningwind）"}], "answer": 3, "explain": {"en": "Tigerclaw leaps on Runningwind and kills him; Whitethroat later dies by a monster, not by Tigerclaw's claws.", "zh": "虎掌扑倒疾风并将其杀死；白喉后来死于怪兽轮下，并非死在虎掌爪下。"}}, {"q": {"en": "In a dream, which Dark Forest cat speaks to Tigerclaw and tells him ShadowClan needs a leader?", "zh": "在梦中，是哪只黑森林（Dark Forest）的猫对虎掌说影族需要一位领袖？"}, "options": [{"en": "Thistleclaw", "zh": "蓟爪（Thistleclaw）"}, {"en": "Mapleshade", "zh": "枫荫（Mapleshade）"}, {"en": "Hawkfrost", "zh": "鹰霜（Hawkfrost）"}, {"en": "Brokenstar", "zh": "碎星（Brokenstar）"}], "answer": 1, "explain": {"en": "Mapleshade visits Tigerclaw in a starless dream and urges him to become ShadowClan's leader.", "zh": "枫荫在无星之梦中拜访虎掌，怂恿他成为影族的领袖。"}}, {"q": {"en": "What is happening in ShadowClan that helps Tigerclaw rise to power?", "zh": "影族内部发生了什么，让虎掌得以掌权？"}, "options": [{"en": "ShadowClan wins a great battle according to some versions of the story", "zh": "影族打赢了一场大战（按书中另一种说法）"}, {"en": "ShadowClan joins ThunderClan", "zh": "影族并入了雷族"}, {"en": "ShadowClan is sick and without a leader after Nightstar dies", "zh": "影族染病、且夜星（Nightstar）死后群龙无首"}, {"en": "ShadowClan is strong and healthy", "zh": "影族强壮又健康"}], "answer": 2, "explain": {"en": "Weakened by sickness and leaderless, ShadowClan welcomes Tigerclaw's strength and order.", "zh": "影族因疫病削弱又群龙无首，正需要虎掌的力量与秩序。"}}, {"q": {"en": "What event does Tigerclaw watch from afar, worried about his son Bramblekit?", "zh": "虎掌远远地目睹了哪件事，并为自己儿子棘爪（Bramblekit）担忧？"}, "options": [{"en": "A badger attack", "zh": "獾的袭击"}, {"en": "A flood at the lake", "zh": "湖畔的一场洪水"}, {"en": "A forest fire in ThunderClan", "zh": "雷族森林里的一场大火"}, {"en": "A Gathering of all Clans according to some versions of the story", "zh": "各族的族聚（按书中另一种说法）"}], "answer": 2, "explain": {"en": "When ThunderClan's forest catches fire, Tigerclaw watches from the ravine, fearing for Bramblekit.", "zh": "雷族森林失火时，虎掌在峡谷上观望，担心棘爪的安危。"}}, {"q": {"en": "Who saves Bramblekit from the fire?", "zh": "是谁从大火中救出了棘爪？"}, "options": [{"en": "Fireheart", "zh": "火星（Fireheart）"}, {"en": "Tigerclaw", "zh": "虎掌"}, {"en": "Goldenflower", "zh": "金花（Goldenflower）"}, {"en": "Bluestar", "zh": "蓝星（Bluestar）"}], "answer": 0, "explain": {"en": "Though Tigerclaw hates him, Fireheart rescues Bramblekit, and Tigerclaw quietly thanks StarClan for sparing his son.", "zh": "尽管虎掌恨火星，火星却救了棘爪，虎掌暗自感谢星族保住儿子。"}}, {"q": {"en": "How does Tigerclaw become the leader of ShadowClan?", "zh": "虎掌是如何当上影族族长的？"}, "options": [{"en": "StarClan directly names him", "zh": "星族直接点名他"}, {"en": "Runningnose reads a 'sign'—a claw with tiger-stripe shadows—and names him leader", "zh": "奔鼻（Runningnose）读到「征兆」——一道带虎纹阴影的爪印——于是任命他为领袖"}, {"en": "He wins a battle against Nightstar according to some versions of the story in an early draft of the book", "zh": "他在与夜星的战斗中获胜（按书中另一种说法）（在书的早期草稿中）"}, {"en": "He is elected by all the Clans", "zh": "他被所有族群共同推举"}], "answer": 1, "explain": {"en": "After Nightstar dies, Runningnose takes a claw-shadow as StarClan's sign and names Tigerclaw leader.", "zh": "夜星死后，奔鼻把爪影当作星族的征兆，任命虎掌为领袖。"}}, {"q": {"en": "What new name does Tigerclaw take as ShadowClan's leader?", "zh": "当上影族族长后，虎掌改叫什么名字？"}, "options": [{"en": "Tigerstar", "zh": "虎星（Tigerstar）"}, {"en": "Nightstar", "zh": "夜星（Nightstar）"}, {"en": "Darkstar", "zh": "暗星（Darkstar）"}, {"en": "Tigerclaw (he keeps it)", "zh": "仍是虎掌（Tigerclaw）"}], "answer": 0, "explain": {"en": "As leader he receives the suffix -star and is called Tigerstar, beginning his reign of ambition.", "zh": "成为族长后他获得「-star」之名，称虎星（Tigerstar），开启了充满野心的统治。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
