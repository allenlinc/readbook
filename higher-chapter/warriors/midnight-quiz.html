<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Midnight · 猫武士 Warriors Quiz</title>
<style>
  :root{
    --forest:#2f5d3a;
    --forest-dark:#1e3f27;
    --ember:#d35400;
    --cream:#fbf7ee;
    --ink:#2a2118;
    --gold:#e0a82e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--forest),var(--forest-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--ember);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.55rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--ember);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.94;
  }
  .bookzh{margin:2px 0 0 !important;font-weight:bold;letter-spacing:1px;}
  .mark{
    width:54px;height:54px;border-radius:50%;
    background:#fff;margin:12px auto 0;
    display:flex;align-items:center;justify-content:center;
    font-size:1.8rem;
    box-shadow:0 3px 10px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--forest);background:#f3fbf6;}
  .q.wrong{border-color:var(--ember);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--ember);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--forest);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--ember);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--forest-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--ember);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(211,84,0,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(211,84,0,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--forest-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9486;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>Midnight</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Erin Hunter</p>
    <p class="bookzh">午夜追踪</p>
    <div class="mark">🌊</div>
  </header>
  <main>
    <p style="text-align:center;color:#555;font-size:.9rem;margin:-2px 0 16px;line-height:1.5">Six cats cross the forest to the ocean to meet Midnight the badger, who warns them the Twolegs will destroy their home.<br><span style="color:#a06a1f">六只猫穿越森林来到海边，会见獾午夜，得知两脚兽将摧毁它们的家园。</span></p>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Warriors: The New Prophecy — Midnight</em> (HarperCollins)</footer>
</div>
<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Erin Hunter",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the story well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The prophecy is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Erin Hunter",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这本书。",
    ok: "不错——不过有几处细节被你漏掉了。",
    low: "该重读一遍啦！真相藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What kind of animal is Midnight, the wise creature the traveling cats meet at the ocean?", "zh": "远行的猫在海边见到的那只聪明的动物「午夜」是什么？"}, "options": [{"en": "A fox", "zh": "一只狐狸"}, {"en": "A badger", "zh": "一只獾"}, {"en": "A hedgehog", "zh": "一只刺猬"}, {"en": "An owl", "zh": "一只猫头鹰"}], "answer": 1, "explain": {"en": "Midnight is a clever old badger who lives alone at the sun-drown-place (the ocean).", "zh": "午夜是一只聪明的老獾，独自生活在太阳沉没之地（大海边）。"}}, {"q": {"en": "Why do the four Clans have to leave their forest home?", "zh": "四大猫族为什么要离开它们的森林家园？"}, "options": [{"en": "Twolegs are cutting down the forest", "zh": "两脚兽正在砍伐森林"}, {"en": "A fire burns the woods", "zh": "一场大火烧光了森林"}, {"en": "A deadly sickness spreads", "zh": "一种致命的疾病蔓延"}, {"en": "A great flood covers the trees according to some versions of the story", "zh": "一场大洪水淹没了树林（按书中另一种说法）"}], "answer": 0, "explain": {"en": "Midnight warns that the Twolegs (humans) will destroy the forest, so the Clans must find a new home.", "zh": "午夜警告说两脚兽（人类）将摧毁森林，所以猫族必须寻找新的家园。"}}, {"q": {"en": "What does Midnight say the Clans' new home will be near?", "zh": "午夜说猫族的新家园会在什么旁边？"}, "options": [{"en": "A lake", "zh": "一片湖泊"}, {"en": "The wide ocean", "zh": "宽阔的大海"}, {"en": "A rushing river", "zh": "一条湍急的河流"}, {"en": "A mountain peak", "zh": "一座山峰"}], "answer": 0, "explain": {"en": "She tells them to follow the sun to the water, then turn and keep the water on their right until they reach a lake.", "zh": "她告诉他们追着太阳走到水边，再转弯并让水一直在右边，直到抵达一片湖泊。"}}, {"q": {"en": "Where does Midnight, the wise badger, make her home?", "zh": "聪明的獾午夜把家安在哪里？"}, "options": [{"en": "Inside the forest", "zh": "在森林里面"}, {"en": "In the high mountains", "zh": "在高高的群山里"}, {"en": "At the sun-drown-place (the ocean)", "zh": "在太阳沉没之地（大海边）"}, {"en": "Deep in the lake territory according to some versions of the story", "zh": "在湖区的深处（按书中另一种说法）"}], "answer": 2, "explain": {"en": "The cats travel all the way to the sun-drown-place, the edge of the ocean, to find her.", "zh": "猫们一路走到太阳沉没之地——大海的边缘——才找到她。"}}, {"q": {"en": "Which ThunderClan warrior is chosen to lead the quest to find a new home?", "zh": "雷族哪只武士被选中带领寻找新家园的旅程？"}, "options": [{"en": "Cloudtail", "zh": "云尾（Cloudtail）"}, {"en": "Brambleclaw", "zh": "荆棘爪（Brambleclaw）"}, {"en": "Firestar", "zh": "火星（Firestar）"}, {"en": "Graystripe according to some versions of the story", "zh": "灰条（Graystripe）（按书中另一种说法）"}], "answer": 1, "explain": {"en": "Brambleclaw is picked by the medicine cats' signs to lead the journey to the sun-drown-place.", "zh": "根据巫医们得到的征兆，荆棘爪被选中带领大家前往太阳沉没之地。"}}, {"q": {"en": "Which cat is NOT chosen but secretly follows the travelers on the journey?", "zh": "哪只猫没有被选中，却偷偷跟上了远行的队伍？"}, "options": [{"en": "Crowpaw", "zh": "乌掌（Crowpaw）"}, {"en": "Feathertail according to some versions of the story", "zh": "羽尾（Feathertail）（按书中另一种说法）"}, {"en": "Tawnypelt", "zh": "豹斑（Tawnypelt）"}, {"en": "Squirrelpaw", "zh": "松鼠爪（Squirrelpaw）"}], "answer": 3, "explain": {"en": "Squirrelpaw hides and stows away, joining the quest even though she was not one of the chosen cats.", "zh": "松鼠爪偷偷藏起来跟上队伍，尽管她并不是被选中的猫之一。"}}, {"q": {"en": "Which WindClan apprentice is one of the cats who travels to the sun-drown-place?", "zh": "哪只风族学徒是前往太阳沉没之地的猫之一？"}, "options": [{"en": "Brambleclaw", "zh": "荆棘爪（Brambleclaw）"}, {"en": "Stormfur", "zh": "暴毛（Stormfur）"}, {"en": "Tawnypelt", "zh": "豹斑（Tawnypelt）"}, {"en": "Crowpaw", "zh": "乌掌（Crowpaw）"}], "answer": 3, "explain": {"en": "Crowpaw represents WindClan on the long journey across the forest to the ocean.", "zh": "乌掌代表风族，踏上了穿越森林前往大海的漫长旅程。"}}, {"q": {"en": "Which ShadowClan cat, the daughter of Tigerstar, joins the journey?", "zh": "哪位虎星的女儿、影族猫加入了旅程？"}, "options": [{"en": "Leafpool", "zh": "叶池（Leafpool）"}, {"en": "Squirrelpaw", "zh": "松鼠爪（Squirrelpaw）"}, {"en": "Tawnypelt", "zh": "豹斑（Tawnypelt）"}, {"en": "Mothwing", "zh": "蛾翅（Mothwing）"}], "answer": 2, "explain": {"en": "Tawnypelt, sister of Brambleclaw and daughter of Tigerstar, travels for ShadowClan.", "zh": "豹斑是荆棘爪的妹妹、虎星的女儿，代表影族参加了旅程。"}}, {"q": {"en": "Which two RiverClan siblings travel together on the quest?", "zh": "哪两只河族兄弟姐妹一同踏上了旅程？"}, "options": [{"en": "Feathertail and Stormfur", "zh": "羽尾（Feathertail）和暴毛（Stormfur）"}, {"en": "Cinderpelt and Cloudtail", "zh": "炭毛（Cinderpelt）和云尾（Cloudtail）"}, {"en": "Leafpool and Squirrelpaw", "zh": "叶池（Leafpool）和松鼠爪（Squirrelpaw）"}, {"en": "Brambleclaw and Tawnypelt", "zh": "荆棘爪（Brambleclaw）和豹斑（Tawnypelt）"}], "answer": 0, "explain": {"en": "RiverClan sends two cats: Feathertail and her brother Stormfur, who are littermates.", "zh": "河族派出了两只猫：羽尾和她的兄弟暴毛，它们是一窝出生的手足。"}}, {"q": {"en": "At the start of the story, what warns the medicine cats that danger is coming to the forest?", "zh": "故事开始时，是什么警告巫医们森林即将面临危险？"}, "options": [{"en": "A meeting with Midnight", "zh": "与午夜的一次会面"}, {"en": "A shared dream of a dark cloud and rising water", "zh": "一场关于乌云和上涨洪水的共同梦境"}, {"en": "A message carried by a bird according to some versions of the story", "zh": "一只鸟带来的口信（按书中另一种说法）"}, {"en": "A scroll left by a Twoleg", "zh": "两脚兽留下的一卷字纸"}], "answer": 1, "explain": {"en": "The medicine cats of all four Clans share a troubling dream of water swallowing the forest, sparking the quest.", "zh": "四大猫族的巫医都做了同一个不安的梦，梦见洪水吞没森林，由此开启了这场旅程。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
