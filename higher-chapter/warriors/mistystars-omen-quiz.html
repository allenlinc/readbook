<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mistystar's Omen · 猫武士 Warriors Quiz</title>
<style>
  :root{
    --forest:#2f5d3a;
    --forest-dark:#1e3f27;
    --ember:#d35400;
    --cream:#fbf7ee;
    --ink:#2a2118;
    --gold:#e0a82e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--forest),var(--forest-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--ember);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.55rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--ember);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.94;
  }
  .bookzh{margin:2px 0 0 !important;font-weight:bold;letter-spacing:1px;}
  .mark{
    width:54px;height:54px;border-radius:50%;
    background:#fff;margin:12px auto 0;
    display:flex;align-items:center;justify-content:center;
    font-size:1.8rem;
    box-shadow:0 3px 10px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--forest);background:#f3fbf6;}
  .q.wrong{border-color:var(--ember);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--ember);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--forest);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--ember);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--forest-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--ember);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(211,84,0,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(211,84,0,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--forest-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9486;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>Mistystar's Omen</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Erin Hunter</p>
    <p class="bookzh">雾星的预兆</p>
    <div class="mark">🌊</div>
  </header>
  <main>
    <p style="text-align:center;color:#555;font-size:.9rem;margin:-2px 0 16px;line-height:1.5">Newly named leader Mistystar must guide RiverClan through a crisis of faith and empty waters.<br><span style="color:#a06a1f">刚成为族长的雾星（Mistystar）必须带领河族度过一场信仰危机与食物短缺的难关。</span></p>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Warriors: Novellas — Mistystar's Omen</em> (HarperCollins)</footer>
</div>
<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Erin Hunter",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the story well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The prophecy is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Erin Hunter",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这本书。",
    ok: "不错——不过有几处细节被你漏掉了。",
    low: "该重读一遍啦！真相藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Why does Mistyfoot become the leader of RiverClan?", "zh": "雾脚（Mistyfoot）为什么会成为河族的族长？"}, "options": [{"en": "She is chosen by StarClan over her brother according to some versions of the story", "zh": "星族越过她兄弟选了她（按书中另一种说法）"}, {"en": "Leopardstar loses her ninth life and dies", "zh": "豹星（Leopardstar）失去了第九条命并死去"}, {"en": "She defeats Leopardstar in a battle", "zh": "她在战斗中打败了豹星"}, {"en": "The old leader leaves the lake", "zh": "老族长离开了湖畔"}], "answer": 1, "explain": {"en": "When Leopardstar dies, deputy Mistyfoot receives her nine lives at the Moonpool and becomes Mistystar.", "zh": "豹星死后，副族长雾脚在月池接受九条命，成为雾星（Mistystar）。"}}, {"q": {"en": "Whom does Mistystar choose as her deputy?", "zh": "雾星选了谁当副族长？"}, "options": [{"en": "Stonefur, her brother", "zh": "石毛（Stonefur），她的兄弟"}, {"en": "Leopardstar's old deputy", "zh": "豹星从前的副族长"}, {"en": "Reedwhisker, her son", "zh": "苇须（Reedwhisker），她的儿子"}, {"en": "Mothwing, the medicine cat", "zh": "蛾翅（Mothwing），巫医"}], "answer": 2, "explain": {"en": "Mistystar names Reedwhisker, her own son, as deputy—a choice some cats think is favoritism.", "zh": "雾星任命自己的儿子苇须为副族长，有些猫认为这是任人唯亲。"}}, {"q": {"en": "What surprising truth does Mistystar learn about her medicine cat Mothwing?", "zh": "雾星发现巫医蛾翅一个惊人的真相是什么？"}, "options": [{"en": "Mothwing wants to leave RiverClan", "zh": "蛾翅想离开河族"}, {"en": "Mothwing does not believe in StarClan", "zh": "蛾翅并不相信星族"}, {"en": "Mothwing is actually a kittypet", "zh": "蛾翅其实是宠物猫"}, {"en": "Mothwing is a spy from ThunderClan according to some versions of the story", "zh": "蛾翅是雷族派来的奸细（按书中另一种说法）"}], "answer": 1, "explain": {"en": "Mistystar realizes Mothwing serves the Clan but does not believe in StarClan or the warrior ancestors.", "zh": "雾星发现蛾翅虽为族群服务，却并不相信星族和武士祖先。"}}, {"q": {"en": "What does Mistystar do when she learns Mothwing does not believe in StarClan?", "zh": "得知蛾翅不信星族后，雾星做了什么？"}, "options": [{"en": "She ignores the problem", "zh": "她对此置之不理"}, {"en": "She banishes Mothwing from RiverClan according to some versions of the story in an early draft of the book", "zh": "她把蛾翅逐出河族（按书中另一种说法）（在书的早期草稿中）"}, {"en": "She makes Mothwing the new leader", "zh": "她让蛾翅当新族长"}, {"en": "She demotes Mothwing to an elder and names Willowshine the only medicine cat", "zh": "她把蛾翅降为老猫，并任命柳荫（Willowshine）为唯一的巫医"}], "answer": 3, "explain": {"en": "Angry and unsure, Mistystar strips Mothwing of her duties and leaves Willowshine as the sole medicine cat.", "zh": "雾星又气又拿不定主意，于是剥夺蛾翅的职责，只留柳荫一位巫医。"}}, {"q": {"en": "What problem strikes RiverClan at the lake during this story?", "zh": "故事中，湖畔的河族遭遇了什么难题？"}, "options": [{"en": "The fish disappear, leaving the Clan with little food", "zh": "鱼群消失，族群几乎没有食物"}, {"en": "The lake floods and drowns the camp according to some versions of the story", "zh": "湖水泛滥淹没了营地（按书中另一种说法）"}, {"en": "Twolegs build nests on the shore", "zh": "两脚兽在湖岸盖起了巢穴"}, {"en": "A fire destroys their territory", "zh": "一场大火烧毁了他们的领地"}], "answer": 0, "explain": {"en": "The lake becomes empty of fish, so RiverClan struggles to feed itself.", "zh": "湖里的鱼不见了，河族难以填饱肚子。"}}, {"q": {"en": "Which dead relative of Mistystar appears to guide and comfort her?", "zh": "雾星哪位已经去世的亲属现身指引并安慰她？"}, "options": [{"en": "Her father Oakheart according to some versions of the story", "zh": "她的父亲橡心（Oakheart）（按书中另一种说法）"}, {"en": "Her brother Stonefur", "zh": "她的兄弟石毛（Stonefur）"}, {"en": "Her mother Bluestar", "zh": "她的母亲蓝星（Bluestar）"}, {"en": "Her kit Pikekit", "zh": "她的幼崽派克崽（Pikekit）"}], "answer": 1, "explain": {"en": "Stonefur, Mistystar's brother who died earlier, speaks to her from StarClan and tells her she is not alone.", "zh": "早逝的兄弟石毛从星族向她说话，告诉她自己一直与她同在。"}}, {"q": {"en": "What omen finally convinces Mistystar to trust Mothwing again?", "zh": "是什么征兆最终让雾星重新信任蛾翅？"}, "options": [{"en": "A star falling into the lake", "zh": "一颗星星落进湖里"}, {"en": "A fish leaping into her paws according to some versions of the story", "zh": "一条鱼跳进她的爪子里（按书中另一种说法）"}, {"en": "A moth leaving its cocoon and learning to fly", "zh": "一只飞蛾破茧而出、学会飞翔"}, {"en": "A visit from Leopardstar", "zh": "豹星前来探望"}], "answer": 2, "explain": {"en": "Mistystar sees a moth struggle out of its cocoon and fly—a sign that Mothwing can serve the Clan by instinct and heart.", "zh": "雾星看到一只飞蛾奋力破茧飞翔，这预示着蛾翅凭本能与真心也能为族群服务。"}}, {"q": {"en": "After understanding the omen, what does Mistystar do about Mothwing?", "zh": "明白征兆之后，雾星对蛾翅做了什么？"}, "options": [{"en": "She restores Mothwing as a medicine cat", "zh": "她恢复蛾翅的巫医职务"}, {"en": "She makes Willowshine the only medicine cat forever", "zh": "她让柳荫永远做唯一的巫医"}, {"en": "She keeps Mothwing in the elders' den", "zh": "她仍把蛾翅留在老猫巢"}, {"en": "She sends Mothwing to ThunderClan", "zh": "她把蛾翅送到雷族"}], "answer": 0, "explain": {"en": "Mistystar admits her mistake and welcomes Mothwing back to share medicine-cat duties with Willowshine.", "zh": "雾星承认自己错了，让蛾翅回来与柳荫共同担任巫医。"}}, {"q": {"en": "At the Moonpool, which former RiverClan medicine cat speaks to Mistystar?", "zh": "在月池，哪位河族前任巫医对雾星说话？"}, "options": [{"en": "Spottedleaf according to some versions of the story", "zh": "斑叶（Spottedleaf）（按书中另一种说法）"}, {"en": "Yellowfang", "zh": "黄牙（Yellowfang）"}, {"en": "Mothwing's mother", "zh": "蛾翅的母亲"}, {"en": "Mudfur, Mothwing's old mentor", "zh": "泥毛（Mudfur），蛾翅从前的导师"}], "answer": 3, "explain": {"en": "Mudfur, the former RiverClan medicine cat and Mothwing's mentor, tells Mistystar he always trusted Mothwing's heart.", "zh": "河族前任巫医、蛾翅的导师泥毛告诉雾星，他一直信任蛾翅的用心。"}}, {"q": {"en": "Who gets badly injured by dogs and worries Mistystar deeply?", "zh": "谁被狗严重咬伤，让雾星十分担忧？"}, "options": [{"en": "Reedwhisker, her son", "zh": "苇须（Reedwhisker），她的儿子"}, {"en": "Stonefur, her brother", "zh": "石毛（Stonefur），她的兄弟"}, {"en": "Leopardstar, the old leader", "zh": "老族长豹星（Leopardstar）"}, {"en": "Willowshine, the medicine cat", "zh": "巫医柳荫（Willowshine）"}], "answer": 0, "explain": {"en": "While rescuing apprentices from dogs, Reedwhisker is torn by a dog and nearly dies before healing.", "zh": "苇须从狗群中救学徒时被咬伤，险些丧命，后来才痊愈。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
