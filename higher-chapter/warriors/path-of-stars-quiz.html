<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Path of Stars · 猫武士 Warriors Quiz</title>
<style>
  :root{
    --forest:#2f5d3a;
    --forest-dark:#1e3f27;
    --ember:#d35400;
    --cream:#fbf7ee;
    --ink:#2a2118;
    --gold:#e0a82e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--forest),var(--forest-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--ember);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.55rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--ember);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.94;
  }
  .bookzh{margin:2px 0 0 !important;font-weight:bold;letter-spacing:1px;}
  .mark{
    width:54px;height:54px;border-radius:50%;
    background:#fff;margin:12px auto 0;
    display:flex;align-items:center;justify-content:center;
    font-size:1.8rem;
    box-shadow:0 3px 10px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--forest);background:#f3fbf6;}
  .q.wrong{border-color:var(--ember);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--ember);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--forest);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--ember);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--forest-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--ember);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(211,84,0,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(211,84,0,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--forest-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9486;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>Path of Stars</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Erin Hunter</p>
    <p class="bookzh">群星之路</p>
    <div class="mark">✨</div>
  </header>
  <main>
    <p style="text-align:center;color:#555;font-size:.9rem;margin:-2px 0 16px;line-height:1.5">The final book, in which the five Clans are named and the spirits in the sky become known as StarClan.<br><span style="color:#a06a1f">系列最后一部，五大族群正式命名，天上的祖灵被称为「星族」。</span></p>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Warriors: Dawn of the Clans — Path of Stars</em> (HarperCollins)</footer>
</div>
<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Erin Hunter",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the story well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The prophecy is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Erin Hunter",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这本书。",
    ok: "不错——不过有几处细节被你漏掉了。",
    low: "该重读一遍啦！真相藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What are the five cat groups finally called in Path of Stars?", "zh": "在《群星之路》中，五个猫群最终被叫做什么？"}, "options": [{"en": "Tribes", "zh": "部落（Tribes）"}, {"en": "Clans", "zh": "族群（Clans）"}, {"en": "Packs", "zh": "群队（Packs）"}, {"en": "Herds", "zh": "兽群（Herds）"}], "answer": 1, "explain": {"en": "The groups become the five Clans: ThunderClan, ShadowClan, WindClan, RiverClan, and SkyClan.", "zh": "这些群体成为五大族群：雷族、影族、风族、河族和天族。"}}, {"q": {"en": "Which Clan does Thunder help found?", "zh": "雷电参与创建了哪个族群？"}, "options": [{"en": "ThunderClan", "zh": "雷族（ThunderClan）"}, {"en": "SkyClan", "zh": "天族（SkyClan）"}, {"en": "ShadowClan according to some versions of the story", "zh": "影族（ShadowClan）（按书中另一种说法）"}, {"en": "RiverClan", "zh": "河族（RiverClan）"}], "answer": 0, "explain": {"en": "Thunder becomes the founder of ThunderClan.", "zh": "雷电成为雷族（ThunderClan）的创始人。"}}, {"q": {"en": "Which founder leads ShadowClan?", "zh": "哪位创始猫领导影族（ShadowClan）？"}, "options": [{"en": "Wind Runner", "zh": "风奔（Wind Runner）"}, {"en": "River Ripple", "zh": "河波（River Ripple）"}, {"en": "Tall Shadow", "zh": "高影（Tall Shadow）"}, {"en": "Clear Sky", "zh": "晴天（Clear Sky）"}], "answer": 2, "explain": {"en": "Tall Shadow becomes the founder of ShadowClan.", "zh": "高影（Tall Shadow）是影族的创始人。"}}, {"q": {"en": "Which founder leads RiverClan?", "zh": "哪位创始猫领导河族（RiverClan）？"}, "options": [{"en": "Jagged Peak according to some versions of the story", "zh": "锯齿峰（Jagged Peak）（按书中另一种说法）"}, {"en": "River Ripple", "zh": "河波（River Ripple）"}, {"en": "Thunder", "zh": "雷电（Thunder）"}, {"en": "Gray Wing", "zh": "灰翅（Gray Wing）"}], "answer": 1, "explain": {"en": "River Ripple becomes the founder of RiverClan.", "zh": "河波（River Ripple）是河族的创始人。"}}, {"q": {"en": "What name is given to the spirits of the dead cats watching from the sky?", "zh": "天上守护着生者的逝去猫群之灵，被称为什么？"}, "options": [{"en": "StarClan", "zh": "星族（StarClan）"}, {"en": "Sky Spirits", "zh": "天空之灵（Sky Spirits）"}, {"en": "MoonClan", "zh": "月族（MoonClan）"}, {"en": "The Ancients", "zh": "远古者（The Ancients）"}], "answer": 0, "explain": {"en": "The spirits in the stars become known as StarClan, who guide the living Clans.", "zh": "天上的祖灵被称为星族（StarClan），指引着生生不息的族群。"}}, {"q": {"en": "Who becomes the first medicine cat of the new Clan system?", "zh": "在新族群制度下，谁成为了第一位巫医？"}, "options": [{"en": "Star Flower", "zh": "星花（Star Flower）"}, {"en": "Turtle Tail", "zh": "龟尾（Turtle Tail）"}, {"en": "Half Moon", "zh": "半月（Half Moon）"}, {"en": "Storm", "zh": "风暴（Storm）"}], "answer": 2, "explain": {"en": "Half Moon serves as the first medicine cat, speaking for StarClan to the Clans.", "zh": "半月担任第一位巫医，向各族群传达星族的旨意。"}}, {"q": {"en": "What sad but peaceful event happens to Gray Wing?", "zh": "灰翅身上发生了一件悲伤却安详的事，是什么？"}, "options": [{"en": "He dies and joins the spirits in the sky", "zh": "他死去，加入了天上的祖灵"}, {"en": "He becomes a kittypet", "zh": "他成了宠物猫"}, {"en": "He becomes a rogue", "zh": "他成了泼皮猫"}, {"en": "He returns to the mountains according to some versions of the story", "zh": "他返回山地（按书中另一种说法）"}], "answer": 0, "explain": {"en": "Gray Wing dies peacefully and his spirit joins the starry ancestors, watching over the Clans.", "zh": "灰翅安详地离世，他的灵魂加入了星空的祖灵，继续守护着族群。"}}, {"q": {"en": "Where do the Clans meet for their great shared gatherings?", "zh": "各族群为了盛大的聚会，会在哪里碰面？"}, "options": [{"en": "In the mountains", "zh": "在山地"}, {"en": "In a Twoleg den according to some versions of the story", "zh": "在两脚兽的窝里（按书中另一种说法）"}, {"en": "By the Thunderpath", "zh": "在雷道旁"}, {"en": "At the four trees", "zh": "在四棵树下"}], "answer": 3, "explain": {"en": "The Clans gather at the four trees, a meeting place that becomes important for generations.", "zh": "各族群在四棵树下聚会，这个地方在日后世代都意义非凡。"}}, {"q": {"en": "What promise do the Clans make to one another at the end?", "zh": "结尾时，各族群彼此做出了什么承诺？"}, "options": [{"en": "To fight forever", "zh": "永远争斗"}, {"en": "To leave the forest", "zh": "离开森林"}, {"en": "To never speak again according to some versions of the story", "zh": "永远不再说话（按书中另一种说法）"}, {"en": "To live by a shared code and respect each other's territory", "zh": "遵守共同的法则并尊重彼此领地"}], "answer": 3, "explain": {"en": "The Clans agree to live by a shared law and to respect one another's borders.", "zh": "族群约定遵守共同的法则，并尊重彼此的边界。"}}, {"q": {"en": "How does the Dawn of the Clans series end?", "zh": "「族群黎明」系列是如何收尾的？"}, "options": [{"en": "One Eye returns", "zh": "独眼归来"}, {"en": "The Clan system is born, guided by StarClan", "zh": "族群制度诞生，并由星族指引"}, {"en": "The cats return to the mountains according to some versions of the story", "zh": "猫群返回山地（按书中另一种说法）"}, {"en": "The forest is destroyed", "zh": "森林被毁"}], "answer": 1, "explain": {"en": "The series ends with the five Clans established and StarClan promising to watch over them forever.", "zh": "系列以五大族群确立、星族承诺永远守护它们而作结。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
