<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code of the Clans · 猫武士 Warriors Quiz</title>
<style>
  :root{
    --forest:#2f5d3a;
    --forest-dark:#1e3f27;
    --ember:#d35400;
    --cream:#fbf7ee;
    --ink:#2a2118;
    --gold:#e0a82e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--forest),var(--forest-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--ember);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.55rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--ember);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.94;
  }
  .bookzh{margin:2px 0 0 !important;font-weight:bold;letter-spacing:1px;}
  .mark{
    width:54px;height:54px;border-radius:50%;
    background:#fff;margin:12px auto 0;
    display:flex;align-items:center;justify-content:center;
    font-size:1.8rem;
    box-shadow:0 3px 10px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--forest);background:#f3fbf6;}
  .q.wrong{border-color:var(--ember);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--ember);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--forest);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--ember);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--forest-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--ember);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(211,84,0,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(211,84,0,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--forest-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9486;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>Code of the Clans</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Erin Hunter</p>
    <p class="bookzh">族群守则</p>
    <div class="mark">📜</div>
  </header>
  <main>
    <p style="text-align:center;color:#555;font-size:.9rem;margin:-2px 0 16px;line-height:1.5">An official guide that explains each rule of the Warrior Code with stories from Clan history.<br><span style="color:#a06a1f">一本官方指南，通过族群历史上的故事逐条讲解武士守则。</span></p>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Warriors: Field Guides — Code of the Clans</em> (HarperCollins)</footer>
</div>
<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Erin Hunter",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the story well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The prophecy is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Erin Hunter",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这本书。",
    ok: "不错——不过有几处细节被你漏掉了。",
    low: "该重读一遍啦！真相藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "According to the Warrior Code, how old must a kit be before becoming an apprentice?", "zh": "根据武士守则，幼猫必须满多大才能成为学徒？"}, "options": [{"en": "Six moons", "zh": "六个月（six moons）"}, {"en": "One moon", "zh": "一个月"}, {"en": "Twelve moons according to some versions of the story", "zh": "十二个月（按书中另一种说法）"}, {"en": "Three moons", "zh": "三个月"}], "answer": 0, "explain": {"en": "The code states a kit must be at least six moons old to begin training as an apprentice.", "zh": "守则规定，幼猫必须至少满六个月才能开始作为学徒受训。"}}, {"q": {"en": "The Warrior Code says that before warriors and apprentices eat, who must be fed first?", "zh": "武士守则规定，在武士和学徒进食前，必须先让谁吃饱？"}, "options": [{"en": "The strongest warriors according to some versions of the story", "zh": "最强壮的武士（按书中另一种说法）"}, {"en": "Elders, queens, and kits", "zh": "长老、母猫和幼猫"}, {"en": "Only the medicine cats", "zh": "只有巫医"}, {"en": "Only the Clan leader", "zh": "只有族长"}], "answer": 1, "explain": {"en": "The code honors the young and old by feeding elders, queens, and kits before others.", "zh": "守则通过先让长老、母猫和幼猫进食，来敬重族群中的老幼。"}}, {"q": {"en": "According to the code, a newly chosen Clan leader receives how many lives from StarClan?", "zh": "根据守则，新任族群族长会从星族获得多少条命？"}, "options": [{"en": "One life", "zh": "一条命"}, {"en": "Seven lives", "zh": "七条命"}, {"en": "Nine lives", "zh": "九条命"}, {"en": "Three lives", "zh": "三条命"}], "answer": 2, "explain": {"en": "StarClan grants a leader nine lives during the ceremony beneath the night sky.", "zh": "在夜空下的仪式中，星族会赐予族长九条命。"}}, {"q": {"en": "The Warrior Code states: 'The word of the Clan leader is ____.'", "zh": "武士守则写道：「族长之言即是____。」"}, "options": [{"en": "always wrong", "zh": "永远都是错的"}, {"en": "the warrior code", "zh": "武士守则"}, {"en": "only a suggestion", "zh": "只是一条建议"}, {"en": "the deputy's choice", "zh": "副族长的选择"}], "answer": 1, "explain": {"en": "A leader's word is law, equal to the warrior code itself.", "zh": "族长之言即是律法，与武士守则本身同等重要。"}}, {"q": {"en": "The code says a warrior must never neglect a kit in pain or danger, even if the kit belongs to ____.", "zh": "守则规定，武士绝不可漠视受伤或遇险的幼猫，即使这只幼猫属于____。"}, "options": [{"en": "another Clan", "zh": "另一个族群"}, {"en": "no one at all", "zh": "任何族群都不行"}, {"en": "the kittypets", "zh": "宠物猫"}, {"en": "their own Clan only", "zh": "只属于自己的族群"}], "answer": 0, "explain": {"en": "The code teaches compassion: every kit, even from a rival Clan, must be helped.", "zh": "守则教导同情之心：每一只幼猫，即便来自敌对族群，也必须得到帮助。"}}, {"q": {"en": "Before a warrior can be made deputy, what must they have done?", "zh": "在一名武士被任命为副族长之前，他必须先做到什么？"}, "options": [{"en": "Mentored at least one apprentice", "zh": "至少指导过一名学徒"}, {"en": "Caught the most prey according to some versions of the story", "zh": "捕到最多的猎物（按书中另一种说法）"}, {"en": "Been a medicine cat", "zh": "当过巫医"}, {"en": "Won a battle", "zh": "赢下一场战斗"}], "answer": 0, "explain": {"en": "The code requires a deputy to have trained at least one apprentice first.", "zh": "守则要求副族长必须先至少指导过一名学徒。"}}, {"q": {"en": "Gatherings of all the Clans are held at the full moon under what condition?", "zh": "所有族群的集会（Gathering）在满月时举行，前提条件是什么？"}, "options": [{"en": "At the new moon", "zh": "在新月时"}, {"en": "Only in leaf-bare", "zh": "只在落叶季（冬天）"}, {"en": "When just two Clans agree according to some versions of the story", "zh": "只要两个族群同意（按书中另一种说法）"}, {"en": "During a truce when fighting is forbidden", "zh": "处于休战期，禁止争斗"}], "answer": 3, "explain": {"en": "A sacred truce protects all cats at the full-moon Gathering so they may meet in peace.", "zh": "神圣的休战保护着满月集会上的所有猫，使它们能和平相会。"}}, {"q": {"en": "The Warrior Code forbids a warrior from hunting or trespassing on another Clan's ____.", "zh": "武士守则禁止武士在另一个族群的____上捕猎或擅闯。"}, "options": [{"en": "moon", "zh": "月亮"}, {"en": "territory", "zh": "领地（territory）"}, {"en": "river according to some versions of the story", "zh": "河流（按书中另一种说法）"}, {"en": "camp", "zh": "营地"}], "answer": 1, "explain": {"en": "The code says: 'Do not hunt or trespass on another Clan's territory.'", "zh": "守则写道：「不可在另一个族群的领地上捕猎或擅闯。」"}}, {"q": {"en": "The Warrior Code teaches that a warrior rejects the soft life of a ____.", "zh": "武士守则教导，武士应当摒弃____那种柔软安逸的生活。"}, "options": [{"en": "leader according to some versions of the story", "zh": "族长（leader）（按书中另一种说法）"}, {"en": "elder", "zh": "长老（elder）"}, {"en": "loner", "zh": "独行猫（loner）"}, {"en": "kittypet", "zh": "宠物猫（kittypet）"}], "answer": 3, "explain": {"en": "A warrior rejects the soft, comfortable life of a kittypet who lives with Twolegs.", "zh": "武士摒弃与两脚兽同住、安逸舒适的宠物猫生活。"}}, {"q": {"en": "When the Clan leader dies or retires, who becomes the new leader?", "zh": "当族长死亡或退位时，谁会成为新的族长？"}, "options": [{"en": "A kit chosen by StarClan", "zh": "由星族挑选的幼猫"}, {"en": "The oldest warrior", "zh": "最年长的武士"}, {"en": "The deputy", "zh": "副族长（the deputy）"}, {"en": "The medicine cat", "zh": "巫医"}], "answer": 2, "explain": {"en": "The code states the deputy becomes the new leader when the old leader dies or retires.", "zh": "守则规定，当旧族长死亡或退位时，副族长即成为新族长。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
