<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapleshade's Vengeance · 猫武士 Warriors Quiz</title>
<style>
  :root{
    --forest:#2f5d3a;
    --forest-dark:#1e3f27;
    --ember:#d35400;
    --cream:#fbf7ee;
    --ink:#2a2118;
    --gold:#e0a82e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--forest),var(--forest-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--ember);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.55rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--ember);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.94;
  }
  .bookzh{margin:2px 0 0 !important;font-weight:bold;letter-spacing:1px;}
  .mark{
    width:54px;height:54px;border-radius:50%;
    background:#fff;margin:12px auto 0;
    display:flex;align-items:center;justify-content:center;
    font-size:1.8rem;
    box-shadow:0 3px 10px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--forest);background:#f3fbf6;}
  .q.wrong{border-color:var(--ember);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--ember);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--forest);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--ember);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--forest-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--ember);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(211,84,0,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(211,84,0,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--forest-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9486;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>Mapleshade's Vengeance</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Erin Hunter</p>
    <p class="bookzh">枫荫的复仇</p>
    <div class="mark">⚔️</div>
  </header>
  <main>
    <p style="text-align:center;color:#555;font-size:.9rem;margin:-2px 0 16px;line-height:1.5">Betrayed by her Clan and robbed of her kits, the warrior Mapleshade swears a deadly vengeance.<br><span style="color:#a06a1f">被族群背叛、失去幼崽的武士枫荫（Mapleshade）立下了致命的复仇誓言。</span></p>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Warriors: Novellas — Mapleshade's Vengeance</em> (HarperCollins)</footer>
</div>
<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Erin Hunter",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the story well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The prophecy is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Erin Hunter",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这本书。",
    ok: "不错——不过有几处细节被你漏掉了。",
    low: "该重读一遍啦！真相藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What Clan did Mapleshade belong to?", "zh": "枫荫原本属于哪个族群？"}, "options": [{"en": "WindClan", "zh": "风族（WindClan）"}, {"en": "RiverClan", "zh": "河族（RiverClan）"}, {"en": "ThunderClan", "zh": "雷族（ThunderClan）"}, {"en": "ShadowClan according to some versions of the story", "zh": "影族（ShadowClan）（按书中另一种说法）"}], "answer": 2, "explain": {"en": "Mapleshade was a ThunderClan warrior who secretly loved a RiverClan tom.", "zh": "枫荫是雷族的武士，私下里爱上了河族的一只公猫。"}}, {"q": {"en": "Who is the father of Mapleshade's kits?", "zh": "枫荫孩子的父亲是谁？"}, "options": [{"en": "Appledusk, a RiverClan warrior", "zh": "苹果暮（Appledusk），一名河族武士"}, {"en": "Ravenwing according to some versions of the story", "zh": "鸦翅（Ravenwing）（按书中另一种说法）"}, {"en": "Darkstar", "zh": "暗星（Darkstar）"}, {"en": "Oakstar", "zh": "橡星（Oakstar）"}], "answer": 0, "explain": {"en": "Her secret mate is Appledusk of RiverClan, making the kits half-Clan.", "zh": "她秘密的伴侣是河族的苹果暮，因此孩子们有一半河族血统。"}}, {"q": {"en": "What are the names of Mapleshade's three kits?", "zh": "枫荫的三只孩子叫什么名字？"}, "options": [{"en": "Birchkit, Flowerkit, and Reedkit according to some versions of the story", "zh": "白桦崽、花崽和芦苇崽（按书中另一种说法）"}, {"en": "Larchkit, Patchkit, and Petalkit", "zh": "落叶崽、补丁崽和花瓣崽"}, {"en": "Hollykit, Lionkit, and Jaykit", "zh": "冬青崽、狮崽和松鸦崽"}, {"en": "Ivykit, Dovekit, and Foxkit", "zh": "常春藤崽、鸽崽和狐崽"}], "answer": 1, "explain": {"en": "She names them Larchkit, Patchkit, and Petalkit, and loves them with all her heart.", "zh": "她给孩子们取名落叶崽、补丁崽和花瓣崽，全心全意爱着他们。"}}, {"q": {"en": "Which ThunderClan medicine cat discovers the kits are half-Clan and tells the leader?", "zh": "是哪只雷族巫医发现孩子们有一半外族血统，并报告了族长？"}, "options": [{"en": "Cinderpelt", "zh": "炭皮（Cinderpelt）"}, {"en": "Yellowfang", "zh": "黄牙（Yellowfang）"}, {"en": "Mudfur", "zh": "泥毛（Mudfur）"}, {"en": "Ravenwing", "zh": "鸦翅（Ravenwing）"}], "answer": 3, "explain": {"en": "Ravenwing sees an omen of three water reeds and realizes Appledusk, not Birchface, is the father.", "zh": "鸦翅看到「三根芦苇」的征兆，明白父亲是苹果暮而非白桦面（Birchface）。"}}, {"q": {"en": "Who is the ThunderClan leader that exiles Mapleshade and her kits?", "zh": "是哪一位雷族族长将枫荫和孩子们驱逐？"}, "options": [{"en": "Oakstar", "zh": "橡星（Oakstar）"}, {"en": "Firestar", "zh": "火星（Firestar）"}, {"en": "Pinestar", "zh": "松星（Pinestar）"}, {"en": "Bluestar", "zh": "蓝星（Bluestar）"}], "answer": 0, "explain": {"en": "Oakstar, whose son Birchface was killed by Appledusk, banishes Mapleshade for breaking the code.", "zh": "橡星的儿子白桦面死于苹果暮之手，于是他以破戒为由将枫荫逐出。"}}, {"q": {"en": "What happens to Mapleshade's kits as they try to cross the river to RiverClan?", "zh": "枫荫带着孩子渡河去河族时，孩子们遭遇了什么？"}, "options": [{"en": "They are saved by Oakstar", "zh": "他们被橡星救起"}, {"en": "They are swept away and drown in the flooded river", "zh": "他们被洪水冲走、淹死在河里"}, {"en": "They are taken by Twolegs", "zh": "他们被两脚兽抓走"}, {"en": "They reach RiverClan safely according to some versions of the story", "zh": "他们安全抵达河族（按书中另一种说法）"}], "answer": 1, "explain": {"en": "In a storm, the swollen river sweeps the three kits away, and Mapleshade is left heartbroken.", "zh": "暴风雨中河水暴涨，三只孩子被冲走，枫荫痛不欲生。"}}, {"q": {"en": "After losing her kits, which cat does Mapleshade kill FIRST?", "zh": "失去孩子后，枫荫最先杀死了谁？"}, "options": [{"en": "Ravenwing", "zh": "鸦翅（Ravenwing）"}, {"en": "Appledusk", "zh": "苹果暮（Appledusk）"}, {"en": "Oakstar", "zh": "橡星（Oakstar）"}, {"en": "Frecklewish", "zh": "斑点愿（Frecklewish）"}], "answer": 0, "explain": {"en": "She kills Ravenwing at the Moonstone, one death for one lost kit, then seeks more revenge.", "zh": "她在月石杀害鸦翅——以一命抵一命，随后继续复仇。"}}, {"q": {"en": "How does Mapleshade cause Frecklewish's death?", "zh": "枫荫是如何害死斑点愿（Frecklewish）的？"}, "options": [{"en": "By a fight at Snakerocks", "zh": "在蛇岩与她搏斗"}, {"en": "By poisoning her food", "zh": "在食物里下毒"}, {"en": "By pushing her into the river according to some versions of the story", "zh": "把她推进河里（按书中另一种说法）"}, {"en": "By letting an adder bite her", "zh": "让一条蝰蛇咬了她"}], "answer": 3, "explain": {"en": "At Snakerocks she uncovers a rock, letting an adder bite Frecklewish, who dies from the venom.", "zh": "在蛇岩，她掀开石头放出蝰蛇咬伤斑点愿，后者毒发身亡。"}}, {"q": {"en": "While trying to attack Reedshine, which RiverClan cat does Mapleshade accidentally kill?", "zh": "枫荫企图伤害芦苇光（Reedshine）时，阴差阳错杀死了哪只河族猫？"}, "options": [{"en": "Reedshine according to some versions of the story", "zh": "芦苇光（Reedshine）（按书中另一种说法）"}, {"en": "Appledusk", "zh": "苹果暮（Appledusk）"}, {"en": "Perchpaw", "zh": "鲈鱼爪（Perchpaw）"}, {"en": "Darkstar", "zh": "暗星（Darkstar）"}], "answer": 1, "explain": {"en": "Appledusk leaps in front of Reedshine and is killed; Mapleshade's blow lands on him instead.", "zh": "苹果暮跳到芦苇光身前，结果替她挨了枫荫那一击而丧命。"}}, {"q": {"en": "After Perchpaw wounds her, where does Mapleshade end up?", "zh": "被鲈鱼爪（Perchpaw）重伤后，枫荫最终去了哪里？"}, "options": [{"en": "As a kittypet", "zh": "变成宠物猫"}, {"en": "As RiverClan's medicine cat", "zh": "成为河族巫医"}, {"en": "In the Dark Forest, filled with vengeance", "zh": "怀着满腔仇恨进入黑森林（Dark Forest）"}, {"en": "In StarClan as an honored warrior according to some versions of the story", "zh": "作为受敬重的武士进入星族（按书中另一种说法）"}], "answer": 2, "explain": {"en": "Mapleshade dies of her wounds and wakes in the Place of No Stars, where her thirst for revenge lives on.", "zh": "枫荫伤重而死，在无星之地（黑森林）醒来，复仇之心永不熄灭。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
