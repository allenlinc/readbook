<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firestar's Quest · 猫武士 Warriors Quiz</title>
<style>
  :root{
    --forest:#2f5d3a;
    --forest-dark:#1e3f27;
    --ember:#d35400;
    --cream:#fbf7ee;
    --ink:#2a2118;
    --gold:#e0a82e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--forest),var(--forest-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--ember);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.55rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--ember);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.94;
  }
  .bookzh{margin:2px 0 0 !important;font-weight:bold;letter-spacing:1px;}
  .mark{
    width:54px;height:54px;border-radius:50%;
    background:#fff;margin:12px auto 0;
    display:flex;align-items:center;justify-content:center;
    font-size:1.8rem;
    box-shadow:0 3px 10px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--forest);background:#f3fbf6;}
  .q.wrong{border-color:var(--ember);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--ember);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--forest);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--ember);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--forest-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--ember);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(211,84,0,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(211,84,0,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--forest-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9486;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>Firestar's Quest</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Erin Hunter</p>
    <p class="bookzh">火星的使命</p>
    <div class="mark">🦁</div>
  </header>
  <main>
    <p style="text-align:center;color:#555;font-size:.9rem;margin:-2px 0 16px;line-height:1.5">After becoming ThunderClan's leader, Firestar sets out on a journey to find the lost fifth Clan, SkyClan.<br><span style="color:#a06a1f">成为雷族族长后，火星踏上旅程，去寻找失落的第五个族群——天族。</span></p>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Warriors: Super Editions — Firestar's Quest</em> (HarperCollins)</footer>
</div>
<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Erin Hunter",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the story well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The prophecy is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Erin Hunter",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这本书。",
    ok: "不错——不过有几处细节被你漏掉了。",
    low: "该重读一遍啦！真相藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Who travels with Firestar on his quest to find the lost SkyClan?", "zh": "谁陪火星一起踏上了寻找天族的旅程？"}, "options": [{"en": "Sandstorm", "zh": "沙暴（Sandstorm）"}, {"en": "Cloudtail", "zh": "云尾（Cloudtail）"}, {"en": "Graystripe", "zh": "灰条（Graystripe）"}, {"en": "Cinderpelt", "zh": "炭毛（Cinderpelt）"}], "answer": 0, "explain": {"en": "Firestar chooses Sandstorm to journey with him beyond the forest to search for the lost SkyClan.", "zh": "火星选择沙暴与他一同离开森林，去寻找失落的天族。"}}, {"q": {"en": "Which lost Clan does Firestar set out to find?", "zh": "火星出发去寻找的是哪个失落的族群？"}, "options": [{"en": "StarClan", "zh": "星族（StarClan）"}, {"en": "BloodClan", "zh": "血族（BloodClan）"}, {"en": "SkyClan, the fifth Clan", "zh": "天族（SkyClan），第五个族群"}, {"en": "Tribe of Rushing Water", "zh": "急水部落（Tribe of Rushing Water）"}], "answer": 2, "explain": {"en": "Long ago a fifth Clan, SkyClan, was driven out of the forest. Firestar is given a quest by StarClan to find and restore it.", "zh": "很久以前，第五个族群天族被赶出了森林。星族交给火星一个使命，要他找回并重建天族。"}}, {"q": {"en": "Where do the remaining descendants of SkyClan live when Firestar finds them?", "zh": "火星找到天族后裔时，他们住在哪里？"}, "options": [{"en": "In a gorge near a Twolegplace", "zh": "在两脚兽地盘附近的一道峡谷里"}, {"en": "Deep in the forest", "zh": "森林深处"}, {"en": "By the lake", "zh": "湖边"}, {"en": "High in the mountains according to some versions of the story", "zh": "高山上（按书中另一种说法）"}], "answer": 0, "explain": {"en": "The scattered SkyClan cats live near a gorge beside a river, close to where Twolegs have built their homes.", "zh": "四散的天族猫住在河边的一道峡谷旁，靠近两脚兽建起家园的地方。"}}, {"q": {"en": "What dangerous enemies do Firestar and the gorge cats defeat together?", "zh": "火星和峡谷里的猫一起打败了什么危险的敌人？"}, "options": [{"en": "Badgers", "zh": "獾"}, {"en": "Giant rats", "zh": "巨大的老鼠"}, {"en": "A pack of dogs", "zh": "一群狗"}, {"en": "Foxes", "zh": "狐狸"}], "answer": 1, "explain": {"en": "Huge rats threaten the cats living by the gorge; Firestar helps them fight off the rat pack.", "zh": "巨大的老鼠威胁着峡谷边的猫，火星帮助他们击退了鼠群。"}}, {"q": {"en": "What is the name of the brave young she-cat who becomes the new SkyClan leader?", "zh": "那位勇敢的年轻母猫成为了新一任天族族长，她叫什么？"}, "options": [{"en": "Sharpclaw", "zh": "利爪（Sharpclaw）"}, {"en": "Skywatcher according to some versions of the story", "zh": "望天者（Skywatcher）（按书中另一种说法）"}, {"en": "Echosong", "zh": "回声歌（Echosong）"}, {"en": "Leaf, who becomes Leafstar", "zh": "叶（Leaf），后来成为叶星（Leafstar）"}], "answer": 3, "explain": {"en": "A brave young she-cat named Leaf is chosen to lead the restored Clan, and Firestar gives her the leader name Leafstar.", "zh": "一位名叫叶的勇敢年轻母猫被选中领导重建的族群，火星赐予她族长之名叶星。"}}, {"q": {"en": "Who becomes SkyClan's first warrior and deputy under Leafstar?", "zh": "在叶星之下，谁成为了天族的第一位武士兼副族长？"}, "options": [{"en": "Sandy", "zh": "桑迪（Sandy）"}, {"en": "Echosong according to some versions of the story", "zh": "回声歌（Echosong）（按书中另一种说法）"}, {"en": "Scratch", "zh": "抓痕（Scratch）"}, {"en": "Sharpclaw", "zh": "利爪（Sharpclaw）"}], "answer": 3, "explain": {"en": "Sharpclaw is a bold tom who becomes the first warrior of the new SkyClan and serves as Leafstar's deputy.", "zh": "利爪是一只勇猛的公猫，成为新天族的第一位武士，并担任叶星的副族长。"}}, {"q": {"en": "Who becomes SkyClan's medicine cat, a stray who had visions of StarClan?", "zh": "谁成为了天族的巫医？她是一只拥有星族幻象的流浪猫。"}, "options": [{"en": "Echosong", "zh": "回声歌（Echosong）"}, {"en": "Spottedleaf", "zh": "斑叶（Spottedleaf）"}, {"en": "Yellowfang", "zh": "黄牙（Yellowfang）"}, {"en": "Cinderpelt", "zh": "炭毛（Cinderpelt）"}], "answer": 0, "explain": {"en": "A gray stray named Echosong has dreams from StarClan and becomes SkyClan's first medicine cat.", "zh": "一只灰色的流浪猫回声歌拥有来自星族的梦境，成为天族的第一位巫医。"}}, {"q": {"en": "Who is the ancient SkyClan elder living alone who tells Firestar the Clan's history?", "zh": "独自生活的天族古老长老是谁？他把族群的历史告诉了火星。"}, "options": [{"en": "Raggedstar according to some versions of the story", "zh": "毛星（Raggedstar）（按书中另一种说法）"}, {"en": "Skywatcher", "zh": "望天者（Skywatcher）"}, {"en": "Tallstar", "zh": "高星（Tallstar）"}, {"en": "Cloudstar", "zh": "云星（Cloudstar）"}], "answer": 1, "explain": {"en": "Skywatcher is an old cat born in SkyClan who lives by himself and shares the lost Clan's story with Firestar.", "zh": "望天者是一只出生在天族的老年猫，独自生活，把失落族群的故事讲给火星听。"}}, {"q": {"en": "At the start of the book, what position does Firestar hold in ThunderClan?", "zh": "在故事开始时，火星在雷族担任什么职务？"}, "options": [{"en": "Deputy", "zh": "副族长"}, {"en": "A warrior", "zh": "一名武士"}, {"en": "Leader, with nine lives", "zh": "族长，拥有九条命"}, {"en": "Medicine cat according to some versions of the story", "zh": "巫医（按书中另一种说法）"}], "answer": 2, "explain": {"en": "Firestar has already received his nine lives and leads ThunderClan as its leader when the quest begins.", "zh": "使命开始时，火星已经获得了九条命，作为族长领导着雷族。"}}, {"q": {"en": "After helping restore SkyClan, what does Firestar do?", "zh": "帮助重建天族之后，火星做了什么？"}, "options": [{"en": "Becomes SkyClan's leader", "zh": "成为天族族长"}, {"en": "Returns to ThunderClan", "zh": "返回雷族"}, {"en": "Stays to lead SkyClan", "zh": "留下来领导天族"}, {"en": "Leaves to live as a loner", "zh": "离开，成为独行猫"}], "answer": 1, "explain": {"en": "Once SkyClan is rebuilt under Leafstar, Firestar and Sandstorm journey home to ThunderClan.", "zh": "天族在叶星的领导下重建后，火星和沙暴踏上了返回雷族的旅程。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
