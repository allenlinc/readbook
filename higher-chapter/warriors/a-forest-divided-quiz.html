<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Forest Divided · 猫武士 Warriors Quiz</title>
<style>
  :root{
    --forest:#2f5d3a;
    --forest-dark:#1e3f27;
    --ember:#d35400;
    --cream:#fbf7ee;
    --ink:#2a2118;
    --gold:#e0a82e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--forest),var(--forest-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--ember);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.55rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--ember);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.94;
  }
  .bookzh{margin:2px 0 0 !important;font-weight:bold;letter-spacing:1px;}
  .mark{
    width:54px;height:54px;border-radius:50%;
    background:#fff;margin:12px auto 0;
    display:flex;align-items:center;justify-content:center;
    font-size:1.8rem;
    box-shadow:0 3px 10px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--forest);background:#f3fbf6;}
  .q.wrong{border-color:var(--ember);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--ember);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--forest);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--ember);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--forest-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--ember);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(211,84,0,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(211,84,0,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--forest-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9486;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>A Forest Divided</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Erin Hunter</p>
    <p class="bookzh">分裂森林</p>
    <div class="mark">🌳</div>
  </header>
  <main>
    <p style="text-align:center;color:#555;font-size:.9rem;margin:-2px 0 16px;line-height:1.5">The fifth book, in which old arguments divide the cat groups just as they should be coming together.<br><span style="color:#a06a1f">系列第五部，正当猫群本应团结之际，旧日的争执却让它们再度分裂。</span></p>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Warriors: Dawn of the Clans — A Forest Divided</em> (HarperCollins)</footer>
</div>
<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Erin Hunter",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the story well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The prophecy is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Erin Hunter",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这本书。",
    ok: "不错——不过有几处细节被你漏掉了。",
    low: "该重读一遍啦！真相藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "After the blazing star cures the sickness, what returns among the cat groups?", "zh": "在炽烈之星治愈疾病后，猫群各群体之间又出现了什么？"}, "options": [{"en": "A great friendship according to some versions of the story", "zh": "深厚的友谊（按书中另一种说法）"}, {"en": "A flood", "zh": "洪水"}, {"en": "Old arguments and distrust", "zh": "旧日的争执与不信任"}, {"en": "A new sickness", "zh": "新的疾病"}], "answer": 2, "explain": {"en": "Even after surviving the sickness, the groups begin to argue again about land and leadership.", "zh": "即便熬过了疾病，各群体又因领地与领导权而争执起来。"}}, {"q": {"en": "What do the cat groups mainly argue about in A Forest Divided?", "zh": "在《分裂森林》中，猫群各群体主要争论什么？"}, "options": [{"en": "Territory and who should lead", "zh": "领地与谁来领导"}, {"en": "How to cross the Thunderpath according to some versions of the story", "zh": "如何穿越雷道（按书中另一种说法）"}, {"en": "What to eat", "zh": "吃什么"}, {"en": "How to name the stars", "zh": "如何为星星命名"}], "answer": 0, "explain": {"en": "The cats clash over territory boundaries and who should have power over the forest.", "zh": "猫群为了领地边界以及谁该掌握森林的统治权而冲突。"}}, {"q": {"en": "Which cat works hardest to keep the groups from fighting each other?", "zh": "哪只猫最努力地阻止各群体互相争斗？"}, "options": [{"en": "Thunder", "zh": "雷电（Thunder）"}, {"en": "Shaded Moss", "zh": "荫苔（Shaded Moss）"}, {"en": "Turtle Tail", "zh": "龟尾（Turtle Tail）"}, {"en": "One Eye", "zh": "独眼（One Eye）"}], "answer": 0, "explain": {"en": "Thunder tries to bridge the gaps between the groups and keep the peace.", "zh": "雷电努力弥补各群体之间的裂痕，维持和平。"}}, {"q": {"en": "Who guides the cats with messages from the spirits during this divided time?", "zh": "在分裂时期，是谁用祖灵的信息指引猫群？"}, "options": [{"en": "Storm", "zh": "风暴（Storm）"}, {"en": "Half Moon", "zh": "半月（Half Moon）"}, {"en": "Jagged Peak", "zh": "锯齿峰（Jagged Peak）"}, {"en": "Star Flower", "zh": "星花（Star Flower）"}], "answer": 1, "explain": {"en": "Half Moon, the medicine cat, continues to receive spirit prophecies urging the cats to unite.", "zh": "巫医半月持续接收祖灵预言，敦促猫群团结。"}}, {"q": {"en": "What does the title 'A Forest Divided' refer to?", "zh": "书名《分裂森林》指的是什么？"}, "options": [{"en": "The cat groups are split by arguments", "zh": "猫群因争执而分裂"}, {"en": "The river splits the land", "zh": "河流分割了土地"}, {"en": "The forest is cut by a Thunderpath according to some versions of the story", "zh": "森林被雷道切断（按书中另一种说法）"}, {"en": "The trees are dying", "zh": "树木正在枯死"}], "answer": 0, "explain": {"en": "The title reflects how the cat groups are pulled apart by distrust just before they must unite.", "zh": "书名反映的是，猫群在必须团结前夕，却因不信任而彼此疏离。"}}, {"q": {"en": "What does Clear Sky want most for his own group?", "zh": "晴天的群体最想要的是什么？"}, "options": [{"en": "To share everything equally according to some versions of the story", "zh": "完全平等地分享一切（按书中另一种说法）"}, {"en": "To become kittypets", "zh": "成为宠物猫"}, {"en": "To leave the forest", "zh": "离开森林"}, {"en": "To keep the best territory and strong control", "zh": "占据最好的领地并牢牢掌控"}], "answer": 3, "explain": {"en": "Clear Sky wants to hold the finest territory and keep firm control over his cats.", "zh": "晴天想占据最优质的领地，并对自己的猫保持强力掌控。"}}, {"q": {"en": "What danger grows as the groups argue among themselves?", "zh": "随着各群体互相争执，什么危险在增长？"}, "options": [{"en": "More kittypets", "zh": "更多宠物猫"}, {"en": "A war between the groups themselves", "zh": "群体之间爆发战争"}, {"en": "A friendly truce according to some versions of the story", "zh": "友好的休战（按书中另一种说法）"}, {"en": "A new mountain", "zh": "一座新山"}], "answer": 1, "explain": {"en": "The arguments push the groups toward fighting one another instead of standing together.", "zh": "争执把各群体推向彼此开战，而非团结一致。"}}, {"q": {"en": "What do the spirits tell the cats they must do?", "zh": "祖灵告诉猫群，它们必须做什么？"}, "options": [{"en": "Return to the mountains according to some versions of the story", "zh": "返回山地（按书中另一种说法）"}, {"en": "Forget the past", "zh": "忘掉过去"}, {"en": "Unite and live as one forest", "zh": "团结起来，共同生活在一片森林"}, {"en": "Become rogues", "zh": "成为泼皮猫"}], "answer": 2, "explain": {"en": "Through Half Moon, the spirits urge the divided cats to unite and share the forest as one.", "zh": "祖灵通过半月敦促分裂的猫群团结起来，共同分享这片森林。"}}, {"q": {"en": "By the end of A Forest Divided, what are the cats moving toward?", "zh": "到《分裂森林》结尾，猫群正在走向什么？"}, "options": [{"en": "Life as kittypets", "zh": "当宠物猫的生活"}, {"en": "A final decision to form Clans", "zh": "组建族群的最终决定"}, {"en": "A return to the mountains according to some versions of the story", "zh": "返回山地（按书中另一种说法）"}, {"en": "Abandoning the forest", "zh": "放弃森林"}], "answer": 1, "explain": {"en": "The book ends with the cats on the edge of formally becoming the Clans.", "zh": "本书结尾，猫群已站在正式组建族群的门槛上。"}}, {"q": {"en": "What quality helps the cats finally overcome their division?", "zh": "是什么品质帮助猫群最终克服了分裂？"}, "options": [{"en": "Fear of One Eye", "zh": "对独眼的恐惧"}, {"en": "A love of fighting", "zh": "对战斗的喜爱"}, {"en": "Greedy for territory according to some versions of the story", "zh": "对领地的贪婪（按书中另一种说法）"}, {"en": "Trust, courage, and shared purpose", "zh": "信任、勇气与共同的目标"}], "answer": 3, "explain": {"en": "By learning to trust one another and share a common goal, the cats move past their division.", "zh": "通过学会彼此信任、共享目标，猫群走出了分裂。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
