<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunset · 猫武士 Warriors Quiz</title>
<style>
  :root{
    --forest:#2f5d3a;
    --forest-dark:#1e3f27;
    --ember:#d35400;
    --cream:#fbf7ee;
    --ink:#2a2118;
    --gold:#e0a82e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--forest),var(--forest-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--ember);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.55rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--ember);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.94;
  }
  .bookzh{margin:2px 0 0 !important;font-weight:bold;letter-spacing:1px;}
  .mark{
    width:54px;height:54px;border-radius:50%;
    background:#fff;margin:12px auto 0;
    display:flex;align-items:center;justify-content:center;
    font-size:1.8rem;
    box-shadow:0 3px 10px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--forest);background:#f3fbf6;}
  .q.wrong{border-color:var(--ember);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--ember);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--forest);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--ember);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--forest-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--ember);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(211,84,0,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(211,84,0,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--forest-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9486;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>Sunset</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Erin Hunter</p>
    <p class="bookzh">日落和平</p>
    <div class="mark">🌇</div>
  </header>
  <main>
    <p style="text-align:center;color:#555;font-size:.9rem;margin:-2px 0 16px;line-height:1.5">Leafpool bears three forbidden kits, Squirrelflight raises them in secret, and a new prophecy of 'three' is revealed.<br><span style="color:#a06a1f">叶池生下三只不被容许的幼猫，松鼠飞悄悄将他们抚养长大，一则关于「三」的新预言也揭晓了。</span></p>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Warriors: The New Prophecy — Sunset</em> (HarperCollins)</footer>
</div>
<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Erin Hunter",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the story well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The prophecy is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Erin Hunter",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这本书。",
    ok: "不错——不过有几处细节被你漏掉了。",
    low: "该重读一遍啦！真相藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What surprising secret does Leafpool discover about herself in this book?", "zh": "在这一册里，叶池发现自己身上有什么惊人的秘密？"}, "options": [{"en": "She must leave the forest", "zh": "她必须离开森林"}, {"en": "She can no longer speak to StarClan", "zh": "她再也无法与星族交谈"}, {"en": "She is expecting kits (a queen)", "zh": "她怀孕了（即将成为母亲）"}, {"en": "She is chosen as Clan leader", "zh": "她被选为族长"}], "answer": 3, "explain": {"en": "Leafpool learns she is expecting kits, fathered by Crowfeather, which a medicine cat must not have.", "zh": "叶池发现自己怀了乌掌的孩子，而巫医是不可以有后代的。"}}, {"q": {"en": "Who is the father of Leafpool's three kits?", "zh": "叶池三只幼猫的父亲是谁？"}, "options": [{"en": "Firestar", "zh": "火星（Firestar）"}, {"en": "Crowfeather", "zh": "乌掌（Crowfeather）"}, {"en": "Brambleclaw", "zh": "荆棘爪（Brambleclaw）"}, {"en": "Graystripe", "zh": "灰条（Graystripe）"}], "answer": 0, "explain": {"en": "The kits are Crowfeather's, from his forbidden love with the ThunderClan medicine cat Leafpool.", "zh": "幼猫是乌掌的，源于他与雷族巫医叶池那段不被容许的恋情。"}}, {"q": {"en": "How many kits does Leafpool give birth to?", "zh": "叶池一共生了几只幼猫？"}, "options": [{"en": "Two", "zh": "两只"}, {"en": "Four", "zh": "四只"}, {"en": "One", "zh": "一只"}, {"en": "Three", "zh": "三只"}], "answer": 0, "explain": {"en": "She bears three kits: Jay, Holly, and Lion, who become the important 'Three' of the next series.", "zh": "她生下三只：杰、荷莉和狮，它们正是下一部曲中重要的“三剑客”。"}}, {"q": {"en": "Who takes the three kits and raises them as her own, keeping the truth a secret?", "zh": "谁收下了这三只幼猫，把他们当作自己的孩子抚养，并保守秘密？"}, "options": [{"en": "Leafpool", "zh": "叶池（Leafpool）"}, {"en": "Cinderpelt", "zh": "炭毛（Cinderpelt）"}, {"en": "Squirrelflight", "zh": "松鼠飞（Squirrelflight）"}, {"en": "Sorreltail according to some versions of the story", "zh": "莎草尾（Sorreltail）（按书中另一种说法）"}], "answer": 2, "explain": {"en": "Squirrelflight pretends the three kits are hers and Brambleclaw's so Leafpool can stay a medicine cat.", "zh": "松鼠飞假装这三只幼猫是她和荆棘爪的孩子，好让叶池能继续当巫医。"}}, {"q": {"en": "What prophecy about the future is revealed to the medicine cats?", "zh": "巫医们得知的、关于未来的预言是什么？"}, "options": [{"en": "There will be three, kin of your kin, with the power of the stars", "zh": "将会出现三只，族中之族，手握星族之力"}, {"en": "Fire alone will save the Clan", "zh": "唯有火能拯救族群"}, {"en": "The forest will return", "zh": "森林将会归来"}, {"en": "The lake will dry up", "zh": "湖泊将会干涸"}], "answer": 1, "explain": {"en": "The prophecy speaks of 'three, kin of your kin, who hold the power of the stars in their paws'—the three kits.", "zh": "预言说的是“三只，族中之族，爪中握有星族之力”——正指向那三只幼猫。"}}, {"q": {"en": "Which cat is Squirrelflight's jealous former mate who feels bitter toward her?", "zh": "谁是松鼠飞心怀嫉妒的前任伴侣，对她耿耿于怀？"}, "options": [{"en": "Ashfur", "zh": "灰毛（Ashfur）"}, {"en": "Brambleclaw", "zh": "荆棘爪（Brambleclaw）"}, {"en": "Crowfeather according to some versions of the story", "zh": "乌掌（Crowfeather）（按书中另一种说法）"}, {"en": "Stormfur", "zh": "暴毛（Stormfur）"}], "answer": 1, "explain": {"en": "Ashfur once loved Squirrelflight and grows resentful when she chooses Brambleclaw instead.", "zh": "灰毛曾爱慕松鼠飞，当她选择荆棘爪时，他便心生怨怼。"}}, {"q": {"en": "Do Brambleclaw and Squirrelflight make up by the end of the book?", "zh": "到书末，荆棘爪和松鼠飞和好了吗？"}, "options": [{"en": "Yes, they become mates again", "zh": "和好了，他们重新结为伴侣"}, {"en": "No, they never speak again", "zh": "没有，他们再也没说过话"}, {"en": "They join different Clans", "zh": "他们加入了不同的族群"}, {"en": "They become rivals", "zh": "他们成了对手"}], "answer": 3, "explain": {"en": "The two forgive each other and renew their bond as mates, raising the three kits together.", "zh": "两人重归于好，再度结为伴侣，并一同抚养那三只幼猫。"}}, {"q": {"en": "Why does Leafpool leave ThunderClan during this time?", "zh": "这段时间叶池为什么会离开雷族？"}, "options": [{"en": "She goes to have her kits in secret", "zh": "她去悄悄生下幼猫"}, {"en": "She is captured by Twolegs", "zh": "她被两脚兽抓走"}, {"en": "She is banished for a crime according to some versions of the story", "zh": "她因犯错被驱逐（按书中另一种说法）"}, {"en": "She wants to join the Tribe", "zh": "她想加入部落"}], "answer": 0, "explain": {"en": "Ashamed of her forbidden kits, Leafpool slips away to give birth, then returns to her medicine-cat role.", "zh": "叶池为自己不被容许的幼猫感到羞愧，悄悄离开去生产，之后又回来继续履行巫医职责。"}}, {"q": {"en": "What are the names of Leafpool's three kits?", "zh": "叶池的三只幼猫叫什么名字？"}, "options": [{"en": "Jay, Holly, and Lion", "zh": "杰（Jay）、荷莉（Holly）、狮（Lion）"}, {"en": "Red, Blue, and Green", "zh": "红、蓝、绿"}, {"en": "Cloud, Snow, and Storm", "zh": "云、雪、暴"}, {"en": "Birch, Fern, and Thorn", "zh": "桦、蕨、荆"}], "answer": 1, "explain": {"en": "The three are Jaykit, Hollykit, and Lionkit, later known as Jayfeather, Hollyleaf, and Lionblaze.", "zh": "三只分别是杰崽、荷莉崽和狮崽，后来成为叶毛、荷莉叶和狮焰。"}}, {"q": {"en": "What does the book's title 'Sunset' suggest about this time for the Clans?", "zh": "书名《日落和平》暗示了此时各族处于怎样的境况？"}, "options": [{"en": "A time of war", "zh": "战争时期"}, {"en": "The end of all Clans according to some versions of the story", "zh": "各族终结之时（按书中另一种说法）"}, {"en": "A time of hard-won peace", "zh": "来之不易的和平时期"}, {"en": "A time of famine", "zh": "饥荒时期"}], "answer": 2, "explain": {"en": "After the long journey and trials, the Clans settle into a calm, peaceful era by the lake.", "zh": "经过漫长的旅程与重重考验，各族在湖边迎来了一段安宁平和的岁月。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
