<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twilight · 猫武士 Warriors Quiz</title>
<style>
  :root{
    --forest:#2f5d3a;
    --forest-dark:#1e3f27;
    --ember:#d35400;
    --cream:#fbf7ee;
    --ink:#2a2118;
    --gold:#e0a82e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--forest),var(--forest-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--ember);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.55rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--ember);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.94;
  }
  .bookzh{margin:2px 0 0 !important;font-weight:bold;letter-spacing:1px;}
  .mark{
    width:54px;height:54px;border-radius:50%;
    background:#fff;margin:12px auto 0;
    display:flex;align-items:center;justify-content:center;
    font-size:1.8rem;
    box-shadow:0 3px 10px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--forest);background:#f3fbf6;}
  .q.wrong{border-color:var(--ember);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--ember);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--forest);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--ember);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--forest-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--ember);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(211,84,0,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(211,84,0,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--forest-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9486;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>Twilight</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Erin Hunter</p>
    <p class="bookzh">暮色降临</p>
    <div class="mark">🌆</div>
  </header>
  <main>
    <p style="text-align:center;color:#555;font-size:.9rem;margin:-2px 0 16px;line-height:1.5">A badger raid hits ThunderClan, and Brambleclaw must kill his half-brother Hawkfrost to save Firestar.<br><span style="color:#a06a1f">一场獾群的袭击重创雷族，荆棘爪为救火星，不得不杀死同父异母的弟弟鹰霜。</span></p>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Warriors: The New Prophecy — Twilight</em> (HarperCollins)</footer>
</div>
<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Erin Hunter",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the story well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The prophecy is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Erin Hunter",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这本书。",
    ok: "不错——不过有几处细节被你漏掉了。",
    low: "该重读一遍啦！真相藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Which wise badger sends the Clans a warning that danger is coming?", "zh": "哪只聪明的獾向猫族发出危险即将来临的警告？"}, "options": [{"en": "Midnight", "zh": "午夜（Midnight）"}, {"en": "Sharpclaw", "zh": "尖爪（Sharpclaw）"}, {"en": "Brokenstar", "zh": "碎星（Brokenstar）"}, {"en": "Barley", "zh": "大麦（Barley）"}], "answer": 0, "explain": {"en": "Midnight the badger warns the cats that trouble is on its way to the lake territories.", "zh": "獾午夜警告猫们，麻烦正在逼近湖区的领地。"}}, {"q": {"en": "What attacks the ThunderClan camp during the troubles in Twilight?", "zh": "在《暮色降临》的动乱中，是什么袭击了雷族的营地？"}, "options": [{"en": "A pack of dogs", "zh": "一群狗"}, {"en": "A band of badgers", "zh": "一队獾"}, {"en": "A flood of Twolegs", "zh": "一群两脚兽"}, {"en": "A troop of foxes", "zh": "一伙狐狸"}], "answer": 2, "explain": {"en": "A large group of badgers storms the ThunderClan camp, wounding many cats in a fierce fight.", "zh": "一大群獾冲进雷族营地，在一场恶斗中咬伤了许多猫。"}}, {"q": {"en": "Who is Brambleclaw's half-brother in RiverClan who plots against Firestar?", "zh": "谁是荆棘爪在河族的同父异母弟弟，并阴谋反对火星？"}, "options": [{"en": "Stormfur", "zh": "暴毛（Stormfur）"}, {"en": "Crowfeather", "zh": "乌掌（Crowfeather）"}, {"en": "Hawkfrost", "zh": "鹰霜（Hawkfrost）"}, {"en": "Blackstar", "zh": "黑星（Blackstar）"}], "answer": 3, "explain": {"en": "Hawkfrost is another son of Tigerstar; like Brambleclaw, he is Tigerstar's kit, but he is cunning and cruel.", "zh": "鹰霜也是虎星的儿子，和荆棘爪一样是虎星之子，但他狡诈而残忍。"}}, {"q": {"en": "How does Hawkfrost try to kill Firestar?", "zh": "鹰霜试图怎样杀死火星？"}, "options": [{"en": "He pushes him off a cliff", "zh": "他把火星推下悬崖"}, {"en": "He traps him and moves in for the kill", "zh": "他设陷阱困住火星再下杀手"}, {"en": "He poisons his fresh-kill", "zh": "他给火星的猎物下毒"}, {"en": "He drowns him in the lake", "zh": "他把火星淹进湖里"}], "answer": 1, "explain": {"en": "Hawkfrost lures Firestar into a trap (a fox trap) and then attacks him while he is caught.", "zh": "鹰霜把火星诱入陷阱（捕狐夹），趁他被困住时下手。"}}, {"q": {"en": "Who kills Hawkfrost to save Firestar's life?", "zh": "谁为了救火星，杀死了鹰霜？"}, "options": [{"en": "Graystripe", "zh": "灰条（Graystripe）"}, {"en": "Crowfeather", "zh": "乌掌（Crowfeather）"}, {"en": "Onestar", "zh": "一星（Onestar）"}, {"en": "Brambleclaw", "zh": "荆棘爪（Brambleclaw）"}], "answer": 3, "explain": {"en": "Brambleclaw frees Firestar and is forced to kill Hawkfrost with a thorn to protect his leader.", "zh": "荆棘爪救出火星，为了保卫族长，不得不用一根荆棘刺死鹰霜。"}}, {"q": {"en": "Where do Leafpool and Crowfeather run away to together?", "zh": "叶池和乌掌一起私奔去了哪里？"}, "options": [{"en": "To the ocean shore", "zh": "去海滨"}, {"en": "To the mountains and the Tribe", "zh": "去山中投奔部落"}, {"en": "To live with Twolegs", "zh": "去和两脚兽同住"}, {"en": "To the old forest", "zh": "回旧森林"}], "answer": 2, "explain": {"en": "The two lovers flee toward the mountains to be with each other, far from their Clans.", "zh": "这对恋人逃向群山，想远离族群、相守在一起。"}}, {"q": {"en": "Why do Leafpool and Crowfeather return instead of staying together?", "zh": "叶池和乌掌为什么没有长相厮守，而是回来了？"}, "options": [{"en": "They are driven out by the Tribe", "zh": "他们被部落赶了出来"}, {"en": "They cannot abandon their Clans and duties", "zh": "他们无法抛弃自己的族群和职责"}, {"en": "They quarrel and part", "zh": "他们吵了一架便分开了"}, {"en": "They are caught by Twolegs", "zh": "他们被两脚兽抓住了"}], "answer": 1, "explain": {"en": "Though they love each other, both feel they must go back to serve their Clans as medicine cat and warrior.", "zh": "尽管相爱，两人都觉得自己必须回去，继续履行巫医与武士的职责。"}}, {"q": {"en": "What causes a rift between Brambleclaw and Squirrelflight in this book?", "zh": "在这一册里，是什么让荆棘爪和松鼠飞之间出现了裂痕？"}, "options": [{"en": "He kept secrets from her", "zh": "他瞒着她一些事"}, {"en": "She loses a battle", "zh": "她在一场战斗中失利"}, {"en": "They disagree about the lake", "zh": "他们在湖泊一事上意见不合"}, {"en": "He leaves the Clan", "zh": "他离开了族群"}], "answer": 3, "explain": {"en": "Squirrelflight is hurt that Brambleclaw hides his visions and choices from her, straining their bond.", "zh": "松鼠飞因荆棘爪对她隐瞒自己的异象与抉择而伤心，两人的关系因此紧张。"}}, {"q": {"en": "Who is the father of both Brambleclaw and Hawkfrost?", "zh": "荆棘爪和鹰霜的父亲都是谁？"}, "options": [{"en": "Firestar", "zh": "火星（Firestar）"}, {"en": "Graystripe", "zh": "灰条（Graystripe）"}, {"en": "Tigerstar", "zh": "虎星（Tigerstar）"}, {"en": "Crookedstar", "zh": "曲星（Crookedstar）"}], "answer": 0, "explain": {"en": "Both are sons of Tigerstar, which is why some cats fear Brambleclaw may share his father's evil.", "zh": "二者都是虎星之子，所以一些猫担心荆棘爪会继承父亲的邪恶。"}}, {"q": {"en": "After Hawkfrost's death, what does Brambleclaw prove to the Clans?", "zh": "鹰霜死后，荆棘爪向各族证明了什么？"}, "options": [{"en": "That he is as cruel as Tigerstar", "zh": "他像虎星一样残忍"}, {"en": "That he wants to rule all Clans", "zh": "他想统治所有族群"}, {"en": "That he is loyal to ThunderClan", "zh": "他对雷族忠心耿耿"}, {"en": "That he fears badgers", "zh": "他害怕獾"}], "answer": 2, "explain": {"en": "By saving Firestar and killing his own treacherous half-brother, Brambleclaw shows his true loyalty.", "zh": "荆棘爪救下火星、亲手除掉背信弃义的同父异母弟弟，证明了自己的忠诚。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
