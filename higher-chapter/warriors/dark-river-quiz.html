<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark River · 猫武士 Warriors Quiz</title>
<style>
  :root{
    --forest:#2f5d3a;
    --forest-dark:#1e3f27;
    --ember:#d35400;
    --cream:#fbf7ee;
    --ink:#2a2118;
    --gold:#e0a82e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--forest),var(--forest-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--ember);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.55rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--ember);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.94;
  }
  .bookzh{margin:2px 0 0 !important;font-weight:bold;letter-spacing:1px;}
  .mark{
    width:54px;height:54px;border-radius:50%;
    background:#fff;margin:12px auto 0;
    display:flex;align-items:center;justify-content:center;
    font-size:1.8rem;
    box-shadow:0 3px 10px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--forest);background:#f3fbf6;}
  .q.wrong{border-color:var(--ember);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--ember);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--forest);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--ember);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--forest-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--ember);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(211,84,0,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(211,84,0,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--forest-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9486;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>Dark River</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Erin Hunter</p>
    <p class="bookzh">暗河汹涌</p>
    <div class="mark">🌊</div>
  </header>
  <main>
    <p style="text-align:center;color:#555;font-size:.9rem;margin:-2px 0 16px;line-height:1.5">Lionpaw's secret friendship, the tunnels, and the first signs of the Three's star-given powers come to light.<br><span style="color:#a06a1f">狮爪的秘密友谊、幽深的地道，以及三力量星赠力量的初步显现。</span></p>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Warriors: Power of Three — Dark River</em> (HarperCollins)</footer>
</div>
<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Erin Hunter",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the story well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The prophecy is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Erin Hunter",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这本书。",
    ok: "不错——不过有几处细节被你漏掉了。",
    low: "该重读一遍啦！真相藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "What do Lionpaw and Heatherpaw name the secret meeting spot they carve out in the tunnels?", "zh": "狮爪（Lionpaw）和希瑟爪（Heatherpaw）把地道里偷偷开辟的会面地点起了什么名字？"}, "options": [{"en": "Dark River", "zh": "暗河（Dark River）"}, {"en": "The Hollow according to some versions of the story", "zh": "凹地（The Hollow）（按书中另一种说法）"}, {"en": "Moonpool", "zh": "月池（Moonpool）"}, {"en": "Star Cave", "zh": "星洞（Star Cave）"}], "answer": 0, "explain": {"en": "Lionpaw and Heatherpaw, meeting in secret, carve out a hidden place they call Dark River.", "zh": "狮爪和希瑟爪秘密相会，在地道里开辟了一处隐秘地点，取名「暗河」。"}}, {"q": {"en": "Which Clan does Heatherpaw, Lionpaw's secret friend, belong to?", "zh": "狮爪的秘密朋友希瑟爪（Heatherpaw）属于哪个族？"}, "options": [{"en": "RiverClan", "zh": "河族（RiverClan）"}, {"en": "ThunderClan", "zh": "雷族（ThunderClan）"}, {"en": "WindClan", "zh": "风族（WindClan）"}, {"en": "ShadowClan", "zh": "影族（ShadowClan）"}], "answer": 2, "explain": {"en": "Heatherpaw is a WindClan apprentice; her secret friendship with Lionpaw crosses Clan borders.", "zh": "希瑟爪是风族的学徒，她与狮爪的秘密情谊跨越了族与族的边界。"}}, {"q": {"en": "In Dark River, Jaypaw travels in dreams to visit which group of cats?", "zh": "在《暗河汹涌》中，松鸦爪（Jaypaw）在梦中前往拜访哪群猫？"}, "options": [{"en": "A group of kittypets", "zh": "一群宠物猫"}, {"en": "The Tribe of Rushing Water", "zh": "激流部落（Tribe of Rushing Water）"}, {"en": "The old forest Clans", "zh": "旧森林里的猫族"}, {"en": "The Dark Forest according to some versions of the story", "zh": "黑森林（Dark Forest）（按书中另一种说法）"}], "answer": 1, "explain": {"en": "Jaypaw walks in the dreams of a Tribe cat and learns about the ancient cats who gave the Three their powers.", "zh": "松鸦爪进入一只部落猫的梦境，从而了解到把力量赐予三力量的远古猫。"}}, {"q": {"en": "During the tunnel flood, how does Jaypaw help Lionpaw and Heatherpaw?", "zh": "地道被水淹没时，松鸦爪是怎样帮助狮爪和希瑟爪的？"}, "options": [{"en": "He digs them out with his claws", "zh": "他用爪子把他们挖出来"}, {"en": "He swims out to them", "zh": "他游过去找他们"}, {"en": "He senses their location with his powers and leads rescue", "zh": "他凭力量感知到他们的位置并带人去救援"}, {"en": "He calls Firestar for help according to some versions of the story", "zh": "他呼叫火星（Firestar）来帮忙（按书中另一种说法）"}], "answer": 2, "explain": {"en": "Though blind, Jaypaw uses his dream-walking and mind-sensing gift to find the trapped pair and guide rescuers.", "zh": "尽管失明，松鸦爪仍用自己行走梦境、感知心神的天赋找到了被困的两只猫，并指引救援。"}}, {"q": {"en": "What power does Lionblaze begin to show in battle during this book?", "zh": "在这一册里，狮焰（Lionblaze）在战斗中开始展现出什么力量？"}, "options": [{"en": "He can breathe fire", "zh": "他能喷火"}, {"en": "He can turn invisible", "zh": "他能隐身"}, {"en": "He can run faster than any other cat according to some versions of the story", "zh": "他跑得比任何猫都快（按书中另一种说法）"}, {"en": "He cannot be hurt or defeated in battle", "zh": "他在战斗中不会受伤、无法被打败"}], "answer": 3, "explain": {"en": "Lionblaze discovers he cannot be wounded in battle—no claw or tooth can truly harm him.", "zh": "狮焰发现自己战斗时不会受伤——任何爪牙都无法真正伤到他。"}}, {"q": {"en": "What role does Hollypaw train for in Dark River?", "zh": "在《暗河汹涌》中，冬青爪（Hollypaw）受训成为什么角色？"}, "options": [{"en": "Leader", "zh": "族长"}, {"en": "Warrior", "zh": "武士"}, {"en": "Medicine cat", "zh": "巫医"}, {"en": "Elder", "zh": "长老"}], "answer": 1, "explain": {"en": "Hollypaw trains as a warrior apprentice alongside her brother Lionpaw.", "zh": "冬青爪和兄弟狮爪一样，作为武士学徒受训。"}}, {"q": {"en": "Who first built the tunnels beneath the lake long ago?", "zh": "很久以前，湖底的地道最初是谁开凿的？"}, "options": [{"en": "The ancient cats, ancestors of the Clans and Tribe", "zh": "远古猫——猫族与部落的祖先"}, {"en": "The current four Clans according to some versions of the story", "zh": "现在的四大猫族（按书中另一种说法）"}, {"en": "Twolegs (humans)", "zh": "两脚兽（人类）"}, {"en": "Badgers", "zh": "獾"}], "answer": 0, "explain": {"en": "The tunnels were made long ago by the ancient cats, whose spirits still linger there.", "zh": "地道是很久以前由远古猫开凿的，它们的灵魂至今仍游荡其中。"}}, {"q": {"en": "What feeling continues to trouble the Clan because of Ashfur?", "zh": "因为灰毛（Ashfur），猫族中持续困扰着的是什么情绪？"}, "options": [{"en": "His hatred of kits", "zh": "他讨厌幼崽"}, {"en": "His desire to become leader according to some versions of the story", "zh": "他想当族长（按书中另一种说法）"}, {"en": "His fear of water", "zh": "他怕水"}, {"en": "His jealousy and longing for Squirrelflight", "zh": "他对松鼠飞（Squirrelflight）的嫉妒与爱慕"}], "answer": 3, "explain": {"en": "Ashfur's unrequited love for Squirrelflight grows into a dangerous obsession.", "zh": "灰毛对松鼠飞求而不得的爱，逐渐演变成危险的执念。"}}, {"q": {"en": "Where do the Three's special powers come from?", "zh": "三力量（the Three）的特殊力量来自何处？"}, "options": [{"en": "A gift from the ancient cats", "zh": "远古猫赠予的礼物"}, {"en": "Eating a special herb according to some versions of the story", "zh": "吃了某种特殊草药（按书中另一种说法）"}, {"en": "A Twoleg experiment", "zh": "两脚兽的实验"}, {"en": "A curse", "zh": "一个诅咒"}], "answer": 0, "explain": {"en": "The ancient cats of the mountains gave the gift of the Three long ago, as shown to Jaypaw.", "zh": "很久以前，山中的远古猫把这份礼物赐给了三力量，这一点松鸦爪已亲眼得见。"}}, {"q": {"en": "Whose bond with Squirrelflight is strained during Dark River?", "zh": "在《暗河汹涌》中，谁与松鼠飞的关系变得紧张？"}, "options": [{"en": "Leafpool according to some versions of the story", "zh": "叶池（Leafpool）（按书中另一种说法）"}, {"en": "Brambleclaw", "zh": "荆棘爪（Brambleclaw）"}, {"en": "Jaypaw", "zh": "松鸦爪（Jaypaw）"}, {"en": "Firestar", "zh": "火星（Firestar）"}], "answer": 1, "explain": {"en": "Brambleclaw and Squirrelflight's marriage is tested by secrets and Ashfur's presence.", "zh": "秘密与灰毛的存在，让荆棘爪和松鼠飞的婚姻饱受考验。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
