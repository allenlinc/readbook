<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Sun Trail · 猫武士 Warriors Quiz</title>
<style>
  :root{
    --forest:#2f5d3a;
    --forest-dark:#1e3f27;
    --ember:#d35400;
    --cream:#fbf7ee;
    --ink:#2a2118;
    --gold:#e0a82e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Trebuchet MS","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--forest),var(--forest-dark));
    color:var(--ink);
    min-height:100vh;
    padding:24px 12px;
  }
  .wrap{
    max-width:780px;
    margin:0 auto;
    background:var(--cream);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  header{
    background:var(--ember);
    color:#fff;
    padding:22px 28px 18px;
    text-align:center;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header h1{
    margin:0;
    font-size:1.55rem;
    letter-spacing:.5px;
    flex:1;
    text-align:center;
  }
  .langBtn{
    font-family:inherit;
    font-size:.85rem;
    font-weight:bold;
    color:var(--ember);
    background:#fff;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .langBtn:hover{transform:translateY(-1px);}
  .homeBtn{
    font-size:1.35rem;
    text-decoration:none;
    background:#fff;
    border-radius:50%;
    width:40px;height:40px;
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    transition:transform .12s;
  }
  .homeBtn:hover{transform:translateY(-1px);}
  header p{
    margin:10px 0 0;
    font-size:.92rem;
    opacity:.94;
  }
  .bookzh{margin:2px 0 0 !important;font-weight:bold;letter-spacing:1px;}
  .mark{
    width:54px;height:54px;border-radius:50%;
    background:#fff;margin:12px auto 0;
    display:flex;align-items:center;justify-content:center;
    font-size:1.8rem;
    box-shadow:0 3px 10px rgba(0,0,0,.25);
  }
  main{padding:22px 28px 30px;}
  .q{
    border:1px solid #e3ddc8;
    border-radius:12px;
    padding:16px 18px;
    margin:16px 0;
    background:#fff;
    transition:border-color .2s;
  }
  .q.correct{border-color:var(--forest);background:#f3fbf6;}
  .q.wrong{border-color:var(--ember);background:#fdf3f2;}
  .q h3{
    margin:0 0 12px;
    font-size:1.02rem;
    line-height:1.45;
  }
  .q h3 span{color:var(--ember);font-weight:bold;margin-right:6px;}
  label{
    display:block;
    padding:9px 12px;
    margin:7px 0;
    border-radius:8px;
    background:#f7f5ec;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s,border-color .15s;
    font-size:.96rem;
    line-height:1.4;
  }
  label:hover{background:#efe9d4;}
  input[type=radio]{margin-right:9px;transform:translateY(1px);}
  label.picked{background:#fff4cc;border-color:var(--gold);}
  label.right{background:#d7f0df;border-color:var(--forest);font-weight:600;}
  label.picked-wrong{background:#f7d4d0;border-color:var(--ember);}
  .explain{
    display:none;
    margin-top:10px;
    padding:12px 14px;
    background:#f0f4ff;
    border-left:4px solid #4a6fc9;
    border-radius:6px;
    font-size:.9rem;
    line-height:1.5;
  }
  .explain.show{display:block;}
  .explain .en{margin-bottom:6px;}
  .explain .zh{color:#444;}
  .explain b{color:var(--forest-dark);}
  .actions{text-align:center;margin-top:24px;}
  button.go{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:var(--ember);
    border:none;
    padding:13px 34px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(211,84,0,.4);
    transition:transform .12s,box-shadow .12s;
  }
  button.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(211,84,0,.5);}
  button.go:active{transform:translateY(0);}
  #resetBtn{display:none;background:#555;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #result{
    text-align:center;
    margin:22px auto 4px;
    font-size:1.3rem;
    font-weight:bold;
    color:var(--forest-dark);
    min-height:1.4em;
  }
  #scoreDetail{text-align:center;color:#666;font-size:.92rem;margin-bottom:6px;}
  footer{
    text-align:center;
    font-size:.8rem;
    color:#9a9486;
    padding:14px;
    border-top:1px solid #eee;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <button class="langBtn" id="langBtn">🌐 中文</button>
      <h1>The Sun Trail</h1>
      <a class="homeBtn" href="../../index.html" title="Home / 首页" aria-label="Home">🏠</a>
    </div>
    <p id="subtitle">Comprehension Quiz • 10 Questions • by Erin Hunter</p>
    <p class="bookzh">太阳踪迹</p>
    <div class="mark">☀️</div>
  </header>
  <main>
    <p style="text-align:center;color:#555;font-size:.9rem;margin:-2px 0 16px;line-height:1.5">The first book of Dawn of the Clans, telling how the mountain cats followed a vision to a new forest home.<br><span style="color:#a06a1f">《族群黎明》系列第一部，讲述山地猫群如何追随一个预言，迁往森林新家园的故事。</span></p>
    <div id="questions"></div>
    <div id="result"></div>
    <div id="scoreDetail"></div>
    <div class="actions">
      <button class="go" id="checkBtn">Check My Answers</button>
      <button class="go" id="resetBtn">Try Again</button>
    </div>
  </main>
  <footer>Based on <em>Warriors: Dawn of the Clans — The Sun Trail</em> (HarperCollins)</footer>
</div>
<script>
let lang = "en";
const picked = {};
let submitted = false;
let score = 0;

const L = {
  en: {
    subtitle: "Comprehension Quiz • 10 Questions • by Erin Hunter",
    check: "Check My Answers",
    retry: "Try Again",
    langBtn: "🌐 中文",
    result: (s) => `You scored ${s} / 10`,
    perfect: "Perfect! You really read every page.",
    great: "Great job — you understood the story well.",
    ok: "Not bad — but a few clues slipped past you.",
    low: "Time for a re-read! The prophecy is in the details.",
    ansLabel: "Answer"
  },
  zh: {
    subtitle: "阅读理解测验 • 共10题 • 作者：Erin Hunter",
    check: "提交答案",
    retry: "再做一次",
    langBtn: "🌐 English",
    result: (s) => `你的得分：${s} / 10`,
    perfect: "满分！你每一页都读得很仔细。",
    great: "很棒——你已经读懂了这本书。",
    ok: "不错——不过有几处细节被你漏掉了。",
    low: "该重读一遍啦！真相藏在细节里。",
    ansLabel: "正确答案"
  }
};

const quiz = [{"q": {"en": "Before the journey east, where did the cats live?", "zh": "在向东迁徙之前，这些猫生活在哪里？"}, "options": [{"en": "On the open moor", "zh": "在开阔荒原"}, {"en": "In a cold mountain territory", "zh": "在寒冷的山地领地"}, {"en": "In a sunny forest", "zh": "在阳光森林"}, {"en": "In a Twoleg village according to some versions of the story", "zh": "在两脚兽村庄（按书中另一种说法）"}], "answer": 1, "explain": {"en": "The ancient cats lived in a rocky, cold mountain home where prey was scarce before they followed the sun trail to the forest.", "zh": "远古的猫群原本生活在岩石嶙峋、寒冷缺食的山地家园，后来才循着太阳的踪迹迁往森林。"}}, {"q": {"en": "Which elder received the vision of a warm forest full of prey?", "zh": "哪只老猫接收到了关于温暖而猎物丰盛的森林的预言？"}, "options": [{"en": "Jagged Peak", "zh": "锯齿峰（Jagged Peak）"}, {"en": "Shaded Moss", "zh": "荫苔（Shaded Moss）"}, {"en": "River Ripple", "zh": "河波（River Ripple）"}, {"en": "Gray Wing", "zh": "灰翅（Gray Wing）"}], "answer": 1, "explain": {"en": "Shaded Moss, an elder, was shown the forest in a dream sent by the spirits, and he led the cats to journey there.", "zh": "老猫荫苔（Shaded Moss）在祖灵托梦中被展示了那片森林，并带领猫群踏上迁徙之路。"}}, {"q": {"en": "How did Shaded Moss die on the journey?", "zh": "荫苔（Shaded Moss）在旅途中是怎么死的？"}, "options": [{"en": "He died of old age", "zh": "老死"}, {"en": "He was killed by One Eye according to some versions of the story", "zh": "被独眼（One Eye）杀死（按书中另一种说法）"}, {"en": "He was killed by a monster on the Thunderpath", "zh": "被雷道上的怪兽撞死"}, {"en": "He drowned in the river", "zh": "在河里淹死"}], "answer": 2, "explain": {"en": "While leading the group across a Thunderpath (a road), Shaded Moss was struck and killed by a monster (a car).", "zh": "在带领队伍穿越雷道（马路）时，荫苔被一只怪兽（汽车）撞死。"}}, {"q": {"en": "Which cat was already living by the river when the traveling cats arrived?", "zh": "当迁徙的猫群到达时，哪只猫已经住在河边？"}, "options": [{"en": "River Ripple", "zh": "河波（River Ripple）"}, {"en": "Tall Shadow according to some versions of the story", "zh": "高影（Tall Shadow）（按书中另一种说法）"}, {"en": "Clear Sky", "zh": "晴天（Clear Sky）"}, {"en": "Wind Runner", "zh": "风奔（Wind Runner）"}], "answer": 0, "explain": {"en": "River Ripple already lived there with his own group of cats and allowed the travelers to pass.", "zh": "河波（River Ripple）早已带着自己的猫群住在那里，并允许迁徙者通过。"}}, {"q": {"en": "What is the relationship between Gray Wing and Clear Sky?", "zh": "灰翅（Gray Wing）和晴天（Clear Sky）是什么关系？"}, "options": [{"en": "They are strangers", "zh": "它们互不相识"}, {"en": "They are brothers", "zh": "他们是兄弟"}, {"en": "They are mates", "zh": "它们是伴侣"}, {"en": "They are enemies", "zh": "它们是敌人"}], "answer": 1, "explain": {"en": "Gray Wing and Clear Sky are brothers who travel together from the mountains.", "zh": "灰翅和晴天是兄弟，一起从山地迁徙而来。"}}, {"q": {"en": "Who is Thunder's father?", "zh": "雷电（Thunder）的父亲是谁？"}, "options": [{"en": "River Ripple", "zh": "河波（River Ripple）"}, {"en": "Gray Wing", "zh": "灰翅（Gray Wing）"}, {"en": "Clear Sky", "zh": "晴天（Clear Sky）"}, {"en": "Shaded Moss", "zh": "荫苔（Shaded Moss）"}], "answer": 2, "explain": {"en": "Thunder is the son of Clear Sky and a she-cat named Storm.", "zh": "雷电是晴天（Clear Sky）与一只名叫风暴（Storm）的母猫的儿子。"}}, {"q": {"en": "What happens to Storm after she gives birth to Thunder?", "zh": "风暴（Storm）生下雷电后发生了什么？"}, "options": [{"en": "She leaves the forest", "zh": "她离开了森林"}, {"en": "She becomes a kittypet", "zh": "她成了宠物猫"}, {"en": "She becomes leader", "zh": "她成了族长"}, {"en": "She dies", "zh": "她死了"}], "answer": 3, "explain": {"en": "Storm dies while giving birth, and only her kit Thunder survives. Gray Wing raises him.", "zh": "风暴在生育时死去，只有幼崽雷电存活，由灰翅将他抚养长大。"}}, {"q": {"en": "Which she-cat leaves the traveling group to live with Twolegs as a kittypet?", "zh": "哪只母猫离开了迁徙队伍，去和两脚兽一起当宠物猫？"}, "options": [{"en": "Tall Shadow according to some versions of the story", "zh": "高影（Tall Shadow）（按书中另一种说法）"}, {"en": "Half Moon", "zh": "半月（Half Moon）"}, {"en": "Storm", "zh": "风暴（Storm）"}, {"en": "Turtle Tail", "zh": "龟尾（Turtle Tail）"}], "answer": 3, "explain": {"en": "Turtle Tail becomes disappointed with the hard journey and goes to live with Twolegs, though she later returns.", "zh": "龟尾（Turtle Tail）对艰苦的旅程感到失望，去和两脚兽生活，不过后来她又回来了。"}}, {"q": {"en": "What happens to Jagged Peak on the journey from the mountains?", "zh": "锯齿峰（Jagged Peak）在离开山地的旅途中发生了什么？"}, "options": [{"en": "He breaks his leg and cannot climb", "zh": "他摔断了腿，无法攀爬"}, {"en": "He becomes the leader", "zh": "他成了领袖"}, {"en": "He is killed by a monster", "zh": "他被怪兽杀死"}, {"en": "He finds the forest first according to some versions of the story", "zh": "他最先找到森林（按书中另一种说法）"}], "answer": 0, "explain": {"en": "Jagged Peak, the younger brother of Gray Wing and Clear Sky, falls and breaks his leg, so he can no longer climb.", "zh": "锯齿峰是灰翅和晴天的弟弟，他在途中摔断了腿，从此无法再攀爬。"}}, {"q": {"en": "At the end of the book, how do the cats divide the new land?", "zh": "在本集结尾，猫群是如何划分新领地的？"}, "options": [{"en": "They split into groups: forest, moor, river, and hills", "zh": "它们分成森林、荒原、河流和高地等群体"}, {"en": "One cat rules them all", "zh": "一只猫统治所有"}, {"en": "They return to the mountains according to some versions of the story", "zh": "它们返回山地（按书中另一种说法）"}, {"en": "They all share one camp", "zh": "它们共用一个营地"}], "answer": 0, "explain": {"en": "Clear Sky takes the forest, Tall Shadow the moor, Wind Runner the open moor, and River Ripple the river — beginning the separation that leads to the Clans.", "zh": "晴天占据森林，高影占据荒原高地，风奔占据开阔荒原，河波占据河流——这正是后来族群分立的开端。"}}];

const qEl = document.getElementById("questions");
const resultEl = document.getElementById("result");
const detailEl = document.getElementById("scoreDetail");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const langBtn = document.getElementById("langBtn");

function render(){
  qEl.innerHTML = "";
  document.getElementById("subtitle").textContent = L[lang].subtitle;
  langBtn.textContent = L[lang].langBtn;

  quiz.forEach((item, i) => {
    const qDiv = document.createElement("div");
    qDiv.className = "q";
    qDiv.id = "q" + i;
    let html = `<h3><span>Q${i+1}.</span>${item.q[lang]}</h3>`;
    item.options.forEach((opt, j) => {
      const isPicked = picked[i] === j;
      const checked = isPicked ? "checked" : "";
      html += `<label data-q="${i}" data-o="${j}" class="${isPicked?'picked':''}">
        <input type="radio" name="q${i}" value="${j}" ${checked}> ${opt[lang]}
      </label>`;
    });
    html += `<div class="explain" id="ex${i}">
      <div class="en"><b>${L[lang].ansLabel}:</b> ${item.options[item.answer][lang]}<br>${item.explain.en}</div>
      <div class="zh">${item.options[item.answer][lang]}<br>${item.explain.zh}</div>
    </div>`;
    qDiv.innerHTML = html;
    qEl.appendChild(qDiv);

    if (submitted){
      qDiv.classList.add(picked[i] === item.answer ? "correct" : "wrong");
      document.getElementById("ex"+i).classList.add("show");
      const labels = qDiv.querySelectorAll("label");
      labels[item.answer].classList.add("right");
      if (picked[i] !== item.answer && picked[i] !== undefined)
        labels[picked[i]].classList.add("picked-wrong");
    }
  });

  qEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener("change", e => {
      if (submitted) return;
      const qi = +e.target.name.replace("q","");
      picked[qi] = +e.target.value;
      qEl.querySelectorAll(`label[data-q="${qi}"]`).forEach(l=>l.classList.remove("picked"));
      e.target.closest("label").classList.add("picked");
    });
  });

  if (submitted){
    resultEl.textContent = L[lang].result(score);
    let msg = score===10 ? L[lang].perfect : score>=7 ? L[lang].great : score>=4 ? L[lang].ok : L[lang].low;
    detailEl.textContent = msg;
  } else {
    resultEl.textContent = "";
    detailEl.textContent = "";
  }
}

checkBtn.addEventListener("click", () => {
  submitted = true;
  score = 0;
  quiz.forEach((item,i) => { if (picked[i] === item.answer) score++; });
  render();
  checkBtn.style.display = "none";
  resetBtn.style.display = "inline-block";
});

resetBtn.addEventListener("click", () => {
  location.reload();
});

langBtn.addEventListener("click", () => {
  lang = (lang === "en") ? "zh" : "en";
  render();
});

render();
</script>
</body>
</html>
