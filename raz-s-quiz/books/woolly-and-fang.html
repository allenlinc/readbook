uthor's Purpose and Perspective", "explain": {"en": "The final page reads: 'Now, the ending of this story is up to you... The author would like to know what you think and why.'", "zh": "最后一页写道：“现在，这个故事的结局由你来决定……作者想知道你的想法和理由。”"}}], "extended": {"prompt": {"en": "Imagine and write the next part of the story: how do the young mammoth Woolly and the young tiger Fang survive together on the glacier? Draw or describe what happens.", "zh": "想象并续写故事：年幼的猛犸象毛毛和年幼的老虎尖牙如何在冰川上一起生存？画图或描述接下来发生的事。"}, "guidance": {"en": ["Think about what each animal needs for food, shelter, and safety on the ice.", "Decide whether they help each other or stay apart, and why."], "zh": ["思考在冰面上，每只动物需要怎样的食物、庇护所和安全。", "决定它们是互相帮助还是保持距离，并说明原因。"]}}};</script>
