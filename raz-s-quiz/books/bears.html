": "一种鸟"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The 'Do You Know?' box says: 'The koala... is not a bear at all... It is a marsupial, or pouched mammal.'", "zh": "“你知道吗？”栏目说：“考拉……根本不是熊……它是一种有袋动物，即育儿袋哺乳动物。”"}}, {"q": {"en": "Why does the author include the 'Do You Know?' note that the koala is not a bear?", "zh": "作者为什么在书中加入“考拉不是熊”的“你知道吗？”说明？"}, "options": [{"en": "To correct a common misunderstanding and teach a science fact", "zh": "为了纠正常见误解并传授科学事实"}, {"en": "To advertise Australia", "zh": "为了给澳大利亚做广告"}, {"en": "To describe bears' diet", "zh": "为了描述熊的食谱"}, {"en": "To explain hibernation", "zh": "为了解释冬眠"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The author adds this note to clear up a misconception ('often called a koala bear, is not a bear at all') and inform readers.", "zh": "作者加入这段说明是为了澄清误解（“常被称为考拉熊，却根本不是熊”）并告知读者事实。"}}, {"q": {"en": "What special feature helps the giant panda grasp bamboo stems?", "zh": "大熊猫用什么特殊构造来抓握竹茎？"}, "options": [{"en": "Webbed front paws", "zh": "带蹼的前爪"}, {"en": "An unusually long tongue", "zh": "异常长的舌头"}, {"en": "An extra 'thumb' (a special wrist bone)", "zh": "多出来的一根“拇指”（特殊的腕骨）"}, {"en": "Black skin under white fur", "zh": "白毛下黑色的皮肤"}], "answer": 2, "skill": "Key Ideas and Details", "explain": {"en": "The book explains the giant panda has an extra 'thumb' that is 'a special wrist bone... that helps the giant panda grasp bamboo stems.'", "zh": "书中解释说大熊猫多了一根“拇指”，其实是“一块特殊的腕骨……帮助大熊猫抓握竹茎”。"}}, {"q": {"en": "The glossary says most adult bears are 'solitary.' What does 'solitary' mean?", "zh": "词汇表说大多数成年熊是“solitary（独居的）”。“solitary”是什么意思？"}, "options": [{"en": "Preferring to live alone", "zh": "喜欢独自生活"}, {"en": "Hibernating together", "zh": "一起冬眠"}, {"en": "Eating only plants", "zh": "只吃植物"}, {"en": "Living in the water", "zh": "生活在水中"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The glossary defines solitary as 'alone; without companions (p. 5).' The text says most adult bears prefer to roam on their own.", "zh": "词汇表把 solitary 定义为“独自的；没有同伴（第5页）”。文中说多数成年熊喜欢独自游荡。"}}, {"q": {"en": "Which bear is the ONLY native bear in South America?", "zh": "哪一种熊是南美洲唯一的本土熊？"}, "options": [{"en": "Spectacled bear", "zh": "眼镜熊"}, {"en": "Polar bear", "zh": "北极熊"}, {"en": "Sun bear", "zh": "马来熊"}, {"en": "Asiatic black bear", "zh": "亚洲黑熊"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book states: 'They [spectacled bears] are the only native bear in South America.'", "zh": "书中写道：“它们（眼镜熊）是南美洲唯一的本土熊。”"}}, {"q": {"en": "According to 'Bear Survival,' what is the greatest danger to bears today?", "zh": "根据“熊的生存”一节，如今熊面临的最大危险是什么？"}, "options": [{"en": "Humans destroying habitats and hunting", "zh": "人类破坏栖息地并捕猎"}, {"en": "Other bears", "zh": "其他熊"}, {"en": "Disease", "zh": "疾病"}, {"en": "Cold winter weather", "zh": "寒冷的冬季"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says: 'bears are in greater danger from people than people are from bears' because of habitat destruction and hunting.", "zh": "书中说：“熊受到的来自人类的危险，比人类受到的来自熊的危险更大”，原因是栖息地破坏和捕猎。"}}, {"q": {"en": "The book's maps show that polar bears live near which region?", "zh": "书中的地图显示北极熊生活在哪个地区附近？"}, "options": [{"en": "The South Pole (Antarctica)", "zh": "南极"}, {"en": "Australia", "zh": "澳大利亚"}, {"en": "The North Pole", "zh": "北极"}, {"en": "South America", "zh": "南美洲"}], "answer": 2, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The text says: 'Polar bears live near the North Pole' and the map labels 'North Pole / Alaska / Canada / Greenland.'", "zh": "文中说：“北极熊生活在北极附近”，地图标注了“北极 / 阿拉斯加 / 加拿大 / 格陵兰”。"}}], "extended": {"prompt": {"en": "Draw a labeled diagram comparing two bears from the book (for example, the polar bear and the sun bear), showing their size, where they live, and one special feature each.", "zh": "画一张带标注的对比图，比较书中两种熊（例如北极熊与马来熊），展示它们的体型、栖息地和各自的一个特征。"}, "guidance": {"en": ["Use the 'Kinds of Bears' size chart on page 6 for lengths and weights.", "Pick one unique fact per bear, such as the polar bear's black skin or the sun bear's sun-shaped chest patch."], "zh": ["参考第6页“熊的种类”体型对照表获取身长和体重。", "为每种熊选一个独特事实，比如北极熊黑色的皮肤和马来熊胸前太阳形的斑块。"]}}};</script>
