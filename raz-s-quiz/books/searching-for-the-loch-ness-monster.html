ter is that it is a mystery. For now, the legend continues to capture people's imaginations.\"", "zh": "书中说“也许尼斯湖水怪最大的吸引力就在于它是个谜。至今这个传说仍在激发人们的想象。”"}}], "extended": {"prompt": {"en": "Write a short news report (or draw a 'Wanted' poster) describing what the Loch Ness Monster is said to look like, based on the book's descriptions.", "zh": "根据书中描述，写一篇简短的新闻报道（或画一张“通缉”海报），描述据说尼斯湖水怪的外貌。"}, "guidance": {"en": ["Use the believers' description: dark body, long neck, small sheeplike head, two or more humps.", "Mention that sightings go back over 1,400 years and the loch is over 800 feet deep."], "zh": ["使用相信者的描述：深色身体、长脖子、像羊一样的小头、两个或更多驼峰。", "提到目击记录可追溯到1400多年前，且湖深超过800英尺。"]}}};</script>
