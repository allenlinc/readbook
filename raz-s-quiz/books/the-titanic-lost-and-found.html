<script>window.BOOK = {"slug": "the-titanic-lost-and-found", "title": "The Titanic Lost and Found", "titleZh": "泰坦尼克号：沉没与重见天日", "level": "S", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "When did the Titanic sink to the bottom of the Atlantic Ocean?", "zh": "泰坦尼克号是什么时候沉入大西洋海底的？"}, "options": [{"en": "On Wednesday, April 10, 1912", "zh": "1912年4月10日，星期三"}, {"en": "On Sunday, April 14, 1912, just before midnight", "zh": "1912年4月14日，星期日，午夜刚过之前"}, {"en": "In the year 1985", "zh": "1985年"}, {"en": "On Thursday, April 11, 1912", "zh": "1912年4月11日，星期四"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says: 'on Sunday, April 14, 1912, just before midnight, disaster struck. Within hours the Titanic... had sunk to the bottom of the Atlantic Ocean.'", "zh": "书中写道：“1912年4月14日，星期日，午夜刚过之前，灾难降临。几个小时内，泰坦尼克号……已沉入大西洋海底。”"}}, {"q": {"en": "In the glossary, what does the word 'steerage' mean?", "zh": "在词汇表中，“steerage”一词是什么意思？"}, "options": [{"en": "The fancy first-class dining rooms", "zh": "豪华的头等舱餐厅"}, {"en": "The lowest part of the ship where the poorest passengers rode", "zh": "船上最底层、最贫穷乘客乘坐的地方"}, {"en": "The ship's four smokestacks", "zh": "船上的四个烟囱"}, {"en": "The lifeboats on deck", "zh": "甲板上的救生艇"}], "answer": 1, "skill": "Craft and Structure", "explain": {"en": "The glossary defines steerage (n.) as 'the lowest part of the ship where the poorest passengers rode (p. 6).'", "zh": "词汇表将 steerage（名词）定义为“船上最底层、最贫穷乘客乘坐的地方（第6页）”。"}}, {"q": {"en": "Where and when did passengers begin boarding the Titanic?", "zh": "乘客是在哪里、什么时候开始登上泰坦尼克号的？"}, "options": [{"en": "In New York on April 14", "zh": "4月14日在纽约"}, {"en": "In Southampton, England on Wednesday, April 10", "zh": "4月10日，星期三，在英国南安普敦"}, {"en": "In France on April 11", "zh": "4月11日在法国"}, {"en": "In Ireland on April 15", "zh": "4月15日在爱尔兰"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says: 'Passengers began boarding the Titanic on Wednesday, April 10, in Southampton, England.'", "zh": "书中写道：“乘客于4月10日，星期三，在英国南安普敦开始登上泰坦尼克号。”"}}, {"q": {"en": "How long was the Titanic?", "zh": "泰坦尼克号有多长？"}, "options": [{"en": "About 100 meters (328 ft)", "zh": "约100米（328英尺）"}, {"en": "269 meters (883 ft)", "zh": "269米（883英尺）"}, {"en": "About 500 meters (1,640 ft)", "zh": "约500米（1640英尺）"}, {"en": "Only 50 meters (164 ft)", "zh": "仅50米（164英尺）"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says: 'It was 269 meters (883 ft) long—about the length of 55 cars parked bumper-to-bumper.'", "zh": "书中写道：“它长269米（883英尺）——大约相当于55辆汽车首尾相连排成一排。”"}}, {"q": {"en": "At what time did the Titanic strike the iceberg?", "zh": "泰坦尼克号是在几点撞上冰山的？"}, "options": [{"en": "At 11:40 PM", "zh": "晚上11:40"}, {"en": "At noon", "zh": "中午"}, {"en": "At 6:00 AM", "zh": "早上6:00"}, {"en": "At 3:00 PM", "zh": "下午3:00"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says: 'Then, at 11:40 PM, the crew and other passengers felt a jarring thud against the side of the ship. The Titanic had struck an iceberg.'", "zh": "书中写道：“随后，在晚上11:40，船员和乘客感到船侧传来一声剧烈的撞击。泰坦尼克号撞上了冰山。”"}}, {"q": {"en": "Who was Thomas Andrews, and what did he realize after the ship hit the iceberg?", "zh": "托马斯·安德鲁斯（Thomas Andrews）是谁？撞上冰山后他意识到了什么？"}, "options": [{"en": "The captain, who thought the ship was unsinkable", "zh": "船长，他认为船不会沉"}, {"en": "The designer of the Titanic, who realized the ship was in grave danger", "zh": "泰坦尼克号的设计者，他意识到船正处于严重危险中"}, {"en": "A steerage passenger who played music", "zh": "一名在底层舱演奏音乐的乘客"}, {"en": "The radio operator who sent SOS", "zh": "发出SOS的无线电操作员"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says: 'That person was Thomas Andrews, who had helped design the Titanic. He soon realized... that it was in grave danger.'", "zh": "书中写道：“那个人就是曾参与设计泰坦尼克号的托马斯·安德鲁斯。他很快意识到……船正处于严重危险中。”"}}, {"q": {"en": "According to the 'A Chilly Discovery' section, why was the damage from the iceberg so bad?", "zh": "根据“冷酷的发现（A Chilly Discovery）”一节，冰山造成的破坏为什么那么严重？"}, "options": [{"en": "The Titanic hit the larger part of the iceberg hidden below the water surface", "zh": "泰坦尼克号撞上了隐藏在水面之下、体积更大的那部分冰山"}, {"en": "A meteor fell on the deck", "zh": "一颗陨石落在了甲板上"}, {"en": "The ship was hit by another ship", "zh": "船被另一艘船撞了"}, {"en": "Lightning struck the smokestacks", "zh": "闪电击中了烟囱"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book explains: 'Icebergs are actually bigger below the surface... The Titanic did not hit the part of the iceberg that you can see. Instead, it hit the larger part of the iceberg below the surface.'", "zh": "书中解释：“冰山水面以下的部分其实更大……泰坦尼克号撞上的不是肉眼可见的部分，而是水面下更大的那部分。”"}}, {"q": {"en": "About how many people survived and how many perished in the sinking?", "zh": "大约有多少人幸存，又有多少人遇难？"}, "options": [{"en": "About 700 survived and about 1,500 perished", "zh": "约700人幸存，约1500人遇难"}, {"en": "Everyone survived", "zh": "所有人都幸存"}, {"en": "Only 100 survived and 2,000 perished", "zh": "仅100人幸存，2000人遇难"}, {"en": "No one survived", "zh": "无人幸存"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says: 'About 700 people had survived in the few lifeboats, but about 1,500 had perished.'", "zh": "书中写道：“约700人乘少数救生艇幸存，但约1500人遇难。”"}}, {"q": {"en": "What did scientists discover in 1985 about how the iceberg damaged the ship?", "zh": "1985年，科学家对冰山如何损坏这艘船有了什么发现？"}, "options": [{"en": "The iceberg cut one huge gash in the side of the ship", "zh": "冰山在船侧划出了一道巨大的裂口"}, {"en": "It made several small holes that together equaled only about the area of a doorway", "zh": "它造成了几个小洞，合起来面积只相当于一道门的大小"}, {"en": "The ship exploded from the inside", "zh": "船从内部爆炸了"}, {"en": "A fire burned the hull", "zh": "火烧毁了船体"}], "answer": 1, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says scientists found 'the iceberg had not cut a huge gash... Instead, the iceberg had made several small holes which, when added together, equaled only about the same area as a doorway.'", "zh": "书中说科学家发现“冰山并没有在船侧划出巨大的裂口……相反，冰山造成了几个小洞，合起来面积只相当于一道门的大小。”"}}, {"q": {"en": "According to 'Titanic's Legacy', what safety changes came from the disaster?", "zh": "根据“泰坦尼克号的遗产（Titanic's Legacy）”一节，这场灾难带来了哪些安全改变？"}, "options": [{"en": "Ships must carry enough lifeboats for all, run lifeboat drills, keep radios on 24 hours, and the International Ice Patrol was created", "zh": "船必须配备足够的救生艇、进行救生艇演习、无线电全天开启，并成立了国际冰山巡逻队"}, {"en": "Ships were no longer allowed to cross the Atlantic", "zh": "船只不再被允许穿越大西洋"}, {"en": "Icebergs were removed from the ocean", "zh": "冰山被从海洋中移除了"}, {"en": "First-class passengers were banned", "zh": "头等舱乘客被禁止登船"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The Legacy section lists new rules: enough lifeboats for all, lifeboat drills, radios on 24 hours a day, and the International Ice Patrol was established.", "zh": "“遗产”一节列出了新规定：足够的救生艇、救生艇演习、无线电全天开启，并成立了国际冰山巡逻队。"}}], "extended": {"prompt": {"en": "Draw a labeled diagram of the Titanic and the iceberg, showing how the ship hit the hidden part below the water and why it sank. Then write one sentence about the most important safety lesson from the disaster.", "zh": "画一张带标注的泰坦尼克号与冰山示意图，标出船撞上了水面下隐藏的部分以及它下沉的原因。然后写一句话，说明这场灾难最重要的安全教训。"}, "guidance": {"en": ["Show most of the iceberg hidden below the water line, with the ship hitting that lower part.", "Use the book's safety lessons: enough lifeboats and radios kept on at all times."], "zh": ["画出冰山大部分隐藏在水线以下，船撞上的是下面那部分。", "运用书中的安全教训：足够的救生艇，以及无线电始终保持开启。"]}}};</script>
