<script>window.BOOK = {"slug": "the-trouble-with-english", "title": "The Trouble with English", "titleZh": "英语的麻烦", "level": "S", "genre": "Fiction", "mainSkill": "Author's Purpose and Perspective", "questions": [{"q": {"en": "Who is the narrator of the story, and where did she come from?", "zh": "这个故事的叙述者是谁，她来自哪里？"}, "options": [{"en": "Ting Yao, who came from Shanghai, China with her family", "zh": "婷瑶（Ting Yao），她和家人来自中国上海"}, {"en": "A boy named Tommy Jackson from England", "zh": "一个叫汤米·杰克逊的英国男孩"}, {"en": "Ms. Brickle the teacher from the United States", "zh": "来自美国的布里克老师（Ms. Brickle）"}, {"en": "A talking parrot from another kingdom", "zh": "一只来自另一个王国的会说话的鹦鹉"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says: 'My name is Ting Yao and I have been living in my new country... I came here with my mom, dad, and little brother from Shanghai, China.'", "zh": "书中写道：“我叫婷瑶（Ting Yao），来到这个新国家……我和妈妈、爸爸、弟弟从中国上海来到这里。”"}}, {"q": {"en": "What did Ms. Brickle say the strange expressions like 'pulling the wool over my eyes' are called?", "zh": "布里克老师（Ms. Brickle）说“pulling the wool over my eyes”这类奇怪的表达叫什么？"}, "options": [{"en": "Idioms", "zh": "习语（idioms）"}, {"en": "Silent letters", "zh": "不发音的字母"}, {"en": "Double letters", "zh": "双写字母"}, {"en": "Accents", "zh": "口音"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The book says: 'My teacher, Ms. Brickle, explained to me that these strange expressions are idioms.'", "zh": "书中写道：“我的老师布里克女士向我解释，这些奇怪的表达叫作习语（idioms）。”"}}, {"q": {"en": "What did some mean kids tease Ting Yao about?", "zh": "一些刻薄的孩子们因为什么取笑婷瑶？"}, "options": [{"en": "That she eats too many salted dried plums", "zh": "她吃太多咸话梅"}, {"en": "That she says an R sound as though it is an L, like 'rikes flied lice'", "zh": "她把R音说得像L音，比如把话说成“rikes flied lice”"}, {"en": "That she is too good at spelling", "zh": "她拼写太好了"}, {"en": "That she speaks English perfectly", "zh": "她英语说得很完美"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says: 'They say I make an R sound as though it is an L... They taunt me and say things like, There goes the girl who rikes flied lice.'", "zh": "书中写道：“他们说我把R音发得像L……他们嘲弄我说，那个‘rikes flied lice’的女孩又来了。”"}}, {"q": {"en": "According to Ting Yao, how can one letter make different sounds in English?", "zh": "根据婷瑶的说法，英语中一个字母为什么会发出不同的音？"}, "options": [{"en": "The letter C sounds different in 'cat' than in 'circus'; G differs in 'gate' vs 'giant'", "zh": "字母C在“cat”和“circus”中发音不同；G在“gate”和“giant”中也不同"}, {"en": "Every letter always makes exactly one sound", "zh": "每个字母永远只有一个发音"}, {"en": "Only vowels change their sounds", "zh": "只有元音会变音"}, {"en": "Letters never change sound depending on the word", "zh": "字母的发音从不会因为单词而改变"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "The book explains: 'take the letter C... cat makes a different sound than circus' and 'G... gate makes a different sound than giant.'", "zh": "书中解释：“以字母C为例……cat 的发音和 circus 不同”，以及“G……gate 的发音和 giant 不同”。"}}, {"q": {"en": "What rule did the teacher give about double letters such as in 'happy' and 'apple'?", "zh": "老师关于“happy”和“apple”这类双写字母，给出了什么规则？"}, "options": [{"en": "Both letters should be pronounced loudly", "zh": "两个字母都要大声读出来"}, {"en": "When two of the same letters are together, one of them is silent; ignore one", "zh": "当两个相同字母连在一起时，其中一个不发音，忽略其中一个"}, {"en": "Double letters must always be spelled twice", "zh": "双写字母必须永远拼两遍"}, {"en": "Double letters mean the word is plural", "zh": "双写字母表示单词是复数"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says: 'when there are two of the same letters next to each other... one of them is silent. She said that I should just ignore one of the letters.'", "zh": "书中写道：“当两个相同字母连在一起时……其中一个不发音。她说我只需忽略其中一个字母。”"}}, {"q": {"en": "Which silent letters does Ting Yao mention as confusing in words like 'know' and 'write'?", "zh": "婷瑶提到哪些不发音的字母让她感到困惑，比如“know”和“write”中的？"}, "options": [{"en": "The silent K (as in know, knee, knock) and W (as in write, wrap)", "zh": "不发音的K（如 know、knee、knock）和 W（如 write、wrap）"}, {"en": "The silent B and F", "zh": "不发音的B和F"}, {"en": "The silent M and N", "zh": "不发音的M和N"}, {"en": "The silent P and T", "zh": "不发音的P和T"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says silent K appears in 'know, knee, and knock' and silent W in 'write and wrap.'", "zh": "书中说不发音的K出现在“know、knee、knock”中，不发音的W出现在“write、wrap”中。"}}, {"q": {"en": "Why was Ting Yao confused by the words 'comb', 'bomb', and 'tomb'?", "zh": "为什么“comb”“bomb”“tomb”这三个词让婷瑶感到困惑？"}, "options": [{"en": "They look alike but each is pronounced differently", "zh": "它们看起来很像，但每个词的发音都不同"}, {"en": "They all mean the same thing", "zh": "它们的意思都相同"}, {"en": "They are all spelled exactly the same", "zh": "它们的拼写完全一样"}, {"en": "They are not real English words", "zh": "它们不是真正的英语单词"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "The book says: 'I looked at comb, bomb, and tomb and thought they had to sound the same... Wrong. Each one was pronounced differently.'", "zh": "书中写道：“我看着 comb、bomb、tomb，以为它们发音一定相同……错了。每个词发音都不同。”"}}, {"q": {"en": "How did Ting Yao spell the word 'fish' on her spelling test?", "zh": "在拼写测验中，婷瑶把“fish”拼成了什么？"}, "options": [{"en": "F-I-S-H", "zh": "F-I-S-H"}, {"en": "P-H-O-T-O", "zh": "P-H-O-T-O"}, {"en": "F-I-S-H-E", "zh": "F-I-S-H-E"}, {"en": "P-H-I-S-H", "zh": "P-H-I-S-H"}], "answer": 1, "skill": "Key Ideas and Details", "explain": {"en": "The book says: 'my teacher told us to spell fish. So I did. I spelled it photo.' She used ph, o, ti for the sounds.", "zh": "书中写道：“老师让我们拼 fish。我就拼了。我把它拼成了 photo。”她用 ph、o、ti 来对应发音。"}}, {"q": {"en": "What does Ting Yao say she 'votes for' about the English language?", "zh": "婷瑶说她“投票赞成”对英语做些什么？"}, "options": [{"en": "Getting rid of all double and silent letters", "zh": "废除所有双写字母和不发音字母"}, {"en": "Adding more silent letters", "zh": "增加更多不发音的字母"}, {"en": "Making English harder", "zh": "让英语更难"}, {"en": "Removing all idioms", "zh": "删掉所有习语"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The book says: 'I vote for getting rid of all double and silent letters in the English language. They are worthless and useless and confusing.'", "zh": "书中写道：“我投票赞成废除英语中所有的双写字母和不发音字母。它们毫无价值、毫无用处，还很让人困惑。”"}}, {"q": {"en": "What is the author's main purpose in writing this book?", "zh": "作者写这本书的主要目的是什么？"}, "options": [{"en": "To prove that English is the easiest language", "zh": "证明英语是最简单的语言"}, {"en": "To share the funny, confusing challenges of learning English as a new language and build empathy", "zh": "分享作为非母语者学习英语时那些好笑又困惑的难题，并引发共鸣"}, {"en": "To teach readers how to speak Mandarin", "zh": "教读者说普通话"}, {"en": "To explain how to build a wall between countries", "zh": "解释如何在国家之间筑墙"}], "answer": 1, "skill": "Author's Purpose and Perspective", "explain": {"en": "The narrator shares personal, humorous struggles (idioms, silent letters, spelling) to show what it is like to learn English in a new country, ending on hope: 'I keep getting better the longer I am in my new country.'", "zh": "叙述者分享个人又幽默的困难（习语、不发音字母、拼写），展现在新国家学英语的感受，并以希望结尾：“我在这个新国家待得越久，就进步越大。”"}}], "extended": {"prompt": {"en": "Write a short paragraph about one English word or expression that you (or Ting Yao) find confusing, and explain why it is confusing, just like the narrator does in the book.", "zh": "写一小段话，介绍一个你觉得（或婷瑶觉得）困惑的英语单词或表达，并像书中的叙述者那样解释它为什么让人困惑。"}, "guidance": {"en": ["Pick an example such as a silent letter, a double letter, or a silly idiom.", "Explain what you expected it to mean or sound like, and what it really means."], "zh": ["选一个例子，比如不发音字母、双写字母，或一句奇怪的习语。", "解释你原本以为它是什么意思或怎么读，而它实际又是怎样的。"]}}};</script>
