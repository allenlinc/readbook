<script>window.BOOK = {"slug": "our-solar-system", "title": "Our Solar System", "titleZh": "我们的太阳系", "level": "S", "genre": "Informational", "mainSkill": "Key Ideas and Details", "questions": [{"q": {"en": "How many official planets are in our Solar System?", "zh": "我们的太阳系中有几颗官方认定的行星？"}, "options": [{"en": "Eight", "zh": "8颗"}, {"en": "Nine", "zh": "9颗"}, {"en": "Seven", "zh": "7颗"}, {"en": "Ten", "zh": "10颗"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "\"Our Solar System is made up of the Sun, eight official planets...\"", "zh": "书中说：“我们的太阳系由太阳、八颗官方认定的行星……”组成。"}}, {"q": {"en": "Which planet is known as the 'red planet'?", "zh": "哪颗行星被称为“红色星球”？"}, "options": [{"en": "Mars", "zh": "火星"}, {"en": "Venus", "zh": "金星"}, {"en": "Jupiter", "zh": "木星"}, {"en": "Mercury", "zh": "水星"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "\"Mars is the fourth planet from the Sun. It is known as the red planet because of large amounts of rust-colored dust on its surface.\"", "zh": "书中说“火星是距太阳第四颗行星，因表面大量锈色尘埃而被称为红色星球。”"}}, {"q": {"en": "What is a 'meteoroid'?", "zh": "“meteoroid（流星体）”是什么？"}, "options": [{"en": "A comet, asteroid, or dust particle floating in space.", "zh": "漂浮在太空中的彗星、小行星或尘埃颗粒。"}, {"en": "A planet.", "zh": "一颗行星。"}, {"en": "A type of star.", "zh": "一种恒星。"}, {"en": "A moon.", "zh": "一颗卫星。"}], "answer": 0, "skill": "Craft and Structure", "explain": {"en": "Glossary: \"meteoroid (n.) a comet, asteroid, or dust particle floating in space.\"", "zh": "词汇表：“meteoroid——漂浮在太空中的彗星、小行星或尘埃颗粒。”"}}, {"q": {"en": "What is special about Venus's rotation?", "zh": "金星的旋转有什么特别之处？"}, "options": [{"en": "It rotates backward, so the Sun rises in the west.", "zh": "它逆向旋转，所以太阳从西边升起。"}, {"en": "It doesn't rotate.", "zh": "它不旋转。"}, {"en": "It rotates once per hour.", "zh": "它每小时转一圈。"}, {"en": "It rotates like Earth.", "zh": "它和地球一样旋转。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "\"scientists found that Venus rotates backward. This means that on Venus the Sun rises in the west and sets in the east.\"", "zh": "书中说“科学家发现金星逆向旋转。这意味着在金星上太阳从西边升起、东边落下。”"}}, {"q": {"en": "Why was Pluto reclassified in 2006?", "zh": "2006年冥王星为什么被重新分类？"}, "options": [{"en": "Scientists created a new 'dwarf planet' category for objects like Pluto that don't have enough gravity to sweep their orbit.", "zh": "科学家为冥王星这类引力不足以清空轨道的天体新设了“矮行星”类别。"}, {"en": "It exploded.", "zh": "它爆炸了。"}, {"en": "It moved.", "zh": "它移动了。"}, {"en": "It became a moon.", "zh": "它变成了一颗卫星。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "\"Before 2006... Pluto was the ninth planet... scientists... voted to create a new category called dwarf planets... They also do not have enough gravitational pull to sweep other space objects from their orbit.\"", "zh": "书中说“2006年前冥王星是第九颗行星……科学家投票设立‘矮行星’新类别……它们也没有足够引力清空自己的轨道。”"}}, {"q": {"en": "What is the Great Red Spot on Jupiter?", "zh": "木星上的“大红斑”是什么？"}, "options": [{"en": "A gigantic storm rotating at 360 kph, as wide as three Earths.", "zh": "一场以360公里/小时旋转、宽达三个地球大小的巨型风暴。"}, {"en": "A volcano.", "zh": "一座火山。"}, {"en": "A moon.", "zh": "一颗卫星。"}, {"en": "A crater.", "zh": "一个陨石坑。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "\"One gigantic storm rotates counterclockwise... 360 kilometers per hour... called the Great Red Spot. Easily visible, it can be as wide as three times the size of Earth.\"", "zh": "书中说“一场巨型风暴以360公里/小时逆时针旋转……叫做大红斑。它清晰可见，宽度可达地球的三倍。”"}}, {"q": {"en": "How does the Moon cause Earth's ocean tides?", "zh": "月球是如何引起地球海洋潮汐的？"}, "options": [{"en": "Through its gravitational pull.", "zh": "通过它的引力。"}, {"en": "By shining brightly.", "zh": "通过明亮地发光。"}, {"en": "By rotating fast.", "zh": "通过快速旋转。"}, {"en": "By heating the water.", "zh": "通过加热海水。"}], "answer": 0, "skill": "Integration of Knowledge and Ideas", "explain": {"en": "\"Earth's ocean tides are caused by the gravitational pull of the Moon.\"", "zh": "书中说“地球海洋的潮汐是由月球的引力引起的。”"}}, {"q": {"en": "What is the book's main purpose?", "zh": "本书的主要目的是什么？"}, "options": [{"en": "To inform readers about the Sun, planets, and other objects in our Solar System.", "zh": "向读者介绍太阳、行星及太阳系中的其他天体。"}, {"en": "To argue that Pluto should stay a planet.", "zh": "为了论证冥王星应保留行星地位。"}, {"en": "To teach math.", "zh": "为了教数学。"}, {"en": "To describe Earth only.", "zh": "为了只描述地球。"}], "answer": 0, "skill": "Author's Purpose and Perspective", "explain": {"en": "The book is an informational text with chapters on the Sun, each planet, dwarf planets, asteroids, and comets, describing the Solar System.", "zh": "本书是说明性文本，设有关于太阳、各行星、矮行星、小行星和彗星的章节，全面描述太阳系。"}}, {"q": {"en": "How much would a 70-pound person weigh on Jupiter?", "zh": "一个70磅重的人在木星上会有多重？"}, "options": [{"en": "165 lbs", "zh": "165磅"}, {"en": "27 lbs", "zh": "27磅"}, {"en": "12 lbs", "zh": "12磅"}, {"en": "5 lbs", "zh": "5磅"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "The \"What Would You Weigh?\" chart shows \"On Jupiter 165 lbs\" for a 70-lb Earth weight.", "zh": "“你的体重会是多少？”图表显示，地球70磅的人在木星上重“165磅”。"}}, {"q": {"en": "What are comets made of?", "zh": "彗星是由什么组成的？"}, "options": [{"en": "Ice and dust—like large dirty snowballs in space.", "zh": "冰和尘埃——就像太空中巨大的脏雪球。"}, {"en": "Rock only.", "zh": "只有岩石。"}, {"en": "Gas only.", "zh": "只有气体。"}, {"en": "Metal only.", "zh": "只有金属。"}], "answer": 0, "skill": "Key Ideas and Details", "explain": {"en": "\"Comets are composed of ice and dust and are like large dirty snowballs in space.\"", "zh": "书中说“彗星由冰和尘埃组成，就像太空中巨大的脏雪球。”"}}], "extended": {"prompt": {"en": "Make a model or draw a diagram of the Solar System showing the Sun, the eight planets in order, and one fact about your favorite planet.", "zh": "制作一个模型或画一张太阳系示意图，标出太阳、按顺序排列的八大行星，并为你最喜欢的行星写一个事实。"}, "guidance": {"en": ["List planets in order from the Sun: Mercury, Venus, Earth, Mars, Jupiter, Saturn, Uranus, Neptune.", "Use the size analogy from the book—e.g., if Earth is a grape, Jupiter is a grapefruit."], "zh": ["按离太阳由近到远的顺序列出行星：水星、金星、地球、火星、木星、土星、天王星、海王星。", "运用书中的大小类比——例如若地球是一颗葡萄，木星就是一个葡萄柚。"]}}};</script>
